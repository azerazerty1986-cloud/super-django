    <style>

        :root{--gold:#ffd700;--gold-dark:#daa520;--success:#4ade80;--error:#f87171;--warning:#fbbf24;--info:#60a5fa;--telegram:#0088cc}

        .container{max-width:1400px;margin:0 auto;padding:20px}
        .top-navbar{background:linear-gradient(135deg,rgba(10,10,26,.95),rgba(26,26,46,.95));backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,215,0,.25);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;position:sticky;top:0;z-index:1000}

        .nav-right{flex:1;display:flex;justify-content:flex-end;gap:10px}
        .nav-btn{padding:8px 18px;border-radius:40px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:'Cairo';display:flex;align-items:center;gap:6px;transition:.2s}

        .form-group{margin-bottom:15px}
        .form-group label{display:block;margin-bottom:5px;color:var(--gold);font-weight:600;font-size:12px}
        .form-group input,.form-group select,.form-group textarea{width:100%;padding:10px;background:rgba(0,0,0,.4);border:1px solid rgba(255,215,0,.2);border-radius:12px;color:#fff;font-family:'Cairo'}
        .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:40px;color:#fff;font-weight:700;z-index:3000;display:flex;align-items:center;gap:10px;animation:slideUp .3s}
        @keyframes slideUp{from{bottom:-50px;opacity:0}to{bottom:30px;opacity:1}}

        .toast.error{background:linear-gradient(135deg,#ef4444,#dc2626)}
        .toast.info{background:linear-gradient(135deg,#3b82f6,#2563eb)}

        .loading-spinner{width:20px;height:20px;border:3px solid rgba(255,255,255,.3);border-radius:50%;border-top-color:#fff;animation:spin 1s linear infinite;display:inline-block}
        @keyframes spin{to{transform:rotate(360deg)}}
        .distributor-card{background:rgba(0,0,0,.4);border:1px solid rgba(255,215,0,.2);border-radius:16px;padding:15px;margin-bottom:12px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:15px}
        .distributor-card:hover{background:rgba(255,215,0,.1);transform:translateX(-5px)}
        .distributor-card.selected{border-color:var(--gold);background:rgba(255,215,0,.15);box-shadow:0 0 10px rgba(255,215,0,.3)}
        .distributor-icon{font-size:32px}
        .distributor-info{flex:1}
        .distributor-name{font-weight:bold;font-size:16px;margin-bottom:5px}

        .distributor-id{font-size:11px;color:#aaa}
        .distributor-phone{font-size:12px;color:var(--gold)}
        .loading-distributors{text-align:center;padding:30px;color:var(--gold)}
        .state-select{background:rgba(0,0,0,.4);border:1px solid var(--gold);border-radius:12px;padding:12px;color:#fff;font-family:'Cairo';width:100%;margin-bottom:15px;font-size:14px}
        @media(max-width:768px){.top-navbar{padding:10px}.filter-bar{overflow-x:auto;flex-wrap:nowrap}.data-table th,.data-table td{font-size:11px;padding:8px}}
    </style>
</head>

<div id="deliveryModal" class="modal"><div class="modal-content"><div class="modal-header"><h3><i class="fas fa-truck"></i> توصيل الطلب - اختيار الموزع حسب الولاية</h3><button class="modal-close" onclick="closeDeliveryModal()">&times;</button></div><div id="deliveryModalContent"></div></div></div>

<script>
// ========== إعدادات التليجرام ==========
const TELEGRAM = { botToken: '8576673096:AAFwOd-Ut1tCyKTHwkgj_r6OFi9UZbb4pTM', channelId: '-1003822964890', apiUrl: 'https://api.telegram.org/bot' };
const SEARCH_TITLE = "📋 قائمة الموزعين وشركات التوصيل حسب كل ولاية";
let orders = [], products = [], distributorsData = {};
let currentStore = { storeName: 'ناردو برو', storeFixedID: '', channelUsername: '@NardoChannel' };
let currentFilter = 'all', currentDeliveryOrderId = null, selectedOrders = new Set();

function safeLocalStorageGet(key) { try { const data = localStorage.getItem(key); return data ? JSON.parse(data) : []; } catch(e) { return []; } }
function safeLocalStorageSet(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {} }

function generateStoreID(storeName) { let clean = storeName.replace(/[^a-zA-Z0-9\u0600-\u06FF]/g, '').substring(0, 10).toUpperCase(); if (!clean) clean = 'NARDO'; const randomNumbers = Math.floor(Math.random() * 900000 + 100000); return `${clean}-${randomNumbers}`; }

function loadCurrentStore() {
    const savedStore = localStorage.getItem('nardo_current_store');
    if (savedStore) { currentStore = JSON.parse(savedStore); if (!currentStore.storeFixedID || !currentStore.storeFixedID.match(/-\d{6}$/)) { currentStore.storeFixedID = generateStoreID(currentStore.storeName); localStorage.setItem('nardo_current_store', JSON.stringify(currentStore)); } }
    else { currentStore = { storeName: 'ناردو برو', storeFixedID: generateStoreID('ناردو برو'), channelUsername: '@NardoChannel' }; localStorage.setItem('nardo_current_store', JSON.stringify(currentStore)); }
    document.getElementById('currentStoreNameDisplay').innerText = currentStore.storeName;
    document.getElementById('storeIDDisplay').innerText = currentStore.storeFixedID;
    document.getElementById('storeChannelDisplay').innerText = currentStore.channelUsername;
    orders = safeLocalStorageGet('nardo_orders'); products = safeLocalStorageGet('nardo_products');
    updateStats(); renderOrders();
}

function getStateCode(stateName) {
    const codes = { 'الجزائر':'ALG','أدرار':'ADE','الشلف':'ASH','الأغواط':'LGH','أم البواقي':'OEB','باتنة':'BAT','بجاية':'BJA','بسكرة':'BSK','بشار':'BSH','البليدة':'BLI','البويرة':'BUI','تمنراست':'TMR','تبسة':'TEB','تلمسان':'TLE','تيارت':'TIA','تيزي وزو':'TIZ','الجلفة':'DJF','جيجل':'JIJ','سطيف':'SET','سعيدة':'SAI','سكيكدة':'SKI','سيدي بلعباس':'SBA','عنابة':'ANA','قالمة':'GUE','قسنطينة':'CON','المدية':'MED','مستغانم':'MGH','المسيلة':'MSL','معسكر':'MOS','ورقلة':'OUA','وهران':'ORA','برج بوعريريج':'BBA','بومرداس':'BMD','الطارف':'TAR','تندوف':'TIN','تيسمسيلت':'TSS','الوادي':'ELO','خنشلة':'KHE','سوق أهراس':'SAH','تيبازة':'TIP','ميلة':'MIL','عين الدفلى':'AIND','النعامة':'NAA','عين تموشنت':'AINT','غرداية':'GHA','غليزان':'REL' };
    return codes[stateName] || stateName.substring(0,3).toUpperCase();
}

async function fetchDistributorsFromChannel() {
    const cached = localStorage.getItem('nardo_distributors_data'), cacheTime = localStorage.getItem('nardo_distributors_cache_time');
    if (cached && cacheTime && (Date.now() - parseInt(cacheTime)) < 3600000) { distributorsData = JSON.parse(cached); console.log('تم تحميل الموزعين من الكاش'); return true; }
    try {
        let offset = 0, foundMessage = null;
        while (!foundMessage && offset < 500) {
            const res = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getUpdates?offset=${offset}&limit=100`);
            const data = await res.json();
            if (!data.ok) break;
            if (!data.result || data.result.length === 0) break;
            for (const update of data.result) {
                const msg = update.channel_post || update.message;
                if (msg && msg.chat.id.toString() === TELEGRAM.channelId && msg.text && (msg.text.includes(SEARCH_TITLE) || msg.text.includes('قائمة الموزعين'))) { foundMessage = msg.text; break; }
                offset = update.update_id + 1;
            }
            await new Promise(r => setTimeout(r, 200));
        }
        if (foundMessage) {
            distributorsData = {}; let currentState = null;
            const lines = foundMessage.split('\n');
            for (let i=0; i<lines.length; i++) {
                let line = lines[i].trim();
                let stateMatch = line.match(/📍\s*ولاية\s*(.+?)\s*\(([A-Z]{3})\)/);
                if (stateMatch) { currentState = stateMatch[2]; if(!distributorsData[currentState]) distributorsData[currentState]=[]; continue; }
                let distMatch = line.match(/•\s*(.+?)\s*\(([📦🚚].+?)\)/);
                if (distMatch && currentState) {
                    let name = distMatch[1].trim(), type = distMatch[2].includes('📦')?'distributor':'delivery', typeText = type==='distributor'?'📦 موزع معتمد':'🚚 شركة توصيل';
                    let fullId = null, phone = null;
                    for(let j=i+1; j<Math.min(i+4,lines.length); j++) { let nl = lines[j].trim(); let idM = nl.match(/🆔\s*المعرف:\s*(.+)/); if(idM) fullId=idM[1].trim(); let phM = nl.match(/📞\s*(.+)/); if(phM) phone=phM[1].trim(); if(nl.includes('📍 ولاية') || nl.startsWith('•')) break; }
                    distributorsData[currentState].push({ name, fullId: fullId||`${currentState}-${name}`, type, typeText, phone: phone||'غير متوفر' });
                }
            }
            if(Object.keys(distributorsData).length){ localStorage.setItem('nardo_distributors_data',JSON.stringify(distributorsData)); localStorage.setItem('nardo_distributors_cache_time',Date.now().toString()); return true; }
        }
    } catch(e){ console.error(e); }
    distributorsData = { 'ALG':[{ name:'محمد الأولان',fullId:'ALG-001',type:'distributor',typeText:'📦 موزع معتمد',phone:'0555123456' }], 'ORA':[{ name:'ناردو برو',fullId:'ORA-001',type:'delivery',typeText:'🚚 شركة توصيل',phone:'0566112233' }], 'CON':[{ name:'قسنطينة إكسبريس',fullId:'CON-001',type:'distributor',typeText:'📦 موزع معتمد',phone:'0555443322' }] };
    return false;
}

async function getDistributorsByState(stateName) { if(Object.keys(distributorsData).length===0) await fetchDistributorsFromChannel(); const code = getStateCode(stateName); return distributorsData[code] || []; }

function extractOrderDataFromText(text) {
    const result = { items: [], storeID: '', customerName: '', customerPhone: '', customerAddress: '', total: 0, notes: '', orderNumber: '', date: '', deliveryCompany: '', distributorId: '', state: '' };
    let orderMatch = text.match(/رقم الطلب الموحد:\s*([^\n]+)/); if(orderMatch) result.orderNumber = orderMatch[1].trim();
    let storeMatch = text.match(/معرف المتجر:\s*`?([^\n`]+)`?/); if(storeMatch) result.storeID = storeMatch[1].trim();
    let customerMatch = text.match(/الزبون:\s*([^\n]+)/); if(customerMatch) result.customerName = customerMatch[1].trim().replace(/[*_]/g, '');
    let phoneMatch = text.match(/رقم الجوال:\s*([^\n]+)/); if(phoneMatch) result.customerPhone = phoneMatch[1].trim().replace(/[*_]/g, '');
    let addressMatch = text.match(/العنوان الكامل:\s*([^\n]+)/); if(addressMatch) result.customerAddress = addressMatch[1].trim().replace(/[*_]/g, '');
    let stateMatch = text.match(/الولاية:\s*([^\n]+)/); if(stateMatch) result.state = stateMatch[1].trim();
    let totalMatch = text.match(/إجمالي الطلب:\s*([\d,]+)/); if(totalMatch) result.total = parseInt(totalMatch[1].replace(/,/g, ''));
    let notesMatch = text.match(/ملاحظات:\s*([^\n]+)/); if(notesMatch) result.notes = notesMatch[1].trim();
    const productRegex = /(\d+)️⃣\s*📦\s*المنتج:\s*([^\n]+)\s*🆔\s*معرف المنتج:\s*([^\n]+)\s*📦\s*الكمية:\s*(\d+)\s*💰\s*السعر:\s*([\d,]+)/g;
    let match; while((match = productRegex.exec(text)) !== null) { result.items.push({ productID: match[3].trim(), name: match[2].trim(), quantity: parseInt(match[4]), price: parseInt(match[5].replace(/,/g, '')) }); }
    return result;
}

function updateStats(){ const my=orders.filter(o=>o.storeID===currentStore.storeFixedID); document.getElementById('statPending').innerText=my.filter(o=>o.status!=='delivered').length; document.getElementById('statDelivered').innerText=my.filter(o=>o.status==='delivered').length; document.getElementById('statTotal').innerText=my.length; }
function filterOrders(filter,btn){ currentFilter=filter; document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active')); if(btn) btn.classList.add('active'); renderOrders(); }
function getFilteredOrders(){ let f=orders.filter(o=>o.storeID===currentStore.storeFixedID); const s=document.getElementById('searchOrders')?.value.toLowerCase(); if(s) f=f.filter(o=>(o.telegramOrderId&&o.telegramOrderId.includes(s))||(o.customerName&&o.customerName.includes(s))); if(currentFilter==='pending') f=f.filter(o=>o.status==='pending'); else if(currentFilter==='processing') f=f.filter(o=>o.status==='processing'); else if(currentFilter==='delivered') f=f.filter(o=>o.status==='delivered'); else if(currentFilter==='today'){ const t=new Date().toLocaleDateString('ar-EG'); f=f.filter(o=>o.date?.includes(t)); } else if(currentFilter==='week'){ const w=new Date(); w.setDate(w.getDate()-7); f=f.filter(o=>new Date(o.date)>=w); } return f; }

function bulkDeliverOrders(){ if(selectedOrders.size===0){showToast('اختر طلبات أولاً','warning');return;} selectedOrders.forEach(id=>{ const o=orders.find(o=>o.id==id); if(o&&o.status!=='delivered'){ o.status='delivered'; o.deliveredAt=new Date().toLocaleString('ar-EG'); } }); safeLocalStorageSet('nardo_orders',orders); renderOrders(); updateStats(); showToast(`تم تسليم ${selectedOrders.size} طلب`,'success'); selectedOrders.clear(); document.getElementById('selectAll').checked=false; }

async function bulkExportOrdersToPDF(){ if(selectedOrders.size===0){showToast('اختر طلبات أولاً','warning');return;} const list=orders.filter(o=>selectedOrders.has(o.id)); for(let o of list) await exportSingleOrderToPDF(o); showToast(`تم تصدير ${list.length} PDF`,'success'); }
async function exportSingleOrderToPDF(order){ const {jsPDF}=window.jspdf; const doc=new jsPDF(); const temp=document.createElement('div'); temp.style.position='absolute'; temp.style.left='-9999px'; temp.innerHTML=`<div style="padding:20px;font-family:Cairo;"><h2>فاتورة #${order.telegramOrderId||order.id}</h2><p>العميل: ${order.customerName}<br>الهاتف: ${order.customerPhone}<br>العنوان: ${order.customerAddress}</p><table border="1"><tr><th>المنتج</th><th>الكمية</th><th>السعر</th></tr>${order.items.map(i=>`<tr><td>${i.name}</td><td>${i.quantity}</td><td>${i.price} دج</td></tr>`).join('')}<tr><td colspan="2">الإجمالي</td><td>${order.total} دج</td></tr></table></div>`; document.body.appendChild(temp); const canvas=await html2canvas(temp); doc.addImage(canvas.toDataURL('image/png'),'PNG',10,10,190,0); doc.save(`order_${order.id}.pdf`); document.body.removeChild(temp); }

async function loadDistributorsByState(){
    const state = document.getElementById('stateSelect').value;
    const container = document.getElementById('distributorsContainer');
    if(!state){ container.innerHTML=''; return; }
    container.innerHTML='<div class="loading-distributors"><i class="fas fa-spinner fa-spin"></i> جاري تحميل الموزعين...</div>';
    const distributors = await getDistributorsByState(state);
    if(distributors.length===0){ container.innerHTML='<div class="alert alert-warning">⚠️ لا توجد موزعين مسجلين في هذه الولاية</div>'; return; }
    container.innerHTML = `<div style="margin-bottom:10px;"><strong>اختر جهة التوصيل / الموزع:</strong></div>` + distributors.map((d,idx)=>`
        <div class="distributor-card" onclick="selectDistributorCard(${idx})" data-idx="${idx}" data-name="${d.name}" data-phone="${d.phone||''}">
            <div class="distributor-icon">${d.type==='delivery'?'🚚':'📦'}</div>
            <div class="distributor-info"><div class="distributor-name">${d.name}</div><div class="distributor-type ${d.type==='delivery'?'delivery-type':'distributor-type'}">${d.typeText}</div><div class="distributor-phone">📞 ${d.phone||'غير متوفر'}</div></div>
        </div>
    `).join('');
    window.currentDistributorsList = distributors;
}
window.currentDistributorsList = [];
function selectDistributorCard(idx){
    document.querySelectorAll('.distributor-card').forEach(c=>c.classList.remove('selected'));
    const cards = document.querySelectorAll('.distributor-card');
    if(cards[idx]) cards[idx].classList.add('selected');
    const dist = window.currentDistributorsList[idx];
    if(dist) window.selectedDistributorData = dist;
}
async function confirmDeliveryWithDistributor(orderId){
    if(!window.selectedDistributorData && window.currentDistributorsList && window.currentDistributorsList.length>0 && !window.selectedDistributorData){
        showToast('الرجاء اختيار الموزع أولاً','warning');
        return;
    }
    const dist = window.selectedDistributorData || (window.currentDistributorsList ? window.currentDistributorsList[0] : null);
    if(!dist){ showToast('لا يوجد موزع متاح لهذه الولاية','error'); return; }
    const order = orders.find(o=>o.id==orderId);
    if(order){
        order.status = 'delivered';
        order.deliveredAt = new Date().toLocaleString('ar-EG');
        order.deliveryCompany = dist.name;
        order.distributorId = dist.fullId || dist.phone;
        order.deliveryNotes = document.getElementById('deliveryNote')?.value || '';
        safeLocalStorageSet('nardo_orders',orders);
        renderOrders(); updateStats();
        showToast(`✅ تم توصيل الطلب بواسطة: ${dist.name}`,'success');
        closeDeliveryModal();
        window.selectedDistributorData = null;
    }
}
function openEditDeliveryModal(orderId){ currentDeliveryOrderId=orderId; const o=orders.find(o=>o.id==orderId); if(o){ document.getElementById('editDeliveryCompany').value=o.deliveryCompany||''; document.getElementById('editTrackingNumber').value=o.distributorId||''; document.getElementById('editDeliveryNotes').value=o.deliveryNotes||''; document.getElementById('editOrderStatus').value=o.status||'pending'; document.getElementById('editDeliveryModal').classList.add('active');} }
function saveDeliveryChanges(){ const o=orders.find(o=>o.id==currentDeliveryOrderId); if(o){ o.deliveryCompany=document.getElementById('editDeliveryCompany').value; o.distributorId=document.getElementById('editTrackingNumber').value; o.deliveryNotes=document.getElementById('editDeliveryNotes').value; o.status=document.getElementById('editOrderStatus').value; if(o.status==='delivered') o.deliveredAt=new Date().toLocaleString('ar-EG'); safeLocalStorageSet('nardo_orders',orders); renderOrders(); updateStats(); closeEditDeliveryModal(); showToast('تم حفظ التغييرات','success');} }
function closeDeliveryModal(){ document.getElementById('deliveryModal').classList.remove('active'); currentDeliveryOrderId=null; window.selectedDistributorData=null; }
function closeEditDeliveryModal(){ document.getElementById('editDeliveryModal').classList.remove('active'); }
