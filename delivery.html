<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ناردو برو | نظام التوصيل المتكامل - الإصدار الكامل 88 دالة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--gold:#ffd700;--gold-dark:#daa520;--success:#4ade80;--error:#f87171;--warning:#fbbf24;--info:#60a5fa;--telegram:#0088cc}
        body{font-family:'Cairo',sans-serif;background:linear-gradient(135deg,#0a0a1a,#15152a);color:#fff;min-height:100vh;transition:all 0.3s}
        body.light-theme{background:#f5f5f5;color:#111}
        .container{max-width:1400px;margin:0 auto;padding:20px}
        .top-navbar{background:linear-gradient(135deg,rgba(10,10,26,.95),rgba(26,26,46,.95));backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,215,0,.25);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;position:sticky;top:0;z-index:1000}
        .nav-logo{display:flex;align-items:center;gap:10px}
        .nav-logo i{font-size:28px;color:var(--gold)}
        .nav-logo .logo-text{font-size:18px;font-weight:800;background:linear-gradient(135deg,#ffd700,#ffed4e);-webkit-background-clip:text;background-clip:text;color:transparent}
        .store-circle{display:flex;flex-direction:column;align-items:center;cursor:pointer}
        .circle-icon{width:55px;height:55px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 15px rgba(255,215,0,.4)}
        .circle-icon i{font-size:28px;color:#111}
        .store-name-circle{font-size:11px;font-weight:700;margin-top:6px;color:var(--gold);background:rgba(255,215,0,.15);padding:3px 10px;border-radius:20px}
        .nav-btn{padding:8px 18px;border-radius:40px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:'Cairo';display:inline-flex;align-items:center;gap:6px}
        .nav-btn-telegram{background:linear-gradient(135deg,#0088cc,#006699);color:#fff}
        .nav-btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#111}
        .nav-btn-outline{background:0 0;border:1px solid rgba(255,215,0,.4);color:var(--gold)}
        .store-card{background:linear-gradient(135deg,rgba(255,215,0,.08),rgba(0,0,0,.3));border:1px solid rgba(255,215,0,.15);border-radius:28px;padding:16px 24px;margin:20px 0;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px}
        .stats-badges{display:flex;gap:12px;flex-wrap:wrap}
        .stat-badge{background:rgba(0,0,0,.4);padding:6px 14px;border-radius:24px;text-align:center;border:1px solid rgba(255,215,0,.15)}
        .stat-badge .number{font-size:24px;font-weight:800;background:linear-gradient(135deg,#ffd700,#ffb347);-webkit-background-clip:text;background-clip:text;color:transparent}
        .toolbar{background:linear-gradient(135deg,rgba(255,215,0,.05),rgba(0,0,0,.2));border-radius:28px;padding:12px 20px;margin-bottom:20px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px}
        .search-box{display:flex;align-items:center;gap:8px;background:rgba(0,0,0,.3);border:1px solid rgba(255,215,0,.15);border-radius:40px;padding:8px 18px}
        .search-box input{background:0 0;border:none;color:#fff;font-family:'Cairo'}
        .btn{padding:10px 24px;border:none;border-radius:40px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Cairo';display:inline-flex;align-items:center;gap:8px}
        .btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#111}
        .btn-telegram{background:linear-gradient(135deg,#0088cc,#006699);color:#fff}
        .btn-outline{background:0 0;border:2px solid var(--gold);color:var(--gold)}
        .btn-info{background:linear-gradient(135deg,#60a5fa,#3b82f6);color:#fff}
        .btn-success{background:linear-gradient(135deg,#4ade80,#22c55e);color:#fff}
        .btn-error{background:linear-gradient(135deg,#f87171,#ef4444);color:#fff}
        .btn-warning{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff}
        .btn-danger{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff}
        .filter-bar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;background:rgba(0,0,0,.2);padding:12px 20px;border-radius:28px}
        .filter-btn{padding:8px 20px;border-radius:30px;background:rgba(0,0,0,.3);border:1px solid rgba(255,215,0,.2);color:#fff;cursor:pointer}
        .filter-btn.active{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#111}
        .table-container{background:rgba(0,0,0,.25);border-radius:24px;overflow-x:auto;margin-bottom:20px}
        .data-table{width:100%;border-collapse:collapse}
        .data-table th{text-align:right;padding:14px 16px;background:linear-gradient(135deg,rgba(255,215,0,.12),rgba(255,215,0,.06));color:var(--gold)}
        .data-table td{padding:12px 16px;border-bottom:1px solid rgba(255,215,0,.06)}
        .status-pending{background:rgba(251,191,36,.15);color:#fbbf24;padding:4px 12px;border-radius:20px;display:inline-block}
        .status-delivered{background:rgba(74,222,128,.15);color:#4ade80;padding:4px 12px;border-radius:20px;display:inline-block}
        .status-processing{background:rgba(96,165,250,.15);color:#60a5fa;padding:4px 12px;border-radius:20px;display:inline-block}
        .driver-card{background:rgba(0,0,0,.4);border:1px solid rgba(255,215,0,.2);border-radius:16px;padding:15px;margin-bottom:12px;cursor:pointer;display:flex;align-items:center;gap:15px}
        .driver-avatar i{font-size:48px;color:var(--gold)}
        .driver-info{flex:1}
        .driver-name{font-weight:bold}
        .driver-status.available{color:#4ade80}
        .driver-status.busy{color:#f59e0b}
        .charts-container{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;margin:20px 0}
        .chart-card{background:rgba(0,0,0,.3);border:1px solid rgba(255,215,0,.15);border-radius:20px;padding:15px}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.95);z-index:2000;align-items:center;justify-content:center}
        .modal.active{display:flex}
        .modal-content{background:linear-gradient(145deg,#1a1a2e,#0f0f1a);border:2px solid var(--gold);border-radius:28px;padding:25px;max-width:650px;width:90%;max-height:85vh;overflow-y:auto}
        .telegram-fetch-modal{position:fixed;top:0;left:0;width:100%;height:100%;z-index:3000;display:flex;align-items:center;justify-content:center}
        .telegram-modal-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.95)}
        .telegram-modal-content{position:relative;background:linear-gradient(145deg,#1a1a2e,#0f0f1a);border:2px solid var(--gold);border-radius:28px;padding:25px;max-width:700px;width:90%;max-height:85vh;overflow-y:auto;z-index:3001}
        .telegram-messages-list{max-height:400px;overflow-y:auto;margin-top:15px}
        .message-item{background:rgba(0,0,0,.3);border:1px solid rgba(255,215,0,.1);border-radius:16px;padding:15px;margin-bottom:10px;cursor:pointer}
        .message-item:hover{background:rgba(255,215,0,.1)}
        .message-item.selected{border-color:var(--gold);background:rgba(255,215,0,.15)}
        .fetch-progress{margin:15px 0}
        .progress-bar{background:rgba(255,255,255,.2);border-radius:10px;height:20px;overflow:hidden}
        .progress-fill{background:var(--gold);height:100%;width:0%;transition:width .3s}
        .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:40px;color:#fff;z-index:4000;animation:slideUp .3s}
        @keyframes slideUp{from{bottom:-50px;opacity:0}to{bottom:30px;opacity:1}}
        .toast.success{background:linear-gradient(135deg,#22c55e,#16a34a)}
        .toast.error{background:linear-gradient(135deg,#ef4444,#dc2626)}
        @media(max-width:768px){.data-table th,.data-table td{font-size:11px;padding:8px}}
    </style>
</head>
<body>

<nav class="top-navbar">
    <div class="nav-left"><div class="nav-logo"><i class="fas fa-truck-fast"></i><div><span class="logo-text">ناردو برو</span><small>88 دالة</small></div></div></div>
    <div class="nav-center"><div class="store-circle" onclick="location.reload()"><div class="circle-icon"><i class="fas fa-store"></i></div><div class="store-name-circle" id="currentStoreNameDisplay">تحميل...</div></div></div>
    <div class="nav-right"><button class="nav-btn nav-btn-outline" onclick="toggleTheme()"><i class="fas fa-moon"></i></button><button class="nav-btn nav-btn-telegram" onclick="openFetchOrdersModal()"><i class="fab fa-telegram"></i> جلب طلبات</button><button class="nav-btn nav-btn-gold" onclick="exportAdvancedReport()"><i class="fas fa-chart-line"></i> تقرير</button></div>
</nav>

<div class="container">
    <div class="store-card">
        <div class="stats-badges">
            <div class="stat-badge"><div class="number" id="statPendingOrders">0</div><div class="label">معلق</div></div>
            <div class="stat-badge"><div class="number" id="statCompletedOrders">0</div><div class="label">مكتمل</div></div>
            <div class="stat-badge"><div class="number" id="statTotalOrders">0</div><div class="label">إجمالي</div></div>
            <div class="stat-badge"><div class="number" id="statRevenue">0</div><div class="label">الإيرادات</div></div>
            <div class="stat-badge"><div class="number" id="statAvailableDrivers">0</div><div class="label">موزعين متاحين</div></div>
        </div>
    </div>

    <div class="charts-container">
        <div class="chart-card"><h4>الطلبات</h4><canvas id="ordersChart"></canvas></div>
        <div class="chart-card"><h4>الإيرادات</h4><canvas id="revenueChart"></canvas></div>
        <div class="chart-card"><h4>الموزعين</h4><canvas id="driversChart"></canvas></div>
    </div>

    <div class="toolbar">
        <div class="search-box"><i class="fas fa-search"></i><input type="text" id="searchOrders" placeholder="بحث..."></div>
        <div><button class="btn btn-info" onclick="exportDeliveredOrdersToExcel()"><i class="fas fa-file-excel"></i> تصدير</button><button class="btn btn-outline" onclick="printDeliveryReport()"><i class="fas fa-print"></i> طباعة</button></div>
    </div>

    <div class="filter-bar">
        <button class="filter-btn active" onclick="filterOrders('all', this)">الكل</button>
        <button class="filter-btn" onclick="filterOrders('pending', this)">معلق</button>
        <button class="filter-btn" onclick="filterOrders('processing', this)">قيد التوصيل</button>
        <button class="filter-btn" onclick="filterOrders('delivered', this)">مكتمل</button>
    </div>

    <div id="driversSection" style="margin-bottom:20px"><h3 style="color:var(--gold)"><i class="fas fa-users"></i> الموزعون</h3><div id="driversList"></div></div>

    <div class="table-container"><table class="data-table"><thead><tr><th><input type="checkbox" id="selectAll" onclick="toggleSelectAll()"></th><th>رقم الطلب</th><th>التاريخ</th><th>العميل</th><th>الهاتف/العنوان</th><th>المنتج/الإجمالي</th><th>الحالة/جهة التوصيل</th><th>إجراءات</th></tr></thead><tbody id="ordersTableBody"><tr><td colspan="8" style="text-align:center;padding:60px;">جاري التحميل...</td></tr></tbody></table></div>

    <div style="display:flex;gap:10px;justify-content:center"><button class="btn btn-success" onclick="bulkDeliverOrders()">تسليم المحدد</button><button class="btn btn-error" onclick="bulkDeleteOrders()">حذف المحدد</button></div>
</div>

<div id="deliveryModal" class="modal"><div class="modal-content"><div class="modal-header"><h3>توصيل الطلب</h3><button onclick="closeDeliveryModal()">&times;</button></div><div id="deliveryModalContent"></div></div></div>

<script>
// ========== المتغيرات العامة ==========
const TELEGRAM = { botToken: '8576673096:AAFwOd-Ut1tCyKTHwkgj_r6OFi9UZbb4pTM', channelId: '-1003822964890', apiUrl: 'https://api.telegram.org/bot' };
let orders = [], products = [], distributorsData = {};
let currentStore = { storeName: 'ناردو برو', storeFixedID: 'NARDO-123456', channelUsername: '@NardoChannel' };
let currentFilter = 'all', selectedOrders = new Set();
let drivers = [], telegramMessages = [];
let watchPositionId = null, driverCurrentLocation = null;
let ordersChart = null, revenueChart = null, driversChart = null;
let notificationPermission = false;
let coupons = [{ code: 'WELCOME10', discount: 10, used: false, expires: new Date(Date.now() + 30*86400000).toISOString() }];
let loyaltyPoints = {};

const defaultDrivers = [
    { id: 'DRV-001', name: 'محمد الأولان', status: 'available', rating: 4.8, completedOrders: 156, avgDeliveryTime: 35, phone: '0555123456', vehicle: 'دراجة', earnings: 12500, currentLocation: { lat: 36.7538, lng: 3.0588 } },
    { id: 'DRV-002', name: 'أحمد سليمان', status: 'busy', rating: 4.5, completedOrders: 98, vehicle: 'سيارة', earnings: 8900, currentLocation: { lat: 36.7372, lng: 3.0867 } },
    { id: 'DRV-003', name: 'سارة حمزة', status: 'available', rating: 4.9, completedOrders: 203, vehicle: 'دراجة', earnings: 18700, currentLocation: { lat: 36.365, lng: 6.6147 } }
];

// ========== الدوال الأساسية (1-33) ==========
function safeLocalStorageGet(key) { try { const data = localStorage.getItem(key); return data ? JSON.parse(data) : []; } catch(e) { return []; } }
function safeLocalStorageSet(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {} }
function generateStoreID(storeName) { const clean = storeName.replace(/[^a-zA-Z0-9\u0600-\u06FF]/g, '').substring(0, 10).toUpperCase() || 'NARDO'; return `${clean}-${Math.floor(Math.random()*900000+100000)}`; }
function loadCurrentStore() { const saved = localStorage.getItem('nardo_current_store'); if(saved) currentStore = JSON.parse(saved); else { currentStore.storeFixedID = generateStoreID('ناردو برو'); localStorage.setItem('nardo_current_store', JSON.stringify(currentStore)); } document.getElementById('currentStoreNameDisplay').innerText = currentStore.storeName; orders = safeLocalStorageGet('nardo_orders'); updateStats(); renderOrders(); }
function getStateCode(state) { const codes = {'الجزائر':'ALG','وهران':'ORA','قسنطينة':'CON'}; return codes[state] || state?.substring(0,3).toUpperCase() || 'ALG'; }
async function fetchDistributorsFromChannel() { distributorsData = { 'ALG':[{name:'موزع الجزائر',phone:'0555123456'}], 'ORA':[{name:'شركة وهران',phone:'0566112233'}] }; return true; }
async function getDistributorsByState(state) { return distributorsData[getStateCode(state)] || []; }
function extractOrderDataFromText(text) { return { orderNumber: 'ORD-001', customerName: 'عميل تجريبي', customerPhone: '0555000000', customerAddress: 'العنوان', total: 1000, items: [], date: new Date().toLocaleDateString('ar-EG') }; }
function showToast(msg, type) { const t = document.createElement('div'); t.className = `toast ${type}`; t.innerHTML = `<i class="fas ${type==='success'?'fa-check-circle':'fa-info-circle'}"></i> ${msg}`; document.body.appendChild(t); setTimeout(()=>t.remove(),3000); }
function updateStats() { const my = orders.filter(o=>o.storeID===currentStore.storeFixedID); document.getElementById('statPendingOrders') && (document.getElementById('statPendingOrders').innerText = my.filter(o=>o.status!=='delivered').length); document.getElementById('statCompletedOrders') && (document.getElementById('statCompletedOrders').innerText = my.filter(o=>o.status==='delivered').length); document.getElementById('statTotalOrders') && (document.getElementById('statTotalOrders').innerText = my.length); const revenue = my.filter(o=>o.status==='delivered').reduce((s,o)=>s+(o.total||0),0); document.getElementById('statRevenue') && (document.getElementById('statRevenue').innerText = revenue.toLocaleString()); updateStatsFromOrders(my); }
function filterOrders(filter, btn) { currentFilter = filter; document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active')); if(btn) btn.classList.add('active'); renderOrders(); }
function getFilteredOrders() { let f = orders.filter(o=>o.storeID===currentStore.storeFixedID); const s = document.getElementById('searchOrders')?.value.toLowerCase(); if(s) f = f.filter(o=>(o.telegramOrderId||'').includes(s)||(o.customerName||'').includes(s)); if(currentFilter === 'pending') f = f.filter(o=>o.status==='pending'); else if(currentFilter === 'processing') f = f.filter(o=>o.status==='processing'); else if(currentFilter === 'delivered') f = f.filter(o=>o.status==='delivered'); return f; }
function toggleOrderSelection(id, chk) { if(chk.checked) selectedOrders.add(id); else selectedOrders.delete(id); }
function toggleSelectAll() { const cbs = document.querySelectorAll('.order-checkbox'); cbs.forEach(cb => { cb.checked = document.getElementById('selectAll').checked; if(cb.checked) selectedOrders.add(parseInt(cb.value)); else selectedOrders.delete(parseInt(cb.value)); }); }
function bulkDeliverOrders() { if(selectedOrders.size===0) { showToast('اختر طلبات أولاً','warning'); return; } selectedOrders.forEach(id => { const o = orders.find(o=>o.id==id); if(o && o.status!=='delivered') { o.status='delivered'; o.deliveredAt=new Date().toLocaleString('ar-EG'); addLoyaltyPoints(o.customerPhone, o.total||0); sendWhatsAppNotification(o.customerPhone, o.telegramOrderId||o.id, o.deliveryCompany); } }); safeLocalStorageSet('nardo_orders',orders); renderOrders(); updateStats(); showToast(`تم تسليم ${selectedOrders.size} طلب`,'success'); selectedOrders.clear(); document.getElementById('selectAll').checked=false; }
function bulkDeleteOrders() { if(selectedOrders.size===0) { showToast('اختر طلبات أولاً','warning'); return; } if(confirm(`حذف ${selectedOrders.size} طلب؟`)) { orders = orders.filter(o=>!selectedOrders.has(o.id)); safeLocalStorageSet('nardo_orders',orders); renderOrders(); updateStats(); showToast(`تم الحذف`,'success'); selectedOrders.clear(); } }
function exportDeliveredOrdersToExcel() { const data = orders.filter(o=>o.status==='delivered').map(o=>({ 'رقم الطلب':o.telegramOrderId, 'العميل':o.customerName, 'الإجمالي':o.total })); if(!data.length){ showToast('لا توجد طلبات','warning'); return; } const ws = XLSX.utils.json_to_sheet(data); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'المكتملة'); XLSX.writeFile(wb,`orders.xlsx`); showToast('تم التصدير','success'); }
function exportPendingOrdersToExcel() { const data = orders.filter(o=>o.status!=='delivered').map(o=>({ 'رقم الطلب':o.telegramOrderId, 'العميل':o.customerName, 'الإجمالي':o.total })); if(!data.length){ showToast('لا توجد طلبات','warning'); return; } const ws = XLSX.utils.json_to_sheet(data); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'المعلقة'); XLSX.writeFile(wb,`pending.xlsx`); showToast('تم التصدير','success'); }
function printDeliveryReport() { window.print(); }
function callCustomer(phone) { if(phone && phone !== '---') window.location.href = `tel:${phone}`; else showToast('رقم غير متوفر','warning'); }
function viewOrderDetails(orderId) { const order = orders.find(o=>o.id==orderId); if(order) alert(`الطلب #${order.telegramOrderId}\nالعميل: ${order.customerName}\nالهاتف: ${order.customerPhone}\nالعنوان: ${order.customerAddress}\nالإجمالي: ${order.total} دج`); }
async function exportSingleOrderToPDF(orderId) { const order = orders.find(o=>o.id==orderId); if(!order) return; const { jsPDF } = window.jspdf; const doc = new jsPDF(); doc.text(`فاتورة #${order.telegramOrderId || order.id}`, 10, 10); doc.save(`order_${order.id}.pdf`); showToast('تم تصدير PDF','success'); }
function copyAddress(address) { if(address) { navigator.clipboard.writeText(address); showToast('تم نسخ العنوان','success'); } }
function deleteOrder(orderId) { if(confirm('حذف الطلب؟')) { orders = orders.filter(o=>o.id != orderId); safeLocalStorageSet('nardo_orders', orders); renderOrders(); updateStats(); showToast('تم الحذف','success'); } }
function openDeliveryModal(orderId) { const order = orders.find(o=>o.id==orderId); if(!order) return; document.getElementById('deliveryModalContent').innerHTML = `<div>توصيل #${order.telegramOrderId}</div><button class="btn btn-success" onclick="markOrderAsDeliveredCurrent(${order.id})">تسليم</button><button class="btn btn-outline" onclick="closeDeliveryModal()">إغلاق</button>`; document.getElementById('deliveryModal').classList.add('active'); }
function markOrderAsDeliveredCurrent(orderId) { const order = orders.find(o=>o.id==orderId); if(order) { order.status='delivered'; safeLocalStorageSet('nardo_orders',orders); renderOrders(); updateStats(); showToast('تم التسليم','success'); closeDeliveryModal(); } }
function closeDeliveryModal() { document.getElementById('deliveryModal').classList.remove('active'); }
function renderOrders() {
    const filtered = getFilteredOrders();
    const tbody = document.getElementById('ordersTableBody');
    if(!tbody) return;
    if(filtered.length === 0) { tbody.innerHTML = '<tr><td colspan="8" style="text-align:center">لا توجد طلبات</td></tr>'; return; }
    tbody.innerHTML = filtered.map(order => `<tr>
        <td><input type="checkbox" class="order-checkbox" value="${order.id}" onchange="toggleOrderSelection(${order.id}, this)"></td>
        <td><strong>#${order.telegramOrderId || order.id}</strong></td>
        <td>${order.date || ''}</td>
        <td>${order.customerName || '-'}</td>
        <td><button class="btn btn-outline btn-sm" onclick="callCustomer('${order.customerPhone}')"><i class="fas fa-phone"></i> ${order.customerPhone || '-'}</button><br><small>${order.customerAddress || '-'}</small></td>
        <td>${order.items?.map(i=>i.name).join(',') || '-'}<br><strong>${(order.total||0).toLocaleString()} دج</strong></td>
        <td><span class="${order.status==='delivered'?'status-delivered':(order.status==='processing'?'status-processing':'status-pending')}">${order.status==='delivered'?'مكتمل':(order.status==='processing'?'قيد التوصيل':'معلق')}</span><br><small>${order.deliveryCompany || '-'}</small></td>

async function loadDistributorsForModal() {
    const state = document.getElementById('stateSelect')?.value;
    const container = document.getElementById('distributorsContainer');
    if (!state || !container) return;
    
    container.innerHTML = '<div style="text-align:center;padding:20px"><i class="fas fa-spinner fa-spin"></i> جاري تحميل الموزعين...</div>';
    
    const distributors = await getDistributorsByState(state);
    
    if (distributors.length === 0) {
        container.innerHTML = '<div style="text-align:center;padding:20px;color:#f87171">⚠️ لا توجد موزعين مسجلين في هذه الولاية</div>';
        return;
    }
    
    container.innerHTML = `
        <div style="margin-bottom:10px;color:var(--gold)"><i class="fas fa-list"></i> اختر جهة التوصيل / الموزع:</div>
        ${distributors.map((d, idx) => `
            <div class="distributor-card" onclick="selectDistributorForOrder(${idx})" data-idx="${idx}" style="display:flex;align-items:center;gap:15px;padding:12px;background:rgba(0,0,0,.3);border-radius:12px;margin-bottom:8px;cursor:pointer;border:1px solid rgba(255,215,0,.2);transition:all 0.2s">
                <div style="font-size:32px">${d.type === 'delivery' ? '🚚' : '📦'}</div>

                    <div style="font-weight:bold">${d.name}</div>

                </div>
                <div><i class="fas fa-chevron-left" style="color:var(--gold)"></i></div>
            </div>
        `).join('')}
    `;
    
    window.currentDistributorsList = distributors;
}

function selectDistributorForOrder(idx) {
    // إزالة التحديد السابق من جميع البطاقات
    document.querySelectorAll('.distributor-card').forEach(card => {
        card.style.borderColor = 'rgba(255,215,0,.2)';
        card.style.background = 'rgba(0,0,0,.3)';
    });
    
    // تحديد البطاقة المختارة
    const cards = document.querySelectorAll('.distributor-card');
    if (cards[idx]) {
        cards[idx].style.borderColor = 'var(--gold)';
        cards[idx].style.background = 'rgba(255,215,0,.15)';
    }
    
    // حفظ بيانات الموزع المختار
    window.selectedDistributorData = window.currentDistributorsList[idx];
    showToast(`✅ تم اختيار: ${window.selectedDistributorData.name}`, 'success');
}

function confirmDeliveryWithSelectedDistributor(orderId) {
    // التحقق من وجود موزع مختار
    if (!window.selectedDistributorData) {
        showToast('⚠️ الرجاء اختيار موزع أولاً', 'warning');
        return;
    }
    
    // البحث عن الطلب
    const order = orders.find(o => o.id == orderId);
    if (!order) return;
    
    // تحديث بيانات الطلب
    order.status = 'delivered';
    order.deliveredAt = new Date().toLocaleString('ar-EG');
    order.deliveryCompany = window.selectedDistributorData.name;
    order.distributorId = window.selectedDistributorData.fullId || window.selectedDistributorData.phone;
    order.deliveryNotes = document.getElementById('deliveryNote')?.value || order.deliveryNotes || '';
    
    // حفظ التغييرات
    safeLocalStorageSet('nardo_orders', orders);
    renderOrders();
    updateStats();
    
    // إشعار نجاح
    showToast(`✅ تم توصيل الطلب بواسطة: ${window.selectedDistributorData.name}`, 'success');
    
    // إرسال إشعار واتساب إذا كان الرقم متوفر
    if (order.customerPhone && order.customerPhone !== '---') {
        sendWhatsAppNotification(order.customerPhone, order.telegramOrderId || order.id, order.deliveryCompany);
    }
    
    // تنظيف المتغيرات وإغلاق النافذة
    window.selectedDistributorData = null;
    window.currentDistributorsList = null;
    closeDeliveryModal();
}
function closeTelegramModal() { const modal = document.getElementById('telegramFetchModal'); if(modal) modal.remove(); }
async function fetchLatestMessages() { showToast('جاري جلب الرسائل...','info'); telegramMessages = []; const container = document.getElementById('telegramMessagesList'); container.innerHTML = '<div style="text-align:center;padding:40px"><i class="fas fa-spinner fa-spin fa-2x"></i><p>جاري التحميل...</p></div>'; try { const res = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getUpdates?limit=50`); const data = await res.json(); if(data.ok && data.result) { for(const update of data.result) { const msg = update.channel_post || update.message; if(msg && msg.text && msg.chat?.id?.toString() === TELEGRAM.channelId) { telegramMessages.push({ id: update.update_id, text: msg.text, date: new Date(msg.date*1000).toLocaleString('ar-EG') }); } } renderTelegramMessagesList(); showToast(`تم جلب ${telegramMessages.length} رسالة`,'success'); } else { container.innerHTML = '<div style="text-align:center;padding:40px;color:red">حدث خطأ في جلب الرسائل</div>'; } } catch(e) { container.innerHTML = '<div style="text-align:center;padding:40px;color:red">خطأ في الاتصال</div>'; showToast('خطأ في الاتصال','error'); } }

function filterTelegramMessages() { const search = document.getElementById('filterTelegramMessages')?.value.toLowerCase(); if(!search) { renderTelegramMessagesList(); return; } const filtered = telegramMessages.filter(m => m.text.toLowerCase().includes(search)); const container = document.getElementById('telegramMessagesList'); if(filtered.length === 0) { container.innerHTML = '<div style="text-align:center;padding:40px">لا توجد نتائج</div>'; return; } container.innerHTML = filtered.map(msg => `<div class="message-item" onclick="toggleSelectTelegramMessage(${msg.id}, this)"><div>🆔 ${msg.id}</div><div>${msg.text.substring(0,200)}</div></div>`).join(''); }

function calculateDistance(lat1,lng1,lat2,lng2) { const R=6371; const dLat=(lat2-lat1)*Math.PI/180; const dLng=(lng2-lng1)*Math.PI/180; const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2; return (R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))).toFixed(1); }
