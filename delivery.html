    <style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#ffd700;--gold-dark:#daa520;--success:#4ade80;--error:#f87171;--warning:#fbbf24;--info:#60a5fa;--telegram:#0088cc}
body{font-family:'Cairo',sans-serif;background:linear-gradient(135deg,#0a0a1a,#15152a);color:#fff;min-height:100vh}
.container{max-width:1400px;margin:0 auto;padding:20px}
.top-navbar{background:linear-gradient(135deg,rgba(10,10,26,.95),rgba(26,26,46,.95));backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,215,0,.25);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;position:sticky;top:0;z-index:1000}
.nav-left{flex:1;display:flex;justify-content:flex-start}
.nav-logo{display:flex;align-items:center;gap:10px}
.nav-logo i{font-size:28px;color:var(--gold)}
.nav-logo .logo-text{font-size:18px;font-weight:800;background:linear-gradient(135deg,#ffd700,#ffed4e);-webkit-background-clip:text;background-clip:text;color:transparent}
.nav-center{flex:1;display:flex;justify-content:center}
.store-circle{display:flex;flex-direction:column;align-items:center;cursor:pointer;transition:.3s}
.circle-icon{width:55px;height:55px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 15px rgba(255,215,0,.4)}
.circle-icon i{font-size:28px;color:#111}
.store-circle:hover .circle-icon{transform:scale(1.1)}
.store-name-circle{font-size:11px;font-weight:700;margin-top:6px;color:var(--gold);background:rgba(255,215,0,.15);padding:3px 10px;border-radius:20px}
.nav-right{flex:1;display:flex;justify-content:flex-end;gap:10px}
.nav-btn{padding:8px 18px;border-radius:40px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:'Cairo';display:flex;align-items:center;gap:6px;transition:.2s}
.nav-btn-telegram{background:linear-gradient(135deg,#0088cc,#006699);color:#fff}
.nav-btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#111}
.nav-btn-delivery{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff}
.nav-btn-outline{background:0 0;border:1px solid rgba(255,215,0,.4);color:var(--gold)}
.nav-btn-outline:hover{background:rgba(255,215,0,.1)}
.store-card{background:linear-gradient(135deg,rgba(255,215,0,.08),rgba(0,0,0,.3));border:1px solid rgba(255,215,0,.15);border-radius:28px;padding:16px 24px;margin:20px 0;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px}
.store-info{display:flex;gap:24px;flex-wrap:wrap}
.store-item{display:flex;align-items:center;gap:8px;font-size:13px}
.store-item i{color:var(--gold)}
.store-item strong{color:var(--gold)}
.stats-badges{display:flex;gap:12px}
.stat-badge{background:rgba(0,0,0,.4);padding:6px 14px;border-radius:24px;text-align:center;border:1px solid rgba(255,215,0,.15)}
.stat-badge .number{font-size:24px;font-weight:800;background:linear-gradient(135deg,#ffd700,#ffb347);-webkit-background-clip:text;background-clip:text;color:transparent}
.stat-badge .label{font-size:10px;color:#999}
.toolbar{background:linear-gradient(135deg,rgba(255,215,0,.05),rgba(0,0,0,.2));border-radius:28px;padding:12px 20px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.search-box{display:flex;align-items:center;gap:8px;background:rgba(0,0,0,.3);border:1px solid rgba(255,215,0,.15);border-radius:40px;padding:8px 18px;flex:1;max-width:300px}

.search-box input{background:0 0;border:none;color:#fff;font-family:'Cairo';font-size:13px;width:100%}

.btn{padding:10px 24px;border:none;border-radius:40px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Cairo';display:inline-flex;align-items:center;gap:8px;transition:.2s}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#111}
.btn-telegram{background:linear-gradient(135deg,#0088cc,#006699);color:#fff}
.btn-outline{background:0 0;border:2px solid var(--gold);color:var(--gold)}

.status-pending{background:rgba(251,191,36,.15);color:#fbbf24;padding:4px 12px;border-radius:20px;font-size:12px;display:inline-block}
.status-delivered{background:rgba(74,222,128,.15);color:#4ade80;padding:4px 12px;border-radius:20px;font-size:12px;display:inline-block}
.status-processing{background:rgba(96,165,250,.15);color:#60a5fa;padding:4px 12px;border-radius:20px;font-size:12px;display:inline-block}
.delivery-card{background:linear-gradient(135deg,rgba(255,215,0,.05),rgba(0,0,0,.2));border-radius:20px;padding:15px;margin-bottom:15px;border:1px solid rgba(255,215,0,.1)}
.delivery-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid rgba(255,215,0,.1)}

.delivery-item{background:rgba(0,0,0,.2);border-radius:12px;padding:8px 12px}
.delivery-label{font-size:11px;color:#888}
.delivery-value{font-weight:600}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.95);z-index:2000;align-items:center;justify-content:center}
.modal.active{display:flex}
.modal-content{background:linear-gradient(145deg,#1a1a2e,#0f0f1a);border:2px solid var(--gold);border-radius:28px;padding:25px;max-width:550px;width:90%;max-height:85vh;overflow-y:auto}
.modal-header{display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid var(--gold);padding-bottom:15px;margin-bottom:20px}
.modal-header h3{color:var(--gold);font-size:20px}
.modal-close{background:rgba(255,255,255,.1);border:none;color:var(--gold);font-size:24px;cursor:pointer;width:35px;height:35px;border-radius:50%}
.form-group{margin-bottom:15px}
.form-group label{display:block;margin-bottom:5px;color:var(--gold);font-weight:600;font-size:12px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px;background:rgba(0,0,0,.4);border:1px solid rgba(255,215,0,.2);border-radius:12px;color:#fff;font-family:'Cairo'}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:40px;color:#fff;font-weight:700;z-index:3000;display:flex;align-items:center;gap:10px;animation:slideUp .3s}
@keyframes slideUp{from{bottom:-50px;opacity:0}to{bottom:30px;opacity:1}}
.toast.success{background:linear-gradient(135deg,#22c55e,#16a34a)}
.toast.error{background:linear-gradient(135deg,#ef4444,#dc2626)}
.toast.info{background:linear-gradient(135deg,#3b82f6,#2563eb)}
.toast.warning{background:linear-gradient(135deg,#f59e0b,#d97706)}
.loading-spinner{width:20px;height:20px;border:3px solid rgba(255,255,255,.3);border-radius:50%;border-top-color:#fff;animation:spin 1s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:768px){.top-navbar{padding:10px}.filter-bar{overflow-x:auto;flex-wrap:nowrap}.data-table th,.data-table td{font-size:11px;padding:8px}}
    </style>
</head>

<script>
// ========== إعدادات التليجرام ==========
const TELEGRAM = {
    botToken: '8576673096:AAFwOd-Ut1tCyKTHwkgj_r6OFi9UZbb4pTM',
    channelId: '-1003822964890',
    apiUrl: 'https://api.telegram.org/bot'
};

// ========== المتغيرات العامة ==========
let orders = [];
let products = [];
let currentStore = {
    storeName: 'ناردو برو',
    storeFixedID: '',
    channelUsername: '@NardoChannel'
};
let currentFilter = 'all';
let currentDeliveryOrderId = null;
let selectedOrders = new Set();

// ========== دوال التخزين المحلي ==========
function safeLocalStorageGet(key) {
    try {
        const data = localStorage.getItem(key);
        return data ? JSON.parse(data) : [];
    } catch(e) {
        return [];
    }
}

function safeLocalStorageSet(key, val) {
    try {
        localStorage.setItem(key, JSON.stringify(val));
    } catch(e) {
        console.error('Storage Error', e);
    }
}

function generateStoreID(storeName) {
    let clean = storeName.replace(/[^a-zA-Z0-9\u0600-\u06FF]/g, '').substring(0, 10).toUpperCase();
    if (!clean) clean = 'NARDO';
    const randomNumbers = Math.floor(Math.random() * 900000 + 100000);
    return `${clean}-${randomNumbers}`;
}

function loadCurrentStore() {
    const savedStore = localStorage.getItem('nardo_current_store');
    if (savedStore) {
        currentStore = JSON.parse(savedStore);
        if (!currentStore.storeFixedID || !currentStore.storeFixedID.match(/-\d{6}$/)) {
            currentStore.storeFixedID = generateStoreID(currentStore.storeName);
            localStorage.setItem('nardo_current_store', JSON.stringify(currentStore));
        }
    } else {
        const newStoreID = generateStoreID(currentStore.storeName);
        currentStore = {
            storeName: 'ناردو برو',
            storeFixedID: newStoreID,
            channelUsername: '@NardoChannel',
            phone: '',
            address: ''
        };
        localStorage.setItem('nardo_current_store', JSON.stringify(currentStore));
    }
    if (document.getElementById('currentStoreNameDisplay')) {
        document.getElementById('currentStoreNameDisplay').innerText = currentStore.storeName;
    }
    if (document.getElementById('storeIDDisplay')) {
        document.getElementById('storeIDDisplay').innerText = currentStore.storeFixedID;
    }
    if (document.getElementById('storeChannelDisplay')) {
        document.getElementById('storeChannelDisplay').innerText = currentStore.channelUsername;
    }
    orders = safeLocalStorageGet('nardo_orders');
    products = safeLocalStorageGet('nardo_products');
    updateStats();
    renderOrders();
}

// ========== استخراج البيانات من نص الرسالة ==========
function extractOrderDataFromText(text) {
    try {
        const result = {
            items: [],
            storeID: '',
            customerName: '',
            customerPhone: '',
            customerAddress: '',
            total: 0,
            notes: '',
            orderNumber: '',
            date: '',
            deliveryCompany: '',
            distributorId: ''
        };
        let orderMatch = text.match(/رقم الطلب الموحد:\s*([^\n]+)/);
        if (orderMatch) result.orderNumber = orderMatch[1].trim();
        let storeMatch = text.match(/معرف المتجر:\s*`?([^\n`]+)`?/);
        if (storeMatch) result.storeID = storeMatch[1].trim();
        let customerMatch = text.match(/الزبون:\s*([^\n]+)/);
        if (customerMatch) result.customerName = customerMatch[1].trim().replace(/[*_]/g, '');
        let phoneMatch = text.match(/رقم الجوال:\s*([^\n]+)/);
        if (phoneMatch) result.customerPhone = phoneMatch[1].trim().replace(/[*_]/g, '');
        let addressMatch = text.match(/العنوان الكامل:\s*([^\n]+)/);
        if (addressMatch) result.customerAddress = addressMatch[1].trim().replace(/[*_]/g, '');
        let deliveryMatch = text.match(/جهة التوصيل:\s*([^\n]+)/);
        if (deliveryMatch) result.deliveryCompany = deliveryMatch[1].trim();
        let distributorMatch = text.match(/هاتف الموزع:\s*([^\n]+)/);
        if (distributorMatch) result.distributorId = distributorMatch[1].trim();
        let dateMatch = text.match(/التاريخ:\s*([^\n]+)/);
        if (dateMatch) result.date = dateMatch[1].trim();
        let totalMatch = text.match(/إجمالي الطلب:\s*([\d,]+)/);
        if (totalMatch) result.total = parseInt(totalMatch[1].replace(/,/g, ''));
        let notesMatch = text.match(/ملاحظات:\s*([^\n]+)/);
        if (notesMatch) result.notes = notesMatch[1].trim();
        const productRegex = /(\d+)️⃣\s*📦\s*المنتج:\s*([^\n]+)\s*🆔\s*معرف المنتج:\s*([^\n]+)\s*📦\s*الكمية:\s*(\d+)\s*💰\s*السعر:\s*([\d,]+)/g;
        let match;
        while ((match = productRegex.exec(text)) !== null) {
            result.items.push({
                productID: match[3].trim(),
                name: match[2].trim(),
                quantity: parseInt(match[4]),
                price: parseInt(match[5].replace(/,/g, ''))
            });
        }
        if (result.items.length === 0) {
            const simpleMatch = text.match(/المنتج:\s*([^\n]+).*?الكمية:\s*(\d+).*?السعر:\s*([\d,]+)/);
            if (simpleMatch) {
                result.items.push({
                    productID: '',
                    name: simpleMatch[1].trim(),
                    quantity: parseInt(simpleMatch[2]),
                    price: parseInt(simpleMatch[3].replace(/,/g, ''))
                });
            }
        }
        return result;
    } catch(e) {
        console.error("خطأ في تحليل نص الرسالة:", e);
        return null;
    }
}

// ========== جلب الطلبات من التليجرام ==========
async function fetchOrdersFromTelegram() {
    const btn = document.getElementById('fetchOrdersBtn');
    const originalText = btn?.innerHTML;
    if (btn) {
        btn.innerHTML = '<span class="loading-spinner"></span> جاري الجلب...';
        btn.disabled = true;
    }
    try {
        showToast('📡 جاري جلب الطلبات من التلغرام...', 'info');
        const response = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getUpdates?limit=100`);
        const data = await response.json();
        if (!data.ok) throw new Error('فشل الاتصال بـ Telegram API');
        let newOrdersCount = 0;
        let processedIds = safeLocalStorageGet('nardo_processed_telegram_ids');
        if (!Array.isArray(orders)) orders = [];
        for (const update of data.result || []) {
            const post = update.channel_post || update.message;
            if (!post || !post.text) continue;
            const uniqueId = post.message_id;
            if (processedIds.includes(uniqueId)) continue;
            const text = post.text;
            if (!text.includes(currentStore.storeFixedID)) continue;
            const orderData = extractOrderDataFromText(text);
            if (!orderData || !orderData.items || orderData.items.length === 0) continue;
            const existingOrder = orders.find(o => o.telegramOrderId === orderData.orderNumber);
            if (existingOrder) {
                processedIds.push(uniqueId);
                continue;
            }
            const orderItems = [];
            let orderTotal = 0;
            for (const item of orderData.items) {
                const product = products.find(p => p.productCompositeID === item.productID);
                if (product && product.storeID === currentStore.storeFixedID) {
                    orderItems.push({
                        id: product.id,
                        productCompositeID: product.productCompositeID,
                        name: product.name,
                        price: product.price,
                        quantity: item.quantity
                    });
                    orderTotal += (product.price * item.quantity);
                    const oldQty = product.quantity;
                    product.quantity = Math.max(0, product.quantity - item.quantity);
                    let stockLog = safeLocalStorageGet('nardo_stock_log');
                    stockLog.unshift({
                        id: Date.now(),
                        productId: product.id,
                        productName: product.name,
                        operation: 'remove',
                        quantity: item.quantity,
                        oldQty: oldQty,
                        newQty: product.quantity,
                        reason: `طلب تلغرام #${orderData.orderNumber}`,
                        storeID: product.storeID,
                        date: new Date().toLocaleString('ar-EG')
                    });
                    safeLocalStorageSet('nardo_stock_log', stockLog);
                }
            }
            if (orderItems.length === 0) {
                processedIds.push(uniqueId);
                continue;
            }
            const newOrder = {
                id: Date.now() + Math.random(),
                telegramOrderId: orderData.orderNumber,
                telegramMessageId: uniqueId,
                date: orderData.date || new Date().toLocaleString('ar-EG'),
                customerName: orderData.customerName,
                customerPhone: orderData.customerPhone,
                customerAddress: orderData.customerAddress,
                customerNotes: orderData.notes || '',
                storeID: currentStore.storeFixedID,
                storeName: currentStore.storeName,
                items: orderItems,
                total: orderData.total || orderTotal,
                status: 'pending',
                source: 'telegram',
                deliveryCompany: orderData.deliveryCompany || '',
                distributorId: orderData.distributorId || '',
                deliveryNotes: ''
            };
            orders.unshift(newOrder);
            processedIds.push(uniqueId);
            newOrdersCount++;
        }
        safeLocalStorageSet('nardo_orders', orders);
        safeLocalStorageSet('nardo_products', products);
        safeLocalStorageSet('nardo_processed_telegram_ids', processedIds);
        renderOrders();
        updateStats();
        if (newOrdersCount > 0) {
            showToast(`✅ تم جلب ${newOrdersCount} طلب جديد`, 'success');
            playNotificationSound();
        } else {
            showToast('📭 لا توجد طلبات جديدة حالياً', 'info');
        }
    } catch (error) {
        console.error('خطأ في جلب الطلبات:', error);
        showToast('❌ فشل جلب الطلبات: ' + error.message, 'error');
    } finally {
        if (btn) {
            btn.innerHTML = originalText;
            btn.disabled = false;
        }
    }
}

// ========== دوال إدارة الطلبات الأساسية ==========
function deliverOrder(orderId) {
    const order = orders.find(o => o.id == orderId);
    if (order) {
        order.status = order.status === 'delivered' ? 'pending' : 'delivered';
        if (order.status === 'delivered') {
            order.deliveredAt = new Date().toLocaleString('ar-EG');
            showToast(`✅ تم تسليم الطلب #${order.telegramOrderId || order.id}`, 'success');
        } else {
            showToast(`🔄 تم إعادة الطلب #${order.telegramOrderId || order.id} إلى قيد المعالجة`, 'info');
        }
        safeLocalStorageSet('nardo_orders', orders);
        renderOrders();
        updateStats();
    }
}

function deleteOrder(orderId) {
    if (confirm('هل أنت متأكد من حذف هذا الطلب؟')) {
        const order = orders.find(o => o.id == orderId);
        orders = orders.filter(o => o.id != orderId);
        safeLocalStorageSet('nardo_orders', orders);
        renderOrders();
        updateStats();
        showToast(`🗑️ تم حذف الطلب #${order?.telegramOrderId || orderId}`, 'success');
    }
}

function updateOrderStatus(orderId, newStatus) {
    const order = orders.find(o => o.id == orderId);
    if (order) {
        order.status = newStatus;
        if (newStatus === 'delivered') {
            order.deliveredAt = new Date().toLocaleString('ar-EG');
        }
        safeLocalStorageSet('nardo_orders', orders);
        renderOrders();
        updateStats();
        showToast(`✅ تم تحديث حالة الطلب إلى: ${getStatusText(newStatus)}`, 'success');
    }
}

function getStatusText(status) {
    switch(status) {
        case 'pending': return 'قيد المعالجة';
        case 'processing': return 'قيد التوصيل';
        case 'delivered': return 'تم التوصيل';
        default: return status;
    }
}

function callCustomer(phone) {
    if (phone && phone !== '---' && phone !== '') {

    const selectAllCheckbox = document.getElementById('selectAll');
    const checkboxes = document.querySelectorAll('.order-checkbox');
    checkboxes.forEach(cb => {
        cb.checked = selectAllCheckbox.checked;
        if (cb.checked) {
            selectedOrders.add(parseInt(cb.value));
        } else {
            selectedOrders.delete(parseInt(cb.value));
        }
    });

        selectedOrders.add(orderId);
    } else {
        selectedOrders.delete(orderId);
        const selectAll = document.getElementById('selectAll');
        if (selectAll) selectAll.checked = false;
    }
}

function bulkDeliverOrders() {
    if (selectedOrders.size === 0) {
        showToast('الرجاء تحديد الطلبات أولاً', 'warning');
        return;
    }
    if (confirm(`تأكيد تسليم ${selectedOrders.size} طلب؟`)) {
        selectedOrders.forEach(orderId => {
            const order = orders.find(o => o.id == orderId);
            if (order && order.status !== 'delivered') {
                order.status = 'delivered';
                order.deliveredAt = new Date().toLocaleString('ar-EG');
            }
        });
        safeLocalStorageSet('nardo_orders', orders);
        renderOrders();
        updateStats();
        showToast(`✅ تم تسليم ${selectedOrders.size} طلب`, 'success');
        selectedOrders.clear();
        const selectAll = document.getElementById('selectAll');
        if (selectAll) selectAll.checked = false;
    }
}

function bulkDeleteOrders() {
    if (selectedOrders.size === 0) {
        showToast('الرجاء تحديد الطلبات أولاً', 'warning');
        return;
    }
    if (confirm(`⚠️ تحذير: سيتم حذف ${selectedOrders.size} طلب بشكل دائم. هل أنت متأكد؟`)) {
        orders = orders.filter(o => !selectedOrders.has(o.id));
        safeLocalStorageSet('nardo_orders', orders);
        renderOrders();
        updateStats();
        showToast(`🗑️ تم حذف ${selectedOrders.size} طلب`, 'success');
        selectedOrders.clear();
        const selectAll = document.getElementById('selectAll');
        if (selectAll) selectAll.checked = false;
    }
}

async function bulkExportOrdersToPDF() {
    if (selectedOrders.size === 0) {
        showToast('الرجاء تحديد الطلبات أولاً', 'warning');
        return;
    }
    showToast(`📄 جاري تحضير ${selectedOrders.size} فاتورة PDF...`, 'info');
    const selectedOrdersList = orders.filter(o => selectedOrders.has(o.id));
    for (let i = 0; i < selectedOrdersList.length; i++) {
        await exportSingleOrderToPDF(selectedOrdersList[i]);
    }
    showToast(`✅ تم تصدير ${selectedOrdersList.length} فاتورة PDF`, 'success');
}

async function exportSingleOrderToPDF(order) {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'p', unit: 'mm', format: 'a4' });
    const tempDiv = document.createElement('div');
    tempDiv.style.position = 'absolute';
    tempDiv.style.left = '-9999px';
    tempDiv.style.width = '800px';
    tempDiv.style.background = '#ffffff';
    tempDiv.style.color = '#000000';
    tempDiv.style.padding = '40px';
    tempDiv.style.fontFamily = 'Cairo, sans-serif';
    tempDiv.style.direction = 'rtl';
    tempDiv.innerHTML = `
        <div style="text-align:center; margin-bottom:20px; border-bottom:2px solid #daa520; padding-bottom:10px;">
            <h1 style="margin:0; color:#daa520;">🧾 فاتورة توصيل #${order.telegramOrderId || order.id}</h1>
            <p style="margin:5px 0;">🏪 متجر: ${order.storeName}</p>
        </div>
        <div style="margin-bottom:20px;">
            <p><strong>📅 التاريخ:</strong> ${order.date}</p>
            <p><strong>👤 العميل:</strong> ${order.customerName || 'غير معروف'}</p>
            <p><strong>📞 الهاتف:</strong> ${order.customerPhone || '---'}</p>
            <p><strong>📍 العنوان:</strong> ${order.customerAddress || '---'}</p>
            <p><strong>🚚 جهة التوصيل:</strong> ${order.deliveryCompany || 'غير محدد'}</p>
        </div>
        <table style="width:100%; border-collapse:collapse; margin-bottom:20px;">
            <thead><tr style="background:#f0f0f0;"><th style="border:1px solid #000; padding:10px; text-align:right;">المنتج</th><th style="border:1px solid #000; padding:10px; text-align:center;">الكمية</th><th style="border:1px solid #000; padding:10px; text-align:center;">السعر</th><th style="border:1px solid #000; padding:10px; text-align:center;">الإجمالي</th></tr></thead>
            <tbody>${order.items.map(it => `<tr><td style="border:1px solid #000; padding:10px;">${it.name}</td><td style="border:1px solid #000; padding:10px; text-align:center;">${it.quantity}</td><td style="border:1px solid #000; padding:10px; text-align:center;">${it.price.toLocaleString()} دج</td><td style="border:1px solid #000; padding:10px; text-align:center;">${(it.price * it.quantity).toLocaleString()} دج</td></tr>`).join('')}</tbody>
            <tfoot><tr style="font-weight:bold; background:#f0f0f0;"><td colspan="3" style="border:1px solid #000; padding:10px; text-align:left;">الإجمالي الكلي</td><td style="border:1px solid #000; padding:10px; text-align:center;">${order.total.toLocaleString()} دج</td></tr></tfoot>
        </table>
        <div style="text-align:center; margin-top:40px; font-size:12px; color:#888;">تم التوصيل بواسطة: ${order.deliveryCompany || 'مندوب المتجر'}</div>
    `;
    document.body.appendChild(tempDiv);
    try {
        const canvas = await html2canvas(tempDiv, { scale: 2, backgroundColor: '#ffffff', logging: false });
        const imgData = canvas.toDataURL('image/png');
        const imgProps = doc.getImageProperties(imgData);
        const pdfWidth = doc.internal.pageSize.getWidth();
        const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;
        doc.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
        doc.save(`Delivery_${order.telegramOrderId || order.id}.pdf`);
    } catch(error) {
        console.error('PDF Error:', error);
    } finally {
        document.body.removeChild(tempDiv);
    }
}

// ========== الإشعارات ==========
function playNotificationSound() {
    try {
        const audio = new Audio('https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3');
        audio.play().catch(e => console.log('Sound play failed'));
    } catch(e) {}

// ========== الفلترة والعرض ==========
function filterOrders(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');
    renderOrders();
}

function getFilteredOrders() {
    let filtered = orders.filter(o => o.storeID === currentStore.storeFixedID);
    const searchTerm = document.getElementById('searchOrders')?.value.toLowerCase() || '';
    if (searchTerm) {
        filtered = filtered.filter(o => 
            (o.telegramOrderId && o.telegramOrderId.toLowerCase().includes(searchTerm)) ||
            (o.customerName && o.customerName.toLowerCase().includes(searchTerm)) ||
            (o.customerPhone && o.customerPhone.includes(searchTerm))
        );
    }
    switch(currentFilter) {
        case 'pending':
            filtered = filtered.filter(o => o.status === 'pending');
            break;
        case 'processing':
            filtered = filtered.filter(o => o.status === 'processing');
            break;
        case 'delivered':
            filtered = filtered.filter(o => o.status === 'delivered');
            break;
        case 'today':
            const today = new Date().toLocaleDateString('ar-EG');
            filtered = filtered.filter(o => o.date?.includes(today));
            break;
        case 'week':
            const weekAgo = new Date();
            weekAgo.setDate(weekAgo.getDate() - 7);
            filtered = filtered.filter(o => new Date(o.date) >= weekAgo);
            break;
        default: break;
    }
    return filtered;
}

function renderOrders() {
    const filteredOrders = getFilteredOrders();
    const tbody = document.getElementById('ordersTableBody');
    if (!tbody) return;
    if (filteredOrders.length === 0) {
        tbody.innerHTML = `<tr><td colspan="12" style="text-align:center; padding:60px;"><i class="fas fa-truck fa-3x" style="color:var(--gold); margin-bottom:10px; display:block;"></i>لا توجد طلبات</td></tr>`;
    } else {
        tbody.innerHTML = filteredOrders.map(order => {
            const productsHtml = order.items.map(it => `<div style="margin-bottom:3px;">${it.name} (${it.quantity})</div>`).join('');
            const statusClass = order.status === 'delivered' ? 'status-delivered' : (order.status === 'processing' ? 'status-processing' : 'status-pending');
            const statusText = order.status === 'delivered' ? '✅ تم التوصيل' : (order.status === 'processing' ? '⚙️ قيد التوصيل' : '🔄 قيد المعالجة');
            return `
                <tr style="${order.status === 'delivered' ? 'opacity:0.7;' : ''}">
                    <td><input type="checkbox" class="order-checkbox" value="${order.id}" onchange="toggleOrderSelection(${order.id}, this)"></td>
                    <td><strong>#${order.telegramOrderId || order.id}</strong></td>
                    <td style="font-size:11px;">${order.date || ''}</td>
                    <td>${order.customerName || 'غير معروف'}</td>
                    <td><button class="btn btn-outline btn-sm" onclick="callCustomer('${order.customerPhone || ''}')"><i class="fas fa-phone"></i> ${order.customerPhone || 'اتصل'}</button></td>
                    <td style="max-width:180px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;" title="${order.customerAddress || ''}">${order.customerAddress || '---'}</td>
                    <td style="max-width:150px;">${productsHtml}</td>
                    <td style="color:var(--success); font-weight:bold;">${order.total.toLocaleString()} دج</td>
                    <td><span class="${statusClass}">${statusText}</span></td>
                    <td>${order.deliveryCompany || '---'}</td>
                    <td style="max-width:100px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;" title="${order.customerNotes || ''}">${order.customerNotes ? (order.customerNotes.length > 30 ? order.customerNotes.substring(0,30)+'...' : order.customerNotes) : '---'}</td>
                    <td><div style="display:flex; gap:5px; flex-wrap:wrap;">
                        <button class="btn btn-success btn-sm" onclick="openDeliveryModal(${order.id})" title="تفاصيل التوصيل"><i class="fas fa-eye"></i></button>
                        <button class="btn btn-info btn-sm" onclick="openEditDeliveryModal(${order.id})" title="تعديل"><i class="fas fa-edit"></i></button>
                        <button class="btn btn-gold btn-sm" onclick="copyAddress('${order.customerAddress?.replace(/'/g, "\\'") || ''}')" title="نسخ العنوان"><i class="fas fa-copy"></i></button>
                        <button class="btn btn-delivery btn-sm" onclick="sendToDelivery(${order.id})" title="توصيل الطلب" style="background:linear-gradient(135deg,#22c55e,#16a34a);"><i class="fas fa-truck"></i></button>
                        <button class="btn btn-error btn-sm" onclick="deleteOrder(${order.id})" title="حذف"><i class="fas fa-trash"></i></button>
                    </div></td>
                </tr>
            `;
        }).join('');
    }
    updateStats();
}

function updateStats() {
    const myOrders = orders.filter(o => o.storeID === currentStore.storeFixedID);
    const pending = myOrders.filter(o => o.status !== 'delivered').length;
    const delivered = myOrders.filter(o => o.status === 'delivered').length;
    document.getElementById('statPending').innerText = pending;
    document.getElementById('statDelivered').innerText = delivered;
    document.getElementById('statTotal').innerText = myOrders.length;
}

function showToast(msg, type) {
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    const icon = type === 'success' ? 'fa-check-circle' : (type === 'error' ? 'fa-exclamation-circle' : (type === 'warning' ? 'fa-exclamation-triangle' : 'fa-info-circle'));
    t.innerHTML = `<i class="fas ${icon}"></i> ${msg}`;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
}

// ========== تشغيل التطبيق ==========
document.getElementById('searchOrders')?.addEventListener('input', () => renderOrders());

document.addEventListener('DOMContentLoaded', () => {
    loadCurrentStore();
    setTimeout(fetchOrdersFromTelegram, 1000);
    setInterval(() => {
        fetchOrdersFromTelegram();
        renderOrders();
    }, 30000);
});
</script>
