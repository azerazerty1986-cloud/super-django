<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ناردو برو | التوصيل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Cairo',sans-serif;background:linear-gradient(135deg,#0a0a1a,#15152a);color:#fff}
        .container{max-width:1400px;margin:0 auto;padding:20px}
        .navbar{background:rgba(10,10,26,.95);backdrop-filter:blur(20px);padding:15px 25px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,215,0,.2)}
        .logo{display:flex;align-items:center;gap:10px}
        .logo i{font-size:28px;color:#ffd700}
        .logo span{font-size:20px;font-weight:800;background:linear-gradient(135deg,#ffd700,#ffed4e);-webkit-background-clip:text;background-clip:text;color:transparent}
        .stats{display:flex;gap:20px;margin:20px 0}
        .stat-card{background:rgba(255,215,0,.1);border-radius:25px;padding:20px 35px;text-align:center}
        .stat-card .num{font-size:36px;font-weight:800;color:#ffd700}
        .btn{padding:10px 22px;border:none;border-radius:40px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:8px}
        .btn-telegram{background:#0088cc;color:#fff}
        .btn-success{background:#22c55e;color:#fff}
        .btn-outline{background:0 0;border:2px solid #ffd700;color:#ffd700}
        .table-container{background:rgba(0,0,0,.25);border-radius:20px;overflow-x:auto;margin-top:20px}
        table{width:100%;border-collapse:collapse}
        th,td{padding:14px;text-align:right;border-bottom:1px solid rgba(255,215,0,.1)}
        th{color:#ffd700}
        .status-pending{background:rgba(251,191,36,.15);color:#fbbf24;padding:5px 12px;border-radius:20px}
        .status-delivered{background:rgba(74,222,128,.15);color:#4ade80;padding:5px 12px;border-radius:20px}
        .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);padding:12px 25px;border-radius:50px;z-index:3000;animation:slideUp .3s}
        @keyframes slideUp{from{bottom:-50px}to{bottom:30px}}
        .toast.success{background:#22c55e}
        .toast.error{background:#ef4444}
    </style>
</head>
<body>

<nav class="navbar">
    <div class="logo"><i class="fas fa-truck"></i><span>ناردو برو - التوصيل</span></div>
    <button class="btn btn-outline" onclick="window.location.href='inventory-cart-complete.html'"><i class="fas fa-arrow-right"></i> العودة للمخزون</button>
</nav>

<div class="container">
    <div class="stats">
        <div class="stat-card"><div class="num" id="pendingCount">0</div><div>طلبات معلقة</div></div>
        <div class="stat-card"><div class="num" id="totalCount">0</div><div>إجمالي الطلبات</div></div>
    </div>

    <button class="btn btn-telegram" onclick="fetchOrders()"><i class="fas fa-download"></i> جلب طلبات جديدة</button>

    <div class="table-container">
        <table><thead><tr><th>رقم الطلب</th><th>التاريخ</th><th>العميل</th><th>الهاتف</th><th>العنوان</th><th>المنتجات</th><th>الإجمالي</th><th>الحالة</th><th>جهة التوصيل</th><th>إجراءات</th></tr></thead>
        <tbody id="ordersTable"></tbody>
    </table>
</div>

<script>
    let orders=[],currentStore={storeFixedID:''};
    
    // دوال التخزين
    function saveOrders(){localStorage.setItem('nardo_orders',JSON.stringify(orders));}
    function loadData(){let s=localStorage.getItem('nardo_store');if(s)currentStore=JSON.parse(s);else{currentStore.storeFixedID='NARDO-'+Math.floor(Math.random()*900000+100000);localStorage.setItem('nardo_store',JSON.stringify(currentStore));}orders=JSON.parse(localStorage.getItem('nardo_orders')||'[]');renderOrders();}
    
    // دالة تحليل نص الطلب من التليجرام (خاصة بالتوصيل)
    function extractOrderDataFromText(t){
        let r={items:[],customer:'',phone:'',address:'',orderNum:'',date:'',delivery:'',notes:'',total:0};
        let o=t.match(/رقم الطلب الموحد:\s*([^\n]+)/);if(o)r.orderNum=o[1].trim();
        let c=t.match(/الزبون:\s*([^\n]+)/);if(c)r.customer=c[1].replace(/[*_]/g,'');
        let p=t.match(/رقم الجوال:\s*([^\n]+)/);if(p)r.phone=p[1].replace(/[*_]/g,'');
        let a=t.match(/العنوان الكامل:\s*([^\n]+)/);if(a)r.address=a[1].replace(/[*_]/g,'');
        let d=t.match(/جهة التوصيل:\s*([^\n]+)/);if(d)r.delivery=d[1];
        let dt=t.match(/التاريخ:\s*([^\n]+)/);if(dt)r.date=dt[1];
        let n=t.match(/ملاحظات:\s*([^\n]+)/);if(n)r.notes=n[1];
        let tot=t.match(/إجمالي الطلب:\s*([\d,]+)/);if(tot)r.total=parseInt(tot[1].replace(/,/g,''));
        let regex=/(\d+)️⃣.*?المنتج:\s*([^\n]+).*?معرف المنتج:\s*([^\n]+).*?الكمية:\s*(\d+).*?السعر:\s*([\d,]+)/g;
        let m;while((m=regex.exec(t))!==null)r.items.push({id:m[3].trim(),name:m[2].trim(),qty:parseInt(m[4]),price:parseInt(m[5].replace(/,/g,''))});
        if(!r.items.length){let s=t.match(/المنتج:\s*([^\n]+).*?الكمية:\s*(\d+)/);if(s)r.items.push({id:'',name:s[1].trim(),qty:parseInt(s[2]),price:0});}
        return r;
    }
    
    // دالة جلب الطلبات من التليجرام (خاصة بالتوصيل)
    async function fetchOrders(){
        let btn=event?.target;if(btn){let old=btn.innerHTML;btn.innerHTML='⏳ جاري...';btn.disabled=true;}
        try{
            let res=await fetch(`https://api.telegram.org/bot8576673096:AAFwOd-Ut1tCyKTHwkgj_r6OFi9UZbb4pTM/getUpdates?limit=100`);
            let data=await res.json();
            let c=0,proc=JSON.parse(localStorage.getItem('nardo_processed')||'[]');
            let products=JSON.parse(localStorage.getItem('nardo_products')||'[]');
            for(let u of data.result||[]){
                let msg=u.channel_post||u.message;if(!msg||!msg.text)continue;
                if(proc.includes(msg.message_id))continue;
                let txt=msg.text;if(!txt.includes(currentStore.storeFixedID))continue;
                let orderData=extractOrderDataFromText(txt);
                if(!orderData||!orderData.items.length)continue;
                if(orders.find(o=>o.telegramId===orderData.orderNum)){proc.push(msg.message_id);continue;}
                let items=[],total=0;
                for(let it of orderData.items){
                    let prod=products.find(p=>p.productCompositeID===it.id);
                    if(prod&&prod.storeID===currentStore.storeFixedID){
                        items.push({id:prod.id,name:prod.name,price:prod.price,qty:it.qty});
                        total+=prod.price*it.qty;
                        let old=prod.quantity;prod.quantity=Math.max(0,prod.quantity-it.qty);
                        let log=JSON.parse(localStorage.getItem('nardo_stock_log')||'[]');
                        log.unshift({id:Date.now(),product:prod.name,op:'سحب',qty:it.qty,old,new:prod.quantity,reason:`طلب #${orderData.orderNum}`});
                        localStorage.setItem('nardo_stock_log',JSON.stringify(log));
                    }
                }
                if(items.length){
                    orders.unshift({id:Date.now(),telegramId:orderData.orderNum,date:orderData.date||new Date().toLocaleString('ar-EG'),customer:orderData.customer,phone:orderData.phone,address:orderData.address,storeID:currentStore.storeFixedID,items,total:orderData.total||total,status:'pending',delivery:orderData.delivery||'',notes:orderData.notes||''});
                    proc.push(msg.message_id);c++;
                }
            }
            localStorage.setItem('nardo_orders',JSON.stringify(orders));
            localStorage.setItem('nardo_products',JSON.stringify(products));
            localStorage.setItem('nardo_processed',JSON.stringify(proc));
            renderOrders();
            showToast(c>0?`✅ جلب ${c} طلب جديد`:'📭 لا توجد طلبات جديدة','success');
        }catch(e){showToast('❌ فشل الجلب','error');}
        finally{if(btn){btn.innerHTML='<i class="fas fa-download"></i> جلب طلبات جديدة';btn.disabled=false;}}
    }
    
    // دوال الطلبات
    function deliverOrder(id){let o=orders.find(o=>o.id===id);if(o){o.status=o.status==='delivered'?'pending':'delivered';saveOrders();renderOrders();showToast(o.status==='delivered'?'✅ تم تسليم الطلب':'🔄 إعادة للطلبات','success');}}
    function deleteOrder(id){if(confirm('حذف الطلب؟')){orders=orders.filter(o=>o.id!==id);saveOrders();renderOrders();showToast('تم الحذف','success');}}
    function callCustomer(p){if(p)window.location.href=`tel:${p}`;else showToast('رقم غير متوفر','error');}
    
    // دالة عرض الطلبات
    function renderOrders(){
        let f=orders.filter(o=>o.storeID===currentStore.storeFixedID);
        let pending=f.filter(o=>o.status!=='delivered');
        document.getElementById('pendingCount').innerText=pending.length;
        document.getElementById('totalCount').innerText=f.length;
        let t=document.getElementById('ordersTable');
        if(!f.length){t.innerHTML='<tr><td colspan="10" style="text-align:center;padding:40px">لا توجد طلبات</td></tr>';return;}
        t.innerHTML=f.map(o=>`<tr style="${o.status==='delivered'?'opacity:0.6':''}"><td>#${o.telegramId||o.id}</td><td style="font-size:12px">${o.date}</td><td>${o.customer||'-'}</td><td><button class="btn btn-outline" style="padding:5px 10px" onclick="callCustomer('${o.phone||''}')"><i class="fas fa-phone"></i> ${o.phone||'اتصل'}</button></td><td style="max-width:150px;overflow:hidden;text-overflow:ellipsis">${o.address||'-'}</td><td>${o.items.map(i=>`${i.name}(${i.qty})`).join(', ')}</td><td style="color:#4ade80">${o.total.toLocaleString()} دج</td><td><span class="${o.status==='delivered'?'status-delivered':'status-pending'}">${o.status==='delivered'?'✅ تم التوصيل':'🔄 قيد المعالجة'}</span></td><td>${o.delivery||'-'}</td><td><button class="btn btn-success" style="padding:5px 10px" onclick="deliverOrder(${o.id})"><i class="fas fa-check"></i></button> <button class="btn btn-outline" style="padding:5px 10px" onclick="deleteOrder(${o.id})"><i class="fas fa-trash"></i></button></td></tr>`).join('');
    }
    
    function showToast(m,t){let d=document.createElement('div');d.className=`toast ${t}`;d.innerHTML=`<i class="fas ${t==='success'?'fa-check-circle':'fa-exclamation-circle'}"></i> ${m}`;document.body.appendChild(d);setTimeout(()=>d.remove(),3000);}
    
    document.addEventListener('DOMContentLoaded',()=>{loadData();setTimeout(fetchOrders,1000);setInterval(()=>{loadData();fetchOrders();},30000);});
</script>
</body>
</html>
