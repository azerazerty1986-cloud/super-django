
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📹 بث مختلط - صور + فيديو مباشر</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }
        
        body {
            background: #0a0c10;
            color: white;
            min-height: 100vh;
            padding: 16px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* الهيدر */
        .header {
            background: #161b22;
            border-radius: 25px;
            padding: 15px 20px;
            margin-bottom: 20px;
            border: 2px solid #ffd700;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .header h1 {
            color: #ffd700;
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .merchant-badge {
            background: #0088cc;
            color: white;
            padding: 8px 20px;
            border-radius: 25px;
            font-weight: bold;
        }
        
        .hybrid-badge {
            background: linear-gradient(45deg, #ff0000, #ffd700);
            color: white;
            padding: 5px 15px;
            border-radius: 25px;
            font-size: 14px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%,100% { opacity: 1; }
            50% { opacity: 0.8; }
        }
        
        /* بطاقة التاجر */
        .merchant-card {
            background: #161b22;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
            border: 2px solid #ffd700;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .merchant-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #ffd700;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 25px;
            font-weight: bold;
            color: black;
        }
        
        .merchant-name {
            color: #ffd700;
            font-size: 18px;
            font-weight: bold;
        }
        
        .merchant-id {
            color: #8b949e;
            font-size: 14px;
        }
        
        /* شاشتين */
        .dual-screen {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .screen {
            background: #161b22;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid;
        }
        
        .live-screen { border-color: #ff0000; }
        .preview-screen { border-color: #ffd700; }
        
        .screen-header {
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1f2630;
        }
        
        .live-header { color: #ff0000; }
        .preview-header { color: #ffd700; }
        
        .video-container {
            background: black;
            min-height: 350px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        video {
            width: 100%;
            max-height: 350px;
            object-fit: cover;
        }
        
        canvas {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            border: 3px solid #ffd700;
            object-fit: cover;
        }
        
        .status-indicator {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 11px;
            background: rgba(0,0,0,0.7);
            border: 1px solid #ffd700;
        }
        
        /* لوحة التحكم */
        .control-panel {
            background: #1f2630;
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
            border: 2px solid #ffd700;
        }
        
        .mode-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .mode-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s;
            background: #2d333b;
            color: white;
        }
        
        .mode-btn.active {
            background: #ffd700;
            color: black;
        }
        
        .mode-btn.photo-mode.active { background: #0088cc; color: white; }
        .mode-btn.video-mode.active { background: #ff0000; color: white; }
        .mode-btn.hybrid-mode.active { background: linear-gradient(45deg, #0088cc, #ff0000); color: white; }
        
        /* 3 أزرار */
        .three-buttons {
            display: flex;
            gap: 15px;
            margin: 20px 0;
            justify-content: center;
        }
        
        .btn {
            flex: 1;
            max-width: 180px;
            padding: 15px 20px;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s;
        }
        
        .btn-green { background: #238636; color: white; }
        .btn-red { background: #da3633; color: white; }
        .btn-blue { background: #0088cc; color: white; }
        
        .btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.2);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        /* كاميرا */
        .camera-toggle {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            justify-content: center;
        }
        
        .cam-option {
            padding: 8px 25px;
            border-radius: 25px;
            background: #1f2630;
            color: #8b949e;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s;
        }
        
        .cam-option.active {
            border-color: #ffd700;
            color: #ffd700;
            background: #ffd70020;
        }
        
        /* إحصائيات متقدمة */
        .stats-panel {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 15px 0;
        }
        
        .stat-card {
            background: #1f2630;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            border: 1px solid #ffd700;
        }
        
        .stat-number {
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
        }
        
        .stat-label {
            color: #8b949e;
            font-size: 11px;
        }
        
        /* سجل الإرسال */
        .send-log {
            background: #1f2630;
            border-radius: 15px;
            padding: 10px;
            margin-top: 15px;
            max-height: 150px;
            overflow-y: auto;
            border: 1px solid #ffd700;
        }
        
        .log-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 12px;
            border-bottom: 1px solid #2d333b;
            font-size: 12px;
        }
        
        .log-photo { color: #0088cc; }
        .log-video { color: #ff0000; }
        .log-hybrid { color: #ffd700; }
        
        /* شريط الحالة */
        .status-bar {
            margin-top: 20px;
            padding: 15px;
            background: #1f2630;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            border: 1px solid #ffd700;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- الهيدر -->
        <div class="header">
            <h1>
                <i class="fas fa-blender-phone"></i>
                بث مختلط - صور + فيديو
            </h1>
            <div class="merchant-badge">
                @nardoo_merchant
            </div>
        </div>

        <!-- بطاقة التاجر -->
        <div class="merchant-card">
            <div class="merchant-avatar">ن</div>
            <div class="merchant-info">
                <div class="merchant-name">تاجر ناردو</div>
                <div class="merchant-id">@nardoo_merchant</div>
            </div>
            <span class="hybrid-badge" id="modeIndicator">🔄 مختلط</span>
        </div>

        <!-- شاشتين -->
        <div class="dual-screen">
            <!-- البث المباشر -->
            <div class="screen live-screen">
                <div class="screen-header live-header">
                    <span><i class="fas fa-circle"></i> البث المباشر</span>
                    <span id="fpsDisplay">0 FPS</span>
                </div>
                <div class="video-container">
                    <video id="liveVideo" autoplay playsinline muted></video>
                    <div class="status-indicator" id="liveStatus">⏸️ متوقف</div>
                </div>
            </div>

            <!-- آخر إطار/فيديو -->
            <div class="screen preview-screen">
                <div class="screen-header preview-header">
                    <span><i class="fas fa-eye"></i> آخر إرسال</span>
                    <span id="lastSendTime">--:--:--</span>
                </div>
                <div class="video-container">
                    <canvas id="previewCanvas" width="280" height="280"></canvas>
                    <div class="status-indicator" id="lastSendType">📸</div>
                </div>
            </div>
        </div>

        <!-- اختيار الكاميرا -->
        <div class="camera-toggle">
            <div class="cam-option active" onclick="selectCamera('user')" id="camFront">أمامية</div>
            <div class="cam-option" onclick="selectCamera('environment')" id="camBack">خلفية</div>
        </div>

        <!-- 3 أزرار -->
        <div class="three-buttons">
            <button class="btn btn-green" onclick="startCamera()" id="startBtn">
                <i class="fas fa-camera"></i> تشغيل الكاميرا
            </button>
            <button class="btn btn-blue" onclick="startHybridStream()" id="liveBtn" disabled>
                <i class="fas fa-broadcast-tower"></i> بدء البث
            </button>
            <button class="btn btn-red" onclick="stopLiveStream()" id="stopBtn" disabled>
                <i class="fas fa-stop"></i> إيقاف
            </button>
        </div>

        <!-- إحصائيات -->
        <div class="stats-panel">
            <div class="stat-card">
                <div class="stat-number" id="photoCount">0</div>
                <div class="stat-label">صور مرسلة</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="videoCount">0</div>
                <div class="stat-label">فيديوهات</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="successRate">100%</div>
                <div class="stat-label">نسبة النجاح</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="queueSize">0</div>
                <div class="stat-label">في الانتظار</div>
            </div>
        </div>

        <!-- سجل الإرسال -->
        <div class="send-log" id="sendLog">
            <div style="color: #8b949e; text-align: center;">📡 في انتظار الإرسال...</div>
        </div>

        <!-- شريط الحالة -->
        <div class="status-bar">
            <span id="statusText"><i class="fas fa-circle" style="color: #4caf50;"></i> النظام جاهز</span>
            <span id="timeDisplay"></span>
        </div>
    </div>

    <script>
        // ========== إعدادات تيليجرام ==========
        const TELEGRAM = {
            botToken: '8576673096:AAHj80CdifTJNlOs6JgouHmjEXl0bM-8Shw',
            channelId: '-1003822964890'
        };
        const MERCHANT_ID = '@nardoo_merchant';

        // ========== إعدادات البث المختلط ==========
        const HYBRID_CONFIG = {
            photoFPS: 5,              // 5 صور في الثانية
            videoDuration: 3,          // فيديو 3 ثواني
            videoInterval: 10000,      // فيديو كل 10 ثواني
            photoQuality: 0.7,         // جودة الصور 70%
            videoQuality: 0.6,         // جودة الفيديو
            maxQueueSize: 10
        };

        // ========== متغيرات النظام ==========
        let stream = null;
        let cameraActive = false;
        let isLiveActive = false;
        let currentFacingMode = 'user';
        
        // إحصائيات
        let photoCount = 0;
        let videoCount = 0;
        let failedCount = 0;
        
        // قوائم انتظار
        let photoQueue = [];
        let videoQueue = [];
        
        // المؤقتات
        let photoInterval = null;
        let videoInterval = null;
        let sendInterval = null;
        let mediaRecorder = null;
        
        // عناصر DOM
        const video = document.getElementById('liveVideo');
        const previewCanvas = document.getElementById('previewCanvas');
        const previewCtx = previewCanvas.getContext('2d');
        
        const modeIndicator = document.getElementById('modeIndicator');
        const liveStatus = document.getElementById('liveStatus');
        const fpsDisplay = document.getElementById('fpsDisplay');
        const lastSendTime = document.getElementById('lastSendTime');
        const lastSendType = document.getElementById('lastSendType');
        
        const photoCountSpan = document.getElementById('photoCount');
        const videoCountSpan = document.getElementById('videoCount');
        const successRateSpan = document.getElementById('successRate');
        const queueSizeSpan = document.getElementById('queueSize');
        
        const sendLog = document.getElementById('sendLog');
        const statusText = document.getElementById('statusText');
        const timeDisplay = document.getElementById('timeDisplay');
        
        const startBtn = document.getElementById('startBtn');
        const liveBtn = document.getElementById('liveBtn');
        const stopBtn = document.getElementById('stopBtn');
        const camFront = document.getElementById('camFront');
        const camBack = document.getElementById('camBack');

        // تحديث الوقت
        setInterval(() => {
            const now = new Date();
            timeDisplay.textContent = now.toLocaleTimeString('ar-EG');
        }, 1000);

        // اختيار الكاميرا
        window.selectCamera = function(mode) {
            currentFacingMode = mode;
            camFront.classList.toggle('active', mode === 'user');
            camBack.classList.toggle('active', mode === 'environment');
            
            if (cameraActive) {
                stopCamera();
                setTimeout(startCamera, 500);
            }
        };

        // تشغيل الكاميرا
        window.startCamera = async function() {
            try {
                statusText.innerHTML = '🔄 تشغيل الكاميرا...';
                
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: currentFacingMode,
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    },
                    audio: true  // للفيديو
                });
                
                video.srcObject = stream;
                await video.play();
                
                cameraActive = true;
                startBtn.disabled = true;
                liveBtn.disabled = false;
                stopBtn.disabled = true;
                liveStatus.innerHTML = '⏸️ متوقف';
                
                statusText.innerHTML = '✅ الكاميرا جاهزة';
                
            } catch (err) {
                statusText.innerHTML = '❌ خطأ: ' + err.message;
            }
        };

        // بدء البث المختلط
        window.startHybridStream = function() {
            isLiveActive = true;
            liveBtn.disabled = true;
            stopBtn.disabled = false;
            liveStatus.innerHTML = '🔴 بث مختلط';
            modeIndicator.innerHTML = '🔄 مختلط';
            statusText.innerHTML = '🔴 البث نشط';
            
            // تنظيف
            stopAllIntervals();
            
            // بدء العمليات
            startHybridMode();
        };

        // إيقاف البث
        window.stopLiveStream = function() {
            isLiveActive = false;
            liveBtn.disabled = false;
            stopBtn.disabled = true;
            liveStatus.innerHTML = '⏸️ متوقف';
            modeIndicator.innerHTML = '⏸️ متوقف';
            statusText.innerHTML = '⏹️ تم الإيقاف';
            
            stopAllIntervals();
            
            // تفريغ القوائم
            photoQueue = [];
            videoQueue = [];
            queueSizeSpan.textContent = '0';
        };

        // إيقاف جميع المؤقتات
        function stopAllIntervals() {
            if (photoInterval) clearInterval(photoInterval);
            if (videoInterval) clearInterval(videoInterval);
            if (sendInterval) clearInterval(sendInterval);
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
        }

        // بدء الوضع المختلط
        function startHybridMode() {
            // 1. التقاط الصور (5 في الثانية)
            photoInterval = setInterval(capturePhoto, 1000 / HYBRID_CONFIG.photoFPS);
            
            // 2. تسجيل فيديو كل 10 ثواني
            videoInterval = setInterval(recordVideo, HYBRID_CONFIG.videoInterval);
            
            // 3. إرسال كل ثانية
            sendInterval = setInterval(sendFromQueues, 1000);
        }

        // التقاط صورة
        function capturePhoto() {
            if (!isLiveActive || !cameraActive) return;
            
            // رسم الصورة
            previewCtx.drawImage(video, 0, 0, 280, 280);
            
            // تحويل إلى blob
            previewCanvas.toBlob((blob) => {
                if (!isLiveActive) return;
                
                photoQueue.push({
                    blob: blob,
                    time: Date.now()
                });
                
                // تحديث حجم القائمة
                queueSizeSpan.textContent = photoQueue.length + videoQueue.length;
                
            }, 'image/jpeg', HYBRID_CONFIG.photoQuality);
        }

        // تسجيل فيديو
        async function recordVideo() {
            if (!isLiveActive || !cameraActive) return;
            
            try {
                const chunks = [];
                const recorder = new MediaRecorder(stream);
                
                recorder.ondataavailable = (e) => {
                    if (e.data.size > 0) chunks.push(e.data);
                };
                
                recorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'video/webm' });
                    
                    videoQueue.push({
                        blob: blob,
                        time: Date.now()
                    });
                    
                    queueSizeSpan.textContent = photoQueue.length + videoQueue.length;
                };
                
                recorder.start();
                setTimeout(() => recorder.stop(), HYBRID_CONFIG.videoDuration * 1000);
                
            } catch (error) {
                console.error('❌ فشل تسجيل الفيديو:', error);
            }
        }

        // إرسال من القوائم
        async function sendFromQueues() {
            if (!isLiveActive) return;
            
            // إرسال الصور أولاً
            while (photoQueue.length > 0) {
                await sendPhoto(photoQueue.shift());
            }
            
            // ثم إرسال الفيديوهات
            while (videoQueue.length > 0) {
                await sendVideo(videoQueue.shift());
            }
            
            queueSizeSpan.textContent = '0';
        }

        // إرسال صورة
        async function sendPhoto(item) {
            try {
                const now = new Date();
                const timeStr = now.toLocaleTimeString('ar-EG');
                
                const formData = new FormData();
                formData.append('chat_id', TELEGRAM.channelId);
                formData.append('photo', item.blob, `photo_${Date.now()}.jpg`);
                formData.append('caption', `📸 صورة مباشرة من ${MERCHANT_ID}\n⏱️ ${timeStr}\n📸 #${photoCount + 1}`);
                
                const res = await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
                
                const result = await res.json();
                
                if (result.ok) {
                    photoCount++;
                    photoCountSpan.textContent = photoCount;
                    lastSendTime.textContent = timeStr;
                    lastSendType.innerHTML = '📸 صورة';
                    
                    addToLog(`📸 صورة #${photoCount} أرسلت`, 'photo');
                    updateSuccessRate(true);
                } else {
                    updateSuccessRate(false);
                }
                
            } catch (error) {
                updateSuccessRate(false);
            }
        }

        // إرسال فيديو
        async function sendVideo(item) {
            try {
                const now = new Date();
                const timeStr = now.toLocaleTimeString('ar-EG');
                
                const formData = new FormData();
                formData.append('chat_id', TELEGRAM.channelId);
                formData.append('video', item.blob, `video_${Date.now()}.mp4`);
                formData.append('caption', `🎥 فيديو مباشر من ${MERCHANT_ID}\n⏱️ ${timeStr}\n🎥 #${videoCount + 1}\n⏱️ ${HYBRID_CONFIG.videoDuration} ث`);
                
                const res = await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/sendVideo`, {
                    method: 'POST',
                    body: formData
                });
                
                const result = await res.json();
                
                if (result.ok) {
                    videoCount++;
                    videoCountSpan.textContent = videoCount;
                    lastSendTime.textContent = timeStr;
                    lastSendType.innerHTML = '🎥 فيديو';
                    
                    addToLog(`🎥 فيديو #${videoCount} أرسل`, 'video');
                    updateSuccessRate(true);
                } else {
                    updateSuccessRate(false);
                }
                
            } catch (error) {
                updateSuccessRate(false);
            }
        }

        // تحديث نسبة النجاح
        function updateSuccessRate(success) {
            if (!success) failedCount++;
            
            const total = photoCount + videoCount + failedCount;
            if (total > 0) {
                const rate = ((photoCount + videoCount) / total * 100).toFixed(1);
                successRateSpan.textContent = rate + '%';
            }
        }

        // إضافة للسجل
        function addToLog(message, type) {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('ar-EG');
            
            let html = sendLog.innerHTML;
            if (html.includes('في انتظار الإرسال')) html = '';
            
            const logClass = type === 'photo' ? 'log-photo' : 'log-video';
            
            html = `
                <div class="log-item">
                    <span class="${logClass}">${message}</span>
                    <span class="frame-time">${timeStr}</span>
                </div>
            ` + html;
            
            // الاحتفاظ بآخر 10 رسائل
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = html;
            if (tempDiv.children.length > 10) {
                tempDiv.removeChild(tempDiv.lastChild);
            }
            
            sendLog.innerHTML = tempDiv.innerHTML;
        }

        // تحديث FPS
        let frameCount = 0;
        let lastFPSUpdate = Date.now();
        
        setInterval(() => {
            if (isLiveActive) {
                frameCount++;
                const now = Date.now();
                if (now - lastFPSUpdate >= 1000) {
                    fpsDisplay.textContent = frameCount + ' FPS';
                    frameCount = 0;
                    lastFPSUpdate = now;
                }
            }
        }, 100);

        // إيقاف الكاميرا
        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(t => t.stop());
                stream = null;
            }
            cameraActive = false;
            startBtn.disabled = false;
            liveBtn.disabled = true;
            stopBtn.disabled = true;
        }
    </script>
</body>
</html>
