<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ناردو برو - نظام إدارة القراءات</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
        --primary: #1a1a2e;
        --secondary: #16213e;
        --gold: #ffd700;
        --text-primary: #ffffff;
        --text-secondary: #b0b0b0;
        --glass: rgba(255, 255, 255, 0.05);
        --success: #4ade80;
        --error: #f87171;
        --warning: #fbbf24;
        --info: #60a5fa;
        --table-header: #0f3460;
        --table-row-even: #16213e;
        --table-row-odd: #1e2a4a;
        --table-hover: #2a3a5a;
    }
    
    body {
        font-family: 'Cairo', sans-serif;
        background: linear-gradient(135deg, #0f3460, #16213e);
        color: var(--text-primary);
        direction: rtl;
    }
    
    .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
    
    .header {
        background: var(--glass);
        border: 1px solid rgba(255, 215, 0, 0.2);
        border-radius: 20px;
        padding: 25px;
        margin-bottom: 30px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 20px;
    }
    
    .header-title { display: flex; align-items: center; gap: 15px; }
    .header-title i { font-size: 40px; color: var(--gold); }
    .header-title h1 { font-size: 28px; color: var(--gold); margin: 0; }
    
    .stats {
        display: flex;
        gap: 15px;
        flex-wrap: wrap;
    }
    
    .stat-card {
        background: var(--glass);
        border-radius: 15px;
        padding: 10px 20px;
        text-align: center;
        border: 1px solid rgba(255, 215, 0, 0.2);
    }
    
    .stat-card i { color: var(--gold); margin-left: 8px; }
    .stat-card span { font-size: 20px; font-weight: bold; color: var(--gold); }
    
    .btn {
        padding: 12px 25px;
        border: none;
        border-radius: 10px;
        font-weight: bold;
        cursor: pointer;
        font-family: 'Cairo', sans-serif;
        transition: all 0.3s;
    }
    .btn-gold { background: var(--gold); color: #000; }
    .btn-gold:hover { background: #ffed4e; transform: translateY(-2px); }
    .btn-outline { background: transparent; border: 2px solid var(--gold); color: var(--gold); }
    .btn-outline:hover { background: rgba(255, 215, 0, 0.1); }
    .btn-success { background: var(--success); color: #000; }
    .btn-danger { background: rgba(248, 113, 113, 0.2); border: 1px solid var(--error); color: var(--error); }
    .btn-danger:hover { background: var(--error); color: #fff; }
    .btn-info { background: rgba(96, 165, 250, 0.2); border: 1px solid var(--info); color: var(--info); }
    
    /* قسم الجدول */
    .results-section {
        background: var(--glass);
        border: 1px solid rgba(255, 215, 0, 0.2);
        border-radius: 20px;
        padding: 20px;
        margin-bottom: 30px;
    }
    
    .section-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 15px;
        margin-bottom: 20px;
        padding-bottom: 15px;
        border-bottom: 1px solid rgba(255, 215, 0, 0.2);
    }
    
    .section-header h2 { color: var(--gold); font-size: 22px; }
    .section-header h2 i { margin-left: 10px; }
    
    .table-wrapper {
        overflow-x: auto;
        border-radius: 15px;
    }
    
    .results-table {
        width: 100%;
        border-collapse: collapse;
        font-family: 'Cairo', sans-serif;
        min-width: 800px;
    }
    
    .results-table th {
        background: var(--table-header);
        color: var(--gold);
        padding: 15px;
        text-align: center;
        font-size: 15px;
        border-bottom: 2px solid var(--gold);
    }
    
    .results-table td {
        padding: 12px 15px;
        text-align: center;
        border-bottom: 1px solid rgba(255, 215, 0, 0.1);
    }
    
    .results-table tr:nth-child(even) {
        background: var(--table-row-even);
    }
    
    .results-table tr:nth-child(odd) {
        background: var(--table-row-odd);
    }
    
    .results-table tr:hover {
        background: var(--table-hover);
    }
    
    .delete-btn, .edit-btn {
        background: none;
        border: none;
        padding: 5px 10px;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s;
        margin: 0 3px;
    }
    
    .delete-btn {
        color: var(--error);
    }
    
    .delete-btn:hover {
        background: var(--error);
        color: white;
    }
    
    .edit-btn {
        color: var(--info);
    }
    
    .edit-btn:hover {
        background: var(--info);
        color: white;
    }
    
    .empty-row td {
        text-align: center;
        padding: 40px;
        color: var(--text-secondary);
    }
    
    /* المودال */
    .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.85);
        z-index: 2000;
        align-items: center;
        justify-content: center;
    }
    .modal.active { display: flex; }
    .modal-content {
        background: var(--primary);
        border: 2px solid var(--gold);
        border-radius: 20px;
        padding: 25px;
        max-width: 550px;
        width: 90%;
        max-height: 90vh;
        overflow-y: auto;
    }
    .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        padding-bottom: 10px;
        border-bottom: 1px solid rgba(255, 215, 0, 0.2);
    }
    .modal-header h2 { color: var(--gold); margin: 0; font-size: 20px; }
    .close-btn {
        background: none;
        border: none;
        color: var(--gold);
        font-size: 28px;
        cursor: pointer;
    }
    
    /* نموذج الإدخال */
    .form-group {
        margin-bottom: 18px;
    }
    
    .form-group label {
        display: block;
        margin-bottom: 8px;
        color: var(--gold);
        font-weight: 500;
    }
    
    .form-group label i {
        margin-left: 8px;
    }
    
    .form-group input, .form-group select {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid rgba(255, 215, 0, 0.3);
        background: rgba(0, 0, 0, 0.3);
        color: white;
        font-family: 'Cairo', sans-serif;
        font-size: 14px;
    }
    
    .form-group input:focus, .form-group select:focus {
        outline: none;
        border-color: var(--gold);
    }
    
    .form-row {
        display: flex;
        gap: 15px;
    }
    
    .form-row .form-group {
        flex: 1;
    }
    
    #qr-reader {
        width: 100%;
        max-width: 450px;
        margin: 0 auto;
        background: white;
        border-radius: 15px;
        overflow: hidden;
    }
    
    .upload-section {
        text-align: center;
        border: 2px dashed rgba(255,215,0,0.3);
        border-radius: 15px;
        padding: 30px;
        margin-bottom: 15px;
    }
    
    .footer {
        text-align: center;
        padding: 30px;
        color: var(--text-secondary);
        border-top: 1px solid rgba(255, 215, 0, 0.2);
        margin-top: 30px;
    }
    
    @media (max-width: 768px) {
        .results-table th, .results-table td { padding: 8px; font-size: 12px; }
        .form-row { flex-direction: column; gap: 0; }
    }
</style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-title">
                <i class="fas fa-qrcode"></i>
                <h1>نظام إدارة القراءات</h1>
            </div>
            <div class="stats">
                <div class="stat-card">
                    <i class="fas fa-chart-line"></i>
                    <span id="totalCount">0</span> إجمالي
                </div>
                <button class="btn btn-gold" onclick="openScannerModal()">
                    <i class="fas fa-camera"></i> مسح باركود جديد
                </button>
            </div>
        </div>

        <!-- جدول النتائج -->
        <div class="results-section">
            <div class="section-header">
                <h2><i class="fas fa-table-list"></i> قائمة القراءات</h2>
                <button class="btn btn-danger" onclick="clearAllResults()" id="clearAllBtn" style="display: none;">
                    <i class="fas fa-trash-alt"></i> مسح الكل
                </button>
            </div>
            <div class="table-wrapper">
                <table class="results-table" id="resultsTable">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>الرقم</th>
                            <th>اسم المتحر</th>
                            <th>اسم العميل</th>
                            <th>المنتوجات</th>
                            <th>الكمية</th>
                            <th>عدد المنتوجات</th>
                            <th>التاريخ</th>
                            <th>إجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr class="empty-row">
                            <td colspan="9">
                                <i class="fas fa-info-circle"></i> لا توجد بيانات. ابدأ بمسح باركود!
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="footer">
            <p>&copy; 2024 ناردو برو - نظام إدارة القراءات</p>
        </div>
    </div>

    <!-- مودال الماسح -->
    <div id="scannerModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-camera"></i> مسح باركود</h2>
                <button class="close-btn" onclick="closeScannerModal()">&times;</button>
            </div>
            
            <div style="display: flex; gap: 10px; margin-bottom: 15px; border-bottom: 1px solid rgba(255,215,0,0.2);">
                <button id="tabCameraBtn" class="btn btn-outline" style="flex: 1; padding: 8px;" onclick="switchTab('camera')">
                    <i class="fas fa-camera"></i> كاميرا مباشرة
                </button>
                <button id="tabUploadBtn" class="btn btn-outline" style="flex: 1; padding: 8px;" onclick="switchTab('upload')">
                    <i class="fas fa-upload"></i> رفع صورة
                </button>
            </div>
            
            <div id="cameraSection" style="text-align: center;">
                <div id="qr-reader"></div>
                <div id="qr-reader-results" style="margin-top: 15px; padding: 12px; background: rgba(255,215,0,0.1); border-radius: 10px; text-align: center;">
                    <i class="fas fa-info-circle"></i> وجه الكاميرا نحو الباركود
                </div>
            </div>
            
            <div id="uploadSection" style="display: none;">
                <div class="upload-section">
                    <i class="fas fa-qrcode" style="font-size: 48px; color: var(--gold); margin-bottom: 15px; display: block;"></i>
                    <input type="file" id="qrImageInput" accept="image/*" style="display: none;">
                    <button class="btn btn-gold" onclick="document.getElementById('qrImageInput').click()">
                        <i class="fas fa-folder-open"></i> اختر صورة باركود
                    </button>
                </div>
                <div id="uploadResult" class="result-box" style="margin-top: 15px; padding: 12px; background: rgba(255,215,0,0.1); border-radius: 10px; text-align: center;">
                    <i class="fas fa-info-circle"></i> انتظر النتيجة بعد رفع الصورة
                </div>
            </div>
            
            <div style="margin-top: 15px; display: flex; gap: 10px; justify-content: center;">
                <button class="btn btn-outline" onclick="switchCamera()" id="switchCameraBtn">
                    <i class="fas fa-sync-alt"></i> تبديل الكاميرا
                </button>
                <button class="btn btn-outline" onclick="closeScannerModal()">
                    <i class="fas fa-times"></i> إغلاق
                </button>
            </div>
        </div>
    </div>

    <!-- مودال إدخال البيانات -->
    <div id="dataEntryModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-edit"></i> إدخال بيانات القراءة</h2>
                <button class="close-btn" onclick="closeDataEntryModal()">&times;</button>
            </div>
            
            <form id="dataEntryForm" onsubmit="saveDataEntry(event)">
                <div class="form-row">
                    <div class="form-group">
                        <label><i class="fas fa-hashtag"></i> الرقم</label>
                        <input type="text" id="fieldNumber" placeholder="أدخل الرقم" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-user-tie"></i> اسم المتحر</label>
                        <input type="text" id="fieldDriver" placeholder="اسم المتحر" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-user"></i> اسم العميل</label>
                    <input type="text" id="fieldCustomer" placeholder="اسم العميل" required>
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-boxes"></i> المنتوجات</label>
                    <input type="text" id="fieldProducts" placeholder="اسم المنتوج أو رمزه" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label><i class="fas fa-weight-hanging"></i> الكمية</label>
                        <input type="number" id="fieldQuantity" placeholder="الكمية" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-cubes"></i> عدد المنتوجات</label>
                        <input type="number" id="fieldProductCount" placeholder="عدد المنتوجات" required>
                    </div>
                </div>
                
                <input type="hidden" id="barcodeValue">
                <input type="hidden" id="editId">
                
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button type="submit" class="btn btn-gold" style="flex: 1;">
                        <i class="fas fa-save"></i> حفظ البيانات
                    </button>
                    <button type="button" class="btn btn-outline" onclick="closeDataEntryModal()">
                        <i class="fas fa-times"></i> إلغاء
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ========== المتغيرات ==========
        let html5QrCode = null;
        let currentCameraId = 'environment';
        let scannerInitialized = false;
        let currentTab = 'camera';
        let resultsArray = [];
        let nextId = 1;
        let pendingBarcode = null;
        
        // ========== تحميل وحفظ البيانات ==========
        
        function loadResults() {
            const saved = localStorage.getItem('barcodeTableData');
            if (saved) {
                resultsArray = JSON.parse(saved);
                nextId = resultsArray.length > 0 ? Math.max(...resultsArray.map(r => r.id)) + 1 : 1;
            }
            renderTable();
        }
        
        function saveResults() {
            localStorage.setItem('barcodeTableData', JSON.stringify(resultsArray));
            updateStats();
        }
        
        function updateStats() {
            document.getElementById('totalCount').innerText = resultsArray.length;
            const clearBtn = document.getElementById('clearAllBtn');
            clearBtn.style.display = resultsArray.length > 0 ? 'inline-block' : 'none';
        }
        
        // ========== عرض الجدول ==========
        
        function renderTable() {
            const tbody = document.getElementById('tableBody');
            
            if (resultsArray.length === 0) {
                tbody.innerHTML = `
                    <tr class="empty-row">
                        <td colspan="9">
                            <i class="fas fa-info-circle"></i> لا توجد بيانات. ابدأ بمسح باركود!
                        </td>
                    </tr>
                `;
                updateStats();
                return;
            }
            
            tbody.innerHTML = resultsArray.map((item, index) => `
                <tr>
                    <td>${index + 1}</td>
                    <td>${escapeHtml(item.number || '')}</td>
                    <td>${escapeHtml(item.driver || '')}</td>
                    <td>${escapeHtml(item.customer || '')}</td>
                    <td>${escapeHtml(item.products || '')}</td>
                    <td>${item.quantity || ''}</td>
                    <td>${item.productCount || ''}</td>
                    <td>${item.date || ''}</td>
                    <td>
                        <button class="edit-btn" onclick="editEntry(${item.id})" title="تعديل">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button class="delete-btn" onclick="deleteEntry(${item.id})" title="حذف">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
            
            updateStats();
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // ========== إدارة البيانات ==========
        
        function openDataEntry(barcodeValue, editData = null) {
            pendingBarcode = barcodeValue;
            
            if (editData) {
                document.getElementById('editId').value = editData.id;
                document.getElementById('fieldNumber').value = editData.number || '';
                document.getElementById('fieldDriver').value = editData.driver || '';
                document.getElementById('fieldCustomer').value = editData.customer || '';
                document.getElementById('fieldProducts').value = editData.products || '';
                document.getElementById('fieldQuantity').value = editData.quantity || '';
                document.getElementById('fieldProductCount').value = editData.productCount || '';
                document.getElementById('barcodeValue').value = editData.barcode || barcodeValue;
                document.querySelector('#dataEntryModal h2 i').className = 'fas fa-pen';
                document.querySelector('#dataEntryModal h2').innerHTML = '<i class="fas fa-pen"></i> تعديل البيانات';
            } else {
                document.getElementById('editId').value = '';
                document.getElementById('fieldNumber').value = '';
                document.getElementById('fieldDriver').value = '';
                document.getElementById('fieldCustomer').value = '';
                document.getElementById('fieldProducts').value = '';
                document.getElementById('fieldQuantity').value = '';
                document.getElementById('fieldProductCount').value = '';
                document.getElementById('barcodeValue').value = barcodeValue;
                document.querySelector('#dataEntryModal h2 i').className = 'fas fa-edit';
                document.querySelector('#dataEntryModal h2').innerHTML = '<i class="fas fa-edit"></i> إدخال بيانات القراءة';
            }
            
            document.getElementById('dataEntryModal').classList.add('active');
        }
        
        function closeDataEntryModal() {
            document.getElementById('dataEntryModal').classList.remove('active');
            pendingBarcode = null;
        }
        
        function saveDataEntry(event) {
            event.preventDefault();
            
            const editId = document.getElementById('editId').value;
            const barcode = document.getElementById('barcodeValue').value;
            const now = new Date();
            const date = now.toLocaleDateString('ar-EG');
            
            const newEntry = {
                id: editId ? parseInt(editId) : nextId++,
                barcode: barcode,
                number: document.getElementById('fieldNumber').value,
                driver: document.getElementById('fieldDriver').value,
                customer: document.getElementById('fieldCustomer').value,
                products: document.getElementById('fieldProducts').value,
                quantity: document.getElementById('fieldQuantity').value,
                productCount: document.getElementById('fieldProductCount').value,
                date: date,
                timestamp: now.getTime()
            };
            
            if (editId) {
                // تعديل
                const index = resultsArray.findIndex(r => r.id == editId);
                if (index !== -1) {
                    resultsArray[index] = newEntry;
                }
                showNotification('✓ تم تعديل البيانات بنجاح', 'success');
            } else {
                // إضافة جديدة
                resultsArray.unshift(newEntry);
                showNotification('✓ تم إضافة البيانات إلى الجدول', 'success');
            }
            
            saveResults();
            renderTable();
            closeDataEntryModal();
            closeScannerModal();
        }
        
        function deleteEntry(id) {
            if (confirm('هل أنت متأكد من حذف هذه القراءة؟')) {
                resultsArray = resultsArray.filter(r => r.id !== id);
                saveResults();
                renderTable();
                showNotification('تم حذف القراءة', 'info');
            }
        }
        
        function editEntry(id) {
            const entry = resultsArray.find(r => r.id === id);
            if (entry) {
                openDataEntry(entry.barcode, entry);
            }
        }
        
        function clearAllResults() {
            if (resultsArray.length === 0) return;
            if (confirm('⚠️ تحذير: هل أنت متأكد من مسح جميع القراءات؟')) {
                resultsArray = [];
                nextId = 1;
                saveResults();
                renderTable();
                showNotification('تم مسح جميع القراءات', 'info');
            }
        }
        
        // ========== دوال الماسح ==========
        
        function switchTab(tab) {
            currentTab = tab;
            const cameraSection = document.getElementById('cameraSection');
            const uploadSection = document.getElementById('uploadSection');
            const tabCameraBtn = document.getElementById('tabCameraBtn');
            const tabUploadBtn = document.getElementById('tabUploadBtn');
            const switchCameraBtn = document.getElementById('switchCameraBtn');
            
            if (tab === 'camera') {
                cameraSection.style.display = 'block';
                uploadSection.style.display = 'none';
                tabCameraBtn.style.background = 'rgba(255,215,0,0.2)';
                tabUploadBtn.style.background = 'transparent';
                switchCameraBtn.style.display = 'inline-block';
                if (!scannerInitialized) { initScanner(); }
            } else {
                cameraSection.style.display = 'none';
                uploadSection.style.display = 'block';
                tabUploadBtn.style.background = 'rgba(255,215,0,0.2)';
                tabCameraBtn.style.background = 'transparent';
                switchCameraBtn.style.display = 'none';
                if (html5QrCode && html5QrCode.isScanning) {
                    html5QrCode.stop().then(() => { scannerInitialized = false; });
                }
            }
        }
        
        async function openScannerModal() {
            document.getElementById('scannerModal').classList.add('active');
            switchTab('camera');
        }
        
        function closeScannerModal() {
            document.getElementById('scannerModal').classList.remove('active');
            if (html5QrCode && html5QrCode.isScanning) {
                html5QrCode.stop().catch(err => console.error(err));
            }
            scannerInitialized = false;
        }
        
        async function initScanner() {
            if (scannerInitialized) return;
            const readerElement = document.getElementById('qr-reader');
            if (!readerElement) return;
            
            html5QrCode = new Html5Qrcode("qr-reader");
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };
            
            try {
                await html5QrCode.start({ facingMode: currentCameraId }, config, onScanSuccess, onScanFailure);
                scannerInitialized = true;
            } catch (err) {
                console.error(err);
            }
        }
        
        async function switchCamera() {
            if (html5QrCode) {
                await html5QrCode.stop();
                scannerInitialized = false;
                currentCameraId = currentCameraId === 'environment' ? 'user' : 'environment';
                initScanner();
            }
        }
        
        function onScanSuccess(decodedText) {
            closeScannerModal();
            openDataEntry(decodedText);
        }
        
        function onScanFailure(error) { }
        
        // ========== رفع الصورة ==========
        
        function initImageUploader() {
            const imageInput = document.getElementById('qrImageInput');
            imageInput.addEventListener('change', async function(e) {
                const file = e.target.files[0];
                if (!file) return;
                
                const resultDiv = document.getElementById('uploadResult');
                resultDiv.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري القراءة...';
                resultDiv.className = 'result-box';
                
                const qrScanner = new Html5Qrcode("qr-reader");
                
                try {
                    const decodedText = await qrScanner.scanFile(file, true);
                    if (decodedText) {
                        resultDiv.innerHTML = `<i class="fas fa-check-circle"></i> تم القراءة: ${decodedText.substring(0, 40)}`;
                        resultDiv.className = 'result-box success';
                        closeScannerModal();
                        openDataEntry(decodedText);
                        return;
                    }
                } catch (err) {
                    resultDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> لم يتم العثور على باركود';
                    resultDiv.className = 'result-box error';
                } finally {
                    qrScanner.clear();
                }
            });
        }
        
        function showNotification(message, type) {
            const notification = document.createElement('div');
            const bgColor = type === 'success' ? '#4ade80' : (type === 'error' ? '#f87171' : '#60a5fa');
            notification.style.cssText = `position: fixed; bottom: 20px; right: 20px; padding: 12px 24px; background: ${bgColor}; color: #000; border-radius: 10px; font-weight: bold; z-index: 3000;`;
            notification.innerText = message;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 3000);
        }
        
        // ========== التشغيل ==========
        document.addEventListener('DOMContentLoaded', () => {
            loadResults();
            initImageUploader();
            
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    closeScannerModal();
                    closeDataEntryModal();
                }
            });
        });
    </script>
</body>
</html>
