    <!-- نافذة قارئ الباركود -->

            <div style="margin-top: 15px; display: flex; gap: 10px; justify-content: center;">

    <script>
        // ============================================
        // المتغيرات العامة
        // ============================================
        let html5QrCode = null;
        let currentCameraId = 'environment';
        let scannerInitialized = false;
        let currentTab = 'camera';
        let originalImageData = null;
        let processedImageCanvas = null;
        
        // ============================================
        // دوال معالجة الصور (Image Pre-processing)
        // ============================================
        
        /**
         * تحويل الصورة إلى رمادي (Grayscale) لتحسين قراءة الباركود
         */
        function toGrayscale(imageData) {
            const data = imageData.data;
            for (let i = 0; i < data.length; i += 4) {
                const gray = data[i] * 0.299 + data[i + 1] * 0.587 + data[i + 2] * 0.114;
                data[i] = gray;
                data[i + 1] = gray;
                data[i + 2] = gray;
            }
            return imageData;
        }
        
        /**
         * تطبيق معادلة الهستوجرام (Histogram Equalization) لتحسين التباين
         */
        function histogramEqualization(imageData) {
            const data = imageData.data;
            const histogram = new Array(256).fill(0);
            
            // حساب الهستوجرام
            for (let i = 0; i < data.length; i += 4) {
                histogram[data[i]]++;
            }
            
            // حساب التوزيع التراكمي
            const cdf = new Array(256);
            cdf[0] = histogram[0];
            for (let i = 1; i < 256; i++) {
                cdf[i] = cdf[i - 1] + histogram[i];
            }
            
            // تطبيع التوزيع التراكمي
            const cdfMin = cdf.find(v => v > 0);
            const pixelCount = imageData.width * imageData.height;
            
            for (let i = 0; i < data.length; i += 4) {
                const pixelValue = data[i];
                const newValue = Math.round(((cdf[pixelValue] - cdfMin) / (pixelCount - cdfMin)) * 255);
                data[i] = newValue;
                data[i + 1] = newValue;
                data[i + 2] = newValue;
            }
            
            return imageData;
        }
        
        /**
         * تطبيق تصفية Gaussian Blur للتقليل من الضوضاء
         */
        function gaussianBlur(imageData, radius = 2) {
            const data = imageData.data;
            const width = imageData.width;
            const height = imageData.height;
            const kernel = [];
            
            // إنشاء kernel Gaussian
            const sigma = radius / 2;
            let sum = 0;
            for (let x = -radius; x <= radius; x++) {
                for (let y = -radius; y <= radius; y++) {
                    const value = Math.exp(-(x * x + y * y) / (2 * sigma * sigma));
                    kernel.push(value);
                    sum += value;
                }
            }
            
            // تطبيع الـ kernel
            for (let i = 0; i < kernel.length; i++) {
                kernel[i] /= sum;
            }
            
            const tempData = new Uint8ClampedArray(data);
            const kernelSize = 2 * radius + 1;
            
            for (let y = radius; y < height - radius; y++) {
                for (let x = radius; x < width - radius; x++) {
                    let r = 0, g = 0, b = 0;
                    let kernelIndex = 0;
                    
                    for (let ky = -radius; ky <= radius; ky++) {
                        for (let kx = -radius; kx <= radius; kx++) {
                            const pixelIndex = ((y + ky) * width + (x + kx)) * 4;
                            r += tempData[pixelIndex] * kernel[kernelIndex];
                            g += tempData[pixelIndex + 1] * kernel[kernelIndex];
                            b += tempData[pixelIndex + 2] * kernel[kernelIndex];
                            kernelIndex++;
                        }
                    }
                    
                    const index = (y * width + x) * 4;
                    data[index] = Math.round(r);
                    data[index + 1] = Math.round(g);
                    data[index + 2] = Math.round(b);
                }
            }
            
            return imageData;
        }
        
        /**
         * تطبيق عتبة ثنائية (Binary Threshold) لتحويل الصورة إلى أبيض وأسود
         */
        function binaryThreshold(imageData, threshold = 128) {
            const data = imageData.data;
            for (let i = 0; i < data.length; i += 4) {
                const gray = data[i];
                const value = gray > threshold ? 255 : 0;
                data[i] = value;
                data[i + 1] = value;
                data[i + 2] = value;
            }
            return imageData;
        }
        
        /**
         * تطبيق تحسينات السطوع والتباين
         */
        function adjustBrightnessContrast(imageData, brightness = 0, contrast = 0) {
            const data = imageData.data;
            const factor = (259 * (contrast + 255)) / (255 * (259 - contrast));
            
            for (let i = 0; i < data.length; i += 4) {
                let r = data[i] + brightness;
                let g = data[i + 1] + brightness;
                let b = data[i + 2] + brightness;
                
                r = Math.max(0, Math.min(255, factor * (r - 128) + 128));
                g = Math.max(0, Math.min(255, factor * (g - 128) + 128));
                b = Math.max(0, Math.min(255, factor * (b - 128) + 128));
                
                data[i] = r;
                data[i + 1] = g;
                data[i + 2] = b;
            }
            
            return imageData;
        }
        
        /**
         * تطبيق تصفية الحدة (Sharpening)
         */
        function sharpenImage(imageData, amount = 0.5) {
            const data = imageData.data;
            const width = imageData.width;
            const height = imageData.height;
            const tempData = new Uint8ClampedArray(data);
            
            // مصفوفة Laplacian للحدة
            const kernel = [-1, -1, -1, -1, 9, -1, -1, -1, -1];
            
            for (let y = 1; y < height - 1; y++) {
                for (let x = 1; x < width - 1; x++) {
                    let r = 0, g = 0, b = 0;
                    let kernelIndex = 0;
                    
                    for (let ky = -1; ky <= 1; ky++) {
                        for (let kx = -1; kx <= 1; kx++) {
                            const pixelIndex = ((y + ky) * width + (x + kx)) * 4;
                            r += tempData[pixelIndex] * kernel[kernelIndex];
                            g += tempData[pixelIndex + 1] * kernel[kernelIndex];
                            b += tempData[pixelIndex + 2] * kernel[kernelIndex];
                            kernelIndex++;
                        }
                    }
                    
                    const index = (y * width + x) * 4;
                    data[index] = Math.max(0, Math.min(255, tempData[index] + r * amount));
                    data[index + 1] = Math.max(0, Math.min(255, tempData[index + 1] + g * amount));
                    data[index + 2] = Math.max(0, Math.min(255, tempData[index + 2] + b * amount));
                }
            }
            
            return imageData;
        }
        
        /**
         * معالجة الصورة بشكل كامل
         */
        function processImage(canvas, brightness = 0, contrast = 0, sharpness = 0) {
            const ctx = canvas.getContext('2d');
            let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            
            // تطبيق التحسينات بالترتيب
            imageData = adjustBrightnessContrast(imageData, brightness, contrast);
            imageData = toGrayscale(imageData);
            imageData = gaussianBlur(imageData, 1);
            imageData = histogramEqualization(imageData);
            
            if (sharpness > 0) {
                imageData = sharpenImage(imageData, sharpness / 100);
            }
            
            imageData = binaryThreshold(imageData, 128);
            
            ctx.putImageData(imageData, 0, 0);
            return canvas;
        }
        
        // ============================================
        // دوال التحكم بالواجهة
        // ============================================
        
        function switchTab(tab) {
            currentTab = tab;
            const cameraSection = document.getElementById('cameraSection');
            const uploadSection = document.getElementById('uploadSection');
            const tabCameraBtn = document.getElementById('tabCameraBtn');
            const tabUploadBtn = document.getElementById('tabUploadBtn');
            const switchCameraBtn = document.getElementById('switchCameraBtn');
            
            if (tab === 'camera') {
                cameraSection.style.display = 'block';
                uploadSection.style.display = 'none';
                tabCameraBtn.style.background = 'rgba(255,215,0,0.2)';
                tabUploadBtn.style.background = 'transparent';
                switchCameraBtn.style.display = 'inline-block';
                if (!scannerInitialized) { initScanner(); }
            } else {
                cameraSection.style.display = 'none';
                uploadSection.style.display = 'block';
                tabUploadBtn.style.background = 'rgba(255,215,0,0.2)';
                tabCameraBtn.style.background = 'transparent';
                switchCameraBtn.style.display = 'none';
                if (html5QrCode && html5QrCode.isScanning) {
                    html5QrCode.stop().then(() => { scannerInitialized = false; });
                }
            }
        }
        
        function initImageUploader() {
            const imageInput = document.getElementById('qrImageInput');
            imageInput.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = new Image();
                    img.onload = function() {
                        // إنشاء canvas للصورة الأصلية
                        const canvas = document.createElement('canvas');
                        canvas.width = img.width;
                        canvas.height = img.height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0);
                        
                        originalImageData = canvas;
                        processedImageCanvas = canvas.cloneNode();
                        const processedCtx = processedImageCanvas.getContext('2d');
                        processedCtx.drawImage(canvas, 0, 0);
                        
                        // عرض المعاينات
                        showPreviews();
                        
                        // إظهار عناصر التحكم
                        document.getElementById('adjustmentControls').style.display = 'block';
                        
                        // محاولة قراءة الباركود
                        attemptBarcodeRead(file);
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            });
        }
        
        function showPreviews() {
            const container = document.getElementById('previewContainer');
            container.innerHTML = '';
            
            // المعاينة الأصلية
            const originalDiv = document.createElement('div');
            originalDiv.className = 'preview-item';
            const originalImg = document.createElement('img');
            originalImg.src = originalImageData.toDataURL();
            originalDiv.appendChild(originalImg);
            const originalLabel = document.createElement('label');
            originalLabel.innerText = 'الصورة الأصلية';
            originalDiv.appendChild(originalLabel);
            container.appendChild(originalDiv);
            
            // المعاينة المعالجة
            const processedDiv = document.createElement('div');
            processedDiv.className = 'preview-item';
            const processedImg = document.createElement('img');
            processedImg.id = 'processedPreview';
            processedImg.src = processedImageCanvas.toDataURL();
            processedDiv.appendChild(processedImg);
            const processedLabel = document.createElement('label');
            processedLabel.innerText = 'الصورة المعالجة';
            processedDiv.appendChild(processedLabel);
            container.appendChild(processedDiv);
            
            container.style.display = 'flex';
        }
        
        function resetAdjustments() {
            document.getElementById('brightnessSlider').value = 0;
            document.getElementById('contrastSlider').value = 0;
            document.getElementById('sharpnessSlider').value = 0;
            document.getElementById('brightnessValue').innerText = '0';
            document.getElementById('contrastValue').innerText = '0';
            document.getElementById('sharpnessValue').innerText = '0';
            updateProcessedImage();
        }
        
        function updateProcessedImage() {
            if (!originalImageData) return;
            
            const brightness = parseInt(document.getElementById('brightnessSlider').value);
            const contrast = parseInt(document.getElementById('contrastSlider').value);
            const sharpness = parseInt(document.getElementById('sharpnessSlider').value);
            
            document.getElementById('brightnessValue').innerText = brightness;
            document.getElementById('contrastValue').innerText = contrast;
            document.getElementById('sharpnessValue').innerText = sharpness;
            
            // نسخ الصورة الأصلية
            const canvas = originalImageData.cloneNode();
            const ctx = canvas.getContext('2d');
            ctx.drawImage(originalImageData, 0, 0);
            
            // تطبيق المعالجة
            processImage(canvas, brightness, contrast, sharpness);
            
            // تحديث المعاينة
            const preview = document.getElementById('processedPreview');
            if (preview) {
                preview.src = canvas.toDataURL();
            }
            
            processedImageCanvas = canvas;
        }
        
        async function attemptBarcodeRead(file) {
            const resultDiv = document.getElementById('uploadResult');
            resultDiv.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري قراءة الباركود...';
            resultDiv.className = 'result-box';
            
            const qrScanner = new Html5Qrcode("qr-reader");
            
            try {
                // محاولة القراءة من الصورة الأصلية أولاً
                const decodedText = await qrScanner.scanFile(file, true);
                if (decodedText) {
                    showSuccessResult(decodedText);
                    return;
                }
            } catch (err) {
                console.log('فشل القراءة من الصورة الأصلية، جاري محاولة الصورة المعالجة...');
            } finally {
                qrScanner.clear();
            }
            
            // محاولة القراءة من الصورة المعالجة
            try {
                const processedDataUrl = processedImageCanvas.toDataURL();
                const blob = await (await fetch(processedDataUrl)).blob();
                const qrScanner2 = new Html5Qrcode("qr-reader");
                const decodedText = await qrScanner2.scanFile(blob, true);
                if (decodedText) {
                    showSuccessResult(decodedText);
                    return;
                }
                qrScanner2.clear();
            } catch (err) {
                console.log('فشل القراءة من الصورة المعالجة');
            }
            
            resultDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> لم يتم العثور على باركود. جرب تحسين الصورة باستخدام المنزلقات أعلاه.';
            resultDiv.className = 'result-box error';
        }
        
        function showSuccessResult(decodedText) {
            const resultDiv = document.getElementById('uploadResult');
            resultDiv.innerHTML = `<i class="fas fa-check-circle"></i> <strong>تم قراءة الباركود بنجاح!</strong><br><span style="font-size: 11px;">${decodedText.substring(0, 200)}</span>`;
            resultDiv.className = 'result-box success';
            showNotification('✓ تم قراءة الباركود بنجاح!', 'success');
        }
        
        async function openScannerModal() {
            document.getElementById('scannerModal').classList.add('active');
            switchTab('camera');
        }
        
        function closeScannerModal() {
            document.getElementById('scannerModal').classList.remove('active');
            if (html5QrCode && html5QrCode.isScanning) {
                html5QrCode.stop().catch(err => console.error(err));
            }
            scannerInitialized = false;
        }
        
        async function initScanner() {
            if (scannerInitialized) return;
            const readerElement = document.getElementById('qr-reader');
            if (!readerElement) return;
            
            html5QrCode = new Html5Qrcode("qr-reader");
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };
            
            try {
                await html5QrCode.start({ facingMode: currentCameraId }, config, onScanSuccess, onScanFailure);
                scannerInitialized = true;
            } catch (err) {
                console.error(err);
            }
        }
        
        async function switchCamera() {
            if (html5QrCode) {
                await html5QrCode.stop();
                scannerInitialized = false;
                currentCameraId = currentCameraId === 'environment' ? 'user' : 'environment';
                initScanner();
            }
        }
        
        function onScanSuccess(decodedText) {
            showNotification('✓ تم مسح الباركود: ' + decodedText.substring(0, 30), 'success');
            closeScannerModal();
        }
        
        function onScanFailure(error) { }
        
        function showNotification(message, type) {
            const notification = document.createElement('div');
            notification.style.cssText = `position: fixed; bottom: 20px; right: 20px; padding: 12px 24px; background: ${type === 'success' ? '#4ade80' : '#f87171'}; color: #000; border-radius: 10px; font-weight: bold; z-index: 3000;`;
            notification.innerText = message;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 3000);
        }
        
        // تحديث الصورة المعالجة عند تغيير المنزلقات
        document.addEventListener('DOMContentLoaded', () => {
            initImageUploader();
            
            document.getElementById('brightnessSlider').addEventListener('input', updateProcessedImage);
            document.getElementById('contrastSlider').addEventListener('input', updateProcessedImage);
            document.getElementById('sharpnessSlider').addEventListener('input', updateProcessedImage);
            
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') closeScannerModal();
            });
        });
    </script>
</body>
</html>
