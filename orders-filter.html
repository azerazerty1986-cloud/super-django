<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ناردو برو - فلترة وإدارة الطلبات</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --gold: #ffd700;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --glass: rgba(255, 255, 255, 0.05);
            --success: #4ade80;
            --error: #f87171;
            --warning: #fbbf24;
            --info: #60a5fa;
        }
        
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0f3460, #16213e);
            color: var(--text-primary);
            direction: rtl;
        }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        .header {
            background: var(--glass);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        .header-title { display: flex; align-items: center; gap: 15px; }
        .header-title i { font-size: 40px; color: var(--gold); }
        .header-title h1 { font-size: 28px; color: var(--gold); margin: 0; }
        
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s;
        }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-gold:hover { background: #ffed4e; transform: translateY(-2px); }
        .btn-outline { background: transparent; border: 2px solid var(--gold); color: var(--gold); }
        .btn-outline:hover { background: rgba(255, 215, 0, 0.1); }
        
        .filter-bar {
            background: var(--glass);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
        }
        
        .filter-title {
            font-size: 18px;
            color: var(--gold);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .filter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .filter-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            color: var(--text-secondary);
        }
        
        .filter-group input, .filter-group select {
            width: 100%;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            background: rgba(0, 0, 0, 0.3);
            color: white;
            font-family: 'Cairo', sans-serif;
        }
        
        .filter-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            flex-wrap: wrap;
        }
        
        .stats-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }
        
        .stat-card {
            background: var(--glass);
            border: 1px solid rgba(255, 215, 0, 0.15);
            border-radius: 15px;
            padding: 15px 25px;
            flex: 1;
            min-width: 120px;
            text-align: center;
        }
        
        .stat-card .number {
            font-size: 28px;
            font-weight: bold;
            color: var(--gold);
        }
        
        .orders-table-container {
            background: var(--glass);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 20px;
            overflow-x: auto;
        }
        
        .orders-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .orders-table th {
            text-align: right;
            padding: 15px;
            background: rgba(255, 215, 0, 0.1);
            color: var(--gold);
            font-weight: bold;
            font-size: 13px;
        }
        
        .orders-table td {
            padding: 12px 15px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.1);
            font-size: 13px;
        }
        
        .orders-table tr:hover td {
            background: rgba(255, 215, 0, 0.05);
        }
        
        .order-status {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            display: inline-block;
        }
        
        .status-pending { background: rgba(251, 191, 36, 0.2); color: var(--warning); }
        .status-received { background: rgba(96, 165, 250, 0.2); color: var(--info); }
        .status-approved { background: rgba(74, 222, 128, 0.2); color: var(--success); }
        .status-delivered { background: rgba(74, 222, 128, 0.2); color: var(--success); }
        
        .action-btn {
            background: none;
            border: none;
            color: var(--gold);
            cursor: pointer;
            padding: 5px 8px;
            border-radius: 8px;
        }
        
        .action-btn:hover { background: rgba(255, 215, 0, 0.2); }
        
        .empty-state {
            text-align: center;
            padding: 60px;
            color: var(--text-secondary);
        }
        
        .empty-state i { font-size: 60px; color: var(--gold); margin-bottom: 15px; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--primary);
            border: 2px solid var(--gold);
            border-radius: 20px;
            padding: 25px;
            max-width: 550px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.2);
        }
        .modal-header h2 { color: var(--gold); margin: 0; font-size: 20px; }
        .close-btn {
            background: none;
            border: none;
            color: var(--gold);
            font-size: 28px;
            cursor: pointer;
        }
        
        .footer {
            text-align: center;
            padding: 30px;
            color: var(--text-secondary);
            border-top: 1px solid rgba(255, 215, 0, 0.2);
            margin-top: 30px;
        }
        
        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: bold;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        @media (max-width: 768px) {
            .filter-grid { grid-template-columns: 1fr; }
            .stats-row { flex-direction: column; }
            .orders-table th, .orders-table td { padding: 8px; font-size: 11px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-title">
                <i class="fas fa-filter"></i>
                <h1>فلترة وإدارة الطلبات</h1>
            </div>
            <div>
                <button class="btn btn-gold" onclick="printReport()">
                    <i class="fas fa-print"></i> طباعة التقرير
                </button>
            </div>
        </div>
        
        <div class="stats-row" id="statsRow">
            <div class="stat-card"><div class="number" id="totalOrders">0</div><div class="label">إجمالي الطلبات</div></div>
            <div class="stat-card"><div class="number" id="pendingOrders">0</div><div class="label">قيد المعالجة</div></div>
            <div class="stat-card"><div class="number" id="completedOrders">0</div><div class="label">مكتملة</div></div>
            <div class="stat-card"><div class="number" id="totalAmount">0</div><div class="label">إجمالي المبيعات (دج)</div></div>
        </div>
        
        <div class="filter-bar">
            <div class="filter-title"><i class="fas fa-sliders-h"></i><span>خيارات الفلترة</span></div>
            <div class="filter-grid">
                <div class="filter-group"><label>رقم الطلب</label><input type="text" id="filterOrderId" placeholder="أدخل رقم الطلب..."></div>
                <div class="filter-group"><label>اسم العميل</label><input type="text" id="filterCustomer" placeholder="اسم العميل..."></div>
                <div class="filter-group"><label>الولاية</label><select id="filterState"><option value="">الكل</option><option value="الجزائر">الجزائر</option><option value="وهران">وهران</option><option value="قسنطينة">قسنطينة</option></select></div>
                <div class="filter-group"><label>الحالة</label><select id="filterStatus"><option value="">الكل</option><option value="pending">قيد المعالجة</option><option value="received">وصل للتاجر</option><option value="approved">تم تعيين موزع</option><option value="delivered">تم التوصيل</option></select></div>
                <div class="filter-group"><label>من تاريخ</label><input type="date" id="filterDateFrom"></div>
                <div class="filter-group"><label>إلى تاريخ</label><input type="date" id="filterDateTo"></div>
                <div class="filter-group"><label>السعر من</label><input type="number" id="filterPriceFrom" placeholder="0"></div>
                <div class="filter-group"><label>السعر إلى</label><input type="number" id="filterPriceTo" placeholder="100000"></div>
            </div>
            <div class="filter-actions">
                <button class="btn btn-gold" onclick="applyFilters()"><i class="fas fa-search"></i> بحث</button>
                <button class="btn btn-outline" onclick="resetFilters()"><i class="fas fa-undo"></i> إعادة تعيين</button>
                <button class="btn btn-outline" onclick="openBarcodeScanner()"><i class="fas fa-camera"></i> قارئ الباركود</button>
                <button class="btn btn-outline" onclick="exportToExcel()"><i class="fas fa-file-excel"></i> تصدير Excel</button>
            </div>
        </div>
        
        <div class="orders-table-container">
            <table class="orders-table">
                <thead><tr><th>رقم الطلب</th><th>التاريخ</th><th>العميل</th><th>الولاية</th><th>الهاتف</th><th>المنتجات</th><th>الإجمالي</th><th>الحالة</th><th>إجراءات</th></tr></thead>
                <tbody id="ordersTableBody"></tbody>
            </table>
        </div>
        
        <div class="footer"><p>© 2026 ناردو برو - نظام فلترة وإدارة الطلبات | جميع الحقوق محفوظة</p></div>
    </div>
    
    <!-- نافذة قارئ الباركود -->
    <div id="scannerModal" class="modal">
        <div class="modal-content" style="max-width: 550px;">
            <div class="modal-header">
                <h2><i class="fas fa-camera"></i> قارئ الباركود</h2>
                <button class="close-btn" onclick="closeScannerModal()">&times;</button>
            </div>
            
            <div style="display: flex; gap: 10px; margin-bottom: 15px; border-bottom: 1px solid rgba(255,215,0,0.2);">
                <button id="tabCameraBtn" class="btn btn-outline" style="flex: 1;" onclick="switchTab('camera')"><i class="fas fa-camera"></i> كاميرا مباشرة</button>
                <button id="tabUploadBtn" class="btn btn-outline" style="flex: 1;" onclick="switchTab('upload')"><i class="fas fa-upload"></i> رفع صورة</button>
            </div>
            
            <div id="cameraSection">
                <div id="qr-reader" style="width: 100%; background: #000; border-radius: 15px; overflow: hidden;"></div>
                <div id="qr-reader-results" style="margin-top: 15px; padding: 12px; background: rgba(255,215,0,0.1); border-radius: 10px; text-align: center;"></div>
                <div style="margin-top: 10px; text-align: center;">
                    <button class="btn btn-outline" onclick="switchCamera()"><i class="fas fa-sync-alt"></i> تبديل الكاميرا</button>
                </div>
            </div>
            
            <div id="uploadSection" style="display: none;">
                <div style="border: 2px dashed rgba(255,215,0,0.3); border-radius: 15px; padding: 30px; text-align: center;">
                    <i class="fas fa-qrcode" style="font-size: 48px; color: var(--gold); margin-bottom: 15px; display: block;"></i>
                    <input type="file" id="qrImageInput" accept="image/*" style="display: none;">
                    <button class="btn btn-gold" onclick="document.getElementById('qrImageInput').click()">
                        <i class="fas fa-folder-open"></i> اختر صورة باركود
                    </button>
                    <p style="margin-top: 10px; font-size: 12px; color: var(--text-secondary);">PNG, JPG, JPEG - حتى 5 ميجابايت</p>
                </div>
                <div id="uploadPreview" style="display: none; text-align: center; margin-top: 15px;">
                    <img id="uploadPreviewImg" style="max-width: 200px; max-height: 200px; border-radius: 10px; border: 2px solid var(--gold);">
                </div>
                <div id="uploadResult" style="margin-top: 15px; padding: 12px; background: rgba(255,215,0,0.1); border-radius: 10px; text-align: center;"></div>
            </div>
        </div>
    </div>
    
    <script>
        // البيانات التجريبية
        let allOrders = [
            { id: "1", originalOrderId: "NAR-2026-000001", date: "2026-04-10", customerName: "أحمد محمد", customerState: "الجزائر", customerPhone: "0555123456", customerAddress: "الجزائر العاصمة", total: 12500, status: "pending", items: [{ name: "منتج 1", quantity: 2, price: 2500 }, { name: "منتج 2", quantity: 1, price: 7500 }] },
            { id: "2", originalOrderId: "NAR-2026-000002", date: "2026-04-11", customerName: "فاطمة زهرة", customerState: "وهران", customerPhone: "0555234567", customerAddress: "وهران", total: 8900, status: "received", items: [{ name: "منتج 3", quantity: 1, price: 8900 }] },
            { id: "3", originalOrderId: "NAR-2026-000003", date: "2026-04-12", customerName: "محمد علي", customerState: "قسنطينة", customerPhone: "0555345678", customerAddress: "قسنطينة", total: 23400, status: "approved", items: [{ name: "منتج 4", quantity: 3, price: 7800 }] },
            { id: "4", originalOrderId: "NAR-2026-000004", date: "2026-04-13", customerName: "سارة أحمد", customerState: "الجزائر", customerPhone: "0555456789", customerAddress: "الجزائر", total: 5600, status: "delivered", items: [{ name: "منتج 5", quantity: 1, price: 5600 }] }
        ];
        
        let filteredOrders = [];
        let html5QrCode = null;
        let currentCameraId = 'environment';
        
        // تحميل البيانات
        function loadOrders() {
            const saved = localStorage.getItem('nardo_orders');
            if (saved) allOrders = JSON.parse(saved);
            else localStorage.setItem('nardo_orders', JSON.stringify(allOrders));
            applyFilters();
            updateStatistics();
        }
        
        function updateStatistics() {
            document.getElementById('totalOrders').innerHTML = allOrders.length;
            document.getElementById('pendingOrders').innerHTML = allOrders.filter(o => o.status === 'pending').length;
            document.getElementById('completedOrders').innerHTML = allOrders.filter(o => o.status === 'delivered' || o.status === 'approved').length;
            document.getElementById('totalAmount').innerHTML = allOrders.reduce((sum, o) => sum + (o.total || 0), 0).toLocaleString();
        }
        
        function applyFilters() {
            const orderId = document.getElementById('filterOrderId').value.trim().toLowerCase();
            const customer = document.getElementById('filterCustomer').value.trim().toLowerCase();
            const state = document.getElementById('filterState').value;
            const status = document.getElementById('filterStatus').value;
            const dateFrom = document.getElementById('filterDateFrom').value;
            const dateTo = document.getElementById('filterDateTo').value;
            const priceFrom = parseFloat(document.getElementById('filterPriceFrom').value) || 0;
            const priceTo = parseFloat(document.getElementById('filterPriceTo').value) || Infinity;
            
            filteredOrders = allOrders.filter(order => {
                if (orderId && !(order.originalOrderId || '').toLowerCase().includes(orderId)) return false;
                if (customer && !(order.customerName || '').toLowerCase().includes(customer)) return false;
                if (state && order.customerState !== state) return false;
                if (status && order.status !== status) return false;
                if (dateFrom && order.date < dateFrom) return false;
                if (dateTo && order.date > dateTo) return false;
                if ((order.total || 0) < priceFrom || (order.total || 0) > priceTo) return false;
                return true;
            });
            renderOrders();
        }
        
        function renderOrders() {
            const tbody = document.getElementById('ordersTableBody');
            if (filteredOrders.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9" class="empty-state"><i class="fas fa-inbox"></i><br>لا توجد طلبات</td></tr>';
                return;
            }
            
            tbody.innerHTML = filteredOrders.map(order => {
                const statusClass = order.status === 'pending' ? 'status-pending' : (order.status === 'received' ? 'status-received' : (order.status === 'approved' ? 'status-approved' : 'status-delivered'));
                const statusText = order.status === 'pending' ? 'قيد المعالجة' : (order.status === 'received' ? 'وصل للتاجر' : (order.status === 'approved' ? 'تم تعيين موزع' : 'تم التوصيل'));
                return `<tr>
                    <td>${order.originalOrderId}</td>
                    <td>${order.date}</td>
                    <td>${order.customerName}</td>
                    <td>${order.customerState}</td>
                    <td>${order.customerPhone}</td>
                    <td>${order.items?.map(i => `${i.name}(${i.quantity})`).join(', ') || '---'}</td>
                    <td>${(order.total || 0).toLocaleString()} دج</td>
                    <td><span class="order-status ${statusClass}">${statusText}</span></td>
                    <td>
                        <button class="action-btn" onclick="viewOrder('${order.id}')"><i class="fas fa-eye"></i></button>
                        <button class="action-btn" onclick="updateStatus('${order.id}')"><i class="fas fa-edit"></i></button>
                        <button class="action-btn" onclick="deleteOrder('${order.id}')"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>`;
            }).join('');
        }
        
        function viewOrder(id) {
            const order = allOrders.find(o => o.id === id);
            if (order) alert(`📦 تفاصيل الطلب\nرقم: ${order.originalOrderId}\nالعميل: ${order.customerName}\nالهاتف: ${order.customerPhone}\nالعنوان: ${order.customerAddress}\nالإجمالي: ${(order.total || 0).toLocaleString()} دج`);
        }
        
        function updateStatus(id) {
            const statusMap = { '0': 'pending', '1': 'received', '2': 'approved', '3': 'delivered' };
            const newStatus = prompt('اختر الحالة:\n0: قيد المعالجة\n1: وصل للتاجر\n2: تم تعيين موزع\n3: تم التوصيل', '0');
            if (newStatus !== null && statusMap[newStatus]) {
                const order = allOrders.find(o => o.id === id);
                if (order) order.status = statusMap[newStatus];
                localStorage.setItem('nardo_orders', JSON.stringify(allOrders));
                loadOrders();
                showNotification('✓ تم تحديث الحالة', 'success');
            }
        }
        
        function deleteOrder(id) {
            if (confirm('هل أنت متأكد من الحذف؟')) {
                allOrders = allOrders.filter(o => o.id !== id);
                localStorage.setItem('nardo_orders', JSON.stringify(allOrders));
                loadOrders();
                showNotification('✓ تم حذف الطلب', 'success');
            }
        }
        
        function resetFilters() {
            document.getElementById('filterOrderId').value = '';
            document.getElementById('filterCustomer').value = '';
            document.getElementById('filterState').value = '';
            document.getElementById('filterStatus').value = '';
            document.getElementById('filterDateFrom').value = '';
            document.getElementById('filterDateTo').value = '';
            document.getElementById('filterPriceFrom').value = '';
            document.getElementById('filterPriceTo').value = '';
            applyFilters();
        }
        
        function exportToExcel() {
            if (filteredOrders.length === 0) { showNotification('لا توجد بيانات للتصدير', 'warning'); return; }
            let csv = '\uFEFFرقم الطلب,التاريخ,العميل,الولاية,الهاتف,الإجمالي,الحالة\n';
            filteredOrders.forEach(o => {
                csv += `"${o.originalOrderId}","${o.date}","${o.customerName}","${o.customerState}","${o.customerPhone}","${o.total}","${o.status}"\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `orders_${new Date().toISOString().slice(0,19)}.csv`;
            link.click();
            URL.revokeObjectURL(link.href);
            showNotification('✓ تم التصدير', 'success');
        }
        
        function printReport() {
            const win = window.open('', '_blank');
            win.document.write(`
                <html dir="rtl"><head><title>تقرير الطلبات</title>
                <style>body{font-family:Arial;padding:20px}table{border-collapse:collapse;width:100%}th,td{border:1px solid #ddd;padding:8px;text-align:right}th{background:#f5f5f5}</style>
                </head><body><h2>تقرير الطلبات</h2><p>التاريخ: ${new Date().toLocaleString('ar-EG')}</p>
                <table><thead><tr><th>رقم الطلب</th><th>التاريخ</th><th>العميل</th><th>الولاية</th><th>الهاتف</th><th>الإجمالي</th><th>الحالة</th></tr></thead>
                <tbody>${filteredOrders.map(o => `<tr><td>${o.originalOrderId}</td><td>${o.date}</td><td>${o.customerName}</td><td>${o.customerState}</td><td>${o.customerPhone}</td><td>${o.total} دج</td><td>${o.status}</td></tr>`).join('')}</tbody></table></body></html>
            `);
            win.document.close();
            win.print();
        }
        
        // ========== قارئ الباركود ==========
        function openBarcodeScanner() {
            document.getElementById('scannerModal').classList.add('active');
            switchTab('camera');
        }
        
        function closeScannerModal() {
            document.getElementById('scannerModal').classList.remove('active');
            if (html5QrCode && html5QrCode.isScanning) {
                html5QrCode.stop().catch(console.error);
            }
            html5QrCode = null;
        }
        
        function switchTab(tab) {
            const cameraSection = document.getElementById('cameraSection');
            const uploadSection = document.getElementById('uploadSection');
            const tabCamera = document.getElementById('tabCameraBtn');
            const tabUpload = document.getElementById('tabUploadBtn');
            
            if (tab === 'camera') {
                cameraSection.style.display = 'block';
                uploadSection.style.display = 'none';
                tabCamera.style.background = 'rgba(255,215,0,0.2)';
                tabUpload.style.background = 'transparent';
                initCamera();
            } else {
                cameraSection.style.display = 'none';
                uploadSection.style.display = 'block';
                tabUpload.style.background = 'rgba(255,215,0,0.2)';
                tabCamera.style.background = 'transparent';
                if (html5QrCode && html5QrCode.isScanning) {
                    html5QrCode.stop();
                }
            }
        }
        
        async function initCamera() {
            if (html5QrCode && html5QrCode.isScanning) return;
            
            const readerElement = document.getElementById('qr-reader');
            readerElement.innerHTML = '';
            
            html5QrCode = new Html5Qrcode("qr-reader");
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };
            
            try {
                await html5QrCode.start({ facingMode: currentCameraId }, config, onScanSuccess, onScanFailure);
                document.getElementById('qr-reader-results').innerHTML = '<i class="fas fa-camera"></i> الكاميرا تعمل... وجهها نحو الباركود';
            } catch (err) {
                document.getElementById('qr-reader-results').innerHTML = '<i class="fas fa-exclamation-triangle"></i> تعذر تشغيل الكاميرا';
                console.error(err);
            }
        }
        
        async function switchCamera() {
            if (html5QrCode && html5QrCode.isScanning) {
                await html5QrCode.stop();
            }
            currentCameraId = currentCameraId === 'environment' ? 'user' : 'environment';
            await initCamera();
        }
        
        function onScanSuccess(decodedText) {
            document.getElementById('qr-reader-results').innerHTML = `<div style="background:rgba(74,222,128,0.2);padding:10px;border-radius:10px"><i class="fas fa-check-circle"></i> تم المسح: ${decodedText.substring(0, 50)}</div>`;
            searchOrder(decodedText);
            setTimeout(() => closeScannerModal(), 2000);
        }
        
        function onScanFailure(error) {}
        
        // رفع الصورة وقراءة الباركود
        document.getElementById('qrImageInput').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            // معاينة الصورة
            const reader = new FileReader();
            reader.onload = function(event) {
                document.getElementById('uploadPreviewImg').src = event.target.result;
                document.getElementById('uploadPreview').style.display = 'block';
            };
            reader.readAsDataURL(file);
            
            // قراءة الباركود
            const resultDiv = document.getElementById('uploadResult');
            resultDiv.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري قراءة الباركود...';
            
            try {
                const html5QrCodeScanner = new Html5Qrcode("uploadSection");
                const decodedText = await html5QrCodeScanner.scanFile(file, false);
                
                if (decodedText) {
                    resultDiv.innerHTML = `<div style="background:rgba(74,222,128,0.2);padding:10px;border-radius:10px"><i class="fas fa-check-circle"></i> ✅ تم القراءة: ${decodedText.substring(0, 100)}</div>`;
                    searchOrder(decodedText);
                    setTimeout(() => closeScannerModal(), 2500);
                } else {
                    resultDiv.innerHTML = '<div style="background:rgba(248,113,113,0.2);padding:10px;border-radius:10px"><i class="fas fa-exclamation-triangle"></i> ❌ لم يتم العثور على باركود</div>';
                }
            } catch (error) {
                resultDiv.innerHTML = `<div style="background:rgba(248,113,113,0.2);padding:10px;border-radius:10px"><i class="fas fa-exclamation-triangle"></i> ❌ فشل القراءة: تأكد من وضوح الباركود</div>`;
                console.error(error);
            }
        });
        
        function searchOrder(barcodeText) {
            let orderId = '';
            // استخراج رقم الطلب من النص
            const match = barcodeText.match(/(?:رقم الطلب|order|#)?\s*[:]?\s*([A-Z]{2,4}[-]?\d{4,}[-]?\d+)/i);
            if (match) orderId = match[1];
            else if (barcodeText.length < 30) orderId = barcodeText;
            
            if (orderId) {
                const order = allOrders.find(o => o.originalOrderId.includes(orderId));
                if (order) {
                    showNotification(`✓ تم العثور على الطلب: ${order.originalOrderId}`, 'success');
                    document.getElementById('filterOrderId').value = orderId;
                    applyFilters();
                } else {
                    showNotification(`❌ لم يتم العثور على طلب برقم: ${orderId}`, 'error');
                }
            } else {
                // بحث عام في جميع البيانات
                const found = allOrders.find(o => JSON.stringify(o).toLowerCase().includes(barcodeText.toLowerCase()));
                if (found) {
                    showNotification(`✓ تم العثور على طلب: ${found.originalOrderId}`, 'success');
                    document.getElementById('filterOrderId').value = found.originalOrderId;
                    applyFilters();
                } else {
                    showNotification('❌ لم يتم العثور على طلب مطابق', 'warning');
                }
            }
        }
        
        function showNotification(message, type) {
            const div = document.createElement('div');
            div.className = 'notification';
            div.style.background = type === 'success' ? '#4ade80' : '#f87171';
            div.style.color = '#fff';
            div.innerHTML = message;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }
        
        // بدء التشغيل
        loadOrders();
    </script>
</body>
</html>
