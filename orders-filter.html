<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ناردو برو - قارئ الباركود مع جدول النتائج</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
        --primary: #1a1a2e;
        --secondary: #16213e;
        --gold: #ffd700;
        --text-primary: #ffffff;
        --text-secondary: #b0b0b0;
        --glass: rgba(255, 255, 255, 0.05);
        --success: #4ade80;
        --error: #f87171;
        --table-header: #0f3460;
        --table-row-even: #16213e;
        --table-row-odd: #1a2a4a;
        --table-hover: #2a3a5a;
    }
    
    body {
        font-family: 'Cairo', sans-serif;
        background: linear-gradient(135deg, #0f3460, #16213e);
        color: var(--text-primary);
        direction: rtl;
    }
    
    .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
    
    .header {
        background: var(--glass);
        border: 1px solid rgba(255, 215, 0, 0.2);
        border-radius: 20px;
        padding: 25px;
        margin-bottom: 30px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 20px;
    }
    
    .header-title { display: flex; align-items: center; gap: 15px; }
    .header-title i { font-size: 40px; color: var(--gold); }
    .header-title h1 { font-size: 28px; color: var(--gold); margin: 0; }
    
    .btn {
        padding: 12px 25px;
        border: none;
        border-radius: 10px;
        font-weight: bold;
        cursor: pointer;
        font-family: 'Cairo', sans-serif;
        transition: all 0.3s;
    }
    .btn-gold { background: var(--gold); color: #000; }
    .btn-gold:hover { background: #ffed4e; transform: translateY(-2px); }
    .btn-outline { background: transparent; border: 2px solid var(--gold); color: var(--gold); }
    .btn-outline:hover { background: rgba(255, 215, 0, 0.1); }
    .btn-danger { background: rgba(248, 113, 113, 0.2); border: 1px solid var(--error); color: var(--error); }
    .btn-danger:hover { background: rgba(248, 113, 113, 0.4); }
    
    /* قسم الجدول */
    .results-section {
        background: var(--glass);
        border: 1px solid rgba(255, 215, 0, 0.2);
        border-radius: 20px;
        padding: 20px;
        margin-bottom: 30px;
    }
    
    .section-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 15px;
        margin-bottom: 20px;
        padding-bottom: 15px;
        border-bottom: 1px solid rgba(255, 215, 0, 0.2);
    }
    
    .section-header h2 { color: var(--gold); font-size: 22px; }
    .section-header h2 i { margin-left: 10px; }
    
    .table-wrapper {
        overflow-x: auto;
        border-radius: 15px;
    }
    
    .results-table {
        width: 100%;
        border-collapse: collapse;
        font-family: 'Cairo', sans-serif;
    }
    
    .results-table th {
        background: var(--table-header);
        color: var(--gold);
        padding: 15px;
        text-align: center;
        font-size: 16px;
        border-bottom: 2px solid var(--gold);
    }
    
    .results-table td {
        padding: 12px 15px;
        text-align: center;
        border-bottom: 1px solid rgba(255, 215, 0, 0.1);
    }
    
    .results-table tr:nth-child(even) {
        background: var(--table-row-even);
    }
    
    .results-table tr:nth-child(odd) {
        background: var(--table-row-odd);
    }
    
    .results-table tr:hover {
        background: var(--table-hover);
        cursor: pointer;
    }
    
    .barcode-value {
        font-family: monospace;
        font-size: 14px;
        direction: ltr;
        display: inline-block;
        background: rgba(0,0,0,0.3);
        padding: 5px 10px;
        border-radius: 8px;
        max-width: 300px;
        overflow-x: auto;
        white-space: nowrap;
    }
    
    .delete-btn {
        background: rgba(248, 113, 113, 0.2);
        border: none;
        color: var(--error);
        padding: 5px 10px;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s;
    }
    
    .delete-btn:hover {
        background: var(--error);
        color: white;
    }
    
    .empty-row td {
        text-align: center;
        padding: 40px;
        color: var(--text-secondary);
    }
    
    /* المودال */
    .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.85);
        z-index: 2000;
        align-items: center;
        justify-content: center;
    }
    .modal.active { display: flex; }
    .modal-content {
        background: var(--primary);
        border: 2px solid var(--gold);
        border-radius: 20px;
        padding: 25px;
        max-width: 500px;
        width: 90%;
    }
    .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        padding-bottom: 10px;
        border-bottom: 1px solid rgba(255, 215, 0, 0.2);
    }
    .modal-header h2 { color: var(--gold); margin: 0; font-size: 20px; }
    .close-btn {
        background: none;
        border: none;
        color: var(--gold);
        font-size: 28px;
        cursor: pointer;
    }
    
    #qr-reader {
        width: 100%;
        max-width: 450px;
        margin: 0 auto;
        background: white;
        border-radius: 15px;
        overflow: hidden;
    }
    
    .upload-section {
        text-align: center;
        border: 2px dashed rgba(255,215,0,0.3);
        border-radius: 15px;
        padding: 30px;
        margin-bottom: 15px;
    }
    
    .preview-container {
        display: flex;
        gap: 15px;
        margin-bottom: 15px;
        flex-wrap: wrap;
        justify-content: center;
    }
    
    .preview-item {
        text-align: center;
    }
    
    .preview-item img {
        max-width: 150px;
        max-height: 150px;
        border-radius: 10px;
        border: 2px solid var(--gold);
    }
    
    .adjustment-controls {
        background: rgba(255,215,0,0.05);
        border: 1px solid rgba(255,215,0,0.2);
        border-radius: 10px;
        padding: 15px;
        margin-bottom: 15px;
    }
    
    .adjustment-controls label {
        display: block;
        font-size: 12px;
        color: var(--text-secondary);
        margin-bottom: 8px;
        margin-top: 10px;
    }
    
    .adjustment-controls input[type="range"] {
        width: 100%;
        cursor: pointer;
    }
    
    .result-box {
        margin-top: 15px;
        padding: 12px;
        background: rgba(255,215,0,0.1);
        border-radius: 10px;
        text-align: center;
    }
    
    .result-box.success {
        background: rgba(74,222,128,0.2);
        color: var(--success);
    }
    
    .footer {
        text-align: center;
        padding: 30px;
        color: var(--text-secondary);
        border-top: 1px solid rgba(255, 215, 0, 0.2);
        margin-top: 30px;
    }
    
    @media (max-width: 768px) {
        .barcode-value { max-width: 150px; font-size: 11px; }
        .results-table th, .results-table td { padding: 8px; font-size: 12px; }
    }
</style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-title">
                <i class="fas fa-qrcode"></i>
                <h1>ناردو برو - قارئ الباركود</h1>
            </div>
            <button class="btn btn-gold" onclick="openScannerModal()">
                <i class="fas fa-camera"></i> مسح باركود جديد
            </button>
        </div>

        <!-- قسم جدول النتائج -->
        <div class="results-section">
            <div class="section-header">
                <h2><i class="fas fa-table-list"></i> نتائج القراءة</h2>
                <button class="btn btn-danger" onclick="clearAllResults()" id="clearAllBtn" style="display: none;">
                    <i class="fas fa-trash-alt"></i> مسح الكل
                </button>
            </div>
            <div class="table-wrapper">
                <table class="results-table" id="resultsTable">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th><i class="fas fa-barcode"></i> قيمة الباركود</th>
                            <th><i class="fas fa-calendar"></i> التاريخ</th>
                            <th><i class="fas fa-clock"></i> الوقت</th>
                            <th><i class="fas fa-cog"></i> إجراء</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr class="empty-row">
                            <td colspan="5">
                                <i class="fas fa-info-circle"></i> لا توجد نتائج بعد. ابدأ بمسح باركود!
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="footer">
            <p>&copy; 2024 ناردو برو - جميع النتائج تظهر في الجدول أعلاه</p>
        </div>
    </div>

    <!-- مودال الماسح -->
    <div id="scannerModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-camera"></i> مسح باركود</h2>
                <button class="close-btn" onclick="closeScannerModal()">&times;</button>
            </div>
            
            <div style="display: flex; gap: 10px; margin-bottom: 15px; border-bottom: 1px solid rgba(255,215,0,0.2);">
                <button id="tabCameraBtn" class="btn btn-outline" style="flex: 1; padding: 8px;" onclick="switchTab('camera')">
                    <i class="fas fa-camera"></i> كاميرا مباشرة
                </button>
                <button id="tabUploadBtn" class="btn btn-outline" style="flex: 1; padding: 8px;" onclick="switchTab('upload')">
                    <i class="fas fa-upload"></i> رفع صورة
                </button>
            </div>
            
            <div id="cameraSection" style="text-align: center;">
                <div id="qr-reader"></div>
                <div id="qr-reader-results" style="margin-top: 15px; padding: 12px; background: rgba(255,215,0,0.1); border-radius: 10px; text-align: center;">
                    <i class="fas fa-info-circle"></i> وجه الكاميرا نحو الباركود
                </div>
            </div>
            
            <div id="uploadSection" style="display: none;">
                <div class="upload-section">
                    <i class="fas fa-qrcode" style="font-size: 48px; color: var(--gold); margin-bottom: 15px; display: block;"></i>
                    <input type="file" id="qrImageInput" accept="image/*" style="display: none;">
                    <button class="btn btn-gold" onclick="document.getElementById('qrImageInput').click()">
                        <i class="fas fa-folder-open"></i> اختر صورة باركود
                    </button>
                </div>
                <div id="previewContainer" class="preview-container" style="display: none;"></div>
                <div id="adjustmentControls" class="adjustment-controls" style="display: none;">
                    <h3 style="color: var(--gold); margin-bottom: 10px; font-size: 14px;">تحسين الصورة</h3>
                    <label>السطوع</label>
                    <input type="range" id="brightnessSlider" min="-100" max="100" value="0" step="5">
                    <label>التباين</label>
                    <input type="range" id="contrastSlider" min="-100" max="100" value="0" step="5">
                    <button class="btn btn-outline" style="width: 100%; margin-top: 10px;" onclick="updateProcessedImage()">تطبيق</button>
                </div>
                <div id="uploadResult" class="result-box">
                    <i class="fas fa-info-circle"></i> انتظر النتيجة بعد رفع الصورة
                </div>
            </div>
            
            <div style="margin-top: 15px; display: flex; gap: 10px; justify-content: center;">
                <button class="btn btn-outline" onclick="switchCamera()" id="switchCameraBtn">
                    <i class="fas fa-sync-alt"></i> تبديل الكاميرا
                </button>
                <button class="btn btn-outline" onclick="closeScannerModal()">
                    <i class="fas fa-times"></i> إغلاق
                </button>
            </div>
        </div>
    </div>

    <script>
        // ========== المتغيرات ==========
        let html5QrCode = null;
        let currentCameraId = 'environment';
        let scannerInitialized = false;
        let currentTab = 'camera';
        let resultsArray = [];
        let nextId = 1;
        
        // ========== دوال الجدول ==========
        
        // تحميل النتائج من localStorage
        function loadResults() {
            const saved = localStorage.getItem('barcodeResults');
            if (saved) {
                resultsArray = JSON.parse(saved);
                nextId = resultsArray.length > 0 ? Math.max(...resultsArray.map(r => r.id)) + 1 : 1;
            }
            renderTable();
        }
        
        // حفظ النتائج
        function saveResults() {
            localStorage.setItem('barcodeResults', JSON.stringify(resultsArray));
        }
        
        // إضافة نتيجة جديدة إلى الجدول
        function addResultToTable(barcodeValue) {
            const now = new Date();
            const date = now.toLocaleDateString('ar-EG');
            const time = now.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            
            const newResult = {
                id: nextId++,
                value: barcodeValue,
                date: date,
                time: time,
                timestamp: now.getTime()
            };
            
            resultsArray.unshift(newResult); // إضافة في البداية
            saveResults();
            renderTable();
            
            // إظهار إشعار
            showNotification('✓ تم إضافة الباركود إلى الجدول', 'success');
        }
        
        // حذف نتيجة
        function deleteResult(id) {
            resultsArray = resultsArray.filter(r => r.id !== id);
            saveResults();
            renderTable();
            showNotification('تم حذف النتيجة', 'info');
        }
        
        // مسح جميع النتائج
        function clearAllResults() {
            if (resultsArray.length === 0) return;
            if (confirm('هل أنت متأكد من مسح جميع النتائج؟')) {
                resultsArray = [];
                nextId = 1;
                saveResults();
                renderTable();
                showNotification('تم مسح جميع النتائج', 'info');
            }
        }
        
        // عرض الجدول
        function renderTable() {
            const tbody = document.getElementById('tableBody');
            const clearBtn = document.getElementById('clearAllBtn');
            
            if (resultsArray.length === 0) {
                tbody.innerHTML = `
                    <tr class="empty-row">
                        <td colspan="5">
                            <i class="fas fa-info-circle"></i> لا توجد نتائج بعد. ابدأ بمسح باركود!
                        </td>
                    </tr>
                `;
                clearBtn.style.display = 'none';
                return;
            }
            
            clearBtn.style.display = 'inline-block';
            
            tbody.innerHTML = resultsArray.map((result, index) => `
                <tr>
                    <td>${index + 1}</td>
                    <td><span class="barcode-value" title="${escapeHtml(result.value)}">${escapeHtml(result.value.length > 50 ? result.value.substring(0, 50) + '...' : result.value)}</span></td>
                    <td>${result.date}</td>
                    <td>${result.time}</td>
                    <td>
                        <button class="delete-btn" onclick="deleteResult(${result.id})" title="حذف">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // ========== دوال معالجة الصور ==========
        
        function toGrayscale(imageData) {
            const data = imageData.data;
            for (let i = 0; i < data.length; i += 4) {
                const gray = data[i] * 0.299 + data[i + 1] * 0.587 + data[i + 2] * 0.114;
                data[i] = gray;
                data[i + 1] = gray;
                data[i + 2] = gray;
            }
            return imageData;
        }
        
        function adjustBrightnessContrast(imageData, brightness = 0, contrast = 0) {
            const data = imageData.data;
            const factor = (259 * (contrast + 255)) / (255 * (259 - contrast));
            for (let i = 0; i < data.length; i += 4) {
                let r = data[i] + brightness;
                let g = data[i + 1] + brightness;
                let b = data[i + 2] + brightness;
                r = Math.max(0, Math.min(255, factor * (r - 128) + 128));
                g = Math.max(0, Math.min(255, factor * (g - 128) + 128));
                b = Math.max(0, Math.min(255, factor * (b - 128) + 128));
                data[i] = r;
                data[i + 1] = g;
                data[i + 2] = b;
            }
            return imageData;
        }
        
        function processImage(canvas, brightness = 0, contrast = 0) {
            const ctx = canvas.getContext('2d');
            let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            imageData = adjustBrightnessContrast(imageData, brightness, contrast);
            imageData = toGrayscale(imageData);
            ctx.putImageData(imageData, 0, 0);
            return canvas;
        }
        
        // ========== دوال الماسح ==========
        
        function switchTab(tab) {
            currentTab = tab;
            const cameraSection = document.getElementById('cameraSection');
            const uploadSection = document.getElementById('uploadSection');
            const tabCameraBtn = document.getElementById('tabCameraBtn');
            const tabUploadBtn = document.getElementById('tabUploadBtn');
            const switchCameraBtn = document.getElementById('switchCameraBtn');
            
            if (tab === 'camera') {
                cameraSection.style.display = 'block';
                uploadSection.style.display = 'none';
                tabCameraBtn.style.background = 'rgba(255,215,0,0.2)';
                tabUploadBtn.style.background = 'transparent';
                switchCameraBtn.style.display = 'inline-block';
                if (!scannerInitialized) { initScanner(); }
            } else {
                cameraSection.style.display = 'none';
                uploadSection.style.display = 'block';
                tabUploadBtn.style.background = 'rgba(255,215,0,0.2)';
                tabCameraBtn.style.background = 'transparent';
                switchCameraBtn.style.display = 'none';
                if (html5QrCode && html5QrCode.isScanning) {
                    html5QrCode.stop().then(() => { scannerInitialized = false; });
                }
            }
        }
        
        async function openScannerModal() {
            document.getElementById('scannerModal').classList.add('active');
            switchTab('camera');
        }
        
        function closeScannerModal() {
            document.getElementById('scannerModal').classList.remove('active');
            if (html5QrCode && html5QrCode.isScanning) {
                html5QrCode.stop().catch(err => console.error(err));
            }
            scannerInitialized = false;
        }
        
        async function initScanner() {
            if (scannerInitialized) return;
            const readerElement = document.getElementById('qr-reader');
            if (!readerElement) return;
            
            html5QrCode = new Html5Qrcode("qr-reader");
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };
            
            try {
                await html5QrCode.start({ facingMode: currentCameraId }, config, onScanSuccess, onScanFailure);
                scannerInitialized = true;
            } catch (err) {
                console.error(err);
            }
        }
        
        async function switchCamera() {
            if (html5QrCode) {
                await html5QrCode.stop();
                scannerInitialized = false;
                currentCameraId = currentCameraId === 'environment' ? 'user' : 'environment';
                initScanner();
            }
        }
        
        // نجاح المسح - إضافة النتيجة إلى الجدول
        function onScanSuccess(decodedText) {
            addResultToTable(decodedText);
            closeScannerModal();
        }
        
        function onScanFailure(error) { }
        
        // ========== رفع الصورة ==========
        
        function initImageUploader() {
            const imageInput = document.getElementById('qrImageInput');
            imageInput.addEventListener('change', async function(e) {
                const file = e.target.files[0];
                if (!file) return;
                
                const resultDiv = document.getElementById('uploadResult');
                resultDiv.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري القراءة...';
                resultDiv.className = 'result-box';
                
                const qrScanner = new Html5Qrcode("qr-reader");
                
                try {
                    const decodedText = await qrScanner.scanFile(file, true);
                    if (decodedText) {
                        resultDiv.innerHTML = `<i class="fas fa-check-circle"></i> تم القراءة بنجاح: ${decodedText.substring(0, 50)}`;
                        resultDiv.className = 'result-box success';
                        addResultToTable(decodedText);
                        closeScannerModal();
                        return;
                    }
                } catch (err) {
                    resultDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> لم يتم العثور على باركود';
                    resultDiv.className = 'result-box error';
                } finally {
                    qrScanner.clear();
                }
            });
        }
        
        function updateProcessedImage() {
            // مبسطة للصورة
        }
        
        function showNotification(message, type) {
            const notification = document.createElement('div');
            const bgColor = type === 'success' ? '#4ade80' : (type === 'error' ? '#f87171' : '#60a5fa');
            notification.style.cssText = `position: fixed; bottom: 20px; right: 20px; padding: 12px 24px; background: ${bgColor}; color: #000; border-radius: 10px; font-weight: bold; z-index: 3000; animation: fadeIn 0.3s;`;
            notification.innerText = message;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 3000);
        }
        
        // ========== التشغيل ==========
        document.addEventListener('DOMContentLoaded', () => {
            loadResults();
            initImageUploader();
            
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') closeScannerModal();
            });
        });
    </script>
</body>
</html>
