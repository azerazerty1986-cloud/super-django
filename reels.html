
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ناردو ريلز | عرض موحد للجميع من تليجرام</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000;
            color: white;
            overflow-x: hidden;
            overflow-y: hidden;
            height: 100vh;
        }

        /* الشريط العلوي */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, #000000cc, #1a2a2acc);
            backdrop-filter: blur(12px);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 215, 0, 0.3);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo i {
            font-size: 28px;
            color: gold;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .logo h1 {
            font-size: 20px;
            background: linear-gradient(135deg, gold, #ffaa00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .stats {
            background: rgba(0, 0, 0, 0.6);
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 14px;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .stats i {
            color: gold;
            margin-left: 5px;
        }

        /* حاوية الريلز */
        .reels-container {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
        }

        .reel-slide {
            height: 100vh;
            scroll-snap-align: start;
            position: relative;
            background: #000;
        }

        .reel-video-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .reel-video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* الأزرار الجانبية */
        .action-sidebar {
            position: absolute;
            bottom: 100px;
            right: 15px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            z-index: 20;
        }

        .action-btn-side {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .action-btn-side i {
            font-size: 24px;
            color: white;
        }

        .action-btn-side span {
            font-size: 11px;
            color: white;
        }

        .action-btn-side.liked i {
            color: #ff3366;
            text-shadow: 0 0 10px #ff3366;
        }

        .action-btn-side:active {
            transform: scale(0.9);
        }

        /* تراكب المعلومات */
        .reel-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            padding: 80px 20px 30px;
            z-index: 10;
        }

        .reel-info {
            max-width: 70%;
        }

        .reel-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .reel-publisher {
            font-size: 14px;
            color: #ccc;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .reel-stats {
            display: flex;
            gap: 15px;
            font-size: 12px;
            color: #aaa;
        }

        .reel-stats span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .reel-id-badge {
            position: absolute;
            top: 80px;
            left: 15px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 10px;
            color: gold;
            z-index: 15;
            font-family: monospace;
        }

        /* أزرار الإضافة */
        .fab-buttons {
            position: fixed;
            bottom: 25px;
            left: 20px;
            z-index: 1000;
            display: flex;
            gap: 15px;
        }

        .fab-btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: linear-gradient(135deg, gold, #ffaa00);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: all 0.2s;
            border: none;
        }

        .fab-btn i {
            font-size: 26px;
            color: #000;
        }

        .fab-btn:active {
            transform: scale(0.95);
        }

        .refresh-btn {
            background: rgba(0,0,0,0.7);
            border: 1px solid gold;
            padding: 8px 16px;
            border-radius: 30px;
            color: gold;
            cursor: pointer;
        }

        /* مودال الرفع */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
        }

        .modal-content {
            background: linear-gradient(135deg, #1a2a2a, #0a1a1a);
            border-radius: 30px;
            padding: 25px;
            width: 90%;
            max-width: 500px;
            border: 1px solid gold;
        }

        .modal-content h3 {
            color: gold;
            margin-bottom: 20px;
        }

        .modal-content input, .modal-content textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: rgba(255,255,255,0.1);
            border: 1px solid gold;
            border-radius: 25px;
            color: white;
        }

        .video-preview {
            display: none;
            margin: 15px 0;
        }

        .video-preview.show {
            display: block;
        }

        .video-preview video {
            width: 100%;
            border-radius: 15px;
            max-height: 200px;
        }

        .upload-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, gold, #ffaa00);
            border: none;
            border-radius: 30px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 15px;
        }

        .notification {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            color: gold;
            padding: 12px 24px;
            border-radius: 50px;
            z-index: 10001;
            font-size: 14px;
            border: 1px solid gold;
            white-space: nowrap;
        }

        /* تذييل بسيط */
        .footer-note {
            position: fixed;
            bottom: 10px;
            right: 15px;
            font-size: 10px;
            color: #555;
            z-index: 999;
        }
    </style>
</head>
<body>

    <!-- الشريط العلوي -->
    <div class="top-bar" id="topBar">
        <div class="logo">
            <i class="fas fa-film"></i>
            <h1>ناردو ريلز</h1>
        </div>
        <div class="stats">
            <i class="fas fa-video"></i>
            <span id="totalReelsCount">0</span>
            <span> ريلز</span>
        </div>
    </div>

    <!-- حاوية الريلز -->
    <div class="reels-container" id="reelsPlayer"></div>

    <!-- أزرار الإضافة -->
    <div class="fab-buttons" id="fabButtons">
        <div class="fab-btn" onclick="openUploadModal()">
            <i class="fas fa-plus"></i>
        </div>
        <div class="fab-btn" onclick="refreshReels()">
            <i class="fas fa-sync-alt"></i>
        </div>
    </div>

    <!-- مودال رفع ريلز -->
    <div class="modal" id="uploadModal">
        <div class="modal-content">
            <h3><i class="fas fa-upload"></i> رفع ريلز جديد</h3>
            <input type="text" id="reelTitleInput" placeholder="عنوان الريلز (اختياري)">
            <input type="file" id="videoInput" accept="video/*" onchange="handleVideoSelect(this)">
            <div class="video-preview" id="videoPreviewDiv">
                <video id="previewVideo" controls></video>
                <button onclick="removeSelectedVideo()" style="margin-top: 5px; background: red; border: none; padding: 5px; border-radius: 20px;">إزالة</button>
            </div>
            <button class="upload-btn" id="uploadBtn" onclick="uploadReelToTelegram()">
                <i class="fab fa-telegram"></i> رفع ونشر للجميع
            </button>
            <button class="upload-btn" onclick="closeUploadModal()" style="background: #333; margin-top: 10px;">
                إلغاء
            </button>
        </div>
    </div>

    <div class="footer-note">
        <i class="fas fa-bolt"></i> ناردو ريلز
    </div>

    <script>
        // ========== نظام الأمان ==========
        const SecuritySystem = {
            sanitize(text) {
                if (!text) return '';
                return text
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#39;')
                    .replace(/javascript:/gi, '')
                    .replace(/onclick=/gi, '')
                    .replace(/onerror=/gi, '')
                    .replace(/onload=/gi, '');
            },
            generateSessionId() {
                return 'sess_' + Math.random().toString(36).substring(2) + Date.now().toString(36);
            }
        };

        // ========== نظام المعرفات ==========
        const IDSystem = {
            counters: { reel: 1, user: 5000 },
            generateId(type) {
                this.counters[type] = (this.counters[type] || 0) + 1;
                const prefix = type === 'reel' ? 'REL' : 'USR';
                const number = this.counters[type].toString().padStart(6, '0');
                return `${prefix}_${number}`;
            },
            saveCounters() { localStorage.setItem('reel_id_counters', JSON.stringify(this.counters)); },
            loadCounters() {
                const saved = localStorage.getItem('reel_id_counters');
                if (saved) this.counters = { ...this.counters, ...JSON.parse(saved) };
            }
        };

        // ========== دوال مساعدة ==========
        const Utils = {
            formatNumber(num) {
                if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
                if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
                return num.toString();
            },
            getTimeAgo(dateString) {
                if (!dateString) return '';
                const now = new Date();
                const past = new Date(dateString);
                const diffInSeconds = Math.floor((now - past) / 1000);
                if (diffInSeconds < 60) return 'الآن';
                if (diffInSeconds < 3600) return `منذ ${Math.floor(diffInSeconds / 60)} دقيقة`;
                if (diffInSeconds < 86400) return `منذ ${Math.floor(diffInSeconds / 3600)} ساعة`;
                if (diffInSeconds < 604800) return `منذ ${Math.floor(diffInSeconds / 86400)} يوم`;
                return 'منذ وقت';
            },
            escapeHtml(text) { return SecuritySystem.sanitize(text); },
            showNotification(msg, type = 'info') {
                const div = document.createElement('div');
                div.className = 'notification';
                const icon = type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️';
                div.innerHTML = `${icon} ${msg}`;
                document.body.appendChild(div);
                setTimeout(() => div.remove(), 3000);
            },
            save(key, data) {
                try { localStorage.setItem(key, JSON.stringify(data)); return true; } 
                catch(e) { return false; }
            },
            load(key, defaultValue = null) {
                try { const data = localStorage.getItem(key); return data ? JSON.parse(data) : defaultValue; } 
                catch(e) { return defaultValue; }
            }
        };

        // ========== إعدادات تليجرام ==========
        const TELEGRAM = {
            botToken: '8576673096:AAHj80CdifTJNlOs6JgouHmjEXl0bM-8Shw',
            channelId: '-1003822964890',
            apiUrl: 'https://api.telegram.org/bot'
        };

        // ========== مستخدم افتراضي (بدون شاشة دخول) ==========
        const DEFAULT_USER = {
            id: 'USR_000001',
            name: 'مستخدم ناردو',
            username: 'nardo_user',
            role: 'user',
            points: 500,
            createdAt: new Date().toISOString()
        };

        let reelsCache = [];
        let currentUser = DEFAULT_USER;
        let userLikes = {};
        let isLoading = false;
        let selectedVideoFile = null;

        // ========== تحميل الإعجابات ==========
        function loadLikes() {
            const userId = currentUser?.id || 'guest';
            const saved = Utils.load(`nardoo_reels_likes_${userId}`);
            userLikes = saved || {};
        }
        
        function saveLikes() {
            const userId = currentUser?.id || 'guest';
            Utils.save(`nardoo_reels_likes_${userId}`, userLikes);
        }

        // ========== جلب الريلز من تليجرام ==========
        async function loadReelsFromTelegram() {
            if (isLoading) return;
            isLoading = true;
            
            showLoadingOverlay(true, "🔄 جاري تحميل الريلز...");
            
            try {
                const url = `${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getUpdates?limit=100`;
                const response = await fetch(url);
                const data = await response.json();
                
                const reels = [];
                
                if (data.ok && data.result) {
                    const updates = [...data.result].reverse();
                    
                    for (const update of updates) {
                        const post = update.channel_post || update.message;
                        if (!post || !post.video) continue;
                        
                        const caption = post.caption || '';
                        let title = '🎬 ريلز';
                        const titleMatch = caption.match(/🎬 (.+?)(?:\n|$)/);
                        if (titleMatch) title = SecuritySystem.sanitize(titleMatch[1]);
                        
                        let publisher = 'ناردو برو';
                        const publisherMatch = caption.match(/👤 (.+?)(?:\n|$)/);
                        if (publisherMatch) publisher = SecuritySystem.sanitize(publisherMatch[1]);
                        
                        const fileRes = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getFile?file_id=${post.video.file_id}`);
                        const fileData = await fileRes.json();
                        
                        if (fileData.ok) {
                            const videoUrl = `https://api.telegram.org/file/bot${TELEGRAM.botToken}/${fileData.result.file_path}`;
                            
                            reels.push({
                                id: post.message_id,
                                reelId: IDSystem.generateId('reel'),
                                title: title,
                                videoUrl: videoUrl,
                                publisher: publisher,
                                views: 0,
                                likes: 0,
                                createdAt: new Date(post.date * 1000).toISOString(),
                                fingerprint: `${post.message_id}_${post.date}`
                            });
                        }
                    }
                }
                
                if (reels.length > 0) {
                    const reelsHash = JSON.stringify(reels.map(r => r.fingerprint));
                    const oldHash = Utils.load('reels_hash', '');
                    
                    if (reelsHash !== oldHash) {
                        reelsCache = reels;
                        Utils.save('nardoo_reels_cache', reels);
                        Utils.save('reels_hash', reelsHash);
                        displayAllReels();
                        updateStats();
                        Utils.showNotification(`📹 تم تحديث ${reels.length} ريلز`, 'success');
                    } else {
                        console.log('لا توجد ريلز جديدة');
                    }
                } else {
                    const cached = Utils.load('nardoo_reels_cache');
                    if (cached && cached.length > 0) {
                        reelsCache = cached;
                        displayAllReels();
                        updateStats();
                    } else {
                        reelsCache = [
                            {
                                id: 1001,
                                reelId: IDSystem.generateId('reel'),
                                title: '🎬 مرحباً بك في ناردو ريلز',
                                videoUrl: 'https://www.w3schools.com/html/mov_bbb.mp4',
                                publisher: 'النظام',
                                views: 0,
                                likes: 0,
                                createdAt: new Date().toISOString()
                            },
                            {
                                id: 1002,
                                reelId: IDSystem.generateId('reel'),
                                title: '✨ قم برفع أول ريلز خاص بك',
                                videoUrl: 'https://www.w3schools.com/html/movie.mp4',
                                publisher: 'النظام',
                                views: 0,
                                likes: 0,
                                createdAt: new Date().toISOString()
                            }
                        ];
                        Utils.save('nardoo_reels_cache', reelsCache);
                        displayAllReels();
                        updateStats();
                    }
                }
            } catch (error) {
                console.error('خطأ:', error);
                const cached = Utils.load('nardoo_reels_cache');
                if (cached) {
                    reelsCache = cached;
                    displayAllReels();
                    updateStats();
                    Utils.showNotification(`⚠️ عرض ${reelsCache.length} ريلز مخزنة`, 'warning');
                } else {
                    Utils.showNotification('❌ فشل الاتصال', 'error');
                }
            } finally {
                isLoading = false;
                showLoadingOverlay(false);
            }
        }

        // ========== رفع ريلز ==========
        async function uploadReelToTelegram() {
            if (!selectedVideoFile) {
                Utils.showNotification('❌ اختر فيديو أولاً', 'error');
                return;
            }
            
            const title = document.getElementById('reelTitleInput').value.trim() || 'ريلز رائع';
            const btn = document.getElementById('uploadBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> جاري الرفع...';
            
            try {
                const formData = new FormData();
                formData.append('chat_id', TELEGRAM.channelId);
                formData.append('video', selectedVideoFile);
                formData.append('caption', `🎬 ${SecuritySystem.sanitize(title)}\n👤 ${SecuritySystem.sanitize(currentUser.name)}\n🆔 ${currentUser.id}\n📅 ${new Date().toLocaleString('ar-EG')}\n\n✅ تم الرفع عبر تطبيق ناردو ريلز`);
                
                const response = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/sendVideo`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.ok) {
                    Utils.showNotification(`✅ تم الرفع بنجاح!`, 'success');
                    setTimeout(() => loadReelsFromTelegram(), 2000);
                    closeUploadModal();
                    removeSelectedVideo();
                } else {
                    throw new Error(data.description || 'فشل الرفع');
                }
            } catch (error) {
                console.error('خطأ:', error);
                Utils.showNotification('❌ فشل الرفع: ' + error.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fab fa-telegram"></i> رفع ونشر للجميع';
            }
        }

        // ========== عرض الريلز ==========
        function displayAllReels() {
            const container = document.getElementById('reelsPlayer');
            
            if (!reelsCache || reelsCache.length === 0) {
                container.innerHTML = `
                    <div style="display: flex; align-items: center; justify-content: center; height: 100%; color: gold; flex-direction: column; text-align: center; padding: 20px;">
                        <i class="fas fa-film" style="font-size: 80px; margin-bottom: 20px;"></i>
                        <h2>لا توجد ريلز</h2>
                        <p style="margin: 15px 0;">اضغط على زر + لرفع أول ريلز</p>
                        <button class="refresh-btn" onclick="loadReelsFromTelegram()" style="margin-top: 20px;">
                            <i class="fas fa-sync-alt"></i> تحميل من تليجرام
                        </button>
                    </div>
                `;
                return;
            }
            
            const sorted = [...reelsCache].reverse();
            
            container.innerHTML = sorted.map(reel => {
                const isLiked = userLikes[reel.id] === true;
                const viewsText = Utils.formatNumber(reel.views || 0);
                const likesText = Utils.formatNumber(reel.likes || 0);
                
                return `
                    <div class="reel-slide" data-reel-id="${reel.id}" data-reel-fingerprint="${reel.fingerprint || reel.id}">
                        <div class="reel-id-badge">
                            <i class="fas fa-fingerprint"></i> ${reel.reelId || `ID: ${reel.id}`}
                        </div>
                        <div class="reel-video-container">
                            <video src="${reel.videoUrl}" preload="metadata" playsinline webkit-playsinline loop></video>
                            <div class="action-sidebar">
                                <div class="action-btn-side ${isLiked ? 'liked' : ''}" onclick="likeReel(${reel.id}, event)">
                                    <i class="fas fa-heart"></i>
                                    <span>${likesText}</span>
                                </div>
                                <div class="action-btn-side" onclick="shareReel('${reel.videoUrl}', event)">
                                    <i class="fas fa-share-alt"></i>
                                    <span>مشاركة</span>
                                </div>
                            </div>
                            <div class="reel-overlay">
                                <div class="reel-info">
                                    <div class="reel-title">
                                        <i class="fas fa-play-circle" style="color: gold;"></i> ${Utils.escapeHtml(reel.title)}
                                    </div>
                                    <div class="reel-publisher">
                                        <i class="fas fa-user-circle"></i> ${Utils.escapeHtml(reel.publisher)}
                                    </div>
                                    <div class="reel-stats">
                                        <span><i class="fas fa-eye"></i> ${viewsText}</span>
                                        <span><i class="fas fa-heart"></i> ${likesText}</span>
                                        <span><i class="fas fa-calendar"></i> ${Utils.getTimeAgo(reel.createdAt)}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            setTimeout(() => {
                const slides = document.querySelectorAll('.reel-slide');
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        const video = entry.target.querySelector('video');
                        if (entry.isIntersecting) {
                            video.play().catch(e => console.log);
                            const reelId = parseInt(entry.target.dataset.reelId);
                            const reel = reelsCache.find(r => r.id === reelId);
                            if (reel && !reel.viewRecorded) {
                                reel.views = (reel.views || 0) + 1;
                                reel.viewRecorded = true;
                                Utils.save('nardoo_reels_cache', reelsCache);
                                updateStats();
                            }
                        } else {
                            video.pause();
                        }
                    });
                }, { threshold: 0.6 });
                slides.forEach(slide => observer.observe(slide));
            }, 100);
        }
        
        function likeReel(reelId, event) {
            event.stopPropagation();
            const reel = reelsCache.find(r => r.id === reelId);
            if (reel) {
                if (userLikes[reelId]) {
                    reel.likes = Math.max(0, (reel.likes || 0) - 1);
                    delete userLikes[reelId];
                } else {
                    reel.likes = (reel.likes || 0) + 1;
                    userLikes[reelId] = true;
                }
                saveLikes();
                Utils.save('nardoo_reels_cache', reelsCache);
                displayAllReels();
                updateStats();
            }
        }
        
        function shareReel(videoUrl, event) {
            event.stopPropagation();
            navigator.clipboard.writeText(videoUrl);
            Utils.showNotification('🔗 تم نسخ رابط الفيديو', 'success');
        }
        
        function updateStats() {
            const totalReels = reelsCache.length;
            const countSpan = document.getElementById('totalReelsCount');
            if (countSpan) countSpan.innerText = totalReels;
        }
        
        function refreshReels() {
            loadReelsFromTelegram();
        }
        
        function handleVideoSelect(input) {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                if (file.size > 50 * 1024 * 1024) {
                    Utils.showNotification('حجم الفيديو كبير جداً (الحد الأقصى 50MB)', 'error');
                    return;
                }
                if (!file.type.startsWith('video/')) {
                    Utils.showNotification('الرجاء اختيار ملف فيديو صالح', 'error');
                    return;
                }
                selectedVideoFile = file;
                const url = URL.createObjectURL(file);
                document.getElementById('previewVideo').src = url;
                document.getElementById('videoPreviewDiv').classList.add('show');
            }
        }
        
        function removeSelectedVideo() {
            selectedVideoFile = null;
            document.getElementById('videoPreviewDiv').classList.remove('show');
            document.getElementById('videoInput').value = '';
            document.getElementById('previewVideo').src = '';
        }
        
        function openUploadModal() {
            document.getElementById('uploadModal').style.display = 'flex';
        }
        
        function closeUploadModal() {
            document.getElementById('uploadModal').style.display = 'none';
            removeSelectedVideo();
            document.getElementById('reelTitleInput').value = '';
        }
        
        function showLoadingOverlay(show, message = "جاري التحميل...") {
            let overlay = document.getElementById('loadingOverlay');
            if (show && !overlay) {
                overlay = document.createElement('div');
                overlay.id = 'loadingOverlay';
                overlay.className = 'loading-overlay';
                overlay.innerHTML = `<i class="fas fa-spinner fa-pulse" style="font-size: 50px; color: gold;"></i><p>${message}</p>`;
                document.body.appendChild(overlay);
            } else if (show && overlay) {
                overlay.style.display = 'flex';
                if(overlay.querySelector('p')) overlay.querySelector('p').innerText = message;
            } else if (!show && overlay) {
                overlay.remove();
            }
        }
        
        // ========== التهيئة ==========
        IDSystem.loadCounters();
        IDSystem.saveCounters();
        loadLikes();
        
        // بدء التحميل فوراً
        loadReelsFromTelegram();
        
        // تحديث تلقائي كل 5 دقائق
        setInterval(() => {
            if (!isLoading) loadReelsFromTelegram();
        }, 300000);
        
        window.onclick = function(e) {
            const modal = document.getElementById('uploadModal');
            if (e.target === modal) closeUploadModal();
        };
        
        console.log('🎬 ناردو ريلز جاهز - بدون شاشة دخول');
    </script>
</body>
</html>
