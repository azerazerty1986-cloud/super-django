<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🏁 سباق السيارات 3B | شاشتان منفصلتان</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a472a, #0a2a1a);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Cairo', 'Segoe UI', system-ui, sans-serif;
            padding: 20px;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            gap: 30px;
            max-width: 1200px;
            width: 100%;
        }

        /* كل شاشة */
        .race-screen {
            background: linear-gradient(135deg, #2a2a2a, #1a1a1a);
            border-radius: 30px;
            padding: 20px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 2px solid #ffd700;
        }

        .screen-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 0 15px;
        }

        .player-name {
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
        }

        .player-controls {
            font-size: 14px;
            color: #aaa;
            background: rgba(0,0,0,0.5);
            padding: 5px 15px;
            border-radius: 20px;
        }

        .race-track {
            position: relative;
            width: 100%;
            height: 200px;
            background: linear-gradient(180deg, #333 0%, #222 100%);
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid #ffd700;
            cursor: pointer;
        }

        /* خطوط الطريق المتحركة */
        .track-lines {
            position: absolute;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 50px,
                rgba(255,215,0,0.3) 50px,
                rgba(255,215,0,0.3) 80px
            );
            animation: moveLines 0.5s linear infinite;
        }

        @keyframes moveLines {
            from { background-position: 0 0; }
            to { background-position: 100px 0; }
        }

        /* السيارة */
        .car {
            position: absolute;
            width: 50px;
            height: 50px;
            transition: all 0.05s ease;
            z-index: 10;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3));
        }

        .car1 {
            top: 75px;
            left: 0;
        }

        .car2 {
            top: 75px;
            left: 0;
        }

        /* شريط التقدم */
        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            margin-top: 15px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ffaa33);
            width: 0%;
            transition: width 0.1s linear;
            border-radius: 10px;
        }

        /* مؤشرات السرعة */
        .speed-indicator {
            position: absolute;
            bottom: 10px;
            right: 15px;
            background: rgba(0,0,0,0.7);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: #ffd700;
            font-family: monospace;
        }

        /* أزرار التحكم */
        .controls-panel {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        button {
            background: linear-gradient(135deg, #ffd700, #ffaa33);
            border: none;
            padding: 12px 25px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: bold;
            color: #1e3c2c;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        button:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 20px rgba(255,215,0,0.4);
        }

        .reset-btn {
            background: linear-gradient(135deg, #ff3366, #cc0052);
            color: white;
        }

        .winner-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            padding: 30px 50px;
            border-radius: 60px;
            font-size: 32px;
            font-weight: bold;
            color: #ffd700;
            border: 3px solid #ffd700;
            z-index: 1000;
            animation: winPop 0.5s ease;
            white-space: nowrap;
        }

        @keyframes winPop {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            80% { transform: translate(-50%, -50%) scale(1.1); }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        @media (max-width: 800px) {
            .player-name { font-size: 18px; }
            .player-controls { font-size: 10px; }
            .car { width: 40px; height: 40px; }
            .winner-message { font-size: 20px; padding: 20px 30px; white-space: nowrap; }
        }
    </style>
</head>
<body>

<div class="game-container">
    <!-- شاشة اللاعب 1 -->
    <div class="race-screen">
        <div class="screen-header">
            <div class="player-name">
                <i class="fas fa-user-ninja"></i> اللاعب 1
            </div>
            <div class="player-controls">
                <i class="fas fa-arrow-left"></i> <i class="fas fa-arrow-right"></i> للتحكم
            </div>
        </div>
        <div class="race-track" id="track1">
            <div class="track-lines"></div>
            <div class="car car1" id="car1">
                <i class="fas fa-car" style="font-size: 45px; color: #ff3366;"></i>
            </div>
            <div class="speed-indicator" id="speed1">🚗 0%</div>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="progress1"></div>
        </div>
    </div>

    <!-- شاشة اللاعب 2 -->
    <div class="race-screen">
        <div class="screen-header">
            <div class="player-name">
                <i class="fas fa-robot"></i> اللاعب 2 (AI)
            </div>
            <div class="player-controls">
                <i class="fas fa-microchip"></i> ذكاء اصطناعي
            </div>
        </div>
        <div class="race-track" id="track2">
            <div class="track-lines"></div>
            <div class="car car2" id="car2">
                <i class="fas fa-car" style="font-size: 45px; color: #33ff66;"></i>
            </div>
            <div class="speed-indicator" id="speed2">🤖 0%</div>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="progress2"></div>
        </div>
    </div>

    <div class="controls-panel">
        <button onclick="resetRace()">
            <i class="fas fa-flag-checkered"></i> سباق جديد
        </button>
        <button class="reset-btn" onclick="fullReset()">
            <i class="fas fa-sync-alt"></i> إعادة تعيين الكل
        </button>
    </div>
</div>

<script>
    // تحميل Font Awesome
    const link = document.createElement('link');
    link.rel = 'stylesheet';
    link.href = 'https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css';
    document.head.appendChild(link);

    // ========== إعدادات اللعبة ==========
    const trackWidth = 500; // عرض المسار بالبكسل
    const finishLine = trackWidth - 60; // خط النهاية (عرض السيارة 50px)
    
    // متغيرات اللاعب 1
    let car1X = 0;
    let car1Speed = 0;
    let isRacing = true;
    let winner = null;
    
    // متغيرات اللاعب 2 (AI)
    let car2X = 0;
    let car2Speed = 1.5;
    let aiInterval = null;
    
    // عناصر DOM
    const car1 = document.getElementById('car1');
    const car2 = document.getElementById('car2');
    const progress1 = document.getElementById('progress1');
    const progress2 = document.getElementById('progress2');
    const speed1 = document.getElementById('speed1');
    const speed2 = document.getElementById('speed2');
    
    // تأثيرات الجسيمات
    let particles = [];
    
    // تحديث مواضع السيارات
    function updatePositions() {
        if (!isRacing) return;
        
        // تحديث موقع اللاعب 1
        car1X = Math.min(car1X, finishLine);
        car1.style.left = car1X + 'px';
        
        // تحديث موقع اللاعب 2 (AI)
        car2X = Math.min(car2X, finishLine);
        car2.style.left = car2X + 'px';
        
        // تحديث شريط التقدم
        const progress1Percent = (car1X / finishLine) * 100;
        const progress2Percent = (car2X / finishLine) * 100;
        progress1.style.width = progress1Percent + '%';
        progress2.style.width = progress2Percent + '%';
        
        // تحديث مؤشرات السرعة
        speed1.innerHTML = `🚗 ${Math.floor(car1Speed)}%`;
        speed2.innerHTML = `🤖 ${Math.floor(car2Speed)}%`;
        
        // التحقق من الفائز
        checkWinner();
    }
    
    // حركة اللاعب 1 (لوحة المفاتيح)
    let keysPressed = {};
    
    document.addEventListener('keydown', (e) => {
        if (!isRacing) return;
        keysPressed[e.key] = true;
        
        // تسارع عند الضغط على السهم الأيمن
        if (e.key === 'ArrowRight' || e.key === '→') {
            car1Speed = Math.min(car1Speed + 2, 15);
        }
        // فرامل عند الضغط على السهم الأيسر
        if (e.key === 'ArrowLeft' || e.key === '←') {
            car1Speed = Math.max(car1Speed - 3, 0);
        }
    });
    
    document.addEventListener('keyup', (e) => {
        delete keysPressed[e.key];
    });
    
    // الاحتكاك - تقليل السرعة تدريجياً
    function applyFriction() {
        if (!isRacing) return;
        if (car1Speed > 0) {
            car1Speed = Math.max(car1Speed - 0.5, 0);
        }
        car1X += car1Speed;
        updatePositions();
    }
    
    // حركة AI (ذكاء اصطناعي متطور)
    function moveAI() {
        if (!isRacing) return;
        
        // AI يزيد سرعته تدريجياً
        if (car2Speed < 12) {
            car2Speed += 0.3;
        }
        
        // AI يتسارع أكثر إذا كان متأخراً
        const behind = car1X - car2X;
        if (behind > 50) {
            car2Speed = Math.min(car2Speed + 1, 14);
        }
        
        // AI يبطئ إذا كان متقدماً جداً
        if (car2X > car1X + 80) {
            car2Speed = Math.max(car2Speed - 1, 4);
        }
        
        car2X += car2Speed;
        updatePositions();
    }
    
    // إنشاء تأثيرات جسيمات
    function createParticles(x, y) {
        for (let i = 0; i < 10; i++) {
            const particle = document.createElement('div');
            particle.style.position = 'fixed';
            particle.style.left = x + 'px';
            particle.style.top = y + 'px';
            particle.style.width = '5px';
            particle.style.height = '5px';
            particle.style.background = '#ffd700';
            particle.style.borderRadius = '50%';
            particle.style.pointerEvents = 'none';
            particle.style.zIndex = '1000';
            particle.style.transition = 'all 0.5s ease-out';
            document.body.appendChild(particle);
            
            const vx = (Math.random() - 0.5) * 10;
            const vy = (Math.random() - 0.5) * 10 - 5;
            
            setTimeout(() => {
                particle.style.transform = `translate(${vx * 10}px, ${vy * 10}px)`;
                particle.style.opacity = '0';
                setTimeout(() => particle.remove(), 500);
            }, 10);
        }
    }
    
    // التحقق من الفائز
    function checkWinner() {
        if (!isRacing) return;
        
        if (car1X >= finishLine) {
            isRacing = false;
            winner = 'اللاعب 1';
            showWinner('🏆 فاز اللاعب 1! 🏆');
            createParticles(window.innerWidth / 2, window.innerHeight / 2);
            if (navigator.vibrate) navigator.vibrate(200);
        } 
        else if (car2X >= finishLine) {
            isRacing = false;
            winner = 'اللاعب 2 (AI)';
            showWinner('🤖 فاز الكمبيوتر! 🤖');
            createParticles(window.innerWidth / 2, window.innerHeight / 2);
            if (navigator.vibrate) navigator.vibrate(200);
        }
    }
    
    // عرض رسالة الفائز
    function showWinner(message) {
        const msgDiv = document.createElement('div');
        msgDiv.className = 'winner-message';
        msgDiv.innerHTML = message;
        document.body.appendChild(msgDiv);
        
        setTimeout(() => {
            msgDiv.remove();
        }, 3000);
    }
    
    // إعادة ضبط السباق
    function resetRace() {
        isRacing = true;
        winner = null;
        
        car1X = 0;
        car1Speed = 0;
        car2X = 0;
        car2Speed = 1.5;
        
        car1.style.left = '0px';
        car2.style.left = '0px';
        
        updatePositions();
        
        // تأثير إعادة الضبط
        createParticles(window.innerWidth / 2, window.innerHeight / 2);
        if (navigator.vibrate) navigator.vibrate(50);
    }
    
    // إعادة تعيين كامل (إعادة تشغيل)
    function fullReset() {
        resetRace();
    }
    
    // التحكم باللمس للجوال
    let touchStartX = 0;
    let touchAccel = 0;
    
    document.addEventListener('touchstart', (e) => {
        touchStartX = e.touches[0].clientX;
        touchAccel = 0;
    });
    
    document.addEventListener('touchmove', (e) => {
        if (!isRacing) return;
        const touchX = e.touches[0].clientX;
        const diff = touchX - touchStartX;
        
        if (diff > 20) {
            car1Speed = Math.min(car1Speed + 1, 15);
            touchStartX = touchX;
        } else if (diff < -20) {
            car1Speed = Math.max(car1Speed - 2, 0);
            touchStartX = touchX;
        }
    });
    
    // تأثيرات الدخان من العجلات
    function createSmoke() {
        if (!isRacing) return;
        
        if (car1Speed > 5) {
            const car1Rect = car1.getBoundingClientRect();
            const trackRect = document.getElementById('track1').getBoundingClientRect();
            createSingleSmoke(car1Rect.right - 10, car1Rect.top + 25, '#ffaa33');
        }
        
        if (car2Speed > 5) {
            const car2Rect = car2.getBoundingClientRect();
            const trackRect = document.getElementById('track2').getBoundingClientRect();
            createSingleSmoke(car2Rect.right - 10, car2Rect.top + 25, '#33ff66');
        }
    }
    
    function createSingleSmoke(x, y, color) {
        const smoke = document.createElement('div');
        smoke.style.position = 'fixed';
        smoke.style.left = x + 'px';
        smoke.style.top = y + 'px';
        smoke.style.width = '8px';
        smoke.style.height = '8px';
        smoke.style.background = color;
        smoke.style.borderRadius = '50%';
        smoke.style.opacity = '0.6';
        smoke.style.pointerEvents = 'none';
        smoke.style.zIndex = '999';
        smoke.style.transition = 'all 0.3s ease-out';
        document.body.appendChild(smoke);
        
        setTimeout(() => {
            smoke.style.transform = 'scale(2)';
            smoke.style.opacity = '0';
            setTimeout(() => smoke.remove(), 300);
        }, 10);
    }
    
    // بدء الحلقات
    setInterval(applyFriction, 50);
    setInterval(moveAI, 60);
    setInterval(createSmoke, 100);
    
    // تحديث المواضع أول مرة
    updatePositions();
    
    // التحكم بالسيارة باستخدام زر الفأرة على المسار
    const track1 = document.getElementById('track1');
    const track2 = document.getElementById('track2');
    
    track1.addEventListener('click', (e) => {
        if (!isRacing) return;
        car1Speed = Math.min(car1Speed + 3, 15);
        createParticles(e.clientX, e.clientY);
    });
    
    track2.addEventListener('click', (e) => {
        if (!isRacing) return;
        // AI يتسارع عند النقر (مساعدة)
        car2Speed = Math.min(car2Speed + 2, 14);
        createParticles(e.clientX, e.clientY);
    });
    
    console.log('🏁 سباق السيارات 3B جاهز!');
    console.log('🎮 استخدم الأسهم ← → للتحكم');
    console.log('📱 اضغط على المسار للتسارع');
</script>
</body>
</html>
