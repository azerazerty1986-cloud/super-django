<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ناردو ريلز | متجر الفيديوهات - تكامل تليجرام كامل</title>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000;
            overflow-x: hidden;
            color: white;
        }

        /* ===== شاشة تسجيل الدخول ===== */
        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f2b23, #1e4a3f);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20000;
            animation: fadeIn 0.5s ease;
        }

        .login-box {
            background: linear-gradient(135deg, rgba(0,0,0,0.8), rgba(0,0,0,0.6));
            backdrop-filter: blur(20px);
            border: 3px solid gold;
            border-radius: 40px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .login-box h2 {
            color: gold;
            margin-bottom: 20px;
            font-size: 28px;
        }

        .login-box input {
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            background: rgba(255,255,255,0.1);
            border: 2px solid gold;
            border-radius: 30px;
            color: white;
            font-size: 16px;
            text-align: center;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, gold, #ffd700);
            border: none;
            border-radius: 30px;
            color: black;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
        }

        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px gold;
        }

        /* ===== شريط المستخدم العلوي ===== */
        .user-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, rgba(0,0,0,0.9), rgba(0,0,0,0.7));
            backdrop-filter: blur(15px);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            z-index: 100;
            border-bottom: 2px solid gold;
        }

        .user-badge {
            background: linear-gradient(135deg, #ff0066, #cc0052);
            padding: 8px 20px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            font-size: 14px;
        }

        .user-stats {
            display: flex;
            gap: 15px;
        }

        .user-stat {
            background: rgba(255,255,255,0.15);
            padding: 5px 15px;
            border-radius: 25px;
            text-align: center;
        }

        .user-stat .number {
            font-size: 18px;
            font-weight: bold;
            color: gold;
        }

        .logout-btn {
            background: rgba(255,0,102,0.3);
            border: none;
            color: white;
            padding: 8px 18px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
        }

        .refresh-btn {
            background: rgba(255,215,0,0.2);
            border: 1px solid gold;
            color: gold;
            padding: 8px 18px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
        }

        /* ===== مشغل الفيديوهات بتجربة تيك توك ===== */
        .reels-player {
            position: fixed;
            top: 70px;
            left: 0;
            width: 100%;
            height: calc(100% - 70px);
            background: #000;
            z-index: 90;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            -webkit-overflow-scrolling: touch;
        }

        .reel-slide {
            position: relative;
            width: 100%;
            height: calc(100vh - 70px);
            scroll-snap-align: start;
            background: #000;
            overflow: hidden;
        }

        .reel-video-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
        }

        .reel-video-container video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }

        /* Overlay للمعلومات */
        .reel-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            padding: 80px 20px 30px;
            pointer-events: none;
        }

        .reel-info {
            pointer-events: auto;
        }

        .reel-title {
            font-size: 18px;
            font-weight: bold;
            color: gold;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .reel-publisher {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .reel-stats {
            display: flex;
            gap: 20px;
            margin-top: 10px;
            font-size: 13px;
        }

        .reel-stats span {
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        /* أزرار التفاعل الجانبية */
        .action-sidebar {
            position: absolute;
            bottom: 120px;
            right: 15px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            z-index: 20;
            pointer-events: auto;
        }

        .action-btn-side {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid rgba(255,215,0,0.5);
        }

        .action-btn-side i {
            font-size: 24px;
            color: white;
        }

        .action-btn-side span {
            font-size: 12px;
            font-weight: bold;
        }

        .action-btn-side:hover {
            transform: scale(1.1);
            background: gold;
            color: black;
        }

        .action-btn-side.liked {
            background: #ff0066;
            border-color: #ff0066;
        }

        /* زر رفع الفيديو */
        .upload-fab {
            position: fixed;
            bottom: 30px;
            left: 20px;
            background: linear-gradient(135deg, gold, #ffd700);
            color: black;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(212, 175, 55, 0.5);
            z-index: 1001;
            border: 2px solid white;
        }

        /* ===== نافذة رفع الريلز ===== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(15px);
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a3a32, #0a1a15);
            border: 3px solid gold;
            border-radius: 30px;
            padding: 25px;
            max-width: 550px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
        }

        .close-modal {
            background: none;
            border: none;
            color: gold;
            font-size: 30px;
            cursor: pointer;
            float: left;
        }

        .upload-area {
            border: 3px dashed gold;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            margin: 15px 0;
        }

        .video-preview {
            display: none;
            margin: 15px 0;
        }

        .video-preview.show {
            display: block;
        }

        .video-preview video {
            width: 100%;
            border-radius: 15px;
            border: 2px solid gold;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border: 2px solid gold;
            border-radius: 12px;
            color: white;
            margin: 10px 0;
        }

        .send-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, gold, #ffd700);
            border: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            margin-top: 15px;
        }

        .fingerprint-card {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 12px;
            text-align: center;
            margin: 15px 0;
        }

        .notification {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: gold;
            color: black;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: bold;
            z-index: 2000;
            animation: fadeIn 0.3s;
            white-space: nowrap;
        }

        .loading-overlay {
            position: fixed;
            top: 70px;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            flex-direction: column;
            gap: 20px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .action-sidebar {
                bottom: 100px;
                right: 10px;
            }
            .action-btn-side {
                width: 45px;
                height: 45px;
            }
            .reel-title {
                font-size: 16px;
            }
            .notification {
                white-space: normal;
                text-align: center;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <!-- شاشة تسجيل الدخول -->
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <i class="fas fa-user-lock" style="font-size: 60px; color: gold;"></i>
            <h2>تسجيل الدخول</h2>
            <input type="text" id="loginUsername" placeholder="اسم المستخدم">
            <button class="login-btn" onclick="login()">دخول <i class="fas fa-sign-in-alt"></i></button>
            <div style="margin-top: 15px; font-size: 12px;">👑 admin | 👤 أي اسم للتسجيل</div>
        </div>
    </div>

    <!-- شريط المستخدم العلوي -->
    <div id="topBar" style="display: none;">
        <div class="user-bar">
            <div class="user-badge"><i class="fas fa-user"></i> <span id="userNameDisplay"></span></div>
            <div class="user-stats">
                <div class="user-stat"><span class="number" id="userPointsDisplay">0</span><div class="label">نقاط</div></div>
                <div class="user-stat"><span class="number" id="totalVideosCount">0</span><div class="label">إجمالي الفيديوهات</div></div>
            </div>
            <div>
                <button class="refresh-btn" onclick="fetchAllVideosFromTelegram()"><i class="fas fa-sync-alt"></i> تحديث</button>
                <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> خروج</button>
            </div>
        </div>
    </div>

    <!-- مشغل الفيديوهات -->
    <div id="reelsPlayer" class="reels-player" style="display: none;"></div>

    <!-- زر رفع الفيديو -->
    <div id="fabButtons" style="display: none;">
        <div class="upload-fab" onclick="openUploadModal()"><i class="fas fa-plus"></i></div>
    </div>

    <!-- نافذة رفع فيديو -->
    <div class="modal" id="uploadModal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeUploadModal()">&times;</button>
            <h2 style="color: gold; text-align: center;"><i class="fas fa-upload"></i> رفع ريلز جديد</h2>
            <div class="upload-area" onclick="document.getElementById('videoInput').click()">
                <i class="fas fa-cloud-upload-alt" style="font-size: 50px; color: gold;"></i>
                <p>اضغط لرفع فيديو (MP4, max 50MB)</p>
            </div>
            <input type="file" id="videoInput" accept="video/*" style="display: none;" onchange="handleVideoSelect(this)">
            <div class="video-preview" id="videoPreviewDiv">
                <video id="previewVideo" controls></video>
                <button class="action-btn" onclick="removeSelectedVideo()" style="margin-top: 5px; background: rgba(255,0,0,0.5); border: none; padding: 8px; border-radius: 20px;">إزالة</button>
            </div>
            <input type="text" class="form-control" id="reelTitleInput" placeholder="عنوان الريلز" value="ريلز رائع">
            <select class="form-control" id="reelCategorySelect">
                <option value="عام">عام</option>
                <option value="منتجات">منتجات</option>
                <option value="وصفات">وصفات</option>
            </select>
            <div class="fingerprint-card">
                <i class="fas fa-fingerprint"></i> البصمة: <span id="thumbprintSpan">---</span>
                <button class="action-btn" onclick="copyThumbprint()" style="margin-right: 10px;">نسخ</button>
            </div>
            <button class="send-btn" id="uploadBtn" onclick="uploadReelToTelegram()"><i class="fab fa-telegram"></i> رفع وتخزين دائم</button>
        </div>
    </div>

    <script>
        // ========== إعدادات تليجرام ==========
        const TELEGRAM = {
            botToken: '8576673096:AAEFKd-YSJcW_0d_wAHZBt-5nPg_VOjDX_0',
            channelId: '-1003822964890',
            channelUsername: '@NardoReelsStore' // للعرض فقط
        };

        // ========== قاعدة البيانات المحلية ==========
        let users = [];
        let reelsDB = [];     // الفيديوهات المخزنة محلياً (مزامنة مع تليجرام)
        let currentUser = null;
        let selectedVideoFile = null;
        let currentThumbprint = "";
        let isLoadingVideos = false;
        
        // تفاعلات المستخدم (إعجابات محلية)
        let userLikes = {}; // { reelId: true/false }
        
        // ========== تحميل البيانات من localStorage ==========
        function loadLocalData() {
            const savedUsers = localStorage.getItem('nardoo_users');
            if(savedUsers) users = JSON.parse(savedUsers);
            else {
                users = [
                    { id: 1, name: 'المدير', username: 'admin', role: 'admin', reelsCount: 0, points: 500, joinDate: '2024-01-01' }
                ];
                localStorage.setItem('nardoo_users', JSON.stringify(users));
            }
            
            const savedReels = localStorage.getItem('nardoo_reels_database');
            if(savedReels) reelsDB = JSON.parse(savedReels);
            else {
                reelsDB = [];
                localStorage.setItem('nardoo_reels_database', JSON.stringify(reelsDB));
            }
            
            const savedLikes = localStorage.getItem('nardoo_user_likes');
            if(savedLikes) userLikes = JSON.parse(savedLikes);
        }
        
        function saveUsers() { localStorage.setItem('nardoo_users', JSON.stringify(users)); }
        function saveReels() { localStorage.setItem('nardoo_reels_database', JSON.stringify(reelsDB)); }
        function saveLikes() { localStorage.setItem('nardoo_user_likes', JSON.stringify(userLikes)); }
        
        // ========== جلب جميع الفيديوهات من قناة التليجرام ==========
        async function fetchAllVideosFromTelegram() {
            if(isLoadingVideos) return;
            isLoadingVideos = true;
            
            showLoadingOverlay(true, "جاري جلب الفيديوهات من قناة التليجرام...");
            
            try {
                // جلب آخر الرسائل من القناة (فيديوهات)
                const url = `https://api.telegram.org/bot${TELEGRAM.botToken}/getUpdates?offset=-1&limit=100`;
                const response = await fetch(url);
                const data = await response.json();
                
                if(!data.ok) throw new Error(data.description || 'فشل الاتصال');
                
                // في الواقع، getUpdates لا يعطي محتوى القناة القديم بسهولة
                // الحل البديل: استخدام getChat و getMessages غير متاح للبوتات العادية
                // لذلك نعتمد على قاعدة البيانات المحلية مع مزامنة عند الرفع
                // ونضيف زر تحديث يدوي لفحص ما إذا كانت هناك فيديوهات جديدة من خلال getUpdates
                
                let newVideosFound = false;
                if(data.result && data.result.length > 0) {
                    for(const update of data.result) {
                        const message = update.message || update.channel_post;
                        if(message && message.video) {
                            const fileId = message.video.file_id;
                            // التحقق إذا كان الفيديو موجود بالفعل في قاعدة البيانات
                            const exists = reelsDB.some(r => r.telegramFileId === fileId);
                            if(!exists) {
                                // الحصول على رابط الفيديو الدائم
                                const fileRes = await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/getFile?file_id=${fileId}`);
                                const fileData = await fileRes.json();
                                if(fileData.ok) {
                                    const videoUrl = `https://api.telegram.org/file/bot${TELEGRAM.botToken}/${fileData.result.file_path}`;
                                    const caption = message.caption || "";
                                    let title = "ريلز جديد";
                                    let publisher = "مستخدم";
                                    let thumbprint = "";
                                    
                                    // استخراج المعلومات من الكابشن
                                    const titleMatch = caption.match(/🎬 (.+?)(?:\n|$)/);
                                    if(titleMatch) title = titleMatch[1];
                                    const userMatch = caption.match(/👤 (.+?)(?:\n|$)/);
                                    if(userMatch) publisher = userMatch[1];
                                    const thumbMatch = caption.match(/🔍 (.+?)(?:\n|$)/);
                                    if(thumbMatch) thumbprint = thumbMatch[1];
                                    
                                    const newReel = {
                                        id: Date.now() + Math.random(),
                                        title: title,
                                        videoUrl: videoUrl,
                                        views: 0,
                                        likes: 0,
                                        publisher: publisher,
                                        publisherId: null,
                                        thumbprint: thumbprint,
                                        category: "عام",
                                        storedInTelegram: true,
                                        telegramFileId: fileId,
                                        createdAt: new Date(message.date * 1000).toISOString()
                                    };
                                    reelsDB.unshift(newReel);
                                    newVideosFound = true;
                                }
                            }
                        }
                    }
                }
                
                if(newVideosFound) {
                    saveReels();
                    showNotif(`✅ تم العثور على ${reelsDB.length} فيديو في القناة`, "success");
                } else {
                    showNotif(`📹 يوجد ${reelsDB.length} فيديو في المكتبة`, "info");
                }
                
                // تحديث واجهة العرض
                if(currentUser) {
                    renderReelsPlayer();
                    updateStatsUI();
                }
                
            } catch(error) {
                console.error("Error fetching videos:", error);
                showNotif("❌ فشل جلب الفيديوهات: " + error.message, "error");
            } finally {
                isLoadingVideos = false;
                showLoadingOverlay(false);
            }
        }
        
        // ========== تسجيل الدخول ==========
        function login() {
            const username = document.getElementById('loginUsername').value.trim();
            if(!username) { showNotif('❌ أدخل اسم المستخدم', "error"); return; }
            
            let user = users.find(u => u.username === username || u.name === username);
            if(!user) {
                user = { 
                    id: Date.now(), 
                    name: username, 
                    username: username, 
                    role: 'user', 
                    reelsCount: 0, 
                    points: 100,
                    joinDate: new Date().toISOString().split('T')[0] 
                };
                users.push(user);
                saveUsers();
            }
            
            currentUser = user;
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('topBar').style.display = 'block';
            document.getElementById('fabButtons').style.display = 'block';
            document.getElementById('reelsPlayer').style.display = 'block';
            document.getElementById('userNameDisplay').innerText = currentUser.name;
            
            updateStatsUI();
            
            // جلب الفيديوهات من التليجرام فور الدخول
            fetchAllVideosFromTelegram();
        }
        
        function logout() {
            currentUser = null;
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('topBar').style.display = 'none';
            document.getElementById('fabButtons').style.display = 'none';
            document.getElementById('reelsPlayer').style.display = 'none';
            document.getElementById('reelsPlayer').innerHTML = '';
        }
        
        function updateStatsUI() {
            if(!currentUser) return;
            document.getElementById('userPointsDisplay').innerText = currentUser.points || 0;
            document.getElementById('totalVideosCount').innerText = reelsDB.length;
        }
        
        // ========== عرض الفيديوهات (تيك توك ستايل) ==========
        function renderReelsPlayer() {
            const container = document.getElementById('reelsPlayer');
            if(!reelsDB.length) {
                container.innerHTML = `<div style="display: flex; align-items: center; justify-content: center; height: 100%; color: gold; flex-direction: column; text-align: center; padding: 20px;">
                    <i class="fas fa-film" style="font-size: 80px;"></i>
                    <h2>لا توجد فيديوهات</h2>
                    <p>اضغط على زر + لرفع أول فيديو، أو اضغط تحديث لجلب الفيديوهات من القناة</p>
                    <button class="refresh-btn" onclick="fetchAllVideosFromTelegram()" style="margin-top: 20px;"><i class="fas fa-sync-alt"></i> تحديث من تليجرام</button>
                </div>`;
                return;
            }
            
            // ترتيب من الأحدث للأقدم
            const sorted = [...reelsDB].reverse();
            container.innerHTML = sorted.map((reel, idx) => {
                const isLiked = userLikes[reel.id] === true;
                return `
                <div class="reel-slide" data-reel-id="${reel.id}" data-index="${idx}">
                    <div class="reel-video-container">
                        <video src="${reel.videoUrl}" preload="metadata" playsinline webkit-playsinline loop></video>
                        <div class="action-sidebar">
                            <div class="action-btn-side ${isLiked ? 'liked' : ''}" onclick="likeReel(${reel.id}, event)">
                                <i class="fas fa-heart"></i>
                                <span>${formatNumber(reel.likes || 0)}</span>
                            </div>
                            <div class="action-btn-side" onclick="shareReel('${reel.videoUrl}', event)">
                                <i class="fas fa-share-alt"></i>
                                <span>مشاركة</span>
                            </div>
                        </div>
                        <div class="reel-overlay">
                            <div class="reel-info">
                                <div class="reel-title">
                                    <i class="fas fa-play-circle" style="color: gold;"></i> ${escapeHtml(reel.title)}
                                </div>
                                <div class="reel-publisher">
                                    <i class="fas fa-user-circle"></i> ${escapeHtml(reel.publisher)}
                                </div>
                                <div class="reel-stats">
                                    <span><i class="fas fa-eye"></i> ${formatNumber(reel.views || 0)}</span>
                                    <span><i class="fas fa-heart"></i> ${formatNumber(reel.likes || 0)}</span>
                                    <span><i class="fas fa-tag"></i> ${reel.category || 'عام'}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            }).join('');
            
            // تفعيل التشغيل التلقائي عند التمرير
            setTimeout(() => {
                const slides = document.querySelectorAll('.reel-slide');
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        const video = entry.target.querySelector('video');
                        if(entry.isIntersecting) {
                            video.play().catch(e => console.log);
                            // زيادة المشاهدات (مرة واحدة لكل جلسة)
                            const reelId = parseInt(entry.target.dataset.reelId);
                            const reel = reelsDB.find(r => r.id === reelId);
                            if(reel && !reel.viewRecordedForSession) {
                                reel.views = (reel.views || 0) + 1;
                                reel.viewRecordedForSession = true;
                                saveReels();
                                updateStatsUI();
                            }
                        } else {
                            video.pause();
                        }
                    });
                }, { threshold: 0.6 });
                
                slides.forEach(slide => observer.observe(slide));
            }, 100);
        }
        
        // ========== الإعجاب ==========
        function likeReel(reelId, event) {
            event.stopPropagation();
            const reel = reelsDB.find(r => r.id === reelId);
            if(reel) {
                if(userLikes[reelId]) {
                    reel.likes = Math.max(0, (reel.likes || 0) - 1);
                    delete userLikes[reelId];
                    showNotif("💔 تم إلغاء الإعجاب", "info");
                } else {
                    reel.likes = (reel.likes || 0) + 1;
                    userLikes[reelId] = true;
                    showNotif("❤️ تم الإعجاب", "success");
                }
                saveReels();
                saveLikes();
                renderReelsPlayer(); // إعادة الرندر لتحديث الواجهة
            }
        }
        
        function shareReel(videoUrl, event) {
            event.stopPropagation();
            navigator.clipboard.writeText(videoUrl);
            showNotif('🔗 تم نسخ رابط الفيديو', "success");
        }
        
        // ========== رفع فيديو جديد وتخزينه في تليجرام ==========
        async function uploadReelToTelegram() {
            if(!selectedVideoFile) { showNotif('❌ اختر فيديو أولاً', "error"); return; }
            if(!currentUser) { showNotif('❌ يرجى تسجيل الدخول', "error"); return; }
            
            const title = document.getElementById('reelTitleInput').value.trim() || 'ريلز جديد';
            const category = document.getElementById('reelCategorySelect').value;
            const btn = document.getElementById('uploadBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> جاري الرفع...';
            
            try {
                const now = new Date();
                const thumb = `REL_${currentUser.id}_${now.getFullYear()}${now.getMonth()+1}${now.getDate()}_${now.getHours()}${now.getMinutes()}${now.getSeconds()}`;
                currentThumbprint = thumb;
                document.getElementById('thumbprintSpan').innerText = thumb;
                
                const formData = new FormData();
                formData.append('chat_id', TELEGRAM.channelId);
                formData.append('video', selectedVideoFile);
                formData.append('caption', `🎬 ${title}\n👤 ${currentUser.name}\n🔍 ${thumb}\n🏷️ ${category}\n📅 ${new Date().toLocaleString('ar-EG')}`);
                
                const uploadRes = await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/sendVideo`, {
                    method: 'POST',
                    body: formData
                });
                const uploadData = await uploadRes.json();
                if(!uploadData.ok) throw new Error(uploadData.description || 'فشل الرفع');
                
                const fileId = uploadData.result.video.file_id;
                const fileRes = await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/getFile?file_id=${fileId}`);
                const fileData = await fileRes.json();
                if(!fileData.ok) throw new Error('فشل الحصول على الرابط');
                
                const videoUrl = `https://api.telegram.org/file/bot${TELEGRAM.botToken}/${fileData.result.file_path}`;
                
                const newReel = {
                    id: Date.now(),
                    title: title,
                    videoUrl: videoUrl,
                    views: 0,
                    likes: 0,
                    publisher: currentUser.name,
                    publisherId: currentUser.id,
                    thumbprint: thumb,
                    category: category,
                    storedInTelegram: true,
                    telegramFileId: fileId,
                    createdAt: new Date().toISOString()
                };
                reelsDB.unshift(newReel);
                saveReels();
                
                currentUser.points = (currentUser.points || 0) + 10;
                currentUser.reelsCount = (currentUser.reelsCount || 0) + 1;
                const idx = users.findIndex(u => u.id === currentUser.id);
                if(idx !== -1) users[idx] = currentUser;
                saveUsers();
                
                updateStatsUI();
                renderReelsPlayer();
                closeUploadModal();
                showNotif('✅ تم التخزين الدائم في تليجرام!', "success");
                
                selectedVideoFile = null;
                document.getElementById('videoPreviewDiv').classList.remove('show');
                document.getElementById('videoInput').value = '';
                
            } catch(err) {
                console.error(err);
                showNotif('❌ فشل الرفع: ' + err.message, "error");
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fab fa-telegram"></i> رفع وتخزين دائم';
            }
        }
        
        function handleVideoSelect(input) {
            if(input.files && input.files[0]) {
                const file = input.files[0];
                if(file.size > 50 * 1024 * 1024) { showNotif('حجم الفيديو يتجاوز 50MB', "error"); return; }
                if(!file.type.startsWith('video/')) { showNotif('ملف غير صالح', "error"); return; }
                selectedVideoFile = file;
                const url = URL.createObjectURL(file);
                const previewVideo = document.getElementById('previewVideo');
                previewVideo.src = url;
                document.getElementById('videoPreviewDiv').classList.add('show');
                
                const now = new Date();
                const thumb = `REL_${currentUser?.id || 'GUEST'}_${now.getFullYear()}${now.getMonth()+1}${now.getDate()}_${now.getHours()}${now.getMinutes()}${now.getSeconds()}`;
                currentThumbprint = thumb;
                document.getElementById('thumbprintSpan').innerText = thumb;
            }
        }
        
        function removeSelectedVideo() {
            selectedVideoFile = null;
            document.getElementById('videoPreviewDiv').classList.remove('show');
            document.getElementById('videoInput').value = '';
            document.getElementById('previewVideo').src = '';
        }
        
        function openUploadModal() {
            if(!currentUser) { showNotif('يجب تسجيل الدخول أولاً', "error"); return; }
            document.getElementById('uploadModal').style.display = 'flex';
            if(!selectedVideoFile) {
                const now = new Date();
                const thumb = `REL_${currentUser.id}_${now.getFullYear()}${now.getMonth()+1}${now.getDate()}_${now.getHours()}${now.getMinutes()}${now.getSeconds()}`;
                currentThumbprint = thumb;
                document.getElementById('thumbprintSpan').innerText = thumb;
            }
        }
        
        function closeUploadModal() {
            document.getElementById('uploadModal').style.display = 'none';
        }
        
        function copyThumbprint() {
            navigator.clipboard.writeText(currentThumbprint);
            showNotif('📋 تم نسخ البصمة', "success");
        }
        
        function showLoadingOverlay(show, message = "جاري التحميل...") {
            let overlay = document.getElementById('loadingOverlay');
            if(show && !overlay) {
                overlay = document.createElement('div');
                overlay.id = 'loadingOverlay';
                overlay.className = 'loading-overlay';
                overlay.innerHTML = `<i class="fas fa-spinner fa-pulse" style="font-size: 50px; color: gold;"></i><p>${message}</p>`;
                document.body.appendChild(overlay);
            } else if(show && overlay) {
                overlay.style.display = 'flex';
                overlay.querySelector('p').innerText = message;
            } else if(!show && overlay) {
                overlay.remove();
            }
        }
        
        function formatNumber(num) {
            if(num >= 1000000) return (num/1000000).toFixed(1)+'M';
            if(num >= 1000) return (num/1000).toFixed(1)+'K';
            return num || 0;
        }
        
        function escapeHtml(str) {
            if(!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if(m === '&') return '&amp;';
                if(m === '<') return '&lt;';
                if(m === '>') return '&gt;';
                return m;
            });
        }
        
        function showNotif(msg, type = "info") {
            const div = document.createElement('div');
            div.className = 'notification';
            const icon = type === "success" ? "✅" : type === "error" ? "❌" : "ℹ️";
            div.innerText = `${icon} ${msg}`;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }
        
        // ========== تهيئة الصفحة ==========
        loadLocalData();
        
        window.onclick = function(e) {
            const modal = document.getElementById('uploadModal');
            if(e.target === modal) closeUploadModal();
        };
    </script>
</body>
