<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>لعبة 3B</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3c2c, #0a2a1a);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Cairo', 'Segoe UI', system-ui, sans-serif;
            padding: 20px;
        }

        .game {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(12px);
            border-radius: 50px;
            padding: 30px 25px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            border: 2px solid #ffd966;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        h1 {
            color: #ffd966;
            font-size: 2rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        h1 i {
            font-size: 2rem;
        }

        .target-number {
            background: linear-gradient(135deg, #ffd966, #ffaa33);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 3.5rem;
            font-weight: bold;
            margin: 10px 0;
        }

        .dice-area {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 25px 0;
            flex-wrap: wrap;
        }

        .dice {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            font-weight: bold;
            box-shadow: 0 8px 0 #999;
            cursor: pointer;
            transition: all 0.1s ease;
            color: #333;
        }

        .dice:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #999;
        }

        .dice.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .score-area {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin: 20px 0;
        }

        .score-card {
            flex: 1;
            background: rgba(255,255,255,0.1);
            padding: 12px;
            border-radius: 25px;
        }

        .score-card .label {
            font-size: 12px;
            color: #aaa;
        }

        .score-card .value {
            font-size: 28px;
            font-weight: bold;
            color: #ffd966;
        }

        .result {
            background: rgba(255,215,0,0.15);
            padding: 12px;
            border-radius: 30px;
            margin: 15px 0;
            font-size: 18px;
            font-weight: bold;
        }

        button {
            background: linear-gradient(135deg, #ffd966, #ffaa33);
            border: none;
            padding: 12px 25px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: bold;
            color: #1e3c2c;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            margin-top: 10px;
        }

        button:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(255,217,102,0.4);
        }

        @media (max-width: 450px) {
            .dice {
                width: 70px;
                height: 70px;
                font-size: 2.2rem;
            }
            .score-card .value {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>

<div class="game">
    <h1>
        <i class="fas fa-cube"></i>
        لعبة 3B
        <i class="fas fa-dice"></i>
    </h1>
    
    <div class="target-number">
        🎯 الرقم المستهدف: <span id="targetNum">?</span>
    </div>

    <div class="dice-area">
        <div class="dice" id="dice1" onclick="rollDice(0)">🎲</div>
        <div class="dice" id="dice2" onclick="rollDice(1)">🎲</div>
        <div class="dice" id="dice3" onclick="rollDice(2)">🎲</div>
    </div>

    <div class="score-area">
        <div class="score-card">
            <div class="label">المجموع الحالي</div>
            <div class="value" id="currentSum">0</div>
        </div>
        <div class="score-card">
            <div class="label">المحاولات</div>
            <div class="value" id="attempts">0</div>
        </div>
        <div class="score-card">
            <div class="label">أفضل نتيجة</div>
            <div class="value" id="bestScore">0</div>
        </div>
    </div>

    <div class="result" id="resultMsg">
        🎲 اضغط على النرد للعب
    </div>

    <button onclick="resetGame()">
        <i class="fas fa-redo-alt"></i> لعبة جديدة
    </button>
</div>

<script>
    // إضافة أيقونات Font Awesome
    const link = document.createElement('link');
    link.rel = 'stylesheet';
    link.href = 'https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css';
    document.head.appendChild(link);

    // متغيرات اللعبة
    let targetNumber = 0;
    let diceValues = [0, 0, 0];
    let attempts = 0;
    let bestScore = localStorage.getItem('bestScore3B') || 0;
    let gameActive = true;

    // عناصر DOM
    const targetSpan = document.getElementById('targetNum');
    const currentSumSpan = document.getElementById('currentSum');
    const attemptsSpan = document.getElementById('attempts');
    const bestScoreSpan = document.getElementById('bestScore');
    const resultMsg = document.getElementById('resultMsg');
    const diceElements = [document.getElementById('dice1'), document.getElementById('dice2'), document.getElementById('dice3')];

    // تحديث العرض
    function updateUI() {
        targetSpan.textContent = targetNumber;
        const sum = diceValues.reduce((a, b) => a + b, 0);
        currentSumSpan.textContent = sum;
        attemptsSpan.textContent = attempts;
        bestScoreSpan.textContent = bestScore;
        
        // تحديث شكل النرد
        for (let i = 0; i < 3; i++) {
            if (diceValues[i] === 0) {
                diceElements[i].innerHTML = '🎲';
                diceElements[i].style.background = 'white';
            } else {
                diceElements[i].innerHTML = diceValues[i];
                diceElements[i].style.background = '#ffd966';
            }
        }
    }

    // رمي نردة واحدة
    function rollDice(index) {
        if (!gameActive) return;
        
        const newValue = Math.floor(Math.random() * 6) + 1;
        diceValues[index] = newValue;
        
        // تحديث واجهة النرد
        diceElements[index].innerHTML = newValue;
        diceElements[index].style.background = '#ffd966';
        
        const sum = diceValues.reduce((a, b) => a + b, 0);
        currentSumSpan.textContent = sum;
        
        // التحقق من الفوز
        if (sum === targetNumber) {
            gameActive = false;
            const pointsEarned = Math.max(1, 10 - attempts);
            resultMsg.innerHTML = `🎉 فوز! 🎉<br> حصلت على ${pointsEarned} نقاط!`;
            resultMsg.style.background = "rgba(46,204,113,0.3)";
            resultMsg.style.color = "#2ecc71";
            
            // تحديث أفضل نتيجة
            if (pointsEarned > bestScore) {
                bestScore = pointsEarned;
                localStorage.setItem('bestScore3B', bestScore);
                bestScoreSpan.textContent = bestScore;
            }
        } 
        // التحقق من الخسارة (تجاوز الرقم)
        else if (sum > targetNumber) {
            gameActive = false;
            resultMsg.innerHTML = `💔 خسارة! 💔<br> تجاوزت الرقم المستهدف (${sum} > ${targetNumber})`;
            resultMsg.style.background = "rgba(231,76,60,0.3)";
            resultMsg.style.color = "#e74c3c";
        }
        // لا تزال اللعبة مستمرة
        else {
            resultMsg.innerHTML = `🎲 مجموعك: ${sum} | تحتاج: ${targetNumber - sum} أخرى`;
            resultMsg.style.background = "rgba(255,215,0,0.15)";
            resultMsg.style.color = "#ffd966";
        }
        
        attempts++;
        attemptsSpan.textContent = attempts;
        
        // تعطيل النرد المرمي (اختياري)
        if (!gameActive) {
            for (let i = 0; i < 3; i++) {
                diceElements[i].classList.add('disabled');
            }
        }
    }

    // إعادة تعيين اللعبة
    function resetGame() {
        // توليد رقم عشوائي بين 6 و 18
        targetNumber = Math.floor(Math.random() * 13) + 6; // 6-18
        diceValues = [0, 0, 0];
        attempts = 0;
        gameActive = true;
        
        // إعادة تعيين واجهة النرد
        for (let i = 0; i < 3; i++) {
            diceElements[i].innerHTML = '🎲';
            diceElements[i].style.background = 'white';
            diceElements[i].classList.remove('disabled');
        }
        
        resultMsg.innerHTML = `🎯 الرقم الجديد: ${targetNumber} | ابدأ الرمي!`;
        resultMsg.style.background = "rgba(255,215,0,0.15)";
        resultMsg.style.color = "#ffd966";
        
        updateUI();
    }

    // تهيئة اللعبة
    function init() {
        bestScoreSpan.textContent = bestScore;
        resetGame();
    }

    init();
</script>
</body>
</html>
