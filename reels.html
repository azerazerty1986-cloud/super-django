<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ناردو ريلز | مشغل قناة التليجرام - تحويلات فقط</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #000; color: white; overflow-x: hidden; }

        .login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #0f2b23, #1e4a3f);
            display: flex; justify-content: center; align-items: center; z-index: 20000;
        }
        .login-box {
            background: rgba(0,0,0,0.8); border: 3px solid gold; border-radius: 40px;
            padding: 40px; width: 90%; max-width: 400px; text-align: center;
        }
        .login-box h2 { color: gold; margin-bottom: 20px; }
        .login-box input {
            width: 100%; padding: 15px; margin: 15px 0;
            background: rgba(255,255,255,0.1); border: 2px solid gold;
            border-radius: 30px; color: white; text-align: center;
        }
        .login-btn {
            width: 100%; padding: 15px;
            background: linear-gradient(135deg, gold, #ffd700);
            border: none; border-radius: 30px; font-weight: bold; cursor: pointer;
        }

        .user-bar {
            position: fixed; top: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(15px);
            padding: 12px 20px; display: flex; justify-content: space-between;
            align-items: center; flex-wrap: wrap; gap: 10px; z-index: 100;
            border-bottom: 2px solid gold;
        }
        .user-badge {
            background: linear-gradient(135deg, #ff0066, #cc0052);
            padding: 8px 20px; border-radius: 50px; display: flex; align-items: center; gap: 10px;
        }
        .user-stats { display: flex; gap: 15px; }
        .user-stat {
            background: rgba(255,255,255,0.15); padding: 5px 15px;
            border-radius: 25px; text-align: center;
            transition: transform 0.3s;
        }
        .user-stat .number { font-size: 18px; font-weight: bold; color: gold; }
        .logout-btn, .refresh-btn, .albums-btn, .stats-btn, .reset-btn {
            background: rgba(255,0,102,0.3); border: none; color: white;
            padding: 8px 18px; border-radius: 50px; cursor: pointer;
            margin-right: 5px;
            transition: all 0.3s;
        }
        .refresh-btn { background: rgba(255,215,0,0.2); border: 1px solid gold; }
        .albums-btn { background: rgba(0,150,255,0.3); border: 1px solid #0096ff; }
        .stats-btn { background: rgba(0,200,100,0.3); border: 1px solid #00c864; }
        .reset-btn { background: rgba(255,0,0,0.3); border: 1px solid #ff0000; }
        .logout-btn:hover, .refresh-btn:hover, .albums-btn:hover, .stats-btn:hover, .reset-btn:hover {
            transform: scale(1.05);
        }

        .albums-screen {
            position: fixed; top: 70px; left: 0; width: 100%;
            height: calc(100% - 70px); background: linear-gradient(135deg, #0a0a0a, #1a1a1a);
            overflow-y: auto; z-index: 90; padding: 20px;
        }
        .albums-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        .album-card {
            background: linear-gradient(135deg, #1e3a2f, #0a2a1f);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            border: 2px solid rgba(255,215,0,0.3);
        }
        .album-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(255,215,0,0.2);
            border-color: gold;
        }
        .album-cover {
            position: relative;
            height: 200px;
            background: linear-gradient(135deg, #ff0066, #ff6600);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .album-cover img, .album-cover video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .album-cover i {
            font-size: 60px;
            color: gold;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .album-info {
            padding: 15px;
        }
        .album-title {
            font-size: 18px;
            font-weight: bold;
            color: gold;
            margin-bottom: 8px;
        }
        .album-meta {
            font-size: 12px;
            color: #aaa;
            display: flex;
            gap: 15px;
            margin-top: 8px;
        }
        .album-count {
            background: rgba(255,215,0,0.2);
            padding: 3px 10px;
            border-radius: 20px;
            display: inline-block;
        }

        .album-player {
            position: fixed; top: 70px; left: 0; width: 100%;
            height: calc(100% - 70px); background: #000;
            z-index: 95; overflow-y: scroll;
            scroll-snap-type: y mandatory;
        }
        .back-to-albums {
            position: fixed; top: 80px; left: 20px;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            padding: 12px 20px; border-radius: 50px;
            color: gold; border: 1px solid gold;
            cursor: pointer; z-index: 96;
            font-size: 14px;
            transition: all 0.3s;
        }
        .back-to-albums:hover {
            background: gold;
            color: black;
        }
        .reel-slide {
            position: relative; width: 100%; height: calc(100vh - 70px);
            scroll-snap-align: start; background: #000;
        }
        .reel-video-container { position: relative; width: 100%; height: 100%; }
        .reel-video-container video {
            width: 100%; height: 100%; object-fit: contain;
        }
        .reel-overlay {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            padding: 80px 20px 30px;
        }
        .reel-id-badge {
            position: absolute; top: 20px; left: 20px;
            background: rgba(0,0,0,0.6); padding: 5px 12px;
            border-radius: 20px; font-size: 12px; z-index: 10;
            font-family: monospace; backdrop-filter: blur(5px);
            border: 1px solid gold;
        }
        .action-sidebar {
            position: absolute; bottom: 120px; right: 15px;
            display: flex; flex-direction: column; gap: 25px; z-index: 20;
        }
        .action-btn-side {
            background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
            width: 50px; height: 50px; border-radius: 50%;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; gap: 5px; cursor: pointer;
            border: 1px solid rgba(255,215,0,0.5);
            transition: all 0.3s;
        }
        .action-btn-side:hover {
            transform: scale(1.1);
        }
        .action-btn-side.liked { background: #ff0066; }
        .upload-fab {
            position: fixed; bottom: 30px; left: 20px;
            background: linear-gradient(135deg, gold, #ffd700);
            color: black; width: 55px; height: 55px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; cursor: pointer; z-index: 1001; border: 2px solid white;
            transition: all 0.3s;
        }
        .upload-fab:hover {
            transform: scale(1.1) rotate(90deg);
        }

        .modal {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.95);
            backdrop-filter: blur(15px); justify-content: center;
            align-items: center; z-index: 10000;
        }
        .modal-content {
            background: linear-gradient(135deg, #1a3a32, #0a1a15);
            border: 3px solid gold; border-radius: 30px; padding: 25px;
            max-width: 550px; width: 90%; max-height: 85vh; overflow-y: auto;
        }
        .upload-area {
            border: 3px dashed gold; border-radius: 20px; padding: 30px;
            text-align: center; cursor: pointer; margin: 15px 0;
            transition: all 0.3s;
        }
        .upload-area:hover {
            background: rgba(255,215,0,0.1);
        }
        .video-preview { display: none; margin: 15px 0; }
        .video-preview.show { display: block; }
        .video-preview video { width: 100%; border-radius: 15px; }
        .form-control {
            width: 100%; padding: 12px; background: rgba(255,255,255,0.1);
            border: 2px solid gold; border-radius: 12px; color: white; margin: 10px 0;
        }
        select.form-control { cursor: pointer; }
        .send-btn {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, gold, #ffd700);
            border: none; border-radius: 50px; font-weight: bold; cursor: pointer;
            transition: all 0.3s;
        }
        .send-btn:hover {
            transform: scale(1.02);
        }
        .notification {
            position: fixed; bottom: 100px; left: 50%;
            transform: translateX(-50%); background: gold; color: black;
            padding: 12px 25px; border-radius: 50px; font-weight: bold;
            z-index: 2000; animation: fadeIn 0.3s; white-space: nowrap;
        }
        .loading-overlay {
            position: fixed; top: 70px; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9); display: flex; justify-content: center;
            align-items: center; z-index: 1000; flex-direction: column; gap: 20px;
        }
        .stats-panel {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #1a3a32, #0a1a15);
            border: 3px solid gold; border-radius: 30px; padding: 30px;
            z-index: 2001; min-width: 300px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }
        .channel-badge {
            background: #0088cc;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (max-width: 600px) {
            .action-sidebar { bottom: 100px; right: 10px; }
            .action-btn-side { width: 45px; height: 45px; }
            .notification { white-space: normal; font-size: 12px; }
            .albums-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 15px; }
            .user-bar { flex-direction: column; }
            .user-stats { order: 2; }
            .user-badge { order: 1; }
            div:last-child { order: 3; }
        }
    </style>
</head>
<body>
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <i class="fas fa-film" style="font-size: 60px; color: gold; margin-bottom: 20px;"></i>
            <h2>ناردو ريلز | مشغل القناة</h2>
            <input type="text" id="loginUsername" placeholder="اسم المستخدم">
            <button class="login-btn" onclick="login()">دخول <i class="fas fa-sign-in-alt"></i></button>
            <div style="margin-top: 15px; font-size: 12px;">👤 أدخل أي اسم للدخول</div>
        </div>
    </div>

    <div id="topBar" style="display: none;">
        <div class="user-bar">
            <div class="user-badge"><i class="fas fa-user"></i> <span id="userNameDisplay"></span></div>
            <div class="user-stats">
                <div class="user-stat"><span class="number" id="totalReelsCount">0</span><div class="label">التحويلات</div></div>
                <div class="user-stat"><span class="number" id="totalAlbumsCount">0</span><div class="label">ألبومات</div></div>
            </div>
            <div id="topButtons"></div>
        </div>
    </div>

    <div id="albumsView" class="albums-screen" style="display: none;"></div>
    <div id="albumPlayer" class="album-player" style="display: none;"></div>

    <div id="fabButtons" style="display: none;">
        <div class="upload-fab" onclick="openUploadModal()"><i class="fas fa-plus"></i></div>
    </div>

    <div class="modal" id="uploadModal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeUploadModal()" style="background: none; border: none; color: gold; font-size: 30px; float: left; cursor: pointer;">&times;</button>
            <h2 style="color: gold; text-align: center;"><i class="fas fa-upload"></i> تحويل ريلز جديد</h2>
            <div class="upload-area" onclick="document.getElementById('videoInput').click()">
                <i class="fas fa-cloud-upload-alt" style="font-size: 50px; color: gold;"></i>
                <p>اضغط لرفع فيديو للتحويل إلى القناة (MP4, max 50MB)</p>
            </div>
            <input type="file" id="videoInput" accept="video/*" style="display: none;" onchange="handleVideoSelect(this)">
            <div class="video-preview" id="videoPreviewDiv">
                <video id="previewVideo" controls></video>
                <button onclick="removeSelectedVideo()" style="margin-top: 5px; background: rgba(255,0,0,0.5); border: none; padding: 8px; border-radius: 20px; cursor: pointer;">إزالة</button>
            </div>
            <input type="text" class="form-control" id="reelTitleInput" placeholder="عنوان الريلز" value="ريلز رائع">
            <select class="form-control" id="albumSelect">
                <option value="">اختر ألبوم (اختياري)</option>
                <option value="جديد">✨ جديد</option>
                <option value="مميز">⭐ مميز</option>
                <option value="تحديات">🎯 تحديات</option>
                <option value="تعليمي">📚 تعليمي</option>
                <option value="ترفيه">🎭 ترفيه</option>
            </select>
            <button class="send-btn" id="uploadBtn" onclick="uploadReelToTelegram()"><i class="fab fa-telegram"></i> تحويل إلى القناة</button>
        </div>
    </div>

    <script>
        // ========== إعدادات تليجرام ==========
        const TELEGRAM = {
            botToken: '8576673096:AAECPDHWRTVQ_juq68hxM9PIdacnqevGRb4',
            channelId: '-1003822964890',
            apiUrl: 'https://api.telegram.org/bot'
        };

        // ========== المتغيرات العامة ==========
        let reelsCache = [];      // فقط الفيديوهات من القناة
        let users = [];
        let currentUser = null;
        let selectedVideoFile = null;
        let userLikes = {};
        let isLoading = false;
        let currentAlbum = null;
        
        // متغيرات التخزين الدائم
        let lastUpdateId = parseInt(localStorage.getItem('last_update_id')) || 0;
        let allMessageIds = JSON.parse(localStorage.getItem('all_message_ids') || '[]');
        let processedMessageIds = JSON.parse(localStorage.getItem('processed_message_ids') || '[]');

        // ========== جلب الفيديوهات من القناة فقط ==========
        
        function extractAlbumFromCaption(caption) {
            if (!caption) return 'عام';
            const albumMatch = caption.match(/📁 (.+?)(?:\n|$)/);
            if (albumMatch) return albumMatch[1];
            const hashMatch = caption.match(/#(\w+)/);
            if (hashMatch) return hashMatch[1];
            return 'عام';
        }
        
        async function extractVideoFromPost(post) {
            try {
                const caption = post.caption || '';
                
                let title = '🎬 ريلز';
                const titleMatch = caption.match(/🎬 (.+?)(?:\n|$)/);
                if (titleMatch) title = titleMatch[1];
                
                let publisher = 'ناردو برو';
                const publisherMatch = caption.match(/👤 (.+?)(?:\n|$)/);
                if (publisherMatch) publisher = publisherMatch[1];
                
                const album = extractAlbumFromCaption(caption);
                
                const fileRes = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getFile?file_id=${post.video.file_id}`);
                const fileData = await fileRes.json();
                
                if (fileData.ok) {
                    const videoUrl = `https://api.telegram.org/file/bot${TELEGRAM.botToken}/${fileData.result.file_path}`;
                    
                    return {
                        id: post.message_id,
                        title: title,
                        videoUrl: videoUrl,
                        publisher: publisher,
                        album: album,
                        caption: caption,
                        views: 0,
                        likes: userLikes[post.message_id] ? 1 : 0,
                        createdAt: new Date(post.date * 1000).toISOString(),
                        fileId: post.video.file_id,
                        fromChannel: true
                    };
                }
            } catch (error) {
                console.error('خطأ في استخراج الفيديو:', error);
            }
            return null;
        }
        
        // جلب جميع الفيديوهات من القناة (التحديثات)
        async function fetchChannelVideos() {
            let allVideos = [];
            let offset = 0;
            let hasMore = true;
            let iterationCount = 0;
            
            showLoadingOverlay(true, "🔄 جلب التحويلات من القناة...");
            
            while (hasMore && iterationCount < 50) {
                try {
                    let url = `${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getUpdates?limit=100`;
                    if (offset > 0) {
                        url += `&offset=${offset}`;
                    }
                    
                    const response = await fetch(url);
                    const data = await response.json();
                    
                    if (data.ok && data.result && data.result.length > 0) {
                        for (const update of data.result) {
                            const messageId = update.update_id;
                            
                            if (!allMessageIds.includes(messageId)) {
                                allMessageIds.push(messageId);
                            }
                            
                            // التحقق من أن المنشور من القناة المحددة
                            const post = update.channel_post || update.message;
                            if (post && post.video && post.chat && post.chat.id.toString() === TELEGRAM.channelId) {
                                if (!processedMessageIds.includes(post.message_id)) {
                                    const video = await extractVideoFromPost(post);
                                    if (video) {
                                        allVideos.push(video);
                                        processedMessageIds.push(post.message_id);
                                    }
                                }
                            }
                            
                            offset = messageId + 1;
                        }
                        
                        localStorage.setItem('all_message_ids', JSON.stringify(allMessageIds));
                        localStorage.setItem('processed_message_ids', JSON.stringify(processedMessageIds));
                        localStorage.setItem('last_update_id', offset);
                        
                        if (data.result.length < 100) {
                            hasMore = false;
                        }
                        
                        iterationCount++;
                        await new Promise(resolve => setTimeout(resolve, 500));
                        
                    } else {
                        hasMore = false;
                    }
                    
                } catch (error) {
                    console.error('خطأ في جلب الفيديوهات:', error);
                    hasMore = false;
                }
            }
            
            showLoadingOverlay(false);
            return allVideos;
        }
        
        // جلب الفيديوهات الجديدة فقط من القناة
        async function fetchNewChannelVideos() {
            try {
                let url = `${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getUpdates?limit=100`;
                if (lastUpdateId > 0) {
                    url += `&offset=${lastUpdateId + 1}`;
                }
                
                const response = await fetch(url);
                const data = await response.json();
                
                const newVideos = [];
                
                if (data.ok && data.result) {
                    for (const update of data.result) {
                        const post = update.channel_post || update.message;
                        
                        if (update.update_id > lastUpdateId) {
                            lastUpdateId = update.update_id;
                        }
                        
                        // فقط المنشورات من القناة المحددة
                        if (post && post.video && post.chat && post.chat.id.toString() === TELEGRAM.channelId) {
                            const exists = reelsCache.some(r => r.id === post.message_id);
                            if (!exists && !processedMessageIds.includes(post.message_id)) {
                                const video = await extractVideoFromPost(post);
                                if (video) {
                                    newVideos.push(video);
                                    processedMessageIds.push(post.message_id);
                                }
                            }
                        }
                    }
                    
                    localStorage.setItem('last_update_id', lastUpdateId);
                    localStorage.setItem('processed_message_ids', JSON.stringify(processedMessageIds));
                    
                    if (newVideos.length > 0) {
                        console.log(`✅ تم العثور على ${newVideos.length} تحويلات جديدة`);
                    }
                }
                
                return newVideos;
                
            } catch (error) {
                console.error('خطأ في جلب التحويلات الجديدة:', error);
                return [];
            }
        }
        
        // الدالة الرئيسية لتحميل الفيديوهات من القناة
        async function loadReelsFromTelegram() {
            if (isLoading) return;
            isLoading = true;
            
            try {
                // 1. تحميل الكاش المحلي أولاً (فيديوهات القناة فقط)
                const cachedVideos = localStorage.getItem('nardoo_reels_cache');
                let localVideos = [];
                
                if (cachedVideos) {
                    localVideos = JSON.parse(cachedVideos);
                    // التأكد أن الفيديوهات من القناة فقط
                    localVideos = localVideos.filter(v => v.fromChannel === true);
                    if (localVideos.length > 0) {
                        reelsCache = localVideos;
                        console.log(`📦 تم تحميل ${reelsCache.length} تحويل من الكاش المحلي`);
                        updateStats();
                        
                        if (currentAlbum === null) {
                            showAlbumsView();
                        } else {
                            showAlbumContent(currentAlbum);
                        }
                    }
                }
                
                // 2. جلب التحويلات الجديدة من القناة
                const newVideos = await fetchNewChannelVideos();
                
                if (newVideos.length > 0) {
                    reelsCache = [...newVideos, ...reelsCache];
                    localStorage.setItem('nardoo_reels_cache', JSON.stringify(reelsCache));
                    console.log(`✅ تمت إضافة ${newVideos.length} تحويلات جديدة`);
                    showNotification(`📹 تمت إضافة ${newVideos.length} تحويل جديد`, 'success');
                    
                    if (currentAlbum === null) {
                        showAlbumsView();
                    } else {
                        showAlbumContent(currentAlbum);
                    }
                }
                
                updateStats();
                
                // 3. مزامنة كاملة مرة واحدة في اليوم
                const lastFullSync = localStorage.getItem('last_full_sync');
                const today = new Date().toDateString();
                
                if (!lastFullSync || lastFullSync !== today) {
                    console.log('🔄 جاري المزامنة الكاملة مع القناة...');
                    setTimeout(async () => {
                        const allVideos = await fetchChannelVideos();
                        if (allVideos.length > reelsCache.length) {
                            reelsCache = allVideos;
                            localStorage.setItem('nardoo_reels_cache', JSON.stringify(reelsCache));
                            console.log(`✅ اكتملت المزامنة الكاملة: ${reelsCache.length} تحويل`);
                            localStorage.setItem('last_full_sync', today);
                            
                            if (currentAlbum === null) {
                                showAlbumsView();
                            } else {
                                showAlbumContent(currentAlbum);
                            }
                            updateStats();
                            showNotification(`✅ تمت المزامنة الكاملة: ${reelsCache.length} تحويل`, 'success');
                        }
                    }, 3000);
                }
                
            } catch (error) {
                console.error('❌ خطأ في التحميل:', error);
                showNotification('❌ فشل الاتصال بتليجرام', 'error');
                
                const cachedVideos = localStorage.getItem('nardoo_reels_cache');
                if (cachedVideos && reelsCache.length === 0) {
                    reelsCache = JSON.parse(cachedVideos).filter(v => v.fromChannel === true);
                    updateStats();
                    
                    if (currentAlbum === null) {
                        showAlbumsView();
                    } else {
                        showAlbumContent(currentAlbum);
                    }
                    showNotification(`⚠️ عرض ${reelsCache.length} تحويل من الذاكرة`, 'warning');
                }
            } finally {
                isLoading = false;
            }
        }
        
        // تجميع التحويلات في ألبومات
        function groupReelsIntoAlbums() {
            const albums = {};
            reelsCache.forEach(reel => {
                const albumName = reel.album || 'عام';
                if (!albums[albumName]) {
                    albums[albumName] = [];
                }
                albums[albumName].push(reel);
            });
            return albums;
        }
        
        // عرض الألبومات
        function showAlbumsView() {
            currentAlbum = null;
            document.getElementById('albumsView').style.display = 'block';
            document.getElementById('albumPlayer').style.display = 'none';
            
            const albums = groupReelsIntoAlbums();
            const albumCount = Object.keys(albums).length;
            document.getElementById('totalAlbumsCount').innerText = albumCount;
            
            const container = document.getElementById('albumsView');
            
            if (Object.keys(albums).length === 0) {
                container.innerHTML = `
                    <div style="display: flex; align-items: center; justify-content: center; height: 100%; flex-direction: column; text-align: center;">
                        <i class="fas fa-folder-open" style="font-size: 80px; color: gold; margin-bottom: 20px;"></i>
                        <h2>لا توجد تحويلات</h2>
                        <p>قم بتحويل فيديوهات إلى القناة</p>
                        <div class="channel-badge" style="margin: 20px auto;">
                            <i class="fab fa-telegram"></i> القناة: ناردو ريلز
                        </div>
                        <button class="refresh-btn" onclick="loadReelsFromTelegram()" style="margin-top: 20px;">
                            <i class="fas fa-sync-alt"></i> تحديث من القناة
                        </button>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = `
                <div style="padding: 20px;">
                    <h2 style="color: gold; margin-bottom: 20px; text-align: center;">
                        <i class="fab fa-telegram"></i> تحويلات قناة ناردو ريلز (${albumCount} ألبوم)
                    </h2>
                    <div class="albums-grid">
                        ${Object.entries(albums).map(([albumName, reels]) => `
                            <div class="album-card" onclick="showAlbumContent('${albumName.replace(/'/g, "\\'")}')">
                                <div class="album-cover">
                                    ${reels[0] && reels[0].videoUrl ? 
                                        `<video src="${reels[0].videoUrl}" style="width:100%;height:100%;object-fit:cover;" muted></video>` : 
                                        `<i class="fas fa-film"></i>`
                                    }
                                    <div style="position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7); padding: 5px 10px; border-radius: 20px;">
                                        <i class="fas fa-video"></i> ${reels.length}
                                    </div>
                                </div>
                                <div class="album-info">
                                    <div class="album-title">
                                        ${albumName === 'عام' ? '📁 عام' : 
                                         albumName === 'مميز' ? '⭐ مميز' :
                                         albumName === 'جديد' ? '✨ جديد' :
                                         albumName === 'تحديات' ? '🎯 تحديات' :
                                         albumName === 'تعليمي' ? '📚 تعليمي' :
                                         albumName === 'ترفيه' ? '🎭 ترفيه' : `📁 ${albumName}`}
                                    </div>
                                    <div class="album-meta">
                                        <span><i class="fas fa-play-circle"></i> ${reels.length} مقطع</span>
                                        <span class="album-count"><i class="fas fa-calendar"></i> ${getTimeAgo(reels[0]?.createdAt)}</span>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            
            document.querySelectorAll('.album-cover video').forEach(video => {
                video.addEventListener('mouseenter', () => video.play().catch(e => console.log));
                video.addEventListener('mouseleave', () => {
                    video.pause();
                    video.currentTime = 0;
                });
            });
        }
        
        // عرض محتوى ألبوم معين
        function showAlbumContent(albumName) {
            currentAlbum = albumName;
            const albums = groupReelsIntoAlbums();
            const albumReels = albums[albumName] || [];
            
            if (albumReels.length === 0) {
                showNotification('لا يوجد فيديوهات في هذا الألبوم', 'warning');
                return;
            }
            
            document.getElementById('albumsView').style.display = 'none';
            document.getElementById('albumPlayer').style.display = 'block';
            
            const sortedReels = [...albumReels].reverse();
            
            const container = document.getElementById('albumPlayer');
            container.innerHTML = `
                <div class="back-to-albums" onclick="showAlbumsView()">
                    <i class="fas fa-arrow-right"></i> العودة للألبومات
                </div>
                ${sortedReels.map(reel => {
                    const isLiked = userLikes[reel.id] === true;
                    const likesText = formatNumber(reel.likes || 0);
                    
                    return `
                        <div class="reel-slide" data-reel-id="${reel.id}">
                            <div class="reel-id-badge">
                                <i class="fab fa-telegram"></i> تحويل قناة | ${escapeHtml(albumName)} | ID: ${reel.id}
                            </div>
                            <div class="reel-video-container">
                                <video src="${reel.videoUrl}" preload="metadata" playsinline webkit-playsinline loop></video>
                                <div class="action-sidebar">
                                    <div class="action-btn-side ${isLiked ? 'liked' : ''}" onclick="likeReel(${reel.id}, event)">
                                        <i class="fas fa-heart"></i>
                                        <span>${likesText}</span>
                                    </div>
                                    <div class="action-btn-side" onclick="downloadVideo('${reel.videoUrl}', '${reel.title}')">
                                        <i class="fas fa-download"></i>
                                        <span>تحميل</span>
                                    </div>
                                    <div class="action-btn-side" onclick="shareReel('${reel.videoUrl}', event)">
                                        <i class="fas fa-share-alt"></i>
                                        <span>مشاركة</span>
                                    </div>
                                </div>
                                <div class="reel-overlay">
                                    <div class="reel-info">
                                        <div class="reel-title">
                                            <i class="fas fa-play-circle" style="color: gold;"></i> ${escapeHtml(reel.title)}
                                        </div>
                                        <div class="reel-publisher">
                                            <i class="fas fa-user-circle"></i> ${escapeHtml(reel.publisher)}
                                        </div>
                                        <div class="reel-stats">
                                            <span><i class="fas fa-heart"></i> ${likesText}</span>
                                            <span><i class="fas fa-calendar"></i> ${getTimeAgo(reel.createdAt)}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('')}
            `;
            
            setTimeout(() => {
                const slides = document.querySelectorAll('#albumPlayer .reel-slide');
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        const video = entry.target.querySelector('video');
                        if (entry.isIntersecting) {
                            video.play().catch(e => console.log);
                        } else {
                            video.pause();
                        }
                    });
                }, { threshold: 0.6 });
                slides.forEach(slide => observer.observe(slide));
            }, 100);
        }
        
        // تحميل الفيديو إلى الجهاز
        function downloadVideo(videoUrl, title) {
            const link = document.createElement('a');
            link.href = videoUrl;
            link.download = `nardo_reel_${title.replace(/[^a-zA-Z0-9]/g, '_')}.mp4`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            showNotification('📥 جاري تحميل الفيديو...', 'success');
        }
        
        // رفع/تحويل ريلز جديد إلى القناة
        async function uploadReelToTelegram() {
            if (!selectedVideoFile) {
                showNotification('❌ اختر فيديو أولاً', 'error');
                return;
            }
            if (!currentUser) {
                showNotification('❌ يرجى تسجيل الدخول', 'error');
                return;
            }
            
            const title = document.getElementById('reelTitleInput').value.trim() || 'ريلز رائع';
            const album = document.getElementById('albumSelect').value;
            
            const btn = document.getElementById('uploadBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> جاري التحويل...';
            
            try {
                const formData = new FormData();
                formData.append('chat_id', TELEGRAM.channelId);
                formData.append('video', selectedVideoFile);
                
                let caption = `🎬 ${title}\n👤 ${currentUser.name}\n📅 ${new Date().toLocaleString('ar-EG')}`;
                if (album) {
                    caption += `\n📁 ${album}`;
                }
                caption += `\n\n✅ تم التحويل عبر تطبيق ناردو ريلز`;
                
                formData.append('caption', caption);
                
                const response = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/sendVideo`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.ok) {
                    showNotification(`✅ تم التحويل بنجاح إلى ${album || 'الألبوم العام'}!`, 'success');
                    setTimeout(() => {
                        loadReelsFromTelegram();
                    }, 2000);
                    closeUploadModal();
                    removeSelectedVideo();
                } else {
                    throw new Error(data.description || 'فشل التحويل');
                }
            } catch (error) {
                console.error('❌ خطأ:', error);
                showNotification('❌ فشل التحويل: ' + error.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fab fa-telegram"></i> تحويل إلى القناة';
            }
        }
        
        function likeReel(reelId, event) {
            event.stopPropagation();
            const reel = reelsCache.find(r => r.id === reelId);
            if (reel) {
                if (userLikes[reelId]) {
                    reel.likes = Math.max(0, (reel.likes || 0) - 1);
                    delete userLikes[reelId];
                } else {
                    reel.likes = (reel.likes || 0) + 1;
                    userLikes[reelId] = true;
                }
                saveLikes();
                if (currentAlbum) {
                    showAlbumContent(currentAlbum);
                } else {
                    showAlbumsView();
                }
                updateStats();
            }
        }
        
        function shareReel(videoUrl, event) {
            event.stopPropagation();
            if (navigator.share) {
                navigator.share({
                    title: 'ناردو ريلز',
                    text: 'شاهد هذا الفيديو من قناة ناردو',
                    url: videoUrl
                }).catch(() => {
                    navigator.clipboard.writeText(videoUrl);
                    showNotification('🔗 تم نسخ رابط الفيديو', 'success');
                });
            } else {
                navigator.clipboard.writeText(videoUrl);
                showNotification('🔗 تم نسخ رابط الفيديو', 'success');
            }
        }
        
        function updateStats() {
            const totalReels = reelsCache.length;
            const albums = groupReelsIntoAlbums();
            const albumCount = Object.keys(albums).length;
            
            const countSpan = document.getElementById('totalReelsCount');
            const albumsSpan = document.getElementById('totalAlbumsCount');
            
            if (countSpan) {
                countSpan.innerText = totalReels;
                countSpan.style.transform = 'scale(1.1)';
                setTimeout(() => { if(countSpan) countSpan.style.transform = 'scale(1)'; }, 300);
            }
            if (albumsSpan) albumsSpan.innerText = albumCount;
            
            localStorage.setItem('last_update_time', new Date().toISOString());
        }
        
        function showStorageStats() {
            const cachedVideos = localStorage.getItem('nardoo_reels_cache');
            const videoCount = cachedVideos ? JSON.parse(cachedVideos).length : 0;
            const processedCount = processedMessageIds.length;
            const allMessagesCount = allMessageIds.length;
            const lastSync = localStorage.getItem('last_full_sync') || 'لم يتم بعد';
            const lastUpdate = localStorage.getItem('last_update_time') || 'غير معروف';
            
            const statsHTML = `
                <div class="stats-panel" id="statsPanel">
                    <h3 style="color: gold; margin-bottom: 20px;"><i class="fas fa-chart-bar"></i> إحصائيات التحويلات</h3>
                    <div style="margin: 10px 0;"><i class="fas fa-video"></i> التحويلات المخزنة: <strong style="color: gold;">${videoCount}</strong></div>
                    <div style="margin: 10px 0;"><i class="fas fa-check-circle"></i> الرسائل المعالجة: <strong style="color: gold;">${processedCount}</strong></div>
                    <div style="margin: 10px 0;"><i class="fab fa-telegram"></i> القناة: <strong style="color: gold;">ناردو ريلز</strong></div>
                    <div style="margin: 10px 0;"><i class="fas fa-sync"></i> آخر مزامنة كاملة: <strong style="color: gold;">${lastSync}</strong></div>
                    <div style="margin: 10px 0;"><i class="fas fa-clock"></i> آخر تحديث: <strong style="color: gold;">${lastUpdate}</strong></div>
                    <button onclick="document.getElementById('statsPanel').remove()" style="margin-top: 20px; padding: 10px 20px; background: gold; border: none; border-radius: 20px; cursor: pointer;">إغلاق</button>
                </div>
            `;
            
            const existing = document.getElementById('statsPanel');
            if (existing) existing.remove();
            document.body.insertAdjacentHTML('beforeend', statsHTML);
        }
        
        function resetStorage() {
            if (confirm('⚠️ هل تريد إعادة تعيين التخزين؟ سيتم مسح جميع التحويلات المخزنة محلياً وإعادة تحميلها من القناة.')) {
                localStorage.removeItem('nardoo_reels_cache');
                localStorage.removeItem('all_message_ids');
                localStorage.removeItem('processed_message_ids');
                localStorage.removeItem('last_update_id');
                localStorage.removeItem('last_full_sync');
                localStorage.removeItem('nardoo_users');
                localStorage.removeItem('current_user');
                
                reelsCache = [];
                allMessageIds = [];
                processedMessageIds = [];
                lastUpdateId = 0;
                users = [];
                currentUser = null;
                
                showNotification('🔄 تم مسح التخزين، جاري إعادة التشغيل...', 'success');
                setTimeout(() => {
                    location.reload();
                }, 1500);
            }
        }
        
        function loadUsers() {
            const saved = localStorage.getItem('nardoo_users');
            if (saved) {
                users = JSON.parse(saved);
            } else {
                users = [];
                localStorage.setItem('nardoo_users', JSON.stringify(users));
            }
        }
        
        function loadLikes() {
            const userId = currentUser?.id || 'guest';
            const saved = localStorage.getItem(`nardoo_likes_${userId}`);
            if (saved) {
                userLikes = JSON.parse(saved);
            } else {
                userLikes = {};
            }
        }
        
        function saveLikes() {
            const userId = currentUser?.id || 'guest';
            localStorage.setItem(`nardoo_likes_${userId}`, JSON.stringify(userLikes));
        }
        
        function handleVideoSelect(input) {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                if (file.size > 50 * 1024 * 1024) {
                    showNotification('حجم الفيديو كبير جداً (الحد الأقصى 50MB)', 'error');
                    return;
                }
                if (!file.type.startsWith('video/')) {
                    showNotification('الرجاء اختيار ملف فيديو صالح', 'error');
                    return;
                }
                selectedVideoFile = file;
                const url = URL.createObjectURL(file);
                document.getElementById('previewVideo').src = url;
                document.getElementById('videoPreviewDiv').classList.add('show');
            }
        }
        
        function removeSelectedVideo() {
            selectedVideoFile = null;
            document.getElementById('videoPreviewDiv').classList.remove('show');
            document.getElementById('videoInput').value = '';
            document.getElementById('previewVideo').src = '';
        }
        
        function openUploadModal() {
            if (!currentUser) {
                showNotification('يجب تسجيل الدخول أولاً', 'warning');
                return;
            }
            document.getElementById('uploadModal').style.display = 'flex';
        }
        
        function closeUploadModal() {
            document.getElementById('uploadModal').style.display = 'none';
        }
        
        function showLoadingOverlay(show, message = "جاري التحميل...") {
            let overlay = document.getElementById('loadingOverlay');
            if (show && !overlay) {
                overlay = document.createElement('div');
                overlay.id = 'loadingOverlay';
                overlay.className = 'loading-overlay';
                overlay.innerHTML = `<i class="fas fa-spinner fa-pulse" style="font-size: 50px; color: gold;"></i><p>${message}</p>`;
                document.body.appendChild(overlay);
            } else if (show && overlay) {
                overlay.style.display = 'flex';
                const p = overlay.querySelector('p');
                if (p) p.innerText = message;
            } else if (!show && overlay) {
                overlay.remove();
            }
        }
        
        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num || 0;
        }
        
        function getTimeAgo(dateString) {
            if (!dateString) return '';
            const now = new Date();
            const past = new Date(dateString);
            const diffInSeconds = Math.floor((now - past) / 1000);
            
            if (diffInSeconds < 60) return 'الآن';
            if (diffInSeconds < 3600) return `منذ ${Math.floor(diffInSeconds / 60)} دقيقة`;
            if (diffInSeconds < 86400) return `منذ ${Math.floor(diffInSeconds / 3600)} ساعة`;
            if (diffInSeconds < 604800) return `منذ ${Math.floor(diffInSeconds / 86400)} يوم`;
            return 'منذ وقت';
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function showNotification(msg, type = 'info') {
            const div = document.createElement('div');
            div.className = 'notification';
            const icon = type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️';
            div.innerHTML = `${icon} ${msg}`;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }
        
        function login() {
            const username = document.getElementById('loginUsername').value.trim();
            if (!username) {
                showNotification('❌ أدخل اسم المستخدم', 'error');
                return;
            }
            
            let user = users.find(u => u.username === username || u.name === username);
            if (!user) {
                user = { id: Date.now(), name: username, username: username, role: 'user', points: 100 };
                users.push(user);
                localStorage.setItem('nardoo_users', JSON.stringify(users));
            }
            
            currentUser = user;
            localStorage.setItem('current_user', JSON.stringify(user));
            loadLikes();
            
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('topBar').style.display = 'block';
            document.getElementById('fabButtons').style.display = 'block';
            document.getElementById('userNameDisplay').innerText = currentUser.name;
            
            const topButtons = document.getElementById('topButtons');
            if (topButtons) {
                topButtons.innerHTML = `
                    <button class="albums-btn" onclick="showAlbumsView()"><i class="fas fa-folder-open"></i> الألبومات</button>
                    <button class="refresh-btn" onclick="loadReelsFromTelegram()"><i class="fas fa-sync-alt"></i> تحديث</button>
                    <button class="stats-btn" onclick="showStorageStats()"><i class="fas fa-chart-bar"></i> إحصائيات</button>
                    <button class="reset-btn" onclick="resetStorage()"><i class="fas fa-trash"></i> إعادة تعيين</button>
                    <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> خروج</button>
                `;
            }
            
            loadReelsFromTelegram();
            showNotification(`✅ مرحباً ${user.name}`, 'success');
        }
        
        function logout() {
            currentUser = null;
            localStorage.removeItem('current_user');
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('topBar').style.display = 'none';
            document.getElementById('fabButtons').style.display = 'none';
            document.getElementById('albumsView').style.display = 'none';
            document.getElementById('albumPlayer').style.display = 'none';
            reelsCache = [];
        }
        
        setInterval(() => {
            if (currentUser && !isLoading) {
                console.log('🔄 تحديث تلقائي للتحويلات الجديدة...');
                loadReelsFromTelegram();
            }
        }, 300000);
        
        loadUsers();
        
        const savedUser = localStorage.getItem('current_user');
        if (savedUser) {
            currentUser = JSON.parse(savedUser);
            if (currentUser) {
                loadLikes();
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('topBar').style.display = 'block';
                document.getElementById('fabButtons').style.display = 'block';
                document.getElementById('userNameDisplay').innerText = currentUser.name;
                
                const topButtons = document.getElementById('topButtons');
                if (topButtons) {
                    topButtons.innerHTML = `
                        <button class="albums-btn" onclick="showAlbumsView()"><i class="fas fa-folder-open"></i> الألبومات</button>
                        <button class="refresh-btn" onclick="loadReelsFromTelegram()"><i class="fas fa-sync-alt"></i> تحديث</button>
                        <button class="stats-btn" onclick="showStorageStats()"><i class="fas fa-chart-bar"></i> إحصائيات</button>
                        <button class="reset-btn" onclick="resetStorage()"><i class="fas fa-trash"></i> إعادة تعيين</button>
                        <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> خروج</button>
                    `;
                }
                
                loadReelsFromTelegram();
            }
        }
        
        window.onclick = function(e) {
            const modal = document.getElementById('uploadModal');
            if (e.target === modal) closeUploadModal();
            const statsPanel = document.getElementById('statsPanel');
            if (statsPanel && e.target === statsPanel) statsPanel.remove();
        };
        
        console.log('🎬 نظام ناردو ريلز - يعرض التحويلات من القناة فقط');
    </script>
</body>
</html>
