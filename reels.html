<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ناردو ريلز 3.0 | المستقبل بين يديك</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000;
            color: white;
            overflow-x: hidden;
            position: relative;
        }

        /* تأثيرات 3D وخلفية متحركة */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(255,215,0,0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
            animation: pulseGlow 4s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.1); }
        }

        /* شاشة تسجيل الدخول بتصميم مستقبلي */
        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0a2a, #1a1a3a, #0f0f2f);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20000;
            backdrop-filter: blur(10px);
        }

        .login-box {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255,215,0,0.5);
            border-radius: 50px;
            padding: 45px 35px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            animation: floatIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 0 50px rgba(255,215,0,0.3);
        }

        @keyframes floatIn {
            from {
                opacity: 0;
                transform: translateY(100px) rotateX(30deg);
            }
            to {
                opacity: 1;
                transform: translateY(0) rotateX(0);
            }
        }

        .login-box h2 {
            background: linear-gradient(135deg, gold, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 32px;
            margin-bottom: 10px;
        }

        /* شريط المستخدم بتصميم زجاجي */
        .user-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            padding: 12px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            z-index: 100;
            border-bottom: 2px solid rgba(255,215,0,0.5);
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }

        /* عملات ناردو */
        .nardo-coins {
            background: linear-gradient(135deg, #ffd700, #ffb347);
            padding: 8px 18px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            animation: coinGlow 2s ease-in-out infinite;
        }

        @keyframes coinGlow {
            0%, 100% { box-shadow: 0 0 5px rgba(255,215,0,0.5); }
            50% { box-shadow: 0 0 20px rgba(255,215,0,0.8); }
        }

        /* مشغل الريلز */
        .reels-player {
            position: fixed;
            top: 70px;
            left: 0;
            width: 100%;
            height: calc(100% - 70px);
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }

        .reel-slide {
            position: relative;
            width: 100%;
            height: calc(100vh - 70px);
            scroll-snap-align: start;
            background: #000;
            overflow: hidden;
            transform-style: preserve-3d;
            transition: transform 0.3s;
        }

        /* تأثير ثلاثي الأبعاد عند التمرير */
        .reel-slide:hover {
            transform: scale(1.02) perspective(1000px) rotateX(2deg);
        }

        .reel-video-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
        }

        .reel-video-container video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }

        /* تأثيرات AI - تحليل المشاعر */
        .ai-emotion-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 8px 15px;
            border-radius: 50px;
            z-index: 15;
            border: 1px solid gold;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            animation: slideInRight 0.5s ease;
        }

        @keyframes slideInRight {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* أزرار تفاعل 3D */
        .action-sidebar {
            position: absolute;
            bottom: 130px;
            right: 15px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 20;
            pointer-events: auto;
        }

        .action-btn-side {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            border: 1px solid rgba(255,215,0,0.6);
            position: relative;
            overflow: hidden;
        }

        .action-btn-side::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: radial-gradient(circle, gold, transparent);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .action-btn-side:active::before {
            width: 100px;
            height: 100px;
        }

        .action-btn-side:hover {
            transform: translateY(-5px) scale(1.1);
            background: linear-gradient(135deg, gold, #ff6b6b);
        }

        .action-btn-side.liked {
            background: linear-gradient(135deg, #ff0066, #ff4d4d);
            animation: heartBeat 0.5s ease;
        }

        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* نافذة التحديات الجماعية */
        .challenge-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px);
            z-index: 10001;
            justify-content: center;
            align-items: center;
        }

        .challenge-content {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border: 3px solid gold;
            border-radius: 30px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            animation: slideUp 0.4s ease;
        }

        /* نافذة التعليقات مع ترجمة */
        .comments-modal {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-top-left-radius: 30px;
            border-top-right-radius: 30px;
            z-index: 10001;
            max-height: 70vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
            border-top: 3px solid gold;
        }

        .translate-btn {
            background: rgba(255,215,0,0.2);
            border: 1px solid gold;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 10px;
            cursor: pointer;
            margin-left: 10px;
        }

        /* زر الرفع بتأثير 3D */
        .upload-fab {
            position: fixed;
            bottom: 30px;
            left: 20px;
            background: linear-gradient(135deg, gold, #ff6b6b, #4ecdc4);
            background-size: 200% 200%;
            animation: gradientShift 3s ease infinite;
            color: black;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            z-index: 1001;
            border: 2px solid white;
            box-shadow: 0 0 30px rgba(255,215,0,0.5);
            transition: all 0.3s;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .upload-fab:hover {
            transform: rotate(90deg) scale(1.1);
        }

        /* إشعارات بتأثير هولوغرافي */
        .notification {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, rgba(255,215,0,0.9), rgba(255,107,107,0.9));
            backdrop-filter: blur(10px);
            color: black;
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: bold;
            z-index: 2000;
            animation: hologramIn 0.5s ease;
            font-size: 14px;
            white-space: nowrap;
            border: 1px solid rgba(255,255,255,0.5);
        }

        @keyframes hologramIn {
            from {
                opacity: 0;
                transform: translateX(-50%) scale(0.8);
                filter: blur(10px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) scale(1);
                filter: blur(0);
            }
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .action-btn-side { width: 48px; height: 48px; }
            .ai-emotion-badge { font-size: 10px; top: 15px; right: 15px; }
            .upload-fab { width: 55px; height: 55px; font-size: 24px; }
        }
    </style>
</head>
<body>

    <!-- شاشة تسجيل الدخول -->
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <i class="fas fa-crown" style="font-size: 70px; color: gold; margin-bottom: 20px; animation: floatIn 1s ease;"></i>
            <h2>✨ ناردو ريلز 3.0 ✨</h2>
            <p style="color: #ffd700;">🚀 المستقبل بين يديك | AI | AR | 3D</p>
            <input type="text" id="loginUsername" placeholder="اسم المستخدم" autocomplete="off">
            <button class="login-btn" onclick="login()">
                <i class="fas fa-rocket"></i> دخول إلى المستقبل
            </button>
            <div style="margin-top: 20px; font-size: 12px;">
                🎁 احصل على <span style="color: gold;">1000 عملة ناردو</span> مجاناً عند التسجيل!
            </div>
        </div>
    </div>

    <!-- شريط المستخدم -->
    <div id="topBar" style="display: none;">
        <div class="user-bar">
            <div class="user-badge">
                <i class="fas fa-user-astronaut"></i>
                <span id="userNameDisplay"></span>
            </div>
            <div class="nardo-coins" onclick="showCoinsInfo()">
                <i class="fas fa-gem"></i>
                <span id="userCoins">0</span>
                <span style="font-size: 11px;">ناردو</span>
            </div>
            <div class="user-stats">
                <div class="user-stat">
                    <span class="number" id="totalReelsCount">0</span>
                    <div class="label">ريلز</div>
                </div>
            </div>
            <div>
                <button class="action-btn" onclick="loadReelsFromTelegram()">
                    <i class="fas fa-sync-alt"></i> تحديث
                </button>
                <button class="action-btn logout-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> خروج
                </button>
            </div>
        </div>
    </div>

    <!-- مشغل الريلز -->
    <div id="reelsPlayer" class="reels-player" style="display: none;"></div>

    <!-- زر رفع -->
    <div id="fabButtons" style="display: none;">
        <div class="upload-fab" onclick="openUploadModal()">
            <i class="fas fa-plus"></i>
        </div>
    </div>

    <!-- نافذة التعليقات الذكية -->
    <div class="comments-modal" id="commentsModal">
        <div class="comments-header" style="padding: 20px; text-align: center; border-bottom: 1px solid gold; position: sticky; top: 0; background: #1a1a2e;">
            <button class="close-comments" onclick="closeCommentsModal()" style="position: absolute; left: 20px; background: none; border: none; color: white; font-size: 24px;">✕</button>
            <h3><i class="fas fa-robot"></i> تعليقات ذكية (ترجمة فورية)</h3>
        </div>
        <div class="comments-list" id="commentsList" style="padding: 15px; max-height: 50vh; overflow-y: auto;"></div>
        <div class="comment-input-area" style="padding: 15px; display: flex; gap: 10px; border-top: 1px solid gold;">
            <input type="text" class="comment-input" id="commentInput" placeholder="✍️ اكتب تعليقاً... سيتم ترجمته تلقائياً" style="flex: 1; padding: 12px; background: rgba(255,255,255,0.1); border: 1px solid gold; border-radius: 50px; color: white;">
            <button class="comment-send-btn" onclick="addCommentWithAI()" style="background: gold; border: none; width: 45px; height: 45px; border-radius: 50%;">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <!-- نافذة التحديات -->
    <div class="challenge-modal" id="challengeModal">
        <div class="challenge-content">
            <h2 style="color: gold; text-align: center;">🏆 تحديات ناردو</h2>
            <div id="challengeList" style="margin: 20px 0;"></div>
            <button onclick="closeChallengeModal()" class="action-btn" style="width: 100%;">إغلاق</button>
        </div>
    </div>

    <script>
        // إعدادات تليجرام
        const TELEGRAM = {
            botToken: '8576673096:AAECPDHWRTVQ_juq68hxM9PIdacnqevGRb4',
            channelId: '-1003822964890',
            apiUrl: 'https://api.telegram.org/bot'
        };

        let reelsCache = [];
        let users = [];
        let currentUser = null;
        let userLikes = {};
        let userComments = {};
        let userCoins = {};
        let selectedVideoFile = null;

        // تحليل المشاعر بالذكاء الاصطناعي (محاكاة)
        function analyzeEmotion(videoTitle, publisher) {
            const emotions = [
                { emoji: "😊", text: "سعادة", color: "#ffd700", icon: "fa-smile" },
                { emoji: "🔥", text: "حماس", color: "#ff6b6b", icon: "fa-fire" },
                { emoji: "🎵", text: "موسيقى", color: "#4ecdc4", icon: "fa-music" },
                { emoji: "😂", text: "كوميدي", color: "#f9ca24", icon: "fa-laugh" },
                { emoji: "😢", text: "مؤثر", color: "#6c5ce7", icon: "fa-heart" }
            ];
            const randomIndex = (videoTitle.length + publisher.length) % emotions.length;
            return emotions[randomIndex];
        }

        // عرض الريلز مع تأثيرات AI و AR
        function displayAllReels() {
            const container = document.getElementById('reelsPlayer');
            const allReels = mergeAllReels();
            
            if (!allReels || allReels.length === 0) {
                container.innerHTML = `<div style="display: flex; align-items: center; justify-content: center; height: 100%; flex-direction: column;">
                    <i class="fas fa-crown" style="font-size: 100px; color: gold; margin-bottom: 25px; animation: floatIn 1s ease;"></i>
                    <h2 style="color: gold;">🚀 كن الأول!</h2>
                    <button class="action-btn" onclick="openUploadModal()">➕ ارفع أول ريلز في المستقبل</button>
                </div>`;
                return;
            }
            
            container.innerHTML = allReels.map(reel => {
                const isLiked = userLikes[reel.id] === true;
                const likesCount = (reel.likes || 0) + (isLiked && !reel.likes ? 1 : 0);
                const commentsCount = (userComments[reel.id] || []).length;
                const emotion = analyzeEmotion(reel.title, reel.publisher);
                
                return `
                    <div class="reel-slide" data-reel-id="${reel.id}">
                        <div class="reel-video-container">
                            <video src="${reel.videoUrl}" preload="metadata" playsinline webkit-playsinline loop></video>
                            
                            <!-- AI Emotion Badge -->
                            <div class="ai-emotion-badge">
                                <i class="fas ${emotion.icon}"></i>
                                <span>${emotion.emoji} ${emotion.text}</span>
                                <i class="fas fa-microchip" style="font-size: 10px;"></i>
                            </div>
                            
                            <div class="action-sidebar">
                                <div class="action-btn-side ${isLiked ? 'liked' : ''}" onclick="likeReelWithReward(${reel.id}, event)">
                                    <i class="fas fa-heart"></i>
                                    <span id="likes-${reel.id}">${formatNumber(likesCount)}</span>
                                </div>
                                <div class="action-btn-side" onclick="openCommentsModal(${reel.id}, event)">
                                    <i class="fas fa-comment-dots"></i>
                                    <span>${formatNumber(commentsCount)}</span>
                                </div>
                                <div class="action-btn-side" onclick="shareWithAR('${reel.videoUrl}', '${escapeHtml(reel.title)}', event)">
                                    <i class="fas fa-share-alt"></i>
                                    <span>مشاركة</span>
                                </div>
                                <div class="action-btn-side" onclick="startDuet(${reel.id}, event)">
                                    <i class="fas fa-users"></i>
                                    <span>ثنائي</span>
                                </div>
                            </div>
                            
                            <div class="reel-overlay" style="position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); padding: 100px 20px 30px;">
                                <div class="reel-info">
                                    <div class="reel-title" style="font-size: 22px; font-weight: bold;">
                                        <i class="fas fa-crown" style="color: gold;"></i> ${escapeHtml(reel.title)}
                                    </div>
                                    <div class="reel-publisher" style="display: flex; gap: 10px; margin: 10px 0;">
                                        <i class="fas fa-user-astronaut"></i> @${escapeHtml(reel.publisher)}
                                        <span style="font-size: 12px; background: rgba(255,215,0,0.3); padding: 2px 8px; border-radius: 20px;">
                                            <i class="fas fa-chart-line"></i> ${Math.floor(Math.random() * 10000)} مشاهدة
                                        </span>
                                    </div>
                                    <div class="reel-stats" style="display: flex; gap: 20px;">
                                        <span onclick="likeReelWithReward(${reel.id}, event)"><i class="fas fa-heart"></i> ${formatNumber(likesCount)}</span>
                                        <span onclick="openCommentsModal(${reel.id}, event)"><i class="fas fa-comment"></i> ${formatNumber(commentsCount)}</span>
                                        <span><i class="fas fa-gem"></i> مكافآت ناردو</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            // تشغيل تلقائي
            setTimeout(() => {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        const video = entry.target.querySelector('video');
                        if (video && entry.isIntersecting) {
                            video.play().catch(e => console.log);
                            // اهتزاز عند بدء الفيديو (Haptic)
                            if (navigator.vibrate) navigator.vibrate(50);
                        } else if (video) video.pause();
                    });
                }, { threshold: 0.6 });
                document.querySelectorAll('.reel-slide').forEach(slide => observer.observe(slide));
            }, 100);
        }

        // الإعجاب مع مكافآت عملات
        function likeReelWithReward(reelId, event) {
            if (event) event.stopPropagation();
            
            if (!userLikes[reelId]) {
                // مكافأة 5 عملات عند الإعجاب
                addCoins(5, "🎁 مكافأة إعجاب");
                // تأثير اهتزاز
                if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
            }
            
            likeReel(reelId, event);
        }

        // إضافة عملات
        function addCoins(amount, reason) {
            if (!currentUser) return;
            if (!userCoins[currentUser.id]) userCoins[currentUser.id] = 1000;
            userCoins[currentUser.id] += amount;
            localStorage.setItem('nardoo_coins', JSON.stringify(userCoins));
            updateCoinsDisplay();
            showNotification(`+${amount} 💎 ${reason}`, 'success');
        }

        // عرض معلومات العملات
        function showCoinsInfo() {
            showNotification(`💎 رصيدك: ${userCoins[currentUser?.id] || 0} عملة ناردو\n🎁 اربح بالمشاهدة والإعجاب!`, 'info');
        }

        // تعليق ذكي مع ترجمة (محاكاة)
        async function addCommentWithAI() {
            const input = document.getElementById('commentInput');
            const text = input.value.trim();
            if (!text) return;
            
            // محاكاة ترجمة فورية
            const translatedText = await simulateTranslation(text);
            
            if (!userComments[currentReelForComments]) userComments[currentReelForComments] = [];
            userComments[currentReelForComments].unshift({
                userName: currentUser.name,
                text: text,
                translatedText: translatedText,
                timestamp: new Date().toISOString()
            });
            
            saveComments();
            input.value = '';
            openCommentsModal(currentReelForComments, null);
            addCoins(2, "✍️ مكافأة تعليق");
            showNotification(`🌐 تمت الترجمة: ${translatedText}`, 'success');
        }

        // محاكاة ترجمة الذكاء الاصطناعي
        function simulateTranslation(text) {
            const translations = {
                'مرحبا': 'Hello',
                'جميل': 'Beautiful',
                'رائع': 'Awesome',
                'حلو': 'Nice',
                'ممتاز': 'Excellent'
            };
            
            for (let [ar, en] of Object.entries(translations)) {
                if (text.includes(ar)) return en;
            }
            return `[AI] ${text} (تمت الترجمة)`;
        }

        // Duet - ثنائي
        function startDuet(reelId, event) {
            if (event) event.stopPropagation();
            showNotification('🎤 ميزة الثنائي قادمة قريباً! تحدي مع صديقك', 'info');
            addCoins(10, "🎵 تحدي ثنائي");
        }

        // مشاركة مع AR
        function shareWithAR(videoUrl, title, event) {
            if (event) event.stopPropagation();
            const shareText = `🎬 ${title}\n🚀 ناردو ريلز 3.0 - تجربة الواقع المعزز\n🔗 ${videoUrl}`;
            if (navigator.share) {
                navigator.share({ title: title, text: shareText, url: videoUrl });
            } else {
                copyToClipboard(shareText);
            }
            addCoins(3, "📤 مكافأة مشاركة");
        }

        // تحديث عرض العملات
        function updateCoinsDisplay() {
            const coinsSpan = document.getElementById('userCoins');
            if (coinsSpan && currentUser) {
                coinsSpan.innerText = userCoins[currentUser.id] || 1000;
            }
        }

        // تحميل العملات
        function loadCoins() {
            const saved = localStorage.getItem('nardoo_coins');
            if (saved) userCoins = JSON.parse(saved);
            else userCoins = {};
            updateCoinsDisplay();
        }

        // باقي الدوال الأساسية
        function mergeAllReels() {
            let merged = [...reelsCache];
            const quickReels = JSON.parse(localStorage.getItem('quick_reels') || '[]');
            for (const quick of quickReels) {
                if (!merged.find(r => r.id === quick.id)) merged.unshift(quick);
            }
            merged.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
            return merged;
        }

        async function loadReelsFromTelegram() {
            showLoadingOverlay(true, "🤖 AI جاري تحميل الريلز الذكية...");
            try {
                const cached = localStorage.getItem('nardoo_reels_cache');
                if (cached) reelsCache = JSON.parse(cached);
                displayAllReels();
                updateStats();
                showNotification(`✨ تم تحميل ${reelsCache.length} ريلز ذكية`, 'success');
            } catch (error) {
                console.error(error);
            } finally {
                showLoadingOverlay(false);
            }
        }

        function likeReel(reelId, event) {
            if (event) event.stopPropagation();
            const allReels = mergeAllReels();
            const reel = allReels.find(r => r.id === reelId);
            if (reel) {
                if (userLikes[reelId]) {
                    reel.likes = Math.max(0, (reel.likes || 0) - 1);
                    delete userLikes[reelId];
                } else {
                    reel.likes = (reel.likes || 0) + 1;
                    userLikes[reelId] = true;
                }
                saveLikes();
                displayAllReels();
            }
        }

        function saveLikes() {
            const userId = currentUser?.id || 'guest';
            localStorage.setItem(`nardoo_likes_${userId}`, JSON.stringify(userLikes));
        }

        function saveComments() {
            localStorage.setItem('nardoo_comments', JSON.stringify(userComments));
        }

        function loadComments() {
            const saved = localStorage.getItem('nardoo_comments');
            if (saved) userComments = JSON.parse(saved);
            else userComments = {};
        }

        let currentReelForComments = null;

        function openCommentsModal(reelId, event) {
            if (event) event.stopPropagation();
            currentReelForComments = reelId;
            const comments = userComments[reelId] || [];
            const commentsList = document.getElementById('commentsList');
            if (comments.length === 0) {
                commentsList.innerHTML = '<div style="text-align: center; padding: 30px; color: #aaa;">🤖 كن أول من يعلق مع الترجمة الذكية!</div>';
            } else {
                commentsList.innerHTML = comments.map(comment => `
                    <div class="comment-item" style="background: rgba(255,255,255,0.1); border-radius: 20px; padding: 12px; margin-bottom: 12px;">
                        <div style="display: flex; gap: 10px;">
                            <div style="width: 40px; height: 40px; background: gold; border-radius: 50%; display: flex; align-items: center; justify-content: center;">${comment.userName.charAt(0)}</div>
                            <div style="flex: 1;">
                                <div style="font-weight: bold; color: gold;">${escapeHtml(comment.userName)}</div>
                                <div>${escapeHtml(comment.text)}</div>
                                ${comment.translatedText ? `<div style="font-size: 12px; color: #4ecdc4; margin-top: 5px;"><i class="fas fa-language"></i> ${comment.translatedText}</div>` : ''}
                                <div style="font-size: 10px; color: #aaa; margin-top: 5px;">${getTimeAgo(comment.timestamp)}</div>
                            </div>
                        </div>
                    </div>
                `).join('');
            }
            document.getElementById('commentsModal').style.display = 'block';
        }

        function closeCommentsModal() {
            document.getElementById('commentsModal').style.display = 'none';
        }

        function updateStats() {
            const allReels = mergeAllReels();
            document.getElementById('totalReelsCount').innerText = allReels.length;
        }

        function formatNumber(num) { return num >= 1000 ? (num / 1000).toFixed(1) + 'K' : (num || 0); }
        function getTimeAgo(dateString) {
            if (!dateString) return '';
            const diff = Math.floor((Date.now() - new Date(dateString).getTime()) / 1000);
            if (diff < 60) return 'الآن';
            if (diff < 3600) return `منذ ${Math.floor(diff / 60)} دقيقة`;
            if (diff < 86400) return `منذ ${Math.floor(diff / 3600)} ساعة`;
            return `منذ ${Math.floor(diff / 86400)} يوم`;
        }
        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
        function showNotification(msg, type) {
            const div = document.createElement('div'); div.className = 'notification'; div.innerHTML = `✨ ${msg}`;
            document.body.appendChild(div); setTimeout(() => div.remove(), 3500);
        }
        function showLoadingOverlay(show, message) {
            let overlay = document.getElementById('loadingOverlay');
            if (show && !overlay) {
                overlay = document.createElement('div'); overlay.id = 'loadingOverlay'; overlay.className = 'loading-overlay';
                overlay.innerHTML = `<div class="loading-spinner"></div><p style="color: gold;">${message}</p>`;
                document.body.appendChild(overlay);
            } else if (!show && overlay) overlay.remove();
        }
        function copyToClipboard(text) { navigator.clipboard.writeText(text); }
        function openUploadModal() { if (!currentUser) { showNotification('يجب تسجيل الدخول', 'warning'); return; } alert("📱 قريباً: رفع الفيديو مع تأثيرات AR و AI"); }
        function closeUploadModal() { }
        function removeSelectedVideo() { }
        function handleVideoSelect() { }

        function login() {
            const username = document.getElementById('loginUsername').value.trim();
            if (!username) { showNotification('أدخل اسم المستخدم', 'error'); return; }
            let user = users.find(u => u.name === username);
            if (!user) { user = { id: Date.now(), name: username }; users.push(user); localStorage.setItem('nardoo_users', JSON.stringify(users)); }
            currentUser = user;
            localStorage.setItem('current_user', JSON.stringify(user));
            loadLikes(); loadComments(); loadCoins();
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('topBar').style.display = 'block';
            document.getElementById('fabButtons').style.display = 'block';
            document.getElementById('reelsPlayer').style.display = 'block';
            document.getElementById('userNameDisplay').innerText = currentUser.name;
            loadReelsFromTelegram();
            showNotification(`🚀 مرحباً ${user.name} في المستقبل!`, 'success');
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('current_user');
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('topBar').style.display = 'none';
            document.getElementById('fabButtons').style.display = 'none';
            document.getElementById('reelsPlayer').style.display = 'none';
            showNotification('👋 نراكم قريباً في المستقبل!', 'info');
        }

        function loadLikes() {
            const userId = currentUser?.id || 'guest';
            const saved = localStorage.getItem(`nardoo_likes_${userId}`);
            userLikes = saved ? JSON.parse(saved) : {};
        }

        loadUsers();
        const savedUser = localStorage.getItem('current_user');
        if (savedUser) {
            currentUser = JSON.parse(savedUser);
            loadLikes(); loadComments(); loadCoins();
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('topBar').style.display = 'block';
            document.getElementById('fabButtons').style.display = 'block';
            document.getElementById('reelsPlayer').style.display = 'block';
            document.getElementById('userNameDisplay').innerText = currentUser.name;
            loadReelsFromTelegram();
        }

        function loadUsers() {
            const saved = localStorage.getItem('nardoo_users');
            users = saved ? JSON.parse(saved) : [];
        }
    </script>
</body>
</html>
