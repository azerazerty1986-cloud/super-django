<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار جلب فيديوهات القناة</title>
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: #0a1a15;
            color: white;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .card {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            margin: 10px 0;
            border: 1px solid gold;
        }
        .video-item {
            background: rgba(0,0,0,0.5);
            padding: 10px;
            margin: 5px 0;
            border-radius: 8px;
        }
        .album {
            background: rgba(255,215,0,0.1);
            padding: 15px;
            margin: 15px 0;
            border-radius: 10px;
            border-right: 3px solid gold;
        }
        .album-title {
            color: gold;
            font-size: 18px;
            margin-bottom: 10px;
        }
        button {
            background: gold;
            color: black;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            margin: 5px;
        }
        .log {
            background: #000;
            padding: 10px;
            font-family: monospace;
            font-size: 12px;
            height: 300px;
            overflow-y: auto;
        }
        .success { color: #4ade80; }
        .error { color: #f87171; }
        .info { color: #60a5fa; }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="color: gold;">🧪 اختبار جلب فيديوهات القناة</h1>
        
        <div class="card">
            <button onclick="testFetch()">🔍 اختبار جلب الفيديوهات</button>
            <button onclick="clearLog()">🗑️ مسح السجل</button>
        </div>
        
        <div id="results"></div>
        
        <div class="card">
            <h3>📋 سجل الأحداث</h3>
            <div id="log" class="log"></div>
        </div>
    </div>

    <script>
        const BOT_TOKEN = '8576673096:AAECPDHWRTVQ_juq68hxM9PIdacnqevGRb4';
        const CHANNEL_ID = '-1003822964890';
        
        function addLog(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const time = new Date().toLocaleTimeString();
            const color = type === 'success' ? '#4ade80' : type === 'error' ? '#f87171' : '#60a5fa';
            logDiv.innerHTML += `<div style="color: ${color};">[${time}] ${message}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(message);
        }
        
        function clearLog() {
            document.getElementById('log').innerHTML = '';
            document.getElementById('results').innerHTML = '';
            addLog('🗑️ تم مسح السجل', 'info');
        }
        
        async function testFetch() {
            addLog('🚀 بدء اختبار جلب الفيديوهات...', 'info');
            addLog(`🤖 البوت: ${BOT_TOKEN.substring(0, 20)}...`, 'info');
            addLog(`📡 القناة: ${CHANNEL_ID}`, 'info');
            
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="card">⏳ جاري التحميل...</div>';
            
            try {
                const startTime = Date.now();
                
                // جلب آخر 200 منشور
                const url = `https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?limit=200`;
                addLog(`📡 إرسال طلب إلى: ${url.substring(0, 60)}...`, 'info');
                
                const response = await fetch(url);
                const data = await response.json();
                
                const elapsed = Date.now() - startTime;
                addLog(`⏱️ استغرق الطلب: ${elapsed}ms`, 'info');
                
                if (!data.ok) {
                    addLog(`❌ فشل الاتصال: ${data.description}`, 'error');
                    resultsDiv.innerHTML = `<div class="card error">❌ فشل الاتصال: ${data.description}</div>`;
                    return;
                }
                
                addLog(`✅ الاتصال ناجح`, 'success');
                addLog(`📊 عدد التحديثات: ${data.result?.length || 0}`, 'info');
                
                const videos = [];
                
                if (data.ok && data.result) {
                    const updates = [...data.result].reverse();
                    
                    for (const update of updates) {
                        const post = update.channel_post || update.message;
                        if (post && post.video) {
                            videos.push({
                                id: post.message_id,
                                date: post.date,
                                caption: post.caption || '',
                                video: post.video
                            });
                        }
                    }
                }
                
                addLog(`🎬 عدد الفيديوهات الموجودة: ${videos.length}`, videos.length > 0 ? 'success' : 'error');
                
                if (videos.length === 0) {
                    addLog(`❌ لا توجد فيديوهات في القناة!`, 'error');
                    addLog(`🔍 تأكد من:`, 'info');
                    addLog(`   1. البوت مشرف في القناة`, 'info');
                    addLog(`   2. هناك فيديوهات في القناة`, 'info');
                    addLog(`   3. المعرفات صحيحة`, 'info');
                    
                    resultsDiv.innerHTML = `
                        <div class="card error">
                            <h3>❌ لا توجد فيديوهات!</h3>
                            <p>لم يتم العثور على أي فيديوهات في القناة.</p>
                            <p>تأكد من:</p>
                            <ul>
                                <li>البوت مشرف في القناة</li>
                                <li>هناك فيديوهات مرفوعة في القناة</li>
                                <li>معرف البوت والقناة صحيح</li>
                            </ul>
                        </div>
                    `;
                    return;
                }
                
                // عرض أول 10 فيديوهات
                addLog(`📹 عرض أول 10 فيديوهات:`, 'success');
                
                let videosHtml = '<div class="card"><h3>🎬 الفيديوهات الموجودة</h3>';
                videos.slice(0, 10).forEach((v, i) => {
                    videosHtml += `
                        <div class="video-item">
                            <strong>${i + 1}.</strong> ID: ${v.id}<br>
                            📅 ${new Date(v.date * 1000).toLocaleString()}<br>
                            📝 ${v.caption?.substring(0, 100) || 'بدون نص'}...
                        </div>
                    `;
                });
                videosHtml += `</div>`;
                
                // تقسيم إلى ألبومات (كل 10 فيديوهات)
                const albums = [];
                for (let i = 0; i < videos.length; i += 10) {
                    albums.push(videos.slice(i, i + 10));
                }
                
                let albumsHtml = '<div class="card"><h3>📀 الألبومات (كل 10 فيديوهات)</h3>';
                albums.forEach((album, idx) => {
                    albumsHtml += `
                        <div class="album">
                            <div class="album-title">📀 ألبوم ${idx + 1} (${album.length} فيديو)</div>
                            <div>المعرفات: ${album.map(v => v.id).join(', ')}</div>
                            <button onclick="viewAlbum(${idx})">عرض الألبوم</button>
                        </div>
                    `;
                });
                albumsHtml += `</div>`;
                
                resultsDiv.innerHTML = videosHtml + albumsHtml;
                
                addLog(`✅ تم العثور على ${videos.length} فيديو`, 'success');
                addLog(`📀 تم تقسيمها إلى ${albums.length} ألبوم`, 'success');
                
                // حفظ البيانات في localStorage للتجربة
                localStorage.setItem('test_videos', JSON.stringify(videos));
                localStorage.setItem('test_albums', JSON.stringify(albums));
                
            } catch (error) {
                addLog(`❌ خطأ: ${error.message}`, 'error');
                resultsDiv.innerHTML = `<div class="card error">❌ خطأ: ${error.message}</div>`;
            }
        }
        
        function viewAlbum(albumIndex) {
            const albums = JSON.parse(localStorage.getItem('test_albums') || '[]');
            const album = albums[albumIndex];
            if (!album) return;
            
            alert(`📀 ألبوم ${albumIndex + 1}\n\nالفيديوهات:\n${album.map(v => `ID: ${v.id}\n📅 ${new Date(v.date * 1000).toLocaleString()}`).join('\n\n')}`);
        }
        
        // تشغيل تلقائي عند فتح الصفحة
        setTimeout(() => {
            testFetch();
        }, 500);
    </script>
</body>
</html>
