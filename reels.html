<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>لعبة 3B | المقاتل النرد - معارك 5D</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at center, #1a0a0a, #0a0505);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Cairo', 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* حاوية اللعبة */
        .game-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 650px;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(15px);
            border-radius: 70px;
            padding: 25px;
            border: 3px solid #ff3300;
            box-shadow: 0 0 50px rgba(255,51,0,0.4);
            animation: borderPulse 1.5s ease-in-out infinite;
        }

        @keyframes borderPulse {
            0%, 100% { border-color: #ff3300; box-shadow: 0 0 30px rgba(255,51,0,0.4); }
            50% { border-color: #ff6600; box-shadow: 0 0 60px rgba(255,102,0,0.8); }
        }

        /* شاشة الهدف */
        .target-screen {
            background: linear-gradient(135deg, rgba(0,0,0,0.7), rgba(0,0,0,0.5));
            border-radius: 50px;
            padding: 15px;
            margin-bottom: 25px;
            text-align: center;
            border: 2px solid #ff3300;
        }

        .target-label {
            font-size: 16px;
            color: #ff6600;
            letter-spacing: 2px;
        }

        .target-number {
            font-size: 70px;
            font-weight: bold;
            color: #ff3300;
            text-shadow: 0 0 20px #ff3300, 0 0 40px #ff6600;
            line-height: 1;
            animation: targetPulse 0.8s ease-in-out infinite;
        }

        @keyframes targetPulse {
            0%, 100% { text-shadow: 0 0 20px #ff3300; }
            50% { text-shadow: 0 0 40px #ff6600, 0 0 60px #ff3300; }
        }

        /* منطقة المقاتل */
        .fighter-area {
            display: flex;
            justify-content: center;
            margin: 20px 0;
            position: relative;
        }

        .fighter-container {
            position: relative;
            cursor: pointer;
            transition: all 0.2s;
        }

        .fighter-container:hover {
            transform: scale(1.02);
        }

        .fighter-card {
            width: 260px;
            height: 260px;
            background: linear-gradient(145deg, #2a1a1a, #1a0a0a);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            border: 3px solid #ff3300;
            position: relative;
            overflow: hidden;
            transition: all 0.2s;
        }

        .fighter-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,51,0,0.2), transparent);
            animation: fireGlow 2s ease-in-out infinite;
        }

        @keyframes fireGlow {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.1); }
        }

        .fighter-icon {
            font-size: 100px;
            filter: drop-shadow(0 0 15px #ff3300);
            animation: fighterIdle 1s ease-in-out infinite;
        }

        @keyframes fighterIdle {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }

        .fighter-value {
            font-size: 70px;
            font-weight: bold;
            color: #ff6600;
            text-shadow: 0 0 20px #ff3300;
            margin-top: 10px;
        }

        .fighter-card.rolling {
            animation: fighterAttack 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55) 3;
        }

        @keyframes fighterAttack {
            0% {
                transform: scale(1) rotate(0deg);
            }
            25% {
                transform: scale(1.2) rotate(15deg);
                filter: brightness(1.5);
            }
            50% {
                transform: scale(1.1) rotate(-15deg);
                filter: brightness(1.8);
            }
            75% {
                transform: scale(1.15) rotate(10deg);
                filter: brightness(1.5);
            }
            100% {
                transform: scale(1) rotate(0deg);
                filter: brightness(1);
            }
        }

        /* شريط الطاقة */
        .power-bar {
            width: 80%;
            height: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            margin-top: 15px;
            overflow: hidden;
        }

        .power-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff3300, #ff6600);
            width: 0%;
            transition: width 0.3s;
            border-radius: 10px;
        }

        /* الإحصائيات */
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 20px 0;
        }

        .stat-card {
            background: rgba(0,0,0,0.6);
            border-radius: 35px;
            padding: 12px;
            text-align: center;
            border: 1px solid #ff3300;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,51,0,0.1), transparent);
            animation: statShine 3s infinite;
        }

        @keyframes statShine {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        .stat-label {
            font-size: 12px;
            color: #aaa;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #ff6600;
        }

        /* رسالة */
        .message {
            background: rgba(0,0,0,0.7);
            border-radius: 50px;
            padding: 14px;
            margin: 15px 0;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            color: #ff6600;
            border: 1px solid #ff3300;
            transition: all 0.3s;
        }

        /* أزرار */
        .buttons {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }

        button {
            flex: 1;
            background: linear-gradient(135deg, #ff3300, #cc3300);
            border: none;
            padding: 14px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        button:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 20px rgba(255,51,0,0.5);
        }

        .reset-btn {
            background: linear-gradient(135deg, #ff6600, #ff3300);
        }

        @media (max-width: 550px) {
            .game-wrapper { padding: 20px; }
            .target-number { font-size: 50px; }
            .fighter-card { width: 200px; height: 200px; }
            .fighter-icon { font-size: 70px; }
            .fighter-value { font-size: 50px; }
            .stat-value { font-size: 22px; }
            button { padding: 10px; font-size: 14px; }
        }
    </style>
</head>
<body>

<div class="game-wrapper">
    <div class="target-screen">
        <div class="target-label">🎯 الرقم المستهدف</div>
        <div class="target-number" id="targetNum">??</div>
    </div>

    <div class="fighter-area">
        <div class="fighter-container" onclick="attack()">
            <div class="fighter-card" id="fighterCard">
                <div class="fighter-icon" id="fighterIcon">⚔️</div>
                <div class="fighter-value" id="fighterValue">🎲</div>
                <div class="power-bar">
                    <div class="power-fill" id="powerFill"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="stats">
        <div class="stat-card">
            <div class="stat-label">⚔️ قوة الضربة</div>
            <div class="stat-value" id="currentValue">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">💥 عدد الضربات</div>
            <div class="stat-value" id="attempts">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">🏆 أعلى ضرر</div>
            <div class="stat-value" id="bestScore">0</div>
        </div>
    </div>

    <div class="message" id="message">
        ⚔️ اضرب المقاتل لبدء المعركة ⚔️
    </div>

    <div class="buttons">
        <button onclick="attack()">
            <i class="fas fa-fist-raised"></i> اضرب المقاتل
        </button>
        <button class="reset-btn" onclick="resetGame()">
            <i class="fas fa-sync-alt"></i> معركة جديدة
        </button>
    </div>
</div>

<!-- Canvas للتأثيرات البصرية -->
<canvas id="effectCanvas" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5;"></canvas>

<script>
    // تحميل Font Awesome
    const link = document.createElement('link');
    link.rel = 'stylesheet';
    link.href = 'https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css';
    document.head.appendChild(link);

    // ========== تأثيرات Canvas ==========
    const canvas = document.getElementById('effectCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let slashes = [];
    let bloodEffects = [];

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // فئة جزيئات الدم
    class BloodParticle {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.vx = (Math.random() - 0.5) * 8;
            this.vy = (Math.random() - 0.5) * 8 - 3;
            this.alpha = 200;
            this.size = Math.random() * 6 + 2;
            this.gravity = 0.2;
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.vy += this.gravity;
            this.alpha -= 5;
        }
        draw() {
            ctx.globalAlpha = Math.max(0, this.alpha / 255);
            ctx.fillStyle = `rgba(200, 30, 30, ${this.alpha / 255})`;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
        isDead() {
            return this.alpha <= 0;
        }
    }

    // فئة تأثير الضربة
    class SlashEffect {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.life = 1;
            this.angle = Math.random() * Math.PI * 2;
        }
        update() {
            this.life -= 0.05;
        }
        draw() {
            ctx.globalAlpha = Math.max(0, this.life);
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.angle);
            ctx.strokeStyle = `rgba(255, 100, 0, ${this.life})`;
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(-30, -15);
            ctx.lineTo(0, 0);
            ctx.lineTo(-30, 15);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(30, -15);
            ctx.lineTo(0, 0);
            ctx.lineTo(30, 15);
            ctx.stroke();
            ctx.restore();
        }
        isDead() {
            return this.life <= 0;
        }
    }

    // فئة موجة صدمة
    class Shockwave {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.radius = 10;
            this.maxRadius = 150;
            this.life = 1;
        }
        update() {
            this.radius += 10;
            this.life -= 0.03;
        }
        draw() {
            ctx.globalAlpha = Math.max(0, this.life);
            ctx.strokeStyle = `rgba(255, 51, 0, ${this.life})`;
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.stroke();
        }
        isDead() {
            return this.life <= 0 || this.radius >= this.maxRadius;
        }
    }

    // إنشاء تأثيرات الضربة
    function createHitEffect(x, y) {
        for (let i = 0; i < 25; i++) {
            particles.push(new BloodParticle(x + (Math.random() - 0.5) * 80, y + (Math.random() - 0.5) * 80));
        }
        for (let i = 0; i < 8; i++) {
            slashes.push(new SlashEffect(x + (Math.random() - 0.5) * 60, y + (Math.random() - 0.5) * 60));
        }
        shockwaves.push(new Shockwave(x, y));
        
        if (navigator.vibrate) navigator.vibrate(100);
    }

    function createCriticalEffect(x, y) {
        for (let i = 0; i < 50; i++) {
            particles.push(new BloodParticle(x + (Math.random() - 0.5) * 120, y + (Math.random() - 0.5) * 120));
        }
        for (let i = 0; i < 15; i++) {
            slashes.push(new SlashEffect(x + (Math.random() - 0.5) * 100, y + (Math.random() - 0.5) * 100));
        }
        shockwaves.push(new Shockwave(x, y));
        if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
    }

    let shockwaves = [];

    // رسم جميع التأثيرات
    function drawEffects() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        for (let i = particles.length - 1; i >= 0; i--) {
            particles[i].update();
            particles[i].draw();
            if (particles[i].isDead()) particles.splice(i, 1);
        }
        
        for (let i = slashes.length - 1; i >= 0; i--) {
            slashes[i].update();
            slashes[i].draw();
            if (slashes[i].isDead()) slashes.splice(i, 1);
        }
        
        for (let i = shockwaves.length - 1; i >= 0; i--) {
            shockwaves[i].update();
            shockwaves[i].draw();
            if (shockwaves[i].isDead()) shockwaves.splice(i, 1);
        }
        
        requestAnimationFrame(drawEffects);
    }
    drawEffects();

    // ========== منطق اللعبة ==========
    let targetNumber = 0;
    let currentValue = 0;
    let attempts = 0;
    let bestScore = localStorage.getItem('bestScore3B_fighter') || 0;
    let gameActive = true;
    let isAttacking = false;

    const targetSpan = document.getElementById('targetNum');
    const currentValueSpan = document.getElementById('currentValue');
    const attemptsSpan = document.getElementById('attempts');
    const bestScoreSpan = document.getElementById('bestScore');
    const messageDiv = document.getElementById('message');
    const fighterValueDiv = document.getElementById('fighterValue');
    const fighterCard = document.getElementById('fighterCard');
    const powerFill = document.getElementById('powerFill');

    function updateUI() {
        currentValueSpan.textContent = currentValue;
        attemptsSpan.textContent = attempts;
        bestScoreSpan.textContent = bestScore;
        targetSpan.textContent = targetNumber;
        
        if (currentValue === 0) {
            fighterValueDiv.innerHTML = '⚔️';
        } else {
            fighterValueDiv.innerHTML = currentValue;
        }
        
        // تحديث شريط الطاقة
        const powerPercent = (currentValue / targetNumber) * 100;
        powerFill.style.width = Math.min(100, powerPercent) + '%';
    }

    function attack() {
        if (!gameActive) {
            messageDiv.innerHTML = '💀 المعركة انتهت! اضغط على "معركة جديدة" 💀';
            return;
        }
        if (isAttacking) return;
        
        isAttacking = true;
        
        // تأثيرات الضربة
        const centerX = window.innerWidth / 2;
        const centerY = window.innerHeight / 2;
        createHitEffect(centerX, centerY);
        
        // إضافة تأثير الهجوم
        fighterCard.classList.add('rolling');
        
        const newValue = Math.floor(Math.random() * 6) + 1;
        
        setTimeout(() => {
            fighterCard.classList.remove('rolling');
            
            currentValue = newValue;
            attempts++;
            
            updateUI();
            
            // تأثير إضافي حسب القوة
            if (newValue === 6) {
                createCriticalEffect(centerX, centerY);
            } else {
                createHitEffect(centerX, centerY);
            }
            
            // التحقق من النتيجة
            checkResult();
            
            isAttacking = false;
        }, 400);
    }

    function checkResult() {
        const centerX = window.innerWidth / 2;
        const centerY = window.innerHeight / 2;
        
        if (currentValue === targetNumber) {
            gameActive = false;
            const pointsEarned = Math.max(1, 12 - attempts);
            
            messageDiv.innerHTML = `💥💥 ضربة قاضية! 💥💥<br>✨ حصلت على ${pointsEarned} نقطة قتالية ✨`;
            messageDiv.style.background = "rgba(46,204,113,0.3)";
            messageDiv.style.border = "2px solid #2ecc71";
            
            createCriticalEffect(centerX, centerY);
            
            if (pointsEarned > bestScore) {
                bestScore = pointsEarned;
                localStorage.setItem('bestScore3B_fighter', bestScore);
                bestScoreSpan.textContent = bestScore;
                messageDiv.innerHTML += `<br>🏆 رقم قياسي جديد! 🏆`;
                createCriticalEffect(centerX, centerY);
            }
        } 
        else if (currentValue > targetNumber) {
            gameActive = false;
            messageDiv.innerHTML = `💀 هزيمة! 💀<br>قوتك (${currentValue}) تجاوزت الهدف (${targetNumber})`;
            messageDiv.style.background = "rgba(231,76,60,0.3)";
            messageDiv.style.border = "2px solid #e74c3c";
            createHitEffect(centerX, centerY);
        }
        else {
            const remaining = targetNumber - currentValue;
            messageDiv.innerHTML = `⚔️ ضربة! القوة: ${currentValue} | تحتاج: ${remaining} نقطة أخرى 🔥`;
            messageDiv.style.background = "rgba(255,51,0,0.15)";
            messageDiv.style.border = "1px solid #ff3300";
        }
    }

    function resetGame() {
        targetNumber = Math.floor(Math.random() * 13) + 6;
        currentValue = 0;
        attempts = 0;
        gameActive = true;
        isAttacking = false;
        
        updateUI();
        
        messageDiv.innerHTML = `⚔️ هدف جديد: ${targetNumber} | اضرب المقاتل لبدء المعركة 🔥`;
        messageDiv.style.background = "rgba(255,51,0,0.15)";
        messageDiv.style.border = "1px solid #ff3300";
        
        const centerX = window.innerWidth / 2;
        const centerY = window.innerHeight / 2;
        createHitEffect(centerX, centerY);
        
        fighterCard.classList.remove('rolling');
    }

    // تهيئة
    bestScoreSpan.textContent = bestScore;
    resetGame();
</script>
</body>
</html>
