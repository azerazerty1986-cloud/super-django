        }

        /* ===== رأس الصفحة ===== */

            top: 0;

            backdrop-filter: blur(10px);
        }
        
        .reels-header h1 {
            color: gold;
            font-size: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

            background: #0088cc;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
        }

        /* ===== شريط المعلومات ===== */
        .user-info-bar {
            background: linear-gradient(135deg, #2c5e4f, #1a3a32);
            border: 2px solid gold;
            border-radius: 60px;
            padding: 15px 25px;
            margin: 20px auto;
            max-width: 1400px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;

            gap: 15px;

        .user-avatar {

            height: 60px;
            background: linear-gradient(135deg, gold, #ffd700);

            align-items: center;
            justify-content: center;
            font-size: 30px;

        .user-info h3 {

        /* ===== شريط الإحصائيات ===== */

            background: rgba(0,0,0,0.6);
            padding: 15px 20px;
            margin: 0 auto 20px;
            max-width: 1400px;
            border-radius: 50px;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 20px;

        .stat-item-center {
            text-align: center;
            color: white;
        }
        
        .stat-value-center {
            font-size: 24px;
            font-weight: bold;
            color: gold;
        }
        
        .stat-label-center {
            font-size: 14px;
            color: #aaa;
        }

        /* ===== شبكة الريلز ===== */
        .reels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            padding: 30px 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        /* ===== بطاقة الريل ===== */
        .reel-card {
            background: #1e1e2e;
            border: 2px solid gold;
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }
        
        .reel-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(212, 175, 55, 0.3);
            border-color: #ffd966;
        }
        
        .reel-video {
            position: relative;
            height: 400px;
            overflow: hidden;
            background: #000;
        }
        
        .reel-video video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }
        
        .reel-card:hover .reel-video video {
            transform: scale(1.05);
        }
        
        .reel-play-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0;
            transition: opacity 0.3s;

            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;

        .reel-play-overlay i {
            font-size: 30px;
            color: white;
        }
        
        .reel-card:hover .reel-play-overlay {
            opacity: 1;
        }
        
        .reel-info {
            padding: 15px;
            color: white;
        }
        
        .reel-info h3 {
            font-size: 18px;
            font-weight: bold;
            color: gold;
            margin-bottom: 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .reel-stats {
            display: flex;
            justify-content: space-between;
            color: #aaa;
            font-size: 14px;
        }
        
        .reel-stats span {
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .reel-stats i.fa-heart { color: #ef4444; }
        .reel-stats i.fa-user { color: gold; }
        .reel-stats i.fa-fingerprint { color: #9b59b6; }

        .upload-btn {

            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, gold, #ffd700);
            color: black;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.5);
            transition: all 0.3s;
            z-index: 1000;
            border: 3px solid white;
        }
        
        .upload-btn:hover {
            transform: scale(1.1);
            background: gold;
        }
        
        .back-btn {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: #2d2d3a;
            color: gold;
            width: 60px;
            height: 60px;
            border-radius: 50%;

            align-items: center;
            justify-content: center;
            font-size: 24px;

            z-index: 1000;
            border: 2px solid gold;

        .back-btn:hover {
            transform: scale(1.1);
            background: gold;
            color: black;
        }

        /* ===== النافذة المنبثقة ===== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            justify-content: center;
            align-items: center;
            z-index: 10000;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: linear-gradient(135deg, #1a3a32, #0a1a15);
            border: 3px solid gold;
            border-radius: 30px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            animation: slideUp 0.5s ease;
            position: relative;
            box-shadow: 0 0 50px rgba(255,215,0,0.5);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            text-align: center;
            margin-bottom: 30px;

        .modal-header h2 {
            color: gold;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .modal-header i {
            font-size: 60px;
            color: gold;
            margin-bottom: 10px;

        .close-modal {

            left: 20px;
            background: none;
            border: none;
            color: gold;
            font-size: 30px;
            cursor: pointer;

        .close-modal:hover {

        .upload-area h3 {
            font-size: 24px;
            margin-bottom: 10px;

        .video-info {

            padding: 10px;

        .remove-video {

        }

        .remove-video:hover {
            transform: scale(1.2);

        /* بصمة الريلز */
        .fingerprint-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 2px solid gold;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }

        .fingerprint-icon {
            font-size: 40px;
            color: gold;
            margin-bottom: 10px;
        }

        .fingerprint-title {
            color: gold;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .fingerprint-value {
            font-family: 'Courier New', monospace;
            font-size: 16px;
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 10px;
            margin: 10px 0;
            word-break: break-all;
            direction: ltr;
        }

        .copy-btn {
            background: none;
            border: 2px solid gold;
            color: gold;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .copy-btn:hover {
            background: gold;
            color: black;
        }

        /* حقول النموذج */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: gold;
            font-weight: bold;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,215,0,0.3);
            border-radius: 10px;
            color: white;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: gold;
        }

        /* زر الإرسال */
        .send-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, gold, #ffd700);
            border: none;
            border-radius: 50px;
            color: black;
            font-weight: bold;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
            border: 2px solid white;
        }

        .send-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px gold;
        }

        /* الإشعارات */
        .notification {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, gold, #ffd700);
            color: black;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(212,175,55,0.5);
            z-index: 2000;
            animation: slideUp 0.3s ease;
        }

        .error-message {
            background: rgba(244,67,54,0.2);
            border: 2px solid #f44336;
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 20px;
            color: #f44336;
            text-align: center;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .reels-grid {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));

            .reel-video {
                height: 350px;
            }
            
            .user-info-bar {
                flex-direction: column;
                text-align: center;
                border-radius: 20px;
            }
            
            .user-details {
                flex-direction: column;
            }
            
            .upload-btn, .back-btn {
                width: 50px;
                height: 50px;
                font-size: 20px;
            }
        }
    </style>
</head>

        // ========== حفظ الريلز ==========
        function saveReels() {
            localStorage.setItem('nardoo_reels_database', JSON.stringify(reelsDatabase));
        }

        // ========== عرض الريلز ==========
        function renderReels() {
            const container = document.getElementById('reelsContainer');
            
            if (reelsDatabase.length === 0) {
                container.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 100px; color: gold;">
                        <i class="fas fa-film" style="font-size: 80px; opacity: 0.5;"></i>
                        <h2>لا توجد ريلز حالياً</h2>
                        <p>اضغط على الزر + لرفع ريلز جديد</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = reelsDatabase.map(reel => `
                <div class="reel-card" onclick="playReel(${reel.id})">
                    <div class="reel-video">
                        <video src="${reel.videoUrl}" poster="${reel.thumbnail}" preload="metadata" muted></video>
                        <div class="reel-play-overlay">
                            <i class="fas fa-play-circle"></i>
                        </div>
                    </div>
                    <div class="reel-info">
                        <h3>${escapeHtml(reel.title)}</h3>
                        <div class="reel-stats">
                            <span><i class="fas fa-eye"></i> ${formatNumber(reel.views)}</span>
                            <span><i class="fas fa-heart"></i> ${formatNumber(reel.likes)}</span>
                            <span><i class="fas fa-user"></i> ${escapeHtml(reel.publisher)}</span>
                            <span><i class="fas fa-fingerprint"></i> ${reel.thumbprint.substring(0, 15)}...</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // ========== تشغيل الريلز ==========
        function playReel(id) {
            const reel = reelsDatabase.find(r => r.id === id);
            if (!reel) return;
            
            // زيادة المشاهدات
            reel.views++;
            saveReels();
            renderReels();
            
            // فتح مشغل الفيديو
            openVideoPlayer(reel);
        }

        // ========== فتح مشغل الفيديو ==========
        function openVideoPlayer(reel) {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.style.display = 'flex';
            modal.style.zIndex = '10001';
            
            modal.innerHTML = `
                <div style="background: linear-gradient(135deg, #1a3a32, #0a1a15); border: 3px solid gold; border-radius: 30px; padding: 20px; max-width: 90%; max-height: 90%;">
                    <div style="text-align: left; margin-bottom: 10px;">
                        <button onclick="this.closest('.modal').remove()" style="background: gold; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 20px;">✕</button>
                    </div>
                    <video controls autoplay style="max-width: 100%; max-height: 70vh; border-radius: 20px;">
                        <source src="${reel.videoUrl}" type="video/mp4">
                    </video>
                    <div style="margin-top: 15px; text-align: center;">
                        <h3 style="color: gold;">${escapeHtml(reel.title)}</h3>
                        <div style="display: flex; justify-content: center; gap: 20px; margin-top: 10px;">
                            <span><i class="fas fa-eye"></i> ${formatNumber(reel.views)}</span>
                            <span><i class="fas fa-heart"></i> ${formatNumber(reel.likes)}</span>
                            <span><i class="fas fa-fingerprint"></i> ${reel.thumbprint}</span>
                        </div>
                    </div>
                </div>
            `;
            
            document.body.appendChild(modal);
            
            modal.addEventListener('click', (e) => {
                if (e.target === modal) modal.remove();
            });
        }

        // ========== تحديث الإحصائيات ==========
        function updateStats() {
            const totalViews = reelsDatabase.reduce((sum, r) => sum + r.views, 0);
            const totalLikes = reelsDatabase.reduce((sum, r) => sum + r.likes, 0);
            
            document.getElementById('statsBar').innerHTML = `
                <div class="stat-item-center">
                    <div class="stat-value-center">${reelsDatabase.length}</div>
                    <div class="stat-label-center">إجمالي الريلز</div>
                </div>
                <div class="stat-item-center">
                    <div class="stat-value-center">${formatNumber(totalViews)}</div>
                    <div class="stat-label-center">مشاهدة</div>
                </div>
                <div class="stat-item-center">
                    <div class="stat-value-center">${formatNumber(totalLikes)}</div>
                    <div class="stat-label-center">إعجاب</div>
                </div>
            `;
        }

        // ========== فتح نافذة الرفع ==========
        function openUploadModal() {
            document.getElementById('uploadModal').style.display = 'flex';
            generateThumbprint();
            document.getElementById('errorMessage').style.display = 'none';
        }

        // ========== إغلاق نافذة الرفع ==========
        function closeUploadModal() {
            document.getElementById('uploadModal').style.display = 'none';
            removeVideo();
        }

        // ========== توليد بصمة ==========
        function generateThumbprint() {
            const date = new Date();
            const year = date.getFullYear().toString().substring(2);
            const month = (date.getMonth() + 1).toString().padStart(2, '0');
            const day = date.getDate().toString().padStart(2, '0');
            const hours = date.getHours().toString().padStart(2, '0');
            const minutes = date.getMinutes().toString().padStart(2, '0');
            const seconds = date.getSeconds().toString().padStart(2, '0');
            
            let prefix = 'REL';
            if (publishType === 'group') prefix = 'GRP';
            else if (publishType === 'story') prefix = 'STR';
            
            const userCode = currentUser.id.toString().padStart(4, '0');
            
            currentThumbprint = `${prefix}_${userCode}_${year}${month}${day}_${hours}${minutes}${seconds}`;
            document.getElementById('thumbprintValue').textContent = currentThumbprint;
        }

        // ========== تحديث البصمة كل ثانية ==========
        setInterval(generateThumbprint, 1000);

        // ========== اختيار نوع النشر ==========
        function selectPublishType(type, element) {
            publishType = type;
            
            document.querySelectorAll('.publish-option').forEach(opt => {
                opt.classList.remove('active');
            });
            
            element.classList.add('active');
            generateThumbprint();
        }

        // ========== معالجة رفع الفيديو ==========
        function handleVideoUpload(input) {
            if (input.files && input.files[0]) {
                selectedFile = input.files[0];
                
                if (selectedFile.size > 50 * 1024 * 1024) {
                    showNotification('❌ حجم الفيديو كبير جداً (الحد الأقصى 50MB)', 'error');
                    return;
                }

                const videoURL = URL.createObjectURL(selectedFile);
                document.getElementById('videoSource').src = videoURL;
                document.getElementById('videoPlayer').load();
                document.getElementById('videoPreview').classList.add('show');
                document.getElementById('videoName').textContent = selectedFile.name;

                showNotification('✅ تم رفع الفيديو', 'success');
            }
        }

        // ========== إزالة الفيديو ==========
        function removeVideo() {
            selectedFile = null;
            document.getElementById('videoPreview').classList.remove('show');
            document.getElementById('videoFile').value = '';
            document.getElementById('videoSource').src = '';
        }

        // ========== نسخ البصمة ==========
        function copyThumbprint() {
            navigator.clipboard.writeText(currentThumbprint).then(() => {
                showNotification('✅ تم نسخ البصمة', 'success');
            });
        }

        // ========== إرسال إلى تليجرام ==========
        async function sendReelToTelegram() {
            if (!selectedFile) {
                showNotification('❌ الرجاء رفع فيديو أولاً', 'error');
                return;
            }

            showNotification('🔄 جاري الإرسال إلى القناة...', 'info');
            document.getElementById('errorMessage').style.display = 'none';

            const title = document.getElementById('reelTitle').value || 'ريلز';
            
            // رسالة البصمة
            const message = `🎬 ريلز جديد\n\n👤 المستخدم: ${currentUser.name}\n🔍 البصمة: ${currentThumbprint}\n📌 النوع: ${publishType === 'channel' ? 'قناة' : publishType === 'group' ? 'مجموعة' : 'ستوري'}\n📝 العنوان: ${title}\n📁 الملف: ${selectedFile.name}\n📅 التاريخ: ${new Date().toLocaleString('ar-EG')}\n\n✅ تم الرفع بنجاح`;

            try {
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/sendMessage`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        chat_id: TELEGRAM.channelId,
                        text: message,
                        parse_mode: ''
                    })
                });

                const data = await response.json();

                if (data.ok) {
                    // حفظ الريلز في قاعدة البيانات
                    const newReel = {
                        id: Date.now(),
                        title: title,
                        videoUrl: URL.createObjectURL(selectedFile),
                        thumbnail: '',
                        views: 0,
                        likes: 0,
                        publisher: currentUser.name,
                        thumbprint: currentThumbprint,
                        createdAt: new Date().toISOString()
                    };
                    
                    reelsDatabase.unshift(newReel);
                    saveReels();
                    renderReels();
                    updateStats();
                    
                    // تحديث إحصائيات المستخدم
                    currentUser.reelsCount++;
                    currentUser.points += 10;
                    document.getElementById('userReelsCount').textContent = currentUser.reelsCount;
                    document.getElementById('userPoints').textContent = currentUser.points;
                    
                    showNotification(`✅ تم الإرسال بنجاح - ${currentThumbprint}`, 'success');
                    
                    document.getElementById('reelTitle').value = 'ريلز';
                    removeVideo();
                    
                    setTimeout(() => {
                        closeUploadModal();
                    }, 2000);
                } else {
                    const errorMsg = data.description || 'خطأ في الإرسال';
                    document.getElementById('errorMessage').innerHTML = `❌ ${errorMsg}`;
                    document.getElementById('errorMessage').style.display = 'block';
                    showNotification('❌ فشل الإرسال إلى القناة', 'error');
                }
            } catch (error) {
                document.getElementById('errorMessage').innerHTML = `❌ خطأ: ${error.message}`;
                document.getElementById('errorMessage').style.display = 'block';
                showNotification('❌ فشل الاتصال', 'error');
            }
        }

        // ========== عرض الإشعارات ==========
        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.className = 'notification';
            
            let icon = 'ℹ️';
            if (type === 'success') icon = '✅';
            else if (type === 'error') icon = '❌';
            else if (type === 'info') icon = '🔄';
            
            notification.innerHTML = `${icon} ${message}`;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 3000);
        }

        // ========== أدوات مساعدة ==========
        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // ========== تهيئة الصفحة ==========
        document.getElementById('userName').textContent = currentUser.name;
        document.getElementById('userRole').textContent = 'تاجر معتمد';
        document.getElementById('userReelsCount').textContent = currentUser.reelsCount;
        document.getElementById('userPoints').textContent = currentUser.points;
        
        loadReels();

        // إغلاق النافذة عند الضغط خارجها
        window.onclick = function(event) {
            const modal = document.getElementById('uploadModal');
            if (event.target === modal) {
                closeUploadModal();
            }
        };
    </script>
</body>
</html>
