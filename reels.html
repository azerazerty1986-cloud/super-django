<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ناردو ريلز | عرض موحد للجميع من تليجرام</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* نفس الستايلات الموجودة مع إضافة بعض التحسينات */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #000; color: white; overflow-x: hidden; }

        /* شاشة تسجيل الدخول - نسخة محسنة */
        .login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #0f2b23, #1e4a3f);
            display: flex; justify-content: center; align-items: center; z-index: 20000;
        }
        .login-box {
            background: rgba(0,0,0,0.8); border: 3px solid gold; border-radius: 40px;
            padding: 40px; width: 90%; max-width: 400px; text-align: center;
        }
        .login-box h2 { color: gold; margin-bottom: 20px; }
        .login-box input {
            width: 100%; padding: 15px; margin: 15px 0;
            background: rgba(255,255,255,0.1); border: 2px solid gold;
            border-radius: 30px; color: white; text-align: center;
        }
        .login-btn {
            width: 100%; padding: 15px;
            background: linear-gradient(135deg, gold, #ffd700);
            border: none; border-radius: 30px; font-weight: bold; cursor: pointer;
        }

        /* باقي الستايلات كما هي... */
        /* ... */
    </style>
</head>
<body>
    <!-- نفس هيكل HTML مع بعض التحسينات -->
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <i class="fas fa-film" style="font-size: 60px; color: gold; margin-bottom: 20px;"></i>
            <h2>ناردو ريلز</h2>
            <input type="text" id="loginUsername" placeholder="اسم المستخدم">
            <button class="login-btn" onclick="login()">دخول <i class="fas fa-sign-in-alt"></i></button>
            <div style="margin-top: 15px; font-size: 12px;">👤 أدخل أي اسم للدخول</div>
        </div>
    </div>

    <!-- باقي العناصر كما هي... -->
    
    <script>
        // ========== نظام الأمان المدمج (من الكود الأول) ==========
        const SecuritySystem = {
            sanitize(text) {
                if (!text) return '';
                return text
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#39;')
                    .replace(/javascript:/gi, '')
                    .replace(/onclick=/gi, '')
                    .replace(/onerror=/gi, '')
                    .replace(/onload=/gi, '');
            },
            
            generateSessionId() {
                return 'sess_' + Math.random().toString(36).substring(2) + Date.now().toString(36);
            }
        };

        // ========== نظام المعرفات الفريدة (من الكود الأول) ==========
        const IDSystem = {
            counters: {
                reel: 1,
                user: 5000
            },
            
            generateId(type) {
                this.counters[type] = (this.counters[type] || 0) + 1;
                const prefix = type === 'reel' ? 'REL' : 'USR';
                const number = this.counters[type].toString().padStart(6, '0');
                return `${prefix}_${number}`;
            },
            
            saveCounters() {
                localStorage.setItem('reel_id_counters', JSON.stringify(this.counters));
            },
            
            loadCounters() {
                const saved = localStorage.getItem('reel_id_counters');
                if (saved) {
                    this.counters = { ...this.counters, ...JSON.parse(saved) };
                }
            }
        };

        // ========== دوال مساعدة محسنة (من الكود الأول) ==========
        const Utils = {
            formatNumber(num) {
                if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
                if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
                return num.toString();
            },
            
            getTimeAgo(dateString) {
                if (!dateString) return '';
                const now = new Date();
                const past = new Date(dateString);
                const diffInSeconds = Math.floor((now - past) / 1000);
                
                if (diffInSeconds < 60) return 'الآن';
                if (diffInSeconds < 3600) return `منذ ${Math.floor(diffInSeconds / 60)} دقيقة`;
                if (diffInSeconds < 86400) return `منذ ${Math.floor(diffInSeconds / 3600)} ساعة`;
                if (diffInSeconds < 604800) return `منذ ${Math.floor(diffInSeconds / 86400)} يوم`;
                return 'منذ وقت';
            },
            
            escapeHtml(text) {
                return SecuritySystem.sanitize(text);
            },
            
            showNotification(msg, type = 'info') {
                const div = document.createElement('div');
                div.className = 'notification';
                const icon = type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️';
                div.innerHTML = `${icon} ${msg}`;
                document.body.appendChild(div);
                setTimeout(() => div.remove(), 3000);
            },
            
            save(key, data) {
                try {
                    localStorage.setItem(key, JSON.stringify(data));
                    return true;
                } catch (e) {
                    console.error('خطأ في الحفظ:', e);
                    return false;
                }
            },
            
            load(key, defaultValue = null) {
                try {
                    const data = localStorage.getItem(key);
                    return data ? JSON.parse(data) : defaultValue;
                } catch (e) {
                    return defaultValue;
                }
            }
        };

        // ========== إعدادات تليجرام ==========
        const TELEGRAM = {
            botToken: '8576673096:AAECPDHWRTVQ_juq68hxM9PIdacnqevGRb4',
            channelId: '-1003822964890',
            apiUrl: 'https://api.telegram.org/bot'
        };

        // ========== المتغيرات العامة ==========
        let reelsCache = [];
        let users = [];
        let currentUser = null;
        let selectedVideoFile = null;
        let userLikes = {};
        let isLoading = false;

        // ========== تحميل المستخدمين المحسن ==========
        function loadUsers() {
            const saved = Utils.load('nardoo_reels_users');
            if (saved) {
                users = saved;
            } else {
                users = [
                    { id: IDSystem.generateId('user'), name: 'المدير', username: 'admin', role: 'admin', points: 1000, createdAt: new Date().toISOString() },
                    { id: IDSystem.generateId('user'), name: 'مستخدم', username: 'user', role: 'user', points: 100, createdAt: new Date().toISOString() }
                ];
                Utils.save('nardoo_reels_users', users);
            }
        }
        
        // ========== تحميل الإعجابات ==========
        function loadLikes() {
            const userId = currentUser?.id || 'guest';
            const saved = Utils.load(`nardoo_reels_likes_${userId}`);
            if (saved) {
                userLikes = saved;
            } else {
                userLikes = {};
            }
        }
        
        function saveLikes() {
            const userId = currentUser?.id || 'guest';
            Utils.save(`nardoo_reels_likes_${userId}`, userLikes);
        }
        
        // ========== جلب جميع الريلز من قناة تليجرام (محسن) ==========
        async function loadReelsFromTelegram() {
            if (isLoading) return;
            isLoading = true;
            
            showLoadingOverlay(true, "🔄 جاري تحميل الريلز...");
            
            try {
                const url = `${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getUpdates?limit=100`;
                const response = await fetch(url);
                const data = await response.json();
                
                const reels = [];
                
                if (data.ok && data.result) {
                    const updates = [...data.result].reverse();
                    
                    for (const update of updates) {
                        const post = update.channel_post || update.message;
                        if (!post || !post.video) continue;
                        
                        const caption = post.caption || '';
                        let title = '🎬 ريلز';
                        const titleMatch = caption.match(/🎬 (.+?)(?:\n|$)/);
                        if (titleMatch) title = SecuritySystem.sanitize(titleMatch[1]);
                        
                        let publisher = 'ناردو برو';
                        const publisherMatch = caption.match(/👤 (.+?)(?:\n|$)/);
                        if (publisherMatch) publisher = SecuritySystem.sanitize(publisherMatch[1]);
                        
                        const fileRes = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getFile?file_id=${post.video.file_id}`);
                        const fileData = await fileRes.json();
                        
                        if (fileData.ok) {
                            const videoUrl = `https://api.telegram.org/file/bot${TELEGRAM.botToken}/${fileData.result.file_path}`;
                            
                            reels.push({
                                id: post.message_id,
                                reelId: IDSystem.generateId('reel'),
                                title: title,
                                videoUrl: videoUrl,
                                publisher: publisher,
                                views: 0,
                                likes: 0,
                                createdAt: new Date(post.date * 1000).toISOString(),
                                fingerprint: `${post.message_id}_${post.date}`
                            });
                        }
                    }
                }
                
                if (reels.length > 0) {
                    // حفظ في الكاش مع التحقق من التغيير
                    const reelsHash = JSON.stringify(reels.map(r => r.fingerprint));
                    const oldHash = Utils.load('reels_hash', '');
                    
                    if (reelsHash !== oldHash) {
                        reelsCache = reels;
                        Utils.save('nardoo_reels_cache', reels);
                        Utils.save('reels_hash', reelsHash);
                        console.log(`✅ تم تحميل ${reels.length} ريلز من تليجرام`);
                        displayAllReels();
                        updateStats();
                        Utils.showNotification(`📹 تم تحديث ${reels.length} ريلز`, 'success');
                    } else {
                        console.log('⚡ لا توجد ريلز جديدة');
                    }
                } else {
                    // استعادة من الكاش إذا لم تكن هناك ريلز جديدة
                    const cached = Utils.load('nardoo_reels_cache');
                    if (cached && cached.length > 0) {
                        reelsCache = cached;
                        console.log(`📦 تم استعادة ${reelsCache.length} ريلز من الكاش`);
                        displayAllReels();
                        updateStats();
                    } else {
                        // ريلز تجريبية
                        reelsCache = [
                            {
                                id: 1001,
                                reelId: IDSystem.generateId('reel'),
                                title: '🎬 مرحباً بك في ناردو ريلز',
                                videoUrl: 'https://www.w3schools.com/html/mov_bbb.mp4',
                                publisher: 'النظام',
                                views: 0,
                                likes: 0,
                                createdAt: new Date().toISOString()
                            },
                            {
                                id: 1002,
                                reelId: IDSystem.generateId('reel'),
                                title: '✨ قم برفع أول ريلز خاص بك',
                                videoUrl: 'https://www.w3schools.com/html/movie.mp4',
                                publisher: 'النظام',
                                views: 0,
                                likes: 0,
                                createdAt: new Date().toISOString()
                            }
                        ];
                        Utils.save('nardoo_reels_cache', reelsCache);
                        displayAllReels();
                        updateStats();
                        console.log(`📹 تم تحميل ${reelsCache.length} ريلز تجريبية`);
                    }
                }
                
            } catch (error) {
                console.error('❌ خطأ:', error);
                const cached = Utils.load('nardoo_reels_cache');
                if (cached) {
                    reelsCache = cached;
                    displayAllReels();
                    updateStats();
                    Utils.showNotification(`⚠️ فشل الاتصال، عرض ${reelsCache.length} ريلز مخزنة`, 'warning');
                } else {
                    Utils.showNotification('❌ فشل الاتصال بتليجرام', 'error');
                }
            } finally {
                isLoading = false;
                showLoadingOverlay(false);
            }
        }
        
        // ========== رفع ريلز جديد (محسن) ==========
        async function uploadReelToTelegram() {
            if (!selectedVideoFile) {
                Utils.showNotification('❌ اختر فيديو أولاً', 'error');
                return;
            }
            if (!currentUser) {
                Utils.showNotification('❌ يرجى تسجيل الدخول', 'error');
                return;
            }
            
            const title = document.getElementById('reelTitleInput').value.trim() || 'ريلز رائع';
            const btn = document.getElementById('uploadBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> جاري الرفع...';
            
            try {
                const formData = new FormData();
                formData.append('chat_id', TELEGRAM.channelId);
                formData.append('video', selectedVideoFile);
                formData.append('caption', `🎬 ${SecuritySystem.sanitize(title)}\n👤 ${SecuritySystem.sanitize(currentUser.name)}\n🆔 ${currentUser.id}\n📅 ${new Date().toLocaleString('ar-EG')}\n\n✅ تم الرفع عبر تطبيق ناردو ريلز`);
                
                const response = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/sendVideo`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.ok) {
                    Utils.showNotification(`✅ تم الرفع بنجاح! المعرف: ${data.result.message_id}`, 'success');
                    setTimeout(() => {
                        loadReelsFromTelegram();
                    }, 3000);
                    closeUploadModal();
                    removeSelectedVideo();
                } else {
                    throw new Error(data.description || 'فشل الرفع');
                }
            } catch (error) {
                console.error('❌ خطأ:', error);
                Utils.showNotification('❌ فشل الرفع: ' + error.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fab fa-telegram"></i> رفع ونشر للجميع';
            }
        }
        
        // ========== عرض جميع الريلز (محسن) ==========
        function displayAllReels() {
            const container = document.getElementById('reelsPlayer');
            
            if (!reelsCache || reelsCache.length === 0) {
                container.innerHTML = `
                    <div style="display: flex; align-items: center; justify-content: center; height: 100%; color: gold; flex-direction: column; text-align: center; padding: 20px;">
                        <i class="fas fa-film" style="font-size: 80px; margin-bottom: 20px;"></i>
                        <h2>لا توجد ريلز</h2>
                        <p style="margin: 15px 0;">اضغط على زر + لرفع أول ريلز</p>
                        <button class="refresh-btn" onclick="loadReelsFromTelegram()" style="margin-top: 20px;">
                            <i class="fas fa-sync-alt"></i> تحميل من تليجرام
                        </button>
                    </div>
                `;
                return;
            }
            
            const sorted = [...reelsCache].reverse();
            
            container.innerHTML = sorted.map(reel => {
                const isLiked = userLikes[reel.id] === true;
                const viewsText = Utils.formatNumber(reel.views || 0);
                const likesText = Utils.formatNumber(reel.likes || 0);
                
                return `
                    <div class="reel-slide" data-reel-id="${reel.id}" data-reel-fingerprint="${reel.fingerprint || reel.id}">
                        <div class="reel-id-badge">
                            <i class="fas fa-fingerprint"></i> ${reel.reelId || `ID: ${reel.id}`}
                        </div>
                        <div class="reel-video-container">
                            <video src="${reel.videoUrl}" preload="metadata" playsinline webkit-playsinline loop></video>
                            <div class="action-sidebar">
                                <div class="action-btn-side ${isLiked ? 'liked' : ''}" onclick="likeReel(${reel.id}, event)">
                                    <i class="fas fa-heart"></i>
                                    <span>${likesText}</span>
                                </div>
                                <div class="action-btn-side" onclick="shareReel('${reel.videoUrl}', event)">
                                    <i class="fas fa-share-alt"></i>
                                    <span>مشاركة</span>
                                </div>
                            </div>
                            <div class="reel-overlay">
                                <div class="reel-info">
                                    <div class="reel-title">
                                        <i class="fas fa-play-circle" style="color: gold;"></i> ${Utils.escapeHtml(reel.title)}
                                    </div>
                                    <div class="reel-publisher">
                                        <i class="fas fa-user-circle"></i> ${Utils.escapeHtml(reel.publisher)}
                                    </div>
                                    <div class="reel-stats">
                                        <span><i class="fas fa-eye"></i> ${viewsText}</span>
                                        <span><i class="fas fa-heart"></i> ${likesText}</span>
                                        <span><i class="fas fa-calendar"></i> ${Utils.getTimeAgo(reel.createdAt)}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            // إضافة Intersection Observer للتشغيل التلقائي
            setTimeout(() => {
                const slides = document.querySelectorAll('.reel-slide');
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        const video = entry.target.querySelector('video');
                        if (entry.isIntersecting) {
                            video.play().catch(e => console.log);
                            const reelId = parseInt(entry.target.dataset.reelId);
                            const reel = reelsCache.find(r => r.id === reelId);
                            if (reel && !reel.viewRecorded) {
                                reel.views = (reel.views || 0) + 1;
                                reel.viewRecorded = true;
                                updateStats();
                                // حفظ المشاهدات في الكاش
                                Utils.save('nardoo_reels_cache', reelsCache);
                            }
                        } else {
                            video.pause();
                        }
                    });
                }, { threshold: 0.6 });
                slides.forEach(slide => observer.observe(slide));
            }, 100);
        }
        
        // ========== الإعجاب (محسن) ==========
        function likeReel(reelId, event) {
            event.stopPropagation();
            const reel = reelsCache.find(r => r.id === reelId);
            if (reel) {
                if (userLikes[reelId]) {
                    reel.likes = Math.max(0, (reel.likes || 0) - 1);
                    delete userLikes[reelId];
                } else {
                    reel.likes = (reel.likes || 0) + 1;
                    userLikes[reelId] = true;
                }
                saveLikes();
                // حفظ التغييرات في الكاش
                Utils.save('nardoo_reels_cache', reelsCache);
                displayAllReels();
                updateStats();
            }
        }
        
        function shareReel(videoUrl, event) {
            event.stopPropagation();
            navigator.clipboard.writeText(videoUrl);
            Utils.showNotification('🔗 تم نسخ رابط الفيديو', 'success');
        }
        
        function updateStats() {
            const totalReels = reelsCache.length;
            const countSpan = document.getElementById('totalReelsCount');
            if (countSpan) countSpan.innerText = totalReels;
        }
        
        // ========== دوال مساعدة للواجهة ==========
        function handleVideoSelect(input) {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                if (file.size > 50 * 1024 * 1024) {
                    Utils.showNotification('حجم الفيديو كبير جداً (الحد الأقصى 50MB)', 'error');
                    return;
                }
                if (!file.type.startsWith('video/')) {
                    Utils.showNotification('الرجاء اختيار ملف فيديو صالح', 'error');
                    return;
                }
                selectedVideoFile = file;
                const url = URL.createObjectURL(file);
                document.getElementById('previewVideo').src = url;
                document.getElementById('videoPreviewDiv').classList.add('show');
            }
        }
        
        function removeSelectedVideo() {
            selectedVideoFile = null;
            document.getElementById('videoPreviewDiv').classList.remove('show');
            document.getElementById('videoInput').value = '';
            document.getElementById('previewVideo').src = '';
        }
        
        function openUploadModal() {
            if (!currentUser) {
                Utils.showNotification('يجب تسجيل الدخول أولاً', 'warning');
                return;
            }
            document.getElementById('uploadModal').style.display = 'flex';
        }
        
        function closeUploadModal() {
            document.getElementById('uploadModal').style.display = 'none';
        }
        
        function showLoadingOverlay(show, message = "جاري التحميل...") {
            let overlay = document.getElementById('loadingOverlay');
            if (show && !overlay) {
                overlay = document.createElement('div');
                overlay.id = 'loadingOverlay';
                overlay.className = 'loading-overlay';
                overlay.innerHTML = `<i class="fas fa-spinner fa-pulse" style="font-size: 50px; color: gold;"></i><p>${message}</p>`;
                document.body.appendChild(overlay);
            } else if (show && overlay) {
                overlay.style.display = 'flex';
                overlay.querySelector('p').innerText = message;
            } else if (!show && overlay) {
                overlay.remove();
            }
        }
        
        // ========== تسجيل الدخول والخروج (محسن) ==========
        function login() {
            const username = document.getElementById('loginUsername').value.trim();
            if (!username) {
                Utils.showNotification('❌ أدخل اسم المستخدم', 'error');
                return;
            }
            
            let user = users.find(u => u.username === username || u.name === username);
            if (!user) {
                user = { 
                    id: IDSystem.generateId('user'), 
                    name: SecuritySystem.sanitize(username), 
                    username: SecuritySystem.sanitize(username), 
                    role: 'user', 
                    points: 100,
                    createdAt: new Date().toISOString(),
                    sessionId: SecuritySystem.generateSessionId()
                };
                users.push(user);
                Utils.save('nardoo_reels_users', users);
            }
            
            currentUser = user;
            Utils.save('current_reels_user', user);
            loadLikes();
            
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('topBar').style.display = 'block';
            document.getElementById('fabButtons').style.display = 'block';
            document.getElementById('reelsPlayer').style.display = 'block';
            document.getElementById('userNameDisplay').innerText = currentUser.name;
            
            loadReelsFromTelegram();
            
            Utils.showNotification(`✅ مرحباً ${user.name}`, 'success');
        }
        
        function logout() {
            currentUser = null;
            Utils.save('current_reels_user', null);
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('topBar').style.display = 'none';
            document.getElementById('fabButtons').style.display = 'none';
            document.getElementById('reelsPlayer').style.display = 'none';
            reelsCache = [];
        }
        
        // ========== تحديث تلقائي كل 5 دقائق ==========
        setInterval(() => {
            if (currentUser && !isLoading) {
                loadReelsFromTelegram();
            }
        }, 300000);
        
        // ========== تهيئة الصفحة ==========
        IDSystem.loadCounters();
        loadUsers();
        
        const savedUser = Utils.load('current_reels_user');
        if (savedUser) {
            currentUser = savedUser;
            if (currentUser) {
                loadLikes();
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('topBar').style.display = 'block';
                document.getElementById('fabButtons').style.display = 'block';
                document.getElementById('reelsPlayer').style.display = 'block';
                document.getElementById('userNameDisplay').innerText = currentUser.name;
                loadReelsFromTelegram();
            }
        }
        
        window.onclick = function(e) {
            const modal = document.getElementById('uploadModal');
            if (e.target === modal) closeUploadModal();
        };
        
        console.log('🎬 نظام ناردو ريلز جاهز - نسخة مستقلة ومحسنة');
        console.log('✅ الميزات المضافة: نظام أمان، معرفات فريدة، دوال مساعدة محسنة');
    </script>
</body>
</html>
