<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>نظام السلة - ناردو برو</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --gold: #ffd700;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --glass: rgba(255, 255, 255, 0.05);
            --success: #4ade80;
            --error: #f87171;
            --warning: #fbbf24;
            --info: #60a5fa;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0f3460, #16213e);
            color: var(--text-primary);
            min-height: 100vh;
            direction: rtl;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* ===== الهيدر ===== */
        .header {
            background: var(--glass);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-title i {
            font-size: 40px;
            color: var(--gold);
        }

        .header-title h1 {
            font-size: 32px;
            color: var(--gold);
            margin: 0;
        }

        .header-info {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 215, 0, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
        }

        .info-item i {
            color: var(--gold);
            font-size: 20px;
        }

        .info-item span {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Cairo', sans-serif;
        }

        .btn-gold {
            background: var(--gold);
            color: #000;
        }

        .btn-gold:hover {
            background: #ffed4e;
            transform: translateY(-2px);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--gold);
        }

        .btn-outline:hover {
            background: rgba(255, 215, 0, 0.1);
        }

        .btn-small {
            padding: 8px 15px;
            font-size: 12px;
        }

        /* ===== المنتجات ===== */
        .section-title {
            font-size: 24px;
            color: var(--gold);
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(255, 215, 0, 0.2);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .product-card {
            background: var(--glass);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 15px;
            padding: 20px;
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
        }

        .product-card:hover {
            border-color: var(--gold);
            transform: translateY(-5px);
        }

        .product-image {
            width: 100%;
            height: 150px;
            background: rgba(255, 215, 0, 0.1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            margin-bottom: 15px;
            overflow: hidden;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-name {
            font-size: 18px;
            font-weight: bold;
            color: var(--gold);
            margin-bottom: 8px;
        }

        .product-price {
            font-size: 22px;
            font-weight: bold;
            color: var(--success);
            margin-bottom: 10px;
        }

        .product-stock {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 15px;
        }

        .product-actions {
            display: flex;
            gap: 10px;
        }

        /* ===== السلة ===== */
        .cart-section {
            background: var(--glass);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 20px;
            padding: 25px;
        }

        .cart-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 215, 0, 0.15);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            transition: all 0.3s;
        }

        .cart-item:hover {
            border-color: var(--gold);
            background: rgba(255, 215, 0, 0.05);
        }

        .cart-item-info {
            flex: 2;
            min-width: 200px;
        }

        .cart-item-name {
            font-size: 16px;
            font-weight: bold;
            color: var(--gold);
            margin-bottom: 5px;
        }

        .cart-item-price {
            font-size: 14px;
            color: var(--success);
        }

        .cart-item-quantity {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 215, 0, 0.1);
            padding: 8px 15px;
            border-radius: 10px;
        }

        .cart-item-quantity button {
            background: none;
            border: none;
            color: var(--gold);
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            width: 30px;
            height: 30px;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .cart-item-quantity button:hover {
            background: rgba(255, 215, 0, 0.2);
        }

        .cart-item-quantity span {
            font-size: 16px;
            font-weight: bold;
            min-width: 30px;
            text-align: center;
        }

        .cart-item-total {
            font-size: 18px;
            font-weight: bold;
            color: var(--gold);
            min-width: 120px;
            text-align: center;
        }

        .cart-item-remove {
            background: rgba(248, 113, 113, 0.2);
            color: var(--error);
            border: 1px solid var(--error);
            padding: 8px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .cart-item-remove:hover {
            background: var(--error);
            color: white;
        }

        /* ===== ملخص السلة ===== */
        .cart-summary {
            background: rgba(255, 215, 0, 0.05);
            border-radius: 15px;
            padding: 25px;
            margin-top: 20px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.1);
        }

        .summary-row:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .summary-label {
            color: var(--text-secondary);
            font-size: 16px;
        }

        .summary-value {
            color: var(--gold);
            font-weight: bold;
            font-size: 18px;
        }

        .summary-total {
            font-size: 24px;
            color: var(--success);
        }

        .cart-actions {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        .cart-actions .btn {
            flex: 1;
        }

        /* ===== الحالات الفارغة ===== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 70px;
            color: var(--gold);
            margin-bottom: 20px;
        }

        .empty-state h3 {
            font-size: 24px;
            margin-bottom: 10px;
            color: var(--text-primary);
        }

        /* ===== الإشعارات ===== */
        .notification {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            max-width: 400px;
            margin: 0 auto;
            padding: 15px 25px;
            border-radius: 12px;
            font-weight: bold;
            z-index: 2000;
            animation: slideIn 0.3s ease;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .notification.success {
            background: var(--success);
            color: #000;
        }

        .notification.error {
            background: var(--error);
            color: #fff;
        }

        .notification.warning {
            background: var(--warning);
            color: #000;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-100px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* ===== شاشة التحميل ===== */
        .loader-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 3000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255,215,0,0.3);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== الاستجابة ===== */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                text-align: center;
            }

            .header-title {
                flex-direction: column;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .cart-item {
                flex-direction: column;
                align-items: stretch;
            }

            .cart-item-total {
                text-align: right;
            }

            .cart-actions {
                flex-direction: column;
            }
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            display: inline-block;
            margin-right: 8px;
        }

        .status-in-stock {
            background: rgba(74, 222, 128, 0.2);
            color: var(--success);
        }

        .status-out-of-stock {
            background: rgba(248, 113, 113, 0.2);
            color: var(--error);
        }

        .product-merchant {
            font-size: 12px;
            color: var(--gold);
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ===== الهيدر ===== -->
        <div class="header">
            <div class="header-title">
                <i class="fas fa-shopping-cart"></i>
                <h1>نظام السلة - ناردو برو</h1>
            </div>
            <div class="header-info">
                <div class="info-item">
                    <i class="fas fa-shopping-bag"></i>
                    <span>السلة: <strong id="cartCount">0</strong></span>
                </div>
                <div class="info-item">
                    <i class="fas fa-dollar-sign"></i>
                    <span>الإجمالي: <strong id="cartTotal">0</strong> دج</span>
                </div>
                <button class="btn btn-outline btn-small" onclick="clearCart()">
                    <i class="fas fa-trash-alt"></i> مسح الكل
                </button>
            </div>
        </div>

        <!-- ===== المنتجات ===== -->
        <h2 class="section-title"><i class="fas fa-cube"></i> المنتجات المتاحة</h2>
        <div id="productsContainer" class="grid"></div>

        <!-- ===== السلة ===== -->
        <div class="cart-section">
            <h2 class="section-title" style="margin-top: 0;"><i class="fas fa-shopping-basket"></i> سلة المشتريات</h2>
            <div id="cartContainer"></div>
        </div>
    </div>

    <!-- شاشة التحميل -->
    <div id="loaderOverlay" class="loader-overlay" style="display: none;">
        <div class="spinner"></div>
        <p style="margin-top: 20px; color: var(--gold);">جاري تحميل المنتجات...</p>
    </div>

    <script>
        // ================================================================
        // تكامل مع نظام تلغرام - جلب المنتجات من 04-telegram.js
        // ================================================================

        // إعدادات تلغرام (نفس الإعدادات من 04-telegram.js)
        const TELEGRAM = {
            botToken: '8576673096:AAGvSMjzwVWj6wJ47JdqiDwcObXjBDcyiLA',
            channelId: '-1003822964890',
            adminId: '7461896689',
            apiUrl: 'https://api.telegram.org/bot'
        };

        // المتغيرات العامة
        let products = [];
        let cart = [];
        let isLoading = false;

        // ================================================================
        // تحميل المنتجات من localStorage أولاً ثم من تلغرام
        // ================================================================
        
        // دالة مساعدة للحصول على الوقت المنقضي
        function getTimeAgo(dateString) {
            if (!dateString) return '';
            
            const now = new Date();
            const productDate = new Date(dateString);
            const diffInSeconds = Math.floor((now - productDate) / 1000);
            
            if (diffInSeconds < 60) return 'الآن';
            if (diffInSeconds < 3600) {
                const minutes = Math.floor(diffInSeconds / 60);
                return `منذ ${minutes} دقيقة`;
            }
            if (diffInSeconds < 86400) {
                const hours = Math.floor(diffInSeconds / 3600);
                return `منذ ${hours} ساعة`;
            }
            if (diffInSeconds < 604800) {
                const days = Math.floor(diffInSeconds / 86400);
                return `منذ ${days} يوم`;
            }
            return 'منذ وقت';
        }

        // دالة الحصول على اسم القسم
        function getCategoryName(category) {
            const names = {
                'promo': 'بروموسيو',
                'spices': 'توابل',
                'cosmetic': 'كوسمتيك',
                'other': 'منتوجات أخرى'
            };
            return names[category] || 'أخرى';
        }

        // دالة جلب المنتجات من تلغرام
        async function fetchProductsFromTelegram() {
            try {
                isLoading = true;
                const loader = document.getElementById('loaderOverlay');
                if (loader) loader.style.display = 'flex';
                
                console.log('🔄 جاري جلب المنتجات من تلغرام...');
                
                const response = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getUpdates?limit=100`);
                const data = await response.json();
                
                if (!data.ok) {
                    throw new Error('فشل الاتصال بـ Telegram API');
                }
                
                // تحميل المنتجات المخزنة محلياً
                const localProducts = JSON.parse(localStorage.getItem('nardoo_products') || '[]');
                const telegramProducts = [];
                
                if (data.result) {
                    for (const update of data.result) {
                        const post = update.channel_post || update.message;
                        if (!post || !post.photo) continue;
                        
                        const caption = post.caption || '';
                        const lines = caption.split('\n');
                        
                        let name = 'منتج';
                        let price = 1000;
                        let category = 'other';
                        let stock = 10;
                        let merchant = 'ناردو برو';
                        let description = '';
                        
                        for (const line of lines) {
                            if (line.includes('المنتج:')) name = line.split(':')[1]?.trim() || name;
                            if (line.includes('السعر:')) price = parseInt(line.split(':')[1]?.trim()) || price;
                            if (line.includes('القسم:')) category = line.split(':')[1]?.trim().toLowerCase() || category;
                            if (line.includes('الكمية:')) stock = parseInt(line.split(':')[1]?.trim()) || stock;
                            if (line.includes('الناشر:')) merchant = line.split(':')[1]?.trim() || merchant;
                            if (line.includes('الوصف:')) description = line.split(':')[1]?.trim() || description;
                        }
                        
                        const telegramId = post.message_id;
                        let mediaUrl = null;
                        let images = [];
                        
                        if (post.photo) {
                            const fileId = post.photo[post.photo.length - 1].file_id;
                            const fileResponse = await fetch(
                                `https://api.telegram.org/bot${TELEGRAM.botToken}/getFile?file_id=${fileId}`
                            );
                            const fileData = await fileResponse.json();
                            
                            if (fileData.ok) {
                                mediaUrl = `https://api.telegram.org/file/bot${TELEGRAM.botToken}/${fileData.result.file_path}`;
                                images = [mediaUrl];
                            }
                        }
                        
                        if (images.length === 0) {
                            images = ["https://via.placeholder.com/300/2c5e4f/ffffff?text=نكهة+وجمال"];
                            mediaUrl = images[0];
                        }
                        
                        if (mediaUrl) {
                            telegramProducts.push({
                                id: telegramId,
                                telegramId: telegramId,
                                name: name,
                                price: price || 1000,
                                category: category,
                                stock: stock || 10,
                                merchantName: merchant,
                                description: description,
                                rating: 4.5,
                                image: mediaUrl,
                                images: images,
                                telegramLink: `https://t.me/c/${TELEGRAM.channelId.replace('-100', '')}/${post.message_id}`,
                                createdAt: new Date(post.date * 1000).toISOString(),
                                dateStr: getTimeAgo(post.date)
                            });
                        }
                    }
                }
                
                // دمج المنتجات
                const mergedProducts = [...localProducts];
                
                for (const newProduct of telegramProducts) {
                    const exists = mergedProducts.some(p => p.id === newProduct.id);
                    if (!exists) {
                        mergedProducts.push(newProduct);
                        console.log(`✅ منتج جديد: ${newProduct.name} (ID: ${newProduct.id})`);
                    }
                }
                
                console.log(`✅ تم جلب ${telegramProducts.length} منتج من تلغرام، إجمالي: ${mergedProducts.length}`);
                
                // حفظ في localStorage
                localStorage.setItem('nardoo_products', JSON.stringify(mergedProducts));
                
                products = mergedProducts;
                return mergedProducts;
                
            } catch (error) {
                console.error('❌ خطأ في جلب المنتجات:', error);
                showNotification('فشل الاتصال بتلغرام، عرض المنتجات المخزنة', 'warning');
                
                const saved = localStorage.getItem('nardoo_products');
                if (saved) {
                    products = JSON.parse(saved);
                    return products;
                }
                
                return [];
                
            } finally {
                isLoading = false;
                const loader = document.getElementById('loaderOverlay');
                if (loader) loader.style.display = 'none';
            }
        }

        // ================================================================
        // دوال السلة (نفس الدوال من الملف الأول)
        // ================================================================
        
        function saveCart() {
            localStorage.setItem('cart_system', JSON.stringify(cart));
        }

        function loadCart() {
            const saved = localStorage.getItem('cart_system');
            cart = saved ? JSON.parse(saved) : [];
            updateCartDisplay();
            updateCartCounters();
        }

        function updateCartCounters() {
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            
            const cartCount = document.getElementById('cartCount');
            const cartTotal = document.getElementById('cartTotal');
            
            if (cartCount) cartCount.textContent = count;
            if (cartTotal) cartTotal.textContent = total.toLocaleString('ar-EG');
        }

        function showNotification(message, type = 'success') {
            const existingNotification = document.querySelector('.notification');
            if (existingNotification) {
                existingNotification.remove();
            }
            
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i> ${message}`;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 2500);
        }

        function addToCart(productId) {
            const product = products.find(p => p.id == productId);
            
            if (!product) {
                showNotification('المنتج غير موجود', 'error');
                return;
            }

            if (product.stock <= 0) {
                showNotification('المنتج غير متوفر في المخزون', 'error');
                return;
            }

            const existingItem = cart.find(item => item.id === productId);
            
            if (existingItem) {
                if (existingItem.quantity < product.stock) {
                    existingItem.quantity++;
                    showNotification(`✓ تم إضافة ${product.name} إلى السلة`, 'success');
                } else {
                    showNotification(`لا يمكن إضافة أكثر من ${product.stock} قطع`, 'warning');
                    return;
                }
            } else {
                cart.push({
                    id: product.id,
                    name: product.name,
                    price: product.price,
                    quantity: 1,
                    image: product.image,
                    merchantName: product.merchantName
                });
                showNotification(`✓ تم إضافة ${product.name} إلى السلة`, 'success');
            }

            saveCart();
            updateCartCounters();
            updateCartDisplay();
        }

        function updateCartQuantity(productId, change) {
            const itemIndex = cart.findIndex(item => item.id === productId);
            
            if (itemIndex === -1) return;
            
            const item = cart[itemIndex];
            const product = products.find(p => p.id == productId);
            
            const newQuantity = item.quantity + change;
            
            if (newQuantity <= 0) {
                removeFromCart(productId);
            } else if (newQuantity <= product.stock) {
                item.quantity = newQuantity;
                saveCart();
                updateCartCounters();
                updateCartDisplay();
                showNotification(`✓ تم تحديث كمية ${item.name}`, 'success');
            } else {
                showNotification(`لا يمكن إضافة أكثر من ${product.stock} قطع`, 'warning');
            }
        }

        function removeFromCart(productId) {
            const item = cart.find(i => i.id === productId);
            if (item) {
                cart = cart.filter(item => item.id !== productId);
                saveCart();
                updateCartCounters();
                updateCartDisplay();
                showNotification(`✓ تم إزالة ${item.name} من السلة`, 'success');
            }
        }

        function clearCart() {
            if (cart.length === 0) {
                showNotification('السلة فارغة بالفعل', 'warning');
                return;
            }
            
            if (confirm('هل أنت متأكد من مسح جميع المنتجات من السلة؟')) {
                cart = [];
                saveCart();
                updateCartCounters();
                updateCartDisplay();
                showNotification('✓ تم مسح السلة بالكامل', 'success');
            }
        }

        function updateCartDisplay() {
            const container = document.getElementById('cartContainer');
            
            if (!container) return;
            
            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-shopping-basket"></i>
                        <h3>السلة فارغة</h3>
                        <p>أضف بعض المنتجات من القائمة أعلاه</p>
                    </div>
                `;
                return;
            }

            let totalAmount = 0;
            let totalItems = 0;

            const cartHtml = cart.map(item => {
                const itemTotal = item.price * item.quantity;
                totalAmount += itemTotal;
                totalItems += item.quantity;
                
                return `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <div class="cart-item-name">
                                ${item.image ? `<img src="${item.image}" style="width: 30px; height: 30px; border-radius: 5px; margin-left: 8px;" onerror="this.style.display='none'">` : '📦'} 
                                ${item.name}
                            </div>
                            <div class="cart-item-price">
                                ${item.price.toLocaleString('ar-EG')} دج / قطعة
                            </div>
                            <div class="product-merchant">
                                <i class="fas fa-store"></i> ${item.merchantName || 'ناردو برو'}
                            </div>
                        </div>
                        <div class="cart-item-quantity">
                            <button onclick="updateCartQuantity(${item.id}, -1)">−</button>
                            <span>${item.quantity}</span>
                            <button onclick="updateCartQuantity(${item.id}, 1)">+</button>
                        </div>
                        <div class="cart-item-total">
                            ${itemTotal.toLocaleString('ar-EG')} دج
                        </div>
                        <button class="cart-item-remove" onclick="removeFromCart(${item.id})">
                            <i class="fas fa-trash"></i> حذف
                        </button>
                    </div>
                `;
            }).join('');

            const summaryHtml = `
                <div class="cart-summary">
                    <div class="summary-row">
                        <span class="summary-label">عدد العناصر:</span>
                        <span class="summary-value">${totalItems} قطعة</span>
                    </div>
                    <div class="summary-row">
                        <span class="summary-label">عدد المنتجات المتنوعة:</span>
                        <span class="summary-value">${cart.length} منتج</span>
                    </div>
                    <div class="summary-row">
                        <span class="summary-label">الإجمالي النهائي:</span>
                        <span class="summary-value summary-total">${totalAmount.toLocaleString('ar-EG')} دج</span>
                    </div>
                    <div class="cart-actions">
                        <button class="btn btn-gold" onclick="checkout()">
                            <i class="fas fa-credit-card"></i> إتمام الشراء
                        </button>
                        <button class="btn btn-outline" onclick="clearCart()">
                            <i class="fas fa-trash-alt"></i> إفراغ السلة
                        </button>
                    </div>
                </div>
            `;

            container.innerHTML = cartHtml + summaryHtml;
        }

        function checkout() {
            if (cart.length === 0) {
                showNotification('السلة فارغة، أضف منتجات أولاً', 'warning');
                return;
            }

            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            
            let orderSummary = '🛒 ملخص طلبك:\n━━━━━━━━━━━━━━━━━━\n';
            cart.forEach(item => {
                const itemTotal = item.price * item.quantity;
                orderSummary += `• ${item.name} × ${item.quantity} = ${itemTotal.toLocaleString('ar-EG')} دج\n`;
            });
            orderSummary += `━━━━━━━━━━━━━━━━━━\n💰 الإجمالي: ${total.toLocaleString('ar-EG')} دج`;

            if (confirm(`${orderSummary}\n\nهل تريد تأكيد عملية الشراء؟`)) {
                // تحديث المخزون
                cart.forEach(cartItem => {
                    const product = products.find(p => p.id === cartItem.id);
                    if (product) {
                        product.stock -= cartItem.quantity;
                    }
                });
                
                // حفظ تحديث المخزون
                localStorage.setItem('nardoo_products', JSON.stringify(products));
                
                cart = [];
                saveCart();
                updateCartCounters();
                loadProducts();
                updateCartDisplay();
                
                showNotification('✓ تم إتمام عملية الشراء بنجاح! شكراً لتسوقك', 'success');
            }
        }

        // ================================================================
        // عرض المنتجات في الواجهة
        // ================================================================
        
        function loadProducts() {
            const container = document.getElementById('productsContainer');
            
            if (!container) return;
            
            if (products.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <i class="fas fa-box-open"></i>
                        <h3>لا توجد منتجات</h3>
                        <p>جاري تحميل المنتجات من تلغرام...</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = products.map(product => {
                const stockStatus = product.stock > 0 ? 'in-stock' : 'out-of-stock';
                const stockLabel = product.stock > 0 ? `متوفر: ${product.stock}` : 'نفد المخزون';
                
                // الحصول على رابط الصورة
                const imageUrl = product.image || (product.images && product.images[0]) || null;
                const timeAgo = getTimeAgo(product.createdAt);
                
                return `
                    <div class="product-card" onclick="viewProductDetails(${product.id})">
                        <div class="product-image">
                            ${imageUrl ? 
                                `<img src="${imageUrl}" onerror="this.src='https://via.placeholder.com/300/2c5e4f/ffffff?text=ناردو+برو'">` : 
                                product.imageIcon || '📦'
                            }
                        </div>
                        <div class="product-name">${product.name}</div>
                        <div class="product-price">${product.price.toLocaleString('ar-EG')} دج</div>
                        <div class="product-merchant">
                            <i class="fas fa-store"></i> ${product.merchantName || 'ناردو برو'}
                        </div>
                        <div class="product-stock">
                            📦 ${stockLabel}
                            <span class="status-badge status-${stockStatus}">${product.stock > 0 ? 'متوفر' : 'غير متوفر'}</span>
                        </div>
                        <div class="product-actions" onclick="event.stopPropagation()">
                            ${product.stock > 0 ? `
                                <button class="btn btn-gold btn-small" onclick="addToCart(${product.id})">
                                    <i class="fas fa-cart-plus"></i> أضف للسلة
                                </button>
                            ` : `
                                <button class="btn btn-outline btn-small" disabled style="opacity:0.5;">
                                    <i class="fas fa-ban"></i> غير متوفر
                                </button>
                            `}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // عرض تفاصيل المنتج
        function viewProductDetails(productId) {
            const product = products.find(p => p.id == productId);
            if (!product) return;
            
            const imageUrl = product.image || (product.images && product.images[0]) || null;
            
            const details = `
                <div style="text-align: center;">
                    <div style="font-size: 80px; margin-bottom: 20px;">
                        ${imageUrl ? `<img src="${imageUrl}" style="width: 200px; height: 200px; object-fit: cover; border-radius: 20px;">` : '📦'}
                    </div>
                    <h2 style="color: var(--gold);">${product.name}</h2>
                    <p style="font-size: 28px; color: var(--success); margin: 15px 0;">${product.price.toLocaleString()} دج</p>
                    <p><i class="fas fa-store"></i> التاجر: ${product.merchantName || 'ناردو برو'}</p>
                    <p><i class="fas fa-tag"></i> القسم: ${getCategoryName(product.category)}</p>
                    <p><i class="fas fa-boxes"></i> المخزون: ${product.stock} قطعة</p>
                    <p><i class="fas fa-clock"></i> ${getTimeAgo(product.createdAt)}</p>
                    <p style="margin: 20px 0;">${product.description || 'منتج عالي الجودة من ناردو برو'}</p>
                    <div style="display: flex; gap: 15px; justify-content: center; margin-top: 30px;">
                        ${product.stock > 0 ? `
                            <button class="btn btn-gold" onclick="addToCart(${product.id}); closeModal('productDetailModal')">
                                <i class="fas fa-cart-plus"></i> أضف للسلة
                            </button>
                        ` : ''}
                        <button class="btn btn-outline" onclick="closeModal('productDetailModal')">
                            إغلاق
                        </button>
                    </div>
                </div>
            `;
            
            const contentDiv = document.getElementById('productDetailContent');
            if (contentDiv) contentDiv.innerHTML = details;
            
            const modal = document.getElementById('productDetailModal');
            if (modal) modal.style.display = 'flex';
        }

        function closeModal(modalId) {
            const modal = document.getElementById(modalId);
            if (modal) modal.style.display = 'none';
        }

        // ================================================================
        // التهيئة
        // ================================================================
        
        async function init() {
            console.log('🚀 بدء تحميل نظام السلة المتكامل مع تلغرام...');
            
            // تحميل السلة
            loadCart();
            
            // جلب المنتجات من تلغرام
            await fetchProductsFromTelegram();
            
            // عرض المنتجات
            loadProducts();
            
            console.log(`✅ تم تحميل ${products.length} منتج`);
            console.log(`✅ السلة تحتوي على ${cart.reduce((s,i) => s + i.quantity, 0)} عنصر`);
        }
        
        init();
        
        // تصدير الدوال للنطاق العام
        window.addToCart = addToCart;
        window.updateCartQuantity = updateCartQuantity;
        window.removeFromCart = removeFromCart;
        window.clearCart = clearCart;
        window.checkout = checkout;
        window.viewProductDetails = viewProductDetails;
        window.closeModal = closeModal;
    </script>
</body>
</html>
