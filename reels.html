<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>لعبة 3B | 5D Realistic Simulation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at center, #0a0a2a, #000000);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Cairo', 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* تأثيرات 5D - ضباب وجسيمات */
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .game-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 550px;
            margin: 20px;
        }

        .game-card {
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(20px);
            border-radius: 60px;
            padding: 30px 25px;
            text-align: center;
            border: 2px solid rgba(255, 215, 0, 0.6);
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.3), inset 0 0 30px rgba(255, 215, 0, 0.1);
            transition: all 0.3s ease;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }

        h1 {
            background: linear-gradient(135deg, #ffd966, #ffaa33, #ff8800);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 2.2rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        .target-area {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(255, 100, 0, 0.2));
            border-radius: 50px;
            padding: 15px;
            margin: 15px 0;
            border: 1px solid rgba(255, 215, 0, 0.5);
        }

        .target-number {
            font-size: 4rem;
            font-weight: bold;
            color: #ffd966;
            text-shadow: 0 0 20px #ffaa33, 0 0 40px #ff6600;
            letter-spacing: 5px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { text-shadow: 0 0 20px #ffaa33; }
            50% { text-shadow: 0 0 40px #ff6600, 0 0 60px #ff3300; }
        }

        /* منطقة النرد 5D */
        .dice-5d-area {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin: 30px 0;
            perspective: 1000px;
        }

        .dice-5d {
            width: 100px;
            height: 100px;
            position: relative;
            cursor: pointer;
            transition: all 0.3s ease;
            transform-style: preserve-3d;
        }

        .dice-5d.rolling {
            animation: roll3d 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
        }

        @keyframes roll3d {
            0% { transform: rotateX(0) rotateY(0) rotateZ(0); }
            25% { transform: rotateX(360deg) rotateY(180deg) rotateZ(90deg); }
            50% { transform: rotateX(720deg) rotateY(360deg) rotateZ(180deg); }
            75% { transform: rotateX(1080deg) rotateY(540deg) rotateZ(270deg); }
            100% { transform: rotateX(1440deg) rotateY(720deg) rotateZ(360deg); }
        }

        .dice-face {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #fff, #f0f0f0);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: bold;
            color: #333;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            border: 2px solid #ffd966;
            backface-visibility: hidden;
        }

        .dice-face-front { transform: translateZ(50px); }
        .dice-face-back { transform: rotateY(180deg) translateZ(50px); }
        .dice-face-right { transform: rotateY(90deg) translateZ(50px); }
        .dice-face-left { transform: rotateY(-90deg) translateZ(50px); }
        .dice-face-top { transform: rotateX(90deg) translateZ(50px); }
        .dice-face-bottom { transform: rotateX(-90deg) translateZ(50px); }

        .dice-value {
            width: 100px;
            height: 100px;
            background: linear-gradient(145deg, #ffd966, #ffaa33);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: bold;
            color: white;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            transition: all 0.2s;
        }

        .dice-5d:hover .dice-value {
            transform: scale(1.05);
            box-shadow: 0 15px 35px rgba(255, 215, 0, 0.5);
        }

        /* مؤثرات صوتية مرئية */
        .shockwave {
            position: fixed;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,215,0,0.8), transparent);
            pointer-events: none;
            animation: shock 0.5s ease-out forwards;
            z-index: 1000;
        }

        @keyframes shock {
            0% { transform: scale(0); opacity: 0.8; }
            100% { transform: scale(10); opacity: 0; }
        }

        .score-stats {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin: 20px 0;
        }

        .stat-card {
            flex: 1;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
            padding: 12px;
            border-radius: 30px;
            border: 1px solid rgba(255,215,0,0.3);
        }

        .stat-label {
            font-size: 11px;
            color: #aaa;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #ffd966;
        }

        .result-area {
            background: rgba(255,215,0,0.1);
            border-radius: 40px;
            padding: 15px;
            margin: 15px 0;
            font-size: 18px;
            font-weight: bold;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,215,0,0.3);
            transition: all 0.3s;
        }

        button {
            background: linear-gradient(135deg, #ffd966, #ffaa33);
            border: none;
            padding: 14px 28px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            color: #1e3c2c;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            margin-top: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        button:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 25px rgba(255,215,0,0.5);
        }

        /* تأثيرات الجسيمات */
        .particle {
            position: fixed;
            pointer-events: none;
            animation: particleFloat 1s ease-out forwards;
            z-index: 1000;
        }

        @keyframes particleFloat {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100px) scale(0); opacity: 0; }
        }

        @media (max-width: 550px) {
            .dice-5d { width: 80px; height: 80px; }
            .dice-value { width: 80px; height: 80px; font-size: 2.2rem; }
            .stat-value { font-size: 22px; }
        }
    </style>
</head>
<body>

<canvas id="particles-canvas"></canvas>

<div class="game-container">
    <div class="game-card">
        <h1>
            <i class="fas fa-cube"></i>
            3B | 5D REAL
            <i class="fas fa-dice-d6"></i>
        </h1>
        
        <div class="target-area">
            <div style="font-size: 14px; color: #ffd966;">🎯 الرقم المستهدف</div>
            <div class="target-number" id="targetNum">??</div>
        </div>

        <div class="dice-5d-area">
            <div class="dice-5d" id="dice0" onclick="rollDice3D(0)">
                <div class="dice-value" id="diceVal0">🎲</div>
            </div>
            <div class="dice-5d" id="dice1" onclick="rollDice3D(1)">
                <div class="dice-value" id="diceVal1">🎲</div>
            </div>
            <div class="dice-5d" id="dice2" onclick="rollDice3D(2)">
                <div class="dice-value" id="diceVal2">🎲</div>
            </div>
        </div>

        <div class="score-stats">
            <div class="stat-card">
                <div class="stat-label">المجموع</div>
                <div class="stat-value" id="currentSum">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">المحاولات</div>
                <div class="stat-value" id="attempts">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">أفضل نتيجة</div>
                <div class="stat-value" id="bestScore">0</div>
            </div>
        </div>

        <div class="result-area" id="resultMsg">
            🎲 اضغط على النرد 5D لبدء المغامرة
        </div>

        <button onclick="resetGame5D()">
            <i class="fas fa-sync-alt"></i> لعبة جديدة
        </button>
    </div>
</div>

<script>
    // تحميل Font Awesome
    const link = document.createElement('link');
    link.rel = 'stylesheet';
    link.href = 'https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css';
    document.head.appendChild(link);

    // متغيرات اللعبة
    let targetNumber = 0;
    let diceValues = [0, 0, 0];
    let attempts = 0;
    let bestScore = localStorage.getItem('bestScore3B_5d') || 0;
    let gameActive = true;
    let rollingCount = 0;

    // عناصر DOM
    const targetSpan = document.getElementById('targetNum');
    const currentSumSpan = document.getElementById('currentSum');
    const attemptsSpan = document.getElementById('attempts');
    const bestScoreSpan = document.getElementById('bestScore');
    const resultMsg = document.getElementById('resultMsg');
    const diceVals = [document.getElementById('diceVal0'), document.getElementById('diceVal1'), document.getElementById('diceVal2')];
    const diceElements = [document.getElementById('dice0'), document.getElementById('dice1'), document.getElementById('dice2')];

    // نظام الجسيمات 5D
    const canvas = document.getElementById('particles-canvas');
    let ctx = canvas.getContext('2d');
    let particles = [];

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class Particle5D {
        constructor(x, y, color) {
            this.x = x;
            this.y = y;
            this.vx = (Math.random() - 0.5) * 8;
            this.vy = (Math.random() - 0.5) * 8 - 2;
            this.size = Math.random() * 8 + 3;
            this.color = color;
            this.life = 1;
            this.decay = 0.02;
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.vy += 0.2;
            this.life -= this.decay;
            return this.life > 0;
        }
        draw() {
            ctx.globalAlpha = this.life;
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    function addParticles(x, y, color) {
        for (let i = 0; i < 15; i++) {
            particles.push(new Particle5D(x, y, color));
        }
    }

    function createShockwave(x, y) {
        const wave = document.createElement('div');
        wave.className = 'shockwave';
        wave.style.left = x + 'px';
        wave.style.top = y + 'px';
        document.body.appendChild(wave);
        setTimeout(() => wave.remove(), 500);
    }

    function animateParticles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles = particles.filter(p => p.update());
        particles.forEach(p => p.draw());
        requestAnimationFrame(animateParticles);
    }
    animateParticles();

    // تأثيرات 5D: صوت مرئي + اهتزاز
    function vibrateIntensity(intensity) {
        if (navigator.vibrate) {
            navigator.vibrate(intensity);
        }
        // تأثير اهتزاز للعنصر
        const gameCard = document.querySelector('.game-card');
        gameCard.style.transform = `translateX(${Math.sin(Date.now() * 0.05) * intensity * 0.5}px)`;
        setTimeout(() => gameCard.style.transform = '', intensity * 2);
    }

    function createNumberParticles(value, x, y) {
        const colors = ['#ffd966', '#ffaa33', '#ff8800', '#ff6600'];
        for (let i = 0; i < value * 3; i++) {
            particles.push(new Particle5D(x + (Math.random() - 0.5) * 100, y + (Math.random() - 0.5) * 100, colors[Math.floor(Math.random() * colors.length)]));
        }
    }

    // تحديث واجهة اللعبة
    function updateUI() {
        const sum = diceValues.reduce((a, b) => a + b, 0);
        currentSumSpan.textContent = sum;
        attemptsSpan.textContent = attempts;
        bestScoreSpan.textContent = bestScore;
        targetSpan.textContent = targetNumber;

        for (let i = 0; i < 3; i++) {
            if (diceValues[i] === 0) {
                diceVals[i].innerHTML = '🎲';
                diceVals[i].style.background = 'linear-gradient(145deg, #fff, #f0f0f0)';
            } else {
                diceVals[i].innerHTML = diceValues[i];
                diceVals[i].style.background = 'linear-gradient(145deg, #ffd966, #ffaa33)';
            }
        }
    }

    // رمي النرد مع تأثيرات 5D
    function rollDice3D(index) {
        if (!gameActive) {
            resultMsg.innerHTML = '⚠️ اللعبة انتهت! اضغط على "لعبة جديدة"';
            return;
        }
        if (rollingCount > 0) return;

        rollingCount++;
        const diceEl = diceElements[index];
        const rect = diceEl.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;

        // تأثير 5D: اهتزاز وموجة صدمة
        vibrateIntensity(50);
        createShockwave(centerX, centerY);
        addParticles(centerX, centerY, '#ffd966');

        // إضافة تأثير الدوران 3D
        diceEl.classList.add('rolling');
        
        // محاكاة الرمي الحقيقي
        setTimeout(() => {
            const newValue = Math.floor(Math.random() * 6) + 1;
            diceValues[index] = newValue;
            
            // تأثيرات عند ظهور الرقم
            createNumberParticles(newValue, centerX, centerY);
            vibrateIntensity(30);
            
            const sum = diceValues.reduce((a, b) => a + b, 0);
            currentSumSpan.textContent = sum;
            updateUI();
            
            diceEl.classList.remove('rolling');
            
            // التحقق من الفوز
            if (sum === targetNumber) {
                gameActive = false;
                const pointsEarned = Math.max(1, 12 - attempts);
                
                // تأثير الفوز 5D
                for (let i = 0; i < 50; i++) {
                    setTimeout(() => {
                        addParticles(centerX + (Math.random() - 0.5) * 300, centerY + (Math.random() - 0.5) * 300, '#ffaa33');
                    }, i * 20);
                }
                vibrateIntensity(200);
                
                resultMsg.innerHTML = `🎉🎉 فوز مذهل! 🎉🎉<br>✨ حصلت على ${pointsEarned} نقطة خارقة ✨`;
                resultMsg.style.background = "rgba(46,204,113,0.3)";
                resultMsg.style.border = "2px solid #2ecc71";
                
                if (pointsEarned > bestScore) {
                    bestScore = pointsEarned;
                    localStorage.setItem('bestScore3B_5d', bestScore);
                    bestScoreSpan.textContent = bestScore;
                    resultMsg.innerHTML += `<br>🏆 رقم قياسي جديد! 🏆`;
                }
            } 
            else if (sum > targetNumber) {
                gameActive = false;
                resultMsg.innerHTML = `💥💥 خسارة مذهلة! 💥💥<br>⚠️ تجاوزت الرقم (${sum} > ${targetNumber})`;
                resultMsg.style.background = "rgba(231,76,60,0.3)";
                resultMsg.style.border = "2px solid #e74c3c";
                vibrateIntensity(100);
                
                // تأثير انفجار
                for (let i = 0; i < 30; i++) {
                    setTimeout(() => addParticles(centerX + (Math.random() - 0.5) * 200, centerY + (Math.random() - 0.5) * 200, '#e74c3c'), i * 15);
                }
            }
            else {
                resultMsg.innerHTML = `🎲 مجموعك: ${sum} | تحتاج: ${targetNumber - sum} أخرى 🎯`;
                resultMsg.style.background = "rgba(255,215,0,0.15)";
                resultMsg.style.border = "1px solid rgba(255,215,0,0.3)";
            }
            
            attempts++;
            attemptsSpan.textContent = attempts;
            updateUI();
            
            rollingCount--;
            
        }, 600);
    }

    // إعادة تعيين اللعبة مع تأثيرات 5D
    function resetGame5D() {
        targetNumber = Math.floor(Math.random() * 13) + 6;
        diceValues = [0, 0, 0];
        attempts = 0;
        gameActive = true;
        rollingCount = 0;
        
        // تأثير إعادة الضبط
        for (let i = 0; i < 100; i++) {
            setTimeout(() => {
                const x = Math.random() * window.innerWidth;
                const y = Math.random() * window.innerHeight;
                addParticles(x, y, '#ffd966');
            }, i * 10);
        }
        vibrateIntensity(80);
        
        resultMsg.innerHTML = `🎯 الرقم الجديد: ${targetNumber} | ابدأ الرمي الحقيقي! 🎲`;
        resultMsg.style.background = "rgba(255,215,0,0.15)";
        resultMsg.style.border = "1px solid rgba(255,215,0,0.3)";
        
        updateUI();
    }

    // تهيئة
    bestScoreSpan.textContent = bestScore;
    resetGame5D();

    // تأثيرات حركة الفأرة 5D
    document.addEventListener('mousemove', (e) => {
        const x = e.clientX / window.innerWidth;
        const y = e.clientY / window.innerHeight;
        const gameCard = document.querySelector('.game-card');
        const rotateX = (y - 0.5) * 10;
        const rotateY = (x - 0.5) * 10;
        gameCard.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
    });
</script>
</body>
</html>
