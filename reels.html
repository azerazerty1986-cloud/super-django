<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة ريلز | المدير azer</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #1a472a, #0a2a1a);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 600px; margin: 0 auto; }
        .card {
            background: rgba(0,0,0,0.85);
            border-radius: 30px;
            padding: 30px;
            border: 2px solid gold;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        h1 { color: gold; text-align: center; margin-bottom: 5px; font-size: 1.8rem; }
        .sub { text-align: center; color: #aaa; margin-bottom: 25px; font-size: 0.9rem; }
        
        /* معرف الريلز */
        .reel-id-box {
            background: rgba(255,215,0,0.1);
            border: 1px solid gold;
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            margin-bottom: 25px;
        }
        .reel-id-box .label { font-size: 0.8rem; color: #aaa; display: block; margin-bottom: 5px; }
        .reel-id-box .id-value { font-size: 1.8rem; font-weight: bold; color: gold; font-family: monospace; }
        
        /* النموذج */
        .form-group { margin-bottom: 20px; }
        label { display: block; color: gold; margin-bottom: 8px; font-weight: bold; }
        label i { margin-left: 8px; }
        input, textarea {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(255,215,0,0.3);
            background: rgba(255,255,255,0.1);
            color: white;
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
        }
        input:focus, textarea:focus { outline: none; border-color: gold; background: rgba(255,255,255,0.15); }
        input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.5); }
        
        /* رفع الفيديو */
        .upload-area {
            border: 2px dashed gold;
            border-radius: 20px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(255,215,0,0.05);
        }
        .upload-area:hover { background: rgba(255,215,0,0.1); transform: scale(1.02); }
        .upload-area i { font-size: 3.5rem; color: gold; margin-bottom: 12px; }
        .upload-area p { color: white; font-size: 1rem; }
        .upload-area small { color: #aaa; font-size: 0.8rem; display: block; margin-top: 8px; }
        
        /* معاينة الفيديو */
        .preview { margin-top: 20px; display: none; }
        .preview video { width: 100%; border-radius: 15px; background: #000; max-height: 250px; }
        .remove-btn {
            margin-top: 10px;
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px;
            border-radius: 20px;
            width: 100%;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
        }
        .remove-btn:hover { background: #dc2626; }
        
        /* زر الرفع */
        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, gold, #ffd700);
            border: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 20px;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s;
        }
        .btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(255,215,0,0.4); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* رسائل */
        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 24px;
            border-radius: 50px;
            animation: slideIn 0.3s ease;
            z-index: 1000;
            font-family: 'Cairo', sans-serif;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .success { background: #10b981; color: white; }
        .error { background: #ef4444; color: white; }
        .info { background: #3b82f6; color: white; }
        
        /* شريط تقدم */
        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 10px;
            display: none;
        }
        .progress-fill {
            height: 100%;
            background: gold;
            width: 0%;
            transition: width 0.3s;
        }
        
        @media (max-width: 600px) {
            .container { padding: 0; }
            .card { padding: 20px; }
            h1 { font-size: 1.5rem; }
            .reel-id-box .id-value { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1><i class="fas fa-crown"></i> إضافة ريلز جديد</h1>
            <div class="sub">المدير <strong style="color:gold">azer</strong> فقط</div>
            
            <div class="reel-id-box">
                <span class="label"><i class="fas fa-fingerprint"></i> معرف الريلز التالي</span>
                <div class="id-value" id="reelIdPreview">azer_1</div>
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-tag"></i> عنوان الريلز</label>
                <input type="text" id="reelTitle" placeholder="مثال: وصفة زعتر فلسطيني أصلي" autocomplete="off">
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-video"></i> فيديو الريلز</label>
                <div class="upload-area" onclick="document.getElementById('videoFile').click()">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <p>اضغط لرفع الفيديو</p>
                    <small>✅ صيغة MP4 - الحد الأقصى 50MB</small>
                    <small>📁 سيتم التخزين الدائم في تليجرام</small>
                </div>
                <input type="file" id="videoFile" accept="video/mp4,video/*" style="display:none" onchange="previewVideo(this)">
                <div class="progress-bar" id="progressBar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="preview" id="previewDiv">
                    <video id="previewVideo" controls></video>
                    <button class="remove-btn" onclick="removeVideo()"><i class="fas fa-trash"></i> إزالة الفيديو</button>
                </div>
            </div>
            
            <button class="btn" id="uploadBtn" onclick="uploadReel()">
                <i class="fab fa-telegram"></i> رفع وتخزين في تليجرام
            </button>
        </div>
    </div>
    
    <div id="toastContainer"></div>
    
    <script>
        // ========== إعدادات تليجرام ==========
        const TELEGRAM = {
            botToken: '8576673096:AAECPDHWRTVQ_juq68hxM9PIdacnqevGRb4',
            channelId: '-1003822964890'
        };
        
        // ========== المتغيرات ==========
        let selectedVideo = null;
        let currentId = 1;
        let isUploading = false;
        
        // ========== جلب آخر رقم مستخدم ==========
        function getNextReelId() {
            let reels = localStorage.getItem('azer_reels_list');
            if (reels) {
                reels = JSON.parse(reels);
                if (reels.length > 0) {
                    const lastId = reels[reels.length - 1].id;
                    const match = lastId.match(/azer_(\d+)/);
                    if (match) {
                        return parseInt(match[1]) + 1;
                    }
                }
            }
            return 1;
        }
        
        // ========== التحقق من صلاحيات المدير ==========
        function checkAdminAccess() {
            const currentUser = localStorage.getItem('nardo_current_user');
            if (!currentUser) {
                showToast('❌ يجب تسجيل الدخول أولاً', 'error');
                setTimeout(() => { window.location.href = 'index.html'; }, 2000);
                return false;
            }
            try {
                const user = JSON.parse(currentUser);
                if (user.email === 'azer' || user.username === 'azer' || user.name === 'azer') {
                    return true;
                }
                showToast('⛔ غير مسموح! فقط المدير azer يمكنه إضافة ريلز', 'error');
                setTimeout(() => { window.location.href = 'index.html'; }, 2000);
                return false;
            } catch(e) {
                showToast('❌ خطأ في التحقق', 'error');
                return false;
            }
        }
        
        // ========== معاينة الفيديو ==========
        function previewVideo(input) {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                if (file.size > 50 * 1024 * 1024) {
                    showToast('❌ حجم الفيديو كبير جداً (الحد 50MB)', 'error');
                    return;
                }
                if (!file.type.startsWith('video/')) {
                    showToast('❌ الرجاء اختيار ملف فيديو صالح', 'error');
                    return;
                }
                selectedVideo = file;
                const url = URL.createObjectURL(file);
                document.getElementById('previewVideo').src = url;
                document.getElementById('previewDiv').style.display = 'block';
                
                // تحديث المعرف
                currentId = getNextReelId();
                document.getElementById('reelIdPreview').innerText = `azer_${currentId}`;
                showToast('✅ تم اختيار الفيديو بنجاح', 'success');
            }
        }
        
        function removeVideo() {
            selectedVideo = null;
            document.getElementById('previewDiv').style.display = 'none';
            document.getElementById('videoFile').value = '';
            document.getElementById('previewVideo').src = '';
            showToast('🗑️ تم إزالة الفيديو', 'info');
        }
        
        // ========== رفع الريلز إلى تليجرام ==========
        async function uploadReel() {
            if (isUploading) return;
            
            const title = document.getElementById('reelTitle').value.trim();
            if (!title) {
                showToast('❌ الرجاء إدخال عنوان للريلز', 'error');
                document.getElementById('reelTitle').focus();
                return;
            }
            
            if (!selectedVideo) {
                showToast('❌ الرجاء اختيار فيديو', 'error');
                return;
            }
            
            if (!checkAdminAccess()) return;
            
            isUploading = true;
            const btn = document.getElementById('uploadBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الرفع إلى تليجرام...';
            
            const reelId = `azer_${currentId}`;
            
            try {
                // إظهار شريط التقدم
                const progressBar = document.getElementById('progressBar');
                const progressFill = document.getElementById('progressFill');
                progressBar.style.display = 'block';
                
                const formData = new FormData();
                formData.append('chat_id', TELEGRAM.channelId);
                formData.append('video', selectedVideo);
                formData.append('caption', `🎬 ${title}\n🆔 ${reelId}\n👑 المدير: azer\n📅 ${new Date().toLocaleString('ar-EG')}\n\n✅ تم الرفع عبر ناردو برو`);
                
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/sendVideo`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                progressBar.style.display = 'none';
                
                if (data.ok) {
                    const messageId = data.result.message_id;
                    const videoFileId = data.result.video.file_id;
                    
                    // الحصول على رابط الفيديو
                    const fileResponse = await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/getFile?file_id=${videoFileId}`);
                    const fileData = await fileResponse.json();
                    const videoUrl = `https://api.telegram.org/file/bot${TELEGRAM.botToken}/${fileData.result.file_path}`;
                    
                    // حفظ الريلز في localStorage
                    let reels = localStorage.getItem('azer_reels_list');
                    reels = reels ? JSON.parse(reels) : [];
                    reels.push({
                        id: reelId,
                        title: title,
                        telegramId: messageId,
                        videoUrl: videoUrl,
                        date: new Date().toISOString(),
                        views: 0,
                        fileId: videoFileId
                    });
                    localStorage.setItem('azer_reels_list', JSON.stringify(reels));
                    
                    // إشعار الصفحة الرئيسية بالتحديث
                    localStorage.setItem('azer_reels_updated', Date.now().toString());
                    
                    showToast(`✅ تم رفع الريلز بنجاح!\n🆔 ${reelId}`, 'success');
                    
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                    
                } else {
                    throw new Error(data.description || 'فشل الرفع');
                }
                
            } catch (error) {
                console.error('خطأ:', error);
                showToast('❌ فشل الرفع: ' + error.message, 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fab fa-telegram"></i> رفع وتخزين في تليجرام';
                isUploading = false;
                progressBar.style.display = 'none';
            }
        }
        
        // ========== عرض الرسائل ==========
        function showToast(message, type) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `notification ${type}`;
            toast.innerHTML = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3500);
        }
        
        // ========== إنشاء حساب المدير إذا لم يكن موجود ==========
        function ensureAzerAdmin() {
            let users = localStorage.getItem('nardo_users');
            users = users ? JSON.parse(users) : [];
            
            const azerExists = users.some(u => u.email === 'azer' || u.username === 'azer');
            
            if (!azerExists) {
                users.push({
                    id: Date.now(),
                    name: 'المدير azer',
                    email: 'azer',
                    username: 'azer',
                    password: '123456',
                    role: 'admin',
                    phone: '0555555555',
                    createdAt: new Date().toISOString()
                });
                localStorage.setItem('nardo_users', JSON.stringify(users));
                console.log('✅ تم إنشاء حساب المدير azer (azer / 123456)');
            }
        }
        
        // ========== تهيئة الصفحة ==========
        ensureAzerAdmin();
        
        if (!checkAdminAccess()) {
            // تعطيل النموذج
            document.querySelector('.card').style.opacity = '0.5';
            document.querySelector('.card').style.pointerEvents = 'none';
        } else {
            currentId = getNextReelId();
            document.getElementById('reelIdPreview').innerText = `azer_${currentId}`;
            console.log('👑 مرحباً أيها المدير azer');
        }
    </script>
</body>
</html>
