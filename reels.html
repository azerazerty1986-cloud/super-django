<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ناردو ريلز AI | تجربة ثورية مع الذكاء الاصطناعي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #000; color: white; overflow-x: hidden; }

        .login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #0f2b23, #1e4a3f);
            display: flex; justify-content: center; align-items: center; z-index: 20000;
        }
        .login-box {
            background: rgba(0,0,0,0.85); border: 3px solid gold; border-radius: 50px;
            padding: 45px; width: 90%; max-width: 450px; text-align: center;
            backdrop-filter: blur(10px);
        }
        .login-box h2 { color: gold; font-size: 28px; margin-bottom: 20px; }
        .login-box input {
            width: 100%; padding: 15px; margin: 15px 0;
            background: rgba(255,255,255,0.1); border: 2px solid gold;
            border-radius: 30px; color: white; text-align: center; font-size: 16px;
        }
        .login-btn {
            width: 100%; padding: 15px;
            background: linear-gradient(135deg, gold, #ffd700);
            border: none; border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 18px;
        }

        .user-bar {
            position: fixed; top: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(15px);
            padding: 12px 20px; display: flex; justify-content: space-between;
            align-items: center; flex-wrap: wrap; gap: 10px; z-index: 100;
            border-bottom: 2px solid gold;
        }
        .user-badge {
            background: linear-gradient(135deg, #ff0066, #cc0052);
            padding: 8px 20px; border-radius: 50px; display: flex; align-items: center; gap: 10px;
        }
        .mood-indicator {
            background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 30px;
            display: flex; align-items: center; gap: 8px; font-size: 14px;
        }
        .mood-indicator i { color: gold; }
        .points-badge {
            background: linear-gradient(135deg, gold, #ffd700);
            color: black; padding: 5px 15px; border-radius: 30px; font-weight: bold;
        }
        .user-stats { display: flex; gap: 15px; }
        .logout-btn, .refresh-btn, .voice-btn {
            background: rgba(255,215,0,0.2); border: 1px solid gold;
            padding: 8px 18px; border-radius: 50px; cursor: pointer; color: white;
        }
        .voice-btn.active { background: gold; color: black; animation: pulse 1s infinite; }

        .reels-player {
            position: fixed; top: 70px; left: 0; width: 100%;
            height: calc(100% - 70px); overflow-y: scroll;
            scroll-snap-type: y mandatory;
        }
        .reel-slide {
            position: relative; width: 100%; height: calc(100vh - 70px);
            scroll-snap-align: start; background: #000;
        }
        .reel-video-container { position: relative; width: 100%; height: 100%; }
        .reel-video-container video {
            width: 100%; height: 100%; object-fit: contain;
        }
        .reel-overlay {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.95), transparent);
            padding: 80px 20px 30px;
        }
        .reel-id-badge {
            position: absolute; top: 20px; left: 20px;
            background: rgba(0,0,0,0.6); padding: 5px 12px;
            border-radius: 20px; font-size: 11px; font-family: monospace;
            border: 1px solid gold;
        }
        .action-sidebar {
            position: absolute; bottom: 120px; right: 15px;
            display: flex; flex-direction: column; gap: 20px; z-index: 20;
        }
        .action-btn-side {
            background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
            width: 52px; height: 52px; border-radius: 50%;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; gap: 4px; cursor: pointer;
            border: 1px solid rgba(255,215,0,0.5);
            transition: all 0.2s;
        }
        .action-btn-side:hover { transform: scale(1.1); background: gold; color: black; }
        .action-btn-side.liked { background: #ff0066; }
        .comments-panel {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(20px);
            border-top: 2px solid gold; border-radius: 30px 30px 0 0;
            padding: 20px; z-index: 1000; transform: translateY(100%);
            transition: transform 0.3s; max-height: 60vh; overflow-y: auto;
        }
        .comments-panel.open { transform: translateY(0); }
        .comment-input {
            display: flex; gap: 10px; margin-bottom: 20px;
        }
        .comment-input input {
            flex: 1; padding: 12px; background: rgba(255,255,255,0.1);
            border: 1px solid gold; border-radius: 30px; color: white;
        }
        .comment-item {
            padding: 10px; border-bottom: 1px solid rgba(255,215,0,0.3);
            display: flex; gap: 10px;
        }
        .comment-user { color: gold; font-weight: bold; }
        .upload-fab {
            position: fixed; bottom: 30px; left: 20px;
            background: linear-gradient(135deg, gold, #ffd700);
            color: black; width: 55px; height: 55px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; cursor: pointer; z-index: 1001; border: 2px solid white;
        }
        .modal {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.95);
            backdrop-filter: blur(15px); justify-content: center;
            align-items: center; z-index: 10000;
        }
        .modal-content {
            background: linear-gradient(135deg, #1a3a32, #0a1a15);
            border: 3px solid gold; border-radius: 30px; padding: 25px;
            max-width: 550px; width: 90%; max-height: 85vh; overflow-y: auto;
        }
        .upload-area {
            border: 3px dashed gold; border-radius: 20px; padding: 30px;
            text-align: center; cursor: pointer; margin: 15px 0;
        }
        .video-preview { display: none; margin: 15px 0; }
        .video-preview.show { display: block; }
        .video-preview video { width: 100%; border-radius: 15px; }
        .form-control {
            width: 100%; padding: 12px; background: rgba(255,255,255,0.1);
            border: 2px solid gold; border-radius: 12px; color: white; margin: 10px 0;
        }
        .send-btn {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, gold, #ffd700);
            border: none; border-radius: 50px; font-weight: bold; cursor: pointer;
        }
        .notification {
            position: fixed; bottom: 100px; left: 50%;
            transform: translateX(-50%); background: gold; color: black;
            padding: 12px 25px; border-radius: 50px; font-weight: bold;
            z-index: 2000; animation: fadeIn 0.3s;
        }
        .loading-overlay {
            position: fixed; top: 70px; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9); display: flex; justify-content: center;
            align-items: center; z-index: 1000; flex-direction: column; gap: 20px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse {
            0%,100% { opacity: 1; }
            50% { opacity: 0.7; transform: scale(1.05); }
        }
        @media (max-width: 600px) {
            .action-sidebar { bottom: 100px; right: 10px; }
            .action-btn-side { width: 45px; height: 45px; }
            .user-stats { display: none; }
        }
    </style>
</head>
<body>
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <i class="fas fa-robot" style="font-size: 70px; color: gold; margin-bottom: 20px;"></i>
            <h2>ناردو ريلز <span style="font-size: 16px;">AI Edition</span></h2>
            <p style="margin-bottom: 20px;">🧠 ذكاء اصطناعي يفهم مزاجك</p>
            <input type="text" id="loginUsername" placeholder="اسم المستخدم">
            <button class="login-btn" onclick="login()">دخول <i class="fas fa-sign-in-alt"></i></button>
            <div style="margin-top: 15px; font-size: 12px;">🎤 تحكم صوتي | 🎁 مكافآت | 🤖 ذكاء اصطناعي</div>
        </div>
    </div>

    <div id="topBar" style="display: none;">
        <div class="user-bar">
            <div class="user-badge"><i class="fas fa-user"></i> <span id="userNameDisplay"></span></div>
            <div class="mood-indicator" id="moodIndicator"><i class="fas fa-smile"></i> <span id="moodText">سعيد</span></div>
            <div class="points-badge"><i class="fas fa-gem"></i> <span id="pointsDisplay">0</span> نقطة</div>
            <div class="user-stats">
                <div class="user-stat"><span class="number" id="totalReelsCount">0</span><div class="label">الريلز</div></div>
            </div>
            <div>
                <button class="voice-btn" id="voiceBtn" onclick="toggleVoiceControl()"><i class="fas fa-microphone"></i> صوتي</button>
                <button class="refresh-btn" onclick="loadReelsFromTelegram()"><i class="fas fa-sync-alt"></i></button>
                <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>
    </div>

    <div id="reelsPlayer" class="reels-player" style="display: none;"></div>

    <div id="fabButtons" style="display: none;">
        <div class="upload-fab" onclick="openUploadModal()"><i class="fas fa-plus"></i></div>
    </div>

    <div class="comments-panel" id="commentsPanel">
        <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
            <h3 style="color: gold;"><i class="fas fa-comments"></i> التعليقات</h3>
            <button onclick="closeComments()" style="background: none; border: none; color: gold; font-size: 24px;">&times;</button>
        </div>
        <div class="comment-input">
            <input type="text" id="commentText" placeholder="اكتب تعليقك...">
            <button onclick="addComment()" style="background: gold; border: none; padding: 0 20px; border-radius: 30px;">نشر</button>
        </div>
        <div id="commentsList"></div>
    </div>

    <div class="modal" id="uploadModal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeUploadModal()" style="background: none; border: none; color: gold; font-size: 30px; float: left;">&times;</button>
            <h2 style="color: gold; text-align: center;"><i class="fas fa-upload"></i> رفع ريلز جديد</h2>
            <div class="upload-area" onclick="document.getElementById('videoInput').click()">
                <i class="fas fa-cloud-upload-alt" style="font-size: 50px; color: gold;"></i>
                <p>اضغط لرفع فيديو (MP4, max 50MB)</p>
            </div>
            <input type="file" id="videoInput" accept="video/*" style="display: none;" onchange="handleVideoSelect(this)">
            <div class="video-preview" id="videoPreviewDiv">
                <video id="previewVideo" controls></video>
                <button onclick="removeSelectedVideo()" style="margin-top: 5px; background: rgba(255,0,0,0.5); border: none; padding: 8px; border-radius: 20px;">إزالة</button>
            </div>
            <input type="text" class="form-control" id="reelTitleInput" placeholder="عنوان الريلز" value="ريلز رائع">
            <button class="send-btn" id="uploadBtn" onclick="uploadReelToTelegram()"><i class="fab fa-telegram"></i> رفع ونشر للجميع</button>
        </div>
    </div>

    <script>
        // ========== إعدادات تليجرام ==========
        const TELEGRAM = {
            botToken: '8576673096:AAECPDHWRTVQ_juq68hxM9PIdacnqevGRb4',
            channelId: '-1003822964890',
            apiUrl: 'https://api.telegram.org/bot'
        };

        // ========== بيانات المستخدم ==========
        let reelsCache = [];
        let users = [];
        let currentUser = null;
        let selectedVideoFile = null;
        let userLikes = {};
        let userPoints = 0;
        let userMood = { current: 'happy', history: [] };
        let comments = {};
        let currentReelId = null;
        let voiceActive = false;
        let recognition = null;
        let isLoading = false;

        // ========== تحميل المستخدمين ==========
        function loadUsers() {
            const saved = localStorage.getItem('nardoo_users');
            if (saved) { users = JSON.parse(saved); }
            else {
                users = [
                    { id: 1, name: 'المدير', username: 'admin', role: 'admin', points: 1000 },
                    { id: 2, name: 'مستخدم', username: 'user', role: 'user', points: 100 }
                ];
                localStorage.setItem('nardoo_users', JSON.stringify(users));
            }
        }

        function loadUserData() {
            if (!currentUser) return;
            const savedPoints = localStorage.getItem(`nardoo_points_${currentUser.id}`);
            userPoints = savedPoints ? parseInt(savedPoints) : 100;
            updatePointsDisplay();
            const savedMood = localStorage.getItem(`nardoo_mood_${currentUser.id}`);
            if (savedMood) userMood = JSON.parse(savedMood);
            const savedLikes = localStorage.getItem(`nardoo_likes_${currentUser.id}`);
            userLikes = savedLikes ? JSON.parse(savedLikes) : {};
            const savedComments = localStorage.getItem(`nardoo_comments`);
            comments = savedComments ? JSON.parse(savedComments) : {};
        }

        function saveUserData() {
            if (!currentUser) return;
            localStorage.setItem(`nardoo_points_${currentUser.id}`, userPoints);
            localStorage.setItem(`nardoo_mood_${currentUser.id}`, JSON.stringify(userMood));
            localStorage.setItem(`nardoo_likes_${currentUser.id}`, JSON.stringify(userLikes));
            localStorage.setItem(`nardoo_comments`, JSON.stringify(comments));
        }

        function addPoints(amount, reason) {
            userPoints += amount;
            updatePointsDisplay();
            saveUserData();
            showNotification(`+${amount} نقطة 🎁 (${reason})`, 'success');
            if (userPoints >= 500 && userPoints < 510) showNotification(`🏆 إنجاز جديد: مشاهد نشيط`, 'success');
            if (userPoints >= 1000 && userPoints < 1010) showNotification(`🏆 إنجاز جديد: نجم ناردو`, 'success');
        }

        function updatePointsDisplay() {
            const pointsSpan = document.getElementById('pointsDisplay');
            if (pointsSpan) pointsSpan.innerText = userPoints;
        }

        function updateMood(interaction) {
            let newMood = userMood.current;
            if (interaction === 'like') newMood = 'happy';
            else if (interaction === 'repeat') newMood = 'excited';
            else if (interaction === 'share') newMood = 'energetic';
            else if (interaction === 'watch') newMood = 'focused';
            else if (interaction === 'comment') newMood = 'social';
            userMood.current = newMood;
            userMood.history.push({ mood: newMood, time: Date.now() });
            if (userMood.history.length > 50) userMood.history.shift();
            const moodText = document.getElementById('moodText');
            const moodIcon = document.querySelector('#moodIndicator i');
            if (moodText) {
                const moods = { happy: 'سعيد 😊', excited: 'متحمس 🔥', energetic: 'نشيط 💪', focused: 'مركز 🎯', social: 'اجتماعي 💬' };
                moodText.innerText = moods[newMood] || 'سعيد';
                moodIcon.className = newMood === 'happy' ? 'fas fa-smile' : newMood === 'excited' ? 'fas fa-fire' : newMood === 'energetic' ? 'fas fa-bolt' : 'fas fa-heart';
            }
            saveUserData();
        }

        function toggleVoiceControl() {
            if (!voiceActive) { startVoiceRecognition(); }
            else { stopVoiceRecognition(); }
        }

        function startVoiceRecognition() {
            if (!('webkitSpeechRecognition' in window)) { showNotification('المتصفح لا يدعم التحكم الصوتي', 'error'); return; }
            recognition = new webkitSpeechRecognition();
            recognition.lang = 'ar-SA';
            recognition.interimResults = false;
            recognition.onresult = (event) => { processVoiceCommand(event.results[0][0].transcript); };
            recognition.onend = () => { if (voiceActive) recognition.start(); };
            recognition.start();
            voiceActive = true;
            document.getElementById('voiceBtn').classList.add('active');
            showNotification('🎤 التحكم الصوتي نشط', 'success');
        }

        function stopVoiceRecognition() {
            if (recognition) recognition.stop();
            voiceActive = false;
            document.getElementById('voiceBtn').classList.remove('active');
            showNotification('🎤 إيقاف التحكم الصوتي', 'info');
        }

        function processVoiceCommand(command) {
            if (command.includes('التالي')) scrollToNext();
            else if (command.includes('السابق')) scrollToPrevious();
            else if (command.includes('إعجاب')) likeCurrentReel();
            else if (command.includes('تعليق')) openCommentsForCurrent();
            else if (command.includes('مشاركة')) shareCurrentReel();
            else showNotification(`🎤 الأمر: ${command}`, 'info');
        }

        function scrollToNext() {
            const player = document.getElementById('reelsPlayer');
            if (player) player.scrollBy({ top: window.innerHeight - 70, behavior: 'smooth' });
        }

        function scrollToPrevious() {
            const player = document.getElementById('reelsPlayer');
            if (player) player.scrollBy({ top: -(window.innerHeight - 70), behavior: 'smooth' });
        }

        function likeCurrentReel() {
            const activeSlide = document.querySelector('.reel-slide');
            if (activeSlide) likeReel(parseInt(activeSlide.dataset.reelId), { stopPropagation: () => {} });
        }

        function shareCurrentReel() {
            const activeSlide = document.querySelector('.reel-slide');
            if (activeSlide) {
                const reel = reelsCache.find(r => r.id == activeSlide.dataset.reelId);
                if (reel) shareReel(reel.videoUrl, { stopPropagation: () => {} });
            }
        }

        function openCommentsForCurrent() {
            const activeSlide = document.querySelector('.reel-slide');
            if (activeSlide) openComments(parseInt(activeSlide.dataset.reelId));
        }

        async function loadReelsFromTelegram() {
            if (isLoading) return;
            isLoading = true;
            showLoadingOverlay(true, "🔄 جاري تحميل الريلز...");
            try {
                const url = `${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getUpdates?limit=100`;
                const response = await fetch(url);
                const data = await response.json();
                const reels = [];
                if (data.ok && data.result) {
                    const updates = [...data.result].reverse();
                    for (const update of updates) {
                        const post = update.channel_post || update.message;
                        if (!post || !post.video) continue;
                        const caption = post.caption || '';
                        let title = '🎬 ريلز';
                        const titleMatch = caption.match(/🎬 (.+?)(?:\n|$)/);
                        if (titleMatch) title = titleMatch[1];
                        let publisher = 'ناردو برو';
                        const publisherMatch = caption.match(/👤 (.+?)(?:\n|$)/);
                        if (publisherMatch) publisher = publisherMatch[1];
                        const fileRes = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getFile?file_id=${post.video.file_id}`);
                        const fileData = await fileRes.json();
                        if (fileData.ok) {
                            const videoUrl = `https://api.telegram.org/file/bot${TELEGRAM.botToken}/${fileData.result.file_path}`;
                            reels.push({ id: post.message_id, title, videoUrl, publisher, views: 0, likes: 0, createdAt: new Date(post.date * 1000).toISOString() });
                        }
                    }
                }
                if (reels.length > 0) {
                    const oldIds = reelsCache.map(r => r.id).join(',');
                    const newIds = reels.map(r => r.id).join(',');
                    if (oldIds !== newIds) {
                        reelsCache = reels;
                        localStorage.setItem('nardoo_reels_cache', JSON.stringify(reels));
                        displayAllReels();
                        updateStats();
                        showNotification(`📹 تم تحديث ${reels.length} ريلز`, 'success');
                    }
                } else {
                    const cached = localStorage.getItem('nardoo_reels_cache');
                    if (cached && JSON.parse(cached).length > 0) {
                        reelsCache = JSON.parse(cached);
                        displayAllReels();
                        updateStats();
                    } else {
                        reelsCache = [
                            { id: 1001, title: '🎬 مرحباً بك في ناردو ريلز AI', videoUrl: 'https://www.w3schools.com/html/mov_bbb.mp4', publisher: 'النظام', views: 0, likes: 0, createdAt: new Date().toISOString() },
                            { id: 1002, title: '✨ جرب التحكم الصوتي', videoUrl: 'https://www.w3schools.com/html/movie.mp4', publisher: 'النظام', views: 0, likes: 0, createdAt: new Date().toISOString() }
                        ];
                        localStorage.setItem('nardoo_reels_cache', JSON.stringify(reelsCache));
                        displayAllReels();
                        updateStats();
                    }
                }
            } catch (error) {
                const cached = localStorage.getItem('nardoo_reels_cache');
                if (cached) { reelsCache = JSON.parse(cached); displayAllReels(); updateStats(); showNotification(`⚠️ عرض ${reelsCache.length} ريلز مخزنة`, 'warning'); }
            } finally { isLoading = false; showLoadingOverlay(false); }
        }

        function displayAllReels() {
            const container = document.getElementById('reelsPlayer');
            if (!reelsCache || reelsCache.length === 0) {
                container.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;"><i class="fas fa-film" style="font-size:80px;color:gold;"></i><h2>لا توجد ريلز</h2><button onclick="openUploadModal()" style="margin-top:20px;background:gold;border:none;padding:10px 20px;border-radius:30px;">رفع أول ريلز</button></div>`;
                return;
            }
            const currentIds = Array.from(document.querySelectorAll('.reel-slide')).map(s => s.dataset.reelId);
            const newIds = reelsCache.map(r => r.id);
            if (JSON.stringify(currentIds) === JSON.stringify(newIds) && currentIds.length > 0) return;
            const sorted = [...reelsCache].reverse();
            container.innerHTML = sorted.map(reel => {
                const isLiked = userLikes[reel.id] === true;
                const likesText = formatNumber(reel.likes || 0);
                return `
                    <div class="reel-slide" data-reel-id="${reel.id}">
                        <div class="reel-id-badge"><i class="fas fa-fingerprint"></i> ID: ${reel.id}</div>
                        <div class="reel-video-container">
                            <video src="${reel.videoUrl}" preload="metadata" playsinline webkit-playsinline loop></video>
                            <div class="action-sidebar">
                                <div class="action-btn-side ${isLiked ? 'liked' : ''}" onclick="likeReel(${reel.id}, event)"><i class="fas fa-heart"></i><span>${likesText}</span></div>
                                <div class="action-btn-side" onclick="openComments(${reel.id})"><i class="fas fa-comment"></i><span>تعليق</span></div>
                                <div class="action-btn-side" onclick="shareReel('${reel.videoUrl}', event)"><i class="fas fa-share-alt"></i><span>مشاركة</span></div>
                            </div>
                            <div class="reel-overlay">
                                <div class="reel-title"><i class="fas fa-play-circle" style="color:gold;"></i> ${escapeHtml(reel.title)}</div>
                                <div class="reel-publisher"><i class="fas fa-user-circle"></i> ${escapeHtml(reel.publisher)}</div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            setTimeout(() => {
                const slides = document.querySelectorAll('.reel-slide');
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        const video = entry.target.querySelector('video');
                        if (entry.isIntersecting) {
                            video.play().catch(e => console.log);
                            const reelId = parseInt(entry.target.dataset.reelId);
                            const reel = reelsCache.find(r => r.id === reelId);
                            if (reel && !reel.viewRecorded) {
                                reel.views = (reel.views || 0) + 1;
                                reel.viewRecorded = true;
                                updateMood('watch');
                                addPoints(1, 'مشاهدة');
                                updateStats();
                            }
                        } else { video.pause(); }
                    });
                }, { threshold: 0.6 });
                slides.forEach(slide => observer.observe(slide));
            }, 100);
        }

        function openComments(reelId) {
            currentReelId = reelId;
            const panel = document.getElementById('commentsPanel');
            const list = document.getElementById('commentsList');
            const reelComments = comments[reelId] || [];
            list.innerHTML = reelComments.map(c => `<div class="comment-item"><div><i class="fas fa-user-circle"></i></div><div><span class="comment-user">${escapeHtml(c.user)}</span><br><span style="font-size:12px;">${escapeHtml(c.text)}</span></div></div>`).join('');
            panel.classList.add('open');
        }

        function closeComments() { document.getElementById('commentsPanel').classList.remove('open'); }

        function addComment() {
            const text = document.getElementById('commentText').value.trim();
            if (!text || !currentReelId) return;
            if (!comments[currentReelId]) comments[currentReelId] = [];
            comments[currentReelId].push({ user: currentUser.name, text: text, time: Date.now() });
            saveUserData();
            document.getElementById('commentText').value = '';
            openComments(currentReelId);
            addPoints(3, 'تعليق');
            updateMood('comment');
            showNotification('✅ تم إضافة التعليق', 'success');
        }

        async function uploadReelToTelegram() {
            if (!selectedVideoFile) { showNotification('❌ اختر فيديو أولاً', 'error'); return; }
            if (!currentUser) { showNotification('❌ يرجى تسجيل الدخول', 'error'); return; }
            const title = document.getElementById('reelTitleInput').value.trim() || 'ريلز رائع';
            const btn = document.getElementById('uploadBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> جاري الرفع...';
            try {
                const formData = new FormData();
                formData.append('chat_id', TELEGRAM.channelId);
                formData.append('video', selectedVideoFile);
                formData.append('caption', `🎬 ${title}\n👤 ${currentUser.name}\n📅 ${new Date().toLocaleString('ar-EG')}\n\n✅ تم الرفع عبر ناردو ريلز AI`);
                const response = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/sendVideo`, { method: 'POST', body: formData });
                const data = await response.json();
                if (data.ok) {
                    showNotification(`✅ تم الرفع بنجاح!`, 'success');
                    addPoints(20, 'رفع ريلز');
                    setTimeout(() => loadReelsFromTelegram(), 3000);
                    closeUploadModal();
                    removeSelectedVideo();
                } else throw new Error(data.description || 'فشل الرفع');
            } catch (error) { showNotification('❌ فشل الرفع: ' + error.message, 'error'); }
            finally { btn.disabled = false; btn.innerHTML = '<i class="fab fa-telegram"></i> رفع ونشر للجميع'; }
        }

        function likeReel(reelId, event) {
            event.stopPropagation();
            const reel = reelsCache.find(r => r.id === reelId);
            if (reel) {
                if (userLikes[reelId]) { reel.likes = Math.max(0, (reel.likes || 0) - 1); delete userLikes[reelId]; }
                else { reel.likes = (reel.likes || 0) + 1; userLikes[reelId] = true; addPoints(1, 'إعجاب'); updateMood('like'); }
                saveUserData();
                displayAllReels();
                updateStats();
            }
        }

        function shareReel(videoUrl, event) {
            event.stopPropagation();
            navigator.clipboard.writeText(videoUrl);
            showNotification('🔗 تم نسخ الرابط', 'success');
            addPoints(5, 'مشاركة');
            updateMood('share');
        }

        function updateStats() {
            const totalReels = reelsCache.length;
            const countSpan = document.getElementById('totalReelsCount');
            if (countSpan) countSpan.innerText = totalReels;
        }

        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num || 0;
        }

        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
        function showNotification(msg, type = 'info') {
            const div = document.createElement('div'); div.className = 'notification'; div.innerHTML = `${type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️'} ${msg}`;
            document.body.appendChild(div); setTimeout(() => div.remove(), 3000);
        }
        function showLoadingOverlay(show, message = "جاري التحميل...") {
            let overlay = document.getElementById('loadingOverlay');
            if (show && !overlay) { overlay = document.createElement('div'); overlay.id = 'loadingOverlay'; overlay.className = 'loading-overlay'; overlay.innerHTML = `<i class="fas fa-spinner fa-pulse" style="font-size: 50px; color: gold;"></i><p>${message}</p>`; document.body.appendChild(overlay); }
            else if (show && overlay) overlay.style.display = 'flex';
            else if (!show && overlay) overlay.remove();
        }
        function handleVideoSelect(input) {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                if (file.size > 50 * 1024 * 1024) { showNotification('حجم الفيديو كبير جداً', 'error'); return; }
                if (!file.type.startsWith('video/')) { showNotification('اختر ملف فيديو صالح', 'error'); return; }
                selectedVideoFile = file; const url = URL.createObjectURL(file); document.getElementById('previewVideo').src = url; document.getElementById('videoPreviewDiv').classList.add('show');
            }
        }
        function removeSelectedVideo() { selectedVideoFile = null; document.getElementById('videoPreviewDiv').classList.remove('show'); document.getElementById('videoInput').value = ''; document.getElementById('previewVideo').src = ''; }
        function openUploadModal() { if (!currentUser) { showNotification('يجب تسجيل الدخول أولاً', 'warning'); return; } document.getElementById('uploadModal').style.display = 'flex'; }
        function closeUploadModal() { document.getElementById('uploadModal').style.display = 'none'; }

        function login() {
            const username = document.getElementById('loginUsername').value.trim();
            if (!username) { showNotification('❌ أدخل اسم المستخدم', 'error'); return; }
            let user = users.find(u => u.username === username || u.name === username);
            if (!user) { user = { id: Date.now(), name: username, username: username, role: 'user', points: 100 }; users.push(user); localStorage.setItem('nardoo_users', JSON.stringify(users)); }
            currentUser = user; localStorage.setItem('current_user', JSON.stringify(user)); loadUserData();
            document.getElementById('loginScreen').style.display = 'none'; document.getElementById('topBar').style.display = 'block'; document.getElementById('fabButtons').style.display = 'block'; document.getElementById('reelsPlayer').style.display = 'block'; document.getElementById('userNameDisplay').innerText = currentUser.name;
            loadReelsFromTelegram(); showNotification(`✅ مرحباً ${user.name}`, 'success');
        }

        function logout() { currentUser = null; localStorage.removeItem('current_user'); document.getElementById('loginScreen').style.display = 'flex'; document.getElementById('topBar').style.display = 'none'; document.getElementById('fabButtons').style.display = 'none'; document.getElementById('reelsPlayer').style.display = 'none'; reelsCache = []; }

        setInterval(() => { if (currentUser && !isLoading) loadReelsFromTelegram(); }, 300000);
        loadUsers();
        const savedUser = localStorage.getItem('current_user');
        if (savedUser) {
            currentUser = JSON.parse(savedUser);
            if (currentUser) { loadUserData(); document.getElementById('loginScreen').style.display = 'none'; document.getElementById('topBar').style.display = 'block'; document.getElementById('fabButtons').style.display = 'block'; document.getElementById('reelsPlayer').style.display = 'block'; document.getElementById('userNameDisplay').innerText = currentUser.name; loadReelsFromTelegram(); }
        }
        window.onclick = e => { if (e.target === document.getElementById('uploadModal')) closeUploadModal(); };
        console.log('🤖 ناردو ريلز AI جاهز - ذكاء اصطناعي | تحكم صوتي | مكافآت | تعليقات');
    </script>
</body>
</html>
