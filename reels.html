
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تجربة ألبومات الريلز</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0a1a15, #1a2f28);
            color: white;
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { color: gold; text-align: center; margin-bottom: 20px; }
        
        .album {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            margin: 20px 0;
            overflow: hidden;
            border: 1px solid rgba(255,215,0,0.3);
        }
        .album-header {
            background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,215,0,0.05));
            padding: 15px 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }
        .album-header:hover {
            background: rgba(255,215,0,0.15);
        }
        .album-title {
            font-size: 18px;
            font-weight: bold;
            color: gold;
        }
        .album-count {
            background: rgba(255,215,0,0.3);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }
        .album-icon {
            transition: transform 0.3s;
        }
        .album-icon.open {
            transform: rotate(180deg);
        }
        .album-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease;
        }
        .album-content.open {
            max-height: 2000px;
        }
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            padding: 20px;
        }
        .video-card {
            background: rgba(0,0,0,0.5);
            border-radius: 15px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .video-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(255,215,0,0.3);
        }
        .video-thumb {
            height: 120px;
            background: linear-gradient(135deg, #1a472a, #0a2a1a);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .video-thumb i {
            font-size: 40px;
            color: gold;
        }
        .video-info {
            padding: 10px;
        }
        .video-title {
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .video-id {
            font-size: 10px;
            color: #aaa;
            font-family: monospace;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: gold;
        }
        button {
            background: gold;
            color: black;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            margin: 5px;
            font-weight: bold;
        }
        .log {
            background: rgba(0,0,0,0.7);
            padding: 15px;
            border-radius: 15px;
            font-family: monospace;
            font-size: 12px;
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
        }
        .success { color: #4ade80; }
        .error { color: #f87171; }
        .info { color: #60a5fa; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 تجربة ألبومات الريلز</h1>
        
        <div style="text-align: center; margin-bottom: 20px;">
            <button onclick="fetchAndDisplay()">📡 جلب من القناة</button>
            <button onclick="clearAlbums()">🗑️ مسح</button>
        </div>
        
        <div id="albumsContainer"></div>
        
        <div id="log" class="log">
            <div class="info">📋 جاهز... اضغط "جلب من القناة"</div>
        </div>
    </div>

    <script>
        const BOT_TOKEN = '8576673096:AAECPDHWRTVQ_juq68hxM9PIdacnqevGRb4';
        const API_URL = 'https://api.telegram.org/bot';
        
        let allVideos = [];
        let albums = [];
        
        function addLog(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const time = new Date().toLocaleTimeString();
            const color = type === 'success' ? '#4ade80' : type === 'error' ? '#f87171' : '#60a5fa';
            logDiv.innerHTML += `<div style="color: ${color};">[${time}] ${message}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(message);
        }
        
        function clearLog() {
            document.getElementById('log').innerHTML = '<div class="info">📋 جاهز...</div>';
        }
        
        function clearAlbums() {
            document.getElementById('albumsContainer').innerHTML = '';
            addLog('🗑️ تم مسح الألبومات', 'info');
        }
        
        async function fetchAndDisplay() {
            addLog('🚀 بدء جلب الفيديوهات من القناة...', 'info');
            document.getElementById('albumsContainer').innerHTML = '<div class="loading">⏳ جاري التحميل...</div>';
            
            try {
                const url = `${API_URL}${BOT_TOKEN}/getUpdates?limit=200`;
                addLog(`📡 إرسال طلب إلى تلغرام...`, 'info');
                
                const startTime = Date.now();
                const response = await fetch(url);
                const data = await response.json();
                const elapsed = Date.now() - startTime;
                
                addLog(`⏱️ استغرق الطلب: ${elapsed}ms`, 'info');
                
                if (!data.ok) {
                    addLog(`❌ فشل: ${data.description}`, 'error');
                    document.getElementById('albumsContainer').innerHTML = `<div class="loading error">❌ فشل الاتصال</div>`;
                    return;
                }
                
                addLog(`✅ الاتصال ناجح`, 'success');
                addLog(`📊 عدد التحديثات: ${data.result?.length || 0}`, 'info');
                
                // استخراج الفيديوهات
                const videos = [];
                
                if (data.ok && data.result) {
                    const updates = [...data.result].reverse();
                    
                    for (const update of updates) {
                        const post = update.channel_post || update.message;
                        if (post && post.video) {
                            const caption = post.caption || '';
                            let title = '🎬 ريلز';
                            const titleMatch = caption.match(/🎬 (.+?)(?:\n|$)/);
                            if (titleMatch) title = titleMatch[1];
                            
                            videos.push({
                                id: post.message_id,
                                title: title,
                                date: new Date(post.date * 1000).toISOString(),
                                videoId: post.video.file_id
                            });
                        }
                    }
                }
                
                allVideos = videos;
                addLog(`🎬 تم العثور على ${videos.length} فيديو`, videos.length > 0 ? 'success' : 'error');
                
                if (videos.length === 0) {
                    document.getElementById('albumsContainer').innerHTML = `
                        <div class="loading">
                            <i class="fas fa-film" style="font-size: 50px; color: gold;"></i>
                            <p>لا توجد فيديوهات في القناة</p>
                            <p style="font-size: 12px;">تأكد من أن البوت مشرف في القناة</p>
                        </div>
                    `;
                    return;
                }
                
                // تقسيم إلى ألبومات (كل 10 فيديوهات)
                albums = [];
                for (let i = 0; i < videos.length; i += 10) {
                    albums.push(videos.slice(i, i + 10));
                }
                
                addLog(`📀 تم تقسيم إلى ${albums.length} ألبوم (كل ألبوم 10 فيديوهات)`, 'success');
                
                // عرض الألبومات
                displayAlbums();
                
            } catch (error) {
                addLog(`❌ خطأ: ${error.message}`, 'error');
                document.getElementById('albumsContainer').innerHTML = `<div class="loading error">❌ خطأ: ${error.message}</div>`;
            }
        }
        
        function displayAlbums() {
            const container = document.getElementById('albumsContainer');
            
            if (albums.length === 0) {
                container.innerHTML = '<div class="loading">لا توجد ألبومات</div>';
                return;
            }
            
            container.innerHTML = albums.map((album, index) => `
                <div class="album">
                    <div class="album-header" onclick="toggleAlbum(${index})">
                        <div>
                            <span class="album-title">📀 ألبوم ${index + 1}</span>
                            <span class="album-count">${album.length} فيديو</span>
                        </div>
                        <i class="fas fa-chevron-down album-icon" id="icon-${index}"></i>
                    </div>
                    <div class="album-content" id="album-${index}">
                        <div class="video-grid">
                            ${album.map(video => `
                                <div class="video-card" onclick="showVideoInfo(${video.id})">
                                    <div class="video-thumb">
                                        <i class="fas fa-play-circle"></i>
                                    </div>
                                    <div class="video-info">
                                        <div class="video-title">${video.title}</div>
                                        <div class="video-id">ID: ${video.id}</div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function toggleAlbum(index) {
            const content = document.getElementById(`album-${index}`);
            const icon = document.getElementById(`icon-${index}`);
            
            if (content.classList.contains('open')) {
                content.classList.remove('open');
                icon.classList.remove('open');
            } else {
                content.classList.add('open');
                icon.classList.add('open');
            }
        }
        
        function showVideoInfo(videoId) {
            const video = allVideos.find(v => v.id == videoId);
            if (video) {
                addLog(`🎬 فيديو ID: ${video.id} - ${video.title}`, 'success');
                alert(`🎬 ${video.title}\n🆔 ID: ${video.id}\n📅 ${new Date(video.date).toLocaleString()}`);
            }
        }
        
        // تشغيل تلقائي
        setTimeout(() => {
            fetchAndDisplay();
        }, 500);
    </script>
</body>
</html>
