<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>نظام السلة - ناردو برو</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --gold: #ffd700;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --glass: rgba(255, 255, 255, 0.05);
            --success: #4ade80;
            --error: #f87171;
            --warning: #fbbf24;
            --info: #60a5fa;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0f3460, #16213e);
            color: var(--text-primary);
            min-height: 100vh;
            direction: rtl;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* ===== الهيدر ===== */
        .header {
            background: var(--glass);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-title i {
            font-size: 40px;
            color: var(--gold);
        }

        .header-title h1 {
            font-size: 32px;
            color: var(--gold);
            margin: 0;
        }

        .header-info {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 215, 0, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
        }

        .info-item i {
            color: var(--gold);
            font-size: 20px;
        }

        .info-item span {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Cairo', sans-serif;
        }

        .btn-gold {
            background: var(--gold);
            color: #000;
        }

        .btn-gold:hover {
            background: #ffed4e;
            transform: translateY(-2px);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--gold);
        }

        .btn-outline:hover {
            background: rgba(255, 215, 0, 0.1);
        }

        .btn-small {
            padding: 8px 15px;
            font-size: 12px;
        }

        /* ===== المنتجات ===== */
        .section-title {
            font-size: 24px;
            color: var(--gold);
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(255, 215, 0, 0.2);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .product-card {
            background: var(--glass);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 15px;
            padding: 20px;
            transition: all 0.3s;
        }

        .product-card:hover {
            border-color: var(--gold);
            transform: translateY(-5px);
        }

        .product-image {
            width: 100%;
            height: 150px;
            background: rgba(255, 215, 0, 0.1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            margin-bottom: 15px;
        }

        .product-name {
            font-size: 18px;
            font-weight: bold;
            color: var(--gold);
            margin-bottom: 8px;
        }

        .product-price {
            font-size: 22px;
            font-weight: bold;
            color: var(--success);
            margin-bottom: 10px;
        }

        .product-stock {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 15px;
        }

        .product-actions {
            display: flex;
            gap: 10px;
        }

        /* ===== السلة ===== */
        .cart-section {
            background: var(--glass);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 20px;
            padding: 25px;
        }

        .cart-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 215, 0, 0.15);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            transition: all 0.3s;
        }

        .cart-item:hover {
            border-color: var(--gold);
            background: rgba(255, 215, 0, 0.05);
        }

        .cart-item-info {
            flex: 2;
            min-width: 200px;
        }

        .cart-item-name {
            font-size: 16px;
            font-weight: bold;
            color: var(--gold);
            margin-bottom: 5px;
        }

        .cart-item-price {
            font-size: 14px;
            color: var(--success);
        }

        .cart-item-quantity {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 215, 0, 0.1);
            padding: 8px 15px;
            border-radius: 10px;
        }

        .cart-item-quantity button {
            background: none;
            border: none;
            color: var(--gold);
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            width: 30px;
            height: 30px;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .cart-item-quantity button:hover {
            background: rgba(255, 215, 0, 0.2);
        }

        .cart-item-quantity span {
            font-size: 16px;
            font-weight: bold;
            min-width: 30px;
            text-align: center;
        }

        .cart-item-total {
            font-size: 18px;
            font-weight: bold;
            color: var(--gold);
            min-width: 120px;
            text-align: center;
        }

        .cart-item-remove {
            background: rgba(248, 113, 113, 0.2);
            color: var(--error);
            border: 1px solid var(--error);
            padding: 8px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .cart-item-remove:hover {
            background: var(--error);
            color: white;
        }

        /* ===== ملخص السلة ===== */
        .cart-summary {
            background: rgba(255, 215, 0, 0.05);
            border-radius: 15px;
            padding: 25px;
            margin-top: 20px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.1);
        }

        .summary-row:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .summary-label {
            color: var(--text-secondary);
            font-size: 16px;
        }

        .summary-value {
            color: var(--gold);
            font-weight: bold;
            font-size: 18px;
        }

        .summary-total {
            font-size: 24px;
            color: var(--success);
        }

        .cart-actions {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        .cart-actions .btn {
            flex: 1;
        }

        /* ===== الحالات الفارغة ===== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 70px;
            color: var(--gold);
            margin-bottom: 20px;
        }

        .empty-state h3 {
            font-size: 24px;
            margin-bottom: 10px;
            color: var(--text-primary);
        }

        /* ===== الإشعارات ===== */
        .notification {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            max-width: 400px;
            margin: 0 auto;
            padding: 15px 25px;
            border-radius: 12px;
            font-weight: bold;
            z-index: 2000;
            animation: slideIn 0.3s ease;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .notification.success {
            background: var(--success);
            color: #000;
        }

        .notification.error {
            background: var(--error);
            color: #fff;
        }

        .notification.warning {
            background: var(--warning);
            color: #000;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-100px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* ===== الاستجابة ===== */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                text-align: center;
            }

            .header-title {
                flex-direction: column;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .cart-item {
                flex-direction: column;
                align-items: stretch;
            }

            .cart-item-total {
                text-align: right;
            }

            .cart-actions {
                flex-direction: column;
            }
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            display: inline-block;
            margin-right: 8px;
        }

        .status-in-stock {
            background: rgba(74, 222, 128, 0.2);
            color: var(--success);
        }

        .status-out-of-stock {
            background: rgba(248, 113, 113, 0.2);
            color: var(--error);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ===== الهيدر ===== -->
        <div class="header">
            <div class="header-title">
                <i class="fas fa-shopping-cart"></i>
                <h1>نظام السلة</h1>
            </div>
            <div class="header-info">
                <div class="info-item">
                    <i class="fas fa-shopping-bag"></i>
                    <span>السلة: <strong id="cartCount">0</strong></span>
                </div>
                <div class="info-item">
                    <i class="fas fa-dollar-sign"></i>
                    <span>الإجمالي: <strong id="cartTotal">0</strong> دج</span>
                </div>
                <button class="btn btn-outline btn-small" onclick="clearCart()">
                    <i class="fas fa-trash-alt"></i> مسح الكل
                </button>
            </div>
        </div>

        <!-- ===== المنتجات ===== -->
        <h2 class="section-title"><i class="fas fa-cube"></i> المنتجات المتاحة</h2>
        <div id="productsContainer" class="grid"></div>

        <!-- ===== السلة ===== -->
        <div class="cart-section">
            <h2 class="section-title" style="margin-top: 0;"><i class="fas fa-shopping-basket"></i> سلة المشتريات</h2>
            <div id="cartContainer"></div>
        </div>
    </div>

    <script>
        // ================================================================
        // البيانات التجريبية - منتجات افتراضية
        // ================================================================
        let products = [
            {
                id: 1,
                name: "هاتف ذكي احترافي",
                price: 45000,
                quantity: 15,
                image: "📱"
            },
            {
                id: 2,
                name: "حاسوب محمول",
                price: 125000,
                quantity: 8,
                image: "💻"
            },
            {
                id: 3,
                name: "سماعات لاسلكية",
                price: 8500,
                quantity: 25,
                image: "🎧"
            },
            {
                id: 4,
                name: "ساعة ذكية",
                price: 22000,
                quantity: 5,
                image: "⌚"
            },
            {
                id: 5,
                name: "شاحن سريع",
                price: 3500,
                quantity: 0,
                image: "🔋"
            },
            {
                id: 6,
                name: "حقيبة ظهر",
                price: 12000,
                quantity: 12,
                image: "🎒"
            }
        ];

        // تحميل السلة من localStorage
        let cart = JSON.parse(localStorage.getItem('cart_system')) || [];

        // ================================================================
        // دوال عرض المنتجات
        // ================================================================
        function loadProducts() {
            const container = document.getElementById('productsContainer');
            
            if (products.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <i class="fas fa-box-open"></i>
                        <h3>لا توجد منتجات</h3>
                        <p>تم إضافة منتجات جديدة قريباً</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = products.map(product => {
                const stockStatus = product.quantity > 0 ? 'in-stock' : 'out-of-stock';
                const stockLabel = product.quantity > 0 ? `متوفر: ${product.quantity}` : 'نفد المخزون';
                
                return `
                    <div class="product-card">
                        <div class="product-image">
                            ${product.image}
                        </div>
                        <div class="product-name">${product.name}</div>
                        <div class="product-price">${product.price.toLocaleString('ar-EG')} دج</div>
                        <div class="product-stock">
                            📦 ${stockLabel}
                            <span class="status-badge status-${stockStatus}">${product.quantity > 0 ? 'متوفر' : 'غير متوفر'}</span>
                        </div>
                        <div class="product-actions">
                            ${product.quantity > 0 ? `
                                <button class="btn btn-gold btn-small" onclick="addToCart(${product.id})">
                                    <i class="fas fa-cart-plus"></i> أضف للسلة
                                </button>
                            ` : `
                                <button class="btn btn-outline btn-small" disabled style="opacity:0.5;">
                                    <i class="fas fa-ban"></i> غير متوفر
                                </button>
                            `}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ================================================================
        // دوال السلة
        // ================================================================
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            
            if (!product) {
                showNotification('المنتج غير موجود', 'error');
                return;
            }

            if (product.quantity <= 0) {
                showNotification('المنتج غير متوفر في المخزون', 'error');
                return;
            }

            const existingItem = cart.find(item => item.id === productId);
            
            if (existingItem) {
                // التحقق من عدم تجاوز الكمية المتاحة
                if (existingItem.quantity < product.quantity) {
                    existingItem.quantity++;
                    showNotification(`✓ تم إضافة ${product.name} إلى السلة`, 'success');
                } else {
                    showNotification(`لا يمكن إضافة أكثر من ${product.quantity} قطع من هذا المنتج`, 'warning');
                    return;
                }
            } else {
                cart.push({
                    id: product.id,
                    name: product.name,
                    price: product.price,
                    quantity: 1,
                    image: product.image
                });
                showNotification(`✓ تم إضافة ${product.name} إلى السلة`, 'success');
            }

            saveCart();
            updateCartDisplay();
            loadCart();
        }

        function updateCartQuantity(productId, change) {
            const itemIndex = cart.findIndex(item => item.id === productId);
            
            if (itemIndex === -1) return;
            
            const item = cart[itemIndex];
            const product = products.find(p => p.id === productId);
            
            const newQuantity = item.quantity + change;
            
            if (newQuantity <= 0) {
                removeFromCart(productId);
            } else if (newQuantity <= product.quantity) {
                item.quantity = newQuantity;
                saveCart();
                updateCartDisplay();
                loadCart();
                showNotification(`✓ تم تحديث كمية ${item.name}`, 'success');
            } else {
                showNotification(`لا يمكن إضافة أكثر من ${product.quantity} قطع`, 'warning');
            }
        }

        function removeFromCart(productId) {
            const item = cart.find(i => i.id === productId);
            if (item) {
                cart = cart.filter(item => item.id !== productId);
                saveCart();
                updateCartDisplay();
                loadCart();
                showNotification(`✓ تم إزالة ${item.name} من السلة`, 'success');
            }
        }

        function clearCart() {
            if (cart.length === 0) {
                showNotification('السلة فارغة بالفعل', 'warning');
                return;
            }
            
            if (confirm('هل أنت متأكد من مسح جميع المنتجات من السلة؟')) {
                cart = [];
                saveCart();
                updateCartDisplay();
                loadCart();
                showNotification('✓ تم مسح السلة بالكامل', 'success');
            }
        }

        function loadCart() {
            const container = document.getElementById('cartContainer');
            
            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-shopping-basket"></i>
                        <h3>السلة فارغة</h3>
                        <p>أضف بعض المنتجات من القائمة أعلاه</p>
                    </div>
                `;
                return;
            }

            let totalAmount = 0;
            let totalItems = 0;

            const cartHtml = cart.map(item => {
                const itemTotal = item.price * item.quantity;
                totalAmount += itemTotal;
                totalItems += item.quantity;
                
                return `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <div class="cart-item-name">
                                ${item.image || '📦'} ${item.name}
                            </div>
                            <div class="cart-item-price">
                                ${item.price.toLocaleString('ar-EG')} دج / قطعة
                            </div>
                        </div>
                        <div class="cart-item-quantity">
                            <button onclick="updateCartQuantity(${item.id}, -1)">−</button>
                            <span>${item.quantity}</span>
                            <button onclick="updateCartQuantity(${item.id}, 1)">+</button>
                        </div>
                        <div class="cart-item-total">
                            ${itemTotal.toLocaleString('ar-EG')} دج
                        </div>
                        <button class="cart-item-remove" onclick="removeFromCart(${item.id})">
                            <i class="fas fa-trash"></i> حذف
                        </button>
                    </div>
                `;
            }).join('');

            // إضافة ملخص السلة
            const summaryHtml = `
                <div class="cart-summary">
                    <div class="summary-row">
                        <span class="summary-label">عدد العناصر:</span>
                        <span class="summary-value">${totalItems} قطعة</span>
                    </div>
                    <div class="summary-row">
                        <span class="summary-label">عدد المنتجات المتنوعة:</span>
                        <span class="summary-value">${cart.length} منتج</span>
                    </div>
                    <div class="summary-row">
                        <span class="summary-label">الإجمالي النهائي:</span>
                        <span class="summary-value summary-total">${totalAmount.toLocaleString('ar-EG')} دج</span>
                    </div>
                    <div class="cart-actions">
                        <button class="btn btn-gold" onclick="checkout()">
                            <i class="fas fa-credit-card"></i> إتمام الشراء
                        </button>
                        <button class="btn btn-outline" onclick="clearCart()">
                            <i class="fas fa-trash-alt"></i> إفراغ السلة
                        </button>
                    </div>
                </div>
            `;

            container.innerHTML = cartHtml + summaryHtml;
        }

        function checkout() {
            if (cart.length === 0) {
                showNotification('السلة فارغة، أضف منتجات أولاً', 'warning');
                return;
            }

            // حساب الإجمالي
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            
            // إنشاء ملخص الطلب
            let orderSummary = '🛒 ملخص طلبك:\n━━━━━━━━━━━━━━━━━━\n';
            cart.forEach(item => {
                const itemTotal = item.price * item.quantity;
                orderSummary += `• ${item.name} × ${item.quantity} = ${itemTotal.toLocaleString('ar-EG')} دج\n`;
            });
            orderSummary += `━━━━━━━━━━━━━━━━━━\n💰 الإجمالي: ${total.toLocaleString('ar-EG')} دج`;

            // عرض تفاصيل الطلب
            if (confirm(`${orderSummary}\n\nهل تريد تأكيد عملية الشراء؟`)) {
                // تحديث المخزون
                cart.forEach(cartItem => {
                    const product = products.find(p => p.id === cartItem.id);
                    if (product) {
                        product.quantity -= cartItem.quantity;
                    }
                });
                
                // تفريغ السلة
                cart = [];
                saveCart();
                updateCartDisplay();
                loadProducts();
                loadCart();
                
                showNotification('✓ تم إتمام عملية الشراء بنجاح! شكراً لتسوقك', 'success');
            }
        }

        // ================================================================
        // دوال مساعدة
        // ================================================================
        function saveCart() {
            localStorage.setItem('cart_system', JSON.stringify(cart));
        }

        function updateCartDisplay() {
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            document.getElementById('cartCount').textContent = count;
            document.getElementById('cartTotal').textContent = total.toLocaleString('ar-EG');
        }

        function showNotification(message, type = 'success') {
            // إزالة أي إشعار موجود
            const existingNotification = document.querySelector('.notification');
            if (existingNotification) {
                existingNotification.remove();
            }
            
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i> ${message}`;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 2500);
        }

        // ================================================================
        // التهيئة
        // ================================================================
        function init() {
            loadProducts();
            loadCart();
            updateCartDisplay();
            console.log('✓ نظام السلة جاهز');
            console.log(`✓ عدد المنتجات: ${products.length}`);
            console.log(`✓ عدد العناصر في السلة: ${cart.reduce((s,i) => s + i.quantity, 0)}`);
        }
        
        init();
    </script>
</body>
</html>
