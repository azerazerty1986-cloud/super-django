<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ناردو ريلز | نظام متكامل - تخزين وجلب من تليجرام</title>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f2b23, #1e4a3f);
            min-height: 100vh;
            color: white;
        }

        /* ===== شريط المستخدم ===== */
        .user-bar {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-bottom: 3px solid #ff0066;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .user-badge {
            background: linear-gradient(135deg, #ff0066, #cc0052);
            padding: 10px 25px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: bold;
            font-size: 18px;
            box-shadow: 0 0 15px rgba(255,0,102,0.5);
        }

        .user-badge i {
            font-size: 24px;
        }

        .user-stats {
            display: flex;
            gap: 25px;
        }

        .user-stat {
            background: rgba(255,255,255,0.1);
            padding: 8px 20px;
            border-radius: 25px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .user-stat .number {
            font-size: 24px;
            font-weight: bold;
            color: #ff0066;
        }

        .user-stat .label {
            font-size: 12px;
            color: rgba(255,255,255,0.7);
        }

        .sync-btn {
            background: linear-gradient(135deg, #0088cc, #006699);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .sync-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(0,136,204,0.5);
        }

        /* ===== تبويبات ===== */
        .admin-tabs, .user-tabs {
            display: flex;
            justify-content: center;
            gap: 8px;
            background: rgba(0,0,0,0.5);
            padding: 12px 20px;
            margin: 20px auto;
            max-width: 1200px;
            border-radius: 60px;
            flex-wrap: wrap;
            backdrop-filter: blur(10px);
        }

        .admin-tab, .user-tab {
            padding: 12px 30px;
            background: rgba(255,255,255,0.1);
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 16px;
        }

        .admin-tab.active, .user-tab.active {
            background: linear-gradient(135deg, gold, #ffd700);
            color: black;
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(255,215,0,0.4);
        }

        .admin-tab:hover:not(.active), .user-tab:hover:not(.active) {
            background: rgba(255,215,0,0.3);
            transform: translateY(-2px);
        }

        /* ===== محتوى ===== */
        .admin-content, .user-content {
            display: none;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            animation: fadeIn 0.5s ease;
        }

        .admin-content.active, .user-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== بطاقات التحكم ===== */
        .control-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 35px;
        }

        .control-card {
            background: linear-gradient(135deg, rgba(0,0,0,0.6), rgba(0,0,0,0.4));
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 25px;
            text-align: center;
            border: 2px solid gold;
            transition: all 0.3s ease;
        }

        .control-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(212,175,55,0.3);
        }

        .control-card i {
            font-size: 50px;
            color: gold;
            margin-bottom: 15px;
        }

        .control-card h3 {
            color: gold;
            margin-bottom: 10px;
            font-size: 22px;
        }

        /* ===== الجداول ===== */
        .users-table {
            width: 100%;
            background: rgba(0,0,0,0.5);
            border-radius: 25px;
            overflow-x: auto;
            backdrop-filter: blur(10px);
            padding: 5px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 15px 12px;
            text-align: center;
            border-bottom: 1px solid rgba(255,215,0,0.2);
        }

        th {
            background: rgba(255,215,0,0.15);
            color: gold;
            font-weight: bold;
        }

        tr:hover {
            background: rgba(255,215,0,0.05);
        }

        /* ===== الأزرار ===== */
        .action-btn {
            background: none;
            border: 2px solid gold;
            color: gold;
            padding: 6px 15px;
            border-radius: 25px;
            cursor: pointer;
            margin: 0 5px;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .action-btn.delete {
            border-color: #ff4444;
            color: #ff4444;
        }

        .action-btn.delete:hover {
            background: #ff4444;
            color: white;
        }

        .action-btn:hover {
            background: gold;
            color: black;
            transform: scale(1.05);
        }

        /* ===== شبكة الريلز ===== */
        .reels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            padding: 20px;
        }

        .reel-card {
            background: linear-gradient(135deg, #1e1e2e, #2a2a3a);
            border: 2px solid gold;
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .reel-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(212, 175, 55, 0.3);
            border-color: #ffd966;
        }

        .reel-video {
            height: 320px;
            overflow: hidden;
            background: #000;
            position: relative;
        }

        .reel-video video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .reel-card:hover .reel-video video {
            transform: scale(1.05);
        }

        .reel-play-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0;
            transition: opacity 0.3s;
            background: rgba(212, 175, 55, 0.9);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .reel-play-overlay i {
            font-size: 30px;
            color: white;
        }

        .reel-card:hover .reel-play-overlay {
            opacity: 1;
        }

        .reel-info {
            padding: 15px;
        }

        .reel-info h3 {
            color: gold;
            margin-bottom: 10px;
            font-size: 18px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .reel-stats {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #aaa;
            margin-top: 10px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .telegram-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #0088cc;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 10px;
            z-index: 5;
        }

        /* ===== أزرار عائمة ===== */
        .upload-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, gold, #ffd700);
            color: black;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.5);
            transition: all 0.3s;
            z-index: 1000;
            border: 3px solid white;
        }

        .upload-btn:hover {
            transform: scale(1.1);
        }

        /* ===== النوافذ المنبثقة ===== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(15px);
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a3a32, #0a1a15);
            border: 3px solid gold;
            border-radius: 30px;
            padding: 35px;
            max-width: 600px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
        }

        .upload-area {
            border: 3px dashed gold;
            border-radius: 20px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 25px;
        }

        .video-preview {
            display: none;
            margin-bottom: 25px;
        }

        .video-preview.show {
            display: block;
        }

        .video-preview video {
            width: 100%;
            max-height: 350px;
            border-radius: 15px;
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255,255,255,0.1);
            border: 2px solid gold;
            border-radius: 12px;
            color: white;
            margin-bottom: 20px;
        }

        .send-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, gold, #ffd700);
            border: none;
            border-radius: 50px;
            color: black;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .notification {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, gold, #ffd700);
            color: black;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: bold;
            z-index: 2000;
            animation: slideUp 0.3s ease;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20000;
            flex-direction: column;
            gap: 20px;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        @media (max-width: 768px) {
            .reels-grid {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            }
            .user-bar {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <!-- شاشة تسجيل الدخول -->
    <div class="login-screen" id="loginScreen">
        <div class="modal-content" style="max-width: 400px;">
            <i class="fas fa-film" style="font-size: 60px; color: gold; display: block; text-align: center; margin-bottom: 20px;"></i>
            <h2 style="color: gold; text-align: center;">تسجيل الدخول</h2>
            <input type="text" id="loginUsername" class="form-control" placeholder="اسم المستخدم">
            <button class="send-btn" onclick="login()">دخول</button>
            <p style="text-align: center; margin-top: 15px; font-size: 12px;">👑 admin / admin123 | 👤 user / user123</p>
        </div>
    </div>

    <!-- واجهة المستخدم -->
    <div id="mainApp" style="display: none;">
        <!-- شريط المستخدم -->
        <div class="user-bar">
            <div class="user-badge">
                <i class="fas fa-user"></i>
                <span id="userName">مستخدم</span>
            </div>
            <div class="user-stats">
                <div class="user-stat">
                    <div class="number" id="totalReelsCount">0</div>
                    <div class="label">الريلز</div>
                </div>
                <div class="user-stat">
                    <div class="number" id="telegramCount">0</div>
                    <div class="label">من تليجرام</div>
                </div>
            </div>
            <div>
                <button class="sync-btn" onclick="syncFromTelegram()">
                    <i class="fab fa-telegram"></i> مزامنة من تليجرام
                </button>
                <button class="action-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> خروج
                </button>
            </div>
        </div>

        <!-- شبكة الريلز -->
        <div class="reels-grid" id="reelsContainer">
            <div style="grid-column: 1/-1; text-align: center; padding: 100px;">
                <i class="fas fa-spinner fa-pulse" style="font-size: 40px;"></i>
                <p>جاري تحميل الريلز من تليجرام...</p>
            </div>
        </div>
    </div>

    <!-- زر رفع ريلز -->
    <div class="upload-btn" id="uploadBtn" onclick="openUploadModal()" style="display: none;">
        <i class="fas fa-plus"></i>
    </div>

    <!-- نافذة رفع الريلز -->
    <div class="modal" id="uploadModal">
        <div class="modal-content">
            <button onclick="closeUploadModal()" style="background: none; border: none; color: gold; font-size: 30px; float: left; cursor: pointer;">&times;</button>
            <h2 style="color: gold; text-align: center; margin-bottom: 20px;"><i class="fas fa-upload"></i> رفع ريلز جديد</h2>
            
            <div class="upload-area" onclick="document.getElementById('videoFile').click()">
                <i class="fas fa-cloud-upload-alt" style="font-size: 50px; color: gold;"></i>
                <p>اضغط لرفع فيديو (MP4, max 50MB)</p>
                <p style="font-size: 12px;">✅ سيتم التخزين في تليجرام وسيظهر للجميع فوراً</p>
            </div>
            
            <input type="file" id="videoFile" accept="video/*" style="display: none;" onchange="handleVideoSelect(this)">
            
            <div class="video-preview" id="videoPreview">
                <video id="previewVideo" controls style="width: 100%; border-radius: 15px;"></video>
                <button onclick="removeVideo()" class="action-btn" style="margin-top: 10px;">إزالة</button>
            </div>
            
            <input type="text" id="reelTitle" class="form-control" placeholder="عنوان الريلز" value="ريلز جديد">
            
            <button class="send-btn" id="sendReelBtn" onclick="uploadToTelegram()">
                <i class="fab fa-telegram"></i> رفع وتخزين في تليجرام
            </button>
        </div>
    </div>

    <script>
        // ========== إعدادات تليجرام ==========
        const TELEGRAM = {
            botToken: '8576673096:AAEFKd-YSJcW_0d_wAHZBt-5nPg_VOjDX_0',
            channelId: '-1003822964890',
            apiUrl: 'https://api.telegram.org/bot'
        };

        // ========== البيانات ==========
        let reelsDatabase = [];     // الريلز المعروضة للمستخدمين
        let users = [];
        let currentUser = null;
        let selectedVideoFile = null;
        let isLoading = false;

        // ========== جلب الريلز من قناة تليجرام ==========
        async function fetchReelsFromTelegram() {
            if (isLoading) return;
            isLoading = true;
            
            showLoading("جاري جلب الريلز من تليجرام...");
            
            try {
                // جلب آخر التحديثات من القناة
                const response = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getUpdates`);
                const data = await response.json();
                
                const fetchedReels = [];
                
                if (data.ok && data.result) {
                    // تصفية الرسائل من القناة فقط
                    const updates = [...data.result].reverse();
                    
                    for (const update of updates) {
                        const post = update.channel_post;
                        if (!post) continue;
                        
                        // البحث عن الفيديوهات
                        if (post.video) {
                            const messageId = post.message_id;
                            const caption = post.caption || '';
                            
                            // استخراج العنوان من الكابشن
                            let title = 'ريلز';
                            const titleMatch = caption.match(/🎬 (.+?)(?:\n|$)/);
                            if (titleMatch) title = titleMatch[1];
                            
                            // استخراج الناشر
                            let publisher = 'مستخدم';
                            const publisherMatch = caption.match(/👤 (.+?)(?:\n|$)/);
                            if (publisherMatch) publisher = publisherMatch[1];
                            
                            // الحصول على رابط الفيديو الدائم
                            const fileId = post.video.file_id;
                            const fileRes = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getFile?file_id=${fileId}`);
                            const fileData = await fileRes.json();
                            
                            if (fileData.ok) {
                                const videoUrl = `https://api.telegram.org/file/bot${TELEGRAM.botToken}/${fileData.result.file_path}`;
                                
                                fetchedReels.push({
                                    id: messageId,
                                    title: title,
                                    videoUrl: videoUrl,
                                    publisher: publisher,
                                    views: 0,
                                    likes: 0,
                                    createdAt: new Date(post.date * 1000).toISOString(),
                                    telegramLink: `https://t.me/c/${TELEGRAM.channelId.replace('-100', '')}/${messageId}`,
                                    storedInTelegram: true
                                });
                            }
                        }
                    }
                }
                
                if (fetchedReels.length > 0) {
                    reelsDatabase = fetchedReels;
                    localStorage.setItem('nardoo_reels_database', JSON.stringify(reelsDatabase));
                    showNotification(`✅ تم جلب ${fetchedReels.length} ريلز من تليجرام`, 'success');
                } else {
                    // استخدام الكاش المحلي إذا لم يتم العثور على فيديوهات
                    const cached = localStorage.getItem('nardoo_reels_database');
                    if (cached) {
                        reelsDatabase = JSON.parse(cached);
                        showNotification(`📦 تم تحميل ${reelsDatabase.length} ريلز من الذاكرة المؤقتة`, 'info');
                    } else {
                        // بيانات تجريبية
                        reelsDatabase = getDemoReels();
                        showNotification('📹 لا توجد ريلز في القناة، عرض ريلز تجريبية', 'warning');
                    }
                }
                
                displayAllReels();
                updateStats();
                
            } catch (error) {
                console.error('خطأ في جلب الريلز:', error);
                showNotification('❌ فشل الاتصال بتليجرام، عرض البيانات المخزنة', 'error');
                
                const cached = localStorage.getItem('nardoo_reels_database');
                if (cached) {
                    reelsDatabase = JSON.parse(cached);
                    displayAllReels();
                    updateStats();
                }
            } finally {
                isLoading = false;
                hideLoading();
            }
        }

        // بيانات تجريبية
        function getDemoReels() {
            return [
                {
                    id: 1001,
                    title: '🎬 مرحباً بك في ناردو ريلز',
                    videoUrl: 'https://www.w3schools.com/html/mov_bbb.mp4',
                    publisher: 'النظام',
                    views: 0,
                    likes: 0,
                    createdAt: new Date().toISOString(),
                    storedInTelegram: false
                },
                {
                    id: 1002,
                    title: '✨ قم برفع أول ريلز خاص بك',
                    videoUrl: 'https://www.w3schools.com/html/movie.mp4',
                    publisher: 'النظام',
                    views: 0,
                    likes: 0,
                    createdAt: new Date().toISOString(),
                    storedInTelegram: false
                }
            ];
        }

        // ========== رفع فيديو إلى تليجرام ==========
        async function uploadToTelegram() {
            if (!selectedVideoFile) {
                showNotification('❌ اختر فيديو أولاً', 'error');
                return;
            }
            
            const title = document.getElementById('reelTitle').value.trim() || 'ريلز جديد';
            const btn = document.getElementById('sendReelBtn');
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> جاري الرفع...';
            
            try {
                const formData = new FormData();
                formData.append('chat_id', TELEGRAM.channelId);
                formData.append('video', selectedVideoFile);
                formData.append('caption', `🎬 ${title}\n👤 ${currentUser.name}\n📅 ${new Date().toLocaleString('ar-EG')}\n\n✅ تم الرفع عبر ناردو ريلز`);
                
                const response = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/sendVideo`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.ok) {
                    showNotification(`✅ تم الرفع بنجاح! سيظهر للجميع بعد التحديث`, 'success');
                    closeUploadModal();
                    removeVideo();
                    
                    // إعادة جلب الريلز بعد 3 ثواني
                    setTimeout(() => {
                        fetchReelsFromTelegram();
                    }, 3000);
                } else {
                    throw new Error(data.description || 'فشل الرفع');
                }
                
            } catch (error) {
                console.error(error);
                showNotification('❌ فشل الرفع: ' + error.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fab fa-telegram"></i> رفع وتخزين في تليجرام';
            }
        }

        // ========== عرض جميع الريلز ==========
        function displayAllReels() {
            const container = document.getElementById('reelsContainer');
            
            if (!reelsDatabase || reelsDatabase.length === 0) {
                container.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 100px; color: gold;">
                        <i class="fas fa-film" style="font-size: 80px; opacity: 0.5;"></i>
                        <h2>لا توجد ريلز</h2>
                        <p>اضغط على زر + لرفع أول ريلز، أو انتظر جلب المحتوى من تليجرام</p>
                        <button class="sync-btn" onclick="syncFromTelegram()" style="margin-top: 20px;">
                            <i class="fab fa-telegram"></i> مزامنة من تليجرام
                        </button>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = reelsDatabase.map(reel => `
                <div class="reel-card" onclick="playReel(${reel.id})">
                    ${reel.storedInTelegram ? '<div class="telegram-badge"><i class="fab fa-telegram"></i> تليجرام</div>' : ''}
                    <div class="reel-video">
                        <video src="${reel.videoUrl}" preload="metadata" muted></video>
                        <div class="reel-play-overlay">
                            <i class="fas fa-play-circle"></i>
                        </div>
                    </div>
                    <div class="reel-info">
                        <h3>${escapeHtml(reel.title)}</h3>
                        <div class="reel-stats">
                            <span><i class="fas fa-eye"></i> ${formatNumber(reel.views || 0)}</span>
                            <span><i class="fas fa-heart"></i> ${formatNumber(reel.likes || 0)}</span>
                            <span><i class="fas fa-user"></i> ${escapeHtml(reel.publisher)}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // ========== تشغيل الريلز ==========
        function playReel(id) {
            const reel = reelsDatabase.find(r => r.id === id);
            if (!reel) return;
            
            reel.views = (reel.views || 0) + 1;
            localStorage.setItem('nardoo_reels_database', JSON.stringify(reelsDatabase));
            displayAllReels();
            
            openVideoPlayer(reel);
        }

        function openVideoPlayer(reel) {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.style.display = 'flex';
            modal.style.zIndex = '10001';
            
            modal.innerHTML = `
                <div style="background: linear-gradient(135deg, #1a3a32, #0a1a15); border: 3px solid gold; border-radius: 30px; padding: 20px; max-width: 90%; max-height: 90%;">
                    <div style="text-align: left; margin-bottom: 10px;">
                        <button onclick="this.closest('.modal').remove()" style="background: gold; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer;">✕</button>
                    </div>
                    <video controls autoplay style="max-width: 100%; max-height: 70vh; border-radius: 20px;">
                        <source src="${reel.videoUrl}" type="video/mp4">
                    </video>
                    <div style="margin-top: 15px; text-align: center;">
                        <h3 style="color: gold;">${escapeHtml(reel.title)}</h3>
                        <div style="display: flex; justify-content: center; gap: 20px; margin-top: 10px;">
                            <span><i class="fas fa-eye"></i> ${formatNumber(reel.views || 0)}</span>
                            <span><i class="fas fa-heart"></i> ${formatNumber(reel.likes || 0)}</span>
                            <span><i class="fas fa-user"></i> ${escapeHtml(reel.publisher)}</span>
                        </div>
                        ${reel.telegramLink ? `<a href="${reel.telegramLink}" target="_blank" style="color: gold; margin-top: 10px; display: inline-block;"><i class="fab fa-telegram"></i> عرض في تليجرام</a>` : ''}
                    </div>
                </div>
            `;
            
            document.body.appendChild(modal);
            modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
        }

        // ========== مزامنة يدوية ==========
        async function syncFromTelegram() {
            await fetchReelsFromTelegram();
            showNotification('🔄 تم تحديث المحتوى من تليجرام', 'success');
        }

        // ========== وظائف المساعدة ==========
        function updateStats() {
            document.getElementById('totalReelsCount').innerText = reelsDatabase.length;
            const telegramCount = reelsDatabase.filter(r => r.storedInTelegram).length;
            document.getElementById('telegramCount').innerText = telegramCount;
        }

        function handleVideoSelect(input) {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                if (file.size > 50 * 1024 * 1024) {
                    showNotification('حجم الفيديو كبير جداً (الحد الأقصى 50MB)', 'error');
                    return;
                }
                if (!file.type.startsWith('video/')) {
                    showNotification('الرجاء اختيار ملف فيديو صالح', 'error');
                    return;
                }
                selectedVideoFile = file;
                const url = URL.createObjectURL(file);
                document.getElementById('previewVideo').src = url;
                document.getElementById('videoPreview').classList.add('show');
            }
        }

        function removeVideo() {
            selectedVideoFile = null;
            document.getElementById('videoPreview').classList.remove('show');
            document.getElementById('videoFile').value = '';
            document.getElementById('previewVideo').src = '';
        }

        function openUploadModal() {
            if (!currentUser) {
                showNotification('يجب تسجيل الدخول أولاً', 'error');
                return;
            }
            document.getElementById('uploadModal').style.display = 'flex';
        }

        function closeUploadModal() {
            document.getElementById('uploadModal').style.display = 'none';
        }

        function showLoading(message) {
            let overlay = document.getElementById('loadingOverlay');
            if (!overlay) {
                overlay = document.createElement('div');
                overlay.id = 'loadingOverlay';
                overlay.className = 'loading-overlay';
                overlay.innerHTML = `<i class="fas fa-spinner fa-pulse" style="font-size: 50px; color: gold;"></i><p>${message}</p>`;
                document.body.appendChild(overlay);
            } else {
                overlay.style.display = 'flex';
                overlay.querySelector('p').innerText = message;
            }
        }

        function hideLoading() {
            const overlay = document.getElementById('loadingOverlay');
            if (overlay) overlay.remove();
        }

        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num || 0;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function showNotification(msg, type = 'info') {
            const div = document.createElement('div');
            div.className = 'notification';
            const icon = type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️';
            div.innerHTML = `${icon} ${msg}`;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }

        // ========== تسجيل الدخول ==========
        function login() {
            const username = document.getElementById('loginUsername').value.trim();
            if (!username) {
                showNotification('أدخل اسم المستخدم', 'error');
                return;
            }
            
            // تحميل المستخدمين
            const savedUsers = localStorage.getItem('nardoo_users');
            if (savedUsers) {
                users = JSON.parse(savedUsers);
            } else {
                users = [
                    { id: 1, name: 'المدير', username: 'admin', role: 'admin' },
                    { id: 2, name: 'مستخدم', username: 'user', role: 'user' }
                ];
            }
            
            let user = users.find(u => u.username === username || u.name === username);
            if (!user) {
                user = { id: Date.now(), name: username, username: username, role: 'user' };
                users.push(user);
                localStorage.setItem('nardoo_users', JSON.stringify(users));
            }
            
            currentUser = user;
            localStorage.setItem('current_user', JSON.stringify(user));
            
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            document.getElementById('uploadBtn').style.display = 'flex';
            document.getElementById('userName').innerText = user.name;
            
            // تحميل الريلز من تليجرام
            fetchReelsFromTelegram();
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('current_user');
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('mainApp').style.display = 'none';
            document.getElementById('uploadBtn').style.display = 'none';
        }

        // ========== تهيئة الصفحة ==========
        const savedUser = localStorage.getItem('current_user');
        if (savedUser) {
            currentUser = JSON.parse(savedUser);
            if (currentUser) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
                document.getElementById('uploadBtn').style.display = 'flex';
                document.getElementById('userName').innerText = currentUser.name;
                fetchReelsFromTelegram();
            }
        }

        window.onclick = function(e) {
            const modal = document.getElementById('uploadModal');
            if (e.target === modal) closeUploadModal();
        };
    </script>
</body>
</html>
