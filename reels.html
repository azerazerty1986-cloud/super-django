<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام المحاكاة الشخصية | عالم تفاعلي 3B</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        :root { 
            --accent: #00f2ff;
            --accent-glow: 0 0 20px rgba(0,242,255,0.5);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            background: #000; 
            overflow: hidden; 
            color: white; 
            font-family: 'Cairo', 'Segoe UI', system-ui, sans-serif;
        }

        /* رؤية الواقع POV */
        #viewport { 
            position: absolute; 
            inset: 0; 
            z-index: 1; 
        }
        
        video, .bg-img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            position: absolute; 
            transition: opacity 0.5s;
            top: 0;
            left: 0;
        }
        
        video { object-fit: cover; }

        /* تأثير ترميش العين */
        #blink { 
            position: fixed; 
            inset: 0; 
            background: #000; 
            z-index: 50; 
            opacity: 0; 
            pointer-events: none; 
            transition: opacity 0.15s; 
        }
        
        .active-blink { opacity: 1 !important; }

        /* واجهة الخريطة HUD */
        #hud { 
            position: absolute; 
            bottom: 30px; 
            left: 0;
            right: 0;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            z-index: 100; 
            pointer-events: none; 
        }
        
        #map-box { 
            background: rgba(0,0,0,0.7); 
            backdrop-filter: blur(15px); 
            padding: 12px; 
            border-radius: 20px; 
            border: 1px solid var(--accent); 
            pointer-events: auto;
            box-shadow: var(--accent-glow);
        }
        
        #location-text { 
            background: rgba(0,0,0,0.8); 
            padding: 8px 20px; 
            border-radius: 30px; 
            margin-bottom: 12px; 
            font-size: 14px; 
            border: 1px solid var(--accent);
            backdrop-filter: blur(5px);
            font-weight: bold;
            letter-spacing: 1px;
        }
        
        canvas {
            display: block;
            cursor: pointer;
            border-radius: 12px;
        }

        /* شاشة الدخول */
        #start-screen { 
            position: fixed; 
            inset: 0; 
            background: linear-gradient(135deg, #0a0a2a, #000000); 
            z-index: 1000; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            flex-direction: column;
            gap: 30px;
        }
        
        .start-btn { 
            border: 2px solid var(--accent); 
            color: var(--accent); 
            padding: 15px 40px; 
            background: rgba(0,242,255,0.1); 
            border-radius: 60px; 
            font-size: 20px; 
            cursor: pointer; 
            transition: all 0.3s;
            font-weight: bold;
            backdrop-filter: blur(10px);
        }
        
        .start-btn:hover {
            transform: scale(1.05);
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 30px rgba(0,242,255,0.5);
        }
        
        .user-info {
            color: var(--accent);
            font-size: 14px;
            background: rgba(0,0,0,0.6);
            padding: 8px 20px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
        }
        
        /* تأثيرات إضافية */
        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        
        .loading-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse 1s infinite;
        }
        
        /* إشعارات */
        .toast {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            color: var(--accent);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 12px;
            z-index: 200;
            border: 1px solid var(--accent);
            white-space: nowrap;
            pointer-events: none;
        }
        
        @media (max-width: 600px) {
            #location-text { font-size: 11px; padding: 5px 15px; }
            .start-btn { padding: 12px 30px; font-size: 16px; }
            .user-info { font-size: 10px; }
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <div class="user-info" id="userInfoDisplay">🔄 جاري الاتصال...</div>
        <button class="start-btn" onclick="enterSim()">🚀 دخول المحاكاة</button>
        <div style="font-size: 12px; color: #666;">نظام المحاكاة الشخصية | إصدار 3B</div>
    </div>
    
    <div id="blink"></div>

    <div id="viewport">
        <video id="vPlayer" loop muted playsinline autoplay></video>
        <div id="iPlayer" class="bg-img" style="display:none;"></div>
    </div>

    <div id="hud">
        <div id="location-text">📍 تحميل الخريطة...</div>
        <div id="map-box">
            <canvas id="mCanvas" width="180" height="180"></canvas>
        </div>
    </div>

    <script>
        // ========== تكامل تليجرام ==========
        const tg = window.Telegram.WebApp;
        let userData = null;
        
        // الحصول على بيانات المستخدم من تليجرام
        function initTelegram() {
            try {
                tg.ready();
                tg.expand();
                tg.enableClosingConfirmation();
                
                if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                    userData = tg.initDataUnsafe.user;
                    const userName = userData.first_name || userData.username || 'مستخدم';
                    const userId = userData.id;
                    document.getElementById('userInfoDisplay').innerHTML = `👤 مرحباً ${userName} | 🆔 ${userId}`;
                    tg.HapticFeedback.notificationOccurred('success');
                } else {
                    // مستخدم تجريبي (للاختبار خارج تليجرام)
                    userData = { id: Math.floor(Math.random() * 10000), first_name: 'زائر', username: 'guest' };
                    document.getElementById('userInfoDisplay').innerHTML = `👤 زائر | 🆔 ${userData.id}`;
                }
                return true;
            } catch(e) {
                console.log('خارج تطبيق تليجرام');
                userData = { id: Math.floor(Math.random() * 10000), first_name: 'زائر', username: 'guest' };
                document.getElementById('userInfoDisplay').innerHTML = `👤 زائر | 🆔 ${userData.id}`;
                return true;
            }
        }
        
        // ========== إعدادات اللعبة ==========
        const v = document.getElementById('vPlayer');
        const i = document.getElementById('iPlayer');
        const blink = document.getElementById('blink');
        const canvas = document.getElementById('mCanvas');
        const ctx = canvas.getContext('2d');

        // حجم الخريطة (8x8)
        const MAP_SIZE = 8;
        let cellSize;
        
        // موقع المستخدم
        let userPos = { x: 0, y: 0 };
        
        // ========== قاعدة بيانات الأماكن (موسعة) ==========
        // باستخدام الروابط المتاحة من تليجرام
        const locations = {
            // المنطقة المركزية
            "0,0": { 
                type: "video", 
                url: "https://www.w3schools.com/html/mov_bbb.mp4", 
                info: "🏛️ الساحة المركزية | المقر الرئيسي",
                description: "مركز المدينة القديمة، نافورة تاريخية"
            },
            "0,1": { 
                type: "image", 
                url: "https://picsum.photos/id/104/1080/1920", 
                info: "🌲 الغابة الشمالية",
                description: "أشجار صنوبر كثيفة، هواء نقي"
            },
            "0,2": { 
                type: "video", 
                url: "https://www.w3schools.com/html/movie.mp4", 
                info: "🏞️ وادي الأنهار",
                description: "جداول ماء تنساب بين الصخور"
            },
            "1,1": { 
                type: "image", 
                url: "https://picsum.photos/id/15/1080/1920", 
                info: "🏔️ جبل القمر",
                description: "قمة شاهقة تطل على الوادي"
            },
            "1,2": { 
                type: "video", 
                url: "https://www.w3schools.com/html/mov_bbb.mp4", 
                info: "🏯 قلعة الأساطير",
                description: "قلعة قديمة تحكي قصص الأجداد"
            },
            "2,2": { 
                type: "image", 
                url: "https://picsum.photos/id/22/1080/1920", 
                info: "🏖️ شاطئ اللؤلؤ",
                description: "رمال ذهبية ومياه فيروزية"
            },
            "2,3": { 
                type: "video", 
                url: "https://www.w3schools.com/html/movie.mp4", 
                info: "🌋 بركان النار",
                description: "منطقة بركانية نشطة، حذر!"
            },
            "3,3": { 
                type: "image", 
                url: "https://picsum.photos/id/26/1080/1920", 
                info: "🏝️ جزيرة الأحلام",
                description: "جنة استوائية مخفية"
            },
            "3,4": { 
                type: "video", 
                url: "https://www.w3schools.com/html/mov_bbb.mp4", 
                info: "🏜️ صحراء الذهب",
                description: "كثبان رملية تمتد لأميال"
            },
            "4,4": { 
                type: "image", 
                url: "https://picsum.photos/id/30/1080/1920", 
                info: "🏘️ قرية الحرفيين",
                description: "حرف يدوية ومنتجات تقليدية"
            },
            "4,5": { 
                type: "video", 
                url: "https://www.w3schools.com/html/movie.mp4", 
                info: "🌾 مزارع القمح",
                description: "حقول ذهبية تمتد حتى الأفق"
            },
            "5,5": { 
                type: "image", 
                url: "https://picsum.photos/id/42/1080/1920", 
                info: "⛲ حدائق الزهور",
                description: "روضة ملونة بأنواع الزهور"
            },
            "5,6": { 
                type: "video", 
                url: "https://www.w3schools.com/html/mov_bbb.mp4", 
                info: "🎪 ساحة الاحتفالات",
                description: "مكان التجمعات والفعاليات"
            },
            "6,6": { 
                type: "image", 
                url: "https://picsum.photos/id/48/1080/1920", 
                info: "🏰 قصر الملوك",
                description: "قصر فخم يعكس عظمة التاريخ"
            },
            "7,7": { 
                type: "video", 
                url: "https://www.w3schools.com/html/movie.mp4", 
                info: "🌌 بوابة الأبعاد",
                description: "مكان غامض يربط العوالم"
            }
        };
        
        // دالة للحصول على موقع افتراضي إذا لم يكن موجوداً
        function getLocationData(x, y) {
            const key = `${x},${y}`;
            if (locations[key]) return locations[key];
            
            // إنشاء موقع عشوائي
            const types = ['video', 'image'];
            const randomType = types[Math.floor(Math.random() * 2)];
            const randomId = Math.floor(Math.random() * 100) + 1;
            
            return {
                type: randomType,
                url: randomType === 'video' ? "https://www.w3schools.com/html/mov_bbb.mp4" : `https://picsum.photos/id/${randomId}/1080/1920`,
                info: `🌍 منطقة ${String.fromCharCode(65 + x)}${y + 1}`,
                description: `منطقة استكشافية جديدة تنتظر اكتشافك`
            };
        }
        
        // ========== رسم الخريطة ==========
        function drawMap() {
            canvas.width = 180;
            canvas.height = 180;
            cellSize = canvas.width / MAP_SIZE;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for(let x = 0; x < MAP_SIZE; x++) {
                for(let y = 0; y < MAP_SIZE; y++) {
                    // حدود الخلايا
                    ctx.strokeStyle = "rgba(0,242,255,0.3)";
                    ctx.lineWidth = 1;
                    ctx.strokeRect(x * cellSize, y * cellSize, cellSize, cellSize);
                    
                    // موقع المستخدم
                    if(x === userPos.x && y === userPos.y) {
                        ctx.fillStyle = "#00f2ff";
                        ctx.beginPath();
                        ctx.arc(x * cellSize + cellSize/2, y * cellSize + cellSize/2, cellSize/3, 0, Math.PI * 2);
                        ctx.fill();
                        
                        // إضافة توهج
                        ctx.shadowBlur = 8;
                        ctx.shadowColor = "#00f2ff";
                        ctx.fill();
                        ctx.shadowBlur = 0;
                    }
                    
                    // مناطق مكتشفة
                    const loc = getLocationData(x, y);
                    if(loc && loc.info) {
                        ctx.fillStyle = "rgba(0,242,255,0.3)";
                        ctx.font = `${cellSize * 0.4}px "Segoe UI"`;
                        ctx.fillText("📍", x * cellSize + 3, y * cellSize + cellSize - 5);
                    }
                }
            }
        }
        
        // ========== تحميل وعرض المشهد ==========
        async function loadPOV(x, y) {
            // تأثير ترميش
            blink.classList.add('active-blink');
            
            const loc = getLocationData(x, y);
            const locationText = document.getElementById('location-text');
            
            // تحديث النص
            locationText.innerHTML = `📍 ${loc.info}<br><span style="font-size: 10px; color: #aaa;">${loc.description}</span>`;
            
            // اهتزاز
            if (tg && tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('medium');
            } else if (navigator.vibrate) {
                navigator.vibrate(50);
            }
            
            setTimeout(async () => {
                try {
                    if(loc.type === "video") {
                        i.style.display = "none";
                        v.style.display = "block";
                        v.src = loc.url;
                        v.load();
                        await v.play().catch(e => console.log("تشغيل تلقائي غير مسموح"));
                    } else {
                        v.style.display = "none";
                        i.style.display = "block";
                        i.style.backgroundImage = `url(${loc.url})`;
                        i.style.backgroundSize = "cover";
                        i.style.backgroundPosition = "center";
                    }
                } catch(e) {
                    console.log("خطأ في تحميل المحتوى", e);
                }
                
                blink.classList.remove('active-blink');
            }, 200);
        }
        
        // ========== تحديث الإحصائيات ==========
        function updateStats() {
            const loc = getLocationData(userPos.x, userPos.y);
            const locationText = document.getElementById('location-text');
            locationText.innerHTML = `📍 ${loc.info}<br><span style="font-size: 10px; color: #aaa;">${loc.description}</span>`;
        }
        
        // ========== التنقل في الخريطة ==========
        function moveTo(x, y) {
            // التحقق من الحدود
            if (x < 0) x = 0;
            if (x >= MAP_SIZE) x = MAP_SIZE - 1;
            if (y < 0) y = 0;
            if (y >= MAP_SIZE) y = MAP_SIZE - 1;
            
            userPos.x = x;
            userPos.y = y;
            
            drawMap();
            loadPOV(x, y);
            
            // إرسال إشعار إلى تليجرام
            if (tg && tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('light');
            }
        }
        
        // ========== معالجة النقر على الخريطة ==========
        function handleCanvasClick(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            let clickX = (e.clientX - rect.left) * scaleX;
            let clickY = (e.clientY - rect.top) * scaleY;
            
            const newX = Math.floor(clickX / cellSize);
            const newY = Math.floor(clickY / cellSize);
            
            if (newX >= 0 && newX < MAP_SIZE && newY >= 0 && newY < MAP_SIZE) {
                moveTo(newX, newY);
            }
        }
        
        // ========== التحكم باللمس والهاتف ==========
        let touchStartX = 0, touchStartY = 0;
        
        function handleTouchStart(e) {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }
        
        function handleTouchEnd(e) {
            const deltaX = e.changedTouches[0].clientX - touchStartX;
            const deltaY = e.changedTouches[0].clientY - touchStartY;
            
            if (Math.abs(deltaX) < 30 && Math.abs(deltaY) < 30) return;
            
            if (Math.abs(deltaX) > Math.abs(deltaY)) {
                if (deltaX > 0) moveTo(userPos.x + 1, userPos.y);
                else moveTo(userPos.x - 1, userPos.y);
            } else {
                if (deltaY > 0) moveTo(userPos.x, userPos.y + 1);
                else moveTo(userPos.x, userPos.y - 1);
            }
        }
        
        // ========== دوال مساعدة ==========
        function showToast(message, duration = 2000) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), duration);
        }
        
        // ========== الدخول إلى المحاكاة ==========
        function enterSim() {
            const startScreen = document.getElementById('start-screen');
            startScreen.style.opacity = '0';
            setTimeout(() => {
                startScreen.remove();
            }, 500);
            
            // تهيئة الموقع بناءً على ID المستخدم
            const userId = userData ? userData.id : Math.floor(Math.random() * 10000);
            userPos.x = userId % MAP_SIZE;
            userPos.y = Math.floor((userId / MAP_SIZE) % MAP_SIZE);
            
            drawMap();
            loadPOV(userPos.x, userPos.y);
            
            showToast(`🎮 مرحباً ${userData?.first_name || 'زائر'}! أنت الآن في ${getLocationData(userPos.x, userPos.y).info}`, 3000);
            
            if (tg && tg.HapticFeedback) {
                tg.HapticFeedback.notificationOccurred('success');
            }
        }
        
        // ========== إضافة أحداث التنقل ==========
        function addNavigationEvents() {
            // نقر على الخريطة
            canvas.addEventListener('click', handleCanvasClick);
            
            // سحب للتنقل
            document.addEventListener('touchstart', handleTouchStart);
            document.addEventListener('touchend', handleTouchEnd);
            
            // مفاتيح الأسهم للتنقل
            document.addEventListener('keydown', (e) => {
                switch(e.key) {
                    case 'ArrowUp': moveTo(userPos.x, userPos.y - 1); break;
                    case 'ArrowDown': moveTo(userPos.x, userPos.y + 1); break;
                    case 'ArrowLeft': moveTo(userPos.x - 1, userPos.y); break;
                    case 'ArrowRight': moveTo(userPos.x + 1, userPos.y); break;
                }
                e.preventDefault();
            });
        }
        
        // ========== تهيئة النظام ==========
        function init() {
            initTelegram();
            drawMap();
            addNavigationEvents();
            
            // تحديث معلومات المستخدم
            if (userData) {
                showToast(`🔗 متصل باسم: ${userData.first_name || userData.username || 'زائر'}`, 2000);
            }
        }
        
        // بدء التشغيل
        init();
        
        // تصدير الدوال للاستخدام العام
        window.moveTo = moveTo;
        window.enterSim = enterSim;
        
        console.log('🎮 نظام المحاكاة الشخصية جاهز');
        console.log(`👤 المستخدم: ${userData?.first_name || 'زائر'}`);
        console.log(`🗺️ حجم الخريطة: ${MAP_SIZE}x${MAP_SIZE}`);
    </script>
</body>
</html>
