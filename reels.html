<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ناردو ريلز | إعجابات - تعليقات - مشاركة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000;
            color: white;
            overflow-x: hidden;
        }

        /* ========== شاشة تسجيل الدخول ========== */
        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f2b23, #1e4a3f);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20000;
        }

        .login-box {
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            border: 3px solid gold;
            border-radius: 50px;
            padding: 45px 35px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            animation: fadeInUp 0.5s ease;
        }

        .login-box h2 {
            color: gold;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .login-box p {
            color: #aaa;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .login-box input {
            width: 100%;
            padding: 15px 20px;
            margin: 12px 0;
            background: rgba(255,255,255,0.1);
            border: 2px solid gold;
            border-radius: 50px;
            color: white;
            font-size: 16px;
            text-align: center;
            transition: all 0.3s;
        }

        .login-box input:focus {
            outline: none;
            background: rgba(255,255,255,0.2);
            transform: scale(1.02);
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, gold, #ffd700);
            border: none;
            border-radius: 50px;
            color: black;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s;
        }

        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255,215,0,0.5);
        }

        /* ========== شريط المستخدم ========== */
        .user-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, rgba(0,0,0,0.95), rgba(0,0,0,0.85));
            backdrop-filter: blur(15px);
            padding: 12px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            z-index: 100;
            border-bottom: 2px solid gold;
        }

        .user-badge {
            background: linear-gradient(135deg, #ff0066, #cc0052);
            padding: 8px 22px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: bold;
            font-size: 15px;
            box-shadow: 0 2px 10px rgba(255,0,102,0.3);
        }

        .user-badge i {
            font-size: 20px;
        }

        .user-stats {
            display: flex;
            gap: 15px;
        }

        .user-stat {
            background: rgba(255,255,255,0.12);
            padding: 6px 18px;
            border-radius: 30px;
            text-align: center;
            backdrop-filter: blur(5px);
        }

        .user-stat .number {
            font-size: 20px;
            font-weight: bold;
            color: gold;
        }

        .user-stat .label {
            font-size: 11px;
            color: rgba(255,255,255,0.7);
        }

        .action-btn {
            background: rgba(255,215,0,0.2);
            border: 1px solid gold;
            color: gold;
            padding: 8px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            margin: 0 5px;
        }

        .action-btn:hover {
            background: gold;
            color: black;
            transform: translateY(-2px);
        }

        .logout-btn {
            background: rgba(255,0,102,0.3);
            border: 1px solid #ff0066;
            color: white;
        }

        .logout-btn:hover {
            background: #ff0066;
            color: white;
        }

        /* ========== مشغل الفيديوهات ========== */
        .reels-player {
            position: fixed;
            top: 70px;
            left: 0;
            width: 100%;
            height: calc(100% - 70px);
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }

        .reel-slide {
            position: relative;
            width: 100%;
            height: calc(100vh - 70px);
            scroll-snap-align: start;
            background: #000;
            overflow: hidden;
        }

        .reel-video-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
        }

        .reel-video-container video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }

        .reel-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.5) 50%, transparent 100%);
            padding: 100px 20px 30px;
            pointer-events: none;
        }

        .reel-info {
            pointer-events: auto;
        }

        .reel-title {
            font-size: 20px;
            font-weight: bold;
            color: gold;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .reel-publisher {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            font-size: 15px;
        }

        .reel-stats {
            display: flex;
            gap: 25px;
            margin-top: 12px;
            font-size: 14px;
        }

        .reel-stats span {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .reel-id-badge {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 11px;
            font-family: monospace;
            z-index: 15;
            border: 1px solid gold;
            color: gold;
            pointer-events: none;
        }

        /* أزرار التفاعل الجانبية */
        .action-sidebar {
            position: absolute;
            bottom: 130px;
            right: 15px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 20;
            pointer-events: auto;
        }

        .action-btn-side {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid rgba(255,215,0,0.5);
        }

        .action-btn-side i {
            font-size: 24px;
            color: white;
        }

        .action-btn-side span {
            font-size: 11px;
            font-weight: bold;
        }

        .action-btn-side:hover {
            transform: scale(1.1);
            background: gold;
        }

        .action-btn-side:hover i,
        .action-btn-side:hover span {
            color: black;
        }

        .action-btn-side.liked {
            background: #ff0066;
            border-color: #ff0066;
        }

        /* زر الرفع */
        .upload-fab {
            position: fixed;
            bottom: 30px;
            left: 20px;
            background: linear-gradient(135deg, gold, #ffd700);
            color: black;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            z-index: 1001;
            border: 2px solid white;
            box-shadow: 0 5px 25px rgba(212,175,55,0.5);
            transition: all 0.3s;
        }

        .upload-fab:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 30px rgba(212,175,55,0.8);
        }

        /* نافذة رفع الريلز المنبثقة */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.96);
            backdrop-filter: blur(20px);
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a3a32, #0a1a15);
            border: 3px solid gold;
            border-radius: 35px;
            padding: 30px;
            max-width: 550px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .close-modal {
            background: none;
            border: none;
            color: gold;
            font-size: 32px;
            cursor: pointer;
            float: left;
            transition: all 0.3s;
        }

        .close-modal:hover {
            transform: rotate(90deg);
        }

        .upload-area {
            border: 3px dashed gold;
            border-radius: 25px;
            padding: 35px 20px;
            text-align: center;
            cursor: pointer;
            margin: 20px 0;
            transition: all 0.3s;
            background: rgba(255,215,0,0.05);
        }

        .upload-area:hover {
            background: rgba(255,215,0,0.12);
            transform: scale(1.02);
        }

        .upload-area i {
            font-size: 55px;
            color: gold;
            margin-bottom: 15px;
        }

        .video-preview {
            display: none;
            margin: 15px 0;
        }

        .video-preview.show {
            display: block;
        }

        .video-preview video {
            width: 100%;
            border-radius: 20px;
            border: 2px solid gold;
        }

        .form-control {
            width: 100%;
            padding: 14px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,215,0,0.5);
            border-radius: 50px;
            color: white;
            font-size: 16px;
            margin: 12px 0;
            transition: all 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: gold;
            background: rgba(255,255,255,0.15);
        }

        .send-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, gold, #ffd700);
            border: none;
            border-radius: 50px;
            color: black;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .send-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255,215,0,0.4);
        }

        .send-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* نافذة التعليقات */
        .comments-modal {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-top-left-radius: 30px;
            border-top-right-radius: 30px;
            z-index: 10001;
            max-height: 70vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
            border-top: 3px solid gold;
        }

        .comments-header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255,215,0,0.3);
            position: sticky;
            top: 0;
            background: #1a1a2e;
            border-radius: 30px 30px 0 0;
        }

        .comments-header h3 {
            color: gold;
            font-size: 20px;
        }

        .comments-list {
            padding: 15px;
            max-height: 50vh;
            overflow-y: auto;
        }

        .comment-item {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 12px 15px;
            margin-bottom: 12px;
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .comment-avatar {
            width: 40px;
            height: 40px;
            background: gold;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: black;
            font-weight: bold;
            flex-shrink: 0;
        }

        .comment-content {
            flex: 1;
        }

        .comment-name {
            font-weight: bold;
            color: gold;
            font-size: 14px;
        }

        .comment-text {
            font-size: 14px;
            margin-top: 5px;
            word-break: break-word;
        }

        .comment-time {
            font-size: 10px;
            color: #aaa;
            margin-top: 5px;
        }

        .comment-input-area {
            padding: 15px;
            display: flex;
            gap: 10px;
            border-top: 1px solid rgba(255,215,0,0.3);
            background: #1a1a2e;
            position: sticky;
            bottom: 0;
        }

        .comment-input {
            flex: 1;
            padding: 12px 15px;
            background: rgba(255,255,255,0.1);
            border: 1px solid gold;
            border-radius: 50px;
            color: white;
            font-size: 14px;
        }

        .comment-input:focus {
            outline: none;
            background: rgba(255,255,255,0.2);
        }

        .comment-send-btn {
            background: gold;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            color: black;
            cursor: pointer;
            transition: all 0.3s;
        }

        .comment-send-btn:hover {
            transform: scale(1.05);
        }

        .close-comments {
            position: absolute;
            left: 20px;
            top: 15px;
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        .notification {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, gold, #ffd700);
            color: black;
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: bold;
            z-index: 2000;
            animation: slideUp 0.3s ease;
            font-size: 14px;
            white-space: nowrap;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .loading-overlay {
            position: fixed;
            top: 70px;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            flex-direction: column;
            gap: 20px;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,215,0,0.3);
            border-top-color: gold;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 600px) {
            .user-bar {
                padding: 10px 15px;
            }
            .user-badge {
                padding: 5px 15px;
                font-size: 12px;
            }
            .user-stat {
                padding: 4px 12px;
            }
            .user-stat .number {
                font-size: 16px;
            }
            .action-sidebar {
                bottom: 100px;
                right: 10px;
            }
            .action-btn-side {
                width: 45px;
                height: 45px;
            }
            .action-btn-side i {
                font-size: 20px;
            }
            .reel-title {
                font-size: 16px;
            }
            .reel-stats {
                font-size: 12px;
                gap: 15px;
            }
            .notification {
                white-space: normal;
                text-align: center;
                max-width: 85%;
                font-size: 12px;
            }
            .upload-fab {
                width: 50px;
                height: 50px;
                font-size: 24px;
                bottom: 20px;
                left: 15px;
            }
        }
    </style>
</head>
<body>

    <!-- ========== شاشة تسجيل الدخول ========== -->
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <i class="fas fa-film" style="font-size: 65px; color: gold; margin-bottom: 20px;"></i>
            <h2>🎬 ناردو ريلز</h2>
            <p>إعجابات - تعليقات - مشاركة - تخزين في تلجرام</p>
            <input type="text" id="loginUsername" placeholder="اسم المستخدم" autocomplete="off">
            <button class="login-btn" onclick="login()">
                <i class="fas fa-sign-in-alt"></i> دخول
            </button>
        </div>
    </div>

    <!-- ========== شريط المستخدم ========== -->
    <div id="topBar" style="display: none;">
        <div class="user-bar">
            <div class="user-badge">
                <i class="fas fa-user"></i>
                <span id="userNameDisplay"></span>
            </div>
            <div class="user-stats">
                <div class="user-stat">
                    <span class="number" id="totalReelsCount">0</span>
                    <div class="label">الريلز</div>
                </div>
                <div class="user-stat">
                    <span class="number" id="totalViewsCount">0</span>
                    <div class="label">مشاهدة</div>
                </div>
            </div>
            <div>
                <button class="action-btn" onclick="loadReelsFromTelegram()">
                    <i class="fas fa-sync-alt"></i> تحديث
                </button>
                <button class="action-btn logout-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> خروج
                </button>
            </div>
        </div>
    </div>

    <!-- ========== مشغل الريلز ========== -->
    <div id="reelsPlayer" class="reels-player" style="display: none;"></div>

    <!-- ========== زر رفع ريلز ========== -->
    <div id="fabButtons" style="display: none;">
        <div class="upload-fab" onclick="openUploadModal()">
            <i class="fas fa-plus"></i>
        </div>
    </div>

    <!-- ========== نافذة التعليقات ========== -->
    <div class="comments-modal" id="commentsModal">
        <div class="comments-header">
            <button class="close-comments" onclick="closeCommentsModal()">✕</button>
            <h3><i class="fas fa-comments"></i> التعليقات</h3>
        </div>
        <div class="comments-list" id="commentsList">
            <div style="text-align: center; padding: 30px; color: #aaa;">لا توجد تعليقات بعد</div>
        </div>
        <div class="comment-input-area">
            <input type="text" class="comment-input" id="commentInput" placeholder="اكتب تعليقاً...">
            <button class="comment-send-btn" onclick="addComment()">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <!-- ========== نافذة رفع ريلز ========== -->
    <div class="modal" id="uploadModal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeUploadModal()">&times;</button>
            <h2 style="color: gold; text-align: center; margin-bottom: 10px;">
                <i class="fas fa-upload"></i> رفع ريلز جديد
            </h2>
            <div class="upload-area" onclick="document.getElementById('videoInput').click()">
                <i class="fas fa-cloud-upload-alt"></i>
                <h3>اضغط لرفع فيديو</h3>
                <p>MP4, MOV - الحد الأقصى 50MB</p>
            </div>
            <input type="file" id="videoInput" accept="video/*" style="display: none;" onchange="handleVideoSelect(this)">
            <div class="video-preview" id="videoPreviewDiv">
                <video id="previewVideo" controls></video>
                <button onclick="removeSelectedVideo()" style="margin-top: 12px; background: rgba(244,67,54,0.7); border: none; padding: 8px 20px; border-radius: 30px; color: white; cursor: pointer; width: 100%;">
                    <i class="fas fa-trash"></i> إزالة الفيديو
                </button>
            </div>
            <input type="text" class="form-control" id="reelTitleInput" placeholder="عنوان الريلز" value="ريلز رائع">
            <button class="send-btn" id="uploadBtn" onclick="uploadReelToTelegram()">
                <i class="fab fa-telegram"></i> رفع وتخزين دائم
            </button>
        </div>
    </div>

    <script>
        // ========== إعدادات تليجرام ==========
        const TELEGRAM = {
            botToken: '8576673096:AAECPDHWRTVQ_juq68hxM9PIdacnqevGRb4',
            channelId: '-1003822964890',
            apiUrl: 'https://api.telegram.org/bot'
        };

        // ========== المتغيرات العامة ==========
        let reelsCache = [];
        let users = [];
        let currentUser = null;
        let selectedVideoFile = null;
        let userLikes = {};
        let userComments = {}; // { reelId: [comments] }
        let isLoading = false;
        let currentReelForComments = null;

        // ========== تحميل البيانات ==========
        function loadUsers() {
            const saved = localStorage.getItem('nardoo_users');
            if (saved) {
                users = JSON.parse(saved);
            } else {
                users = [];
                localStorage.setItem('nardoo_users', JSON.stringify(users));
            }
        }

        function loadLikes() {
            const userId = currentUser?.id || 'guest';
            const saved = localStorage.getItem(`nardoo_likes_${userId}`);
            if (saved) {
                userLikes = JSON.parse(saved);
            } else {
                userLikes = {};
            }
        }

        function saveLikes() {
            const userId = currentUser?.id || 'guest';
            localStorage.setItem(`nardoo_likes_${userId}`, JSON.stringify(userLikes));
        }

        function loadComments() {
            const saved = localStorage.getItem('nardoo_comments');
            if (saved) {
                userComments = JSON.parse(saved);
            } else {
                userComments = {};
            }
        }

        function saveComments() {
            localStorage.setItem('nardoo_comments', JSON.stringify(userComments));
        }

        function mergeAllReels() {
            let merged = [...reelsCache];
            const quickReels = JSON.parse(localStorage.getItem('quick_reels') || '[]');
            for (const quick of quickReels) {
                if (!merged.find(r => r.id === quick.id)) {
                    merged.unshift(quick);
                }
            }
            const nardoList = JSON.parse(localStorage.getItem('nardo_reels_list') || '[]');
            for (const reel of nardoList) {
                if (!merged.find(r => r.id === reel.id)) {
                    merged.unshift(reel);
                }
            }
            const uniqueMap = new Map();
            for (const reel of merged) {
                if (!uniqueMap.has(reel.id)) {
                    uniqueMap.set(reel.id, reel);
                }
            }
            merged = Array.from(uniqueMap.values());
            merged.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
            return merged;
        }

        async function loadReelsFromTelegram() {
            if (isLoading) return;
            isLoading = true;
            showLoadingOverlay(true, "🔄 جاري تحميل الريلز...");
            try {
                const url = `${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getUpdates?limit=100`;
                const response = await fetch(url);
                const data = await response.json();
                const reels = [];
                if (data.ok && data.result) {
                    const updates = [...data.result].reverse();
                    for (const update of updates) {
                        const post = update.channel_post || update.message;
                        if (!post) continue;
                        if (post.video) {
                            const messageId = post.message_id;
                            const caption = post.caption || '';
                            let title = '🎬 ريلز';
                            const titleMatch = caption.match(/🎬 (.+?)(?:\n|$)/);
                            if (titleMatch) title = titleMatch[1];
                            let publisher = 'مستخدم';
                            const publisherMatch = caption.match(/👤 (.+?)(?:\n|$)/);
                            if (publisherMatch) publisher = publisherMatch[1];
                            const hasAzerg = caption.includes('@azerg') || caption.includes('azerg');
                            const fileId = post.video.file_id;
                            const fileRes = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getFile?file_id=${fileId}`);
                            const fileData = await fileRes.json();
                            if (fileData.ok) {
                                const videoUrl = `https://api.telegram.org/file/bot${TELEGRAM.botToken}/${fileData.result.file_path}`;
                                reels.push({
                                    id: messageId,
                                    telegramId: messageId,
                                    title: title,
                                    videoUrl: videoUrl,
                                    publisher: publisher,
                                    hasAzerg: hasAzerg,
                                    views: 0,
                                    likes: userLikes[messageId] ? (reelsCache.find(r => r.id === messageId)?.likes || 0) : 0,
                                    createdAt: new Date(post.date * 1000).toISOString(),
                                    timestamp: post.date * 1000
                                });
                            }
                        }
                    }
                }
                if (reels.length > 0) {
                    reelsCache = reels;
                    localStorage.setItem('nardoo_reels_cache', JSON.stringify(reels));
                    showNotification(`✅ تم تحميل ${reels.length} ريلز`, 'success');
                } else {
                    const cached = localStorage.getItem('nardoo_reels_cache');
                    if (cached && JSON.parse(cached).length > 0) {
                        reelsCache = JSON.parse(cached);
                        showNotification(`📦 عرض ${reelsCache.length} ريلز من الذاكرة`, 'info');
                    }
                }
                displayAllReels();
                updateStats();
            } catch (error) {
                console.error('❌ خطأ:', error);
                const cached = localStorage.getItem('nardoo_reels_cache');
                if (cached && JSON.parse(cached).length > 0) {
                    reelsCache = JSON.parse(cached);
                    displayAllReels();
                    updateStats();
                    showNotification('⚠️ فشل الاتصال، تم عرض الريلز المخزنة', 'warning');
                }
            } finally {
                isLoading = false;
                showLoadingOverlay(false);
            }
        }

        function displayAllReels() {
            const container = document.getElementById('reelsPlayer');
            const allReels = mergeAllReels();
            if (!allReels || allReels.length === 0) {
                container.innerHTML = `<div style="display: flex; align-items: center; justify-content: center; height: 100%; flex-direction: column; text-align: center;">
                    <i class="fas fa-film" style="font-size: 90px; color: gold; margin-bottom: 25px;"></i>
                    <h2 style="color: gold;">لا توجد ريلز</h2>
                    <button class="action-btn" onclick="openUploadModal()" style="margin-top: 20px;">➕ رفع أول ريلز</button>
                </div>`;
                return;
            }
            container.innerHTML = allReels.map(reel => {
                const isLiked = userLikes[reel.id] === true;
                const likesCount = (reel.likes || 0) + (isLiked && !reel.likes ? 1 : 0);
                const commentsCount = (userComments[reel.id] || []).length;
                return `
                    <div class="reel-slide" data-reel-id="${reel.id}">
                        <div class="reel-id-badge">ID: ${reel.id}</div>
                        <div class="reel-video-container">
                            <video src="${reel.videoUrl}" preload="metadata" playsinline webkit-playsinline loop></video>
                            <div class="action-sidebar">
                                <div class="action-btn-side ${isLiked ? 'liked' : ''}" onclick="likeReel(${reel.id}, event)">
                                    <i class="fas fa-heart"></i>
                                    <span id="likes-${reel.id}">${formatNumber(likesCount)}</span>
                                </div>
                                <div class="action-btn-side" onclick="openCommentsModal(${reel.id}, event)">
                                    <i class="fas fa-comment"></i>
                                    <span>${formatNumber(commentsCount)}</span>
                                </div>
                                <div class="action-btn-side" onclick="shareReel('${reel.videoUrl}', '${escapeHtml(reel.title)}', event)">
                                    <i class="fas fa-share-alt"></i>
                                    <span>مشاركة</span>
                                </div>
                            </div>
                            <div class="reel-overlay">
                                <div class="reel-info">
                                    <div class="reel-title">🎬 ${escapeHtml(reel.title)}</div>
                                    <div class="reel-publisher">
                                        <i class="fas fa-user-circle"></i> ${escapeHtml(reel.publisher)}
                                        <span style="font-size: 11px;">${getTimeAgo(reel.createdAt)}</span>
                                    </div>
                                    <div class="reel-stats">
                                        <span onclick="likeReel(${reel.id}, event)"><i class="fas fa-heart"></i> ${formatNumber(likesCount)}</span>
                                        <span onclick="openCommentsModal(${reel.id}, event)"><i class="fas fa-comment"></i> ${formatNumber(commentsCount)}</span>
                                        <span><i class="fab fa-telegram"></i> تلجرام</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            setTimeout(() => {
                document.querySelectorAll('.reel-slide video').forEach(video => {
                    video.addEventListener('click', () => video.paused ? video.play() : video.pause());
                });
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        const video = entry.target.querySelector('video');
                        if (video && entry.isIntersecting) video.play().catch(e => console.log);
                        else if (video) video.pause();
                    });
                }, { threshold: 0.6 });
                document.querySelectorAll('.reel-slide').forEach(slide => observer.observe(slide));
            }, 100);
        }

        function likeReel(reelId, event) {
            if (event) event.stopPropagation();
            const allReels = mergeAllReels();
            const reel = allReels.find(r => r.id === reelId);
            if (reel) {
                if (userLikes[reelId]) {
                    reel.likes = Math.max(0, (reel.likes || 0) - 1);
                    delete userLikes[reelId];
                } else {
                    reel.likes = (reel.likes || 0) + 1;
                    userLikes[reelId] = true;
                }
                saveLikes();
                displayAllReels();
                updateStats();
            }
        }

        function openCommentsModal(reelId, event) {
            if (event) event.stopPropagation();
            currentReelForComments = reelId;
            const comments = userComments[reelId] || [];
            const commentsList = document.getElementById('commentsList');
            if (comments.length === 0) {
                commentsList.innerHTML = '<div style="text-align: center; padding: 30px; color: #aaa;">💬 لا توجد تعليقات، كن أول من يعلق!</div>';
            } else {
                commentsList.innerHTML = comments.map(comment => `
                    <div class="comment-item">
                        <div class="comment-avatar">${comment.userName.charAt(0).toUpperCase()}</div>
                        <div class="comment-content">
                            <div class="comment-name">${escapeHtml(comment.userName)}</div>
                            <div class="comment-text">${escapeHtml(comment.text)}</div>
                            <div class="comment-time">${getTimeAgo(comment.timestamp)}</div>
                        </div>
                    </div>
                `).join('');
            }
            document.getElementById('commentsModal').style.display = 'block';
            document.getElementById('commentInput').value = '';
        }

        function closeCommentsModal() {
            document.getElementById('commentsModal').style.display = 'none';
            currentReelForComments = null;
        }

        function addComment() {
            const input = document.getElementById('commentInput');
            const text = input.value.trim();
            if (!text) {
                showNotification('✏️ اكتب تعليقاً أولاً', 'warning');
                return;
            }
            if (!currentReelForComments) return;
            if (!userComments[currentReelForComments]) userComments[currentReelForComments] = [];
            userComments[currentReelForComments].unshift({
                userName: currentUser.name,
                text: text,
                timestamp: new Date().toISOString(),
                userId: currentUser.id
            });
            saveComments();
            input.value = '';
            openCommentsModal(currentReelForComments, null);
            displayAllReels();
            showNotification('✅ تم إضافة تعليقك', 'success');
        }

        function shareReel(videoUrl, title, event) {
            if (event) event.stopPropagation();
            const shareText = `🎬 ${title}\n📱 ناردو ريلز\n🔗 ${videoUrl}`;
            if (navigator.share) {
                navigator.share({ title: title, text: shareText, url: videoUrl }).catch(() => copyToClipboard(shareText));
            } else {
                copyToClipboard(shareText);
                showNotification('🔗 تم نسخ رابط المشاركة', 'success');
            }
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text);
            showNotification('📋 تم النسخ', 'success');
        }

        async function uploadReelToTelegram() {
            if (!selectedVideoFile) { showNotification('❌ اختر فيديو أولاً', 'error'); return; }
            if (!currentUser) { showNotification('❌ يرجى تسجيل الدخول', 'error'); return; }
            const title = document.getElementById('reelTitleInput').value.trim() || 'ريلز رائع';
            const btn = document.getElementById('uploadBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> جاري الرفع...';
            try {
                const formData = new FormData();
                formData.append('chat_id', TELEGRAM.channelId);
                formData.append('video', selectedVideoFile);
                formData.append('caption', `🎬 ${title}\n👤 ${currentUser.name}\n📅 ${new Date().toLocaleString('ar-EG')}\n🔗 @azerg\n✅ تم الرفع عبر ناردو ريلز`);
                const response = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/sendVideo`, { method: 'POST', body: formData });
                const data = await response.json();
                if (data.ok) {
                    const messageId = data.result.message_id;
                    const fileId = data.result.video.file_id;
                    const fileRes = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getFile?file_id=${fileId}`);
                    const fileData = await fileRes.json();
                    let permanentVideoUrl = URL.createObjectURL(selectedVideoFile);
                    if (fileData.ok) permanentVideoUrl = `https://api.telegram.org/file/bot${TELEGRAM.botToken}/${fileData.result.file_path}`;
                    let quickReels = JSON.parse(localStorage.getItem('quick_reels') || '[]');
                    quickReels.unshift({ id: messageId, title: title, publisher: currentUser.name, videoUrl: permanentVideoUrl, timestamp: Date.now(), hasAzerg: true, views: 0, likes: 0 });
                    if (quickReels.length > 10) quickReels = quickReels.slice(0, 10);
                    localStorage.setItem('quick_reels', JSON.stringify(quickReels));
                    showNotification(`✅ تم الرفع بنجاح!`, 'success');
                    setTimeout(() => loadReelsFromTelegram(), 2000);
                    closeUploadModal();
                    removeSelectedVideo();
                } else throw new Error(data.description || 'فشل الرفع');
            } catch (error) {
                showNotification('❌ فشل الرفع: ' + error.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fab fa-telegram"></i> رفع وتخزين دائم';
            }
        }

        function handleVideoSelect(input) {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                if (file.size > 50 * 1024 * 1024) { showNotification('حجم الفيديو كبير جداً (الحد الأقصى 50MB)', 'error'); return; }
                if (!file.type.startsWith('video/')) { showNotification('الرجاء اختيار ملف فيديو صالح', 'error'); return; }
                selectedVideoFile = file;
                document.getElementById('previewVideo').src = URL.createObjectURL(file);
                document.getElementById('videoPreviewDiv').classList.add('show');
                showNotification('✅ تم اختيار الفيديو', 'success');
            }
        }

        function removeSelectedVideo() {
            selectedVideoFile = null;
            document.getElementById('videoPreviewDiv').classList.remove('show');
            document.getElementById('videoInput').value = '';
            document.getElementById('previewVideo').src = '';
        }

        function openUploadModal() {
            if (!currentUser) { showNotification('يجب تسجيل الدخول أولاً', 'warning'); return; }
            document.getElementById('uploadModal').style.display = 'flex';
        }

        function closeUploadModal() {
            document.getElementById('uploadModal').style.display = 'none';
            removeSelectedVideo();
        }

        function updateStats() {
            const allReels = mergeAllReels();
            document.getElementById('totalReelsCount').innerText = allReels.length;
        }

        function formatNumber(num) { return num >= 1000 ? (num / 1000).toFixed(1) + 'K' : (num || 0); }
        function getTimeAgo(dateString) {
            if (!dateString) return '';
            const diff = Math.floor((Date.now() - new Date(dateString).getTime()) / 1000);
            if (diff < 60) return 'الآن';
            if (diff < 3600) return `منذ ${Math.floor(diff / 60)} دقيقة`;
            if (diff < 86400) return `منذ ${Math.floor(diff / 3600)} ساعة`;
            return `منذ ${Math.floor(diff / 86400)} يوم`;
        }
        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
        function showNotification(msg, type) {
            const div = document.createElement('div'); div.className = 'notification'; div.innerHTML = `${type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️'} ${msg}`;
            document.body.appendChild(div); setTimeout(() => div.remove(), 3500);
        }
        function showLoadingOverlay(show, message) {
            let overlay = document.getElementById('loadingOverlay');
            if (show && !overlay) {
                overlay = document.createElement('div'); overlay.id = 'loadingOverlay'; overlay.className = 'loading-overlay';
                overlay.innerHTML = `<div class="loading-spinner"></div><p style="color: gold;">${message}</p>`;
                document.body.appendChild(overlay);
            } else if (show && overlay) overlay.style.display = 'flex';
            else if (!show && overlay) overlay.remove();
        }

        function login() {
            const username = document.getElementById('loginUsername').value.trim();
            if (!username) { showNotification('❌ أدخل اسم المستخدم', 'error'); return; }
            let user = users.find(u => u.username === username || u.name === username);
            if (!user) { user = { id: Date.now(), name: username, username: username, role: 'user' }; users.push(user); localStorage.setItem('nardoo_users', JSON.stringify(users)); }
            currentUser = user;
            localStorage.setItem('current_user', JSON.stringify(user));
            loadLikes(); loadComments();
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('topBar').style.display = 'block';
            document.getElementById('fabButtons').style.display = 'block';
            document.getElementById('reelsPlayer').style.display = 'block';
            document.getElementById('userNameDisplay').innerText = currentUser.name;
            loadReelsFromTelegram();
            showNotification(`👋 مرحباً ${user.name}`, 'success');
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('current_user');
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('topBar').style.display = 'none';
            document.getElementById('fabButtons').style.display = 'none';
            document.getElementById('reelsPlayer').style.display = 'none';
            showNotification('👋 تم تسجيل الخروج', 'info');
        }

        loadUsers();
        const savedUser = localStorage.getItem('current_user');
        if (savedUser) {
            currentUser = JSON.parse(savedUser);
            loadLikes(); loadComments();
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('topBar').style.display = 'block';
            document.getElementById('fabButtons').style.display = 'block';
            document.getElementById('reelsPlayer').style.display = 'block';
            document.getElementById('userNameDisplay').innerText = currentUser.name;
            loadReelsFromTelegram();
        }
        window.onclick = e => { if (e.target === document.getElementById('uploadModal')) closeUploadModal(); if (e.target === document.getElementById('commentsModal')) closeCommentsModal(); };
    </script>
</body>
</html>
