<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>لعبة 3B | النرد السريع</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a2a, #1a1a3a);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Cairo', 'Segoe UI', system-ui, sans-serif;
            padding: 20px;
            overflow: hidden;
        }

        /* حاوية اللعبة */
        .game-wrapper {
            position: relative;
            width: 100%;
            max-width: 550px;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(20px);
            border-radius: 70px;
            padding: 25px;
            border: 3px solid #ffd700;
            box-shadow: 0 0 60px rgba(255,215,0,0.3);
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
        }

        /* شاشة الهدف */
        .target-screen {
            background: linear-gradient(135deg, rgba(0,0,0,0.6), rgba(0,0,0,0.4));
            border-radius: 50px;
            padding: 15px;
            margin-bottom: 25px;
            text-align: center;
            border: 1px solid rgba(255,215,0,0.5);
        }

        .target-label {
            font-size: 16px;
            color: #ffd700;
            letter-spacing: 2px;
        }

        .target-number {
            font-size: 70px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 20px #ffaa33, 0 0 40px #ff6600;
            line-height: 1;
        }

        /* منطقة النرد */
        .dice-area {
            display: flex;
            justify-content: center;
            margin: 30px 0;
            perspective: 800px;
        }

        .dice-3d {
            width: 220px;
            height: 220px;
            position: relative;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform 0.1s;
        }

        .dice-3d.rolling {
            animation: superSpin 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
        }

        @keyframes superSpin {
            0% {
                transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg);
            }
            10% {
                transform: rotateX(360deg) rotateY(180deg) rotateZ(90deg);
            }
            20% {
                transform: rotateX(720deg) rotateY(360deg) rotateZ(180deg);
            }
            30% {
                transform: rotateX(1080deg) rotateY(540deg) rotateZ(270deg);
            }
            40% {
                transform: rotateX(1440deg) rotateY(720deg) rotateZ(360deg);
            }
            50% {
                transform: rotateX(1800deg) rotateY(900deg) rotateZ(450deg);
            }
            60% {
                transform: rotateX(2160deg) rotateY(1080deg) rotateZ(540deg);
            }
            70% {
                transform: rotateX(2520deg) rotateY(1260deg) rotateZ(630deg);
            }
            80% {
                transform: rotateX(2880deg) rotateY(1440deg) rotateZ(720deg);
            }
            90% {
                transform: rotateX(3240deg) rotateY(1620deg) rotateZ(810deg);
            }
            100% {
                transform: rotateX(3600deg) rotateY(1800deg) rotateZ(900deg);
            }
        }

        .dice-face {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #ff3366, #cc0052);
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 90px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            border: 3px solid #ffd700;
            backface-visibility: hidden;
        }

        .dice-value-display {
            width: 220px;
            height: 220px;
            background: linear-gradient(145deg, #ff3366, #cc0052);
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 110px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 5px 15px rgba(0,0,0,0.5);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            border: 4px solid #ffd700;
            transition: all 0.2s;
        }

        .dice-3d:hover .dice-value-display {
            transform: scale(1.03);
            box-shadow: 0 20px 45px rgba(255,215,0,0.4);
        }

        /* الإحصائيات */
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 20px 0;
        }

        .stat-card {
            background: rgba(0,0,0,0.5);
            border-radius: 35px;
            padding: 12px;
            text-align: center;
            border: 1px solid rgba(255,215,0,0.3);
        }

        .stat-label {
            font-size: 12px;
            color: #aaa;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #ffd700;
        }

        /* رسالة */
        .message {
            background: rgba(0,0,0,0.6);
            border-radius: 50px;
            padding: 14px;
            margin: 15px 0;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            color: #ffd700;
            border: 1px solid rgba(255,215,0,0.5);
            transition: all 0.3s;
        }

        /* أزرار */
        .buttons {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }

        button {
            flex: 1;
            background: linear-gradient(135deg, #ffd700, #ffaa33);
            border: none;
            padding: 14px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            color: #1e3c2c;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        button:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 20px rgba(255,215,0,0.5);
        }

        button:active {
            transform: scale(0.98);
        }

        .roll-btn {
            background: linear-gradient(135deg, #ff3366, #cc0052);
            color: white;
        }

        @media (max-width: 550px) {
            .game-wrapper { padding: 20px; }
            .target-number { font-size: 50px; }
            .dice-value-display { width: 160px; height: 160px; font-size: 75px; }
            .stat-value { font-size: 22px; }
            button { padding: 10px; font-size: 14px; }
        }
    </style>
</head>
<body>

<div class="game-wrapper">
    <!-- الرقم المستهدف -->
    <div class="target-screen">
        <div class="target-label">🎯 الرقم المستهدف</div>
        <div class="target-number" id="targetNum">??</div>
    </div>

    <!-- النرد الكبير -->
    <div class="dice-area">
        <div class="dice-3d" id="dice3d" onclick="rollDice()">
            <div class="dice-value-display" id="diceValue">🎲</div>
        </div>
    </div>

    <!-- الإحصائيات -->
    <div class="stats">
        <div class="stat-card">
            <div class="stat-label">🎲 القيمة الحالية</div>
            <div class="stat-value" id="currentValue">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">📊 المحاولات</div>
            <div class="stat-value" id="attempts">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">🏆 أفضل نتيجة</div>
            <div class="stat-value" id="bestScore">0</div>
        </div>
    </div>

    <!-- رسالة الحالة -->
    <div class="message" id="message">
        🎲 اضغط على النرد لبدء اللعب
    </div>

    <!-- أزرار التحكم -->
    <div class="buttons">
        <button class="roll-btn" onclick="rollDice()">
            <i class="fas fa-dice"></i> ارمي النرد
        </button>
        <button onclick="resetGame()">
            <i class="fas fa-sync-alt"></i> لعبة جديدة
        </button>
    </div>
</div>

<script>
    // تحميل Font Awesome
    const link = document.createElement('link');
    link.rel = 'stylesheet';
    link.href = 'https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css';
    document.head.appendChild(link);

    // ========== متغيرات اللعبة ==========
    let targetNumber = 0;
    let currentValue = 0;
    let attempts = 0;
    let bestScore = localStorage.getItem('bestScore3B_fast') || 0;
    let gameActive = true;
    let isRolling = false;

    // عناصر DOM
    const targetSpan = document.getElementById('targetNum');
    const currentValueSpan = document.getElementById('currentValue');
    const attemptsSpan = document.getElementById('attempts');
    const bestScoreSpan = document.getElementById('bestScore');
    const messageDiv = document.getElementById('message');
    const diceValueDiv = document.getElementById('diceValue');
    const dice3d = document.getElementById('dice3d');

    // تحديث واجهة المستخدم
    function updateUI() {
        currentValueSpan.textContent = currentValue;
        attemptsSpan.textContent = attempts;
        bestScoreSpan.textContent = bestScore;
        targetSpan.textContent = targetNumber;
        
        if (currentValue === 0) {
            diceValueDiv.innerHTML = '🎲';
        } else {
            diceValueDiv.innerHTML = currentValue;
        }
    }

    // تأثيرات انفجار (جسيمات)
    function createExplosion() {
        for (let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.innerHTML = '✨';
            particle.style.position = 'fixed';
            particle.style.left = (window.innerWidth / 2 + (Math.random() - 0.5) * 200) + 'px';
            particle.style.top = (window.innerHeight / 2 + (Math.random() - 0.5) * 200) + 'px';
            particle.style.fontSize = (Math.random() * 20 + 10) + 'px';
            particle.style.pointerEvents = 'none';
            particle.style.zIndex = '1000';
            particle.style.opacity = '1';
            particle.style.transition = 'all 0.5s ease-out';
            document.body.appendChild(particle);
            
            setTimeout(() => {
                particle.style.opacity = '0';
                particle.style.transform = `translateY(-${Math.random() * 100 + 50}px)`;
                setTimeout(() => particle.remove(), 500);
            }, 10);
        }
    }

    // تأثير اهتزاز
    function vibrate(intensity) {
        if (navigator.vibrate) {
            navigator.vibrate(intensity);
        }
        // تأثير اهتزاز بصري
        dice3d.style.transform = `translateX(${Math.sin(Date.now() * 0.05) * intensity * 0.3}px)`;
        setTimeout(() => {
            dice3d.style.transform = '';
        }, intensity * 2);
    }

    // ========== رمي النرد (دوران سريع جداً) ==========
    function rollDice() {
        if (!gameActive) {
            messageDiv.innerHTML = '⚠️ اللعبة انتهت! اضغط على "لعبة جديدة"';
            return;
        }
        if (isRolling) return;
        
        isRolling = true;
        
        // إضافة تأثير الدوران السريع
        dice3d.classList.add('rolling');
        
        // تأثير اهتزاز عند الرمي
        vibrate(50);
        
        // قيمة النرد الجديدة (1-6)
        const newValue = Math.floor(Math.random() * 6) + 1;
        
        // مدة الدوران (0.5 ثانية)
        setTimeout(() => {
            // إزالة تأثير الدوران
            dice3d.classList.remove('rolling');
            
            // تحديث القيمة
            currentValue = newValue;
            attempts++;
            
            // تحديث الواجهة
            updateUI();
            
            // تأثير انفجار عند ظهور الرقم
            createExplosion();
            vibrate(30);
            
            // التحقق من النتيجة
            checkResult();
            
            isRolling = false;
            
        }, 500); // نفس مدة الأنيميشن
    }

    // التحقق من الفوز أو الخسارة
    function checkResult() {
        if (currentValue === targetNumber) {
            gameActive = false;
            const pointsEarned = Math.max(1, 12 - attempts);
            
            messageDiv.innerHTML = `🎉🎉 فوز! 🎉🎉<br>✨ حصلت على ${pointsEarned} نقطة ✨`;
            messageDiv.style.background = "rgba(46,204,113,0.3)";
            messageDiv.style.border = "2px solid #2ecc71";
            
            // تأثير فوز كبير
            for (let i = 0; i < 5; i++) {
                setTimeout(() => createExplosion(), i * 100);
            }
            vibrate(200);
            
            if (pointsEarned > bestScore) {
                bestScore = pointsEarned;
                localStorage.setItem('bestScore3B_fast', bestScore);
                bestScoreSpan.textContent = bestScore;
                messageDiv.innerHTML += `<br>🏆 رقم قياسي جديد! 🏆`;
            }
        } 
        else if (currentValue > targetNumber) {
            gameActive = false;
            messageDiv.innerHTML = `💥 خسارة! 💥<br>القيمة (${currentValue}) أكبر من المستهدف (${targetNumber})`;
            messageDiv.style.background = "rgba(231,76,60,0.3)";
            messageDiv.style.border = "2px solid #e74c3c";
            vibrate(150);
        }
        else {
            messageDiv.innerHTML = `🎲 القيمة: ${currentValue} | تحتاج: ${targetNumber - currentValue} أخرى 🎯`;
            messageDiv.style.background = "rgba(255,215,0,0.15)";
            messageDiv.style.border = "1px solid rgba(255,215,0,0.5)";
        }
    }

    // إعادة تعيين اللعبة
    function resetGame() {
        targetNumber = Math.floor(Math.random() * 13) + 6; // 6-18
        currentValue = 0;
        attempts = 0;
        gameActive = true;
        isRolling = false;
        
        updateUI();
        
        messageDiv.innerHTML = `🎯 الرقم الجديد: ${targetNumber} | اضغط على النرد لبدء اللعب 🎲`;
        messageDiv.style.background = "rgba(255,215,0,0.15)";
        messageDiv.style.border = "1px solid rgba(255,215,0,0.5)";
        
        // تأثير إعادة الضبط
        createExplosion();
        vibrate(30);
        
        // إزالة أي تأثير دوران متبقي
        dice3d.classList.remove('rolling');
    }

    // ========== تهيئة اللعبة ==========
    bestScoreSpan.textContent = bestScore;
    resetGame();

    // تأثير حركة الماوس على النرد
    document.addEventListener('mousemove', (e) => {
        const x = (e.clientX / window.innerWidth - 0.5) * 20;
        const y = (e.clientY / window.innerHeight - 0.5) * 20;
        dice3d.style.transform = `rotateX(${y}deg) rotateY(${x}deg)`;
    });
</script>
</body>
</html>
