<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>لعبة 3B | 5D Real - نرد ثلاثي الأبعاد</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Cairo', 'Segoe UI', system-ui, sans-serif;
        }

        /* لوحة التحكم */
        .ui-panel {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 100;
            pointer-events: none;
        }

        .game-info {
            display: inline-block;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(15px);
            padding: 15px 30px;
            border-radius: 60px;
            border: 2px solid #ffd700;
            box-shadow: 0 0 30px rgba(255,215,0,0.3);
            pointer-events: auto;
        }

        .target {
            font-size: 2rem;
            color: #ffd700;
            font-weight: bold;
        }

        .target span {
            font-size: 3rem;
            text-shadow: 0 0 20px #ffaa33;
        }

        .score-board {
            display: flex;
            gap: 20px;
            margin-top: 10px;
            justify-content: center;
        }

        .stat {
            background: rgba(0,0,0,0.5);
            padding: 5px 15px;
            border-radius: 30px;
        }

        .stat .value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffd700;
        }

        .message-area {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 100;
            pointer-events: none;
        }

        .message {
            display: inline-block;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #ffd700;
            border: 1px solid #ffd700;
        }

        .reset-btn {
            position: absolute;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #ffd700, #ffaa33);
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            color: #1e3c2c;
            cursor: pointer;
            z-index: 100;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .reset-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(255,215,0,0.5);
        }

        @media (max-width: 600px) {
            .game-info { padding: 10px 20px; }
            .target span { font-size: 2rem; }
            .stat .value { font-size: 1.2rem; }
            .reset-btn { padding: 8px 18px; font-size: 0.9rem; bottom: 20px; right: 20px; }
            .message { font-size: 0.9rem; padding: 8px 18px; }
        }
    </style>
</head>
<body>

<div class="ui-panel">
    <div class="game-info">
        <div class="target">
            🎯 الرقم المستهدف: <span id="targetNum">??</span>
        </div>
        <div class="score-board">
            <div class="stat">📊 المجموع: <span class="value" id="currentSum">0</span></div>
            <div class="stat">🎲 المحاولات: <span class="value" id="attempts">0</span></div>
            <div class="stat">🏆 الأفضل: <span class="value" id="bestScore">0</span></div>
        </div>
    </div>
</div>

<div class="message-area">
    <div class="message" id="message">🎲 اضغط على النرد لبدء اللعب</div>
</div>

<button class="reset-btn" onclick="resetGame()">
    <i class="fas fa-sync-alt"></i> لعبة جديدة
</button>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'https://unpkg.com/three@0.128.0/examples/jsm/controls/OrbitControls.js';

    // ========== إعدادات اللعبة ==========
    let targetNumber = 0;
    let diceValues = [0, 0, 0];
    let attempts = 0;
    let bestScore = localStorage.getItem('bestScore3B_3d') || 0;
    let gameActive = true;
    let rolling = false;

    // عناصر DOM
    const targetSpan = document.getElementById('targetNum');
    const currentSumSpan = document.getElementById('currentSum');
    const attemptsSpan = document.getElementById('attempts');
    const bestScoreSpan = document.getElementById('bestScore');
    const messageDiv = document.getElementById('message');

    // ========== إنشاء المشهد ثلاثي الأبعاد ==========
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a2a);
    scene.fog = new THREE.FogExp2(0x0a0a2a, 0.008);

    // الكاميرا
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(4, 3, 6);
    camera.lookAt(0, 0, 0);

    // المعالج
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // التحكم بالكاميرا
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.autoRotate = false;
    controls.enableZoom = true;
    controls.enablePan = true;
    controls.target.set(0, 0, 0);

    // ========== الإضاءة ==========
    // إضاءة محيطية
    const ambientLight = new THREE.AmbientLight(0x404060);
    scene.add(ambientLight);
    
    // إضاءة رئيسية
    const mainLight = new THREE.DirectionalLight(0xffffff, 1);
    mainLight.position.set(5, 10, 7);
    mainLight.castShadow = true;
    mainLight.receiveShadow = true;
    scene.add(mainLight);
    
    // إضاءة خلفية
    const backLight = new THREE.PointLight(0xffaa33, 0.5);
    backLight.position.set(-2, 1, -3);
    scene.add(backLight);
    
    // إضاءة ملونة
    const colorLight = new THREE.PointLight(0xff66cc, 0.3);
    colorLight.position.set(3, 2, 2);
    scene.add(colorLight);
    
    // إضاءة أرضية
    const fillLight = new THREE.PointLight(0x33ccff, 0.3);
    fillLight.position.set(0, -1, 0);
    scene.add(fillLight);

    // ========== الأرضية ==========
    const gridHelper = new THREE.GridHelper(20, 20, 0xffd700, 0x336633);
    gridHelper.position.y = -1.2;
    scene.add(gridHelper);
    
    const floorPlane = new THREE.Mesh(
        new THREE.PlaneGeometry(15, 15),
        new THREE.MeshStandardMaterial({ color: 0x1a3a1a, roughness: 0.8, metalness: 0.1, transparent: true, opacity: 0.5 })
    );
    floorPlane.rotation.x = -Math.PI / 2;
    floorPlane.position.y = -1.2;
    floorPlane.receiveShadow = true;
    scene.add(floorPlane);

    // ========== إنشاء النرد (مكعب مع أرقام) ==========
    function createDiceTexture(number, color) {
        const canvas = document.createElement('canvas');
        canvas.width = 512;
        canvas.height = 512;
        const ctx = canvas.getContext('2d');
        
        // خلفية
        ctx.fillStyle = color;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // إطار ذهبي
        ctx.strokeStyle = '#ffd700';
        ctx.lineWidth = 20;
        ctx.strokeRect(10, 10, canvas.width - 20, canvas.height - 20);
        
        // الرقم
        ctx.fillStyle = '#ffd700';
        ctx.font = `Bold ${canvas.width * 0.5}px "Cairo", "Segoe UI"`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(number.toString(), canvas.width / 2, canvas.height / 2);
        
        // تأثير ظل
        ctx.shadowBlur = 0;
        
        const texture = new THREE.CanvasTexture(canvas);
        texture.needsUpdate = true;
        return texture;
    }

    function createDice(value, x, z, index) {
        const size = 0.9;
        const geometry = new THREE.BoxGeometry(size, size, size);
        
        // ألوان مختلفة لكل نرد
        const colors = ['#ff3366', '#33ff66', '#ffaa33'];
        const material = new THREE.MeshStandardMaterial({ 
            map: createDiceTexture(value, colors[index]),
            roughness: 0.3,
            metalness: 0.7,
            emissive: 0x442200,
            emissiveIntensity: 0.2
        });
        
        const dice = new THREE.Mesh(geometry, material);
        dice.position.set(x, 0, z);
        dice.castShadow = true;
        dice.receiveShadow = true;
        dice.userData = { value, index };
        
        return dice;
    }

    let diceMeshes = [];
    const dicePositions = [[-1.5, 0.2, -1], [0, 0.2, -0.5], [1.5, 0.2, -1]];

    function updateDiceValues() {
        for (let i = 0; i < 3; i++) {
            if (diceMeshes[i]) {
                scene.remove(diceMeshes[i]);
            }
            const value = diceValues[i] === 0 ? '?' : diceValues[i];
            const colors = ['#ff3366', '#33ff66', '#ffaa33'];
            const material = new THREE.MeshStandardMaterial({ 
                map: createDiceTexture(value, colors[i]),
                roughness: 0.3,
                metalness: 0.7,
                emissive: 0x442200,
                emissiveIntensity: diceValues[i] > 0 ? 0.5 : 0.1
            });
            const geometry = new THREE.BoxGeometry(0.9, 0.9, 0.9);
            const dice = new THREE.Mesh(geometry, material);
            dice.position.set(dicePositions[i][0], dicePositions[i][1], dicePositions[i][2]);
            dice.castShadow = true;
            dice.userData = { index: i, value: diceValues[i] };
            scene.add(dice);
            diceMeshes[i] = dice;
        }
    }

    // ========== تأثيرات الجسيمات ==========
    let particles = [];
    const particleGeometry = new THREE.BufferGeometry();
    const particleMaterial = new THREE.PointsMaterial({ color: 0xffd700, size: 0.05 });

    function createExplosion(x, y, z, color) {
        const particleCount = 50;
        const positions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            positions[i*3] = x + (Math.random() - 0.5) * 1.5;
            positions[i*3+1] = y + (Math.random() - 0.5) * 1.5;
            positions[i*3+2] = z + (Math.random() - 0.5) * 1.5;
        }
        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const material = new THREE.PointsMaterial({ color: color, size: 0.08 });
        const points = new THREE.Points(geometry, material);
        scene.add(points);
        
        setTimeout(() => {
            scene.remove(points);
        }, 500);
    }

    // ========== حركة النرد عند الرمي ==========
    function animateDiceRoll(index, newValue) {
        const dice = diceMeshes[index];
        if (!dice) return;
        
        const startPos = dice.position.clone();
        const startRot = dice.rotation.clone();
        const duration = 500;
        const startTime = Date.now();
        
        function animate() {
            const elapsed = Date.now() - startTime;
            const t = Math.min(1, elapsed / duration);
            const easeOut = 1 - Math.pow(1 - t, 3);
            
            // حركة قفز
            dice.position.y = startPos.y + Math.sin(t * Math.PI) * 1.2;
            // دوران
            dice.rotation.x = startRot.x + t * Math.PI * 4;
            dice.rotation.y = startRot.y + t * Math.PI * 2;
            dice.rotation.z = startRot.z + t * Math.PI * 3;
            
            if (t < 1) {
                requestAnimationFrame(animate);
            } else {
                // إنهاء الحركة
                dice.position.y = startPos.y;
                dice.rotation.set(0, 0, 0);
                
                // تحديث النسيج بالقيمة الجديدة
                const colors = ['#ff3366', '#33ff66', '#ffaa33'];
                const material = new THREE.MeshStandardMaterial({ 
                    map: createDiceTexture(newValue, colors[index]),
                    roughness: 0.3,
                    metalness: 0.7,
                    emissive: 0x442200,
                    emissiveIntensity: 0.5
                });
                dice.material = material;
                dice.userData.value = newValue;
                
                // تأثير انفجار
                createExplosion(dice.position.x, dice.position.y + 0.5, dice.position.z, '#ffd700');
                
                // التحقق من النتيجة بعد الرمي
                checkGameResult();
                rolling = false;
            }
        }
        
        animate();
    }

    // ========== منطق اللعبة ==========
    function updateUI() {
        const sum = diceValues.reduce((a, b) => a + b, 0);
        currentSumSpan.textContent = sum;
        attemptsSpan.textContent = attempts;
        bestScoreSpan.textContent = bestScore;
        targetSpan.textContent = targetNumber;
    }

    function checkGameResult() {
        const sum = diceValues.reduce((a, b) => a + b, 0);
        
        if (sum === targetNumber && diceValues.every(v => v > 0)) {
            gameActive = false;
            const pointsEarned = Math.max(1, 12 - attempts);
            messageDiv.innerHTML = `🎉🎉 فوز مذهل! 🎉🎉<br>✨ حصلت على ${pointsEarned} نقطة ✨`;
            messageDiv.style.border = '2px solid #2ecc71';
            
            // تأثير فوز
            createExplosion(0, 1, 0, '#2ecc71');
            for (let i = 0; i < 5; i++) {
                setTimeout(() => createExplosion(0, 1, 0, '#ffd700'), i * 100);
            }
            
            if (pointsEarned > bestScore) {
                bestScore = pointsEarned;
                localStorage.setItem('bestScore3B_3d', bestScore);
                bestScoreSpan.textContent = bestScore;
                messageDiv.innerHTML += `<br>🏆 رقم قياسي جديد! 🏆`;
            }
        } 
        else if (sum > targetNumber && diceValues.every(v => v > 0)) {
            gameActive = false;
            messageDiv.innerHTML = `💥 خسارة! تجاوزت الرقم (${sum} > ${targetNumber})`;
            messageDiv.style.border = '2px solid #e74c3c';
            createExplosion(0, 1, 0, '#e74c3c');
        }
        else if (diceValues.every(v => v > 0)) {
            messageDiv.innerHTML = `🎲 مجموعك: ${sum} | تحتاج: ${targetNumber - sum} أخرى 🎯`;
            messageDiv.style.border = '1px solid #ffd700';
        }
    }

    function rollDice(index) {
        if (!gameActive) {
            messageDiv.innerHTML = '⚠️ اللعبة انتهت! اضغط على "لعبة جديدة"';
            return;
        }
        if (rolling) return;
        if (diceValues[index] > 0) {
            messageDiv.innerHTML = '⚠️ هذا النرد استخدمته بالفعل!';
            return;
        }
        
        rolling = true;
        const newValue = Math.floor(Math.random() * 6) + 1;
        diceValues[index] = newValue;
        attempts++;
        
        animateDiceRoll(index, newValue);
        updateUI();
    }

    function resetGame() {
        targetNumber = Math.floor(Math.random() * 13) + 6;
        diceValues = [0, 0, 0];
        attempts = 0;
        gameActive = true;
        rolling = false;
        
        // إعادة تعيين النرد
        updateDiceValues();
        
        messageDiv.innerHTML = `🎯 الرقم الجديد: ${targetNumber} | اضغط على النرد لبدء اللعب 🎲`;
        messageDiv.style.border = '1px solid #ffd700';
        updateUI();
        
        // تأثير إعادة الضبط
        createExplosion(0, 1, 0, '#ffd700');
    }

    // ========== إضافة النرد إلى المشهد ==========
    function initDice() {
        for (let i = 0; i < 3; i++) {
            const colors = ['#ff3366', '#33ff66', '#ffaa33'];
            const material = new THREE.MeshStandardMaterial({ 
                map: createDiceTexture('?', colors[i]),
                roughness: 0.3,
                metalness: 0.7
            });
            const geometry = new THREE.BoxGeometry(0.9, 0.9, 0.9);
            const dice = new THREE.Mesh(geometry, material);
            dice.position.set(dicePositions[i][0], dicePositions[i][1], dicePositions[i][2]);
            dice.castShadow = true;
            dice.userData = { index: i, value: 0 };
            scene.add(dice);
            diceMeshes[i] = dice;
        }
    }

    // ========== Raycaster للكشف عن النقر على النرد ==========
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    function onClick(event) {
        if (rolling) return;
        
        mouse.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
        mouse.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;
        
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(diceMeshes);
        
        if (intersects.length > 0) {
            const hit = intersects[0].object;
            const index = hit.userData.index;
            rollDice(index);
        }
    }

    // ========== نجمة الخلفية ==========
    const starGeometry = new THREE.BufferGeometry();
    const starCount = 1000;
    const starPositions = new Float32Array(starCount * 3);
    for (let i = 0; i < starCount; i++) {
        starPositions[i*3] = (Math.random() - 0.5) * 200;
        starPositions[i*3+1] = (Math.random() - 0.5) * 100;
        starPositions[i*3+2] = (Math.random() - 0.5) * 100 - 50;
    }
    starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
    const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.1 });
    const stars = new THREE.Points(starGeometry, starMaterial);
    scene.add(stars);

    // ========== حلقة الرسم ==========
    function animate() {
        requestAnimationFrame(animate);
        
        // دوران النجوم ببطء
        stars.rotation.y += 0.0005;
        stars.rotation.x += 0.0003;
        
        // تحديث الإضاءة الملونة
        const time = Date.now() * 0.002;
        colorLight.intensity = 0.3 + Math.sin(time) * 0.2;
        
        controls.update();
        renderer.render(scene, camera);
    }
    
    animate();
    
    // ========== تهيئة اللعبة ==========
    initDice();
    resetGame();
    
    // إضافة مستمع النقر
    window.addEventListener('click', onClick, false);
    
    // تحديث حجم النافذة
    window.addEventListener('resize', onWindowResize, false);
    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }
    
    console.log('🎮 لعبة 3B 5D - نرد ثلاثي الأبعاد جاهز!');
</script>
