<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>لعبة 3B | النرد القتالي 5D</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at center, #0a0a2a, #000000);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Cairo', 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* حاوية اللعبة */
        .game-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 600px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(15px);
            border-radius: 70px;
            padding: 25px;
            border: 3px solid #ff3366;
            box-shadow: 0 0 50px rgba(255,51,102,0.3);
            animation: pulseBorder 2s ease-in-out infinite;
        }

        @keyframes pulseBorder {
            0%, 100% { border-color: #ff3366; box-shadow: 0 0 30px rgba(255,51,102,0.3); }
            50% { border-color: #ff6600; box-shadow: 0 0 60px rgba(255,102,0,0.6); }
        }

        /* شاشة الهدف */
        .target-screen {
            background: linear-gradient(135deg, rgba(0,0,0,0.7), rgba(0,0,0,0.5));
            border-radius: 50px;
            padding: 15px;
            margin-bottom: 25px;
            text-align: center;
            border: 2px solid #ff3366;
        }

        .target-label {
            font-size: 16px;
            color: #ff3366;
            letter-spacing: 2px;
        }

        .target-number {
            font-size: 70px;
            font-weight: bold;
            color: #ff3366;
            text-shadow: 0 0 20px #ff3366, 0 0 40px #ff6600;
            line-height: 1;
            animation: targetGlow 1s ease-in-out infinite;
        }

        @keyframes targetGlow {
            0%, 100% { text-shadow: 0 0 20px #ff3366; }
            50% { text-shadow: 0 0 40px #ff6600, 0 0 60px #ff3366; }
        }

        /* منطقة النرد */
        .dice-area {
            display: flex;
            justify-content: center;
            margin: 30px 0;
            position: relative;
        }

        .dice-container {
            position: relative;
            cursor: pointer;
        }

        .dice-value {
            width: 220px;
            height: 220px;
            background: linear-gradient(145deg, #ff3366, #cc0052);
            border-radius: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 110px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 5px 15px rgba(0,0,0,0.5);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            border: 4px solid #ffd700;
            transition: all 0.1s;
            position: relative;
            z-index: 2;
        }

        .dice-value.rolling {
            animation: diceExplode 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
        }

        @keyframes diceExplode {
            0% {
                transform: scale(1) rotate(0deg);
                filter: brightness(1);
            }
            25% {
                transform: scale(1.3) rotate(180deg);
                filter: brightness(1.5) blur(2px);
            }
            50% {
                transform: scale(1.1) rotate(360deg);
                filter: brightness(2) blur(1px);
            }
            75% {
                transform: scale(1.2) rotate(540deg);
                filter: brightness(1.8);
            }
            100% {
                transform: scale(1) rotate(720deg);
                filter: brightness(1);
            }
        }

        .dice-container:hover .dice-value {
            transform: scale(1.05);
            box-shadow: 0 20px 45px rgba(255,51,102,0.6);
        }

        /* الإحصائيات */
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 20px 0;
        }

        .stat-card {
            background: rgba(0,0,0,0.6);
            border-radius: 35px;
            padding: 12px;
            text-align: center;
            border: 1px solid #ff3366;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,51,102,0.1), transparent);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        .stat-label {
            font-size: 12px;
            color: #aaa;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #ff3366;
        }

        /* رسالة */
        .message {
            background: rgba(0,0,0,0.7);
            border-radius: 50px;
            padding: 14px;
            margin: 15px 0;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            color: #ff3366;
            border: 1px solid #ff3366;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        /* أزرار */
        .buttons {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }

        button {
            flex: 1;
            background: linear-gradient(135deg, #ff3366, #cc0052);
            border: none;
            padding: 14px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: radial-gradient(circle, rgba(255,255,255,0.3), transparent);
            transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s;
        }

        button:hover::before {
            width: 200%;
            height: 200%;
        }

        button:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 20px rgba(255,51,102,0.5);
        }

        .reset-btn {
            background: linear-gradient(135deg, #ff6600, #ff3300);
        }

        @media (max-width: 550px) {
            .game-wrapper { padding: 20px; }
            .target-number { font-size: 50px; }
            .dice-value { width: 160px; height: 160px; font-size: 75px; }
            .stat-value { font-size: 22px; }
            button { padding: 10px; font-size: 14px; }
        }
    </style>
</head>
<body>

<div class="game-wrapper">
    <div class="target-screen">
        <div class="target-label">🎯 الرقم المستهدف</div>
        <div class="target-number" id="targetNum">??</div>
    </div>

    <div class="dice-area">
        <div class="dice-container" onclick="rollDice()">
            <div class="dice-value" id="diceValue">🎲</div>
        </div>
    </div>

    <div class="stats">
        <div class="stat-card">
            <div class="stat-label">⚡ القيمة الحالية</div>
            <div class="stat-value" id="currentValue">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">💥 المحاولات</div>
            <div class="stat-value" id="attempts">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">🏆 أفضل نتيجة</div>
            <div class="stat-value" id="bestScore">0</div>
        </div>
    </div>

    <div class="message" id="message">
        🔥 اضغط على النرد لبدء المعركة 🔥
    </div>

    <div class="buttons">
        <button class="roll-btn" onclick="rollDice()">
            <i class="fas fa-dice"></i> ارمي النرد
        </button>
        <button class="reset-btn" onclick="resetGame()">
            <i class="fas fa-sync-alt"></i> معركة جديدة
        </button>
    </div>
</div>

<!-- Canvas للتأثيرات البصرية -->
<canvas id="effectCanvas" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5;"></canvas>

<script>
    // تحميل Font Awesome
    const link = document.createElement('link');
    link.rel = 'stylesheet';
    link.href = 'https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css';
    document.head.appendChild(link);

    // ========== تأثيرات Canvas ==========
    const canvas = document.getElementById('effectCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let flashes = [];
    let shockwaves = [];

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // فئة جزيئات الدخان
    class SmokeParticle {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.vx = (Math.random() - 0.5) * 2;
            this.vy = (Math.random() - 1) * 1.5 - 1;
            this.alpha = 200;
            this.size = Math.random() * 15 + 5;
            this.gravity = 0.05;
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.vy += this.gravity;
            this.alpha -= 3;
            this.size += 0.2;
        }
        draw() {
            ctx.globalAlpha = Math.max(0, this.alpha / 255);
            ctx.fillStyle = `rgba(100, 100, 100, ${this.alpha / 255})`;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
        isDead() {
            return this.alpha <= 0;
        }
    }

    // فئة انفجار ناري
    class FireFlash {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.life = 1;
            this.size = 20;
        }
        update() {
            this.life -= 0.05;
            this.size += 5;
        }
        draw() {
            ctx.globalAlpha = Math.max(0, this.life);
            for (let i = 0; i < 3; i++) {
                const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
                gradient.addColorStop(0, `rgba(255, ${100 - i * 30}, 0, ${this.life})`);
                gradient.addColorStop(1, `rgba(255, 0, 0, 0)`);
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size - i * 5, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        isDead() {
            return this.life <= 0;
        }
    }

    // فئة موجة صدمة
    class Shockwave {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.radius = 10;
            this.maxRadius = 150;
            this.life = 1;
        }
        update() {
            this.radius += 8;
            this.life -= 0.03;
        }
        draw() {
            ctx.globalAlpha = Math.max(0, this.life);
            ctx.strokeStyle = `rgba(255, 51, 102, ${this.life})`;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.stroke();
            
            ctx.strokeStyle = `rgba(255, 102, 0, ${this.life * 0.7})`;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius - 5, 0, Math.PI * 2);
            ctx.stroke();
        }
        isDead() {
            return this.life <= 0 || this.radius >= this.maxRadius;
        }
    }

    // إنشاء تأثيرات
    function createExplosion(x, y) {
        for (let i = 0; i < 30; i++) {
            particles.push(new SmokeParticle(x + (Math.random() - 0.5) * 50, y + (Math.random() - 0.5) * 50));
        }
        flashes.push(new FireFlash(x, y));
        shockwaves.push(new Shockwave(x, y));
        
        // اهتزاز
        if (navigator.vibrate) navigator.vibrate(80);
    }

    function createWinEffect(x, y) {
        for (let i = 0; i < 50; i++) {
            particles.push(new SmokeParticle(x + (Math.random() - 0.5) * 100, y + (Math.random() - 0.5) * 100));
        }
        for (let i = 0; i < 5; i++) {
            setTimeout(() => flashes.push(new FireFlash(x, y)), i * 50);
            setTimeout(() => shockwaves.push(new Shockwave(x, y)), i * 50);
        }
        if (navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 200]);
    }

    // رسم جميع التأثيرات
    function drawEffects() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // تحديث ورسم الجزيئات
        for (let i = particles.length - 1; i >= 0; i--) {
            particles[i].update();
            particles[i].draw();
            if (particles[i].isDead()) particles.splice(i, 1);
        }
        
        // تحديث ورسم الومضات
        for (let i = flashes.length - 1; i >= 0; i--) {
            flashes[i].update();
            flashes[i].draw();
            if (flashes[i].isDead()) flashes.splice(i, 1);
        }
        
        // تحديث ورسم موجات الصدمة
        for (let i = shockwaves.length - 1; i >= 0; i--) {
            shockwaves[i].update();
            shockwaves[i].draw();
            if (shockwaves[i].isDead()) shockwaves.splice(i, 1);
        }
        
        requestAnimationFrame(drawEffects);
    }
    drawEffects();

    // ========== منطق اللعبة ==========
    let targetNumber = 0;
    let currentValue = 0;
    let attempts = 0;
    let bestScore = localStorage.getItem('bestScore3B_combat') || 0;
    let gameActive = true;
    let isRolling = false;

    const targetSpan = document.getElementById('targetNum');
    const currentValueSpan = document.getElementById('currentValue');
    const attemptsSpan = document.getElementById('attempts');
    const bestScoreSpan = document.getElementById('bestScore');
    const messageDiv = document.getElementById('message');
    const diceValueDiv = document.getElementById('diceValue');

    function updateUI() {
        currentValueSpan.textContent = currentValue;
        attemptsSpan.textContent = attempts;
        bestScoreSpan.textContent = bestScore;
        targetSpan.textContent = targetNumber;
        
        if (currentValue === 0) {
            diceValueDiv.innerHTML = '🎲';
        } else {
            diceValueDiv.innerHTML = currentValue;
        }
    }

    function rollDice() {
        if (!gameActive) {
            messageDiv.innerHTML = '⚠️ المعركة انتهت! اضغط على "معركة جديدة"';
            return;
        }
        if (isRolling) return;
        
        isRolling = true;
        
        // تأثيرات عند الرمي
        const centerX = window.innerWidth / 2;
        const centerY = window.innerHeight / 2;
        createExplosion(centerX, centerY);
        
        // إضافة تأثير الدوران
        diceValueDiv.classList.add('rolling');
        
        const newValue = Math.floor(Math.random() * 6) + 1;
        
        setTimeout(() => {
            diceValueDiv.classList.remove('rolling');
            
            currentValue = newValue;
            attempts++;
            
            updateUI();
            
            // تأثير انفجار عند ظهور الرقم
            createExplosion(centerX, centerY);
            
            // التحقق من النتيجة
            checkResult();
            
            isRolling = false;
        }, 500);
    }

    function checkResult() {
        const centerX = window.innerWidth / 2;
        const centerY = window.innerHeight / 2;
        
        if (currentValue === targetNumber) {
            gameActive = false;
            const pointsEarned = Math.max(1, 12 - attempts);
            
            messageDiv.innerHTML = `💥💥 فوز! 💥💥<br>✨ حصلت على ${pointsEarned} نقطة قتالية ✨`;
            messageDiv.style.background = "rgba(46,204,113,0.3)";
            messageDiv.style.border = "2px solid #2ecc71";
            
            createWinEffect(centerX, centerY);
            
            if (pointsEarned > bestScore) {
                bestScore = pointsEarned;
                localStorage.setItem('bestScore3B_combat', bestScore);
                bestScoreSpan.textContent = bestScore;
                messageDiv.innerHTML += `<br>🏆 رقم قياسي جديد! 🏆`;
                createWinEffect(centerX, centerY);
            }
        } 
        else if (currentValue > targetNumber) {
            gameActive = false;
            messageDiv.innerHTML = `💀 خسارة قتالية! 💀<br>القيمة (${currentValue}) أكبر من المستهدف (${targetNumber})`;
            messageDiv.style.background = "rgba(231,76,60,0.3)";
            messageDiv.style.border = "2px solid #e74c3c";
            createExplosion(centerX, centerY);
        }
        else {
            messageDiv.innerHTML = `⚡ القيمة: ${currentValue} | تحتاج: ${targetNumber - currentValue} أخرى 🔥`;
            messageDiv.style.background = "rgba(255,51,102,0.15)";
            messageDiv.style.border = "1px solid #ff3366";
        }
    }

    function resetGame() {
        targetNumber = Math.floor(Math.random() * 13) + 6;
        currentValue = 0;
        attempts = 0;
        gameActive = true;
        isRolling = false;
        
        updateUI();
        
        messageDiv.innerHTML = `🎯 الرقم الجديد: ${targetNumber} | اضغط على النرد لبدء المعركة 🔥`;
        messageDiv.style.background = "rgba(255,51,102,0.15)";
        messageDiv.style.border = "1px solid #ff3366";
        
        // تأثير إعادة الضبط
        const centerX = window.innerWidth / 2;
        const centerY = window.innerHeight / 2;
        createExplosion(centerX, centerY);
        
        diceValueDiv.classList.remove('rolling');
    }

    // تهيئة
    bestScoreSpan.textContent = bestScore;
    resetGame();
</script>
</body>
</html>
