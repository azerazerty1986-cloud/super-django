<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ناردو برو - سلتي</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --gold: #ffd700;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --glass: rgba(255, 255, 255, 0.05);
            --success: #4ade80;
            --error: #f87171;
        }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0f3460, #16213e);
            color: var(--text-primary);
            direction: rtl;
        }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .header {
            background: var(--glass);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }
        .header-title { display: flex; align-items: center; gap: 15px; }
        .header-title i { font-size: 40px; color: var(--gold); }
        .header-title h1 { font-size: 32px; color: var(--gold); margin: 0; }
        .header-info { display: flex; gap: 20px; flex-wrap: wrap; }
        .info-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 215, 0, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
        }
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
        }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-gold:hover { background: #ffed4e; transform: translateY(-2px); }
        .btn-outline { background: transparent; border: 2px solid var(--gold); color: var(--gold); }
        .cart-section {
            background: var(--glass);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 20px;
            padding: 25px;
        }
        .section-title {
            font-size: 24px;
            color: var(--gold);
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(255, 215, 0, 0.2);
        }
        .cart-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 215, 0, 0.15);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .cart-item-info { flex: 2; min-width: 200px; }
        .cart-item-name { font-size: 16px; font-weight: bold; color: var(--gold); margin-bottom: 5px; }
        .cart-item-price { font-size: 14px; color: var(--success); }
        .cart-item-quantity {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 215, 0, 0.1);
            padding: 8px 15px;
            border-radius: 10px;
        }
        .cart-item-quantity button {
            background: none;
            border: none;
            color: var(--gold);
            cursor: pointer;
            font-size: 18px;
            width: 30px;
            height: 30px;
            border-radius: 8px;
        }
        .cart-item-quantity button:hover { background: rgba(255, 215, 0, 0.2); }
        .cart-item-quantity span { font-size: 16px; font-weight: bold; min-width: 30px; text-align: center; }
        .cart-item-total { font-size: 18px; font-weight: bold; color: var(--gold); min-width: 120px; text-align: center; }
        .cart-item-remove {
            background: rgba(248, 113, 113, 0.2);
            color: var(--error);
            border: 1px solid var(--error);
            padding: 8px 18px;
            border-radius: 10px;
            cursor: pointer;
        }
        .cart-item-remove:hover { background: var(--error); color: white; }
        .cart-summary {
            background: rgba(255, 215, 0, 0.05);
            border-radius: 15px;
            padding: 25px;
            margin-top: 20px;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.1);
        }
        .summary-row:last-child { border-bottom: none; }
        .summary-label { color: var(--text-secondary); }
        .summary-value { color: var(--gold); font-weight: bold; font-size: 18px; }
        .summary-total { font-size: 24px; color: var(--success); }
        .cart-actions { display: flex; gap: 15px; margin-top: 25px; }
        .cart-actions .btn { flex: 1; }
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
        .empty-state i { font-size: 70px; color: var(--gold); margin-bottom: 20px; }
        .notification {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            max-width: 400px;
            margin: 0 auto;
            padding: 15px 25px;
            border-radius: 12px;
            font-weight: bold;
            z-index: 2000;
            animation: slideIn 0.3s ease;
            text-align: center;
        }
        .notification.success { background: var(--success); color: #000; }
        .notification.error { background: var(--error); color: #fff; }
        .notification.warning { background: #fbbf24; color: #000; }
        @keyframes slideIn {
            from { transform: translateY(-100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @media (max-width: 768px) {
            .header { flex-direction: column; text-align: center; }
            .cart-item { flex-direction: column; align-items: stretch; }
            .cart-actions { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-title">
                <i class="fas fa-shopping-cart"></i>
                <h1>سلة المشتريات</h1>
            </div>
            <div class="header-info">
                <div class="info-item" onclick="window.location.href='index.html'">
                    <i class="fas fa-store"></i>
                    <span>العودة للمتجر</span>
                </div>
                <div class="info-item">
                    <i class="fas fa-shopping-bag"></i>
                    <span>العدد: <strong id="cartCount">0</strong></span>
                </div>
                <div class="info-item">
                    <i class="fas fa-dollar-sign"></i>
                    <span>الإجمالي: <strong id="cartTotal">0</strong> دج</span>
                </div>
            </div>
        </div>

        <div class="cart-section">
            <h2 class="section-title"><i class="fas fa-shopping-basket"></i> المنتجات المضافة</h2>
            <div id="cartContainer"></div>
        </div>
    </div>

    <script>
        // ================================================================
        // نفس المفتاح المستخدم في صفحة المنتجات - مهم جداً!
        // ================================================================
        const CART_STORAGE_KEY = 'nardoo_cart';
        
        let cart = [];

        function saveCart() {
            localStorage.setItem(CART_STORAGE_KEY, JSON.stringify(cart));
            updateCartDisplay();
            updateCartCounters();
        }

        function loadCart() {
            const saved = localStorage.getItem(CART_STORAGE_KEY);
            cart = saved ? JSON.parse(saved) : [];
            updateCartDisplay();
            updateCartCounters();
            console.log('📦 سلة المشتريات:', cart.length, 'عناصر');
        }

        function updateCartCounters() {
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            document.getElementById('cartCount').textContent = count;
            document.getElementById('cartTotal').textContent = total.toLocaleString('ar-EG');
        }

        function showNotification(message, type = 'success') {
            const existing = document.querySelector('.notification');
            if (existing) existing.remove();
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 2500);
        }

        function updateCartQuantity(productId, change) {
            const itemIndex = cart.findIndex(item => item.id === productId);
            if (itemIndex === -1) return;
            
            const item = cart[itemIndex];
            const newQuantity = item.quantity + change;
            
            if (newQuantity <= 0) {
                removeFromCart(productId);
            } else {
                item.quantity = newQuantity;
                saveCart();
                showNotification(`✓ تم تحديث كمية ${item.name}`, 'success');
            }
        }

        function removeFromCart(productId) {
            const item = cart.find(i => i.id === productId);
            if (item) {
                cart = cart.filter(item => item.id !== productId);
                saveCart();
                showNotification(`✓ تم إزالة ${item.name}`, 'success');
            }
        }

        function clearCart() {
            if (cart.length === 0) {
                showNotification('السلة فارغة', 'warning');
                return;
            }
            if (confirm('هل أنت متأكد من مسح جميع المنتجات؟')) {
                cart = [];
                saveCart();
                showNotification('✓ تم مسح السلة', 'success');
            }
        }

        function updateCartDisplay() {
            const container = document.getElementById('cartContainer');
            if (!container) return;
            
            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-shopping-basket"></i>
                        <h3>السلة فارغة</h3>
                        <p>لم تقم بإضافة أي منتجات بعد</p>
                        <button class="btn btn-gold" onclick="window.location.href='index.html'" style="margin-top: 20px;">
                            <i class="fas fa-store"></i> تصفح المنتجات
                        </button>
                    </div>
                `;
                return;
            }

            let totalAmount = 0;
            let totalItems = 0;

            const cartHtml = cart.map(item => {
                const itemTotal = item.price * item.quantity;
                totalAmount += itemTotal;
                totalItems += item.quantity;
                
                return `
                    <div class="cart-item">
                        <div style="display: flex; align-items: center; gap: 15px; flex: 2;">
                            ${item.image ? 
                                `<img src="${item.image}" style="width: 50px; height: 50px; border-radius: 10px; object-fit: cover;" onerror="this.style.display='none'">` : 
                                '<div style="width: 50px; height: 50px; background: rgba(255,215,0,0.1); border-radius: 10px; display: flex; align-items: center; justify-content: center;">📦</div>'
                            }
                            <div class="cart-item-info">
                                <div class="cart-item-name">${item.name}</div>
                                <div class="cart-item-price">${item.price.toLocaleString()} دج / قطعة</div>
                                <div style="font-size: 12px; color: var(--gold);"><i class="fas fa-store"></i> ${item.merchantName || 'ناردو برو'}</div>
                            </div>
                        </div>
                        <div class="cart-item-quantity">
                            <button onclick="updateCartQuantity(${item.id}, -1)">−</button>
                            <span>${item.quantity}</span>
                            <button onclick="updateCartQuantity(${item.id}, 1)">+</button>
                        </div>
                        <div class="cart-item-total">${itemTotal.toLocaleString()} دج</div>
                        <button class="cart-item-remove" onclick="removeFromCart(${item.id})"><i class="fas fa-trash"></i> حذف</button>
                    </div>
                `;
            }).join('');

            const summaryHtml = `
                <div class="cart-summary">
                    <div class="summary-row">
                        <span class="summary-label">عدد العناصر:</span>
                        <span class="summary-value">${totalItems} قطعة</span>
                    </div>
                    <div class="summary-row">
                        <span class="summary-label">عدد المنتجات:</span>
                        <span class="summary-value">${cart.length} منتج</span>
                    </div>
                    <div class="summary-row">
                        <span class="summary-label">الإجمالي:</span>
                        <span class="summary-value summary-total">${totalAmount.toLocaleString()} دج</span>
                    </div>
                    <div class="cart-actions">
                        <button class="btn btn-gold" onclick="checkout()"><i class="fas fa-credit-card"></i> إتمام الشراء</button>
                        <button class="btn btn-outline" onclick="clearCart()"><i class="fas fa-trash-alt"></i> إفراغ السلة</button>
                    </div>
                </div>
            `;

            container.innerHTML = cartHtml + summaryHtml;
        }

        function checkout() {
            if (cart.length === 0) {
                showNotification('السلة فارغة', 'warning');
                return;
            }

            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            let summary = '🛒 ملخص طلبك:\n━━━━━━━━━━━━━━━━━━\n';
            cart.forEach(item => {
                summary += `• ${item.name} × ${item.quantity} = ${(item.price * item.quantity).toLocaleString()} دج\n`;
            });
            summary += `━━━━━━━━━━━━━━━━━━\n💰 الإجمالي: ${total.toLocaleString()} دج`;

            if (confirm(`${summary}\n\nتأكيد الشراء؟`)) {
                cart = [];
                saveCart();
                showNotification('✓ تم إتمام الشراء بنجاح!', 'success');
            }
        }

        // الاستماع للتغييرات من الصفحات الأخرى
        window.addEventListener('storage', function(e) {
            if (e.key === CART_STORAGE_KEY) {
                console.log('🔄 تحديث السلة من صفحة أخرى');
                cart = e.newValue ? JSON.parse(e.newValue) : [];
                updateCartDisplay();
                updateCartCounters();
            }
        });

        loadCart();
        
        window.updateCartQuantity = updateCartQuantity;
        window.removeFromCart = removeFromCart;
        window.clearCart = clearCart;
        window.checkout = checkout;
    </script>
</body>
</html>
