<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>باتل رويال - بيئة ثلاثية الأبعاد</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Tahoma', 'Cairo', sans-serif;
            touch-action: none;
        }
        
        #info {
            position: absolute;
            top: 15px;
            right: 15px;
            left: auto;
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 10px 18px;
            border-radius: 30px;
            pointer-events: none;
            z-index: 100;
            backdrop-filter: blur(10px);
            font-size: 13px;
            text-align: center;
            font-weight: 500;
            border-right: 3px solid #4caf50;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            font-family: 'Cairo', 'Segoe UI', sans-serif;
        }
        
        #controls-info {
            position: absolute;
            bottom: 15px;
            left: 15px;
            right: 15px;
            background: rgba(0,0,0,0.75);
            color: #ddd;
            padding: 8px 12px;
            border-radius: 25px;
            font-size: 11px;
            pointer-events: none;
            backdrop-filter: blur(8px);
            text-align: center;
            z-index: 100;
            font-weight: 500;
            direction: ltr;
        }
        
        #controls-info span {
            display: inline-block;
            margin: 0 5px;
        }
        
        #controls-info .separator {
            color: #4caf50;
            margin: 0 3px;
        }
        
        @media (max-width: 600px) {
            #info { 
                font-size: 10px; 
                padding: 6px 12px; 
                top: 10px;
                right: 10px;
            }
            #controls-info { 
                font-size: 9px; 
                padding: 6px 10px; 
                bottom: 10px;
            }
        }
        
        @media (min-width: 768px) {
            #info { 
                font-size: 14px; 
                top: 20px;
                right: 20px;
                padding: 12px 24px;
            }
            #controls-info { 
                font-size: 12px; 
                bottom: 20px;
                left: 20px;
                right: auto;
                padding: 10px 20px;
            }
        }
        
        /* مؤشر تحميل */
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 20px;
            z-index: 1000;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="info">
        🎮 بيئة باتل رويال | 🌳 أشجار | ☁️ سحب متحركة | ⭐ نجوم
    </div>
    <div id="controls-info">
        <span>🖱️ الفأرة: تدوير</span>
        <span class="separator">|</span>
        <span>👆 إصبع: تدوير</span>
        <span class="separator">|</span>
        <span>✌️ إصبعين: تحريك</span>
        <span class="separator">|</span>
        <span>🔍 عجلة/قرص: تكبير</span>
    </div>
    <div class="loading" id="loading">جاري تحميل البيئة...</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // إخفاء مؤشر التحميل
        setTimeout(() => {
            const loading = document.getElementById('loading');
            if (loading) loading.style.display = 'none';
        }, 500);

        // كشف جهاز الجوال
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        
        // إعداد المشهد
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a1030);
        scene.fog = new THREE.FogExp2(0x0a1030, isMobile ? 0.012 : 0.008);

        const camera = new THREE.PerspectiveCamera(isMobile ? 70 : 65, window.innerWidth / window.innerHeight, 0.1, 200);
        const renderer = new THREE.WebGLRenderer({ antialias: !isMobile });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = isMobile ? THREE.PCFShadowMap : THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // الإضاءة
        const sunLight = new THREE.DirectionalLight(0xfff5c0, isMobile ? 1.1 : 1.3);
        sunLight.position.set(12, 18, 8);
        sunLight.castShadow = true;
        sunLight.receiveShadow = true;
        sunLight.shadow.mapSize.width = isMobile ? 1024 : 2048;
        sunLight.shadow.mapSize.height = isMobile ? 1024 : 2048;
        sunLight.shadow.camera.near = 0.5;
        sunLight.shadow.camera.far = 50;
        sunLight.shadow.camera.left = -15;
        sunLight.shadow.camera.right = 15;
        sunLight.shadow.camera.top = 15;
        sunLight.shadow.camera.bottom = -15;
        scene.add(sunLight);
        
        const ambientLight = new THREE.AmbientLight(0x404060, 0.6);
        scene.add(ambientLight);
        
        const fillLight = new THREE.PointLight(0x6688aa, 0.3);
        fillLight.position.set(-5, 8, -8);
        scene.add(fillLight);
        
        const backLight = new THREE.PointLight(0xffaa66, 0.2);
        backLight.position.set(0, 5, -10);
        scene.add(backLight);

        // الأرضية
        const groundGeo = new THREE.PlaneGeometry(120, 120);
        const groundMat = new THREE.MeshStandardMaterial({ 
            color: 0x5a8e5a,
            roughness: 0.85,
            metalness: 0.05
        });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.1;
        ground.receiveShadow = true;
        scene.add(ground);
        
        // شبكة مساعدة
        const gridHelper = new THREE.GridHelper(100, isMobile ? 15 : 25, 0x88aa88, 0x446644);
        gridHelper.position.y = 0;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.35;
        scene.add(gridHelper);
        
        // حلقة زخرفية
        const ringGeo = new THREE.RingGeometry(48, 52, 32);
        const ringMat = new THREE.MeshStandardMaterial({ color: 0x8b5a2b, side: THREE.DoubleSide, transparent: true, opacity: 0.25 });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.rotation.x = -Math.PI / 2;
        ring.position.y = 0.02;
        scene.add(ring);

        // إنشاء الأشجار
        function createTree(x, z) {
            const treeGroup = new THREE.Group();
            
            const trunkHeight = 1.0 + Math.random() * 0.4;
            const trunkGeo = new THREE.CylinderGeometry(0.28, 0.38, trunkHeight, isMobile ? 5 : 6);
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8b5a2b, roughness: 0.75 });
            const trunk = new THREE.Mesh(trunkGeo, trunkMat);
            trunk.castShadow = true;
            trunk.receiveShadow = true;
            trunk.position.y = trunkHeight / 2;
            
            const leavesMat = new THREE.MeshStandardMaterial({ color: 0x4cae4c, roughness: 0.45 });
            
            const leaves1Geo = new THREE.ConeGeometry(0.75, 1.1, isMobile ? 6 : 8);
            const leaves1 = new THREE.Mesh(leaves1Geo, leavesMat);
            leaves1.castShadow = true;
            leaves1.position.y = trunkHeight + 0.2;
            
            const leaves2Geo = new THREE.ConeGeometry(0.6, 0.95, isMobile ? 6 : 8);
            const leaves2 = new THREE.Mesh(leaves2Geo, leavesMat);
            leaves2.castShadow = true;
            leaves2.position.y = trunkHeight + 1.0;
            
            const leaves3Geo = new THREE.ConeGeometry(0.45, 0.8, isMobile ? 6 : 8);
            const leaves3 = new THREE.Mesh(leaves3Geo, leavesMat);
            leaves3.castShadow = true;
            leaves3.position.y = trunkHeight + 1.7;
            
            treeGroup.add(trunk);
            treeGroup.add(leaves1);
            treeGroup.add(leaves2);
            treeGroup.add(leaves3);
            
            treeGroup.position.set(x, 0, z);
            scene.add(treeGroup);
            return treeGroup;
        }

        // توزيع الأشجار
        const trees = [];
        const treeCount = isMobile ? 65 : 95;
        
        for (let i = 0; i < treeCount; i++) {
            let x, z;
            let attempts = 0;
            let placed = false;
            
            while (!placed && attempts < 25) {
                if (i < 45) {
                    const angle = Math.random() * Math.PI * 2;
                    const radius = Math.pow(Math.random(), 1.5) * 32;
                    x = Math.cos(angle) * radius;
                    z = Math.sin(angle) * radius;
                } else {
                    x = Math.random() * 100 - 50;
                    z = Math.random() * 100 - 50;
                }
                
                let tooClose = false;
                for (let tree of trees) {
                    if (Math.hypot(x - tree.x, z - tree.z) < 1.8) {
                        tooClose = true;
                        break;
                    }
                }
                
                if (!tooClose && Math.abs(x) < 48 && Math.abs(z) < 48) {
                    createTree(x, z);
                    trees.push({ x, z });
                    placed = true;
                }
                attempts++;
            }
        }

        // صخور
        function createRock(x, z, size) {
            const rockMat = new THREE.MeshStandardMaterial({ color: 0x7a6e5d, roughness: 0.88 });
            const rock = new THREE.Mesh(new THREE.DodecahedronGeometry(size * 0.7), rockMat);
            rock.scale.set(1, 0.5 + Math.random() * 0.3, 0.8);
            rock.castShadow = true;
            rock.receiveShadow = true;
            rock.position.set(x, size * 0.2, z);
            scene.add(rock);
        }
        
        const rockCount = isMobile ? 35 : 60;
        for (let i = 0; i < rockCount; i++) {
            const x = Math.random() * 92 - 46;
            const z = Math.random() * 92 - 46;
            const size = Math.random() * 0.25 + 0.12;
            if (Math.hypot(x, z) > 3) {
                createRock(x, z, size);
            }
        }
        
        // عشب
        const grassCount = isMobile ? 1200 : 2200;
        const grassGeometry = new THREE.BufferGeometry();
        const grassPositions = [];
        
        for (let i = 0; i < grassCount; i++) {
            const x = Math.random() * 110 - 55;
            const z = Math.random() * 110 - 55;
            if (Math.abs(x) < 52 && Math.abs(z) < 52) {
                grassPositions.push(x, 0.05, z);
            }
        }
        
        grassGeometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(grassPositions), 3));
        const grassMaterial = new THREE.PointsMaterial({ color: 0x6aba6a, size: isMobile ? 0.06 : 0.07 });
        const grassField = new THREE.Points(grassGeometry, grassMaterial);
        scene.add(grassField);
        
        // سحب
        const cloudMat = new THREE.MeshStandardMaterial({ color: 0xf0f8ff, transparent: true, opacity: 0.85 });
        
        function createCloud(x, y, z, scale) {
            const cloudGroup = new THREE.Group();
            const parts = [
                { x: 0, y: 0, z: 0, s: 0.8 },
                { x: 0.65, y: -0.1, z: 0.3, s: 0.65 },
                { x: -0.55, y: -0.1, z: 0.25, s: 0.7 },
                { x: 0.2, y: 0.15, z: 0.7, s: 0.55 },
                { x: -0.15, y: -0.2, z: -0.55, s: 0.6 }
            ];
            
            parts.forEach(part => {
                const sphere = new THREE.Mesh(new THREE.SphereGeometry(0.5, isMobile ? 5 : 7, isMobile ? 5 : 7), cloudMat);
                sphere.position.set(part.x, part.y, part.z);
                sphere.scale.set(part.s * scale, part.s * scale * 0.7, part.s * scale);
                cloudGroup.add(sphere);
            });
            
            cloudGroup.position.set(x, y, z);
            scene.add(cloudGroup);
            return cloudGroup;
        }
        
        const cloudList = [
            createCloud(-18, 9, -12, 1.2),
            createCloud(5, 10, -15, 1.4),
            createCloud(12, 8.5, -5, 1.0),
            createCloud(-5, 9.5, 8, 1.1),
            createCloud(20, 8, 10, 1.3),
            createCloud(-22, 8.2, 5, 1.0),
            createCloud(0, 11, -20, 0.9)
        ];
        
        // نجوم
        const starCount = isMobile ? 1000 : 1800;
        const starGeometry = new THREE.BufferGeometry();
        const starPositions = [];
        
        for (let i = 0; i < starCount; i++) {
            starPositions.push(
                (Math.random() - 0.5) * 400,
                Math.random() * 100 + 15,
                (Math.random() - 0.5) * 180 - 70
            );
        }
        
        starGeometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(starPositions), 3));
        const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: isMobile ? 0.08 : 0.1, transparent: true, opacity: 0.7 });
        const stars = new THREE.Points(starGeometry, starMaterial);
        scene.add(stars);
        
        // طائر متحرك
        const birdGroup = new THREE.Group();
        const birdMat = new THREE.MeshStandardMaterial({ color: 0xccaa77 });
        const birdBody = new THREE.Mesh(new THREE.SphereGeometry(0.12, 6), birdMat);
        const birdWingL = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.05, 0.1), birdMat);
        birdWingL.position.set(-0.15, 0, 0);
        const birdWingR = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.05, 0.1), birdMat);
        birdWingR.position.set(0.15, 0, 0);
        birdGroup.add(birdBody);
        birdGroup.add(birdWingL);
        birdGroup.add(birdWingR);
        birdGroup.position.set(-12, 6, -8);
        scene.add(birdGroup);
        
        // جزيئات متطايرة
        const particleCount = isMobile ? 300 : 600;
        const particleGeometry = new THREE.BufferGeometry();
        const particlePositions = [];
        
        for (let i = 0; i < particleCount; i++) {
            particlePositions.push(
                (Math.random() - 0.5) * 100,
                Math.random() * 12,
                (Math.random() - 0.5) * 100
            );
        }
        particleGeometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(particlePositions), 3));
        const particleMaterial = new THREE.PointsMaterial({ color: 0xaaccaa, size: 0.04, transparent: true, opacity: 0.4 });
        const particles = new THREE.Points(particleGeometry, particleMaterial);
        scene.add(particles);
        
        // تحكم الكاميرا
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.07;
        controls.rotateSpeed = isMobile ? 0.8 : 1.0;
        controls.zoomSpeed = isMobile ? 0.8 : 1.0;
        controls.panSpeed = isMobile ? 0.6 : 0.8;
        controls.touchRotate = true;
        controls.touchZoom = true;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.target.set(0, 3, 0);
        
        if (isMobile) {
            camera.position.set(10, 7, 12);
        } else {
            camera.position.set(12, 8, 15);
        }
        controls.update();
        
        // متغيرات التحريك
        let time = 0;
        let birdAngle = 0;
        let wingAngle = 0;
        let wingDirection = 1;
        
        // حلقة التحديث
        function animate() {
            requestAnimationFrame(animate);
            
            time += 0.008;
            birdAngle += 0.012;
            wingAngle += 0.08 * wingDirection;
            
            if (wingAngle > 0.5) wingDirection = -1;
            if (wingAngle < -0.5) wingDirection = 1;
            
            // تحريك السحب
            cloudList.forEach((cloud, idx) => {
                cloud.position.x += 0.0025 * (idx % 2 === 0 ? 1 : -0.7);
                if (cloud.position.x > 32) cloud.position.x = -28;
                if (cloud.position.x < -32) cloud.position.x = 28;
            });
            
            // تحريك النجوم
            stars.rotation.y += 0.00025;
            stars.rotation.x = Math.sin(time * 0.05) * 0.03;
            
            // تحريك الطائر
            birdGroup.position.x = -12 + Math.sin(birdAngle) * 20;
            birdGroup.position.z = -8 + Math.cos(birdAngle * 0.7) * 14;
            birdGroup.position.y = 6 + Math.sin(birdAngle * 1.5) * 1.2;
            birdGroup.children[1].rotation.z = wingAngle;
            birdGroup.children[2].rotation.z = -wingAngle;
            
            // تحريك الجزيئات
            particles.rotation.y += 0.0015;
            
            // تغيير شدة الإضاءة
            const cloudCover = Math.sin(time * 0.1) * 0.1;
            sunLight.intensity = (isMobile ? 1.05 : 1.15) + cloudCover * 0.1;
            backLight.intensity = 0.2 + Math.sin(time * 0.15) * 0.05;
            
            controls.update();
            renderer.render(scene, camera);
        }
        
        animate();
        
        // التكيف مع تغيير حجم الشاشة
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // عرض معلومات في console
        console.log('✅ بيئة باتل رويال ثلاثية الأبعاد جاهزة!');
        console.log(`📱 وضع الجوال: ${isMobile ? "نشط" : "غير نشط"}`);
        console.log(`🌳 عدد الأشجار: ${trees.length}`);
        console.log(`☁️ عدد السحب: ${cloudList.length}`);
        console.log(`⭐ عدد النجوم: ${starCount}`);
        console.log(`🪨 عدد الصخور: ${rockCount}`);
        console.log(`🦅 طائر يطير في السماء`);
    </script>
</body>
</html>
