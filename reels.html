<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ناردو برو - سلتي</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --gold: #ffd700;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --glass: rgba(255, 255, 255, 0.05);
            --success: #4ade80;
            --error: #f87171;
            --warning: #fbbf24;
            --info: #60a5fa;
        }
        
        /* ألوان التجار - كل تاجر له لون مختلف */
        .merchant-color-0 { border-right: 5px solid #ff6b6b; }
        .merchant-color-1 { border-right: 5px solid #4ecdc4; }
        .merchant-color-2 { border-right: 5px solid #45b7d1; }
        .merchant-color-3 { border-right: 5px solid #96ceb4; }
        .merchant-color-4 { border-right: 5px solid #ffeaa7; }
        .merchant-color-5 { border-right: 5px solid #dfe6e9; }
        .merchant-color-6 { border-right: 5px solid #fd79a8; }
        .merchant-color-7 { border-right: 5px solid #e84393; }
        .merchant-color-8 { border-right: 5px solid #6c5ce7; }
        .merchant-color-9 { border-right: 5px solid #a29bfe; }
        
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0f3460, #16213e);
            color: var(--text-primary);
            direction: rtl;
        }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        
        /* الهيدر */
        .header {
            background: var(--glass);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }
        .header-title { display: flex; align-items: center; gap: 15px; }
        .header-title i { font-size: 40px; color: var(--gold); }
        .header-title h1 { font-size: 32px; color: var(--gold); margin: 0; }
        .header-info { display: flex; gap: 20px; flex-wrap: wrap; }
        .info-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 215, 0, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .info-item:hover { background: rgba(255, 215, 0, 0.2); }
        
        /* أزرار */
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s;
        }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-gold:hover { background: #ffed4e; transform: translateY(-2px); }
        .btn-outline { background: transparent; border: 2px solid var(--gold); color: var(--gold); }
        .btn-outline:hover { background: rgba(255, 215, 0, 0.1); }
        .btn-success { background: var(--success); color: #000; }
        .btn-success:hover { background: #5ee890; transform: translateY(-2px); }
        .btn-danger { background: rgba(248, 113, 113, 0.2); border: 1px solid var(--error); color: var(--error); }
        .btn-danger:hover { background: var(--error); color: white; }
        
        /* أقسام التجار */
        .merchant-section {
            background: var(--glass);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 20px;
            margin-bottom: 25px;
            overflow: hidden;
            transition: all 0.3s;
        }
        .merchant-header {
            background: rgba(255, 215, 0, 0.1);
            padding: 20px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.2);
            cursor: pointer;
            transition: all 0.3s;
        }
        .merchant-header:hover { background: rgba(255, 215, 0, 0.15); }
        .merchant-info { display: flex; align-items: center; gap: 15px; }
        .merchant-avatar {
            width: 50px;
            height: 50px;
            background: rgba(255, 215, 0, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .merchant-name { font-size: 20px; font-weight: bold; color: var(--gold); }
        .merchant-stats { display: flex; gap: 20px; font-size: 14px; color: var(--text-secondary); }
        .merchant-stats span { color: var(--gold); font-weight: bold; }
        .merchant-toggle { font-size: 20px; transition: transform 0.3s; }
        .merchant-toggle.collapsed { transform: rotate(-90deg); }
        
        /* المنتجات داخل التاجر */
        .merchant-products {
            padding: 20px;
            transition: all 0.3s;
        }
        .merchant-products.collapsed { display: none; }
        
        .cart-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 215, 0, 0.15);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s;
        }
        .cart-item:hover {
            border-color: var(--gold);
            background: rgba(255, 215, 0, 0.05);
        }
        
        /* صورة المنتج المصغرة */
        .product-thumbnail {
            width: 70px;
            height: 70px;
            border-radius: 12px;
            overflow: hidden;
            background: rgba(255, 215, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .product-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .product-thumbnail i { font-size: 30px; color: var(--gold); }
        
        /* معلومات المنتج */
        .product-details {
            flex: 2;
            min-width: 150px;
        }
        .product-name {
            font-size: 16px;
            font-weight: bold;
            color: var(--gold);
            margin-bottom: 5px;
        }
        .product-price {
            font-size: 13px;
            color: var(--success);
        }
        
        /* التحكم في الكمية */
        .cart-item-quantity {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 215, 0, 0.1);
            padding: 8px 15px;
            border-radius: 10px;
            flex-shrink: 0;
        }
        .cart-item-quantity button {
            background: none;
            border: none;
            color: var(--gold);
            cursor: pointer;
            font-size: 18px;
            width: 30px;
            height: 30px;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .cart-item-quantity button:hover { background: rgba(255, 215, 0, 0.2); }
        .cart-item-quantity span { font-size: 16px; font-weight: bold; min-width: 30px; text-align: center; }
        
        .cart-item-total {
            font-size: 16px;
            font-weight: bold;
            color: var(--gold);
            min-width: 100px;
            text-align: center;
            flex-shrink: 0;
        }
        
        .cart-item-remove {
            background: rgba(248, 113, 113, 0.2);
            color: var(--error);
            border: 1px solid var(--error);
            padding: 8px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .cart-item-remove:hover { background: var(--error); color: white; }
        
        /* الملخص */
        .cart-summary {
            background: rgba(255, 215, 0, 0.05);
            border-radius: 15px;
            padding: 25px;
            margin-top: 20px;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.1);
        }
        .summary-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .summary-label { color: var(--text-secondary); font-size: 16px; }
        .summary-value { color: var(--gold); font-weight: bold; font-size: 18px; }
        .summary-total { font-size: 24px; color: var(--success); }
        
        .cart-actions {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }
        .cart-actions .btn { flex: 1; }
        
        /* نافذة معلومات المشتري */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 3000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: var(--secondary);
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            border: 2px solid var(--gold);
        }
        .modal-content h2 {
            color: var(--gold);
            margin-bottom: 20px;
            text-align: center;
        }
        .modal-content input, .modal-content textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: 1px solid rgba(255,215,0,0.3);
            background: rgba(255,255,255,0.1);
            color: white;
            font-family: 'Cairo', sans-serif;
        }
        .modal-content textarea { resize: vertical; min-height: 80px; }
        .modal-buttons { display: flex; gap: 15px; margin-top: 20px; }
        .modal-buttons button { flex: 1; }
        
        /* الحالة الفارغة */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
        .empty-state i { font-size: 70px; color: var(--gold); margin-bottom: 20px; }
        .empty-state h3 { font-size: 24px; margin-bottom: 10px; color: var(--text-primary); }
        
        /* الإشعارات */
        .notification {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            max-width: 400px;
            margin: 0 auto;
            padding: 15px 25px;
            border-radius: 12px;
            font-weight: bold;
            z-index: 2000;
            animation: slideIn 0.3s ease;
            text-align: center;
        }
        .notification.success { background: var(--success); color: #000; }
        .notification.error { background: var(--error); color: #fff; }
        .notification.warning { background: var(--warning); color: #000; }
        
        @keyframes slideIn {
            from { transform: translateY(-100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        /* استجابة */
        @media (max-width: 768px) {
            .header { flex-direction: column; text-align: center; }
            .cart-item { flex-wrap: wrap; }
            .product-thumbnail { width: 50px; height: 50px; }
            .cart-item-quantity { order: 2; }
            .cart-item-total { order: 3; }
            .cart-item-remove { order: 4; width: 100%; text-align: center; }
            .cart-actions { flex-direction: column; }
            .merchant-stats { flex-direction: column; gap: 5px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-title">
                <i class="fas fa-shopping-cart"></i>
                <h1>سلة المشتريات</h1>
            </div>
            <div class="header-info">
                <div class="info-item" onclick="window.location.href='index.html'">
                    <i class="fas fa-store"></i>
                    <span>العودة للمتجر</span>
                </div>
                <div class="info-item">
                    <i class="fas fa-shopping-bag"></i>
                    <span>العدد: <strong id="cartCount">0</strong></span>
                </div>
                <div class="info-item">
                    <i class="fas fa-dollar-sign"></i>
                    <span>الإجمالي: <strong id="cartTotal">0</strong> دج</span>
                </div>
                <div class="info-item" onclick="clearCart()">
                    <i class="fas fa-trash-alt"></i>
                    <span>مسح الكل</span>
                </div>
            </div>
        </div>

        <div class="cart-section">
            <h2 class="section-title"><i class="fas fa-shopping-basket"></i> المنتجات المضافة</h2>
            <div id="cartContainer"></div>
        </div>
    </div>

    <!-- نافذة معلومات المشتري -->
    <div id="customerModal" class="modal">
        <div class="modal-content">
            <h2><i class="fas fa-user"></i> معلومات المشتري</h2>
            <input type="text" id="customerName" placeholder="الاسم الكامل" required>
            <input type="tel" id="customerPhone" placeholder="رقم الهاتف" required>
            <input type="text" id="customerAddress" placeholder="عنوان التوصيل" required>
            <textarea id="customerNotes" placeholder="ملاحظات إضافية (اختياري)"></textarea>
            <div class="modal-buttons">
                <button class="btn btn-gold" onclick="submitOrder()">تأكيد الطلب</button>
                <button class="btn btn-outline" onclick="closeModal()">إلغاء</button>
            </div>
        </div>
    </div>

    <script>
        // ================================================================
        // إعدادات تلغرام
        // ================================================================
        const TELEGRAM = {
            botToken: '8576673096:AAGvSMjzwVWj6wJ47JdqiDwcObXjBDcyiLA',
            channelId: '-1003822964890',
            apiUrl: 'https://api.telegram.org/bot'
        };
        
        const CART_STORAGE_KEY = 'nardoo_cart';
        
        let cart = [];
        let merchantsState = JSON.parse(localStorage.getItem('merchants_state') || '{}');

        // ألوان متغيرة للتجار
        let merchantColors = {};

        function getMerchantColor(merchantName) {
            if (!merchantColors[merchantName]) {
                const colors = ['merchant-color-0', 'merchant-color-1', 'merchant-color-2', 'merchant-color-3', 
                               'merchant-color-4', 'merchant-color-5', 'merchant-color-6', 'merchant-color-7', 
                               'merchant-color-8', 'merchant-color-9'];
                const index = Object.keys(merchantColors).length % colors.length;
                merchantColors[merchantName] = colors[index];
            }
            return merchantColors[merchantName];
        }

        function saveMerchantsState() {
            localStorage.setItem('merchants_state', JSON.stringify(merchantsState));
        }

        function toggleMerchant(merchantName) {
            merchantsState[merchantName] = !merchantsState[merchantName];
            saveMerchantsState();
            updateCartDisplay();
        }

        function saveCart() {
            localStorage.setItem(CART_STORAGE_KEY, JSON.stringify(cart));
            updateCartCounters();
        }

        function loadCart() {
            const saved = localStorage.getItem(CART_STORAGE_KEY);
            cart = saved ? JSON.parse(saved) : [];
            updateCartDisplay();
            updateCartCounters();
            console.log('📦 سلة المشتريات:', cart.length, 'عناصر');
        }

        function updateCartCounters() {
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const cartCount = document.getElementById('cartCount');
            const cartTotal = document.getElementById('cartTotal');
            if (cartCount) cartCount.textContent = count;
            if (cartTotal) cartTotal.textContent = total.toLocaleString('ar-EG');
        }

        function showNotification(message, type = 'success') {
            const existing = document.querySelector('.notification');
            if (existing) existing.remove();
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i> ${message}`;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 3000);
        }

        function updateCartQuantity(productId, change) {
            const itemIndex = cart.findIndex(item => item.id === productId);
            if (itemIndex === -1) return;
            
            const item = cart[itemIndex];
            const newQuantity = item.quantity + change;
            
            if (newQuantity <= 0) {
                removeFromCart(productId);
            } else {
                item.quantity = newQuantity;
                saveCart();
                updateCartDisplay();
                showNotification(`✓ تم تحديث كمية ${item.name}`, 'success');
            }
        }

        function removeFromCart(productId) {
            const item = cart.find(i => i.id === productId);
            if (item) {
                cart = cart.filter(item => item.id !== productId);
                saveCart();
                updateCartDisplay();
                showNotification(`✓ تم إزالة ${item.name}`, 'success');
            }
        }

        function clearCart() {
            if (cart.length === 0) {
                showNotification('السلة فارغة', 'warning');
                return;
            }
            if (confirm('هل أنت متأكد من مسح جميع المنتجات؟')) {
                cart = [];
                saveCart();
                updateCartDisplay();
                showNotification('✓ تم مسح السلة', 'success');
            }
        }

        // تجميع المنتجات حسب التاجر
        function groupByMerchant(items) {
            const grouped = {};
            items.forEach(item => {
                const merchant = item.merchantName || 'ناردو برو';
                if (!grouped[merchant]) {
                    grouped[merchant] = {
                        name: merchant,
                        items: [],
                        total: 0,
                        count: 0
                    };
                }
                grouped[merchant].items.push(item);
                grouped[merchant].total += item.price * item.quantity;
                grouped[merchant].count += item.quantity;
            });
            return grouped;
        }

        // ================================================================
        // إرسال الطلب إلى تلغرام
        // ================================================================
        async function sendOrderToTelegram(customerData, groupedMerchants, grandTotal) {
            const timestamp = new Date().toLocaleString('ar-EG');
            const orderId = Math.floor(Math.random() * 1000000);
            
            // إنشاء رسالة منظمة لكل تاجر على حدة
            let allMessages = [];
            
            for (const [merchantName, merchantData] of Object.entries(groupedMerchants)) {
                let message = `🛍️ *فاتورة طلب جديد* 🛍️\n`;
                message += `━━━━━━━━━━━━━━━━━━━━━━\n`;
                message += `🏪 *التاجر:* ${merchantName}\n`;
                message += `👤 *المشتري:* ${customerData.name}\n`;
                message += `📞 *الهاتف:* ${customerData.phone}\n`;
                message += `📍 *العنوان:* ${customerData.address}\n`;
                message += `━━━━━━━━━━━━━━━━━━━━━━\n`;
                message += `📦 *المنتجات المشتراة:*\n`;
                
                merchantData.items.forEach((item, idx) => {
                    const itemTotal = item.price * item.quantity;
                    message += `${idx + 1} • ${item.name}\n`;
                    message += `   الكمية: ${item.quantity} × ${item.price.toLocaleString()} دج = ${itemTotal.toLocaleString()} دج\n`;
                });
                
                message += `━━━━━━━━━━━━━━━━━━━━━━\n`;
                message += `💰 *إجمالي التاجر:* ${merchantData.total.toLocaleString()} دج\n`;
                message += `━━━━━━━━━━━━━━━━━━━━━━\n`;
                
                if (customerData.notes) {
                    message += `📝 *ملاحظات:* ${customerData.notes}\n`;
                    message += `━━━━━━━━━━━━━━━━━━━━━━\n`;
                }
                
                message += `🆔 *رقم الطلب:* ${orderId}\n`;
                message += `📅 *التاريخ:* ${timestamp}\n`;
                message += `━━━━━━━━━━━━━━━━━━━━━━\n`;
                message += `✅ *حالة الطلب:* قيد المعالجة\n`;
                message += `🔗 *ناردو برو - نظام التسوق الذكي*`;
                
                allMessages.push(message);
            }
            
            // رسالة إجمالية للقناة
            let channelMessage = `🟢 *طلب جديد في النظام* 🟢\n`;
            channelMessage += `━━━━━━━━━━━━━━━━━━━━━━\n`;
            channelMessage += `👤 *المشتري:* ${customerData.name}\n`;
            channelMessage += `📞 *الهاتف:* ${customerData.phone}\n`;
            channelMessage += `📍 *العنوان:* ${customerData.address}\n`;
            channelMessage += `━━━━━━━━━━━━━━━━━━━━━━\n`;
            channelMessage += `📊 *تفاصيل الطلب:*\n`;
            
            for (const [merchantName, merchantData] of Object.entries(groupedMerchants)) {
                channelMessage += `\n🏪 ${merchantName}:\n`;
                merchantData.items.forEach(item => {
                    channelMessage += `   • ${item.name} × ${item.quantity} = ${(item.price * item.quantity).toLocaleString()} دج\n`;
                });
                channelMessage += `   📦 إجمالي: ${merchantData.total.toLocaleString()} دج\n`;
            }
            
            channelMessage += `━━━━━━━━━━━━━━━━━━━━━━\n`;
            channelMessage += `💰 *الإجمالي الكلي:* ${grandTotal.toLocaleString()} دج\n`;
            channelMessage += `🆔 *رقم الطلب:* ${orderId}\n`;
            channelMessage += `📅 *التاريخ:* ${timestamp}\n`;
            channelMessage += `━━━━━━━━━━━━━━━━━━━━━━\n`;
            channelMessage += `✅ تم استلام الطلب بنجاح، سيتم التواصل معك قريباً`;
            
            try {
                // إرسال رسالة لكل تاجر على حدة (للتلغرام)
                for (const message of allMessages) {
                    await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: TELEGRAM.channelId,
                            text: message,
                            parse_mode: 'Markdown'
                        })
                    });
                }
                
                // إرسال رسالة إجمالية للقناة
                await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: TELEGRAM.channelId,
                        text: channelMessage,
                        parse_mode: 'Markdown'
                    })
                });
                
                return true;
            } catch (error) {
                console.error('❌ خطأ في الإرسال:', error);
                return false;
            }
        }

        // فتح نافذة معلومات المشتري
        let pendingGroupedMerchants = null;
        let pendingGrandTotal = null;
        
        function openCustomerModal() {
            if (cart.length === 0) {
                showNotification('السلة فارغة، أضف منتجات أولاً', 'warning');
                return;
            }
            
            const grouped = groupByMerchant(cart);
            const grandTotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            
            pendingGroupedMerchants = grouped;
            pendingGrandTotal = grandTotal;
            
            const modal = document.getElementById('customerModal');
            if (modal) {
                // تنظيف الحقول
                document.getElementById('customerName').value = '';
                document.getElementById('customerPhone').value = '';
                document.getElementById('customerAddress').value = '';
                document.getElementById('customerNotes').value = '';
                modal.style.display = 'flex';
            }
        }
        
        function closeModal() {
            const modal = document.getElementById('customerModal');
            if (modal) modal.style.display = 'none';
            pendingGroupedMerchants = null;
            pendingGrandTotal = null;
        }
        
        async function submitOrder() {
            const name = document.getElementById('customerName').value.trim();
            const phone = document.getElementById('customerPhone').value.trim();
            const address = document.getElementById('customerAddress').value.trim();
            const notes = document.getElementById('customerNotes').value.trim();
            
            if (!name) {
                showNotification('الرجاء إدخال الاسم', 'error');
                return;
            }
            if (!phone) {
                showNotification('الرجاء إدخال رقم الهاتف', 'error');
                return;
            }
            if (!address) {
                showNotification('الرجاء إدخال عنوان التوصيل', 'error');
                return;
            }
            
            showNotification('جاري إرسال الطلب...', 'info');
            
            const customerData = {
                name: name,
                phone: phone,
                address: address,
                notes: notes
            };
            
            const success = await sendOrderToTelegram(customerData, pendingGroupedMerchants, pendingGrandTotal);
            
            if (success) {
                // تفريغ السلة بعد إرسال الطلب بنجاح
                cart = [];
                saveCart();
                updateCartDisplay();
                closeModal();
                showNotification('✓ تم إرسال الطلب بنجاح! سيتم التواصل معك قريباً', 'success');
            } else {
                showNotification('❌ فشل إرسال الطلب، حاول مرة أخرى', 'error');
            }
        }

        function updateCartDisplay() {
            const container = document.getElementById('cartContainer');
            if (!container) return;
            
            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-shopping-basket"></i>
                        <h3>السلة فارغة</h3>
                        <p>لم تقم بإضافة أي منتجات بعد</p>
                        <button class="btn btn-gold" onclick="window.location.href='index.html'" style="margin-top: 20px;">
                            <i class="fas fa-store"></i> تصفح المنتجات
                        </button>
                    </div>
                `;
                return;
            }

            const groupedMerchants = groupByMerchant(cart);
            let grandTotal = 0;
            let grandCount = 0;
            let merchantsHtml = '';

            let merchantIndex = 0;
            for (const [merchantName, merchantData] of Object.entries(groupedMerchants)) {
                grandTotal += merchantData.total;
                grandCount += merchantData.count;
                
                const isCollapsed = merchantsState[merchantName] === true;
                const colorClass = getMerchantColor(merchantName);
                
                let itemsHtml = '';
                for (const item of merchantData.items) {
                    const itemTotal = item.price * item.quantity;
                    
                    const thumbnailHtml = item.image ? 
                        `<img src="${item.image}" alt="${item.name}" onerror="this.parentElement.innerHTML='<i class=\'fas fa-box\'></i>'">` :
                        '<i class="fas fa-box"></i>';
                    
                    itemsHtml += `
                        <div class="cart-item">
                            <div class="product-thumbnail">
                                ${thumbnailHtml}
                            </div>
                            <div class="product-details">
                                <div class="product-name">${item.name}</div>
                                <div class="product-price">${item.price.toLocaleString()} دج / قطعة</div>
                            </div>
                            <div class="cart-item-quantity">
                                <button onclick="updateCartQuantity(${item.id}, -1)">−</button>
                                <span>${item.quantity}</span>
                                <button onclick="updateCartQuantity(${item.id}, 1)">+</button>
                            </div>
                            <div class="cart-item-total">
                                ${itemTotal.toLocaleString()} دج
                            </div>
                            <button class="cart-item-remove" onclick="removeFromCart(${item.id})">
                                <i class="fas fa-trash"></i> حذف
                            </button>
                        </div>
                    `;
                }
                
                merchantsHtml += `
                    <div class="merchant-section ${colorClass}" style="border-right-width: 5px; border-right-style: solid;">
                        <div class="merchant-header" onclick="toggleMerchant('${merchantName.replace(/'/g, "\\'")}')">
                            <div class="merchant-info">
                                <div class="merchant-avatar">
                                    <i class="fas fa-store"></i>
                                </div>
                                <div>
                                    <div class="merchant-name">${merchantName}</div>
                                    <div class="merchant-stats">
                                        <span>📦 ${merchantData.count} منتج</span>
                                        <span>💰 ${merchantData.total.toLocaleString()} دج</span>
                                    </div>
                                </div>
                            </div>
                            <div class="merchant-toggle ${isCollapsed ? 'collapsed' : ''}">
                                <i class="fas fa-chevron-down"></i>
                            </div>
                        </div>
                        <div class="merchant-products ${isCollapsed ? 'collapsed' : ''}">
                            ${itemsHtml}
                        </div>
                    </div>
                `;
                merchantIndex++;
            }

            const summaryHtml = `
                <div class="cart-summary">
                    <div class="summary-row">
                        <span class="summary-label">عدد العناصر:</span>
                        <span class="summary-value">${grandCount} قطعة</span>
                    </div>
                    <div class="summary-row">
                        <span class="summary-label">عدد التجار:</span>
                        <span class="summary-value">${Object.keys(groupedMerchants).length} تاجر</span>
                    </div>
                    <div class="summary-row">
                        <span class="summary-label">الإجمالي النهائي:</span>
                        <span class="summary-value summary-total">${grandTotal.toLocaleString()} دج</span>
                    </div>
                    <div class="cart-actions">
                        <button class="btn btn-success" onclick="openCustomerModal()">
                            <i class="fas fa-check-circle"></i> إتمام الطلب
                        </button>
                        <button class="btn btn-outline" onclick="clearCart()">
                            <i class="fas fa-trash-alt"></i> إفراغ السلة
                        </button>
                    </div>
                </div>
            `;

            container.innerHTML = merchantsHtml + summaryHtml;
        }

        // الاستماع للتغييرات من الصفحات الأخرى
        window.addEventListener('storage', function(e) {
            if (e.key === CART_STORAGE_KEY) {
                console.log('🔄 تحديث السلة من صفحة أخرى');
                cart = e.newValue ? JSON.parse(e.newValue) : [];
                updateCartDisplay();
                updateCartCounters();
            }
        });

        // تحميل البيانات
        loadCart();
        
        // تصدير الدوال
        window.updateCartQuantity = updateCartQuantity;
        window.removeFromCart = removeFromCart;
        window.clearCart = clearCart;
        window.toggleMerchant = toggleMerchant;
        window.openCustomerModal = openCustomerModal;
        window.closeModal = closeModal;
        window.submitOrder = submitOrder;
    </script>
</body>
</html>
