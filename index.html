<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>📺 البث المتسلسل مع مجلد ومسرح - ناردو برو</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0d1117;
            color: white;
            font-family: 'Cairo', Arial;
            padding: 15px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: #161b22;
            border-radius: 20px;
            padding: 20px;
            border: 2px solid #ffd700;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .header h1 {
            color: #ffd700;
            font-size: 24px;
        }
        .merchant-info {
            background: #1a1f2b;
            padding: 10px;
            border-radius: 10px;
            margin: 10px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid #ffd700;
        }
        .merchant-avatar {
            width: 50px;
            height: 50px;
            background: #ffd700;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: black;
            font-weight: bold;
            font-size: 20px;
        }
        .broadcast-id {
            background: #2d333b;
            padding: 5px 10px;
            border-radius: 15px;
            font-family: monospace;
            color: #ffd700;
            direction: ltr;
        }
        .video-container {
            position: relative;
            margin: 15px 0;
            border-radius: 15px;
            overflow: hidden;
            border: 3px solid #238636;
            background: black;
            min-height: 250px;
        }
        video {
            width: 100%;
            display: block;
            background: #1a1a1a;
        }
        .overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.8);
            color: #ffd700;
            padding: 8px 15px;
            border-radius: 20px;
            border: 2px solid #ffd700;
            z-index: 15;
        }
        .status-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            color: #ffd700;
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 12px;
        }
        .countdown-layer {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .countdown-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid #ffd700;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            font-weight: bold;
            color: #ffd700;
            animation: pulse 1s infinite;
        }
        @keyframes pulse { 50% { transform: scale(1.1); } }
        
        /* منطقة المسرح (عرض الفيديو) */
        .theater-area {
            background: #1a1f2b;
            border: 3px solid #ffd700;
            border-radius: 15px;
            padding: 15px;
            margin: 15px 0;
        }
        .theater-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            color: #ffd700;
        }
        .live-badge {
            color: red;
            animation: blink 1s infinite;
        }
        @keyframes blink { 50% { opacity: 0.3; } }
        
        .theater-screen {
            background: black;
            border-radius: 10px;
            min-height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-size: 14px;
            border: 1px solid #ffd700;
            margin-bottom: 10px;
        }
        
        .theater-info {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #8b949e;
        }
        
        /* مجلد الاستقبال */
        .folder-area {
            background: #2d333b;
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
        }
        .folder-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            color: #ffd700;
        }
        .folder-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
        }
        .folder-item {
            background: #1a1f2b;
            padding: 8px;
            border-radius: 8px;
            text-align: center;
            font-size: 12px;
            border-right: 2px solid #ffd700;
        }
        .folder-item .number {
            display: block;
            background: #ffd700;
            color: black;
            border-radius: 10px;
            padding: 2px;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        /* إحصائيات */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 15px 0;
        }
        .stat-box {
            background: #2d333b;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-value {
            color: #ffd700;
            font-size: 20px;
            font-weight: bold;
        }
        
        /* أزرار */
        button {
            width: 100%;
            padding: 15px;
            margin: 8px 0;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-success { background: #238636; color: white; }
        .btn-danger { background: #da3633; color: white; }
        .btn-live { background: #ffd700; color: black; }
        .btn-test { background: #6e7681; color: white; }
        
        .control-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📺 البث المتسلسل مع مجلد ومسرح</h1>
        </div>

        <!-- معلومات التاجر والمعرف -->
        <div class="merchant-info">
            <div class="merchant-avatar">ن</div>
            <div style="flex: 1;">
                <div style="color: #ffd700;">@nardoo_merchant</div>
                <div class="broadcast-id" id="broadcastIdDisplay">-</div>
            </div>
        </div>

        <!-- الكاميرا -->
        <div class="video-container">
            <video id="video" autoplay playsinline muted></video>
            <div class="overlay" id="merchantOverlay" style="display: none;">
                🎥 المقطع <span id="currentSegmentNum">0</span>
            </div>
            <div class="status-badge" id="cameraStatus">⏹️ متوقفة</div>
            
            <!-- طبقة العد التنازلي -->
            <div class="countdown-layer" id="countdownLayer" style="display: none;">
                <div class="countdown-circle" id="countdownNumber">5</div>
                <div style="color: #ffd700; margin-top: 15px;">تجهيز المجلد والمسرح...</div>
            </div>
        </div>

        <!-- منطقة المسرح (عرض الفيديو) -->
        <div class="theater-area">
            <div class="theater-header">
                <span>🎭 منطقة العرض المباشر</span>
                <span class="live-badge" id="theaterLiveBadge">🔴 مباشر</span>
            </div>
            
            <div class="theater-screen" id="theaterScreen">
                <span id="theaterMessage">⏳ إنتظار وصول الفيديو الأول...</span>
            </div>
            
            <div class="theater-info">
                <span>الآن: <span id="currentDisplayNum">0</span>/<span id="totalSegments">0</span></span>
                <span>تأخير: <span id="delayInfo">10</span> ثواني</span>
            </div>
        </div>

        <!-- مجلد الاستقبال -->
        <div class="folder-area">
            <div class="folder-header">
                <span>📁 مجلد الاستقبال</span>
                <span id="folderCount">0 فيديو</span>
            </div>
            
            <div class="folder-grid" id="folderGrid">
                <div style="grid-column: span 3; text-align: center; color: #666;">لا توجد فيديوهات</div>
            </div>
        </div>

        <!-- إحصائيات -->
        <div class="stats-row">
            <div class="stat-box">
                <div class="stat-value" id="statRecorded">0</div>
                <div>تم التسجيل</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="statFolder">0</div>
                <div>في المجلد</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="statDisplayed">0</div>
                <div>تم العرض</div>
            </div>
        </div>

        <!-- أزرار التحكم -->
        <div class="control-group">
            <button class="btn-success" onclick="startCamera()" id="startBtn">
                ▶️ تشغيل الكاميرا
            </button>
            
            <button class="btn-danger" onclick="stopCamera()" id="stopBtn" style="display: none;">
                ⏹️ إيقاف الكاميرا
            </button>
        </div>

        <button class="btn-live" onclick="startBroadcast()" id="liveBtn" disabled>
            🔴 بدء البث المباشر المتسلسل
        </button>

        <button class="btn-danger" onclick="stopBroadcast()" id="stopLiveBtn" style="display: none;">
            ⏹️ إنهاء البث
        </button>

        <button class="btn-test" onclick="testSystem()" id="testBtn">
            🔧 اختبار النظام
        </button>

        <p style="text-align: center; margin-top: 10px; color: #6e7681; font-size: 12px;" id="systemStatus">
            نظام المجلد والمسرح جاهز
        </p>
    </div>

    <script>
        // إعدادات تليجرام
        const BOT_TOKEN = '8576673096:AAEFKd-YSJcW_0d_wAHZBt-5nPg_VOjDX_0';
        const CHANNEL_ID = '-1003822964890';
        const MERCHANT = '@nardoo_merchant';
        
        // معرفات المواضيع (حسب الصور)
        const FOLDER_TOPIC_ID = '1'; // موضوع المجلد
        const THEATER_TOPIC_ID = '2'; // موضوع المسرح

        // متغيرات النظام
        let stream = null;
        let cameraActive = false;
        let isLive = false;
        let mediaRecorder = null;
        let broadcastId = null;
        
        // المصفوفات
        let recordedVideos = []; // كل الفيديوهات المسجلة
        let folderVideos = []; // الفيديوهات في المجلد (تنتظر العرض)
        let displayedVideos = []; // الفيديوهات التي تم عرضها
        
        let currentSegment = 0;
        let nextToDisplay = 1;
        let recordingTimeout = null;
        let displayInterval = null;

        // عناصر DOM
        const video = document.getElementById('video');
        const cameraStatus = document.getElementById('cameraStatus');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const liveBtn = document.getElementById('liveBtn');
        const stopLiveBtn = document.getElementById('stopLiveBtn');
        const merchantOverlay = document.getElementById('merchantOverlay');
        const currentSegmentNum = document.getElementById('currentSegmentNum');
        const countdownLayer = document.getElementById('countdownLayer');
        const countdownNumber = document.getElementById('countdownNumber');
        const broadcastIdDisplay = document.getElementById('broadcastIdDisplay');
        
        // عناصر المسرح
        const theaterScreen = document.getElementById('theaterScreen');
        const theaterMessage = document.getElementById('theaterMessage');
        const currentDisplayNum = document.getElementById('currentDisplayNum');
        const totalSegments = document.getElementById('totalSegments');
        const theaterLiveBadge = document.getElementById('theaterLiveBadge');
        
        // عناصر المجلد
        const folderGrid = document.getElementById('folderGrid');
        const folderCount = document.getElementById('folderCount');
        
        // عناصر الإحصائيات
        const statRecorded = document.getElementById('statRecorded');
        const statFolder = document.getElementById('statFolder');
        const statDisplayed = document.getElementById('statDisplayed');
        const delayInfo = document.getElementById('delayInfo');

        // تشغيل الكاميرا
        async function startCamera() {
            try {
                cameraStatus.innerHTML = '🔄 جاري التشغيل...';
                
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: 640, height: 360 },
                    audio: true
                });
                
                video.srcObject = stream;
                cameraActive = true;
                
                cameraStatus.innerHTML = '✅ الكاميرا جاهزة';
                startBtn.style.display = 'none';
                stopBtn.style.display = 'block';
                liveBtn.disabled = false;
                
                setupMediaRecorder();
                
            } catch (err) {
                cameraStatus.innerHTML = '❌ خطأ: ' + err.message;
            }
        }

        // تجهيز مسجل الفيديو
        function setupMediaRecorder() {
            try {
                mediaRecorder = new MediaRecorder(stream, {
                    mimeType: 'video/webm;codecs=vp8,opus'
                });
            } catch (e) {
                mediaRecorder = new MediaRecorder(stream);
            }
            
            mediaRecorder.ondataavailable = handleNewVideo;
        }

        // بدء البث
        async function startBroadcast() {
            if (!cameraActive) {
                alert('شغل الكاميرا أولاً');
                return;
            }

            // إنشاء معرف فريد للبث (مثل LIVEMMR797LU)
            broadcastId = 'LIVE' + Math.random().toString(36).substring(2, 10).toUpperCase();
            broadcastIdDisplay.textContent = broadcastId;
            
            // تجهيز المصفوفات
            recordedVideos = [];
            folderVideos = [];
            displayedVideos = [];
            currentSegment = 0;
            nextToDisplay = 1;
            
            // تحديث الواجهة
            updateAllDisplays();
            
            // إظهار العد التنازلي
            countdownLayer.style.display = 'flex';
            
            // العد التنازلي 5 ثواني
            for (let i = 5; i > 0; i--) {
                countdownNumber.textContent = i;
                await new Promise(r => setTimeout(r, 1000));
            }
            
            // تجهيز المجلد والمسرح في تليجرام
            await setupTelegramTopics();
            
            // إخفاء العد التنازلي
            countdownLayer.style.display = 'none';
            
            // بدء البث
            isLive = true;
            merchantOverlay.style.display = 'flex';
            liveBtn.style.display = 'none';
            stopLiveBtn.style.display = 'block';
            
            cameraStatus.innerHTML = '🔴 بث مباشر';
            
            // بدأ التسجيل المتسلسل (كل 10 ثواني)
            startRecording();
            
            // بدأ العرض المتسلسل (بتأخير 10 ثواني)
            startTheaterDisplay();
        }

        // تجهيز المواضيع في تليجرام
        async function setupTelegramTopics() {
            try {
                // 1. إشعار فتح مجلد الاستقبال
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHANNEL_ID,
                        message_thread_id: FOLDER_TOPIC_ID,
                        text: `📁 **تم فتح مجلد البث**\n\n` +
                              `👤 **التاجر:** ${MERCHANT}\n` +
                              `🆔 **معرف البث:** \`${broadcastId}\`\n` +
                              `⏰ **وقت البدء:** ${new Date().toLocaleTimeString('ar-EG')}\n\n` +
                              `📹 سيتم استقبال فيديو كل 10 ثواني\n` +
                              `🔢 الأرقام التسلسلية: 1، 2، 3...\n\n` +
                              `#مجلد_${broadcastId}`,
                        parse_mode: 'Markdown'
                    })
                });

                // 2. إشعار فتح منطقة المسرح
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHANNEL_ID,
                        message_thread_id: THEATER_TOPIC_ID,
                        text: `🎭 **منطقة العرض المباشر**\n\n` +
                              `👤 **التاجر:** ${MERCHANT}\n` +
                              `🆔 **معرف البث:** \`${broadcastId}\`\n\n` +
                              `⏳ بانتظار وصول الفيديو الأول...\n` +
                              `⚡ تأخير 10 ثواني عن التسجيل\n\n` +
                              `#عرض_${broadcastId}`,
                        parse_mode: 'Markdown'
                    })
                });
                
            } catch (error) {
                console.log('خطأ في تجهيز المواضيع:', error);
            }
        }

        // بدأ التسجيل المتسلسل
        function startRecording() {
            recordNextSegment();
        }

        // تسجيل المقطع التالي
        function recordNextSegment() {
            if (!isLive) return;
            
            currentSegment++;
            currentSegmentNum.textContent = currentSegment;
            
            // بدأ تسجيل مقطع جديد
            mediaRecorder.start();
            
            // إيقاف التسجيل بعد 10 ثواني
            recordingTimeout = setTimeout(() => {
                if (isLive && mediaRecorder && mediaRecorder.state === 'recording') {
                    mediaRecorder.stop();
                    
                    // تسجيل المقطع التالي بعد ثانية
                    setTimeout(() => {
                        if (isLive) {
                            recordNextSegment();
                        }
                    }, 1000);
                }
            }, 10000); // 10 ثواني
        }

        // معالجة فيديو جديد
        function handleNewVideo(event) {
            if (event.data.size > 0 && isLive) {
                const videoData = {
                    number: currentSegment,
                    data: event.data,
                    timestamp: Date.now(),
                    size: (event.data.size / 1024).toFixed(2) + ' KB',
                    folderMessageId: null
                };
                
                // إضافة إلى المصفوفات
                recordedVideos.push(videoData);
                folderVideos.push(videoData);
                
                // تحديث الإحصائيات
                updateStats();
                
                // إرسال إلى مجلد تليجرام
                sendToFolder(videoData);
                
                // تحديث عرض المجلد
                updateFolderDisplay();
            }
        }

        // إرسال إلى مجلد تليجرام
        async function sendToFolder(videoData) {
            try {
                const formData = new FormData();
                const videoFile = new File([videoData.data], `segment_${videoData.number}.mp4`, { type: 'video/mp4' });
                
                formData.append('chat_id', CHANNEL_ID);
                formData.append('video', videoFile);
                formData.append('message_thread_id', FOLDER_TOPIC_ID);
                
                const caption = `📁 **مقطع جديد في المجلد**\n\n` +
                                `🆔 **معرف البث:** \`${broadcastId}\`\n` +
                                `🔢 **رقم المقطع:** ${videoData.number}\n` +
                                `⏱️ **وقت التسجيل:** بعد ${videoData.number * 10} ثانية\n` +
                                `📦 **الحجم:** ${videoData.size}\n\n` +
                                `#مجلد_${broadcastId} #مقطع_${videoData.number}`;

                formData.append('caption', caption);

                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`, {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();
                
                if (result.ok) {
                    videoData.folderMessageId = result.result.message_id;
                }

            } catch (error) {
                console.log('خطأ في إرسال للمجلد:', error);
            }
        }

        // بدأ عرض المسرح (بتأخير 10 ثواني)
        function startTheaterDisplay() {
            displayInterval = setInterval(() => {
                checkAndDisplayNext();
            }, 2000); // فحص كل ثانيتين
        }

        // فحص وعرض المقطع التالي
        function checkAndDisplayNext() {
            if (!isLive) return;
            
            // البحث عن المقطع التالي في folderVideos
            const nextVideo = folderVideos.find(v => v.number === nextToDisplay);
            
            if (nextVideo) {
                const delay = (Date.now() - nextVideo.timestamp) / 1000;
                
                if (delay >= 10) { // تأخير 10 ثواني
                    publishToTheater(nextVideo);
                    nextToDisplay++;
                    
                    // إزالة من folderVideos
                    folderVideos = folderVideos.filter(v => v.number !== nextVideo.number);
                    
                    // إضافة إلى displayedVideos
                    displayedVideos.push(nextVideo);
                    
                    // تحديث الواجهة
                    updateTheaterDisplay(nextVideo);
                    updateStats();
                    updateFolderDisplay();
                }
            }
        }

        // نشر المقطع في المسرح (تليجرام)
        async function publishToTheater(videoData) {
            try {
                const formData = new FormData();
                const videoFile = new File([videoData.data], `theater_${videoData.number}.mp4`, { type: 'video/mp4' });
                
                formData.append('chat_id', CHANNEL_ID);
                formData.append('video', videoFile);
                formData.append('message_thread_id', THEATER_TOPIC_ID);
                
                const total = recordedVideos.length;
                const caption = `🎭 **البث المباشر - المقطع ${videoData.number}**\n\n` +
                                `👤 **التاجر:** ${MERCHANT}\n` +
                                `🆔 **معرف البث:** \`${broadcastId}\`\n` +
                                `🔢 **الترتيب:** ${videoData.number}/${total || '?'}\n` +
                                `⏱️ **وقت العرض:** ${new Date().toLocaleTimeString('ar-EG')}\n\n` +
                                `⚡ تأخير 10 ثواني عن التسجيل\n\n` +
                                `#عرض_${broadcastId} #مقطع_${videoData.number}`;

                formData.append('caption', caption);

                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`, {
                    method: 'POST',
                    body: formData
                });

            } catch (error) {
                console.log('خطأ في العرض:', error);
            }
        }

        // تحديث عرض المسرح
        function updateTheaterDisplay(videoData) {
            theaterMessage.innerHTML = `🎥 جاري عرض المقطع ${videoData.number}`;
            currentDisplayNum.textContent = videoData.number;
            totalSegments.textContent = recordedVideos.length;
            
            // تغيير لون الخلفية كمؤشر
            theaterScreen.style.background = '#0a0c10';
            setTimeout(() => {
                theaterScreen.style.background = 'black';
            }, 200);
        }

        // تحديث عرض المجلد
        function updateFolderDisplay() {
            let html = '';
            
            // عرض آخر 3 مقاطع في المجلد
            const recentVideos = [...folderVideos].slice(-3);
            
            recentVideos.forEach(v => {
                html += `<div class="folder-item">
                    <span class="number">#${v.number}</span>
                    <span>${v.size}</span>
                </div>`;
            });
            
            // إضافة مقاطع وهمية إذا كان العدد أقل من 3
            for (let i = recentVideos.length; i < 3; i++) {
                html += `<div class="folder-item" style="opacity: 0.3;">
                    <span class="number">#${i+1}</span>
                    <span>---</span>
                </div>`;
            }
            
            folderGrid.innerHTML = html;
            folderCount.textContent = `${folderVideos.length} فيديو`;
        }

        // تحديث جميع شاشات العرض
        function updateAllDisplays() {
            updateStats();
            updateFolderDisplay();
        }

        // تحديث الإحصائيات
        function updateStats() {
            statRecorded.textContent = recordedVideos.length;
            statFolder.textContent = folderVideos.length;
            statDisplayed.textContent = displayedVideos.length;
        }

        // إنهاء البث
        async function stopBroadcast() {
            // إيقاف جميع العمليات
            isLive = false;
            
            if (recordingTimeout) {
                clearTimeout(recordingTimeout);
            }
            
            if (displayInterval) {
                clearInterval(displayInterval);
            }
            
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                try {
                    mediaRecorder.stop();
                } catch (e) {}
            }
            
            // تحديث الواجهة
            merchantOverlay.style.display = 'none';
            liveBtn.style.display = 'block';
            stopLiveBtn.style.display = 'none';
            cameraStatus.innerHTML = '✅ تم إنهاء البث';
            theaterLiveBadge.style.opacity = '0.5';
            
            // حساب المدة الإجمالية
            const totalMinutes = Math.floor(recordedVideos.length * 10 / 60);
            const totalSeconds = (recordedVideos.length * 10) % 60;
            const totalTime = `${totalMinutes.toString().padStart(2,'0')}:${totalSeconds.toString().padStart(2,'0')}`;
            
            // إرسال إشعار انتهاء البث
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHANNEL_ID,
                        text: `✅ **انتهى البث المباشر**\n\n` +
                              `👤 **التاجر:** ${MERCHANT}\n` +
                              `🆔 **معرف البث:** \`${broadcastId}\`\n` +
                              `⏱️ **المدة الإجمالية:** ${totalTime}\n` +
                              `📊 **إجمالي المقاطع:** ${recordedVideos.length}\n\n` +
                              `شكراً لمتابعتكم 🌟\n\n` +
                              `#انتهى_البث_${broadcastId}`,
                        parse_mode: 'Markdown'
                    })
                });
            } catch (error) {}
        }

        // إيقاف الكاميرا
        function stopCamera() {
            if (isLive) {
                stopBroadcast();
            }
            
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                video.srcObject = null;
                stream = null;
                cameraActive = false;
            }
            
            cameraStatus.innerHTML = '⏹️ الكاميرا متوقفة';
            startBtn.style.display = 'block';
            stopBtn.style.display = 'none';
            liveBtn.disabled = true;
            merchantOverlay.style.display = 'none';
        }

        // اختبار النظام
        async function testSystem() {
            const statusEl = document.getElementById('systemStatus');
            statusEl.innerHTML = '🔄 جاري اختبار الاتصال...';
            
            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getMe`);
                const data = await response.json();
                
                if (data.ok) {
                    statusEl.innerHTML = '✅ النظام جاهز ✓';
                } else {
                    statusEl.innerHTML = '❌ خطأ في البوت';
                }
            } catch (error) {
                statusEl.innerHTML = '❌ لا يمكن الاتصال';
            }
        }

        // تشغيل اختبار تلقائي عند التحميل
        window.onload = testSystem;
    </script>
</body>
</html>
