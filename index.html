<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📹 بست الألبومات - ناردو برو (10 مقاطع)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Cairo', Arial, sans-serif;
            background: #0d1117;
            color: white;
            min-height: 100vh;
            padding: 15px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #161b22;
            border-radius: 20px;
            padding: 20px;
            border: 2px solid #ffd700;
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .header h1 {
            color: #ffd700;
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .header p {
            color: #8b949e;
            font-size: 14px;
        }
        
        .telegram-limit {
            background: #0088cc;
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin: 10px 0;
        }
        
        .telegram-limit i {
            color: white;
        }
        
        .video-container {
            position: relative;
            margin: 15px 0;
            border-radius: 15px;
            overflow: hidden;
            border: 3px solid #0088cc;
            background: black;
            min-height: 300px;
        }
        
        video {
            width: 100%;
            height: auto;
            display: block;
            background: #1a1a1a;
        }
        
        /* عكس الكاميرا الأمامية */
        .front-camera {
            transform: scaleX(-1);
        }
        
        .merchant-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.8);
            color: #ffd700;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: bold;
            z-index: 15;
            border: 2px solid #ffd700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .camera-switch-btn {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 20;
            border: 2px solid #ffd700;
            transition: all 0.3s;
        }
        
        .camera-switch-btn:hover {
            background: #ffd700;
            color: black;
            transform: rotate(180deg);
        }
        
        .live-indicator {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ff0000;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            z-index: 15;
            display: flex;
            align-items: center;
            gap: 5px;
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .album-stats {
            background: #1a1f2b;
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
            border: 2px solid #0088cc;
        }
        
        .stat-row {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            padding: 5px 0;
            border-bottom: 1px solid #2d333b;
        }
        
        .stat-label {
            color: #8b949e;
        }
        
        .stat-value {
            color: #0088cc;
            font-weight: bold;
            font-family: monospace;
            font-size: 18px;
        }
        
        /* عداد 10 مقاطع */
        .counter-10 {
            display: flex;
            justify-content: space-between;
            margin: 15px 0;
            gap: 5px;
        }
        
        .counter-block {
            flex: 1;
            height: 40px;
            background: #2d333b;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .counter-block.filled {
            background: #0088cc;
            color: white;
            transform: scale(1.05);
            box-shadow: 0 0 15px #0088cc;
        }
        
        .counter-block.current {
            border: 2px solid #ffd700;
            animation: pulse-block 1s infinite;
        }
        
        @keyframes pulse-block {
            0%, 100% { box-shadow: 0 0 10px #ffd700; }
            50% { box-shadow: 0 0 20px #ffd700; }
        }
        
        .counter-block .number {
            font-size: 18px;
        }
        
        .counter-block .small-icon {
            position: absolute;
            top: 2px;
            right: 2px;
            font-size: 8px;
            color: rgba(255,255,255,0.5);
        }
        
        .albums-timeline {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            overflow-x: auto;
            padding: 10px 0;
            scrollbar-width: thin;
            scrollbar-color: #0088cc #2d333b;
        }
        
        .albums-timeline::-webkit-scrollbar {
            height: 5px;
        }
        
        .albums-timeline::-webkit-scrollbar-track {
            background: #2d333b;
            border-radius: 10px;
        }
        
        .albums-timeline::-webkit-scrollbar-thumb {
            background: #0088cc;
            border-radius: 10px;
        }
        
        .timeline-item {
            min-width: 80px;
            background: #2d333b;
            border-radius: 10px;
            padding: 10px 5px;
            text-align: center;
            border: 2px solid transparent;
            transition: all 0.3s;
        }
        
        .timeline-item.completed {
            border-color: #238636;
            background: #23863633;
        }
        
        .timeline-item.active {
            border-color: #ffd700;
            background: #ffd70033;
            transform: scale(1.1);
        }
        
        .timeline-number {
            font-size: 20px;
            font-weight: bold;
            color: #ffd700;
        }
        
        .timeline-label {
            font-size: 10px;
            color: #8b949e;
        }
        
        .timeline-badge {
            background: #0088cc;
            color: white;
            border-radius: 12px;
            padding: 2px 6px;
            font-size: 10px;
            margin-top: 5px;
            display: inline-block;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        
        button {
            flex: 1;
            min-width: 120px;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s;
        }
        
        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        .btn-success {
            background: #238636;
            color: white;
        }
        
        .btn-danger {
            background: #da3633;
            color: white;
        }
        
        .btn-live {
            background: #0088cc;
            color: white;
            animation: glow 1.5s infinite;
        }
        
        @keyframes glow {
            0% { box-shadow: 0 0 10px #0088cc; }
            50% { box-shadow: 0 0 30px #0088cc; }
            100% { box-shadow: 0 0 10px #0088cc; }
        }
        
        .fixed-merchant {
            background: #1a1f2b;
            border: 2px solid #ffd700;
            border-radius: 10px;
            padding: 15px;
            margin: 10px 0;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .footer {
            text-align: center;
            margin-top: 20px;
            color: #6e7681;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-store"></i> بث الألبومات - ناردو برو</h1>
            <p>معرف ثابت - 10 مقاطع لكل ألبوم (حد تليجرام)</p>
            <div class="telegram-limit">
                <i class="fab fa-telegram"></i> حد تليجرام: 10 مقاطع
            </div>
        </div>

        <!-- فيديو الكاميرا -->
        <div class="video-container">
            <video id="video" autoplay playsinline></video>
            
            <div id="merchantOverlay" class="merchant-overlay" style="display: none;">
                <i class="fas fa-store"></i>
                <span id="merchantName">@nardoo_merchant</span>
                <span class="verified-badge">تاجر</span>
            </div>
            
            <!-- زر تبديل الكاميرا -->
            <div class="camera-switch-btn" onclick="switchCamera()" id="switchCameraBtn">
                <i class="fas fa-sync-alt"></i>
            </div>
            
            <div class="live-indicator" id="liveIndicator" style="display: none;">
                <i class="fas fa-circle"></i> بث مباشر
                <span id="liveTime">00:00</span>
            </div>
        </div>

        <!-- بطاقة التاجر -->
        <div class="fixed-merchant">
            <div class="merchant-avatar">
                <span id="merchantAvatar">ن</span>
            </div>
            <div class="merchant-info">
                <div class="merchant-name">
                    تاجر ناردو
                    <span class="merchant-status">✅ معتمد</span>
                </div>
                <div class="merchant-id" id="fixedMerchantId">@nardoo_merchant</div>
            </div>
        </div>

        <!-- إحصائيات -->
        <div class="album-stats">
            <div class="stat-row">
                <span class="stat-label">⏱️ مدة البث:</span>
                <span class="stat-value" id="totalTime">00:00</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">📦 الألبومات المرسلة:</span>
                <span class="stat-value" id="albumsCount">0</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">🎬 إجمالي المقاطع:</span>
                <span class="stat-value" id="totalChunks">0</span>
            </div>
        </div>

        <!-- عداد 10 مقاطع -->
        <div class="counter-10" id="counter10">
            <!-- يتم التعبئة بالجافا سكريبت -->
        </div>

        <!-- الخط الزمني للألبومات -->
        <div class="albums-timeline" id="albumsTimeline"></div>

        <!-- أزرار التحكم -->
        <div class="controls">
            <button class="btn-success" onclick="startCamera()" id="startBtn">
                <i class="fas fa-play"></i> تشغيل الكاميرا
            </button>
            <button class="btn-danger" onclick="stopCamera()" id="stopBtn" style="display: none;">
                <i class="fas fa-stop"></i> إيقاف
            </button>
        </div>

        <div class="controls">
            <button class="btn-live" onclick="startLiveStream()" id="startLiveBtn" disabled>
                <i class="fas fa-circle"></i> بدء البث المباشر
            </button>
            <button class="btn-danger" onclick="stopLiveStream()" id="stopLiveBtn" style="display: none;">
                <i class="fas fa-square"></i> إنهاء البث
            </button>
        </div>

        <!-- إعدادات -->
        <div class="input-group">
            <label><i class="fas fa-clock"></i> مدة المقطع (ثانية)</label>
            <select id="chunkDuration">
                <option value="3">3 ثواني (سريع)</option>
                <option value="5">5 ثواني</option>
                <option value="10" selected>10 ثواني (ممتاز)</option>
                <option value="15">15 ثانية</option>
            </select>
        </div>

        <div class="input-group">
            <label><i class="fas fa-align-left"></i> وصف البث</label>
            <textarea id="videoDescription" rows="2">🔴 بث مباشر - منتجات حصرية</textarea>
        </div>

        <div class="input-group">
            <label><i class="fas fa-link"></i> رابط المنتج</label>
            <input type="text" id="productLink" value="https://t.me/nardoo_channel/123">
        </div>

        <!-- حالة النظام -->
        <div class="status-box">
            <span id="statusText">انقر "تشغيل الكاميرا" للبدء</span>
        </div>

        <div class="footer">
            <span id="botStatus">⚪ جاري التحقق...</span> | 10/10 مقاطع لكل ألبوم
        </div>
    </div>

    <script>
        // ========== إعدادات تلجرام ==========
        const TELEGRAM = {
            botToken: '8576673096:AAEFKd-YSJcW_0d_wAHZBt-5nPg_VOjDX_0',
            channelId: '-1003822964890'
        };

        // ========== معرف التاجر الثابت ==========
        const MERCHANT_ID = '@nardoo_merchant';
        
        // ========== المتغيرات ==========
        let stream = null;
        let cameraActive = false;
        let isLiveStreaming = false;
        let totalSeconds = 0;
        let timerInterval = null;
        
        // متغيرات الألبومات (10 مقاطع بالضبط)
        const ALBUM_SIZE = 10;
        let currentAlbum = [];
        let albums = [];
        let currentAlbumIndex = 0;
        let totalChunksCount = 0;
        
        // الكاميرا
        let currentFacingMode = 'user';
        
        // عناصر DOM
        const video = document.getElementById('video');
        const statusText = document.getElementById('statusText');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const startLiveBtn = document.getElementById('startLiveBtn');
        const stopLiveBtn = document.getElementById('stopLiveBtn');
        const liveIndicator = document.getElementById('liveIndicator');
        const liveTime = document.getElementById('liveTime');
        const totalTime = document.getElementById('totalTime');
        const albumsCount = document.getElementById('albumsCount');
        const totalChunks = document.getElementById('totalChunks');
        const counter10 = document.getElementById('counter10');
        const albumsTimeline = document.getElementById('albumsTimeline');
        const botStatus = document.getElementById('botStatus');
        
        // عناصر التاجر
        const merchantOverlay = document.getElementById('merchantOverlay');
        const merchantName = document.getElementById('merchantName');
        const fixedMerchantId = document.getElementById('fixedMerchantId');
        const merchantAvatar = document.getElementById('merchantAvatar');

        // ========== تهيئة معرف التاجر ==========
        function initializeMerchant() {
            merchantName.textContent = MERCHANT_ID;
            fixedMerchantId.textContent = MERCHANT_ID;
            
            const firstChar = MERCHANT_ID.replace('@', '').charAt(0).toUpperCase();
            merchantAvatar.textContent = firstChar;
        }

        // ========== تحديث عداد 10 ==========
        function updateCounter10() {
            let html = '';
            for (let i = 0; i < ALBUM_SIZE; i++) {
                let filled = i < currentAlbum.length;
                let isCurrent = i === currentAlbum.length;
                
                html += `
                    <div class="counter-block ${filled ? 'filled' : ''} ${isCurrent ? 'current' : ''}">
                        <span class="number">${i + 1}</span>
                        ${filled ? '<span class="small-icon"><i class="fas fa-check"></i></span>' : ''}
                    </div>
                `;
            }
            counter10.innerHTML = html;
        }

        // ========== تحديث الخط الزمني ==========
        function updateTimeline() {
            let html = '';
            
            // الألبومات المرسلة
            albums.forEach((album, index) => {
                html += `
                    <div class="timeline-item completed" onclick="viewAlbum(${index})">
                        <div class="timeline-number">${index + 1}</div>
                        <div class="timeline-label">ألبوم</div>
                        <div class="timeline-badge">${album.chunks.length}</div>
                    </div>
                `;
            });
            
            // الألبوم الحالي
            if (currentAlbum.length > 0 || albums.length === 0) {
                html += `
                    <div class="timeline-item active">
                        <div class="timeline-number">${albums.length + 1}</div>
                        <div class="timeline-label">حالي</div>
                        <div class="timeline-badge">${currentAlbum.length}/${ALBUM_SIZE}</div>
                    </div>
                `;
            }
            
            albumsTimeline.innerHTML = html;
        }

        // ========== تشغيل الكاميرا ==========
        async function startCamera() {
            try {
                statusText.innerHTML = '🔄 جاري تشغيل الكاميرا...';
                
                const constraints = {
                    video: {
                        facingMode: currentFacingMode,
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: true
                };
                
                stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                
                if (currentFacingMode === 'user') {
                    video.classList.add('front-camera');
                } else {
                    video.classList.remove('front-camera');
                }
                
                cameraActive = true;
                
                startBtn.style.display = 'none';
                stopBtn.style.display = 'inline-block';
                startLiveBtn.disabled = false;
                
                statusText.innerHTML = '✅ الكاميرا جاهزة!';
                
            } catch (err) {
                statusText.innerHTML = '❌ خطأ: ' + err.message;
            }
        }

        // ========== تبديل الكاميرا ==========
        async function switchCamera() {
            if (!cameraActive) return;
            
            currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
            
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            
            await startCamera();
        }

        // ========== بدء البث ==========
        function startLiveStream() {
            if (!cameraActive) {
                alert('❌ شغل الكاميرا أولاً');
                return;
            }
            
            isLiveStreaming = true;
            totalSeconds = 0;
            currentAlbum = [];
            albums = [];
            totalChunksCount = 0;
            
            startLiveBtn.style.display = 'none';
            stopLiveBtn.style.display = 'inline-block';
            liveIndicator.style.display = 'flex';
            merchantOverlay.style.display = 'flex';
            
            statusText.innerHTML = '🔴 جاري البث المباشر...';
            
            timerInterval = setInterval(() => {
                totalSeconds++;
                const minutes = Math.floor(totalSeconds / 60);
                const seconds = totalSeconds % 60;
                totalTime.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                liveTime.textContent = totalTime.textContent;
            }, 1000);
            
            // بدء التسجيل
            recordChunk();
        }

        // ========== تسجيل مقطع ==========
        async function recordChunk() {
            if (!isLiveStreaming) return;
            
            try {
                const duration = parseInt(document.getElementById('chunkDuration').value);
                
                const chunk = await new Promise((resolve) => {
                    const chunks = [];
                    const recorder = new MediaRecorder(stream, {
                        mimeType: 'video/webm;codecs=vp8,opus'
                    });
                    
                    recorder.ondataavailable = (e) => {
                        if (e.data.size > 0) chunks.push(e.data);
                    };
                    
                    recorder.onstop = () => {
                        resolve(new Blob(chunks, { type: 'video/webm' }));
                    };
                    
                    recorder.start();
                    setTimeout(() => recorder.stop(), duration * 1000);
                });
                
                // إضافة المقطع للألبوم الحالي
                currentAlbum.push(chunk);
                totalChunksCount++;
                
                // تحديث الواجهة
                totalChunks.textContent = totalChunksCount;
                updateCounter10();
                updateTimeline();
                
                // إذا اكتمل الألبوم (10 مقاطع)
                if (currentAlbum.length === ALBUM_SIZE) {
                    await sendAlbum();
                }
                
                // استمرار التسجيل
                setTimeout(recordChunk, 500);
                
            } catch (error) {
                console.error('خطأ:', error);
                setTimeout(recordChunk, 2000);
            }
        }

        // ========== إرسال الألبوم ==========
        async function sendAlbum() {
            const albumNumber = albums.length + 1;
            const description = document.getElementById('videoDescription').value;
            const productLink = document.getElementById('productLink').value;
            
            try {
                statusText.innerHTML = `🔄 جاري إرسال الألبوم ${albumNumber}...`;
                
                // تجهيز المقاطع (الحد الأقصى 10)
                const mediaGroup = [];
                for (let i = 0; i < currentAlbum.length; i++) {
                    mediaGroup.push({
                        type: 'video',
                        media: `attach://video${i}`,
                        caption: i === 0 ? `🎬 **الألبوم ${albumNumber} (1/${ALBUM_SIZE})**\n\n🏪 التاجر: ${MERCHANT_ID}\n⏱️ الوقت: ${totalTime.textContent}\n\n📝 ${description}` : '',
                        parse_mode: 'Markdown'
                    });
                }
                
                // إرسال للتلجرام
                const formData = new FormData();
                formData.append('chat_id', TELEGRAM.channelId);
                formData.append('media', JSON.stringify(mediaGroup));
                
                currentAlbum.forEach((chunk, index) => {
                    formData.append(`video${index}`, chunk, `album${albumNumber}_${index+1}.mp4`);
                });
                
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/sendMediaGroup`, {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.ok) {
                    // حفظ الألبوم
                    albums.push({
                        number: albumNumber,
                        chunks: [...currentAlbum],
                        time: totalTime.textContent
                    });
                    
                    albumsCount.textContent = albums.length;
                    
                    // تفريغ الألبوم الحالي
                    currentAlbum = [];
                    updateCounter10();
                    updateTimeline();
                    
                    statusText.innerHTML = `✅ تم إرسال الألبوم ${albumNumber}`;
                    
                    // إرسال رابط المنتج كمقطع منفصل
                    await sendProductLink(albumNumber, productLink);
                    
                } else {
                    throw new Error(result.description);
                }
                
            } catch (error) {
                statusText.innerHTML = '❌ فشل إرسال الألبوم: ' + error.message;
            }
        }

        // ========== إرسال رابط المنتج ==========
        async function sendProductLink(albumNumber, productLink) {
            try {
                await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: TELEGRAM.channelId,
                        text: `🛍️ **رابط المنتج - الألبوم ${albumNumber}**\n\n${productLink}\n\n#منتج_${albumNumber} #${MERCHANT_ID.replace('@', '')}`,
                        parse_mode: 'Markdown',
                        reply_to_message_id: result?.result?.[0]?.message_id
                    })
                });
            } catch (error) {
                console.error('خطأ في إرسال الرابط:', error);
            }
        }

        // ========== عرض ألبوم ==========
        function viewAlbum(index) {
            const album = albums[index];
            alert(`الألبوم ${album.number}\nالوقت: ${album.time}\nعدد المقاطع: ${album.chunks.length}/10`);
        }

        // ========== إنهاء البث ==========
        async function stopLiveStream() {
            isLiveStreaming = false;
            
            // إرسال الألبوم الحالي إذا كان فيه مقاطع
            if (currentAlbum.length > 0) {
                await sendAlbum();
            }
            
            clearInterval(timerInterval);
            
            startLiveBtn.style.display = 'inline-block';
            stopLiveBtn.style.display = 'none';
            liveIndicator.style.display = 'none';
            merchantOverlay.style.display = 'none';
            
            statusText.innerHTML = '⏹️ تم إنهاء البث';
            
            // إرسال ملخص البث
            await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: TELEGRAM.channelId,
                    text: `📊 **ملخص البث**\n\n🏪 التاجر: ${MERCHANT_ID}\n⏱️ المدة: ${totalTime.textContent}\n📦 الألبومات: ${albums.length}\n🎬 المقاطع: ${totalChunksCount}`,
                    parse_mode: 'Markdown'
                })
            });
        }

        // ========== إيقاف الكاميرا ==========
        function stopCamera() {
            if (isLiveStreaming) {
                stopLiveStream();
            }
            
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                video.srcObject = null;
                stream = null;
                cameraActive = false;
            }
            
            startBtn.style.display = 'inline-block';
            stopBtn.style.display = 'none';
            startLiveBtn.style.display = 'inline-block';
            stopLiveBtn.style.display = 'none';
            startLiveBtn.disabled = true;
            liveIndicator.style.display = 'none';
            merchantOverlay.style.display = 'none';
            
            statusText.innerHTML = '⏹️ الكاميرا متوقفة';
        }

        // ========== اختبار البوت ==========
        async function testBot() {
            try {
                botStatus.innerHTML = '🔄 جاري الاتصال...';
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/getMe`);
                const data = await response.json();
                
                if (data.ok) {
                    botStatus.innerHTML = '✅ البوت متصل';
                    
                    await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: TELEGRAM.channelId,
                            text: `✅ **نظام الألبومات جاهز**\n🏪 التاجر: ${MERCHANT_ID}\n📦 حد تليجرام: 10 مقاطع لكل ألبوم`,
                            parse_mode: 'Markdown'
                        })
                    });
                } else {
                    botStatus.innerHTML = '❌ البوت غير متصل';
                }
            } catch (error) {
                botStatus.innerHTML = '❌ خطأ في الاتصال';
            }
        }

        // التهيئة
        window.onload = function() {
            initializeMerchant();
            updateCounter10();
            updateTimeline();
            testBot();
        };
    </script>
</body>
</html>
