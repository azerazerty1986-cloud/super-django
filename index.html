<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🔥 HYBRID SnapTik v13.0 - أزرار الموافقة في التليجرام</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .hybrid-container {
            width: 100%;
            max-width: 450px;
            height: 900px;
            background: #0a0c10;
            position: relative;
            overflow: hidden;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(255,215,0,0.2);
            border: 2px solid #ffd700;
            display: flex;
            flex-direction: column;
        }

        /* شاشة الموافقة */
        .approval-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.98);
            backdrop-filter: blur(10px);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: all 0.5s ease;
        }

        .approval-screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .approval-logo {
            font-size: 60px;
            color: #ffd700;
            margin-bottom: 10px;
            animation: pulse 2s infinite;
        }

        .approval-title {
            color: #ffd700;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .approval-subtitle {
            color: #888;
            font-size: 12px;
            text-align: center;
            margin-bottom: 20px;
        }

        .user-registration {
            width: 100%;
            background: #1f2630;
            border-radius: 20px;
            padding: 20px;
            border: 2px solid #ffd700;
            margin-bottom: 15px;
            max-height: 60vh;
            overflow-y: auto;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-label {
            color: #ffd700;
            font-size: 12px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .input-field {
            width: 100%;
            padding: 12px 15px;
            background: #0a0c10;
            border: 2px solid #ffd700;
            border-radius: 15px;
            color: white;
            font-size: 14px;
            direction: ltr;
        }

        .input-field:focus {
            outline: none;
            border-color: #4caf50;
        }

        .image-upload {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            margin-bottom: 15px;
        }

        .upload-preview {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #ffd700;
            background: #0a0c10;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: pointer;
            position: relative;
            transition: all 0.3s;
        }

        .upload-preview:hover {
            transform: scale(1.05);
            border-color: #4caf50;
        }

        .upload-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .upload-preview i {
            font-size: 30px;
            color: #ffd700;
        }

        .upload-hint {
            color: #888;
            font-size: 10px;
            text-align: center;
        }

        .upload-input {
            display: none;
        }

        .fingerprint-display {
            background: #0a0c10;
            padding: 12px;
            border-radius: 15px;
            border: 1px solid #4caf50;
            text-align: center;
            margin-bottom: 15px;
        }

        .fingerprint-label {
            color: #4caf50;
            font-size: 10px;
            margin-bottom: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .fingerprint-value {
            color: white;
            font-size: 18px;
            font-family: monospace;
            letter-spacing: 2px;
        }

        .approval-btn {
            width: 100%;
            padding: 15px;
            background: #4caf50;
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .approval-btn:disabled {
            background: #888;
            cursor: not-allowed;
            opacity: 0.5;
        }

        .approval-btn i {
            font-size: 18px;
        }

        .waiting-message {
            color: #ffd700;
            font-size: 13px;
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-align: center;
        }

        .waiting-spinner {
            width: 20px;
            height: 20px;
            border: 3px solid #ffd700;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .rejected-message {
            color: #ff4444;
            font-size: 13px;
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* التصميم الأساسي */
        .app-header {
            background: linear-gradient(135deg, #161b22, #1f2630);
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #ffd700;
        }

        .logo {
            color: #ffd700;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-avatar-small {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: 2px solid #ffd700;
            object-fit: cover;
        }

        .user-badge {
            background: #4caf50;
            color: white;
            padding: 6px 12px;
            border-radius: 25px;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .user-points {
            background: #ffd700;
            color: #000;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .status-bar {
            background: #1f2630;
            padding: 8px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ffd700;
        }

        .user-fingerprint {
            background: #0a0c10;
            color: #4caf50;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-family: monospace;
            direction: ltr;
            border: 1px solid #ffd700;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .approval-status {
            background: #ffd700;
            color: #000;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* عداد الناشطين */
        .active-counter {
            background: linear-gradient(90deg, #4caf50, #ffd700);
            padding: 8px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #ffd700;
        }

        .counter-label {
            color: #000;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .counter-value {
            background: #000;
            color: #ffd700;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            border: 2px solid #ffd700;
        }

        /* شريط المشاركين */
        .participants-bar {
            background: #1f2630;
            padding: 10px;
            border-bottom: 2px solid #ffd700;
        }

        .section-title {
            color: #ffd700;
            font-size: 12px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .participants-grid {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 5px;
            scrollbar-width: none;
        }

        .participants-grid::-webkit-scrollbar {
            display: none;
        }

        .participant-card {
            min-width: 100px;
            background: #0a0c10;
            border: 1px solid #ffd700;
            border-radius: 15px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .participant-card.selected {
            background: #ffd700;
            transform: scale(1.05);
        }

        .participant-card.selected .participant-name,
        .participant-card.selected .participant-points {
            color: #000;
        }

        .participant-card.current-user {
            border: 2px solid #4caf50;
        }

        .participant-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(45deg, #ffd700, #ff8a00);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            position: relative;
            overflow: hidden;
        }

        .participant-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .online-indicator {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            background: #4caf50;
            border-radius: 50%;
            border: 2px solid #000;
            box-shadow: 0 0 5px #4caf50;
            animation: blink 2s infinite;
        }

        .participant-name {
            color: white;
            font-size: 11px;
            font-weight: bold;
        }

        .participant-fingerprint {
            background: #4caf50;
            color: white;
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 8px;
            font-family: monospace;
        }

        .participant-points {
            color: #ffd700;
            font-size: 10px;
            display: flex;
            align-items: center;
            gap: 3px;
        }

        @keyframes pulse {
            0%,100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes slideDown {
            from { transform: translate(-50%, -100%); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }

        .notification {
            position: absolute;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            color: white;
            padding: 12px 25px;
            border-radius: 30px;
            border: 2px solid #ffd700;
            z-index: 1500;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideDown 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="hybrid-container">
        <!-- شاشة الموافقة المسبقة -->
        <div class="approval-screen" id="approvalScreen">
            <div class="approval-logo">
                <i class="fas fa-microchip"></i>
            </div>
            <div class="approval-title">مرحباً بك في HYBRID</div>
            <div class="approval-subtitle">يرجى تسجيل الدخول للموافقة من القناة</div>
            
            <div class="user-registration">
                <div class="input-group">
                    <div class="input-label">
                        <i class="fas fa-user"></i>
                        معرف تيليجرام
                    </div>
                    <input type="text" class="input-field" id="usernameInput" placeholder="@username" value="@nardoo_merchant">
                </div>
                
                <div class="image-upload">
                    <div class="upload-preview" id="uploadPreview" onclick="document.getElementById('imageUpload').click()">
                        <i class="fas fa-camera"></i>
                        <img id="previewImage" style="display: none;">
                    </div>
                    <input type="file" class="upload-input" id="imageUpload" accept="image/*" onchange="previewSelectedImage(event)">
                    <div class="upload-hint">
                        <i class="fas fa-cloud-upload-alt"></i>
                        اضغط لرفع صورة شخصية (اختياري)
                    </div>
                </div>
                
                <div class="fingerprint-display">
                    <div class="fingerprint-label">
                        <i class="fas fa-fingerprint"></i>
                        بصمتك الرقمية
                    </div>
                    <div class="fingerprint-value" id="fingerprintDisplay">----</div>
                </div>
                
                <button class="approval-btn" id="requestApprovalBtn" onclick="requestApproval()">
                    <i class="fas fa-paper-plane"></i>
                    طلب الموافقة
                </button>
            </div>
            
            <div class="waiting-message" id="waitingMessage" style="display: none;">
                <div class="waiting-spinner"></div>
                <span>جاري انتظار الموافقة من القناة...</span>
            </div>
            
            <div class="rejected-message" id="rejectedMessage" style="display: none;">
                <i class="fas fa-times-circle"></i>
                <span>تم رفض الطلب من القناة</span>
            </div>
        </div>

        <!-- التطبيق الرئيسي -->
        <div id="mainApp" style="display: flex; flex-direction: column; height: 100%; width: 100%;">
            <!-- رأس التطبيق -->
            <div class="app-header">
                <div class="logo">
                    <i class="fas fa-microchip"></i>
                    HYBRID SnapTik
                </div>
                <div class="user-profile">
                    <img class="user-avatar-small" id="headerAvatar" src="" style="display: none;">
                    <div class="user-points" id="myPoints">
                        <i class="fas fa-star"></i> 0
                    </div>
                    <div class="user-badge" id="myUsername">
                        <i class="fas fa-user"></i> جاري التحميل...
                    </div>
                </div>
            </div>

            <!-- شريط الحالة -->
            <div class="status-bar">
                <div class="user-fingerprint" id="myFingerprint">
                    <i class="fas fa-fingerprint"></i>
                    <span>----</span>
                </div>
                <div class="approval-status" id="approvalStatus">
                    <i class="fas fa-check-circle"></i>
                    موافق عليه
                </div>
            </div>

            <!-- عداد الناشطين -->
            <div class="active-counter">
                <div class="counter-label">
                    <i class="fas fa-users"></i>
                    الناشطين الآن
                </div>
                <div class="counter-value" id="activeCount">0</div>
            </div>

            <!-- شريط المشاركين -->
            <div class="participants-bar">
                <div class="section-title">
                    <i class="fas fa-user-friends"></i>
                    المشاركون المتصلون
                </div>
                <div class="participants-grid" id="participantsGrid">
                    <!-- ستتم إضافة المشاركين هنا -->
                </div>
            </div>

            <!-- شريط الإحصائيات السفلي -->
            <div class="stats-bar" style="margin-top: auto;">
                <div class="stats-item">
                    <i class="fas fa-clock"></i>
                    <span class="stats-value" id="lastUpdate">منذ لحظات</span>
                </div>
                <div class="stats-item">
                    <i class="fas fa-check-circle"></i>
                    <span class="stats-value" id="approvedCount">0</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ================== إعدادات ==================
        const CONFIG = {
            botToken: '8576673096:AAEFKd-YSJcW_0d_wAHZBt-5nPg_VOjDX_0',
            channelId: '-1003822964890',
            approvalChannelId: '-1003822964890'
        };

        // ================== متغيرات التطبيق ==================
        let currentUser = null;
        let participants = [];
        let approvedUsers = [];
        let approvalCheckInterval = null;
        let telegramUpdateId = 0;
        let isRequestPending = false;
        let pendingRequests = {}; // لتخزين طلبات الموافقة المعلقة

        // ================== دوال البصمة والموافقة ==================
        function generateFingerprint() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let fingerprint = '';
            for (let i = 0; i < 8; i++) {
                fingerprint += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return fingerprint;
        }

        window.previewSelectedImage = function(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const preview = document.getElementById('previewImage');
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    document.querySelector('#uploadPreview i').style.display = 'none';
                };
                reader.readAsDataURL(file);
            }
        };

        // ================== طلب الموافقة مع أزرار تفاعلية ==================
        window.requestApproval = async function() {
            if (isRequestPending) {
                showNotification('⏳ هناك طلب معلق بالفعل');
                return;
            }

            const username = document.getElementById('usernameInput').value.trim();
            if (!username) {
                showNotification('❌ الرجاء إدخال معرف تيليجرام');
                return;
            }

            const fingerprint = generateFingerprint();
            document.getElementById('fingerprintDisplay').textContent = fingerprint;
            const imageFile = document.getElementById('imageUpload').files[0];
            
            // تعطيل الأزرار وإظهار رسالة الانتظار
            document.getElementById('requestApprovalBtn').disabled = true;
            document.getElementById('waitingMessage').style.display = 'flex';
            document.getElementById('rejectedMessage').style.display = 'none';
            isRequestPending = true;
            
            try {
                // تجهيز الأزرار المضمنة (Inline Keyboard)
                const inlineKeyboard = {
                    inline_keyboard: [
                        [
                            { text: '✅ نعم', callback_data: `approve_${fingerprint}` },
                            { text: '❌ لا', callback_data: `reject_${fingerprint}` }
                        ]
                    ]
                };
                
                // تجهيز نص الرسالة
                let message = `🔐 **طلب موافقة جديد**\n\n`;
                message += `👤 **المستخدم:** ${username}\n`;
                message += `🔑 **البصمة:** \`${fingerprint}\`\n`;
                message += `⏰ **الوقت:** ${new Date().toLocaleString('ar-EG')}\n\n`;
                message += `👇 اختر أحد الخيارات:`;

                let messageId;
                
                if (imageFile) {
                    // إرسال الصورة مع الأزرار
                    const formData = new FormData();
                    formData.append('chat_id', CONFIG.approvalChannelId);
                    formData.append('photo', imageFile);
                    formData.append('caption', message);
                    formData.append('parse_mode', 'Markdown');
                    formData.append('reply_markup', JSON.stringify(inlineKeyboard));
                    
                    const res = await fetch(`https://api.telegram.org/bot${CONFIG.botToken}/sendPhoto`, {
                        method: 'POST',
                        body: formData
                    });
                    
                    const result = await res.json();
                    if (result.ok) {
                        messageId = result.result.message_id;
                    } else {
                        throw new Error('فشل إرسال الصورة');
                    }
                } else {
                    // إرسال رسالة نصية مع الأزرار
                    const formData = new FormData();
                    formData.append('chat_id', CONFIG.approvalChannelId);
                    formData.append('text', message);
                    formData.append('parse_mode', 'Markdown');
                    formData.append('reply_markup', JSON.stringify(inlineKeyboard));
                    
                    const res = await fetch(`https://api.telegram.org/bot${CONFIG.botToken}/sendMessage`, {
                        method: 'POST',
                        body: formData
                    });
                    
                    const result = await res.json();
                    if (result.ok) {
                        messageId = result.result.message_id;
                    } else {
                        throw new Error('فشل إرسال الرسالة');
                    }
                }
                
                // حفظ بيانات الطلب
                const requestData = {
                    username: username,
                    fingerprint: fingerprint,
                    messageId: messageId,
                    timestamp: Date.now()
                };
                
                // تخزين في localStorage وذاكرة التطبيق
                localStorage.setItem('pendingApproval', JSON.stringify(requestData));
                pendingRequests[fingerprint] = requestData;
                
                // بدء مراقبة الرد (Callback Query)
                startWatchingForCallbacks(fingerprint, username, imageFile);
                
            } catch (error) {
                console.error('خطأ في طلب الموافقة:', error);
                showNotification('❌ فشل إرسال الطلب');
                document.getElementById('requestApprovalBtn').disabled = false;
                document.getElementById('waitingMessage').style.display = 'none';
                isRequestPending = false;
            }
        };

        // ================== مراقبة الضغط على الأزرار ==================
        function startWatchingForCallbacks(fingerprint, username, imageFile = null) {
            showNotification('📨 تم إرسال الطلب مع أزرار الموافقة');
            
            let attempts = 0;
            const maxAttempts = 60; // 5 دقائق
            
            approvalCheckInterval = setInterval(async () => {
                attempts++;
                
                try {
                    // جلب آخر callback queries
                    const res = await fetch(`https://api.telegram.org/bot${CONFIG.botToken}/getUpdates?offset=${telegramUpdateId}&timeout=5`);
                    const data = await res.json();
                    
                    if (data.ok && data.result) {
                        // تحديث آخر ID
                        if (data.result.length > 0) {
                            telegramUpdateId = Math.max(...data.result.map(u => u.update_id)) + 1;
                        }
                        
                        // البحث عن callback_query
                        for (const update of data.result) {
                            if (update.callback_query) {
                                const callback = update.callback_query;
                                const data = callback.data;
                                
                                // التحقق من أن هذا الطلب خاص بنا
                                if (data.includes(fingerprint)) {
                                    
                                    // إرسال إشعار بأنه تم معالجة الطلب
                                    await fetch(`https://api.telegram.org/bot${CONFIG.botToken}/answerCallbackQuery`, {
                                        method: 'POST',
                                        headers: { 'Content-Type': 'application/json' },
                                        body: JSON.stringify({
                                            callback_query_id: callback.id,
                                            text: 'تم استلام ردك ✅'
                                        })
                                    });
                                    
                                    if (data.startsWith('approve')) {
                                        // تمت الموافقة
                                        clearInterval(approvalCheckInterval);
                                        
                                        // إنشاء المستخدم الجديد
                                        currentUser = {
                                            id: Date.now().toString(),
                                            username: username,
                                            fingerprint: fingerprint,
                                            points: Math.floor(Math.random() * 500) + 100,
                                            avatar: imageFile ? URL.createObjectURL(imageFile) : null,
                                            online: true,
                                            approved: true,
                                            lastSeen: Date.now()
                                        };
                                        
                                        // حفظ في localStorage
                                        localStorage.setItem('snaptik_user', JSON.stringify(currentUser));
                                        localStorage.removeItem('pendingApproval');
                                        delete pendingRequests[fingerprint];
                                        
                                        // إخفاء شاشة الموافقة
                                        document.getElementById('approvalScreen').classList.add('hidden');
                                        document.getElementById('mainApp').style.display = 'flex';
                                        
                                        // بدء التطبيق
                                        initializeApp();
                                        
                                        showNotification('✅ تمت الموافقة! مرحباً بك');
                                        isRequestPending = false;
                                        
                                    } else if (data.startsWith('reject')) {
                                        // تم الرفض
                                        clearInterval(approvalCheckInterval);
                                        
                                        document.getElementById('waitingMessage').style.display = 'none';
                                        document.getElementById('rejectedMessage').style.display = 'flex';
                                        document.getElementById('requestApprovalBtn').disabled = false;
                                        
                                        localStorage.removeItem('pendingApproval');
                                        delete pendingRequests[fingerprint];
                                        
                                        showNotification('❌ تم رفض الطلب من القناة');
                                        isRequestPending = false;
                                    }
                                    
                                    break;
                                }
                            }
                        }
                    }
                    
                    // إذا انتهت المحاولات
                    if (attempts >= maxAttempts) {
                        clearInterval(approvalCheckInterval);
                        document.getElementById('waitingMessage').style.display = 'none';
                        document.getElementById('requestApprovalBtn').disabled = false;
                        showNotification('⏰ انتهت مهلة الانتظار (5 دقائق)');
                        isRequestPending = false;
                    }
                    
                } catch (error) {
                    console.error('خطأ في مراقبة الأزرار:', error);
                }
                
            }, 5000); // كل 5 ثواني
        }

        // ================== تحديث قائمة الموافق عليهم ==================
        async function fetchApprovedUsers() {
            try {
                // جلب آخر 100 رسالة من القناة
                const res = await fetch(`https://api.telegram.org/bot${CONFIG.botToken}/getUpdates`);
                const data = await res.json();
                
                if (data.ok && data.result) {
                    const approvals = [];
                    const processedFingerprints = new Set();
                    
                    // البحث عن الموافقات عبر callback queries
                    data.result.forEach(update => {
                        if (update.callback_query && update.callback_query.data) {
                            const callbackData = update.callback_query.data;
                            
                            if (callbackData.startsWith('approve_')) {
                                const fingerprint = callbackData.replace('approve_', '');
                                
                                if (!processedFingerprints.has(fingerprint)) {
                                    processedFingerprints.add(fingerprint);
                                    
                                    // محاولة استخراج اسم المستخدم من الرسالة المرتبطة
                                    let username = `@user_${fingerprint.substring(0, 4)}`;
                                    
                                    approvals.push({
                                        username: username,
                                        fingerprint: fingerprint,
                                        approvedAt: update.callback_query.message.date,
                                        online: Math.random() > 0.4 // محاكاة حالة الاتصال
                                    });
                                }
                            }
                        }
                    });
                    
                    // تحديث قائمة الموافق عليهم
                    approvedUsers = approvals;
                    
                    // تحديث عداد الناشطين
                    updateActiveCount();
                    
                    // تحديث قائمة المشاركين
                    updateParticipantsList();
                }
                
            } catch (error) {
                console.error('خطأ في جلب الموافق عليهم:', error);
            }
        }

        // ================== تحديث عداد الناشطين ==================
        function updateActiveCount() {
            // الناشطون هم الموافق عليهم والذين يعتبرون متصلين
            const activeNow = approvedUsers.filter(user => user.online).length;
            document.getElementById('activeCount').textContent = activeNow;
            document.getElementById('approvedCount').textContent = approvedUsers.length;
            document.getElementById('lastUpdate').textContent = 'منذ ' + Math.floor(Math.random() * 30) + ' ثانية';
        }

        // ================== تحديث قائمة المشاركين ==================
        function updateParticipantsList() {
            const grid = document.getElementById('participantsGrid');
            
            if (!grid) return;
            
            if (approvedUsers.length === 0) {
                grid.innerHTML = '<div style="color: #888; padding: 20px; text-align: center;">لا يوجد مشاركين موافق عليهم بعد</div>';
                return;
            }
            
            let html = '';
            
            approvedUsers.forEach(user => {
                // لا نعرض المستخدم الحالي
                if (currentUser && user.username === currentUser.username) return;
                
                html += `
                    <div class="participant-card">
                        <div class="participant-avatar">
                            ${user.username.charAt(1).toUpperCase()}
                            ${user.online ? '<span class="online-indicator"></span>' : ''}
                        </div>
                        <div class="participant-name">${user.username}</div>
                        <div class="participant-fingerprint">${user.fingerprint}</div>
                        <div class="participant-points">
                            <i class="fas fa-star"></i> ${Math.floor(Math.random() * 500) + 100}
                        </div>
                    </div>
                `;
            });
            
            grid.innerHTML = html;
        }

        // ================== بدء مراقبة القناة باستمرار ==================
        function startChannelMonitoring() {
            // تحديث كل 10 ثواني
            setInterval(fetchApprovedUsers, 10000);
            
            // تحديث فوري بعد ثانيتين
            setTimeout(fetchApprovedUsers, 2000);
        }

        // ================== تهيئة التطبيق ==================
        function initializeApp() {
            // تحديث الواجهة ببيانات المستخدم
            document.getElementById('myUsername').innerHTML = `<i class="fas fa-user"></i> ${currentUser.username}`;
            document.getElementById('myFingerprint').innerHTML = `<i class="fas fa-fingerprint"></i> ${currentUser.fingerprint}`;
            document.getElementById('myPoints').innerHTML = `<i class="fas fa-star"></i> ${currentUser.points}`;
            
            if (currentUser.avatar) {
                document.getElementById('headerAvatar').src = currentUser.avatar;
                document.getElementById('headerAvatar').style.display = 'block';
            }
            
            // بدء مراقبة القناة
            startChannelMonitoring();
            
            showNotification('✅ أهلاً بك في التطبيق');
        }

        // ================== التحقق من وجود موافقة سابقة ==================
        function checkExistingApproval() {
            const savedUser = localStorage.getItem('snaptik_user');
            const pendingApproval = localStorage.getItem('pendingApproval');
            
            if (savedUser) {
                // يوجد مستخدم موافق عليه مسبقاً
                currentUser = JSON.parse(savedUser);
                document.getElementById('approvalScreen').classList.add('hidden');
                document.getElementById('mainApp').style.display = 'flex';
                initializeApp();
                
            } else if (pendingApproval) {
                // يوجد طلب معلق
                const pending = JSON.parse(pendingApproval);
                
                // التحقق مما إذا كان الطلب لا يزال سارياً (أقل من 5 دقائق)
                if (Date.now() - pending.timestamp < 300000) {
                    document.getElementById('requestApprovalBtn').disabled = true;
                    document.getElementById('waitingMessage').style.display = 'flex';
                    document.getElementById('usernameInput').value = pending.username;
                    document.getElementById('fingerprintDisplay').textContent = pending.fingerprint;
                    
                    // استئناف مراقبة الرد
                    startWatchingForCallbacks(pending.fingerprint, pending.username);
                } else {
                    // انتهت صلاحية الطلب
                    localStorage.removeItem('pendingApproval');
                }
            }
        }

        // ================== إظهار الإشعارات ==================
        function showNotification(message) {
            const oldNotification = document.querySelector('.notification');
            if (oldNotification) {
                oldNotification.remove();
            }
            
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.innerHTML = `
                <i class="fas fa-microchip" style="color: #ffd700;"></i>
                <span>${message}</span>
            `;
            
            document.querySelector('.hybrid-container').appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'slideDown 0.3s reverse';
                setTimeout(() => {
                    if (notification.parentNode) {
                        notification.remove();
                    }
                }, 300);
            }, 3000);
        }

        // ================== بدء التطبيق ==================
        window.onload = function() {
            // عرض بصمة أولية
            document.getElementById('fingerprintDisplay').textContent = generateFingerprint();
            
            // التحقق من وجود موافقة سابقة
            checkExistingApproval();
        };
    </script>
</body>
</html>
