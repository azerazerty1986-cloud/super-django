<!-- ===== سلة التسوق الجانبية ===== -->
<div class="cart-sidebar" id="cartSidebar">
    <div class="cart-header">
        <h3><i class="fas fa-shopping-cart"></i> سلة التسوق</h3>
        <i class="fas fa-times close-cart" onclick="toggleCart()"></i>
    </div>
    <div class="cart-items" id="cartItems">
        <!-- سيتم تعبئتها ديناميكياً عبر JavaScript -->
    </div>
    <div class="cart-footer">
        <div class="cart-total">
            <span>المجموع:</span>
            <span id="cartTotal">0 دج</span>
        </div>
        <button class="checkout-btn" onclick="checkoutCart()">
            <i class="fab fa-whatsapp"></i> إتمام الطلب
        </button>
    </div>
</div>

<style>
/* أنماط سلة التسوق الجانبية - متوافقة مع فيسبوك */
.cart-sidebar {
    position: fixed;
    top: 0;
    left: -400px;
    width: 400px;
    height: 100vh;
    background: var(--bg-secondary, #1a2f28);
    backdrop-filter: blur(20px);
    border-left: 2px solid var(--gold, #d4af37);
    z-index: 2000;
    transition: left 0.3s ease;
    display: flex;
    flex-direction: column;
    padding: 20px;
    box-shadow: var(--shadow, 0 10px 30px rgba(0,0,0,0.5));
}

.cart-sidebar.open { left: 0; }

.cart-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 20px;
    border-bottom: 2px solid var(--gold, #d4af37);
    margin-bottom: 20px;
}

.cart-header h3 { 
    color: var(--gold, #d4af37); 
    font-size: 24px; 
    margin: 0;
}

.close-cart { 
    color: var(--gold, #d4af37); 
    font-size: 24px; 
    cursor: pointer; 
    transition: all 0.3s ease; 
}

.close-cart:hover { 
    transform: scale(1.2); 
    color: var(--gold-light, #f4e3b1); 
}

.cart-items { 
    flex: 1; 
    overflow-y: auto; 
    margin-bottom: 20px; 
}

.cart-item {
    display: flex;
    gap: 15px;
    padding: 15px;
    background: var(--glass, rgba(255,255,255,0.08));
    border-radius: 15px;
    margin-bottom: 15px;
    border: 1px solid var(--glass-border, rgba(255,255,255,0.15));
    transition: all 0.3s ease;
}

.cart-item:hover {
    transform: translateX(-5px);
    border-color: var(--gold, #d4af37);
}

.cart-item-image {
    width: 70px;
    height: 70px;
    border-radius: 10px;
    object-fit: cover;
    border: 2px solid var(--gold, #d4af37);
}

.cart-item-details { flex: 1; }

.cart-item-title { 
    font-weight: 700; 
    margin-bottom: 5px; 
    font-size: 14px; 
    color: var(--text-primary, #ffffff);
}

.cart-item-price { 
    color: var(--gold, #d4af37); 
    font-size: 14px; 
    font-weight: 700; 
}

.cart-item-quantity {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 10px;
}

.quantity-btn {
    width: 30px;
    height: 30px;
    border-radius: 8px;
    background: var(--glass, rgba(255,255,255,0.08));
    border: 1px solid var(--gold, #d4af37);
    color: var(--gold, #d4af37);
    cursor: pointer;
    transition: all 0.3s ease;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
}

.quantity-btn:hover { 
    background: var(--gold, #d4af37); 
    color: var(--bg-primary, #0a1a15); 
}

.quantity-btn.delete-btn {
    background: #f87171;
    border-color: #f87171;
    color: white;
}

.quantity-btn.delete-btn:hover {
    background: #ef4444;
}

.cart-footer {
    border-top: 2px solid var(--gold, #d4af37);
    padding-top: 20px;
}

.cart-total {
    display: flex;
    justify-content: space-between;
    color: var(--gold, #d4af37);
    font-size: 20px;
    font-weight: 800;
    margin-bottom: 20px;
}

.checkout-btn {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, #25D366, #128C7E);
    color: white;
    border: none;
    border-radius: 25px;
    font-weight: 800;
    font-size: 18px;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
}

.checkout-btn:hover { 
    transform: translateY(-3px); 
    box-shadow: 0 10px 30px rgba(37, 211, 102, 0.3); 
}

/* رسالة السلة الفارغة */
.empty-cart {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-secondary, #e0e0e0);
}

.empty-cart i {
    font-size: 60px;
    color: var(--gold, #d4af37);
    margin-bottom: 20px;
    opacity: 0.5;
}

.empty-cart p {
    font-size: 16px;
    margin: 0;
}

/* تحسينات للشاشات الصغيرة */
@media (max-width: 768px) {
    .cart-sidebar {
        width: 100%;
        left: -100%;
    }
    
    .cart-item-image {
        width: 50px;
        height: 50px;
    }
    
    .cart-item-title {
        font-size: 13px;
    }
    
    .cart-item-price {
        font-size: 13px;
    }
}
</style>

<script>
// دوال السلة - متوافقة مع ملف JS الرئيسي
function loadCart() {
    const saved = localStorage.getItem('nardoo_cart');
    cart = saved ? JSON.parse(saved) : [];
    updateCartCounter();
    updateCartDisplay();
}

function saveCart() {
    localStorage.setItem('nardoo_cart', JSON.stringify(cart));
}

function updateCartCounter() {
    const count = cart.reduce((sum, item) => sum + item.quantity, 0);
    const counter = document.getElementById('cartCounter');
    const fixedCounter = document.getElementById('fixedCartCounter');
    
    if (counter) counter.textContent = count;
    if (fixedCounter) fixedCounter.textContent = count;
}

function addToCart(productId) {
    const product = products.find(p => p.id == productId);
    if (!product || product.stock <= 0) {
        showNotification('المنتج غير متوفر', 'error');
        return;
    }

    const existing = cart.find(item => item.productId == productId);
    if (existing) {
        if (existing.quantity < product.stock) {
            existing.quantity++;
        } else {
            showNotification('الكمية غير كافية', 'warning');
            return;
        }
    } else {
        cart.push({
            productId,
            name: product.name,
            price: product.price,
            quantity: 1,
            merchantName: product.merchantName,
            merchantTelegram: product.merchantTelegram,
            image: product.images && product.images.length > 0 ? product.images[0] : null
        });
    }

    saveCart();
    updateCartCounter();
    updateCartDisplay();
    showNotification('✅ تمت الإضافة إلى السلة', 'success');
}

function toggleCart() {
    document.getElementById('cartSidebar').classList.toggle('open');
    updateCartDisplay();
}

function updateCartDisplay() {
    const itemsDiv = document.getElementById('cartItems');
    const totalSpan = document.getElementById('cartTotal');

    if (!itemsDiv) return;

    if (cart.length === 0) {
        itemsDiv.innerHTML = `
            <div class="empty-cart">
                <i class="fas fa-shopping-basket"></i>
                <p>السلة فارغة</p>
                <p style="font-size: 14px; margin-top: 10px;">أضف منتجات من المتجر</p>
            </div>
        `;
        if (totalSpan) totalSpan.textContent = '0 دج';
        return;
    }

    let total = 0;
    itemsDiv.innerHTML = cart.map(item => {
        const itemTotal = item.price * item.quantity;
        total += itemTotal;
        const imageUrl = item.image || "https://via.placeholder.com/70/2c5e4f/ffffff?text=منتج";
        
        return `
            <div class="cart-item">
                <img src="${imageUrl}" class="cart-item-image" onerror="this.src='https://via.placeholder.com/70/2c5e4f/ffffff?text=منتج'">
                <div class="cart-item-details">
                    <div class="cart-item-title">${item.name}</div>
                    <div class="cart-item-price">${item.price.toLocaleString()} دج</div>
                    <div class="cart-item-quantity">
                        <button class="quantity-btn" onclick="updateCartItem(${item.productId}, ${item.quantity - 1})">-</button>
                        <span style="min-width: 30px; text-align: center;">${item.quantity}</span>
                        <button class="quantity-btn" onclick="updateCartItem(${item.productId}, ${item.quantity + 1})">+</button>
                        <button class="quantity-btn delete-btn" onclick="removeFromCart(${item.productId})" title="حذف">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
            </div>
        `;
    }).join('');

    if (totalSpan) totalSpan.textContent = `${total.toLocaleString()} دج`;
}

function updateCartItem(productId, newQuantity) {
    const item = cart.find(i => i.productId == productId);
    const product = products.find(p => p.id == productId);

    if (newQuantity <= 0) {
        removeFromCart(productId);
        return;
    }

    if (newQuantity > product.stock) {
        showNotification('الكمية غير متوفرة', 'warning');
        return;
    }

    item.quantity = newQuantity;
    saveCart();
    updateCartCounter();
    updateCartDisplay();
}

function removeFromCart(productId) {
    cart = cart.filter(i => i.productId != productId);
    saveCart();
    updateCartCounter();
    updateCartDisplay();
    showNotification('تمت إزالة المنتج', 'info');
}

async function checkoutCart() {
    if (cart.length === 0) {
        showNotification('السلة فارغة', 'warning');
        return;
    }

    if (!currentUser) {
        showNotification('يجب تسجيل الدخول أولاً', 'warning');
        openLoginModal();
        return;
    }

    const customerPhone = prompt('📞 رقم الهاتف:', currentUser.phone || '');
    if (!customerPhone) return;
    
    const customerAddress = prompt('📍 عنوان التوصيل:', '');
    if (!customerAddress) return;

    const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
    const shipping = 800;
    const total = subtotal + shipping;

    const order = {
        orderId: Date.now(),
        customerName: currentUser.name,
        customerPhone: customerPhone,
        customerAddress: customerAddress,
        items: [...cart],
        subtotal: subtotal,
        shipping: shipping,
        total: total,
        createdAt: new Date().toISOString()
    };

    // تجميع الطلبات حسب التاجر
    const ordersByMerchant = {};
    cart.forEach(item => {
        if (!ordersByMerchant[item.merchantName]) {
            ordersByMerchant[item.merchantName] = {
                merchantTelegram: item.merchantTelegram,
                items: []
            };
        }
        ordersByMerchant[item.merchantName].items.push(item);
    });

    // إرسال إشعار لكل تاجر
    for (const [merchantName, merchantData] of Object.entries(ordersByMerchant)) {
        const merchantItems = merchantData.items;
        const merchantTotal = merchantItems.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        
        const message = `🟢 **طلب جديد**
        
👤 الزبون: ${order.customerName}
📞 الهاتف: ${order.customerPhone}
📍 العنوان: ${order.customerAddress}
🏪 التاجر: ${merchantName}

📦 **المنتجات:**
${merchantItems.map(i => `  • ${i.name} x${i.quantity} = ${i.price * i.quantity} دج`).join('\n')}

💰 إجمالي الطلب: ${merchantTotal} دج
➕ تكلفة التوصيل: ${shipping} دج
💵 الإجمالي الكلي: ${merchantTotal + shipping} دج

🆔 رقم الطلب: ${order.orderId}
📅 التاريخ: ${new Date().toLocaleString('ar-EG')}

✅ سيتم التواصل معك قريباً`;

        if (merchantData.merchantTelegram) {
            try {
                await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: merchantData.merchantTelegram.replace('@', ''),
                        text: message,
                        parse_mode: 'Markdown'
                    })
                });
            } catch (error) {
                console.error('❌ فشل إرسال إشعار للتاجر:', error);
            }
        }
    }

    // إرسال إشعار للقناة
    const channelMessage = `🟢 **طلب جديد في المتجر**
        
👤 الزبون: ${order.customerName}
📞 الهاتف: ${order.customerPhone}
📍 العنوان: ${order.customerAddress}

📦 **المنتجات:**
${order.items.map(i => `  • ${i.name} x${i.quantity} = ${i.price * i.quantity} دج (${i.merchantName})`).join('\n')}

💰 الإجمالي: ${order.total} دج
🆔 رقم الطلب: ${order.orderId}`;

    await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/sendMessage`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            chat_id: TELEGRAM.channelId,
            text: channelMessage,
            parse_mode: 'Markdown'
        })
    });

    // حفظ الطلب
    const orders = JSON.parse(localStorage.getItem('nardoo_orders') || '[]');
    orders.push(order);
    localStorage.setItem('nardoo_orders', JSON.stringify(orders));

    cart = [];
    saveCart();
    updateCartCounter();
    toggleCart();
    
    showNotification('✅ تم إرسال الطلب بنجاح، سيتم التواصل معك قريباً', 'success');
}
</script>
