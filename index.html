<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>نكهة وجمال | ناردو برو - المنصة المتكاملة</title>
    
    <!-- الخطوط -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0a0f1a 0%, #0f1420 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* إضافات CSS للريلز */
        .reels-video-section {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }
        
        .reels-video-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .header-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .header-title i {
            font-size: 28px;
            color: gold;
        }
        
        .header-title h2 {
            color: gold;
            margin: 0;
        }
        
        .view-all-link {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,215,0,0.2);
            padding: 8px 20px;
            border-radius: 30px;
            color: gold;
            text-decoration: none;
            transition: all 0.3s;
        }
        
        .view-all-link:hover {
            background: gold;
            color: black;
        }
        
        /* شريط البحث والتحكم */
        .reels-tools-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
        }
        
        .reels-search-box {
            flex: 2;
            display: flex;
            gap: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 50px;
            padding: 5px;
            backdrop-filter: blur(10px);
        }
        
        .reels-search-box input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 20px;
            color: white;
            font-family: 'Cairo', sans-serif;
            font-size: 14px;
        }
        
        .reels-search-box input::placeholder {
            color: rgba(255,255,255,0.6);
        }
        
        .reels-search-box input:focus {
            outline: none;
        }
        
        .reels-search-box button {
            background: linear-gradient(135deg, #ffd700, #ffb347);
            border: none;
            border-radius: 50px;
            padding: 0 20px;
            color: #1a1a2e;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .reels-search-box button:hover {
            transform: scale(1.05);
        }
        
        .reels-actions {
            display: flex;
            gap: 10px;
        }
        
        .reels-action-btn {
            background: rgba(255,215,0,0.2);
            border: 1px solid rgba(255,215,0,0.3);
            padding: 8px 15px;
            border-radius: 30px;
            color: gold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Cairo', sans-serif;
        }
        
        .reels-action-btn:hover {
            background: gold;
            color: black;
            transform: translateY(-2px);
        }
        
        .reels-filter-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        
        .reels-filter-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 6px 15px;
            border-radius: 20px;
            color: #ddd;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 12px;
        }
        
        .reels-filter-btn.active {
            background: #ffd700;
            color: #1a1a2e;
        }
        
        .reels-filter-btn:hover {
            background: rgba(255,215,0,0.3);
        }
        
        .reels-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: rgba(255,215,0,0.1);
            border-radius: 15px;
            margin-bottom: 15px;
            font-size: 12px;
            color: #ffd700;
        }
        
        /* شريط الريلز الأفقي */
        .reels-video-container {
            display: flex;
            flex-direction: row;
            overflow-x: auto;
            gap: 20px;
            padding: 10px 5px;
            scroll-behavior: smooth;
            min-height: 350px;
        }
        
        .reels-video-container::-webkit-scrollbar {
            height: 6px;
        }
        
        .reels-video-container::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }
        
        .reels-video-container::-webkit-scrollbar-thumb {
            background: #ffd700;
            border-radius: 10px;
        }
        
        .reel-video-card {
            flex: 0 0 auto;
            width: 280px;
            border-radius: 15px;
            overflow: hidden;
            background: #1a1a2e;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            border: 1px solid rgba(255,215,0,0.2);
        }
        
        .reel-video-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(255,215,0,0.3);
            border-color: #ffd700;
        }
        
        .reel-video-placeholder {
            height: 280px;
            position: relative;
            background: linear-gradient(135deg, #2a1a3a, #1a0a2a);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .reel-video-placeholder img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .reel-video-placeholder i {
            font-size: 4rem;
            color: gold;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        
        .reel-play-overlay {
            position: absolute;
            bottom: 15px;
            right: 15px;
            background: rgba(0,0,0,0.7);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: gold;
            z-index: 3;
        }
        
        .reel-video-overlay {
            padding: 12px;
            background: rgba(0,0,0,0.8);
        }
        
        .reel-video-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .reel-video-title {
            color: white;
            font-size: 14px;
            font-weight: 500;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .reel-video-views {
            color: #ffd700;
            font-size: 11px;
            white-space: nowrap;
        }
        
        .reel-video-publisher {
            font-size: 11px;
            color: #aaa;
            margin-top: 5px;
        }
        
        .reel-serial-badge {
            font-size: 9px;
            color: #ffd700;
            margin-top: 5px;
            font-family: monospace;
            opacity: 0.7;
        }
        
        .no-reels-message {
            text-align: center;
            padding: 60px 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            width: 100%;
        }
        
        .no-reels-message i {
            font-size: 4rem;
            color: #ffd700;
            margin-bottom: 15px;
        }
        
        .no-reels-message p {
            color: #ddd;
            margin-bottom: 20px;
        }
        
        .loading-reels {
            text-align: center;
            padding: 40px;
            color: white;
            width: 100%;
        }
        
        .add-first-reel {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #ffd700, #ffb347);
            padding: 10px 20px;
            border-radius: 30px;
            color: #1a1a2e;
            text-decoration: none;
            font-weight: bold;
            margin-top: 15px;
        }
        
        .refresh-badge {
            background: rgba(255,215,0,0.2);
            border-radius: 20px;
            padding: 5px 12px;
            font-size: 12px;
            color: gold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .refresh-badge:hover {
            background: gold;
            color: black;
        }
        
        /* ستايل المشغل الكامل */
        .full-reel-player {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 20000;
            overflow-y: auto;
            overflow-x: hidden;
            scroll-snap-type: y mandatory;
        }
        
        .full-reel-item {
            scroll-snap-align: start;
            height: 100vh;
            width: 100%;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .full-reel-item video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .full-reel-info {
            position: absolute;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            padding: 30px 20px 20px;
            color: white;
            border-radius: 20px;
        }
        
        .full-reel-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        
        .full-reel-publisher {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 5px;
        }
        
        .full-reel-views {
            font-size: 13px;
            color: #ffd700;
        }
        
        .full-reel-serial {
            font-size: 11px;
            font-family: monospace;
            color: #aaa;
            margin-top: 5px;
        }
        
        .full-reel-actions {
            position: absolute;
            right: 20px;
            bottom: 100px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 10;
        }
        
        .full-reel-action {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            color: white;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .full-reel-action i {
            font-size: 28px;
        }
        
        .full-reel-action:hover {
            transform: scale(1.1);
            color: #ffd700;
        }
        
        .close-full-player {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            color: white;
            font-size: 24px;
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        
        .close-full-player:hover {
            background: #ffd700;
            color: #1a1a2e;
        }
        
        @media (max-width: 768px) {
            .reels-tools-bar {
                flex-direction: column;
            }
            .reels-search-box {
                width: 100%;
            }
            .reels-actions {
                width: 100%;
                justify-content: center;
            }
            .reel-video-card {
                width: 220px;
            }
            .reel-video-placeholder {
                height: 220px;
            }
            .full-reel-title {
                font-size: 16px;
            }
        }
        
        .toast-message {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 12px 20px;
            border-radius: 50px;
            background: #10b981;
            color: white;
            z-index: 20001;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        .loading-spinner {
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- قسم ريلز الفيديو -->
        <div class="reels-video-section">
            <div class="reels-video-header">
                <div class="header-title">
                    <i class="fas fa-film"></i>
                    <h2>ناردو ريلز</h2>
                    <span class="refresh-badge" onclick="loadReelsFromTelegram()">
                        <i class="fas fa-sync-alt"></i> تحديث
                    </span>
                </div>
                <a href="add-reel.html" class="view-all-link" id="addReelLink">
                    <span>إضافة مقطع</span>
                    <i class="fas fa-arrow-left"></i>
                </a>
            </div>
            
            <!-- شريط البحث والتحكم -->
            <div class="reels-tools-bar">
                <div class="reels-search-box">
                    <input type="text" id="reelsSearchInput" placeholder="🔍 ابحث في الريلز بالعنوان، الناشر، أو المعرف..." onkeyup="handleReelsSearchOnEnter(event)">
                    <button onclick="performReelsSearch()">
                        <i class="fas fa-search"></i> بحث
                    </button>
                </div>
                <div class="reels-actions">
                    <button class="reels-action-btn" onclick="clearReelsSearch()">
                        <i class="fas fa-times"></i> مسح
                    </button>
                    <button class="reels-action-btn" onclick="loadReelsFromTelegram()">
                        <i class="fas fa-download"></i> تحميل
                    </button>
                </div>
            </div>
            
            <!-- أزرار التصفية -->
            <div class="reels-filter-buttons">
                <button class="reels-filter-btn active" data-filter="all" onclick="filterReelsBy('all')">
                    <i class="fas fa-list"></i> الكل
                </button>
                <button class="reels-filter-btn" data-filter="recent" onclick="filterReelsBy('recent')">
                    <i class="fas fa-clock"></i> الأحدث
                </button>
                <button class="reels-filter-btn" data-filter="oldest" onclick="filterReelsBy('oldest')">
                    <i class="fas fa-history"></i> الأقدم
                </button>
                <button class="reels-filter-btn" data-filter="mostViewed" onclick="filterReelsBy('mostViewed')">
                    <i class="fas fa-eye"></i> الأكثر مشاهدة
                </button>
            </div>
            
            <!-- إحصائيات -->
            <div class="reels-stats" id="reelsStats">
                <span><i class="fas fa-chart-line"></i> جاري تحميل الريلز...</span>
            </div>
            
            <!-- عرض الريلز -->
            <div class="reels-video-container" id="reelsVideoContainer">
                <div class="loading-reels">
                    <i class="fas fa-spinner fa-spin loading-spinner"></i>
                    <p>🔄 جاري تحميل الريلز من تليجرام...</p>
                </div>
            </div>
        </div>
        
        <!-- باقي محتوى الصفحة -->
        <div class="reels-stats" style="background: rgba(255,215,0,0.05); text-align: center;">
            <span><i class="fas fa-info-circle"></i> الريلز التي تحمل المعرف NARD- فقط تظهر في الشريط العلوي</span>
        </div>
    </div>

    <script>
        // ========== إعدادات تليجرام ==========
        const TELEGRAM = {
            botToken: '8576673096:AAECPDHWRTVQ_juq68hxM9PIdacnqevGRb4',
            channelId: '-1003822964890',
            apiUrl: 'https://api.telegram.org/bot'
        };
        
        // ========== متغيرات الريلز ==========
        let reelsCache = [];
        let filteredReels = [];
        let currentUser = null;
        let isLoading = false;
        let currentReelsFilter = 'all';
        let currentReelsSearchQuery = '';
        
        // ========== تحميل المستخدم ==========
        function loadCurrentUser() {
            try {
                const savedUser = localStorage.getItem('current_user');
                if (savedUser) {
                    currentUser = JSON.parse(savedUser);
                } else {
                    currentUser = { id: 0, name: 'زائر', role: 'guest' };
                }
                const addReelLink = document.getElementById('addReelLink');
                if (addReelLink) {
                    addReelLink.style.display = currentUser.role === 'admin' ? 'flex' : 'none';
                }
            } catch(e) {
                currentUser = { id: 0, name: 'زائر', role: 'guest' };
            }
        }
        
        // ========== استخراج المعرف الخاص ==========
        function extractBarSerialFromCaption(caption) {
            if (!caption) return null;
            const match = caption.match(/🔑 NARD-SERIAL: (NARD-\d{8}-\d{6}-\d{4})/);
            return match ? match[1] : null;
        }
        
        // ========== جلب الريلز من تليجرام ==========
        async function loadReelsFromTelegram() {
            if (isLoading) return;
            isLoading = true;
            
            const container = document.getElementById('reelsVideoContainer');
            if (container) {
                container.innerHTML = `
                    <div class="loading-reels">
                        <i class="fas fa-spinner fa-spin loading-spinner"></i>
                        <p>🔄 جاري تحميل الريلز من تليجرام...</p>
                    </div>
                `;
            }
            
            updateReelsStats('جاري التحميل...', true);
            
            try {
                // جلب آخر التحديثات من القناة
                const url = `${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getUpdates?limit=50`;
                const response = await fetch(url);
                const data = await response.json();
                
                const allReels = [];
                
                if (data.ok && data.result) {
                    for (const update of data.result) {
                        const post = update.channel_post || update.message;
                        if (!post || !post.video) continue;
                        
                        const caption = post.caption || '';
                        const barSerial = extractBarSerialFromCaption(caption);
                        
                        // فقط الريلز التي تحمل المعرف NARD-
                        if (!barSerial || !barSerial.startsWith('NARD-')) continue;
                        
                        // استخراج العنوان
                        let title = 'ريلز';
                        const titleMatch = caption.match(/🎬 (.+?)(?:\n|$)/);
                        if (titleMatch) title = titleMatch[1];
                        
                        // استخراج الناشر
                        let publisher = 'ناردو برو';
                        const publisherMatch = caption.match(/👤 (.+?)(?:\n|$)/);
                        if (publisherMatch) publisher = publisherMatch[1];
                        
                        // الحصول على رابط الفيديو
                        const fileId = post.video.file_id;
                        const fileRes = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getFile?file_id=${fileId}`);
                        const fileData = await fileRes.json();
                        
                        if (fileData.ok) {
                            const videoUrl = `https://api.telegram.org/file/bot${TELEGRAM.botToken}/${fileData.result.file_path}`;
                            
                            // جلب المشاهدات والإعجابات من localStorage
                            const views = parseInt(localStorage.getItem(`reel_views_${post.message_id}`)) || Math.floor(Math.random() * 100) + 10;
                            const likes = parseInt(localStorage.getItem(`reel_likes_${post.message_id}`)) || Math.floor(Math.random() * 50) + 5;
                            
                            allReels.push({
                                id: post.message_id,
                                title: title,
                                videoUrl: videoUrl,
                                publisher: publisher,
                                serialNumber: barSerial,
                                views: views,
                                likes: likes,
                                timestamp: post.date * 1000,
                                date: new Date(post.date * 1000).toLocaleDateString('ar-EG')
                            });
                        }
                    }
                }
                
                if (allReels.length > 0) {
                    reelsCache = allReels;
                    localStorage.setItem('nardoo_reels_cache', JSON.stringify(allReels));
                    showToast(`✅ تم تحميل ${allReels.length} ريلز`, 'success');
                } else {
                    // استخدام الكاش
                    const cached = localStorage.getItem('nardoo_reels_cache');
                    if (cached) {
                        reelsCache = JSON.parse(cached);
                        showToast(`📦 تم عرض ${reelsCache.length} ريلز من الذاكرة المؤقتة`, 'info');
                    } else {
                        // بيانات تجريبية للعرض
                        reelsCache = [
                            {
                                id: 1,
                                title: 'عرض خاص على التوابل',
                                videoUrl: '',
                                publisher: 'ناردو برو',
                                serialNumber: 'NARD-20250325-143022-8473',
                                views: 128,
                                likes: 45,
                                timestamp: Date.now(),
                                date: 'اليوم'
                            },
                            {
                                id: 2,
                                title: 'منتجات العناية بالبشرة',
                                videoUrl: '',
                                publisher: 'ناردو برو',
                                serialNumber: 'NARD-20250324-120015-6321',
                                views: 256,
                                likes: 89,
                                timestamp: Date.now() - 86400000,
                                date: 'أمس'
                            }
                        ];
                        localStorage.setItem('nardoo_reels_cache', JSON.stringify(reelsCache));
                        showToast(`📹 عرض ريلز تجريبية (للتجربة)`, 'info');
                    }
                }
                
                applyFiltersAndSearch();
                
            } catch (error) {
                console.error('خطأ:', error);
                const cached = localStorage.getItem('nardoo_reels_cache');
                if (cached) {
                    reelsCache = JSON.parse(cached);
                    applyFiltersAndSearch();
                    showToast('⚠️ فشل الاتصال، تم عرض البيانات المخزنة', 'warning');
                } else {
                    showToast('❌ فشل تحميل الريلز', 'error');
                }
            } finally {
                isLoading = false;
            }
        }
        
        // ========== تطبيق التصفية والبحث ==========
        function applyFiltersAndSearch() {
            let result = [...reelsCache];
            
            // تطبيق البحث
            if (currentReelsSearchQuery.trim() !== '') {
                const query = currentReelsSearchQuery.trim().toLowerCase();
                result = result.filter(reel => {
                    return (reel.title && reel.title.toLowerCase().includes(query)) ||
                           (reel.publisher && reel.publisher.toLowerCase().includes(query)) ||
                           (reel.serialNumber && reel.serialNumber.toLowerCase().includes(query));
                });
            }
            
            // تطبيق التصفية
            if (currentReelsFilter === 'recent') {
                result.sort((a, b) => b.timestamp - a.timestamp);
            } else if (currentReelsFilter === 'oldest') {
                result.sort((a, b) => a.timestamp - b.timestamp);
            } else if (currentReelsFilter === 'mostViewed') {
                result.sort((a, b) => (b.views || 0) - (a.views || 0));
            } else {
                result.sort((a, b) => b.timestamp - a.timestamp);
            }
            
            filteredReels = result;
            displayReelsInBar();
            
            const statsText = `📊 عرض ${filteredReels.length} من ${reelsCache.length} ريلز`;
            updateReelsStats(statsText, false);
        }
        
        // ========== وظائف البحث ==========
        function performReelsSearch() {
            const searchInput = document.getElementById('reelsSearchInput');
            currentReelsSearchQuery = searchInput.value;
            applyFiltersAndSearch();
            if (currentReelsSearchQuery) {
                showToast(`🔍 تم البحث عن: "${currentReelsSearchQuery}"`, 'info');
            }
        }
        
        function handleReelsSearchOnEnter(event) {
            if (event.key === 'Enter') {
                performReelsSearch();
            }
        }
        
        function clearReelsSearch() {
            document.getElementById('reelsSearchInput').value = '';
            currentReelsSearchQuery = '';
            applyFiltersAndSearch();
            showToast('🗑️ تم مسح البحث', 'info');
        }
        
        function filterReelsBy(type) {
            currentReelsFilter = type;
            
            document.querySelectorAll('.reels-filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('data-filter') === type) {
                    btn.classList.add('active');
                }
            });
            
            applyFiltersAndSearch();
            
            const filterNames = {
                all: 'الكل',
                recent: 'الأحدث',
                oldest: 'الأقدم',
                mostViewed: 'الأكثر مشاهدة'
            };
            showToast(`📂 عرض: ${filterNames[type]}`, 'info');
        }
        
        // ========== تحديث الإحصائيات ==========
        function updateReelsStats(message, isLoading) {
            const statsDiv = document.getElementById('reelsStats');
            if (statsDiv) {
                statsDiv.innerHTML = `<span><i class="fas ${isLoading ? 'fa-spinner fa-spin' : 'fa-chart-line'}"></i> ${message}</span>`;
            }
        }
        
        // ========== عرض الريلز ==========
        function displayReelsInBar() {
            const container = document.getElementById('reelsVideoContainer');
            if (!container) return;
            
            if (!filteredReels || filteredReels.length === 0) {
                container.innerHTML = `
                    <div class="no-reels-message">
                        <i class="fas fa-film"></i>
                        <p>✨ ${currentReelsSearchQuery ? 'لا توجد نتائج تطابق بحثك' : 'لا توجد ريلز مخصصة للشريط العلوي'} ✨</p>
                        ${!currentReelsSearchQuery ? '<p>الريلز التي تحمل المعرف NARD- فقط هي التي تظهر هنا</p>' : ''}
                        ${currentUser?.role === 'admin' && !currentReelsSearchQuery ? '<a href="add-reel.html" class="add-first-reel"><i class="fas fa-plus-circle"></i> أضف ريلز الآن</a>' : ''}
                    </div>
                `;
                return;
            }
            
            let html = '';
            for (const reel of filteredReels) {
                html += `
                    <div class="reel-video-card" onclick="openFullReelPlayer(${reel.id})">
                        <div class="reel-video-placeholder">
                            <i class="fas fa-play-circle"></i>
                            <div class="reel-play-overlay">
                                <i class="fas fa-play"></i>
                            </div>
                        </div>
                        <div class="reel-video-overlay">
                            <div class="reel-video-info">
                                <span class="reel-video-title">🎬 ${escapeHtml(reel.title)}</span>
                                <span class="reel-video-views"><i class="fas fa-eye"></i> ${formatViews(reel.views)}</span>
                            </div>
                            <div class="reel-video-publisher">
                                <i class="fas fa-user"></i> ${escapeHtml(reel.publisher)}
                            </div>
                            <div class="reel-serial-badge">
                                <i class="fas fa-fingerprint"></i> ${escapeHtml(reel.serialNumber)}
                            </div>
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }
        
        // ========== مشغل الريلز ==========
        function openFullReelPlayer(reelId) {
            const reel = filteredReels.find(r => r.id === reelId);
            if (!reel) return;
            
            // زيادة المشاهدات
            reel.views = (reel.views || 0) + 1;
            localStorage.setItem(`reel_views_${reel.id}`, reel.views);
            
            // تحديث الكاش
            const cacheIndex = reelsCache.findIndex(r => r.id === reelId);
            if (cacheIndex !== -1) {
                reelsCache[cacheIndex].views = reel.views;
                localStorage.setItem('nardoo_reels_cache', JSON.stringify(reelsCache));
            }
            
            // إنشاء المودال
            const modal = document.createElement('div');
            modal.className = 'full-reel-player';
            modal.innerHTML = `
                <button class="close-full-player" onclick="this.closest('.full-reel-player').remove()">
                    <i class="fas fa-times"></i>
                </button>
                <div class="full-reel-item">
                    ${reel.videoUrl ? 
                        `<video src="${reel.videoUrl}" controls autoplay playsinline></video>` :
                        `<div style="display: flex; flex-direction: column; align-items: center; justify-content: center; color: white;">
                            <i class="fas fa-video" style="font-size: 4rem; margin-bottom: 20px;"></i>
                            <p>فيديو تجريبي</p>
                            <p style="font-size: 12px; color: #ffd700;">${reel.title}</p>
                        </div>`
                    }
                    <div class="full-reel-info">
                        <div class="full-reel-title">${escapeHtml(reel.title)}</div>
                        <div class="full-reel-publisher">
                            <i class="fas fa-user"></i> ${escapeHtml(reel.publisher)}
                        </div>
                        <div class="full-reel-views">
                            <i class="fas fa-eye"></i> ${reel.views} مشاهدة
                        </div>
                        <div class="full-reel-serial">
                            <i class="fas fa-fingerprint"></i> ${escapeHtml(reel.serialNumber)}
                        </div>
                    </div>
                    <div class="full-reel-actions">
                        <div class="full-reel-action" onclick="likeReel(${reel.id})">
                            <i class="far fa-heart"></i>
                            <span class="like-count">${reel.likes || 0}</span>
                        </div>
                        <div class="full-reel-action" onclick="shareReel('${reel.title}')">
                            <i class="fas fa-share-alt"></i>
                            <span>مشاركة</span>
                        </div>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            
            // تحديث العرض
            displayReelsInBar();
            applyFiltersAndSearch();
        }
        
        function likeReel(reelId) {
            const reel = reelsCache.find(r => r.id === reelId);
            if (reel) {
                reel.likes = (reel.likes || 0) + 1;
                localStorage.setItem(`reel_likes_${reelId}`, reel.likes);
                localStorage.setItem('nardoo_reels_cache', JSON.stringify(reelsCache));
                
                const likeSpan = document.querySelector('.full-reel-actions .like-count');
                if (likeSpan) {
                    likeSpan.textContent = reel.likes;
                }
                showToast('❤️ تم الإعجاب بالريلز', 'success');
                applyFiltersAndSearch();
            }
        }
        
        function shareReel(title) {
            if (navigator.share) {
                navigator.share({
                    title: title,
                    text: `شاهد هذا الريلز على ناردو برو`,
                    url: window.location.href
                });
            } else {
                navigator.clipboard.writeText(window.location.href);
                showToast('📎 تم نسخ الرابط', 'success');
            }
        }
        
        // ========== أدوات مساعدة ==========
        function formatViews(views) {
            if (!views) return '0';
            if (views >= 1000) return (views / 1000).toFixed(1) + 'K';
            return views.toString();
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = 'toast-message';
            toast.style.background = type === 'success' ? '#10b981' : type === 'error' ? '#ef4444' : '#3b82f6';
            toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle'}"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        // ========== تهيئة الصفحة ==========
        document.addEventListener('DOMContentLoaded', function() {
            loadCurrentUser();
            loadReelsFromTelegram();
            console.log('🎬 نظام ناردو ريلز يعمل بنجاح');
        });
        
        // تحديث تلقائي كل دقيقتين
        setInterval(() => {
            if (!isLoading) {
                loadReelsFromTelegram();
            }
        }, 120000);
    </script>
</body>
</html>
