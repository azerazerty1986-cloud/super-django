<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>بث مباشر من الكاميرا - GitHub Pages</title>
  <style>
    body { 
      margin: 0; padding: 20px; 
      font-family: Arial, sans-serif; 
      background: #0d1117; color: #c9d1d9; 
      text-align: center; 
    }
    h1 { color: #58a6ff; }
    video { 
      width: 90%; max-width: 800px; 
      border: 4px solid #238636; border-radius: 12px; 
      background: black; 
    }
    button { 
      padding: 12px 30px; margin: 10px; 
      font-size: 18px; cursor: pointer; 
      background: #238636; color: white; 
      border: none; border-radius: 8px; 
    }
    button:hover { background: #2ea043; }
    #status { margin: 20px; font-size: 18px; color: #f85149; }
  </style>
</head>
<body>

  <h1>بث مباشر من الكاميرا (Live على GitHub Pages)</h1>
  <p>اضغط "ابدأ البث" لتشغيل الكاميرا مباشرة في المتصفح</p>
  
  <video id="video" autoplay playsinline muted></video>
  <br>
  
  <button onclick="startStream()">ابدأ البث المباشر</button>
  <button onclick="stopStream()">إيقاف البث</button>
  
  <div id="status"></div>

  <script>
    let stream = null;
    const video = document.getElementById('video');
    const status = document.getElementById('status');

    async function startStream() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { width: 1280, height: 720 },
          audio: true  // غيّر إلى false لو ما تبغى صوت
        });
        
        video.srcObject = stream;
        status.textContent = "البث شغال! 🎥🔴";
        status.style.color = "#3fb950";
      } catch (err) {
        console.error("خطأ:", err);
        status.textContent = "خطأ: " + err.message + " (تأكد من السماح بالكاميرا)";
      }
    }

    function stopStream() {
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        video.srcObject = null;
        stream = null;
        status.textContent = "البث متوقف";
        status.style.color = "#c9d1d9";
      }
    }

    // تلقائي عند التحميل (اختياري، شيل التعليق لو تبي)
    // startStream();
  </script>

  <footer style="margin-top: 40px; font-size: 14px;">
    Hosted free on GitHub Pages | © mokhtar 2026
  </footer>

</body>
</html>
