<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بث تاجر تليجرام - ناردو برو</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Cairo', Arial, sans-serif;
            background: #0d1117;
            color: white;
            min-height: 100vh;
            padding: 15px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #161b22;
            border-radius: 20px;
            padding: 20px;
            border: 2px solid #ffd700;
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .header h1 {
            color: #ffd700;
            font-size: 24px;
        }
        
        .live-badge {
            background: #ff0000;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
            margin: 10px 0;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }
        
        .video-container {
            position: relative;
            margin: 15px 0;
            border-radius: 15px;
            overflow: hidden;
            border: 3px solid #238636;
            background: black;
        }
        
        video {
            width: 100%;
            height: auto;
            display: block;
            transform: scaleX(-1);
        }
        
        .video-overlay {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            color: #ffd700;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 12px;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            margin: 15px 0;
        }
        
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            transition: all 0.3s;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        .btn-success {
            background: #238636;
            color: white;
        }
        
        .btn-danger {
            background: #da3633;
            color: white;
        }
        
        .btn-telegram {
            background: #0088cc;
            color: white;
        }
        
        .btn-test {
            background: #6f42c1;
            color: white;
        }
        
        .stats {
            display: flex;
            justify-content: space-around;
            margin: 15px 0;
            padding: 10px;
            background: #2d333b;
            border-radius: 10px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #ffd700;
        }
        
        .stat-label {
            font-size: 12px;
            color: #8b949e;
        }
        
        .input-group {
            margin: 15px 0;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #ffd700;
        }
        
        input, textarea {
            width: 100%;
            padding: 12px;
            background: #21262d;
            border: 1px solid #2d333b;
            border-radius: 8px;
            color: white;
            font-size: 14px;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: #ffd700;
        }
        
        .status-box {
            background: #21262d;
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
            border-right: 4px solid #ffd700;
        }
        
        .config-info {
            background: #1f2937;
            border-radius: 8px;
            padding: 10px;
            margin: 10px 0;
            font-size: 12px;
            color: #8b949e;
            border: 1px dashed #ffd700;
        }
        
        .footer {
            text-align: center;
            margin-top: 20px;
            color: #8b949e;
            font-size: 12px;
        }
        
        .success {
            color: #4caf50;
        }
        
        .error {
            color: #f85149;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ========== 1. إعدادات تلجرام ========== -->
        <div class="config-info">
            <i class="fab fa-telegram"></i>
            <strong>إعدادات البوت:</strong><br>
            توكن: 8576673096:AAEFKd-YSJcW_0d_wAHZBt-5nPg_VOjDX_0<br>
            القناة: -1003822964890<br>
            المدير: 7461896689
        </div>

        <div class="header">
            <h1>📦 بث التاجر المباشر</h1>
            <p>بث مباشر وإرسال إلى تليجرام</p>
        </div>

        <!-- حالة البث -->
        <div class="live-badge" id="liveBadge" style="display: none;">
            <i class="fas fa-circle"></i> بث مباشر الآن
        </div>

        <!-- فيديو الكاميرا -->
        <div class="video-container">
            <video id="video" autoplay playsinline></video>
            <div class="video-overlay" id="videoOverlay">
                <i class="fas fa-camera"></i> الكاميرا متوقفة
            </div>
        </div>

        <!-- أزرار التحكم -->
        <div class="controls">
            <button class="btn-success" onclick="startCamera()">
                <i class="fas fa-play"></i> تشغيل
            </button>
            <button class="btn-danger" onclick="stopCamera()">
                <i class="fas fa-stop"></i> إيقاف
            </button>
            <button class="btn-telegram" onclick="sendToTelegram()">
                <i class="fab fa-telegram"></i> إرسال
            </button>
        </div>

        <!-- إحصائيات -->
        <div class="stats">
            <div class="stat-item">
                <div class="stat-value" id="viewerCount">127</div>
                <div class="stat-label">المشاهدين</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="streamTime">00:00</div>
                <div class="stat-label">مدة البث</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="sentCount">0</div>
                <div class="stat-label">تم الإرسال</div>
            </div>
        </div>

        <!-- معلومات الإرسال -->
        <div class="input-group">
            <label><i class="fab fa-telegram"></i> معرف التاجر</label>
            <input type="text" id="merchantUsername" value="@nardoo_merchant" placeholder="@username">
        </div>

        <div class="input-group">
            <label><i class="fas fa-align-left"></i> وصف البث</label>
            <textarea id="streamDescription" rows="2">🔴 بث مباشر: عرض تشكيلة جديدة من المنتجات 🔥</textarea>
        </div>

        <div class="input-group">
            <label><i class="fas fa-link"></i> رابط المنتج</label>
            <input type="text" id="productUrl" value="https://t.me/nardoo_channel/123" placeholder="رابط المنتج">
        </div>

        <div class="input-group">
            <label><i class="fas fa-paper-plane"></i> إرسال إلى</label>
            <select id="channelSelect" onchange="updateChannel()">
                <option value="-1003822964890">📢 القناة الرئيسية (-1003822964890)</option>
                <option value="7461896689">👤 المدير (7461896689)</option>
                <option value="@nardoo_channel">📱 @nardoo_channel</option>
                <option value="@nardoo_test">🧪 @nardoo_test</option>
            </select>
            <input type="text" id="customChannel" value="-1003822964890" placeholder="معرف مخصص" style="margin-top: 10px;">
        </div>

        <!-- حالة الإرسال -->
        <div class="status-box" id="statusBox">
            <i class="fas fa-info-circle"></i>
            <span id="statusText">🔴 البث متوقف. شغل الكاميرا للبدء</span>
        </div>

        <!-- اختبار البوت -->
        <div class="controls">
            <button class="btn-test" onclick="testBot()">
                <i class="fas fa-robot"></i> اختبار البوت
            </button>
            <button class="btn-telegram" onclick="captureAndSend()">
                <i class="fas fa-camera"></i> تصوير وإرسال
            </button>
        </div>

        <div class="footer">
            <span id="botStatus">⚪ جاري التحقق...</span> | 
            <span>ناردو برو 2026</span>
        </div>
    </div>

    <script>
        // ========== 1. إعدادات تلجرام ==========
        const TELEGRAM = {
            botToken: '8576673096:AAEFKd-YSJcW_0d_wAHZBt-5nPg_VOjDX_0',
            channelId: '-1003822964890',
            adminId: '7461896689'
        };

        // ========== المتغيرات ==========
        let stream = null;
        let cameraActive = false;
        let streamTime = 0;
        let sentCount = 0;
        let timerInterval = null;
        let viewers = 127;
        
        const video = document.getElementById('video');
        const statusText = document.getElementById('statusText');
        const statusBox = document.getElementById('statusBox');
        const liveBadge = document.getElementById('liveBadge');
        const videoOverlay = document.getElementById('videoOverlay');
        const viewerCount = document.getElementById('viewerCount');
        const streamTimeEl = document.getElementById('streamTime');
        const sentCountEl = document.getElementById('sentCount');
        const botStatus = document.getElementById('botStatus');

        // ========== تحديث القناة ==========
        function updateChannel() {
            const select = document.getElementById('channelSelect');
            const custom = document.getElementById('customChannel');
            custom.value = select.value;
        }

        // ========== اختبار البوت ==========
        async function testBot() {
            botStatus.innerHTML = '🔄 جاري الاختبار...';
            statusText.innerHTML = '🔄 جاري اختبار الاتصال...';
            
            try {
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/getMe`);
                const data = await response.json();
                
                if (data.ok) {
                    botStatus.innerHTML = '✅ البوت متصل';
                    statusText.innerHTML = '✅ البوت يعمل! يمكنك البدء';
                    statusBox.style.borderRightColor = '#4caf50';
                    
                    // إرسال رسالة اختبار
                    const testResponse = await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: TELEGRAM.channelId,
                            text: `✅ **اختبار البوت**\n\nالبوت يعمل بنجاح\n🕐 ${new Date().toLocaleString('ar-EG')}`,
                            parse_mode: 'Markdown'
                        })
                    });
                    
                    const testData = await testResponse.json();
                    if (testData.ok) {
                        statusText.innerHTML = '✅ تم إرسال رسالة اختبار للقناة';
                    }
                } else {
                    throw new Error('فشل الاتصال');
                }
            } catch (error) {
                botStatus.innerHTML = '❌ البوت غير متصل';
                statusText.innerHTML = '❌ خطأ في الاتصال: ' + error.message;
                statusBox.style.borderRightColor = '#f85149';
            }
        }

        // ========== تشغيل الكاميرا ==========
        async function startCamera() {
            try {
                statusText.innerHTML = '🔄 جاري تشغيل الكاميرا...';
                
                stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    },
                    audio: false
                });
                
                video.srcObject = stream;
                cameraActive = true;
                
                liveBadge.style.display = 'inline-block';
                videoOverlay.innerHTML = '<i class="fas fa-circle" style="color: #ff0000;"></i> بث مباشر';
                statusText.innerHTML = '✅ البث شغال! اضغط "إرسال" للنشر في تليجرام';
                statusBox.style.borderRightColor = '#4caf50';
                
                startTimer();
                
                // تحديث المشاهدين
                setInterval(() => {
                    if (cameraActive) {
                        viewers += Math.floor(Math.random() * 5) - 2;
                        if (viewers < 100) viewers = 100;
                        viewerCount.textContent = viewers;
                    }
                }, 10000);
                
            } catch (err) {
                statusText.innerHTML = '❌ خطأ: ' + err.message;
                statusBox.style.borderRightColor = '#f85149';
            }
        }

        // ========== إيقاف الكاميرا ==========
        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                video.srcObject = null;
                stream = null;
                cameraActive = false;
                
                liveBadge.style.display = 'none';
                videoOverlay.innerHTML = '<i class="fas fa-camera"></i> الكاميرا متوقفة';
                statusText.innerHTML = '⏹️ البث متوقف';
                statusBox.style.borderRightColor = '#ffd700';
                
                clearInterval(timerInterval);
                streamTime = 0;
                streamTimeEl.textContent = '00:00';
            }
        }

        // ========== بدء عداد الوقت ==========
        function startTimer() {
            streamTime = 0;
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                streamTime++;
                const minutes = Math.floor(streamTime / 60);
                const seconds = streamTime % 60;
                streamTimeEl.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }, 1000);
        }

        // ========== التقاط صورة ==========
        function captureImage() {
            return new Promise((resolve) => {
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth || 640;
                canvas.height = video.videoHeight || 480;
                const ctx = canvas.getContext('2d');
                
                ctx.translate(canvas.width, 0);
                ctx.scale(-1, 1);
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                canvas.toBlob((blob) => {
                    resolve(blob);
                }, 'image/jpeg', 0.9);
            });
        }

        // ========== إرسال إلى تليجرام ==========
        async function sendToTelegram() {
            if (!cameraActive) {
                alert('❌ شغل الكاميرا أولاً');
                return;
            }

            const channelId = document.getElementById('customChannel').value || TELEGRAM.channelId;
            const merchantUsername = document.getElementById('merchantUsername').value;
            const description = document.getElementById('streamDescription').value;
            const productUrl = document.getElementById('productUrl').value;

            statusText.innerHTML = '🔄 جاري الإرسال إلى تليجرام...';
            
            try {
                const imageBlob = await captureImage();
                
                const formData = new FormData();
                formData.append('chat_id', channelId);
                formData.append('photo', imageBlob, 'stream.jpg');
                
                const caption = `🔴 **بث مباشر الآن**

👤 التاجر: ${merchantUsername}
📝 ${description}
⏰ الوقت: ${new Date().toLocaleString('ar-EG')}
👥 المشاهدين: ${viewers}

🎥 **شاهد البث مباشرة**
${productUrl ? '🔗 رابط المنتج: ' + productUrl : ''}

#بث_مباشر #تاجر_تليجرام #ناردو_برو`;

                formData.append('caption', caption);
                
                const replyMarkup = {
                    inline_keyboard: [
                        [
                            { text: "📱 تواصل مع التاجر", url: `https://t.me/${merchantUsername.replace('@', '')}` },
                            { text: "🛒 طلب المنتج", callback_data: "order_now" }
                        ]
                    ]
                };
                formData.append('reply_markup', JSON.stringify(replyMarkup));

                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (result.ok) {
                    statusText.innerHTML = "✅ تم إرسال البث إلى تليجرام بنجاح!";
                    statusBox.style.borderRightColor = '#4caf50';
                    
                    sentCount++;
                    sentCountEl.textContent = sentCount;
                    
                } else {
                    throw new Error(result.description);
                }

            } catch (error) {
                statusText.innerHTML = "❌ فشل الإرسال: " + error.message;
                statusBox.style.borderRightColor = '#f85149';
                
                // محاولة إرسال رسالة نصية
                try {
                    const textMessage = `🔴 **بث مباشر**

التاجر: ${merchantUsername}
${description}
🕐 ${new Date().toLocaleTimeString('ar-EG')}
👥 ${viewers} مشاهد

📱 للتواصل: https://t.me/${merchantUsername.replace('@', '')}`;

                    const response = await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: channelId,
                            text: textMessage,
                            parse_mode: 'Markdown'
                        })
                    });
                    
                    const result = await response.json();
                    if (result.ok) {
                        statusText.innerHTML = "✅ تم إرسال الإشعار النصي";
                        sentCount++;
                        sentCountEl.textContent = sentCount;
                    }
                } catch (e) {
                    console.log('فشل الإرسال النصي:', e);
                }
            }
        }

        // ========== تصوير وإرسال مباشر ==========
        async function captureAndSend() {
            if (!cameraActive) {
                alert('❌ شغل الكاميرا أولاً');
                return;
            }
            
            await sendToTelegram();
        }

        // ========== التهيئة ==========
        window.onload = function() {
            viewerCount.textContent = viewers;
            updateChannel();
            
            // اختبار البوت تلقائياً
            setTimeout(testBot, 1000);
        };

    </script>
</body>
</html>
