<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>نكهة وجمال | ناردو برو - المنصة المتكاملة</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: #f5f5f5;
            overflow-x: hidden;
        }

        body.dark-mode {
            background: #121212;
            color: white;
        }

        /* ========== شاشة تسجيل الدخول ========== */
        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f2b23, #1e4a3f);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20000;
        }

        .login-box {
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            border: 3px solid gold;
            border-radius: 50px;
            padding: 45px 35px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-box h2 {
            color: gold;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .login-box input {
            width: 100%;
            padding: 15px 20px;
            margin: 12px 0;
            background: rgba(255,255,255,0.1);
            border: 2px solid gold;
            border-radius: 50px;
            color: white;
            font-size: 16px;
            text-align: center;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, gold, #ffd700);
            border: none;
            border-radius: 50px;
            color: black;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s;
        }

        /* ========== شريط المستخدم ========== */
        .user-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, rgba(0,0,0,0.95), rgba(0,0,0,0.85));
            backdrop-filter: blur(15px);
            padding: 12px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            z-index: 100;
            border-bottom: 2px solid gold;
        }

        .user-badge {
            background: linear-gradient(135deg, #ff0066, #cc0052);
            padding: 8px 22px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: bold;
            color: white;
        }

        .user-stats {
            display: flex;
            gap: 15px;
        }

        .user-stat {
            background: rgba(255,255,255,0.12);
            padding: 6px 18px;
            border-radius: 30px;
            text-align: center;
        }

        .user-stat .number {
            font-size: 20px;
            font-weight: bold;
            color: gold;
        }

        .action-btn {
            background: rgba(255,215,0,0.2);
            border: 1px solid gold;
            color: gold;
            padding: 8px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            margin: 0 5px;
        }

        .logout-btn {
            background: rgba(255,0,102,0.3);
            border: 1px solid #ff0066;
            color: white;
        }

        /* ========== مشغل الريلز ========== */
        .reels-player {
            position: fixed;
            top: 70px;
            left: 0;
            width: 100%;
            height: calc(100% - 70px);
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
            z-index: 50;
        }

        .reel-slide {
            position: relative;
            width: 100%;
            height: calc(100vh - 70px);
            scroll-snap-align: start;
            background: #000;
            overflow: hidden;
        }

        .reel-video-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
        }

        .reel-video-container video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }

        .reel-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.5) 50%, transparent 100%);
            padding: 100px 20px 30px;
            pointer-events: none;
        }

        .reel-info {
            pointer-events: auto;
        }

        .reel-title {
            font-size: 20px;
            font-weight: bold;
            color: gold;
            margin-bottom: 8px;
        }

        .reel-publisher {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            font-size: 15px;
        }

        .reel-stats {
            display: flex;
            gap: 25px;
            margin-top: 12px;
            font-size: 14px;
        }

        .reel-stats span {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        /* أزرار التفاعل الجانبية */
        .action-sidebar {
            position: absolute;
            bottom: 130px;
            right: 15px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 20;
            pointer-events: auto;
        }

        .action-btn-side {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid rgba(255,215,0,0.5);
        }

        .action-btn-side i {
            font-size: 24px;
            color: white;
        }

        .action-btn-side span {
            font-size: 11px;
            font-weight: bold;
        }

        .action-btn-side:hover {
            transform: scale(1.1);
            background: gold;
        }

        .action-btn-side:hover i,
        .action-btn-side:hover span {
            color: black;
        }

        .action-btn-side.liked {
            background: #ff0066;
            border-color: #ff0066;
        }

        /* نافذة التعليقات */
        .comments-modal {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-top-left-radius: 30px;
            border-top-right-radius: 30px;
            z-index: 10001;
            max-height: 70vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
            border-top: 3px solid gold;
        }

        .comments-header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255,215,0,0.3);
            position: sticky;
            top: 0;
            background: #1a1a2e;
        }

        .comments-header h3 {
            color: gold;
        }

        .close-comments {
            position: absolute;
            left: 20px;
            top: 15px;
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        .comments-list {
            padding: 15px;
            max-height: 50vh;
            overflow-y: auto;
        }

        .comment-item {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 12px 15px;
            margin-bottom: 12px;
        }

        .comment-input-area {
            padding: 15px;
            display: flex;
            gap: 10px;
            border-top: 1px solid rgba(255,215,0,0.3);
            background: #1a1a2e;
        }

        .comment-input {
            flex: 1;
            padding: 12px 15px;
            background: rgba(255,255,255,0.1);
            border: 1px solid gold;
            border-radius: 50px;
            color: white;
        }

        .comment-send-btn {
            background: gold;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            color: black;
            cursor: pointer;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        /* زر الرفع */
        .upload-fab {
            position: fixed;
            bottom: 30px;
            left: 20px;
            background: linear-gradient(135deg, gold, #ffd700);
            color: black;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            z-index: 1001;
            border: 2px solid white;
            box-shadow: 0 5px 25px rgba(212,175,55,0.5);
            transition: all 0.3s;
            text-decoration: none;
        }

        .upload-fab:hover {
            transform: scale(1.1);
        }

        /* الإشعارات */
        .notification {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, gold, #ffd700);
            color: black;
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: bold;
            z-index: 2000;
            animation: slideUp 0.3s ease;
            font-size: 14px;
        }

        .loading-overlay {
            position: fixed;
            top: 70px;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            flex-direction: column;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,215,0,0.3);
            border-top-color: gold;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            .action-sidebar { bottom: 100px; right: 10px; }
            .action-btn-side { width: 45px; height: 45px; }
            .action-btn-side i { font-size: 20px; }
            .user-bar { padding: 10px 15px; }
        }
    </style>
</head>
<body>

    <!-- ========== شاشة تسجيل الدخول ========== -->
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <i class="fas fa-film" style="font-size: 65px; color: gold; margin-bottom: 20px;"></i>
            <h2>🎬 ناردو ريلز</h2>
            <p>إعجابات - تعليقات - مشاركة - ثنائي</p>
            <input type="text" id="loginUsername" placeholder="اسم المستخدم" autocomplete="off">
            <button class="login-btn" onclick="login()">
                <i class="fas fa-sign-in-alt"></i> دخول
            </button>
        </div>
    </div>

    <!-- ========== شريط المستخدم ========== -->
    <div id="topBar" style="display: none;">
        <div class="user-bar">
            <div class="user-badge">
                <i class="fas fa-user"></i>
                <span id="userNameDisplay"></span>
            </div>
            <div class="user-stats">
                <div class="user-stat">
                    <span class="number" id="totalReelsCount">0</span>
                    <div class="label">الريلز</div>
                </div>
            </div>
            <div>
                <button class="action-btn" onclick="loadReels()">
                    <i class="fas fa-sync-alt"></i> تحديث
                </button>
                <button class="action-btn logout-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> خروج
                </button>
            </div>
        </div>
    </div>

    <!-- ========== مشغل الريلز ========== -->
    <div id="reelsPlayer" class="reels-player" style="display: none;"></div>

    <!-- ========== زر رفع ريلز ========== -->
    <div id="fabButtons" style="display: none;">
        <a href="add-reel.html" class="upload-fab">
            <i class="fas fa-plus"></i>
        </a>
    </div>

    <!-- ========== نافذة التعليقات ========== -->
    <div class="comments-modal" id="commentsModal">
        <div class="comments-header">
            <button class="close-comments" onclick="closeCommentsModal()">✕</button>
            <h3><i class="fas fa-comments"></i> التعليقات</h3>
        </div>
        <div class="comments-list" id="commentsList">
            <div style="text-align: center; padding: 30px; color: #aaa;">لا توجد تعليقات بعد</div>
        </div>
        <div class="comment-input-area">
            <input type="text" class="comment-input" id="commentInput" placeholder="اكتب تعليقاً...">
            <button class="comment-send-btn" onclick="addComment()">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script>
        // ========== إعدادات تليجرام ==========
        const TELEGRAM = {
            botToken: '8576673096:AAECPDHWRTVQ_juq68hxM9PIdacnqevGRb4',
            channelId: '-1003822964890',
            apiUrl: 'https://api.telegram.org/bot'
        };

        // ========== البيانات العامة ==========
        let reelsCache = [];
        let users = [];
        let currentUser = null;
        let userLikes = {};
        let userComments = {};
        let currentReelForComments = null;

        // ========== دوال مساعدة ==========
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
        }

        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num || 0;
        }

        function showNotification(msg) {
            const div = document.createElement('div');
            div.className = 'notification';
            div.innerHTML = `✨ ${msg}`;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }

        function showLoadingOverlay(show, message) {
            let overlay = document.getElementById('loadingOverlay');
            if (show && !overlay) {
                overlay = document.createElement('div');
                overlay.id = 'loadingOverlay';
                overlay.className = 'loading-overlay';
                overlay.innerHTML = `<div class="loading-spinner"></div><p style="color: gold;">${message}</p>`;
                document.body.appendChild(overlay);
            } else if (!show && overlay) {
                overlay.remove();
            }
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text);
            showNotification('📋 تم نسخ الرابط');
        }

        function getTimeAgo(dateString) {
            if (!dateString) return '';
            const diff = Math.floor((Date.now() - new Date(dateString).getTime()) / 1000);
            if (diff < 60) return 'الآن';
            if (diff < 3600) return `منذ ${Math.floor(diff / 60)} دقيقة`;
            if (diff < 86400) return `منذ ${Math.floor(diff / 3600)} ساعة`;
            return `منذ ${Math.floor(diff / 86400)} يوم`;
        }

        // ========== تحميل البيانات ==========
        function loadUsers() {
            const saved = localStorage.getItem('nardoo_users');
            if (saved) users = JSON.parse(saved);
            else users = [];
        }

        function loadLikes() {
            const userId = currentUser?.id || 'guest';
            const saved = localStorage.getItem(`nardoo_likes_${userId}`);
            if (saved) userLikes = JSON.parse(saved);
            else userLikes = {};
        }

        function saveLikes() {
            const userId = currentUser?.id || 'guest';
            localStorage.setItem(`nardoo_likes_${userId}`, JSON.stringify(userLikes));
        }

        function loadComments() {
            const saved = localStorage.getItem('nardoo_comments');
            if (saved) userComments = JSON.parse(saved);
            else userComments = {};
        }

        function saveComments() {
            localStorage.setItem('nardoo_comments', JSON.stringify(userComments));
        }

        // ========== دمج جميع الريلز ==========
        function mergeAllReels() {
            let merged = [...reelsCache];
            
            const quickReels = JSON.parse(localStorage.getItem('quick_reels') || '[]');
            for (const quick of quickReels) {
                if (!merged.find(r => r.id === quick.id)) {
                    merged.unshift(quick);
                }
            }
            
            const nardoList = JSON.parse(localStorage.getItem('nardo_reels_list') || '[]');
            for (const reel of nardoList) {
                if (!merged.find(r => r.id === reel.id)) {
                    merged.unshift(reel);
                }
            }
            
            const uniqueMap = new Map();
            for (const reel of merged) {
                if (!uniqueMap.has(reel.id)) {
                    uniqueMap.set(reel.id, reel);
                }
            }
            merged = Array.from(uniqueMap.values());
            merged.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
            
            return merged;
        }

        // ========== عرض الريلز ==========
        function displayAllReels() {
            const container = document.getElementById('reelsPlayer');
            const allReels = mergeAllReels();
            
            if (!allReels || allReels.length === 0) {
                container.innerHTML = `<div style="display: flex; align-items: center; justify-content: center; height: 100%; flex-direction: column; text-align: center;">
                    <i class="fas fa-film" style="font-size: 90px; color: gold; margin-bottom: 25px;"></i>
                    <h2 style="color: gold;">لا توجد ريلز</h2>
                    <a href="add-reel.html" class="action-btn" style="margin-top: 20px; display: inline-block; text-decoration: none;">➕ رفع أول ريلز</a>
                </div>`;
                return;
            }
            
            container.innerHTML = allReels.map(reel => {
                const isLiked = userLikes[reel.id] === true;
                const likesCount = (reel.likes || 0) + (isLiked && !reel.likes ? 1 : 0);
                const commentsCount = (userComments[reel.id] || []).length;
                
                return `
                    <div class="reel-slide" data-reel-id="${reel.id}">
                        <div class="reel-video-container">
                            <video src="${reel.videoUrl}" preload="metadata" playsinline webkit-playsinline loop></video>
                            
                            <div class="action-sidebar">
                                <div class="action-btn-side ${isLiked ? 'liked' : ''}" onclick="likeReel(${reel.id}, event)">
                                    <i class="fas fa-heart"></i>
                                    <span id="likes-${reel.id}">${formatNumber(likesCount)}</span>
                                </div>
                                <div class="action-btn-side" onclick="openCommentsModal(${reel.id}, event)">
                                    <i class="fas fa-comment"></i>
                                    <span>${formatNumber(commentsCount)}</span>
                                </div>
                                <div class="action-btn-side" onclick="shareReel('${reel.videoUrl}', '${escapeHtml(reel.title)}', event)">
                                    <i class="fas fa-share-alt"></i>
                                    <span>مشاركة</span>
                                </div>
                                <div class="action-btn-side" onclick="startDuet(${reel.id}, event)">
                                    <i class="fas fa-users"></i>
                                    <span>ثنائي</span>
                                </div>
                            </div>
                            
                            <div class="reel-overlay">
                                <div class="reel-info">
                                    <div class="reel-title">
                                        <i class="fas fa-play-circle" style="color: gold;"></i> ${escapeHtml(reel.title)}
                                    </div>
                                    <div class="reel-publisher">
                                        <i class="fas fa-user-circle"></i> ${escapeHtml(reel.publisher)}
                                        <span style="font-size: 11px; color: #888;">${getTimeAgo(reel.createdAt || reel.timestamp)}</span>
                                        ${reel.hasAzerg ? '<span style="color: #10b981;"><i class="fas fa-check-circle"></i> معتمد</span>' : ''}
                                    </div>
                                    <div class="reel-stats">
                                        <span onclick="likeReel(${reel.id}, event)"><i class="fas fa-heart"></i> ${formatNumber(likesCount)}</span>
                                        <span onclick="openCommentsModal(${reel.id}, event)"><i class="fas fa-comment"></i> ${formatNumber(commentsCount)}</span>
                                        <span onclick="shareReel('${reel.videoUrl}', '${escapeHtml(reel.title)}', event)"><i class="fas fa-share"></i> مشاركة</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            // تشغيل تلقائي
            setTimeout(() => {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        const video = entry.target.querySelector('video');
                        if (video && entry.isIntersecting) {
                            video.play().catch(e => console.log);
                        } else if (video) {
                            video.pause();
                        }
                    });
                }, { threshold: 0.6 });
                document.querySelectorAll('.reel-slide').forEach(slide => observer.observe(slide));
            }, 100);
        }

        // ========== الإعجاب ==========
        function likeReel(reelId, event) {
            if (event) event.stopPropagation();
            const allReels = mergeAllReels();
            const reel = allReels.find(r => r.id === reelId);
            if (reel) {
                if (userLikes[reelId]) {
                    reel.likes = Math.max(0, (reel.likes || 0) - 1);
                    delete userLikes[reelId];
                } else {
                    reel.likes = (reel.likes || 0) + 1;
                    userLikes[reelId] = true;
                    showNotification('❤️ تم الإعجاب!');
                    if (navigator.vibrate) navigator.vibrate(50);
                }
                saveLikes();
                
                // تحديث cache
                const cacheIndex = reelsCache.findIndex(r => r.id === reelId);
                if (cacheIndex !== -1) {
                    reelsCache[cacheIndex].likes = reel.likes;
                }
                
                displayAllReels();
                updateStats();
            }
        }

        // ========== التعليقات ==========
        function openCommentsModal(reelId, event) {
            if (event) event.stopPropagation();
            currentReelForComments = reelId;
            const comments = userComments[reelId] || [];
            const commentsList = document.getElementById('commentsList');
            
            if (comments.length === 0) {
                commentsList.innerHTML = '<div style="text-align: center; padding: 30px; color: #aaa;">💬 لا توجد تعليقات، كن أول من يعلق!</div>';
            } else {
                commentsList.innerHTML = comments.map(comment => `
                    <div class="comment-item">
                        <div style="display: flex; gap: 12px;">
                            <div style="width: 40px; height: 40px; background: linear-gradient(135deg, gold, #ff6b6b); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold;">${comment.userName.charAt(0).toUpperCase()}</div>
                            <div style="flex: 1;">
                                <div style="font-weight: bold; color: gold;">${escapeHtml(comment.userName)}</div>
                                <div style="margin-top: 5px;">${escapeHtml(comment.text)}</div>
                                <div style="font-size: 10px; color: #aaa; margin-top: 5px;">${getTimeAgo(comment.timestamp)}</div>
                            </div>
                        </div>
                    </div>
                `).join('');
            }
            document.getElementById('commentsModal').style.display = 'block';
        }

        function closeCommentsModal() {
            document.getElementById('commentsModal').style.display = 'none';
            currentReelForComments = null;
        }

        function addComment() {
            const input = document.getElementById('commentInput');
            const text = input.value.trim();
            if (!text) {
                showNotification('✏️ اكتب تعليقاً أولاً');
                return;
            }
            if (!currentReelForComments) return;
            if (!userComments[currentReelForComments]) userComments[currentReelForComments] = [];
            userComments[currentReelForComments].unshift({
                userName: currentUser.name,
                text: text,
                timestamp: new Date().toISOString()
            });
            saveComments();
            input.value = '';
            openCommentsModal(currentReelForComments, null);
            displayAllReels();
            showNotification('✅ تم إضافة تعليقك');
        }

        // ========== مشاركة ==========
        function shareReel(videoUrl, title, event) {
            if (event) event.stopPropagation();
            const shareText = `🎬 ${title}\n📱 ناردو ريلز\n🔗 ${videoUrl}`;
            if (navigator.share) {
                navigator.share({ title: title, text: shareText, url: videoUrl });
            } else {
                copyToClipboard(shareText);
                showNotification('🔗 تم نسخ رابط المشاركة');
            }
        }

        // ========== ثنائي ==========
        function startDuet(reelId, event) {
            if (event) event.stopPropagation();
            const allReels = mergeAllReels();
            const reel = allReels.find(r => r.id === reelId);
            if (reel) {
                showNotification(`🎤 تحدي ثنائي مع ${reel.publisher} - قريباً!`);
            }
        }

        // ========== جلب الريلز من تليجرام ==========
        async function loadReels() {
            showLoadingOverlay(true, "🔄 جاري تحميل الريلز...");
            
            try {
                const url = `${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getUpdates?limit=100`;
                const response = await fetch(url);
                const data = await response.json();
                
                const reels = [];
                if (data.ok && data.result) {
                    const updates = [...data.result].reverse();
                    
                    for (const update of updates) {
                        const post = update.channel_post || update.message;
                        if (!post || !post.video) continue;
                        
                        const caption = post.caption || '';
                        const messageId = post.message_id;
                        
                        let title = '🎬 ريلز';
                        const titleMatch = caption.match(/🎬 (.+?)(?:\n|$)/);
                        if (titleMatch) title = titleMatch[1];
                        
                        let publisher = 'ناردو برو';
                        const publisherMatch = caption.match(/👤 الناشر: (.+?)(?:\n|$)/);
                        if (publisherMatch) publisher = publisherMatch[1];
                        
                        const hasAzerg = caption.includes('@azerg') || caption.includes('azerg');
                        
                        const fileId = post.video.file_id;
                        const fileRes = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getFile?file_id=${fileId}`);
                        const fileData = await fileRes.json();
                        
                        if (fileData.ok) {
                            const videoUrl = `https://api.telegram.org/file/bot${TELEGRAM.botToken}/${fileData.result.file_path}`;
                            
                            reels.push({
                                id: messageId,
                                title: title,
                                videoUrl: videoUrl,
                                publisher: publisher,
                                hasAzerg: hasAzerg,
                                likes: 0,
                                views: 0,
                                createdAt: new Date(post.date * 1000).toISOString(),
                                timestamp: post.date * 1000
                            });
                        }
                    }
                }
                
                if (reels.length > 0) {
                    reelsCache = reels;
                    localStorage.setItem('nardo_reels_cache', JSON.stringify(reels));
                } else {
                    const cached = localStorage.getItem('nardo_reels_cache');
                    if (cached) {
                        reelsCache = JSON.parse(cached);
                    } else {
                        // ريلز تجريبية
                        reelsCache = [
                            {
                                id: 1001,
                                title: "🚀 مستقبل التكنولوجيا",
                                publisher: "ناردو برو",
                                videoUrl: "https://www.w3schools.com/html/mov_bbb.mp4",
                                likes: 234,
                                hasAzerg: true,
                                createdAt: new Date().toISOString(),
                                timestamp: Date.now()
                            },
                            {
                                id: 1002,
                                title: "🎵 إيقاعات رائعة",
                                publisher: "ناردو برو",
                                videoUrl: "https://www.w3schools.com/html/movie.mp4",
                                likes: 567,
                                hasAzerg: true,
                                createdAt: new Date().toISOString(),
                                timestamp: Date.now() - 3600000
                            }
                        ];
                        localStorage.setItem('nardo_reels_cache', JSON.stringify(reelsCache));
                    }
                }
                
                displayAllReels();
                updateStats();
                showNotification(`✨ تم تحميل ${mergeAllReels().length} ريلز`);
                
            } catch (error) {
                console.error('❌ خطأ:', error);
                const cached = localStorage.getItem('nardo_reels_cache');
                if (cached) {
                    reelsCache = JSON.parse(cached);
                    displayAllReels();
                    updateStats();
                    showNotification('⚠️ تم عرض الريلز المخزنة مؤقتاً');
                }
            } finally {
                showLoadingOverlay(false);
            }
        }

        function updateStats() {
            const allReels = mergeAllReels();
            document.getElementById('totalReelsCount').innerText = allReels.length;
        }

        // ========== الاستماع للتحديثات ==========
        function listenForUpdates() {
            window.addEventListener('storage', (e) => {
                if (e.key === 'nardo_reels_updated' || e.key === 'reels_just_uploaded') {
                    console.log('🔄 تم اكتشاف ريلز جديد، جاري التحديث...');
                    setTimeout(() => loadReels(), 1000);
                }
            });
        }

        // ========== تسجيل الدخول والخروج ==========
        function login() {
            const username = document.getElementById('loginUsername').value.trim();
            if (!username) {
                showNotification('❌ أدخل اسم المستخدم');
                return;
            }
            
            let user = users.find(u => u.name === username);
            if (!user) {
                user = { id: Date.now(), name: username };
                users.push(user);
                localStorage.setItem('nardoo_users', JSON.stringify(users));
            }
            
            currentUser = user;
            localStorage.setItem('current_user', JSON.stringify(user));
            loadLikes();
            loadComments();
            
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('topBar').style.display = 'block';
            document.getElementById('fabButtons').style.display = 'block';
            document.getElementById('reelsPlayer').style.display = 'block';
            document.getElementById('userNameDisplay').innerText = currentUser.name;
            
            loadReels();
            listenForUpdates();
            showNotification(`👋 مرحباً ${user.name}`);
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('current_user');
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('topBar').style.display = 'none';
            document.getElementById('fabButtons').style.display = 'none';
            document.getElementById('reelsPlayer').style.display = 'none';
            showNotification('👋 تم تسجيل الخروج');
        }

        // ========== التهيئة ==========
        loadUsers();
        const savedUser = localStorage.getItem('current_user');
        if (savedUser) {
            currentUser = JSON.parse(savedUser);
            loadLikes();
            loadComments();
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('topBar').style.display = 'block';
            document.getElementById('fabButtons').style.display = 'block';
            document.getElementById('reelsPlayer').style.display = 'block';
            document.getElementById('userNameDisplay').innerText = currentUser.name;
            loadReels();
            listenForUpdates();
        }
    </script>
</body>
