<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📹 بث مباشر - واجهة بسيطة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }
        
        body {
            background: #0a0c10;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        
        .container {
            max-width: 500px;
            width: 100%;
            background: #161b22;
            border-radius: 30px;
            padding: 25px;
            border: 2px solid #ffd700;
            box-shadow: 0 0 30px rgba(255,215,0,0.3);
        }
        
        /* رأس الصفحة */
        .header {
            text-align: center;
            margin-bottom: 25px;
        }
        
        .header h1 {
            color: #ffd700;
            font-size: 28px;
            margin-bottom: 5px;
        }
        
        .publisher {
            color: #0088cc;
            font-size: 18px;
            font-weight: bold;
        }
        
        /* شاشة البث */
        .live-container {
            background: black;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 25px;
            border: 3px solid #ffd700;
            position: relative;
        }
        
        .live-header {
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            padding: 15px;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .live-badge {
            background: #ff0000;
            color: white;
            padding: 5px 15px;
            border-radius: 25px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%,100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .timer-badge {
            background: rgba(0,0,0,0.7);
            color: #ffd700;
            padding: 5px 15px;
            border-radius: 25px;
            font-size: 20px;
            font-weight: bold;
            border: 2px solid #ffd700;
        }
        
        video, canvas {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            display: block;
        }
        
        canvas {
            background: #1a1a1a;
        }
        
        /* الأزرار */
        .buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            justify-content: center;
        }
        
        .btn {
            flex: 1;
            max-width: 150px;
            padding: 15px 0;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s;
        }
        
        .btn-start {
            background: #4caf50;
            color: white;
        }
        
        .btn-stop {
            background: #f44336;
            color: white;
        }
        
        .btn-zip {
            background: #ffd700;
            color: black;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            filter: brightness(1.2);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        /* اختيار الكاميرا */
        .camera-select {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            justify-content: center;
        }
        
        .cam-option {
            padding: 10px 25px;
            border-radius: 25px;
            background: #1f2630;
            color: #8b949e;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s;
        }
        
        .cam-option.active {
            border-color: #ffd700;
            color: #ffd700;
            background: #ffd70020;
        }
        
        /* شريط الحالة */
        .status-bar {
            background: #1f2630;
            border-radius: 15px;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #ffd700;
        }
        
        .recording-indicator {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4caf50;
        }
        
        .dot.recording {
            background: #f44336;
            animation: blink 1s infinite;
        }
        
        .footer {
            text-align: center;
            margin-top: 20px;
            color: #6e7681;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- رأس الصفحة -->
        <div class="header">
            <h1>📹 بث مباشر</h1>
            <div class="publisher">@nardoo_merchant</div>
        </div>

        <!-- شاشة البث -->
        <div class="live-container">
            <div class="live-header">
                <span class="live-badge" id="liveIndicator">🔴 مباشر</span>
                <span class="timer-badge" id="countdownDisplay">5</span>
            </div>
            <video id="liveVideo" autoplay playsinline muted style="display: none;"></video>
            <canvas id="previewCanvas" width="500" height="500"></canvas>
        </div>

        <!-- اختيار الكاميرا -->
        <div class="camera-select">
            <div class="cam-option active" onclick="selectCamera('user')" id="camFront">أمامية</div>
            <div class="cam-option" onclick="selectCamera('environment')" id="camBack">خلفية</div>
        </div>

        <!-- 3 أزرار بسيطة -->
        <div class="buttons">
            <button class="btn btn-start" onclick="startBroadcast()" id="startBtn">
                <i class="fas fa-play"></i> بدء
            </button>
            <button class="btn btn-stop" onclick="stopBroadcast()" id="stopBtn" disabled>
                <i class="fas fa-stop"></i> إيقاف
            </button>
            <button class="btn btn-zip" onclick="saveZip()" id="zipBtn" disabled>
                <i class="fas fa-file-archive"></i> ZIP
            </button>
        </div>

        <!-- شريط الحالة -->
        <div class="status-bar">
            <div class="recording-indicator">
                <span class="dot" id="statusDot"></span>
                <span id="statusText">الكاميرا متوقفة</span>
            </div>
            <div id="stats">0 صور | 0 فيديو</div>
        </div>

        <div class="footer">
            <i class="fas fa-circle"></i> HYBRID v2.0
        </div>
    </div>

    <script>
        // ========== بروتوكول HYBRID v2.0 ==========
        const HYBRID_CONFIG = {
            videoFPS: 30,
            videoBitrate: "2500k",
            videoDuration: 5,
            videoInterval: 8000,
            photoFPS: 5,
            photoQuality: 0.9,
            photoInterval: 200,
            bufferSize: 5000,
            maxQueueSize: 20
        };

        // ========== بصمة الناشر ==========
        const PUBLISHER = {
            id: '@nardoo_merchant',
            name: 'تاجر ناردو',
            master: null,
            
            generateMasterFingerprint: function() {
                const now = new Date();
                const sessionId = 'LIVE_' + Math.random().toString(36).substring(2, 8).toUpperCase();
                const signature = btoa(this.id + now.getTime()).substring(0, 8).toUpperCase();
                return {
                    publisher: this.id,
                    session: sessionId,
                    date: now.toLocaleDateString('ar-EG').replace(/\//g, '-'),
                    signature: signature
                };
            },
            
            generateSubFingerprint: function(albumId) {
                if (!this.master) return 'ERROR';
                const base = this.master.signature;
                const albumHash = (parseInt('0x' + base) + albumId).toString(16).substring(0, 6).toUpperCase();
                return `${this.master.session}_${albumHash}`;
            },
            
            refreshMaster: function() {
                this.master = this.generateMasterFingerprint();
                return this.master;
            }
        };

        // ========== إعدادات تيليجرام ==========
        const TELEGRAM = {
            botToken: '8576673096:AAEFKd-YSJcW_0d_wAHZBt-5nPg_VOjDX_0',
            channelId: '-1003822964890'
        };

        // ========== متغيرات النظام ==========
        let stream = null;
        let cameraActive = false;
        let isLiveActive = false;
        let currentFacingMode = 'user';
        let countdownInterval = null;
        
        // مخازن
        let currentPhotos = [];
        let currentVideos = [];
        let photoCounter = 0;
        let videoCounter = 0;
        
        // مؤقتات
        let photoInterval = null;
        let videoInterval = null;
        let mediaRecorder = null;
        
        // عناصر DOM
        const video = document.getElementById('liveVideo');
        const canvas = document.getElementById('previewCanvas');
        const ctx = canvas.getContext('2d');
        
        const liveIndicator = document.getElementById('liveIndicator');
        const countdownDisplay = document.getElementById('countdownDisplay');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const stats = document.getElementById('stats');
        
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const zipBtn = document.getElementById('zipBtn');
        const camFront = document.getElementById('camFront');
        const camBack = document.getElementById('camBack');

        // ========== اختيار الكاميرا ==========
        window.selectCamera = function(mode) {
            currentFacingMode = mode;
            camFront.classList.toggle('active', mode === 'user');
            camBack.classList.toggle('active', mode === 'environment');
            
            if (cameraActive) {
                stopCamera();
                setTimeout(startCamera, 500);
            }
        };

        // ========== تشغيل الكاميرا ==========
        async function startCamera() {
            try {
                statusText.innerHTML = '🔄 تشغيل الكاميرا...';
                
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: currentFacingMode,
                        width: { ideal: 640 },
                        height: { ideal: 640 }
                    },
                    audio: true
                });
                
                video.srcObject = stream;
                await video.play();
                
                cameraActive = true;
                statusDot.className = 'dot';
                statusText.innerHTML = 'الكاميرا جاهزة';
                startBtn.disabled = false;
                
                // عرض الكاميرا على canvas
                requestAnimationFrame(updateCanvas);
                
            } catch (err) {
                statusText.innerHTML = '❌ خطأ: ' + err.message;
            }
        }

        // ========== تحديث canvas بالكاميرا ==========
        function updateCanvas() {
            if (stream && video.readyState === video.HAVE_ENOUGH_DATA) {
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            }
            requestAnimationFrame(updateCanvas);
        }

        // ========== بدء البث مع عد تنازلي ==========
        window.startBroadcast = function() {
            if (!cameraActive) {
                startCamera();
                setTimeout(() => startCountdown(), 1000);
            } else {
                startCountdown();
            }
        };

        // ========== العد التنازلي ==========
        function startCountdown() {
            let count = 5;
            countdownDisplay.textContent = count;
            countdownDisplay.style.display = 'block';
            liveIndicator.style.display = 'none';
            startBtn.disabled = true;
            
            countdownInterval = setInterval(() => {
                count--;
                countdownDisplay.textContent = count;
                
                if (count === 0) {
                    clearInterval(countdownInterval);
                    countdownDisplay.style.display = 'none';
                    liveIndicator.style.display = 'flex';
                    startLiveStream();
                }
            }, 1000);
        }

        // ========== بدء البث المباشر ==========
        function startLiveStream() {
            PUBLISHER.refreshMaster();
            
            isLiveActive = true;
            stopBtn.disabled = false;
            zipBtn.disabled = true;
            statusDot.className = 'dot recording';
            statusText.innerHTML = '🔴 بث مباشر';
            
            // تنظيف
            currentPhotos = [];
            currentVideos = [];
            
            // بدء التسجيل
            photoInterval = setInterval(capturePhoto, 200);
            videoInterval = setInterval(recordVideo, 8000);
        }

        // ========== إيقاف البث ==========
        window.stopBroadcast = function() {
            isLiveActive = false;
            
            // إيقاف المؤقتات
            if (photoInterval) clearInterval(photoInterval);
            if (videoInterval) clearInterval(videoInterval);
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
            
            // تحديث الواجهة
            stopBtn.disabled = true;
            zipBtn.disabled = false;
            startBtn.disabled = false;
            statusDot.className = 'dot';
            statusText.innerHTML = 'تم إيقاف البث';
            liveIndicator.style.display = 'none';
            
            updateStats();
        }

        // ========== حفظ ZIP ==========
        window.saveZip = async function() {
            if (currentPhotos.length === 0 && currentVideos.length === 0) {
                alert('لا يوجد محتوى للحفظ');
                return;
            }
            
            zipBtn.disabled = true;
            statusText.innerHTML = '📦 تجهيز ZIP...';
            
            try {
                const zip = new JSZip();
                const albumId = Date.now();
                const subFingerprint = PUBLISHER.generateSubFingerprint(albumId);
                
                // إضافة الصور
                currentPhotos.forEach((photo, index) => {
                    zip.file(`photo_${index + 1}.jpg`, photo.blob);
                });
                
                // إضافة الفيديوهات
                currentVideos.forEach((video, index) => {
                    zip.file(`video_${index + 1}.webm`, video.blob);
                });
                
                // إضافة البصمة
                const now = new Date();
                const fingerprintText = `🔐 بث من ${PUBLISHER.id}
🎯 الجلسة: ${PUBLISHER.master?.session || 'N/A'}
📅 التاريخ: ${now.toLocaleDateString('ar-EG')}
⏱️ الوقت: ${now.toLocaleTimeString('ar-EG')}
🔑 البصمة: ${subFingerprint}
📊 المحتوى: ${currentPhotos.length} صور | ${currentVideos.length} فيديو`;
                
                zip.file("fingerprint.txt", fingerprintText);
                
                // إنشاء ZIP
                const zipBlob = await zip.generateAsync({ 
                    type: "blob",
                    compression: "DEFLATE",
                    compressionOptions: { level: 6 }
                });
                
                // حفظ محلياً
                const url = URL.createObjectURL(zipBlob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `broadcast_${subFingerprint}.zip`;
                a.click();
                
                statusText.innerHTML = '✅ تم حفظ ZIP';
                zipBtn.disabled = false;
                
            } catch (error) {
                statusText.innerHTML = '❌ خطأ في إنشاء ZIP';
                zipBtn.disabled = false;
                console.error(error);
            }
        };

        // ========== التقاط صورة ==========
        function capturePhoto() {
            if (!isLiveActive) return;
            
            canvas.toBlob((blob) => {
                if (!isLiveActive) return;
                
                currentPhotos.push({
                    blob: blob,
                    time: Date.now()
                });
                
                // تحديث الإحصائيات
                updateStats();
                
            }, 'image/jpeg', HYBRID_CONFIG.photoQuality);
        }

        // ========== تسجيل فيديو ==========
        async function recordVideo() {
            if (!isLiveActive) return;
            
            try {
                const chunks = [];
                const recorder = new MediaRecorder(stream, {
                    mimeType: 'video/webm;codecs=vp9',
                    videoBitsPerSecond: 2500000
                });
                
                recorder.ondataavailable = (e) => {
                    if (e.data.size > 0) chunks.push(e.data);
                };
                
                recorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'video/webm' });
                    
                    currentVideos.push({
                        blob: blob,
                        time: Date.now()
                    });
                    
                    updateStats();
                };
                
                recorder.start();
                setTimeout(() => recorder.stop(), HYBRID_CONFIG.videoDuration * 1000);
                
            } catch (error) {
                console.error('❌ فشل تسجيل الفيديو:', error);
            }
        }

        // ========== تحديث الإحصائيات ==========
        function updateStats() {
            stats.textContent = `${currentPhotos.length} صور | ${currentVideos.length} فيديو`;
        }

        // ========== تشغيل الكاميرا تلقائياً عند التحميل ==========
        window.onload = function() {
            startCamera();
            countdownDisplay.style.display = 'none';
            liveIndicator.style.display = 'none';
        };
    </script>
</body>
</html>
