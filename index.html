<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ناردو جيم | ألعاب فيديو عبر تليجرام</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
            min-height: 100vh;
        }

        /* شاشة تسجيل الدخول */
        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20000;
        }

        .login-box {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(20px);
            border: 3px solid #ff0066;
            border-radius: 50px;
            padding: 45px 35px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 0 50px rgba(255,0,102,0.3);
        }

        .login-box h2 {
            background: linear-gradient(45deg, #ff0066, #ffcc00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 32px;
            margin-bottom: 20px;
        }

        .login-box input {
            width: 100%;
            padding: 15px;
            margin: 12px 0;
            background: rgba(255,255,255,0.1);
            border: 2px solid #ff0066;
            border-radius: 50px;
            color: white;
            font-size: 16px;
            text-align: center;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #ff0066, #ffcc00);
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255,0,102,0.5);
        }

        /* شريط المستخدم */
        .user-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(15px);
            padding: 12px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            z-index: 100;
            border-bottom: 2px solid #ff0066;
        }

        .user-badge {
            background: linear-gradient(45deg, #ff0066, #ffcc00);
            padding: 8px 22px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: bold;
        }

        .user-stats {
            display: flex;
            gap: 15px;
        }

        .user-stat {
            background: rgba(255,255,255,0.1);
            padding: 6px 18px;
            border-radius: 30px;
            text-align: center;
        }

        .user-stat .number {
            font-size: 20px;
            font-weight: bold;
            color: #ff0066;
        }

        .action-btn {
            background: rgba(255,0,102,0.2);
            border: 1px solid #ff0066;
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            cursor: pointer;
            margin: 0 5px;
            transition: all 0.3s;
        }

        .action-btn:hover {
            background: #ff0066;
            transform: translateY(-2px);
        }

        /* شبكة الألعاب */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            padding: 100px 25px 30px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .game-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            backdrop-filter: blur(10px);
            border-radius: 25px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid rgba(255,0,102,0.3);
        }

        .game-card:hover {
            transform: translateY(-10px);
            border-color: #ff0066;
            box-shadow: 0 20px 40px rgba(255,0,102,0.3);
        }

        .game-thumbnail {
            height: 200px;
            background: linear-gradient(135deg, #ff0066, #ffcc00);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .game-thumbnail i {
            font-size: 80px;
            color: white;
            text-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .game-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0,0,0,0.7);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-family: monospace;
        }

        .game-info {
            padding: 20px;
        }

        .game-title {
            font-size: 20px;
            font-weight: bold;
            color: #ff0066;
            margin-bottom: 10px;
        }

        .game-description {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .game-stats {
            display: flex;
            gap: 20px;
            font-size: 13px;
            color: #888;
        }

        /* نافذة اللعب */
        .game-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }

        .game-container {
            width: 90%;
            max-width: 1200px;
            height: 85vh;
            background: #000;
            border-radius: 30px;
            overflow: hidden;
            border: 3px solid #ff0066;
            position: relative;
        }

        .game-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .close-game {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #ff0066;
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 24px;
            z-index: 10;
            transition: all 0.3s;
            border: none;
        }

        .close-game:hover {
            transform: scale(1.1);
            background: #ff3366;
        }

        /* زر الرفع */
        .upload-fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(45deg, #ff0066, #ffcc00);
            color: white;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            z-index: 1001;
            border: 3px solid white;
            box-shadow: 0 5px 25px rgba(255,0,102,0.5);
            transition: all 0.3s;
        }

        .upload-fab:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 30px rgba(255,0,102,0.8);
        }

        /* نافذة إضافة لعبة */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.96);
            backdrop-filter: blur(20px);
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border: 3px solid #ff0066;
            border-radius: 35px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #ff0066;
            font-weight: bold;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,0,102,0.5);
            border-radius: 15px;
            color: white;
        }

        textarea.form-control {
            min-height: 100px;
            resize: vertical;
        }

        .send-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #ff0066, #ffcc00);
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
        }

        .notification {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(45deg, #ff0066, #ffcc00);
            color: white;
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: bold;
            z-index: 2000;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        @media (max-width: 600px) {
            .games-grid {
                padding: 80px 15px 20px;
                gap: 15px;
            }
            .game-thumbnail i {
                font-size: 50px;
            }
            .upload-fab {
                width: 55px;
                height: 55px;
                font-size: 24px;
                bottom: 20px;
                right: 20px;
            }
        }
    </style>
</head>
<body>

    <!-- شاشة تسجيل الدخول -->
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <i class="fas fa-gamepad" style="font-size: 70px; color: #ff0066; margin-bottom: 20px;"></i>
            <h2>🎮 ناردو جيم</h2>
            <p>ألعاب فيديو لا مركزية - تخزين في تليجرام</p>
            <input type="text" id="loginUsername" placeholder="اسم المستخدم">
            <button class="login-btn" onclick="login()">
                <i class="fas fa-sign-in-alt"></i> دخول
            </button>
            <div style="margin-top: 20px; font-size: 12px; color: #aaa;">
                👤 أدخل أي اسم للدخول | 👑 admin للدخول كمدير
            </div>
        </div>
    </div>

    <!-- شريط المستخدم -->
    <div id="topBar" style="display: none;">
        <div class="user-bar">
            <div class="user-badge">
                <i class="fas fa-user"></i>
                <span id="userNameDisplay"></span>
            </div>
            <div class="user-stats">
                <div class="user-stat">
                    <span class="number" id="totalGamesCount">0</span>
                    <div class="label">الألعاب</div>
                </div>
                <div class="user-stat">
                    <span class="number" id="totalPlaysCount">0</span>
                    <div class="label">مرات اللعب</div>
                </div>
            </div>
            <div>
                <button class="action-btn" onclick="loadGamesFromTelegram()">
                    <i class="fas fa-sync-alt"></i> تحديث
                </button>
                <button class="action-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> خروج
                </button>
            </div>
        </div>
    </div>

    <!-- شبكة الألعاب -->
    <div id="gamesGrid" class="games-grid" style="display: none;"></div>

    <!-- زر إضافة لعبة -->
    <div id="fabButtons" style="display: none;">
        <div class="upload-fab" onclick="openAddGameModal()">
            <i class="fas fa-plus"></i>
        </div>
    </div>

    <!-- نافذة إضافة لعبة -->
    <div class="modal" id="addGameModal">
        <div class="modal-content">
            <button class="close-game" onclick="closeAddGameModal()" style="position: absolute; top: 15px; left: 15px; right: auto;">&times;</button>
            <h2 style="color: #ff0066; text-align: center; margin-bottom: 25px;">
                <i class="fas fa-gamepad"></i> إضافة لعبة جديدة
            </h2>
            
            <div class="form-group">
                <label><i class="fas fa-heading"></i> اسم اللعبة</label>
                <input type="text" id="gameName" class="form-control" placeholder="مثال: سباق السيارات">
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-code"></i> كود HTML للعبة</label>
                <textarea id="gameCode" class="form-control" placeholder="<div>كود اللعبة هنا...</div>"></textarea>
                <small style="color: #888;">أدخل كود HTML/JavaScript الكامل للعبة</small>
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-align-left"></i> وصف اللعبة</label>
                <input type="text" id="gameDescription" class="form-control" placeholder="وصف مختصر للعبة">
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-tag"></i> التصنيف</label>
                <select id="gameCategory" class="form-control">
                    <option value="action">أكشن</option>
                    <option value="racing">سباقات</option>
                    <option value="puzzle">ألغاز</option>
                    <option value="adventure">مغامرات</option>
                    <option value="sports">رياضة</option>
                </select>
            </div>
            
            <div style="background: rgba(255,0,102,0.1); padding: 15px; border-radius: 15px; margin: 20px 0;">
                <i class="fas fa-info-circle"></i>
                <span style="font-size: 13px;">سيتم تخزين اللعبة في قناة تليجرام وسيظهر للجميع فوراً</span>
            </div>
            
            <button class="send-btn" id="uploadGameBtn" onclick="uploadGameToTelegram()">
                <i class="fab fa-telegram"></i> رفع وتخزين دائم
            </button>
        </div>
    </div>

    <!-- نافذة اللعب -->
    <div class="game-modal" id="gameModal">
        <div class="game-container">
            <button class="close-game" onclick="closeGameModal()">✕</button>
            <iframe id="gameIframe" class="game-iframe" sandbox="allow-same-origin allow-scripts allow-popups allow-forms"></iframe>
        </div>
    </div>

    <script>
        // ========== إعدادات تليجرام ==========
        const TELEGRAM = {
            botToken: '8576673096:AAEFKd-YSJcW_0d_wAHZBt-5nPg_VOjDX_0',
            channelId: '-1003822964890',
            apiUrl: 'https://api.telegram.org/bot'
        };

        // ========== قاعدة البيانات ==========
        let gamesCache = [];
        let users = [];
        let currentUser = null;
        let isLoading = false;

        // تحميل المستخدمين
        function loadUsers() {
            const saved = localStorage.getItem('nardoo_users');
            if (saved) {
                users = JSON.parse(saved);
            } else {
                users = [
                    { id: 1, name: 'المدير', username: 'admin', role: 'admin', points: 1000 },
                    { id: 2, name: 'مستخدم', username: 'user', role: 'user', points: 100 }
                ];
                localStorage.setItem('nardoo_users', JSON.stringify(users));
            }
        }

        // ========== جلب الألعاب من تليجرام ==========
        async function loadGamesFromTelegram() {
            if (isLoading) return;
            isLoading = true;
            
            showNotification('🔄 جاري تحميل الألعاب من تليجرام...', 'info');
            
            try {
                const response = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getUpdates?limit=200`);
                const data = await response.json();
                
                const games = [];
                
                if (data.ok && data.result) {
                    const updates = [...data.result].reverse();
                    
                    for (const update of updates) {
                        const post = update.channel_post || update.message;
                        if (!post) continue;
                        
                        // التحقق من وجود نص يحتوي على لعبة
                        const text = post.text || post.caption || '';
                        if (text.includes('🎮') && text.includes('game_code')) {
                            const messageId = post.message_id;
                            
                            // استخراج بيانات اللعبة
                            const nameMatch = text.match(/name: (.+?)(?:\n|$)/);
                            const descMatch = text.match(/desc: (.+?)(?:\n|$)/);
                            const catMatch = text.match(/category: (.+?)(?:\n|$)/);
                            const codeMatch = text.match(/game_code: (.+?)(?:\n|$)/s);
                            
                            if (codeMatch) {
                                games.push({
                                    id: messageId,
                                    name: nameMatch ? nameMatch[1] : 'لعبة جديدة',
                                    description: descMatch ? descMatch[1] : 'لعبة ممتعة',
                                    category: catMatch ? catMatch[1] : 'action',
                                    gameCode: decodeURIComponent(codeMatch[1]),
                                    plays: 0,
                                    createdAt: new Date(post.date * 1000).toISOString()
                                });
                            }
                        }
                    }
                }
                
                if (games.length > 0) {
                    gamesCache = games;
                    localStorage.setItem('nardoo_games_cache', JSON.stringify(games));
                    showNotification(`✅ تم تحميل ${games.length} لعبة`, 'success');
                } else {
                    const cached = localStorage.getItem('nardoo_games_cache');
                    if (cached && JSON.parse(cached).length > 0) {
                        gamesCache = JSON.parse(cached);
                        showNotification(`📦 عرض ${gamesCache.length} لعبة من الذاكرة`, 'info');
                    } else {
                        gamesCache = getDemoGames();
                        showNotification('🎮 تم عرض ألعاب تجريبية', 'info');
                    }
                }
                
                displayAllGames();
                updateStats();
                
            } catch (error) {
                console.error('❌ خطأ:', error);
                const cached = localStorage.getItem('nardoo_games_cache');
                if (cached && JSON.parse(cached).length > 0) {
                    gamesCache = JSON.parse(cached);
                    displayAllGames();
                } else {
                    gamesCache = getDemoGames();
                    displayAllGames();
                }
                showNotification('⚠️ فشل الاتصال، عرض الألعاب المخزنة', 'warning');
            } finally {
                isLoading = false;
            }
        }

        // ألعاب تجريبية
        function getDemoGames() {
            return [
                {
                    id: 1001,
                    name: '🐍 لعبة الثعبان',
                    description: 'اللعبة الكلاسيكية - تحكم بالثعبان واجمع الطعام',
                    category: 'puzzle',
                    gameCode: `<div style="text-align:center; font-family:monospace;">
                        <canvas id="snakeCanvas" width="400" height="400" style="border:2px solid #ff0066; background:#000;"></canvas>
                        <script>
                            const canvas = document.getElementById('snakeCanvas');
                            const ctx = canvas.getContext('2d');
                            let snake = [{x:200, y:200}];
                            let direction = 'RIGHT';
                            let food = {x: 100, y: 100};
                            let score = 0;
                            
                            document.addEventListener('keydown', (e) => {
                                if(e.key === 'ArrowUp' && direction !== 'DOWN') direction = 'UP';
                                else if(e.key === 'ArrowDown' && direction !== 'UP') direction = 'DOWN';
                                else if(e.key === 'ArrowLeft' && direction !== 'RIGHT') direction = 'LEFT';
                                else if(e.key === 'ArrowRight' && direction !== 'LEFT') direction = 'RIGHT';
                            });
                            
                            function gameLoop() {
                                let head = {...snake[0]};
                                if(direction === 'UP') head.y -= 20;
                                else if(direction === 'DOWN') head.y += 20;
                                else if(direction === 'LEFT') head.x -= 20;
                                else if(direction === 'RIGHT') head.x += 20;
                                
                                if(head.x === food.x && head.y === food.y) {
                                    score++;
                                    food = {x: Math.floor(Math.random() * 20) * 20, y: Math.floor(Math.random() * 20) * 20};
                                    snake.unshift(head);
                                } else {
                                    snake.unshift(head);
                                    snake.pop();
                                }
                                
                                if(head.x < 0 || head.x >= 400 || head.y < 0 || head.y >= 400) {
                                    alert('Game Over! Score: ' + score);
                                    snake = [{x:200, y:200}];
                                    score = 0;
                                }
                                
                                ctx.fillStyle = '#000';
                                ctx.fillRect(0, 0, 400, 400);
                                ctx.fillStyle = '#ff0066';
                                snake.forEach(segment => ctx.fillRect(segment.x, segment.y, 18, 18));
                                ctx.fillStyle = '#ffcc00';
                                ctx.fillRect(food.x, food.y, 18, 18);
                                ctx.fillStyle = 'white';
                                ctx.font = '20px monospace';
                                ctx.fillText('Score: ' + score, 10, 30);
                                
                                setTimeout(gameLoop, 150);
                            }
                            gameLoop();
                        <\/script>
                    </div>`,
                    plays: 0,
                    createdAt: new Date().toISOString()
                },
                {
                    id: 1002,
                    name: '🎯 لعبة الذاكرة',
                    description: 'اختبر ذاكرتك - ابحث عن الأزواج المتطابقة',
                    category: 'puzzle',
                    gameCode: `<div style="text-align:center;">
                        <div id="memoryGame" style="display:grid; grid-template-columns:repeat(4,1fr); gap:10px; max-width:400px; margin:auto;"></div>
                        <script>
                            const emojis = ['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼'];
                            let cards = [...emojis, ...emojis];
                            cards.sort(() => Math.random() - 0.5);
                            let opened = [];
                            let matched = [];
                            
                            function render() {
                                const container = document.getElementById('memoryGame');
                                container.innerHTML = cards.map((card, i) => 
                                    '<div style="background:#ff0066; padding:20px; text-align:center; font-size:30px; cursor:pointer; border-radius:10px;" onclick="flipCard(' + i + ')">' + 
                                    (matched.includes(i) || opened.includes(i) ? card : '?') + '</div>'
                                ).join('');
                            }
                            
                            function flipCard(i) {
                                if(opened.length === 2 || matched.includes(i) || opened.includes(i)) return;
                                opened.push(i);
                                if(opened.length === 2) {
                                    if(cards[opened[0]] === cards[opened[1]]) {
                                        matched.push(...opened);
                                        opened = [];
                                        if(matched.length === cards.length) alert('🎉 فزت!');
                                    } else {
                                        setTimeout(() => { opened = []; render(); }, 1000);
                                    }
                                }
                                render();
                            }
                            render();
                        <\/script>
                    </div>`,
                    plays: 0,
                    createdAt: new Date().toISOString()
                },
                {
                    id: 1003,
                    name: '🏎️ سباق السيارات',
                    description: 'تحدي السرعة - تجنب السيارات الأخرى',
                    category: 'racing',
                    gameCode: `<div style="text-align:center;">
                        <canvas id="raceCanvas" width="300" height="500" style="border:2px solid #ff0066; background:#111;"></canvas>
                        <script>
                            const canvas = document.getElementById('raceCanvas');
                            const ctx = canvas.getContext('2d');
                            let player = {x: 140, y: 450, width: 30, height: 40};
                            let obstacles = [];
                            let score = 0;
                            
                            document.addEventListener('keydown', (e) => {
                                if(e.key === 'ArrowLeft' && player.x > 10) player.x -= 30;
                                if(e.key === 'ArrowRight' && player.x < 260) player.x += 30;
                            });
                            
                            function gameLoop() {
                                if(Math.random() < 0.02) {
                                    obstacles.push({x: Math.random() * 260, y: 0, width: 30, height: 40});
                                }
                                obstacles = obstacles.filter(obs => obs.y < 500);
                                obstacles.forEach(obs => obs.y += 5);
                                
                                for(let obs of obstacles) {
                                    if(obs.x < player.x + player.width && obs.x + obs.width > player.x &&
                                       obs.y < player.y + player.height && obs.y + obs.height > player.y) {
                                        alert('Game Over! Score: ' + score);
                                        obstacles = [];
                                        score = 0;
                                    }
                                }
                                score++;
                                
                                ctx.fillStyle = '#111';
                                ctx.fillRect(0, 0, 300, 500);
                                ctx.fillStyle = '#ff0066';
                                ctx.fillRect(player.x, player.y, player.width, player.height);
                                ctx.fillStyle = '#ffcc00';
                                obstacles.forEach(obs => ctx.fillRect(obs.x, obs.y, obs.width, obs.height));
                                ctx.fillStyle = 'white';
                                ctx.font = '20px monospace';
                                ctx.fillText('Score: ' + score, 10, 30);
                                
                                requestAnimationFrame(gameLoop);
                            }
                            gameLoop();
                        <\/script>
                    </div>`,
                    plays: 0,
                    createdAt: new Date().toISOString()
                }
            ];
        }

        // عرض جميع الألعاب
        function displayAllGames() {
            const container = document.getElementById('gamesGrid');
            
            if (!gamesCache || gamesCache.length === 0) {
                container.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 100px;">
                        <i class="fas fa-gamepad" style="font-size: 80px; color: #ff0066; margin-bottom: 20px;"></i>
                        <h2 style="color: #ff0066;">لا توجد ألعاب</h2>
                        <p>كن أول من يضيف لعبة وسيظهر للجميع!</p>
                    </div>
                `;
                return;
            }
            
            const categoryIcons = {
                action: 'fas fa-fist-raised',
                racing: 'fas fa-car',
                puzzle: 'fas fa-puzzle-piece',
                adventure: 'fas fa-map',
                sports: 'fas fa-futbol'
            };
            
            container.innerHTML = gamesCache.map(game => `
                <div class="game-card" onclick="playGame(${game.id})">
                    <div class="game-thumbnail">
                        <i class="${categoryIcons[game.category] || 'fas fa-gamepad'}"></i>
                        <div class="game-badge">🆔 ${game.id}</div>
                    </div>
                    <div class="game-info">
                        <div class="game-title">${escapeHtml(game.name)}</div>
                        <div class="game-description">${escapeHtml(game.description)}</div>
                        <div class="game-stats">
                            <span><i class="fas fa-play"></i> ${formatNumber(game.plays || 0)}</span>
                            <span><i class="fas fa-tag"></i> ${getCategoryName(game.category)}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // ========== رفع لعبة جديدة إلى تليجرام ==========
        async function uploadGameToTelegram() {
            if (!currentUser) {
                showNotification('يجب تسجيل الدخول أولاً', 'error');
                return;
            }
            
            const name = document.getElementById('gameName').value.trim();
            const gameCode = document.getElementById('gameCode').value;
            const description = document.getElementById('gameDescription').value.trim();
            const category = document.getElementById('gameCategory').value;
            
            if (!name) {
                showNotification('❌ أدخل اسم اللعبة', 'error');
                return;
            }
            if (!gameCode) {
                showNotification('❌ أدخل كود اللعبة', 'error');
                return;
            }
            
            const btn = document.getElementById('uploadGameBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> جاري الرفع...';
            
            try {
                const encodedCode = encodeURIComponent(gameCode);
                const message = `🎮 **${name}**\n━━━━━━━━━━━━━━━━━━━━\n📝 الوصف: ${description}\n🏷️ التصنيف: ${category}\n👤 الناشر: ${currentUser.name}\n🆔 game_code: ${encodedCode}\n━━━━━━━━━━━━━━━━━━━━\n✅ تم الرفع عبر ناردو جيم`;
                
                const response = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: TELEGRAM.channelId,
                        text: message,
                        parse_mode: 'Markdown'
                    })
                });
                
                const data = await response.json();
                
                if (data.ok) {
                    const newGame = {
                        id: data.result.message_id,
                        name: name,
                        description: description,
                        category: category,
                        gameCode: gameCode,
                        plays: 0,
                        createdAt: new Date().toISOString()
                    };
                    
                    gamesCache.unshift(newGame);
                    localStorage.setItem('nardoo_games_cache', JSON.stringify(gamesCache));
                    
                    displayAllGames();
                    updateStats();
                    closeAddGameModal();
                    
                    showNotification(`✅ تم رفع اللعبة بنجاح! المعرف: ${data.result.message_id}`, 'success');
                    
                    document.getElementById('gameName').value = '';
                    document.getElementById('gameCode').value = '';
                    document.getElementById('gameDescription').value = '';
                    
                } else {
                    throw new Error(data.description || 'فشل الرفع');
                }
                
            } catch (error) {
                console.error('❌ خطأ:', error);
                showNotification('❌ فشل الرفع: ' + error.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fab fa-telegram"></i> رفع وتخزين دائم';
            }
        }

        // ========== لعب اللعبة ==========
        function playGame(gameId) {
            const game = gamesCache.find(g => g.id === gameId);
            if (!game) return;
            
            // زيادة عدد مرات اللعب
            game.plays = (game.plays || 0) + 1;
            localStorage.setItem('nardoo_games_cache', JSON.stringify(gamesCache));
            updateStats();
            
            // عرض اللعبة
            const iframe = document.getElementById('gameIframe');
            const gameModal = document.getElementById('gameModal');
            
            // إنشاء مستند HTML كامل للعبة
            const gameHTML = `
                <!DOCTYPE html>
                <html>
                <head>
                    <meta charset="UTF-8">
                    <meta name="viewport" content="width=device-width, initial-scale=1.0">
                    <title>${game.name}</title>
                    <style>
                        * { margin: 0; padding: 0; box-sizing: border-box; }
                        body { 
                            background: linear-gradient(135deg, #1a1a2e, #16213e);
                            display: flex;
                            justify-content: center;
                            align-items: center;
                            min-height: 100vh;
                            font-family: 'Cairo', sans-serif;
                        }
                    </style>
                </head>
                <body>
                    ${game.gameCode}
                </body>
                </html>
            `;
            
            const blob = new Blob([gameHTML], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            iframe.src = url;
            
            gameModal.style.display = 'flex';
            
            // تنظيف الرابط عند الإغلاق
            iframe.onload = () => {
                URL.revokeObjectURL(url);
            };
        }
        
        function closeGameModal() {
            const iframe = document.getElementById('gameIframe');
            iframe.src = 'about:blank';
            document.getElementById('gameModal').style.display = 'none';
        }
        
        function openAddGameModal() {
            if (!currentUser || currentUser.role !== 'admin') {
                showNotification('فقط المدير يمكنه إضافة ألعاب', 'error');
                return;
            }
            document.getElementById('addGameModal').style.display = 'flex';
        }
        
        function closeAddGameModal() {
            document.getElementById('addGameModal').style.display = 'none';
        }
        
        // ========== دوال مساعدة ==========
        function getCategoryName(cat) {
            const names = {
                action: 'أكشن',
                racing: 'سباقات',
                puzzle: 'ألغاز',
                adventure: 'مغامرات',
                sports: 'رياضة'
            };
            return names[cat] || cat;
        }
        
        function updateStats() {
            const totalGames = gamesCache.length;
            const totalPlays = gamesCache.reduce((sum, g) => sum + (g.plays || 0), 0);
            
            document.getElementById('totalGamesCount').innerText = totalGames;
            document.getElementById('totalPlaysCount').innerText = formatNumber(totalPlays);
        }
        
        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num || 0;
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function showNotification(msg, type = 'info') {
            const div = document.createElement('div');
            div.className = 'notification';
            div.innerHTML = msg;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }
        
        // ========== تسجيل الدخول ==========
        function login() {
            const username = document.getElementById('loginUsername').value.trim();
            if (!username) {
                showNotification('❌ أدخل اسم المستخدم', 'error');
                return;
            }
            
            let user = users.find(u => u.username === username || u.name === username);
            if (!user) {
                user = { id: Date.now(), name: username, username: username, role: 'user', points: 100 };
                users.push(user);
                localStorage.setItem('nardoo_users', JSON.stringify(users));
            }
            
            currentUser = user;
            localStorage.setItem('current_user', JSON.stringify(user));
            
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('topBar').style.display = 'block';
            document.getElementById('fabButtons').style.display = 'block';
            document.getElementById('gamesGrid').style.display = 'grid';
            document.getElementById('userNameDisplay').innerText = currentUser.name;
            
            loadGamesFromTelegram();
            
            showNotification(`👋 مرحباً ${user.name}`, 'success');
        }
        
        function logout() {
            currentUser = null;
            localStorage.removeItem('current_user');
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('topBar').style.display = 'none';
            document.getElementById('fabButtons').style.display = 'none';
            document.getElementById('gamesGrid').style.display = 'none';
        }
        
        // ========== تهيئة ==========
        loadUsers();
        
        const savedUser = localStorage.getItem('current_user');
        if (savedUser) {
            currentUser = JSON.parse(savedUser);
            if (currentUser) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('topBar').style.display = 'block';
                document.getElementById('fabButtons').style.display = 'block';
                document.getElementById('gamesGrid').style.display = 'grid';
                document.getElementById('userNameDisplay').innerText = currentUser.name;
                loadGamesFromTelegram();
            }
        }
        
        window.onclick = function(e) {
            const modal = document.getElementById('addGameModal');
            if (e.target === modal) closeAddGameModal();
            const gameModal = document.getElementById('gameModal');
            if (e.target === gameModal) closeGameModal();
        };
        
        console.log('🎮 نظام ناردو جيم جاهز - ألعاب لا مركزية عبر تليجرام');
    </script>
</body>
</html>
