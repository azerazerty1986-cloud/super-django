<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📹 بروتوكول احترافي - بث متطور</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }
        
        body {
            background: #0a0c10;
            color: white;
            min-height: 100vh;
            padding: 16px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* الهيدر الاحترافي */
        .header {
            background: linear-gradient(135deg, #161b22, #1f2630);
            border-radius: 25px;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px solid #ffd700;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 0 30px rgba(255,215,0,0.2);
        }
        
        .header h1 {
            color: #ffd700;
            font-size: 28px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .protocol-badge {
            background: #0088cc;
            color: white;
            padding: 8px 20px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        
        /* بطاقة التاجر */
        .merchant-card {
            background: #161b22;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px solid #ffd700;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .merchant-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #ffd700;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            font-weight: bold;
            color: black;
        }
        
        .merchant-info {
            flex: 1;
        }
        
        .merchant-name {
            color: #ffd700;
            font-size: 22px;
            font-weight: bold;
        }
        
        .merchant-id {
            color: #8b949e;
            font-size: 16px;
        }
        
        /* مؤشرات البروتوكول */
        .protocol-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: #1f2630;
            border-radius: 15px;
            padding: 15px;
            border: 2px solid #ffd700;
            text-align: center;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
        }
        
        .stat-label {
            color: #8b949e;
            font-size: 12px;
            margin-top: 5px;
        }
        
        .stat-unit {
            color: #4caf50;
            font-size: 11px;
        }
        
        /* شاشتين */
        .dual-screen {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .screen {
            background: #161b22;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid;
        }
        
        .live-screen { border-color: #ff0000; }
        .preview-screen { border-color: #ffd700; }
        
        .screen-header {
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1f2630;
        }
        
        .live-header { color: #ff0000; }
        .preview-header { color: #ffd700; }
        
        .video-container {
            background: black;
            min-height: 350px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        video {
            width: 100%;
            max-height: 350px;
            object-fit: cover;
        }
        
        canvas {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            border: 3px solid #ffd700;
            object-fit: cover;
        }
        
        .quality-badge {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.8);
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 12px;
            border: 1px solid #ffd700;
        }
        
        /* أزرار التحكم */
        .three-buttons {
            display: flex;
            gap: 15px;
            margin: 20px 0;
            justify-content: center;
        }
        
        .btn {
            flex: 1;
            max-width: 200px;
            padding: 15px 25px;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
        }
        
        .btn-green { background: #238636; color: white; }
        .btn-red { background: #da3633; color: white; }
        .btn-blue { background: #0088cc; color: white; }
        
        .btn:hover {
            transform: translateY(-3px);
            filter: brightness(1.2);
            box-shadow: 0 5px 20px rgba(255,215,0,0.3);
        }
        
        /* كاميرا */
        .camera-toggle {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            justify-content: center;
        }
        
        .cam-option {
            padding: 10px 30px;
            border-radius: 25px;
            background: #1f2630;
            color: #8b949e;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s;
        }
        
        .cam-option.active {
            border-color: #ffd700;
            color: #ffd700;
            background: #ffd70020;
        }
        
        /* مراقبة الأداء */
        .performance-panel {
            background: #1f2630;
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
            border: 2px solid #ffd700;
        }
        
        .performance-row {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
        }
        
        .meter {
            height: 8px;
            background: #2d333b;
            border-radius: 4px;
            overflow: hidden;
            flex: 1;
            margin: 0 10px;
        }
        
        .meter-fill {
            height: 100%;
            background: #ffd700;
            width: 0%;
            transition: width 0.3s;
        }
        
        /* سجل الإرسال */
        .send-log {
            background: #1f2630;
            border-radius: 15px;
            padding: 10px;
            margin-top: 15px;
            max-height: 150px;
            overflow-y: auto;
            border: 1px solid #ffd700;
        }
        
        .log-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 12px;
            border-bottom: 1px solid #2d333b;
            font-size: 12px;
        }
        
        .log-photo { color: #0088cc; }
        .log-video { color: #ff0000; }
        
        /* شريط الحالة */
        .status-bar {
            margin-top: 20px;
            padding: 15px;
            background: #1f2630;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            border: 1px solid #ffd700;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- الهيدر -->
        <div class="header">
            <h1>
                <i class="fas fa-microchip"></i>
                بروتوكول HYBRID v2.0
            </h1>
            <div class="protocol-badge">
                @nardoo_merchant
            </div>
        </div>

        <!-- بطاقة التاجر -->
        <div class="merchant-card">
            <div class="merchant-avatar">ن</div>
            <div class="merchant-info">
                <div class="merchant-name">تاجر ناردو</div>
                <div class="merchant-id">@nardoo_merchant</div>
            </div>
        </div>

        <!-- مؤشرات البروتوكول -->
        <div class="protocol-stats">
            <div class="stat-card">
                <div class="stat-value" id="videoFps">30</div>
                <div class="stat-label">فيديو FPS</div>
                <div class="stat-unit">سلاسة عالية</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="photoFps">5</div>
                <div class="stat-label">صور/ثانية</div>
                <div class="stat-unit">جودة 90%</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="bitrate">2.5</div>
                <div class="stat-label">Mbps</div>
                <div class="stat-unit">جودة HD</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="bufferStatus">0</div>
                <div class="stat-label">مخزن</div>
                <div class="stat-unit">/5000</div>
            </div>
        </div>

        <!-- شاشتين -->
        <div class="dual-screen">
            <!-- البث المباشر -->
            <div class="screen live-screen">
                <div class="screen-header live-header">
                    <span><i class="fas fa-circle"></i> بث مباشر 30fps</span>
                    <span id="liveIndicator">⏸️</span>
                </div>
                <div class="video-container">
                    <video id="liveVideo" autoplay playsinline muted></video>
                    <div class="quality-badge" id="videoQuality">HD 2.5Mbps</div>
                </div>
            </div>

            <!-- معاينة الصور -->
            <div class="screen preview-screen">
                <div class="screen-header preview-header">
                    <span><i class="fas fa-camera"></i> صور 5fps - 90%</span>
                    <span id="photoCounter">0</span>
                </div>
                <div class="video-container">
                    <canvas id="previewCanvas" width="280" height="280"></canvas>
                    <div class="quality-badge" id="lastPhoto">--:--</div>
                </div>
            </div>
        </div>

        <!-- اختيار الكاميرا -->
        <div class="camera-toggle">
            <div class="cam-option active" onclick="selectCamera('user')" id="camFront">أمامية</div>
            <div class="cam-option" onclick="selectCamera('environment')" id="camBack">خلفية</div>
        </div>

        <!-- 3 أزرار -->
        <div class="three-buttons">
            <button class="btn btn-green" onclick="startCamera()" id="startBtn">
                <i class="fas fa-camera"></i> تشغيل الكاميرا
            </button>
            <button class="btn btn-blue" onclick="startHybridStream()" id="liveBtn" disabled>
                <i class="fas fa-play"></i> بدء البروتوكول
            </button>
            <button class="btn btn-red" onclick="stopLiveStream()" id="stopBtn" disabled>
                <i class="fas fa-stop"></i> إيقاف
            </button>
        </div>

        <!-- مراقبة الأداء -->
        <div class="performance-panel">
            <div class="performance-row">
                <span style="color:#ffd700;">📊 أداء النظام:</span>
                <span id="systemLoad">0%</span>
            </div>
            <div class="performance-row">
                <span>فيديو</span>
                <div class="meter">
                    <div class="meter-fill" id="videoMeter" style="width:0%"></div>
                </div>
                <span id="videoStatus">جيد</span>
            </div>
            <div class="performance-row">
                <span>صور</span>
                <div class="meter">
                    <div class="meter-fill" id="photoMeter" style="width:0%"></div>
                </div>
                <span id="photoStatus">جيد</span>
            </div>
        </div>

        <!-- سجل الإرسال -->
        <div class="send-log" id="sendLog">
            <div style="color: #8b949e; text-align: center;">📡 في انتظار الإرسال...</div>
        </div>

        <!-- شريط الحالة -->
        <div class="status-bar">
            <span id="statusText"><i class="fas fa-circle" style="color: #4caf50;"></i> البروتوكول جاهز</span>
            <span id="timeDisplay"></span>
        </div>
    </div>

    <script>
        // ========== بروتوكول HYBRID المتطور ==========
        const HYBRID_CONFIG = {
            // إعدادات الفيديو للبث المستمر
            videoFPS: 30,             // 30 إطار/ثانية (سلاسة عالية)
            videoBitrate: "2500k",    // 2.5 Mbps (جودة HD)
            videoDuration: 5,         // فيديو 5 ثواني
            videoInterval: 8000,      // فيديو كل 8 ثواني
            keyFrameInterval: 60,     // إطار رئيسي كل 60 فريم
            
            // إعدادات الصور الملتقطة من البث
            photoFPS: 5,              // 5 صور في الثانية
            photoQuality: 0.9,        // 90% جودة
            photoInterval: 200,       // صورة كل 200ms
            
            // إدارة النظام
            bufferSize: 5000,         // 5000 إطار كحد أقصى
            maxQueueSize: 20,         // 20 في قائمة الانتظار
            sendInterval: 1000,       // إرسال كل ثانية
            
            // إعدادات تيليجرام
            telegramQueue: 100,
            retryCount: 3,
            timeoutMs: 5000
        };

        // ========== إعدادات تيليجرام ==========
        const TELEGRAM = {
            botToken: '8576673096:AAEFKd-YSJcW_0d_wAHZBt-5nPg_VOjDX_0',
            channelId: '-1003822964890'
        };
        const MERCHANT_ID = '@nardoo_merchant';

        // ========== متغيرات النظام ==========
        let stream = null;
        let cameraActive = false;
        let isLiveActive = false;
        let currentFacingMode = 'user';
        
        // إحصائيات
        let photoCount = 0;
        let videoCount = 0;
        let failedCount = 0;
        let bufferSize = 0;
        
        // قوائم انتظار
        let photoQueue = [];
        let videoQueue = [];
        
        // مؤقتات
        let photoInterval = null;
        let videoInterval = null;
        let sendInterval = null;
        let performanceInterval = null;
        let mediaRecorder = null;
        
        // عناصر DOM
        const video = document.getElementById('liveVideo');
        const previewCanvas = document.getElementById('previewCanvas');
        const previewCtx = previewCanvas.getContext('2d');
        
        const liveIndicator = document.getElementById('liveIndicator');
        const photoCounter = document.getElementById('photoCounter');
        const lastPhoto = document.getElementById('lastPhoto');
        const videoQuality = document.getElementById('videoQuality');
        
        const bufferStatus = document.getElementById('bufferStatus');
        const systemLoad = document.getElementById('systemLoad');
        const videoMeter = document.getElementById('videoMeter');
        const photoMeter = document.getElementById('photoMeter');
        const videoStatus = document.getElementById('videoStatus');
        const photoStatus = document.getElementById('photoStatus');
        
        const sendLog = document.getElementById('sendLog');
        const statusText = document.getElementById('statusText');
        const timeDisplay = document.getElementById('timeDisplay');
        
        const startBtn = document.getElementById('startBtn');
        const liveBtn = document.getElementById('liveBtn');
        const stopBtn = document.getElementById('stopBtn');
        const camFront = document.getElementById('camFront');
        const camBack = document.getElementById('camBack');

        // تحديث الوقت
        setInterval(() => {
            const now = new Date();
            timeDisplay.textContent = now.toLocaleTimeString('ar-EG');
        }, 1000);

        // اختيار الكاميرا
        window.selectCamera = function(mode) {
            currentFacingMode = mode;
            camFront.classList.toggle('active', mode === 'user');
            camBack.classList.toggle('active', mode === 'environment');
            
            if (cameraActive) {
                stopCamera();
                setTimeout(startCamera, 500);
            }
        };

        // تشغيل الكاميرا
        window.startCamera = async function() {
            try {
                statusText.innerHTML = '🔄 تشغيل الكاميرا...';
                
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: currentFacingMode,
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: true
                });
                
                video.srcObject = stream;
                await video.play();
                
                cameraActive = true;
                startBtn.disabled = true;
                liveBtn.disabled = false;
                stopBtn.disabled = true;
                liveIndicator.innerHTML = '⏸️';
                
                statusText.innerHTML = '✅ الكاميرا جاهزة';
                
            } catch (err) {
                statusText.innerHTML = '❌ خطأ: ' + err.message;
            }
        };

        // بدء البروتوكول
        window.startHybridStream = function() {
            isLiveActive = true;
            liveBtn.disabled = true;
            stopBtn.disabled = false;
            liveIndicator.innerHTML = '🔴';
            statusText.innerHTML = '🔴 البروتوكول نشط';
            
            stopAllIntervals();
            startProtocol();
        };

        // إيقاف
        window.stopLiveStream = function() {
            isLiveActive = false;
            liveBtn.disabled = false;
            stopBtn.disabled = true;
            liveIndicator.innerHTML = '⏸️';
            statusText.innerHTML = '⏹️ تم الإيقاف';
            
            stopAllIntervals();
            photoQueue = [];
            videoQueue = [];
        };

        // إيقاف المؤقتات
        function stopAllIntervals() {
            if (photoInterval) clearInterval(photoInterval);
            if (videoInterval) clearInterval(videoInterval);
            if (sendInterval) clearInterval(sendInterval);
            if (performanceInterval) clearInterval(performanceInterval);
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
        }

        // بدء البروتوكول
        function startProtocol() {
            // 1. صور عالية الجودة (5fps)
            photoInterval = setInterval(capturePhoto, 1000 / HYBRID_CONFIG.photoFPS);
            
            // 2. فيديو كل 8 ثواني
            videoInterval = setInterval(recordVideo, HYBRID_CONFIG.videoInterval);
            
            // 3. إرسال كل ثانية
            sendInterval = setInterval(sendFromQueues, 1000);
            
            // 4. مراقبة الأداء
            performanceInterval = setInterval(updatePerformance, 500);
        }

        // التقاط صورة
        function capturePhoto() {
            if (!isLiveActive || !cameraActive) return;
            
            previewCtx.drawImage(video, 0, 0, 280, 280);
            
            previewCanvas.toBlob((blob) => {
                if (!isLiveActive) return;
                
                photoQueue.push({
                    blob: blob,
                    time: Date.now(),
                    quality: HYBRID_CONFIG.photoQuality
                });
                
                // تحديث المؤشرات
                photoCounter.textContent = photoQueue.length;
                lastPhoto.textContent = new Date().toLocaleTimeString('ar-EG');
                bufferSize = photoQueue.length + videoQueue.length;
                bufferStatus.textContent = bufferSize;
                
            }, 'image/jpeg', HYBRID_CONFIG.photoQuality);
        }

        // تسجيل فيديو
        async function recordVideo() {
            if (!isLiveActive || !cameraActive) return;
            
            try {
                const chunks = [];
                const recorder = new MediaRecorder(stream, {
                    mimeType: 'video/webm;codecs=vp9',
                    videoBitsPerSecond: 2500000 // 2.5 Mbps
                });
                
                recorder.ondataavailable = (e) => {
                    if (e.data.size > 0) chunks.push(e.data);
                };
                
                recorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'video/webm' });
                    
                    videoQueue.push({
                        blob: blob,
                        time: Date.now(),
                        duration: HYBRID_CONFIG.videoDuration
                    });
                    
                    bufferSize = photoQueue.length + videoQueue.length;
                    bufferStatus.textContent = bufferSize;
                };
                
                recorder.start();
                setTimeout(() => recorder.stop(), HYBRID_CONFIG.videoDuration * 1000);
                
            } catch (error) {
                console.error('❌ فشل تسجيل الفيديو:', error);
            }
        }

        // إرسال من القوائم
        async function sendFromQueues() {
            if (!isLiveActive) return;
            
            // إرسال الصور (الأولوية)
            while (photoQueue.length > 0 && photoQueue.length <= HYBRID_CONFIG.maxQueueSize) {
                await sendPhoto(photoQueue.shift());
            }
            
            // إرسال الفيديوهات
            while (videoQueue.length > 0 && videoQueue.length <= HYBRID_CONFIG.maxQueueSize) {
                await sendVideo(videoQueue.shift());
            }
            
            bufferSize = photoQueue.length + videoQueue.length;
            bufferStatus.textContent = bufferSize;
        }

        // إرسال صورة
        async function sendPhoto(item) {
            try {
                const now = new Date();
                const timeStr = now.toLocaleTimeString('ar-EG');
                
                const formData = new FormData();
                formData.append('chat_id', TELEGRAM.channelId);
                formData.append('photo', item.blob, `photo_${Date.now()}.jpg`);
                formData.append('caption', `📸 صورة مباشرة من ${MERCHANT_ID}\n⏱️ ${timeStr}\n📸 #${photoCount + 1}\n⭐ جودة 90%`);
                
                const res = await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
                
                const result = await res.json();
                
                if (result.ok) {
                    photoCount++;
                    addToLog(`📸 صورة #${photoCount} أرسلت`, 'photo');
                    updateSuccessRate(true);
                } else {
                    updateSuccessRate(false);
                }
                
            } catch (error) {
                updateSuccessRate(false);
            }
        }

        // إرسال فيديو
        async function sendVideo(item) {
            try {
                const now = new Date();
                const timeStr = now.toLocaleTimeString('ar-EG');
                
                const formData = new FormData();
                formData.append('chat_id', TELEGRAM.channelId);
                formData.append('video', item.blob, `video_${Date.now()}.mp4`);
                formData.append('caption', `🎥 فيديو مباشر من ${MERCHANT_ID}\n⏱️ ${timeStr}\n🎥 #${videoCount + 1}\n⚡ 30fps | 2.5Mbps`);
                
                const res = await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/sendVideo`, {
                    method: 'POST',
                    body: formData
                });
                
                const result = await res.json();
                
                if (result.ok) {
                    videoCount++;
                    addToLog(`🎥 فيديو #${videoCount} أرسل`, 'video');
                    updateSuccessRate(true);
                } else {
                    updateSuccessRate(false);
                }
                
            } catch (error) {
                updateSuccessRate(false);
            }
        }

        // تحديث نسبة النجاح
        function updateSuccessRate(success) {
            if (!success) failedCount++;
            
            const total = photoCount + videoCount + failedCount;
            if (total > 0) {
                const rate = ((photoCount + videoCount) / total * 100).toFixed(1);
                // تحديث نسبة النجاح في الواجهة إذا أضفناها
            }
        }

        // تحديث أداء النظام
        function updatePerformance() {
            const totalQueue = photoQueue.length + videoQueue.length;
            const loadPercent = Math.min(100, (totalQueue / HYBRID_CONFIG.bufferSize) * 100);
            
            systemLoad.textContent = loadPercent.toFixed(1) + '%';
            
            // مؤشرات الفيديو والصور
            videoMeter.style.width = (videoQueue.length > 0 ? 70 : 30) + '%';
            photoMeter.style.width = (photoQueue.length / HYBRID_CONFIG.maxQueueSize * 100) + '%';
            
            videoStatus.textContent = videoQueue.length > 0 ? '📹 جاهز' : '⏳ انتظار';
            photoStatus.textContent = photoQueue.length > 0 ? '📸 جاهز' : '⏳ تصوير';
        }

        // إضافة للسجل
        function addToLog(message, type) {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('ar-EG');
            
            let html = sendLog.innerHTML;
            if (html.includes('في انتظار الإرسال')) html = '';
            
            const logClass = type === 'photo' ? 'log-photo' : 'log-video';
            
            html = `
                <div class="log-item">
                    <span class="${logClass}">${message}</span>
                    <span>${timeStr}</span>
                </div>
            ` + html;
            
            // الاحتفاظ بآخر 10
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = html;
            if (tempDiv.children.length > 10) {
                tempDiv.removeChild(tempDiv.lastChild);
            }
            
            sendLog.innerHTML = tempDiv.innerHTML;
        }

        // إيقاف الكاميرا
        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(t => t.stop());
                stream = null;
            }
            cameraActive = false;
            startBtn.disabled = false;
            liveBtn.disabled = true;
            stopBtn.disabled = true;
        }
    </script>
</body>
</html>
