head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>نكهة وجمال | ناردو برو - المخزون والسلة المتكاملة</title>
    
    <!-- الخطوط -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* ========== متغيرات CSS ========== */
        :root {
            --gold: #ffd700;
            --dark-bg: #0a0e27;
            --card-bg: #1a1a2e;
            --text-primary: #ffffff;
            --text-secondary: #aaaaaa;
            --border-color: rgba(255, 215, 0, 0.2);
            --transition: all 0.3s ease;
        }

        /* ========== إعادة تعيين عام ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, var(--dark-bg), #0f1535);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* ========== الخلفية المتحركة ========== */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(255, 215, 0, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 215, 0, 0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        /* ========== الشريط العلوي ========== */
        .top-bar {
            background: rgba(10, 14, 39, 0.95);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .top-bar-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .top-bar-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .top-bar-item i {
            color: var(--gold);
            font-size: 16px;
        }

        /* ========== زر المستخدم ========== */
        .user-btn {
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid var(--border-color);
            color: var(--gold);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: var(--transition);
            font-size: 13px;
        }

        .user-btn:hover {
            background: var(--gold);
            color: var(--dark-bg);
        }

        /* ========== شريط التنقل ========== */
        .navbar {
            background: rgba(10, 14, 39, 0.9);
            border-bottom: 1px solid var(--border-color);
            padding: 15px 0;
            position: sticky;
            top: 50px;
            z-index: 99;
            backdrop-filter: blur(10px);
        }

        .navbar-content {
            display: flex;
            justify-content: center;
            gap: 30px;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
            flex-wrap: wrap;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 20px;
            transition: var(--transition);
            font-size: 14px;
        }

        .nav-link:hover,
        .nav-link.active {
            background: rgba(255, 215, 0, 0.1);
            color: var(--gold);
        }

        /* ========== الحاوية الرئيسية ========== */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        /* ========== رأس الصفحة ========== */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .page-title {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .page-title h1 {
            font-size: 32px;
            color: var(--gold);
            margin: 0;
        }

        .page-title i {
            font-size: 36px;
            color: var(--gold);
        }

        .header-actions {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: var(--transition);
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-gold {
            background: var(--gold);
            color: var(--dark-bg);
        }

        .btn-gold:hover {
            background: #ffed4e;
            transform: translateY(-2px);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--gold);
        }

        .btn-outline:hover {
            background: rgba(255, 215, 0, 0.1);
        }

        /* ========== علامات التبويب ========== */
        .tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 10px 20px;
            cursor: pointer;
            transition: var(--transition);
            font-size: 15px;
            position: relative;
        }

        .tab-btn.active {
            color: var(--gold);
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--gold);
        }

        /* ========== شبكة المنتجات ========== */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .product-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            overflow: hidden;
            transition: var(--transition);
            cursor: pointer;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            border-color: var(--gold);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.2);
        }

        .product-image {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #1a472a, #0a2a1a);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .product-image i {
            font-size: 60px;
            color: var(--gold);
            opacity: 0.5;
        }

        .product-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--gold);
            color: var(--dark-bg);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
        }

        .product-info {
            padding: 15px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .product-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .product-category {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .product-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 13px;
        }

        .product-price {
            color: var(--gold);
            font-weight: 700;
            font-size: 16px;
        }

        .product-stock {
            color: var(--text-secondary);
        }

        .product-stock.low {
            color: #ff6b6b;
        }

        .product-actions {
            display: flex;
            gap: 10px;
            margin-top: auto;
        }

        .product-actions button {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
            font-size: 12px;
            font-weight: 500;
        }

        .btn-add-cart {
            background: var(--gold);
            color: var(--dark-bg);
        }

        .btn-add-cart:hover {
            background: #ffed4e;
        }

        .btn-details {
            background: rgba(255, 215, 0, 0.1);
            color: var(--gold);
            border: 1px solid var(--border-color);
        }

        .btn-details:hover {
            background: rgba(255, 215, 0, 0.2);
        }

        /* ========== حالة التحميل والفارغة ========== */
        .loading-state,
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .loading-state i,
        .empty-state i {
            font-size: 60px;
            color: var(--gold);
            margin-bottom: 20px;
            animation: spin 2s linear infinite;
        }

        .empty-state i {
            animation: none;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* ========== السلة الجانبية ========== */
        .cart-sidebar {
            position: fixed;
            right: -400px;
            top: 0;
            width: 400px;
            height: 100vh;
            background: var(--card-bg);
            border-left: 1px solid var(--border-color);
            z-index: 1000;
            transition: right 0.3s ease;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .cart-sidebar.open {
            right: 0;
        }

        .cart-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-header h2 {
            color: var(--gold);
            margin: 0;
        }

        .cart-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 24px;
            cursor: pointer;
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .cart-item {
            background: rgba(255, 215, 0, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-name {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .cart-item-price {
            color: var(--gold);
            font-size: 14px;
        }

        .cart-item-remove {
            background: none;
            border: none;
            color: #ff6b6b;
            cursor: pointer;
            font-size: 18px;
        }

        .cart-footer {
            padding: 20px;
            border-top: 1px solid var(--border-color);
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 16px;
            font-weight: 600;
        }

        .cart-total-price {
            color: var(--gold);
        }

        .checkout-btn {
            width: 100%;
            padding: 12px;
            background: var(--gold);
            color: var(--dark-bg);
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .checkout-btn:hover {
            background: #ffed4e;
        }

        /* ========== النافذة المنبثقة ========== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid var(--border-color);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            color: var(--gold);
            margin: 0;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 28px;
            cursor: pointer;
        }

        /* ========== النموذج ========== */
        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--text-secondary);
            font-size: 13px;
        }

        .form-control {
            width: 100%;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: 'Cairo', sans-serif;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--gold);
            background: rgba(255, 215, 0, 0.05);
        }

        /* ========== الإشعارات ========== */
        .toast-container {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 3000;
        }

        .toast {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 15px 20px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideIn 0.3s ease;
        }

        .toast.success {
            border-color: #51cf66;
        }

        .toast.error {
            border-color: #ff6b6b;
        }

        @keyframes slideIn {
            from {
                transform: translateX(-400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* ========== الاستجابة ========== */
        @media (max-width: 768px) {
            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            }

            .cart-sidebar {
                width: 100%;
                right: -100%;
            }

            .page-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .navbar-content {
                gap: 15px;
            }

            .nav-link {
                font-size: 12px;
                padding: 6px 12px;
            }
        }
    </style>
</head>
<body>
    <!-- الخلفية المتحركة -->
    <div class="animated-bg"></div>

    <!-- الشريط العلوي -->
    <div class="top-bar">
        <div class="top-bar-content">
            <div style="display: flex; gap: 30px;">
                <div class="top-bar-item">
                    <i class="fas fa-truck-fast"></i>
                    <span>شحن مجاني للطلبات فوق 5000 دج</span>
                </div>
                <div class="top-bar-item">
                    <i class="fas fa-headset"></i>
                    <span>دعم VIP 24/7</span>
                </div>
            </div>
            <button class="user-btn" onclick="openLoginModal()">
                <i class="fas fa-user"></i> تسجيل الدخول
            </button>
        </div>
    </div>

    <!-- شريط التنقل -->
    <div class="navbar">
        <div class="navbar-content">
            <a href="#" class="nav-link active">
                <i class="fas fa-boxes"></i> المخزون
            </a>
            <a href="#" class="nav-link" onclick="toggleCart(); return false;">
                <i class="fas fa-shopping-cart"></i> السلة
                <span id="cartBadge" style="background: var(--gold); color: var(--dark-bg); padding: 2px 6px; border-radius: 10px; font-size: 11px;">0</span>
            </a>
            <a href="#" class="nav-link">
                <i class="fas fa-history"></i> الطلبات
            </a>
        </div>
    </div>

    <!-- الحاوية الرئيسية -->
    <div class="container">
        <!-- رأس الصفحة -->
        <div class="page-header">
            <div class="page-title">
                <i class="fas fa-crown"></i>
                <h1>المخزون والسلة</h1>
            </div>
            <div class="header-actions">
                <button class="btn btn-gold" onclick="loadProductsFromTelegram()">
                    <i class="fas fa-sync-alt"></i> تحديث المنتجات
                </button>
                <button class="btn btn-outline" onclick="toggleCart()">
                    <i class="fas fa-shopping-cart"></i> السلة
                </button>
            </div>
        </div>

        <!-- علامات التبويب -->
        <div class="tabs">
            <button class="tab-btn active" onclick="filterProducts('all')">
                <i class="fas fa-th"></i> الكل
            </button>
            <button class="tab-btn" onclick="filterProducts('promo')">
                <i class="fas fa-tag"></i> برموسيو
            </button>
            <button class="tab-btn" onclick="filterProducts('spices')">
                <i class="fas fa-leaf"></i> توابل
            </button>
            <button class="tab-btn" onclick="filterProducts('cosmetic')">
                <i class="fas fa-sparkles"></i> كوسمتيك
            </button>
        </div>

        <!-- شبكة المنتجات -->
        <div class="products-grid" id="productsContainer">
            <div class="loading-state">
                <i class="fas fa-spinner"></i>
                <p>جاري تحميل المنتجات...</p>
            </div>
        </div>
    </div>

    <!-- السلة الجانبية -->
    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h2>السلة</h2>
            <button class="cart-close" onclick="toggleCart()">✕</button>
        </div>
        <div class="cart-items" id="cartItems">
            <div style="text-align: center; color: var(--text-secondary); padding: 40px 20px;">
                <i class="fas fa-shopping-cart" style="font-size: 40px; margin-bottom: 15px;"></i>
                <p>السلة فارغة</p>
            </div>
        </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>الإجمالي:</span>
                <span class="cart-total-price" id="cartTotal">0 دج</span>
            </div>
            <button class="checkout-btn" onclick="checkout()">
                <i class="fas fa-check"></i> إتمام الشراء
            </button>
        </div>
    </div>

    <!-- نافذة تفاصيل المنتج -->
    <div class="modal" id="productModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>تفاصيل المنتج</h2>
                <button class="modal-close" onclick="closeModal('productModal')">✕</button>
            </div>
            <div id="productDetailContent"></div>
        </div>
    </div>

    <!-- نافذة تسجيل الدخول -->
    <div class="modal" id="loginModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-sign-in-alt"></i> تسجيل الدخول</h2>
                <button class="modal-close" onclick="closeModal('loginModal')">✕</button>
            </div>
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>كلمة المرور</label>
                    <input type="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-gold" style="width: 100%;">
                    <i class="fas fa-sign-in-alt"></i> دخول
                </button>
            </form>
        </div>
    </div>

    <!-- حاوية الإشعارات -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- البرامج النصية -->
    <script>
        // ========== إعدادات تلغرام =====
        const TELEGRAM = {
            botToken: '8576673096:AAGvSMjzwVWj6wJ47JdqiDwcObXjBDcyiLA',
            channelId: '-1003822964890',
            adminId: '7461896689',
            apiUrl: 'https://api.telegram.org/bot'
        };

        // ========== متغيرات عامة =====
        let products = [];
        let filteredProducts = [];
        let cart = [];
        let currentFilter = 'all';

        // ========== نظام الإشعارات =====
        function showNotification(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle'}"></i>
                <span>${message}</span>
            `;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // ========== جلب المنتجات من تلغرام =====
        async function loadProductsFromTelegram() {
            const container = document.getElementById('productsContainer');
            container.innerHTML = '<div class="loading-state"><i class="fas fa-spinner"></i><p>جاري تحميل المنتجات...</p></div>';
            
            try {
                const url = `${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getUpdates?limit=100`;
                const response = await fetch(url);
                const data = await response.json();
                
                products = [];
                
                if (data.ok && data.result) {
                    const updates = [...data.result].reverse();
                    
                    for (const update of updates) {
                        const post = update.channel_post || update.message;
                        if (!post) continue;
                        
                        // محاولة استخراج بيانات المنتج من النص أو الوصف
                        const caption = post.caption || post.text || '';
                        
                        // استخراج معلومات المنتج من الوصف
                        const nameMatch = caption.match(/📦\s*(.+?)(?:\n|💰|$)/);
                        const priceMatch = caption.match(/💰\s*(.+?)(?:\n|📊|$)/);
                        const stockMatch = caption.match(/📊\s*(.+?)(?:\n|🏷️|$)/);
                        const categoryMatch = caption.match(/🏷️\s*(.+?)(?:\n|$)/);
                        
                        const product = {
                            id: post.message_id,
                            name: nameMatch ? nameMatch[1].trim() : `منتج ناردو #${post.message_id}`,
                            price: priceMatch ? parseInt(priceMatch[1].match(/\d+/)?.[0] || 0) : Math.floor(Math.random() * 5000) + 500,
                            stock: stockMatch ? parseInt(stockMatch[1].match(/\d+/)?.[0] || 0) : Math.floor(Math.random() * 100) + 10,
                            category: categoryMatch ? categoryMatch[1].trim().toLowerCase() : 'other',
                            description: caption,
                            image: null,
                            hasVideo: !!post.video,
                            hasPhoto: !!post.photo,
                            date: new Date(post.date * 1000).toISOString()
                        };
                        
                        // محاولة الحصول على صورة الفيديو أو الصورة
                        if (post.video) {
                            try {
                                const fileRes = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getFile?file_id=${post.video.file_id}`);
                                const fileData = await fileRes.json();
                                if (fileData.ok) {
                                    product.image = `https://api.telegram.org/file/bot${TELEGRAM.botToken}/${fileData.result.file_path}`;
                                }
                            } catch (err) {
                                console.log('خطأ في جلب صورة الفيديو:', err);
                            }
                        } else if (post.photo && post.photo.length > 0) {
                            try {
                                const fileRes = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getFile?file_id=${post.photo[post.photo.length - 1].file_id}`);
                                const fileData = await fileRes.json();
                                if (fileData.ok) {
                                    product.image = `https://api.telegram.org/file/bot${TELEGRAM.botToken}/${fileData.result.file_path}`;
                                }
                            } catch (err) {
                                console.log('خطأ في جلب الصورة:', err);
                            }
                        }
                        
                        products.push(product);
                    }
                }
                
                // حفظ في localStorage
                localStorage.setItem('nardo_products', JSON.stringify(products));
                
                // عرض المنتجات
                filteredProducts = products;
                displayProducts();
                showNotification(`تم تحميل ${products.length} منتج بنجاح`, 'success');
                
            } catch (error) {
                console.error('خطأ في جلب المنتجات:', error);
                
                // محاولة تحميل من localStorage
                const cached = localStorage.getItem('nardo_products');
                if (cached) {
                    products = JSON.parse(cached);
                    filteredProducts = products;
                    displayProducts();
                    showNotification('تم تحميل المنتجات من الذاكرة المؤقتة', 'info');
                } else {
                    // إنشاء منتجات تجريبية
                    createDemoProducts();
                    showNotification('تم تحميل منتجات تجريبية', 'info');
                }
            }
        }

        // ========== إنشاء منتجات تجريبية =====
        function createDemoProducts() {
            products = [
                {
                    id: 1,
                    name: 'زعتر فلسطيني أصلي',
                    price: 1500,
                    stock: 50,
                    category: 'spices',
                    description: 'زعتر فلسطيني 100% أصلي من أفضل المزارع',
                    image: null,
                    date: new Date().toISOString()
                },
                {
                    id: 2,
                    name: 'كريم العناية الذهبي',
                    price: 2500,
                    stock: 30,
                    category: 'cosmetic',
                    description: 'كريم عناية بالبشرة بمكونات طبيعية',
                    image: null,
                    date: new Date().toISOString()
                },
                {
                    id: 3,
                    name: 'عرض خاص: مجموعة التوابل',
                    price: 3500,
                    stock: 20,
                    category: 'promo',
                    description: 'مجموعة متنوعة من أفضل التوابل',
                    image: null,
                    date: new Date().toISOString()
                },
                {
                    id: 4,
                    name: 'ملح البحر الميت',
                    price: 800,
                    stock: 100,
                    category: 'spices',
                    description: 'ملح البحر الميت الطبيعي النقي',
                    image: null,
                    date: new Date().toISOString()
                },
                {
                    id: 5,
                    name: 'سيروم الذهب للوجه',
                    price: 3000,
                    stock: 15,
                    category: 'cosmetic',
                    description: 'سيروم مرطب بجزيئات الذهب الخالص',
                    image: null,
                    date: new Date().toISOString()
                }
            ];
            
            localStorage.setItem('nardo_products', JSON.stringify(products));
            filteredProducts = products;
            displayProducts();
        }

        // ========== عرض المنتجات =====
        function displayProducts() {
            const container = document.getElementById('productsContainer');
            
            if (filteredProducts.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-box-open"></i><p>لا توجد منتجات</p></div>';
                return;
            }
            
            container.innerHTML = filteredProducts.map(product => `
                <div class="product-card">
                    <div class="product-image">
                        ${product.image ? `<img src="${product.image}" style="width: 100%; height: 100%; object-fit: cover;">` : '<i class="fas fa-box"></i>'}
                        ${product.stock < 10 ? '<div class="product-badge" style="background: #ff6b6b;">مخزون منخفض</div>' : ''}
                    </div>
                    <div class="product-info">
                        <div class="product-name">${product.name}</div>
                        <div class="product-category">
                            <i class="fas fa-tag"></i> ${getCategoryName(product.category)}
                        </div>
                        <div class="product-meta">
                            <div class="product-price">${product.price} دج</div>
                            <div class="product-stock ${product.stock < 10 ? 'low' : ''}">
                                <i class="fas fa-warehouse"></i> ${product.stock}
                            </div>
                        </div>
                        <div class="product-actions">
                            <button class="product-actions button btn-add-cart" onclick="addToCart(${product.id})">
                                <i class="fas fa-cart-plus"></i> أضف للسلة
                            </button>
                            <button class="product-actions button btn-details" onclick="showProductDetails(${product.id})">
                                <i class="fas fa-info-circle"></i> التفاصيل
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // ========== الحصول على اسم الفئة =====
        function getCategoryName(category) {
            const categories = {
                'promo': 'برموسيو',
                'spices': 'توابل',
                'cosmetic': 'كوسمتيك',
                'other': 'أخرى'
            };
            return categories[category] || category;
        }

        // ========== تصفية المنتجات =====
        function filterProducts(category) {
            currentFilter = category;
            
            // تحديث علامات التبويب النشطة
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            if (category === 'all') {
                filteredProducts = products;
            } else {
                filteredProducts = products.filter(p => p.category === category);
            }
            
            displayProducts();
        }

        // ========== إضافة إلى السلة =====
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;
            
            const existingItem = cart.find(item => item.id === productId);
            
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({
                    ...product,
                    quantity: 1
                });
            }
            
            updateCart();
            showNotification(`تم إضافة "${product.name}" إلى السلة`, 'success');
        }

        // ========== تحديث السلة =====
        function updateCart() {
            localStorage.setItem('nardo_cart', JSON.stringify(cart));
            
            // تحديث عدد العناصر
            document.getElementById('cartBadge').textContent = cart.length;
            
            // تحديث محتويات السلة
            const cartItemsContainer = document.getElementById('cartItems');
            
            if (cart.length === 0) {
                cartItemsContainer.innerHTML = '<div style="text-align: center; color: var(--text-secondary); padding: 40px 20px;"><i class="fas fa-shopping-cart" style="font-size: 40px; margin-bottom: 15px;"></i><p>السلة فارغة</p></div>';
            } else {
                cartItemsContainer.innerHTML = cart.map(item => `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <div class="cart-item-name">${item.name}</div>
                            <div class="cart-item-price">${item.price} دج × ${item.quantity}</div>
                        </div>
                        <button class="cart-item-remove" onclick="removeFromCart(${item.id})">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                `).join('');
            }
            
            // تحديث الإجمالي
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            document.getElementById('cartTotal').textContent = `${total} دج`;
        }

        // ========== إزالة من السلة =====
        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            updateCart();
            showNotification('تم إزالة المنتج من السلة', 'info');
        }

        // ========== فتح/إغلاق السلة =====
        function toggleCart() {
            document.getElementById('cartSidebar').classList.toggle('open');
        }

        // ========== عرض تفاصيل المنتج =====
        function showProductDetails(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;
            
            const content = document.getElementById('productDetailContent');
            content.innerHTML = `
                <div style="text-align: center; margin-bottom: 20px;">
                    ${product.image ? `<img src="${product.image}" style="width: 100%; height: 300px; object-fit: cover; border-radius: 10px; margin-bottom: 20px;">` : '<div style="width: 100%; height: 300px; background: linear-gradient(135deg, #1a472a, #0a2a1a); border-radius: 10px; display: flex; align-items: center; justify-content: center;"><i class="fas fa-box" style="font-size: 60px; color: var(--gold); opacity: 0.5;"></i></div>'}
                </div>
                <h3 style="color: var(--gold); margin-bottom: 10px;">${product.name}</h3>
                <p style="color: var(--text-secondary); margin-bottom: 15px;">${product.description}</p>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
                    <div style="background: rgba(255, 215, 0, 0.1); padding: 15px; border-radius: 10px; text-align: center;">
                        <div style="color: var(--text-secondary); font-size: 12px;">السعر</div>
                        <div style="color: var(--gold); font-size: 24px; font-weight: bold;">${product.price} دج</div>
                    </div>
                    <div style="background: rgba(255, 215, 0, 0.1); padding: 15px; border-radius: 10px; text-align: center;">
                        <div style="color: var(--text-secondary); font-size: 12px;">المخزون</div>
                        <div style="color: var(--gold); font-size: 24px; font-weight: bold;">${product.stock}</div>
                    </div>
                </div>
                <button class="btn btn-gold" style="width: 100%; padding: 12px;" onclick="addToCart(${product.id}); closeModal('productModal');">
                    <i class="fas fa-cart-plus"></i> أضف للسلة
                </button>
            `;
            
            document.getElementById('productModal').classList.add('show');
        }

        // ========== فتح/إغلاق النوافذ المنبثقة =====
        function openLoginModal() {
            document.getElementById('loginModal').classList.add('show');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('show');
        }

        function handleLogin(event) {
            event.preventDefault();
            showNotification('تم تسجيل الدخول بنجاح', 'success');
            closeModal('loginModal');
        }

        // ========== إتمام الشراء =====
        function checkout() {
            if (cart.length === 0) {
                showNotification('السلة فارغة', 'error');
                return;
            }
            
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            showNotification(`تم إرسال طلبك بقيمة ${total} دج. شكراً لتسوقك معنا!`, 'success');
            cart = [];
            updateCart();
            toggleCart();
        }

        // ========== تهيئة الصفحة =====
        document.addEventListener('DOMContentLoaded', function() {
            // محاولة تحميل المنتجات من localStorage أولاً
            const cached = localStorage.getItem('nardo_products');
            if (cached) {
                products = JSON.parse(cached);
                filteredProducts = products;
                displayProducts();
            }
            
            // محاولة جلب المنتجات الجديدة من تلغرام
            setTimeout(() => loadProductsFromTelegram(), 500);
            
            // تحميل السلة من localStorage
            const cachedCart = localStorage.getItem('nardo_cart');
            if (cachedCart) {
                cart = JSON.parse(cachedCart);
                updateCart();
            }
            
            // إغلاق السلة عند النقر خارجها
            document.addEventListener('click', function(event) {
                const cartSidebar = document.getElementById('cartSidebar');
                const cartToggleBtn = event.target.closest('[onclick*="toggleCart"]');
                
                if (!cartSidebar.contains(event.target) && !cartToggleBtn) {
                    cartSidebar.classList.remove('open');
                }
            });
            
            // إغلاق النوافذ المنبثقة عند النقر على الخلفية
            document.querySelectorAll('.modal').forEach(modal => {
                modal.addEventListener('click', function(event) {
                    if (event.target === this) {
                        this.classList.remove('show');
                    }
                });
            });
        });

        // تحديث السلة عند تحميل الصفحة
        window.addEventListener('load', function() {
            updateCart();
        });
    </script>
</body>
</html>
