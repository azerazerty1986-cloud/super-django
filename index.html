<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📹 ألبوم مختلط - صور + فيديو</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }
        
        body {
            background: #0a0c10;
            color: white;
            min-height: 100vh;
            padding: 16px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* الهيدر */
        .header {
            background: #161b22;
            border-radius: 25px;
            padding: 15px 20px;
            margin-bottom: 20px;
            border: 2px solid #ffd700;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .header h1 {
            color: #ffd700;
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .hybrid-badge {
            background: linear-gradient(45deg, #0088cc, #ffd700);
            color: white;
            padding: 5px 15px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: bold;
        }
        
        .merchant-badge {
            background: #0088cc;
            color: white;
            padding: 8px 20px;
            border-radius: 25px;
            font-weight: bold;
        }
        
        /* بطاقة التاجر */
        .merchant-card {
            background: #161b22;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
            border: 2px solid #ffd700;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .merchant-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #ffd700;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 25px;
            font-weight: bold;
            color: black;
        }
        
        .merchant-name {
            color: #ffd700;
            font-size: 18px;
            font-weight: bold;
        }
        
        .merchant-id {
            color: #8b949e;
            font-size: 14px;
        }
        
        /* شاشتين */
        .dual-screen {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .screen {
            background: #161b22;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid;
        }
        
        .live-screen { border-color: #ff0000; }
        .hybrid-screen { border-color: #ffd700; }
        
        .screen-header {
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1f2630;
        }
        
        .live-header { color: #ff0000; }
        .hybrid-header { color: #ffd700; }
        
        .video-container {
            background: black;
            min-height: 350px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        video {
            width: 100%;
            max-height: 350px;
            object-fit: cover;
        }
        
        canvas {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            border: 3px solid #ffd700;
            object-fit: cover;
        }
        
        .hybrid-indicator {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 11px;
            border: 1px solid #ffd700;
            display: flex;
            gap: 5px;
        }
        
        /* 3 أزرار */
        .three-buttons {
            display: flex;
            gap: 15px;
            margin: 20px 0;
            justify-content: center;
        }
        
        .btn {
            flex: 1;
            max-width: 180px;
            padding: 15px 20px;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s;
        }
        
        .btn-green { background: #238636; color: white; }
        .btn-red { background: #da3633; color: white; }
        .btn-blue { background: #0088cc; color: white; }
        .btn-hybrid { background: linear-gradient(45deg, #0088cc, #ffd700); color: white; }
        
        .btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.2);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        /* كاميرا */
        .camera-toggle {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            justify-content: center;
        }
        
        .cam-option {
            padding: 8px 25px;
            border-radius: 25px;
            background: #1f2630;
            color: #8b949e;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s;
        }
        
        .cam-option.active {
            border-color: #ffd700;
            color: #ffd700;
            background: #ffd70020;
        }
        
        /* إحصائيات متقدمة */
        .hybrid-stats {
            background: #1f2630;
            border-radius: 20px;
            padding: 15px;
            margin: 15px 0;
            border: 2px solid #ffd700;
        }
        
        .stats-row {
            display: flex;
            justify-content: space-around;
            margin: 10px 0;
        }
        
        .stat-block {
            text-align: center;
        }
        
        .stat-number {
            font-size: 28px;
            font-weight: bold;
            color: #ffd700;
        }
        
        .stat-label-small {
            color: #8b949e;
            font-size: 12px;
        }
        
        .media-type {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 11px;
            margin: 0 2px;
        }
        
        .type-photo { background: #0088cc; }
        .type-video { background: #ff0000; }
        
        /* حالة الألبومات */
        .albums-status {
            background: #1f2630;
            border-radius: 20px;
            padding: 15px;
            margin: 15px 0;
            border: 2px solid #ffd700;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .hybrid-album {
            background: #2d333b;
            border-radius: 12px;
            padding: 12px;
            margin: 10px 0;
            border-right: 4px solid #ffd700;
        }
        
        .album-media-preview {
            display: flex;
            gap: 5px;
            margin: 8px 0;
        }
        
        .media-icon {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }
        
        .icon-photo { background: #0088cc; }
        .icon-video { background: #ff0000; }
        
        /* قائمة الإطارات */
        .frames-list {
            background: #1f2630;
            border-radius: 15px;
            padding: 10px;
            margin-top: 15px;
            max-height: 150px;
            overflow-y: auto;
            border: 1px solid #ffd700;
        }
        
        .frame-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 12px;
            border-bottom: 1px solid #2d333b;
            font-size: 12px;
        }
        
        .frame-time {
            color: #ffd700;
        }
        
        /* شريط الحالة */
        .status-bar {
            margin-top: 20px;
            padding: 15px;
            background: #1f2630;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            border: 1px solid #ffd700;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- الهيدر -->
        <div class="header">
            <h1>
                <i class="fas fa-layer-group"></i>
                ألبوم مختلط - صور + فيديو
            </h1>
            <div class="merchant-badge">
                @nardoo_merchant
            </div>
        </div>

        <!-- بطاقة التاجر -->
        <div class="merchant-card">
            <div class="merchant-avatar">ن</div>
            <div class="merchant-info">
                <div class="merchant-name">تاجر ناردو</div>
                <div class="merchant-id">@nardoo_merchant</div>
            </div>
            <span class="hybrid-badge">صور + فيديو</span>
        </div>

        <!-- شاشتين -->
        <div class="dual-screen">
            <!-- البث المباشر -->
            <div class="screen live-screen">
                <div class="screen-header live-header">
                    <span><i class="fas fa-circle"></i> البث المباشر</span>
                    <span id="liveStatus">⏸️ متوقف</span>
                </div>
                <div class="video-container">
                    <video id="liveVideo" autoplay playsinline muted></video>
                    <div class="hybrid-indicator">
                        <span style="color:#ffd700;">📸 8</span>
                        <span style="color:#ff0000;">🎬 1</span>
                    </div>
                </div>
            </div>

            <!-- المعاينة -->
            <div class="screen hybrid-screen">
                <div class="screen-header hybrid-header">
                    <span><i class="fas fa-images"></i> معاينة الألبوم</span>
                    <span id="simulateStatus">⏳ انتظار</span>
                </div>
                <div class="video-container">
                    <canvas id="frameCanvas" width="280" height="280"></canvas>
                </div>
            </div>
        </div>

        <!-- اختيار الكاميرا -->
        <div class="camera-toggle">
            <div class="cam-option active" onclick="selectCamera('user')" id="camFront">أمامية</div>
            <div class="cam-option" onclick="selectCamera('environment')" id="camBack">خلفية</div>
        </div>

        <!-- 3 أزرار -->
        <div class="three-buttons">
            <button class="btn btn-green" onclick="startCamera()" id="startBtn">
                <i class="fas fa-camera"></i> تشغيل الكاميرا
            </button>
            <button class="btn btn-hybrid" onclick="startHybridStream()" id="liveBtn" disabled>
                <i class="fas fa-layer-group"></i> بدء البث المختلط
            </button>
            <button class="btn btn-red" onclick="stopLiveStream()" id="stopBtn" disabled>
                <i class="fas fa-stop"></i> إيقاف
            </button>
        </div>

        <!-- إحصائيات متقدمة -->
        <div class="hybrid-stats">
            <div class="stats-row">
                <div class="stat-block">
                    <div class="stat-number" id="fpsValue">--</div>
                    <div class="stat-label-small">إطار/ث</div>
                </div>
                <div class="stat-block">
                    <div class="stat-number" id="bufferValue">0</div>
                    <div class="stat-label-small">في المخزن</div>
                </div>
                <div class="stat-block">
                    <div class="stat-number" id="sentFrames">0</div>
                    <div class="stat-label-small">صور مرسلة</div>
                </div>
                <div class="stat-block">
                    <div class="stat-number" id="sentVideos">0</div>
                    <div class="stat-label-small">فيديوهات</div>
                </div>
            </div>
            <div style="text-align: center; margin-top: 5px;">
                <span class="media-type type-photo">📸 صور</span>
                <span class="media-type type-video">🎬 فيديو</span>
            </div>
        </div>

        <!-- الألبومات المختلطة -->
        <div class="albums-status" id="albumsStatus">
            <div style="text-align: center; color: #8b949e;">📊 في انتظار الألبومات...</div>
        </div>

        <!-- قائمة الإطارات -->
        <div class="frames-list" id="framesList">
            <div style="color: #8b949e; text-align: center;">📸 في انتظار الإطارات...</div>
        </div>

        <!-- شريط الحالة -->
        <div class="status-bar">
            <span id="statusText"><i class="fas fa-circle" style="color: #4caf50;"></i> النظام جاهز</span>
            <span id="timeDisplay"></span>
        </div>
    </div>

    <script>
        // ========== إعدادات تيليجرام ==========
        const TELEGRAM = {
            botToken: '8576673096:AAEFKd-YSJcW_0d_wAHZBt-5nPg_VOjDX_0',
            channelId: '-1003822964890'
        };
        const MERCHANT_ID = '@nardoo_merchant';

        // ========== إعدادات الألبوم المختلط ==========
        const HYBRID_CONFIG = {
            photosCount: 8,        // عدد الصور في الألبوم
            videoDuration: 3,       // مدة الفيديو بالثواني
            albumInterval: 6000,    // إرسال ألبوم كل 6 ثواني
            photoQuality: 0.85,     // جودة الصور 85%
            videoQuality: 0.8,      // جودة الفيديو
            frameRate: 15,          // 15 إطار/ث للفيديو
            maxBufferSize: 50
        };

        // ========== متغيرات النظام ==========
        let stream = null;
        let cameraActive = false;
        let isLiveActive = false;
        let currentFacingMode = 'user';
        
        // الإطارات والموقتات
        let frameBuffer = [];
        let frameCounter = 0;
        let currentFrameIndex = 0;
        let photoCounter = 0;
        let videoCounter = 0;
        
        // المؤقتات
        let captureInterval = null;
        let simulationInterval = null;
        let albumInterval = null;
        let mediaRecorder = null;
        let videoChunks = [];
        let isRecording = false;
        
        // عناصر DOM
        const video = document.getElementById('liveVideo');
        const canvas = document.getElementById('frameCanvas');
        const ctx = canvas.getContext('2d');
        
        const liveStatus = document.getElementById('liveStatus');
        const simulateStatus = document.getElementById('simulateStatus');
        const startBtn = document.getElementById('startBtn');
        const liveBtn = document.getElementById('liveBtn');
        const stopBtn = document.getElementById('stopBtn');
        const camFront = document.getElementById('camFront');
        const camBack = document.getElementById('camBack');
        
        const fpsValue = document.getElementById('fpsValue');
        const bufferValue = document.getElementById('bufferValue');
        const sentFrames = document.getElementById('sentFrames');
        const sentVideos = document.getElementById('sentVideos');
        
        const albumsStatus = document.getElementById('albumsStatus');
        const framesList = document.getElementById('framesList');
        const statusText = document.getElementById('statusText');
        const timeDisplay = document.getElementById('timeDisplay');

        // تحديث الوقت
        setInterval(() => {
            const now = new Date();
            timeDisplay.textContent = now.toLocaleTimeString('ar-EG');
        }, 1000);

        // اختيار الكاميرا
        window.selectCamera = function(mode) {
            currentFacingMode = mode;
            camFront.classList.toggle('active', mode === 'user');
            camBack.classList.toggle('active', mode === 'environment');
            
            if (cameraActive) {
                stopCamera();
                setTimeout(startCamera, 500);
            }
        };

        // تشغيل الكاميرا
        window.startCamera = async function() {
            try {
                statusText.innerHTML = '🔄 تشغيل الكاميرا...';
                
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: currentFacingMode,
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    },
                    audio: false
                });
                
                video.srcObject = stream;
                await video.play();
                
                cameraActive = true;
                liveStatus.innerHTML = '🔴 نشط';
                startBtn.disabled = true;
                liveBtn.disabled = false;
                stopBtn.disabled = true;
                
                statusText.innerHTML = '✅ الكاميرا جاهزة';
                
            } catch (err) {
                statusText.innerHTML = '❌ خطأ: ' + err.message;
            }
        };

        // بدء البث المختلط
        window.startHybridStream = function() {
            isLiveActive = true;
            liveBtn.disabled = true;
            stopBtn.disabled = false;
            liveStatus.innerHTML = '🔴 بث مختلط';
            statusText.innerHTML = '🔴 البث نشط';
            
            // بدء العمليات
            startHybridProcesses();
        };

        // إيقاف البث
        window.stopLiveStream = function() {
            console.log('🛑 إيقاف...');
            isLiveActive = false;
            
            // إيقاف المؤقتات
            if (captureInterval) clearInterval(captureInterval);
            if (simulationInterval) clearInterval(simulationInterval);
            if (albumInterval) clearInterval(albumInterval);
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
            
            // تنظيف
            frameBuffer = [];
            frameCounter = 0;
            currentFrameIndex = 0;
            
            // تحديث الواجهة
            liveBtn.disabled = false;
            stopBtn.disabled = true;
            liveStatus.innerHTML = '⏸️ متوقف';
            statusText.innerHTML = '⏹️ تم الإيقاف';
            bufferValue.textContent = '0';
        };

        // بدء العمليات المختلطة
        function startHybridProcesses() {
            // التقاط الإطارات (للصور)
            captureInterval = setInterval(captureFrame, 66); // 15 FPS
            
            // محاكاة الإطارات
            simulationInterval = setInterval(simulateFrame, 66);
            
            // إرسال ألبوم مختلط كل 6 ثواني
            albumInterval = setInterval(sendHybridAlbum, HYBRID_CONFIG.albumInterval);
        }

        // التقاط إطار
        function captureFrame() {
            if (!cameraActive || !isLiveActive) return;
            
            ctx.drawImage(video, 0, 0, 280, 280);
            
            canvas.toBlob((blob) => {
                const frame = {
                    id: Date.now(),
                    blob: blob,
                    time: Date.now(),
                    number: frameCounter++
                };
                
                frameBuffer.push(frame);
                
                // الحفاظ على حجم المخزن
                if (frameBuffer.length > HYBRID_CONFIG.maxBufferSize) {
                    frameBuffer.shift();
                }
                
                bufferValue.textContent = frameBuffer.length;
                updateFramesList();
                updateFPS();
                
            }, 'image/jpeg', HYBRID_CONFIG.photoQuality);
        }

        // محاكاة الإطارات
        function simulateFrame() {
            if (frameBuffer.length > 0 && isLiveActive) {
                const frame = frameBuffer[currentFrameIndex % frameBuffer.length];
                currentFrameIndex++;
                
                const img = new Image();
                img.onload = () => {
                    ctx.drawImage(img, 0, 0, 280, 280);
                };
                img.src = URL.createObjectURL(frame.blob);
                
                simulateStatus.innerHTML = '▶️ نشط';
            }
        }

        // تسجيل فيديو قصير
        function startVideoRecording() {
            return new Promise((resolve) => {
                videoChunks = [];
                mediaRecorder = new MediaRecorder(stream);
                
                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) videoChunks.push(e.data);
                };
                
                mediaRecorder.onstop = () => {
                    const blob = new Blob(videoChunks, { type: 'video/webm' });
                    resolve(blob);
                };
                
                mediaRecorder.start();
                
                // إيقاف بعد المدة المحددة
                setTimeout(() => {
                    if (mediaRecorder.state !== 'inactive') {
                        mediaRecorder.stop();
                    }
                }, HYBRID_CONFIG.videoDuration * 1000);
            });
        }

        // إرسال ألبوم مختلط (صور + فيديو)
        async function sendHybridAlbum() {
            if (!isLiveActive || frameBuffer.length < HYBRID_CONFIG.photosCount) {
                console.log('⏳ انتظار الإطارات...');
                return;
            }
            
            try {
                // 1. أخذ الصور من المخزن
                const photosToSend = frameBuffer.splice(0, HYBRID_CONFIG.photosCount);
                
                // 2. تسجيل فيديو قصير
                const videoBlob = await startVideoRecording();
                
                const albumId = Date.now();
                const now = new Date();
                const timeStr = now.toLocaleTimeString('ar-EG');
                
                // 3. تحضير الألبوم المختلط
                const mediaArray = [];
                
                // أول عنصر - فيديو (يمكن أن يكون الأول أو أي ترتيب)
                mediaArray.push({
                    type: 'video',
                    media: 'attach://video0',
                    caption: `🎬 ألبوم مختلط من ${MERCHANT_ID}\n⏱️ ${timeStr}\n📸 ${photosToSend.length} صورة\n🎥 ${HYBRID_CONFIG.videoDuration} ث فيديو\n🆔 AlbumID: ${albumId}\n⭐ جودة: ${HYBRID_CONFIG.photoQuality*100}%`
                });
                
                // باقي العناصر - صور
                photosToSend.forEach((photo, i) => {
                    mediaArray.push({
                        type: 'photo',
                        media: `attach://photo${i}`
                    });
                });
                
                // 4. تجهيز FormData
                const formData = new FormData();
                formData.append('chat_id', TELEGRAM.channelId);
                formData.append('media', JSON.stringify(mediaArray));
                
                // إضافة الفيديو
                formData.append('video0', videoBlob, `video_${albumId}.webm`);
                
                // إضافة الصور
                photosToSend.forEach((photo, i) => {
                    formData.append(`photo${i}`, photo.blob, `photo_${i}.jpg`);
                });
                
                // 5. إرسال الألبوم
                const res = await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/sendMediaGroup`, {
                    method: 'POST',
                    body: formData
                });
                
                const result = await res.json();
                
                if (result.ok) {
                    // تحديث الإحصائيات
                    photoCounter += photosToSend.length;
                    videoCounter++;
                    
                    sentFrames.textContent = photoCounter;
                    sentVideos.textContent = videoCounter;
                    
                    console.log(`✅ ألبوم مختلط ${albumId} أرسل بنجاح`);
                    
                    // عرض في الواجهة
                    addHybridAlbumToList(albumId, timeStr, photosToSend.length);
                }
                
            } catch (error) {
                console.error('❌ فشل إرسال الألبوم:', error);
            }
        }

        // إضافة ألبوم للقائمة
        function addHybridAlbumToList(id, time, photosCount) {
            let html = albumsStatus.innerHTML;
            
            if (albumsStatus.innerHTML.includes('في انتظار الألبومات')) {
                html = '';
            }
            
            const albumHtml = `
                <div class="hybrid-album">
                    <div style="display:flex; justify-content:space-between;">
                        <span style="color:#ffd700;">🆔 ${id}</span>
                        <span style="color:#8b949e;">⏱️ ${time}</span>
                    </div>
                    <div class="album-media-preview">
                        <div class="media-icon icon-video"><i class="fas fa-video"></i></div>
                        <div class="media-icon icon-photo"><i class="fas fa-image"></i> x${photosCount}</div>
                    </div>
                    <div style="font-size:12px; color:#4caf50;">
                        ✅ تم الإرسال
                    </div>
                </div>
            `;
            
            albumsStatus.innerHTML = albumHtml + html;
        }

        // تحديث FPS
        let lastFPSUpdate = Date.now();
        let frameCount = 0;
        
        function updateFPS() {
            frameCount++;
            const now = Date.now();
            if (now - lastFPSUpdate >= 1000) {
                fpsValue.textContent = frameCount;
                frameCount = 0;
                lastFPSUpdate = now;
            }
        }

        // تحديث قائمة الإطارات
        function updateFramesList() {
            if (frameBuffer.length === 0) {
                framesList.innerHTML = '<div style="color: #8b949e; text-align: center;">📸 في انتظار الإطارات...</div>';
                return;
            }
            
            let html = '';
            frameBuffer.slice(-5).reverse().forEach(frame => {
                const time = new Date(frame.time).toLocaleTimeString('ar-EG');
                html += `
                    <div class="frame-item">
                        <span>إطار #${frame.number}</span>
                        <span class="frame-time">${time}</span>
                    </div>
                `;
            });
            
            framesList.innerHTML = html;
        }

        // إيقاف الكاميرا
        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(t => t.stop());
                stream = null;
            }
            cameraActive = false;
            startBtn.disabled = false;
            liveBtn.disabled = true;
            stopBtn.disabled = true;
        }
    </script>
</body>
</html>
