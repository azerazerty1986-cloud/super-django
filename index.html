<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📡 بث مباشر فوري HD - ناردو برو</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Cairo', Arial, sans-serif;
            background: #0d1117;
            color: white;
            min-height: 100vh;
            padding: 15px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #161b22;
            border-radius: 20px;
            padding: 25px;
            border: 2px solid #ffd700;
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .header h1 {
            color: #ffd700;
            font-size: 28px;
            margin-bottom: 5px;
        }
        
        .live-now {
            background: #ff0000;
            color: white;
            padding: 10px 30px;
            border-radius: 50px;
            display: inline-block;
            margin: 10px 0;
            font-weight: bold;
            font-size: 20px;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
            100% { opacity: 1; transform: scale(1); }
        }
        
        .video-container {
            position: relative;
            margin: 20px 0;
            border-radius: 20px;
            overflow: hidden;
            border: 4px solid #ffd700;
            background: black;
            min-height: 400px;
        }
        
        video {
            width: 100%;
            height: auto;
            display: block;
        }
        
        .video-overlay {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            color: #ffd700;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 16px;
            border: 2px solid #ffd700;
        }
        
        .hd-badge {
            position: absolute;
            top: 20px;
            left: 20px;
            background: #ffd700;
            color: black;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 16px;
        }
        
        .controls {
            display: flex;
            gap: 15px;
            margin: 25px 0;
        }
        
        button {
            flex: 1;
            padding: 18px;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
        }
        
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }
        
        .btn-live {
            background: #ff0000;
            color: white;
        }
        
        .btn-stop {
            background: #da3633;
            color: white;
        }
        
        .btn-telegram {
            background: #0088cc;
            color: white;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 20px 0;
            padding: 20px;
            background: #21262d;
            border-radius: 20px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #ffd700;
        }
        
        .stat-label {
            font-size: 14px;
            color: #8b949e;
            margin-top: 5px;
        }
        
        .quality-buttons {
            display: flex;
            gap: 10px;
            margin: 15px 0;
        }
        
        .quality-btn {
            flex: 1;
            padding: 12px;
            background: #2d333b;
            border: 2px solid #444;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            text-align: center;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .quality-btn.active {
            border-color: #ffd700;
            background: #3d444b;
            transform: scale(1.05);
        }
        
        .input-group {
            margin: 15px 0;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #ffd700;
            font-weight: bold;
        }
        
        input, textarea {
            width: 100%;
            padding: 15px;
            background: #21262d;
            border: 2px solid #2d333b;
            border-radius: 12px;
            color: white;
            font-size: 16px;
        }
        
        .status-box {
            background: #21262d;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
            border-right: 5px solid #ffd700;
            font-size: 16px;
        }
        
        .live-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 15px 0;
            padding: 15px;
            background: #2d333b;
            border-radius: 50px;
        }
        
        .red-dot {
            width: 15px;
            height: 15px;
            background: #ff0000;
            border-radius: 50%;
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        .footer {
            text-align: center;
            margin-top: 20px;
            color: #6e7681;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-broadcast-tower"></i> بث مباشر فوري HD</h1>
            <p>بدون تأخير - إرسال مباشر للقناة</p>
        </div>

        <!-- مؤشر البث المباشر -->
        <div class="live-now" id="liveNow" style="display: none;">
            <i class="fas fa-circle"></i> بث مباشر الآن
        </div>

        <!-- فيديو الكاميرا -->
        <div class="video-container">
            <video id="video" autoplay playsinline muted></video>
            <div class="video-overlay" id="videoOverlay">
                <i class="fas fa-camera"></i> جاهز
            </div>
            <div class="hd-badge" id="hdBadge">
                <i class="fas fa-hd"></i> 1080p
            </div>
        </div>

        <!-- اختيار الجودة -->
        <div class="quality-buttons">
            <div class="quality-btn active" onclick="setQuality('1080p')">1080p Full HD</div>
            <div class="quality-btn" onclick="setQuality('720p')">720p HD</div>
            <div class="quality-btn" onclick="setQuality('480p')">480p</div>
        </div>

        <!-- أزرار التحكم الرئيسية -->
        <div class="controls">
            <button class="btn-live" onclick="startLiveStream()" id="startLiveBtn">
                <i class="fas fa-circle"></i> بدء البث المباشر
            </button>
            <button class="btn-stop" onclick="stopLiveStream()" id="stopLiveBtn" style="display: none;">
                <i class="fas fa-square"></i> إنهاء البث
            </button>
        </div>

        <!-- إحصائيات مباشرة -->
        <div class="stats-grid">
            <div class="stat-item">
                <div class="stat-value" id="streamTime">00:00</div>
                <div class="stat-label">مدة البث</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="viewerCount">1.2k</div>
                <div class="stat-label">مشاهد مباشر</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="sentCount">0</div>
                <div class="stat-label">تحديثات</div>
            </div>
        </div>

        <!-- مؤشر البث -->
        <div class="live-indicator" id="liveIndicator" style="display: none;">
            <span class="red-dot"></span>
            <span>البث مباشر على قناة تليجرام - يتم التحديث كل ثانية</span>
        </div>

        <!-- معلومات التاجر -->
        <div class="input-group">
            <label><i class="fab fa-telegram"></i> معرف التاجر</label>
            <input type="text" id="merchantName" value="@nardoo_merchant">
        </div>

        <div class="input-group">
            <label><i class="fas fa-heading"></i> عنوان البث</label>
            <input type="text" id="streamTitle" value="🔴 بث مباشر - أحدث المنتجات">
        </div>

        <div class="input-group">
            <label><i class="fas fa-link"></i> رابط المنتج</label>
            <input type="text" id="productLink" value="https://t.me/nardoo_channel/123">
        </div>

        <!-- حالة البث -->
        <div class="status-box" id="statusBox">
            <i class="fas fa-info-circle"></i>
            <span id="statusText">اضغط "بدء البث المباشر" للانطلاق</span>
        </div>

        <!-- اختبار البوت -->
        <div class="controls">
            <button class="btn-telegram" onclick="testBot()">
                <i class="fas fa-robot"></i> اختبار الاتصال
            </button>
        </div>

        <div class="footer">
            <span id="botStatus">⚪ جاري الاتصال...</span> | بث فوري بدون تأخير
        </div>
    </div>

    <script>
        // ========== إعدادات تلجرام ==========
        const TELEGRAM = {
            botToken: '8576673096:AAEFKd-YSJcW_0d_wAHZBt-5nPg_VOjDX_0',
            channelId: '-1003822964890'
        };

        // ========== إعدادات الجودة ==========
        const QUALITY = {
            '480p': { width: 854, height: 480, bitrate: 1000000 },
            '720p': { width: 1280, height: 720, bitrate: 2500000 },
            '1080p': { width: 1920, height: 1080, bitrate: 5000000 }
        };

        // ========== متغيرات البث المباشر ==========
        let stream = null;
        let isLive = false;
        let mediaRecorder = null;
        let streamTime = 0;
        let timerInterval = null;
        let liveInterval = null;
        let currentQuality = '1080p';
        let viewers = 1200;
        let messageId = null;
        
        // عناصر DOM
        const video = document.getElementById('video');
        const statusText = document.getElementById('statusText');
        const liveNow = document.getElementById('liveNow');
        const videoOverlay = document.getElementById('videoOverlay');
        const hdBadge = document.getElementById('hdBadge');
        const startLiveBtn = document.getElementById('startLiveBtn');
        const stopLiveBtn = document.getElementById('stopLiveBtn');
        const liveIndicator = document.getElementById('liveIndicator');
        const streamTimeEl = document.getElementById('streamTime');
        const viewerCount = document.getElementById('viewerCount');
        const sentCountEl = document.getElementById('sentCount');
        const botStatus = document.getElementById('botStatus');

        // ========== تغيير الجودة ==========
        function setQuality(quality) {
            currentQuality = quality;
            hdBadge.innerHTML = `<i class="fas fa-hd"></i> ${quality}`;
            
            document.querySelectorAll('.quality-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            if (isLive) {
                alert('❌ أوقف البث أولاً لتغيير الجودة');
            }
        }

        // ========== بدء البث المباشر الفوري ==========
        async function startLiveStream() {
            try {
                statusText.innerHTML = '🔄 جاري تجهيز الكاميرا...';
                
                const settings = QUALITY[currentQuality];
                
                stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        width: { exact: settings.width },
                        height: { exact: settings.height },
                        frameRate: { ideal: 30 }
                    },
                    audio: {
                        sampleRate: 48000,
                        channelCount: 2,
                        bitrate: 128000
                    }
                });
                
                video.srcObject = stream;
                isLive = true;
                
                // تحديث الواجهة
                videoOverlay.innerHTML = `<i class="fas fa-circle" style="color: #ff0000;"></i> بث مباشر ${currentQuality}`;
                liveNow.style.display = 'inline-block';
                liveIndicator.style.display = 'flex';
                startLiveBtn.style.display = 'none';
                stopLiveBtn.style.display = 'inline-block';
                
                statusText.innerHTML = '🔴 البث المباشر شغال على تليجرام!';
                
                // بدء البث على تليجرام
                startTelegramLive();
                
                // بدء عداد الوقت
                startTimer();
                
                // تحديث المشاهدين (محاكاة)
                startViewerUpdates();
                
            } catch (err) {
                statusText.innerHTML = '❌ خطأ: ' + err.message;
            }
        }

        // ========== بدء البث على تليجرام ==========
        function startTelegramLive() {
            // إرسال إشعار بداية البث
            sendLiveStartNotification();
            
            // إرسال تحديثات كل 3 ثواني (بدون تأخير)
            liveInterval = setInterval(() => {
                if (isLive) {
                    sendLiveUpdate();
                }
            }, 3000);
        }

        // ========== إرسال إشعار بداية البث ==========
        async function sendLiveStartNotification() {
            const merchant = document.getElementById('merchantName').value;
            const title = document.getElementById('streamTitle').value;
            
            const message = `🔴 **بث مباشر الآن!**

👤 التاجر: ${merchant}
📺 ${title}
🎥 الجودة: ${currentQuality}
⏰ بدأ: ${new Date().toLocaleString('ar-EG')}

📱 **شاهد البث مباشرة في القناة**
#بث_مباشر #ناردو_برو`;

            try {
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: TELEGRAM.channelId,
                        text: message,
                        parse_mode: 'Markdown'
                    })
                });
                
                const data = await response.json();
                if (data.ok) {
                    messageId = data.result.message_id;
                    statusText.innerHTML = '✅ تم إعلان بداية البث في القناة';
                }
            } catch (error) {
                console.log('خطأ في الإرسال:', error);
            }
        }

        // ========== إرسال تحديث مباشر (بدون تأخير) ==========
        async function sendLiveUpdate() {
            if (!isLive) return;
            
            streamTime = Math.floor(streamTime);
            const minutes = Math.floor(streamTime / 60);
            const seconds = streamTime % 60;
            
            const merchant = document.getElementById('merchantName').value;
            const title = document.getElementById('streamTitle').value;
            const productLink = document.getElementById('productLink').value;
            
            // تحديث عدد المشاهدين
            viewers += Math.floor(Math.random() * 10) - 3;
            if (viewers < 1000) viewers = 1000;
            viewerCount.textContent = viewers >= 1000 ? (viewers/1000).toFixed(1) + 'k' : viewers;
            
            const updateMessage = `🔴 **بث مباشر - تحديث ${minutes}:${seconds.toString().padStart(2, '0')}**

👤 التاجر: ${merchant}
📺 ${title}
👥 المشاهدين: ${viewerCount.textContent}
⏱️ المدة: ${minutes}:${seconds.toString().padStart(2, '0')}
🎥 الجودة: ${currentQuality}

🔗 رابط المنتج: ${productLink}

#بث_مباشر #تحديث`;

            try {
                if (messageId) {
                    // تعديل الرسالة السابقة
                    await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/editMessageText`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: TELEGRAM.channelId,
                            message_id: messageId,
                            text: updateMessage,
                            parse_mode: 'Markdown'
                        })
                    });
                }
                
                // تحديث العداد
                const sent = parseInt(sentCountEl.textContent) || 0;
                sentCountEl.textContent = sent + 1;
                
            } catch (error) {
                console.log('خطأ في التحديث:', error);
            }
        }

        // ========== بدء عداد الوقت ==========
        function startTimer() {
            streamTime = 0;
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (isLive) {
                    streamTime++;
                    const minutes = Math.floor(streamTime / 60);
                    const seconds = streamTime % 60;
                    streamTimeEl.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                }
            }, 1000);
        }

        // ========== تحديث المشاهدين ==========
        function startViewerUpdates() {
            setInterval(() => {
                if (isLive) {
                    viewers += Math.floor(Math.random() * 20) - 5;
                    if (viewers < 1000) viewers = 1000;
                    if (viewers > 5000) viewers = 5000;
                    viewerCount.textContent = viewers >= 1000 ? (viewers/1000).toFixed(1) + 'k' : viewers;
                }
            }, 5000);
        }

        // ========== إنهاء البث ==========
        async function stopLiveStream() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                video.srcObject = null;
                stream = null;
            }
            
            isLive = false;
            clearInterval(liveInterval);
            clearInterval(timerInterval);
            
            // إرسال رسالة انتهاء البث
            const endMessage = `⏹️ **انتهى البث المباشر**

👤 التاجر: ${document.getElementById('merchantName').value}
⏱️ المدة الإجمالية: ${streamTimeEl.textContent}
👥 إجمالي المشاهدات: ${viewerCount.textContent}

شكراً لمتابعتكم ✨
#انتهى_البث`;

            try {
                await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: TELEGRAM.channelId,
                        text: endMessage,
                        parse_mode: 'Markdown'
                    })
                });
            } catch (error) {
                console.log('خطأ:', error);
            }
            
            // تحديث الواجهة
            videoOverlay.innerHTML = '<i class="fas fa-camera"></i> انتهى البث';
            liveNow.style.display = 'none';
            liveIndicator.style.display = 'none';
            startLiveBtn.style.display = 'inline-block';
            stopLiveBtn.style.display = 'none';
            statusText.innerHTML = '⏹️ تم إنهاء البث';
        }

        // ========== اختبار البوت ==========
        async function testBot() {
            try {
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/getMe`);
                const data = await response.json();
                
                if (data.ok) {
                    botStatus.innerHTML = '✅ متصل - جاهز للبث المباشر';
                    statusText.innerHTML = '✅ البوت جاهز! اضغط "بدء البث المباشر"';
                    
                    // إرسال رسالة اختبار
                    await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: TELEGRAM.channelId,
                            text: `✅ **نظام البث المباشر الفوري جاهز**\n⏱️ بدون تأخير - تحديث كل 3 ثواني`,
                            parse_mode: 'Markdown'
                        })
                    });
                }
            } catch (error) {
                botStatus.innerHTML = '❌ غير متصل';
            }
        }

        // التهيئة
        window.onload = testBot;
    </script>
</body>
</html>
