<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📹 HYBRID v2.0 - نظام متكامل</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }
        
        body {
            background: #0a0c10;
            color: white;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        /* الهيدر */
        .header {
            background: linear-gradient(135deg, #161b22, #1f2630);
            border-radius: 30px;
            padding: 20px 30px;
            margin-bottom: 25px;
            border: 2px solid #ffd700;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 0 30px rgba(255,215,0,0.2);
        }
        
        .header h1 {
            color: #ffd700;
            font-size: 32px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .protocol-badge {
            background: #4caf50;
            color: white;
            padding: 10px 25px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            border: 2px solid #ffd700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        /* شاشتين كبيرتين */
        .dual-screen {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 25px;
        }
        
        .screen {
            background: #161b22;
            border-radius: 30px;
            overflow: hidden;
            border: 3px solid;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        
        .live-screen { border-color: #ff4444; }
        .preview-screen { border-color: #ffd700; }
        
        .screen-header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1f2630;
            border-bottom: 2px solid;
        }
        
        .live-header {
            color: #ff4444;
            border-bottom-color: #ff4444;
        }
        
        .preview-header {
            color: #ffd700;
            border-bottom-color: #ffd700;
        }
        
        .screen-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 20px;
            font-weight: bold;
        }
        
        .live-badge {
            background: #ff0000;
            color: white;
            padding: 5px 15px;
            border-radius: 25px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%,100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .timer-badge {
            background: rgba(0,0,0,0.8);
            color: #ffd700;
            padding: 5px 20px;
            border-radius: 30px;
            font-size: 24px;
            font-weight: bold;
            border: 2px solid #ffd700;
        }
        
        /* حاويات الفيديو */
        .video-container {
            position: relative;
            width: 100%;
            background: black;
            aspect-ratio: 16/9;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        video, canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        canvas {
            background: #1a1a1a;
        }
        
        /* الأزرار المائية */
        .watermark-buttons {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 15px;
            z-index: 20;
        }
        
        .watermark-btn {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            border: 2px solid #ffd700;
            transition: all 0.3s;
            box-shadow: 0 0 20px rgba(255,215,0,0.3);
        }
        
        .watermark-btn:hover {
            background: #ffd700;
            color: black;
            transform: scale(1.1);
        }
        
        .watermark-btn.stop-btn {
            border-color: #ff4444;
        }
        
        .watermark-btn.stop-btn:hover {
            background: #ff4444;
            color: white;
        }
        
        .watermark-btn.zip-btn {
            border-color: #4caf50;
        }
        
        .watermark-btn.zip-btn:hover {
            background: #4caf50;
            color: white;
        }
        
        /* 3 أزرار كبيرة أسفل */
        .action-buttons {
            display: flex;
            gap: 20px;
            margin: 30px 0;
            justify-content: center;
        }
        
        .action-btn {
            flex: 1;
            max-width: 220px;
            padding: 18px 0;
            border: none;
            border-radius: 50px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        
        .action-btn.start {
            background: #4caf50;
            color: white;
        }
        
        .action-btn.stop {
            background: #f44336;
            color: white;
        }
        
        .action-btn.zip {
            background: #ffd700;
            color: black;
        }
        
        .action-btn:hover {
            transform: translateY(-5px);
            filter: brightness(1.2);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        
        /* أزرار الكاميرا */
        .camera-controls {
            display: flex;
            gap: 15px;
            margin: 20px 0;
            justify-content: center;
        }
        
        .cam-btn {
            padding: 12px 35px;
            border-radius: 30px;
            background: #1f2630;
            color: #8b949e;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s;
            font-size: 16px;
            font-weight: bold;
        }
        
        .cam-btn.active {
            border-color: #ffd700;
            color: #ffd700;
            background: #ffd70020;
        }
        
        .cam-btn i {
            margin-left: 8px;
        }
        
        /* شريط الحالة */
        .status-bar {
            background: #1f2630;
            border-radius: 20px;
            padding: 15px 25px;
            margin-top: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 2px solid #ffd700;
        }
        
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #4caf50;
        }
        
        .status-dot.recording {
            background: #ff4444;
            animation: blink 1s infinite;
        }
        
        .footer {
            text-align: center;
            margin-top: 20px;
            color: #6e7681;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- الهيدر مع البروتوكول -->
        <div class="header">
            <h1>
                <i class="fas fa-microchip"></i>
                HYBRID v2.0
            </h1>
            <div class="protocol-badge">
                <i class="fas fa-check-circle"></i> 30fps | 90% | 2.5Mbps
            </div>
        </div>

        <!-- شاشتين كبيرتين -->
        <div class="dual-screen">
            <!-- الشاشة الأولى: البث المباشر -->
            <div class="screen live-screen">
                <div class="screen-header live-header">
                    <div class="screen-title">
                        <i class="fas fa-circle"></i>
                        البث المباشر
                    </div>
                    <div class="live-badge" id="liveIndicator">🔴 مباشر</div>
                </div>
                <div class="video-container">
                    <video id="liveVideo" autoplay playsinline muted></video>
                    
                    <!-- الأزرار المائية على الشاشة الأولى -->
                    <div class="watermark-buttons">
                        <div class="watermark-btn" onclick="selectCamera('user')" id="camFrontBtn" title="كاميرا أمامية">
                            <i class="fas fa-camera-retro"></i>
                        </div>
                        <div class="watermark-btn" onclick="selectCamera('environment')" id="camBackBtn" title="كاميرا خلفية">
                            <i class="fas fa-camera"></i>
                        </div>
                    </div>
                </div>
            </div>

            <!-- الشاشة الثانية: آخر صورة -->
            <div class="screen preview-screen">
                <div class="screen-header preview-header">
                    <div class="screen-title">
                        <i class="fas fa-camera"></i>
                        آخر صورة
                    </div>
                    <div class="timer-badge" id="countdownDisplay">5</div>
                </div>
                <div class="video-container">
                    <canvas id="previewCanvas" width="1280" height="720"></canvas>
                    
                    <!-- الأزرار المائية على الشاشة الثانية -->
                    <div class="watermark-buttons">
                        <div class="watermark-btn stop-btn" onclick="stopEverything()" id="stopBtn" title="إيقاف تام">
                            <i class="fas fa-power-off"></i>
                        </div>
                        <div class="watermark-btn zip-btn" onclick="saveZip()" id="zipBtn" title="حفظ ZIP">
                            <i class="fas fa-file-archive"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 3 أزرار كبيرة أسفل -->
        <div class="action-buttons">
            <button class="action-btn start" onclick="startBroadcast()" id="startBtn">
                <i class="fas fa-play"></i> بدء البث
            </button>
            <button class="action-btn stop" onclick="stopEverything()" id="stopBigBtn">
                <i class="fas fa-stop"></i> إيقاف تام
            </button>
            <button class="action-btn zip" onclick="saveZip()" id="zipBigBtn">
                <i class="fas fa-file-archive"></i> حفظ ZIP
            </button>
        </div>

        <!-- أزرار الكاميرا السفلية -->
        <div class="camera-controls">
            <div class="cam-btn active" onclick="selectCamera('user')" id="camFront">
                <i class="fas fa-camera-retro"></i> أمامية
            </div>
            <div class="cam-btn" onclick="selectCamera('environment')" id="camBack">
                <i class="fas fa-camera"></i> خلفية
            </div>
        </div>

        <!-- شريط الحالة -->
        <div class="status-bar">
            <div style="display: flex; align-items: center; gap: 10px;">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">النظام جاهز</span>
            </div>
            <div style="display: flex; gap: 25px; color: #ffd700;">
                <span><i class="fas fa-image"></i> <span id="photoCount">0</span></span>
                <span><i class="fas fa-video"></i> <span id="videoCount">0</span></span>
                <span><i class="fas fa-fingerprint"></i> <span id="sessionDisplay">---</span></span>
            </div>
        </div>

        <div class="footer">
            <i class="fas fa-circle"></i> HYBRID v2.0 | @nardoo_merchant | إيقاف تام + ZIP
        </div>
    </div>

    <script>
        // ========== بروتوكول HYBRID v2.0 ==========
        const HYBRID_CONFIG = {
            // إعدادات الفيديو
            videoFPS: 30,
            videoBitrate: "2500k",
            videoDuration: 5,
            videoInterval: 8000,
            
            // إعدادات الصور
            photoFPS: 5,
            photoQuality: 0.9,
            photoInterval: 200,
            
            // إدارة النظام
            bufferSize: 5000,
            maxQueueSize: 20
        };

        // ========== بصمة الناشر ==========
        const PUBLISHER = {
            id: '@nardoo_merchant',
            name: 'تاجر ناردو',
            master: null,
            
            generateMasterFingerprint: function() {
                const now = new Date();
                const sessionId = 'LIVE_' + Math.random().toString(36).substring(2, 8).toUpperCase();
                const signature = btoa(this.id + now.getTime()).substring(0, 8).toUpperCase();
                return {
                    publisher: this.id,
                    session: sessionId,
                    date: now.toLocaleDateString('ar-EG').replace(/\//g, '-'),
                    signature: signature
                };
            },
            
            generateSubFingerprint: function(albumId) {
                if (!this.master) return 'ERROR';
                const base = this.master.signature;
                const albumHash = (parseInt('0x' + base) + albumId).toString(16).substring(0, 6).toUpperCase();
                return `${this.master.session}_${albumHash}`;
            },
            
            refreshMaster: function() {
                this.master = this.generateMasterFingerprint();
                document.getElementById('sessionDisplay').textContent = this.master.session;
                return this.master;
            }
        };

        // ========== إعدادات تيليجرام ==========
        const TELEGRAM = {
            botToken: '8576673096:AAEFKd-YSJcW_0d_wAHZBt-5nPg_VOjDX_0',
            channelId: '-1003822964890'
        };

        // ========== متغيرات النظام ==========
        let stream = null;
        let cameraActive = false;
        let isLiveActive = false;
        let currentFacingMode = 'user';
        let countdownInterval = null;
        
        // مخازن للمحتوى
        let currentPhotos = [];
        let currentVideos = [];
        let photoCounter = 0;
        let videoCounter = 0;
        
        // مؤقتات
        let photoInterval = null;
        let videoInterval = null;
        let mediaRecorder = null;
        
        // عناصر DOM
        const video = document.getElementById('liveVideo');
        const canvas = document.getElementById('previewCanvas');
        const ctx = canvas.getContext('2d');
        
        const liveIndicator = document.getElementById('liveIndicator');
        const countdownDisplay = document.getElementById('countdownDisplay');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const photoCount = document.getElementById('photoCount');
        const videoCount = document.getElementById('videoCount');
        const sessionDisplay = document.getElementById('sessionDisplay');
        
        const camFront = document.getElementById('camFront');
        const camBack = document.getElementById('camBack');
        const camFrontBtn = document.getElementById('camFrontBtn');
        const camBackBtn = document.getElementById('camBackBtn');

        // ========== اختيار الكاميرا ==========
        window.selectCamera = function(mode) {
            if (mode === currentFacingMode) return;
            
            currentFacingMode = mode;
            updateCameraButtons();
            
            if (cameraActive) {
                // إيقاف كل شيء أولاً
                if (isLiveActive) {
                    stopEverything();
                } else {
                    stopCameraOnly();
                }
                // تشغيل الكاميرا من جديد
                setTimeout(startCamera, 500);
            }
        };

        // ========== تحديث أزرار الكاميرا ==========
        function updateCameraButtons() {
            const isFront = currentFacingMode === 'user';
            [camFront, camFrontBtn].forEach(btn => {
                if (btn) btn.classList.toggle('active', isFront);
            });
            [camBack, camBackBtn].forEach(btn => {
                if (btn) btn.classList.toggle('active', !isFront);
            });
        }

        // ========== تشغيل الكاميرا ==========
        async function startCamera() {
            try {
                statusText.innerHTML = '🔄 تشغيل الكاميرا...';
                
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: currentFacingMode,
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: true
                });
                
                video.srcObject = stream;
                await video.play();
                
                cameraActive = true;
                statusDot.className = 'status-dot';
                statusText.innerHTML = 'الكاميرا جاهزة';
                
                // بدء تحديث canvas
                requestAnimationFrame(updateCanvas);
                
            } catch (err) {
                statusText.innerHTML = '❌ خطأ: ' + err.message;
            }
        }

        // ========== تحديث canvas بالكاميرا ==========
        function updateCanvas() {
            if (stream && video.readyState === video.HAVE_ENOUGH_DATA) {
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            }
            requestAnimationFrame(updateCanvas);
        }

        // ========== إيقاف الكاميرا فقط ==========
        function stopCameraOnly() {
            if (stream) {
                stream.getTracks().forEach(track => {
                    track.stop();
                });
                stream = null;
                video.srcObject = null;
            }
            cameraActive = false;
            statusDot.className = 'status-dot';
            statusText.innerHTML = 'الكاميرا متوقفة';
        }

        // ========== إيقاف كل شيء (البث + الكاميرا) ==========
        window.stopEverything = function() {
            console.log('🛑 إيقاف تام للبث والكاميرا...');
            
            // 1. إيقاف البث إذا كان نشطاً
            if (isLiveActive) {
                isLiveActive = false;
                if (photoInterval) clearInterval(photoInterval);
                if (videoInterval) clearInterval(videoInterval);
                if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                    mediaRecorder.stop();
                }
                liveIndicator.style.display = 'none';
            }
            
            // 2. إيقاف الكاميرا
            if (stream) {
                stream.getTracks().forEach(track => {
                    track.stop();
                    console.log(`⏹️ تم إيقاف ${track.kind}`);
                });
                stream = null;
                video.srcObject = null;
            }
            
            // 3. تنظيف المتغيرات
            cameraActive = false;
            isLiveActive = false;
            
            // 4. تحديث الواجهة
            statusDot.className = 'status-dot';
            statusText.innerHTML = 'تم الإيقاف التام';
            countdownDisplay.style.display = 'none';
            liveIndicator.style.display = 'none';
            
            // 5. تنظيف العد التنازلي
            if (countdownInterval) {
                clearInterval(countdownInterval);
                countdownInterval = null;
            }
            
            // 6. تحديث الإحصائيات
            updateStats();
            
            console.log('✅ تم إيقاف كل شيء بنجاح');
        };

        // ========== بدء البث مع عد تنازلي ==========
        window.startBroadcast = function() {
            if (!cameraActive) {
                startCamera();
                setTimeout(() => startCountdown(), 1000);
            } else {
                startCountdown();
            }
        };

        // ========== العد التنازلي ==========
        function startCountdown() {
            let count = 5;
            countdownDisplay.textContent = count;
            countdownDisplay.style.display = 'block';
            liveIndicator.style.display = 'none';
            
            countdownInterval = setInterval(() => {
                count--;
                countdownDisplay.textContent = count;
                
                if (count === 0) {
                    clearInterval(countdownInterval);
                    countdownDisplay.style.display = 'none';
                    liveIndicator.style.display = 'flex';
                    startLiveStream();
                }
            }, 1000);
        }

        // ========== بدء البث المباشر ==========
        function startLiveStream() {
            // تجديد بصمة الجلسة
            PUBLISHER.refreshMaster();
            
            isLiveActive = true;
            statusDot.className = 'status-dot recording';
            statusText.innerHTML = '🔴 بث مباشر';
            
            // تنظيف المخازن القديمة
            currentPhotos = [];
            currentVideos = [];
            photoCounter = 0;
            videoCounter = 0;
            
            // بدء التسجيل حسب البروتوكول
            photoInterval = setInterval(capturePhoto, HYBRID_CONFIG.photoInterval);
            videoInterval = setInterval(recordVideo, HYBRID_CONFIG.videoInterval);
            
            updateStats();
        }

        // ========== التقاط صورة ==========
        function capturePhoto() {
            if (!isLiveActive) return;
            
            canvas.toBlob((blob) => {
                if (!isLiveActive) return;
                
                currentPhotos.push({
                    blob: blob,
                    time: Date.now()
                });
                photoCounter++;
                
                // تحديث الإحصائيات
                updateStats();
                
            }, 'image/jpeg', HYBRID_CONFIG.photoQuality);
        }

        // ========== تسجيل فيديو ==========
        async function recordVideo() {
            if (!isLiveActive || !stream) return;
            
            try {
                const chunks = [];
                const recorder = new MediaRecorder(stream, {
                    mimeType: 'video/webm;codecs=vp9',
                    videoBitsPerSecond: 2500000 // 2.5 Mbps
                });
                
                recorder.ondataavailable = (e) => {
                    if (e.data.size > 0) chunks.push(e.data);
                };
                
                recorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'video/webm' });
                    
                    currentVideos.push({
                        blob: blob,
                        time: Date.now()
                    });
                    videoCounter++;
                    
                    updateStats();
                };
                
                recorder.start();
                setTimeout(() => recorder.stop(), HYBRID_CONFIG.videoDuration * 1000);
                
            } catch (error) {
                console.error('❌ فشل تسجيل الفيديو:', error);
            }
        }

        // ========== حفظ ZIP مع البصمة ==========
        window.saveZip = async function() {
            if (currentPhotos.length === 0 && currentVideos.length === 0) {
                alert('لا يوجد محتوى للحفظ');
                return;
            }
            
            statusText.innerHTML = '📦 تجهيز ZIP...';
            
            try {
                const zip = new JSZip();
                const albumId = Date.now();
                const subFingerprint = PUBLISHER.generateSubFingerprint(albumId);
                
                // إضافة الصور
                currentPhotos.forEach((photo, index) => {
                    zip.file(`photo_${index + 1}.jpg`, photo.blob);
                });
                
                // إضافة الفيديوهات
                currentVideos.forEach((video, index) => {
                    zip.file(`video_${index + 1}.webm`, video.blob);
                });
                
                // إضافة ملف البصمة
                const now = new Date();
                const fingerprintText = `🔐 بث من ${PUBLISHER.id}
🎯 الجلسة: ${PUBLISHER.master?.session || 'N/A'}
📅 التاريخ: ${now.toLocaleDateString('ar-EG')}
⏱️ الوقت: ${now.toLocaleTimeString('ar-EG')}
🔑 البصمة: ${subFingerprint}
📊 المحتوى: ${currentPhotos.length} صور | ${currentVideos.length} فيديو
⚡ البروتوكول: HYBRID v2.0
📸 جودة الصور: ${HYBRID_CONFIG.photoQuality * 100}%
🎥 إعدادات الفيديو: ${HYBRID_CONFIG.videoFPS}fps | ${HYBRID_CONFIG.videoBitrate}`;
                
                zip.file("fingerprint.txt", fingerprintText);
                
                // إنشاء ملف ZIP
                const zipBlob = await zip.generateAsync({ 
                    type: "blob",
                    compression: "DEFLATE",
                    compressionOptions: { level: 6 }
                });
                
                // حفظ الملف
                const url = URL.createObjectURL(zipBlob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `broadcast_${subFingerprint}.zip`;
                a.click();
                
                statusText.innerHTML = '✅ تم حفظ ZIP';
                
            } catch (error) {
                statusText.innerHTML = '❌ خطأ في إنشاء ZIP';
                console.error(error);
            }
        };

        // ========== تحديث الإحصائيات ==========
        function updateStats() {
            photoCount.textContent = currentPhotos.length;
            videoCount.textContent = currentVideos.length;
        }

        // ========== بدء التشغيل ==========
        window.onload = function() {
            startCamera();
            countdownDisplay.style.display = 'none';
            liveIndicator.style.display = 'none';
            updateCameraButtons();
        };
    </script>
</body>
</html>
