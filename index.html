<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📹 بث مباشر متواصل - ناردو برو</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Cairo', Arial, sans-serif;
            background: #0d1117;
            color: white;
            min-height: 100vh;
            padding: 15px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #161b22;
            border-radius: 20px;
            padding: 20px;
            border: 2px solid #ffd700;
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .header h1 {
            color: #ffd700;
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .header p {
            color: #8b949e;
            font-size: 14px;
        }
        
        /* شعار البث المباشر */
        .live-badge {
            background: #ff0000;
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin: 10px 0;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 1; box-shadow: 0 0 20px #ff0000; }
            50% { opacity: 0.7; box-shadow: 0 0 40px #ff0000; }
            100% { opacity: 1; box-shadow: 0 0 20px #ff0000; }
        }
        
        .video-container {
            position: relative;
            margin: 15px 0;
            border-radius: 15px;
            overflow: hidden;
            border: 3px solid #ff0000;
            background: black;
            min-height: 300px;
        }
        
        video {
            width: 100%;
            height: auto;
            display: block;
            background: #1a1a1a;
        }
        
        /* تراكب معرف التاجر */
        .merchant-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.8);
            color: #ffd700;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: bold;
            z-index: 15;
            border: 2px solid #ffd700;
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .live-indicator {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ff0000;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            z-index: 15;
            display: flex;
            align-items: center;
            gap: 5px;
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* مؤشر الإرسال المتواصل */
        .stream-stats {
            background: #1a1f2b;
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
            border: 2px solid #ffd700;
        }
        
        .stat-row {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            padding: 5px 0;
            border-bottom: 1px solid #2d333b;
        }
        
        .stat-label {
            color: #8b949e;
        }
        
        .stat-value {
            color: #ffd700;
            font-weight: bold;
            font-family: monospace;
            font-size: 18px;
        }
        
        .chunks-container {
            margin-top: 15px;
        }
        
        .chunk-progress {
            height: 30px;
            background: #2d333b;
            border-radius: 15px;
            overflow: hidden;
            margin: 10px 0;
            position: relative;
        }
        
        .chunk-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ffaa00);
            width: 0%;
            transition: width 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .chunk-progress-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 1.5s infinite;
        }
        
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        
        .chunk-info {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #8b949e;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        
        button {
            flex: 1;
            min-width: 120px;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s;
        }
        
        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn-success {
            background: #238636;
            color: white;
        }
        
        .btn-danger {
            background: #da3633;
            color: white;
        }
        
        .btn-live {
            background: #ff0000;
            color: white;
            animation: glow 1.5s infinite;
        }
        
        @keyframes glow {
            0% { box-shadow: 0 0 10px #ff0000; }
            50% { box-shadow: 0 0 30px #ff0000; }
            100% { box-shadow: 0 0 10px #ff0000; }
        }
        
        .stats {
            display: flex;
            justify-content: space-around;
            margin: 15px 0;
            padding: 10px;
            background: #2d333b;
            border-radius: 10px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #ffd700;
        }
        
        .input-group {
            margin: 15px 0;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #ffd700;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 12px;
            background: #21262d;
            border: 1px solid #2d333b;
            border-radius: 8px;
            color: white;
            font-size: 14px;
        }
        
        .fixed-merchant {
            background: #1a1f2b;
            border: 2px solid #ffd700;
            border-radius: 10px;
            padding: 15px;
            margin: 10px 0;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .merchant-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #ffd700;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: black;
        }
        
        .merchant-info {
            flex: 1;
        }
        
        .merchant-name {
            font-size: 18px;
            font-weight: bold;
            color: #ffd700;
        }
        
        .merchant-id {
            font-size: 14px;
            color: #8b949e;
            direction: ltr;
            text-align: left;
            background: #2d333b;
            padding: 5px 10px;
            border-radius: 20px;
            margin-top: 5px;
            display: inline-block;
        }
        
        .queue-indicator {
            display: flex;
            gap: 5px;
            margin: 10px 0;
            justify-content: center;
        }
        
        .queue-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #2d333b;
            transition: all 0.3s;
        }
        
        .queue-dot.active {
            background: #ffd700;
            box-shadow: 0 0 10px #ffd700;
            animation: pulse-dot 1s infinite;
        }
        
        @keyframes pulse-dot {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
        
        .queue-dot.sent {
            background: #238636;
        }
        
        .queue-dot.failed {
            background: #da3633;
        }
        
        .footer {
            text-align: center;
            margin-top: 20px;
            color: #6e7681;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-store"></i> بث مباشر متواصل</h1>
            <p>معرف ثابت - إرسال تلقائي متتالي</p>
            <div class="live-badge">
                <i class="fas fa-circle"></i> بث مباشر متواصل
            </div>
        </div>

        <!-- فيديو الكاميرا -->
        <div class="video-container">
            <video id="video" autoplay playsinline muted></video>
            
            <div id="merchantOverlay" class="merchant-overlay" style="display: none;">
                <i class="fas fa-store"></i>
                <span id="merchantName">@nardoo_merchant</span>
                <span class="verified-badge">تاجر</span>
            </div>
            
            <div class="live-indicator" id="liveIndicator" style="display: none;">
                <i class="fas fa-circle"></i> بث مباشر
                <span id="liveTime">00:00</span>
            </div>
        </div>

        <!-- بطاقة التاجر -->
        <div class="fixed-merchant">
            <div class="merchant-avatar">
                <span id="merchantAvatar">ن</span>
            </div>
            <div class="merchant-info">
                <div class="merchant-name">
                    تاجر ناردو
                    <span class="merchant-status">✅ معتمد</span>
                </div>
                <div class="merchant-id" id="fixedMerchantId">@nardoo_merchant</div>
            </div>
        </div>

        <!-- إحصائيات البث المتواصل -->
        <div class="stream-stats">
            <div class="stat-row">
                <span class="stat-label">⏱️ مدة البث:</span>
                <span class="stat-value" id="totalTime">00:00</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">📦 عدد المقاطع:</span>
                <span class="stat-value" id="chunksCount">0</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">📊 حجم البث:</span>
                <span class="stat-value" id="totalSize">0 MB</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">⚡ سرعة الإرسال:</span>
                <span class="stat-value" id="sendSpeed">0 KB/s</span>
            </div>
            
            <!-- مؤشر حالة الإرسال -->
            <div class="queue-indicator" id="queueIndicator"></div>
            
            <!-- شريط تقدم الإرسال -->
            <div class="chunks-container">
                <div class="chunk-progress">
                    <div class="chunk-progress-bar" id="progressBar" style="width: 0%;"></div>
                </div>
                <div class="chunk-info">
                    <span id="currentChunk">0</span>
                    <span id="totalChunks">0</span>
                </div>
            </div>
        </div>

        <!-- أزرار التحكم -->
        <div class="controls">
            <button class="btn-success" onclick="startCamera()" id="startBtn">
                <i class="fas fa-play"></i> تشغيل الكاميرا
            </button>
            <button class="btn-danger" onclick="stopCamera()" id="stopBtn" style="display: none;">
                <i class="fas fa-stop"></i> إيقاف
            </button>
        </div>

        <div class="controls">
            <button class="btn-live" onclick="startLiveStream()" id="startLiveBtn" disabled>
                <i class="fas fa-circle"></i> بدء البث المباشر
            </button>
            <button class="btn-danger" onclick="stopLiveStream()" id="stopLiveBtn" style="display: none;">
                <i class="fas fa-square"></i> إنهاء البث
            </button>
        </div>

        <!-- إعدادات البث -->
        <div class="input-group">
            <label><i class="fas fa-clock"></i> مدة المقطع (ثانية)</label>
            <select id="chunkDuration">
                <option value="5">5 ثواني (سريع)</option>
                <option value="10" selected>10 ثواني (ممتاز)</option>
                <option value="15">15 ثانية (اقتصادي)</option>
                <option value="20">20 ثانية (بطيء)</option>
            </select>
        </div>

        <div class="input-group">
            <label><i class="fas fa-align-left"></i> وصف البث</label>
            <textarea id="videoDescription" rows="2">🔴 بث مباشر متواصل - منتجات حصرية</textarea>
        </div>

        <div class="input-group">
            <label><i class="fas fa-link"></i> رابط المنتج</label>
            <input type="text" id="productLink" value="https://t.me/nardoo_channel/123">
        </div>

        <!-- حالة النظام -->
        <div class="status-box" id="statusBox">
            <span id="statusText">انقر "تشغيل الكاميرا" للبدء</span>
        </div>

        <div class="footer">
            <span id="botStatus">⚪ جاري التحقق...</span> | بث متواصل بدون توقف
        </div>
    </div>

    <script>
        // ========== إعدادات تلجرام ==========
        const TELEGRAM = {
            botToken: '8576673096:AAEFKd-YSJcW_0d_wAHZBt-5nPg_VOjDX_0',
            channelId: '-1003822964890'
        };

        // ========== معرف التاجر الثابت ==========
        const MERCHANT_ID = '@nardoo_merchant';
        
        // ========== المتغيرات ==========
        let stream = null;
        let cameraActive = false;
        let isLiveStreaming = false;
        let mediaRecorder = null;
        let streamInterval = null;
        let totalSeconds = 0;
        let chunksSent = 0;
        let totalBytes = 0;
        let timerInterval = null;
        let currentChunkNumber = 0;
        
        // عناصر DOM
        const video = document.getElementById('video');
        const statusText = document.getElementById('statusText');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const startLiveBtn = document.getElementById('startLiveBtn');
        const stopLiveBtn = document.getElementById('stopLiveBtn');
        const liveIndicator = document.getElementById('liveIndicator');
        const liveTime = document.getElementById('liveTime');
        const totalTime = document.getElementById('totalTime');
        const chunksCount = document.getElementById('chunksCount');
        const totalSize = document.getElementById('totalSize');
        const sendSpeed = document.getElementById('sendSpeed');
        const progressBar = document.getElementById('progressBar');
        const currentChunk = document.getElementById('currentChunk');
        const totalChunks = document.getElementById('totalChunks');
        const queueIndicator = document.getElementById('queueIndicator');
        const botStatus = document.getElementById('botStatus');
        
        // عناصر التاجر
        const merchantOverlay = document.getElementById('merchantOverlay');
        const merchantName = document.getElementById('merchantName');
        const fixedMerchantId = document.getElementById('fixedMerchantId');
        const merchantAvatar = document.getElementById('merchantAvatar');

        // ========== تهيئة معرف التاجر ==========
        function initializeMerchant() {
            merchantName.textContent = MERCHANT_ID;
            fixedMerchantId.textContent = MERCHANT_ID;
            
            const firstChar = MERCHANT_ID.replace('@', '').charAt(0).toUpperCase();
            merchantAvatar.textContent = firstChar;
        }

        // ========== تشغيل الكاميرا ==========
        async function startCamera() {
            try {
                statusText.innerHTML = '🔄 جاري تشغيل الكاميرا...';
                
                stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: true
                });
                
                video.srcObject = stream;
                cameraActive = true;
                
                startBtn.style.display = 'none';
                stopBtn.style.display = 'inline-block';
                startLiveBtn.disabled = false;
                
                statusText.innerHTML = '✅ الكاميرا جاهزة!';
                
            } catch (err) {
                statusText.innerHTML = '❌ خطأ: ' + err.message;
            }
        }

        // ========== بدء البث المباشر المتواصل ==========
        function startLiveStream() {
            if (!cameraActive) {
                alert('❌ شغل الكاميرا أولاً');
                return;
            }
            
            isLiveStreaming = true;
            totalSeconds = 0;
            chunksSent = 0;
            totalBytes = 0;
            currentChunkNumber = 0;
            
            // تحديث الواجهة
            startLiveBtn.style.display = 'none';
            stopLiveBtn.style.display = 'inline-block';
            liveIndicator.style.display = 'flex';
            merchantOverlay.style.display = 'flex';
            
            statusText.innerHTML = '🔴 جاري البث المباشر المتواصل...';
            
            // بدء إرسال المقاطع
            sendNextChunk();
            
            // تحديث الوقت
            timerInterval = setInterval(() => {
                totalSeconds++;
                const minutes = Math.floor(totalSeconds / 60);
                const seconds = totalSeconds % 60;
                const timeString = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                totalTime.textContent = timeString;
                liveTime.textContent = timeString;
            }, 1000);
        }

        // ========== إرسال المقطع التالي ==========
        async function sendNextChunk() {
            if (!isLiveStreaming) return;
            
            try {
                currentChunkNumber++;
                const chunkDuration = parseInt(document.getElementById('chunkDuration').value);
                
                // تسجيل مقطع
                const chunkBlob = await recordChunk(chunkDuration);
                
                // إرسال المقطع
                await sendChunkToTelegram(chunkBlob, currentChunkNumber);
                
                // تحديث الإحصائيات
                chunksSent++;
                totalBytes += chunkBlob.size;
                
                chunksCount.textContent = chunksSent;
                const totalMB = (totalBytes / (1024 * 1024)).toFixed(2);
                totalSize.textContent = totalMB + ' MB';
                
                // حساب السرعة
                const speedKB = (chunkBlob.size / 1024 / chunkDuration).toFixed(2);
                sendSpeed.textContent = speedKB + ' KB/s';
                
                // تحديث الشريط
                updateProgress();
                
                // إرسال المقطع التالي
                setTimeout(() => sendNextChunk(), 1000);
                
            } catch (error) {
                console.error('خطأ في الإرسال:', error);
                statusText.innerHTML = '❌ خطأ في الإرسال، سأعيد المحاولة...';
                
                // إعادة المحاولة بعد ثانيتين
                setTimeout(() => sendNextChunk(), 2000);
            }
        }

        // ========== تسجيل مقطع ==========
        function recordChunk(duration) {
            return new Promise((resolve, reject) => {
                const chunks = [];
                const recorder = new MediaRecorder(stream, {
                    mimeType: 'video/webm;codecs=vp8,opus'
                });
                
                recorder.ondataavailable = (event) => {
                    if (event.data.size > 0) {
                        chunks.push(event.data);
                    }
                };
                
                recorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'video/webm' });
                    resolve(blob);
                };
                
                recorder.start();
                
                setTimeout(() => {
                    recorder.stop();
                }, duration * 1000);
            });
        }

        // ========== إرسال مقطع للتلجرام ==========
        async function sendChunkToTelegram(chunkBlob, chunkNumber) {
            const description = document.getElementById('videoDescription').value;
            const productLink = document.getElementById('productLink').value;
            
            const formData = new FormData();
            formData.append('chat_id', TELEGRAM.channelId);
            formData.append('video', chunkBlob, `live_chunk_${chunkNumber}.mp4`);
            
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;
            
            const caption = `🔴 **بث مباشر متواصل - الجزء ${chunkNumber}**

🏪 **التاجر:** ${MERCHANT_ID} (✅ معتمد)
⏱️ وقت البث: ${minutes}:${seconds.toString().padStart(2, '0')}

📝 ${description}
🔗 رابط المنتج: ${productLink}

#${MERCHANT_ID.replace('@', '')} #بث_مباشر #ناردو_برو`;

            formData.append('caption', caption);
            
            const response = await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/sendVideo`, {
                method: 'POST',
                body: formData
            });
            
            const result = await response.json();
            
            if (!result.ok) {
                throw new Error(result.description);
            }
            
            return result;
        }

        // ========== تحديث شريط التقدم ==========
        function updateProgress() {
            // تحديث الشريط
            const progress = (chunksSent / 100) * 100; // افتراضي 100 قطعة
            progressBar.style.width = Math.min(progress, 100) + '%';
            
            currentChunk.textContent = chunksSent;
            totalChunks.textContent = '∞';
            
            // تحديث نقاط المؤشر
            let dots = '';
            for (let i = 0; i < 10; i++) {
                if (i < chunksSent % 10) {
                    dots += '<span class="queue-dot sent"></span>';
                } else if (i === chunksSent % 10) {
                    dots += '<span class="queue-dot active"></span>';
                } else {
                    dots += '<span class="queue-dot"></span>';
                }
            }
            queueIndicator.innerHTML = dots;
        }

        // ========== إنهاء البث المباشر ==========
        function stopLiveStream() {
            isLiveStreaming = false;
            
            if (timerInterval) {
                clearInterval(timerInterval);
            }
            
            startLiveBtn.style.display = 'inline-block';
            stopLiveBtn.style.display = 'none';
            liveIndicator.style.display = 'none';
            merchantOverlay.style.display = 'none';
            
            statusText.innerHTML = '⏹️ تم إنهاء البث المباشر';
            
            // إرسال رسالة إنهاء البث
            fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: TELEGRAM.channelId,
                    text: `🔴 **انتهى البث المباشر**\n🏪 التاجر: ${MERCHANT_ID}\n⏱️ مدة البث: ${totalTime.textContent}\n📦 عدد المقاطع: ${chunksSent}`,
                    parse_mode: 'Markdown'
                })
            });
        }

        // ========== إيقاف الكاميرا ==========
        function stopCamera() {
            if (isLiveStreaming) {
                stopLiveStream();
            }
            
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                video.srcObject = null;
                stream = null;
                cameraActive = false;
            }
            
            startBtn.style.display = 'inline-block';
            stopBtn.style.display = 'none';
            startLiveBtn.style.display = 'inline-block';
            stopLiveBtn.style.display = 'none';
            startLiveBtn.disabled = true;
            liveIndicator.style.display = 'none';
            merchantOverlay.style.display = 'none';
            
            statusText.innerHTML = '⏹️ الكاميرا متوقفة';
        }

        // ========== اختبار البوت ==========
        async function testBot() {
            try {
                botStatus.innerHTML = '🔄 جاري الاتصال...';
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/getMe`);
                const data = await response.json();
                
                if (data.ok) {
                    botStatus.innerHTML = '✅ البوت متصل';
                    statusText.innerHTML = '✅ البوت يعمل!';
                    
                    await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: TELEGRAM.channelId,
                            text: `✅ **نظام البث المباشر المتواصل جاهز**\n🏪 التاجر: ${MERCHANT_ID}`,
                            parse_mode: 'Markdown'
                        })
                    });
                } else {
                    botStatus.innerHTML = '❌ البوت غير متصل';
                }
            } catch (error) {
                botStatus.innerHTML = '❌ خطأ في الاتصال';
            }
        }

        // التهيئة
        window.onload = function() {
            initializeMerchant();
            testBot();
        };
    </script>
</body>
</html>
