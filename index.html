<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بث تاجر تليجرام - ناردو برو</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Cairo', Arial, sans-serif;
            background: #0d1117;
            color: white;
            min-height: 100vh;
            padding: 15px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #161b22;
            border-radius: 20px;
            padding: 20px;
            border: 2px solid #ffd700;
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .header h1 {
            color: #ffd700;
            font-size: 24px;
        }
        
        .live-badge {
            background: #ff0000;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
            margin: 10px 0;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }
        
        .video-container {
            position: relative;
            margin: 15px 0;
            border-radius: 15px;
            overflow: hidden;
            border: 3px solid #238636;
            background: black;
        }
        
        video {
            width: 100%;
            height: auto;
            display: block;
            transform: scaleX(-1);
        }
        
        .video-overlay {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            color: #ffd700;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 12px;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            margin: 15px 0;
        }
        
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            transition: all 0.3s;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        .btn-success {
            background: #238636;
            color: white;
        }
        
        .btn-danger {
            background: #da3633;
            color: white;
        }
        
        .btn-telegram {
            background: #0088cc;
            color: white;
        }
        
        .btn-video {
            background: #9c27b0;
            color: white;
        }
        
        .btn-test {
            background: #6f42c1;
            color: white;
        }
        
        .stats {
            display: flex;
            justify-content: space-around;
            margin: 15px 0;
            padding: 10px;
            background: #2d333b;
            border-radius: 10px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #ffd700;
        }
        
        .stat-label {
            font-size: 12px;
            color: #8b949e;
        }
        
        .input-group {
            margin: 15px 0;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #ffd700;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 12px;
            background: #21262d;
            border: 1px solid #2d333b;
            border-radius: 8px;
            color: white;
            font-size: 14px;
        }
        
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #ffd700;
        }
        
        .status-box {
            background: #21262d;
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
            border-right: 4px solid #ffd700;
        }
        
        .recording-indicator {
            color: #ff0000;
            font-weight: bold;
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        .progress-bar {
            width: 100%;
            height: 20px;
            background: #2d333b;
            border-radius: 10px;
            margin: 10px 0;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: #ffd700;
            width: 0%;
            transition: width 0.3s;
        }
        
        .footer {
            text-align: center;
            margin-top: 20px;
            color: #8b949e;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📹 بث الفيديو المباشر</h1>
            <p>تسجيل فيديو قصير وإرسال إلى تليجرام</p>
        </div>

        <!-- حالة البث -->
        <div class="live-badge" id="liveBadge" style="display: none;">
            <i class="fas fa-circle"></i> بث مباشر الآن
        </div>

        <!-- فيديو الكاميرا -->
        <div class="video-container">
            <video id="video" autoplay playsinline></video>
            <div class="video-overlay" id="videoOverlay">
                <i class="fas fa-camera"></i> الكاميرا متوقفة
            </div>
        </div>

        <!-- أزرار التحكم -->
        <div class="controls">
            <button class="btn-success" onclick="startCamera()">
                <i class="fas fa-play"></i> تشغيل
            </button>
            <button class="btn-danger" onclick="stopCamera()">
                <i class="fas fa-stop"></i> إيقاف
            </button>
        </div>

        <!-- أزرار التسجيل (مدة قصيرة) -->
        <div class="controls">
            <button class="btn-video" onclick="startRecording(5)" id="record5sBtn">
                <i class="fas fa-circle"></i> تسجيل 5 ثواني
            </button>
            <button class="btn-video" onclick="startRecording(10)" id="record10sBtn">
                <i class="fas fa-circle"></i> تسجيل 10 ثواني
            </button>
            <button class="btn-telegram" onclick="sendVideo()" id="sendBtn">
                <i class="fab fa-telegram"></i> إرسال
            </button>
        </div>

        <!-- شريط التقدم -->
        <div class="progress-bar" id="progressBar" style="display: none;">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <!-- إحصائيات -->
        <div class="stats">
            <div class="stat-item">
                <div class="stat-value" id="viewerCount">127</div>
                <div class="stat-label">المشاهدين</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="streamTime">00:00</div>
                <div class="stat-label">مدة البث</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="sentCount">0</div>
                <div class="stat-label">تم الإرسال</div>
            </div>
        </div>

        <!-- معلومات الإرسال -->
        <div class="input-group">
            <label><i class="fab fa-telegram"></i> معرف التاجر</label>
            <input type="text" id="merchantUsername" value="@nardoo_merchant" placeholder="@username">
        </div>

        <div class="input-group">
            <label><i class="fas fa-align-left"></i> وصف البث</label>
            <textarea id="streamDescription" rows="2">🔴 بث مباشر: عرض تشكيلة جديدة من المنتجات 😍😍😍</textarea>
        </div>

        <div class="input-group">
            <label><i class="fas fa-link"></i> رابط المنتج</label>
            <input type="text" id="productUrl" value="https://t.me/nardoo_channel/123" placeholder="رابط المنتج">
        </div>

        <div class="input-group">
            <label><i class="fas fa-paper-plane"></i> إرسال إلى</label>
            <select id="channelSelect" onchange="updateChannel()">
                <option value="-1003822964890">📢 القناة الرئيسية (-1003822964890)</option>
                <option value="7461896689">👤 المدير (7461896689)</option>
                <option value="@nardoo_channel">📱 @nardoo_channel</option>
            </select>
            <input type="text" id="customChannel" value="-1003822964890" placeholder="معرف مخصص" style="margin-top: 10px;">
        </div>

        <!-- حجم الفيديو -->
        <div class="input-group">
            <label><i class="fas fa-weight"></i> جودة الفيديو</label>
            <select id="videoQuality">
                <option value="0.5">منخفضة (حجم صغير)</option>
                <option value="0.8" selected>متوسطة (موصى به)</option>
                <option value="1.0">عالية (حجم كبير)</option>
            </select>
        </div>

        <!-- حالة التسجيل والإرسال -->
        <div class="status-box" id="statusBox">
            <i class="fas fa-info-circle"></i>
            <span id="statusText">🔴 البث متوقف. شغل الكاميرا للبدء</span>
        </div>

        <!-- مؤشر التسجيل -->
        <div id="recordingIndicator" class="recording-indicator" style="display: none;">
            <i class="fas fa-circle"></i> جاري تسجيل الفيديو... <span id="recordingCountdown">5</span> ثواني
        </div>

        <!-- اختبار البوت -->
        <div class="controls">
            <button class="btn-test" onclick="testBot()">
                <i class="fas fa-robot"></i> اختبار البوت
            </button>
        </div>

        <div class="footer">
            <span id="botStatus">⚪ جاري التحقق...</span> | 
            <span>ناردو برو 2026</span>
        </div>
    </div>

    <script>
        // ========== 1. إعدادات تلجرام ==========
        const TELEGRAM = {
            botToken: '8576673096:AAEFKd-YSJcW_0d_wAHZBt-5nPg_VOjDX_0',
            channelId: '-1003822964890',
            adminId: '7461896689'
        };

        // ========== متغيرات التسجيل ==========
        let stream = null;
        let cameraActive = false;
        let mediaRecorder = null;
        let recordedChunks = [];
        let isRecording = false;
        let streamTime = 0;
        let sentCount = 0;
        let timerInterval = null;
        let viewers = 127;
        let recordingTimeout = null;
        
        // عناصر DOM
        const video = document.getElementById('video');
        const statusText = document.getElementById('statusText');
        const statusBox = document.getElementById('statusBox');
        const liveBadge = document.getElementById('liveBadge');
        const videoOverlay = document.getElementById('videoOverlay');
        const viewerCount = document.getElementById('viewerCount');
        const streamTimeEl = document.getElementById('streamTime');
        const sentCountEl = document.getElementById('sentCount');
        const botStatus = document.getElementById('botStatus');
        const recordingIndicator = document.getElementById('recordingIndicator');
        const recordingCountdown = document.getElementById('recordingCountdown');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const record5sBtn = document.getElementById('record5sBtn');
        const record10sBtn = document.getElementById('record10sBtn');
        const sendBtn = document.getElementById('sendBtn');

        // ========== تحديث القناة ==========
        function updateChannel() {
            const select = document.getElementById('channelSelect');
            const custom = document.getElementById('customChannel');
            custom.value = select.value;
        }

        // ========== اختبار البوت ==========
        async function testBot() {
            botStatus.innerHTML = '🔄 جاري الاختبار...';
            statusText.innerHTML = '🔄 جاري اختبار الاتصال...';
            
            try {
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/getMe`);
                const data = await response.json();
                
                if (data.ok) {
                    botStatus.innerHTML = '✅ البوت متصل';
                    statusText.innerHTML = '✅ البوت يعمل! يمكنك البدء';
                    statusBox.style.borderRightColor = '#4caf50';
                    
                    // إرسال رسالة اختبار
                    const testResponse = await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: TELEGRAM.channelId,
                            text: `✅ **اختبار البوت**\n\n📅 ${new Date().toLocaleString('ar-EG')}\n📹 نظام بث الفيديو يعمل`,
                            parse_mode: 'Markdown'
                        })
                    });
                    
                    const testData = await testResponse.json();
                    if (testData.ok) {
                        statusText.innerHTML = '✅ تم إرسال رسالة اختبار للقناة';
                    }
                } else {
                    throw new Error('فشل الاتصال');
                }
            } catch (error) {
                botStatus.innerHTML = '❌ البوت غير متصل';
                statusText.innerHTML = '❌ خطأ في الاتصال: ' + error.message;
                statusBox.style.borderRightColor = '#f85149';
            }
        }

        // ========== تشغيل الكاميرا ==========
        async function startCamera() {
            try {
                statusText.innerHTML = '🔄 جاري تشغيل الكاميرا...';
                
                stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        width: { ideal: 480 }, // تصغير الدقة لتقليل حجم الفيديو
                        height: { ideal: 360 }
                    },
                    audio: true
                });
                
                video.srcObject = stream;
                cameraActive = true;
                
                liveBadge.style.display = 'inline-block';
                videoOverlay.innerHTML = '<i class="fas fa-circle" style="color: #ff0000;"></i> الكاميرا شغالة';
                statusText.innerHTML = '✅ الكاميرا شغالة! اختر مدة التسجيل';
                statusBox.style.borderRightColor = '#4caf50';
                
                // تجهيز مسجل الفيديو
                setupMediaRecorder();
                
                startTimer();
                
            } catch (err) {
                statusText.innerHTML = '❌ خطأ: ' + err.message;
                statusBox.style.borderRightColor = '#f85149';
            }
        }

        // ========== تجهيز مسجل الفيديو ==========
        function setupMediaRecorder() {
            recordedChunks = [];
            try {
                mediaRecorder = new MediaRecorder(stream, {
                    mimeType: 'video/webm;codecs=vp8,opus' // استخدام كودك أصغر
                });
            } catch (e) {
                mediaRecorder = new MediaRecorder(stream);
            }
            
            mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0) {
                    recordedChunks.push(event.data);
                }
            };
            
            mediaRecorder.onstop = () => {
                statusText.innerHTML = `✅ تم التسجيل! حجم الفيديو: ${(getVideoSize() / (1024*1024)).toFixed(2)} ميجابايت. اضغط "إرسال"`;
                record5sBtn.disabled = false;
                record10sBtn.disabled = false;
                sendBtn.disabled = false;
                recordingIndicator.style.display = 'none';
                progressBar.style.display = 'none';
                isRecording = false;
            };
        }

        // ========== حساب حجم الفيديو ==========
        function getVideoSize() {
            const blob = new Blob(recordedChunks, { type: 'video/webm' });
            return blob.size;
        }

        // ========== بدء تسجيل الفيديو بمدة محددة ==========
        function startRecording(seconds) {
            if (!cameraActive) {
                alert('❌ شغل الكاميرا أولاً');
                return;
            }
            
            if (mediaRecorder && mediaRecorder.state === 'inactive') {
                recordedChunks = [];
                mediaRecorder.start();
                isRecording = true;
                
                record5sBtn.disabled = true;
                record10sBtn.disabled = true;
                sendBtn.disabled = true;
                
                recordingIndicator.style.display = 'block';
                progressBar.style.display = 'block';
                statusText.innerHTML = `🎥 جاري تسجيل ${seconds} ثواني...`;
                
                let countdown = seconds;
                recordingCountdown.textContent = countdown;
                
                const countdownInterval = setInterval(() => {
                    countdown--;
                    recordingCountdown.textContent = countdown;
                    progressFill.style.width = `${((seconds - countdown) / seconds) * 100}%`;
                }, 1000);
                
                // إيقاف التسجيل بعد المدة المحددة
                recordingTimeout = setTimeout(() => {
                    if (mediaRecorder && mediaRecorder.state === 'recording') {
                        mediaRecorder.stop();
                        clearInterval(countdownInterval);
                        progressFill.style.width = '100%';
                    }
                }, seconds * 1000);
            }
        }

        // ========== إيقاف الكاميرا ==========
        function stopCamera() {
            if (stream) {
                if (isRecording) {
                    clearTimeout(recordingTimeout);
                    if (mediaRecorder && mediaRecorder.state === 'recording') {
                        mediaRecorder.stop();
                    }
                }
                
                stream.getTracks().forEach(track => track.stop());
                video.srcObject = null;
                stream = null;
                cameraActive = false;
                
                liveBadge.style.display = 'none';
                videoOverlay.innerHTML = '<i class="fas fa-camera"></i> الكاميرا متوقفة';
                statusText.innerHTML = '⏹️ الكاميرا متوقفة';
                statusBox.style.borderRightColor = '#ffd700';
                
                recordingIndicator.style.display = 'none';
                progressBar.style.display = 'none';
                record5sBtn.disabled = false;
                record10sBtn.disabled = false;
                sendBtn.disabled = false;
                
                clearInterval(timerInterval);
                streamTime = 0;
                streamTimeEl.textContent = '00:00';
            }
        }

        // ========== بدء عداد الوقت ==========
        function startTimer() {
            streamTime = 0;
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                streamTime++;
                const minutes = Math.floor(streamTime / 60);
                const seconds = streamTime % 60;
                streamTimeEl.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }, 1000);
        }

        // ========== إرسال الفيديو إلى تليجرام ==========
        async function sendVideo() {
            if (recordedChunks.length === 0) {
                alert('❌ لا يوجد فيديو مسجل. سجل فيديو أولاً');
                return;
            }

            const channelId = document.getElementById('customChannel').value || TELEGRAM.channelId;
            const merchantUsername = document.getElementById('merchantUsername').value;
            const description = document.getElementById('streamDescription').value;
            const productUrl = document.getElementById('productUrl').value;
            const quality = document.getElementById('videoQuality').value;

            statusText.innerHTML = '🔄 جاري تجهيز الفيديو...';
            sendBtn.disabled = true;
            
            try {
                // تحويل التسجيل إلى ملف فيديو
                const videoBlob = new Blob(recordedChunks, { type: 'video/webm' });
                const videoSize = (videoBlob.size / (1024*1024)).toFixed(2);
                
                statusText.innerHTML = `🔄 جاري رفع الفيديو (${videoSize} ميجابايت)...`;
                
                const videoFile = new File([videoBlob], 'stream.webm', { type: 'video/webm' });
                
                const formData = new FormData();
                formData.append('chat_id', channelId);
                formData.append('video', videoFile);
                
                const caption = `🎥 **بث مباشر الآن**

👤 التاجر: ${merchantUsername}
📝 ${description}
⏰ الوقت: ${new Date().toLocaleString('ar-EG')}
👥 المشاهدين: ${viewers}
📦 حجم الفيديو: ${videoSize} ميجابايت

🔗 رابط المنتج: ${productUrl}

#بث_مباشر #فيديو #تاجر_تليجرام #ناردو_برو`;

                formData.append('caption', caption);
                
                const replyMarkup = {
                    inline_keyboard: [
                        [
                            { text: "📱 تواصل مع التاجر", url: `https://t.me/${merchantUsername.replace('@', '')}` },
                            { text: "🛒 طلب المنتج", callback_data: "order_now" }
                        ]
                    ]
                };
                formData.append('reply_markup', JSON.stringify(replyMarkup));

                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/sendVideo`, {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (result.ok) {
                    statusText.innerHTML = `✅ تم إرسال الفيديو (${videoSize} ميجابايت) إلى تليجرام!`;
                    statusBox.style.borderRightColor = '#4caf50';
                    
                    sentCount++;
                    sentCountEl.textContent = sentCount;
                    
                    // مسح التسجيل بعد الإرسال
                    recordedChunks = [];
                    
                } else {
                    throw new Error(result.description);
                }

            } catch (error) {
                statusText.innerHTML = "❌ فشل الإرسال: " + error.message;
                statusBox.style.borderRightColor = '#f85149';
                console.error('خطأ:', error);
            } finally {
                sendBtn.disabled = false;
            }
        }

        // ========== التهيئة ==========
        window.onload = function() {
            viewerCount.textContent = viewers;
            updateChannel();
            setTimeout(testBot, 1000);
        };

    </script>
</body>
</html>
