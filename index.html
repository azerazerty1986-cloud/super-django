<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>نكهة وجمال | ناردو برو - المنصة المتكاملة</title>
    
    <!-- الخطوط -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0a0f1a 0%, #0f1420 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* ========== شريط الإشعارات ========== */
        .toast-message {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 12px 20px;
            border-radius: 50px;
            background: #10b981;
            color: white;
            z-index: 20001;
            animation: slideIn 0.3s ease;
            font-family: 'Cairo', sans-serif;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        /* ========== الشريط العلوي ========== */
        .top-bar {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.3);
        }
        
        .top-bar .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .top-bar-left {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .top-bar-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #ffd700;
            font-size: 14px;
        }
        
        .header-actions {
            display: flex;
            gap: 10px;
        }
        
        .action-btn {
            background: rgba(255, 215, 0, 0.2);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            color: #ffd700;
            cursor: pointer;
            position: relative;
            transition: all 0.3s;
        }
        
        .action-btn:hover {
            background: #ffd700;
            color: #1a1a2e;
            transform: scale(1.05);
        }
        
        .cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ff4444;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* ========== قسم الريلز ========== */
        .reels-section {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 25px;
            margin: 20px auto;
            max-width: 1200px;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }
        
        .reels-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .reels-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .reels-title i {
            font-size: 28px;
            color: gold;
        }
        
        .reels-title h2 {
            color: gold;
            margin: 0;
            font-size: 1.5rem;
        }
        
        .refresh-badge {
            background: rgba(255,215,0,0.2);
            border-radius: 20px;
            padding: 5px 12px;
            font-size: 12px;
            color: gold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .refresh-badge:hover {
            background: gold;
            color: black;
        }
        
        .add-reel-link {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,215,0,0.2);
            padding: 8px 20px;
            border-radius: 30px;
            color: gold;
            text-decoration: none;
            transition: all 0.3s;
        }
        
        .add-reel-link:hover {
            background: gold;
            color: black;
        }
        
        /* شريط البحث والتحكم */
        .reels-tools {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
        }
        
        .reels-search {
            flex: 2;
            display: flex;
            gap: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 50px;
            padding: 5px;
        }
        
        .reels-search input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 20px;
            color: white;
            font-family: 'Cairo', sans-serif;
            font-size: 14px;
        }
        
        .reels-search input::placeholder {
            color: rgba(255,255,255,0.6);
        }
        
        .reels-search input:focus {
            outline: none;
        }
        
        .reels-search button {
            background: linear-gradient(135deg, #ffd700, #ffb347);
            border: none;
            border-radius: 50px;
            padding: 0 20px;
            color: #1a1a2e;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .reels-actions {
            display: flex;
            gap: 10px;
        }
        
        .reels-btn {
            background: rgba(255,215,0,0.2);
            border: 1px solid rgba(255,215,0,0.3);
            padding: 8px 15px;
            border-radius: 30px;
            color: gold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Cairo', sans-serif;
        }
        
        .reels-btn:hover {
            background: gold;
            color: black;
        }
        
        /* أزرار التصفية */
        .reels-filters {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        
        .filter-chip {
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 6px 15px;
            border-radius: 20px;
            color: #ddd;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 12px;
            font-family: 'Cairo', sans-serif;
        }
        
        .filter-chip.active {
            background: #ffd700;
            color: #1a1a2e;
        }
        
        .filter-chip:hover {
            background: rgba(255,215,0,0.3);
        }
        
        /* إحصائيات */
        .reels-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: rgba(255,215,0,0.1);
            border-radius: 15px;
            margin-bottom: 15px;
            font-size: 12px;
            color: #ffd700;
        }
        
        /* حاوية الريلز */
        .reels-container {
            display: flex;
            flex-direction: row;
            overflow-x: auto;
            gap: 20px;
            padding: 10px 5px;
            scroll-behavior: smooth;
            min-height: 350px;
        }
        
        .reels-container::-webkit-scrollbar {
            height: 6px;
        }
        
        .reels-container::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }
        
        .reels-container::-webkit-scrollbar-thumb {
            background: #ffd700;
            border-radius: 10px;
        }
        
        /* بطاقة الريلز */
        .reel-card {
            flex: 0 0 auto;
            width: 280px;
            border-radius: 15px;
            overflow: hidden;
            background: #1a1a2e;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(255,215,0,0.2);
        }
        
        .reel-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(255,215,0,0.3);
            border-color: #ffd700;
        }
        
        .reel-thumbnail {
            height: 280px;
            position: relative;
            background: linear-gradient(135deg, #2a1a3a, #1a0a2a);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .reel-thumbnail i {
            font-size: 4rem;
            color: gold;
        }
        
        .play-icon {
            position: absolute;
            bottom: 15px;
            right: 15px;
            background: rgba(0,0,0,0.7);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: gold;
        }
        
        .reel-info {
            padding: 12px;
            background: rgba(0,0,0,0.8);
        }
        
        .reel-info-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .reel-title {
            color: white;
            font-size: 14px;
            font-weight: 500;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
        }
        
        .reel-views {
            color: #ffd700;
            font-size: 11px;
        }
        
        .reel-publisher {
            font-size: 11px;
            color: #aaa;
            margin-top: 5px;
        }
        
        .reel-serial {
            font-size: 9px;
            color: #ffd700;
            margin-top: 5px;
            font-family: monospace;
            opacity: 0.7;
        }
        
        /* رسائل */
        .no-reels {
            text-align: center;
            padding: 60px 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            width: 100%;
        }
        
        .no-reels i {
            font-size: 4rem;
            color: #ffd700;
            margin-bottom: 15px;
        }
        
        .loading-reels {
            text-align: center;
            padding: 40px;
            color: white;
            width: 100%;
        }
        
        /* مشغل الفيديو */
        .video-player-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 20000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .video-content {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .video-content video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .close-video {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            color: white;
            font-size: 24px;
            cursor: pointer;
            z-index: 100;
        }
        
        .video-info {
            position: absolute;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            padding: 30px 20px 20px;
            color: white;
            border-radius: 20px;
        }
        
        .video-actions {
            position: absolute;
            right: 20px;
            bottom: 100px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .video-action {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            color: white;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .video-action:hover {
            transform: scale(1.1);
            color: #ffd700;
        }
        
        @media (max-width: 768px) {
            .reels-tools {
                flex-direction: column;
            }
            .reels-search {
                width: 100%;
            }
            .reels-actions {
                width: 100%;
                justify-content: center;
            }
            .reel-card {
                width: 220px;
            }
            .reel-thumbnail {
                height: 220px;
            }
        }
    </style>
</head>
<body>
    <!-- ===== الشريط العلوي ===== -->
    <div class="top-bar">
        <div class="container">
            <div class="top-bar-left">
                <div class="top-bar-item">
                    <i class="fas fa-truck-fast"></i>
                    <span>شحن مجاني للطلبات فوق 5000 دج</span>
                </div>
                <div class="top-bar-item">
                    <i class="fas fa-headset"></i>
                    <span>دعم VIP 24/7</span>
                </div>
                <div class="top-bar-item">
                    <i class="fas fa-gem"></i>
                    <span>منتجات أصلية 100%</span>
                </div>
            </div>
            <div class="header-actions">
                <button class="action-btn" onclick="openLoginModal()">
                    <i class="far fa-user"></i>
                </button>
                <button class="action-btn" onclick="toggleCart()">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count" id="cartCount">0</span>
                </button>
            </div>
        </div>
    </div>
    
    <!-- ===== قسم الريلز المتقدم ===== -->
    <div class="reels-section">
        <div class="reels-header">
            <div class="reels-title">
                <i class="fas fa-film"></i>
                <h2>ناردو ريلز</h2>
                <span class="refresh-badge" onclick="loadReelsFromTelegram()">
                    <i class="fas fa-sync-alt"></i> تحديث
                </span>
            </div>
            <a href="add-reel.html" class="add-reel-link" id="addReelBtn">
                <span>إضافة مقطع</span>
                <i class="fas fa-arrow-left"></i>
            </a>
        </div>
        
        <!-- أدوات البحث والتحكم -->
        <div class="reels-tools">
            <div class="reels-search">
                <input type="text" id="searchReelsInput" placeholder="🔍 ابحث في الريلز بالعنوان، الناشر، أو المعرف..." onkeyup="handleSearchEnter(event)">
                <button onclick="searchReels()">
                    <i class="fas fa-search"></i> بحث
                </button>
            </div>
            <div class="reels-actions">
                <button class="reels-btn" onclick="clearReelsSearch()">
                    <i class="fas fa-times"></i> مسح
                </button>
                <button class="reels-btn" onclick="loadReelsFromTelegram()">
                    <i class="fas fa-download"></i> تحميل
                </button>
            </div>
        </div>
        
        <!-- أزرار التصفية -->
        <div class="reels-filters">
            <button class="filter-chip active" data-filter="all" onclick="filterReels('all')">
                <i class="fas fa-list"></i> الكل
            </button>
            <button class="filter-chip" data-filter="recent" onclick="filterReels('recent')">
                <i class="fas fa-clock"></i> الأحدث
            </button>
            <button class="filter-chip" data-filter="oldest" onclick="filterReels('oldest')">
                <i class="fas fa-history"></i> الأقدم
            </button>
            <button class="filter-chip" data-filter="mostViewed" onclick="filterReels('mostViewed')">
                <i class="fas fa-eye"></i> الأكثر مشاهدة
            </button>
        </div>
        
        <!-- إحصائيات -->
        <div class="reels-stats" id="reelsStats">
            <span><i class="fas fa-chart-line"></i> جاري تحميل الريلز...</span>
        </div>
        
        <!-- حاوية الريلز -->
        <div class="reels-container" id="reelsContainer">
            <div class="loading-reels">
                <i class="fas fa-spinner fa-spin"></i>
                <p>🔄 جاري تحميل الريلز من تليجرام...</p>
            </div>
        </div>
    </div>
    
    <!-- باقي محتوى الصفحة -->
    <div style="max-width: 1200px; margin: 0 auto; padding: 20px;">
        <div class="reels-stats" style="background: rgba(255,215,0,0.05); text-align: center; margin-bottom: 20px;">
            <span><i class="fas fa-info-circle"></i> ✨ الريلز التي تحمل المعرف NARD- فقط تظهر في هذا الشريط ✨</span>
        </div>
        
        <!-- هنا يمكن إضافة باقي محتوى الصفحة مثل المنتجات وغيرها -->
        <div style="background: rgba(255,255,255,0.05); border-radius: 20px; padding: 40px; text-align: center;">
            <i class="fas fa-store" style="font-size: 3rem; color: #ffd700; margin-bottom: 20px;"></i>
            <h3 style="color: white;">مرحباً بك في نكهة وجمال</h3>
            <p style="color: #aaa;">المتجر المتكامل للتوابل ومنتجات العناية</p>
        </div>
    </div>
    
    <div id="toastContainer"></div>
    
    <script>
        // ========== إعدادات تليجرام ==========
        const TELEGRAM = {
            botToken: '8576673096:AAECPDHWRTVQ_juq68hxM9PIdacnqevGRb4',
            channelId: '-1003822964890',
            apiUrl: 'https://api.telegram.org/bot'
        };
        
        // ========== متغيرات الريلز ==========
        let reelsData = [];
        let filteredReelsData = [];
        let currentUser = { id: 0, name: 'زائر', role: 'guest' };
        let isLoading = false;
        let currentFilter = 'all';
        let currentSearchQuery = '';
        
        // ========== تحميل المستخدم ==========
        function loadUser() {
            try {
                const saved = localStorage.getItem('current_user');
                if (saved) {
                    currentUser = JSON.parse(saved);
                }
                const addBtn = document.getElementById('addReelBtn');
                if (addBtn) {
                    addBtn.style.display = currentUser.role === 'admin' ? 'flex' : 'none';
                }
            } catch(e) {}
        }
        
        // ========== استخراج المعرف ==========
        function extractSerial(caption) {
            if (!caption) return null;
            const match = caption.match(/🔑 NARD-SERIAL: (NARD-\d{8}-\d{6}-\d{4})/);
            return match ? match[1] : null;
        }
        
        // ========== جلب الريلز من تليجرام ==========
        async function loadReelsFromTelegram() {
            if (isLoading) return;
            isLoading = true;
            
            const container = document.getElementById('reelsContainer');
            if (container) {
                container.innerHTML = `<div class="loading-reels"><i class="fas fa-spinner fa-spin"></i><p>🔄 جاري تحميل الريلز...</p></div>`;
            }
            updateStats('جاري التحميل...', true);
            
            try {
                const url = `${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getUpdates?limit=50`;
                const response = await fetch(url);
                const data = await response.json();
                
                const reels = [];
                
                if (data.ok && data.result) {
                    for (const update of data.result) {
                        const post = update.channel_post || update.message;
                        if (!post || !post.video) continue;
                        
                        const caption = post.caption || '';
                        const serial = extractSerial(caption);
                        
                        if (!serial || !serial.startsWith('NARD-')) continue;
                        
                        let title = 'ريلز';
                        const titleMatch = caption.match(/🎬 (.+?)(?:\n|$)/);
                        if (titleMatch) title = titleMatch[1];
                        
                        let publisher = 'ناردو برو';
                        const pubMatch = caption.match(/👤 (.+?)(?:\n|$)/);
                        if (pubMatch) publisher = pubMatch[1];
                        
                        const fileId = post.video.file_id;
                        const fileRes = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getFile?file_id=${fileId}`);
                        const fileData = await fileRes.json();
                        
                        if (fileData.ok) {
                            const videoUrl = `https://api.telegram.org/file/bot${TELEGRAM.botToken}/${fileData.result.file_path}`;
                            const views = parseInt(localStorage.getItem(`reel_views_${post.message_id}`)) || Math.floor(Math.random() * 100) + 10;
                            const likes = parseInt(localStorage.getItem(`reel_likes_${post.message_id}`)) || Math.floor(Math.random() * 50) + 5;
                            
                            reels.push({
                                id: post.message_id,
                                title: title,
                                videoUrl: videoUrl,
                                publisher: publisher,
                                serial: serial,
                                views: views,
                                likes: likes,
                                timestamp: post.date * 1000,
                                date: new Date(post.date * 1000).toLocaleDateString('ar-EG')
                            });
                        }
                    }
                }
                
                if (reels.length > 0) {
                    reelsData = reels;
                    localStorage.setItem('nardoo_reels_data', JSON.stringify(reels));
                    showToast(`✅ تم تحميل ${reels.length} ريلز`, 'success');
                } else {
                    const cached = localStorage.getItem('nardoo_reels_data');
                    if (cached) {
                        reelsData = JSON.parse(cached);
                        showToast(`📦 عرض ${reelsData.length} ريلز من الذاكرة`, 'info');
                    } else {
                        reelsData = [
                            { id: 1, title: 'عرض خاص على التوابل', videoUrl: '', publisher: 'ناردو برو', serial: 'NARD-20250325-143022-8473', views: 128, likes: 45, timestamp: Date.now() },
                            { id: 2, title: 'منتجات العناية بالبشرة', videoUrl: '', publisher: 'ناردو برو', serial: 'NARD-20250324-120015-6321', views: 256, likes: 89, timestamp: Date.now() - 86400000 }
                        ];
                        localStorage.setItem('nardoo_reels_data', JSON.stringify(reelsData));
                        showToast('📹 عرض ريلز تجريبية', 'info');
                    }
                }
                
                applyFilters();
                
            } catch (error) {
                console.error(error);
                const cached = localStorage.getItem('nardoo_reels_data');
                if (cached) {
                    reelsData = JSON.parse(cached);
                    applyFilters();
                    showToast('⚠️ تم عرض البيانات المخزنة', 'warning');
                } else {
                    showToast('❌ فشل التحميل', 'error');
                }
            } finally {
                isLoading = false;
            }
        }
        
        // ========== تطبيق التصفية والبحث ==========
        function applyFilters() {
            let result = [...reelsData];
            
            if (currentSearchQuery.trim()) {
                const query = currentSearchQuery.toLowerCase();
                result = result.filter(r => 
                    r.title.toLowerCase().includes(query) ||
                    r.publisher.toLowerCase().includes(query) ||
                    r.serial.toLowerCase().includes(query)
                );
            }
            
            if (currentFilter === 'recent') {
                result.sort((a, b) => b.timestamp - a.timestamp);
            } else if (currentFilter === 'oldest') {
                result.sort((a, b) => a.timestamp - b.timestamp);
            } else if (currentFilter === 'mostViewed') {
                result.sort((a, b) => (b.views || 0) - (a.views || 0));
            } else {
                result.sort((a, b) => b.timestamp - a.timestamp);
            }
            
            filteredReelsData = result;
            displayReels();
            updateStats(`📊 عرض ${filteredReelsData.length} من ${reelsData.length} ريلز`, false);
        }
        
        // ========== عرض الريلز ==========
        function displayReels() {
            const container = document.getElementById('reelsContainer');
            if (!container) return;
            
            if (filteredReelsData.length === 0) {
                container.innerHTML = `
                    <div class="no-reels">
                        <i class="fas fa-film"></i>
                        <p>✨ ${currentSearchQuery ? 'لا توجد نتائج تطابق بحثك' : 'لا توجد ريلز'} ✨</p>
                        ${!currentSearchQuery ? '<p style="font-size: 12px;">الريلز التي تحمل المعرف NARD- فقط تظهر هنا</p>' : ''}
                        ${currentUser.role === 'admin' && !currentSearchQuery ? '<a href="add-reel.html" style="display: inline-block; margin-top: 15px; background: gold; padding: 8px 20px; border-radius: 25px; color: black; text-decoration: none;">➕ أضف ريلز الآن</a>' : ''}
                    </div>
                `;
                return;
            }
            
            let html = '';
            for (const reel of filteredReelsData) {
                html += `
                    <div class="reel-card" onclick="openReelPlayer(${reel.id})">
                        <div class="reel-thumbnail">
                            <i class="fas fa-play-circle"></i>
                            <div class="play-icon">
                                <i class="fas fa-play"></i>
                            </div>
                        </div>
                        <div class="reel-info">
                            <div class="reel-info-header">
                                <span class="reel-title">🎬 ${escapeHtml(reel.title)}</span>
                                <span class="reel-views"><i class="fas fa-eye"></i> ${formatViews(reel.views)}</span>
                            </div>
                            <div class="reel-publisher">
                                <i class="fas fa-user"></i> ${escapeHtml(reel.publisher)}
                            </div>
                            <div class="reel-serial">
                                <i class="fas fa-fingerprint"></i> ${escapeHtml(reel.serial)}
                            </div>
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }
        
        // ========== مشغل الفيديو ==========
        function openReelPlayer(reelId) {
            const reel = filteredReelsData.find(r => r.id === reelId);
            if (!reel) return;
            
            reel.views = (reel.views || 0) + 1;
            localStorage.setItem(`reel_views_${reel.id}`, reel.views);
            
            const cacheIndex = reelsData.findIndex(r => r.id === reelId);
            if (cacheIndex !== -1) {
                reelsData[cacheIndex].views = reel.views;
                localStorage.setItem('nardoo_reels_data', JSON.stringify(reelsData));
            }
            
            const modal = document.createElement('div');
            modal.className = 'video-player-modal';
            modal.innerHTML = `
                <button class="close-video" onclick="this.closest('.video-player-modal').remove()">
                    <i class="fas fa-times"></i>
                </button>
                <div class="video-content">
                    ${reel.videoUrl ? 
                        `<video src="${reel.videoUrl}" controls autoplay playsinline></video>` :
                        `<div style="display: flex; flex-direction: column; align-items: center; justify-content: center; color: white;">
                            <i class="fas fa-video" style="font-size: 4rem; margin-bottom: 20px;"></i>
                            <p>فيديو تجريبي</p>
                            <p style="font-size: 12px; color: #ffd700;">${escapeHtml(reel.title)}</p>
                        </div>`
                    }
                    <div class="video-info">
                        <h3 style="color: #ffd700; margin-bottom: 8px;">${escapeHtml(reel.title)}</h3>
                        <p><i class="fas fa-user"></i> ${escapeHtml(reel.publisher)}</p>
                        <p><i class="fas fa-eye"></i> ${reel.views} مشاهدة</p>
                        <p style="font-size: 11px; font-family: monospace;"><i class="fas fa-fingerprint"></i> ${escapeHtml(reel.serial)}</p>
                    </div>
                    <div class="video-actions">
                        <div class="video-action" onclick="likeReel(${reel.id})">
                            <i class="far fa-heart"></i>
                            <span id="likeCount-${reel.id}">${reel.likes || 0}</span>
                        </div>
                        <div class="video-action" onclick="shareReel('${escapeHtml(reel.title)}')">
                            <i class="fas fa-share-alt"></i>
                            <span>مشاركة</span>
                        </div>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            
            applyFilters();
        }
        
        function likeReel(reelId) {
            const reel = reelsData.find(r => r.id === reelId);
            if (reel) {
                reel.likes = (reel.likes || 0) + 1;
                localStorage.setItem(`reel_likes_${reelId}`, reel.likes);
                localStorage.setItem('nardoo_reels_data', JSON.stringify(reelsData));
                
                const likeSpan = document.getElementById(`likeCount-${reelId}`);
                if (likeSpan) likeSpan.textContent = reel.likes;
                showToast('❤️ تم الإعجاب', 'success');
                applyFilters();
            }
        }
        
        function shareReel(title) {
            if (navigator.share) {
                navigator.share({ title: title, text: 'شاهد هذا الريلز على ناردو برو', url: window.location.href });
            } else {
                navigator.clipboard.writeText(window.location.href);
                showToast('📎 تم نسخ الرابط', 'success');
            }
        }
        
        // ========== وظائف البحث والتصفية ==========
        function searchReels() {
            const input = document.getElementById('searchReelsInput');
            currentSearchQuery = input.value;
            applyFilters();
            if (currentSearchQuery) showToast(`🔍 بحث: "${currentSearchQuery}"`, 'info');
        }
        
        function handleSearchEnter(event) {
            if (event.key === 'Enter') searchReels();
        }
        
        function clearReelsSearch() {
            document.getElementById('searchReelsInput').value = '';
            currentSearchQuery = '';
            applyFilters();
            showToast('🗑️ تم مسح البحث', 'info');
        }
        
        function filterReels(type) {
            currentFilter = type;
            document.querySelectorAll('.filter-chip').forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('data-filter') === type) btn.classList.add('active');
            });
            applyFilters();
            const names = { all: 'الكل', recent: 'الأحدث', oldest: 'الأقدم', mostViewed: 'الأكثر مشاهدة' };
            showToast(`📂 عرض: ${names[type]}`, 'info');
        }
        
        // ========== أدوات مساعدة ==========
        function updateStats(message, isLoading) {
            const stats = document.getElementById('reelsStats');
            if (stats) {
                stats.innerHTML = `<span><i class="fas ${isLoading ? 'fa-spinner fa-spin' : 'fa-chart-line'}"></i> ${message}</span>`;
            }
        }
        
        function formatViews(views) {
            if (!views) return '0';
            if (views >= 1000) return (views / 1000).toFixed(1) + 'K';
            return views.toString();
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = 'toast-message';
            toast.style.background = type === 'success' ? '#10b981' : type === 'error' ? '#ef4444' : '#3b82f6';
            toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle'}"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function openLoginModal() { showToast('سيتم إضافة نظام تسجيل الدخول قريباً', 'info'); }
        function toggleCart() { showToast('سلة التسوق قيد التطوير', 'info'); }
        
        // ========== تهيئة الصفحة ==========
        document.addEventListener('DOMContentLoaded', () => {
            loadUser();
            loadReelsFromTelegram();
            console.log('🎬 ناردو ريلز - نظام بحث وتحميل متكامل');
        });
        
        setInterval(() => { if (!isLoading) loadReelsFromTelegram(); }, 120000);
    </script>
</body>
</html>
