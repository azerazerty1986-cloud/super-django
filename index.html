<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎥 فيديو MP4 مباشر - ناردو برو</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Cairo', Arial, sans-serif;
            background: #0d1117;
            color: white;
            min-height: 100vh;
            padding: 15px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #161b22;
            border-radius: 20px;
            padding: 20px;
            border: 2px solid #ffd700;
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .header h1 {
            color: #ffd700;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .live-badge {
            background: #ff0000;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
            margin: 10px 0;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }
        
        .video-container {
            position: relative;
            margin: 15px 0;
            border-radius: 15px;
            overflow: hidden;
            border: 3px solid #238636;
            background: black;
            min-height: 300px;
        }
        
        video {
            width: 100%;
            height: auto;
            display: block;
            background: #1a1a1a;
        }
        
        .video-overlay {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            color: #ffd700;
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 12px;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        
        button {
            flex: 1;
            min-width: 100px;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            transition: all 0.3s;
        }
        
        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        .btn-success {
            background: #238636;
            color: white;
        }
        
        .btn-danger {
            background: #da3633;
            color: white;
        }
        
        .btn-telegram {
            background: #0088cc;
            color: white;
        }
        
        .btn-video {
            background: #9c27b0;
            color: white;
        }
        
        .stats {
            display: flex;
            justify-content: space-around;
            margin: 15px 0;
            padding: 10px;
            background: #2d333b;
            border-radius: 10px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #ffd700;
        }
        
        .input-group {
            margin: 15px 0;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #ffd700;
        }
        
        input, textarea {
            width: 100%;
            padding: 10px;
            background: #21262d;
            border: 1px solid #2d333b;
            border-radius: 8px;
            color: white;
            font-size: 14px;
        }
        
        .status-box {
            background: #21262d;
            border-radius: 10px;
            padding: 12px;
            margin: 15px 0;
            border-right: 4px solid #ffd700;
        }
        
        .recording-indicator {
            color: #ff0000;
            font-weight: bold;
            margin: 10px 0;
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #2d333b;
            border-radius: 4px;
            margin: 10px 0;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: #ffd700;
            width: 0%;
            transition: width 0.3s;
        }
        
        .footer {
            text-align: center;
            margin-top: 20px;
            color: #6e7681;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fab fa-telegram"></i> فيديو MP4 مباشر</h1>
            <p>الفيديو سيشغل تلقائياً في تليجرام</p>
        </div>

        <!-- حالة التسجيل -->
        <div class="live-badge" id="liveBadge" style="display: none;">
            <i class="fas fa-circle"></i> جاري التسجيل
        </div>

        <!-- فيديو الكاميرا -->
        <div class="video-container">
            <video id="video" autoplay playsinline muted></video>
            <div class="video-overlay" id="videoOverlay">
                <i class="fas fa-camera"></i> الكاميرا متوقفة
            </div>
        </div>

        <!-- أزرار التحكم -->
        <div class="controls">
            <button class="btn-success" onclick="startCamera()" id="startBtn">
                <i class="fas fa-play"></i> تشغيل
            </button>
            <button class="btn-danger" onclick="stopCamera()" id="stopBtn" style="display: none;">
                <i class="fas fa-stop"></i> إيقاف
            </button>
        </div>

        <!-- أزرار التسجيل -->
        <div class="controls" id="recordControls" style="display: none;">
            <button class="btn-video" onclick="startRecording(5)" id="record5Btn">
                <i class="fas fa-circle"></i> 5 ثواني
            </button>
            <button class="btn-video" onclick="startRecording(10)" id="record10Btn">
                <i class="fas fa-circle"></i> 10 ثواني
            </button>
            <button class="btn-telegram" onclick="convertAndSend()" id="sendBtn" disabled>
                <i class="fab fa-telegram"></i> تحويل وإرسال MP4
            </button>
        </div>

        <!-- شريط التقدم -->
        <div class="progress-bar" id="progressBar" style="display: none;">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <!-- مؤشر التسجيل -->
        <div class="recording-indicator" id="recordingIndicator" style="display: none;">
            <i class="fas fa-circle"></i> تسجيل... <span id="countdown">5</span> ثواني
        </div>

        <!-- إحصائيات -->
        <div class="stats">
            <div class="stat-item">
                <div class="stat-value" id="cameraStatus">✗</div>
                <div class="stat-label">الكاميرا</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="recordStatus">0</div>
                <div class="stat-label">تسجيلات</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="sentCount">0</div>
                <div class="stat-label">مرسل MP4</div>
            </div>
        </div>

        <!-- معلومات التاجر -->
        <div class="input-group">
            <label><i class="fab fa-telegram"></i> معرف التاجر</label>
            <input type="text" id="merchantName" value="@nardoo_merchant">
        </div>

        <!-- وصف الفيديو -->
        <div class="input-group">
            <label><i class="fas fa-align-left"></i> وصف الفيديو</label>
            <textarea id="videoDescription" rows="2">عرض منتجات جديدة 😍</textarea>
        </div>

        <!-- جودة الفيديو -->
        <div class="input-group">
            <label><i class="fas fa-sliders-h"></i> جودة الفيديو</label>
            <select id="videoQuality">
                <option value="0.5">منخفضة (حجم صغير)</option>
                <option value="0.8" selected>متوسطة (موصى به)</option>
                <option value="1.0">عالية (حجم كبير)</option>
            </select>
        </div>

        <!-- حالة النظام -->
        <div class="status-box" id="statusBox">
            <span id="statusText">انقر "تشغيل" لبدء الكاميرا</span>
        </div>

        <!-- اختبار البوت -->
        <div class="controls">
            <button class="btn-telegram" onclick="testBot()">
                <i class="fas fa-robot"></i> اختبار البوت
            </button>
        </div>

        <div class="footer">
            <span id="botStatus">⚪ جاري التحقق...</span> | ناردو برو 2026
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/ffmpeg.js@4.2.9003/ffmpeg-worker-webm.js"></script>
    <script>
        // ========== إعدادات تلجرام ==========
        const TELEGRAM = {
            botToken: '8576673096:AAEFKd-YSJcW_0d_wAHZBt-5nPg_VOjDX_0',
            channelId: '-1003822964890'
        };

        // ========== المتغيرات ==========
        let stream = null;
        let cameraActive = false;
        let mediaRecorder = null;
        let recordedChunks = [];
        let isRecording = false;
        let recordingTimeout = null;
        let sentCount = 0;
        
        // عناصر DOM
        const video = document.getElementById('video');
        const statusText = document.getElementById('statusText');
        const liveBadge = document.getElementById('liveBadge');
        const videoOverlay = document.getElementById('videoOverlay');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const recordControls = document.getElementById('recordControls');
        const record5Btn = document.getElementById('record5Btn');
        const record10Btn = document.getElementById('record10Btn');
        const sendBtn = document.getElementById('sendBtn');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const recordingIndicator = document.getElementById('recordingIndicator');
        const countdown = document.getElementById('countdown');
        const cameraStatus = document.getElementById('cameraStatus');
        const recordStatus = document.getElementById('recordStatus');
        const sentCountEl = document.getElementById('sentCount');
        const botStatus = document.getElementById('botStatus');

        // ========== تشغيل الكاميرا ==========
        async function startCamera() {
            try {
                statusText.innerHTML = '🔄 جاري تشغيل الكاميرا...';
                
                stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    },
                    audio: true
                });
                
                video.srcObject = stream;
                cameraActive = true;
                
                videoOverlay.innerHTML = '<i class="fas fa-circle" style="color: #00ff00;"></i> الكاميرا شغالة';
                startBtn.style.display = 'none';
                stopBtn.style.display = 'inline-block';
                recordControls.style.display = 'flex';
                cameraStatus.innerHTML = '✓';
                cameraStatus.style.color = '#00ff00';
                statusText.innerHTML = '✅ الكاميرا شغالة! اختر مدة التسجيل';
                
                setupMediaRecorder();
                
            } catch (err) {
                statusText.innerHTML = '❌ خطأ: ' + err.message;
                cameraStatus.innerHTML = '✗';
            }
        }

        // ========== تجهيز مسجل الفيديو ==========
        function setupMediaRecorder() {
            try {
                mediaRecorder = new MediaRecorder(stream, {
                    mimeType: 'video/webm;codecs=vp8,opus'
                });
            } catch (e) {
                mediaRecorder = new MediaRecorder(stream);
            }
            
            mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0) {
                    recordedChunks.push(event.data);
                }
            };
            
            mediaRecorder.onstop = () => {
                const videoSize = (getVideoSize() / (1024*1024)).toFixed(2);
                statusText.innerHTML = `✅ تم التسجيل! الحجم: ${videoSize} ميجابايت. جاهز للتحويل إلى MP4`;
                sendBtn.disabled = false;
                record5Btn.disabled = false;
                record10Btn.disabled = false;
                liveBadge.style.display = 'none';
                recordingIndicator.style.display = 'none';
                progressBar.style.display = 'none';
                isRecording = false;
                
                const currentRecords = parseInt(recordStatus.innerHTML) || 0;
                recordStatus.innerHTML = currentRecords + 1;
            };
        }

        // ========== حساب حجم الفيديو ==========
        function getVideoSize() {
            const blob = new Blob(recordedChunks, { type: 'video/webm' });
            return blob.size;
        }

        // ========== بدء التسجيل ==========
        function startRecording(seconds) {
            if (!cameraActive || !mediaRecorder) {
                alert('❌ شغل الكاميرا أولاً');
                return;
            }
            
            if (mediaRecorder.state === 'inactive') {
                recordedChunks = [];
                mediaRecorder.start();
                isRecording = true;
                
                liveBadge.style.display = 'inline-block';
                progressBar.style.display = 'block';
                recordingIndicator.style.display = 'block';
                record5Btn.disabled = true;
                record10Btn.disabled = true;
                sendBtn.disabled = true;
                
                statusText.innerHTML = `🎥 جاري تسجيل ${seconds} ثواني...`;
                
                let timeLeft = seconds;
                countdown.innerHTML = timeLeft;
                progressFill.style.width = '0%';
                
                const countdownInterval = setInterval(() => {
                    timeLeft--;
                    countdown.innerHTML = timeLeft;
                    progressFill.style.width = `${((seconds - timeLeft) / seconds) * 100}%`;
                }, 1000);
                
                recordingTimeout = setTimeout(() => {
                    if (mediaRecorder && mediaRecorder.state === 'recording') {
                        mediaRecorder.stop();
                        clearInterval(countdownInterval);
                        progressFill.style.width = '100%';
                    }
                }, seconds * 1000);
            }
        }

        // ========== تحويل WEBM إلى MP4 ==========
        async function convertWebmToMp4(webmBlob) {
            return new Promise((resolve, reject) => {
                statusText.innerHTML = '🔄 جاري تحويل الفيديو إلى MP4...';
                
                const reader = new FileReader();
                reader.readAsArrayBuffer(webmBlob);
                
                reader.onload = function() {
                    try {
                        // تحويل إلى MP4 باستخدام FFmpeg
                        const worker = new Worker('https://cdn.jsdelivr.net/npm/ffmpeg.js@4.2.9003/ffmpeg-worker-webm.js');
                        
                        worker.postMessage({
                            type: 'run',
                            arguments: ['-i', 'input.webm', '-c:v', 'libx264', '-preset', 'fast', '-c:a', 'aac', 'output.mp4'],
                            MEMFS: [{ name: 'input.webm', data: new Uint8Array(reader.result) }]
                        });
                        
                        worker.onmessage = function(e) {
                            if (e.data.type === 'done') {
                                const outputFile = e.data.data.MEMFS[0];
                                const mp4Blob = new Blob([outputFile.data], { type: 'video/mp4' });
                                statusText.innerHTML = '✅ تم التحويل إلى MP4 بنجاح!';
                                resolve(mp4Blob);
                            } else if (e.data.type === 'error') {
                                reject(new Error('فشل التحويل'));
                            }
                        };
                    } catch (error) {
                        // إذا فشل التحويل، نستخدم الفيديو الأصلي
                        console.log('فشل التحويل، استخدام WEBM');
                        resolve(webmBlob);
                    }
                };
            });
        }

        // ========== إرسال الفيديو إلى تليجرام كـ MP4 ==========
        async function convertAndSend() {
            if (recordedChunks.length === 0) {
                alert('❌ لا يوجد فيديو مسجل');
                return;
            }

            const merchant = document.getElementById('merchantName').value;
            const description = document.getElementById('videoDescription').value;
            const quality = document.getElementById('videoQuality').value;

            statusText.innerHTML = '🔄 جاري تجهيز الفيديو...';
            sendBtn.disabled = true;
            
            try {
                // تحويل الفيديو إلى MP4
                const webmBlob = new Blob(recordedChunks, { type: 'video/webm' });
                const mp4Blob = await convertWebmToMp4(webmBlob);
                
                const videoFile = new File([mp4Blob], 'video.mp4', { type: 'video/mp4' });
                
                statusText.innerHTML = '🔄 جاري رفع الفيديو إلى تليجرام...';
                
                const formData = new FormData();
                formData.append('chat_id', TELEGRAM.channelId);
                formData.append('video', videoFile);  // إرسال كفيديو MP4
                
                // عنوان الفيديو
                const caption = `🎥 **فيديو جديد**

👤 **التاجر:** ${merchant}
📝 ${description}
⏰ ${new Date().toLocaleString('ar-EG')}

#فيديو #ناردو_برو #MP4`;
                
                formData.append('caption', caption);
                
                // أزرار تفاعلية
                const replyMarkup = {
                    inline_keyboard: [
                        [
                            { text: "📱 تواصل مع التاجر", url: `https://t.me/${merchant.replace('@', '')}` },
                            { text: "🛒 طلب المنتج", callback_data: "order" }
                        ]
                    ]
                };
                formData.append('reply_markup', JSON.stringify(replyMarkup));

                // إرسال إلى تليجرام
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/sendVideo`, {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (result.ok) {
                    statusText.innerHTML = '✅ تم إرسال فيديو MP4! سيشغل مباشرة في القناة';
                    sentCount++;
                    sentCountEl.innerHTML = sentCount;
                    recordedChunks = [];
                    sendBtn.disabled = true;
                    
                    alert(`✅ تم الإرسال بنجاح!
                    
📹 الفيديو بصيغة MP4 سيشاهد مباشرة
👤 التاجر: ${merchant}
📝 ${description}`);
                    
                } else {
                    throw new Error(result.description);
                }

            } catch (error) {
                statusText.innerHTML = '❌ فشل الإرسال: ' + error.message;
                sendBtn.disabled = false;
                
                // محاولة إرسال WEBM إذا فشل MP4
                try {
                    statusText.innerHTML = '🔄 محاولة إرسال WEBM...';
                    const webmBlob = new Blob(recordedChunks, { type: 'video/webm' });
                    const webmFile = new File([webmBlob], 'video.webm', { type: 'video/webm' });
                    
                    const formData = new FormData();
                    formData.append('chat_id', TELEGRAM.channelId);
                    formData.append('video', webmFile);
                    formData.append('caption', `🎥 فيديو (WEBM) - ${merchant}`);
                    
                    const response = await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/sendVideo`, {
                        method: 'POST',
                        body: formData
                    });
                    
                    const result = await response.json();
                    if (result.ok) {
                        statusText.innerHTML = '✅ تم الإرسال كـ WEBM (قد لا يشغل تلقائياً)';
                        sentCount++;
                        sentCountEl.innerHTML = sentCount;
                    }
                } catch (e) {
                    console.log('فشل الإرسال كـ WEBM');
                }
            }
        }

        // ========== إيقاف الكاميرا ==========
        function stopCamera() {
            if (stream) {
                if (isRecording) {
                    clearTimeout(recordingTimeout);
                    if (mediaRecorder && mediaRecorder.state === 'recording') {
                        mediaRecorder.stop();
                    }
                }
                
                stream.getTracks().forEach(track => track.stop());
                video.srcObject = null;
                stream = null;
                cameraActive = false;
                
                videoOverlay.innerHTML = '<i class="fas fa-camera"></i> الكاميرا متوقفة';
                startBtn.style.display = 'inline-block';
                stopBtn.style.display = 'none';
                recordControls.style.display = 'none';
                liveBadge.style.display = 'none';
                recordingIndicator.style.display = 'none';
                progressBar.style.display = 'none';
                cameraStatus.innerHTML = '✗';
                statusText.innerHTML = '⏹️ الكاميرا متوقفة';
            }
        }

        // ========== اختبار البوت ==========
        async function testBot() {
            try {
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/getMe`);
                const data = await response.json();
                
                if (data.ok) {
                    botStatus.innerHTML = '✅ البوت متصل';
                    statusText.innerHTML = '✅ البوت يعمل! الفيديوهات سترسل كـ MP4';
                    
                    await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: TELEGRAM.channelId,
                            text: `✅ **نظام فيديو MP4 جاهز**\n📅 ${new Date().toLocaleString('ar-EG')}\n🎥 الفيديوهات ستعمل مباشرة`,
                            parse_mode: 'Markdown'
                        })
                    });
                } else {
                    botStatus.innerHTML = '❌ البوت غير متصل';
                }
            } catch (error) {
                botStatus.innerHTML = '❌ خطأ في الاتصال';
            }
        }

        // التهيئة
        window.onload = function() {
            testBot();
        };
    </script>
</body>
</html>
