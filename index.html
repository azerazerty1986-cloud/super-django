<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بث تاجر تليجرام - ناردو برو</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Cairo', Arial, sans-serif;
            background: linear-gradient(135deg, #0d1117 0%, #1a1f2b 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }
        
        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(22, 27, 34, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 25px;
            border: 2px solid #ffd700;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            animation: slideUp 0.5s ease;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .header {
            text-align: center;
            margin-bottom: 25px;
        }
        
        .header h1 {
            color: #ffd700;
            font-size: 28px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .header p {
            color: #8b949e;
            font-size: 14px;
        }
        
        .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #ff0000;
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: bold;
            margin: 10px 0;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
            100% { opacity: 1; transform: scale(1); }
        }
        
        .video-container {
            position: relative;
            margin: 20px 0;
            border-radius: 20px;
            overflow: hidden;
            border: 3px solid #238636;
            background: black;
        }
        
        video {
            width: 100%;
            height: auto;
            display: block;
            transform: scaleX(-1); /* مرآة للتصحيح */
        }
        
        .video-overlay {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0,0,0,0.7);
            color: #ffd700;
            padding: 5px 15px;
            border-radius: 25px;
            font-size: 14px;
            border: 1px solid #ffd700;
        }
        
        .controls {
            display: flex;
            gap: 12px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        
        button {
            flex: 1;
            min-width: 120px;
            padding: 14px 10px;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s ease;
            font-family: 'Cairo', Arial, sans-serif;
        }
        
        button:active {
            transform: scale(0.95);
        }
        
        .btn-success {
            background: #238636;
            color: white;
        }
        
        .btn-success:hover {
            background: #2ea043;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(35,134,54,0.4);
        }
        
        .btn-danger {
            background: #da3633;
            color: white;
        }
        
        .btn-danger:hover {
            background: #f85149;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(218,54,51,0.4);
        }
        
        .btn-telegram {
            background: #0088cc;
            color: white;
        }
        
        .btn-telegram:hover {
            background: #006699;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,136,204,0.4);
        }
        
        .input-group {
            margin: 20px 0;
            text-align: right;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #ffd700;
            font-weight: 600;
            font-size: 15px;
        }
        
        input, textarea {
            width: 100%;
            padding: 14px 15px;
            background: #21262d;
            border: 2px solid #2d333b;
            border-radius: 15px;
            color: white;
            font-size: 15px;
            transition: all 0.3s;
            font-family: 'Cairo', Arial, sans-serif;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: #ffd700;
            background: #2d333b;
        }
        
        input::placeholder, textarea::placeholder {
            color: #6e7681;
        }
        
        .status-box {
            background: #21262d;
            border-radius: 15px;
            padding: 15px;
            margin: 20px 0;
            border-right: 5px solid #ffd700;
            font-size: 15px;
            min-height: 60px;
        }
        
        .status-box i {
            margin-left: 8px;
        }
        
        .stats {
            display: flex;
            justify-content: space-around;
            margin: 15px 0;
            padding: 10px;
            background: #2d333b;
            border-radius: 15px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #ffd700;
        }
        
        .stat-label {
            font-size: 12px;
            color: #8b949e;
        }
        
        .footer {
            text-align: center;
            margin-top: 20px;
            color: #6e7681;
            font-size: 12px;
        }
        
        .footer a {
            color: #ffd700;
            text-decoration: none;
        }
        
        .online-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #4caf50;
            border-radius: 50%;
            margin-right: 5px;
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>

        <div class="input-group">

            <textarea id="streamDescription" rows="2" placeholder="اكتب وصف للبث...">🔴 بث مباشر: عرض تشكيلة جديدة من المنتجات</textarea>
        </div>

        <div class="input-group">
            <label>
                <i class="fas fa-link"></i>
                رابط المنتج (اختياري)

            <input type="text" id="productUrl" placeholder="https://t.me/nardoo_channel/123">

        <!-- حالة الإرسال -->
        <div class="status-box" id="statusBox">

            <span id="statusText">البث متوقف. شغل الكاميرا للبدء</span>
        </div>

        <!-- الفوتر -->
        <div class="footer">

        </div>
    </div>
