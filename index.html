<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📹 بث مباشر - ناردو برو</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Cairo', Arial, sans-serif;
            background: #0d1117;
            color: white;
            min-height: 100vh;
            padding: 15px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #161b22;
            border-radius: 20px;
            padding: 20px;
            border: 2px solid #ffd700;
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .header h1 {
            color: #ffd700;
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .header p {
            color: #8b949e;
            font-size: 14px;
        }
        
        .video-container {
            position: relative;
            margin: 15px 0;
            border-radius: 15px;
            overflow: hidden;
            border: 3px solid #238636;
            background: black;
            min-height: 300px;
        }
        
        video {
            width: 100%;
            height: auto;
            display: block;
            background: #1a1a1a;
        }
        
        .video-overlay {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            color: #ffd700;
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 12px;
            z-index: 5;
        }
        
        /* طبقة العد التنازلي - تظهر فوق الفيديو */
        .countdown-layer {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(4px);
        }
        
        .countdown-circle {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: rgba(255, 215, 0, 0.15);
            border: 4px solid #ffd700;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.3);
            animation: pulse-circle 1s ease-in-out infinite;
        }
        
        @keyframes pulse-circle {
            0% { transform: scale(1); box-shadow: 0 0 30px rgba(255, 215, 0, 0.3); }
            50% { transform: scale(1.05); box-shadow: 0 0 60px rgba(255, 215, 0, 0.6); }
            100% { transform: scale(1); box-shadow: 0 0 30px rgba(255, 215, 0, 0.3); }
        }
        
        .countdown-number {
            font-size: 120px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
            line-height: 1;
            font-family: 'Arial Black', sans-serif;
        }
        
        .countdown-label {
            font-size: 28px;
            color: white;
            font-weight: bold;
            margin-top: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        
        .countdown-hint {
            font-size: 16px;
            color: #ffd700;
            margin-top: 15px;
            background: rgba(0,0,0,0.5);
            padding: 8px 20px;
            border-radius: 50px;
            border: 1px solid #ffd700;
        }
        
        /* تأثير تغيير الأرقام */
        .countdown-number.exit {
            animation: exitNumber 0.5s ease-out forwards;
        }
        
        @keyframes exitNumber {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        
        .controls {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        
        button {
            flex: 1;
            min-width: 120px;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s;
        }
        
        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn-success {
            background: #238636;
            color: white;
        }
        
        .btn-danger {
            background: #da3633;
            color: white;
        }
        
        .btn-telegram {
            background: #0088cc;
            color: white;
        }
        
        .btn-video {
            background: #9c27b0;
            color: white;
        }
        
        .stats {
            display: flex;
            justify-content: space-around;
            margin: 15px 0;
            padding: 10px;
            background: #2d333b;
            border-radius: 10px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #ffd700;
        }
        
        .input-group {
            margin: 15px 0;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #ffd700;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 12px;
            background: #21262d;
            border: 1px solid #2d333b;
            border-radius: 8px;
            color: white;
            font-size: 14px;
        }
        
        .status-box {
            background: #21262d;
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
            border-right: 4px solid #ffd700;
        }
        
        .recording-indicator {
            color: #ff0000;
            font-weight: bold;
            margin: 10px 0;
            animation: blink 1s infinite;
            font-size: 18px;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        .timer-display {
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
            text-align: center;
            margin: 10px 0;
            font-family: monospace;
        }
        
        .footer {
            text-align: center;
            margin-top: 20px;
            color: #6e7681;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fab fa-telegram"></i> بث مباشر</h1>
            <p>عد تنازلي 5 ثواني ثم يبدأ البث</p>
        </div>

        <!-- مؤشر التسجيل -->
        <div class="recording-indicator" id="recordingIndicator" style="display: none;">
            <i class="fas fa-circle"></i> جاري البث المباشر... <span id="liveTime">00:00</span>
        </div>

        <!-- طبقة العد التنازلي - مخفية في البداية -->
        <div id="countdownLayer" class="countdown-layer" style="display: none;">
            <div class="countdown-circle">
                <div class="countdown-number" id="countdownNumber">5</div>
            </div>
            <div class="countdown-label">إستعد للبث</div>
            <div class="countdown-hint" id="countdownHint">إبتسم، أنت على الهواء قريباً ✨</div>
        </div>

        <!-- فيديو الكاميرا -->
        <div class="video-container">
            <video id="video" autoplay playsinline muted></video>
            <div class="video-overlay" id="videoOverlay">
                <i class="fas fa-camera"></i> الكاميرا متوقفة
            </div>
        </div>

        <!-- أزرار التحكم -->
        <div class="controls">
            <button class="btn-success" onclick="startCamera()" id="startBtn">
                <i class="fas fa-play"></i> تشغيل الكاميرا
            </button>
            <button class="btn-danger" onclick="stopCamera()" id="stopBtn" style="display: none;">
                <i class="fas fa-stop"></i> إيقاف
            </button>
        </div>

        <!-- أزرار البث والإرسال -->
        <div class="controls" id="recordControls" style="display: none;">
            <button class="btn-video" onclick="startCountdown()" id="recordBtn">
                <i class="fas fa-circle"></i> بدء البث المباشر
            </button>
            <button class="btn-danger" onclick="stopRecording()" id="stopRecordBtn" style="display: none;">
                <i class="fas fa-square"></i> إنهاء البث
            </button>
            <button class="btn-telegram" onclick="sendVideo()" id="sendBtn" disabled>
                <i class="fab fa-telegram"></i> إرسال الفيديو
            </button>
        </div>

        <!-- إحصائيات -->
        <div class="stats">
            <div class="stat-item">
                <div class="stat-value" id="cameraStatus">✗</div>
                <div class="stat-label">الكاميرا</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="recordTime">00:00</div>
                <div class="stat-label">مدة البث</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="videoSize">0</div>
                <div class="stat-label">حجم الفيديو</div>
            </div>
        </div>

        <!-- اختيار الجودة -->
        <div class="input-group">
            <label><i class="fas fa-video"></i> جودة البث</label>
            <select id="qualitySelect">
                <option value="480">480p</option>
                <option value="720" selected>720p HD</option>
                <option value="1080">1080p Full HD</option>
            </select>
        </div>

        <!-- معلومات التاجر -->
        <div class="input-group">
            <label><i class="fab fa-telegram"></i> معرف التاجر</label>
            <input type="text" id="merchantName" value="@nardoo_merchant">
        </div>

        <!-- وصف البث -->
        <div class="input-group">
            <label><i class="fas fa-align-left"></i> وصف البث</label>
            <textarea id="videoDescription" rows="2">🔴 بث مباشر - منتجات حصرية</textarea>
        </div>

        <!-- رابط المنتج -->
        <div class="input-group">
            <label><i class="fas fa-link"></i> رابط المنتج</label>
            <input type="text" id="productLink" value="https://t.me/nardoo_channel/123">
        </div>

        <!-- حالة النظام -->
        <div class="status-box" id="statusBox">
            <span id="statusText">انقر "تشغيل الكاميرا" للبدء</span>
        </div>

        <!-- اختبار البوت -->
        <div class="controls">
            <button class="btn-telegram" onclick="testBot()">
                <i class="fas fa-robot"></i> اختبار البوت
            </button>
        </div>

        <div class="footer">
            <span id="botStatus">⚪ جاري التحقق...</span> | بث مباشر - ناردو برو 2026
        </div>
    </div>

    <script>
        // ========== إعدادات تلجرام ==========
        const TELEGRAM = {
            botToken: '8576673096:AAEFKd-YSJcW_0d_wAHZBt-5nPg_VOjDX_0',
            channelId: '-1003822964890'
        };

        // ========== إعدادات الجودة ==========
        const QUALITY = {
            '480': { width: 854, height: 480 },
            '720': { width: 1280, height: 720 },
            '1080': { width: 1920, height: 1080 }
        };

        // ========== المتغيرات ==========
        let stream = null;
        let cameraActive = false;
        let mediaRecorder = null;
        let recordedChunks = [];
        let isRecording = false;
        let recordSeconds = 0;
        let timerInterval = null;
        let countdownInterval = null;
        
        // عناصر DOM
        const video = document.getElementById('video');
        const statusText = document.getElementById('statusText');
        const videoOverlay = document.getElementById('videoOverlay');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const recordControls = document.getElementById('recordControls');
        const recordBtn = document.getElementById('recordBtn');
        const stopRecordBtn = document.getElementById('stopRecordBtn');
        const sendBtn = document.getElementById('sendBtn');
        const recordingIndicator = document.getElementById('recordingIndicator');
        const liveTime = document.getElementById('liveTime');
        const countdownLayer = document.getElementById('countdownLayer');
        const countdownNumber = document.getElementById('countdownNumber');
        const countdownHint = document.getElementById('countdownHint');
        const cameraStatus = document.getElementById('cameraStatus');
        const recordTime = document.getElementById('recordTime');
        const videoSize = document.getElementById('videoSize');
        const botStatus = document.getElementById('botStatus');

        // أصوات العد التنازلي (اختياري - يمكن تفعيلها إذا أردت)
        // const beepSound = new Audio('data:audio/wav;base64,//uQRAAAAWMSLwUIYAAsYkXgoQwAEaYLWfkWgAI0wWs/ItAAAGDgYtAgAyN+QWaAAihwMWm4G8QQR33McQQYH3t/EoIYtAgA+lM4UIZgwEk4K7yGfKyQwCsbXy4/wA==');

        // ========== تشغيل الكاميرا ==========
        async function startCamera() {
            try {
                statusText.innerHTML = '🔄 جاري تشغيل الكاميرا...';
                
                const quality = document.getElementById('qualitySelect').value;
                const settings = QUALITY[quality];
                
                stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        width: { ideal: settings.width },
                        height: { ideal: settings.height }
                    },
                    audio: true
                });
                
                video.srcObject = stream;
                cameraActive = true;
                
                // تحديث الواجهة
                videoOverlay.innerHTML = `<i class="fas fa-circle" style="color: #00ff00;"></i> ${quality}p - جاهز`;
                startBtn.style.display = 'none';
                stopBtn.style.display = 'inline-block';
                recordControls.style.display = 'flex';
                cameraStatus.innerHTML = '✓';
                cameraStatus.style.color = '#00ff00';
                statusText.innerHTML = '✅ الكاميرا جاهزة! اضغط "بدء البث المباشر"';
                
                // تجهيز مسجل الفيديو
                setupMediaRecorder();
                
            } catch (err) {
                statusText.innerHTML = '❌ خطأ: ' + err.message;
                cameraStatus.innerHTML = '✗';
            }
        }

        // ========== تجهيز مسجل الفيديو ==========
        function setupMediaRecorder() {
            try {
                mediaRecorder = new MediaRecorder(stream, {
                    mimeType: 'video/webm;codecs=vp8,opus'
                });
            } catch (e) {
                mediaRecorder = new MediaRecorder(stream);
            }
            
            mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0) {
                    recordedChunks.push(event.data);
                    updateVideoSize();
                }
            };
            
            mediaRecorder.onstop = () => {
                isRecording = false;
                clearInterval(timerInterval);
                
                recordBtn.style.display = 'inline-block';
                stopRecordBtn.style.display = 'none';
                recordingIndicator.style.display = 'none';
                sendBtn.disabled = false;
                
                statusText.innerHTML = '✅ تم البث! اضغط إرسال';
            };
        }

        // ========== بدء العد التنازلي ==========
        function startCountdown() {
            if (!cameraActive || !mediaRecorder) {
                alert('❌ شغل الكاميرا أولاً');
                return;
            }
            
            // تعطيل زر البث أثناء العد التنازلي
            recordBtn.disabled = true;
            
            // إظهار طبقة العد التنازلي
            countdownLayer.style.display = 'flex';
            
            let count = 5;
            countdownNumber.textContent = count;
            countdownHint.textContent = 'إستعد... البث سيبدأ بعد 5 ثواني';
            
            // تغيير نص التراكب
            videoOverlay.innerHTML = `<i class="fas fa-hourglass-half"></i> العد التنازلي... ${count}`;
            
            countdownInterval = setInterval(() => {
                count--;
                countdownNumber.textContent = count;
                
                // تحديث نص التراكب
                videoOverlay.innerHTML = `<i class="fas fa-hourglass-half"></i> العد التنازلي... ${count}`;
                
                // تغيير لون الرقم في آخر ثانية
                if (count === 1) {
                    countdownNumber.style.color = '#ff4444';
                    countdownHint.textContent = 'إبتسم... آخر ثانية! 📸';
                } else if (count === 2) {
                    countdownHint.textContent = 'جهز نفسك...';
                } else if (count === 3) {
                    countdownHint.textContent = 'إستعد...';
                }
                
                // صوت تنبيه (اختياري - يمكن إضافة صوت إذا أردت)
                // beepSound.play();
                
                if (count === 0) {
                    clearInterval(countdownInterval);
                    
                    // إخفاء العد التنازلي
                    countdownLayer.style.display = 'none';
                    recordBtn.disabled = false;
                    countdownNumber.style.color = '#ffd700'; // إعادة اللون الأصلي
                    
                    // بدء التسجيل الفعلي
                    startRecording();
                }
            }, 1000);
        }

        // ========== بدء التسجيل المباشر ==========
        function startRecording() {
            recordedChunks = [];
            mediaRecorder.start();
            isRecording = true;
            recordSeconds = 0;
            
            // تحديث الواجهة
            recordBtn.style.display = 'none';
            stopRecordBtn.style.display = 'inline-block';
            recordingIndicator.style.display = 'block';
            sendBtn.disabled = true;
            
            videoOverlay.innerHTML = `<i class="fas fa-circle" style="color: #ff0000;"></i> 🔴 بث مباشر`;
            
            // عداد الوقت المباشر
            timerInterval = setInterval(() => {
                recordSeconds++;
                const minutes = Math.floor(recordSeconds / 60);
                const seconds = recordSeconds % 60;
                const timeString = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                recordTime.textContent = timeString;
                liveTime.textContent = timeString;
            }, 1000);
            
            statusText.innerHTML = '🔴 جاري البث المباشر... اضغط "إنهاء البث" عندما تنتهي';
        }

        // ========== إنهاء البث ==========
        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
                videoOverlay.innerHTML = `<i class="fas fa-circle" style="color: #00ff00;"></i> تم إنهاء البث`;
                
                // إلغاء أي عد تنازلي إذا كان نشطاً
                if (countdownInterval) {
                    clearInterval(countdownInterval);
                    countdownLayer.style.display = 'none';
                    recordBtn.disabled = false;
                    countdownNumber.style.color = '#ffd700';
                }
            }
        }

        // ========== تحديث حجم الفيديو ==========
        function updateVideoSize() {
            const blob = new Blob(recordedChunks, { type: 'video/webm' });
            const sizeMB = (blob.size / (1024 * 1024)).toFixed(2);
            videoSize.textContent = sizeMB + ' MB';
        }

        // ========== إرسال الفيديو إلى تليجرام ==========
        async function sendVideo() {
            if (recordedChunks.length === 0) {
                alert('❌ لا يوجد فيديو مسجل');
                return;
            }

            const merchant = document.getElementById('merchantName').value;
            const description = document.getElementById('videoDescription').value;
            const productLink = document.getElementById('productLink').value;
            const quality = document.getElementById('qualitySelect').value;

            statusText.innerHTML = '🔄 جاري رفع البث إلى تليجرام...';
            sendBtn.disabled = true;
            
            try {
                const videoBlob = new Blob(recordedChunks, { type: 'video/webm' });
                const videoFile = new File([videoBlob], 'live_broadcast.mp4', { type: 'video/mp4' });
                
                const formData = new FormData();
                formData.append('chat_id', TELEGRAM.channelId);
                formData.append('video', videoFile);
                
                const minutes = Math.floor(recordSeconds / 60);
                const seconds = recordSeconds % 60;
                
                const caption = `🔴 **بث مباشر**

👤 **التاجر:** ${merchant}
📝 ${description}
⏱️ المدة: ${minutes}:${seconds.toString().padStart(2, '0')}
🎥 الجودة: ${quality}p
📦 الحجم: ${videoSize.textContent}

🔗 رابط المنتج: ${productLink}

#بث_مباشر #ناردو_برو`;

                formData.append('caption', caption);
                
                // أزرار تفاعلية
                const replyMarkup = {
                    inline_keyboard: [
                        [
                            { text: "📱 تواصل مع التاجر", url: `https://t.me/${merchant.replace('@', '')}` },
                            { text: "🛒 طلب المنتج", callback_data: "order" }
                        ]
                    ]
                };
                formData.append('reply_markup', JSON.stringify(replyMarkup));

                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/sendVideo`, {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (result.ok) {
                    statusText.innerHTML = '✅ تم إرسال البث المباشر بنجاح إلى القناة!';
                    
                    alert(`✅ تم الإرسال بنجاح!\n\n📹 البث المباشر وصل للقناة\n⏱️ المدة: ${minutes}:${seconds.toString().padStart(2, '0')}\n📦 الحجم: ${videoSize.textContent}`);
                    
                    // تنظيف
                    recordedChunks = [];
                    videoSize.textContent = '0';
                    sendBtn.disabled = true;
                    
                } else {
                    throw new Error(result.description);
                }

            } catch (error) {
                statusText.innerHTML = '❌ فشل الإرسال: ' + error.message;
                sendBtn.disabled = false;
            }
        }

        // ========== إيقاف الكاميرا ==========
        function stopCamera() {
            if (stream) {
                if (isRecording) {
                    stopRecording();
                }
                
                // إلغاء أي عد تنازلي
                if (countdownInterval) {
                    clearInterval(countdownInterval);
                    countdownLayer.style.display = 'none';
                    recordBtn.disabled = false;
                }
                
                stream.getTracks().forEach(track => track.stop());
                video.srcObject = null;
                stream = null;
                cameraActive = false;
                
                videoOverlay.innerHTML = '<i class="fas fa-camera"></i> الكاميرا متوقفة';
                startBtn.style.display = 'inline-block';
                stopBtn.style.display = 'none';
                recordControls.style.display = 'none';
                recordingIndicator.style.display = 'none';
                cameraStatus.innerHTML = '✗';
                recordTime.textContent = '00:00';
                statusText.innerHTML = '⏹️ الكاميرا متوقفة';
            }
        }

        // ========== اختبار البوت ==========
        async function testBot() {
            try {
                botStatus.innerHTML = '🔄 جاري الاتصال...';
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/getMe`);
                const data = await response.json();
                
                if (data.ok) {
                    botStatus.innerHTML = '✅ البوت متصل - جاهز للإرسال';
                    statusText.innerHTML = '✅ البوت يعمل! شغل الكاميرا وسجل';
                    
                    await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: TELEGRAM.channelId,
                            text: `✅ **نظام البث المباشر جاهز**\n📹 عد تنازلي 5 ثواني ثم يبدأ البث`,
                            parse_mode: 'Markdown'
                        })
                    });
                } else {
                    botStatus.innerHTML = '❌ البوت غير متصل';
                }
            } catch (error) {
                botStatus.innerHTML = '❌ خطأ في الاتصال';
            }
        }

        // التهيئة
        window.onload = function() {
            testBot();
        };
    </script>
</body>
</html>
