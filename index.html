<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📹 نظام الإطارات + ألبومات تيليجرام - @nardoo_merchant</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }
        
        body {
            background: #0a0c10;
            color: white;
            min-height: 100vh;
            padding: 16px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        /* الهيدر */
        .header {
            background: linear-gradient(135deg, #161b22, #1f2630);
            border-radius: 30px;
            padding: 20px;
            margin-bottom: 20px;
            border: 3px solid #ffd700;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .header h1 {
            color: #ffd700;
            font-size: 32px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .merchant-badge {
            background: #0088cc;
            color: white;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: bold;
            border: 2px solid #ffd700;
        }
        
        /* بطاقة التاجر */
        .merchant-card {
            background: #161b22;
            border-radius: 25px;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px solid #ffd700;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .merchant-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: #ffd700;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            font-weight: bold;
            color: black;
        }
        
        .merchant-info {
            flex: 1;
        }
        
        .merchant-name {
            color: #ffd700;
            font-size: 24px;
            font-weight: bold;
        }
        
        .merchant-id {
            color: #8b949e;
            background: #1f2630;
            padding: 5px 15px;
            border-radius: 25px;
            display: inline-block;
            border: 1px solid #ffd700;
        }
        
        /* إحصائيات الإطارات */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stat-box {
            background: #1f2630;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            border: 2px solid #ffd700;
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #ffd700;
        }
        
        .stat-label {
            color: #8b949e;
            font-size: 13px;
        }
        
        /* شاشتين جنب بعض */
        .dual-screen {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .screen-card {
            background: #161b22;
            border-radius: 25px;
            overflow: hidden;
            border: 3px solid;
        }
        
        .live-card {
            border-color: #ff0000;
        }
        
        .frame-card {
            border-color: #ffd700;
        }
        
        .screen-header {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .live-header {
            background: #2d1a1a;
            color: #ff0000;
        }
        
        .frame-header {
            background: #1f2630;
            color: #ffd700;
        }
        
        .video-container {
            position: relative;
            background: black;
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .video-container video {
            width: 100%;
            max-height: 450px;
            object-fit: cover;
        }
        
        canvas {
            width: 100%;
            max-width: 400px;
            height: auto;
            border-radius: 20px;
            border: 3px solid #ffd700;
            box-shadow: 0 0 30px rgba(255,215,0,0.5);
        }
        
        .video-overlay {
            position: absolute;
            bottom: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
        }
        
        .badge {
            background: rgba(0,0,0,0.8);
            color: #ffd700;
            padding: 5px 15px;
            border-radius: 25px;
            font-size: 13px;
            border: 1px solid #ffd700;
            backdrop-filter: blur(5px);
        }
        
        /* لوحة التحكم */
        .control-panel {
            background: #161b22;
            border-radius: 25px;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px solid #ffd700;
        }
        
        .button-group {
            display: flex;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }
        
        .btn-primary { background: #0088cc; color: white; }
        .btn-success { background: #238636; color: white; }
        .btn-live { background: #ff0000; color: white; }
        .btn-frame { background: #ffd700; color: black; }
        
        .btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.2);
        }
        
        .settings-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        
        .setting-item {
            background: #1f2630;
            padding: 12px;
            border-radius: 12px;
        }
        
        .setting-item label {
            display: block;
            color: #ffd700;
            margin-bottom: 5px;
        }
        
        .setting-item select,
        .setting-item input {
            width: 100%;
            padding: 8px;
            background: #2d333b;
            border: 1px solid #444;
            border-radius: 8px;
            color: white;
        }
        
        /* قائمة الإطارات */
        .frames-list {
            background: #161b22;
            border-radius: 20px;
            padding: 15px;
            margin-top: 20px;
            border: 2px solid #0088cc;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .frame-item {
            background: #1f2630;
            border-radius: 10px;
            padding: 8px 12px;
            margin: 5px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #2d333b;
        }
        
        .frame-time {
            color: #ffd700;
            font-family: monospace;
        }
        
        /* شريط الحالة */
        .status-bar {
            background: #1f2630;
            border-radius: 15px;
            padding: 12px 20px;
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            border: 1px solid #ffd700;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- الهيدر -->
        <div class="header">
            <h1>
                <i class="fas fa-images"></i>
                نظام الإطارات + ألبومات تيليجرام
            </h1>
            <div class="merchant-badge">
                <i class="fas fa-store"></i> @nardoo_merchant
            </div>
        </div>

        <!-- بطاقة التاجر -->
        <div class="merchant-card">
            <div class="merchant-avatar">ن</div>
            <div class="merchant-info">
                <div class="merchant-name">تاجر ناردو</div>
                <div class="merchant-id">@nardoo_merchant</div>
            </div>
        </div>

        <!-- إحصائيات الإطارات -->
        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-value" id="fps">30</div>
                <div class="stat-label">إطار/ثانية</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="delay">33</div>
                <div class="stat-label">تأخير (ms)</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="bufferSize">0</div>
                <div class="stat-label">إطارات محلية</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="sentFrames">0</div>
                <div class="stat-label">إطارات مرسلة</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="albumsCount">0</div>
                <div class="stat-label">ألبومات</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="quality">70</div>
                <div class="stat-label">جودة %</div>
            </div>
        </div>

        <!-- شاشتين جنب بعض -->
        <div class="dual-screen">
            <!-- البث المباشر -->
            <div class="screen-card live-card">
                <div class="screen-header live-header">
                    <span><i class="fas fa-circle"></i> البث المباشر</span>
                    <span class="badge" id="liveIndicator">⏺️ متوقف</span>
                </div>
                <div class="video-container">
                    <video id="liveVideo" autoplay playsinline muted></video>
                </div>
            </div>

            <!-- محاكاة الإطارات -->
            <div class="screen-card frame-card">
                <div class="screen-header frame-header">
                    <span><i class="fas fa-images"></i> محاكاة الإطارات</span>
                    <span class="badge" id="simulateIndicator">⏳ 33ms</span>
                </div>
                <div class="video-container">
                    <canvas id="frameCanvas" width="400" height="400"></canvas>
                    <div class="video-overlay">
                        <span class="badge" id="frameCounter">0</span>
                        <span class="badge" id="frameTime">--:--:--</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- لوحة التحكم -->
        <div class="control-panel">
            <div class="button-group">
                <button class="btn btn-primary" onclick="startCamera()">
                    <i class="fas fa-camera"></i> تشغيل الكاميرا
                </button>
                <button class="btn btn-success" onclick="startFrameCapture()">
                    <i class="fas fa-play"></i> بدء التقاط الإطارات
                </button>
                <button class="btn btn-live" onclick="stopFrameCapture()">
                    <i class="fas fa-stop"></i> إيقاف الالتقاط
                </button>
                <button class="btn btn-frame" onclick="sendFrameAlbum()">
                    <i class="fas fa-layer-group"></i> إرسال ألبوم إطارات
                </button>
                <button class="btn btn-frame" onclick="fetchFrameAlbums()">
                    <i class="fas fa-download"></i> جلب ألبومات الإطارات
                </button>
                <button class="btn btn-frame" onclick="startFrameSimulation()">
                    <i class="fas fa-play"></i> بدء محاكاة الإطارات
                </button>
            </div>

            <!-- الإعدادات -->
            <div class="settings-row">
                <div class="setting-item">
                    <label><i class="fas fa-gauge"></i> جودة الإطارات</label>
                    <input type="range" id="qualitySlider" min="10" max="100" value="70" onchange="updateQuality()">
                </div>
                <div class="setting-item">
                    <label><i class="fas fa-clock"></i> سرعة الالتقاط</label>
                    <select id="captureSpeed" onchange="updateCaptureSpeed()">
                        <option value="33">30 FPS (33ms)</option>
                        <option value="50">20 FPS (50ms)</option>
                        <option value="100">10 FPS (100ms)</option>
                        <option value="200">5 FPS (200ms)</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label><i class="fas fa-layer-group"></i> حجم الألبوم</label>
                    <select id="albumSize">
                        <option value="5">5 إطارات</option>
                        <option value="10" selected>10 إطارات</option>
                        <option value="15">15 إطار</option>
                        <option value="20">20 إطار</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label><i class="fas fa-fingerprint"></i> بصمة</label>
                    <select id="fingerprintOption">
                        <option value="yes" selected>مفعلة</option>
                        <option value="no">غير مفعلة</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- قائمة الإطارات المرسلة -->
        <div class="frames-list" id="framesList">
            <div style="text-align: center; color: #8b949e; padding: 20px;">
                <i class="fas fa-images" style="font-size: 40px; margin-bottom: 10px;"></i>
                <p>لا توجد إطارات بعد - ابدأ بالتقاط الإطارات</p>
            </div>
        </div>

        <!-- شريط الحالة -->
        <div class="status-bar">
            <span id="statusText"><i class="fas fa-circle" style="color: #4caf50;"></i> النظام جاهز</span>
            <span id="systemTime"></span>
        </div>
    </div>

    <script>
        // ========== إعدادات تيليجرام ==========
        const TELEGRAM = {
            botToken: '8576673096:AAEFKd-YSJcW_0d_wAHZBt-5nPg_VOjDX_0',
            channelId: '-1003822964890'
        };
        const MERCHANT_ID = '@nardoo_merchant';

        // ========== متغيرات النظام ==========
        let stream = null;
        let videoElement = document.getElementById('liveVideo');
        let canvas = document.getElementById('frameCanvas');
        let ctx = canvas.getContext('2d');
        
        // مخازن الإطارات
        let frameBuffer = [];           // الإطارات المحلية
        let sentFrames = [];             // الإطارات المرسلة
        let receivedAlbums = [];          // الألبومات المستلمة
        
        let isCapturing = false;
        let isSimulating = false;
        let captureInterval = null;
        let simulationInterval = null;
        
        // الإعدادات
        let currentQuality = 70;
        let currentSpeed = 33; // 33ms = 30 FPS
        let frameCounter = 0;
        let albumCounter = 0;
        
        // عناصر DOM
        const fpsDisplay = document.getElementById('fps');
        const delayDisplay = document.getElementById('delay');
        const bufferSize = document.getElementById('bufferSize');
        const sentFramesSpan = document.getElementById('sentFrames');
        const albumsCountSpan = document.getElementById('albumsCount');
        const qualityDisplay = document.getElementById('quality');
        const liveIndicator = document.getElementById('liveIndicator');
        const simulateIndicator = document.getElementById('simulateIndicator');
        const frameCounterSpan = document.getElementById('frameCounter');
        const frameTimeSpan = document.getElementById('frameTime');
        const statusText = document.getElementById('statusText');
        const framesList = document.getElementById('framesList');
        const systemTime = document.getElementById('systemTime');

        // تحديث الوقت
        setInterval(() => {
            const now = new Date();
            systemTime.textContent = now.toLocaleTimeString('ar-EG');
        }, 1000);

        // تحديث الجودة
        window.updateQuality = function() {
            currentQuality = document.getElementById('qualitySlider').value;
            qualityDisplay.textContent = currentQuality;
        };

        // تحديث سرعة الالتقاط
        window.updateCaptureSpeed = function() {
            currentSpeed = parseInt(document.getElementById('captureSpeed').value);
            delayDisplay.textContent = currentSpeed;
            fpsDisplay.textContent = Math.round(1000 / currentSpeed);
            
            if (isCapturing) {
                stopFrameCapture();
                startFrameCapture();
            }
        };

        // تشغيل الكاميرا
        window.startCamera = async function() {
            try {
                statusText.innerHTML = '🔄 تشغيل الكاميرا...';
                
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        width: { ideal: 400 },
                        height: { ideal: 400 }
                    },
                    audio: false
                });
                
                videoElement.srcObject = stream;
                await videoElement.play();
                
                liveIndicator.innerHTML = '🔴 مباشر';
                statusText.innerHTML = '✅ الكاميرا جاهزة';
                
            } catch (err) {
                statusText.innerHTML = '❌ خطأ: ' + err.message;
            }
        };

        // التقاط إطار
        function captureFrame() {
            if (!stream || !isCapturing) return;
            
            // رسم الإطار على canvas
            ctx.drawImage(videoElement, 0, 0, 400, 400);
            
            // تحويل إلى blob
            canvas.toBlob((blob) => {
                const frame = {
                    id: Date.now() + frameCounter,
                    blob: blob,
                    time: Date.now(),
                    frameNumber: frameCounter++
                };
                
                frameBuffer.push(frame);
                bufferSize.textContent = frameBuffer.length;
                
                // تحديث المعاينة
                updatePreview();
                
            }, 'image/jpeg', currentQuality / 100);
        }

        // تحديث المعاينة
        function updatePreview() {
            if (frameBuffer.length > 0) {
                const lastFrame = frameBuffer[frameBuffer.length - 1];
                const img = new Image();
                img.onload = () => {
                    ctx.drawImage(img, 0, 0, 400, 400);
                };
                img.src = URL.createObjectURL(lastFrame.blob);
                
                frameCounterSpan.textContent = lastFrame.frameNumber;
                const now = new Date();
                frameTimeSpan.innerHTML = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
            }
        }

        // بدء التقاط الإطارات
        window.startFrameCapture = function() {
            if (!stream) {
                alert('شغل الكاميرا أولاً');
                return;
            }
            
            isCapturing = true;
            captureInterval = setInterval(captureFrame, currentSpeed);
            statusText.innerHTML = '📸 التقاط إطارات...';
            simulateIndicator.innerHTML = '⏳ جاري الالتقاط';
        };

        // إيقاف التقاط الإطارات
        window.stopFrameCapture = function() {
            isCapturing = false;
            if (captureInterval) {
                clearInterval(captureInterval);
                captureInterval = null;
            }
            statusText.innerHTML = '⏹️ توقف الالتقاط';
            simulateIndicator.innerHTML = '⏸️ متوقف';
        };

        // إرسال ألبوم إطارات إلى تيليجرام
        window.sendFrameAlbum = async function() {
            if (frameBuffer.length < 5) {
                alert('تحتاج 5 إطارات على الأقل لإرسال ألبوم');
                return;
            }
            
            const albumSize = parseInt(document.getElementById('albumSize').value);
            const framesToSend = frameBuffer.splice(0, Math.min(albumSize, frameBuffer.length));
            
            statusText.innerHTML = `📤 إرسال ألبوم ${framesToSend.length} إطارات...`;
            
            try {
                const now = new Date();
                const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
                
                const useFingerprint = document.getElementById('fingerprintOption').value === 'yes';
                const emoji = useFingerprint ? '🔐' : '📸';
                
                // تحضير media array للألبوم
                const mediaArray = [];
                
                // الإطار الأول يحمل الوصف
                mediaArray.push({
                    type: 'photo',
                    media: 'attach://frame0',
                    caption: `${emoji} ألبوم إطارات من ${MERCHANT_ID}\n⏱️ ${timeStr}\n📦 ${framesToSend.length} إطار\n🎞️ الإطارات: ${framesToSend[0].frameNumber} - ${framesToSend[framesToSend.length-1].frameNumber}`
                });
                
                // باقي الإطارات
                for (let i = 1; i < framesToSend.length; i++) {
                    mediaArray.push({
                        type: 'photo',
                        media: `attach://frame${i}`
                    });
                }
                
                // تحضير FormData
                const formData = new FormData();
                formData.append('chat_id', TELEGRAM.channelId);
                formData.append('media', JSON.stringify(mediaArray));
                
                // إضافة ملفات الإطارات
                framesToSend.forEach((frame, index) => {
                    formData.append(`frame${index}`, frame.blob, `frame_${Date.now()}_${index}.jpg`);
                });
                
                // إرسال الألبوم
                const res = await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/sendMediaGroup`, {
                    method: 'POST',
                    body: formData
                });
                
                const result = await res.json();
                
                if (result.ok) {
                    albumCounter++;
                    albumsCountSpan.textContent = albumCounter;
                    
                    // إضافة للإطارات المرسلة
                    framesToSend.forEach(frame => {
                        sentFrames.push({
                            ...frame,
                            albumId: albumCounter
                        });
                    });
                    
                    sentFramesSpan.textContent = sentFrames.length;
                    bufferSize.textContent = frameBuffer.length;
                    
                    statusText.innerHTML = `✅ تم إرسال الألبوم ${albumCounter}`;
                    
                    // تحديث قائمة الإطارات
                    updateFramesList();
                }
                
            } catch (error) {
                statusText.innerHTML = '❌ فشل الإرسال';
                console.error(error);
            }
        };

        // جلب ألبومات الإطارات من تيليجرام
        window.fetchFrameAlbums = async function() {
            statusText.innerHTML = '🔄 جلب الألبومات...';
            
            try {
                const url = `https://api.telegram.org/bot${TELEGRAM.botToken}/getUpdates?limit=50`;
                const res = await fetch(url);
                const data = await res.json();
                
                if (data.ok) {
                    const albums = data.result
                        .filter(u => u.channel_post?.photo && u.channel_post?.caption?.includes(MERCHANT_ID));
                    
                    for (const album of albums) {
                        // جلب تفاصيل الصور
                        const photos = album.channel_post.photo;
                        const largest = photos[photos.length - 1];
                        
                        const fileRes = await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/getFile?file_id=${largest.file_id}`);
                        const fileData = await fileRes.json();
                        
                        if (fileData.ok) {
                            const url = `https://api.telegram.org/file/bot${TELEGRAM.botToken}/${fileData.result.file_path}`;
                            
                            receivedAlbums.push({
                                caption: album.channel_post.caption,
                                url: url,
                                time: album.channel_post.date
                            });
                        }
                    }
                    
                    statusText.innerHTML = `✅ تم جلب ${receivedAlbums.length} ألبوم`;
                }
                
            } catch (error) {
                statusText.innerHTML = '❌ خطأ في الجلب';
            }
        };

        // بدء محاكاة الإطارات
        window.startFrameSimulation = function() {
            if (receivedAlbums.length === 0 && sentFrames.length === 0) {
                alert('لا توجد إطارات للمحاكاة');
                return;
            }
            
            if (isSimulating) {
                clearInterval(simulationInterval);
            }
            
            let frames = sentFrames.length > 0 ? sentFrames : receivedAlbums;
            let index = 0;
            
            isSimulating = true;
            simulateIndicator.innerHTML = '▶️ محاكاة نشطة';
            
            simulationInterval = setInterval(() => {
                if (frames.length === 0) return;
                
                const frame = frames[index];
                
                if (frame.blob) {
                    // إطار محلي
                    const img = new Image();
                    img.onload = () => {
                        ctx.drawImage(img, 0, 0, 400, 400);
                    };
                    img.src = URL.createObjectURL(frame.blob);
                } else if (frame.url) {
                    // إطار من تيليجرام
                    const img = new Image();
                    img.onload = () => {
                        ctx.drawImage(img, 0, 0, 400, 400);
                    };
                    img.src = frame.url;
                }
                
                frameCounterSpan.textContent = index;
                index = (index + 1) % frames.length;
                
            }, currentSpeed);
            
            statusText.innerHTML = '▶️ محاكاة الإطارات نشطة';
        };

        // تحديث قائمة الإطارات
        function updateFramesList() {
            if (sentFrames.length === 0) {
                framesList.innerHTML = '<div style="text-align: center; color: #8b949e; padding: 20px;">لا توجد إطارات مرسلة</div>';
                return;
            }
            
            let html = '<h4 style="color: #ffd700; margin-bottom: 10px;">آخر الإطارات المرسلة:</h4>';
            
            sentFrames.slice(-10).reverse().forEach(frame => {
                const date = new Date(frame.time);
                html += `
                    <div class="frame-item">
                        <span>إطار #${frame.frameNumber}</span>
                        <span class="frame-time">${date.toLocaleTimeString('ar-EG')}</span>
                    </div>
                `;
            });
            
            framesList.innerHTML = html;
        }

        // تهيئة الصفحة
        window.onload = function() {
            updateQuality();
            updateCaptureSpeed();
        };
    </script>
</body>
</html>
