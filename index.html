<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📹 بث مباشر - ناردو برو</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Cairo', Arial, sans-serif;
            background: #0d1117;
            color: white;
            min-height: 100vh;
            padding: 15px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #161b22;
            border-radius: 20px;
            padding: 20px;
            border: 2px solid #ffd700;
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .header h1 {
            color: #ffd700;
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .header p {
            color: #8b949e;
            font-size: 14px;
        }
        
        .video-container {
            position: relative;
            margin: 15px 0;
            border-radius: 15px;
            overflow: hidden;
            border: 3px solid #ffd700;
            background: black;
            min-height: 400px;
        }
        
        video {
            width: 100%;
            height: auto;
            display: block;
            background: #1a1a1a;
        }
        
        /* للكاميرا الأمامية (عكس الصورة) */
        .front-camera {
            transform: scaleX(-1);
        }
        
        /* للكاميرا الخلفية (طبيعي) */
        .back-camera {
            transform: scaleX(1);
        }
        
        .merchant-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.8);
            color: #ffd700;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: bold;
            z-index: 15;
            border: 2px solid #ffd700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .verified-badge {
            background: #ffd700;
            color: black;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
        }
        
        /* زر تبديل الكاميرا */
        .switch-camera-btn {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 20;
            border: 2px solid #ffd700;
            transition: all 0.3s;
            font-size: 20px;
        }
        
        .switch-camera-btn:hover {
            background: #ffd700;
            color: black;
            transform: rotate(180deg);
        }
        
        .camera-indicator {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: #ffd700;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 15;
            border: 1px solid #ffd700;
        }
        
        .fixed-merchant {
            background: #1a1f2b;
            border: 2px solid #ffd700;
            border-radius: 10px;
            padding: 15px;
            margin: 10px 0;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .merchant-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #ffd700;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: black;
        }
        
        .merchant-info {
            flex: 1;
        }
        
        .merchant-name {
            font-size: 18px;
            font-weight: bold;
            color: #ffd700;
        }
        
        .merchant-id {
            font-size: 14px;
            color: #8b949e;
            direction: ltr;
            text-align: left;
            background: #2d333b;
            padding: 5px 10px;
            border-radius: 20px;
            margin-top: 5px;
            display: inline-block;
        }
        
        .merchant-status {
            display: inline-block;
            background: #4caf50;
            color: white;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 12px;
            margin-right: 10px;
        }
        
        .stats {
            display: flex;
            justify-content: space-around;
            margin: 15px 0;
            padding: 10px;
            background: #2d333b;
            border-radius: 10px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #ffd700;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        
        button {
            flex: 1;
            min-width: 120px;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s;
        }
        
        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        .btn-success {
            background: #238636;
            color: white;
        }
        
        .btn-danger {
            background: #da3633;
            color: white;
        }
        
        .btn-switch {
            background: #2d333b;
            color: white;
            border: 2px solid #ffd700;
        }
        
        .btn-switch:hover {
            background: #ffd700;
            color: black;
        }
        
        .input-group {
            margin: 15px 0;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #ffd700;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 12px;
            background: #21262d;
            border: 1px solid #2d333b;
            border-radius: 8px;
            color: white;
            font-size: 14px;
        }
        
        .footer {
            text-align: center;
            margin-top: 20px;
            color: #6e7681;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-store"></i> بث مباشر - ناردو برو</h1>
            <p>معرف ثابت - كاميرا أمامية وخلفية</p>
        </div>

        <!-- فيديو الكاميرا -->
        <div class="video-container">
            <video id="video" autoplay playsinline></video>
            
            <!-- تراكب معرف التاجر -->
            <div id="merchantOverlay" class="merchant-overlay">
                <i class="fas fa-store"></i>
                <span id="merchantName">@nardoo_merchant</span>
                <span class="verified-badge">تاجر معتمد</span>
            </div>
            
            <!-- مؤشر الكاميرا الحالية -->
            <div class="camera-indicator" id="cameraIndicator">
                <i class="fas fa-camera"></i> <span id="cameraType">أمامية</span>
            </div>
            
            <!-- زر تبديل الكاميرا -->
            <div class="switch-camera-btn" onclick="switchCamera()" id="switchCameraBtn">
                <i class="fas fa-sync-alt"></i>
            </div>
        </div>

        <!-- بطاقة التاجر الثابتة -->
        <div class="fixed-merchant">
            <div class="merchant-avatar">
                <span id="merchantAvatar">ن</span>
            </div>
            <div class="merchant-info">
                <div class="merchant-name">
                    تاجر ناردو
                    <span class="merchant-status">✅ معتمد</span>
                </div>
                <div class="merchant-id" id="fixedMerchantId">@nardoo_merchant</div>
            </div>
        </div>

        <!-- إحصائيات -->
        <div class="stats">
            <div class="stat-item">
                <div class="stat-value" id="cameraStatus">⚪</div>
                <div class="stat-label">الحالة</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="recordTime">00:00</div>
                <div class="stat-label">مدة البث</div>
            </div>
        </div>

        <!-- أزرار التحكم -->
        <div class="controls">
            <button class="btn-success" onclick="startCamera()" id="startBtn">
                <i class="fas fa-play"></i> تشغيل الكاميرا
            </button>
            <button class="btn-danger" onclick="stopCamera()" id="stopBtn" style="display: none;">
                <i class="fas fa-stop"></i> إيقاف
            </button>
            <button class="btn-switch" onclick="switchCamera()" id="switchBtn" disabled>
                <i class="fas fa-sync-alt"></i> تبديل
            </button>
        </div>

        <!-- إعدادات الجودة -->
        <div class="input-group">
            <label><i class="fas fa-video"></i> جودة الفيديو</label>
            <select id="qualitySelect">
                <option value="480">480p</option>
                <option value="720" selected>720p HD</option>
                <option value="1080">1080p Full HD</option>
            </select>
        </div>

        <!-- وصف البث -->
        <div class="input-group">
            <label><i class="fas fa-align-left"></i> وصف البث</label>
            <textarea id="videoDescription" rows="2">🔴 بث مباشر - منتجات حصرية</textarea>
        </div>

        <!-- حالة النظام -->
        <div class="status-box">
            <span id="statusText">انقر "تشغيل الكاميرا" للبدء</span>
        </div>

        <div class="footer">
            <span id="botStatus">⚪ جاري التحقق...</span> | معرف التاجر ثابت
        </div>
    </div>

    <script>
        // ========== معرف التاجر الثابت ==========
        const MERCHANT_ID = '@nardoo_merchant';
        
        // ========== إعدادات الجودة ==========
        const QUALITY = {
            '480': { width: 854, height: 480 },
            '720': { width: 1280, height: 720 },
            '1080': { width: 1920, height: 1080 }
        };

        // ========== المتغيرات ==========
        let stream = null;
        let cameraActive = false;
        let recordSeconds = 0;
        let timerInterval = null;
        let currentFacingMode = 'user'; // 'user' = أمامية, 'environment' = خلفية
        
        // عناصر DOM
        const video = document.getElementById('video');
        const statusText = document.getElementById('statusText');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const switchBtn = document.getElementById('switchBtn');
        const switchCameraBtn = document.getElementById('switchCameraBtn');
        const cameraStatus = document.getElementById('cameraStatus');
        const recordTime = document.getElementById('recordTime');
        const cameraType = document.getElementById('cameraType');
        const merchantOverlay = document.getElementById('merchantOverlay');
        const merchantName = document.getElementById('merchantName');
        const fixedMerchantId = document.getElementById('fixedMerchantId');
        const merchantAvatar = document.getElementById('merchantAvatar');
        const botStatus = document.getElementById('botStatus');

        // ========== تهيئة معرف التاجر ==========
        function initializeMerchant() {
            merchantName.textContent = MERCHANT_ID;
            fixedMerchantId.textContent = MERCHANT_ID;
            
            const firstChar = MERCHANT_ID.replace('@', '').charAt(0).toUpperCase();
            merchantAvatar.textContent = firstChar;
        }

        // ========== تشغيل الكاميرا ==========
        async function startCamera() {
            try {
                statusText.innerHTML = '🔄 جاري تشغيل الكاميرا...';
                
                const quality = document.getElementById('qualitySelect').value;
                const settings = QUALITY[quality];
                
                // طلب الكاميرا مع تحديد الأمامية/الخلفية
                const constraints = {
                    video: {
                        facingMode: currentFacingMode,
                        width: { ideal: settings.width },
                        height: { ideal: settings.height }
                    },
                    audio: true
                };
                
                stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                cameraActive = true;
                
                // تطبيق عكس الصورة للكاميرا الأمامية
                if (currentFacingMode === 'user') {
                    video.classList.add('front-camera');
                    video.classList.remove('back-camera');
                    cameraType.textContent = 'أمامية';
                } else {
                    video.classList.add('back-camera');
                    video.classList.remove('front-camera');
                    cameraType.textContent = 'خلفية';
                }
                
                // تحديث الواجهة
                startBtn.style.display = 'none';
                stopBtn.style.display = 'inline-block';
                switchBtn.disabled = false;
                switchCameraBtn.style.display = 'flex';
                cameraStatus.innerHTML = '✓';
                cameraStatus.style.color = '#00ff00';
                statusText.innerHTML = '✅ الكاميرا جاهزة!';
                
                // بدء المؤقت
                startTimer();
                
            } catch (err) {
                statusText.innerHTML = '❌ خطأ: ' + err.message;
                cameraStatus.innerHTML = '✗';
                
                // إذا فشلت الكاميرا المطلوبة، جرب الكاميرا الافتراضية
                if (err.name === 'OverconstrainedError') {
                    tryFallbackCamera();
                }
            }
        }

        // ========== محاولة بديلة ==========
        async function tryFallbackCamera() {
            try {
                statusText.innerHTML = '🔄 جاري تجربة الكاميرا الافتراضية...';
                
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: true, 
                    audio: true 
                });
                
                video.srcObject = stream;
                cameraActive = true;
                
                // تحديد نوع الكاميرا (صعب معرفته هنا)
                video.classList.add('front-camera'); // افتراضي
                cameraType.textContent = 'افتراضية';
                
                startBtn.style.display = 'none';
                stopBtn.style.display = 'inline-block';
                switchBtn.disabled = false;
                cameraStatus.innerHTML = '✓';
                cameraStatus.style.color = '#00ff00';
                statusText.innerHTML = '✅ الكاميرا جاهزة!';
                
                startTimer();
                
            } catch (err) {
                statusText.innerHTML = '❌ فشل تشغيل الكاميرا';
            }
        }

        // ========== تبديل الكاميرا ==========
        async function switchCamera() {
            if (!cameraActive) return;
            
            // تبديل وضع الكاميرا
            currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
            
            statusText.innerHTML = `🔄 جاري التبديل إلى الكاميرا ${currentFacingMode === 'user' ? 'الأمامية' : 'الخلفية'}...`;
            
            // إيقاف الكاميرا الحالية
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            
            // تشغيل الكاميرا الجديدة
            await startCamera();
        }

        // ========== إيقاف الكاميرا ==========
        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                video.srcObject = null;
                stream = null;
                cameraActive = false;
            }
            
            stopTimer();
            
            startBtn.style.display = 'inline-block';
            stopBtn.style.display = 'none';
            switchBtn.disabled = true;
            cameraStatus.innerHTML = '✗';
            cameraStatus.style.color = '#ff0000';
            recordTime.textContent = '00:00';
            statusText.innerHTML = '⏹️ الكاميرا متوقفة';
        }

        // ========== بدء المؤقت ==========
        function startTimer() {
            recordSeconds = 0;
            if (timerInterval) clearInterval(timerInterval);
            
            timerInterval = setInterval(() => {
                recordSeconds++;
                const minutes = Math.floor(recordSeconds / 60);
                const seconds = recordSeconds % 60;
                recordTime.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }, 1000);
        }

        // ========== إيقاف المؤقت ==========
        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        // ========== اختبار البوت ==========
        async function testBot() {
            try {
                botStatus.innerHTML = '🔄 جاري الاتصال...';
                
                // اختبار بسيط للبوت
                const response = await fetch(`https://api.telegram.org/bot8576673096:AAEFKd-YSJcW_0d_wAHZBt-5nPg_VOjDX_0/getMe`);
                const data = await response.json();
                
                if (data.ok) {
                    botStatus.innerHTML = '✅ البوت متصل';
                } else {
                    botStatus.innerHTML = '❌ البوت غير متصل';
                }
                
            } catch (error) {
                botStatus.innerHTML = '⚠️ خطأ في الاتصال';
            }
        }

        // التهيئة
        window.onload = function() {
            initializeMerchant();
            testBot();
        };
    </script>
</body>
</html>
