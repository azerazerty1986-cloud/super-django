<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>تجربة تلغرام</title>
</head>
<body style="text-align: center; padding: 50px; font-family: Arial;">
    <h2>🔐 تجربة إرسال رمز التحقق</h2>
    <button onclick="sendCode()" style="padding: 15px 30px; font-size: 18px;">📤 إرسال رمز</button>
    <p id="result" style="margin-top: 20px;"></p>

    <script>
        const TELEGRAM = {
            botToken: '8576673096:AAGvSMjzwVWj6wJ47JdqiDwcObXjBDcyiLA',
            channelId: '-1003822964890'
        };

        async function sendCode() {
            const code = Math.floor(100000 + Math.random() * 900000);
            document.getElementById('result').innerHTML = '🔄 جاري الإرسال...';
            
            try {
                const url = `https://api.telegram.org/bot${TELEGRAM.botToken}/sendMessage?chat_id=${TELEGRAM.channelId}&text=🔐 رمز التحقق: ${code}`;
                const response = await fetch(url);
                const result = await response.json();
                
                if (result.ok) {
                    document.getElementById('result').innerHTML = `✅ تم الإرسال! الرقم: ${code}`;
                } else {
                    document.getElementById('result').innerHTML = `❌ فشل: ${result.description}`;
                }
            } catch(error) {
                document.getElementById('result').innerHTML = `❌ خطأ: ${error.message}`;
            }
        }
    </script>
</body>
</html>
