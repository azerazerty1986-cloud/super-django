<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📹 إرسال فيديو مباشر - ناردو برو</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Cairo', Arial, sans-serif;
            background: #0d1117;
            color: white;
            min-height: 100vh;
            padding: 15px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #161b22;
            border-radius: 20px;
            padding: 20px;
            border: 2px solid #ffd700;
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .header h1 {
            color: #ffd700;
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .header p {
            color: #8b949e;
            font-size: 14px;
        }
        
        .video-container {
            position: relative;
            margin: 15px 0;
            border-radius: 15px;
            overflow: hidden;
            border: 3px solid #238636;
            background: black;
            min-height: 300px;
        }
        
        video {
            width: 100%;
            height: auto;
            display: block;
            background: #1a1a1a;
        }
        
        .video-overlay {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            color: #ffd700;
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 12px;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        
        button {
            flex: 1;
            min-width: 120px;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s;
        }
        
        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        .btn-success {
            background: #238636;
            color: white;
        }
        
        .btn-danger {
            background: #da3633;
            color: white;
        }
        
        .btn-telegram {
            background: #0088cc;
            color: white;
        }
        
        .btn-video {
            background: #9c27b0;
            color: white;
        }
        
        .stats {
            display: flex;
            justify-content: space-around;
            margin: 15px 0;
            padding: 10px;
            background: #2d333b;
            border-radius: 10px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #ffd700;
        }
        
        .input-group {
            margin: 15px 0;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #ffd700;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 12px;
            background: #21262d;
            border: 1px solid #2d333b;
            border-radius: 8px;
            color: white;
            font-size: 14px;
        }
        
        .status-box {
            background: #21262d;
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
            border-right: 4px solid #ffd700;
        }
        
        .recording-indicator {
            color: #ff0000;
            font-weight: bold;
            margin: 10px 0;
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #2d333b;
            border-radius: 4px;
            margin: 10px 0;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: #ffd700;
            width: 0%;
            transition: width 0.3s;
        }
        
        .footer {
            text-align: center;
            margin-top: 20px;
            color: #6e7681;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fab fa-telegram"></i> إرسال فيديو مباشر</h1>
            <p>سجل فيديو وأرسله مرة واحدة</p>
        </div>

        <!-- حالة التسجيل -->
        <div class="recording-indicator" id="recordingIndicator" style="display: none;">
            <i class="fas fa-circle"></i> جاري التسجيل... <span id="countdown">30</span> ثانية
        </div>

        <!-- فيديو الكاميرا -->
        <div class="video-container">
            <video id="video" autoplay playsinline muted></video>
            <div class="video-overlay" id="videoOverlay">
                <i class="fas fa-camera"></i> الكاميرا متوقفة
            </div>
        </div>

        <!-- شريط التقدم -->
        <div class="progress-bar" id="progressBar" style="display: none;">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <!-- أزرار التحكم -->
        <div class="controls">
            <button class="btn-success" onclick="startCamera()" id="startBtn">
                <i class="fas fa-play"></i> تشغيل الكاميرا
            </button>
            <button class="btn-danger" onclick="stopCamera()" id="stopBtn" style="display: none;">
                <i class="fas fa-stop"></i> إيقاف
            </button>
        </div>

        <!-- أزرار التسجيل والإرسال -->
        <div class="controls" id="recordControls" style="display: none;">
            <button class="btn-video" onclick="startRecording()" id="recordBtn">
                <i class="fas fa-circle"></i> بدء التسجيل
            </button>
            <button class="btn-danger" onclick="stopRecording()" id="stopRecordBtn" style="display: none;">
                <i class="fas fa-square"></i> إيقاف التسجيل
            </button>
            <button class="btn-telegram" onclick="sendVideo()" id="sendBtn" disabled>
                <i class="fab fa-telegram"></i> إرسال الفيديو
            </button>
        </div>

        <!-- إحصائيات -->
        <div class="stats">
            <div class="stat-item">
                <div class="stat-value" id="cameraStatus">✗</div>
                <div class="stat-label">الكاميرا</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="recordTime">00:00</div>
                <div class="stat-label">مدة التسجيل</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="videoSize">0</div>
                <div class="stat-label">حجم الفيديو</div>
            </div>
        </div>

        <!-- اختيار المدة -->
        <div class="input-group">
            <label><i class="fas fa-clock"></i> مدة التسجيل</label>
            <select id="durationSelect">
                <option value="10">10 ثواني (سريع)</option>
                <option value="30" selected>30 ثانية (موصى به)</option>
                <option value="60">دقيقة واحدة</option>
                <option value="120">دقيقتين</option>
                <option value="300">5 دقائق</option>
            </select>
        </div>

        <!-- اختيار الجودة -->
        <div class="input-group">
            <label><i class="fas fa-video"></i> جودة الفيديو</label>
            <select id="qualitySelect">
                <option value="480">480p (حجم صغير)</option>
                <option value="720" selected>720p HD (موصى به)</option>
                <option value="1080">1080p Full HD</option>
            </select>
        </div>

        <!-- معلومات التاجر -->
        <div class="input-group">
            <label><i class="fab fa-telegram"></i> معرف التاجر</label>
            <input type="text" id="merchantName" value="@nardoo_merchant">
        </div>

        <!-- وصف الفيديو -->
        <div class="input-group">
            <label><i class="fas fa-align-left"></i> وصف الفيديو</label>
            <textarea id="videoDescription" rows="2">🎥 فيديو جديد - منتجات مميزة</textarea>
        </div>

        <!-- رابط المنتج -->
        <div class="input-group">
            <label><i class="fas fa-link"></i> رابط المنتج</label>
            <input type="text" id="productLink" value="https://t.me/nardoo_channel/123">
        </div>

        <!-- حالة النظام -->
        <div class="status-box" id="statusBox">
            <span id="statusText">انقر "تشغيل الكاميرا" للبدء</span>
        </div>

        <!-- اختبار البوت -->
        <div class="controls">
            <button class="btn-telegram" onclick="testBot()">
                <i class="fas fa-robot"></i> اختبار البوت
            </button>
        </div>

        <div class="footer">
            <span id="botStatus">⚪ جاري التحقق...</span> | ناردو برو 2026
        </div>
    </div>

    <script>
        // ========== إعدادات تلجرام ==========
        const TELEGRAM = {
            botToken: '8576673096:AAEFKd-YSJcW_0d_wAHZBt-5nPg_VOjDX_0',
            channelId: '-1003822964890'
        };

        // ========== إعدادات الجودة ==========
        const QUALITY = {
            '480': { width: 854, height: 480 },
            '720': { width: 1280, height: 720 },
            '1080': { width: 1920, height: 1080 }
        };

        // ========== المتغيرات ==========
        let stream = null;
        let cameraActive = false;
        let mediaRecorder = null;
        let recordedChunks = [];
        let isRecording = false;
        let recordingTimer = null;
        let recordSeconds = 0;
        let timerInterval = null;
        
        // عناصر DOM
        const video = document.getElementById('video');
        const statusText = document.getElementById('statusText');
        const videoOverlay = document.getElementById('videoOverlay');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const recordControls = document.getElementById('recordControls');
        const recordBtn = document.getElementById('recordBtn');
        const stopRecordBtn = document.getElementById('stopRecordBtn');
        const sendBtn = document.getElementById('sendBtn');
        const recordingIndicator = document.getElementById('recordingIndicator');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const countdown = document.getElementById('countdown');
        const cameraStatus = document.getElementById('cameraStatus');
        const recordTime = document.getElementById('recordTime');
        const videoSize = document.getElementById('videoSize');
        const botStatus = document.getElementById('botStatus');

        // ========== تشغيل الكاميرا ==========
        async function startCamera() {
            try {
                statusText.innerHTML = '🔄 جاري تشغيل الكاميرا...';
                
                const quality = document.getElementById('qualitySelect').value;
                const settings = QUALITY[quality];
                
                stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        width: { ideal: settings.width },
                        height: { ideal: settings.height }
                    },
                    audio: true
                });
                
                video.srcObject = stream;
                cameraActive = true;
                
                // تحديث الواجهة
                videoOverlay.innerHTML = `<i class="fas fa-circle" style="color: #00ff00;"></i> ${quality}p`;
                startBtn.style.display = 'none';
                stopBtn.style.display = 'inline-block';
                recordControls.style.display = 'flex';
                cameraStatus.innerHTML = '✓';
                cameraStatus.style.color = '#00ff00';
                statusText.innerHTML = '✅ الكاميرا جاهزة! اختر المدة وسجل';
                
                // تجهيز مسجل الفيديو
                setupMediaRecorder();
                
            } catch (err) {
                statusText.innerHTML = '❌ خطأ: ' + err.message;
                cameraStatus.innerHTML = '✗';
            }
        }

        // ========== تجهيز مسجل الفيديو ==========
        function setupMediaRecorder() {
            try {
                mediaRecorder = new MediaRecorder(stream, {
                    mimeType: 'video/webm;codecs=vp8,opus'
                });
            } catch (e) {
                mediaRecorder = new MediaRecorder(stream);
            }
            
            mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0) {
                    recordedChunks.push(event.data);
                    updateVideoSize();
                }
            };
            
            mediaRecorder.onstop = () => {
                isRecording = false;
                clearInterval(timerInterval);
                
                recordBtn.style.display = 'inline-block';
                stopRecordBtn.style.display = 'none';
                recordingIndicator.style.display = 'none';
                progressBar.style.display = 'none';
                sendBtn.disabled = false;
                
                statusText.innerHTML = '✅ تم التسجيل! اضغط إرسال';
            };
        }

        // ========== تحديث حجم الفيديو ==========
        function updateVideoSize() {
            const blob = new Blob(recordedChunks, { type: 'video/webm' });
            const sizeMB = (blob.size / (1024 * 1024)).toFixed(2);
            videoSize.textContent = sizeMB + ' MB';
        }

        // ========== بدء التسجيل ==========
        function startRecording() {
            if (!cameraActive || !mediaRecorder) {
                alert('❌ شغل الكاميرا أولاً');
                return;
            }
            
            const duration = parseInt(document.getElementById('durationSelect').value);
            
            recordedChunks = [];
            mediaRecorder.start();
            isRecording = true;
            recordSeconds = 0;
            
            // تحديث الواجهة
            recordBtn.style.display = 'none';
            stopRecordBtn.style.display = 'inline-block';
            recordingIndicator.style.display = 'block';
            progressBar.style.display = 'block';
            sendBtn.disabled = true;
            
            countdown.textContent = duration;
            progressFill.style.width = '0%';
            
            // عداد الوقت
            timerInterval = setInterval(() => {
                recordSeconds++;
                const minutes = Math.floor(recordSeconds / 60);
                const seconds = recordSeconds % 60;
                recordTime.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }, 1000);
            
            // العد التنازلي
            let timeLeft = duration;
            const countdownInterval = setInterval(() => {
                timeLeft--;
                countdown.textContent = timeLeft;
                progressFill.style.width = `${((duration - timeLeft) / duration) * 100}%`;
                
                if (timeLeft <= 0) {
                    clearInterval(countdownInterval);
                    if (isRecording) {
                        stopRecording();
                    }
                }
            }, 1000);
            
            statusText.innerHTML = `🎥 جاري التسجيل (${duration} ثانية)...`;
        }

        // ========== إيقاف التسجيل مبكراً ==========
        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
            }
        }

        // ========== إرسال فيديو واحد إلى تليجرام ==========
        async function sendVideo() {
            if (recordedChunks.length === 0) {
                alert('❌ لا يوجد فيديو مسجل');
                return;
            }

            const merchant = document.getElementById('merchantName').value;
            const description = document.getElementById('videoDescription').value;
            const productLink = document.getElementById('productLink').value;
            const quality = document.getElementById('qualitySelect').value;

            statusText.innerHTML = '🔄 جاري رفع الفيديو إلى تليجرام...';
            sendBtn.disabled = true;
            
            try {
                const videoBlob = new Blob(recordedChunks, { type: 'video/webm' });
                const videoFile = new File([videoBlob], 'video.mp4', { type: 'video/mp4' });
                
                const formData = new FormData();
                formData.append('chat_id', TELEGRAM.channelId);
                formData.append('video', videoFile);
                
                const minutes = Math.floor(recordSeconds / 60);
                const seconds = recordSeconds % 60;
                
                const caption = `🎥 **فيديو جديد**

👤 **التاجر:** ${merchant}
📝 ${description}
⏱️ المدة: ${minutes}:${seconds.toString().padStart(2, '0')}
🎥 الجودة: ${quality}p
📦 الحجم: ${videoSize.textContent}

🔗 رابط المنتج: ${productLink}

#فيديو #ناردو_برو`;

                formData.append('caption', caption);
                
                // أزرار تفاعلية
                const replyMarkup = {
                    inline_keyboard: [
                        [
                            { text: "📱 تواصل مع التاجر", url: `https://t.me/${merchant.replace('@', '')}` },
                            { text: "🛒 طلب المنتج", callback_data: "order" }
                        ]
                    ]
                };
                formData.append('reply_markup', JSON.stringify(replyMarkup));

                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/sendVideo`, {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (result.ok) {
                    statusText.innerHTML = '✅ تم إرسال الفيديو بنجاح إلى القناة!';
                    
                    alert(`✅ تم الإرسال بنجاح!\n\n📹 الفيديو وصل للقناة\n⏱️ المدة: ${minutes}:${seconds.toString().padStart(2, '0')}\n📦 الحجم: ${videoSize.textContent}`);
                    
                    // تنظيف
                    recordedChunks = [];
                    videoSize.textContent = '0';
                    sendBtn.disabled = true;
                    
                } else {
                    throw new Error(result.description);
                }

            } catch (error) {
                statusText.innerHTML = '❌ فشل الإرسال: ' + error.message;
                sendBtn.disabled = false;
            }
        }

        // ========== إيقاف الكاميرا ==========
        function stopCamera() {
            if (stream) {
                if (isRecording) {
                    stopRecording();
                }
                
                stream.getTracks().forEach(track => track.stop());
                video.srcObject = null;
                stream = null;
                cameraActive = false;
                
                videoOverlay.innerHTML = '<i class="fas fa-camera"></i> الكاميرا متوقفة';
                startBtn.style.display = 'inline-block';
                stopBtn.style.display = 'none';
                recordControls.style.display = 'none';
                recordingIndicator.style.display = 'none';
                progressBar.style.display = 'none';
                cameraStatus.innerHTML = '✗';
                recordTime.textContent = '00:00';
                statusText.innerHTML = '⏹️ الكاميرا متوقفة';
            }
        }

        // ========== اختبار البوت ==========
        async function testBot() {
            try {
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/getMe`);
                const data = await response.json();
                
                if (data.ok) {
                    botStatus.innerHTML = '✅ البوت متصل - جاهز للإرسال';
                    statusText.innerHTML = '✅ البوت يعمل! شغل الكاميرا وسجل';
                    
                    await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: TELEGRAM.channelId,
                            text: `✅ **نظام إرسال الفيديو جاهز**\n📹 أرسل فيديو واحد مباشر`,
                            parse_mode: 'Markdown'
                        })
                    });
                } else {
                    botStatus.innerHTML = '❌ البوت غير متصل';
                }
            } catch (error) {
                botStatus.innerHTML = '❌ خطأ في الاتصال';
            }
        }

        // التهيئة
        window.onload = function() {
            testBot();
        };
    </script>
</body>
</html>
