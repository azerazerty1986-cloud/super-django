<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📡 بث مباشر - تاجر تليجرام</title>
    <style>
        body {
            background: #0d1117;
            color: white;
            font-family: Arial;
            text-align: center;
            padding: 20px;
        }
        .live-container {
            max-width: 600px;
            margin: 0 auto;
            background: #161b22;
            border-radius: 20px;
            padding: 20px;
            border: 3px solid #ff0000;
        }
        .live-badge {
            background: #ff0000;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            display: inline-block;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        video {
            width: 100%;
            border-radius: 15px;
            border: 3px solid #00ff00;
            margin: 15px 0;
            background: black;
        }
        button {
            padding: 15px 30px;
            margin: 10px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
        }
        .btn-start {
            background: #00ff00;
            color: black;
        }
        .btn-stop {
            background: #ff0000;
            color: white;
        }
        .btn-notify {
            background: #0088cc;
            color: white;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            padding: 15px;
            background: #21262d;
            border-radius: 10px;
        }
        .viewers {
            color: #ffd700;
            font-size: 24px;
            font-weight: bold;
        }
        .telegram-link {
            background: #0088cc;
            color: white;
            padding: 10px;
            border-radius: 10px;
            text-decoration: none;
            display: inline-block;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="live-container">
        <div class="live-badge" id="liveIndicator" style="display: none;">
            🔴 بث مباشر الآن
        </div>

        <h1>📡 البث المباشر للتاجر</h1>
        
        <!-- فيديو البث -->
        <video id="liveVideo" autoplay playsinline></video>
        
        <!-- إحصائيات -->
        <div class="stats">
            <div>
                <div class="viewers" id="viewerCount">0</div>
                <div>المشاهدين</div>
            </div>
            <div>
                <div class="viewers" id="streamTime">00:00</div>
                <div>مدة البث</div>
            </div>
        </div>

        <!-- أزرار التحكم -->
        <div>
            <button class="btn-start" onclick="startLive()" id="startBtn">
                ▶️ بدء البث المباشر
            </button>
            <button class="btn-stop" onclick="stopLive()" id="stopBtn" style="display: none;">
                ⏹️ إيقاف البث
            </button>
        </div>

        <!-- إشعار للمتابعين -->
        <div style="margin-top: 20px;">
            <button class="btn-notify" onclick="sendLiveNotification()">
                📢 إرسال إشعار للمتابعين
            </button>
        </div>

        <!-- رابط المشاهدة -->
        <div id="liveLink" style="margin-top: 20px; display: none;">
            <a class="telegram-link" id="telegramLink" target="_blank">
                🔗 رابط المشاهدة المباشرة
            </a>
        </div>

        <!-- معلومات التاجر -->
        <div style="margin-top: 20px; text-align: right;">
            <input type="text" id="merchantName" value="@nardoo_merchant" 
                   style="width: 100%; padding: 10px; background: #2d333b; border: none; color: white; border-radius: 5px;">
        </div>

        <!-- حالة البث -->
        <div id="status" style="margin-top: 20px; color: #ffd700;"></div>
    </div>

    <script>
        // ========== إعدادات تليجرام ==========
        const TELEGRAM = {
            botToken: '8576673096:AAEFKd-YSJcW_0d_wAHZBt-5nPg_VOjDX_0',
            channelId: '-1003822964890'
        };

        let localStream = null;
        let isLive = false;
        let viewers = 127;
        let startTime = null;
        let timerInterval = null;

        const liveVideo = document.getElementById('liveVideo');
        const liveIndicator = document.getElementById('liveIndicator');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const viewerCount = document.getElementById('viewerCount');
        const streamTime = document.getElementById('streamTime');
        const liveLink = document.getElementById('liveLink');
        const telegramLink = document.getElementById('telegramLink');
        const statusDiv = document.getElementById('status');

        // ========== بدء البث المباشر ==========
        async function startLive() {
            try {
                statusDiv.innerHTML = '🔄 جاري تشغيل الكاميرا...';
                
                localStream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    },
                    audio: true
                });
                
                liveVideo.srcObject = localStream;
                isLive = true;
                
                // تحديث الواجهة
                liveIndicator.style.display = 'inline-block';
                startBtn.style.display = 'none';
                stopBtn.style.display = 'inline-block';
                statusDiv.innerHTML = '🔴 البث المباشر شغال الآن!';
                
                // بدء المؤقت
                startTime = Date.now();
                startTimer();
                
                // تحديث عدد المشاهدين (محاكاة)
                setInterval(() => {
                    if (isLive) {
                        viewers += Math.floor(Math.random() * 5) - 2;
                        if (viewers < 100) viewers = 100;
                        viewerCount.textContent = viewers;
                    }
                }, 10000);
                
            } catch (err) {
                statusDiv.innerHTML = '❌ خطأ: ' + err.message;
            }
        }

        // ========== إيقاف البث ==========
        function stopLive() {
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                liveVideo.srcObject = null;
                localStream = null;
                isLive = false;
                
                liveIndicator.style.display = 'none';
                startBtn.style.display = 'inline-block';
                stopBtn.style.display = 'none';
                liveLink.style.display = 'none';
                statusDiv.innerHTML = '⏹️ البث متوقف';
                
                clearInterval(timerInterval);
            }
        }

        // ========== مؤقت البث ==========
        function startTimer() {
            timerInterval = setInterval(() => {
                if (!isLive) return;
                const seconds = Math.floor((Date.now() - startTime) / 1000);
                const minutes = Math.floor(seconds / 60);
                const remainingSeconds = seconds % 60;
                streamTime.textContent = `${minutes.toString().padStart(2, '0')}:${remainingSeconds.toString().padStart(2, '0')}`;
            }, 1000);
        }

        // ========== إرسال إشعار البث ==========
        async function sendLiveNotification() {
            if (!isLive) {
                alert('❌ البث غير شغال');
                return;
            }

            const merchant = document.getElementById('merchantName').value;
            
            statusDiv.innerHTML = '🔄 جاري إرسال الإشعار...';
            
            try {
                // إنشاء رابط فريد للبث (يمكن استخدام خدمة خارجية)
                const streamUrl = `https://${window.location.hostname}/live/${Date.now()}`;
                
                const message = `🔴 **بث مباشر الآن!**

👤 التاجر: ${merchant}
⏰ بدأ البث: ${new Date().toLocaleString('ar-EG')}
👥 المشاهدين: ${viewers}

📱 **لمشاهدة البث:**
${streamUrl}

#بث_مباشر #تاجر_تليجرام #ناردو_برو`;

                // إرسال إلى قناة تليجرام
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: TELEGRAM.channelId,
                        text: message,
                        parse_mode: 'Markdown'
                    })
                });

                const result = await response.json();
                
                if (result.ok) {
                    statusDiv.innerHTML = '✅ تم إرسال إشعار البث المباشر!';
                    
                    // إظهار رابط المشاهدة
                    telegramLink.href = streamUrl;
                    telegramLink.innerHTML = '🔗 رابط البث المباشر';
                    liveLink.style.display = 'block';
                    
                    // إرسال رسالة كل 5 دقائق للتذكير
                    setTimeout(() => {
                        if (isLive) {
                            sendLiveNotification();
                        }
                    }, 300000); // 5 دقائق
                    
                } else {
                    throw new Error(result.description);
                }
                
            } catch (error) {
                statusDiv.innerHTML = '❌ فشل الإرسال: ' + error.message;
            }
        }

        // ========== اختبار البوت ==========
        async function testBot() {
            try {
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/getMe`);
                const data = await response.json();
                
                if (data.ok) {
                    statusDiv.innerHTML = '✅ البوت متصل وجاهز للبث المباشر';
                }
            } catch (error) {
                statusDiv.innerHTML = '❌ البوت غير متصل';
            }
        }

        // اختبار البوت عند التحميل
        window.onload = function() {
            viewerCount.textContent = viewers;
            testBot();
        };

    </script>
</body>
</html>
