<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نكهة وجمال | ناردو برو - المنصة المتكاملة</title>
    
    <!-- الخطوط -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- ملفات CSS (4 ملفات) -->
    <link rel="stylesheet" href="02-css/01-variables.css">
    <link rel="stylesheet" href="02-css/02-layout.css">
    <link rel="stylesheet" href="02-css/03-components.css">
    <link rel="stylesheet" href="02-css/04-responsive.css">
</head>
<body>
    <!-- خلفية متحركة -->
    <div class="animated-bg"></div>

    <!-- ===== تضمين ملفات HTML (5 ملفات) ===== -->
    <div w3-include-html="01-includes/01-header.html"></div>
    <div w3-include-html="01-includes/02-navigation.html"></div>
    <div w3-include-html="01-includes/03-content.html"></div>
    <div w3-include-html="01-includes/04-modals.html"></div>
    <div w3-include-html="01-includes/05-footer.html"></div>

    <!-- ===== ملفات JavaScript (8 ملفات) ===== -->
    <script src="03-js/01-core.js"></script>
    <script src="03-js/02-auth.js"></script>
    <script src="03-js/03-shop.js"></script>
    <script src="03-js/04-telegram.js"></script>
    <script src="03-js/05-app.js"></script>
    <script src="03-js/06-inventory.js"></script>
    <script src="03-js/07-roles.js"></script>
    <script src="03-js/08-delivery.js"></script>

    <!-- دالة تضمين HTML -->
    <script>
        function includeHTML() {
            var z, i, elmnt, file, xhttp;
            z = document.getElementsByTagName("*");
            for (i = 0; i < z.length; i++) {
                elmnt = z[i];
                file = elmnt.getAttribute("w3-include-html");
                if (file) {
                    xhttp = new XMLHttpRequest();
                    xhttp.onreadystatechange = function() {
                        if (this.readyState == 4) {
                            if (this.status == 200) {elmnt.innerHTML = this.responseText;}
                            if (this.status == 404) {elmnt.innerHTML = "<!-- الملف غير موجود -->";}
                            elmnt.removeAttribute("w3-include-html");
                            includeHTML();
                        }
                    }
                    xhttp.open("GET", file, true);
                    xhttp.send();
                    return;
                }
            }
        }
        includeHTML();
    </script>
</body>
</html>
