<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📹 HYBRID v2.0 - بث حي + ZIP تلقائي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }
        
        body {
            background: #0a0c10;
            color: white;
            min-height: 100vh;
            padding: 16px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* الهيدر */
        .header {
            background: linear-gradient(135deg, #161b22, #1f2630);
            border-radius: 25px;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px solid #ffd700;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .header h1 {
            color: #ffd700;
            font-size: 28px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .protocol-badge {
            background: #4caf50;
            color: white;
            padding: 8px 20px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        /* بطاقة الناشر */
        .publisher-card {
            background: #161b22;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px solid #ffd700;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .publisher-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: #ffd700;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            font-weight: bold;
            color: black;
        }
        
        .publisher-info {
            flex: 1;
        }
        
        .publisher-name {
            color: #ffd700;
            font-size: 24px;
            font-weight: bold;
        }
        
        .publisher-id {
            color: #8b949e;
            font-size: 16px;
        }
        
        /* مؤشرات البروتوكول */
        .protocol-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: #1f2630;
            border-radius: 15px;
            padding: 15px;
            border: 2px solid #ffd700;
            text-align: center;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
        }
        
        .stat-label {
            color: #8b949e;
            font-size: 12px;
        }
        
        /* شاشتين */
        .dual-screen {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .screen {
            background: #161b22;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid;
        }
        
        .live-screen { border-color: #ff0000; }
        .zip-screen { border-color: #ffd700; }
        
        .screen-header {
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1f2630;
        }
        
        .live-header { color: #ff0000; }
        .zip-header { color: #ffd700; }
        
        .video-container {
            background: black;
            min-height: 350px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        video {
            width: 100%;
            max-height: 350px;
            object-fit: cover;
        }
        
        canvas {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            border: 3px solid #ffd700;
            object-fit: cover;
        }
        
        .live-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ff0000;
            color: white;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 12px;
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%,100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* أزرار التحكم */
        .three-buttons {
            display: flex;
            gap: 15px;
            margin: 20px 0;
            justify-content: center;
        }
        
        .btn {
            flex: 1;
            max-width: 200px;
            padding: 15px 25px;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
        }
        
        .btn-green { background: #238636; color: white; }
        .btn-red { background: #da3633; color: white; }
        .btn-blue { background: #0088cc; color: white; }
        
        .btn:hover {
            transform: translateY(-3px);
            filter: brightness(1.2);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* كاميرا */
        .camera-toggle {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            justify-content: center;
        }
        
        .cam-option {
            padding: 10px 30px;
            border-radius: 25px;
            background: #1f2630;
            color: #8b949e;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s;
        }
        
        .cam-option.active {
            border-color: #ffd700;
            color: #ffd700;
            background: #ffd70020;
        }
        
        /* قائمة ZIP */
        .zip-list {
            background: #1f2630;
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
            border: 2px solid #ffd700;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .zip-item {
            background: #2d333b;
            border-radius: 12px;
            padding: 15px;
            margin: 10px 0;
            border-right: 4px solid #4caf50;
        }
        
        .zip-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        
        .zip-name {
            color: #ffd700;
            font-weight: bold;
            font-family: monospace;
        }
        
        .zip-fingerprint {
            color: #4caf50;
            font-size: 12px;
        }
        
        /* سجل الإرسال */
        .send-log {
            background: #1f2630;
            border-radius: 15px;
            padding: 10px;
            margin-top: 15px;
            max-height: 150px;
            overflow-y: auto;
            border: 1px solid #ffd700;
        }
        
        .log-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 10px;
            border-bottom: 1px solid #2d333b;
            font-size: 12px;
        }
        
        .log-success { color: #4caf50; }
        .log-error { color: #f44336; }
        
        /* شريط الحالة */
        .status-bar {
            margin-top: 20px;
            padding: 15px;
            background: #1f2630;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            border: 1px solid #ffd700;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- الهيدر -->
        <div class="header">
            <h1>
                <i class="fas fa-microchip"></i>
                HYBRID v2.0 + ZIP
            </h1>
            <div class="protocol-badge">
                <i class="fas fa-check-circle"></i> @nardoo_merchant
            </div>
        </div>

        <!-- بطاقة الناشر -->
        <div class="publisher-card">
            <div class="publisher-avatar">ن</div>
            <div class="publisher-info">
                <div class="publisher-name">تاجر ناردو</div>
                <div class="publisher-id">@nardoo_merchant</div>
            </div>
            <div class="live-status" id="liveIndicator">⏸️ متوقف</div>
        </div>

        <!-- مؤشرات البروتوكول -->
        <div class="protocol-stats">
            <div class="stat-card">
                <div class="stat-value" id="videoFpsStat">30</div>
                <div class="stat-label">فيديو FPS</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="photoQualityStat">90%</div>
                <div class="stat-label">جودة صور</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="bufferStat">0</div>
                <div class="stat-label">في المخزن</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="zipCountStat">0</div>
                <div class="stat-label">ملفات ZIP</div>
            </div>
        </div>

        <!-- شاشتين -->
        <div class="dual-screen">
            <!-- البث المباشر -->
            <div class="screen live-screen">
                <div class="screen-header live-header">
                    <span><i class="fas fa-circle"></i> بث مباشر 30fps</span>
                    <span id="liveTime">--:--</span>
                </div>
                <div class="video-container">
                    <video id="liveVideo" autoplay playsinline muted></video>
                    <div class="live-badge" id="liveBadge">🔴 مباشر</div>
                </div>
            </div>

            <!-- آخر صورة -->
            <div class="screen zip-screen">
                <div class="screen-header zip-header">
                    <span><i class="fas fa-camera"></i> آخر صورة</span>
                    <span id="lastPhotoTime">--:--</span>
                </div>
                <div class="video-container">
                    <canvas id="previewCanvas" width="280" height="280"></canvas>
                </div>
            </div>
        </div>

        <!-- اختيار الكاميرا -->
        <div class="camera-toggle">
            <div class="cam-option active" onclick="selectCamera('user')" id="camFront">أمامية</div>
            <div class="cam-option" onclick="selectCamera('environment')" id="camBack">خلفية</div>
        </div>

        <!-- 3 أزرار -->
        <div class="three-buttons">
            <button class="btn btn-green" onclick="startCamera()" id="startBtn">
                <i class="fas fa-camera"></i> تشغيل الكاميرا
            </button>
            <button class="btn btn-blue" onclick="startLiveStream()" id="liveBtn" disabled>
                <i class="fas fa-play"></i> بدء البث
            </button>
            <button class="btn btn-red" onclick="stopLiveStream()" id="stopBtn" disabled>
                <i class="fas fa-stop"></i> إيقاف
            </button>
        </div>

        <!-- قائمة ZIP المرسلة -->
        <div class="zip-list" id="zipList">
            <div style="text-align: center; color: #8b949e;">📦 لا توجد ملفات ZIP بعد...</div>
        </div>

        <!-- سجل الإرسال -->
        <div class="send-log" id="sendLog">
            <div style="color: #8b949e; text-align: center;">📡 في انتظار الإرسال...</div>
        </div>

        <!-- شريط الحالة -->
        <div class="status-bar">
            <span id="statusText"><i class="fas fa-circle" style="color: #4caf50;"></i> النظام جاهز</span>
            <span id="timeDisplay"></span>
        </div>
    </div>

    <script>
        // ========== بروتوكول HYBRID v2.0 (كما هو) ==========
        const HYBRID_CONFIG = {
            // إعدادات الفيديو
            videoFPS: 30,
            videoBitrate: "2500k",
            videoDuration: 5,
            videoInterval: 8000,
            
            // إعدادات الصور
            photoFPS: 5,
            photoQuality: 0.9,
            photoInterval: 200,
            
            // إدارة النظام
            bufferSize: 5000,
            maxQueueSize: 20,
            sendInterval: 5000
        };

        // ========== بصمة الناشر ==========
        const PUBLISHER = {
            id: '@nardoo_merchant',
            name: 'تاجر ناردو',
            
            master: null,
            
            generateMasterFingerprint: function() {
                const now = new Date();
                const sessionId = 'LIVE_' + Math.random().toString(36).substring(2, 8).toUpperCase();
                const signature = btoa(this.id + now.getTime()).substring(0, 8).toUpperCase();
                
                return {
                    publisher: this.id,
                    session: sessionId,
                    date: now.toLocaleDateString('ar-EG').replace(/\//g, '-'),
                    signature: signature
                };
            },
            
            generateSubFingerprint: function(albumId) {
                if (!this.master) return 'ERROR';
                const base = this.master.signature;
                const albumHash = (parseInt('0x' + base) + albumId).toString(16).substring(0, 6).toUpperCase();
                return `${this.master.session}_${albumHash}`;
            },
            
            refreshMaster: function() {
                this.master = this.generateMasterFingerprint();
                return this.master;
            }
        };

        // ========== إعدادات تيليجرام ==========
        const TELEGRAM = {
            botToken: '8576673096:AAEFKd-YSJcW_0d_wAHZBt-5nPg_VOjDX_0',
            channelId: '-1003822964890'
        };

        // ========== متغيرات النظام ==========
        let stream = null;
        let cameraActive = false;
        let isLiveActive = false;
        let currentFacingMode = 'user';
        
        // مخازن البروتوكول
        let currentPhotos = [];
        let currentVideos = [];
        let photoCounter = 0;
        let videoCounter = 0;
        let zipCounter = 0;
        let sentZips = [];
        
        // مؤقتات
        let photoInterval = null;
        let videoInterval = null;
        let sendInterval = null;
        let mediaRecorder = null;
        
        // عناصر DOM
        const video = document.getElementById('liveVideo');
        const previewCanvas = document.getElementById('previewCanvas');
        const previewCtx = previewCanvas.getContext('2d');
        
        const liveIndicator = document.getElementById('liveIndicator');
        const liveBadge = document.getElementById('liveBadge');
        const liveTime = document.getElementById('liveTime');
        const lastPhotoTime = document.getElementById('lastPhotoTime');
        const videoFpsStat = document.getElementById('videoFpsStat');
        const photoQualityStat = document.getElementById('photoQualityStat');
        const bufferStat = document.getElementById('bufferStat');
        const zipCountStat = document.getElementById('zipCountStat');
        const zipList = document.getElementById('zipList');
        const sendLog = document.getElementById('sendLog');
        const statusText = document.getElementById('statusText');
        const timeDisplay = document.getElementById('timeDisplay');
        
        const startBtn = document.getElementById('startBtn');
        const liveBtn = document.getElementById('liveBtn');
        const stopBtn = document.getElementById('stopBtn');
        const camFront = document.getElementById('camFront');
        const camBack = document.getElementById('camBack');

        // تحديث الوقت
        setInterval(() => {
            const now = new Date();
            timeDisplay.textContent = now.toLocaleTimeString('ar-EG');
        }, 1000);

        // اختيار الكاميرا
        window.selectCamera = function(mode) {
            currentFacingMode = mode;
            camFront.classList.toggle('active', mode === 'user');
            camBack.classList.toggle('active', mode === 'environment');
            
            if (cameraActive) {
                stopCamera();
                setTimeout(startCamera, 500);
            }
        };

        // تشغيل الكاميرا
        window.startCamera = async function() {
            try {
                statusText.innerHTML = '🔄 تشغيل الكاميرا...';
                
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: currentFacingMode,
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: true
                });
                
                video.srcObject = stream;
                await video.play();
                
                cameraActive = true;
                startBtn.disabled = true;
                liveBtn.disabled = false;
                stopBtn.disabled = true;
                liveIndicator.innerHTML = '⏸️ متوقف';
                liveBadge.style.display = 'none';
                
                statusText.innerHTML = '✅ الكاميرا جاهزة';
                
            } catch (err) {
                statusText.innerHTML = '❌ خطأ: ' + err.message;
            }
        };

        // بدء البث
        window.startLiveStream = function() {
            // تجديد البصمة
            PUBLISHER.refreshMaster();
            
            isLiveActive = true;
            liveBtn.disabled = true;
            stopBtn.disabled = false;
            liveIndicator.innerHTML = '🔴 بث مباشر';
            liveBadge.style.display = 'block';
            statusText.innerHTML = '🔴 البث نشط';
            
            // تنظيف
            stopAllIntervals();
            currentPhotos = [];
            currentVideos = [];
            
            // بدء البروتوكول
            photoInterval = setInterval(capturePhoto, HYBRID_CONFIG.photoInterval);
            videoInterval = setInterval(recordVideo, HYBRID_CONFIG.videoInterval);
        };

        // ========== إيقاف البث + إرسال ZIP تلقائي ==========
        window.stopLiveStream = async function() {
            console.log('🛑 إيقاف البث - تجهيز ZIP النهائي...');
            
            // 1. إيقاف التسجيل
            isLiveActive = false;
            stopAllIntervals();
            
            // 2. تحديث الواجهة
            liveBtn.disabled = false;
            stopBtn.disabled = true;
            liveIndicator.innerHTML = '⏸️ متوقف';
            liveBadge.style.display = 'none';
            statusText.innerHTML = '⏹️ تجهيز ZIP...';
            
            // 3. إرسال ZIP النهائي مع كل المحتوى
            if (currentPhotos.length > 0 || currentVideos.length > 0) {
                await sendFinalZip();
            } else {
                statusText.innerHTML = '⏹️ تم الإيقاف - لا يوجد محتوى';
            }
            
            // 4. تنظيف المخازن
            currentPhotos = [];
            currentVideos = [];
        };

        // إيقاف المؤقتات
        function stopAllIntervals() {
            if (photoInterval) clearInterval(photoInterval);
            if (videoInterval) clearInterval(videoInterval);
            if (sendInterval) clearInterval(sendInterval);
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
        }

        // التقاط صورة
        function capturePhoto() {
            if (!isLiveActive || !cameraActive) return;
            
            previewCtx.drawImage(video, 0, 0, 280, 280);
            
            previewCanvas.toBlob((blob) => {
                if (!isLiveActive) return;
                
                currentPhotos.push({
                    blob: blob,
                    time: Date.now(),
                    index: photoCounter++
                });
                
                // تحديث المعاينة
                const now = new Date();
                lastPhotoTime.textContent = now.toLocaleTimeString('ar-EG');
                liveTime.textContent = now.toLocaleTimeString('ar-EG');
                
                // تحديث إحصائيات المخزن
                bufferStat.textContent = currentPhotos.length;
                
                // التحكم بحجم المخزن
                if (currentPhotos.length > HYBRID_CONFIG.maxQueueSize) {
                    currentPhotos.shift();
                }
                
            }, 'image/jpeg', HYBRID_CONFIG.photoQuality);
        }

        // تسجيل فيديو
        async function recordVideo() {
            if (!isLiveActive || !cameraActive) return;
            
            try {
                const chunks = [];
                const recorder = new MediaRecorder(stream, {
                    mimeType: 'video/webm;codecs=vp9',
                    videoBitsPerSecond: 2500000
                });
                
                recorder.ondataavailable = (e) => {
                    if (e.data.size > 0) chunks.push(e.data);
                };
                
                recorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'video/webm' });
                    
                    currentVideos.push({
                        blob: blob,
                        time: Date.now(),
                        index: videoCounter++
                    });
                    
                    // الاحتفاظ بآخر فيديو فقط
                    if (currentVideos.length > 1) {
                        currentVideos.shift();
                    }
                };
                
                recorder.start();
                setTimeout(() => recorder.stop(), HYBRID_CONFIG.videoDuration * 1000);
                
            } catch (error) {
                console.error('❌ فشل تسجيل الفيديو:', error);
            }
        }

        // إرسال ZIP النهائي (عند التوقف)
        async function sendFinalZip() {
            try {
                const zip = new JSZip();
                const albumId = Date.now();
                const subFingerprint = PUBLISHER.generateSubFingerprint(albumId);
                
                // 1. إضافة كل الصور
                currentPhotos.forEach((photo, index) => {
                    zip.file(`photo_${index + 1}.jpg`, photo.blob);
                });
                
                // 2. إضافة كل الفيديوهات
                currentVideos.forEach((video, index) => {
                    zip.file(`video_${index + 1}.webm`, video.blob);
                });
                
                // 3. إضافة ملف البصمة
                const now = new Date();
                const fingerprintText = `🔐 بث حي من ${PUBLISHER.id}
🎯 الجلسة: ${PUBLISHER.master.session}
📅 التاريخ: ${now.toLocaleDateString('ar-EG')}
⏱️ وقت الإيقاف: ${now.toLocaleTimeString('ar-EG')}
🔑 البصمة: ${subFingerprint}
📊 المحتوى النهائي: ${currentPhotos.length} صور | ${currentVideos.length} فيديو
⚡ البروتوكول: HYBRID v2.0
📸 جودة الصور: ${HYBRID_CONFIG.photoQuality * 100}%
🎥 إعدادات الفيديو: ${HYBRID_CONFIG.videoFPS}fps | ${HYBRID_CONFIG.videoBitrate}
⏱️ مدة البث: ${Math.floor(photoCounter / HYBRID_CONFIG.photoFPS)} ثانية`;
                
                zip.file("fingerprint.txt", fingerprintText);
                
                // 4. إنشاء ZIP
                statusText.innerHTML = '📦 تجهيز ملف ZIP...';
                const zipBlob = await zip.generateAsync({ 
                    type: "blob",
                    compression: "DEFLATE",
                    compressionOptions: { level: 6 },
                    onUpdate: (progress) => {
                        const percent = Math.round(progress.percent);
                        statusText.innerHTML = `📦 تجهيز ZIP: ${percent}%`;
                    }
                });
                
                // 5. إرسال ZIP
                statusText.innerHTML = '📤 إرسال ZIP إلى القناة...';
                const formData = new FormData();
                formData.append('chat_id', TELEGRAM.channelId);
                formData.append('document', zipBlob, `broadcast_${subFingerprint}.zip`);
                formData.append('caption', `📦 بث كامل من ${PUBLISHER.id}
🔑 ${subFingerprint}
📸 ${currentPhotos.length} صور
🎥 ${currentVideos.length} فيديو
⏱️ ${now.toLocaleTimeString('ar-EG')}
⚡ جودة: ${HYBRID_CONFIG.photoQuality*100}% | ${HYBRID_CONFIG.videoFPS}fps
🎯 جلسة: ${PUBLISHER.master.session}`);
                
                const res = await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/sendDocument`, {
                    method: 'POST',
                    body: formData
                });
                
                const result = await res.json();
                
                if (result.ok) {
                    zipCounter++;
                    zipCountStat.textContent = zipCounter;
                    
                    // حفظ في القائمة
                    sentZips.unshift({
                        name: `broadcast_${subFingerprint}.zip`,
                        fingerprint: subFingerprint,
                        photos: currentPhotos.length,
                        videos: currentVideos.length,
                        time: now.toLocaleTimeString('ar-EG')
                    });
                    
                    updateZipList();
                    addToLog(`✅ ZIP ${subFingerprint} أرسل بنجاح`, 'success');
                    statusText.innerHTML = '✅ تم الإيقاف - ZIP أرسل';
                    
                } else {
                    addToLog(`❌ فشل إرسال ZIP`, 'error');
                    statusText.innerHTML = '❌ فشل إرسال ZIP';
                }
                
            } catch (error) {
                addToLog(`❌ خطأ: ${error.message}`, 'error');
                statusText.innerHTML = '❌ خطأ في إنشاء ZIP';
                console.error(error);
            }
        }

        // تحديث قائمة ZIP
        function updateZipList() {
            if (sentZips.length === 0) {
                zipList.innerHTML = '<div style="text-align: center; color: #8b949e;">📦 لا توجد ملفات ZIP بعد...</div>';
                return;
            }
            
            let html = '';
            sentZips.slice(0, 5).forEach(zip => {
                html += `
                    <div class="zip-item">
                        <div class="zip-header">
                            <span class="zip-name">📦 ${zip.name}</span>
                            <span class="zip-fingerprint">🔑 ${zip.fingerprint}</span>
                        </div>
                        <div style="display: flex; gap: 15px; margin: 8px 0;">
                            <span style="color: #0088cc;">📸 ${zip.photos}</span>
                            <span style="color: #ff0000;">🎥 ${zip.videos}</span>
                        </div>
                        <div style="color: #8b949e; font-size: 11px;">
                            ⏱️ ${zip.time}
                        </div>
                    </div>
                `;
            });
            
            zipList.innerHTML = html;
        }

        // إضافة للسجل
        function addToLog(message, type) {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('ar-EG');
            
            let html = sendLog.innerHTML;
            if (html.includes('في انتظار الإرسال')) html = '';
            
            const logClass = type === 'success' ? 'log-success' : 'log-error';
            
            html = `
                <div class="log-item">
                    <span class="${logClass}">${message}</span>
                    <span style="color: #8b949e;">${timeStr}</span>
                </div>
            ` + html;
            
            // آخر 10 رسائل
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = html;
            if (tempDiv.children.length > 10) {
                tempDiv.removeChild(tempDiv.lastChild);
            }
            
            sendLog.innerHTML = tempDiv.innerHTML;
        }

        // إيقاف الكاميرا
        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(t => t.stop());
                stream = null;
            }
            cameraActive = false;
            startBtn.disabled = false;
            liveBtn.disabled = true;
            stopBtn.disabled = true;
        }
    </script>
</body>
</html>
