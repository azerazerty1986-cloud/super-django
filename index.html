<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📹 بث حي + دمج الريلز في شاشة واحدة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Cairo', Arial, sans-serif;
            background: #0d1117;
            color: white;
            min-height: 100vh;
            padding: 15px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #161b22;
            border-radius: 20px;
            padding: 20px;
            border: 2px solid #ffd700;
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .header h1 {
            color: #ffd700;
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .header p {
            color: #8b949e;
            font-size: 14px;
        }
        
        .live-badge-large {
            background: linear-gradient(90deg, #ff0000, #ff4444);
            color: white;
            padding: 10px 25px;
            border-radius: 50px;
            font-size: 20px;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin: 10px 0;
            animation: pulse-live 1.5s infinite;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.5);
        }
        
        @keyframes pulse-live {
            0%, 100% { opacity: 1; box-shadow: 0 0 30px rgba(255, 0, 0, 0.5); }
            50% { opacity: 0.9; box-shadow: 0 0 50px rgba(255, 0, 0, 0.8); }
        }
        
        /* شاشة البث الموحدة */
        .unified-stream {
            position: relative;
            margin: 15px 0;
            border-radius: 15px;
            overflow: hidden;
            border: 4px solid #ff0000;
            background: black;
            min-height: 400px;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.5);
        }
        
        #unifiedVideo {
            width: 100%;
            height: auto;
            display: block;
            background: #1a1a1a;
            min-height: 400px;
            object-fit: cover;
        }
        
        .stream-overlay {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 20;
            pointer-events: none;
        }
        
        .live-indicator-large {
            background: #ff0000;
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 2px solid white;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.8);
            pointer-events: auto;
        }
        
        .merchant-info-overlay {
            background: rgba(0, 0, 0, 0.8);
            color: #ffd700;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 2px solid #ffd700;
            backdrop-filter: blur(4px);
            pointer-events: auto;
        }
        
        .stream-stats {
            position: absolute;
            bottom: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 20;
        }
        
        .viewers-count {
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            border: 1px solid #ffd700;
        }
        
        .stream-progress-container {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: rgba(0, 0, 0, 0.5);
            z-index: 25;
        }
        
        .stream-progress-bar {
            height: 100%;
            background: #ff0000;
            width: 0%;
            transition: width 0.3s;
            box-shadow: 0 0 10px #ff0000;
        }
        
        .video-counter {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.8);
            color: #ffd700;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            border: 1px solid #ffd700;
        }
        
        .playlist-panel {
            background: #1a1f2b;
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
            border: 2px solid #ffd700;
        }
        
        .playlist-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        
        .playlist-header h3 {
            color: #ffd700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .merge-toggle {
            background: #2d333b;
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            border: 1px solid #ffd700;
        }
        
        .merge-toggle.active {
            background: #4caf50;
            border-color: #4caf50;
        }
        
        .playlist-items {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 10px 0;
            max-height: 150px;
        }
        
        .playlist-item {
            min-width: 100px;
            background: #2d333b;
            border-radius: 8px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s;
        }
        
        .playlist-item:hover {
            border-color: #ffd700;
            transform: scale(1.05);
        }
        
        .playlist-item.active {
            border-color: #ff0000;
            background: #ff000033;
        }
        
        .playlist-item .time-badge {
            font-size: 11px;
            color: #ffd700;
            font-family: monospace;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        
        button {
            flex: 1;
            min-width: 100px;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            transition: all 0.3s;
        }
        
        .btn-success {
            background: #238636;
            color: white;
        }
        
        .btn-danger {
            background: #da3633;
            color: white;
        }
        
        .btn-live {
            background: #0088cc;
            color: white;
        }
        
        .btn-merge {
            background: #9c27b0;
            color: white;
        }
        
        .stats-panel {
            background: #1a1f2b;
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
            border: 2px solid #0088cc;
        }
        
        .stat-row {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
        }
        
        .footer {
            text-align: center;
            margin-top: 20px;
            color: #6e7681;
            font-size: 11px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-broadcast-tower"></i> بث حي + دمج الريلز</h1>
            <p>@nardoo_merchant | شاشة واحدة - بث متواصل</p>
            <div class="live-badge-large">
                <i class="fas fa-circle"></i> بث مباشر - 24/7
            </div>
        </div>

        <!-- شاشة البث الموحدة -->
        <div class="unified-stream">
            <video id="unifiedVideo" autoplay playsinline></video>
            
            <!-- التراكبات -->
            <div class="stream-overlay">
                <div class="live-indicator-large">
                    <i class="fas fa-circle"></i> LIVE
                </div>
                <div class="merchant-info-overlay">
                    <i class="fas fa-store"></i>
                    <span>@nardoo_merchant</span>
                    <span style="background: #4caf50; color: white; padding: 2px 8px; border-radius: 12px;">✅</span>
                </div>
            </div>
            
            <div class="video-counter" id="videoCounter">
                <i class="fas fa-list"></i> <span id="currentVideoNum">1</span>/<span id="totalVideosNum">0</span>
            </div>
            
            <div class="stream-stats">
                <div class="viewers-count" id="viewersCount">
                    <i class="fas fa-eye"></i> 1,247 مشاهد
                </div>
                <div class="viewers-count" id="streamTime">
                    <i class="fas fa-clock"></i> 00:00:00
                </div>
            </div>
            
            <div class="stream-progress-container">
                <div class="stream-progress-bar" id="streamProgress"></div>
            </div>
        </div>

        <!-- لوحة التحكم بالدمج -->
        <div class="playlist-panel">
            <div class="playlist-header">
                <h3><i class="fas fa-layer-group"></i> فيديوهات الريلز (بث حي متواصل)</h3>
                <div class="merge-toggle active" id="mergeToggle" onclick="toggleMerge()">
                    <i class="fas fa-link"></i> مدمج
                </div>
            </div>
            
            <div class="playlist-items" id="playlistItems">
                <!-- الفيديوهات تظهر هنا -->
            </div>
        </div>

        <!-- أزرار التحكم -->
        <div class="controls">
            <button class="btn-success" onclick="startCamera()" id="startBtn">
                <i class="fas fa-play"></i> تشغيل الكاميرا
            </button>
            <button class="btn-danger" onclick="stopCamera()" id="stopBtn" style="display: none;">
                <i class="fas fa-stop"></i> إيقاف
            </button>
            <button class="btn-merge" onclick="mergeAllVideos()">
                <i class="fas fa-compress"></i> دمج الكل
            </button>
        </div>

        <div class="controls">
            <button class="btn-live" onclick="startLiveStream()" id="startLiveBtn" disabled>
                <i class="fas fa-circle"></i> بدء البث
            </button>
            <button class="btn-danger" onclick="stopLiveStream()" id="stopLiveBtn" style="display: none;">
                <i class="fas fa-square"></i> إنهاء
            </button>
            <button class="btn-success" onclick="refreshPlaylist()">
                <i class="fas fa-sync-alt"></i> تحديث
            </button>
        </div>

        <!-- إحصائيات البث -->
        <div class="stats-panel">
            <div class="stat-row">
                <span>🎬 إجمالي الفيديوهات:</span>
                <span id="totalVideosStat">0</span>
            </div>
            <div class="stat-row">
                <span>⏱️ إجمالي المدة:</span>
                <span id="totalDuration">00:00:00</span>
            </div>
            <div class="stat-row">
                <span>🔄 وضع التشغيل:</span>
                <span id="playbackMode">بث حي متواصل (مدمج)</span>
            </div>
        </div>

        <!-- حالة النظام -->
        <div class="footer">
            <span id="statusText">✅ البث الحي نشط - دمج جميع الريلز</span>
        </div>
    </div>

    <script>
        // ========== إعدادات تيليجرام ==========
        const TELEGRAM = {
            botToken: '8576673096:AAEFKd-YSJcW_0d_wAHZBt-5nPg_VOjDX_0',
            channelId: '-1003822964890'
        };

        const MERCHANT_ID = '@nardoo_merchant';
        
        // ========== متغيرات النظام ==========
        let unifiedVideo = document.getElementById('unifiedVideo');
        let stream = null;
        let cameraActive = false;
        let isLiveStreaming = false;
        
        // ========== قائمة الفيديوهات ==========
        let videoQueue = [];
        let currentVideoIndex = 0;
        let isPlaying = false;
        let totalDuration = 0;
        let streamStartTime = Date.now();
        
        // ========== عناصر DOM ==========
        const playlistItems = document.getElementById('playlistItems');
        const currentVideoNum = document.getElementById('currentVideoNum');
        const totalVideosNum = document.getElementById('totalVideosNum');
        const totalVideosStat = document.getElementById('totalVideosStat');
        const totalDurationEl = document.getElementById('totalDuration');
        const streamProgress = document.getElementById('streamProgress');
        const streamTime = document.getElementById('streamTime');
        const viewersCount = document.getElementById('viewersCount');
        const statusText = document.getElementById('statusText');

        // ========== دمج جميع الفيديوهات في بث واحد ==========
        function mergeAllVideos() {
            if (videoQueue.length === 0) {
                alert('❌ لا توجد فيديوهات للدمج');
                return;
            }
            
            // حساب إجمالي المدة
            totalDuration = videoQueue.reduce((acc, video) => acc + (video.duration || 10), 0);
            totalDurationEl.textContent = formatTime(totalDuration);
            
            // بدء التشغيل المتسلسل
            currentVideoIndex = 0;
            playNextVideo();
            
            statusText.innerHTML = `✅ تم دمج ${videoQueue.length} فيديو - بث حي متواصل`;
        }

        // ========== تشغيل الفيديو التالي ==========
        function playNextVideo() {
            if (currentVideoIndex >= videoQueue.length) {
                // إعادة التشغيل من الأول (تكرار تلقائي)
                currentVideoIndex = 0;
            }
            
            const video = videoQueue[currentVideoIndex];
            if (!video) return;
            
            // تحديث العداد
            currentVideoNum.textContent = currentVideoIndex + 1;
            totalVideosNum.textContent = videoQueue.length;
            
            // تشغيل الفيديو
            if (video.blob) {
                // فيديو محلي
                const url = URL.createObjectURL(video.blob);
                unifiedVideo.src = url;
            } else if (video.url) {
                // فيديو من رابط
                unifiedVideo.src = video.url;
            }
            
            unifiedVideo.play()
                .then(() => {
                    isPlaying = true;
                    
                    // عند انتهاء الفيديو
                    unifiedVideo.onended = () => {
                        currentVideoIndex++;
                        playNextVideo();
                    };
                    
                    // تحديث شريط التقدم
                    unifiedVideo.ontimeupdate = () => {
                        if (unifiedVideo.duration) {
                            const progress = (unifiedVideo.currentTime / unifiedVideo.duration) * 100;
                            streamProgress.style.width = progress + '%';
                        }
                    };
                })
                .catch(e => console.log('تشغيل:', e));
            
            // تحديث قائمة التشغيل
            updatePlaylistUI();
        }

        // ========== إضافة فيديو إلى القائمة ==========
        function addVideoToQueue(videoData) {
            videoQueue.push(videoData);
            totalVideosStat.textContent = videoQueue.length;
            totalVideosNum.textContent = videoQueue.length;
            
            // إعادة حساب المدة الإجمالية
            totalDuration = videoQueue.reduce((acc, v) => acc + (v.duration || 10), 0);
            totalDurationEl.textContent = formatTime(totalDuration);
            
            updatePlaylistUI();
            
            // بدء التشغيل إذا كان هذا أول فيديو
            if (videoQueue.length === 1) {
                mergeAllVideos();
            }
        }

        // ========== تحديث واجهة قائمة التشغيل ==========
        function updatePlaylistUI() {
            let html = '';
            
            videoQueue.forEach((video, index) => {
                const isActive = index === currentVideoIndex;
                const timeStr = video.timeStr || '--:--:--';
                
                html += `
                    <div class="playlist-item ${isActive ? 'active' : ''}" onclick="jumpToVideo(${index})">
                        <div class="time-badge">${timeStr}</div>
                        <i class="fas fa-video"></i>
                        <span>مقطع ${index + 1}</span>
                    </div>
                `;
            });
            
            if (videoQueue.length === 0) {
                html = `
                    <div class="playlist-item" style="opacity:0.5; cursor:default">
                        <i class="fas fa-hourglass"></i>
                        <span>لا توجد فيديوهات</span>
                    </div>
                `;
            }
            
            playlistItems.innerHTML = html;
        }

        // ========== القفز إلى فيديو معين ==========
        function jumpToVideo(index) {
            if (index >= 0 && index < videoQueue.length) {
                currentVideoIndex = index;
                playNextVideo();
            }
        }

        // ========== تحديث وقت البث ==========
        setInterval(() => {
            const elapsed = Math.floor((Date.now() - streamStartTime) / 1000);
            streamTime.innerHTML = `<i class="fas fa-clock"></i> ${formatTime(elapsed)}`;
            
            // تغير عدد المشاهدين عشوائي (للواقعية)
            const viewers = 1000 + Math.floor(Math.random() * 500);
            viewersCount.innerHTML = `<i class="fas fa-eye"></i> ${viewers.toLocaleString()} مشاهد`;
        }, 1000);

        // ========== تنسيق الوقت ==========
        function formatTime(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;
            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        // ========== جلب فيديوهات من تيليجرام ==========
        async function fetchTelegramVideos() {
            try {
                const response = await fetch(
                    `https://api.telegram.org/bot${TELEGRAM.botToken}/getUpdates?timeout=30&limit=50`
                );
                const data = await response.json();
                
                if (data.ok) {
                    const videos = data.result
                        .filter(update => update.channel_post && update.channel_post.video)
                        .map(update => {
                            const caption = update.channel_post.caption || '';
                            const timeMatch = caption.match(/(\d{2}:\d{2}:\d{2})/);
                            
                            return {
                                fileId: update.channel_post.video.file_id,
                                caption: caption,
                                timeStr: timeMatch ? timeMatch[1] : '--:--:--',
                                duration: update.channel_post.video.duration || 10,
                                hasMerchant: caption.includes(MERCHANT_ID)
                            };
                        })
                        .filter(v => v.hasMerchant);
                    
                    // إضافة الفيديوهات للقائمة
                    for (const video of videos) {
                        await loadVideoFromTelegram(video);
                    }
                }
            } catch (error) {
                console.error('Fetch error:', error);
            }
        }

        // ========== تحميل فيديو من تيليجرام ==========
        async function loadVideoFromTelegram(videoInfo) {
            try {
                const response = await fetch(
                    `https://api.telegram.org/bot${TELEGRAM.botToken}/getFile?file_id=${videoInfo.fileId}`
                );
                const data = await response.json();
                
                if (data.ok) {
                    const filePath = data.result.file_path;
                    const videoUrl = `https://api.telegram.org/file/bot${TELEGRAM.botToken}/${filePath}`;
                    
                    // إضافة للقائمة
                    addVideoToQueue({
                        url: videoUrl,
                        timeStr: videoInfo.timeStr,
                        duration: videoInfo.duration,
                        fileId: videoInfo.fileId
                    });
                }
            } catch (error) {
                console.error('Load error:', error);
            }
        }

        // ========== إضافة فيديو مرسل حديثاً ==========
        function addSentVideo(videoBlob, description) {
            const now = new Date();
            const timeStr = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;
            
            addVideoToQueue({
                blob: videoBlob,
                timeStr: timeStr,
                duration: 10,
                description: description
            });
        }

        // ========== دوال الكاميرا ==========
        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user' },
                    audio: true
                });
                
                cameraActive = true;
                startBtn.style.display = 'none';
                stopBtn.style.display = 'inline-block';
                startLiveBtn.disabled = false;
                
                statusText.innerHTML = '✅ الكاميرا جاهزة';
                
                // جلب الفيديوهات تلقائياً
                setTimeout(fetchTelegramVideos, 2000);
                
            } catch (err) {
                statusText.innerHTML = '❌ خطأ: ' + err.message;
            }
        }

        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            cameraActive = false;
            startBtn.style.display = 'inline-block';
            stopBtn.style.display = 'none';
            startLiveBtn.disabled = true;
        }

        function startLiveStream() {
            isLiveStreaming = true;
            startLiveBtn.style.display = 'none';
            stopLiveBtn.style.display = 'inline-block';
            statusText.innerHTML = '🔴 البث المباشر نشط';
        }

        function stopLiveStream() {
            isLiveStreaming = false;
            startLiveBtn.style.display = 'inline-block';
            stopLiveBtn.style.display = 'none';
        }

        function refreshPlaylist() {
            fetchTelegramVideos();
        }

        function toggleMerge() {
            // الوضع مدمج دائماً
        }

        // ========== تهيئة الصفحة ==========
        window.onload = function() {
            // إضافة فيديوهات تجريبية
            setTimeout(() => {
                // محاكاة فيديوهات وهمية
                for (let i = 1; i <= 5; i++) {
                    addVideoToQueue({
                        url: 'https://sample-videos.com/video123/mp4/720/big_buck_bunny_720p_1mb.mp4',
                        timeStr: `${i}:00:00`,
                        duration: 10
                    });
                }
            }, 1000);
        };
    </script>
</body>
</html>
