<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>📺 البث المتسلسل الذكي - ناردو برو</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0d1117;
            color: white;
            font-family: 'Cairo', Arial;
            padding: 15px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 500px;
            background: #161b22;
            border-radius: 20px;
            padding: 20px;
            border: 2px solid #ffd700;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .header h1 {
            color: #ffd700;
            font-size: 24px;
        }
        .video-container {
            position: relative;
            margin: 15px 0;
            border-radius: 15px;
            overflow: hidden;
            border: 3px solid #238636;
            background: black;
            min-height: 300px;
        }
        video {
            width: 100%;
            display: block;
            background: #1a1a1a;
        }
        .overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.8);
            color: #ffd700;
            padding: 8px 15px;
            border-radius: 20px;
            border: 2px solid #ffd700;
            z-index: 15;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .badge {
            background: #ffd700;
            color: black;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
        }
        .status {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            color: #ffd700;
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 12px;
        }
        .countdown-layer {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(4px);
        }
        .countdown-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid #ffd700;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            font-weight: bold;
            color: #ffd700;
            animation: pulse 1s infinite;
        }
        @keyframes pulse { 50% { transform: scale(1.1); } }
        
        button {
            width: 100%;
            padding: 15px;
            margin: 8px 0;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-success { background: #238636; color: white; }
        .btn-danger { background: #da3633; color: white; }
        .btn-live { background: #ffd700; color: black; }
        
        .display-area {
            background: #1a1f2b;
            border: 3px solid #ffd700;
            border-radius: 15px;
            padding: 15px;
            margin: 15px 0;
        }
        .display-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            color: #ffd700;
            border-bottom: 1px solid #ffd700;
            padding-bottom: 5px;
        }
        .live-badge {
            color: red;
            animation: blink 1s infinite;
            font-weight: bold;
        }
        @keyframes blink { 50% { opacity: 0.3; } }
        
        .video-player {
            width: 100%;
            background: black;
            border-radius: 10px;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
        }
        
        .folder-panel {
            background: #2d333b;
            border-radius: 10px;
            padding: 10px;
            margin: 10px 0;
            max-height: 150px;
            overflow-y: auto;
        }
        .folder-item {
            display: flex;
            justify-content: space-between;
            padding: 5px;
            margin: 2px 0;
            background: #1a1f2b;
            border-radius: 5px;
            font-size: 12px;
        }
        .segment-num {
            background: #ffd700;
            color: black;
            padding: 2px 6px;
            border-radius: 10px;
            font-weight: bold;
        }
        .status-folder { color: #ffd700; }
        .status-published { color: #4caf50; }
        .status-waiting { color: #ff9800; }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
            text-align: center;
            margin: 10px 0;
        }
        .stat-box {
            background: #2d333b;
            padding: 8px;
            border-radius: 8px;
        }
        .stat-value { color: #ffd700; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📺 البث المتسلسل الذكي</h1>
            <p>@nardoo_merchant | معرف البث: <span id="broadcastIdSpan">-</span></p>
        </div>

        <!-- منطقة الكاميرا -->
        <div class="video-container">
            <video id="video" autoplay playsinline muted></video>
            <div class="overlay" id="merchantOverlay" style="display: none;">
                👤 @nardoo_merchant <span class="badge">تاجر</span>
                <span id="segmentCounter">00</span>
            </div>
            <div class="status" id="statusDisplay">⏹️ متوقف</div>
            
            <!-- طبقة العد التنازلي -->
            <div class="countdown-layer" id="countdownLayer" style="display: none;">
                <div class="countdown-circle" id="countdownNumber">5</div>
                <div style="color: #ffd700; margin-top: 15px;">تجهيز المجلد ومنطقة العرض...</div>
            </div>
        </div>

        <!-- منطقة العرض (النشر المتسلسل) -->
        <div class="display-area">
            <div class="display-header">
                <span>📺 منطقة العرض المباشر</span>
                <span class="live-badge" id="displayLiveBadge">🔴 مباشر</span>
            </div>
            <div class="video-player" id="displayPlayer">
                <span id="displayMessage">⏳ إنتظار وصول الفيديو الأول...</span>
            </div>
            <div style="display: flex; justify-content: space-between; margin-top: 10px;">
                <span>الآن: <span id="currentDisplayNum">0</span>/<span id="totalSegments">0</span></span>
                <span>تأخير: <span id="delayInfo">10</span> ثواني</span>
            </div>
        </div>

        <!-- المجلد - يستقبل الفيديوهات -->
        <div class="folder-panel" id="folderPanel">
            <div style="display: flex; justify-content: space-between; color: #ffd700;">
                <span>📁 مجلد الاستقبال</span>
                <span id="folderCount">0 فيديو</span>
            </div>
            <div id="folderContent"></div>
        </div>

        <!-- إحصائيات البث -->
        <div class="stats">
            <div class="stat-box">
                <div class="stat-value" id="statRecorded">0</div>
                <div>تم التسجيل</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="statFolder">0</div>
                <div>في المجلد</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="statDisplayed">0</div>
                <div>تم العرض</div>
            </div>
        </div>

        <!-- أزرار التحكم -->
        <button class="btn-success" onclick="startCamera()" id="startBtn">
            ▶️ تشغيل الكاميرا
        </button>
        
        <button class="btn-danger" onclick="stopCamera()" id="stopBtn" style="display: none;">
            ⏹️ إيقاف الكاميرا
        </button>

        <button class="btn-live" onclick="startLiveBroadcast()" id="liveBtn" disabled>
            🔴 بدء البث المباشر المتسلسل
        </button>

        <button class="btn-danger" onclick="stopBroadcast()" id="stopLiveBtn" style="display: none;">
            ⏹️ إنهاء البث
        </button>

        <button class="btn-success" onclick="testSystem()" id="testBtn">
            🔧 اختبار النظام
        </button>

        <p style="text-align: center; margin-top: 10px; color: #6e7681;" id="systemStatus">
            نظام المجلدات الذكي جاهز
        </p>
    </div>

    <script>
        // إعدادات تليجرام
        const BOT_TOKEN = '8576673096:AAEFKd-YSJcW_0d_wAHZBt-5nPg_VOjDX_0';
        const CHANNEL_ID = '-1003822964890';
        const MERCHANT = '@nardoo_merchant';
        const FOLDER_TOPIC_ID = '1'; // موضوع المجلد
        const DISPLAY_TOPIC_ID = '2'; // موضوع العرض

        // متغيرات النظام
        let stream = null;
        let cameraActive = false;
        let isLive = false;
        let mediaRecorder = null;
        let broadcastId = null;
        
        // المصفوفات
        let recordedVideos = []; // جميع الفيديوهات المسجلة
        let folderVideos = []; // الفيديوهات في المجلد
        let displayedVideos = []; // الفيديوهات التي تم عرضها
        
        let currentSegment = 0;
        let nextToDisplay = 1;
        let displayTimer = null;
        let recordingTimer = null;

        // عناصر DOM
        const video = document.getElementById('video');
        const statusDisplay = document.getElementById('statusDisplay');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const liveBtn = document.getElementById('liveBtn');
        const stopLiveBtn = document.getElementById('stopLiveBtn');
        const merchantOverlay = document.getElementById('merchantOverlay');
        const segmentCounter = document.getElementById('segmentCounter');
        const countdownLayer = document.getElementById('countdownLayer');
        const countdownNumber = document.getElementById('countdownNumber');
        const broadcastIdSpan = document.getElementById('broadcastIdSpan');
        const folderContent = document.getElementById('folderContent');
        const displayMessage = document.getElementById('displayMessage');
        const currentDisplayNum = document.getElementById('currentDisplayNum');
        const totalSegments = document.getElementById('totalSegments');
        const folderCount = document.getElementById('folderCount');
        const statRecorded = document.getElementById('statRecorded');
        const statFolder = document.getElementById('statFolder');
        const statDisplayed = document.getElementById('statDisplayed');
        const delayInfo = document.getElementById('delayInfo');

        // تشغيل الكاميرا
        async function startCamera() {
            try {
                statusDisplay.innerHTML = '🔄 جاري تشغيل الكاميرا...';
                
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: 640, height: 360 },
                    audio: true
                });
                
                video.srcObject = stream;
                cameraActive = true;
                
                statusDisplay.innerHTML = '✅ الكاميرا جاهزة';
                startBtn.style.display = 'none';
                stopBtn.style.display = 'block';
                liveBtn.disabled = false;
                
                setupMediaRecorder();
                
            } catch (err) {
                statusDisplay.innerHTML = '❌ خطأ: ' + err.message;
            }
        }

        // تجهيز مسجل الفيديو
        function setupMediaRecorder() {
            try {
                mediaRecorder = new MediaRecorder(stream, {
                    mimeType: 'video/webm;codecs=vp8,opus'
                });
            } catch (e) {
                mediaRecorder = new MediaRecorder(stream);
            }
            
            mediaRecorder.ondataavailable = handleNewVideo;
        }

        // بدء البث المباشر المتسلسل
        async function startLiveBroadcast() {
            if (!cameraActive) {
                alert('شغل الكاميرا أولاً');
                return;
            }

            // إنشاء معرف فريد للبث
            broadcastId = 'LIVE' + Date.now().toString(36).toUpperCase();
            broadcastIdSpan.textContent = broadcastId;
            
            // تجهيز المصفوفات
            recordedVideos = [];
            folderVideos = [];
            displayedVideos = [];
            currentSegment = 0;
            nextToDisplay = 1;
            
            // إظهار العد التنازلي
            countdownLayer.style.display = 'flex';
            
            // العد التنازلي 5 ثواني
            for (let i = 5; i > 0; i--) {
                await new Promise(r => setTimeout(r, 1000));
                countdownNumber.textContent = i;
            }
            
            // تجهيز المجلد ومنطقة العرض في تليجرام
            await setupTelegramFolders();
            
            // إخفاء العد التنازلي
            countdownLayer.style.display = 'none';
            
            // بدء البث
            isLive = true;
            merchantOverlay.style.display = 'flex';
            liveBtn.style.display = 'none';
            stopLiveBtn.style.display = 'block';
            
            statusDisplay.innerHTML = '🔴 بث مباشر متسلسل';
            
            // بدأ التسجيل المتسلسل (كل 10 ثواني)
            startSequentialRecording();
            
            // بدأ العرض المتسلسل (بتأخير 10 ثواني)
            startSequentialDisplay();
        }

        // تجهيز المجلدات في تليجرام
        async function setupTelegramFolders() {
            try {
                // إشعار فتح المجلد
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHANNEL_ID,
                        message_thread_id: FOLDER_TOPIC_ID,
                        text: `📁 **تم فتح مجلد البث**\n\n` +
                              `👤 **التاجر:** ${MERCHANT}\n` +
                              `🆔 **معرف البث:** \`${broadcastId}\`\n` +
                              `⏰ **وقت البدء:** ${new Date().toLocaleTimeString()}\n\n` +
                              `📹 سيتم استقبال فيديو كل 10 ثواني\n` +
                              `🔢 الأرقام التسلسلية: 1, 2, 3, ...\n\n` +
                              `#مجلد_${broadcastId}`,
                        parse_mode: 'Markdown'
                    })
                });

                // إشعار فتح منطقة العرض
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHANNEL_ID,
                        message_thread_id: DISPLAY_TOPIC_ID,
                        text: `📺 **منطقة العرض المباشر**\n\n` +
                              `👤 **التاجر:** ${MERCHANT}\n` +
                              `🆔 **معرف البث:** \`${broadcastId}\`\n\n` +
                              `⏳ بانتظار وصول الفيديو الأول...\n` +
                              `⚡ تأخير 10 ثواني عن التسجيل\n\n` +
                              `#عرض_${broadcastId}`,
                        parse_mode: 'Markdown'
                    })
                });
                
            } catch (error) {
                console.log('خطأ في تجهيز المجلدات:', error);
            }
        }

        // بدأ التسجيل المتسلسل
        function startSequentialRecording() {
            recordNextSegment();
        }

        // تسجيل المقطع التالي
        function recordNextSegment() {
            if (!isLive) return;
            
            currentSegment++;
            segmentCounter.textContent = currentSegment.toString().padStart(2, '0');
            
            // بدأ تسجيل مقطع جديد
            mediaRecorder.start();
            
            // إيقاف التسجيل بعد 10 ثواني
            setTimeout(() => {
                if (isLive && mediaRecorder.state === 'recording') {
                    mediaRecorder.stop();
                    
                    // جدولة المقطع التالي بعد ثانية
                    setTimeout(() => {
                        if (isLive) {
                            recordNextSegment();
                        }
                    }, 1000);
                }
            }, 10000); // 10 ثواني
        }

        // معالجة فيديو جديد
        function handleNewVideo(event) {
            if (event.data.size > 0 && isLive) {
                const videoData = {
                    number: currentSegment,
                    data: event.data,
                    timestamp: Date.now(),
                    size: (event.data.size / 1024).toFixed(2) + ' KB',
                    folderMessageId: null,
                    displayMessageId: null
                };
                
                // إضافة إلى المصفوفات
                recordedVideos.push(videoData);
                folderVideos.push(videoData);
                
                // تحديث الإحصائيات
                updateStats();
                
                // إرسال إلى مجلد تليجرام
                sendToFolder(videoData);
                
                // تحديث عرض المجلد في الصفحة
                updateFolderDisplay();
            }
        }

        // إرسال إلى مجلد تليجرام
        async function sendToFolder(videoData) {
            try {
                const formData = new FormData();
                const videoFile = new File([videoData.data], `segment_${videoData.number}.mp4`, { type: 'video/mp4' });
                
                formData.append('chat_id', CHANNEL_ID);
                formData.append('video', videoFile);
                formData.append('message_thread_id', FOLDER_TOPIC_ID);
                
                const caption = `📁 **مقطع جديد في المجلد**\n\n` +
                                `🆔 **معرف البث:** \`${broadcastId}\`\n` +
                                `🔢 **رقم المقطع:** ${videoData.number}\n` +
                                `⏱️ **وقت التسجيل:** بعد ${videoData.number * 10} ثانية\n` +
                                `📦 **الحجم:** ${videoData.size}\n\n` +
                                `#مجلد_${broadcastId} #مقطع_${videoData.number}`;

                formData.append('caption', caption);

                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`, {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();
                
                if (result.ok) {
                    videoData.folderMessageId = result.result.message_id;
                    videoData.folderLink = `https://t.me/c/${CHANNEL_ID.replace('-100', '')}/${result.result.message_id}`;
                }

            } catch (error) {
                console.log('خطأ في إرسال للمجلد:', error);
            }
        }

        // بدأ العرض المتسلسل (بتأخير 10 ثواني)
        function startSequentialDisplay() {
            displayTimer = setInterval(() => {
                checkAndDisplayNext();
            }, 2000); // فحص كل ثانيتين
        }

        // فحص وعرض المقطع التالي
        function checkAndDisplayNext() {
            if (!isLive) return;
            
            // البحث عن المقطع التالي في folderVideos
            const nextVideo = folderVideos.find(v => v.number === nextToDisplay);
            
            if (nextVideo && !displayedVideos.find(v => v.number === nextToDisplay)) {
                // عرض المقطع (تأخير 10 ثواني عن التسجيل)
                const delay = (Date.now() - nextVideo.timestamp) / 1000;
                
                if (delay >= 10) { // تأخير 10 ثواني
                    publishToDisplay(nextVideo);
                    nextToDisplay++;
                    updateDisplayArea();
                }
            }
        }

        // نشر المقطع في منطقة العرض
        async function publishToDisplay(videoData) {
            try {
                // تحديث واجهة العرض في الصفحة
                displayMessage.innerHTML = `🎥 تشغيل المقطع ${videoData.number}`;
                currentDisplayNum.textContent = videoData.number;
                
                // إضافة إلى displayedVideos
                displayedVideos.push(videoData);
                
                // إزالة من folderVideos
                folderVideos = folderVideos.filter(v => v.number !== videoData.number);
                
                // تحديث الإحصائيات
                updateStats();
                updateFolderDisplay();
                
                // إرسال إلى منطقة العرض في تليجرام
                const formData = new FormData();
                const videoFile = new File([videoData.data], `display_${videoData.number}.mp4`, { type: 'video/mp4' });
                
                formData.append('chat_id', CHANNEL_ID);
                formData.append('video', videoFile);
                formData.append('message_thread_id', DISPLAY_TOPIC_ID);
                
                const total = recordedVideos.length;
                const caption = `📺 **البث المباشر - المقطع ${videoData.number}**\n\n` +
                                `👤 **التاجر:** ${MERCHANT}\n` +
                                `🆔 **معرف البث:** \`${broadcastId}\`\n` +
                                `🔢 **الترتيب:** ${videoData.number}/${total || '?'}\n` +
                                `⏱️ **وقت العرض:** ${new Date().toLocaleTimeString()}\n\n` +
                                `⚡ تأخير 10 ثواني عن التسجيل\n\n` +
                                `#عرض_${broadcastId} #مقطع_${videoData.number}`;

                formData.append('caption', caption);

                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`, {
                    method: 'POST',
                    body: formData
                });

            } catch (error) {
                console.log('خطأ في العرض:', error);
            }
        }

        // تحديث عرض المجلد في الصفحة
        function updateFolderDisplay() {
            let html = '';
            
            // ترتيب تنازلي (الأحدث أولاً)
            [...folderVideos].reverse().forEach(v => {
                html += `<div class="folder-item">
                    <span><span class="segment-num">#${v.number}</span> ${v.size}</span>
                    <span class="status-folder">⏳ في المجلد</span>
                </div>`;
            });
            
            if (folderVideos.length === 0) {
                html = '<div style="text-align: center; color: #666;">المجلد فارغ</div>';
            }
            
            folderContent.innerHTML = html;
            folderCount.textContent = `${folderVideos.length} فيديو`;
        }

        // تحديث منطقة العرض
        function updateDisplayArea() {
            if (nextToDisplay > 1) {
                displayMessage.innerHTML = `🎥 جاري عرض المقطع ${nextToDisplay - 1}`;
            }
        }

        // تحديث الإحصائيات
        function updateStats() {
            statRecorded.textContent = recordedVideos.length;
            statFolder.textContent = folderVideos.length;
            statDisplayed.textContent = displayedVideos.length;
            totalSegments.textContent = recordedVideos.length;
        }

        // إنهاء البث
        async function stopBroadcast() {
            isLive = false;
            
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
            }
            
            clearInterval(displayTimer);
            clearTimeout(recordingTimer);
            
            merchantOverlay.style.display = 'none';
            liveBtn.style.display = 'block';
            stopLiveBtn.style.display = 'none';
            
            statusDisplay.innerHTML = '✅ تم إنهاء البث';
            
            // إرسال إشعار انتهاء البث
            await sendEndNotification();
        }

        // إرسال إشعار انتهاء البث
        async function sendEndNotification() {
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHANNEL_ID,
                        text: `✅ **انتهى البث المباشر**\n\n` +
                              `👤 **التاجر:** ${MERCHANT}\n` +
                              `🆔 **معرف البث:** \`${broadcastId}\`\n` +
                              `📊 **إحصائيات البث:**\n` +
                              `• إجمالي المقاطع: ${recordedVideos.length}\n` +
                              `• المدة الكلية: ${recordedVideos.length * 10} ثانية\n\n` +
                              `#انتهى_البث_${broadcastId}`,
                        parse_mode: 'Markdown'
                    })
                });
            } catch (error) {
                console.log('خطأ في إرسال إشعار الانتهاء');
            }
        }

        // إيقاف الكاميرا
        function stopCamera() {
            if (stream) {
                if (isLive) stopBroadcast();
                
                stream.getTracks().forEach(track => track.stop());
                video.srcObject = null;
                stream = null;
                cameraActive = false;
                
                statusDisplay.innerHTML = '⏹️ الكاميرا متوقفة';
                startBtn.style.display = 'block';
                stopBtn.style.display = 'none';
                liveBtn.disabled = true;
                merchantOverlay.style.display = 'none';
            }
        }

        // اختبار النظام
        async function testSystem() {
            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getMe`);
                const data = await response.json();
                
                if (data.ok) {
                    document.getElementById('systemStatus').innerHTML = '✅ النظام جاهز ✓';
                }
            } catch (error) {
                document.getElementById('systemStatus').innerHTML = '❌ خطأ في الاتصال';
            }
        }
    </script>
</body>
</html>
