<!-- ===== الشريط العلوي ===== -->
<div class="top-bar">
    <div class="container">
        <div class="top-bar-left">
            <div class="top-bar-item">
                <i class="fas fa-truck-fast"></i>
                <span>شحن مجاني للطلبات فوق 5000 دج</span>
            </div>
            <div class="top-bar-item">
                <i class="fas fa-headset"></i>
                <span>دعم VIP 24/7</span>
            </div>
            <div class="top-bar-item">
                <i class="fas fa-gem"></i>
                <span>منتجات أصلية 100%</span>
            </div>
        </div>
        <div class="top-bar-right">
            <div class="theme-toggle" onclick="App.toggleTheme()" id="themeToggle">
                <i class="fas fa-moon"></i>
                <span>ليلي</span>
            </div>
        </div>
    </div>
</div>

<!-- ===== شريط العروض المتحرك ===== -->
<div class="marquee-bar">
    <div class="marquee-content">
        <div class="marquee-item">
            <i class="fas fa-fire"></i>
            <span>تخفيضات تصل 50%</span>
        </div>
        <div class="marquee-item">
            <i class="fas fa-gem"></i>
            <span>عروض حصرية</span>
        </div>
        <div class="marquee-item">
            <i class="fas fa-clock"></i>
            <span>الوقت: <span id="marqueeHours">12</span>:<span id="marqueeMinutes">30</span>:<span id="marqueeSeconds">45</span></span>
        </div>
    </div>
</div>

<!-- ===== الهيدر الرئيسي ===== -->
<header class="main-header">
    <div class="container header-content">
        <div class="logo">
            <div class="logo-icon"><i class="fas fa-crown"></i></div>
            <div class="logo-text">
                <h1>نكهة وجمال</h1>
                <span>ناردو برو 2026</span>
            </div>
        </div>
        
        <div class="search-wrapper">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="ابحث عن منتج..." onkeyup="App.searchProducts()">
                <button onclick="App.searchProducts()"><i class="fas fa-search"></i></button>
            </div>
        </div>
        
        <div class="header-actions">
            <button class="action-btn" onclick="App.openLoginModal()" id="userBtn">
                <i class="far fa-user"></i>
            </button>
            <button class="action-btn" onclick="App.toggleCart()">
                <i class="fas fa-shopping-cart"></i>
                <span class="cart-count" id="cartCounter">0</span>
            </button>
            <button class="action-btn" onclick="App.openDashboard()" id="dashboardBtn" style="display: none;">
                <i class="fas fa-chart-line"></i>
            </button>
        </div>
    </div>
</header>

<!-- ===== القائمة الرئيسية ===== -->
<div class="container">
    <nav class="nav-menu" id="mainNav">
        <a class="nav-link active" onclick="App.filterProducts('all')"><i class="fas fa-home"></i> الرئيسية</a>
        <a class="nav-link" onclick="App.filterProducts('promo')"><i class="fas fa-fire"></i> برموسيو</a>
        <a class="nav-link" onclick="App.filterProducts('spices')"><i class="fas fa-mortar-pestle"></i> توابل</a>
        <a class="nav-link" onclick="App.filterProducts('cosmetic')"><i class="fas fa-spa"></i> كوسمتيك</a>
        <a class="nav-link" onclick="App.filterProducts('other')"><i class="fas fa-gem"></i> منتوجات أخرى</a>
        <a class="nav-link" onclick="App.openAdminApps()" id="adminAppsNav" style="display: none;"><i class="fas fa-crown"></i> التطبيقات</a>
    </nav>
</div>
