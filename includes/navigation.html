<div class="container" id="merchantPanelContainer" style="display: none;"></div>

<!-- ===== قسم ريلز الفيديو في الأعلى مع أيقونة ===== -->


<!-- ===== سلة التسوق الجانبية ===== -->
<div class="cart-sidebar" id="cartSidebar">
    <div class="cart-header">
        <h3><i class="fas fa-shopping-cart"></i> سلة التسوق</h3>
        <i class="fas fa-times close-cart" onclick="App.toggleCart()"></i>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-footer">
        <div class="cart-total">
            <span>المجموع:</span>
            <span id="cartTotal">0 دج</span>
        </div>
        <button class="checkout-btn" onclick="App.checkout()">
            <i class="fab fa-whatsapp"></i> إتمام الطلب
        </button>
    </div>
</div>
