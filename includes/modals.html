<!-- ===== [01] نافذة تسجيل الدخول ===== -->
<div class="modal" id="loginModal">
    <div class="modal-content">
        <div class="modal-header">
            <h2><i class="fas fa-sign-in-alt"></i> تسجيل الدخول</h2>
            <button class="close-btn" onclick="App.closeModal('loginModal')">&times;</button>
        </div>
        
        <div class="auth-tabs">
            <button class="btn-gold" onclick="App.switchAuthTab('login')">دخول</button>
            <button class="btn-outline-gold" onclick="App.switchAuthTab('register')">تسجيل</button>
        </div>

        <!-- نموذج دخول -->
        <form id="loginForm" onsubmit="event.preventDefault(); App.handleLogin();">
            <div class="form-group">
                <label>👤 اسم المستخدم</label>
                <input type="text" class="form-control" id="loginEmail" required placeholder="أدخل اسم المستخدم">
            </div>
            <div class="form-group">
                <label>🔑 كلمة المرور</label>
                <input type="password" class="form-control" id="loginPassword" required placeholder="********">
            </div>
            <button type="submit" class="btn-gold" style="width:100%;">دخول</button>
        </form>

        <!-- نموذج تسجيل -->
        <form id="registerForm" style="display:none;" onsubmit="event.preventDefault(); App.handleRegister();">
            <div class="form-group">
                <label>👤 الاسم الكامل</label>
                <input type="text" class="form-control" id="regName" required placeholder="محمد الجزائري">
            </div>
            <div class="form-group">
                <label>📧 البريد الإلكتروني</label>
                <input type="email" class="form-control" id="regEmail" required placeholder="example@email.com">
            </div>
            <div class="form-group">
                <label>🔑 كلمة المرور</label>
                <input type="password" class="form-control" id="regPassword" required placeholder="******">
            </div>
            <div class="form-group">
                <label>📱 رقم الهاتف</label>
                <input type="tel" class="form-control" id="regPhone" required placeholder="05XXXXXXXX">
            </div>
            <div class="form-group">
                <label>
                    <input type="checkbox" id="requestRole" onchange="App.toggleRoleFields()">
                    <span>طلب دور (تاجر، موزع، توصيل، ...)</span>
                </label>
            </div>
            
            <!-- حقول طلب الدور -->
            <div id="roleFields" style="display:none;">
                <div class="form-group">
                    <label>🎯 اختر الدور المطلوب</label>
                    <select class="form-control" id="requestedRole">
                        <option value="merchant">تاجر - بيع منتجات</option>
                        <option value="distributor">موزع - توزيع بالجملة</option>
                        <option value="delivery_company">شركة توصيل</option>
                        <option value="delivery_person">مندوب توصيل</option>
                        <option value="content_creator">صانع محتوى</option>
                        <option value="entertainer">ترفيه - بث مباشر</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>🏷️ اسم النشاط أو المتجر</label>
                    <input type="text" class="form-control" id="storeName" placeholder="مثال: متجر ناردو">
                </div>
                
                <div class="form-group">
                    <label>📋 التخصص/الخبرة</label>
                    <input type="text" class="form-control" id="specialization" placeholder="مثال: توابل، عطور، توصيل سريع">
                </div>
                
                <div class="form-group">
                    <label>📍 منطقة العمل</label>
                    <input type="text" class="form-control" id="workArea" placeholder="مثال: الجزائر، وهران">
                </div>
                
                <div class="form-group">
                    <label>🚗 نوع المركبة (للتوصيل)</label>
                    <input type="text" class="form-control" id="vehicleType" placeholder="دراجة، سيارة، شاحنة">
                </div>
                
                <div class="form-group">
                    <label>📊 سنوات الخبرة</label>
                    <input type="number" class="form-control" id="experience" placeholder="5">
                </div>
            </div>
            
            <button type="submit" class="btn-gold" style="width:100%;">تسجيل</button>
        </form>
    </div>
</div>

<!-- ===== [02] نافذة إضافة منتج (الأصلية) ===== -->
<div class="modal" id="productModal">
    <div class="modal-content modal-lg">
        <div class="modal-header">
            <h2><i class="fas fa-plus-circle"></i> إضافة منتج جديد</h2>
            <button class="close-btn" onclick="App.closeModal('productModal')">&times;</button>
        </div>
        <form id="productForm" onsubmit="event.preventDefault(); App.saveProduct();">
            <div class="form-group">
                <label>📦 اسم المنتج</label>
                <input type="text" class="form-control" id="productName" required placeholder="زعتر فلسطيني">
            </div>
            <div class="form-group">
                <label>🏷️ القسم</label>
                <select class="form-control" id="productCategory" required>
                    <option value="promo">برموسيو</option>
                    <option value="spices">توابل</option>
                    <option value="cosmetic">كوسمتيك</option>
                    <option value="other">منتوجات أخرى</option>
                </select>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-group">
                    <label>💰 السعر (دج)</label>
                    <input type="number" class="form-control" id="productPrice" required min="0" placeholder="500">
                </div>
                <div class="form-group">
                    <label>📊 الكمية</label>
                    <input type="number" class="form-control" id="productStock" required min="0" placeholder="50">
                </div>
            </div>
            <div class="form-group">
                <label>⚠️ الحد الأدنى للمخزون</label>
                <input type="number" class="form-control" id="productMinStock" value="5" min="0" placeholder="5">
            </div>
            <div class="form-group">
                <label>📈 الحد الأقصى للمخزون</label>
                <input type="number" class="form-control" id="productMaxStock" value="100" min="0" placeholder="100">
            </div>
            <div class="form-group">
                <label>📝 وصف المنتج</label>
                <textarea class="form-control" id="productDescription" rows="3" placeholder="وصف المنتج..."></textarea>
            </div>
            <div class="image-upload-area" onclick="document.getElementById('productImages').click()">
                <i class="fas fa-cloud-upload-alt"></i>
                <p>اضغط لرفع صور متعددة</p>
                <small>يمكنك اختيار عدة صور</small>
            </div>
            <input type="file" id="productImages" accept="image/*" style="display:none;" multiple onchange="App.handleImageUpload(event)">
            <div class="image-preview" id="imagePreview"></div>
            <div style="display: flex; gap: 15px; margin-top: 20px;">
                <button type="submit" class="btn-gold" style="flex: 2;">حفظ المنتج</button>
                <button type="button" class="btn-outline-gold" style="flex: 1;" onclick="App.closeModal('productModal')">إلغاء</button>
            </div>
        </form>
    </div>
</div>

<!-- ===== [03] نافذة إضافة منتج (جديدة - للأيقونة) ===== -->
<div class="modal" id="addProductModal">
    <div class="modal-content">
        <div class="modal-header">
            <h2><i class="fas fa-plus-circle"></i> إضافة منتج جديد</h2>
            <button class="close-btn" onclick="App.closeAddProductForm()">&times;</button>
        </div>
        <form id="addProductForm" onsubmit="event.preventDefault(); App.saveNewProduct();">
            <div class="form-group">
                <label>📦 اسم المنتج</label>
                <input type="text" class="form-control" id="newProductName" required placeholder="زعتر فلسطيني">
            </div>
            <div class="form-group">
                <label>🏷️ القسم</label>
                <select class="form-control" id="newProductCategory" required>
                    <option value="promo">برموسيو</option>
                    <option value="spices">توابل</option>
                    <option value="cosmetic">كوسمتيك</option>
                    <option value="other">منتوجات أخرى</option>
                </select>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-group">
                    <label>💰 السعر (دج)</label>
                    <input type="number" class="form-control" id="newProductPrice" required placeholder="500">
                </div>
                <div class="form-group">
                    <label>📊 الكمية</label>
                    <input type="number" class="form-control" id="newProductStock" required placeholder="50">
                </div>
            </div>
            <div class="form-group">
                <label>📝 وصف المنتج</label>
                <textarea class="form-control" id="newProductDescription" rows="3" placeholder="وصف المنتج..."></textarea>
            </div>
            <div class="image-upload-area" onclick="document.getElementById('newProductImages').click()">
                <i class="fas fa-cloud-upload-alt"></i>
                <p>اضغط لرفع صور</p>
            </div>
            <input type="file" id="newProductImages" accept="image/*" style="display:none;" multiple onchange="App.handleNewImageUpload(event)">
            <div class="image-preview" id="newImagePreview"></div>
            <button type="submit" class="btn-gold">حفظ المنتج</button>
        </form>
    </div>
</div>

<!-- ===== [04] نافذة تفاصيل المنتج ===== -->
<div class="modal" id="productDetailModal">
    <div class="modal-content modal-lg" id="productDetailContent"></div>
</div>

<!-- ===== [05] نافذة إدارة التطبيقات ===== -->
<div class="modal" id="adminAppsModal">
    <div class="modal-content" style="max-width: 1200px;">
        <div class="modal-header">
            <h2><i class="fas fa-crown"></i> منصة التطبيقات المتكاملة</h2>
            <button class="close-btn" onclick="App.closeModal('adminAppsModal')">&times;</button>
        </div>
        <div class="modal-body" id="adminAppsContent"></div>
    </div>
</div>

<!-- ===== [06] نافذة تشغيل التطبيق ===== -->
<div class="modal" id="appRunnerModal">
    <div class="modal-content" style="max-width: 1000px; width: 95%; height: 90vh;">
        <div class="modal-header">
            <div style="display: flex; align-items: center; gap: 15px;">
                <div class="app-runner-icon" id="appRunnerIcon"></div>
                <h2 id="appRunnerName"></h2>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="action-btn" onclick="App.refreshApp()" title="تحديث">
                    <i class="fas fa-sync-alt"></i>
                </button>
                <button class="close-btn" onclick="App.closeModal('appRunnerModal')">&times;</button>
            </div>
        </div>
        <iframe class="admin-app-frame" id="appRunnerFrame" style="width: 100%; height: calc(100% - 80px); border: none;"></iframe>
    </div>
</div>

<!-- ===== [07] نافذة تأكيد ===== -->
<div class="modal" id="confirmModal">
    <div class="modal-content" style="max-width: 400px;">
        <div class="modal-header">
            <h2><i class="fas fa-question-circle"></i> تأكيد</h2>
            <button class="close-btn" onclick="App.closeModal('confirmModal')">&times;</button>
        </div>
        <div class="modal-body" style="text-align: center; padding: 20px;">
            <p id="confirmMessage">هل أنت متأكد؟</p>
            <div style="display: flex; gap: 15px; margin-top: 20px;">
                <button class="btn-gold" style="flex:1;" id="confirmYes">نعم</button>
                <button class="btn-outline-gold" style="flex:1;" onclick="App.closeModal('confirmModal')">لا</button>
            </div>
        </div>
    </div>
</div>
