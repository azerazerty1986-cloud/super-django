
<!-- ===== [01] لوحة التحكم الرئيسية ===== -->
<div class="container dashboard-section" id="dashboardSection" style="display: none;">
    <div class="dashboard-tabs">
        <button class="dashboard-tab active" onclick="App.switchDashboardTab('overview')">نظرة عامة</button>
        <button class="dashboard-tab" onclick="App.switchDashboardTab('orders')">الطلبات</button>
        <button class="dashboard-tab" onclick="App.switchDashboardTab('products')">المنتجات</button>
        <button class="dashboard-tab" onclick="App.switchDashboardTab('merchants')">التجار</button>
        <button class="dashboard-tab" onclick="App.switchDashboardTab('users')">المستخدمين</button>
        <button class="dashboard-tab" onclick="App.switchDashboardTab('requests')">طلبات الأدوار</button>
        <button class="dashboard-tab" onclick="App.switchDashboardTab('apps')">التطبيقات</button>
        <button class="dashboard-tab" onclick="App.switchDashboardTab('delivery')">التوصيل</button>
    </div>
    <div class="dashboard-content" id="dashboardContent"></div>
</div>

<!-- ===== [02] الناشرون ===== -->
<div class="container">
    <div class="publishers-section" id="publishersSection">
        <h3><i class="fas fa-users"></i> الناشرون النشطون</h3>
        <div class="publishers-grid" id="publishersGrid"></div>
    </div>
</div>

<!-- ===== [03] Banner إعلاني ===== -->
<div class="container">
    <div class="promo-banner">
        <div class="banner-content">
            <h3>تخفيضات رمضان</h3>
            <p>خصم يصل إلى 50% على جميع المنتجات</p>
            <button class="btn-gold" onclick="App.filterProducts('promo')">تسوق الآن</button>
        </div>
        <div class="banner-image">
            <i class="fas fa-moon"></i>
        </div>
    </div>
</div>

<!-- ===== [04] إحصائيات سريعة ===== -->
<div class="container">
    <div class="stats-section">
        <div class="stats-grid">
            <div class="stat-box">
                <i class="fas fa-box"></i>
                <span class="stat-number" id="statProducts">0</span>
                <span class="stat-label">منتج</span>
            </div>
            <div class="stat-box">
                <i class="fas fa-store"></i>
                <span class="stat-number" id="statMerchants">0</span>
                <span class="stat-label">تاجر</span>
            </div>
            <div class="stat-box">
                <i class="fas fa-truck"></i>
                <span class="stat-number" id="statOrders">0</span>
                <span class="stat-label">طلب</span>
            </div>
            <div class="stat-box">
                <i class="fas fa-users"></i>
                <span class="stat-number" id="statUsers">0</span>
                <span class="stat-label">مستخدم</span>
            </div>
        </div>
    </div>
</div>
