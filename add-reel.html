<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>إضافة ريلز | ناردو برو</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- الأساسيات --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0a0f1a, #0f1420);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        /* --- الكارد الرئيسي --- */
        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            padding: 30px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        h1 {
            color: gold;
            text-align: center;
            margin-bottom: 30px;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        /* --- منطقة الرفع --- */
        .upload-area {
            border: 2px dashed rgba(255, 215, 0, 0.4);
            border-radius: 20px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 20px;
            transition: 0.3s;
            background: rgba(255, 215, 0, 0.03);
        }

        .upload-area:hover {
            border-color: gold;
            background: rgba(255, 215, 0, 0.08);
            transform: translateY(-3px);
        }

        .upload-area i {
            font-size: 45px;
            color: gold;
            margin-bottom: 15px;
        }

        /* --- معاينة الفيديو --- */
        .video-preview {
            display: none;
            margin-bottom: 20px;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            border: 2px solid gold;
        }

        .video-preview video {
            width: 100%;
            display: block;
            max-height: 250px;
            background: #000;
        }

        .remove-video {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 0, 0, 0.8);
            border: none;
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
            z-index: 10;
        }

        /* --- المدخلات --- */
        .input-group {
            margin-bottom: 18px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: gold;
            font-size: 14px;
            font-weight: 600;
        }

        input, textarea {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 12px;
            color: white;
            font-family: 'Cairo', sans-serif;
            outline: none;
            transition: 0.3s;
        }

        input:focus, textarea:focus {
            border-color: gold;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.1);
        }

        /* --- الأزرار والمعلومات --- */
        .serial-info {
            background: rgba(255, 215, 0, 0.1);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 13px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            line-height: 1.6;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, gold, #ffb347);
            color: #000;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(212, 175, 55, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #aaa;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link:hover { color: gold; }

        /* --- التنبيهات --- */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: gold;
            color: #000;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 9999;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translate(-50%, 20px); } to { opacity: 1; transform: translate(-50%, 0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1><i class="fab fa-telegram-plane"></i> إضافة ريلز جديد</h1>

        <div class="upload-area" id="dropZone" onclick="document.getElementById('videoFile').click()">
            <i class="fas fa-cloud-upload-alt"></i>
            <p id="fileStatus">اضغط أو اسحب الفيديو هنا</p>
            <small>MP4/MOV - بحد أقصى 50MB</small>
        </div>
        <input type="file" id="videoFile" accept="video/*" style="display: none;" onchange="handleFileSelect(this)">

        <div id="videoPreview" class="video-preview">
            <video id="previewPlayer" controls></video>
            <button class="remove-video" onclick="clearSelection()">✕</button>
        </div>

        <div class="input-group">
            <label>العنوان الأساسي</label>
            <input type="text" id="vTitle" placeholder="مثال: مهارات لاعبين ناردو">
        </div>

        <div class="input-group">
            <label>اسم الناشر</label>
            <input type="text" id="vPublisher" placeholder="ادخل اسمك هنا">
        </div>

        <div class="input-group">
            <label>الهاشتاجات</label>
            <textarea id="vTags" rows="2" placeholder="#ناردو_برو #تيك_توك #ريلز"></textarea>
        </div>

        <div class="serial-info" id="serialPreview">
            <i class="fas fa-fingerprint"></i> سيتم إنشاء <b>معرف سري (Serial)</b> تلقائياً عند الضغط على رفع.
        </div>

        <button class="btn" id="submitBtn" onclick="startUpload()">
            <i class="fas fa-upload"></i> نشر للجميع الآن
        </button>

        <a href="index.html" class="back-link">← العودة للرئيسية</a>
    </div>
</div>

<script>
    // --- إعدادات البوت ---
    const CONFIG = {
        token: '8576673096:AAHj80CdifTJNlOs6JgouHmjEXl0bM-8Shw',
        chatId: '-1003822964890'
    };

    let selectedVideo = null;

    // جلب اسم المستخدم المخزن مسبقاً
    window.onload = () => {
        const user = JSON.parse(localStorage.getItem('current_user'));
        if (user && user.name) {
            document.getElementById('vPublisher').value = user.name;
        }
    };

    // معالجة اختيار الملف
    function handleFileSelect(input) {
        if (input.files && input.files[0]) {
            const file = input.files[0];
            
            if (file.size > 50 * 1024 * 1024) {
                showToast("❌ الفيديو كبير جداً! (الأقصى 50MB)");
                input.value = "";
                return;
            }

            selectedVideo = file;
            document.getElementById('fileStatus').innerText = "تم اختيار: " + file.name;
            document.getElementById('previewPlayer').src = URL.createObjectURL(file);
            document.getElementById('videoPreview').style.display = 'block';
            document.getElementById('dropZone').style.display = 'none';
        }
    }

    function clearSelection() {
        selectedVideo = null;
        document.getElementById('videoFile').value = "";
        document.getElementById('videoPreview').style.display = 'none';
        document.getElementById('dropZone').style.display = 'block';
        document.getElementById('fileStatus').innerText = "اضغط أو اسحب الفيديو هنا";
    }

    // توليد معرف سري فريد
    function createSerial() {
        const date = new Date();
        const timestamp = date.getFullYear() + String(date.getMonth() + 1).padStart(2, '0') + String(date.getDate()).padStart(2, '0');
        const random = Math.floor(1000 + Math.random() * 9000);
        return `NARD-${timestamp}-${random}`;
    }

    // بدء عملية الرفع
    async function startUpload() {
        const title = document.getElementById('vTitle').value.trim();
        const publisher = document.getElementById('vPublisher').value.trim();
        const tags = document.getElementById('vTags').value.trim();

        if (!selectedVideo || !title || !publisher) {
            showToast("⚠️ يرجى ملء البيانات واختيار فيديو");
            return;
        }

        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الرفع...';

        const serial = createSerial();
        const caption = `🎬 ${title}\n👤 ${publisher}\n🔑 NARD-SERIAL: ${serial}\n\n${tags}`;

        const formData = new FormData();
        formData.append('chat_id', CONFIG.chatId);
        formData.append('video', selectedVideo);
        formData.append('caption', caption);
        formData.append('supports_streaming', true);

        try {
            const response = await fetch(`https://api.telegram.org/bot${CONFIG.token}/sendVideo`, {
                method: 'POST',
                body: formData
            });

            const data = await response.json();

            if (data.ok) {
                showToast("✅ تم النشر بنجاح!");
                setTimeout(() => window.location.href = 'index.html', 2500);
            } else {
                throw new Error(data.description);
            }
        } catch (error) {
            alert("فشل الرفع: " + error.message);
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-upload"></i> إعادة المحاولة';
        }
    }

    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
</script>

</body>
</html>
