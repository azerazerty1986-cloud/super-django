<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>إضافة ريلز | ناردو برو - تخزين تليجرام</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0a0f1a 0%, #0f1420 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container { max-width: 900px; margin: 0 auto; }
        
        .reel-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 35px;
            overflow: hidden;
            border: 1px solid rgba(255, 215, 0, 0.3);
            margin-bottom: 30px;
        }
        
        .reel-header {
            background: linear-gradient(135deg, #ffd700, #ffb347);
            padding: 35px 30px;
            text-align: center;
            position: relative;
        }
        
        .reel-header h1 {
            color: #1a1a2e;
            font-size: 2rem;
            margin-bottom: 10px;
        }
        
        .back-btn {
            position: absolute;
            top: 20px;
            right: 25px;
            background: rgba(0, 0, 0, 0.2);
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            color: #1a1a2e;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-weight: 600;
        }
        
        .reel-content { padding: 35px; }
        
        /* حاوية الريلز المرفوعة */
        .my-reels-section {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 35px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            overflow: hidden;
        }
        
        .my-reels-header {
            background: linear-gradient(135deg, #1a472a, #0a2a1a);
            padding: 20px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            border-bottom: 2px solid #ffd700;
        }
        
        .my-reels-header h2 {
            color: #ffd700;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .badge-admin {
            background: #ffd700;
            color: #1a1a2e;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .refresh-my-reels {
            background: rgba(255,215,0,0.2);
            border: none;
            padding: 8px 15px;
            border-radius: 25px;
            color: gold;
            cursor: pointer;
        }
        
        .my-reels-container {
            padding: 20px;
            max-height: 450px;
            overflow-y: auto;
        }
        
        .mini-reel-card {
            display: flex;
            gap: 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 12px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(255,215,0,0.2);
            position: relative;
        }
        
        .mini-reel-card:hover {
            background: rgba(255,215,0,0.2);
            transform: translateX(-5px);
        }
        
        .mini-reel-thumb {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #2a1a3a, #1a0a2a);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            position: relative;
        }
        
        .mini-reel-thumb i {
            font-size: 2.5rem;
            color: gold;
        }
        
        .play-overlay-icon {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: rgba(0,0,0,0.6);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: gold;
        }
        
        .mini-reel-info {
            flex: 1;
        }
        
        .mini-reel-title {
            color: white;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 5px;
        }
        
        .mini-reel-serial {
            font-family: monospace;
            font-size: 10px;
            color: #ffd700;
            margin-bottom: 5px;
        }
        
        .mini-reel-date {
            font-size: 10px;
            color: #aaa;
        }
        
        .this-reel-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #10b981;
            color: white;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .empty-reels {
            text-align: center;
            padding: 40px;
            color: #aaa;
        }
        
        .empty-reels i {
            font-size: 3rem;
            color: #ffd700;
            margin-bottom: 15px;
        }
        
        /* مشغل الفيديو المنبثق (نفس التصميم السابق) */
        .video-player-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 20000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .video-player-card {
            width: 90%;
            max-width: 550px;
            background: #1a1a2e;
            border-radius: 25px;
            overflow: hidden;
            border: 2px solid #ffd700;
        }
        
        .video-player-header {
            background: linear-gradient(135deg, #ffd700, #ffb347);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .video-player-header h3 {
            color: #1a1a2e;
            margin: 0;
        }
        
        .close-video-btn {
            background: rgba(0,0,0,0.3);
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .close-video-btn:hover {
            background: #ff4444;
            transform: scale(1.1);
        }
        
        .video-container {
            background: #000;
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .video-container video {
            width: 100%;
            max-height: 500px;
        }
        
        .video-loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            color: gold;
        }
        
        .video-loading i {
            font-size: 3rem;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .video-info {
            padding: 15px 20px;
            background: rgba(0,0,0,0.8);
        }
        
        .video-title {
            color: #ffd700;
            font-weight: bold;
            margin-bottom: 8px;
        }
        
        .video-serial {
            font-family: monospace;
            font-size: 11px;
            color: #aaa;
        }
        
        /* نموذج الإضافة */
        .form-group { margin-bottom: 30px; }
        .form-group label {
            display: block;
            margin-bottom: 12px;
            font-weight: 700;
            color: #ffd700;
        }
        
        .form-control {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid rgba(255, 215, 0, 0.3);
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }
        
        .video-upload-area {
            border: 3px dashed #ffd700;
            border-radius: 20px;
            padding: 50px 30px;
            text-align: center;
            cursor: pointer;
            background: rgba(255, 215, 0, 0.05);
        }
        
        .video-upload-area i {
            font-size: 4rem;
            color: #ffd700;
            margin-bottom: 15px;
        }
        
        .video-preview-container {
            margin-top: 20px;
            position: relative;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
        }
        
        .video-preview-container video {
            width: 100%;
            max-height: 350px;
        }
        
        .remove-video-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255, 0, 0, 0.9);
            color: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
        }
        
        .file-info {
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 12px;
            margin-top: 10px;
            color: #ffd700;
        }
        
        .serial-info {
            background: rgba(255,215,0,0.15);
            padding: 15px;
            border-radius: 15px;
            margin: 20px 0;
            text-align: center;
        }
        
        .serial-number {
            font-family: monospace;
            font-size: 16px;
            font-weight: bold;
            color: gold;
            background: rgba(0,0,0,0.5);
            padding: 5px 12px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 8px;
        }
        
        .save-btn {
            width: 100%;
            background: linear-gradient(135deg, #ffd700, #ffb347);
            border: none;
            padding: 18px;
            border-radius: 15px;
            color: #1a1a2e;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        
        .save-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.4);
        }
        
        .toast-message {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 14px 25px;
            border-radius: 50px;
            z-index: 2000;
            animation: slideInRight 0.3s ease;
        }
        
        .toast-success { background: #10b981; color: white; }
        .toast-error { background: #ef4444; color: white; }
        .toast-info { background: #3b82f6; color: white; }
        
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .confirm-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }
        
        .confirm-content {
            background: #1a1a2e;
            border-radius: 25px;
            padding: 30px;
            max-width: 400px;
            text-align: center;
            border: 1px solid #ffd700;
        }
        
        .success-checkmark {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #10b981;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        
        .success-checkmark i { font-size: 3rem; color: white; }
        
        .confirm-buttons { display: flex; gap: 15px; margin-top: 25px; }
        .confirm-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
        }
        .confirm-yes { background: #ffd700; color: #1a1a2e; }
        .confirm-no { background: #333; color: white; }
        
        @media (max-width: 768px) {
            .reel-content { padding: 25px; }
            .mini-reel-card { flex-direction: column; }
            .mini-reel-thumb { width: 100%; height: 120px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- بطاقة الإضافة -->
        <div class="reel-card">
            <div class="reel-header">
                <button class="back-btn" onclick="confirmBack()">
                    <i class="fas fa-arrow-right"></i> رجوع
                </button>
                <i class="fas fa-film" style="font-size: 3rem; margin-bottom: 10px;"></i>
                <h1>✨ إضافة ريلز جديد ✨</h1>
                <p>سيتم التخزين الدائم في تليجرام مع معرف خاص للشريط العلوي</p>
            </div>
            
            <div class="reel-content">
                <div class="form-group">
                    <label><i class="fas fa-tag"></i> عنوان الريلز <span style="color: red;">*</span></label>
                    <input type="text" class="form-control" id="reelTitle" placeholder="أدخل عنواناً مميزاً للريلز...">
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-user"></i> اسم الناشر</label>
                    <input type="text" class="form-control" id="publisherName" placeholder="اسمك هنا">
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-video"></i> فيديو الريلز <span style="color: red;">*</span></label>
                    <div class="video-upload-area" onclick="document.getElementById('reelVideo').click()">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <p>📹 اضغط لرفع الفيديو</p>
                        <small style="color: #ffd700;">✅ MP4, MOV | الحد الأقصى: 50 ميجابايت</small>
                    </div>
                    <input type="file" id="reelVideo" accept="video/*" style="display:none;" onchange="handleVideoUpload(event)">
                    <div id="videoPreview" style="display:none;"></div>
                    <div id="videoFileInfo" class="file-info" style="display:none;"></div>
                </div>
                
                <div class="serial-info" id="serialInfo" style="display: none;">
                    <i class="fas fa-fingerprint"></i>
                    <span>المعرف الخاص للشريط العلوي:</span>
                    <div class="serial-number" id="displaySerial">NARD-XXXXXXXX-XXXX</div>
                </div>
                
                <button type="button" class="save-btn" id="saveBtn" onclick="uploadReelToTelegram()">
                    <i class="fab fa-telegram"></i>
                    رفع وتخزين في تليجرام
                    <i class="fas fa-arrow-left"></i>
                </button>
            </div>
        </div>
        
        <!-- حاوية الريلز المرفوعة -->
        <div class="my-reels-section">
            <div class="my-reels-header">
                <h2>
                    <i class="fas fa-history"></i>
                    الريلز المرفوعة من هنا
                    <span class="badge-admin" id="adminBadge">مدير</span>
                </h2>
                <button class="refresh-my-reels" onclick="loadMyReels()">
                    <i class="fas fa-sync-alt"></i> تحديث
                </button>
            </div>
            <div class="my-reels-container" id="myReelsContainer">
                <div class="empty-reels">
                    <i class="fas fa-film"></i>
                    <p>📹 الريلز التي ترفعها من هذه الصفحة ستظهر هنا</p>
                    <p style="font-size: 12px;">اضغط على أي ريلز لمشاهدته</p>
                </div>
            </div>
        </div>
    </div>
    
    <div id="toastContainer"></div>
    
    <script>
        // ========== إعدادات تليجرام ==========
        const TELEGRAM = {
            botToken: '8576673096:AAECPDHWRTVQ_juq68hxM9PIdacnqevGRb4',
            channelId: '-1003822964890',
            apiUrl: 'https://api.telegram.org/bot'
        };
        
        let selectedVideoFile = null;
        let currentUser = null;
        let currentSerialNumber = '';
        let myUploadedReels = [];
        let reelsVideoCache = {}; // تخزين مؤقت للروابط
        
        // ========== إنشاء معرف خاص ==========
        function generateBarSerialNumber() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            const random = Math.floor(Math.random() * 10000).toString().padStart(4, '0');
            return `NARD-${year}${month}${day}-${hours}${minutes}${seconds}-${random}`;
        }
        
        // ========== تحميل المستخدم ==========
        function loadCurrentUser() {
            try {
                const savedUser = localStorage.getItem('current_user');
                if (savedUser) {
                    currentUser = JSON.parse(savedUser);
                    document.getElementById('publisherName').value = currentUser.name || '';
                }
            } catch(e) {}
            
            if (!currentUser) {
                currentUser = { id: 1, name: 'المدير', role: 'admin' };
                document.getElementById('publisherName').value = 'المدير';
            }
        }
        
        // ========== تحميل الريلز المرفوعة ==========
        function loadMyReels() {
            try {
                const allReels = JSON.parse(localStorage.getItem('nardo_uploaded_reels') || '[]');
                myUploadedReels = allReels;
                displayMyReels();
            } catch(e) {
                myUploadedReels = [];
                displayMyReels();
            }
        }
        
        // ========== عرض الريلز ==========
        function displayMyReels() {
            const container = document.getElementById('myReelsContainer');
            if (!container) return;
            
            if (myUploadedReels.length === 0) {
                container.innerHTML = `
                    <div class="empty-reels">
                        <i class="fas fa-film"></i>
                        <p>📹 لا توجد ريلز مرفوعة بعد</p>
                        <p style="font-size: 12px;">قم برفع أول ريلز وسيظهر هنا</p>
                    </div>
                `;
                return;
            }
            
            const sortedReels = [...myUploadedReels].reverse();
            
            let html = '';
            for (const reel of sortedReels) {
                const isCurrentReel = reel.serialNumber === currentSerialNumber;
                const date = new Date(reel.timestamp).toLocaleString('ar-EG');
                
                html += `
                    <div class="mini-reel-card" onclick="playReelInPopup('${reel.serialNumber}')">
                        ${isCurrentReel ? `
                            <div class="this-reel-badge">
                                <i class="fas fa-star"></i>
                                تم رفعه الآن
                            </div>
                        ` : ''}
                        <div class="mini-reel-thumb">
                            <i class="fas fa-play-circle"></i>
                            <div class="play-overlay-icon">
                                <i class="fas fa-play"></i>
                            </div>
                        </div>
                        <div class="mini-reel-info">
                            <div class="mini-reel-title">
                                <i class="fas fa-tag"></i> ${escapeHtml(reel.title || 'بدون عنوان')}
                            </div>
                            <div class="mini-reel-serial">
                                <i class="fas fa-fingerprint"></i> ${escapeHtml(reel.serialNumber)}
                            </div>
                            <div class="mini-reel-date">
                                <i class="fas fa-calendar"></i> ${date}
                            </div>
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }
        
        // ========== تشغيل الريلز في نافذة منبثقة (باستخدام السر من الكود الناجح) ==========
        async function playReelInPopup(serialNumber) {
            const reel = myUploadedReels.find(r => r.serialNumber === serialNumber);
            if (!reel) {
                showToast('❌ لم يتم العثور على الريلز', 'error');
                return;
            }
            
            // فتح نافذة التحميل أولاً
            const modal = document.createElement('div');
            modal.className = 'video-player-overlay';
            modal.innerHTML = `
                <div class="video-player-card">
                    <div class="video-player-header">
                        <h3><i class="fas fa-play-circle"></i> ${escapeHtml(reel.title)}</h3>
                        <button class="close-video-btn" onclick="this.closest('.video-player-overlay').remove()">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    <div class="video-container" id="videoContainer-${reel.id}">
                        <div class="video-loading">
                            <i class="fas fa-spinner fa-pulse"></i>
                            <p>🔄 جاري تحميل الفيديو من تليجرام...</p>
                        </div>
                    </div>
                    <div class="video-info">
                        <div class="video-title">
                            <i class="fas fa-tag"></i> ${escapeHtml(reel.title)}
                        </div>
                        <div class="video-serial">
                            <i class="fas fa-fingerprint"></i> ${escapeHtml(reel.serialNumber)}
                        </div>
                        <div class="video-serial" style="margin-top: 5px;">
                            <i class="fas fa-user"></i> ${escapeHtml(reel.publisher || 'ناردو برو')}
                        </div>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            
            // جلب الفيديو من تليجرام (نفس طريقة الكود الناجح)
            const videoUrl = await getReelVideoUrl(reel.telegramId);
            const videoContainer = document.getElementById(`videoContainer-${reel.id}`);
            
            if (videoUrl && videoContainer) {
                // عرض الفيديو
                videoContainer.innerHTML = `
                    <video controls autoplay>
                        <source src="${videoUrl}" type="video/mp4">
                        متصفحك لا يدعم تشغيل الفيديو
                    </video>
                `;
                showToast(`✅ تم تحميل الفيديو: ${reel.title}`, 'success');
            } else if (videoContainer) {
                // عرض رسالة خطأ
                videoContainer.innerHTML = `
                    <div style="text-align: center; padding: 40px;">
                        <i class="fas fa-exclamation-triangle" style="font-size: 3rem; color: #ff9800; margin-bottom: 15px;"></i>
                        <p style="color: white;">⚠️ لا يمكن تحميل الفيديو حالياً</p>
                        <p style="color: #aaa; font-size: 12px; margin-top: 10px;">تم رفع الفيديو بنجاح، يمكن مشاهدته في الصفحة الرئيسية</p>
                        <button onclick="this.closest('.video-player-overlay').remove()" style="margin-top: 20px; background: #ffd700; border: none; padding: 8px 20px; border-radius: 20px; cursor: pointer;">
                            إغلاق
                        </button>
                    </div>
                `;
                showToast(`⚠️ الفيديو موجود في القناة لكن تعذر التحميل`, 'info');
            }
            
            // إغلاق عند الضغط خارج الفيديو
            modal.addEventListener('click', (e) => {
                if (e.target === modal) modal.remove();
            });
        }
        
        // ========== جلب رابط الفيديو من تليجرام (السر من الكود الناجح) ==========
        async function getReelVideoUrl(messageId) {
            // التحقق من الكاش أولاً
            if (reelsVideoCache[messageId]) {
                console.log(`✅ استخدام الكاش للفيديو ${messageId}`);
                return reelsVideoCache[messageId];
            }
            
            try {
                console.log(`🔄 جلب الفيديو من تليجرام للمعرف: ${messageId}`);
                
                // جلب آخر التحديثات من القناة
                const response = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getUpdates?limit=100`);
                const data = await response.json();
                
                if (data.ok && data.result) {
                    // البحث عن الرسالة التي تحتوي على الفيديو
                    for (const update of data.result) {
                        const post = update.channel_post || update.message;
                        if (post && post.message_id === messageId && post.video) {
                            console.log(`✅ تم العثور على الفيديو في القناة`);
                            
                            // الحصول على file_id
                            const fileId = post.video.file_id;
                            
                            // جلب رابط الفيديو
                            const fileRes = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getFile?file_id=${fileId}`);
                            const fileData = await fileRes.json();
                            
                            if (fileData.ok) {
                                const videoUrl = `https://api.telegram.org/file/bot${TELEGRAM.botToken}/${fileData.result.file_path}`;
                                reelsVideoCache[messageId] = videoUrl;
                                console.log(`✅ تم الحصول على رابط الفيديو: ${videoUrl.substring(0, 100)}...`);
                                return videoUrl;
                            }
                        }
                    }
                }
                
                console.log(`⚠️ لم يتم العثور على الفيديو للمعرف ${messageId}`);
                return null;
                
            } catch (error) {
                console.error('❌ خطأ في جلب الفيديو:', error);
                return null;
            }
        }
        
        // ========== رفع الريلز إلى تليجرام ==========
        async function uploadReelToTelegram() {
            const title = document.getElementById('reelTitle').value.trim();
            const publisher = document.getElementById('publisherName').value.trim() || 'المدير';
            
            if (!title) {
                showToast('❌ الرجاء إدخال عنوان للريلز', 'error');
                return;
            }
            
            if (!selectedVideoFile) {
                showToast('❌ الرجاء رفع فيديو للريلز', 'error');
                return;
            }
            
            const saveBtn = document.getElementById('saveBtn');
            saveBtn.disabled = true;
            saveBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> جاري الرفع إلى تليجرام...';
            
            const barSerial = generateBarSerialNumber();
            currentSerialNumber = barSerial;
            
            const serialInfo = document.getElementById('serialInfo');
            document.getElementById('displaySerial').innerText = barSerial;
            serialInfo.style.display = 'block';
            
            try {
                const caption = `🎬 ${title}\n👤 ${publisher}\n🔑 NARD-SERIAL: ${barSerial}\n📅 ${new Date().toLocaleString('ar-EG')}\n✅ تم الرفع عبر ناردو ريلز - مخصص للشريط العلوي\n\n#ناردو_ريلز #شريط_علوي`;
                
                const formData = new FormData();
                formData.append('chat_id', TELEGRAM.channelId);
                formData.append('video', selectedVideoFile);
                formData.append('caption', caption);
                
                const response = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/sendVideo`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.ok) {
                    const messageId = data.result.message_id;
                    showToast(`✅ تم الرفع بنجاح! المعرف: ${barSerial}`, 'success');
                    
                    const newReel = {
                        id: messageId,
                        serialNumber: barSerial,
                        title: title,
                        publisher: publisher,
                        timestamp: Date.now(),
                        telegramId: messageId
                    };
                    
                    let uploadedReels = JSON.parse(localStorage.getItem('nardo_uploaded_reels') || '[]');
                    uploadedReels.unshift(newReel);
                    localStorage.setItem('nardo_uploaded_reels', JSON.stringify(uploadedReels));
                    localStorage.setItem('nardo_reels_updated', Date.now().toString());
                    
                    loadMyReels();
                    showSuccessModal(newReel);
                } else {
                    throw new Error(data.description || 'فشل الرفع');
                }
                
            } catch (error) {
                console.error('❌ خطأ:', error);
                showToast('❌ فشل الرفع: ' + error.message, 'error');
                saveBtn.disabled = false;
                saveBtn.innerHTML = '<i class="fab fa-telegram"></i> رفع وتخزين في تليجرام <i class="fas fa-arrow-left"></i>';
            }
        }
        
        function showSuccessModal(reel) {
            const modal = document.createElement('div');
            modal.className = 'confirm-modal';
            modal.innerHTML = `
                <div class="confirm-content">
                    <div class="success-checkmark">
                        <i class="fas fa-check"></i>
                    </div>
                    <h2 style="color: #ffd700;">تم النشر بنجاح! 🎉</h2>
                    <div style="background: rgba(255,215,0,0.2); padding: 12px; border-radius: 12px; margin: 15px 0;">
                        <div style="color: white;"><i class="fas fa-tag"></i> <strong>${reel.title}</strong></div>
                        <div style="color: #ffd700; margin-top: 8px;">
                            <i class="fas fa-fingerprint"></i> المعرف: <strong>${reel.serialNumber}</strong>
                        </div>
                    </div>
                    <div class="confirm-buttons">
                        <button class="confirm-btn confirm-yes" onclick="redirectToHome()">
                            <i class="fas fa-home"></i> العودة للرئيسية
                        </button>
                        <button class="confirm-btn confirm-no" onclick="addAnotherReel()">
                            <i class="fas fa-plus"></i> إضافة آخر
                        </button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        }
        
        function redirectToHome() {
            window.location.href = 'index.html';
        }
        
        function addAnotherReel() {
            document.querySelector('.confirm-modal')?.remove();
            resetForm();
            showToast('📹 يمكنك إضافة ريلز جديد', 'info');
        }
        
        function resetForm() {
            document.getElementById('reelTitle').value = '';
            document.getElementById('reelVideo').value = '';
            document.getElementById('videoPreview').style.display = 'none';
            document.getElementById('videoFileInfo').style.display = 'none';
            document.getElementById('serialInfo').style.display = 'none';
            selectedVideoFile = null;
            currentSerialNumber = '';
            document.getElementById('saveBtn').disabled = false;
            document.getElementById('saveBtn').innerHTML = '<i class="fab fa-telegram"></i> رفع وتخزين في تليجرام <i class="fas fa-arrow-left"></i>';
            loadMyReels();
        }
        
        // ========== معالجة الفيديو ==========
        function handleVideoUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            if (!file.type.startsWith('video/')) {
                showToast('❌ الرجاء اختيار ملف فيديو صالح', 'error');
                return;
            }
            
            if (file.size > 50 * 1024 * 1024) {
                showToast('❌ حجم الفيديو كبير جداً. الحد الأقصى 50 ميجابايت', 'error');
                return;
            }
            
            selectedVideoFile = file;
            const videoUrl = URL.createObjectURL(file);
            
            const previewContainer = document.getElementById('videoPreview');
            previewContainer.innerHTML = `
                <div class="video-preview-container">
                    <video controls src="${videoUrl}"></video>
                    <button class="remove-video-btn" onclick="removeVideo()">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </div>
            `;
            previewContainer.style.display = 'block';
            
            const sizeMB = (file.size / (1024 * 1024)).toFixed(2);
            const fileInfo = document.getElementById('videoFileInfo');
            fileInfo.innerHTML = `<i class="fas fa-file-video"></i> ${file.name} (${sizeMB} MB)`;
            fileInfo.style.display = 'block';
            
            showToast('✅ تم اختيار الفيديو بنجاح', 'success');
        }
        
        function removeVideo() {
            selectedVideoFile = null;
            document.getElementById('videoPreview').style.display = 'none';
            document.getElementById('videoFileInfo').style.display = 'none';
            document.getElementById('reelVideo').value = '';
            showToast('🗑️ تم إزالة الفيديو', 'info');
        }
        
        function confirmBack() {
            if (selectedVideoFile || document.getElementById('reelTitle').value.trim()) {
                const modal = document.createElement('div');
                modal.className = 'confirm-modal';
                modal.innerHTML = `
                    <div class="confirm-content">
                        <i class="fas fa-exclamation-triangle" style="color: #ff9800; font-size: 3rem;"></i>
                        <h3 style="color: white;">هل تريد المغادرة؟</h3>
                        <p style="color: rgba(255,255,255,0.7);">لديك بيانات غير محفوظة. سيتم فقدانها إذا غادرت.</p>
                        <div class="confirm-buttons">
                            <button class="confirm-btn confirm-yes" onclick="leavePage()">مغادرة</button>
                            <button class="confirm-btn confirm-no" onclick="closeConfirm()">البقاء</button>
                        </div>
                    </div>
                `;
                document.body.appendChild(modal);
            } else {
                window.location.href = 'index.html';
            }
        }
        
        function leavePage() { window.location.href = 'index.html'; }
        function closeConfirm() { document.querySelector('.confirm-modal')?.remove(); }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast-message toast-${type}`;
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i> ${message}`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'slideInRight 0.3s reverse';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
        
        // ========== تهيئة الصفحة ==========
        loadCurrentUser();
        loadMyReels();
        
        console.log('🎬 صفحة إضافة الريلز - ناردو برو');
        console.log('✅ تم استخدام طريقة جلب الفيديو الناجحة من الكود المرجعي');
        console.log('🔑 المعرف الخاص: NARD-YYYYMMDD-HHMMSS-RANDOM');
    </script>
</body>
</html>
