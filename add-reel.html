<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ناردو ريلز | تليجرام قاعدة بيانات + معرف خاص</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0a0f1a, #0f1420);
            color: white;
            min-height: 100vh;
        }

        /* تخصيص شريط التمرير */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: gold;
            border-radius: 10px;
        }

        .header {
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            border-bottom: 2px solid gold;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo i {
            font-size: 28px;
            color: gold;
        }

        .logo h1 {
            font-size: 20px;
            color: gold;
        }

        .stats {
            display: flex;
            gap: 15px;
        }

        .stat {
            background: rgba(255,215,0,0.1);
            padding: 5px 15px;
            border-radius: 20px;
            text-align: center;
        }

        .stat-number {
            font-size: 18px;
            font-weight: bold;
            color: gold;
        }

        .stat-label {
            font-size: 11px;
        }

        .btn {
            background: gold;
            color: black;
            border: none;
            padding: 8px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            font-family: 'Cairo', sans-serif;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255,215,0,0.4);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid gold;
            color: gold;
        }

        .btn-outline:hover {
            background: gold;
            color: black;
        }

        /* تحسين شبكة الفيديوهات */
        .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            padding: 20px;
            margin-top: 10px;
        }

        .video-card {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255,215,0,0.3);
            transition: all 0.3s;
            cursor: pointer;
        }

        .video-card:hover {
            transform: translateY(-5px);
            border-color: gold;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .video-thumb {
            position: relative;
            height: 200px;
            background: linear-gradient(135deg, #1a1a2e, #0a0a1a);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-thumb i {
            font-size: 50px;
            color: gold;
            opacity: 0.8;
        }

        .play-icon {
            position: absolute;
            width: 50px;
            height: 50px;
            background: rgba(0,0,0,0.7);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .video-card:hover .play-icon {
            transform: scale(1.1);
            background: gold;
        }

        .video-card:hover .play-icon i {
            color: black;
        }

        .video-info {
            padding: 15px;
        }

        .video-title {
            font-size: 16px;
            font-weight: bold;
            color: gold;
            margin-bottom: 8px;
        }

        .video-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: #aaa;
            margin-top: 10px;
        }

        .serial-badge {
            font-family: monospace;
            background: rgba(255,215,0,0.15);
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 10px;
        }

        .like-btn {
            background: none;
            border: none;
            color: #aaa;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            transition: all 0.2s;
            font-family: 'Cairo', sans-serif;
        }

        .like-btn:hover {
            transform: scale(1.05);
        }

        .like-btn.liked {
            color: #ff3366;
        }

        /* نافذة الإضافة المتطورة */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: linear-gradient(135deg, #1a1a2e, #0f0f1a);
            border-radius: 30px;
            padding: 0;
            max-width: 550px;
            width: 90%;
            border: 1px solid rgba(255,215,0,0.3);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            overflow: hidden;
            animation: modalSlideIn 0.3s ease;
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(-50px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .modal-header {
            background: linear-gradient(135deg, gold, #ffb347);
            padding: 20px;
            text-align: center;
            position: relative;
        }

        .modal-header h2 {
            color: black;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .modal-header h2 i {
            font-size: 28px;
        }

        .modal-close {
            position: absolute;
            top: 15px;
            left: 20px;
            background: rgba(0,0,0,0.3);
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            color: white;
            font-size: 18px;
            transition: all 0.3s;
        }

        .modal-close:hover {
            background: rgba(0,0,0,0.5);
            transform: rotate(90deg);
        }

        .modal-body {
            padding: 25px;
        }

        /* منطقة رفع الفيديو المحسنة */
        .upload-area {
            border: 2px dashed rgba(255,215,0,0.5);
            border-radius: 20px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 20px;
            transition: all 0.3s;
            background: rgba(255,215,0,0.05);
        }

        .upload-area:hover {
            border-color: gold;
            background: rgba(255,215,0,0.1);
            transform: translateY(-2px);
        }

        .upload-area i {
            font-size: 60px;
            color: gold;
            margin-bottom: 15px;
        }

        .upload-area p {
            font-size: 16px;
            margin-bottom: 8px;
        }

        .upload-area small {
            color: #aaa;
            font-size: 12px;
        }

        /* معاينة الفيديو */
        .video-preview-container {
            display: none;
            margin-bottom: 20px;
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            overflow: hidden;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .video-preview-header {
            background: rgba(0,0,0,0.8);
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .video-preview-header span {
            font-size: 13px;
            color: gold;
        }

        .remove-preview {
            background: rgba(255,0,0,0.3);
            border: none;
            color: white;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 12px;
            transition: all 0.2s;
        }

        .remove-preview:hover {
            background: rgba(255,0,0,0.6);
        }

        .preview-video {
            width: 100%;
            max-height: 200px;
            background: #000;
        }

        .preview-video video {
            width: 100%;
            max-height: 200px;
        }

        /* حقول الإدخال المحسنة */
        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: gold;
            font-weight: 600;
            font-size: 14px;
        }

        .input-group label i {
            margin-left: 8px;
        }

        input, textarea {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 15px;
            color: white;
            font-family: 'Cairo', sans-serif;
            font-size: 14px;
            transition: all 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: gold;
            background: rgba(255,255,255,0.15);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        /* أزرار الإجراءات */
        .modal-actions {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        .send-btn {
            flex: 1;
            padding: 12px;
            background: gold;
            color: black;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-size: 16px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .send-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255,215,0,0.4);
        }

        .send-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .cancel-btn {
            flex: 1;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-size: 16px;
            transition: all 0.3s;
        }

        .cancel-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        /* مشغل الفيديو */
        .video-player {
            display: none;
            background: #000;
            margin: 20px;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid gold;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 800px;
            z-index: 1001;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translate(-50%, -40%);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%);
            }
        }

        .video-player.show {
            display: block;
        }

        .player-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            display: none;
        }

        .player-overlay.show {
            display: block;
        }

        .player-header {
            background: linear-gradient(135deg, gold, #ffb347);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .player-header h3 {
            color: black;
            font-size: 16px;
        }

        .close-player {
            background: rgba(0,0,0,0.3);
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            color: white;
            font-size: 18px;
            transition: all 0.2s;
        }

        .close-player:hover {
            background: rgba(0,0,0,0.5);
            transform: rotate(90deg);
        }

        .player-video {
            width: 100%;
        }

        .player-video video {
            width: 100%;
            max-height: 60vh;
        }

        .player-info {
            padding: 15px;
            background: rgba(0,0,0,0.8);
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            grid-column: 1 / -1;
        }

        .empty-state i {
            font-size: 70px;
            color: gold;
            opacity: 0.5;
            margin-bottom: 15px;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: gold;
            color: black;
            padding: 12px 25px;
            border-radius: 50px;
            z-index: 2000;
            font-weight: bold;
            animation: fadeInUp 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                text-align: center;
            }
            
            .modal-content {
                width: 95%;
            }
            
            .modal-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">
            <i class="fab fa-telegram"></i>
            <h1>ناردو ريلز</h1>
        </div>
        <div class="stats">
            <div class="stat">
                <div class="stat-number" id="totalVideos">0</div>
                <div class="stat-label">فيديو</div>
            </div>
        </div>
        <button class="btn" onclick="openAddModal()">
            <i class="fas fa-plus"></i> إضافة ريلز
        </button>
        <button class="btn btn-outline" onclick="loadVideos()">
            <i class="fas fa-sync-alt"></i> تحديث
        </button>
    </div>

    <!-- نافذة تشغيل الفيديو -->
    <div id="playerOverlay" class="player-overlay" onclick="closePlayer()"></div>
    <div id="videoPlayer" class="video-player">
        <div class="player-header">
            <h3 id="playerTitle"><i class="fas fa-play"></i> عنوان الفيديو</h3>
            <button class="close-player" onclick="closePlayer()">✕</button>
        </div>
        <div class="player-video">
            <video id="playerVideo" controls></video>
        </div>
        <div class="player-info">
            <div id="playerSerial" style="font-family: monospace; color: gold; margin-bottom: 8px;"></div>
            <div id="playerPublisher" style="font-size: 13px;"></div>
            <div style="display: flex; gap: 15px; margin-top: 12px;">
                <button id="playerLikeBtn" class="like-btn" onclick="likeCurrentVideo()">
                    <i class="fas fa-heart"></i> <span id="playerLikeCount">0</span>
                </button>
                <button class="like-btn" onclick="copyCurrentSerial()">
                    <i class="fas fa-copy"></i> نسخ المعرف
                </button>
                <button class="like-btn" onclick="shareCurrentVideo()">
                    <i class="fas fa-share-alt"></i> مشاركة
                </button>
            </div>
        </div>
    </div>

    <!-- شبكة الفيديوهات -->
    <div id="videosGrid" class="videos-grid">
        <div class="empty-state">
            <i class="fas fa-film"></i>
            <h3>لا توجد فيديوهات</h3>
            <p>أضف أول ريلز وسيظهر هنا للجميع</p>
            <button class="btn" style="margin-top: 15px;" onclick="openAddModal()">➕ إضافة ريلز</button>
        </div>
    </div>

    <!-- نافذة الإضافة المحسنة -->
    <div id="addModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <button class="modal-close" onclick="closeAddModal()">✕</button>
                <h2>
                    <i class="fab fa-telegram"></i>
                    إضافة ريلز جديد
                </h2>
            </div>
            <div class="modal-body">
                <!-- منطقة رفع الفيديو -->
                <div class="upload-area" onclick="document.getElementById('videoFile').click()">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <p>اضغط لرفع الفيديو</p>
                    <small>MP4, MOV, AVI - الحد الأقصى 50MB</small>
                </div>
                <input type="file" id="videoFile" accept="video/*" style="display: none;" onchange="previewVideo(this)">
                
                <!-- معاينة الفيديو -->
                <div id="videoPreviewContainer" class="video-preview-container">
                    <div class="video-preview-header">
                        <span><i class="fas fa-video"></i> معاينة الفيديو</span>
                        <button class="remove-preview" onclick="removeVideo()">
                            <i class="fas fa-trash-alt"></i> إزالة
                        </button>
                    </div>
                    <div class="preview-video">
                        <video id="previewVideo" controls></video>
                    </div>
                </div>

                <!-- معلومات الفيديو -->
                <div class="input-group">
                    <label><i class="fas fa-heading"></i> عنوان الريلز</label>
                    <input type="text" id="videoTitle" placeholder="اكتب عنواناً مميزاً للفيديو..." value="ريلز رائع">
                </div>

                <div class="input-group">
                    <label><i class="fas fa-user"></i> اسم الناشر</label>
                    <input type="text" id="videoPublisher" placeholder="اسمك أو اسم القناة..." value="ناردو برو">
                </div>

                <div class="input-group">
                    <label><i class="fas fa-tag"></i> هاشتاجات (اختياري)</label>
                    <textarea id="videoHashtags" placeholder="#ريلز #ناردو #تيك_tok ..."></textarea>
                </div>

                <!-- أزرار الإجراءات -->
                <div class="modal-actions">
                    <button class="cancel-btn" onclick="closeAddModal()">
                        <i class="fas fa-times"></i> إلغاء
                    </button>
                    <button class="send-btn" id="uploadBtn" onclick="uploadVideo()">
                        <i class="fab fa-telegram"></i> رفع وتخزين
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ========== إعدادات تليجرام ==========
        const BOT_TOKEN = '8576673096:AAECPDHWRTVQ_juq68hxM9PIdacnqevGRb4';
        const CHANNEL_ID = '-1003822964890';
        const API_URL = `https://api.telegram.org/bot${BOT_TOKEN}`;

        let allVideos = [];
        let selectedFile = null;
        let currentPlayingVideo = null;
        let userLikes = JSON.parse(localStorage.getItem('user_likes') || '{}');

        function saveLikes() {
            localStorage.setItem('user_likes', JSON.stringify(userLikes));
        }

        async function loadVideos() {
            showToast("🔄 جاري تحميل الفيديوهات...");
            
            try {
                const response = await fetch(`${API_URL}/getUpdates?limit=100`);
                const data = await response.json();
                
                const videos = [];
                
                if (data.ok && data.result) {
                    for (const update of data.result) {
                        const post = update.channel_post || update.message;
                        if (post && post.video) {
                            const messageId = post.message_id;
                            const caption = post.caption || '';
                            
                            let title = 'ريلز';
                            let publisher = 'ناردو برو';
                            let hashtags = '';
                            
                            const titleMatch = caption.match(/🎬\s*(.+?)(?:\n|$)/);
                            if (titleMatch) title = titleMatch[1];
                            
                            const publisherMatch = caption.match(/👤\s*(.+?)(?:\n|$)/);
                            if (publisherMatch) publisher = publisherMatch[1];
                            
                            const hashtagMatch = caption.match(/#[\w\u0600-\u06FF]+/g);
                            if (hashtagMatch) hashtags = hashtagMatch.join(' ');
                            
                            const fileRes = await fetch(`${API_URL}/getFile?file_id=${post.video.file_id}`);
                            const fileData = await fileRes.json();
                            
                            if (fileData.ok) {
                                const videoUrl = `https://api.telegram.org/file/bot${BOT_TOKEN}/${fileData.result.file_path}`;
                                const serialNumber = `NARD-${messageId}-${Math.random().toString(36).substr(2, 6).toUpperCase()}`;
                                
                                videos.push({
                                    id: messageId,
                                    title: title,
                                    publisher: publisher,
                                    videoUrl: videoUrl,
                                    serialNumber: serialNumber,
                                    hashtags: hashtags,
                                    date: new Date(post.date * 1000).toISOString(),
                                    likes: userLikes[messageId]?.count || 0
                                });
                            }
                        }
                    }
                }
                
                if (videos.length > 0) {
                    allVideos = videos.reverse();
                    localStorage.setItem('cached_videos', JSON.stringify(allVideos));
                    showToast(`✅ تم تحميل ${allVideos.length} فيديو`);
                } else {
                    const cached = localStorage.getItem('cached_videos');
                    if (cached) {
                        allVideos = JSON.parse(cached);
                        showToast(`📦 عرض ${allVideos.length} فيديو من الذاكرة`);
                    }
                }
                
                displayVideos();
                
            } catch (error) {
                console.error(error);
                const cached = localStorage.getItem('cached_videos');
                if (cached) {
                    allVideos = JSON.parse(cached);
                    displayVideos();
                    showToast("⚠️ عرض الفيديوهات المخزنة");
                } else {
                    showToast("❌ فشل الاتصال بتليجرام");
                }
            }
        }

        function displayVideos() {
            const grid = document.getElementById('videosGrid');
            
            if (!allVideos || allVideos.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-film"></i>
                        <h3>لا توجد فيديوهات</h3>
                        <p>أضف أول ريلز وسيظهر هنا للجميع</p>
                        <button class="btn" style="margin-top: 15px;" onclick="openAddModal()">➕ إضافة ريلز</button>
                    </div>
                `;
                document.getElementById('totalVideos').innerText = '0';
                return;
            }
            
            document.getElementById('totalVideos').innerText = allVideos.length;
            
            grid.innerHTML = allVideos.map(video => {
                const isLiked = userLikes[video.id]?.liked === true;
                const likeCount = userLikes[video.id]?.count || video.likes || 0;
                
                return `
                    <div class="video-card" onclick="playVideo(${video.id})">
                        <div class="video-thumb">
                            <i class="fas fa-play-circle"></i>
                            <div class="play-icon">
                                <i class="fas fa-play" style="font-size: 20px;"></i>
                            </div>
                        </div>
                        <div class="video-info">
                            <div class="video-title">${escapeHtml(video.title)}</div>
                            <div class="video-meta">
                                <span><i class="fas fa-user"></i> ${escapeHtml(video.publisher)}</span>
                                <span class="serial-badge"><i class="fas fa-fingerprint"></i> ${video.serialNumber}</span>
                            </div>
                            <div class="video-meta">
                                <span><i class="fas fa-calendar"></i> ${new Date(video.date).toLocaleDateString('ar-EG')}</span>
                                <button class="like-btn ${isLiked ? 'liked' : ''}" onclick="event.stopPropagation(); toggleLike(${video.id})">
                                    <i class="fas fa-heart"></i> ${formatNumber(likeCount)}
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function playVideo(videoId) {
            const video = allVideos.find(v => v.id === videoId);
            if (!video) return;
            
            currentPlayingVideo = video;
            
            const overlay = document.getElementById('playerOverlay');
            const player = document.getElementById('videoPlayer');
            const playerVideo = document.getElementById('playerVideo');
            const playerTitle = document.getElementById('playerTitle');
            const playerSerial = document.getElementById('playerSerial');
            const playerPublisher = document.getElementById('playerPublisher');
            
            playerTitle.innerHTML = `<i class="fas fa-play"></i> ${escapeHtml(video.title)}`;
            playerSerial.innerHTML = `<i class="fas fa-fingerprint"></i> المعرف: ${video.serialNumber}`;
            playerPublisher.innerHTML = `<i class="fas fa-user-circle"></i> ${escapeHtml(video.publisher)} | 📅 ${new Date(video.date).toLocaleDateString('ar-EG')}`;
            
            playerVideo.src = video.videoUrl;
            playerVideo.load();
            
            overlay.classList.add('show');
            player.classList.add('show');
            
            updatePlayerLikeButton();
        }
        
        function closePlayer() {
            const overlay = document.getElementById('playerOverlay');
            const player = document.getElementById('videoPlayer');
            const playerVideo = document.getElementById('playerVideo');
            playerVideo.pause();
            playerVideo.src = '';
            overlay.classList.remove('show');
            player.classList.remove('show');
            currentPlayingVideo = null;
        }
        
        function updatePlayerLikeButton() {
            if (!currentPlayingVideo) return;
            const isLiked = userLikes[currentPlayingVideo.id]?.liked;
            const count = userLikes[currentPlayingVideo.id]?.count || 0;
            const btn = document.getElementById('playerLikeBtn');
            btn.innerHTML = `<i class="fas fa-heart"></i> <span id="playerLikeCount">${formatNumber(count)}</span>`;
            if (isLiked) {
                btn.classList.add('liked');
            } else {
                btn.classList.remove('liked');
            }
        }
        
        function likeCurrentVideo() {
            if (currentPlayingVideo) {
                toggleLike(currentPlayingVideo.id);
                updatePlayerLikeButton();
            }
        }
        
        function copyCurrentSerial() {
            if (currentPlayingVideo) {
                copyToClipboard(currentPlayingVideo.serialNumber);
                showToast(`📋 تم نسخ المعرف: ${currentPlayingVideo.serialNumber}`);
            }
        }
        
        function shareCurrentVideo() {
            if (currentPlayingVideo) {
                const shareText = `🎬 ${currentPlayingVideo.title}\n👤 ${currentPlayingVideo.publisher}\n🔖 المعرف: ${currentPlayingVideo.serialNumber}\n\n📱 شاهد على ناردو ريلز`;
                copyToClipboard(shareText);
                showToast("📤 تم نسخ معلومات الفيديو للمشاركة");
            }
        }
        
        function toggleLike(videoId) {
            if (!userLikes[videoId]) {
                userLikes[videoId] = { liked: false, count: 0 };
            }
            
            if (userLikes[videoId].liked) {
                userLikes[videoId].liked = false;
                userLikes[videoId].count = Math.max(0, userLikes[videoId].count - 1);
            } else {
                userLikes[videoId].liked = true;
                userLikes[videoId].count = (userLikes[videoId].count || 0) + 1;
            }
            
            saveLikes();
            const video = allVideos.find(v => v.id === videoId);
            if (video) video.likes = userLikes[videoId].count;
            displayVideos();
        }
        
        async function uploadVideo() {
            if (!selectedFile) {
                showToast("❌ اختر فيديو أولاً");
                return;
            }
            
            const title = document.getElementById('videoTitle').value.trim() || 'ريلز';
            const publisher = document.getElementById('videoPublisher').value.trim() || 'ناردو برو';
            const hashtags = document.getElementById('videoHashtags').value.trim();
            
            const btn = document.getElementById('uploadBtn');
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> جاري الرفع...';
            
            let caption = `🎬 ${title}\n👤 ${publisher}\n📅 ${new Date().toLocaleString('ar-EG')}\n\n✅ تم الرفع عبر ناردو ريلز`;
            if (hashtags) {
                caption += `\n\n${hashtags}`;
            }
            
            const formData = new FormData();
            formData.append('chat_id', CHANNEL_ID);
            formData.append('video', selectedFile);
            formData.append('caption', caption);
            
            try {
                const response = await fetch(`${API_URL}/sendVideo`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.ok) {
                    showToast("✅ تم الرفع بنجاح!");
                    closeAddModal();
                    selectedFile = null;
                    document.getElementById('videoPreviewContainer').style.display = 'none';
                    document.getElementById('videoFile').value = '';
                    setTimeout(() => loadVideos(), 3000);
                } else {
                    throw new Error(data.description);
                }
            } catch (error) {
                showToast("❌ فشل الرفع: " + error.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fab fa-telegram"></i> رفع وتخزين';
            }
        }
        
        function previewVideo(input) {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                if (file.size > 50 * 1024 * 1024) {
                    showToast("❌ حجم الفيديو كبير جداً (الحد 50MB)");
                    input.value = '';
                    return;
                }
                if (!file.type.startsWith('video/')) {
                    showToast("❌ اختر ملف فيديو صالح");
                    input.value = '';
                    return;
                }
                
                selectedFile = file;
                const url = URL.createObjectURL(file);
                const previewContainer = document.getElementById('videoPreviewContainer');
                const previewVideo = document.getElementById('previewVideo');
                previewVideo.src = url;
                previewContainer.style.display = 'block';
            }
        }
        
        function removeVideo() {
            selectedFile = null;
            document.getElementById('videoFile').value = '';
            document.getElementById('videoPreviewContainer').style.display = 'none';
            document.getElementById('previewVideo').src = '';
            showToast("🗑️ تم إزالة الفيديو");
        }
        
        function openAddModal() {
            document.getElementById('addModal').style.display = 'flex';
        }
        
        function closeAddModal() {
            document.getElementById('addModal').style.display = 'none';
            removeVideo();
            document.getElementById('videoTitle').value = 'ريلز رائع';
            document.getElementById('videoPublisher').value = 'ناردو برو';
            document.getElementById('videoHashtags').value = '';
        }
        
        function formatNumber(num) {
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num || 0;
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text);
        }
        
        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }
        
        window.onclick = function(e) {
            const modal = document.getElementById('addModal');
            if (e.target === modal) closeAddModal();
        }
        
        // منع إغلاق مشغل الفيديو عند النقر داخله
        document.getElementById('videoPlayer').addEventListener('click', function(e) {
            e.stopPropagation();
        });
        
        loadVideos();
        setInterval(loadVideos, 60000);
    </script>
</body>
</html>
