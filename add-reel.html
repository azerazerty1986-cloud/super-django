<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ناردو ريلز | الشريط العلوي - تخزين تليجرام</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0a0f1a 0%, #0f1420 100%);
            color: white;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* ========== شريط المستخدم العلوي ========== */
        .top-bar {
            background: linear-gradient(135deg, rgba(0,0,0,0.95), rgba(0,0,0,0.85));
            backdrop-filter: blur(15px);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            border-bottom: 2px solid gold;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-area i {
            font-size: 28px;
            color: gold;
        }

        .logo-area h2 {
            color: gold;
            font-size: 20px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .user-badge {
            background: linear-gradient(135deg, #ff0066, #cc0052);
            padding: 8px 20px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            font-size: 14px;
        }

        .stats {
            display: flex;
            gap: 15px;
        }

        .stat-item {
            background: rgba(255,255,255,0.1);
            padding: 6px 16px;
            border-radius: 30px;
            text-align: center;
        }

        .stat-number {
            font-size: 18px;
            font-weight: bold;
            color: gold;
        }

        .stat-label {
            font-size: 11px;
            color: rgba(255,255,255,0.7);
        }

        .refresh-btn {
            background: rgba(255,215,0,0.2);
            border: 1px solid gold;
            color: gold;
            padding: 8px 18px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .refresh-btn:hover {
            background: gold;
            color: black;
            transform: translateY(-2px);
        }

        /* ========== شريط الريلز الأفقي ========== */
        .reels-section {
            margin-top: 0;
            background: linear-gradient(135deg, rgba(0,0,0,0.7), rgba(0,0,0,0.5));
            border-bottom: 1px solid rgba(255,215,0,0.3);
            padding: 15px 0;
        }

        .reels-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px 12px 20px;
        }

        .reels-header h3 {
            color: gold;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .reels-count {
            background: rgba(255,215,0,0.2);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: gold;
        }

        .reels-bar {
            display: flex;
            overflow-x: auto;
            gap: 15px;
            padding: 10px 20px;
            scrollbar-width: thin;
            scroll-snap-type: x mandatory;
        }

        .reels-bar::-webkit-scrollbar {
            height: 4px;
        }

        .reels-bar::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }

        .reels-bar::-webkit-scrollbar-thumb {
            background: gold;
            border-radius: 10px;
        }

        /* بطاقة الريلز */
        .reel-card {
            flex: 0 0 auto;
            width: 140px;
            cursor: pointer;
            transition: all 0.3s ease;
            scroll-snap-align: start;
        }

        .reel-card:hover {
            transform: translateY(-5px);
        }

        .reel-thumbnail {
            position: relative;
            width: 140px;
            height: 200px;
            border-radius: 16px;
            overflow: hidden;
            background: #1a1a2e;
            border: 2px solid rgba(255,215,0,0.5);
        }

        .reel-thumbnail video,
        .reel-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .play-icon-overlay {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: gold;
        }

        .reel-title {
            margin-top: 8px;
            font-size: 12px;
            text-align: center;
            color: white;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            padding: 0 5px;
            font-weight: 500;
        }

        .reel-publisher {
            font-size: 10px;
            text-align: center;
            color: rgba(255,255,255,0.6);
            margin-top: 4px;
        }

        /* بطاقة إضافة ريلز (للمدير فقط) */
        .add-reel-card {
            flex: 0 0 auto;
            width: 140px;
            height: 200px;
            background: rgba(255,215,0,0.1);
            border: 2px dashed gold;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            gap: 12px;
        }

        .add-reel-card:hover {
            background: rgba(255,215,0,0.2);
            transform: scale(1.02);
        }

        .add-reel-card i {
            font-size: 45px;
            color: gold;
        }

        .add-reel-card span {
            color: gold;
            font-size: 13px;
            font-weight: bold;
        }

        /* نافذة عرض الريلز (مودال) */
        .reel-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .reel-modal.active {
            visibility: visible;
            opacity: 1;
        }

        .reel-modal-content {
            position: relative;
            width: 95%;
            max-width: 450px;
            background: #000;
            border-radius: 25px;
            overflow: hidden;
            border: 2px solid gold;
        }

        .reel-modal-content video {
            width: 100%;
            max-height: 70vh;
            background: #000;
        }

        .close-modal {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0,0,0,0.7);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
            font-size: 20px;
        }

        .modal-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            padding: 30px 20px 20px;
        }

        .modal-title {
            font-size: 18px;
            font-weight: bold;
            color: gold;
            margin-bottom: 8px;
        }

        .modal-publisher {
            font-size: 13px;
            color: rgba(255,255,255,0.8);
            margin-bottom: 10px;
        }

        .modal-stats {
            display: flex;
            gap: 20px;
            font-size: 13px;
        }

        /* نافذة رفع الريلز */
        .upload-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.96);
            backdrop-filter: blur(20px);
            z-index: 20000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .upload-modal.active {
            visibility: visible;
            opacity: 1;
        }

        .upload-content {
            background: linear-gradient(135deg, #1a3a32, #0a1a15);
            border: 3px solid gold;
            border-radius: 35px;
            padding: 30px;
            max-width: 550px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
        }

        .upload-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .upload-header h2 {
            color: gold;
        }

        .close-upload {
            background: none;
            border: none;
            color: gold;
            font-size: 32px;
            cursor: pointer;
        }

        .upload-area {
            border: 3px dashed gold;
            border-radius: 25px;
            padding: 35px 20px;
            text-align: center;
            cursor: pointer;
            margin: 20px 0;
            transition: all 0.3s;
            background: rgba(255,215,0,0.05);
        }

        .upload-area:hover {
            background: rgba(255,215,0,0.12);
            transform: scale(1.02);
        }

        .upload-area i {
            font-size: 55px;
            color: gold;
            margin-bottom: 15px;
        }

        .video-preview {
            display: none;
            margin: 15px 0;
        }

        .video-preview.show {
            display: block;
        }

        .video-preview video {
            width: 100%;
            border-radius: 20px;
            border: 2px solid gold;
        }

        .form-control {
            width: 100%;
            padding: 14px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,215,0,0.5);
            border-radius: 50px;
            color: white;
            font-size: 16px;
            margin: 12px 0;
        }

        .form-control:focus {
            outline: none;
            border-color: gold;
        }

        .upload-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, gold, #ffd700);
            border: none;
            border-radius: 50px;
            color: black;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .upload-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .remove-video-btn {
            width: 100%;
            margin-top: 10px;
            background: rgba(244,67,54,0.7);
            border: none;
            padding: 10px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
        }

        /* الإشعارات */
        .notification {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, gold, #ffd700);
            color: black;
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: bold;
            z-index: 30000;
            animation: slideUp 0.3s ease;
            font-size: 14px;
            white-space: nowrap;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 15000;
            flex-direction: column;
            gap: 20px;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,215,0,0.3);
            border-top-color: gold;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            .reel-card, .add-reel-card {
                width: 110px;
            }
            .reel-thumbnail {
                width: 110px;
                height: 160px;
            }
            .top-bar {
                padding: 10px 15px;
            }
            .user-badge {
                padding: 5px 12px;
                font-size: 12px;
            }
            .stat-item {
                padding: 4px 10px;
            }
            .stat-number {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <!-- ========== شريط المستخدم العلوي ========== -->
    <div class="top-bar">
        <div class="logo-area">
            <i class="fas fa-film"></i>
            <h2>ناردو ريلز</h2>
        </div>
        <div class="user-info">
            <div class="user-badge">
                <i class="fas fa-user"></i>
                <span id="userNameDisplay">المدير</span>
                <i class="fas fa-crown" style="color: gold;"></i>
            </div>
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-number" id="totalReelsCount">0</div>
                    <div class="stat-label">الريلز</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="totalViewsCount">0</div>
                    <div class="stat-label">مشاهدة</div>
                </div>
            </div>
            <button class="refresh-btn" onclick="loadReelsFromTelegram()">
                <i class="fas fa-sync-alt"></i> تحديث
            </button>
        </div>
    </div>

    <!-- ========== شريط الريلز الأفقي ========== -->
    <div class="reels-section">
        <div class="reels-header">
            <h3><i class="fas fa-play-circle"></i> ريلز ناردو</h3>
            <span class="reels-count" id="reelsCountBadge">0</span>
        </div>
        <div class="reels-bar" id="reelsBar">
            <div style="text-align: center; width: 100%; padding: 40px;">
                <i class="fas fa-spinner fa-pulse"></i> جاري التحميل...
            </div>
        </div>
    </div>

    <!-- ========== نافذة عرض الريلز ========== -->
    <div class="reel-modal" id="reelModal">
        <div class="reel-modal-content">
            <button class="close-modal" onclick="closeReelModal()">✕</button>
            <video id="modalVideo" controls autoplay></video>
            <div class="modal-info">
                <div class="modal-title" id="modalTitle"></div>
                <div class="modal-publisher" id="modalPublisher"></div>
                <div class="modal-stats">
                    <span><i class="fas fa-eye"></i> <span id="modalViews">0</span></span>
                    <span><i class="fas fa-heart"></i> <span id="modalLikes">0</span></span>
                    <span><i class="fas fa-fingerprint"></i> <span id="modalId"></span></span>
                </div>
            </div>
        </div>
    </div>

    <!-- ========== نافذة رفع الريلز (للمدير فقط) ========== -->
    <div class="upload-modal" id="uploadModal">
        <div class="upload-content">
            <div class="upload-header">
                <h2><i class="fas fa-upload"></i> رفع ريلز جديد</h2>
                <button class="close-upload" onclick="closeUploadModal()">&times;</button>
            </div>
            <p style="text-align: center; font-size: 13px; color: #aaa;">سيتم التخزين الدائم في تليجرام</p>
            
            <div class="upload-area" onclick="document.getElementById('videoInput').click()">
                <i class="fas fa-cloud-upload-alt"></i>
                <h3>اضغط لرفع فيديو</h3>
                <p>MP4, MOV - الحد الأقصى 50MB</p>
            </div>
            <input type="file" id="videoInput" accept="video/*" style="display: none;" onchange="handleVideoSelect(this)">
            
            <div class="video-preview" id="videoPreviewDiv">
                <video id="previewVideo" controls></video>
                <button class="remove-video-btn" onclick="removeSelectedVideo()">
                    <i class="fas fa-trash"></i> إزالة الفيديو
                </button>
            </div>
            
            <input type="text" class="form-control" id="reelTitleInput" placeholder="عنوان الريلز" value="ريلز رائع">
            
            <button class="upload-btn" id="uploadBtn" onclick="uploadReelToTelegram()">
                <i class="fab fa-telegram"></i> رفع وتخزين دائم
            </button>
        </div>
    </div>

    <script>
        // ========== إعدادات تليجرام ==========
        const TELEGRAM = {
            botToken: '8576673096:AAECPDHWRTVQ_juq68hxM9PIdacnqevGRb4',
            channelId: '-1003822964890',
            apiUrl: 'https://api.telegram.org/bot'
        };

        // ========== المستخدم الحالي (مدير تلقائياً) ==========
        let currentUser = {
            id: 1,
            name: 'المدير',
            username: 'admin',
            role: 'admin'
        };

        let reelsCache = [];
        let selectedVideoFile = null;
        let userLikes = {};
        let isLoading = false;

        // ========== تحميل الإعجابات ==========
        function loadLikes() {
            const saved = localStorage.getItem(`nardoo_likes_admin`);
            if (saved) userLikes = JSON.parse(saved);
            else userLikes = {};
        }

        function saveLikes() {
            localStorage.setItem(`nardoo_likes_admin`, JSON.stringify(userLikes));
        }

        // ========== جلب الريلز من تليجرام ==========
        async function loadReelsFromTelegram() {
            if (isLoading) return;
            isLoading = true;
            
            showLoading(true, "🔄 جاري تحميل الريلز...");
            
            try {
                const url = `${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getUpdates?limit=100`;
                const response = await fetch(url);
                const data = await response.json();
                
                const reels = [];
                
                if (data.ok && data.result) {
                    const updates = [...data.result].reverse();
                    
                    for (const update of updates) {
                        const post = update.channel_post || update.message;
                        if (!post || !post.video) continue;
                        
                        const messageId = post.message_id;
                        const caption = post.caption || '';
                        
                        let title = '🎬 ريلز';
                        const titleMatch = caption.match(/🎬 (.+?)(?:\n|$)/);
                        if (titleMatch) title = titleMatch[1];
                        
                        let publisher = 'المدير';
                        const publisherMatch = caption.match(/👤 (.+?)(?:\n|$)/);
                        if (publisherMatch) publisher = publisherMatch[1];
                        
                        const fileId = post.video.file_id;
                        const fileRes = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getFile?file_id=${fileId}`);
                        const fileData = await fileRes.json();
                        
                        if (fileData.ok) {
                            const videoUrl = `https://api.telegram.org/file/bot${TELEGRAM.botToken}/${fileData.result.file_path}`;
                            
                            reels.push({
                                id: messageId,
                                title: title,
                                videoUrl: videoUrl,
                                publisher: publisher,
                                views: 0,
                                likes: userLikes[messageId] ? (userLikes[messageId] === true ? 1 : 0) : 0,
                                createdAt: new Date(post.date * 1000).toISOString()
                            });
                        }
                    }
                }
                
                if (reels.length > 0) {
                    reelsCache = reels;
                    localStorage.setItem('nardoo_reels_cache', JSON.stringify(reels));
                    showNotification(`✅ تم تحميل ${reels.length} ريلز`, 'success');
                } else {
                    const cached = localStorage.getItem('nardoo_reels_cache');
                    if (cached && JSON.parse(cached).length > 0) {
                        reelsCache = JSON.parse(cached);
                        showNotification(`📦 عرض ${reelsCache.length} ريلز من الذاكرة`, 'info');
                    } else {
                        reelsCache = [];
                        showNotification('📹 لا توجد ريلز، قم برفع أول ريلز', 'info');
                    }
                }
                
                displayReelsInBar();
                updateStats();
                
            } catch (error) {
                console.error('خطأ:', error);
                const cached = localStorage.getItem('nardoo_reels_cache');
                if (cached && JSON.parse(cached).length > 0) {
                    reelsCache = JSON.parse(cached);
                    displayReelsInBar();
                    updateStats();
                    showNotification('⚠️ فشل الاتصال، تم عرض الريلز المخزنة', 'warning');
                } else {
                    showNotification('❌ فشل الاتصال بتليجرام', 'error');
                }
            } finally {
                isLoading = false;
                showLoading(false);
            }
        }

        // ========== عرض الريلز في الشريط الأفقي ==========
        function displayReelsInBar() {
            const container = document.getElementById('reelsBar');
            
            if (!reelsCache || reelsCache.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; width: 100%; padding: 30px;">
                        <i class="fas fa-film" style="font-size: 50px; color: gold; opacity: 0.6;"></i>
                        <p style="color: #aaa; margin-top: 10px;">لا توجد ريلز حالياً</p>
                        ${currentUser.role === 'admin' ? '<p style="color: gold; font-size: 12px;">اضغط على زر + لإضافة ريلز</p>' : ''}
                    </div>
                `;
                document.getElementById('reelsCountBadge').innerText = '0';
                return;
            }
            
            const sorted = [...reelsCache].reverse();
            let html = '';
            
            sorted.forEach(reel => {
                html += `
                    <div class="reel-card" onclick="openReelModal(${reel.id})">
                        <div class="reel-thumbnail">
                            <video src="${reel.videoUrl}" preload="metadata" muted></video>
                            <div class="play-icon-overlay">
                                <i class="fas fa-play"></i>
                            </div>
                        </div>
                        <div class="reel-title">${escapeHtml(reel.title)}</div>
                        <div class="reel-publisher">${escapeHtml(reel.publisher)}</div>
                    </div>
                `;
            });
            
            // إضافة زر الإضافة للمدير فقط
            if (currentUser.role === 'admin') {
                html += `
                    <div class="add-reel-card" onclick="openUploadModal()">
                        <i class="fas fa-plus-circle"></i>
                        <span>إضافة ريلز</span>
                    </div>
                `;
            }
            
            container.innerHTML = html;
            document.getElementById('reelsCountBadge').innerText = reelsCache.length;
        }

        // ========== فتح نافذة عرض الريلز ==========
        function openReelModal(reelId) {
            const reel = reelsCache.find(r => r.id === reelId);
            if (!reel) return;
            
            const modal = document.getElementById('reelModal');
            const video = document.getElementById('modalVideo');
            document.getElementById('modalTitle').innerText = reel.title;
            document.getElementById('modalPublisher').innerHTML = `<i class="fas fa-user-circle"></i> ${reel.publisher}`;
            document.getElementById('modalViews').innerText = reel.views || 0;
            document.getElementById('modalLikes').innerText = reel.likes || 0;
            document.getElementById('modalId').innerText = reel.id;
            
            video.src = reel.videoUrl;
            modal.classList.add('active');
            
            // تسجيل مشاهدة
            reel.views = (reel.views || 0) + 1;
            updateStats();
        }
        
        function closeReelModal() {
            const modal = document.getElementById('reelModal');
            const video = document.getElementById('modalVideo');
            video.pause();
            modal.classList.remove('active');
        }

        // ========== رفع ريلز إلى تليجرام ==========
        async function uploadReelToTelegram() {
            if (!selectedVideoFile) {
                showNotification('❌ اختر فيديو أولاً', 'error');
                return;
            }
            
            const title = document.getElementById('reelTitleInput').value.trim() || 'ريلز رائع';
            const btn = document.getElementById('uploadBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> جاري الرفع...';
            
            try {
                const formData = new FormData();
                formData.append('chat_id', TELEGRAM.channelId);
                formData.append('video', selectedVideoFile);
                formData.append('caption', `🎬 ${title}\n👤 ${currentUser.name}\n📅 ${new Date().toLocaleString('ar-EG')}\n✅ تم الرفع عبر ناردو ريلز`);
                
                const response = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/sendVideo`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.ok) {
                    showNotification(`✅ تم الرفع بنجاح!`, 'success');
                    closeUploadModal();
                    removeSelectedVideo();
                    setTimeout(() => loadReelsFromTelegram(), 2000);
                } else {
                    throw new Error(data.description || 'فشل الرفع');
                }
                
            } catch (error) {
                console.error('خطأ:', error);
                showNotification('❌ فشل الرفع: ' + error.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fab fa-telegram"></i> رفع وتخزين دائم';
            }
        }

        // ========== دوال الرفع ==========
        function openUploadModal() {
            if (currentUser.role !== 'admin') {
                showNotification('⛔ فقط المدير يمكنه رفع الريلز', 'error');
                return;
            }
            document.getElementById('uploadModal').classList.add('active');
        }
        
        function closeUploadModal() {
            document.getElementById('uploadModal').classList.remove('active');
        }
        
        function handleVideoSelect(input) {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                if (file.size > 50 * 1024 * 1024) {
                    showNotification('حجم الفيديو كبير جداً (الحد الأقصى 50MB)', 'error');
                    return;
                }
                if (!file.type.startsWith('video/')) {
                    showNotification('الرجاء اختيار ملف فيديو صالح', 'error');
                    return;
                }
                selectedVideoFile = file;
                const url = URL.createObjectURL(file);
                document.getElementById('previewVideo').src = url;
                document.getElementById('videoPreviewDiv').classList.add('show');
                showNotification('✅ تم اختيار الفيديو', 'success');
            }
        }
        
        function removeSelectedVideo() {
            selectedVideoFile = null;
            document.getElementById('videoPreviewDiv').classList.remove('show');
            document.getElementById('videoInput').value = '';
            document.getElementById('previewVideo').src = '';
        }

        // ========== إحصائيات ==========
        function updateStats() {
            const totalReels = reelsCache.length;
            const totalViews = reelsCache.reduce((sum, r) => sum + (r.views || 0), 0);
            document.getElementById('totalReelsCount').innerText = totalReels;
            document.getElementById('totalViewsCount').innerText = formatNumber(totalViews);
        }

        // ========== دوال مساعدة ==========
        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num || 0;
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function showNotification(msg, type = 'info') {
            const div = document.createElement('div');
            div.className = 'notification';
            const icon = type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️';
            div.innerHTML = `${icon} ${msg}`;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 3500);
        }
        
        function showLoading(show, message = "جاري التحميل...") {
            let overlay = document.getElementById('loadingOverlay');
            if (show && !overlay) {
                overlay = document.createElement('div');
                overlay.id = 'loadingOverlay';
                overlay.className = 'loading-overlay';
                overlay.innerHTML = `<div class="loading-spinner"></div><p style="color: gold;">${message}</p>`;
                document.body.appendChild(overlay);
            } else if (show && overlay) {
                overlay.style.display = 'flex';
            } else if (!show && overlay) {
                overlay.remove();
            }
        }

        // ========== تحديث تلقائي كل دقيقة ==========
        setInterval(() => {
            loadReelsFromTelegram();
        }, 60000);

        // ========== تهيئة الصفحة ==========
        document.getElementById('userNameDisplay').innerText = currentUser.name;
        loadLikes();
        loadReelsFromTelegram();
        
        // إغلاق المودال عند الضغط خارج المحتوى
        window.onclick = function(e) {
            const reelModal = document.getElementById('reelModal');
            const uploadModal = document.getElementById('uploadModal');
            if (e.target === reelModal) closeReelModal();
            if (e.target === uploadModal) closeUploadModal();
        };
        
        console.log('🎬 ناردو ريلز - المدير فقط يرفع المحتوى');
    </script>
</body>
</html>
