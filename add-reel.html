<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ناردو ريلز | تليجرام كقاعدة بيانات</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0a0f1a 0%, #0f1420 100%);
            color: white;
            overflow-x: hidden;
        }

        /* شاشة التحميل */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0f1a, #0f1420);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            flex-direction: column;
            gap: 20px;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 215, 0, 0.2);
            border-top: 4px solid #ffd700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* الهيدر */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, rgba(0,0,0,0.95), rgba(0,0,0,0.85));
            backdrop-filter: blur(15px);
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            border-bottom: 2px solid #ffd700;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo i {
            font-size: 28px;
            color: #ffd700;
        }

        .logo h1 {
            font-size: 20px;
            background: linear-gradient(135deg, #ffd700, #ffb347);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats {
            display: flex;
            gap: 20px;
        }

        .stat {
            background: rgba(255, 215, 0, 0.1);
            padding: 8px 16px;
            border-radius: 25px;
            text-align: center;
        }

        .stat-number {
            font-size: 18px;
            font-weight: bold;
            color: #ffd700;
        }

        .stat-label {
            font-size: 11px;
            color: rgba(255,255,255,0.7);
        }

        .refresh-btn {
            background: rgba(255, 215, 0, 0.2);
            border: 1px solid #ffd700;
            padding: 8px 20px;
            border-radius: 25px;
            color: #ffd700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .refresh-btn:hover {
            background: #ffd700;
            color: black;
        }

        /* مشغل الفيديوهات */
        .reels-container {
            margin-top: 80px;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }

        .reel-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 215, 0, 0.3);
            transition: all 0.3s;
            animation: fadeInUp 0.5s ease;
        }

        .reel-card:hover {
            transform: translateY(-5px);
            border-color: #ffd700;
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.2);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .video-wrapper {
            position: relative;
            background: #000;
            cursor: pointer;
        }

        .video-wrapper video {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .play-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            background: rgba(0,0,0,0.7);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            pointer-events: none;
        }

        .play-overlay i {
            font-size: 30px;
            color: #ffd700;
        }

        .video-wrapper:hover .play-overlay {
            transform: translate(-50%, -50%) scale(1.1);
            background: rgba(0,0,0,0.8);
        }

        .reel-info {
            padding: 15px;
        }

        .reel-title {
            font-size: 16px;
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .reel-publisher {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 10px;
        }

        .reel-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: rgba(255,255,255,0.5);
        }

        .reel-id {
            font-family: monospace;
            background: rgba(255,215,0,0.1);
            padding: 4px 8px;
            border-radius: 12px;
        }

        .like-btn {
            background: none;
            border: none;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 5px 10px;
            border-radius: 20px;
            transition: all 0.3s;
        }

        .like-btn:hover {
            color: #ff0066;
        }

        .like-btn.liked {
            color: #ff0066;
        }

        .like-count {
            font-size: 12px;
        }

        /* نافذة عرض الفيديو المكبر */
        .modal-player {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            width: 90%;
            max-width: 800px;
            background: #1a1a2e;
            border-radius: 25px;
            overflow: hidden;
            border: 2px solid #ffd700;
        }

        .modal-header {
            background: linear-gradient(135deg, #ffd700, #ffb347);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            color: #1a1a2e;
            margin: 0;
        }

        .close-modal {
            background: rgba(0,0,0,0.3);
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .close-modal:hover {
            background: #ff4444;
            transform: scale(1.1);
        }

        .modal-video {
            background: #000;
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-video video {
            width: 100%;
            max-height: 500px;
        }

        .modal-info {
            padding: 15px 20px;
            background: rgba(0,0,0,0.8);
        }

        /* حالة عدم وجود فيديوهات */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            grid-column: 1 / -1;
        }

        .empty-state i {
            font-size: 80px;
            color: #ffd700;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state h3 {
            color: #ffd700;
            margin-bottom: 10px;
        }

        /* إشعارات */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 12px 24px;
            border-radius: 50px;
            z-index: 3000;
            animation: slideInRight 0.3s ease;
        }

        .toast-success {
            background: #10b981;
            color: white;
        }

        .toast-error {
            background: #ef4444;
            color: white;
        }

        .toast-info {
            background: #3b82f6;
            color: white;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .reels-container {
                grid-template-columns: 1fr;
                padding: 15px;
                margin-top: 100px;
            }
            .header {
                flex-direction: column;
                gap: 10px;
                padding: 12px;
            }
            .stats {
                width: 100%;
                justify-content: center;
            }
            .toast {
                bottom: 20px;
                right: 20px;
                left: 20px;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <!-- شاشة التحميل -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-spinner"></div>
        <p style="color: #ffd700;">🔄 جاري تحميل الفيديوهات من تليجرام...</p>
        <p style="font-size: 12px; color: rgba(255,255,255,0.5);">تليجرام هو قاعدة البيانات المركزية</p>
    </div>

    <!-- الهيدر -->
    <div class="header" id="header" style="display: none;">
        <div class="logo">
            <i class="fab fa-telegram"></i>
            <h1>ناردو ريلز | تخزين تليجرام</h1>
        </div>
        <div class="stats">
            <div class="stat">
                <div class="stat-number" id="totalReels">0</div>
                <div class="stat-label">فيديو</div>
            </div>
            <div class="stat">
                <div class="stat-number" id="totalViews">0</div>
                <div class="stat-label">مشاهدة</div>
            </div>
        </div>
        <button class="refresh-btn" onclick="loadVideosFromTelegram()">
            <i class="fas fa-sync-alt"></i> تحديث
        </button>
    </div>

    <!-- حاوية الفيديوهات -->
    <div class="reels-container" id="reelsContainer"></div>

    <script>
        // ========== إعدادات تليجرام ==========
        const TELEGRAM = {
            botToken: '8576673096:AAECPDHWRTVQ_juq68hxM9PIdacnqevGRb4',
            channelId: '-1003822964890',
            apiUrl: 'https://api.telegram.org/bot'
        };

        // ========== المتغيرات ==========
        let allVideos = [];           // جميع الفيديوهات من تليجرام
        let userLikes = {};           // إعجابات المستخدم
        let videoCache = {};          // تخزين مؤقت للروابط
        let currentUser = null;       // المستخدم الحالي

        // ========== تهيئة المستخدم ==========
        function initUser() {
            let userId = localStorage.getItem('user_id');
            if (!userId) {
                userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
                localStorage.setItem('user_id', userId);
            }
            
            let userName = localStorage.getItem('user_name');
            if (!userName) {
                userName = 'مستخدم_' + userId.substr(-4);
                localStorage.setItem('user_name', userName);
            }
            
            currentUser = {
                id: userId,
                name: userName
            };
            
            // تحميل الإعجابات
            const savedLikes = localStorage.getItem(`likes_${userId}`);
            if (savedLikes) {
                userLikes = JSON.parse(savedLikes);
            }
        }

        // ========== حفظ الإعجابات ==========
        function saveLikes() {
            localStorage.setItem(`likes_${currentUser.id}`, JSON.stringify(userLikes));
        }

        // ========== جلب الفيديوهات من تليجرام (قاعدة البيانات) ==========
        async function loadVideosFromTelegram() {
            const loadingScreen = document.getElementById('loadingScreen');
            const header = document.getElementById('header');
            
            loadingScreen.style.display = 'flex';
            
            try {
                console.log('🔄 جلب الفيديوهات من تليجرام...');
                
                // جلب آخر التحديثات من القناة
                const response = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getUpdates?limit=100`);
                const data = await response.json();
                
                if (!data.ok) {
                    throw new Error(data.description || 'فشل الاتصال بتليجرام');
                }
                
                const videos = [];
                
                // البحث عن مقاطع الفيديو في الرسائل
                if (data.result && data.result.length > 0) {
                    for (const update of data.result) {
                        const post = update.channel_post || update.message;
                        if (post && post.video) {
                            const videoId = post.message_id;
                            
                            // التحقق من وجود الفيديو في الكاش
                            let videoUrl = videoCache[videoId];
                            
                            if (!videoUrl) {
                                // جلب رابط الفيديو من تليجرام
                                const fileId = post.video.file_id;
                                const fileRes = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getFile?file_id=${fileId}`);
                                const fileData = await fileRes.json();
                                
                                if (fileData.ok) {
                                    videoUrl = `https://api.telegram.org/file/bot${TELEGRAM.botToken}/${fileData.result.file_path}`;
                                    videoCache[videoId] = videoUrl;
                                }
                            }
                            
                            // استخراج المعلومات من الكابشن
                            const caption = post.caption || '';
                            let title = '🎬 ريلز';
                            let publisher = 'ناردو برو';
                            
                            // استخراج العنوان
                            const titleMatch = caption.match(/🎬\s*(.+?)(?:\n|$)/);
                            if (titleMatch) title = titleMatch[1];
                            
                            // استخراج الناشر
                            const publisherMatch = caption.match(/👤\s*(.+?)(?:\n|$)/);
                            if (publisherMatch) publisher = publisherMatch[1];
                            
                            videos.push({
                                id: videoId,
                                title: title,
                                publisher: publisher,
                                videoUrl: videoUrl,
                                date: new Date(post.date * 1000).toISOString(),
                                views: 0,
                                likes: userLikes[videoId] ? (userLikes[videoId].count || 0) : 0
                            });
                        }
                    }
                }
                
                if (videos.length > 0) {
                    // ترتيب من الأحدث للأقدم
                    allVideos = videos.reverse();
                    
                    // حفظ في localStorage كنسخة احتياطية
                    localStorage.setItem('cached_videos', JSON.stringify(allVideos));
                    
                    console.log(`✅ تم تحميل ${allVideos.length} فيديو من تليجرام`);
                    showToast(`📹 تم تحميل ${allVideos.length} فيديو`, 'success');
                } else {
                    // استخدام النسخة الاحتياطية
                    const cached = localStorage.getItem('cached_videos');
                    if (cached) {
                        allVideos = JSON.parse(cached);
                        console.log(`📦 استخدام ${allVideos.length} فيديو من الكاش`);
                        showToast(`📦 عرض ${allVideos.length} فيديو من الذاكرة`, 'info');
                    } else {
                        allVideos = [];
                        showToast('⚠️ لا توجد فيديوهات في القناة', 'info');
                    }
                }
                
                // عرض الفيديوهات
                displayVideos();
                updateStats();
                
                // إخفاء شاشة التحميل وإظهار المحتوى
                loadingScreen.style.display = 'none';
                header.style.display = 'flex';
                
            } catch (error) {
                console.error('❌ خطأ:', error);
                loadingScreen.style.display = 'none';
                header.style.display = 'flex';
                
                // محاولة استخدام الكاش
                const cached = localStorage.getItem('cached_videos');
                if (cached) {
                    allVideos = JSON.parse(cached);
                    displayVideos();
                    updateStats();
                    showToast('⚠️ فشل الاتصال، تم عرض الفيديوهات المخزنة', 'error');
                } else {
                    showEmptyState();
                    showToast('❌ فشل تحميل الفيديوهات من تليجرام', 'error');
                }
            }
        }

        // ========== عرض الفيديوهات ==========
        function displayVideos() {
            const container = document.getElementById('reelsContainer');
            
            if (!allVideos || allVideos.length === 0) {
                showEmptyState();
                return;
            }
            
            container.innerHTML = allVideos.map(video => {
                const isLiked = userLikes[video.id]?.liked === true;
                const likeCount = userLikes[video.id]?.count || video.likes || 0;
                const date = new Date(video.date).toLocaleDateString('ar-EG');
                
                return `
                    <div class="reel-card" data-id="${video.id}">
                        <div class="video-wrapper" onclick="openVideoModal(${video.id})">
                            <video preload="metadata" poster="">
                                <source src="${video.videoUrl}" type="video/mp4">
                            </video>
                            <div class="play-overlay">
                                <i class="fas fa-play"></i>
                            </div>
                        </div>
                        <div class="reel-info">
                            <div class="reel-title">
                                <i class="fas fa-tag"></i>
                                ${escapeHtml(video.title)}
                            </div>
                            <div class="reel-publisher">
                                <i class="fas fa-user-circle"></i>
                                ${escapeHtml(video.publisher)}
                            </div>
                            <div class="reel-meta">
                                <span class="reel-id">
                                    <i class="fas fa-fingerprint"></i> ID: ${video.id}
                                </span>
                                <button class="like-btn ${isLiked ? 'liked' : ''}" onclick="toggleLike(${video.id}, event)">
                                    <i class="fas fa-heart"></i>
                                    <span class="like-count">${formatNumber(likeCount)}</span>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ========== فتح نافذة تشغيل الفيديو ==========
        function openVideoModal(videoId) {
            const video = allVideos.find(v => v.id === videoId);
            if (!video) return;
            
            // زيادة المشاهدات
            video.views = (video.views || 0) + 1;
            updateStats();
            
            const modal = document.createElement('div');
            modal.className = 'modal-player';
            modal.innerHTML = `
                <div class="modal-content">
                    <div class="modal-header">
                        <h3>
                            <i class="fas fa-play-circle"></i> ${escapeHtml(video.title)}
                        </h3>
                        <button class="close-modal" onclick="this.closest('.modal-player').remove()">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    <div class="modal-video">
                        <video controls autoplay>
                            <source src="${video.videoUrl}" type="video/mp4">
                            متصفحك لا يدعم تشغيل الفيديو
                        </video>
                    </div>
                    <div class="modal-info">
                        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
                            <div>
                                <div style="color: #ffd700; margin-bottom: 5px;">
                                    <i class="fas fa-user"></i> ${escapeHtml(video.publisher)}
                                </div>
                                <div style="font-size: 12px; color: #aaa;">
                                    <i class="fas fa-fingerprint"></i> المعرف: ${video.id}
                                </div>
                            </div>
                            <button class="like-btn" onclick="toggleLikeInModal(${video.id})" id="modalLikeBtn">
                                <i class="fas fa-heart"></i>
                                <span>${formatNumber(userLikes[video.id]?.count || 0)}</span>
                            </button>
                        </div>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            
            // تحديث زر الإعجاب في المودال
            const updateModalLike = () => {
                const likeBtn = document.getElementById('modalLikeBtn');
                if (likeBtn) {
                    const isLiked = userLikes[video.id]?.liked === true;
                    const count = userLikes[video.id]?.count || 0;
                    likeBtn.innerHTML = `<i class="fas fa-heart"></i> <span>${formatNumber(count)}</span>`;
                    if (isLiked) {
                        likeBtn.classList.add('liked');
                    } else {
                        likeBtn.classList.remove('liked');
                    }
                }
            };
            
            window.updateModalLike = updateModalLike;
            
            // إغلاق عند الضغط خارج المحتوى
            modal.addEventListener('click', (e) => {
                if (e.target === modal) modal.remove();
            });
        }

        // ========== تبديل الإعجاب ==========
        function toggleLike(videoId, event) {
            if (event) event.stopPropagation();
            
            if (!userLikes[videoId]) {
                userLikes[videoId] = { liked: false, count: 0 };
            }
            
            if (userLikes[videoId].liked) {
                // إلغاء الإعجاب
                userLikes[videoId].liked = false;
                userLikes[videoId].count = Math.max(0, userLikes[videoId].count - 1);
            } else {
                // إعجاب
                userLikes[videoId].liked = true;
                userLikes[videoId].count = (userLikes[videoId].count || 0) + 1;
            }
            
            saveLikes();
            
            // تحديث عرض البطاقة
            const video = allVideos.find(v => v.id === videoId);
            if (video) {
                video.likes = userLikes[videoId].count;
            }
            
            displayVideos();
            
            // تحديث المودال إذا كان مفتوحاً
            if (window.updateModalLike) {
                window.updateModalLike();
            }
        }

        function toggleLikeInModal(videoId) {
            toggleLike(videoId, null);
        }

        // ========== تحديث الإحصائيات ==========
        function updateStats() {
            const totalReels = allVideos.length;
            const totalViews = allVideos.reduce((sum, v) => sum + (v.views || 0), 0);
            
            document.getElementById('totalReels').innerText = totalReels;
            document.getElementById('totalViews').innerText = formatNumber(totalViews);
        }

        // ========== عرض حالة عدم وجود فيديوهات ==========
        function showEmptyState() {
            const container = document.getElementById('reelsContainer');
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fab fa-telegram"></i>
                    <h3>📹 لا توجد فيديوهات بعد</h3>
                    <p style="color: rgba(255,255,255,0.6); margin-top: 10px;">
                        قم برفع أول فيديو إلى قناة تليجرام<br>
                        وسيظهر هنا تلقائياً لجميع المستخدمين
                    </p>
                    <div style="margin-top: 20px; font-size: 12px; color: #ffd700;">
                        <i class="fas fa-database"></i> تليجرام هو قاعدة البيانات المركزية
                    </div>
                </div>
            `;
        }

        // ========== دوال مساعدة ==========
        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num || 0;
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'slideInRight 0.3s reverse';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // ========== التحديث التلقائي كل 30 ثانية ==========
        let autoRefreshInterval;
        
        function startAutoRefresh() {
            if (autoRefreshInterval) clearInterval(autoRefreshInterval);
            autoRefreshInterval = setInterval(() => {
                loadVideosFromTelegram();
            }, 30000); // كل 30 ثانية
        }

        // ========== تهيئة الصفحة ==========
        initUser();
        loadVideosFromTelegram();
        startAutoRefresh();
        
        console.log('🎬 نظام ناردو ريلز - تليجرام كقاعدة بيانات');
        console.log(`👤 المستخدم: ${currentUser.name}`);
        console.log('📡 التحديث التلقائي كل 30 ثانية');
    </script>
</body>
