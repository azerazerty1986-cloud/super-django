
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>إضافة ريلز | ناردو برو</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0a0f1a, #0f1420);
            color: white;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 25px;
            padding: 25px;
            border: 1px solid rgba(255,215,0,0.3);
            backdrop-filter: blur(10px);
        }

        h1 {
            color: gold;
            text-align: center;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .upload-area {
            border: 2px dashed rgba(255,215,0,0.5);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 20px;
            transition: all 0.3s;
            background: rgba(255,215,0,0.05);
        }

        .upload-area:hover {
            border-color: gold;
            background: rgba(255,215,0,0.1);
            transform: scale(1.02);
        }

        .upload-area i {
            font-size: 50px;
            color: gold;
            margin-bottom: 10px;
        }

        .video-preview {
            display: none;
            margin-bottom: 20px;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
        }

        .video-preview video {
            width: 100%;
            max-height: 300px;
        }

        .remove-video {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255,0,0,0.7);
            border: none;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: gold;
            font-weight: 600;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 10px;
            color: white;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: gold;
            background: rgba(255,255,255,0.15);
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, gold, #ffb347);
            color: black;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255,215,0,0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .serial-info {
            background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,215,0,0.05));
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            text-align: center;
            font-family: monospace;
            font-size: 12px;
            direction: ltr;
            border: 1px solid rgba(255,215,0,0.3);
            transition: all 0.3s;
        }

        .serial-info i {
            color: gold;
            margin-left: 8px;
        }

        .serial-info.success {
            background: rgba(0,255,0,0.2);
            border-color: green;
            color: #90ff90;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: gold;
            text-decoration: none;
            text-align: center;
            width: 100%;
            transition: all 0.3s;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: gold;
            color: black;
            padding: 12px 24px;
            border-radius: 50px;
            z-index: 2000;
            font-weight: bold;
            animation: slideUp 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            flex-direction: column;
            gap: 20px;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,215,0,0.3);
            border-top-color: gold;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .progress-bar {
            width: 80%;
            max-width: 300px;
            height: 4px;
            background: rgba(255,215,0,0.3);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: gold;
            width: 0%;
            transition: width 0.3s;
        }

        @media (max-width: 600px) {
            .container { padding: 10px; }
            .card { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>
                <i class="fab fa-telegram"></i>
                إضافة ريلز جديد
            </h1>

            <!-- منطقة رفع الفيديو -->
            <div class="upload-area" onclick="document.getElementById('videoFile').click()">
                <i class="fas fa-cloud-upload-alt"></i>
                <p>اضغط لرفع الفيديو</p>
                <small>MP4 - الحد الأقصى 50MB</small>
            </div>
            <input type="file" id="videoFile" accept="video/*" style="display: none;" onchange="previewVideo(this)">

            <!-- معاينة الفيديو -->
            <div id="videoPreview" class="video-preview">
                <video id="previewVideo" controls></video>
                <button class="remove-video" onclick="removeVideo()">✕</button>
            </div>

            <!-- معلومات الفيديو -->
            <div class="input-group">
                <label><i class="fas fa-heading"></i> عنوان الريلز *</label>
                <input type="text" id="videoTitle" placeholder="أدخل عنوان الريلز..." value="ريلز رائع">
            </div>

            <div class="input-group">
                <label><i class="fas fa-user"></i> اسم الناشر *</label>
                <input type="text" id="videoPublisher" placeholder="اسم الناشر..." value="ناردو برو">
            </div>

            <div class="input-group">
                <label><i class="fas fa-tag"></i> هاشتاجات (اختياري)</label>
                <textarea id="videoHashtags" placeholder="#ريلز #ناردو #تيك_توك" rows="2"></textarea>
            </div>

            <!-- عرض المعرف الذي سيتم إنشاؤه -->
            <div class="serial-info" id="serialInfo">
                <i class="fas fa-fingerprint"></i> 
                🔐 سيتم إنشاء معرف سري تلقائياً عند الرفع<br>
                <small style="color: #aaa;">الصيغة: NARD-YYYYMMDD-HHMMSS-XXXX</small>
            </div>

            <!-- أزرار الإجراءات -->
            <button class="btn" id="uploadBtn" onclick="uploadVideo()">
                <i class="fab fa-telegram"></i> رفع ونشر للجميع
            </button>
            <a href="index.html" class="back-link">← العودة للرئيسية</a>
        </div>
    </div>

    <script>
        // ========== إعدادات تليجرام (متوافقة مع index.html) ==========
        const BOT_TOKEN = '8576673096:AAHj80CdifTJNlOs6JgouHmjEXl0bM-8Shw';
        const CHANNEL_ID = '-1003822964890';
        const API_URL = `https://api.telegram.org/bot${BOT_TOKEN}`;

        let selectedFile = null;
        let currentUser = null;

        // ========== تحميل المستخدم الحالي ==========
        function loadCurrentUser() {
            try {
                const savedUser = localStorage.getItem('current_user');
                if (savedUser) {
                    currentUser = JSON.parse(savedUser);
                    const publisherInput = document.getElementById('videoPublisher');
                    if (currentUser.name && currentUser.name !== 'زائر') {
                        publisherInput.value = currentUser.name;
                    }
                } else {
                    currentUser = { id: 0, name: 'زائر', role: 'guest' };
                }
            } catch(e) {
                currentUser = { id: 0, name: 'زائر', role: 'guest' };
            }
        }

        // ========== دالة إنشاء معرف فريد بصيغة NARD-YYYYMMDD-HHMMSS-XXXX ==========
        function generateSerialNumber() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            const random = Math.floor(Math.random() * 10000).toString().padStart(4, '0');
            return `NARD-${year}${month}${day}-${hours}${minutes}${seconds}-${random}`;
        }

        // ========== عرض المعاينة ==========
        function previewVideo(input) {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                
                // التحقق من الحجم
                if (file.size > 50 * 1024 * 1024) {
                    showToast("❌ حجم الفيديو كبير جداً (الحد الأقصى 50MB)");
                    input.value = '';
                    return;
                }
                
                // التحقق من النوع
                if (!file.type.startsWith('video/')) {
                    showToast("❌ يرجى اختيار ملف فيديو صالح (MP4)");
                    input.value = '';
                    return;
                }

                selectedFile = file;
                const url = URL.createObjectURL(file);
                const preview = document.getElementById('videoPreview');
                const previewVideo = document.getElementById('previewVideo');
                previewVideo.src = url;
                preview.style.display = 'block';
                
                // تحديث معلومات المعرف
                const serial = generateSerialNumber();
                document.getElementById('serialInfo').innerHTML = `
                    <i class="fas fa-fingerprint"></i> 
                    🔐 المعرف السري الذي سيتم إنشاؤه:<br>
                    <strong style="color: gold; font-size: 14px;">${serial}</strong>
                `;
            }
        }
        
        // ========== إعدادات تليجرام ==========
        const TELEGRAM = {
            botToken: '8576673096:AAHj80CdifTJNlOs6JgouHmjEXl0bM-8Shw',
            channelId: '-1003822964890',
            apiUrl: 'https://api.telegram.org/bot'
        };
        
        // ========== متغيرات الريلز ==========
        let allReels = [];
        let specialReels = [];
        let currentPlayingVideo = null;
        
        // ========== استخراج المعرف الخاص ==========
        function extractSerialFromCaption(caption) {
            if (!caption) return null;
            let match = caption.match(/🔑\s*NARD-SERIAL:\s*(NARD-[A-Z0-9-]+)/i);
            if (match) return match[1];
            match = caption.match(/\b(NARD-[A-Z0-9-]+)\b/i);
            return match ? match[1] : null;
        }
        
        // ========== جلب جميع الريلز ==========
        async function fetchAllReels() {
            try {
                const url = `${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getUpdates?limit=100`;
                const response = await fetch(url);
                const data = await response.json();
                
                const reels = [];
                
                if (data.ok && data.result) {
                    const updates = [...data.result].reverse();
                    
                    for (const update of updates) {
                        const post = update.channel_post || update.message;
                        if (!post || !post.video) continue;
                        
                        const caption = post.caption || '';
                        const serial = extractSerialFromCaption(caption);
                        
                        let title = '🎬 ريلز';
                        const titleMatch = caption.match(/🎬\s*(.+?)(?:\n|$)/);
                        if (titleMatch) title = titleMatch[1];
                        
                        let publisher = 'ناردو برو';
                        const publisherMatch = caption.match(/👤\s*(.+?)(?:\n|$)/);
                        if (publisherMatch) publisher = publisherMatch[1];
                        
                        const fileRes = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getFile?file_id=${post.video.file_id}`);
                        const fileData = await fileRes.json();
                        
                        if (fileData.ok) {
                            const videoUrl = `https://api.telegram.org/file/bot${TELEGRAM.botToken}/${fileData.result.file_path}`;
                            
                            reels.push({
                                id: post.message_id,
                                title: title,
                                videoUrl: videoUrl,
                                publisher: publisher,
                                serialNumber: serial,
                                views: 0,
                                likes: 0,
                                date: new Date(post.date * 1000).toISOString()
                            });
                        }
                    }
                }
                return reels;
            } catch (error) {
                console.error('خطأ:', error);
                return [];
            }
        }
        
        // ========== تحميل وعرض الريلز ==========
        async function loadAllReelsData() {
            const specialContainer = document.getElementById('specialReelsContainer');
            const allContainer = document.getElementById('allReelsGrid');
            
            if (specialContainer) specialContainer.innerHTML = `<div class="loading-reels"><i class="fas fa-spinner fa-spin"></i><p>🔄 جاري التحميل...</p></div>`;
            if (allContainer) allContainer.innerHTML = `<div class="loading-reels"><i class="fas fa-spinner fa-spin"></i><p>🔄 جاري التحميل...</p></div>`;
            
            allReels = await fetchAllReels();
            specialReels = allReels.filter(r => r.serialNumber && r.serialNumber.startsWith('NARD-'));
            
            displaySpecialReels();
            displayAllReels();
            
            localStorage.setItem('nardoo_reels_all', JSON.stringify(allReels));
        }
        
        function displaySpecialReels() {
            const container = document.getElementById('specialReelsContainer');
            if (!container) return;
            
            if (!specialReels || specialReels.length === 0) {
                container.innerHTML = `<div class="no-reels-message"><i class="fas fa-star"></i><p>✨ لا توجد ريلز مميزة بعد</p><p>الريلز التي تحمل المعرف NARD- فقط تظهر هنا</p></div>`;
                return;
            }
            
            const sorted = [...specialReels].reverse();
            container.innerHTML = sorted.map(r => `
                <div class="reel-video-card" onclick="openReelPlayer('${r.id}', true)">
                    <div class="reel-video-placeholder">
                        <i class="fas fa-play-circle"></i>
                        <div class="reel-play-overlay"><i class="fas fa-play"></i></div>
                        ${r.serialNumber ? `<div class="serial-badge-top"><i class="fas fa-key"></i> ${escapeHtml(r.serialNumber)}</div>` : ''}
                    </div>
                    <div class="reel-video-overlay">
                        <div class="reel-video-info">
                            <span class="reel-video-title">🎬 ${escapeHtml(r.title)}</span>
                            <span class="reel-video-views"><i class="fas fa-eye"></i> ${r.views || 0}</span>
                        </div>
                        <div class="reel-video-publisher"><i class="fas fa-user"></i> ${escapeHtml(r.publisher)}</div>
                        ${r.serialNumber ? `<div class="reel-serial-badge"><i class="fas fa-fingerprint"></i> ${escapeHtml(r.serialNumber)}</div>` : ''}
                    </div>
                </div>
            `).join('');
        }
        
        function displayAllReels() {
            const grid = document.getElementById('allReelsGrid');
            if (!grid) return;
            
            if (!allReels || allReels.length === 0) {
                grid.innerHTML = `<div class="no-reels-message" style="grid-column:1/-1"><i class="fas fa-film"></i><p>📹 لا توجد ريلز متاحة حالياً</p></div>`;
                return;
            }
            
            const sorted = [...allReels].reverse();
            grid.innerHTML = sorted.map(r => {
                const hasSerial = r.serialNumber && r.serialNumber.startsWith('NARD-');
                return `
                    <div class="all-reels-card ${hasSerial ? 'special-reel-card' : ''}" onclick="openReelPlayer('${r.id}', false)">
                        <div class="all-reels-thumb">
                            <i class="fas fa-play-circle"></i>
                            ${hasSerial ? '<div class="special-badge-small"><i class="fas fa-crown"></i> مميز</div>' : ''}
                        </div>
                        <div class="all-reels-info">
                            <div class="all-reels-title">${hasSerial ? '<i class="fas fa-star" style="color:gold"></i> ' : '🎬 '}${escapeHtml(r.title)}</div>
                            <div class="all-reels-meta"><i class="fas fa-user"></i> ${escapeHtml(r.publisher)}</div>
                            <div class="all-reels-meta"><i class="fas fa-eye"></i> ${r.views || 0}</div>
                            ${hasSerial ? `<div class="all-reels-meta special-serial"><i class="fas fa-fingerprint"></i> ${escapeHtml(r.serialNumber)}</div>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // ========== مشغل الفيديو ==========
        function openReelPlayer(startId, isSpecial) {
            const source = isSpecial ? specialReels : allReels;
            if (!source || source.length === 0) return;
            
            const modal = document.createElement('div');
            modal.className = 'full-reel-player';
            
            const closeBtn = document.createElement('button');
            closeBtn.className = 'close-full-player';
            closeBtn.innerHTML = '<i class="fas fa-times"></i>';
            closeBtn.onclick = () => modal.remove();
            modal.appendChild(closeBtn);
            
            for (const r of source) {
                const item = document.createElement('div');
                item.className = 'full-reel-item';
                item.setAttribute('data-id', r.id);
                item.innerHTML = `
                    <video src="${r.videoUrl}" muted loop playsinline preload="auto"></video>
                    <div class="full-reel-info">
                        <div class="full-reel-title">🎬 ${escapeHtml(r.title)}</div>
                        <div class="full-reel-publisher"><i class="fas fa-user"></i> ${escapeHtml(r.publisher)}</div>
                        <div class="full-reel-views"><i class="fas fa-eye"></i> ${r.views || 0}</div>
                        ${r.serialNumber ? `<div class="full-reel-serial"><i class="fas fa-key"></i> 🔐 ${escapeHtml(r.serialNumber)}</div>` : ''}
                    </div>
                    <div class="full-reel-actions">
                        <div class="full-reel-action" onclick="likeReel('${r.id}')"><i class="far fa-heart"></i><span>${r.likes || 0}</span></div>
                        <div class="full-reel-action" onclick="shareReel('${r.videoUrl}')"><i class="fas fa-share-alt"></i><span>مشاركة</span></div>
                    </div>
                `;
                modal.appendChild(item);
            }
            
            document.body.appendChild(modal);
            setTimeout(() => {
                const target = document.querySelector(`.full-reel-item[data-id="${startId}"]`);
                if (target) target.scrollIntoView({ behavior: 'instant' });
                modal.addEventListener('scroll', () => playVisibleVideo(modal));
                playVisibleVideo(modal);
            }, 100);
        }
        
        function playVisibleVideo(modal) {
            const items = modal.querySelectorAll('.full-reel-item');
            if (!items.length) return;
            const center = modal.getBoundingClientRect().top + modal.clientHeight / 2;
            let active = null;
            let min = Infinity;
            items.forEach(item => {
                const rect = item.getBoundingClientRect();
                const dist = Math.abs(rect.top + rect.height/2 - center);
                if (dist < min) { min = dist; active = item; }
            });
            if (active) {
                const vid = active.querySelector('video');
                if (vid) {
                    if (currentPlayingVideo && currentPlayingVideo !== vid) currentPlayingVideo.pause();
                    vid.play().catch(e => console.log);
                    currentPlayingVideo = vid;
                }
            }
        }
        
        function likeReel(reelId) {
            const reel = allReels.find(r => r.id == reelId);
            if (reel) {
                reel.likes = (reel.likes || 0) + 1;
                localStorage.setItem('nardoo_reels_all', JSON.stringify(allReels));
                showToastMessage('❤️ تم الإعجاب');
                displayAllReels();
                displaySpecialReels();
            }
        }
        
        function shareReel(url) {
            navigator.clipboard.writeText(url);
            showToastMessage('📎 تم نسخ رابط الفيديو');
        }
        
        function refreshSpecialReels() {
            loadAllReelsData();
            showToastMessage('🔄 جاري تحديث الريلز المميزة');
        }
        
        function refreshAllReels() {
            loadAllReelsData();
            showToastMessage('🔄 جاري تحديث جميع الريلز');
        }
        

        // ========== إزالة الفيديو ==========
        function removeVideo() {
            selectedFile = null;
            document.getElementById('videoPreview').style.display = 'none';
            document.getElementById('videoFile').value = '';
            document.getElementById('previewVideo').src = '';
            document.getElementById('serialInfo').innerHTML = `
                <i class="fas fa-fingerprint"></i> 
                🔐 سيتم إنشاء معرف سري تلقائياً عند الرفع<br>
                <small style="color: #aaa;">الصيغة: NARD-YYYYMMDD-HHMMSS-XXXX</small>
            `;
        }

        // ========== عرض مؤشر التحميل ==========
        function showLoading(message) {
            const overlay = document.createElement('div');
            overlay.id = 'loadingOverlay';
            overlay.className = 'loading-overlay';
            overlay.innerHTML = `
                <div class="loading-spinner"></div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <p>${message}</p>
            `;
            document.body.appendChild(overlay);
        }

        function updateProgress(percent) {
            const fill = document.getElementById('progressFill');
            if (fill) fill.style.width = percent + '%';
        }

        function hideLoading() {
            const overlay = document.getElementById('loadingOverlay');
            if (overlay) overlay.remove();
        }

        // ========== رفع الفيديو إلى تلغرام ==========
        async function uploadVideo() {
            // التحقق من وجود فيديو
            if (!selectedFile) {
                showToast("❌ يرجى اختيار فيديو أولاً");
                return;
            }

            // التحقق من تسجيل الدخول
            if (!currentUser || currentUser.name === 'زائر') {
                showToast("❌ يرجى تسجيل الدخول أولاً لإضافة ريلز");
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
                return;
            }

            const title = document.getElementById('videoTitle').value.trim();
            if (!title) {
                showToast("❌ يرجى إدخال عنوان الريلز");
                return;
            }

            const publisher = document.getElementById('videoPublisher').value.trim() || currentUser.name || 'ناردو برو';
            const hashtags = document.getElementById('videoHashtags').value.trim();

            // إنشاء المعرف الخاص (NARD-SERIAL)
            const serial = generateSerialNumber();

            const btn = document.getElementById('uploadBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> جاري الرفع...';
            
            showLoading("جاري رفع الفيديو إلى تلغرام...");
            updateProgress(30);

            // بناء الكابشن بالصيغة المطلوبة ليتعرف عليها index.html
            // الصيغة: 🎬 العنوان\n👤 الناشر\n🔑 NARD-SERIAL: المعرف\n📅 التاريخ
            let caption = `🎬 ${title}\n👤 ${publisher}\n🔑 NARD-SERIAL: ${serial}\n📅 ${new Date().toLocaleString('ar-EG')}\n✅ تم الرفع عبر ناردو ريلز`;
            
            if (hashtags) {
                caption += `\n\n${hashtags}`;
            }

            const formData = new FormData();
            formData.append('chat_id', CHANNEL_ID);
            formData.append('video', selectedFile);
            formData.append('caption', caption);
            formData.append('supports_streaming', 'true');

            try {
                updateProgress(60);
                
                const response = await fetch(`${API_URL}/sendVideo`, {
                    method: 'POST',
                    body: formData
                });

                updateProgress(90);
                
                const data = await response.json();

                if (data.ok) {
                    updateProgress(100);
                    showToast(`✅ تم الرفع بنجاح! المعرف: ${serial}`);
                    
                    // عرض رسالة نجاح مع المعرف
                    const serialInfo = document.getElementById('serialInfo');
                    serialInfo.className = 'serial-info success';
                    serialInfo.innerHTML = `
                        <i class="fas fa-check-circle"></i> 
                        ✅ تم الرفع بنجاح!<br>
                        🔑 المعرف السري: <strong style="color: gold; font-size: 14px;">${serial}</strong><br>
                        📢 سيظهر الريلز في القسم المميز خلال 30 ثانية
                    `;
                    
                    // إعادة تعيين النموذج
                    selectedFile = null;
                    document.getElementById('videoPreview').style.display = 'none';
                    document.getElementById('videoFile').value = '';
                    document.getElementById('videoTitle').value = 'ريلز رائع';
                    document.getElementById('videoHashtags').value = '';
                    
                    // توجيه المستخدم للصفحة الرئيسية بعد 3 ثواني
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 3000);
                    
                } else {
                    throw new Error(data.description || 'فشل الرفع');
                }
            } catch (error) {
                console.error('❌ خطأ:', error);
                showToast("❌ فشل الرفع: " + error.message);
                document.getElementById('serialInfo').innerHTML = `
                    <i class="fas fa-exclamation-triangle"></i> 
                    ❌ فشل الرفع: ${error.message}<br>
                    <small>يرجى المحاولة مرة أخرى</small>
                `;
            } finally {
                hideLoading();
                btn.disabled = false;
                btn.innerHTML = '<i class="fab fa-telegram"></i> رفع ونشر للجميع';
            }
        }

        // ========== عرض الإشعارات ==========
        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // ========== تهيئة الصفحة ==========
        loadCurrentUser();
        
        // إذا كان المستخدم زائر، عرض رسالة
        if (!currentUser || currentUser.name === 'زائر') {
            setTimeout(() => {
                showToast("⚠️ يرجى تسجيل الدخول لإضافة ريلز");
            }, 1000);
        }
        
        console.log('🎬 صفحة إضافة الريلز جاهزة - المعرف السري NARD- يتم إنشاؤه تلقائياً');
    </script>
</body>
</html>
