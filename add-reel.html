<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة ريلز | المدير azer</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #1a472a, #0a2a1a);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 600px; margin: 0 auto; }
        .card {
            background: rgba(0,0,0,0.85);
            border-radius: 30px;
            padding: 30px;
            border: 2px solid gold;
        }
        h1 { color: gold; text-align: center; margin-bottom: 5px; }
        .sub { text-align: center; color: #aaa; margin-bottom: 25px; }
        .reel-id-box {
            background: rgba(255,215,0,0.1);
            border: 1px solid gold;
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            margin-bottom: 25px;
        }
        .reel-id-box .id-value { font-size: 1.8rem; font-weight: bold; color: gold; font-family: monospace; }
        .form-group { margin-bottom: 20px; }
        label { display: block; color: gold; margin-bottom: 8px; font-weight: bold; }
        input, textarea {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(255,215,0,0.3);
            background: rgba(255,255,255,0.1);
            color: white;
            font-family: 'Cairo', sans-serif;
        }
        input:focus { outline: none; border-color: gold; }
        .upload-area {
            border: 2px dashed gold;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            background: rgba(255,215,0,0.05);
        }
        .upload-area:hover { background: rgba(255,215,0,0.1); transform: scale(1.02); }
        .upload-area i { font-size: 3rem; color: gold; margin-bottom: 10px; }
        .preview { margin-top: 20px; display: none; }
        .preview video { width: 100%; border-radius: 15px; }
        .remove-btn {
            margin-top: 10px;
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px;
            border-radius: 20px;
            width: 100%;
            cursor: pointer;
        }
        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, gold, #ffd700);
            border: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 20px;
        }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 24px;
            border-radius: 50px;
            animation: slideIn 0.3s ease;
            z-index: 1000;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .success { background: #10b981; color: white; }
        .error { background: #ef4444; color: white; }
        .info { background: #3b82f6; color: white; }
        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            margin-top: 10px;
            display: none;
        }
        .progress-fill {
            height: 100%;
            background: gold;
            width: 0%;
            transition: width 0.3s;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1><i class="fas fa-crown"></i> إضافة ريلز جديد</h1>
            <div class="sub">المدير <strong style="color:gold">azer</strong> فقط</div>
            
            <div class="reel-id-box">
                <span class="label">معرف الريلز التالي</span>
                <div class="id-value" id="reelIdPreview">azer_1</div>
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-tag"></i> عنوان الريلز</label>
                <input type="text" id="reelTitle" placeholder="مثال: وصفة زعتر فلسطيني">
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-video"></i> فيديو الريلز</label>
                <div class="upload-area" onclick="document.getElementById('videoFile').click()">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <p>اضغط لرفع الفيديو</p>
                    <small>MP4 - الحد الأقصى 50MB</small>
                </div>
                <input type="file" id="videoFile" accept="video/*" style="display:none" onchange="previewVideo(this)">
                <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
                <div class="preview" id="previewDiv">
                    <video id="previewVideo" controls></video>
                    <button class="remove-btn" onclick="removeVideo()"><i class="fas fa-trash"></i> إزالة الفيديو</button>
                </div>
            </div>
            
            <button class="btn" id="uploadBtn" onclick="uploadReel()">
                <i class="fab fa-telegram"></i> رفع وتخزين في تليجرام
            </button>
        </div>
    </div>
    <div id="toastContainer"></div>
    
    <script>
        const TELEGRAM_BOT = '8576673096:AAECPDHWRTVQ_juq68hxM9PIdacnqevGRb4';
        const TELEGRAM_CHANNEL = '-1003822964890';
        
        let selectedVideo = null;
        let currentId = 1;
        
        function getNextReelId() {
            let reels = localStorage.getItem('azer_reels_list');
            if (reels) {
                reels = JSON.parse(reels);
                if (reels.length > 0) {
                    const lastId = reels[reels.length - 1].id;
                    const match = lastId.match(/azer_(\d+)/);
                    if (match) return parseInt(match[1]) + 1;
                }
            }
            return 1;
        }
        
        function checkAdmin() {
            const currentUser = localStorage.getItem('nardo_current_user');
            if (!currentUser) {
                showToast('❌ يجب تسجيل الدخول أولاً', 'error');
                setTimeout(() => window.location.href = 'index.html', 2000);
                return false;
            }
            try {
                const user = JSON.parse(currentUser);
                if (user.name === 'azer' || user.username === 'azer' || user.email === 'azer') {
                    return true;
                }
                showToast('⛔ فقط المدير azer يمكنه إضافة ريلز', 'error');
                setTimeout(() => window.location.href = 'index.html', 2000);
                return false;
            } catch(e) { return false; }
        }
        
        function previewVideo(input) {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                if (file.size > 50 * 1024 * 1024) {
                    showToast('❌ حجم الفيديو كبير جداً (الحد 50MB)', 'error');
                    return;
                }
                selectedVideo = file;
                const url = URL.createObjectURL(file);
                document.getElementById('previewVideo').src = url;
                document.getElementById('previewDiv').style.display = 'block';
                currentId = getNextReelId();
                document.getElementById('reelIdPreview').innerText = `azer_${currentId}`;
                showToast('✅ تم اختيار الفيديو', 'success');
            }
        }
        
        function removeVideo() {
            selectedVideo = null;
            document.getElementById('previewDiv').style.display = 'none';
            document.getElementById('videoFile').value = '';
            showToast('🗑️ تم إزالة الفيديو', 'info');
        }
        
        async function uploadReel() {
            const title = document.getElementById('reelTitle').value.trim();
            if (!title) { showToast('❌ أدخل عنوان للريلز', 'error'); return; }
            if (!selectedVideo) { showToast('❌ اختر فيديو', 'error'); return; }
            if (!checkAdmin()) return;
            
            const btn = document.getElementById('uploadBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الرفع...';
            
            const reelId = `azer_${currentId}`;
            const progressBar = document.getElementById('progressBar');
            const progressFill = document.getElementById('progressFill');
            progressBar.style.display = 'block';
            
            try {
                const formData = new FormData();
                formData.append('chat_id', TELEGRAM_CHANNEL);
                formData.append('video', selectedVideo);
                formData.append('caption', `🎬 ${title}\n🆔 ${reelId}\n👑 المدير: azer\n📅 ${new Date().toLocaleString('ar-EG')}`);
                
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT}/sendVideo`, { method: 'POST', body: formData });
                const data = await response.json();
                progressBar.style.display = 'none';
                
                if (data.ok) {
                    const fileRes = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT}/getFile?file_id=${data.result.video.file_id}`);
                    const fileData = await fileRes.json();
                    const videoUrl = `https://api.telegram.org/file/bot${TELEGRAM_BOT}/${fileData.result.file_path}`;
                    
                    let reels = localStorage.getItem('azer_reels_list');
                    reels = reels ? JSON.parse(reels) : [];
                    reels.push({
                        id: reelId, title: title, videoUrl: videoUrl,
                        telegramId: data.result.message_id, date: new Date().toISOString(), views: 0
                    });
                    localStorage.setItem('azer_reels_list', JSON.stringify(reels));
                    localStorage.setItem('azer_reels_updated', Date.now().toString());
                    
                    showToast(`✅ تم رفع الريلز ${reelId} بنجاح`, 'success');
                    setTimeout(() => window.location.href = 'index.html', 2000);
                } else {
                    throw new Error(data.description);
                }
            } catch (error) {
                showToast('❌ فشل الرفع: ' + error.message, 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fab fa-telegram"></i> رفع وتخزين في تليجرام';
                progressBar.style.display = 'none';
            }
        }
        
        function showToast(msg, type) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `notification ${type}`;
            toast.innerHTML = msg;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        // تهيئة
        if (!checkAdmin()) {
            document.querySelector('.card').style.opacity = '0.5';
            document.querySelector('.card').style.pointerEvents = 'none';
        } else {
            currentId = getNextReelId();
            document.getElementById('reelIdPreview').innerText = `azer_${currentId}`;
        }
    </script>
</body>
</html>
