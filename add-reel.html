<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>إضافة ريلز | ناردو برو - تخزين تليجرام</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0a0f1a 0%, #0f1420 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container { max-width: 700px; margin: 0 auto; }
        
        .reel-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 35px;
            overflow: hidden;
            border: 1px solid rgba(255, 215, 0, 0.3);
            animation: slideUp 0.6s ease;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(80px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .reel-header {
            background: linear-gradient(135deg, #ffd700, #ffb347);
            padding: 35px 30px;
            text-align: center;
            position: relative;
        }
        
        .reel-header h1 {
            color: #1a1a2e;
            font-size: 2rem;
            margin-bottom: 10px;
        }
        
        .reel-header p {
            color: #1a1a2e;
            font-weight: 500;
        }
        
        .back-btn {
            position: absolute;
            top: 20px;
            right: 25px;
            background: rgba(0, 0, 0, 0.2);
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            color: #1a1a2e;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .back-btn:hover {
            background: rgba(0, 0, 0, 0.4);
            transform: translateX(-5px);
        }
        
        .reel-content { padding: 35px; }
        
        .form-group { margin-bottom: 30px; }
        
        .form-group label {
            display: block;
            margin-bottom: 12px;
            font-weight: 700;
            color: #ffd700;
        }
        
        .form-group label i { margin-left: 10px; }
        
        .form-control {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid rgba(255, 215, 0, 0.3);
            border-radius: 15px;
            font-size: 1rem;
            font-family: 'Cairo', sans-serif;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s ease;
        }
        
        .form-control:focus {
            outline: none;
            border-color: #ffd700;
            background: rgba(255, 255, 255, 0.2);
        }
        
        .form-control::placeholder { color: rgba(255,255,255,0.5); }
        
        .video-upload-area {
            border: 3px dashed #ffd700;
            border-radius: 20px;
            padding: 50px 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s ease;
            background: rgba(255, 215, 0, 0.05);
        }
        
        .video-upload-area:hover {
            transform: translateY(-5px);
            background: rgba(255, 215, 0, 0.1);
        }
        
        .video-upload-area i {
            font-size: 4rem;
            color: #ffd700;
            margin-bottom: 15px;
        }
        
        .video-upload-area p { color: rgba(255,255,255,0.7); }
        
        .video-preview-container {
            margin-top: 20px;
            position: relative;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
        }
        
        .video-preview-container video {
            width: 100%;
            max-height: 350px;
        }
        
        .remove-video-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255, 0, 0, 0.9);
            color: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .remove-video-btn:hover {
            transform: scale(1.1);
            background: red;
        }
        
        .image-upload-area {
            border: 2px dashed rgba(255, 215, 0, 0.5);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }
        
        .image-upload-area:hover {
            border-color: #ffd700;
            background: rgba(255, 215, 0, 0.1);
        }
        
        .poster-preview-container {
            margin-top: 15px;
            position: relative;
            display: inline-block;
        }
        
        .poster-preview-container img {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 15px;
            border: 3px solid #ffd700;
        }
        
        .remove-poster-btn {
            position: absolute;
            top: -10px;
            right: -10px;
            background: rgba(255, 0, 0, 0.9);
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .remove-poster-btn:hover {
            transform: scale(1.1);
        }
        
        .file-info {
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 12px;
            margin-top: 10px;
            color: #ffd700;
        }
        
        .serial-info {
            background: rgba(255,215,0,0.15);
            padding: 15px;
            border-radius: 15px;
            margin: 20px 0;
            text-align: center;
            border: 1px solid rgba(255,215,0,0.3);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { border-color: rgba(255,215,0,0.3); box-shadow: 0 0 0 0 rgba(255,215,0,0.1); }
            50% { border-color: rgba(255,215,0,0.8); box-shadow: 0 0 10px 2px rgba(255,215,0,0.3); }
            100% { border-color: rgba(255,215,0,0.3); box-shadow: 0 0 0 0 rgba(255,215,0,0.1); }
        }
        
        .serial-info i {
            color: gold;
            font-size: 20px;
            margin-left: 8px;
        }
        
        .serial-number {
            font-family: monospace;
            font-size: 16px;
            font-weight: bold;
            color: gold;
            background: rgba(0,0,0,0.5);
            padding: 8px 15px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 8px;
            letter-spacing: 1px;
        }
        
        .save-btn {
            width: 100%;
            background: linear-gradient(135deg, #ffd700, #ffb347);
            border: none;
            padding: 18px;
            border-radius: 15px;
            color: #1a1a2e;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        
        .save-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.4);
        }
        
        .save-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        
        .toast-message {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 14px 25px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 2000;
            animation: slideInRight 0.3s ease;
        }
        
        .toast-success { background: linear-gradient(135deg, #10b981, #059669); color: white; }
        .toast-error { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; }
        .toast-info { background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; }
        
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .confirm-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }
        
        .confirm-content {
            background: linear-gradient(135deg, #1a2a2a, #0f1a1a);
            border-radius: 25px;
            padding: 30px;
            max-width: 400px;
            text-align: center;
            border: 2px solid #ffd700;
        }
        
        .success-checkmark {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #10b981;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            animation: scaleIn 0.5s ease;
        }
        
        @keyframes scaleIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }
        
        .success-checkmark i { font-size: 3rem; color: white; }
        
        .confirm-buttons { display: flex; gap: 15px; margin-top: 25px; }
        
        .confirm-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s;
        }
        
        .confirm-yes { background: #ffd700; color: #1a1a2e; }
        .confirm-no { background: #333; color: white; }
        
        .confirm-yes:hover, .confirm-no:hover {
            transform: translateY(-2px);
        }
        
        .info-text {
            font-size: 12px;
            color: #aaa;
            margin-top: 10px;
        }
        
        .admin-warning {
            background: rgba(255,0,102,0.2);
            border: 1px solid #ff0066;
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            margin-bottom: 20px;
            color: #ff99cc;
        }
        
        @media (max-width: 768px) {
            .reel-content { padding: 25px; }
            .reel-header h1 { font-size: 1.5rem; }
            .serial-number { font-size: 12px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="reel-card">
            <div class="reel-header">
                <button class="back-btn" onclick="confirmBack()">
                    <i class="fas fa-arrow-right"></i> رجوع
                </button>
                <i class="fas fa-film" style="font-size: 3rem; margin-bottom: 10px;"></i>
                <h1>✨ إضافة ريلز جديد ✨</h1>
                <p>سيتم التخزين الدائم في تليجرام مع معرف خاص للشريط العلوي</p>
            </div>
            
            <div class="reel-content">
                <div id="adminWarning" class="admin-warning" style="display: none;">
                    <i class="fas fa-lock"></i> ⚠️ فقط المدير يمكنه رفع الريلز
                </div>
                
                <form id="addReelForm">
                    <div class="form-group">
                        <label><i class="fas fa-tag"></i> عنوان الريلز <span style="color: red;">*</span></label>
                        <input type="text" class="form-control" id="reelTitle" required placeholder="أدخل عنواناً مميزاً للريلز...">
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> اسم الناشر</label>
                        <input type="text" class="form-control" id="publisherName" placeholder="اسمك هنا">
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-video"></i> فيديو الريلز <span style="color: red;">*</span></label>
                        <div class="video-upload-area" onclick="document.getElementById('reelVideo').click()">
                            <i class="fas fa-cloud-upload-alt"></i>
                            <p>📹 اضغط لرفع الفيديو</p>
                            <small style="color: #ffd700;">✅ MP4, MOV | الحد الأقصى: 50 ميجابايت</small>
                        </div>
                        <input type="file" id="reelVideo" accept="video/*" style="display:none;" onchange="handleVideoUpload(event)">
                        <div id="videoPreview" style="display:none;"></div>
                        <div id="videoFileInfo" class="file-info" style="display:none;"></div>
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-image"></i> صورة الغلاف <span style="color: #999;">(اختياري)</span></label>
                        <div class="image-upload-area" onclick="document.getElementById('reelPoster').click()">
                            <i class="fas fa-camera"></i>
                            <span>📸 اختر صورة للغلاف</span>
                        </div>
                        <input type="file" id="reelPoster" accept="image/*" style="display:none;" onchange="handlePosterUpload(event)">
                        <div id="posterPreview" style="display:none;"></div>
                    </div>
                    
                    <!-- عرض المعرف الخاص -->
                    <div class="serial-info" id="serialInfo" style="display: none;">
                        <i class="fas fa-fingerprint"></i>
                        <span>المعرف الخاص للشريط العلوي:</span>
                        <div class="serial-number" id="displaySerial">NARD-XXXXXXXX-XXXX</div>
                        <small class="info-text">✅ هذا المعرف سيسمح للشريط العلوي بعرض هذا الريلز فقط</small>
                    </div>
                    
                    <button type="button" class="save-btn" id="saveBtn" onclick="uploadReelToTelegram()">
                        <i class="fab fa-telegram"></i>
                        رفع وتخزين في تليجرام
                        <i class="fas fa-arrow-left"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>
    
    <div id="toastContainer"></div>
    
    <script>
        // ========== إعدادات تليجرام ==========
        const TELEGRAM = {
            botToken: '8576673096:AAECPDHWRTVQ_juq68hxM9PIdacnqevGRb4',
            channelId: '-1003822964890',
            apiUrl: 'https://api.telegram.org/bot'
        };
        
        let selectedVideoFile = null;
        let posterData = null;
        let currentUser = null;
        let currentSerialNumber = '';
        
        // ========== إنشاء معرف خاص للشريط العلوي ==========
        function generateBarSerialNumber() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            const random = Math.floor(Math.random() * 10000).toString().padStart(4, '0');
            // المعرف الخاص بالشريط العلوي: NARD-YYYYMMDD-HHMMSS-RANDOM
            return `NARD-${year}${month}${day}-${hours}${minutes}${seconds}-${random}`;
        }
        
        // ========== تحميل المستخدم الحالي ==========
        function loadCurrentUser() {
            try {
                const savedUser = localStorage.getItem('current_user');
                if (savedUser) {
                    currentUser = JSON.parse(savedUser);
                    document.getElementById('publisherName').value = currentUser.name || currentUser.username || '';
                }
            } catch(e) {}
            
            // إذا لم يوجد مستخدم، استخدم مدير افتراضي (للتجربة)
            if (!currentUser) {
                currentUser = { id: 1, name: 'المدير', role: 'admin' };
                document.getElementById('publisherName').value = 'المدير';
            }
            
            // التحقق من الصلاحية (فقط المدير يمكنه الرفع)
            const adminWarning = document.getElementById('adminWarning');
            const saveBtn = document.getElementById('saveBtn');
            
            if (currentUser.role !== 'admin') {
                if (adminWarning) adminWarning.style.display = 'block';
                if (saveBtn) {
                    saveBtn.disabled = true;
                    saveBtn.style.opacity = '0.5';
                    saveBtn.style.cursor = 'not-allowed';
                }
                showToast('⛔ فقط المدير يمكنه رفع الريلز', 'error');
            } else {
                if (adminWarning) adminWarning.style.display = 'none';
                if (saveBtn) {
                    saveBtn.disabled = false;
                    saveBtn.style.opacity = '1';
                    saveBtn.style.cursor = 'pointer';
                }
            }
        }
        
        // ========== رفع الريلز إلى تليجرام ==========
        async function uploadReelToTelegram() {
            const title = document.getElementById('reelTitle').value.trim();
            const publisher = document.getElementById('publisherName').value.trim() || 'المدير';
            
            if (!title) {
                showToast('❌ الرجاء إدخال عنوان للريلز', 'error');
                return;
            }
            
            if (!selectedVideoFile) {
                showToast('❌ الرجاء رفع فيديو للريلز', 'error');
                return;
            }
            
            // التحقق من صلاحية المدير
            if (currentUser.role !== 'admin') {
                showToast('⛔ فقط المدير يمكنه رفع الريلز', 'error');
                return;
            }
            
            const saveBtn = document.getElementById('saveBtn');
            saveBtn.disabled = true;
            saveBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> جاري الرفع إلى تليجرام...';
            
            // إنشاء المعرف الخاص بالشريط العلوي
            const barSerial = generateBarSerialNumber();
            currentSerialNumber = barSerial;
            
            // عرض المعرف للمستخدم
            const serialInfo = document.getElementById('serialInfo');
            document.getElementById('displaySerial').innerText = barSerial;
            serialInfo.style.display = 'block';
            
            try {
                // إنشاء الكابشن مع المعرف الخاص (مهم للفلترة في الشريط)
                const caption = `🎬 ${title}\n👤 ${publisher}\n🔑 NARD-SERIAL: ${barSerial}\n📅 ${new Date().toLocaleString('ar-EG')}\n✅ تم الرفع عبر ناردو ريلز - مخصص للشريط العلوي فقط\n\n#ناردو_ريلز #شريط_علوي #NARD`;
                
                const formData = new FormData();
                formData.append('chat_id', TELEGRAM.channelId);
                formData.append('video', selectedVideoFile);
                formData.append('caption', caption);
                
                // إذا وجدت صورة غلاف، أضفها كصورة مصغرة
                if (posterData) {
                    // تحويل base64 إلى blob
                    const posterBlob = await fetch(posterData).then(res => res.blob());
                    formData.append('thumb', posterBlob);
                }
                
                const response = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/sendVideo`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.ok) {
                    const messageId = data.result.message_id;
                    showToast(`✅ تم الرفع بنجاح! المعرف: ${barSerial}`, 'success');
                    
                    // حفظ في localStorage للإشعار
                    const newReel = {
                        id: messageId,
                        serialNumber: barSerial,
                        title: title,
                        publisher: publisher,
                        timestamp: Date.now(),
                        telegramId: messageId,
                        posterUrl: posterData || null
                    };
                    
                    let uploadedReels = JSON.parse(localStorage.getItem('nardo_uploaded_reels') || '[]');
                    uploadedReels.unshift(newReel);
                    localStorage.setItem('nardo_uploaded_reels', JSON.stringify(uploadedReels));
                    localStorage.setItem('nardo_reels_updated', Date.now().toString());
                    
                    showSuccessModal(newReel);
                } else {
                    throw new Error(data.description || 'فشل الرفع');
                }
                
            } catch (error) {
                console.error('❌ خطأ:', error);
                showToast('❌ فشل الرفع: ' + error.message, 'error');
                saveBtn.disabled = false;
                saveBtn.innerHTML = '<i class="fab fa-telegram"></i> رفع وتخزين في تليجرام <i class="fas fa-arrow-left"></i>';
            }
        }
        
        // ========== عرض نافذة النجاح ==========
        function showSuccessModal(reel) {
            const modal = document.createElement('div');
            modal.className = 'confirm-modal';
            modal.innerHTML = `
                <div class="confirm-content">
                    <div class="success-checkmark">
                        <i class="fas fa-check"></i>
                    </div>
                    <h2 style="color: #ffd700;">تم النشر بنجاح! 🎉</h2>
                    <p style="color: white;">تم رفع الريلز إلى تليجرام</p>
                    <div style="background: rgba(255,215,0,0.2); padding: 12px; border-radius: 12px; margin: 15px 0;">
                        <div style="color: white;"><i class="fas fa-tag"></i> <strong>${escapeHtml(reel.title)}</strong></div>
                        <div style="color: #ffd700; margin-top: 8px; font-family: monospace;">
                            <i class="fas fa-fingerprint"></i> المعرف الخاص: <strong>${reel.serialNumber}</strong>
                        </div>
                        <div style="color: #aaa; font-size: 11px; margin-top: 5px;">
                            <i class="fab fa-telegram"></i> تم التخزين في قناة تليجرام
                        </div>
                    </div>
                    <p style="color: #10b981; font-size: 14px;">
                        ✨ سيظهر هذا الريلز في الشريط العلوي فقط لأنه يحمل المعرف NARD- ✨
                    </p>
                    <div class="confirm-buttons">
                        <button class="confirm-btn confirm-yes" onclick="redirectToHome()">
                            <i class="fas fa-home"></i> العودة للرئيسية
                        </button>
                        <button class="confirm-btn confirm-no" onclick="addAnotherReel()">
                            <i class="fas fa-plus"></i> إضافة آخر
                        </button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        }
        
        function redirectToHome() {
            window.location.href = 'index.html';
        }
        
        function addAnotherReel() {
            document.querySelector('.confirm-modal')?.remove();
            resetForm();
            showToast('📹 يمكنك إضافة ريلز جديد', 'info');
        }
        
        function resetForm() {
            document.getElementById('reelTitle').value = '';
            document.getElementById('reelVideo').value = '';
            document.getElementById('reelPoster').value = '';
            document.getElementById('videoPreview').style.display = 'none';
            document.getElementById('posterPreview').style.display = 'none';
            document.getElementById('videoFileInfo').style.display = 'none';
            document.getElementById('serialInfo').style.display = 'none';
            selectedVideoFile = null;
            posterData = null;
            currentSerialNumber = '';
            document.getElementById('saveBtn').disabled = false;
            document.getElementById('saveBtn').innerHTML = '<i class="fab fa-telegram"></i> رفع وتخزين في تليجرام <i class="fas fa-arrow-left"></i>';
            document.getElementById('saveBtn').style.opacity = '1';
            
            // إعادة التحقق من الصلاحية
            if (currentUser && currentUser.role !== 'admin') {
                document.getElementById('saveBtn').disabled = true;
                document.getElementById('saveBtn').style.opacity = '0.5';
            }
        }
        
        // ========== معالجة الفيديو ==========
        function handleVideoUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            if (!file.type.startsWith('video/')) {
                showToast('❌ الرجاء اختيار ملف فيديو صالح', 'error');
                return;
            }
            
            if (file.size > 50 * 1024 * 1024) {
                showToast('❌ حجم الفيديو كبير جداً. الحد الأقصى 50 ميجابايت', 'error');
                return;
            }
            
            selectedVideoFile = file;
            const videoUrl = URL.createObjectURL(file);
            
            const previewContainer = document.getElementById('videoPreview');
            previewContainer.innerHTML = `
                <div class="video-preview-container">
                    <video controls src="${videoUrl}"></video>
                    <button class="remove-video-btn" onclick="removeVideo()">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </div>
            `;
            previewContainer.style.display = 'block';
            
            const sizeMB = (file.size / (1024 * 1024)).toFixed(2);
            const fileInfo = document.getElementById('videoFileInfo');
            fileInfo.innerHTML = `<i class="fas fa-file-video"></i> ${file.name} (${sizeMB} MB)`;
            fileInfo.style.display = 'block';
            
            showToast('✅ تم اختيار الفيديو بنجاح', 'success');
        }
        
        function removeVideo() {
            selectedVideoFile = null;
            document.getElementById('videoPreview').style.display = 'none';
            document.getElementById('videoFileInfo').style.display = 'none';
            document.getElementById('reelVideo').value = '';
            showToast('🗑️ تم إزالة الفيديو', 'info');
        }
        
        // ========== معالجة الصورة ==========
        function handlePosterUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                posterData = e.target.result;
                const previewContainer = document.getElementById('posterPreview');
                previewContainer.innerHTML = `
                    <div class="poster-preview-container">
                        <img src="${posterData}" alt="غلاف الريلز">
                        <button class="remove-poster-btn" onclick="removePoster()">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                `;
                previewContainer.style.display = 'block';
                showToast('✅ تم رفع صورة الغلاف', 'success');
            };
            reader.readAsDataURL(file);
        }
        
        function removePoster() {
            posterData = null;
            document.getElementById('posterPreview').style.display = 'none';
            document.getElementById('reelPoster').value = '';
            showToast('🗑️ تم إزالة صورة الغلاف', 'info');
        }
        
        function confirmBack() {
            if (selectedVideoFile || document.getElementById('reelTitle').value.trim()) {
                const modal = document.createElement('div');
                modal.className = 'confirm-modal';
                modal.innerHTML = `
                    <div class="confirm-content">
                        <i class="fas fa-exclamation-triangle" style="color: #ff9800; font-size: 3rem;"></i>
                        <h3 style="color: white;">هل تريد المغادرة؟</h3>
                        <p style="color: rgba(255,255,255,0.7);">لديك بيانات غير محفوظة. سيتم فقدانها إذا غادرت.</p>
                        <div class="confirm-buttons">
                            <button class="confirm-btn confirm-yes" onclick="leavePage()">مغادرة</button>
                            <button class="confirm-btn confirm-no" onclick="closeConfirm()">البقاء</button>
                        </div>
                    </div>
                `;
                document.body.appendChild(modal);
            } else {
                window.location.href = 'index.html';
            }
        }
        
        function leavePage() { window.location.href = 'index.html'; }
        function closeConfirm() { document.querySelector('.confirm-modal')?.remove(); }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast-message toast-${type}`;
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i> ${message}`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'slideInRight 0.3s reverse';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
        
        // ========== تهيئة الصفحة ==========
        loadCurrentUser();
        console.log('🎬 صفحة إضافة الريلز - ناردو برو');
        console.log('🔑 سيتم إنشاء معرف خاص بالشريط العلوي (NARD-YYYYMMDD-HHMMSS-RANDOM)');
        console.log('📡 التخزين في قناة تليجرام');
        console.log('✅ فقط الريلز التي تحمل هذا المعرف ستظهر في الشريط العلوي');
        console.log('👑 فقط المدير يمكنه رفع الريلز');
    </script>
</body>
</html>
