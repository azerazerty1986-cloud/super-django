<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>إضافة ريلز | ناردو برو</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* التنسيقات ثابتة كما تحبها */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #0a0f1a; color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { width: 100%; max-width: 500px; padding: 20px; }
        .card { background: rgba(255, 255, 255, 0.05); border-radius: 30px; padding: 30px; border: 1px solid rgba(255, 215, 0, 0.3); backdrop-filter: blur(15px); box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5); }
        h1 { color: gold; text-align: center; margin-bottom: 30px; font-size: 24px; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .upload-area { border: 2px dashed rgba(255, 215, 0, 0.4); border-radius: 20px; padding: 40px 20px; text-align: center; cursor: pointer; margin-bottom: 20px; background: rgba(255, 215, 0, 0.03); }
        .video-preview { display: none; margin-bottom: 20px; border-radius: 15px; overflow: hidden; position: relative; border: 2px solid gold; }
        .video-preview video { width: 100%; max-height: 250px; background: #000; }
        .input-group { margin-bottom: 18px; }
        .input-group label { display: block; margin-bottom: 8px; color: gold; font-size: 14px; font-weight: 600; }
        input, textarea { width: 100%; padding: 12px 15px; background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 215, 0, 0.2); border-radius: 12px; color: white; font-family: 'Cairo'; outline: none; }
        .btn { width: 100%; padding: 15px; background: linear-gradient(135deg, gold, #ffb347); color: #000; border: none; border-radius: 50px; font-weight: 700; font-size: 16px; cursor: pointer; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: gold; color: #000; padding: 12px 25px; border-radius: 50px; font-weight: bold; z-index: 9999; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1><i class="fab fa-telegram-plane"></i> إضافة ريلز ذكي</h1>

        <div class="upload-area" id="dropZone" onclick="document.getElementById('videoFile').click()">
            <i class="fas fa-cloud-upload-alt"></i>
            <p id="fileStatus">اضغط لرفع الفيديو</p>
        </div>
        <input type="file" id="videoFile" accept="video/*" style="display: none;" onchange="handleFileSelect(this)">

        <div id="videoPreview" class="video-preview">
            <video id="previewPlayer" controls></video>
        </div>

        <div class="input-group">
            <label>عنوان الريلز</label>
            <input type="text" id="vTitle" placeholder="عنوان يظهر في الواجهة...">
        </div>

        <div class="input-group">
            <label>الناشر</label>
            <input type="text" id="vPublisher" placeholder="اسمك...">
        </div>

        <button class="btn" id="submitBtn" onclick="startUpload()">
            <i class="fas fa-rocket"></i> رفع ونشر للواجهة فوراً
        </button>
    </div>
</div>

<script>
    const CONFIG = {
        token: '8576673096:AAHj80CdifTJNlOs6JgouHmjEXl0bM-8Shw',
        chatId: '-1003822964890'
    };

    let selectedVideo = null;

    function handleFileSelect(input) {
        if (input.files[0]) {
            selectedVideo = input.files[0];
            document.getElementById('previewPlayer').src = URL.createObjectURL(selectedVideo);
            document.getElementById('videoPreview').style.display = 'block';
            document.getElementById('dropZone').style.display = 'none';
        }
    }

    async function startUpload() {
        const title = document.getElementById('vTitle').value.trim();
        const publisher = document.getElementById('vPublisher').value.trim();

        if (!selectedVideo || !title) {
            alert("يرجى اختيار فيديو وعنوان");
            return;
        }

        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerHTML = "جاري الربط مع الواجهة...";

        const serial = `NARD-${Date.now()}`;
        const caption = `🎬 ${title}\n👤 ${publisher}\n🔑 NARD-SERIAL: ${serial}`;

        const formData = new FormData();
        formData.append('chat_id', CONFIG.chatId);
        formData.append('video', selectedVideo);
        formData.append('caption', caption);

        try {
            const response = await fetch(`https://api.telegram.org/bot${CONFIG.token}/sendVideo`, {
                method: 'POST',
                body: formData
            });

            const data = await response.json();

            if (data.ok) {
                // --- السر هنا: حفظ البيانات محلياً لتراها صفحة index فوراً ---
                const newReel = {
                    id: data.result.message_id,
                    title: title,
                    publisher: publisher,
                    serialNumber: serial,
                    videoUrl: URL.createObjectURL(selectedVideo), // عرض مؤقت
                    isLocal: true
                };

                // جلب الريلز القديم وإضافة الجديد
                let localReels = JSON.parse(localStorage.getItem('nardoo_reels_all') || '[]');
                localReels.unshift(newReel);
                localStorage.setItem('nardoo_reels_all', JSON.stringify(localReels));

                alert("✅ تم الرفع! سيظهر الآن في الواجهة");
                window.location.href = 'index.html';
            }
        } catch (error) {
            alert("فشل الرفع");
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
