<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>إضافة ريلز | طلبات ناردو</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container { max-width: 900px; margin: 0 auto; }
        
        .reel-card {
            background: white;
            border-radius: 35px;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.4);
            overflow: hidden;
            animation: slideUp 0.6s ease;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(80px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .reel-header {
            background: linear-gradient(135deg, #ffd700, #ffb347);
            padding: 35px 30px;
            text-align: center;
            position: relative;
        }
        
        .reel-header h1 {
            color: #1a1a2e;
            font-size: 2rem;
            margin-bottom: 10px;
        }
        
        .reel-header p {
            color: #1a1a2e;
            font-weight: 500;
        }
        
        .back-btn {
            position: absolute;
            top: 20px;
            right: 25px;
            background: rgba(0, 0, 0, 0.2);
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            color: #1a1a2e;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-weight: 600;
        }
        
        .reel-content { padding: 35px; }
        
        .form-group { margin-bottom: 30px; }
        
        .form-group label {
            display: block;
            margin-bottom: 12px;
            font-weight: 700;
            color: #333;
        }
        
        .form-group label i { color: #ffd700; margin-left: 10px; }
        
        .form-control {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e5e5e5;
            border-radius: 15px;
            font-size: 1rem;
            font-family: 'Cairo', sans-serif;
            background: #fafafa;
            transition: all 0.3s ease;
        }
        
        .form-control:focus {
            outline: none;
            border-color: #ffd700;
            background: white;
        }
        
        .form-control[readonly] { 
            background: #f0f0f0; 
            cursor: default;
            color: #666;
        }
        
        .video-upload-area {
            border: 3px dashed #ffd700;
            border-radius: 20px;
            padding: 50px 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s ease;
            background: #fff9e6;
        }
        
        .video-upload-area:hover {
            transform: translateY(-5px);
            border-color: #ffb347;
            background: #fff4d0;
        }
        
        .video-upload-area i {
            font-size: 4.5rem;
            color: #ffd700;
            margin-bottom: 15px;
        }
        
        .video-upload-area p {
            color: #666;
            margin-top: 10px;
        }
        
        .video-preview-container {
            margin-top: 20px;
            position: relative;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
        }
        
        .video-preview-container video {
            width: 100%;
            max-height: 350px;
        }
        
        .remove-video-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255, 0, 0, 0.9);
            color: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .remove-video-btn:hover {
            transform: scale(1.1);
        }
        
        .image-upload-area {
            border: 2px dashed #ddd;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            cursor: pointer;
            background: #fafafa;
            transition: all 0.3s ease;
        }
        
        .image-upload-area:hover {
            border-color: #ffd700;
            background: #fff9e6;
        }
        
        .poster-preview-container {
            margin-top: 15px;
            position: relative;
            display: inline-block;
        }
        
        .poster-preview-container img {
            width: 180px;
            height: 180px;
            object-fit: cover;
            border-radius: 15px;
            border: 3px solid #ffd700;
        }
        
        .remove-poster-btn {
            position: absolute;
            top: -10px;
            right: -10px;
            background: rgba(255, 0, 0, 0.9);
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
        }
        
        .channel-badge {
            background: linear-gradient(135deg, #e6f3ff, #d4eaff);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            border: 2px solid #ffd700;
            text-align: center;
        }
        
        .channel-badge i { font-size: 2rem; color: #0088cc; }
        .channel-badge h3 { color: #0088cc; margin-bottom: 8px; }
        .channel-badge .channel-name {
            background: #0088cc;
            color: white;
            padding: 5px 15px;
            border-radius: 30px;
            display: inline-block;
            margin-top: 10px;
        }
        
        .serial-badge {
            background: #1a1a2e;
            color: #ffd700;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: bold;
            margin-top: 10px;
            display: inline-block;
        }
        
        .save-btn {
            width: 100%;
            background: linear-gradient(135deg, #ffd700, #ffb347);
            border: none;
            padding: 18px;
            border-radius: 15px;
            color: #1a1a2e;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        
        .save-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.4);
        }
        
        .save-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        
        .file-info {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 12px;
            margin-top: 10px;
            font-size: 0.9rem;
        }
        
        .toast-message {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #333;
            color: white;
            padding: 14px 25px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 2000;
            animation: slideInRight 0.3s ease;
        }
        
        .toast-success { background: linear-gradient(135deg, #10b981, #059669); }
        .toast-error { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .toast-info { background: linear-gradient(135deg, #3b82f6, #2563eb); }
        
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .confirm-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }
        
        .confirm-content {
            background: white;
            border-radius: 25px;
            padding: 30px;
            max-width: 400px;
            text-align: center;
        }
        
        .success-checkmark {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #10b981;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        
        .success-checkmark i { font-size: 3rem; color: white; }
        
        .confirm-buttons { display: flex; gap: 15px; margin-top: 25px; }
        
        .confirm-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Cairo', sans-serif;
        }
        
        .confirm-yes { background: #ef4444; color: white; }
        .confirm-no { background: #e5e5e5; color: #333; }
        
        @media (max-width: 768px) {
            .reel-content { padding: 25px; }
            .reel-header h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="reel-card">
            <div class="reel-header">
                <button class="back-btn" onclick="confirmBack()">
                    <i class="fas fa-arrow-right"></i> رجوع
                </button>
                <i class="fas fa-film" style="font-size: 3rem; margin-bottom: 10px;"></i>
                <h1>✨ إضافة ريلز جديد ✨</h1>
                <p>شارك إبداعك في طلبات ناردو</p>
            </div>
            
            <div class="reel-content">
                <div class="channel-badge">
                    <i class="fab fa-telegram"></i>
                    <h3>📡 طلبات ناردو</h3>
                    <p>سيتم حفظ الفيديو في قناة</p>
                    <div class="channel-name">@azerg</div>
                    <div class="serial-badge">
                        <i class="fas fa-hashtag"></i> الرقم التسلسلي: NARD-XXXXX
                    </div>
                </div>
                
                <form id="addReelForm">
                    <div class="form-group">
                        <label><i class="fas fa-tag"></i> عنوان الريلز <span style="color: red;">*</span></label>
                        <input type="text" class="form-control" id="reelTitle" required placeholder="أدخل عنواناً مميزاً للريلز...">
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> اسم الناشر</label>
                        <input type="text" class="form-control" id="publisherName" readonly placeholder="سيتم أخذ اسم المستخدم">
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-video"></i> فيديو الريلز <span style="color: red;">*</span></label>
                        <div class="video-upload-area" onclick="document.getElementById('reelVideo').click()">
                            <i class="fas fa-cloud-upload-alt"></i>
                            <p>📹 اضغط لرفع الفيديو</p>
                            <small>✅ MP4, MOV | الحد الأقصى: 50 ميجابايت</small>
                        </div>
                        <input type="file" id="reelVideo" accept="video/*" style="display:none;" onchange="handleVideoUpload(event)">
                        <div id="videoPreview" style="display:none;"></div>
                        <div id="videoFileInfo" class="file-info" style="display:none;"></div>
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-image"></i> صورة الغلاف <span style="color: #999;">(اختياري)</span></label>
                        <div class="image-upload-area" onclick="document.getElementById('reelPoster').click()">
                            <i class="fas fa-camera"></i>
                            <span>📸 اختر صورة للغلاف</span>
                        </div>
                        <input type="file" id="reelPoster" accept="image/*" style="display:none;" onchange="handlePosterUpload(event)">
                        <div id="posterPreview" style="display:none;"></div>
                    </div>
                    
                    <button type="button" class="save-btn" id="saveBtn" onclick="uploadReelToTelegram()">
                        <i class="fab fa-telegram"></i>
                        نشر في طلبات ناردو
                        <i class="fas fa-arrow-left"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>
    
    <div id="toastContainer"></div>
    
    <script>
        // ========== إعدادات تليجرام ==========
        const TELEGRAM = {
            botToken: '8576673096:AAECPDHWRTVQ_juq68hxM9PIdacnqevGRb4',
            channelId: '-1003822964890',
            channelUsername: 'azerg',
            channelName: 'طلبات ناردو',
            apiUrl: 'https://api.telegram.org/bot'
        };
        
        let selectedVideoFile = null;
        let posterData = null;
        let currentUser = null;
        let currentSerialNumber = '';
        
        // ========== إنشاء رقم تسلسلي ==========
        function generateSerialNumber() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            const random = Math.floor(Math.random() * 10000).toString().padStart(4, '0');
            return `NARD-${year}${month}${day}-${hours}${minutes}${seconds}-${random}`;
        }
        
        // ========== تحميل المستخدم الحالي ==========
        function loadCurrentUser() {
            try {
                const savedUser = localStorage.getItem('current_user');
                if (savedUser) {
                    currentUser = JSON.parse(savedUser);
                } else {
                    currentUser = { name: 'مستخدم ناردو', username: 'user' };
                }
                const publisherInput = document.getElementById('publisherName');
                if (publisherInput) {
                    publisherInput.value = currentUser.name || currentUser.username || 'مستخدم ناردو';
                }
            } catch(e) {
                currentUser = { name: 'مستخدم ناردو', username: 'user' };
            }
        }
        
        // ========== حفظ الريلز في localStorage للعرض في الشريط ==========
        function saveReelToLocalStorage(reelData) {
            try {
                let reelsList = JSON.parse(localStorage.getItem('nardo_reels_list') || '[]');
                reelsList.unshift(reelData); // إضافة في البداية
                // الاحتفاظ بآخر 50 ريلز فقط
                if (reelsList.length > 50) reelsList = reelsList.slice(0, 50);
                localStorage.setItem('nardo_reels_list', JSON.stringify(reelsList));
                
                // إرسال إشعار للتحديث
                localStorage.setItem('nardo_reels_updated', Date.now().toString());
                window.dispatchEvent(new StorageEvent('storage', {
                    key: 'nardo_reels_updated',
                    newValue: Date.now().toString()
                }));
            } catch(e) {
                console.error('خطأ في حفظ الريلز:', e);
            }
        }
        
        // ========== رفع الريلز إلى تليجرام ==========
        async function uploadReelToTelegram() {
            const title = document.getElementById('reelTitle').value.trim();
            const publisherName = currentUser?.name || 'مستخدم ناردو';
            
            if (!title) {
                showToast('❌ الرجاء إدخال عنوان للريلز', 'error');
                return;
            }
            
            if (!selectedVideoFile) {
                showToast('❌ الرجاء رفع فيديو للريلز', 'error');
                return;
            }
            
            const serialNumber = generateSerialNumber();
            currentSerialNumber = serialNumber;
            
            const saveBtn = document.getElementById('saveBtn');
            saveBtn.disabled = true;
            saveBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> جاري الرفع إلى طلبات ناردو...';
            
            try {
                const formData = new FormData();
                formData.append('chat_id', TELEGRAM.channelId);
                formData.append('video', selectedVideoFile);
                
                // الكابشن مع @azerg والرقم التسلسلي NARD-
                const caption = `🎬 ${title}\n\n👤 الناشر: ${publisherName}\n📅 ${new Date().toLocaleString('ar-EG')}\n🔢 الرقم التسلسلي: ${serialNumber}\n🔗 @${TELEGRAM.channelUsername}\n\n✅ تم الرفع عبر ناردو برو | طلبات ناردو`;
                formData.append('caption', caption);
                
                if (posterData) {
                    const posterBlob = base64ToBlob(posterData);
                    formData.append('thumbnail', posterBlob, 'thumbnail.jpg');
                }
                
                showToast('📤 جاري رفع الفيديو إلى قناة طلبات ناردو...', 'info');
                
                const response = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/sendVideo`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.ok) {
                    const messageId = data.result.message_id;
                    const videoUrl = URL.createObjectURL(selectedVideoFile);
                    // حفظ في quick_reels للظهور الفوري
let quickReels = JSON.parse(localStorage.getItem('quick_reels') || '[]');
quickReels.unshift({
    id: messageId,
    serialNumber: serialNumber,
    title: title,
    publisher: publisherName,
    videoUrl: videoUrl,
    timestamp: Date.now(),
    hasAzerg: true
});
if (quickReels.length > 10) quickReels = quickReels.slice(0, 10);
localStorage.setItem('quick_reels', JSON.stringify(quickReels));

// إشعار فوري للصفحة الرئيسية
localStorage.setItem('reels_just_uploaded', Date.now().toString());
localStorage.setItem('nardo_reels_updated', Date.now().toString());
                    
                    // حفظ بيانات الريلز للعرض في الشريط العلوي
                    const reelData = {
                        id: messageId,
                        serialNumber: serialNumber,
                        title: title,
                        publisher: publisherName,
                        videoUrl: videoUrl,
                        posterUrl: posterData || null,
                        timestamp: Date.now(),
                        channelUsername: TELEGRAM.channelUsername,
                        hasAzerg: true // شرط العرض في الشريط العلوي
                    };
                    
                    saveReelToLocalStorage(reelData);
                    showToast(`✅ تم الرفع بنجاح! الرقم التسلسلي: ${serialNumber}`, 'success');
                    showSuccessModal(messageId, serialNumber);
                } else {
                    throw new Error(data.description || 'فشل الرفع');
                }
                
            } catch (error) {
                console.error('❌ خطأ:', error);
                showToast(`❌ فشل الرفع: ${error.message}`, 'error');
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerHTML = '<i class="fab fa-telegram"></i> نشر في طلبات ناردو <i class="fas fa-arrow-left"></i>';
            }
        }
        
        // ========== عرض نافذة النجاح ==========
        function showSuccessModal(messageId, serialNumber) {
            const modal = document.createElement('div');
            modal.className = 'confirm-modal';
            modal.innerHTML = `
                <div class="confirm-content">
                    <div class="success-checkmark">
                        <i class="fas fa-check"></i>
                    </div>
                    <h2 style="color: #10b981;">تم النشر بنجاح! 🎉</h2>
                    <p>تم حفظ الريلز في قناة <strong>طلبات ناردو</strong></p>
                    <div style="background: #f0f0f0; padding: 12px; border-radius: 12px; margin: 15px 0;">
                        <div><i class="fab fa-telegram" style="color: #0088cc;"></i> <strong>@azerg</strong></div>
                        <div style="margin-top: 8px;"><i class="fas fa-fingerprint"></i> <strong>${serialNumber}</strong></div>
                    </div>
                    <p style="color: #10b981; font-size: 0.9rem;">
                        ✨ سيظهر الريلز في شريط القصص العلوي ✨
                    </p>
                    <div class="confirm-buttons">
                        <button class="confirm-btn confirm-yes" onclick="redirectToHome()">
                            <i class="fas fa-home"></i> العودة للرئيسية
                        </button>
                        <button class="confirm-btn confirm-no" onclick="addAnotherReel()">
                            <i class="fas fa-plus"></i> إضافة آخر
                        </button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        }
        
        function redirectToHome() {
            window.location.href = 'index.html';
        }
        
        function addAnotherReel() {
            document.querySelector('.confirm-modal')?.remove();
            resetForm();
            showToast('📹 يمكنك إضافة ريلز جديد', 'info');
        }
        
        function resetForm() {
            document.getElementById('reelTitle').value = '';
            document.getElementById('reelVideo').value = '';
            document.getElementById('reelPoster').value = '';
            document.getElementById('videoPreview').style.display = 'none';
            document.getElementById('posterPreview').style.display = 'none';
            document.getElementById('videoFileInfo').style.display = 'none';
            selectedVideoFile = null;
            posterData = null;
        }
        
        // ========== معالجة الفيديو ==========
        function handleVideoUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            if (!file.type.startsWith('video/')) {
                showToast('❌ الرجاء اختيار ملف فيديو صالح', 'error');
                return;
            }
            
            if (file.size > 50 * 1024 * 1024) {
                showToast('❌ حجم الفيديو كبير جداً. الحد الأقصى 50 ميجابايت', 'error');
                return;
            }
            
            selectedVideoFile = file;
            const videoUrl = URL.createObjectURL(file);
            
            const previewContainer = document.getElementById('videoPreview');
            previewContainer.innerHTML = `
                <div class="video-preview-container">
                    <video controls src="${videoUrl}"></video>
                    <button class="remove-video-btn" onclick="removeVideo()">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </div>
            `;
            previewContainer.style.display = 'block';
            
            const sizeMB = (file.size / (1024 * 1024)).toFixed(2);
            const fileInfo = document.getElementById('videoFileInfo');
            fileInfo.innerHTML = `<i class="fas fa-file-video"></i> ${file.name} (${sizeMB} MB)`;
            fileInfo.style.display = 'block';
            
            showToast('✅ تم اختيار الفيديو بنجاح', 'success');
        }
        
        function removeVideo() {
            selectedVideoFile = null;
            document.getElementById('videoPreview').style.display = 'none';
            document.getElementById('videoFileInfo').style.display = 'none';
            document.getElementById('reelVideo').value = '';
            showToast('🗑️ تم إزالة الفيديو', 'info');
        }
        
        // ========== معالجة الصورة ==========
        function handlePosterUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                posterData = e.target.result;
                const previewContainer = document.getElementById('posterPreview');
                previewContainer.innerHTML = `
                    <div class="poster-preview-container">
                        <img src="${posterData}" alt="غلاف الريلز">
                        <button class="remove-poster-btn" onclick="removePoster()">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                `;
                previewContainer.style.display = 'block';
                showToast('✅ تم رفع صورة الغلاف', 'success');
            };
            reader.readAsDataURL(file);
        }
        
        function removePoster() {
            posterData = null;
            document.getElementById('posterPreview').style.display = 'none';
            document.getElementById('reelPoster').value = '';
            showToast('🗑️ تم إزالة صورة الغلاف', 'info');
        }
        
        function base64ToBlob(base64) {
            const parts = base64.split(';base64,');
            const contentType = parts[0].split(':')[1];
            const raw = window.atob(parts[1]);
            const rawLength = raw.length;
            const uInt8Array = new Uint8Array(rawLength);
            for (let i = 0; i < rawLength; ++i) {
                uInt8Array[i] = raw.charCodeAt(i);
            }
            return new Blob([uInt8Array], { type: contentType });
        }
        
        function confirmBack() {
            if (selectedVideoFile || document.getElementById('reelTitle').value.trim()) {
                const modal = document.createElement('div');
                modal.className = 'confirm-modal';
                modal.innerHTML = `
                    <div class="confirm-content">
                        <i class="fas fa-exclamation-triangle" style="color: #ff9800; font-size: 3rem;"></i>
                        <h3>هل تريد المغادرة؟</h3>
                        <p>لديك بيانات غير محفوظة. سيتم فقدانها إذا غادرت.</p>
                        <div class="confirm-buttons">
                            <button class="confirm-btn confirm-yes" onclick="leavePage()">مغادرة</button>
                            <button class="confirm-btn confirm-no" onclick="closeConfirm()">البقاء</button>
                        </div>
                    </div>
                `;
                document.body.appendChild(modal);
            } else {
                window.location.href = 'index.html';
            }
        }
        
        function leavePage() { window.location.href = 'index.html'; }
        function closeConfirm() { document.querySelector('.confirm-modal')?.remove(); }
        
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast-message toast-${type}`;
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i> ${message}`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'slideInRight 0.3s reverse';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
        
        loadCurrentUser();

        console.log('📡 سيتم الرفع إلى قناة @azerg مع الرقم التسلسلي NARD-');
