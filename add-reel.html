<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>إضافة ريلز | ناردو برو</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0a0f1a, #0f1420);
            color: white;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 25px;
            padding: 25px;
            border: 1px solid rgba(255,215,0,0.3);
        }

        h1 {
            color: gold;
            text-align: center;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .upload-area {
            border: 2px dashed rgba(255,215,0,0.5);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 20px;
            transition: all 0.3s;
            background: rgba(255,215,0,0.05);
        }

        .upload-area:hover {
            border-color: gold;
            background: rgba(255,215,0,0.1);
        }

        .upload-area i {
            font-size: 50px;
            color: gold;
            margin-bottom: 10px;
        }

        .video-preview {
            display: none;
            margin-bottom: 20px;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
        }

        .video-preview video {
            width: 100%;
            max-height: 300px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: gold;
            font-weight: 600;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 10px;
            color: white;
            font-family: 'Cairo', sans-serif;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: gold;
            color: black;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255,215,0,0.4);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid gold;
        }

        .serial-info {
            background: rgba(255,215,0,0.1);
            padding: 10px;
            border-radius: 10px;
            margin: 15px 0;
            text-align: center;
            font-family: monospace;
            font-size: 12px;
            direction: ltr;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: gold;
            color: black;
            padding: 10px 20px;
            border-radius: 50px;
            z-index: 2000;
            font-weight: bold;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: gold;
            text-decoration: none;
            text-align: center;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>
                <i class="fab fa-telegram"></i>
                إضافة ريلز جديد
            </h1>

            <!-- منطقة رفع الفيديو -->
            <div class="upload-area" onclick="document.getElementById('videoFile').click()">
                <i class="fas fa-cloud-upload-alt"></i>
                <p>اضغط لرفع الفيديو</p>
                <small>MP4 - الحد الأقصى 50MB</small>
            </div>
            <input type="file" id="videoFile" accept="video/*" style="display: none;" onchange="previewVideo(this)">

            <!-- معاينة الفيديو -->
            <div id="videoPreview" class="video-preview">
                <video id="previewVideo" controls></video>
            </div>

            <!-- معلومات الفيديو -->
            <div class="input-group">
                <label><i class="fas fa-heading"></i> عنوان الريلز</label>
                <input type="text" id="videoTitle" placeholder="عنوان الفيديو..." value="ريلز رائع">
            </div>

            <div class="input-group">
                <label><i class="fas fa-user"></i> اسم الناشر</label>
                <input type="text" id="videoPublisher" placeholder="اسمك..." value="ناردو برو">
            </div>

            <div class="input-group">
                <label><i class="fas fa-tag"></i> هاشتاجات (اختياري)</label>
                <textarea id="videoHashtags" placeholder="#ريلز #ناردو ..."></textarea>
            </div>

            <!-- عرض المعرف الذي سيتم إنشاؤه -->
            <div class="serial-info" id="serialInfo">
                <i class="fas fa-fingerprint"></i> سيتم إنشاء معرف خاص تلقائياً عند الرفع
            </div>

            <!-- أزرار الإجراءات -->
            <button class="btn" id="uploadBtn" onclick="uploadVideo()">
                <i class="fab fa-telegram"></i> رفع وتخزين في تليجرام
            </button>
            <a href="index.html" class="back-link">← العودة للرئيسية</a>
        </div>
    </div>

    <script>
        // ========== إعدادات تليجرام ==========
        const BOT_TOKEN = '8576673096:AAECPDHWRTVQ_juq68hxM9PIdacnqevGRb4';
        const CHANNEL_ID = '-1003822964890';
        const API_URL = `https://api.telegram.org/bot${BOT_TOKEN}`;

        let selectedFile = null;

        // دالة إنشاء معرف فريد بصيغة NARD-YYYYMMDD-HHMMSS-XXXX
        function generateSerialNumber() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            const random = Math.floor(Math.random() * 10000).toString().padStart(4, '0');
            return `NARD-${year}${month}${day}-${hours}${minutes}${seconds}-${random}`;
        }

        // عرض المعاينة
        function previewVideo(input) {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                if (file.size > 50 * 1024 * 1024) {
                    showToast("❌ حجم الفيديو كبير جداً (حد 50MB)");
                    input.value = '';
                    return;
                }
                if (!file.type.startsWith('video/')) {
                    showToast("❌ اختر ملف فيديو صالح");
                    input.value = '';
                    return;
                }

                selectedFile = file;
                const url = URL.createObjectURL(file);
                const preview = document.getElementById('videoPreview');
                const previewVideo = document.getElementById('previewVideo');
                previewVideo.src = url;
                preview.style.display = 'block';
            }
        }

        // رفع الفيديو إلى تلغرام مع تضمين المعرف الخاص
        async function uploadVideo() {
            if (!selectedFile) {
                showToast("❌ اختر فيديو أولاً");
                return;
            }

            const title = document.getElementById('videoTitle').value.trim() || 'ريلز';
            const publisher = document.getElementById('videoPublisher').value.trim() || 'ناردو برو';
            const hashtags = document.getElementById('videoHashtags').value.trim();

            // إنشاء المعرف الخاص
            const serial = generateSerialNumber();

            const btn = document.getElementById('uploadBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> جاري الرفع...';

            // بناء الكابشن بالصيغة المطلوبة ليتعرف عليها index.html
            let caption = `🎬 ${title}\n👤 ${publisher}\n🔑 NARD-SERIAL: ${serial}\n📅 ${new Date().toLocaleString('ar-EG')}\n✅ تم الرفع عبر ناردو ريلز`;
            if (hashtags) {
                caption += `\n\n${hashtags}`;
            }

            const formData = new FormData();
            formData.append('chat_id', CHANNEL_ID);
            formData.append('video', selectedFile);
            formData.append('caption', caption);

            try {
                const response = await fetch(`${API_URL}/sendVideo`, {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.ok) {
                    showToast(`✅ تم الرفع بنجاح! المعرف: ${serial}`);
                    // إعادة تعيين النموذج
                    selectedFile = null;
                    document.getElementById('videoPreview').style.display = 'none';
                    document.getElementById('videoFile').value = '';
                    document.getElementById('videoTitle').value = 'ريلز رائع';
                    document.getElementById('videoPublisher').value = 'ناردو برو';
                    document.getElementById('videoHashtags').value = '';
                    // عرض رسالة نجاح مع المعرف
                    const serialInfo = document.getElementById('serialInfo');
                    serialInfo.innerHTML = `<i class="fas fa-check-circle"></i> تم الرفع بنجاح! المعرف: ${serial}`;
                    serialInfo.style.background = "rgba(0,255,0,0.2)";
                    setTimeout(() => {
                        serialInfo.innerHTML = '<i class="fas fa-fingerprint"></i> سيتم إنشاء معرف خاص تلقائياً عند الرفع';
                        serialInfo.style.background = "rgba(255,215,0,0.1)";
                    }, 5000);
                } else {
                    throw new Error(data.description);
                }
            } catch (error) {
                console.error(error);
                showToast("❌ فشل الرفع: " + error.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fab fa-telegram"></i> رفع وتخزين في تليجرام';
            }
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
    </script>
</body>
</html>
