<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>إضافة ريلز جديد | ناردو برو</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container { max-width: 800px; margin: 0 auto; }
        
        .reel-card {
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            animation: slideUp 0.5s ease;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .reel-header {
            background: linear-gradient(135deg, #ffd700, #ffb347);
            padding: 30px;
            text-align: center;
            position: relative;
        }
        
        .reel-header h1 { color: #1a1a2e; font-size: 2rem; margin-bottom: 10px; }
        .reel-header p { color: rgba(26, 26, 46, 0.8); }
        
        .back-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.3);
            border: none;
            padding: 8px 15px;
            border-radius: 25px;
            color: #1a1a2e;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Cairo', sans-serif;
        }
        
        .back-btn:hover { background: rgba(255,255,255,0.5); transform: translateX(-5px); }
        
        .reel-content { padding: 30px; }
        
        .form-group { margin-bottom: 25px; }
        
        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #333;
        }
        
        .form-group label i { color: #ffd700; margin-left: 8px; }
        
        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s ease;
        }
        
        .form-control:focus {
            outline: none;
            border-color: #ffd700;
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.1);
        }
        
        .video-upload-area {
            border: 3px dashed #ffd700;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #fff9e6;
        }
        
        .video-upload-area:hover { transform: translateY(-5px); border-color: #ffb347; background: #fffef7; }
        .video-upload-area i { font-size: 4rem; color: #ffd700; margin-bottom: 15px; }
        .video-upload-area p { font-size: 1.1rem; font-weight: 500; color: #333; }
        .video-upload-area small { color: #999; font-size: 0.85rem; display: block; margin-top: 5px; }
        
        .video-preview-container {
            margin-top: 20px;
            position: relative;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
        }
        
        .video-preview-container video { width: 100%; max-height: 300px; }
        
        .remove-video-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 0, 0, 0.9);
            color: white;
            border: none;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            cursor: pointer;
        }
        
        .image-upload-area {
            border: 2px dashed #ddd;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #fafafa;
        }
        
        .image-upload-area:hover { border-color: #ffd700; background: #fff9e6; }
        .image-upload-area i { font-size: 2rem; color: #ffd700; }
        
        .poster-preview-container {
            margin-top: 15px;
            position: relative;
            display: inline-block;
        }
        
        .poster-preview-container img {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 12px;
            border: 3px solid #ffd700;
        }
        
        .remove-poster-btn {
            position: absolute;
            top: -10px;
            right: -10px;
            background: rgba(255, 0, 0, 0.9);
            color: white;
            border: none;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            cursor: pointer;
        }
        
        .file-info {
            margin-top: 10px;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 8px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .progress-bar {
            width: 100%;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            overflow: hidden;
            margin-top: 10px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ffb347);
            width: 0%;
            transition: width 0.3s ease;
        }
        
        .save-btn {
            width: 100%;
            background: linear-gradient(135deg, #ffd700, #ffb347);
            border: none;
            padding: 15px;
            border-radius: 12px;
            color: #1a1a2e;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
            font-family: 'Cairo', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .save-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4); }
        .save-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .toast-message {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 1000;
            animation: slideInRight 0.3s ease;
            font-family: 'Cairo', sans-serif;
        }
        
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .toast-success { background: #10b981; }
        .toast-error { background: #ef4444; }
        .toast-info { background: #3b82f6; }
        
        @media (max-width: 768px) {
            .reel-content { padding: 20px; }
            .video-upload-area { padding: 30px 20px; }
            .video-upload-area i { font-size: 3rem; }
            .reel-header h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="reel-card">
            <div class="reel-header">
                <button class="back-btn" onclick="goBack()">
                    <i class="fas fa-arrow-right"></i> رجوع
                </button>
                <i class="fas fa-film" style="font-size: 3rem; margin-bottom: 10px;"></i>
                <h1>إضافة ريلز جديد</h1>
                <p>شارك مقاطع الفيديو القصيرة مع متابعيك</p>
            </div>
            
            <div class="reel-content">
                <form id="addReelForm">
                    <div class="form-group">
                        <label><i class="fas fa-tag"></i> عنوان الريلز</label>
                        <input type="text" class="form-control" id="reelTitle" required placeholder="مثال: وصفة زعتر فلسطيني أصلية">
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-video"></i> فيديو الريلز <span style="color: red;">*</span></label>
                        <div class="video-upload-area" onclick="document.getElementById('reelVideo').click()">
                            <i class="fas fa-cloud-upload-alt"></i>
                            <p>اضغط لرفع الفيديو</p>
                            <small>✅ صيغة MP4</small>
                            <small>📁 الحد الأقصى: 100 ميجابايت (باستخدام IndexedDB)</small>
                        </div>
                        <input type="file" id="reelVideo" accept="video/mp4,video/*" style="display:none;" onchange="handleVideoUpload(event)">
                        <div id="videoPreview" style="display:none;"></div>
                        <div id="videoFileInfo" class="file-info" style="display:none;"></div>
                        <div id="progressBar" class="progress-bar" style="display:none;">
                            <div class="progress-fill" id="progressFill"></div>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-image"></i> صورة الغلاف <span style="color: #999;">(اختياري)</span></label>
                        <div class="image-upload-area" onclick="document.getElementById('reelPoster').click()">
                            <i class="fas fa-image"></i>
                            <span>اختر صورة للغلاف</span>
                        </div>
                        <input type="file" id="reelPoster" accept="image/*" style="display:none;" onchange="handlePosterUpload(event)">
                        <div id="posterPreview" style="display:none;"></div>
                    </div>
                    
                    <button type="button" class="save-btn" id="saveBtn" onclick="saveReel()">
                        <i class="fas fa-save"></i> نشر الريلز
                    </button>
                </form>
            </div>
        </div>
    </div>
    
    <div id="toastContainer"></div>
    
    <script>
        // ========== إعداد IndexedDB ==========
        let db = null;
        let currentVideoBlob = null;
        let currentPosterBlob = null;
        let videoFileName = '';
        let videoFileSize = 0;
        let isSaving = false;
        
        // فتح قاعدة البيانات
        function openDatabase() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open('NardoReelsDB', 1);
                
                request.onerror = () => {
                    console.error('❌ فشل فتح قاعدة البيانات:', request.error);
                    reject(request.error);
                };
                
                request.onsuccess = () => {
                    db = request.result;
                    console.log('✅ تم فتح قاعدة البيانات بنجاح');
                    resolve(db);
                };
                
                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    
                    // إنشاء مخزن للريلز
                    if (!db.objectStoreNames.contains('reels')) {
                        const store = db.createObjectStore('reels', { keyPath: 'id' });
                        store.createIndex('date', 'date', { unique: false });
                        store.createIndex('title', 'title', { unique: false });
                        console.log('✅ تم إنشاء مخزن الريلز');
                    }
                    
                    // إنشاء مخزن للفيديوهات
                    if (!db.objectStoreNames.contains('videos')) {
                        db.createObjectStore('videos', { keyPath: 'id' });
                        console.log('✅ تم إنشاء مخزن الفيديوهات');
                    }
                };
            });
        }
        
        // حفظ الريلز في IndexedDB
        async function saveReelToDB(reelData, videoBlob, posterBlob) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(['reels', 'videos'], 'readwrite');
                const reelsStore = transaction.objectStore('reels');
                const videosStore = transaction.objectStore('videos');
                
                // حفظ الفيديو
                const videoId = `video_${reelData.id}`;
                videosStore.put({ id: videoId, data: videoBlob });
                
                // حفظ الصورة إذا وجدت
                let posterId = null;
                if (posterBlob) {
                    posterId = `poster_${reelData.id}`;
                    videosStore.put({ id: posterId, data: posterBlob });
                }
                
                // حفظ بيانات الريلز (بدون الفيديو)
                const reelToSave = {
                    id: reelData.id,
                    title: reelData.title,
                    videoId: videoId,
                    posterId: posterId,
                    views: 0,
                    date: reelData.date,
                    dateFormatted: reelData.dateFormatted,
                    fileName: reelData.fileName,
                    size: reelData.size,
                    sizeMB: reelData.sizeMB
                };
                
                reelsStore.put(reelToSave);
                
                transaction.oncomplete = () => {
                    console.log('✅ تم حفظ الريلز في IndexedDB');
                    resolve();
                };
                
                transaction.onerror = () => {
                    console.error('❌ فشل حفظ الريلز:', transaction.error);
                    reject(transaction.error);
                };
            });
        }
        
        // ========== معالجة الفيديو ==========
        function handleVideoUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            console.log('📹 جاري رفع الفيديو:', file.name, (file.size / 1024 / 1024).toFixed(2), 'MB');
            
            if (!file.type.startsWith('video/')) {
                showToast('❌ الرجاء اختيار ملف فيديو صالح', 'error');
                return;
            }
            
            if (file.size > 100 * 1024 * 1024) {
                showToast('❌ حجم الفيديو كبير جداً. الحد الأقصى 100 ميجابايت', 'error');
                return;
            }
            
            currentVideoBlob = file;
            videoFileName = file.name;
            videoFileSize = file.size;
            
            // عرض معاينة الفيديو
            const videoUrl = URL.createObjectURL(file);
            displayVideoPreview(videoUrl);
            displayFileInfo(videoFileName, videoFileSize);
            showToast('✅ تم رفع الفيديو بنجاح', 'success');
        }
        
        function displayVideoPreview(videoUrl) {
            const previewContainer = document.getElementById('videoPreview');
            previewContainer.innerHTML = `
                <div class="video-preview-container">
                    <video controls>
                        <source src="${videoUrl}" type="video/mp4">
                    </video>
                    <button class="remove-video-btn" onclick="removeVideo()">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            `;
            previewContainer.style.display = 'block';
        }
        
        function displayFileInfo(name, size) {
            const fileInfo = document.getElementById('videoFileInfo');
            const sizeMB = (size / (1024 * 1024)).toFixed(2);
            fileInfo.innerHTML = `
                <i class="fas fa-file-video"></i>
                <span>${name}</span>
                <span>(${sizeMB} MB)</span>
            `;
            fileInfo.style.display = 'flex';
        }
        
        function removeVideo() {
            currentVideoBlob = null;
            videoFileName = '';
            videoFileSize = 0;
            document.getElementById('videoPreview').style.display = 'none';
            document.getElementById('videoFileInfo').style.display = 'none';
            document.getElementById('reelVideo').value = '';
            showToast('🗑️ تم إزالة الفيديو', 'info');
        }
        
        // ========== معالجة الصورة ==========
        function handlePosterUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            if (!file.type.startsWith('image/')) {
                showToast('❌ الرجاء اختيار صورة صالحة', 'error');
                return;
            }
            
            currentPosterBlob = file;
            const imageUrl = URL.createObjectURL(file);
            displayPosterPreview(imageUrl);
            showToast('✅ تم رفع صورة الغلاف', 'success');
        }
        
        function displayPosterPreview(imageUrl) {
            const previewContainer = document.getElementById('posterPreview');
            previewContainer.innerHTML = `
                <div class="poster-preview-container">
                    <img src="${imageUrl}" alt="غلاف الريلز">
                    <button class="remove-poster-btn" onclick="removePoster()">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            `;
            previewContainer.style.display = 'block';
        }
        
        function removePoster() {
            currentPosterBlob = null;
            document.getElementById('posterPreview').style.display = 'none';
            document.getElementById('reelPoster').value = '';
            showToast('🗑️ تم إزالة صورة الغلاف', 'info');
        }
        
        // ========== حفظ الريلز ==========
        async function saveReel() {
            if (isSaving) {
                showToast('⚠️ جاري الحفظ، انتظر قليلاً', 'info');
                return;
            }
            
            const title = document.getElementById('reelTitle').value.trim();
            
            if (!title) {
                showToast('❌ الرجاء إدخال عنوان للريلز', 'error');
                document.getElementById('reelTitle').focus();
                return;
            }
            
            if (!currentVideoBlob) {
                showToast('❌ الرجاء رفع فيديو للريلز', 'error');
                return;
            }
            
            if (!db) {
                showToast('⚠️ جاري تهيئة قاعدة البيانات...', 'info');
                await openDatabase();
            }
            
            isSaving = true;
            const saveBtn = document.getElementById('saveBtn');
            saveBtn.disabled = true;
            saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري النشر...';
            
            try {
                const newReel = {
                    id: Date.now(),
                    title: title,
                    date: new Date().toISOString(),
                    dateFormatted: new Date().toLocaleDateString('ar'),
                    fileName: videoFileName,
                    size: videoFileSize,
                    sizeMB: (videoFileSize / (1024 * 1024)).toFixed(2)
                };
                
                await saveReelToDB(newReel, currentVideoBlob, currentPosterBlob);
                
                // تحديث localStorage بمعلومات بسيطة للصفحة الرئيسية
                updateMainPageList();
                
                showToast('✅ تم نشر الريلز بنجاح!', 'success');
                
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
                
            } catch (error) {
                console.error('❌ خطأ:', error);
                showToast('❌ حدث خطأ أثناء حفظ الريلز', 'error');
                saveBtn.disabled = false;
                saveBtn.innerHTML = '<i class="fas fa-save"></i> نشر الريلز';
                isSaving = false;
            }
        }
        
        // تحديث قائمة الريلز في localStorage للصفحة الرئيسية
        function updateMainPageList() {
            try {
                let reelsList = localStorage.getItem('nardo_reels_list');
                reelsList = reelsList ? JSON.parse(reelsList) : [];
                
                reelsList.unshift({
                    id: Date.now(),
                    title: document.getElementById('reelTitle').value.trim(),
                    date: new Date().toISOString(),
                    hasVideo: true
                });
                
                // الاحتفاظ فقط بآخر 50 ريلز للقائمة
                if (reelsList.length > 50) reelsList = reelsList.slice(0, 50);
                
                localStorage.setItem('nardo_reels_list', JSON.stringify(reelsList));
            } catch (e) {
                console.warn('⚠️ لا يمكن تحديث القائمة:', e);
            }
        }
        
        // ========== دوال مساعدة ==========
        function goBack() {
            if (currentVideoBlob || document.getElementById('reelTitle').value.trim()) {
                if (confirm('⚠️ لديك بيانات غير محفوظة. هل تريد المغادرة؟')) {
                    window.location.href = 'index.html';
                }
            } else {
                window.location.href = 'index.html';
            }
        }
        
        function showToast(message, type = 'success') {
            const toastContainer = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast-message toast-${type}`;
            const icon = type === 'success' ? '✅' : (type === 'error' ? '❌' : 'ℹ️');
            toast.innerHTML = `${icon} ${message}`;
            toastContainer.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'slideInRight 0.3s reverse';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
        
        // تهيئة قاعدة البيانات عند التحميل
        (async function init() {
            try {
                await openDatabase();
                console.log('🎬 صفحة إضافة الريلز جاهزة (باستخدام IndexedDB)');
            } catch (error) {
                console.error('❌ فشل تهيئة قاعدة البيانات:', error);
                showToast('⚠️ المشكلة في المتصفح، حاول تحديث الصفحة', 'error');
            }
        })();
    </script>
</body>
</html>
