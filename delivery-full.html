<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ناردو برو - نظام TXT المتكامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0f3460, #16213e);
            color: white;
            direction: rtl;
            min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .header {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Cairo', sans-serif;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-gold { background: #ffd700; color: #000; }
        .btn-gold:hover { transform: translateY(-2px); background: #ffed4e; }
        .btn-telegram { background: #0088cc; color: white; }
        .btn-txt { background: #6c757d; color: white; }
        .btn-info { background: #17a2b8; color: white; }
        .btn-success { background: #28a745; color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            overflow: hidden;
        }
        th {
            background: rgba(255,215,0,0.1);
            color: #ffd700;
            padding: 15px;
            text-align: right;
            border-bottom: 2px solid #ffd700;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid rgba(255,215,0,0.1);
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .search-box input {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,215,0,0.3);
            background: rgba(0,0,0,0.3);
            color: white;
            font-family: 'Cairo', sans-serif;
        }
        .notification {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .notification.success { background: #28a745; color: white; }
        .notification.error { background: #dc3545; color: white; }
        .notification.info { background: #17a2b8; color: white; }
        @keyframes slideIn {
            from { transform: translateX(-400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255,215,0,0.2);
        }
        .stat-number {
            font-size: 32px;
            font-weight: bold;
            color: #ffd700;
        }
        .filter-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 8px 20px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 20px;
            cursor: pointer;
            color: white;
        }
        .filter-btn.active {
            background: #ffd700;
            color: #000;
        }
        .files-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .file-card {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 12px;
            padding: 15px;
            transition: all 0.3s;
        }
        .file-card:hover {
            background: rgba(255,215,0,0.1);
            transform: translateY(-3px);
        }
        .file-name {
            font-size: 16px;
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 8px;
            word-break: break-all;
        }
        .file-date {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 10px;
        }
        .file-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .file-actions button {
            flex: 1;
            padding: 8px;
            font-size: 12px;
        }
        .loading-spinner {
            text-align: center;
            padding: 40px;
        }
        .loading-spinner i {
            font-size: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .section-title {
            color: #ffd700;
            margin-bottom: 20px;
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-file-alt"></i> ناردو برو | نظام TXT المتكامل</h1>
        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
            <button class="btn btn-gold" onclick="openAddDistributor()"><i class="fas fa-plus"></i> إضافة موزع</button>
            <button class="btn btn-txt" onclick="exportToTxt()"><i class="fas fa-download"></i> تصدير TXT</button>
            <button class="btn btn-telegram" onclick="sendTxtToTelegram()"><i class="fab fa-telegram"></i> إرسال TXT للقناة</button>
            <button class="btn btn-info" onclick="fetchAllTxtFromChannel()"><i class="fab fa-telegram"></i> جلب TXT من القناة</button>
            <button class="btn btn-success" onclick="openImportTxtModal()"><i class="fas fa-upload"></i> استيراد TXT</button>
            <button class="btn btn-danger" onclick="clearAllData()"><i class="fas fa-trash"></i> مسح الكل</button>
        </div>
    </div>

    <div class="stats" id="stats"></div>

    <!-- قائمة ملفات TXT من القناة -->
    <div class="card" id="channelFilesSection" style="display: none;">
        <div class="section-title">
            <i class="fab fa-telegram"></i>
            <span>ملفات TXT من قناة التليجرام</span>
            <button class="btn btn-info" onclick="fetchAllTxtFromChannel()" style="padding: 5px 15px; margin-right: auto;"><i class="fas fa-sync-alt"></i> تحديث</button>
        </div>
        <div id="channelFilesList" class="files-grid">
            <div class="loading-spinner">
                <i class="fas fa-spinner"></i>
                <p>جاري تحميل الملفات...</p>
            </div>
        </div>
    </div>

    <!-- جدول الموزعين -->
    <div class="card">
        <h2 style="color: #ffd700; margin-bottom: 20px;"><i class="fas fa-table"></i> جدول الموزعين</h2>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 بحث باسم الموزع أو الولاية..." onkeyup="filterTable()">
        </div>
        <div class="filter-buttons">
            <button class="filter-btn active" onclick="filterByType('all')">الكل</button>
            <button class="filter-btn" onclick="filterByType('delivery')">🚚 توصيل</button>
            <button class="filter-btn" onclick="filterByType('distributor')">📦 موزع</button>
            <button class="filter-btn" onclick="filterByType('both')">🔄 كليهما</button>
        </div>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>اسم الشركة</th>
                        <th>المسؤول</th>
                        <th>الهاتف</th>
                        <th>النوع</th>
                        <th>الولاية</th>
                        <th>الإجراءات</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- نافذة إضافة موزع -->
<div id="addModal" class="modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center;">
    <div style="background: #1a1a2e; border: 2px solid #ffd700; border-radius: 20px; padding: 30px; max-width: 500px; width: 90%;">
        <button class="close-btn" onclick="closeAddModal()" style="float: left; font-size: 28px; cursor: pointer; color: #ffd700; background: none; border: none;">&times;</button>
        <h2 style="color: #ffd700;">إضافة موزع جديد</h2>
        <input type="text" id="compName" placeholder="اسم الشركة" style="width: 100%; padding: 12px; margin: 15px 0; border-radius: 10px; border: 1px solid rgba(255,215,0,0.3); background: rgba(0,0,0,0.3); color: white;">
        <input type="text" id="mgrName" placeholder="اسم المسؤول" style="width: 100%; padding: 12px; margin: 15px 0; border-radius: 10px; border: 1px solid rgba(255,215,0,0.3); background: rgba(0,0,0,0.3); color: white;">
        <input type="tel" id="phone" placeholder="رقم الهاتف" style="width: 100%; padding: 12px; margin: 15px 0; border-radius: 10px; border: 1px solid rgba(255,215,0,0.3); background: rgba(0,0,0,0.3); color: white;">
        <select id="type" style="width: 100%; padding: 12px; margin: 15px 0; border-radius: 10px; border: 1px solid rgba(255,215,0,0.3); background: rgba(0,0,0,0.3); color: white;">
            <option value="delivery">توصيل</option>
            <option value="distributor">موزع</option>
            <option value="both">كليهما</option>
        </select>
        <input type="text" id="state" placeholder="الولاية" style="width: 100%; padding: 12px; margin: 15px 0; border-radius: 10px; border: 1px solid rgba(255,215,0,0.3); background: rgba(0,0,0,0.3); color: white;">
        <button class="btn btn-gold" onclick="addDistributor()" style="width: 100%;">إضافة</button>
    </div>
</div>

<!-- نافذة استيراد TXT -->
<div id="importTxtModal" class="modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center;">
    <div style="background: #1a1a2e; border: 2px solid #ffd700; border-radius: 20px; padding: 30px; max-width: 600px; width: 90%;">
        <button class="close-btn" onclick="closeImportTxtModal()" style="float: left; font-size: 28px; cursor: pointer; color: #ffd700; background: none; border: none;">&times;</button>
        <h2 style="color: #ffd700;"><i class="fas fa-upload"></i> استيراد بيانات من TXT</h2>
        <p style="margin: 10px 0;">قم بلصق محتوى ملف TXT أو تحميل ملف:</p>
        <input type="file" id="txtFileInput" accept=".txt" onchange="handleTxtFileUpload(this)" style="width: 100%; padding: 12px; margin: 15px 0; border-radius: 10px; border: 1px solid rgba(255,215,0,0.3); background: rgba(0,0,0,0.3); color: white;">
        <textarea id="txtRawContent" rows="10" placeholder="الصق هنا محتوى ملف TXT..." style="width: 100%; padding: 12px; margin: 15px 0; border-radius: 10px; border: 1px solid rgba(255,215,0,0.3); background: rgba(0,0,0,0.3); color: white; font-family: monospace;"></textarea>
        <button class="btn btn-info" onclick="previewTxtData()">معاينة البيانات</button>
        <div id="importPreviewArea" style="background: rgba(0,0,0,0.3); padding: 10px; border-radius: 10px; margin-top: 10px; display: none;"></div>
        <button class="btn btn-success" onclick="importTxtToTable()" style="width: 100%; margin-top: 10px;">استيراد للجدول</button>
    </div>
</div>

<script>
    // ==================== الإعدادات الأساسية ====================
    const TELEGRAM = {
        botToken: '8576673096:AAGvSMjzwVWj6wJ47JdqiDwcObXjBDcyiLA',
        channelId: '-1003822964890',
        apiUrl: 'https://api.telegram.org/bot'
    };

    let distributors = [
        { id: 1, company: "شركة البراق", manager: "أحمد محمد", phone: "0555123456", type: "delivery", state: "الجزائر", status: "approved" },
        { id: 2, company: "مؤسسة السريع", manager: "سعيد علي", phone: "0555234567", type: "distributor", state: "وهران", status: "approved" },
        { id: 3, company: "شركة الأمانة", manager: "خالد عمر", phone: "0555345678", type: "both", state: "قسنطينة", status: "approved" }
    ];
    
    let currentFilter = 'all';
    let currentSearch = '';

    // ==================== دوال الجدول الأساسية ====================
    function getFilteredData() {
        let filtered = distributors.filter(d => d.status === 'approved');
        if (currentFilter !== 'all') filtered = filtered.filter(d => d.type === currentFilter);
        if (currentSearch) filtered = filtered.filter(d => 
            d.company.includes(currentSearch) || 
            d.state.includes(currentSearch) ||
            d.phone.includes(currentSearch)
        );
        return filtered;
    }

    function displayTable() {
        const filtered = getFilteredData();
        const tbody = document.getElementById('tableBody');
        if (filtered.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center">لا توجد بيانات</td></tr>';
            return;
        }
        
        tbody.innerHTML = filtered.map((d, i) => `
            <tr>
                <td>${i+1}</td>
                <td>${d.company}</td>
                <td>${d.manager}</td>
                <td>${d.phone}</td>
                <td>${d.type === 'delivery' ? '🚚 توصيل' : d.type === 'distributor' ? '📦 موزع' : '🔄 كليهما'}</td>
                <td>${d.state}</td>
                <td><button class="btn btn-danger" style="padding: 5px 10px; font-size: 12px;" onclick="deleteDistributor(${d.id})"><i class="fas fa-trash"></i> حذف</button></td>
            </tr>
        `).join('');
        updateStats();
    }
    
    function updateStats() {
        const approved = distributors.filter(d => d.status === 'approved');
        const delivery = approved.filter(d => d.type === 'delivery' || d.type === 'both').length;
        const distributor = approved.filter(d => d.type === 'distributor' || d.type === 'both').length;
        document.getElementById('stats').innerHTML = `
            <div class="stat-card"><div class="stat-number">${approved.length}</div><div>إجمالي الموزعين</div></div>
            <div class="stat-card"><div class="stat-number">${delivery}</div><div>خدمة توصيل</div></div>
            <div class="stat-card"><div class="stat-number">${distributor}</div><div>موزعون</div></div>
            <div class="stat-card"><div class="stat-number">${new Set(approved.map(d => d.state)).size}</div><div>ولايات</div></div>
        `;
    }
    
    function filterTable() { currentSearch = document.getElementById('searchInput').value; displayTable(); }
    
    function filterByType(type) {
        currentFilter = type;
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        displayTable();
    }
    
    function deleteDistributor(id) {
        distributors = distributors.filter(d => d.id !== id);
        displayTable();
        showNotification('✅ تم حذف الموزع بنجاح', 'success');
    }
    
    function addDistributor() {
        const newDist = {
            id: Date.now(),
            company: document.getElementById('compName').value,
            manager: document.getElementById('mgrName').value,
            phone: document.getElementById('phone').value,
            type: document.getElementById('type').value,
            state: document.getElementById('state').value,
            status: 'approved'
        };
        if (newDist.company && newDist.phone) {
            distributors.push(newDist);
            displayTable(); closeAddModal();
            showNotification('✅ تم إضافة الموزع بنجاح', 'success');
            document.getElementById('compName').value = '';
            document.getElementById('mgrName').value = '';
            document.getElementById('phone').value = '';
            document.getElementById('state').value = '';
        } else {
            showNotification('⚠️ الرجاء ملء الحقول الأساسية', 'error');
        }
    }
    
    function clearAllData() {
        if (confirm('⚠️ هل أنت متأكد من حذف جميع البيانات؟ لا يمكن التراجع!')){
            distributors = [];
            displayTable();
            showNotification('🗑️ تم حذف جميع البيانات', 'info');
        }
    }

    // ==================== دوال تصدير TXT ====================
    function generateTxtContent() {
        const filtered = getFilteredData();
        const date = new Date().toLocaleDateString('ar-SA');
        const time = new Date().toLocaleTimeString('ar-SA');
        
        let content = `╔════════════════════════════════════════════════════════════╗\n`;
        content += `║                    ناردو برو - قائمة الموزعين                    ║\n`;
        content += `╠════════════════════════════════════════════════════════════╣\n`;
        content += `║ 📅 التاريخ: ${date.padEnd(45)}║\n`;
        content += `║ ⏰ الوقت: ${time.padEnd(47)}║\n`;
        content += `║ 📊 إجمالي الموزعين: ${String(filtered.length).padEnd(38)}║\n`;
        content += `╚════════════════════════════════════════════════════════════╝\n\n`;
        
        content += `┌────┬──────────────────────────┬──────────────────────┬──────────────┬────────────┬──────────────────┐\n`;
        content += `│ #  │ اسم الشركة               │ المسؤول              │ الهاتف       │ النوع      │ الولاية         │\n`;
        content += `├────┼──────────────────────────┼──────────────────────┼──────────────┼────────────┼──────────────────┤\n`;
        
        filtered.forEach((d, i) => {
            const typeText = d.type === 'delivery' ? 'توصيل' : d.type === 'distributor' ? 'موزع' : 'كليهما';
            const num = String(i+1).padEnd(3);
            const company = d.company.substring(0, 24).padEnd(24);
            const manager = d.manager.substring(0, 20).padEnd(20);
            const phone = d.phone.substring(0, 12).padEnd(12);
            const type = typeText.substring(0, 10).padEnd(10);
            const state = d.state.substring(0, 16).padEnd(16);
            content += `│ ${num} │ ${company} │ ${manager} │ ${phone} │ ${type} │ ${state} │\n`;
        });
        
        content += `└────┴──────────────────────────┴──────────────────────┴──────────────┴────────────┴──────────────────┘\n\n`;
        content += `╔════════════════════════════════════════════════════════════╗\n`;
        content += `║                      نهاية القائمة                          ║\n`;
        content += `║              تم الإنشاء بواسطة نظام ناردو برو               ║\n`;
        content += `╚════════════════════════════════════════════════════════════╝\n`;
        
        return content;
    }
    
    function exportToTxt() {
        const content = generateTxtContent();
        const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        link.href = url;
        link.download = `nardo_pro_${Date.now()}.txt`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
        showNotification('✅ تم تصدير ملف TXT بنجاح', 'success');
    }
    
    async function sendTxtToTelegram() {
        showNotification('📤 جاري إرسال TXT للقناة...', 'info');
        try {
            const content = generateTxtContent();
            const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            
            const formData = new FormData();
            formData.append('chat_id', TELEGRAM.channelId);
            formData.append('document', blob, `distributors_${Date.now()}.txt`);
            formData.append('caption', `📊 قائمة الموزعين المحدثة\n📅 ${new Date().toLocaleDateString('ar-SA')}\n📁 ملف TXT`);

            const res = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/sendDocument`, { method: 'POST', body: formData });
            const result = await res.json();
            if(result.ok) {
                showNotification('✅ تم إرسال TXT بنجاح', 'success');
            } else throw new Error(result.description);
        } catch (err) { showNotification(`❌ فشل: ${err.message}`, 'error'); }
    }

    // ==================== جلب جميع ملفات TXT من القناة مباشرة ====================
    async function fetchAllTxtFromChannel() {
        const section = document.getElementById('channelFilesSection');
        const container = document.getElementById('channelFilesList');
        
        section.style.display = 'block';
        container.innerHTML = '<div class="loading-spinner"><i class="fas fa-spinner"></i><p>جاري جلب الملفات من القناة...</p></div>';
        
        try {
            // جلب آخر 50 رسالة من القناة
            const url = `${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getUpdates?offset=-50`;
            const response = await fetch(url);
            const data = await response.json();
            
            const txtFiles = [];
            
            if (data.ok && data.result) {
                for (const update of data.result) {
                    const message = update.message || update.channel_post || update.edited_message;
                    if (message && message.document) {
                        const fileName = message.document.file_name || '';
                        if (fileName.toLowerCase().endsWith('.txt')) {
                            txtFiles.push({
                                file_id: message.document.file_id,
                                file_name: fileName,
                                date: new Date(message.date * 1000).toLocaleString('ar-SA'),
                                message_id: message.message_id,
                                file_size: message.document.file_size
                            });
                        }
                    }
                }
            }
            
            if (txtFiles.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #aaa; grid-column: 1/-1;">📂 لا توجد ملفات TXT في القناة</p>';
                return;
            }
            
            // عرض الملفات
            container.innerHTML = txtFiles.map((file, index) => `
                <div class="file-card">
                    <div class="file-name">
                        <i class="fas fa-file-alt"></i> ${file.file_name}
                    </div>
                    <div class="file-date">
                        <i class="far fa-calendar-alt"></i> ${file.date}
                        <span style="margin-right: 10px;">📦 ${(file.file_size / 1024).toFixed(2)} KB</span>
                    </div>
                    <div class="file-actions">
                        <button class="btn btn-info" onclick="viewTxtFile('${file.file_id}', '${file.file_name}')">
                            <i class="fas fa-eye"></i> معاينة
                        </button>
                        <button class="btn btn-success" onclick="importTxtFile('${file.file_id}', '${file.file_name}')">
                            <i class="fas fa-download"></i> استيراد
                        </button>
                    </div>
                </div>
            `).join('');
            
            showNotification(`✅ تم العثور على ${txtFiles.length} ملف TXT في القناة`, 'success');
            
        } catch (err) {
            console.error(err);
            container.innerHTML = `<p style="text-align: center; color: #ff6b6b; grid-column: 1/-1;">❌ خطأ: ${err.message}</p>`;
            showNotification(`❌ فشل جلب الملفات: ${err.message}`, 'error');
        }
    }
    
    async function viewTxtFile(fileId, fileName) {
        showNotification(`📄 جاري تحميل ${fileName}...`, 'info');
        
        try {
            const fileRes = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getFile?file_id=${fileId}`);
            const fileData = await fileRes.json();
            const fileUrl = `https://api.telegram.org/file/bot${TELEGRAM.botToken}/${fileData.result.file_path}`;
            
            const res = await fetch(fileUrl);
            const text = await res.text();
            
            // عرض في نافذة منبثقة
            const win = window.open();
            win.document.write(`
                <html dir="ltr">
                <head>
                    <title>${fileName}</title>
                    <style>
                        body { 
                            font-family: monospace; 
                            padding: 20px; 
                            background: #1a1a2e; 
                            color: #fff;
                            direction: ltr;
                            text-align: left;
                        }
                        pre { 
                            white-space: pre-wrap; 
                            word-wrap: break-word;
                            background: rgba(0,0,0,0.3);
                            padding: 15px;
                            border-radius: 10px;
                        }
                        h2 { color: #ffd700; }
                    </style>
                </head>
                <body>
                    <h2>📄 ${fileName}</h2>
                    <pre>${escapeHtml(text)}</pre>
                </body>
                </html>
            `);
            
            showNotification(`✅ تم تحميل ${fileName}`, 'success');
        } catch (err) {
            showNotification(`❌ فشل تحميل الملف: ${err.message}`, 'error');
        }
    }
    
    async function importTxtFile(fileId, fileName) {
        showNotification(`📥 جاري استيراد ${fileName}...`, 'info');
        
        try {
            const fileRes = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getFile?file_id=${fileId}`);
            const fileData = await fileRes.json();
            const fileUrl = `https://api.telegram.org/file/bot${TELEGRAM.botToken}/${fileData.result.file_path}`;
            
            const res = await fetch(fileUrl);
            const text = await res.text();
            
            const parsed = parseTxtToDistributors(text);
            
            if (parsed.length > 0) {
                distributors = [...distributors, ...parsed];
                displayTable();
                showNotification(`✅ تم استيراد ${parsed.length} موزع من ${fileName}`, 'success');
            } else {
                showNotification(`⚠️ لم يتم العثور على بيانات صالحة في ${fileName}`, 'error');
            }
        } catch (err) {
            showNotification(`❌ فشل الاستيراد: ${err.message}`, 'error');
        }
    }
    
    function parseTxtToDistributors(txtContent) {
        const lines = txtContent.split('\n');
        const distributorsList = [];
        
        for (const line of lines) {
            if (line.includes('│') && !line.includes('┌') && !line.includes('├') && !line.includes('└') && !line.includes('═')) {
                const parts = line.split('│').filter(p => p.trim() !== '');
                if (parts.length >= 6) {
                    const company = parts[1].trim();
                    const manager = parts[2].trim();
                    const phone = parts[3].trim();
                    let type = parts[4].trim();
                    const state = parts[5].trim();
                    
                    if (type.includes('توصيل') && !type.includes('كليهما')) type = 'delivery';
                    else if (type.includes('موزع') && !type.includes('كليهما')) type = 'distributor';
                    else if (type.includes('كليهما')) type = 'both';
                    else type = 'delivery';
                    
                    if (company && phone && !company.includes('اسم الشركة') && !company.includes('─')) {
                        distributorsList.push({
                            id: Date.now() + Math.random(),
                            company: company,
                            manager: manager || 'غير محدد',
                            phone: phone,
                            type: type,
                            state: state || 'غير محدد',
                            status: 'approved'
                        });
                    }
                }
            }
        }
        
        return distributorsList;
    }
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    // ==================== دوال استيراد TXT ====================
    function openImportTxtModal() {
        document.getElementById('importTxtModal').style.display = 'flex';
        document.getElementById('txtRawContent').value = '';
        document.getElementById('importPreviewArea').style.display = 'none';
    }
    
    function closeImportTxtModal() {
        document.getElementById('importTxtModal').style.display = 'none';
    }
    
    function handleTxtFileUpload(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('txtRawContent').value = e.target.result;
                showNotification('📁 تم تحميل الملف بنجاح', 'success');
                previewTxtData();
            };
            reader.readAsText(input.files[0], 'UTF-8');
            input.value = '';
        }
    }
    
    function previewTxtData() {
        const txtContent = document.getElementById('txtRawContent').value;
        if (!txtContent.trim()) {
            showNotification('⚠️ الرجاء إدخال محتوى TXT أولاً', 'error');
            return;
        }
        
        const parsed = parseTxtToDistributors(txtContent);
        const previewArea = document.getElementById('importPreviewArea');
        
        if (parsed.length === 0) {
            previewArea.innerHTML = '<p style="color: #ff6b6b;">❌ لم يتم العثور على بيانات صالحة في الملف</p>';
            previewArea.style.display = 'block';
        } else {
            previewArea.innerHTML = `
                <p style="color: #ffd700;">✅ تم العثور على ${parsed.length} موزع:</p>
                <ul style="margin-top: 10px;">
                    ${parsed.slice(0, 5).map(d => `<li>📌 ${d.company} - ${d.phone} - ${d.state}</li>`).join('')}
                    ${parsed.length > 5 ? `<li>... و ${parsed.length - 5} آخرين</li>` : ''}
                </ul>
            `;
            previewArea.style.display = 'block';
        }
    }
    
    function importTxtToTable() {
        const txtContent = document.getElementById('txtRawContent').value;
        if (!txtContent.trim()) {
            showNotification('⚠️ الرجاء إدخال محتوى TXT أولاً', 'error');
            return;
        }
        
        const parsed = parseTxtToDistributors(txtContent);
        
        if (parsed.length === 0) {
            showNotification('❌ لم يتم العثور على بيانات صالحة للاستيراد', 'error');
            return;
        }
        
        distributors = [...distributors, ...parsed];
        displayTable();
        closeImportTxtModal();
        showNotification(`✅ تم استيراد ${parsed.length} موزع بنجاح`, 'success');
    }
    
    function showNotification(msg, type) {
        const n = document.createElement('div');
        n.className = `notification ${type}`;
        n.innerHTML = `<i class="fas ${type==='success'?'fa-check-circle':type==='error'?'fa-exclamation-circle':'fa-info-circle'}"></i> ${msg}`;
        document.body.appendChild(n);
        setTimeout(() => n.remove(), 3500);
    }
    
    function openAddDistributor() { document.getElementById('addModal').style.display = 'flex'; }
    function closeAddModal() { document.getElementById('addModal').style.display = 'none'; }
    
    // تحميل الملفات تلقائياً عند فتح الصفحة
    setTimeout(() => {
        fetchAllTxtFromChannel();
    }, 1000);
    
    displayTable();
</script>
