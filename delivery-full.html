<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ناردو برو - تجريبي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 600px; margin: 0 auto; }
        .card {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            text-align: center;
        }
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin: 5px;
            font-family: 'Cairo', sans-serif;
        }
        .btn-gold { background: #ffd700; color: #000; }
        .btn-telegram { background: #0088cc; color: white; }
        .btn-pdf { background: #dc3545; color: white; }
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        .success { background: #4ade80; color: #000; }
        .error { background: #f87171; color: #fff; }
        .info { background: #60a5fa; color: #fff; }
        @keyframes slideIn {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .hidden { display: none; }
        .progress-bar {
            width: 100%;
            height: 20px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            margin-top: 20px;
            overflow: hidden;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: #ffd700;
            transition: width 0.3s;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <i class="fas fa-truck" style="font-size: 50px; color: #ffd700;"></i>
        <h1 style="margin: 15px 0;">ناردو برو - تجريبي</h1>
        <p>نظام اختبار إرسال PDF مضغوط</p>
    </div>

    <div class="card">
        <h3><i class="fas fa-warehouse"></i> بيانات تجريبية</h3>
        <div id="demoData" style="margin: 15px 0; text-align: right;">
            <div>📦 شركة البراق للتوصيل - المسؤول: أحمد</div>
            <div>🚚 شركة السريع - المسؤول: محمد</div>
            <div>📦 موزع الجزائر - المسؤول: علي</div>
        </div>
        <button class="btn btn-pdf" onclick="createSmallPDF()">
            <i class="fas fa-file-pdf"></i> إنشاء PDF تجريبي
        </button>
        <button class="btn btn-telegram" onclick="sendCompressedPDF()">
            <i class="fab fa-telegram"></i> إرسال PDF مضغوط
        </button>
        <div id="progress" class="progress-bar hidden">
            <div id="progressFill" class="progress-fill"></div>
        </div>
    </div>

    <div class="card">
        <h3><i class="fas fa-link"></i> اختبار جلب PDF</h3>
        <input type="text" id="pdfUrl" placeholder="https://t.me/c/3822964890/3633" style="width: 100%; padding: 10px; margin: 10px 0; border-radius: 10px; border: none;">
        <button class="btn btn-gold" onclick="fetchAndExtract()">
            <i class="fab fa-telegram"></i> جلب وتحليل PDF
        </button>
    </div>

    <div class="card" id="resultCard" style="display: none;">
        <h3><i class="fas fa-chart-bar"></i> النتائج</h3>
        <div id="result"></div>
    </div>
</div>

<script>
    const TELEGRAM = { 
        botToken: '8576673096:AAGvSMjzwVWj6wJ47JdqiDwcObXjBDcyiLA', 
        channelId: '-1003822964890', 
        apiUrl: 'https://api.telegram.org/bot' 
    };

    function showNotification(msg, type) {
        const n = document.createElement('div');
        n.className = `notification ${type}`;
        n.textContent = msg;
        document.body.appendChild(n);
        setTimeout(() => n.remove(), 3000);
    }

    // إنشاء PDF صغير جداً للتجريب
    async function createSmallPDF() {
        showNotification('📄 جاري إنشاء PDF تجريبي...', 'info');
        
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        // إضافة محتوى بسيط
        doc.setFontSize(20);
        doc.text("ناردو برو - تقرير تجريبي", 105, 20, { align: 'center' });
        
        doc.setFontSize(12);
        doc.text("تاريخ الإنشاء: " + new Date().toLocaleString('ar-SA'), 105, 35, { align: 'center' });
        
        // بيانات تجريبية
        const distributors = [
            "1. شركة البراق للتوصيل - المسؤول: أحمد - الهاتف: 0555123456",
            "2. شركة السريع - المسؤول: محمد - الهاتف: 0555234567",
            "3. موزع الجزائر - المسؤول: علي - الهاتف: 0555345678"
        ];
        
        let y = 60;
        distributors.forEach(line => {
            doc.text(line, 20, y);
            y += 10;
        });
        
        // حفظ PDF
        const pdfBlob = doc.output('blob');
        const url = URL.createObjectURL(pdfBlob);
        window.open(url, '_blank');
        
        showNotification(`✅ تم إنشاء PDF بحجم ${(pdfBlob.size / 1024).toFixed(1)} KB`, 'success');
        
        // تخزين للاستخدام
        window.testPDF = pdfBlob;
        return pdfBlob;
    }

    // ضغط PDF وإرساله
    async function compressPDF(blob) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = function(e) {
                const arrayBuffer = e.target.result;
                // استخدام pako للضغط
                if (window.pako) {
                    const compressed = pako.deflate(new Uint8Array(arrayBuffer));
                    const compressedBlob = new Blob([compressed], { type: 'application/octet-stream' });
                    console.log(`الحجم الأصلي: ${blob.size} bytes, بعد الضغط: ${compressedBlob.size} bytes`);
                    resolve(compressedBlob);
                } else {
                    resolve(blob);
                }
            };
            reader.readAsArrayBuffer(blob);
        });
    }

    // إرسال PDF مضغوط
    async function sendCompressedPDF() {
        let pdfBlob = window.testPDF;
        if (!pdfBlob) {
            pdfBlob = await createSmallPDF();
        }
        
        showNotification('🗜️ جاري ضغط الملف...', 'info');
        document.getElementById('progress').classList.remove('hidden');
        document.getElementById('progressFill').style.width = '30%';
        
        // ضغط الملف
        const compressedBlob = await compressPDF(pdfBlob);
        
        document.getElementById('progressFill').style.width = '60%';
        showNotification('📤 جاري الإرسال إلى تليجرام...', 'info');
        
        // إرسال الملف المضغوط
        const formData = new FormData();
        formData.append('chat_id', TELEGRAM.channelId);
        formData.append('document', compressedBlob, `test_compressed_${Date.now()}.bin`);
        formData.append('caption', `📋 ملف مضغوط للتجربة\n📅 ${new Date().toLocaleString('ar-SA')}\n📊 الحجم الأصلي: ${(pdfBlob.size / 1024).toFixed(1)} KB\n🗜️ بعد الضغط: ${(compressedBlob.size / 1024).toFixed(1)} KB`);
        
        try {
            const response = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/sendDocument`, { 
                method: 'POST', 
                body: formData 
            });
            
            const result = await response.json();
            document.getElementById('progressFill').style.width = '100%';
            
            if (response.ok && result.ok) {
                showNotification('✅ تم الإرسال بنجاح!', 'success');
            } else {
                showNotification('❌ فشل الإرسال: ' + (result.description || 'خطأ'), 'error');
            }
        } catch (error) {
            showNotification('❌ خطأ: ' + error.message, 'error');
        }
        
        setTimeout(() => {
            document.getElementById('progress').classList.add('hidden');
            document.getElementById('progressFill').style.width = '0%';
        }, 2000);
    }

    // جلب PDF من الرابط وتحليل النص
    async function fetchAndExtract() {
        let url = document.getElementById('pdfUrl').value.trim();
        if (!url) {
            showNotification('⚠️ الرجاء إدخال رابط PDF', 'warning');
            return;
        }
        
        showNotification('📡 جاري جلب PDF...', 'info');
        
        try {
            let pdfUrl = url;
            
            // معالجة رابط تليجرام
            const tgMatch = url.match(/t\.me\/c\/(\d+)\/(\d+)/);
            if (tgMatch) {
                const chatId = `-100${tgMatch[1]}`;
                const messageId = parseInt(tgMatch[2]);
                
                const msgResponse = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getMessage?chat_id=${chatId}&message_id=${messageId}`);
                const msgData = await msgResponse.json();
                
                if (msgData.ok && msgData.result.document) {
                    const fileId = msgData.result.document.file_id;
                    const fileResponse = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getFile?file_id=${fileId}`);
                    const fileData = await fileResponse.json();
                    pdfUrl = `https://api.telegram.org/file/bot${TELEGRAM.botToken}/${fileData.result.file_path}`;
                }
            }
            
            // تحميل وتحليل PDF
            const loadingTask = pdfjsLib.getDocument(pdfUrl);
            const pdf = await loadingTask.promise;
            let fullText = '';
            
            for (let i = 1; i <= Math.min(pdf.numPages, 3); i++) {
                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();
                const pageText = textContent.items.map(item => item.str).join(' ');
                fullText += pageText + '\n';
            }
            
            // عرض النص المستخرج
            document.getElementById('resultCard').style.display = 'block';
            document.getElementById('result').innerHTML = `
                <div style="background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; margin-top: 10px; max-height: 300px; overflow-y: auto;">
                    <strong>📄 النص المستخرج:</strong><br>
                    <pre style="white-space: pre-wrap; font-size: 12px;">${fullText.substring(0, 1000)}</pre>
                    ${fullText.length > 1000 ? '<p>... (تم اختصار النص)</p>' : ''}
                </div>
                <p style="margin-top: 10px;">📊 عدد الصفحات: ${pdf.numPages}</p>
            `;
            
            showNotification(`✅ تم استخراج النص من ${pdf.numPages} صفحات`, 'success');
            
        } catch (error) {
            showNotification('❌ فشل تحليل PDF: ' + error.message, 'error');
        }
    }
</script>
</body>
</html>
