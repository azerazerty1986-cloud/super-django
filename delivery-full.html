<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ناردو برو - نظام التوصيل</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-glass: rgba(255,255,255,0.05);
            --gold: #ffd700;
            --gold-dark: #ccb000;
            --text: #ffffff;
            --text-secondary: #aaaaaa;
            --success: #4ade80;
            --error: #f87171;
            --warning: #fbbf24;
            --info: #60a5fa;
        }
        body {
            font-family: 'Cairo', 'Tahoma', sans-serif;
            background: linear-gradient(135deg, var(--bg-primary), var(--bg-secondary));
            color: var(--text);
            min-height: 100vh;
        }
        .navbar {
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--gold);
            position: sticky;
            top: 0;
            z-index: 1000;
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo { font-size: 28px; font-weight: bold; color: var(--gold); }
        .logo i { margin-left: 10px; }
        .nav-links { display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }
        .nav-btn {
            background: var(--bg-glass);
            border: 1px solid var(--gold);
            padding: 8px 20px;
            border-radius: 30px;
            color: var(--gold);
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }
        .nav-btn:hover { background: var(--gold); color: #000; transform: translateY(-2px); }
        .cart-btn { position: relative; background: var(--gold); color: #000; }
        .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--error);
            color: white;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        
        /* المنتجات - عرض بسيط */
        .products-section {
            padding: 40px 20px;
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
        }
        .product-card {
            background: var(--bg-glass);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,215,0,0.3);
        }
        .product-name { font-size: 24px; margin-bottom: 10px; }
        .product-price { color: var(--gold); font-size: 28px; font-weight: bold; margin: 15px 0; }
        .add-to-cart {
            background: var(--gold);
            color: #000;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }
        
        /* السلة */
        .cart-sidebar {
            position: fixed;
            top: 0;
            left: -450px;
            width: 450px;
            height: 100%;
            background: var(--bg-secondary);
            box-shadow: -5px 0 30px rgba(0,0,0,0.5);
            z-index: 10000;
            transition: left 0.3s ease;
            display: flex;
            flex-direction: column;
            border-right: 2px solid var(--gold);
        }
        .cart-sidebar.open { left: 0; }
        .cart-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255,215,0,0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .cart-items { flex: 1; overflow-y: auto; padding: 15px; }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 10px;
        }
        .cart-item-info { flex: 1; }
        .cart-item-name { font-weight: bold; font-size: 16px; }
        .cart-item-price { color: var(--gold); font-weight: bold; }
        .cart-item-quantity {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 5px;
        }
        .quantity-btn {
            background: var(--bg-glass);
            border: 1px solid var(--gold);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            color: var(--gold);
        }
        .cart-footer {
            padding: 20px;
            border-top: 1px solid rgba(255,215,0,0.3);
        }
        .cart-total { font-size: 20px; margin-bottom: 15px; text-align: center; }
        .checkout-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: #000;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }
        
        /* نافذة التوصيل */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            z-index: 20000;
            display: none;
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: linear-gradient(135deg, var(--bg-secondary), var(--bg-primary));
            border-radius: 30px;
            padding: 30px;
            max-width: 550px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            border: 2px solid var(--gold);
            animation: slideUp 0.3s ease;
        }
        .modal-content h2 { color: var(--gold); text-align: center; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--text); }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            background: var(--bg-glass);
            color: var(--text);
            border: 1px solid var(--gold);
            outline: none;
        }
        .delivery-summary {
            background: rgba(255,215,0,0.15);
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
        }
        .time-options {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .time-options label {
            flex: 1;
            text-align: center;
            padding: 8px;
            background: var(--bg-glass);
            border-radius: 10px;
            cursor: pointer;
        }
        .modal-buttons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        .btn-cancel {
            flex: 1;
            padding: 12px;
            background: var(--error);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-confirm {
            flex: 1;
            padding: 12px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: #000;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }
        
        /* إشعارات */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .toast {
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: bold;
            animation: slideIn 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .toast.success { background: var(--success); color: #000; }
        .toast.error { background: var(--error); color: #fff; }
        .toast.warning { background: var(--warning); color: #000; }
        .toast.info { background: var(--info); color: #fff; }
        
        @keyframes slideIn {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        @media (max-width: 768px) {
            .navbar { flex-direction: column; text-align: center; }
            .cart-sidebar { width: 100%; left: -100%; }
        }
        
        .scroll-top {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--gold);
            color: #000;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 1000;
        }
        .scroll-top.show { opacity: 1; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo"><i class="fas fa-crown"></i> ناردو برو</div>
        <div class="nav-links">
            <div class="nav-btn cart-btn" onclick="toggleCart()">
                <i class="fas fa-shopping-cart"></i> السلة
                <span class="cart-count" id="cartCounter">0</span>
            </div>
        </div>
    </nav>

    <!-- منتج تجريبي واحد فقط -->
    <div class="products-section">
        <div class="product-card">
            <div class="product-name">🛍️ منتج تجريبي</div>
            <div class="product-price">1000 دج</div>
            <button class="add-to-cart" onclick="addToCart()">
                <i class="fas fa-shopping-cart"></i> أضف للسلة
            </button>
        </div>
        <p style="text-align: center; margin-top: 20px; color: var(--text-secondary);">
            <i class="fas fa-info-circle"></i> يمكنك إضافة المنتج إلى السلة ثم إتمام الطلب
        </p>
    </div>

    <!-- السلة -->
    <div id="cartSidebar" class="cart-sidebar">
        <div class="cart-header">
            <h3><i class="fas fa-shopping-cart"></i> سلة التسوق</h3>
            <button class="nav-btn" onclick="toggleCart()" style="padding: 5px 15px;">✕</button>
        </div>
        <div id="cartItemsList" class="cart-items"><p style="text-align: center; color: #aaa;">السلة فارغة</p></div>
        <div class="cart-footer">
            <div class="cart-total">الإجمالي: <span id="cartTotal">0</span> دج</div>
            <button class="checkout-btn" id="checkoutBtn"><i class="fas fa-truck"></i> إتمام الطلب مع التوصيل</button>
        </div>
    </div>

    <!-- نافذة التوصيل -->
    <div id="deliveryModal" class="modal">
        <div class="modal-content">
            <h2><i class="fas fa-truck"></i> توثيق الطلب مع التوصيل</h2>
            
            <div class="form-group">
                <label><i class="fas fa-user"></i> الاسم الكامل *</label>
                <input type="text" id="deliveryName" placeholder="أدخل اسمك الكامل">
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-phone"></i> رقم الهاتف *</label>
                <input type="tel" id="deliveryPhone" placeholder="05xxxxxxxx">
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-building"></i> الموزع / شركة التوصيل *</label>
                <select id="deliveryCompany">
                    <option value="0|ناردو إكسبرس|🚀|سريع (1-2 يوم)">🚀 ناردو إكسبرس - 0 دج (سريع)</option>
                    <option value="-100|براقي برو|📮|عادي (2-4 يوم)">📮 براقي برو - -100 دج (عادي)</option>
                    <option value="300|دليفري سريع|⚡|فائق السرعة (24 ساعة)">⚡ دليفري سريع - +300 دج (24 ساعة)</option>
                    <option value="-200|الجزائر بوست|📬|اقتصادي (3-5 يوم)">📬 الجزائر بوست - -200 دج (اقتصادي)</option>
                </select>
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-location-dot"></i> العنوان التفصيلي *</label>
                <textarea id="deliveryAddress" rows="3" placeholder="الشارع، رقم البناء، الطابق، معلم قريب..."></textarea>
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-clock"></i> وقت التوصيل المفضل</label>
                <div class="time-options">
                    <label><input type="radio" name="deliveryTime" value="أقرب وقت" checked> أقرب وقت</label>
                    <label><input type="radio" name="deliveryTime" value="الصباح (8ص-12م)"> الصباح</label>
                    <label><input type="radio" name="deliveryTime" value="بعد الظهر (12م-4م)"> بعد الظهر</label>
                    <label><input type="radio" name="deliveryTime" value="المساء (4م-8م)"> المساء</label>
                </div>
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-sticky-note"></i> ملاحظات إضافية</label>
                <textarea id="deliveryNotes" rows="2" placeholder="تعليمات التوصيل..."></textarea>
            </div>
            
            <div id="deliverySummary" class="delivery-summary">
                <div style="text-align: center;">جاري حساب الملخص...</div>
            </div>
            
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeDeliveryModal()"><i class="fas fa-times"></i> إلغاء</button>
                <button class="btn-confirm" id="confirmOrderBtn"><i class="fas fa-check-circle"></i> توثيق الطلب</button>
            </div>
        </div>
    </div>

    <div class="scroll-top" id="scrollTop" onclick="scrollToTop()"><i class="fas fa-arrow-up"></i></div>
    <div id="toastContainer" class="toast-container"></div>

    <script>
        // ============================================================
        // إعدادات تلغرام
        // ============================================================
        const TELEGRAM = {
            botToken: '8576673096:AAHj80CdifTJNlOs6JgouHmjEXl0bM-8Shw',
            channelId: '-1003822964890'
        };

        // ============================================================
        // بيانات المنتج (منتج واحد فقط)
        // ============================================================
        const product = { id: 1, name: 'منتج تجريبي', price: 1000, icon: '🛍️', stock: 100 };
        
        let cart = [];
        let currentUser = { name: 'أحمد محمد', phone: '0555123456' }; // مستخدم افتراضي

        // ============================================================
        // دوال عامة
        // ============================================================
        function showNotification(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // ============================================================
        // دوال السلة
        // ============================================================
        function loadCart() {
            const saved = localStorage.getItem('nardoo_cart');
            cart = saved ? JSON.parse(saved) : [];
            updateCartCounter();
        }

        function saveCart() {
            localStorage.setItem('nardoo_cart', JSON.stringify(cart));
        }

        function updateCartCounter() {
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            const counter = document.getElementById('cartCounter');
            if (counter) counter.textContent = count;
            updateCartDisplay();
        }

        function updateCartDisplay() {
            const itemsDiv = document.getElementById('cartItemsList');
            const totalSpan = document.getElementById('cartTotal');
            if (!itemsDiv) return;
            if (cart.length === 0) {
                itemsDiv.innerHTML = '<p style="text-align: center; color: #aaa;">السلة فارغة</p>';
                if (totalSpan) totalSpan.textContent = '0';
                return;
            }
            let total = 0;
            itemsDiv.innerHTML = cart.map(item => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                return `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <div class="cart-item-name">${item.icon} ${item.name}</div>
                            <div class="cart-item-price">${item.price.toLocaleString()} دج</div>
                            <div class="cart-item-quantity">
                                <button class="quantity-btn" onclick="updateQuantity(${item.id}, ${item.quantity - 1})">-</button>
                                <span>${item.quantity}</span>
                                <button class="quantity-btn" onclick="updateQuantity(${item.id}, ${item.quantity + 1})">+</button>
                                <button class="quantity-btn" onclick="removeFromCart(${item.id})" style="background: #f87171;">🗑</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            if (totalSpan) totalSpan.textContent = total.toLocaleString();
        }

        function addToCart() {
            const existing = cart.find(item => item.id === product.id);
            if (existing) {
                if (existing.quantity < product.stock) existing.quantity++;
                else { showNotification('الكمية غير متوفرة', 'warning'); return; }
            } else {
                cart.push({
                    id: product.id, name: product.name, price: product.price,
                    quantity: 1, icon: product.icon
                });
            }
            saveCart();
            updateCartCounter();
            showNotification(`✅ تم إضافة ${product.name} إلى السلة`, 'success');
        }

        function updateQuantity(productId, newQuantity) {
            const item = cart.find(i => i.id === productId);
            if (newQuantity <= 0) { removeFromCart(productId); return; }
            if (newQuantity > product.stock) { showNotification('الكمية غير متوفرة', 'warning'); return; }
            item.quantity = newQuantity;
            saveCart();
            updateCartCounter();
        }

        function removeFromCart(productId) {
            cart = cart.filter(i => i.id !== productId);
            saveCart();
            updateCartCounter();
            showNotification('تم إزالة المنتج', 'info');
        }

        function toggleCart() {
            document.getElementById('cartSidebar').classList.toggle('open');
        }

        // ============================================================
        // نظام التوصيل والتوثيق
        // ============================================================
        function calculateOrderTotal(cartItems, companyPrice) {
            const subtotal = cartItems.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const shipping = companyPrice;
            return { subtotal, shipping, total: subtotal + shipping };
        }

        async function sendTelegramMessage(message, hashtag) {
            const fullMessage = `${hashtag}\n\n${message}`;
            try {
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/sendMessage`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: TELEGRAM.channelId, text: fullMessage, parse_mode: 'HTML' })
                });
                const result = await response.json();
                console.log(`📨 إرسال ${hashtag}:`, result.ok ? '✅ نجاح' : '❌ فشل');
                return result.ok;
            } catch(e) { console.error('خطأ:', e); return false; }
        }

        async function sendOrderToTelegram(orderData) {
            const { orderId, orderDate, customerName, customerPhone, customerAddress, companyName, companyIcon, companyPrice, deliveryTime, notes, cartItems, subtotal, shipping, total } = orderData;
            
            // 1️⃣ رسالة للمدير
            let productsText = '';
            for (const item of cartItems) {
                productsText += `  • ${item.icon} ${item.name} (${item.quantity}) × ${item.price.toLocaleString()} = ${(item.price * item.quantity).toLocaleString()} دج\n`;
            }
            let adminMsg = `👑 <b>#تقرير_مدير</b>\n━━━━━━━━━━━━━━━━━━━━━━\n📋 <b>رقم الطلب:</b> <code>${orderId}</code>\n🕐 <b>التاريخ:</b> ${orderDate}\n\n👤 <b>العميل:</b> ${customerName}\n📞 <b>الهاتف:</b> ${customerPhone}\n📍 <b>العنوان:</b> ${customerAddress}\n\n📦 <b>المنتجات:</b>\n${productsText}\n━━━━━━━━━━━━━━━━━━━━━━\n${companyIcon} <b>شركة التوصيل:</b> ${companyName}\n💰 <b>رسوم التوصيل:</b> ${companyPrice >= 0 ? '+' : ''}${companyPrice.toLocaleString()} دج\n⏰ <b>وقت التوصيل:</b> ${deliveryTime}\n📝 <b>ملاحظات:</b> ${notes || 'لا توجد'}\n━━━━━━━━━━━━━━━━━━━━━━\n💎 <b>الإجمالي النهائي:</b> ${total.toLocaleString()} دج`;
            await sendTelegramMessage(adminMsg, '#تقرير_مدير');
            
            // 2️⃣ رسالة لشركة التوصيل
            let deliveryMsg = `🚚 <b>#تقرير_توصيل_${companyName.replace(/ /g, '_')}</b>\n━━━━━━━━━━━━━━━━━━━━━━\n📋 <b>رقم الطلب:</b> <code>${orderId}</code>\n👤 <b>العميل:</b> ${customerName}\n📞 <b>الهاتف:</b> ${customerPhone}\n📍 <b>العنوان الكامل:</b> ${customerAddress}\n⏰ <b>وقت التوصيل:</b> ${deliveryTime}\n📦 <b>عدد الطرود:</b> ${cartItems.length}\n📝 <b>ملاحظات:</b> ${notes || 'لا توجد'}\n━━━━━━━━━━━━━━━━━━━━━━\n✅ يرجى التوصيل في الموعد المحدد`;
            await sendTelegramMessage(deliveryMsg, `#تقرير_توصيل_${companyName.replace(/ /g, '_')}`);
            
            // 3️⃣ رسالة للمشتري
            let customerProducts = '';
            for (const item of cartItems) {
                customerProducts += `  • ${item.icon} ${item.name} (${item.quantity}) × ${item.price.toLocaleString()} = ${(item.price * item.quantity).toLocaleString()} دج\n`;
            }
            let customerMsg = `🛒 <b>#تأكيد_مشتري_${customerName.replace(/ /g, '_')}</b>\n━━━━━━━━━━━━━━━━━━━━━━\n✨ <b>تم توثيق طلبك بنجاح!</b>\n\n📋 <b>رقم الطلب:</b> <code>${orderId}</code>\n📅 <b>التاريخ:</b> ${orderDate}\n\n📦 <b>منتجاتك:</b>\n${customerProducts}\n━━━━━━━━━━━━━━━━━━━━━━\n${companyIcon} <b>شركة التوصيل:</b> ${companyName}\n💰 <b>الإجمالي:</b> ${total.toLocaleString()} دج\n⏰ <b>التوصيل المتوقع:</b> ${companyValue[3]}\n📍 <b>العنوان:</b> ${customerAddress}\n━━━━━━━━━━━━━━━━━━━━━━\n✨ شكراً لتسوقك من <b>ناردو برو</b> ✨`;
            await sendTelegramMessage(customerMsg, `#تأكيد_مشتري_${customerName.replace(/ /g, '_')}`);
            
            return true;
        }

        function showDeliveryCheckout() {
            if (cart.length === 0) { showNotification('🛒 السلة فارغة! أضف منتجاً أولاً', 'warning'); return; }
            document.getElementById('deliveryName').value = currentUser.name || '';
            document.getElementById('deliveryPhone').value = currentUser.phone || '';
            document.getElementById('deliveryModal').classList.add('active');
            updateDeliverySummary();
            document.getElementById('deliveryCompany').onchange = updateDeliverySummary;
        }

        function updateDeliverySummary() {
            const company = document.getElementById('deliveryCompany').value.split('|');
            const companyPrice = parseInt(company[0]);
            const companyName = company[1];
            const companyIcon = company[2];
            const { subtotal, shipping, total } = calculateOrderTotal(cart, companyPrice);
            document.getElementById('deliverySummary').innerHTML = `
                <h4 style="color: var(--gold); text-align:center;">📊 توثيق الطلب</h4>
                <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                    <span>🛍️ إجمالي المنتجات:</span><span><strong>${subtotal.toLocaleString()} دج</strong></span>
                </div>
                <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                    <span>${companyIcon} رسوم ${companyName}:</span><span><strong>${companyPrice >= 0 ? '+' : ''}${companyPrice.toLocaleString()} دج</strong></span>
                </div>
                <div style="display:flex; justify-content:space-between; padding-top:12px; border-top:2px solid var(--gold);">
                    <span style="font-size:18px;">💎 الإجمالي الموثق:</span>
                    <span style="font-size:22px; color:var(--gold); font-weight:bold;">${total.toLocaleString()} دج</span>
                </div>
            `;
        }

        function closeDeliveryModal() {
            document.getElementById('deliveryModal').classList.remove('active');
        }

        async function confirmOrder() {
            const customerName = document.getElementById('deliveryName').value;
            const customerPhone = document.getElementById('deliveryPhone').value;
            const customerAddress = document.getElementById('deliveryAddress').value;
            const deliveryTime = document.querySelector('input[name="deliveryTime"]:checked')?.value || 'أقرب وقت';
            const notes = document.getElementById('deliveryNotes').value;
            
            if (!customerName || !customerPhone || !customerAddress) {
                showNotification('يرجى ملء جميع الحقول المطلوبة', 'error');
                return;
            }
            
            const company = document.getElementById('deliveryCompany').value.split('|');
            const companyPrice = parseInt(company[0]), companyName = company[1], companyIcon = company[2], companySpeed = company[3];
            const { subtotal, shipping, total } = calculateOrderTotal(cart, companyPrice);
            const orderId = `ORD-${Date.now()}-${Math.floor(Math.random() * 10000)}`;
            const orderDate = new Date().toLocaleString('ar-EG');
            
            const orderData = { 
                orderId, orderDate, customerName, customerPhone, customerAddress, 
                companyName, companyIcon, companyPrice, companySpeed,
                deliveryTime, notes, cartItems: [...cart], subtotal, shipping, total 
            };
            
            showNotification('📤 جاري توثيق الطلب وإرساله...', 'info');
            await sendOrderToTelegram(orderData);
            
            // حفظ الطلب
            const deliveries = JSON.parse(localStorage.getItem('nardoo_deliveries') || '[]');
            deliveries.unshift({ 
                id: `DEL-${Date.now()}`, orderId, customerName, customerPhone, 
                customerAddress, company: companyName, total, status: 'pending', 
                createdAt: new Date().toISOString() 
            });
            localStorage.setItem('nardoo_deliveries', JSON.stringify(deliveries.slice(0, 100)));
            
            // تفريغ السلة
            cart = [];
            saveCart();
            updateCartCounter();
            closeDeliveryModal();
            
            showNotification(`✅ تم توثيق الطلب بنجاح! رقم: ${orderId}`, 'success');
            
            // نافذة نجاح
            alert(`🎉 تم توثيق طلبك بنجاح!\n\n📋 رقم الطلب: ${orderId}\n💎 الإجمالي: ${total.toLocaleString()} دج\n\n📨 تم إرسال التفاصيل إلى:\n• المدير\n• شركة التوصيل (${companyName})\n• بريدك الإلكتروني\n\n✅ سيتم التواصل معك قريباً`);
        }

        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        window.onscroll = function() {
            const btn = document.getElementById('scrollTop');
            if (btn) btn.classList.toggle('show', window.scrollY > 300);
        };

        document.getElementById('checkoutBtn').onclick = showDeliveryCheckout;
        document.getElementById('confirmOrderBtn').onclick = confirmOrder;
        
        loadCart();
        console.log('✅ نظام التوصيل جاهز - مع قائمة منسدلة للموزعين');
    </script>
</body>
</html>
