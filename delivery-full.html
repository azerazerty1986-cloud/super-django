<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ناردو برو | إدارة التوصيل والموزعين</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --gold: #ffd700;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --glass: rgba(255, 255, 255, 0.05);
            --success: #4ade80;
            --error: #f87171;
            --warning: #fbbf24;
            --info: #60a5fa;
        }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0f3460, #16213e);
            color: var(--text-primary);
            min-height: 100vh;
            direction: rtl;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        .delivery-header {
            background: var(--glass);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }
        .header-title { display: flex; align-items: center; gap: 15px; }
        .header-title i { font-size: 40px; color: var(--gold); }
        .header-title h1 { font-size: 32px; color: var(--gold); margin: 0; }
        .header-actions { display: flex; gap: 15px; flex-wrap: wrap; }
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Cairo', sans-serif;
        }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-gold:hover { background: #ffed4e; transform: translateY(-2px); }
        .btn-outline { background: transparent; border: 2px solid var(--gold); color: var(--gold); }
        .btn-outline:hover { background: rgba(255, 215, 0, 0.1); }
        .btn-telegram { background: #0088cc; color: white; border: none; }
        .btn-telegram:hover { background: #006699; transform: translateY(-2px); }
        .tabs-container {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid rgba(255, 215, 0, 0.2);
            overflow-x: auto;
            padding-bottom: 10px;
        }
        .tab-btn {
            padding: 12px 20px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
            font-family: 'Cairo', sans-serif;
            white-space: nowrap;
        }
        .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
        .tab-btn:hover { color: var(--gold); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card {
            background: var(--glass);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            transition: all 0.3s;
        }
        .card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .card-title { font-size: 18px; font-weight: bold; color: var(--gold); }
        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        .status-pending { background: rgba(251, 191, 36, 0.2); color: var(--warning); }
        .status-approved { background: rgba(74, 222, 128, 0.2); color: var(--success); }
        .status-rejected { background: rgba(248, 113, 113, 0.2); color: var(--error); }
        .status-in_transit { background: rgba(96, 165, 250, 0.2); color: var(--info); }
        .status-completed { background: rgba(74, 222, 128, 0.2); color: var(--success); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--text-primary); }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.3);
            color: var(--text-primary);
            font-family: 'Cairo', sans-serif;
            font-size: 14px;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--gold);
            background: rgba(255, 215, 0, 0.05);
        }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        select[multiple] { padding: 12px; min-height: 200px; }
        select[multiple] option { padding: 8px 12px; border-bottom: 1px solid rgba(255, 215, 0, 0.1); cursor: pointer; }
        select[multiple] option:checked { background: var(--gold) linear-gradient(0deg, var(--gold), var(--gold)); color: #000; }
        .selected-states { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 8px; }
        .selected-state-tag {
            background: rgba(255, 215, 0, 0.2);
            border: 1px solid var(--gold);
            border-radius: 20px;
            padding: 5px 12px;
            font-size: 12px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .selected-state-tag i { cursor: pointer; font-size: 10px; color: var(--error); }
        .distributors-table-container { overflow-x: auto; margin-top: 20px; }
        .distributors-table { width: 100%; border-collapse: collapse; background: var(--glass); border-radius: 15px; overflow: hidden; }
        .distributors-table th { background: rgba(255, 215, 0, 0.1); color: var(--gold); padding: 15px; text-align: right; font-weight: bold; border-bottom: 2px solid var(--gold); }
        .distributors-table td { padding: 15px; border-bottom: 1px solid rgba(255, 215, 0, 0.1); vertical-align: top; }
        .distributors-table tr:hover { background: rgba(255, 215, 0, 0.05); }
        .state-code { display: inline-block; background: rgba(255, 215, 0, 0.2); border: 1px solid var(--gold); border-radius: 5px; padding: 3px 8px; margin: 3px; font-size: 11px; font-family: monospace; font-weight: bold; }
        .state-name { display: inline-block; background: rgba(96, 165, 250, 0.2); border-radius: 5px; padding: 3px 8px; margin: 3px; font-size: 11px; }
        .badge-all-states { background: linear-gradient(135deg, var(--success), var(--info)); color: #000; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; display: inline-block; }
        .search-box { margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
        .search-box input { flex: 1; padding: 12px; border: 1px solid rgba(255, 215, 0, 0.2); border-radius: 10px; background: rgba(0, 0, 0, 0.3); color: var(--text-primary); }
        .filter-buttons { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .filter-btn { padding: 8px 15px; background: var(--glass); border: 1px solid rgba(255, 215, 0, 0.3); border-radius: 20px; cursor: pointer; transition: all 0.3s; color: var(--text-secondary); }
        .filter-btn.active { background: var(--gold); color: #000; border-color: var(--gold); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--glass); border: 2px solid rgba(255, 215, 0, 0.2); border-radius: 15px; padding: 25px; text-align: center; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: var(--primary); border: 2px solid var(--gold); border-radius: 20px; padding: 30px; max-width: 600px; width: 90%; max-height: 90vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid rgba(255, 215, 0, 0.2); }
        .modal-header h2 { color: var(--gold); margin: 0; }
        .close-btn { background: none; border: none; color: var(--gold); font-size: 28px; cursor: pointer; transition: all 0.3s; }
        .notification { position: fixed; top: 20px; right: 20px; padding: 15px 25px; border-radius: 10px; font-weight: bold; z-index: 2000; animation: slideIn 0.3s ease; }
        .notification.success { background: var(--success); color: #000; }
        .notification.error { background: var(--error); color: #fff; }
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
        .footer { text-align: center; padding: 30px; color: var(--text-secondary); border-top: 1px solid rgba(255, 215, 0, 0.2); margin-top: 50px; }
        .info-note { background: rgba(96, 165, 250, 0.1); border-right: 3px solid var(--info); padding: 10px; margin-top: 10px; border-radius: 8px; font-size: 12px; color: var(--info); }
        @keyframes slideIn { from { transform: translateX(400px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @media (max-width: 768px) { .form-row { grid-template-columns: 1fr; } .delivery-header { flex-direction: column; text-align: center; } .stats-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="container">
    <!-- HEADER -->
    <div class="delivery-header">
        <div class="header-title"><i class="fas fa-truck"></i><h1>إدارة التوصيل والموزعين</h1></div>
        <div class="header-actions">
            <button class="btn btn-gold" onclick="openDeliveryModal()"><i class="fas fa-plus"></i> طلب توصيل</button>
            <button class="btn btn-outline" onclick="openDistributorModal()"><i class="fas fa-warehouse"></i> تسجيل موزع</button>
            <button class="btn btn-telegram" onclick="sendDistributorsTableToTelegram()"><i class="fab fa-telegram"></i> إرسال جدول الموزعين</button>
            <button class="btn btn-outline" onclick="goBack()"><i class="fas fa-arrow-left"></i> رجوع</button>
        </div>
    </div>
    <!-- STATS -->
    <div class="stats-grid" id="statsGrid"></div>
    <!-- TABS -->
    <div class="tabs-container">
        <button class="tab-btn active" onclick="switchTab('overview')"><i class="fas fa-chart-line"></i> نظرة عامة</button>
        <button class="tab-btn" onclick="switchTab('deliveries')"><i class="fas fa-boxes"></i> الطلبات</button>
        <button class="tab-btn" onclick="switchTab('distributors')"><i class="fas fa-warehouse"></i> الموزعون</button>
        <button class="tab-btn" onclick="switchTab('distributorsTable')"><i class="fas fa-table-list"></i> جدول الموزعين والولايات</button>
        <button class="tab-btn" onclick="switchTab('pending')"><i class="fas fa-hourglass"></i> قيد الانتظار</button>
        <button class="tab-btn" onclick="switchTab('tracking')"><i class="fas fa-map-location-dot"></i> التتبع</button>
    </div>
    <!-- CONTENT TABS -->
    <div id="overview" class="tab-content active"><div class="card"><h2 style="color: var(--gold); margin-bottom: 20px;">📊 ملخص النظام</h2><div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;"><div style="background: rgba(255, 215, 0, 0.1); padding: 15px; border-radius: 10px;"><div style="font-size: 28px; color: var(--gold); font-weight: bold;" id="totalDeliveries">0</div><div>إجمالي الطلبات</div></div><div style="background: rgba(74, 222, 128, 0.1); padding: 15px; border-radius: 10px;"><div style="font-size: 28px; color: var(--success); font-weight: bold;" id="completedDeliveries">0</div><div>مكتملة</div></div><div style="background: rgba(251, 191, 36, 0.1); padding: 15px; border-radius: 10px;"><div style="font-size: 28px; color: var(--warning); font-weight: bold;" id="pendingDeliveries">0</div><div>قيد التوصيل</div></div><div style="background: rgba(96, 165, 250, 0.1); padding: 15px; border-radius: 10px;"><div style="font-size: 28px; color: var(--info); font-weight: bold;" id="totalDistributors">0</div><div>موزعون معتمدون</div></div></div></div></div>
    <div id="deliveries" class="tab-content"><div id="deliveriesContainer"></div></div>
    <div id="distributors" class="tab-content"><div id="distributorsContainer"></div></div>
    <div id="distributorsTable" class="tab-content"><div class="card"><h2 style="color: var(--gold); margin-bottom: 20px;">🗺️ جدول الموزعين والولايات</h2><div class="search-box"><input type="text" id="searchDistributor" placeholder="🔍 بحث..." onkeyup="filterDistributorsTable()"><button class="btn btn-gold" onclick="exportDistributorsTable()"><i class="fas fa-download"></i> تصدير Excel</button><button class="btn btn-telegram" onclick="sendDistributorsTableToTelegram()"><i class="fab fa-telegram"></i> إرسال للقناة</button></div><div class="filter-buttons"><button class="filter-btn active" data-type="all" onclick="filterByType('all')">الكل</button><button class="filter-btn" data-type="delivery" onclick="filterByType('delivery')">🚚 شركات التوصيل</button><button class="filter-btn" data-type="distributor" onclick="filterByType('distributor')">📦 موزعون</button><button class="filter-btn" data-type="both" onclick="filterByType('both')">🔄 كليهما</button></div><div class="distributors-table-container"><table class="distributors-table"><thead><tr><th>#</th><th>الموزع</th><th>المسؤول</th><th>الهاتف</th><th>النوع</th><th>الولايات (الرمز)</th><th>الولايات (الاسم)</th><th>العدد</th></tr></thead><tbody id="distributorsTableBody"></tbody></table></div></div></div>
    <div id="pending" class="tab-content"><div id="pendingContainer"></div></div>
    <div id="tracking" class="tab-content"><div class="card"><h2 style="color: var(--gold); margin-bottom: 20px;">🗺️ تتبع الطلبات</h2><div class="form-group"><label>رقم الطلب</label><div style="display: flex; gap: 10px;"><input type="text" id="trackingInput" placeholder="مثال: ORD-001" style="flex:1;"><button class="btn btn-gold" onclick="trackDelivery()">بحث</button></div></div><div id="trackingResult"></div></div></div>
</div>
<!-- MODALS -->
<div id="deliveryModal" class="modal"><div class="modal-content"><div class="modal-header"><h2><i class="fas fa-plus-circle"></i> طلب توصيل جديد</h2><button class="close-btn" onclick="closeDeliveryModal()">&times;</button></div><form onsubmit="event.preventDefault(); submitDelivery();"><div class="form-group"><label>رقم الطلب</label><input type="text" id="deliveryOrderId" required></div><div class="form-group"><label>اسم الزبون</label><input type="text" id="deliveryCustomer" required></div><div class="form-group"><label>العنوان</label><textarea id="deliveryAddress" required rows="2"></textarea></div><div class="form-group"><label>الهاتف</label><input type="tel" id="deliveryPhone" required></div><div class="form-group"><label>الموزع</label><select id="deliveryDistributor" required><option value="">اختر موزع</option></select></div><div class="form-group"><label>القيمة (دج)</label><input type="number" id="deliveryAmount" required></div><div class="form-group"><label>ملاحظات</label><textarea id="deliveryNotes" rows="2"></textarea></div><button type="submit" class="btn btn-gold" style="width:100%">إنشاء الطلب</button></form></div></div>
<div id="distributorModal" class="modal"><div class="modal-content"><div class="modal-header"><h2><i class="fas fa-warehouse"></i> تسجيل موزع جديد</h2><button class="close-btn" onclick="closeDistributorModal()">&times;</button></div><form onsubmit="event.preventDefault(); submitDistributor();"><div class="form-group"><label>اسم الشركة</label><input type="text" id="companyName" required></div><div class="form-group"><label>المسؤول</label><input type="text" id="managerName" required></div><div class="form-group"><label>البريد الإلكتروني</label><input type="email" id="distributorEmail" required></div><div class="form-group"><label>الهاتف</label><input type="tel" id="distributorPhone" required></div><div class="form-group"><label>نوع الخدمة</label><select id="serviceType" required onchange="handleServiceTypeChange()"><option value="">اختر</option><option value="delivery">شركة توصيل (تغطية كل الولايات)</option><option value="distributor">موزع معتمد</option><option value="both">كليهما</option></select></div><div class="form-group" id="coverageAreaGroup"><label>مناطق التغطية</label><select id="coverageArea" multiple size="8"></select><div id="selectedStatesContainer" class="selected-states"></div><div id="coverageNote" class="info-note"></div></div><div class="form-group"><label>وصف الخدمة</label><textarea id="serviceDescription" required rows="2"></textarea></div><button type="submit" class="btn btn-gold" style="width:100%">إرسال الطلب</button></form></div></div>
<div class="footer"><p>© 2026 ناردو برو - نظام متكامل لإدارة التوصيل والموزعين</p></div>

<script>
    // ============================================================
    // القسم 1: الثوابت والمتغيرات العامة
    // ============================================================
    const TELEGRAM = { botToken: '8576673096:AAGvSMjzwVWj6wJ47JdqiDwcObXjBDcyiLA', channelId: '-1003822964890', apiUrl: 'https://api.telegram.org/bot' };
    const STORAGE_KEYS = { DELIVERIES: 'nardoo_deliveries', DISTRIBUTORS: 'nardoo_distributors', USERS: 'nardoo_users', CURRENT_USER: 'current_user' };
    let deliveries = JSON.parse(localStorage.getItem(STORAGE_KEYS.DELIVERIES) || '[]');
    let distributors = JSON.parse(localStorage.getItem(STORAGE_KEYS.DISTRIBUTORS) || '[]');
    let users = JSON.parse(localStorage.getItem(STORAGE_KEYS.USERS) || '[]');
    let currentUser = JSON.parse(localStorage.getItem(STORAGE_KEYS.CURRENT_USER) || '{"role":"admin","name":"مدير النظام"}');
    let currentFilter = 'all';
    let currentSearch = '';
    
    const algerianStates = [
        { code: "ALG", name: "الجزائر" }, { code: "ADE", name: "أدرار" }, { code: "ASH", name: "الشلف" }, { code: "LGH", name: "الأغواط" },
        { code: "OEB", name: "أم البواقي" }, { code: "BAT", name: "باتنة" }, { code: "BJA", name: "بجاية" }, { code: "BSK", name: "بسكرة" },
        { code: "BSH", name: "بشار" }, { code: "BLA", name: "البليدة" }, { code: "BUI", name: "بويرة" }, { code: "TAM", name: "تمنراست" },
        { code: "TEB", name: "تبسة" }, { code: "TLE", name: "تلمسان" }, { code: "TIA", name: "تيارت" }, { code: "TIZ", name: "تيزي وزو" },
        { code: "DJF", name: "الجلفة" }, { code: "JIJ", name: "جيجل" }, { code: "SET", name: "سطيف" }, { code: "SAI", name: "سعيدة" },
        { code: "SKI", name: "سكيكدة" }, { code: "SBI", name: "سيدي بلعباس" }, { code: "ANA", name: "عنابة" }, { code: "GUE", name: "قالمة" },
        { code: "CON", name: "قسنطينة" }, { code: "MED", name: "المدية" }, { code: "MIL", name: "ميلة" }, { code: "MOS", name: "معسكر" },
        { code: "MSC", name: "المسيلة" }, { code: "MGH", name: "مستغانم" }, { code: "NAA", name: "النعامة" }, { code: "ORA", name: "وهران" },
        { code: "OUA", name: "الوادي" }, { code: "BBA", name: "برج بوعريريج" }, { code: "BMD", name: "بومرداس" }, { code: "TAR", name: "الطارف" },
        { code: "TIN", name: "تندوف" }, { code: "TSS", name: "تيسمسيلت" }, { code: "KHE", name: "خنشلة" }, { code: "SOU", name: "سوق أهراس" },
        { code: "TIP", name: "تيبازة" }, { code: "AYD", name: "عين الدفلى" }, { code: "AIN", name: "عين تموشنت" }, { code: "GHA", name: "غرداية" }, { code: "REL", name: "غليزان" }
    ];

    // ============================================================
    // القسم 2: دوال مساعدة
    // ============================================================
    function showNotification(msg, type = 'info') { 
        const n = document.createElement('div'); 
        n.className = `notification ${type}`; 
        n.textContent = msg; 
        document.body.appendChild(n); 
        setTimeout(() => n.remove(), 3000); 
    }
    
    function updateStats() {
        document.getElementById('totalDeliveries').innerText = deliveries.length;
        document.getElementById('completedDeliveries').innerText = deliveries.filter(d => d.status === 'completed').length;
        document.getElementById('pendingDeliveries').innerText = deliveries.filter(d => d.status === 'pending' || d.status === 'in_transit').length;
        document.getElementById('totalDistributors').innerText = distributors.filter(d => d.status === 'approved').length;
    }
    
    function extractStateCodes(cov) { 
        if (cov.includes('جميع الولايات')) return algerianStates.map(s => s.code); 
        const codes = []; 
        cov.split(',').forEach(p => { 
            let m = p.trim().match(/^([A-Z]{3})/); 
            if(m) codes.push(m[1]); 
        }); 
        return codes; 
    }
    
    function extractStateNames(cov) { 
        if (cov.includes('جميع الولايات')) return algerianStates.map(s => s.name); 
        const names = []; 
        cov.split(',').forEach(p => { 
            let m = p.trim().match(/[A-Z]{3} - (.+)$/); 
            if(m) names.push(m[1]); 
        }); 
        return names; 
    }
    
    function getCoverageAreaText() { 
        let type = document.getElementById('serviceType').value; 
        if (type === 'delivery') return 'جميع الولايات الجزائرية (58 ولاية)'; 
        let select = document.getElementById('coverageArea'); 
        return Array.from(select.selectedOptions).map(opt => opt.value).join(', ') || 'غير محدد'; 
    }
    
    function updateSelectedStatesDisplay() { 
        let select = document.getElementById('coverageArea'), container = document.getElementById('selectedStatesContainer'); 
        if(!select||!container) return; 
        let vals = Array.from(select.selectedOptions).map(o=>o.value); 
        container.innerHTML = vals.map(v=>`<span class="selected-state-tag">${v}<i class="fas fa-times-circle" onclick="removeState('${v.replace(/'/g,"\\'")}')"></i></span>`).join(''); 
    }
    
    function removeState(val) { 
        let sel = document.getElementById('coverageArea'); 
        if(sel){ 
            for(let i=0;i<sel.options.length;i++) 
                if(sel.options[i].value===val) sel.options[i].selected=false; 
            updateSelectedStatesDisplay(); 
        } 
    }
    
    function handleServiceTypeChange() { 
        let type = document.getElementById('serviceType').value; 
        let sel = document.getElementById('coverageArea'), note = document.getElementById('coverageNote'); 
        if(type==='delivery'){ 
            if(sel){ 
                for(let i=0;i<sel.options.length;i++) sel.options[i].selected=true; 
                sel.disabled=true; 
                updateSelectedStatesDisplay(); 
            } 
            note.innerHTML='✅ شركة توصيل - تغطية جميع الولايات (58 ولاية)'; 
            note.style.color='var(--success)'; 
        } else if(type==='distributor'||type==='both'){ 
            if(sel){ 
                for(let i=0;i<sel.options.length;i++) sel.options[i].selected=false; 
                sel.disabled=false; 
                updateSelectedStatesDisplay(); 
            } 
            note.innerHTML='📌 اختر الولايات التي تغطيها'; 
            note.style.color='var(--info)'; 
        } else { 
            if(sel) sel.disabled=false; 
            note.innerHTML=''; 
        } 
    }
    
    function loadStatesSelect() { 
        let s = document.getElementById('coverageArea'); 
        if(!s) return; 
        s.innerHTML = ''; 
        algerianStates.forEach(st=>{ 
            let opt = document.createElement('option'); 
            opt.value = `${st.code} - ${st.name}`; 
            opt.textContent = `${st.code} | ${st.name}`; 
            s.appendChild(opt); 
        }); 
        s.addEventListener('change', updateSelectedStatesDisplay); 
    }

    // ============================================================
    // القسم 3: إدارة الطلبات والموزعين
    // ============================================================
    function submitDelivery() {
        let delivery = { 
            id: Date.now(), 
            orderId: document.getElementById('deliveryOrderId').value, 
            customer: document.getElementById('deliveryCustomer').value, 
            address: document.getElementById('deliveryAddress').value, 
            phone: document.getElementById('deliveryPhone').value, 
            distributorId: parseInt(document.getElementById('deliveryDistributor').value), 
            amount: parseInt(document.getElementById('deliveryAmount').value), 
            notes: document.getElementById('deliveryNotes').value, 
            status: 'pending', 
            createdAt: new Date().toISOString(), 
            createdBy: currentUser?.name || 'نظام' 
        };
        deliveries.push(delivery); 
        localStorage.setItem(STORAGE_KEYS.DELIVERIES, JSON.stringify(deliveries));
        showNotification('✅ تم إنشاء طلب التوصيل', 'success'); 
        closeDeliveryModal(); 
        document.getElementById('deliveryModal').querySelector('form').reset(); 
        updateStats(); 
        loadDeliveries();
    }
    
    function submitDistributor() {
        let dist = { 
            id: Date.now(), 
            companyName: document.getElementById('companyName').value, 
            managerName: document.getElementById('managerName').value, 
            email: document.getElementById('distributorEmail').value, 
            phone: document.getElementById('distributorPhone').value, 
            serviceType: document.getElementById('serviceType').value, 
            coverageArea: getCoverageAreaText(), 
            serviceDescription: document.getElementById('serviceDescription').value, 
            status: 'pending', 
            createdAt: new Date().toISOString() 
        };
        distributors.push(dist); 
        localStorage.setItem(STORAGE_KEYS.DISTRIBUTORS, JSON.stringify(distributors));
        showNotification('✅ تم إرسال طلب التسجيل', 'success'); 
        closeDistributorModal(); 
        document.getElementById('distributorModal').querySelector('form').reset(); 
        updateStats();
    }
    
    function approveDistributor(id) { 
        let d = distributors.find(x=>x.id==id); 
        if(d){ 
            d.status='approved'; 
            d.approvedAt=new Date().toISOString(); 
            d.approvedBy=currentUser?.name||'مدير'; 
            localStorage.setItem(STORAGE_KEYS.DISTRIBUTORS, JSON.stringify(distributors)); 
            showNotification('✅ تمت الموافقة','success'); 
            loadPendingRequests(); 
            loadDistributors(); 
            loadDistributorsTable(); 
            updateStats(); 
        } 
    }
    
    function rejectDistributor(id) { 
        let d = distributors.find(x=>x.id==id); 
        if(d){ 
            d.status='rejected'; 
            d.rejectedAt=new Date().toISOString(); 
            d.rejectedBy=currentUser?.name||'مدير'; 
            localStorage.setItem(STORAGE_KEYS.DISTRIBUTORS, JSON.stringify(distributors)); 
            showNotification('❌ تم الرفض','info'); 
            loadPendingRequests(); 
            updateStats(); 
        } 
    }
    
    function updateDeliveryStatus(id, status) { 
        let d = deliveries.find(x=>x.id==id); 
        if(d){ 
            d.status=status; 
            d.updatedAt=new Date().toISOString(); 
            localStorage.setItem(STORAGE_KEYS.DELIVERIES, JSON.stringify(deliveries)); 
            showNotification('✅ تم تحديث الحالة','success'); 
            loadDeliveries(); 
            updateStats(); 
        } 
    }
    
    function trackDelivery() { 
        let tid = document.getElementById('trackingInput').value; 
        let delivery = deliveries.find(d=>d.orderId===tid || d.id==tid); 
        let resDiv = document.getElementById('trackingResult'); 
        if(!delivery){ 
            resDiv.innerHTML='<div class="empty-state"><i class="fas fa-search"></i><h3>لم يتم العثور على الطلب</h3></div>'; 
            return; 
        } 
        let distributor = distributors.find(d=>d.id==delivery.distributorId); 
        let steps = [{status:'pending',label:'قيد الانتظار',icon:'⏳'},{status:'in_transit',label:'قيد التوصيل',icon:'🚚'},{status:'completed',label:'مكتمل',icon:'✅'}]; 
        let idx = steps.findIndex(s=>s.status===delivery.status); 
        resDiv.innerHTML=`<div class="card"><h3 style="color:var(--gold)">📦 تفاصيل الطلب</h3><div>رقم: ${delivery.orderId}<br>الزبون: ${delivery.customer}<br>العنوان: ${delivery.address}<br>الموزع: ${distributor?.companyName||'غير محدد'}<br>مناطق التغطية: ${distributor?.coverageArea||'غير متوفر'}</div><div style="display:flex;justify-content:space-between;margin-top:20px;">${steps.map((s,i)=>`<div style="text-align:center;flex:1"><div style="font-size:28px;opacity:${i<=idx?1:0.3}">${s.icon}</div><div>${s.label}</div></div>${i<steps.length-1?'<div style="flex:1;height:2px;background:rgba(255,215,0,0.3)"></div>':''}`).join('')}</div></div>`; 
    }

    // ============================================================
    // القسم 4: عرض البيانات
    // ============================================================
    function loadDeliveries() { 
        let cont = document.getElementById('deliveriesContainer'); 
        if(deliveries.length===0){ 
            cont.innerHTML='<div class="empty-state"><i class="fas fa-box-open"></i><h3>لا توجد طلبات</h3></div>'; 
            return; 
        } 
        cont.innerHTML = deliveries.map(del=>{ 
            let dist = distributors.find(x=>x.id==del.distributorId); 
            return `<div class="card"><div class="card-header"><div><div class="card-title">📦 ${del.orderId}</div><div>👤 ${del.customer}</div></div><span class="status-badge status-${del.status}">${del.status==='pending'?'⏳ قيد الانتظار':del.status==='in_transit'?'🚚 قيد التوصيل':'✅ مكتمل'}</span></div><div><strong>العنوان:</strong> ${del.address}<br><strong>المبلغ:</strong> ${del.amount} دج<br><strong>الموزع:</strong> ${dist?.companyName||'غير محدد'}</div><div style="display:flex;gap:10px;margin-top:15px;"><button class="btn btn-gold" onclick="updateDeliveryStatus(${del.id},'in_transit')">🚚 قيد التوصيل</button><button class="btn btn-outline" onclick="updateDeliveryStatus(${del.id},'completed')">✅ مكتمل</button></div></div>`; 
        }).join(''); 
    }
    
    function loadDistributors() { 
        let cont = document.getElementById('distributorsContainer'); 
        let approved = distributors.filter(d=>d.status==='approved'); 
        if(approved.length===0){ 
            cont.innerHTML='<div class="empty-state"><i class="fas fa-warehouse"></i><h3>لا يوجد موزعون معتمدون</h3></div>'; 
            return; 
        } 
        cont.innerHTML = approved.map(d=>`<div class="card"><div class="card-header"><div><div class="card-title">🏢 ${d.companyName}</div><div>👤 ${d.managerName}</div></div><span class="status-badge status-approved">✅ معتمد</span></div><div><strong>الهاتف:</strong> ${d.phone}<br><strong>المناطق:</strong> ${d.coverageArea}</div></div>`).join(''); 
    }
    
    function loadPendingRequests() { 
        let cont = document.getElementById('pendingContainer'); 
        let pending = distributors.filter(d=>d.status==='pending'); 
        if(currentUser?.role!=='admin'){ 
            cont.innerHTML='<div class="empty-state"><i class="fas fa-lock"></i><h3>غير مصرح</h3></div>'; 
            return; 
        } 
        if(pending.length===0){ 
            cont.innerHTML='<div class="empty-state"><i class="fas fa-check-circle"></i><h3>لا توجد طلبات قيد الانتظار</h3></div>'; 
            return; 
        } 
        cont.innerHTML = pending.map(d=>`<div class="card"><div class="card-header"><div><div class="card-title">🏢 ${d.companyName}</div><div>👤 ${d.managerName}</div></div><span class="status-badge status-pending">⏳ قيد الانتظار</span></div><div><strong>البريد:</strong> ${d.email}<br><strong>المناطق:</strong> ${d.coverageArea}</div><div style="display:flex;gap:10px;margin-top:15px;"><button class="btn btn-gold" onclick="approveDistributor(${d.id})">✅ موافقة</button><button class="btn btn-outline" onclick="rejectDistributor(${d.id})">❌ رفض</button></div></div>`).join(''); 
    }
    
    function loadDistributorsTable() { 
        let approved = distributors.filter(d=>d.status==='approved'); 
        let filtered = approved; 
        if(currentFilter!=='all') filtered = filtered.filter(d=>d.serviceType===currentFilter); 
        if(currentSearch) filtered = filtered.filter(d=>d.companyName.includes(currentSearch)||d.managerName.includes(currentSearch)||d.phone.includes(currentSearch)); 
        let tbody = document.getElementById('distributorsTableBody'); 
        if(filtered.length===0){ 
            tbody.innerHTML='<tr><td colspan="8" style="text-align:center">لا توجد نتائج</td></tr>'; 
            return; 
        } 
        tbody.innerHTML = filtered.map((d,i)=>{ 
            let codes = extractStateCodes(d.coverageArea); 
            let names = extractStateNames(d.coverageArea); 
            let allFlag = d.coverageArea.includes('جميع الولايات'); 
            let typeText = d.serviceType==='delivery'?'🚚 شركة توصيل':d.serviceType==='distributor'?'📦 موزع':'🔄 كليهما'; 
            return `<tr><td>${i+1}</td><td><strong>${d.companyName}</strong></td><td>${d.managerName}</td><td>${d.phone}</td><td>${typeText}</td><td>${allFlag?'<span class="badge-all-states">جميع الولايات</span>':codes.map(c=>`<span class="state-code">${c}</span>`).join('')}</td><td>${allFlag?'الجزائر - أدرار ...':names.map(n=>`<span class="state-name">${n}</span>`).join('')}</td><td>${allFlag?58:codes.length}</td></tr>`; 
        }).join(''); 
    }
    
    function filterDistributorsTable() { 
        currentSearch = document.getElementById('searchDistributor').value; 
        loadDistributorsTable(); 
    }
    
    function filterByType(type) { 
        currentFilter = type; 
        document.querySelectorAll('.filter-btn').forEach(btn=>btn.classList.remove('active')); 
        event.target.classList.add('active'); 
        loadDistributorsTable(); 
    }
    
    function exportDistributorsTable() { 
        let approved = distributors.filter(d=>d.status==='approved'); 
        let filtered = approved; 
        if(currentFilter!=='all') filtered = filtered.filter(d=>d.serviceType===currentFilter); 
        if(currentSearch) filtered = filtered.filter(d=>d.companyName.includes(currentSearch)); 
        let csv = "الرقم,الموزع,المسؤول,الهاتف,النوع,الولايات\n"; 
        filtered.forEach((d,i)=>{ 
            let codes = extractStateCodes(d.coverageArea); 
            let allFlag = d.coverageArea.includes('جميع الولايات'); 
            csv += `${i+1},${d.companyName},${d.managerName},${d.phone},${d.serviceType},${allFlag?'جميع الولايات':codes.join(' - ')}\n`; 
        }); 
        let blob = new Blob(["\uFEFF"+csv], {type:"text/csv;charset=utf-8"}); 
        let link = document.createElement('a'); 
        link.href = URL.createObjectURL(blob); 
        link.download = "الموزعون.csv"; 
        link.click(); 
        URL.revokeObjectURL(link); 
        showNotification('✅ تم التصدير','success'); 
    }

    // ============================================================
    // القسم 5: تكامل تلغرام
    // ============================================================
    async function sendDistributorsTableToTelegram() { 
        let approved = distributors.filter(d=>d.status==='approved'); 
        if(approved.length===0){ 
            showNotification('⚠️ لا يوجد موزعون','warning'); 
            return; 
        } 
        let stateMap = new Map(); 
        algerianStates.forEach(st=>stateMap.set(st.code,{code:st.code,name:st.name,distributors:[]})); 
        approved.forEach(dist=>{ 
            let codes = extractStateCodes(dist.coverageArea); 
            let allFlag = dist.coverageArea.includes('جميع الولايات'); 
            let info = `• ${dist.companyName} (${dist.serviceType})\n  👤 ${dist.managerName} | 📞 ${dist.phone}`; 
            if(allFlag){ 
                stateMap.forEach(v=>v.distributors.push(info)); 
            } else { 
                codes.forEach(c=>{ 
                    if(stateMap.has(c)) stateMap.get(c).distributors.push(info); 
                }); 
            } 
        }); 
        let messages = []; 
        let current = "📋 قائمة الموزعين حسب كل ولاية\n━━━━━━━━━━━━━━━━━━\n"; 
        for(let [code,data] of stateMap){ 
            if(data.distributors.length===0) continue; 
            let block = `📍 ولاية ${data.name} (${code}) - العدد: ${data.distributors.length}\n${data.distributors.join('\n')}\n\n`; 
            if((current+block).length>3900){ 
                messages.push(current); 
                current = "📋 قائمة الموزعين (تابع)\n━━━━━━━━━━━━━━━━━━\n"; 
            } 
            current += block; 
        } 
        if(current !== "📋 قائمة الموزعين حسب كل ولاية\n━━━━━━━━━━━━━━━━━━\n") messages.push(current); 
        for(let msg of messages){ 
            try { 
                await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/sendMessage`, { 
                    method:'POST', 
                    headers:{'Content-Type':'application/json'}, 
                    body:JSON.stringify({ chat_id: TELEGRAM.channelId, text: msg, parse_mode:'Markdown' }) 
                }); 
                await new Promise(r=>setTimeout(r,500)); 
            } catch(e){} 
        } 
        showNotification('✅ تم الإرسال','success'); 
    }

    // ============================================================
    // القسم 6: دوال التحكم في النوافذ والتبويبات
    // ============================================================
    function switchTab(tabName) { 
        document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active')); 
        document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); 
        document.getElementById(tabName).classList.add('active'); 
        event.target.classList.add('active'); 
        if(tabName==='deliveries') loadDeliveries(); 
        if(tabName==='distributors') loadDistributors(); 
        if(tabName==='distributorsTable') loadDistributorsTable(); 
        if(tabName==='pending') loadPendingRequests(); 
    }
    
    function openDeliveryModal() { 
        document.getElementById('deliveryModal').classList.add('active'); 
        let select = document.getElementById('deliveryDistributor'); 
        let approved = distributors.filter(d=>d.status==='approved'); 
        select.innerHTML='<option value="">اختر موزع</option>'; 
        approved.forEach(d=>{ 
            let opt = document.createElement('option'); 
            opt.value=d.id; 
            opt.textContent=`${d.companyName} (${d.coverageArea.substring(0,30)})`; 
            select.appendChild(opt); 
        }); 
    }
    
    function closeDeliveryModal() { document.getElementById('deliveryModal').classList.remove('active'); }
    function openDistributorModal() { loadStatesSelect(); document.getElementById('distributorModal').classList.add('active'); handleServiceTypeChange(); }
    function closeDistributorModal() { document.getElementById('distributorModal').classList.remove('active'); }
    function goBack() { window.history.back(); }
    
    // تهيئة النظام
    window.onload = function() { 
        updateStats(); 
        loadDistributorsTable(); 
        if(!localStorage.getItem(STORAGE_KEYS.DISTRIBUTORS)) localStorage.setItem(STORAGE_KEYS.DISTRIBUTORS, JSON.stringify([])); 
        if(!localStorage.getItem(STORAGE_KEYS.DELIVERIES)) localStorage.setItem(STORAGE_KEYS.DELIVERIES, JSON.stringify([])); 
    };
</script>
