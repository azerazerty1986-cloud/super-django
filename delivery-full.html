<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ناردو برو - جلب من القناة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0f3460, #16213e);
            color: white;
            direction: rtl;
            min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .header {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Cairo', sans-serif;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-gold { background: #ffd700; color: #000; }
        .btn-telegram { background: #0088cc; color: white; }
        .btn-txt { background: #6c757d; color: white; }
        .btn-info { background: #17a2b8; color: white; }
        .btn-success { background: #28a745; color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            overflow: hidden;
        }
        th {
            background: rgba(255,215,0,0.1);
            color: #ffd700;
            padding: 15px;
            text-align: right;
            border-bottom: 2px solid #ffd700;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid rgba(255,215,0,0.1);
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .search-box input {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,215,0,0.3);
            background: rgba(0,0,0,0.3);
            color: white;
            font-family: 'Cairo', sans-serif;
        }
        .notification {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .notification.success { background: #28a745; color: white; }
        .notification.error { background: #dc3545; color: white; }
        .notification.info { background: #17a2b8; color: white; }
        @keyframes slideIn {
            from { transform: translateX(-400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255,215,0,0.2);
        }
        .stat-number {
            font-size: 32px;
            font-weight: bold;
            color: #ffd700;
        }
        .filter-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 8px 20px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 20px;
            cursor: pointer;
            color: white;
        }
        .filter-btn.active {
            background: #ffd700;
            color: #000;
        }
        .files-list {
            margin-top: 20px;
        }
        .file-item {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .file-item:hover {
            background: rgba(255,215,0,0.1);
        }
        .file-name {
            font-weight: bold;
            color: #ffd700;
        }
        .file-actions {
            display: flex;
            gap: 10px;
        }
        .status-badge {
            background: #28a745;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #1a1a2e;
            border: 2px solid #ffd700;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
        }
        .modal-content input, .modal-content select {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border-radius: 10px;
            border: 1px solid rgba(255,215,0,0.3);
            background: rgba(0,0,0,0.3);
            color: white;
            font-family: 'Cairo', sans-serif;
        }
        .close-btn {
            float: left;
            font-size: 28px;
            cursor: pointer;
            color: #ffd700;
            background: none;
            border: none;
        }
        .log-area {
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 10px;
            font-size: 12px;
            font-family: monospace;
            max-height: 150px;
            overflow-y: auto;
            margin-top: 10px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-truck"></i> ناردو برو | جلب من القناة</h1>
        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
            <button class="btn btn-gold" onclick="openAddModal()"><i class="fas fa-plus"></i> إضافة موزع</button>
            <button class="btn btn-txt" onclick="exportToTxt()"><i class="fas fa-download"></i> تصدير TXT</button>
            <button class="btn btn-telegram" onclick="sendToTelegram()"><i class="fab fa-telegram"></i> إرسال للقناة</button>
            <button class="btn btn-info" onclick="startFetching()"><i class="fas fa-play"></i> بدء الجلب</button>
            <button class="btn btn-danger" onclick="clearAll()"><i class="fas fa-trash"></i> مسح الكل</button>
        </div>
    </div>

    <div class="stats" id="stats"></div>

    <!-- حالة الاتصال -->
    <div class="card">
        <h3><i class="fab fa-telegram"></i> حالة البوت <span id="botStatus" class="status-badge">جاري الاتصال...</span></h3>
        <div id="connectionInfo" class="log-area"></div>
    </div>

    <!-- الملفات المستلمة -->
    <div class="card">
        <h3><i class="fas fa-file-alt"></i> الملفات المستلمة من القناة <span id="filesCount" class="status-badge">0</span></h3>
        <div id="filesList" class="files-list">
            <p style="text-align:center;color:#aaa;">📂 في انتظار استلام ملفات...</p>
        </div>
    </div>

    <!-- جدول الموزعين -->
    <div class="card">
        <h2 style="color: #ffd700; margin-bottom: 20px;"><i class="fas fa-table"></i> جدول الموزعين</h2>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 بحث..." onkeyup="filterTable()">
        </div>
        <div class="filter-buttons">
            <button class="filter-btn active" onclick="filterByType('all')">الكل</button>
            <button class="filter-btn" onclick="filterByType('delivery')">🚚 توصيل</button>
            <button class="filter-btn" onclick="filterByType('distributor')">📦 موزع</button>
            <button class="filter-btn" onclick="filterByType('both')">🔄 كليهما</button>
        </div>
        <div style="overflow-x: auto;">
            <table id="mainTable">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>الشركة</th>
                        <th>المسؤول</th>
                        <th>الهاتف</th>
                        <th>النوع</th>
                        <th>الولاية</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- نافذة الإضافة -->
<div id="addModal" class="modal">
    <div class="modal-content">
        <button class="close-btn" onclick="closeAddModal()">&times;</button>
        <h2 style="color:#ffd700;">إضافة موزع</h2>
        <input type="text" id="compName" placeholder="اسم الشركة">
        <input type="text" id="mgrName" placeholder="المسؤول">
        <input type="tel" id="phone" placeholder="الهاتف">
        <select id="type">
            <option value="delivery">توصيل</option>
            <option value="distributor">موزع</option>
            <option value="both">كليهما</option>
        </select>
        <input type="text" id="state" placeholder="الولاية">
        <button class="btn btn-gold" onclick="addDistributor()" style="width:100%">إضافة</button>
    </div>
</div>

<script>
    // إعدادات البوت
    const BOT_TOKEN = '8576673096:AAGvSMjzwVWj6wJ47JdqiDwcObXjBDcyiLA';
    const CHANNEL_ID = '-1003822964890';
    const API_URL = `https://api.telegram.org/bot${BOT_TOKEN}`;

    // البيانات
    let distributors = [
        { id: 1, company: "شركة البراق", manager: "أحمد محمد", phone: "0555123456", type: "delivery", state: "الجزائر" }
    ];
    let receivedFiles = [];
    let lastUpdateId = 0;
    let currentFilter = 'all';
    let currentSearch = '';

    // سجل العمليات
    function addLog(msg, type = 'info') {
        const logDiv = document.getElementById('connectionInfo');
        const time = new Date().toLocaleTimeString();
        logDiv.innerHTML += `<div style="color: ${type === 'success' ? '#28a745' : type === 'error' ? '#dc3545' : '#17a2b8'}">[${time}] ${msg}</div>`;
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    // عرض الجدول
    function displayTable() {
        let filtered = distributors;
        if (currentFilter !== 'all') filtered = filtered.filter(d => d.type === currentFilter);
        if (currentSearch) filtered = filtered.filter(d => d.company.includes(currentSearch) || d.state.includes(currentSearch));
        
        const tbody = document.getElementById('tableBody');
        if (filtered.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center">لا توجد بيانات</td></tr>';
            return;
        }
        
        tbody.innerHTML = filtered.map((d, i) => `
            <tr>
                <td>${i+1}</td>
                <td>${d.company}</td>
                <td>${d.manager}</td>
                <td>${d.phone}</td>
                <td>${d.type === 'delivery' ? '🚚 توصيل' : d.type === 'distributor' ? '📦 موزع' : '🔄 كليهما'}</td>
                <td>${d.state}</td>
                <td><button class="btn btn-danger" style="padding:5px 10px" onclick="deleteDistributor(${d.id})">🗑️</button></td>
            </tr>
        `).join('');
        
        document.getElementById('stats').innerHTML = `
            <div class="stat-card"><div class="stat-number">${distributors.length}</div><div>الموزعون</div></div>
            <div class="stat-card"><div class="stat-number">${distributors.filter(d => d.type === 'delivery' || d.type === 'both').length}</div><div>توصيل</div></div>
            <div class="stat-card"><div class="stat-number">${distributors.filter(d => d.type === 'distributor' || d.type === 'both').length}</div><div>موزعون</div></div>
        `;
    }

    function filterTable() { currentSearch = document.getElementById('searchInput').value; displayTable(); }
    function filterByType(type) { currentFilter = type; displayTable(); }
    function deleteDistributor(id) { distributors = distributors.filter(d => d.id !== id); displayTable(); addLog(`✅ تم حذف موزع`, 'success'); }
    
    function addDistributor() {
        const newDist = {
            id: Date.now(),
            company: document.getElementById('compName').value,
            manager: document.getElementById('mgrName').value,
            phone: document.getElementById('phone').value,
            type: document.getElementById('type').value,
            state: document.getElementById('state').value
        };
        if (newDist.company && newDist.phone) {
            distributors.push(newDist);
            displayTable();
            closeAddModal();
            addLog(`✅ تم إضافة ${newDist.company}`, 'success');
        } else {
            addLog(`⚠️ الرجاء ملء الحقول`, 'error');
        }
    }

    function clearAll() {
        if (confirm('مسح جميع البيانات؟')) {
            distributors = [];
            displayTable();
            addLog(`🗑️ تم مسح جميع البيانات`, 'info');
        }
    }

    // تصدير TXT
    function exportToTxt() {
        let content = `╔════════════════════════════════════════════════╗\n`;
        content += `║           ناردو برو - قائمة الموزعين           ║\n`;
        content += `╠════════════════════════════════════════════════╣\n`;
        content += `║ 📅 ${new Date().toLocaleDateString('ar-SA')}\n`;
        content += `║ 📊 العدد: ${distributors.length}\n`;
        content += `╚════════════════════════════════════════════════╝\n\n`;
        
        distributors.forEach((d, i) => {
            content += `${i+1}. ${d.company} | ${d.manager} | ${d.phone} | ${d.type} | ${d.state}\n`;
        });
        
        const blob = new Blob([content], { type: 'text/plain' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `nardo_${Date.now()}.txt`;
        link.click();
        addLog(`📄 تم تصدير ${distributors.length} موزع`, 'success');
    }

    async function sendToTelegram() {
        let content = `ناردو برو - ${new Date().toLocaleDateString('ar-SA')}\n`;
        content += `═══════════════════════════\n`;
        distributors.forEach((d, i) => {
            content += `${i+1}. ${d.company} | ${d.phone} | ${d.state}\n`;
        });
        
        const blob = new Blob([content], { type: 'text/plain' });
        const formData = new FormData();
        formData.append('chat_id', CHANNEL_ID);
        formData.append('document', blob, `distributors_${Date.now()}.txt`);
        
        try {
            const res = await fetch(`${API_URL}/sendDocument`, { method: 'POST', body: formData });
            const result = await res.json();
            if (result.ok) {
                addLog(`✅ تم إرسال الملف إلى القناة`, 'success');
            } else {
                addLog(`❌ فشل الإرسال: ${result.description}`, 'error');
            }
        } catch(err) {
            addLog(`❌ خطأ: ${err.message}`, 'error');
        }
    }

    // جلب الملفات من القناة
    async function startFetching() {
        addLog(`🚀 بدء جلب الملفات من القناة...`, 'info');
        document.getElementById('botStatus').innerHTML = '🟢 يعمل';
        
        // التحقق من البوت
        try {
            const res = await fetch(`${API_URL}/getMe`);
            const data = await res.json();
            if (data.ok) {
                addLog(`✅ البوت متصل: @${data.result.username}`, 'success');
            }
        } catch(err) {
            addLog(`❌ فشل الاتصال: ${err.message}`, 'error');
        }
        
        // بدء الاستماع
        listenForFiles();
    }

    async function listenForFiles() {
        addLog(`👂 جاري الاستماع للملفات الجديدة...`, 'info');
        
        while (true) {
            try {
                const url = `${API_URL}/getUpdates?offset=${lastUpdateId}&timeout=25`;
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.ok && data.result) {
                    for (const update of data.result) {
                        lastUpdateId = update.update_id + 1;
                        const message = update.channel_post || update.message;
                        
                        if (message && message.chat && message.chat.id.toString() === CHANNEL_ID) {
                            if (message.document && message.document.file_name && message.document.file_name.endsWith('.txt')) {
                                addLog(`📁 تم اكتشاف ملف: ${message.document.file_name}`, 'info');
                                await downloadAndSaveFile(message);
                            }
                        }
                    }
                }
                await new Promise(r => setTimeout(r, 1000));
            } catch(err) {
                addLog(`⚠️ خطأ في الاستماع: ${err.message}`, 'error');
                await new Promise(r => setTimeout(r, 5000));
            }
        }
    }

    async function downloadAndSaveFile(message) {
        const fileName = message.document.file_name;
        const fileId = message.document.file_id;
        
        try {
            const fileRes = await fetch(`${API_URL}/getFile?file_id=${fileId}`);
            const fileData = await fileRes.json();
            
            if (fileData.ok) {
                const fileUrl = `https://api.telegram.org/file/bot${BOT_TOKEN}/${fileData.result.file_path}`;
                const contentRes = await fetch(fileUrl);
                const content = await contentRes.text();
                
                receivedFiles.unshift({
                    id: Date.now(),
                    name: fileName,
                    content: content,
                    date: new Date().toLocaleString(),
                    size: message.document.file_size
                });
                
                displayFiles();
                addLog(`✅ تم استلام وتخزين: ${fileName}`, 'success');
            }
        } catch(err) {
            addLog(`❌ فشل تحميل الملف: ${err.message}`, 'error');
        }
    }

    function displayFiles() {
        const container = document.getElementById('filesList');
        const countSpan = document.getElementById('filesCount');
        countSpan.textContent = receivedFiles.length;
        
        if (receivedFiles.length === 0) {
            container.innerHTML = '<p style="text-align:center;color:#aaa;">📂 في انتظار استلام ملفات...</p>';
            return;
        }
        
        container.innerHTML = receivedFiles.map((file, i) => `
            <div class="file-item">
                <div>
                    <div class="file-name">📄 ${file.name}</div>
                    <div style="font-size:11px;color:#aaa;">📅 ${file.date} | 📦 ${(file.size/1024).toFixed(2)} KB</div>
                </div>
                <div class="file-actions">
                    <button class="btn btn-info" style="padding:5px 12px" onclick="viewFile(${i})">👁️ معاينة</button>
                    <button class="btn btn-success" style="padding:5px 12px" onclick="importFile(${i})">📥 استيراد</button>
                </div>
            </div>
        `).join('');
    }

    function viewFile(index) {
        const file = receivedFiles[index];
        if (file) {
            const win = window.open();
            win.document.write(`
                <html dir="ltr">
                <head><title>${file.name}</title>
                <style>body{background:#1a1a2e;color:#fff;font-family:monospace;padding:20px;}pre{white-space:pre-wrap;background:#0003;padding:15px;border-radius:10px;}</style>
                </head>
                <body><h2>📄 ${file.name}</h2><pre>${escapeHtml(file.content)}</pre></body>
                </html>
            `);
        }
    }

    function importFile(index) {
        const file = receivedFiles[index];
        if (file && file.content) {
            const parsed = parseTxtToDistributors(file.content);
            if (parsed.length > 0) {
                distributors = [...distributors, ...parsed];
                displayTable();
                addLog(`✅ تم استيراد ${parsed.length} موزع من ${file.name}`, 'success');
            } else {
                addLog(`⚠️ لم يتم العثور على بيانات صالحة في ${file.name}`, 'error');
            }
        }
    }

    function parseTxtToDistributors(content) {
        const lines = content.split('\n');
        const list = [];
        
        for (const line of lines) {
            // تنسيق الجدول
            if (line.includes('│')) {
                const parts = line.split('│').filter(p => p.trim());
                if (parts.length >= 6) {
                    const company = parts[1]?.trim();
                    const manager = parts[2]?.trim();
                    const phone = parts[3]?.trim();
                    let type = parts[4]?.trim();
                    const state = parts[5]?.trim();
                    
                    if (company && phone && !company.includes('الشركة') && !company.includes('─')) {
                        if (type.includes('توصيل')) type = 'delivery';
                        else if (type.includes('موزع')) type = 'distributor';
                        else type = 'delivery';
                        
                        list.push({
                            id: Date.now() + Math.random(),
                            company: company,
                            manager: manager || '',
                            phone: phone,
                            type: type,
                            state: state || ''
                        });
                    }
                }
            }
            // تنسيق بسيط
            else if (line.includes('|')) {
                const parts = line.split('|').filter(p => p.trim());
                if (parts.length >= 5) {
                    const company = parts[1]?.trim();
                    const phone = parts[3]?.trim();
                    if (company && phone) {
                        list.push({
                            id: Date.now() + Math.random(),
                            company: company,
                            manager: parts[2]?.trim() || '',
                            phone: phone,
                            type: 'delivery',
                            state: parts[4]?.trim() || ''
                        });
                    }
                }
            }
        }
        
        return list;
    }

    function escapeHtml(text) {
        return text.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function openAddModal() { document.getElementById('addModal').classList.add('active'); }
    function closeAddModal() { document.getElementById('addModal').classList.remove('active'); }

    // بدء التشغيل
    startFetching();
    displayTable();
</script>
</body>
</html>
