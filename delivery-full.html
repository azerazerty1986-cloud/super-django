head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ناردو برو - النظام المتكامل (نسخة الإكسل)</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- مكتبة Excel (SheetJS) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0f3460, #16213e);
            color: white;
            direction: rtl;
            min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .header {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Cairo', sans-serif;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-gold { background: #ffd700; color: #000; }
        .btn-gold:hover { transform: translateY(-2px); background: #ffed4e; }
        .btn-telegram { background: #0088cc; color: white; }
        .btn-telegram:hover { transform: translateY(-2px); background: #006699; }
        .btn-excel { background: #1d6f42; color: white; }
        .btn-excel:hover { transform: translateY(-2px); background: #248a52; }
        .btn-info { background: #17a2b8; color: white; }
        .btn-info:hover { transform: translateY(-2px); background: #138496; }
        .btn-success { background: #28a745; color: white; }
        .btn-success:hover { transform: translateY(-2px); background: #218838; }
        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            overflow: hidden;
        }
        th {
            background: rgba(255,215,0,0.1);
            color: #ffd700;
            padding: 15px;
            text-align: right;
            border-bottom: 2px solid #ffd700;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid rgba(255,215,0,0.1);
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .search-box input {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,215,0,0.3);
            background: rgba(0,0,0,0.3);
            color: white;
            font-family: 'Cairo', sans-serif;
        }
        .notification {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        .notification.success { background: #28a745; color: white; }
        .notification.error { background: #dc3545; color: white; }
        .notification.info { background: #17a2b8; color: white; }
        @keyframes slideIn {
            from { transform: translateX(-400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255,215,0,0.2);
        }
        .stat-number {
            font-size: 32px;
            font-weight: bold;
            color: #ffd700;
        }
        .filter-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 8px 20px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 20px;
            cursor: pointer;
            color: white;
        }
        .filter-btn.active {
            background: #ffd700;
            color: #000;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #1a1a2e;
            border: 2px solid #ffd700;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
        }
        .modal-content input, .modal-content select {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border-radius: 10px;
            border: 1px solid rgba(255,215,0,0.3);
            background: rgba(0,0,0,0.3);
            color: white;
            font-family: 'Cairo', sans-serif;
        }
        .close-btn {
            float: left;
            font-size: 28px;
            cursor: pointer;
            color: #ffd700;
            background: none;
            border: none;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-truck"></i> ناردو برو | النظام المتكامل</h1>
        <div>
            <button class="btn btn-gold" onclick="openAddDistributor()"><i class="fas fa-plus"></i> إضافة موزع</button>
            <button class="btn btn-excel" onclick="exportToExcel()"><i class="fas fa-file-excel"></i> تصدير Excel</button>
            <button class="btn btn-telegram" onclick="sendExcelToTelegram()"><i class="fab fa-telegram"></i> إرسال Excel للقناة</button>
            <button class="btn btn-info" onclick="fetchFromPinned()"><i class="fas fa-thumbtack"></i> جلب من المثبتة</button>
            <button class="btn btn-success" onclick="showUrlModal()"><i class="fas fa-link"></i> جلب من رابط</button>
        </div>
    </div>

    <div class="stats" id="stats"></div>

    <div class="card">
        <h2 style="color: #ffd700; margin-bottom: 20px;"><i class="fas fa-table"></i> جدول الموزعين</h2>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 بحث باسم الموزع..." onkeyup="filterTable()">
        </div>
        <div class="filter-buttons">
            <button class="filter-btn active" onclick="filterByType('all')">الكل</button>
            <button class="filter-btn" onclick="filterByType('delivery')">🚚 توصيل</button>
            <button class="filter-btn" onclick="filterByType('distributor')">📦 موزع</button>
            <button class="filter-btn" onclick="filterByType('both')">🔄 كليهما</button>
        </div>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>اسم الشركة</th>
                        <th>المسؤول</th>
                        <th>الهاتف</th>
                        <th>النوع</th>
                        <th>الولاية</th>
                        <th>الحالة</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="urlModal" class="modal">
    <div class="modal-content">
        <button class="close-btn" onclick="closeUrlModal()">&times;</button>
        <h2 style="color: #ffd700;">جلب بيانات من رابط</h2>
        <input type="text" id="fileUrl" placeholder="رابط ملف Excel أو CSV">
        <button class="btn btn-gold" onclick="fetchFromUrl()" style="width: 100%;">جلب وتحليل</button>
    </div>
</div>

<div id="addModal" class="modal">
    <div class="modal-content">
        <button class="close-btn" onclick="closeAddModal()">&times;</button>
        <h2 style="color: #ffd700;">إضافة موزع جديد</h2>
        <input type="text" id="compName" placeholder="اسم الشركة">
        <input type="text" id="mgrName" placeholder="اسم المسؤول">
        <input type="tel" id="phone" placeholder="رقم الهاتف">
        <select id="type">
            <option value="delivery">توصيل</option>
            <option value="distributor">موزع</option>
            <option value="both">كليهما</option>
        </select>
        <input type="text" id="state" placeholder="الولاية">
        <button class="btn btn-gold" onclick="addDistributor()" style="width: 100%;">إضافة</button>
    </div>
</div>

<script>
    // ==================== الإعدادات الأساسية ====================
    const TELEGRAM = {
        botToken: '8576673096:AAGvSMjzwVWj6wJ47JdqiDwcObXjBDcyiLA',
        channelId: '-1003822964890',
        apiUrl: 'https://api.telegram.org/bot'
    };

    // البيانات
    let distributors = [
        { id: 1, company: "شركة البراق", manager: "أحمد محمد", phone: "0555123456", type: "delivery", state: "الجزائر", status: "approved" },
        { id: 2, company: "مؤسسة السريع", manager: "سعيد علي", phone: "0555234567", type: "distributor", state: "وهران", status: "approved" },
        { id: 3, company: "شركة الأمانة", manager: "خالد عمر", phone: "0555345678", type: "both", state: "قسنطينة", status: "approved" }
    ];
    
    let currentFilter = 'all';
    let currentSearch = '';

    // ==================== 1. عرض البيانات في الجدول ====================
    function displayTable() {
        let filtered = distributors.filter(d => d.status === 'approved');
        
        if (currentFilter !== 'all') {
            filtered = filtered.filter(d => d.type === currentFilter);
        }
        if (currentSearch) {
            filtered = filtered.filter(d => d.company.includes(currentSearch));
        }
        
        const tbody = document.getElementById('tableBody');
        if (filtered.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center">لا توجد بيانات</td></tr>';
            return;
        }
        
        tbody.innerHTML = filtered.map((d, i) => `
            <tr>
                <td>${i+1}</td>
                <td>${d.company}</td>
                <td>${d.manager}</td>
                <td>${d.phone}</td>
                <td>${d.type === 'delivery' ? '🚚 توصيل' : d.type === 'distributor' ? '📦 موزع' : '🔄 كليهما'}</td>
                <td>${d.state}</td>
                <td><span style="background:#28a745; padding:5px 10px; border-radius:20px; font-size:12px;">معتمد</span></td>
            </tr>
        `).join('');
        
        updateStats();
    }
    
    function updateStats() {
        const approved = distributors.filter(d => d.status === 'approved');
        const delivery = approved.filter(d => d.type === 'delivery' || d.type === 'both').length;
        const distributor = approved.filter(d => d.type === 'distributor' || d.type === 'both').length;
        
        document.getElementById('stats').innerHTML = `
            <div class="stat-card"><div class="stat-number">${approved.length}</div><div>إجمالي الموزعين</div></div>
            <div class="stat-card"><div class="stat-number">${delivery}</div><div>خدمة توصيل</div></div>
            <div class="stat-card"><div class="stat-number">${distributor}</div><div>موزعون</div></div>
            <div class="stat-card"><div class="stat-number">${new Set(approved.map(d => d.state)).size}</div><div>ولايات</div></div>
        `;
    }
    
    function filterTable() {
        currentSearch = document.getElementById('searchInput').value;
        displayTable();
    }
    
    function filterByType(type) {
        currentFilter = type;
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        displayTable();
    }
    
    function addDistributor() {
        const newDist = {
            id: Date.now(),
            company: document.getElementById('compName').value,
            manager: document.getElementById('mgrName').value,
            phone: document.getElementById('phone').value,
            type: document.getElementById('type').value,
            state: document.getElementById('state').value,
            status: 'approved'
        };
        
        if (newDist.company && newDist.manager && newDist.phone && newDist.state) {
            distributors.push(newDist);
            displayTable();
            closeAddModal();
            showNotification('✅ تم إضافة الموزع بنجاح', 'success');
        } else {
            showNotification('⚠️ الرجاء ملء جميع الحقول', 'error');
        }
    }
    
    // ==================== 2. وظائف Excel ====================
    function getExcelData() {
        return distributors.filter(d => d.status === 'approved').map((d, i) => ({
            "#": i + 1,
            "اسم الشركة": d.company,
            "المسؤول": d.manager,
            "رقم الهاتف": d.phone,
            "النوع": d.type === 'delivery' ? 'توصيل' : d.type === 'distributor' ? 'موزع' : 'كليهما',
            "الولاية": d.state
        }));
    }

    function exportToExcel() {
        showNotification('📊 جاري إنشاء ملف Excel...', 'info');
        const ws = XLSX.utils.json_to_sheet(getExcelData());
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "الموزعون");
        XLSX.writeFile(wb, `nardo_pro_list_${Date.now()}.xlsx`);
        showNotification('✅ تم تحميل ملف Excel بنجاح', 'success');
    }

    async function sendExcelToTelegram() {
        showNotification('📤 جاري إرسال ملف Excel للقناة...', 'info');
        try {
            const ws = XLSX.utils.json_to_sheet(getExcelData());
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "الموزعون");
            const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
            const blob = new Blob([wbout], { type: "application/octet-stream" });
            
            const formData = new FormData();
            formData.append('chat_id', TELEGRAM.channelId);
            formData.append('document', blob, `distributors_${Date.now()}.xlsx`);
            formData.append('caption', `📊 قائمة الموزعين المحدثة (Excel)\n📅 ${new Date().toLocaleDateString('ar-SA')}`);

            const res = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/sendDocument`, { method: 'POST', body: formData });
            const result = await res.json();
            if(result.ok) showNotification('✅ تم إرسال ملف Excel بنجاح', 'success');
            else throw new Error(result.description);
        } catch (err) {
            showNotification(`❌ فشل الإرسال: ${err.message}`, 'error');
        }
    }

    // ==================== 3. جلب من القناة ====================
    async function fetchFromPinned() {
        showNotification('📡 جلب الملف من الرسالة المثبتة...', 'info');
        try {
            const chatRes = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getChat?chat_id=${TELEGRAM.channelId}`);
            const chatData = await chatRes.json();
            if(!chatData.ok || !chatData.result.pinned_message) {
                showNotification('⚠️ لا توجد رسالة مثبتة', 'error');
                return;
            }
            const pinned = chatData.result.pinned_message;
            if(!pinned.document) {
                showNotification('⚠️ الرسالة المثبتة ليست ملفاً', 'error');
                return;
            }
            const fileRes = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getFile?file_id=${pinned.document.file_id}`);
            const fileData = await fileRes.json();
            const fileUrl = `https://api.telegram.org/file/bot${TELEGRAM.botToken}/${fileData.result.file_path}`;
            
            await processFileFromUrl(fileUrl);
        } catch (err) { showNotification(`❌ خطأ: ${err.message}`, 'error'); }
    }

    async function fetchFromUrl() {
        const url = document.getElementById('fileUrl').value.trim();
        if (!url) {
            showNotification('⚠️ أدخل الرابط', 'error');
            return;
        }
        closeUrlModal();
        showNotification('📡 جاري جلب الملف...', 'info');
        await processFileFromUrl(url);
    }

    async function processFileFromUrl(url) {
        try {
            const response = await fetch(url);
            const arrayBuffer = await response.arrayBuffer();
            const workbook = XLSX.read(new Uint8Array(arrayBuffer), { type: 'array' });
            const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
            const jsonData = XLSX.utils.sheet_to_json(firstSheet);
            
            if(jsonData.length) {
                distributors = jsonData.map(d => ({
                    id: Math.random(),
                    company: d["اسم الشركة"] || d.company || "",
                    manager: d["المسؤول"] || d.manager || "",
                    phone: d["رقم الهاتف"] || d.phone || "",
                    type: d["النوع"] === 'توصيل' ? 'delivery' : (d["النوع"] === 'موزع' ? 'distributor' : 'both'),
                    state: d["الولاية"] || d.state || "",
                    status: 'approved'
                }));
                displayTable();
                showNotification(`✅ تم تحديث البيانات بنجاح`, 'success');
            }
        } catch (err) {
            showNotification(`❌ فشل معالجة الملف: ${err.message}`, 'error');
        }
    }

    // ==================== دوال مساعدة ====================
    function showNotification(msg, type) {
        const notification = document.createElement('div');
        notification.className = `notification ${type}`;
        notification.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i> ${msg}`;
        document.body.appendChild(notification);
        setTimeout(() => notification.remove(), 3000);
    }
    
    function openAddDistributor() { document.getElementById('addModal').classList.add('active'); }
    function closeAddModal() { document.getElementById('addModal').classList.remove('active'); }
    function showUrlModal() { document.getElementById('urlModal').classList.add('active'); }
    function closeUrlModal() { document.getElementById('urlModal').classList.remove('active'); }
    
    displayTable();
</script>
</body>
</html>
