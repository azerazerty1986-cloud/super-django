<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام ناردو برو المتكامل | 2026</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --gold: #ffd700;
            --dark-blue: #1a1a2e;
            --soft-blue: #16213e;
            --success: #10b981;
            --error: #f87171;
            --text: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f0f1a;
            color: var(--text);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        /* الهيدر */
        header {
            background: var(--dark-blue);
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid var(--gold);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 3fr 1fr;
            gap: 25px;
        }

        /* قسم المنتجات */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: var(--soft-blue);
            border-radius: 15px;
            padding: 15px;
            border: 1px solid rgba(255, 215, 0, 0.1);
            transition: 0.3s;
            position: relative;
        }

        .product-card:hover {
            border-color: var(--gold);
            transform: translateY(-5px);
        }

        .merchant-badge {
            background: var(--gold);
            color: #000;
            font-size: 0.7rem;
            padding: 3px 8px;
            border-radius: 5px;
            font-weight: bold;
            position: absolute;
            top: 10px;
            right: 10px;
        }

        .btn-add {
            background: var(--gold);
            color: #000;
            border: none;
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }

        /* السلة الجانبية */
        .cart-sidebar {
            background: var(--dark-blue);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid var(--gold);
            height: fit-content;
            position: sticky;
            top: 100px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 10px 0;
            font-size: 0.9rem;
        }

        /* التنبيهات */
        .notification {
            position: fixed;
            bottom: 20px;
            left: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            z-index: 10000;
            display: none;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn { from { transform: translateX(-100%); } to { transform: translateX(0); } }

        /* زر التتبع العائم */
        .floating-track {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--gold);
            color: #000;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 999;
        }

        @media (max-width: 850px) {
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <h1><i class="fas fa-bolt"></i> ناردو إكسبرس ماركت</h1>
    <p>تسوق من عدة تجار بتوصيل واحد موحد</p>
</header>

<div class="container">
    <div class="products-grid" id="mainProducts">
        </div>

    <div class="cart-sidebar">
        <h3><i class="fas fa-shopping-cart"></i> سلة المشتريات</h3>
        <div id="cartItems"></div>
        <div id="cartTotal" style="margin-top:20px; border-top:2px solid var(--gold); padding-top:10px; font-weight:bold;">
            الإجمالي: 0 دج
        </div>
        <button class="btn-add" style="background:#10b981; color:white;" onclick="window.showDeliveryCheckout()">
            إتمام الطلب <i class="fas fa-truck"></i>
        </button>
    </div>
</div>

<div class="floating-track" onclick="viewMyOrders()" title="تتبع طلباتي">
    <i class="fas fa-route"></i>
</div>

<div id="notifier" class="notification"></div>

<script>
    /* ========================================== */
    /* 1. الإعدادات والبيانات */
    /* ========================================== */
    
    // إعدادات التلغرام (قم بتعديلها ببياناتك)
    const TELEGRAM_CONFIG = {
        botToken: 'YOUR_BOT_TOKEN_HERE',
        channelId: 'YOUR_CHAT_ID_HERE'
    };

    // بيانات المنتجات (يمكنك جلبها من API مستقبلاً)
    const productsData = [
        { id: 1, name: 'سماعة بلوتوث M10', price: 2500, merchant: 'تكنو سماريت', img: '🎧' },
        { id: 2, name: 'ساعة ذكية Ultra', price: 4500, merchant: 'تكنو سماريت', img: '⌚' },
        { id: 3, name: 'عطر الفخامة 100مل', price: 6000, merchant: 'عطور العاصمة', img: '🧴' },
        { id: 4, name: 'نظارة شمسية كلاسيك', price: 1800, merchant: 'بوتيك الأناقة', img: '🕶️' }
    ];

    const DeliverySettings = {
        zones: [
            { name: 'الجزائر (العاصمة)', price: 400, days: '24 ساعة' },
            { name: 'ولايات الوسط', price: 600, days: '1-2 أيام' },
            { name: 'ولايات الشرق/الغرب', price: 800, days: '2-4 أيام' },
            { name: 'ولايات الجنوب', price: 1200, days: '3-6 أيام' }
        ],
        companies: [
            { name: 'ناردو برو', icon: '🚀', price: 0 },
            { name: 'ياليدين إكسبرس', icon: '📦', price: 100 }
        ]
    };

    let cart = [];

    /* ========================================== */
    /* 2. إدارة السلة وعرض المنتجات */
    /* ========================================== */

    function initStore() {
        const grid = document.getElementById('mainProducts');
        productsData.forEach(p => {
            grid.innerHTML += `
                <div class="product-card">
                    <span class="merchant-badge">${p.merchant}</span>
                    <div style="font-size:50px; text-align:center;">${p.img}</div>
                    <h3>${p.name}</h3>
                    <p style="color:var(--gold); font-weight:bold;">${p.price.toLocaleString()} دج</p>
                    <button class="btn-add" onclick="addToCart(${p.id})">أضف للسلة</button>
                </div>
            `;
        });
    }

    window.addToCart = function(id) {
        const product = productsData.find(p => p.id === id);
        const existing = cart.find(item => item.id === id);
        
        if (existing) {
            existing.quantity++;
        } else {
            cart.push({ ...product, quantity: 1 });
        }
        updateCartUI();
        showNotification(`تم إضافة ${product.name}`, 'success');
    };

    function updateCartUI() {
        const list = document.getElementById('cartItems');
        const totalEl = document.getElementById('cartTotal');
        list.innerHTML = '';
        let total = 0;

        cart.forEach(item => {
            total += (item.price * item.quantity);
            list.innerHTML += `
                <div class="cart-item">
                    <span>${item.name} (x${item.quantity})</span>
                    <span>${(item.price * item.quantity).toLocaleString()} دج</span>
                </div>
            `;
        });
        totalEl.innerText = `الإجمالي: ${total.toLocaleString()} دج`;
    }

    /* ========================================== */
    /* 3. نظام التوصيل والتلغرام */
    /* ========================================== */

    window.showDeliveryCheckout = function() {
        if (cart.length === 0) return showNotification('السلة فارغة!', 'error');

        // إنشاء نافذة المودال برمجياً
        const modal = document.createElement('div');
        modal.id = 'checkoutModal';
        modal.style.cssText = `position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:10000; display:flex; justify-content:center; align-items:center;`;
        
        let zonesOptions = DeliverySettings.zones.map(z => `<option value="${z.name}|${z.price}|${z.days}">${z.name} (${z.price} دج)</option>`).join('');

        modal.innerHTML = `
            <div style="background:var(--soft-blue); padding:30px; border-radius:20px; width:90%; max-width:500px; border:1px solid var(--gold); max-height:90vh; overflow-y:auto;">
                <h2 style="color:var(--gold); text-align:center;">إتمام الطلب</h2>
                <input type="text" id="custName" placeholder="الاسم الكامل" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:none;">
                <input type="tel" id="custPhone" placeholder="رقم الهاتف (05/06/07)" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:none;">
                <select id="custZone" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px;">${zonesOptions}</select>
                <textarea id="custAddr" placeholder="العنوان بالتفصيل" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; height:80px;"></textarea>
                
                <div id="finalSummary" style="background:rgba(255,255,255,0.05); padding:15px; border-radius:10px; margin-bottom:15px;"></div>

                <div style="display:flex; gap:10px;">
                    <button onclick="document.getElementById('checkoutModal').remove()" style="flex:1; padding:12px; border-radius:8px; background:#666; color:white; border:none; cursor:pointer;">إلغاء</button>
                    <button onclick="processFinalOrder()" style="flex:2; padding:12px; border-radius:8px; background:var(--gold); color:#000; border:none; font-weight:bold; cursor:pointer;">تأكيد وإرسال</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
    };

    async function processFinalOrder() {
        const name = document.getElementById('custName').value;
        const phone = document.getElementById('custPhone').value;
        const address = document.getElementById('custAddr').value;
        const zoneData = document.getElementById('custZone').value.split('|');

        if (!name || !phone || !address) return showNotification('يرجى ملء كافة البيانات', 'error');
        if (!/^(0)(5|6|7)[0-9]{8}$/.test(phone)) return showNotification('رقم الهاتف غير صحيح', 'error');

        const orderId = 'ORD-' + Math.floor(Math.random()*90000 + 10000);
        const shipping = parseInt(zoneData[1]);
        const subtotal = cart.reduce((sum, i) => sum + (i.price * i.quantity), 0);
        const total = subtotal + shipping;

        showNotification('جاري معالجة الطلب...', 'info');

        // 1. تجميع البيانات للتلغرام
        let productLines = cart.map(i => `• ${i.name} (${i.quantity}) - ${i.merchant}`).join('\n');
        
        const message = `
👑 <b>طلب جديد #${orderId}</b>
━━━━━━━━━━━━━━
👤 <b>الزبون:</b> ${name}
📞 <b>الهاتف:</b> ${phone}
📍 <b>العنوان:</b> ${address}
🗺️ <b>المنطقة:</b> ${zoneData[0]}
━━━━━━━━━━━━━━
📦 <b>المنتجات:</b>
${productLines}
━━━━━━━━━━━━━━
💰 <b>الإجمالي:</b> ${total} دج
        `;

        // 2. الإرسال للتلغرام
        const success = await sendToTelegram(message);

        if (success) {
            // حفظ الطلب محلياً للتتبع
            saveOrderLocally({id: orderId, total: total, timestamp: new Date()});
            
            // تنظيف السلة
            cart = [];
            updateCartUI();
            document.getElementById('checkoutModal').remove();
            
            showNotification('تم إرسال طلبك بنجاح!', 'success');
            alert(`شكراً لك! رقم طلبك هو: ${orderId}\nسيتم الاتصال بك قريباً.`);
        } else {
            showNotification('خطأ في الاتصال بالخادم', 'error');
        }
    }

    async function sendToTelegram(text) {
        try {
            const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_CONFIG.botToken}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    chat_id: TELEGRAM_CONFIG.channelId,
                    text: text,
                    parse_mode: 'HTML'
                })
            });
            return response.ok;
        } catch (e) { return false; }
    }

    /* ========================================== */
    /* 4. دوال إضافية (تنبيهات وتتبع) */
    /* ========================================== */

    function showNotification(msg, type) {
        const n = document.getElementById('notifier');
        n.innerText = msg;
        n.style.display = 'block';
        n.style.backgroundColor = type === 'success' ? '#10b981' : (type === 'error' ? '#f87171' : '#3b82f6');
        setTimeout(() => n.style.display = 'none', 3000);
    }

    function saveOrderLocally(order) {
        let history = JSON.parse(localStorage.getItem('my_orders') || '[]');
        history.unshift(order);
        localStorage.setItem('my_orders', JSON.stringify(history.slice(0, 10)));
    }

    window.viewMyOrders = function() {
        const history = JSON.parse(localStorage.getItem('my_orders') || '[]');
        if (history.length === 0) return alert('لا توجد طلبات سابقة مسجلة على هذا الجهاز.');
        
        let txt = 'آخر طلباتك:\n\n';
        history.forEach(o => {
            txt += `📦 #${o.id} | إجمالي: ${o.total} دج\n`;
        });
        alert(txt);
    };

    // التشغيل عند التحميل
    window.onload = initStore;

</script>

</body>
</html>
