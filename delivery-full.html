<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ناردو برو - النظام الموحد</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --bg: #0f3460; --card-bg: #16213e; --text: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); direction: rtl; min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .card { background: var(--card-bg); border: 1px solid rgba(255, 215, 0, 0.3); border-radius: 15px; padding: 25px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        h1, h2 { color: var(--gold); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .btn { padding: 12px 24px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-family: 'Cairo'; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4); }
        .btn-info { background: #17a2b8; color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-success { background: #28a745; color: white; }
        .input-group { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 20px; }
        input, select { padding: 12px; border-radius: 10px; border: 1px solid rgba(255, 215, 0, 0.3); background: rgba(0,0,0,0.2); color: white; font-family: 'Cairo'; width: 100%; }
        input:focus { border-color: var(--gold); outline: none; }
        .filter-section { display: flex; gap: 15px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; overflow: hidden; border-radius: 10px; }
        th, td { padding: 15px; text-align: center; border-bottom: 1px solid rgba(255, 215, 0, 0.1); }
        th { background: rgba(255, 215, 0, 0.1); color: var(--gold); font-weight: 700; }
        tr:hover { background: rgba(255, 255, 255, 0.03); }
        .status-bar { background: rgba(0,0,0,0.3); padding: 10px 20px; border-radius: 10px; color: var(--gold); font-weight: bold; margin-top: 10px; text-align: center; }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .badge-delivery { background: #28a745; color: white; }
        .badge-distributor { background: #007bff; color: white; }
        .badge-both { background: #6f42c1; color: white; }
        .link-input { display: flex; gap: 10px; margin-top: 10px; }
        .link-input input { flex: 3; }
        .link-input button { flex: 1; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1><i class="fas fa-shuttle-van"></i> ناردو برو | النظام الموحد</h1>
        <div style="display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;">
            <button class="btn btn-gold" onclick="exportToTelegram()"><i class="fab fa-telegram-plane"></i> تصدير للقناة</button>
            <button class="btn btn-info" onclick="fetchPinnedFromChannel()"><i class="fas fa-thumbtack"></i> جلب المثبتة</button>
            <button class="btn btn-success" onclick="fetchFromIndex()"><i class="fas fa-link"></i> جلب من الفهرس (3619)</button>
            <button class="btn btn-danger" onclick="clearAll()"><i class="fas fa-trash-alt"></i> مسح الكل</button>
        </div>
        <div class="link-input">
            <input type="text" id="customLink" placeholder="أدخل معرف الرسالة (مثال: 3628 أو 3619)">
            <button class="btn btn-info" onclick="fetchFromCustomMessage()"><i class="fas fa-search"></i> جلب من معرف مخصص</button>
        </div>
        <div id="status" class="status-bar">جاهز للعمل</div>
    </div>

    <div class="card">
        <h2><i class="fas fa-plus-circle"></i> إضافة موزع جديد</h2>
        <div class="input-group">
            <input type="text" id="compName" placeholder="اسم الموزع">
            <input type="text" id="mgrName" placeholder="اسم المسؤول">
            <input type="text" id="phone" placeholder="رقم الهاتف">
            <select id="type">
                <option value="delivery">توصيل (delivery)</option>
                <option value="distributor">موزع (distributor)</option>
                <option value="both">كليهما (both)</option>
            </select>
            <input type="text" id="state" placeholder="الولاية (مثال: الجزائر)">
            <button class="btn btn-gold" onclick="addDistributor()" style="grid-column: span 1;">إضافة للجدول</button>
        </div>
    </div>

    <div class="card">
        <h2><i class="fas fa-table"></i> جدول الموزعين</h2>
        <div class="filter-section">
            <span><i class="fas fa-filter"></i> فلترة حسب الولاية:</span>
            <select id="stateFilter" onchange="updateTable()" style="max-width: 250px;">
                <option value="all">كل الولايات</option>
            </select>
            <span id="countDisplay" style="margin-right: auto; color: var(--gold);">العدد: 0</span>
        </div>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>الموزع</th>
                        <th>المسؤول</th>
                        <th>الهاتف</th>
                        <th>النوع</th>
                        <th>الولاية</th>
                        <th>إجراء</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const BOT_TOKEN = '8576673096:AAGvSMjzwVWj6wJ47JdqiDwcObXjBDcyiLA';
    const CHANNEL_ID = '-1003822964890';
    const KEYWORD = '📋 قائمة الموزعين حسب كل ولاية';
    const INDEX_MESSAGE_ID = 3619;

    let distributors = [];

    // ========== دوال الجدول ==========
    function updateTable() {
        const tbody = document.getElementById('tableBody');
        const filter = document.getElementById('stateFilter').value;
        
        const filtered = filter === 'all' ? distributors : distributors.filter(d => d.state === filter);
        
        document.getElementById('countDisplay').innerText = `العدد: ${filtered.length}`;

        if (filtered.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7">لا توجد بيانات حالياً</td></tr>';
            return;
        }

        tbody.innerHTML = filtered.map((d, i) => `
            <tr>
                <td>${i+1}</td>
                <td>${escapeHtml(d.company)}</td>
                <td>${escapeHtml(d.manager || '')}</td>
                <td>${escapeHtml(d.phone)}</td>
                <td><span class="badge badge-${d.type}">${d.type === 'delivery' ? 'توصيل' : (d.type === 'distributor' ? 'موزع' : 'كليهما')}</span></td>
                <td>${escapeHtml(d.state)}</td>
                <td><button class="btn btn-danger" style="padding: 5px 10px;" onclick="deleteItem(${distributors.indexOf(d)})"><i class="fas fa-trash"></i></button></td>
            </tr>
        `).join('');
        
        updateFilterOptions();
    }

    function updateFilterOptions() {
        const filterSelect = document.getElementById('stateFilter');
        const currentVal = filterSelect.value;
        const states = [...new Set(distributors.map(d => d.state))];
        
        filterSelect.innerHTML = '<option value="all">كل الولايات</option>' + 
            states.map(s => `<option value="${s}" ${s === currentVal ? 'selected' : ''}>${escapeHtml(s)}</option>`).join('');
    }

    function addDistributor() {
        const company = document.getElementById('compName').value;
        const manager = document.getElementById('mgrName').value;
        const phone = document.getElementById('phone').value;
        const type = document.getElementById('type').value;
        const state = document.getElementById('state').value;

        if (company && state && phone) {
            distributors.push({ company, manager, phone, type, state });
            updateTable();
            document.getElementById('compName').value = '';
            document.getElementById('mgrName').value = '';
            document.getElementById('phone').value = '';
            document.getElementById('state').value = '';
            showStatus('✅ تم إضافة الموزع بنجاح');
        } else {
            alert('يرجى إدخال اسم الموزع والولاية والهاتف');
        }
    }

    function deleteItem(index) {
        distributors.splice(index, 1);
        updateTable();
        showStatus('🗑️ تم حذف الموزع');
    }

    function clearAll() {
        if (confirm('هل أنت متأكد من مسح جميع البيانات؟')) {
            distributors = [];
            updateTable();
            showStatus('🗑️ تم مسح الكل');
        }
    }

    // ========== دوال جلب البيانات الموحدة ==========
    
    // الدالة الرئيسية لجلب أي رسالة
    async function fetchMessage(messageId) {
        showStatus(`⏳ جاري جلب الرسالة ${messageId}...`);
        
        try {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/getMessage?chat_id=${CHANNEL_ID}&message_id=${messageId}`;
            const res = await fetch(url);
            const data = await res.json();
            
            if (!data.ok) {
                showStatus(`❌ فشل جلب الرسالة: ${data.description}`);
                return false;
            }
            
            const text = data.result.text;
            console.log('نص الرسالة:', text);
            
            // محاولة تحليل النص بجميع التنسيقات
            const parsed = parseUniversalFormat(text);
            
            if (parsed.length > 0) {
                distributors = parsed;
                updateTable();
                showStatus(`✅ تم جلب ${parsed.length} موزع من الرسالة ${messageId}`);
                return true;
            } else {
                showStatus(`⚠️ لم يتم العثور على بيانات في الرسالة ${messageId}`);
                return false;
            }
            
        } catch (e) {
            showStatus(`❌ خطأ: ${e.message}`);
            return false;
        }
    }
    
    // دالة تحليل موحدة لجميع التنسيقات
    function parseUniversalFormat(text) {
        const result = [];
        const lines = text.split('\n');
        
        // التنسيق 1: ولاية|اسم|هاتف|نوع  أو  ولاية|اسم|مسؤول|هاتف|نوع
        for (let line of lines) {
            line = line.trim();
            
            if (line.includes('|')) {
                const parts = line.split('|');
                if (parts.length >= 4) {
                    result.push({
                        company: parts[1]?.trim() || '',
                        manager: parts[2]?.trim() || '',
                        phone: parts[2]?.trim() || parts[3]?.trim() || '',
                        type: parts[3]?.trim() || parts[4]?.trim() || 'delivery',
                        state: parts[0]?.trim() || ''
                    });
                }
                continue;
            }
        }
        
        // إذا وجدنا بيانات بالتنسيق الأول، نرجعها
        if (result.length > 0) return result;
        
        // التنسيق 2: التنسيق القديم (📍 ولاية ...)
        if (text.includes('📍 ولاية')) {
            const sections = text.split('📍 ولاية ');
            
            for (let section of sections.slice(1)) {
                const lines2 = section.split('\n');
                const stateName = lines2[0].split(' - ')[0].trim();
                
                for (let i = 1; i < lines2.length; i++) {
                    if (lines2[i].startsWith('• ')) {
                        const compLine = lines2[i].substring(2);
                        const company = compLine.split(' (')[0];
                        const typeMatch = compLine.match(/\(([^)]+)\)/);
                        const type = typeMatch ? typeMatch[1] : 'delivery';
                        
                        const infoLine = lines2[i+1] || '';
                        const manager = infoLine.includes('👤 ') ? infoLine.split('👤 ')[1].split(' |')[0] : '';
                        const phone = infoLine.includes('📞 ') ? infoLine.split('📞 ')[1] : '';
                        
                        result.push({ company, manager, phone, type, state: stateName });
                        i++;
                    }
                }
            }
            
            if (result.length > 0) return result;
        }
        
        // التنسيق 3: سطور بسيطة (اسم - هاتف - ولاية)
        for (let line of lines) {
            line = line.trim();
            if (line.includes('-') && !line.startsWith('📍') && !line.startsWith('•')) {
                const parts = line.split('-');
                if (parts.length >= 2) {
                    result.push({
                        company: parts[0]?.trim() || '',
                        manager: '',
                        phone: parts[1]?.trim() || '',
                        type: 'delivery',
                        state: parts[2]?.trim() || 'غير محدد'
                    });
                }
            }
        }
        
        return result;
    }
    
    // ========== دوال التصدير ==========
    async function exportToTelegram() {
        if (distributors.length === 0) {
            alert('لا توجد بيانات للتصدير');
            return;
        }
        
        showStatus('⏳ جاري التصدير...');
        
        let text = `${KEYWORD}\n━━━━━━━━━━━━━━━━━━\n`;
        const states = [...new Set(distributors.map(d => d.state))];
        
        states.forEach(state => {
            const stateItems = distributors.filter(d => d.state === state);
            text += `📍 ولاية ${state} - العدد: ${stateItems.length}\n`;
            stateItems.forEach(d => {
                text += `• ${d.company} (${d.type})\n  👤 ${d.manager} | 📞 ${d.phone}\n`;
            });
            text += `\n`;
        });

        try {
            const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHANNEL_ID, text: text })
            });
            const data = await res.json();
            if (data.ok) showStatus('✅ تم الإرسال للقناة بنجاح');
            else showStatus('❌ فشل الإرسال');
        } catch (e) { showStatus('❌ خطأ في الاتصال'); }
    }
    
    // جلب الرسالة المثبتة
    async function fetchPinnedFromChannel() {
        showStatus('⏳ جاري جلب الرسالة المثبتة...');
        try {
            const chatRes = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getChat?chat_id=${CHANNEL_ID}`);
            const chatData = await chatRes.json();
            
            if (chatData.ok && chatData.result.pinned_message) {
                const pinnedMsg = chatData.result.pinned_message;
                const messageId = pinnedMsg.message_id;
                await fetchMessage(messageId);
            } else {
                showStatus('❌ لا توجد رسالة مثبتة في هذه القناة');
            }
        } catch (e) {
            showStatus('❌ خطأ في الاتصال بالتليجرام');
        }
    }
    
    // جلب من الفهرس المحدد (3619)
    async function fetchFromIndex() {
        await fetchMessage(INDEX_MESSAGE_ID);
    }
    
    // جلب من معرف مخصص
    async function fetchFromCustomMessage() {
        const input = document.getElementById('customLink').value;
        const messageId = parseInt(input);
        
        if (isNaN(messageId)) {
            alert('يرجى إدخال معرف رسالة صحيح (أرقام فقط)');
            return;
        }
        
        await fetchMessage(messageId);
    }
    
    function showStatus(msg) { 
        document.getElementById('status').innerHTML = msg; 
    }
    
    function escapeHtml(text) {
        if (!text) return '';
        return text.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    updateTable();
    showStatus('✅ النظام الموحد جاهز - اختر طريقة الجلب');
</script>
</body>
</html>
