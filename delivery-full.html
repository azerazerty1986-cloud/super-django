<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ناردو برو - نظام الجهات والفهرس</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --bg: #0f3460; --card-bg: #16213e; --text: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); direction: rtl; min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .card { background: var(--card-bg); border: 1px solid rgba(255, 215, 0, 0.3); border-radius: 15px; padding: 25px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        h1, h2 { color: var(--gold); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .btn { padding: 12px 24px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-family: 'Cairo'; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4); }
        .btn-info { background: #17a2b8; color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-success { background: #28a745; color: white; }
        .btn-primary { background: #007bff; color: white; }
        .input-group { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 20px; }
        input, select { padding: 12px; border-radius: 10px; border: 1px solid rgba(255, 215, 0, 0.3); background: rgba(0,0,0,0.2); color: white; font-family: 'Cairo'; width: 100%; }
        input:focus { border-color: var(--gold); outline: none; }
        .filter-section { display: flex; gap: 15px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; overflow: hidden; border-radius: 10px; }
        th, td { padding: 15px; text-align: center; border-bottom: 1px solid rgba(255, 215, 0, 0.1); }
        th { background: rgba(255, 215, 0, 0.1); color: var(--gold); font-weight: 700; }
        tr:hover { background: rgba(255, 255, 255, 0.03); }
        .status-bar { background: rgba(0,0,0,0.3); padding: 10px 20px; border-radius: 10px; color: var(--gold); font-weight: bold; margin-top: 10px; text-align: center; }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .badge-delivery { background: #28a745; color: white; }
        .badge-distributor { background: #007bff; color: white; }
        .badge-both { background: #6f42c1; color: white; }
        .region-btn { background: rgba(255,215,0,0.2); border: 1px solid var(--gold); padding: 8px 15px; border-radius: 20px; cursor: pointer; transition: 0.3s; }
        .region-btn:hover { background: var(--gold); color: #000; }
        .region-btn.active { background: var(--gold); color: #000; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1><i class="fas fa-shuttle-van"></i> ناردو برو | نظام الجهات والفهرس</h1>
        <div style="display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;">
            <button class="btn btn-gold" onclick="exportToTelegram()"><i class="fab fa-telegram-plane"></i> تصدير للقناة</button>
            <button class="btn btn-info" onclick="fetchAllFromIndex()"><i class="fas fa-thumbtack"></i> جلب الكل عبر الفهرس</button>
            <button class="btn btn-success" onclick="createIndexMessage()"><i class="fas fa-plus"></i> إنشاء فهرس جديد</button>
            <button class="btn btn-primary" onclick="fetchByRegion()"><i class="fas fa-map-marker-alt"></i> جلب حسب الجهة</button>
            <button class="btn btn-danger" onclick="clearAll()"><i class="fas fa-trash-alt"></i> مسح الكل</button>
        </div>
        <div id="status" class="status-bar">جاهز للعمل</div>
    </div>

    <div class="card">
        <h2><i class="fas fa-map"></i> اختر الجهة</h2>
        <div style="display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; margin-bottom: 20px;">
            <button class="region-btn" onclick="filterByRegion('north')">🔼 الشمال</button>
            <button class="region-btn" onclick="filterByRegion('south')">🔽 الجنوب</button>
            <button class="region-btn" onclick="filterByRegion('east')">▶️ الشرق</button>
            <button class="region-btn" onclick="filterByRegion('west')">◀️ الغرب</button>
            <button class="region-btn" onclick="filterByRegion('all')">🌍 الكل</button>
        </div>
    </div>

    <div class="card">
        <h2><i class="fas fa-plus-circle"></i> إضافة موزع جديد</h2>
        <div class="input-group">
            <input type="text" id="compName" placeholder="اسم الموزع">
            <input type="text" id="mgrName" placeholder="اسم المسؤول">
            <input type="text" id="phone" placeholder="رقم الهاتف">
            <select id="type">
                <option value="delivery">توصيل</option>
                <option value="distributor">موزع</option>
                <option value="both">كليهما</option>
            </select>
            <input type="text" id="state" placeholder="الولاية (Alg, Oran...)">
            <select id="region">
                <option value="north">الشمال</option>
                <option value="south">الجنوب</option>
                <option value="east">الشرق</option>
                <option value="west">الغرب</option>
            </select>
            <button class="btn btn-gold" onclick="addDistributor()" style="grid-column: span 1;">إضافة للجدول</button>
        </div>
    </div>

    <div class="card">
        <h2><i class="fas fa-table"></i> جدول الموزعين</h2>
        <div class="filter-section">
            <span><i class="fas fa-filter"></i> فلترة حسب الولاية:</span>
            <select id="stateFilter" onchange="updateTable()" style="max-width: 250px;">
                <option value="all">كل الولايات</option>
            </select>
            <span id="countDisplay" style="margin-right: auto; color: var(--gold);">العدد: 0</span>
        </div>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>الموزع</th>
                        <th>المسؤول</th>
                        <th>الهاتف</th>
                        <th>النوع</th>
                        <th>الولاية</th>
                        <th>الجهة</th>
                        <th>إجراء</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const BOT_TOKEN = '8576673096:AAGvSMjzwVWj6wJ47JdqiDwcObXjBDcyiLA';
    const CHANNEL_ID = '-1003822964890';
    const KEYWORD = '📋 فهرس الموزعين حسب الجهات';
    
    let distributors = [];
    let currentRegion = 'all';
    
    // تصنيف الولايات حسب الجهات
    const regionStates = {
        north: ['Alg', 'Tip', 'Bli', 'Bou', 'Tiz', 'Bba'],
        south: ['Ora', 'Adr', 'Ill', 'Tam', 'Gha', 'ElO'],
        east: ['Con', 'Ann', 'Set', 'Bat', 'Jij', 'Skik'],
        west: ['Tle', 'Msc', 'Sbl', 'Rel', 'Mgh', 'Tiss']
    };
    
    // تحديث الجدول
    function updateTable() {
        const tbody = document.getElementById('tableBody');
        const filter = document.getElementById('stateFilter').value;
        
        let filtered = filter === 'all' ? distributors : distributors.filter(d => d.state === filter);
        
        if (currentRegion !== 'all') {
            filtered = filtered.filter(d => d.region === currentRegion);
        }
        
        document.getElementById('countDisplay').innerText = `العدد: ${filtered.length}`;

        if (filtered.length === 0) {
            tbody.innerHTML = '<tr><td colspan="8">لا توجد بيانات حالياً</td></tr>';
            return;
        }

        tbody.innerHTML = filtered.map((d, i) => `
            <tr>
                <td>${i+1}</td>
                <td>${d.company}</td>
                <td>${d.manager}</td>
                <td>${d.phone}</td>
                <td><span class="badge badge-${d.type}">${d.type}</span></td>
                <td>${d.state}</td>
                <td>${getRegionName(d.region)}</td>
                <td><button class="btn btn-danger" style="padding: 5px 10px;" onclick="deleteItem(${getOriginalIndex(d)})"><i class="fas fa-trash"></i></button></td>
            </tr>
        `).join('');
        
        updateFilterOptions();
    }
    
    function getRegionName(region) {
        const names = { north: 'الشمال', south: 'الجنوب', east: 'الشرق', west: 'الغرب' };
        return names[region] || region;
    }
    
    function getOriginalIndex(item) {
        return distributors.findIndex(d => d.company === item.company && d.phone === item.phone);
    }
    
    function updateFilterOptions() {
        const filterSelect = document.getElementById('stateFilter');
        const currentVal = filterSelect.value;
        const states = [...new Set(distributors.map(d => d.state))];
        
        filterSelect.innerHTML = '<option value="all">كل الولايات</option>' + 
            states.map(s => `<option value="${s}" ${s === currentVal ? 'selected' : ''}>${s}</option>`).join('');
    }
    
    function filterByRegion(region) {
        currentRegion = region;
        
        // تحديث الشكل النشط للأزرار
        document.querySelectorAll('.region-btn').forEach(btn => {
            btn.classList.remove('active');
        });
        event.target.classList.add('active');
        
        updateTable();
        showStatus(`📌 عرض: ${getRegionName(region)}`);
    }
    
    function addDistributor() {
        const company = document.getElementById('compName').value;
        const manager = document.getElementById('mgrName').value;
        const phone = document.getElementById('phone').value;
        const type = document.getElementById('type').value;
        const state = document.getElementById('state').value;
        const region = document.getElementById('region').value;
        
        if (company && state) {
            distributors.push({ company, manager, phone, type, state, region });
            updateTable();
            document.getElementById('compName').value = '';
            document.getElementById('mgrName').value = '';
            document.getElementById('phone').value = '';
            document.getElementById('state').value = '';
            showStatus('✅ تم إضافة الموزع بنجاح');
        } else {
            alert('يرجى إدخال اسم الموزع والولاية');
        }
    }
    
    function deleteItem(index) {
        distributors.splice(index, 1);
        updateTable();
        showStatus('🗑️ تم حذف الموزع');
    }
    
    function clearAll() {
        if (confirm('هل أنت متأكد من مسح جميع البيانات؟')) {
            distributors = [];
            updateTable();
            showStatus('🗑️ تم مسح الكل');
        }
    }
    
    // إنشاء رسالة الفهرس حسب الجهات
    async function createIndexMessage() {
        if (distributors.length === 0) {
            alert('لا توجد بيانات لإنشاء الفهرس');
            return;
        }
        
        showStatus('⏳ جاري إنشاء فهرس الجهات...');
        
        // تجميع الموزعين حسب الجهة
        const regionsData = {
            north: distributors.filter(d => d.region === 'north'),
            south: distributors.filter(d => d.region === 'south'),
            east: distributors.filter(d => d.region === 'east'),
            west: distributors.filter(d => d.region === 'west')
        };
        
        const messageIds = {};
        
        // إنشاء رسالة لكل جهة
        for (let [region, data] of Object.entries(regionsData)) {
            if (data.length === 0) continue;
            
            let content = `📋 موزعين ${getRegionName(region)}\n━━━━━━━━━━━━━━━━━━\n`;
            content += `📊 العدد: ${data.length}\n\n`;
            
            data.forEach(d => {
                content += `${d.state}|${d.company}|${d.manager}|${d.phone}|${d.type}\n`;
            });
            
            const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHANNEL_ID, text: content })
            });
            
            const result = await response.json();
            if (result.ok) {
                messageIds[region] = result.result.message_id;
                showStatus(`✅ تم إنشاء رسالة ${getRegionName(region)} (${data.length} موزع)`);
            }
        }
        
        // إنشاء رسالة الفهرس
        let indexContent = `${KEYWORD}\n━━━━━━━━━━━━━━━━━━\n\n`;
        indexContent += `📌 آخر تحديث: ${new Date().toLocaleString()}\n`;
        indexContent += `📊 إجمالي الموزعين: ${distributors.length}\n\n`;
        indexContent += `📍 فهرس الجهات:\n`;
        indexContent += `🔼 الشمال → رسالة رقم: ${messageIds.north || 'لا يوجد'}\n`;
        indexContent += `🔽 الجنوب → رسالة رقم: ${messageIds.south || 'لا يوجد'}\n`;
        indexContent += `▶️ الشرق → رسالة رقم: ${messageIds.east || 'لا يوجد'}\n`;
        indexContent += `◀️ الغرب → رسالة رقم: ${messageIds.west || 'لا يوجد'}\n`;
        
        const indexResponse = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: CHANNEL_ID, text: indexContent })
        });
        
        const indexData = await indexResponse.json();
        
        if (indexData.ok) {
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/pinChatMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHANNEL_ID, message_id: indexData.result.message_id })
            });
            
            localStorage.setItem('indexMessageId', indexData.result.message_id);
            showStatus(`✅ تم إنشاء وتثبيت فهرس الجهات`);
        }
    }
    
    // جلب كل البيانات من الفهرس
    async function fetchAllFromIndex() {
        showStatus('⏳ جاري جلب البيانات من فهرس الجهات...');
        
        try {
            const chatRes = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getChat?chat_id=${CHANNEL_ID}`);
            const chatData = await chatRes.json();
            
            if (!chatData.ok || !chatData.result.pinned_message) {
                showStatus('❌ لا توجد رسالة فهرس مثبتة');
                return;
            }
            
            const pinnedMsgId = chatData.result.pinned_message.message_id;
            
            const msgRes = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getMessage?chat_id=${CHANNEL_ID}&message_id=${pinnedMsgId}`);
            const msgData = await msgRes.json();
            
            if (!msgData.ok) {
                showStatus('❌ فشل جلب رسالة الفهرس');
                return;
            }
            
            // استخراج معرفات الرسائل من الفهرس
            const text = msgData.result.text;
            const messageIds = {};
            const lines = text.split('\n');
            
            for (let line of lines) {
                let match = line.match(/الشمال → رسالة رقم:\s*(\d+)/);
                if (match) messageIds.north = parseInt(match[1]);
                
                match = line.match(/الجنوب → رسالة رقم:\s*(\d+)/);
                if (match) messageIds.south = parseInt(match[1]);
                
                match = line.match(/الشرق → رسالة رقم:\s*(\d+)/);
                if (match) messageIds.east = parseInt(match[1]);
                
                match = line.match(/الغرب → رسالة رقم:\s*(\d+)/);
                if (match) messageIds.west = parseInt(match[1]);
            }
            
            // جلب كل رسائل الجهات
            let allDistributors = [];
            
            for (let [region, id] of Object.entries(messageIds)) {
                if (!id) continue;
                
                const distRes = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getMessage?chat_id=${CHANNEL_ID}&message_id=${id}`);
                const distData = await distRes.json();
                
                if (distData.ok && distData.result.text) {
                    const content = distData.result.text;
                    const lines2 = content.split('\n');
                    
                    for (let line of lines2) {
                        if (line.includes('|') && !line.startsWith('📋') && !line.startsWith('━━') && !line.startsWith('📊')) {
                            const parts = line.split('|');
                            if (parts.length >= 5) {
                                allDistributors.push({
                                    state: parts[0],
                                    company: parts[1],
                                    manager: parts[2],
                                    phone: parts[3],
                                    type: parts[4],
                                    region: region
                                });
                            }
                        }
                    }
                    showStatus(`✅ جلب ${getRegionName(region)}: ${allDistributors.length} موزع حتى الآن`);
                }
            }
            
            if (allDistributors.length > 0) {
                distributors = allDistributors;
                updateTable();
                showStatus(`✅ تم جلب ${allDistributors.length} موزع من جميع الجهات`);
            } else {
                showStatus('⚠️ لم يتم العثور على بيانات');
            }
            
        } catch (e) {
            showStatus('❌ خطأ في الاتصال: ' + e.message);
        }
    }
    
    // جلب حسب جهة محددة فقط
    async function fetchByRegion() {
        const region = prompt('أدخل اسم الجهة (north, south, east, west):');
        if (!region || !['north', 'south', 'east', 'west'].includes(region)) {
            alert('جهة غير صحيحة');
            return;
        }
        
        showStatus(`⏳ جاري جلب موزعين ${getRegionName(region)}...`);
        
        try {
            const chatRes = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getChat?chat_id=${CHANNEL_ID}`);
            const chatData = await chatRes.json();
            
            if (!chatData.ok || !chatData.result.pinned_message) {
                showStatus('❌ لا توجد رسالة فهرس');
                return;
            }
            
            const msgRes = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getMessage?chat_id=${CHANNEL_ID}&message_id=${chatData.result.pinned_message.message_id}`);
            const msgData = await msgRes.json();
            
            const text = msgData.result.text;
            let messageId = null;
            
            if (region === 'north') {
                const match = text.match(/الشمال → رسالة رقم:\s*(\d+)/);
                messageId = match ? parseInt(match[1]) : null;
            } else if (region === 'south') {
                const match = text.match(/الجنوب → رسالة رقم:\s*(\d+)/);
                messageId = match ? parseInt(match[1]) : null;
            } else if (region === 'east') {
                const match = text.match(/الشرق → رسالة رقم:\s*(\d+)/);
                messageId = match ? parseInt(match[1]) : null;
            } else if (region === 'west') {
                const match = text.match(/الغرب → رسالة رقم:\s*(\d+)/);
                messageId = match ? parseInt(match[1]) : null;
            }
            
            if (!messageId) {
                showStatus(`❌ لا توجد بيانات لجهة ${getRegionName(region)}`);
                return;
            }
            
            const distRes = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getMessage?chat_id=${CHANNEL_ID}&message_id=${messageId}`);
            const distData = await distRes.json();
            
            if (distData.ok && distData.result.text) {
                const content = distData.result.text;
                const lines = content.split('\n');
                const regionDistributors = [];
                
                for (let line of lines) {
                    if (line.includes('|') && !line.startsWith('📋') && !line.startsWith('━━') && !line.startsWith('📊')) {
                        const parts = line.split('|');
                        if (parts.length >= 5) {
                            regionDistributors.push({
                                state: parts[0],
                                company: parts[1],
                                manager: parts[2],
                                phone: parts[3],
                                type: parts[4],
                                region: region
                            });
                        }
                    }
                }
                
                if (regionDistributors.length > 0) {
                    distributors = regionDistributors;
                    currentRegion = region;
                    updateTable();
                    showStatus(`✅ تم جلب ${regionDistributors.length} موزع من ${getRegionName(region)}`);
                }
            }
            
        } catch (e) {
            showStatus('❌ خطأ في الاتصال');
        }
    }
    
    function showStatus(msg) { 
        document.getElementById('status').innerText = msg; 
        setTimeout(() => {
            if (document.getElementById('status').innerText === msg) {
                document.getElementById('status').innerText = 'جاهز للعمل';
            }
        }, 3000);
    }
    
    async function exportToTelegram() {
        if (distributors.length === 0) {
            alert('لا توجد بيانات للتصدير');
            return;
        }
        await createIndexMessage();
    }
    
    updateTable();
    showStatus('✅ النظام جاهز - اختر جهة أو اضغط "جلب الكل عبر الفهرس"');
</script>
</body>
</html>
