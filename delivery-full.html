<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ناردو برو - جلب تلقائي عبر رابط الفهرس</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --bg: #0f3460; --card-bg: #16213e; --text: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); direction: rtl; min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .card { background: var(--card-bg); border: 1px solid rgba(255, 215, 0, 0.3); border-radius: 15px; padding: 25px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        h1, h2 { color: var(--gold); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .btn { padding: 12px 24px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-family: 'Cairo'; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4); }
        .btn-info { background: #17a2b8; color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-success { background: #28a745; color: white; }
        .input-group { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 20px; }
        input, select { padding: 12px; border-radius: 10px; border: 1px solid rgba(255, 215, 0, 0.3); background: rgba(0,0,0,0.2); color: white; font-family: 'Cairo'; width: 100%; }
        input:focus { border-color: var(--gold); outline: none; }
        .filter-section { display: flex; gap: 15px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; overflow: hidden; border-radius: 10px; }
        th, td { padding: 15px; text-align: center; border-bottom: 1px solid rgba(255, 215, 0, 0.1); }
        th { background: rgba(255, 215, 0, 0.1); color: var(--gold); font-weight: 700; }
        tr:hover { background: rgba(255, 255, 255, 0.03); }
        .status-bar { background: rgba(0,0,0,0.3); padding: 10px 20px; border-radius: 10px; color: var(--gold); font-weight: bold; margin-top: 10px; text-align: center; }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .badge-delivery { background: #28a745; color: white; }
        .badge-distributor { background: #007bff; color: white; }
        .badge-both { background: #6f42c1; color: white; }
        .manual-input { margin-top: 15px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 10px; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1><i class="fas fa-shuttle-van"></i> ناردو برو | إدارة الموزعين</h1>
        <div style="display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;">
            <button class="btn btn-gold" onclick="exportToTelegram()"><i class="fab fa-telegram-plane"></i> تصدير وإرسال للقناة</button>
            <button class="btn btn-info" onclick="fetchPinnedFromChannel()"><i class="fas fa-thumbtack"></i> جلب من الرسالة المثبتة</button>
            <button class="btn btn-success" onclick="clearAll()"><i class="fas fa-trash-alt"></i> مسح الكل</button>
        </div>
        <div id="status" class="status-bar">✓ جاهز للعمل | البوت مشرف في القناة</div>
    </div>

    <div class="card">
        <h2><i class="fas fa-plus-circle"></i> إضافة موزع جديد</h2>
        <div class="input-group">
            <input type="text" id="compName" placeholder="اسم الشركة">
            <input type="text" id="mgrName" placeholder="اسم المسؤول">
            <input type="text" id="phone" placeholder="رقم الهاتف">
            <select id="type">
                <option value="delivery">توصيل (delivery)</option>
                <option value="distributor">موزع (distributor)</option>
                <option value="both">كليهما (both)</option>
            </select>
            <input type="text" id="state" placeholder="الولاية (مثال: الجزائر)">
            <button class="btn btn-gold" onclick="addDistributor()" style="grid-column: span 1;">إضافة للجدول</button>
        </div>
    </div>

    <div class="card">
        <h2><i class="fas fa-table"></i> جدول الموزعين</h2>
        <div class="filter-section">
            <span><i class="fas fa-filter"></i> فلترة حسب الولاية:</span>
            <select id="stateFilter" onchange="updateTable()" style="max-width: 250px;">
                <option value="all">كل الولايات</option>
            </select>
            <span id="countDisplay" style="margin-right: auto; color: var(--gold);">العدد: 0</span>
        </div>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>الشركة</th>
                        <th>المسؤول</th>
                        <th>الهاتف</th>
                        <th>النوع</th>
                        <th>الولاية</th>
                        <th>إجراء</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <div class="card manual-input">
        <h2><i class="fas fa-keyboard"></i> إدخال يدوي (في حال فشل الجلب التلقائي)</h2>
        <textarea id="manualText" rows="10" style="width: 100%; padding: 10px; border-radius: 10px; background: #0a0a2a; color: white; border: 1px solid var(--gold);" placeholder="الصق هنا نص رسالة الموزعين..."></textarea>
        <button class="btn btn-info" onclick="loadFromManualText()" style="margin-top: 10px;"><i class="fas fa-upload"></i> تحميل من النص</button>
    </div>
</div>

<script>
    const BOT_TOKEN = '8576673096:AAGvSMjzwVWj6wJ47JdqiDwcObXjBDcyiLA';
    const CHANNEL_ID = '-1003822964890';
    const KEYWORD = '📋 قائمة الموزعين حسب كل ولاية';

    let distributors = [];

    function updateTable() {
        const tbody = document.getElementById('tableBody');
        const filter = document.getElementById('stateFilter').value;
        
        const filtered = filter === 'all' ? distributors : distributors.filter(d => d.state === filter);
        
        document.getElementById('countDisplay').innerText = `العدد: ${filtered.length}`;

        if (filtered.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7">لا توجد بيانات حالياً</td>' . '</tr>';
            return;
        }

        tbody.innerHTML = filtered.map((d, i) => `
            <tr>
                <td>${i+1}</td>
                <td>${escapeHtml(d.company)}</td>
                <td>${escapeHtml(d.manager)}</td>
                <td>${escapeHtml(d.phone)}</td>
                <td><span class="badge badge-${d.type}">${d.type}</span></td>
                <td>${escapeHtml(d.state)}</td>
                <td><button class="btn btn-danger" style="padding: 5px 10px;" onclick="deleteItem(${distributors.indexOf(d)})"><i class="fas fa-trash"></i></button></td>
            </tr>
        `).join('');
        
        updateFilterOptions();
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function updateFilterOptions() {
        const filterSelect = document.getElementById('stateFilter');
        const currentVal = filterSelect.value;
        const states = [...new Set(distributors.map(d => d.state))];
        
        filterSelect.innerHTML = '<option value="all">كل الولايات</option>' + 
            states.map(s => `<option value="${escapeHtml(s)}" ${s === currentVal ? 'selected' : ''}>${escapeHtml(s)}</option>`).join('');
    }

    function addDistributor() {
        const company = document.getElementById('compName').value.trim();
        const manager = document.getElementById('mgrName').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const type = document.getElementById('type').value;
        const state = document.getElementById('state').value.trim();

        if (company && state) {
            distributors.push({ company, manager, phone, type, state });
            updateTable();
            document.getElementById('compName').value = '';
            document.getElementById('mgrName').value = '';
            document.getElementById('phone').value = '';
            document.getElementById('state').value = '';
            showStatus('✓ تم إضافة الموزع بنجاح');
        } else {
            alert('يرجى إدخال اسم الشركة والولاية');
        }
    }

    function deleteItem(index) {
        distributors.splice(index, 1);
        updateTable();
        showStatus('✓ تم حذف الموزع');
    }

    function clearAll() {
        if (confirm('⚠️ هل أنت متأكد من مسح جميع البيانات؟')) {
            distributors = [];
            updateTable();
            showStatus('✓ تم مسح الكل');
        }
    }

    // جلب الرابط من الرسالة المثبتة ثم جلب محتوى الرسالة المستهدفة
    async function fetchPinnedFromChannel() {
        showStatus('⏳ الخطوة 1: جلب الرسالة المثبتة من القناة...');
        
        try {
            // جلب الرسالة المثبتة
            const chatRes = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getChat?chat_id=${CHANNEL_ID}`);
            const chatData = await chatRes.json();
            
            if (!chatData.ok || !chatData.result.pinned_message) {
                showStatus('❌ لا توجد رسالة مثبتة في القناة');
                return;
            }
            
            const pinnedText = chatData.result.pinned_message.text || chatData.result.pinned_message.caption || '';
            showStatus('⏳ الخطوة 2: استخراج الرابط من الرسالة المثبتة...');
            
            // استخراج الرابط من النص
            const urlMatch = pinnedText.match(/https?:\/\/t\.me\/c\/(\d+)\/(\d+)/);
            
            if (!urlMatch) {
                showStatus('❌ لم يتم العثور على رابط صالح في الرسالة المثبتة');
                return;
            }
            
            const targetChannelId = '-100' + urlMatch[1];
            const targetMessageId = parseInt(urlMatch[2]);
            
            showStatus(`⏳ الخطوة 3: جلب محتوى الرسالة من المعرف ${targetMessageId}...`);
            
            // استخدام forwardMessage لجلب محتوى الرسالة المستهدفة
            // نرسل الرسالة إلى معرف مؤقت (نفس البوت) ثم نقرأها
            
            // أولاً: إنشاء محادثة مؤقتة مع البوت نفسه
            const botInfoRes = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getMe`);
            const botInfo = await botInfoRes.json();
            const botId = botInfo.result.id;
            
            // توجيه الرسالة إلى البوت نفسه
            const forwardRes = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/forwardMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: botId,
                    from_chat_id: targetChannelId,
                    message_id: targetMessageId
                })
            });
            
            const forwardData = await forwardRes.json();
            
            if (forwardData.ok) {
                // تم توجيه الرسالة بنجاح، الآن نجلبها
                const forwardedMessage = forwardData.result;
                const messageText = forwardedMessage.text || forwardedMessage.caption || '';
                
                if (messageText && messageText.includes(KEYWORD)) {
                    const count = parseAndLoadData(messageText);
                    showStatus(`✅ تم جلب ${count} موزع بنجاح من رابط الفهرس`);
                } else {
                    showStatus('⚠️ الرسالة المستهدفة لا تحتوي على التنسيق المطلوب');
                }
            } else {
                // إذا فشل الـ forward، نحاول طريقة بديلة: جلب عبر الرابط المباشر
                showStatus('⏳ محاولة الطريقة البديلة (جلب مباشر)...');
                await fetchDirectFromUrl(targetChannelId, targetMessageId);
            }
            
        } catch (error) {
            console.error(error);
            showStatus('❌ خطأ: ' + error.message);
        }
    }
    
    // الطريقة البديلة: الجلب المباشر عبر الرابط
    async function fetchDirectFromUrl(chatId, messageId) {
        try {
            const channelNum = chatId.replace('-100', '');
            const webUrl = `https://t.me/c/${channelNum}/${messageId}?embed=1`;
            
            // استخدام عدة خدمات proxy مختلفة
            const proxies = [
                `https://api.allorigins.win/raw?url=${encodeURIComponent(webUrl)}`,
                `https://cors-anywhere.herokuapp.com/${webUrl}`,
                `https://thingproxy.freeboard.io/fetch/${webUrl}`
            ];
            
            let html = null;
            for (const proxy of proxies) {
                try {
                    const response = await fetch(proxy, { timeout: 5000 });
                    if (response.ok) {
                        html = await response.text();
                        break;
                    }
                } catch(e) { continue; }
            }
            
            if (html) {
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const messageDiv = doc.querySelector('.tgme_widget_message_text');
                
                if (messageDiv) {
                    const messageText = messageDiv.innerText;
                    if (messageText && messageText.includes(KEYWORD)) {
                        const count = parseAndLoadData(messageText);
                        showStatus(`✅ تم جلب ${count} موزع بنجاح (طريقة بديلة)`);
                        return;
                    }
                }
            }
            
            showStatus('❌ فشل جلب المحتوى. الرجاء استخدام الإدخال اليدوي');
        } catch(e) {
            showStatus('❌ فشل الجلب. الرجاء استخدام الإدخال اليدوي');
        }
    }
    
    // تحليل النص المستخرج
    function parseAndLoadData(text) {
        const newDistributors = [];
        const lines = text.split('\n');
        
        let currentState = '';
        
        for (let i = 0; i < lines.length; i++) {
            let line = lines[i].trim();
            
            // البحث عن اسم الولاية
            if (line.includes('📍') && line.includes('ولاية')) {
                const stateMatch = line.match(/ولاية\s+(.+?)(?:\s+-|$)/);
                if (stateMatch) {
                    currentState = stateMatch[1].trim();
                }
                continue;
            }
            
            // البحث عن بيانات الموزع
            if (line.startsWith('•')) {
                const companyMatch = line.match(/•\s+(.+?)\s*\((.+?)\)/);
                if (companyMatch && currentState) {
                    const company = companyMatch[1].trim();
                    const type = companyMatch[2].trim();
                    
                    let nextLine = i + 1 < lines.length ? lines[i + 1].trim() : '';
                    let manager = '';
                    let phone = '';
                    
                    if (nextLine.includes('👤') && nextLine.includes('📞')) {
                        const managerMatch = nextLine.match(/👤\s+(.+?)\s*\|/);
                        const phoneMatch = nextLine.match(/📞\s+(.+)$/);
                        
                        if (managerMatch) manager = managerMatch[1].trim();
                        if (phoneMatch) phone = phoneMatch[1].trim();
                        
                        i++;
                    }
                    
                    newDistributors.push({
                        company: company,
                        manager: manager,
                        phone: phone,
                        type: type,
                        state: currentState
                    });
                }
            }
        }
        
        if (newDistributors.length > 0) {
            distributors = newDistributors;
            updateTable();
            return newDistributors.length;
        }
        
        return 0;
    }
    
    // الإدخال اليدوي
    function loadFromManualText() {
        const text = document.getElementById('manualText').value;
        if (!text) {
            alert('الرجاء لصق النص أولاً');
            return;
        }
        
        const count = parseAndLoadData(text);
        if (count > 0) {
            showStatus(`✅ تم تحميل ${count} موزع من النص المدخل`);
            document.getElementById('manualText').value = '';
        } else {
            showStatus('⚠️ لم يتم العثور على بيانات صالحة في النص');
        }
    }

    async function exportToTelegram() {
        if (distributors.length === 0) {
            alert('لا توجد بيانات للتصدير');
            return;
        }
        
        showStatus('⏳ جاري التصدير إلى التليجرام...');
        
        let text = `${KEYWORD}\n━━━━━━━━━━━━━━━━━━\n`;
        const states = [...new Set(distributors.map(d => d.state))];
        
        states.forEach(state => {
            const stateItems = distributors.filter(d => d.state === state);
            text += `📍 ولاية ${state} - العدد: ${stateItems.length}\n`;
            stateItems.forEach(d => {
                text += `• ${d.company} (${d.type})\n`;
                text += `  👤 ${d.manager || 'غير محدد'} | 📞 ${d.phone || 'غير محدد'}\n`;
            });
            text += `\n`;
        });
        
        try {
            const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHANNEL_ID,
                    text: text,
                    parse_mode: 'HTML'
                })
            });
            
            const data = await response.json();
            
            if (data.ok) {
                showStatus('✅ تم إرسال البيانات بنجاح إلى التليجرام');
            } else {
                showStatus('❌ فشل الإرسال: ' + (data.description || 'خطأ غير معروف'));
            }
        } catch (error) {
            showStatus('❌ خطأ في الاتصال: ' + error.message);
        }
    }

    function showStatus(msg) { 
        const statusDiv = document.getElementById('status');
        statusDiv.innerHTML = msg;
    }

    // تهيئة
    updateTable();
    showStatus('✓ جاهز | اضغط على "جلب من الرسالة المثبتة"');
</script>
</body>
</html>
