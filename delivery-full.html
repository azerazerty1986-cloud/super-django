<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ناردو برو - النظام النهائي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0f3460, #16213e);
            color: white;
            direction: rtl;
            min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .header {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Cairo', sans-serif;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-gold { background: #ffd700; color: #000; }
        .btn-telegram { background: #0088cc; color: white; }
        .btn-txt { background: #6c757d; color: white; }
        .btn-info { background: #17a2b8; color: white; }
        .btn-success { background: #28a745; color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            overflow: hidden;
        }
        th {
            background: rgba(255,215,0,0.1);
            color: #ffd700;
            padding: 15px;
            text-align: right;
            border-bottom: 2px solid #ffd700;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid rgba(255,215,0,0.1);
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .search-box input {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,215,0,0.3);
            background: rgba(0,0,0,0.3);
            color: white;
            font-family: 'Cairo', sans-serif;
        }
        .notification {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .notification.success { background: #28a745; color: white; }
        .notification.error { background: #dc3545; color: white; }
        .notification.info { background: #17a2b8; color: white; }
        @keyframes slideIn {
            from { transform: translateX(-400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255,215,0,0.2);
        }
        .stat-number {
            font-size: 32px;
            font-weight: bold;
            color: #ffd700;
        }
        .filter-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 8px 20px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 20px;
            cursor: pointer;
            color: white;
        }
        .filter-btn.active {
            background: #ffd700;
            color: #000;
        }
        .url-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .url-input-group input {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,215,0,0.3);
            background: rgba(0,0,0,0.3);
            color: white;
            font-family: 'Cairo', sans-serif;
            direction: ltr;
            text-align: left;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #1a1a2e;
            border: 2px solid #ffd700;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
        }
        .modal-content input, .modal-content select, .modal-content textarea {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border-radius: 10px;
            border: 1px solid rgba(255,215,0,0.3);
            background: rgba(0,0,0,0.3);
            color: white;
            font-family: 'Cairo', sans-serif;
        }
        .modal-content textarea {
            min-height: 200px;
            font-family: monospace;
        }
        .close-btn {
            float: left;
            font-size: 28px;
            cursor: pointer;
            color: #ffd700;
            background: none;
            border: none;
        }
        .step-box {
            background: rgba(255,215,0,0.1);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .step-box h4 {
            color: #ffd700;
            margin-bottom: 10px;
        }
        .status-text {
            font-size: 12px;
            color: #aaa;
            margin-top: 10px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-truck"></i> ناردو برو | النظام النهائي</h1>
        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
            <button class="btn btn-gold" onclick="openAddModal()"><i class="fas fa-plus"></i> إضافة موزع</button>
            <button class="btn btn-txt" onclick="exportToTxt()"><i class="fas fa-download"></i> تصدير TXT</button>
            <button class="btn btn-telegram" onclick="sendToTelegram()"><i class="fab fa-telegram"></i> إرسال للقناة</button>
            <button class="btn btn-danger" onclick="clearAll()"><i class="fas fa-trash"></i> مسح الكل</button>
        </div>
    </div>

    <div class="stats" id="stats"></div>

    <!-- قسم جلب الملفات -->
    <div class="card">
        <h2 style="color: #ffd700; margin-bottom: 20px;"><i class="fas fa-link"></i> جلب ملف من رابط التليجرام</h2>
        
        <div class="step-box">
            <h4><i class="fas fa-info-circle"></i> منهج العمل:</h4>
            <p>1️⃣ أرسل ملف TXT إلى قناة التليجرام</p>
            <p>2️⃣ اضغط على الملف ← اختر "نسخ الرابط"</p>
            <p>3️⃣ الصق الرابط أدناه ← اضغط "جلب الملف"</p>
        </div>
        
        <div class="url-input-group">
            <input type="text" id="fileUrl" placeholder="مثال: https://t.me/c/3822964890/3713" dir="ltr">
            <button class="btn btn-info" onclick="fetchFromUrl()"><i class="fas fa-download"></i> جلب الملف</button>
        </div>
        <div id="fetchStatus" class="status-text"></div>
    </div>

    <!-- جدول الموزعين -->
    <div class="card">
        <h2 style="color: #ffd700; margin-bottom: 20px;"><i class="fas fa-table"></i> جدول الموزعين</h2>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 بحث باسم الموزع أو الولاية..." onkeyup="filterTable()">
        </div>
        <div class="filter-buttons">
            <button class="filter-btn active" onclick="filterByType('all')">الكل</button>
            <button class="filter-btn" onclick="filterByType('delivery')">🚚 توصيل</button>
            <button class="filter-btn" onclick="filterByType('distributor')">📦 موزع</button>
            <button class="filter-btn" onclick="filterByType('both')">🔄 كليهما</button>
        </div>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>الشركة</th>
                        <th>المسؤول</th>
                        <th>الهاتف</th>
                        <th>النوع</th>
                        <th>الولاية</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- نافذة الإضافة -->
<div id="addModal" class="modal">
    <div class="modal-content">
        <button class="close-btn" onclick="closeAddModal()">&times;</button>
        <h2 style="color:#ffd700;">إضافة موزع جديد</h2>
        <input type="text" id="compName" placeholder="اسم الشركة">
        <input type="text" id="mgrName" placeholder="اسم المسؤول">
        <input type="tel" id="phone" placeholder="رقم الهاتف">
        <select id="type">
            <option value="delivery">توصيل</option>
            <option value="distributor">موزع</option>
            <option value="both">كليهما</option>
        </select>
        <input type="text" id="state" placeholder="الولاية">
        <button class="btn btn-gold" onclick="addDistributor()" style="width:100%">إضافة</button>
    </div>
</div>

<script>
    // ==================== البيانات الأساسية ====================
    let distributors = [
        { id: 1, company: "شركة البراق", manager: "أحمد محمد", phone: "0555123456", type: "delivery", state: "الجزائر" },
        { id: 2, company: "مؤسسة السريع", manager: "سعيد علي", phone: "0555234567", type: "distributor", state: "وهران" }
    ];
    
    let currentFilter = 'all';
    let currentSearch = '';

    // ==================== عرض الجدول ====================
    function displayTable() {
        let filtered = distributors;
        if (currentFilter !== 'all') filtered = filtered.filter(d => d.type === currentFilter);
        if (currentSearch) filtered = filtered.filter(d => d.company.includes(currentSearch) || d.state.includes(currentSearch));
        
        const tbody = document.getElementById('tableBody');
        if (filtered.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center">لا توجد بيانات</td></tr>';
            return;
        }
        
        tbody.innerHTML = filtered.map((d, i) => `
            <tr>
                <td>${i+1}</td>
                <td>${d.company}</td>
                <td>${d.manager}</td>
                <td>${d.phone}</td>
                <td>${d.type === 'delivery' ? '🚚 توصيل' : d.type === 'distributor' ? '📦 موزع' : '🔄 كليهما'}</td>
                <td>${d.state}</td>
                <td><button class="btn btn-danger" style="padding:5px 10px" onclick="deleteDistributor(${d.id})">🗑️ حذف</button></td>
            </tr>
        `).join('');
        
        document.getElementById('stats').innerHTML = `
            <div class="stat-card"><div class="stat-number">${distributors.length}</div><div>إجمالي الموزعين</div></div>
            <div class="stat-card"><div class="stat-number">${distributors.filter(d => d.type === 'delivery' || d.type === 'both').length}</div><div>خدمة توصيل</div></div>
            <div class="stat-card"><div class="stat-number">${distributors.filter(d => d.type === 'distributor' || d.type === 'both').length}</div><div>موزعون</div></div>
        `;
    }

    function filterTable() { currentSearch = document.getElementById('searchInput').value; displayTable(); }
    function filterByType(type) { currentFilter = type; displayTable(); }
    function deleteDistributor(id) { distributors = distributors.filter(d => d.id !== id); displayTable(); showNotification('✅ تم الحذف', 'success'); }
    
    function addDistributor() {
        const newDist = {
            id: Date.now(),
            company: document.getElementById('compName').value,
            manager: document.getElementById('mgrName').value,
            phone: document.getElementById('phone').value,
            type: document.getElementById('type').value,
            state: document.getElementById('state').value
        };
        if (newDist.company && newDist.phone) {
            distributors.push(newDist);
            displayTable();
            closeAddModal();
            showNotification(`✅ تم إضافة ${newDist.company}`, 'success');
            document.getElementById('compName').value = '';
            document.getElementById('mgrName').value = '';
            document.getElementById('phone').value = '';
            document.getElementById('state').value = '';
        } else {
            showNotification('⚠️ الرجاء ملء الحقول', 'error');
        }
    }

    function clearAll() {
        if (confirm('⚠️ هل أنت متأكد من حذف جميع البيانات؟')) {
            distributors = [];
            displayTable();
            showNotification('🗑️ تم مسح الكل', 'info');
        }
    }

    // ==================== تصدير TXT ====================
    function exportToTxt() {
        let content = `╔════════════════════════════════════════════════╗\n`;
        content += `║           ناردو برو - قائمة الموزعين           ║\n`;
        content += `╠════════════════════════════════════════════════╣\n`;
        content += `║ 📅 ${new Date().toLocaleDateString('ar-SA')}                     ║\n`;
        content += `║ 📊 العدد: ${distributors.length}                                 ║\n`;
        content += `╚════════════════════════════════════════════════╝\n\n`;
        content += `┌──┬──────────────────┬──────────────────┬──────────────┬────────────┬──────────────┐\n`;
        content += `│# │ اسم الشركة       │ المسؤول          │ الهاتف       │ النوع      │ الولاية      │\n`;
        content += `├──┼──────────────────┼──────────────────┼──────────────┼────────────┼──────────────┤\n`;
        
        distributors.forEach((d, i) => {
            const typeText = d.type === 'delivery' ? 'توصيل' : d.type === 'distributor' ? 'موزع' : 'كليهما';
            content += `│${String(i+1).padEnd(2)}│${d.company.padEnd(18)}│${d.manager.padEnd(18)}│${d.phone.padEnd(14)}│${typeText.padEnd(12)}│${d.state.padEnd(14)}│\n`;
        });
        content += `└──┴──────────────────┴──────────────────┴──────────────┴────────────┴──────────────┘\n`;
        
        const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `nardo_${Date.now()}.txt`;
        link.click();
        showNotification('✅ تم التصدير', 'success');
    }

    // ==================== إرسال إلى تليجرام ====================
    async function sendToTelegram() {
        const BOT_TOKEN = '8576673096:AAGvSMjzwVWj6wJ47JdqiDwcObXjBDcyiLA';
        const CHANNEL_ID = '-1003822964890';
        
        showNotification('📤 جاري الإرسال...', 'info');
        
        let content = `ناردو برو - ${new Date().toLocaleDateString('ar-SA')}\n`;
        content += `═══════════════════════════\n`;
        distributors.forEach((d, i) => {
            content += `${i+1}. ${d.company} | ${d.phone} | ${d.state}\n`;
        });
        
        const blob = new Blob([content], { type: 'text/plain' });
        const formData = new FormData();
        formData.append('chat_id', CHANNEL_ID);
        formData.append('document', blob, `distributors_${Date.now()}.txt`);
        
        try {
            const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendDocument`, { method: 'POST', body: formData });
            const result = await res.json();
            if (result.ok) {
                showNotification('✅ تم الإرسال', 'success');
            } else {
                showNotification('❌ فشل الإرسال', 'error');
            }
        } catch(err) {
            showNotification('❌ خطأ', 'error');
        }
    }

    // ==================== جلب الملف من الرابط (الطريقة الصحيحة) ====================
    async function fetchFromUrl() {
        const url = document.getElementById('fileUrl').value.trim();
        if (!url) {
            showNotification('⚠️ الرجاء إدخال الرابط', 'error');
            return;
        }
        
        const statusDiv = document.getElementById('fetchStatus');
        statusDiv.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري جلب الملف...';
        showNotification('📥 جاري التحميل...', 'info');
        
        try {
            // استخدام خدمة CORS proxy
            const proxyUrl = 'https://cors-anywhere.herokuapp.com/';
            const response = await fetch(proxyUrl + url);
            const html = await response.text();
            
            // استخراج رابط التحميل المباشر من HTML
            // البحث عن رابط التنزيل في الصفحة
            let downloadUrl = null;
            
            // محاولة استخراج الرابط من علامة meta أو link
            const match = html.match(/href="([^"]+tg:\/\/[^"]+)/);
            if (match) {
                downloadUrl = match[1];
            }
            
            // محاولة أخرى: البحث عن رابط الملف المباشر
            const fileMatch = html.match(/https:\/\/[^\s"']+\.txt/);
            if (fileMatch) {
                downloadUrl = fileMatch[0];
            }
            
            // محاولة استخراج النص من الصفحة
            let textContent = '';
            
            // البحث عن محتوى الملف في الصفحة
            const preMatch = html.match(/<pre[^>]*>([\s\S]*?)<\/pre>/i);
            if (preMatch) {
                textContent = preMatch[1];
            } else {
                // إزالة علامات HTML واستخراج النص
                textContent = html.replace(/<[^>]*>/g, ' ');
            }
            
            // تنظيف النص
            textContent = textContent.replace(/&nbsp;/g, ' ').replace(/&[a-z]+;/g, ' ');
            
            // تحليل المحتوى
            const parsed = parseTxtContent(textContent);
            
            if (parsed.length > 0) {
                distributors = [...distributors, ...parsed];
                displayTable();
                statusDiv.innerHTML = `✅ تم استيراد ${parsed.length} موزع بنجاح`;
                showNotification(`✅ تم استيراد ${parsed.length} موزع`, 'success');
            } else {
                statusDiv.innerHTML = '⚠️ لم يتم العثور على بيانات - تأكد من أن الملف يحتوي على جدول بالصيغة الصحيحة';
                showNotification('⚠️ لم يتم العثور على بيانات صالحة', 'error');
            }
            
        } catch(err) {
            statusDiv.innerHTML = `❌ فشل: ${err.message}`;
            showNotification(`❌ فشل الجلب`, 'error');
        }
    }

    // ==================== تحليل محتوى TXT ====================
    function parseTxtContent(content) {
        const lines = content.split('\n');
        const list = [];
        
        for (const line of lines) {
            // تنسيق الجدول
            if (line.includes('│')) {
                const parts = line.split('│').filter(p => p.trim() !== '');
                if (parts.length >= 6) {
                    const company = parts[1]?.trim();
                    const manager = parts[2]?.trim();
                    const phone = parts[3]?.trim();
                    let type = parts[4]?.trim();
                    const state = parts[5]?.trim();
                    
                    if (company && phone && company.length > 2 && !company.includes('اسم') && !company.includes('─')) {
                        if (type.includes('توصيل')) type = 'delivery';
                        else if (type.includes('موزع')) type = 'distributor';
                        else if (type.includes('كليهما')) type = 'both';
                        else type = 'delivery';
                        
                        list.push({
                            id: Date.now() + Math.random(),
                            company: company,
                            manager: manager || '',
                            phone: phone,
                            type: type,
                            state: state || ''
                        });
                    }
                }
            }
        }
        
        return list;
    }

    // ==================== الإشعارات ====================
    function showNotification(msg, type) {
        const n = document.createElement('div');
        n.className = `notification ${type}`;
        n.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i> ${msg}`;
        document.body.appendChild(n);
        setTimeout(() => n.remove(), 3000);
    }

    function openAddModal() { document.getElementById('addModal').classList.add('active'); }
    function closeAddModal() { document.getElementById('addModal').classList.remove('active'); }

    // بدء التشغيل
    displayTable();
</script>
</body>
</html>
