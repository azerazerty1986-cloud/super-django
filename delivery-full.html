<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ناردو برو - جلب من القناة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0f3460, #16213e);
            color: white;
            direction: rtl;
            min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .header {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Cairo', sans-serif;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-gold { background: #ffd700; color: #000; }
        .btn-gold:hover { transform: translateY(-2px); background: #ffed4e; }
        .btn-telegram { background: #0088cc; color: white; }
        .btn-txt { background: #6c757d; color: white; }
        .btn-info { background: #17a2b8; color: white; }
        .btn-success { background: #28a745; color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            overflow: hidden;
        }
        th {
            background: rgba(255,215,0,0.1);
            color: #ffd700;
            padding: 15px;
            text-align: right;
            border-bottom: 2px solid #ffd700;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid rgba(255,215,0,0.1);
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .search-box input {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,215,0,0.3);
            background: rgba(0,0,0,0.3);
            color: white;
            font-family: 'Cairo', sans-serif;
        }
        .notification {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .notification.success { background: #28a745; color: white; }
        .notification.error { background: #dc3545; color: white; }
        .notification.info { background: #17a2b8; color: white; }
        @keyframes slideIn {
            from { transform: translateX(-400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255,215,0,0.2);
        }
        .stat-number {
            font-size: 32px;
            font-weight: bold;
            color: #ffd700;
        }
        .filter-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 8px 20px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 20px;
            cursor: pointer;
            color: white;
        }
        .filter-btn.active {
            background: #ffd700;
            color: #000;
        }
        .files-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 15px;
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
        }
        .file-card {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 12px;
            padding: 15px;
            transition: all 0.3s;
        }
        .file-card:hover {
            background: rgba(255,215,0,0.1);
            transform: translateY(-3px);
        }
        .file-name {
            font-size: 16px;
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 8px;
            word-break: break-all;
        }
        .file-date {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 10px;
        }
        .file-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .file-actions button {
            flex: 1;
            padding: 8px;
            font-size: 12px;
        }
        .loading-spinner {
            text-align: center;
            padding: 40px;
        }
        .loading-spinner i {
            font-size: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .section-title {
            color: #ffd700;
            margin-bottom: 20px;
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .channel-info {
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .live-badge {
            background: #28a745;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 11px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #1a1a2e;
            border: 2px solid #ffd700;
            border-radius: 20px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-content input, .modal-content textarea {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border-radius: 10px;
            border: 1px solid rgba(255,215,0,0.3);
            background: rgba(0,0,0,0.3);
            color: white;
            font-family: 'Cairo', sans-serif;
        }
        .modal-content textarea {
            min-height: 300px;
            font-family: monospace;
            direction: ltr;
            text-align: left;
        }
        .close-btn {
            float: left;
            font-size: 28px;
            cursor: pointer;
            color: #ffd700;
            background: none;
            border: none;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-file-alt"></i> ناردو برو | جلب من القناة</h1>
        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
            <button class="btn btn-gold" onclick="openAddDistributor()"><i class="fas fa-plus"></i> إضافة موزع</button>
            <button class="btn btn-txt" onclick="exportToTxt()"><i class="fas fa-download"></i> تصدير TXT</button>
            <button class="btn btn-telegram" onclick="sendTxtToTelegram()"><i class="fab fa-telegram"></i> إرسال TXT للقناة</button>
            <button class="btn btn-info" onclick="startFetching()"><i class="fas fa-play"></i> بدء جلب الملفات</button>
            <button class="btn btn-success" onclick="openImportTxtModal()"><i class="fas fa-upload"></i> استيراد TXT</button>
            <button class="btn btn-danger" onclick="clearAllData()"><i class="fas fa-trash"></i> مسح الكل</button>
        </div>
    </div>

    <div class="stats" id="stats"></div>

    <!-- حالة الاتصال -->
    <div class="card">
        <div class="section-title">
            <i class="fab fa-telegram"></i>
            <span>📡 بوت التليجرام</span>
            <span id="liveIndicator" class="live-badge">🟢 يعمل</span>
        </div>
        <div id="channelInfo" class="channel-info">
            <span><i class="fas fa-spinner fa-spin"></i> جاري التحقق...</span>
        </div>
    </div>

    <!-- الملفات المستلمة -->
    <div class="card">
        <div class="section-title">
            <i class="fas fa-folder-open"></i>
            <span>📁 الملفات المستلمة من القناة</span>
            <button class="btn btn-info" onclick="fetchNewFiles()" style="padding: 5px 15px;"><i class="fas fa-sync-alt"></i> فحص الآن</button>
        </div>
        <div id="filesList" class="files-grid">
            <div class="loading-spinner">
                <i class="fas fa-spinner"></i>
                <p>جاري الاستماع للملفات...</p>
                <p style="font-size: 12px;">عند إرسال ملف TXT إلى القناة، سيظهر هنا تلقائياً</p>
            </div>
        </div>
    </div>

    <!-- جدول الموزعين -->
    <div class="card">
        <h2 style="color: #ffd700; margin-bottom: 20px;"><i class="fas fa-table"></i> جدول الموزعين</h2>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 بحث..." onkeyup="filterTable()">
        </div>
        <div class="filter-buttons">
            <button class="filter-btn active" onclick="filterByType('all')">الكل</button>
            <button class="filter-btn" onclick="filterByType('delivery')">🚚 توصيل</button>
            <button class="filter-btn" onclick="filterByType('distributor')">📦 موزع</button>
            <button class="filter-btn" onclick="filterByType('both')">🔄 كليهما</button>
        </div>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr><th>#</th><th>الشركة</th><th>المسؤول</th><th>الهاتف</th><th>النوع</th><th>الولاية</th><th>حذف</th></tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- نافذة إضافة موزع -->
<div id="addModal" class="modal">
    <div class="modal-content">
        <button class="close-btn" onclick="closeAddModal()">&times;</button>
        <h2 style="color: #ffd700;">إضافة موزع</h2>
        <input type="text" id="compName" placeholder="اسم الشركة">
        <input type="text" id="mgrName" placeholder="المسؤول">
        <input type="tel" id="phone" placeholder="الهاتف">
        <select id="type"><option value="delivery">توصيل</option><option value="distributor">موزع</option><option value="both">كليهما</option></select>
        <input type="text" id="state" placeholder="الولاية">
        <button class="btn btn-gold" onclick="addDistributor()" style="width:100%">إضافة</button>
    </div>
</div>

<!-- نافذة استيراد TXT -->
<div id="importTxtModal" class="modal">
    <div class="modal-content">
        <button class="close-btn" onclick="closeImportTxtModal()">&times;</button>
        <h2 style="color:#ffd700;">استيراد TXT</h2>
        <input type="file" id="txtFileInput" accept=".txt" onchange="handleTxtFileUpload(this)">
        <textarea id="txtRawContent" rows="10" placeholder="الصق محتوى TXT..."></textarea>
        <button class="btn btn-info" onclick="previewTxtData()">معاينة</button>
        <div id="importPreviewArea" style="background:rgba(0,0,0,0.3);padding:10px;border-radius:10px;margin-top:10px;display:none;"></div>
        <button class="btn btn-success" onclick="importTxtToTable()" style="width:100%;margin-top:10px;">استيراد</button>
    </div>
</div>

<script>
    const TELEGRAM = {
        botToken: '8576673096:AAGvSMjzwVWj6wJ47JdqiDwcObXjBDcyiLA',
        channelId: '-1003822964890',
        apiUrl: 'https://api.telegram.org/bot'
    };

    let distributors = [
        { id: 1, company: "شركة البراق", manager: "أحمد محمد", phone: "0555123456", type: "delivery", state: "الجزائر", status: "approved" }
    ];
    
    let currentFilter = 'all';
    let currentSearch = '';
    let receivedFiles = [];
    let lastUpdateId = 0;

    // عرض الجدول
    function displayTable() {
        let filtered = distributors.filter(d => d.status === 'approved');
        if (currentFilter !== 'all') filtered = filtered.filter(d => d.type === currentFilter);
        if (currentSearch) filtered = filtered.filter(d => d.company.includes(currentSearch) || d.state.includes(currentSearch));
        
        const tbody = document.getElementById('tableBody');
        if (filtered.length === 0) { tbody.innerHTML = '<tr><td colspan="7">لا توجد بيانات</td></tr>'; return; }
        
        tbody.innerHTML = filtered.map((d, i) => `
            <tr><td>${i+1}</td><td>${d.company}</td><td>${d.manager}</td><td>${d.phone}</td>
            <td>${d.type === 'delivery' ? '🚚 توصيل' : d.type === 'distributor' ? '📦 موزع' : '🔄 كليهما'}</td>
            <td>${d.state}</td>
            <td><button class="btn btn-danger" style="padding:5px 10px;" onclick="deleteDistributor(${d.id})">🗑️ حذف</button></td></tr>
        `).join('');
        updateStats();
    }
    
    function updateStats() {
        const approved = distributors.filter(d => d.status === 'approved');
        document.getElementById('stats').innerHTML = `
            <div class="stat-card"><div class="stat-number">${approved.length}</div><div>الموزعون</div></div>
            <div class="stat-card"><div class="stat-number">${approved.filter(d => d.type === 'delivery' || d.type === 'both').length}</div><div>توصيل</div></div>
            <div class="stat-card"><div class="stat-number">${approved.filter(d => d.type === 'distributor' || d.type === 'both').length}</div><div>موزعون</div></div>
        `;
    }
    
    function filterTable() { currentSearch = document.getElementById('searchInput').value; displayTable(); }
    function filterByType(type) { currentFilter = type; displayTable(); }
    function deleteDistributor(id) { distributors = distributors.filter(d => d.id !== id); displayTable(); showNotification('✅ تم الحذف', 'success'); }
    
    function addDistributor() {
        const newDist = { id: Date.now(), company: document.getElementById('compName').value, manager: document.getElementById('mgrName').value, phone: document.getElementById('phone').value, type: document.getElementById('type').value, state: document.getElementById('state').value, status: 'approved' };
        if (newDist.company && newDist.phone) { distributors.push(newDist); displayTable(); closeAddModal(); showNotification('✅ تم الإضافة', 'success'); }
        else showNotification('⚠️ املأ الحقول', 'error');
    }
    
    function clearAllData() { if (confirm('مسح الكل؟')) { distributors = []; displayTable(); showNotification('🗑️ تم المسح', 'info'); } }
    
    // تصدير TXT
    function generateTxtContent() {
        const filtered = distributors.filter(d => d.status === 'approved');
        let content = `╔════════════════════════════════════════════════╗\n`;
        content += `║           ناردو برو - قائمة الموزعين           ║\n`;
        content += `╠════════════════════════════════════════════════╣\n`;
        content += `║ 📅 ${new Date().toLocaleDateString('ar-SA')}\n`;
        content += `║ 📊 إجمالي: ${filtered.length}\n`;
        content += `╚════════════════════════════════════════════════╝\n\n`;
        content += `┌──┬──────────────────┬──────────────────┬──────────────┬────────────┬──────────────┐\n`;
        content += `│# │ الشركة           │ المسؤول          │ الهاتف       │ النوع      │ الولاية      │\n`;
        content += `├──┼──────────────────┼──────────────────┼──────────────┼────────────┼──────────────┤\n`;
        filtered.forEach((d, i) => {
            content += `│${i+1} │${d.company.padEnd(18)}│${d.manager.padEnd(18)}│${d.phone.padEnd(14)}│${(d.type==='delivery'?'توصيل':'موزع').padEnd(12)}│${d.state.padEnd(14)}│\n`;
        });
        content += `└──┴──────────────────┴──────────────────┴──────────────┴────────────┴──────────────┘\n`;
        return content;
    }
    
    function exportToTxt() {
        const blob = new Blob([generateTxtContent()], { type: 'text/plain' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `nardo_${Date.now()}.txt`;
        link.click();
        showNotification('✅ تم التصدير', 'success');
    }
    
    async function sendTxtToTelegram() {
        showNotification('📤 جاري الإرسال...', 'info');
        try {
            const blob = new Blob([generateTxtContent()], { type: 'text/plain' });
            const formData = new FormData();
            formData.append('chat_id', TELEGRAM.channelId);
            formData.append('document', blob, `distributors_${Date.now()}.txt`);
            const res = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/sendDocument`, { method: 'POST', body: formData });
            const result = await res.json();
            if(result.ok) showNotification('✅ تم الإرسال', 'success');
            else throw new Error(result.description);
        } catch(err) { showNotification(`❌ ${err.message}`, 'error'); }
    }
    
    // جلب الملفات من القناة
    async function startFetching() {
        showNotification('📡 بدء جلب الملفات...', 'info');
        document.getElementById('channelInfo').innerHTML = '<span>✅ البوت متصل - في انتظار الملفات</span><span>📁 سيظهر أي ملف TXT ترسله للقناة هنا</span>';
        await checkChannelConnection();
        fetchNewFiles();
        setInterval(fetchNewFiles, 5000);
    }
    
    async function checkChannelConnection() {
        try {
            const res = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getMe`);
            const data = await res.json();
            if(data.ok) document.getElementById('liveIndicator').innerHTML = `🟢 @${data.result.username}`;
        } catch(e) { console.log(e); }
    }
    
    async function fetchNewFiles() {
        try {
            const url = `${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getUpdates?offset=${lastUpdateId}&timeout=10`;
            const response = await fetch(url);
            const data = await response.json();
            
            if (data.ok && data.result) {
                let newFiles = false;
                for (const update of data.result) {
                    lastUpdateId = update.update_id + 1;
                    const message = update.channel_post || update.message;
                    if (message && message.document && message.document.file_name && message.document.file_name.endsWith('.txt')) {
                        await processFile(message);
                        newFiles = true;
                    }
                }
                if (newFiles) displayFilesList();
            }
        } catch(err) { console.log(err); }
    }
    
    async function processFile(message) {
        const fileName = message.document.file_name;
        showNotification(`📥 تم اكتشاف ملف: ${fileName}`, 'info');
        
        try {
            const fileRes = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getFile?file_id=${message.document.file_id}`);
            const fileData = await fileRes.json();
            if (fileData.ok) {
                const fileUrl = `https://api.telegram.org/file/bot${TELEGRAM.botToken}/${fileData.result.file_path}`;
                const contentRes = await fetch(fileUrl);
                const content = await contentRes.text();
                
                receivedFiles.unshift({
                    id: Date.now(),
                    file_name: fileName,
                    content: content,
                    date: new Date().toLocaleString(),
                    size: message.document.file_size
                });
                showNotification(`✅ تم استلام ${fileName}`, 'success');
            }
        } catch(err) { showNotification(`❌ خطأ: ${err.message}`, 'error'); }
    }
    
    function displayFilesList() {
        const container = document.getElementById('filesList');
        if (receivedFiles.length === 0) {
            container.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px;"><i class="fas fa-inbox" style="font-size:48px"></i><p>لا توجد ملفات بعد</p><p>أرسل ملف TXT إلى القناة وسيظهر هنا</p></div>`;
            return;
        }
        
        container.innerHTML = receivedFiles.map((file, i) => `
            <div class="file-card">
                <div class="file-name"><i class="fas fa-file-alt"></i> ${file.file_name} <span style="background:#28a745;padding:2px 8px;border-radius:20px;font-size:10px;">من القناة</span></div>
                <div class="file-date">📅 ${file.date} | 📦 ${(file.size/1024).toFixed(2)} KB</div>
                <div class="file-actions">
                    <button class="btn btn-info" onclick="viewFile(${i})"><i class="fas fa-eye"></i> معاينة</button>
                    <button class="btn btn-success" onclick="importFile(${i})"><i class="fas fa-download"></i> استيراد</button>
                </div>
            </div>
        `).join('');
    }
    
    function viewFile(index) {
        const file = receivedFiles[index];
        if (file) {
            const win = window.open();
            win.document.write(`<html dir="ltr"><head><title>${file.file_name}</title><style>body{background:#1a1a2e;color:#fff;font-family:monospace;padding:20px;}pre{white-space:pre-wrap;background:#0003;padding:15px;border-radius:10px;}</style></head><body><h2>📄 ${file.file_name}</h2><pre>${escapeHtml(file.content)}</pre></body></html>`);
        }
    }
    
    function importFile(index) {
        const file = receivedFiles[index];
        if (file && file.content) {
            const parsed = parseTxtToDistributors(file.content);
            if (parsed.length > 0) {
                distributors = [...distributors, ...parsed];
                displayTable();
                showNotification(`✅ تم استيراد ${parsed.length} موزع`, 'success');
            } else showNotification('⚠️ لم يتم العثور على بيانات', 'error');
        }
    }
    
    function parseTxtToDistributors(content) {
        const lines = content.split('\n');
        const list = [];
        for (const line of lines) {
            if (line.includes('│') && !line.includes('┌') && !line.includes('├') && !line.includes('└')) {
                const parts = line.split('│').filter(p => p.trim());
                if (parts.length >= 6) {
                    const company = parts[1]?.trim();
                    const manager = parts[2]?.trim();
                    const phone = parts[3]?.trim();
                    let type = parts[4]?.trim();
                    const state = parts[5]?.trim();
                    if (company && phone && !company.includes('الشركة')) {
                        if (type.includes('توصيل')) type = 'delivery';
                        else if (type.includes('موزع')) type = 'distributor';
                        else type = 'delivery';
                        list.push({ id: Date.now() + Math.random(), company, manager: manager || '', phone, type, state: state || '', status: 'approved' });
                    }
                }
            }
        }
        return list;
    }
    
    function escapeHtml(text) { return text.replace(/[&<>]/g, function(m) { if(m === '&') return '&amp;'; if(m === '<') return '&lt;'; if(m === '>') return '&gt;'; return m; }); }
    
    // استيراد يدوي
    function openImportTxtModal() { document.getElementById('importTxtModal').style.display = 'flex'; document.getElementById('txtRawContent').value = ''; document.getElementById('importPreviewArea').style.display = 'none'; }
    function closeImportTxtModal() { document.getElementById('importTxtModal').style.display = 'none'; }
    function handleTxtFileUpload(input) { if(input.files && input.files[0]) { const reader = new FileReader(); reader.onload = e => { document.getElementById('txtRawContent').value = e.target.result; previewTxtData(); }; reader.readAsText(input.files[0]); input.value = ''; } }
    function previewTxtData() { const content = document.getElementById('txtRawContent').value; const parsed = parseTxtToDistributors(content); const preview = document.getElementById('importPreviewArea'); if(parsed.length) { preview.innerHTML = `<p style="color:#ffd700;">✅ ${parsed.length} موزع</p><ul>${parsed.slice(0,5).map(d=>`<li>${d.company} - ${d.phone}</li>`).join('')}</ul>`; preview.style.display='block'; } else { preview.innerHTML='<p style="color:#ff6b6b;">❌ لا توجد بيانات</p>'; preview.style.display='block'; } }
    function importTxtToTable() { const content = document.getElementById('txtRawContent').value; const parsed = parseTxtToDistributors(content); if(parsed.length) { distributors = [...distributors, ...parsed]; displayTable(); closeImportTxtModal(); showNotification(`✅ تم استيراد ${parsed.length} موزع`, 'success'); } else showNotification('❌ لا توجد بيانات', 'error'); }
    
    function showNotification(msg, type) { const n = document.createElement('div'); n.className = `notification ${type}`; n.innerHTML = `<i class="fas ${type==='success'?'fa-check-circle':'fa-info-circle'}"></i> ${msg}`; document.body.appendChild(n); setTimeout(() => n.remove(), 3000); }
    function openAddDistributor() { document.getElementById('addModal').style.display = 'flex'; }
    function closeAddModal() { document.getElementById('addModal').style.display = 'none'; }
    
    startFetching();
    displayTable();
</script>
</body>
