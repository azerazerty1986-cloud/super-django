<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ناردو برو | جلب البيانات من ملف TXT المثبت (v6.3)</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --bg: #0f3460; --card-bg: #16213e; --text: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); direction: rtl; min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .card { background: var(--card-bg); border: 1px solid rgba(255, 215, 0, 0.3); border-radius: 15px; padding: 25px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        h1, h2 { color: var(--gold); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .btn { padding: 12px 24px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-family: 'Cairo'; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4); }
        .btn-info { background: #17a2b8; color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-purple { background: #6f42c1; color: white; }
        .input-group { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 20px; }
        input, select, textarea { padding: 12px; border-radius: 10px; border: 1px solid rgba(255, 215, 0, 0.3); background: rgba(0,0,0,0.2); color: white; font-family: 'Cairo'; width: 100%; }
        input:focus, textarea:focus { border-color: var(--gold); outline: none; }
        .filter-section { display: flex; gap: 15px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; overflow: hidden; border-radius: 10px; }
        th, td { padding: 15px; text-align: center; border-bottom: 1px solid rgba(255, 215, 0, 0.1); }
        th { background: rgba(255, 215, 0, 0.1); color: var(--gold); font-weight: 700; }
        tr:hover { background: rgba(255, 255, 255, 0.03); }
        .status-bar { background: rgba(0,0,0,0.3); padding: 10px 20px; border-radius: 10px; color: var(--gold); font-weight: bold; margin-top: 10px; text-align: center; }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .badge-delivery { background: #28a745; color: white; }
        .badge-distributor { background: #007bff; color: white; }
        .badge-both { background: #6f42c1; color: white; }
        .links-list { max-height: 200px; overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 10px; padding: 10px; margin-top: 10px; }
        .link-item { padding: 5px; border-bottom: 1px solid rgba(255,215,0,0.2); font-family: monospace; font-size: 12px; }
        .gold { color: var(--gold); }
        .debug-panel { background: #000; color: #0f0; padding: 15px; border-radius: 10px; font-family: monospace; font-size: 12px; margin-top: 20px; max-height: 300px; overflow-y: auto; display: none; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1><i class="fas fa-shuttle-van"></i> ناردو برو | جلب الموزعين من ملف TXT المثبت</h1>
        <div style="display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;">
            <button class="btn btn-gold" onclick="exportToTelegram()"><i class="fab fa-telegram-plane"></i> تصدير للقناة</button>
            <button class="btn btn-purple" onclick="fetchPinnedAndProcess()"><i class="fas fa-layer-group"></i> جلب الفهرس (ملف TXT) + معالجة البيانات</button>
            <button class="btn btn-danger" onclick="clearAll()"><i class="fas fa-trash-alt"></i> مسح الكل</button>
            <button class="btn btn-info" style="background: #444;" onclick="toggleDebug()"><i class="fas fa-bug"></i> سجل العمليات</button>
        </div>
        <div id="status" class="status-bar">✓ جاهز للعمل | سيتم تحميل ملف الـ TXT المثبت مباشرة</div>
        <div id="debugPanel" class="debug-panel"></div>
    </div>

    <div class="card">
        <h2><i class="fas fa-link"></i> الروابط المستخرجة من الملف المثبت</h2>
        <div id="extractedLinks" class="links-list">لا توجد روابط بعد</div>
    </div>

    <div class="card">
        <h2><i class="fas fa-plus-circle"></i> إضافة موزع جديد</h2>
        <div class="input-group">
            <input type="text" id="compName" placeholder="اسم الشركة">
            <input type="text" id="mgrName" placeholder="اسم المسؤول">
            <input type="text" id="phone" placeholder="رقم الهاتف">
            <select id="type">
                <option value="delivery">توصيل (delivery)</option>
                <option value="distributor">موزع (distributor)</option>
                <option value="both">كليهما (both)</option>
            </select>
            <input type="text" id="state" placeholder="الولاية">
            <button class="btn btn-gold" onclick="addDistributor()">إضافة للجدول</button>
        </div>
    </div>

    <div class="card">
        <h2><i class="fas fa-table"></i> جدول الموزعين</h2>
        <div class="filter-section">
            <span><i class="fas fa-filter"></i> فلترة:</span>
            <select id="stateFilter" onchange="updateTable()">
                <option value="all">كل الولايات</option>
            </select>
            <span id="countDisplay" class="gold">العدد: 0</span>
        </div>
        <div style="overflow-x: auto;">
            <table>
                <thead><tr><th>#</th><th>الشركة</th><th>المسؤول</th><th>الهاتف</th><th>النوع</th><th>الولاية</th><th>حذف</th></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // ========== الإعدادات الثابتة ==========
    const BOT_TOKEN = '8576673096:AAGvSMjzwVWj6wJ47JdqiDwcObXjBDcyiLA';
    const CHANNEL_ID = '-1003822964890';
    const KEYWORD = '📋 قائمة الموزعين حسب كل ولاية';
    
    let distributors = [];
    let extractedLinksArray = [];

    function showStatus(msg) {
        const statusDiv = document.getElementById('status');
        statusDiv.innerHTML = msg;
        logDebug(`[STATUS] ${msg}`);
    }

    function logDebug(msg) {
        const panel = document.getElementById('debugPanel');
        const time = new Date().toLocaleTimeString();
        panel.innerHTML += `<div>[${time}] ${msg}</div>`;
        panel.scrollTop = panel.scrollHeight;
        console.log(msg);
    }

    function toggleDebug() {
        const panel = document.getElementById('debugPanel');
        panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }

    function updateTable() {
        const tbody = document.getElementById('tableBody');
        const filter = document.getElementById('stateFilter').value;
        const filtered = filter === 'all' ? distributors : distributors.filter(d => d.state === filter);
        
        document.getElementById('countDisplay').innerHTML = `📊 العدد: ${filtered.length}`;
        
        if (filtered.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7">لا توجد بيانات</td></tr>';
            return;
        }
        
        tbody.innerHTML = filtered.map((d, i) => `
            <tr>
                <td>${i+1}</td>
                <td>${escapeHtml(d.company)}</td>
                <td>${escapeHtml(d.manager)}</td>
                <td>${escapeHtml(d.phone)}</td>
                <td><span class="badge badge-${d.type}">${d.type}</span></td>
                <td>${escapeHtml(d.state)}</td>
                <td><button class="btn btn-danger" style="padding: 5px 10px;" onclick="deleteItem(${distributors.indexOf(d)})"><i class="fas fa-trash"></i></button></td>
            </tr>
        `).join('');
        
        updateFilterOptions();
    }
    
    function updateFilterOptions() {
        const filterSelect = document.getElementById('stateFilter');
        const currentVal = filterSelect.value;
        const states = [...new Set(distributors.map(d => d.state))];
        filterSelect.innerHTML = '<option value="all">كل الولايات</option>' + 
            states.map(s => `<option value="${escapeHtml(s)}" ${s === currentVal ? 'selected' : ''}>${escapeHtml(s)}</option>`).join('');
    }
    
    function addDistributor() {
        const company = document.getElementById('compName').value.trim();
        const manager = document.getElementById('mgrName').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const type = document.getElementById('type').value;
        const state = document.getElementById('state').value.trim();
        
        if (company && state) {
            distributors.push({ company, manager, phone, type, state });
            updateTable();
            document.getElementById('compName').value = '';
            document.getElementById('mgrName').value = '';
            document.getElementById('phone').value = '';
            document.getElementById('state').value = '';
            showStatus('✓ تم إضافة الموزع بنجاح');
        } else {
            alert('يرجى إدخال اسم الشركة والولاية');
        }
    }
    
    function deleteItem(index) {
        distributors.splice(index, 1);
        updateTable();
        showStatus('✓ تم حذف الموزع');
    }
    
    function clearAll() {
        if (confirm('⚠️ هل أنت متأكد من مسح جميع البيانات؟')) {
            distributors = [];
            extractedLinksArray = [];
            updateTable();
            document.getElementById('extractedLinks').innerHTML = '<div class="link-item">لا توجد روابط بعد</div>';
            document.getElementById('debugPanel').innerHTML = '';
            showStatus('✓ تم مسح الكل');
        }
    }
    
    // ========== 1. الدالة الرئيسية الجديدة: جلب الملف المثبت ومعالجته ==========
    async function fetchPinnedAndProcess() {
        showStatus('⏳ الخطوة 1: جلب الرسالة المثبتة (ملف TXT)...');
        try {
            const chatRes = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getChat?chat_id=${CHANNEL_ID}`);
            const chatData = await chatRes.json();

            if (!chatData.ok || !chatData.result.pinned_message) {
                showStatus('❌ لا توجد رسالة مثبتة في القناة');
                return;
            }

            const pinnedMsg = chatData.result.pinned_message;
            let indexContent = "";

            // التحقق إذا كانت الرسالة المثبتة ملف TXT
            if (pinnedMsg.document && pinnedMsg.document.file_name.toLowerCase().endsWith('.txt')) {
                logDebug(`تم العثور على ملف TXT مثبت: ${pinnedMsg.document.file_name}`);
                showStatus(`⏳ جاري تحميل الملف المثبت...`);
                indexContent = await downloadTelegramFile(pinnedMsg.document.file_id);
            } else {
                logDebug(`تنبيه: الرسالة المثبتة ليست ملف TXT. جاري البحث عن روابط نصية...`);
                indexContent = pinnedMsg.text || pinnedMsg.caption || '';
            }

            if (!indexContent) {
                showStatus('⚠️ لم يتم العثور على محتوى في الرسالة المثبتة');
                return;
            }

            // استخراج الروابط من محتوى الملف (إذا كان الملف يحتوي على روابط لملفات أخرى)
            const extracted = extractMessageIds(indexContent);
            
            if (extracted.length === 0) {
                logDebug(`لم يتم العثور على روابط. جاري محاولة قراءة البيانات من الملف مباشرة...`);
                const count = parseDistributorsFromText(indexContent);
                if (count > 0) {
                    showStatus(`✅ تم جلب ${count} موزع من الملف المثبت مباشرة`);
                } else {
                    showStatus('⚠️ لم يتم العثور على بيانات أو روابط في الملف المثبت');
                }
                return;
            }
            
            // إذا كان الملف المثبت يحتوي على روابط، نقوم بجلب الملفات من تلك الروابط
            showStatus(`⏳ تم العثور على ${extracted.length} رابط في الملف المثبت. جاري جلب الملفات...`);
            
            let totalLoaded = 0;
            for (let i = 0; i < extracted.length; i++) {
                showStatus(`⏳ جلب ملف الرسالة ${i+1}/${extracted.length}...`);
                logDebug(`محاولة جلب الملف من الرابط: ${extracted[i].fullUrl}`);
                const content = await fetchFileContentAsBot(extracted[i].chatId, extracted[i].messageId);
                
                if (content) {
                    logDebug(`تم جلب محتوى الملف بنجاح (${content.length} حرف)`);
                    const count = parseDistributorsFromText(content);
                    totalLoaded += count;
                }
            }
            
            if (totalLoaded > 0) {
                showStatus(`✅ تم جلب ${totalLoaded} موزع من الروابط بنجاح`);
                updateTable();
            } else {
                showStatus('⚠️ لم يتم العثور على بيانات في الملفات المرفقة');
            }
            
        } catch (error) {
            console.error(error);
            showStatus(`❌ خطأ: ${error.message}`);
        }
    }
    
    // ========== 2. استخراج المعرفات من النص ==========
    function extractMessageIds(text) {
        extractedLinksArray = [];
        const privateRegex = /https?:\/\/t\.me\/c\/(\d+)\/(\d+)/g;
        const publicRegex = /https?:\/\/t\.me\/([a-zA-Z0-9_]+)\/(\d+)/g;
        
        let match;
        const linksDiv = document.getElementById('extractedLinks');
        linksDiv.innerHTML = '';
        
        while ((match = privateRegex.exec(text)) !== null) {
            const chatId = '-100' + match[1];
            const messageId = parseInt(match[2]);
            extractedLinksArray.push({ chatId, messageId, fullUrl: match[0] });
            addLinkToUI(match[0]);
        }
        
        while ((match = publicRegex.exec(text)) !== null) {
            if (!isNaN(match[1])) continue;
            const chatId = '@' + match[1];
            const messageId = parseInt(match[2]);
            extractedLinksArray.push({ chatId, messageId, fullUrl: match[0] });
            addLinkToUI(match[0]);
        }
        
        function addLinkToUI(url) {
            const linkDiv = document.createElement('div');
            linkDiv.className = 'link-item';
            linkDiv.innerHTML = `🔗 ${url}`;
            linksDiv.appendChild(linkDiv);
        }
        
        logDebug(`تم استخراج ${extractedLinksArray.length} رابط من النص`);
        return extractedLinksArray;
    }
    
    // ========== 3. جلب محتوى ملف من رابط ==========
    async function fetchFileContentAsBot(chatId, messageId) {
        try {
            const forwardResponse = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/forwardMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHANNEL_ID,
                    from_chat_id: chatId,
                    message_id: messageId,
                    disable_notification: true
                })
            });

            const forwardData = await forwardResponse.json();

            if (forwardData.ok) {
                let fileText = null;
                if (forwardData.result.document && forwardData.result.document.file_name.toLowerCase().endsWith('.txt')) {
                    fileText = await downloadTelegramFile(forwardData.result.document.file_id);
                }
                
                // حذف الرسالة الموجهة
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/deleteMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHANNEL_ID,
                        message_id: forwardData.result.message_id
                    })
                });
                
                return fileText;
            }
            return null;
        } catch (error) {
            logDebug(`خطأ في fetchFileContentAsBot: ${error.message}`);
            return null;
        }
    }

    // دالة تحميل الملف المباشرة
    async function downloadTelegramFile(fileId) {
        try {
            const fileRes = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getFile?file_id=${fileId}`);
            const fileData = await fileRes.json();
            
            if (fileData.ok) {
                const filePath = fileData.result.file_path;
                const downloadUrl = `https://api.telegram.org/file/bot${BOT_TOKEN}/${filePath}`;
                const contentRes = await fetch(downloadUrl);
                if (!contentRes.ok) throw new Error(`فشل تحميل الملف: ${contentRes.status}`);
                return await contentRes.text();
            }
            return null;
        } catch (e) {
            logDebug(`خطأ في downloadTelegramFile: ${e.message}`);
            return null;
        }
    }
    
    // ========== 4. تحويل النص إلى بيانات موزعين ==========
    function parseDistributorsFromText(text) {
        const newDistributors = [];
        const lines = text.split(/\r?\n/);
        let currentState = '';
        
        for (let i = 0; i < lines.length; i++) {
            let line = lines[i].trim();
            if (!line) continue;
            
            if (line.includes('📍')) {
                let stateMatch = line.match(/📍\s*ولاية\s+(.+?)(?:\s+-|$)/) || line.match(/📍\s*(.+?)(?:\s+-|$)/);
                if (stateMatch) {
                    currentState = stateMatch[1].replace(/\s*-\s*العدد.*$/, '').trim();
                }
                continue;
            }
            
            if (line.startsWith('•')) {
                const companyMatch = line.match(/•\s+(.+?)\s*\((.+?)\)/) || line.match(/•\s+(.+)/);
                if (companyMatch && currentState) {
                    const company = companyMatch[1].trim();
                    const type = companyMatch[2] ? companyMatch[2].trim().toLowerCase() : 'delivery';
                    
                    let manager = 'غير محدد';
                    let phone = 'غير محدد';
                    
                    for (let j = 1; j <= 3; j++) {
                        if (i + j < lines.length) {
                            const nextLine = lines[i + j].trim();
                            if (nextLine.startsWith('•') || nextLine.includes('📍')) break;
                            
                            let mMatch = nextLine.match(/👤\s*(.+?)(?:\s*\||$)/);
                            let pMatch = nextLine.match(/📞\s*([\d\s+-]+)/);
                            
                            if (mMatch) manager = mMatch[1].trim();
                            if (pMatch) phone = pMatch[1].trim();
                        }
                    }
                    newDistributors.push({ company, manager, phone, type, state: currentState });
                }
            }
        }
        
        if (newDistributors.length > 0) {
            for (const newDist of newDistributors) {
                const exists = distributors.some(d => d.company === newDist.company && d.state === newDist.state);
                if (!exists) distributors.push(newDist);
            }
            updateTable();
        }
        return newDistributors.length;
    }

    updateTable();
    showStatus('✓ النظام جاهز | سيتم تحميل ملف الـ TXT المثبت مباشرة');
</script>
</body>
</html>
