<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ناردو برو - النظام المتكامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0f3460, #16213e);
            color: white;
            direction: rtl;
            min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .header {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Cairo', sans-serif;
        }
        .btn-gold { background: #ffd700; color: #000; }
        .btn-gold:hover { transform: translateY(-2px); background: #ffed4e; }
        .btn-telegram { background: #0088cc; color: white; }
        .btn-telegram:hover { transform: translateY(-2px); background: #006699; }
        .btn-pdf { background: #dc3545; color: white; }
        .btn-pdf:hover { transform: translateY(-2px); background: #bb2d3b; }
        .btn-info { background: #17a2b8; color: white; }
        .btn-info:hover { transform: translateY(-2px); background: #138496; }
        .btn-success { background: #28a745; color: white; }
        .btn-success:hover { transform: translateY(-2px); background: #218838; }
        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            overflow: hidden;
        }
        th {
            background: rgba(255,215,0,0.1);
            color: #ffd700;
            padding: 15px;
            text-align: right;
            border-bottom: 2px solid #ffd700;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid rgba(255,215,0,0.1);
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .search-box input {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,215,0,0.3);
            background: rgba(0,0,0,0.3);
            color: white;
            font-family: 'Cairo', sans-serif;
        }
        .notification {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        .notification.success { background: #28a745; color: white; }
        .notification.error { background: #dc3545; color: white; }
        .notification.info { background: #17a2b8; color: white; }
        @keyframes slideIn {
            from { transform: translateX(-400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255,215,0,0.2);
        }
        .stat-number {
            font-size: 32px;
            font-weight: bold;
            color: #ffd700;
        }
        .filter-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 8px 20px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 20px;
            cursor: pointer;
            color: white;
        }
        .filter-btn.active {
            background: #ffd700;
            color: #000;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #1a1a2e;
            border: 2px solid #ffd700;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
        }
        .modal-content input {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border-radius: 10px;
            border: 1px solid rgba(255,215,0,0.3);
            background: rgba(0,0,0,0.3);
            color: white;
        }
        .close-btn {
            float: left;
            font-size: 28px;
            cursor: pointer;
            color: #ffd700;
            background: none;
            border: none;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-truck"></i> ناردو برو | النظام المتكامل</h1>
        <div>
            <button class="btn btn-gold" onclick="openAddDistributor()"><i class="fas fa-plus"></i> إضافة موزع</button>
            <button class="btn btn-pdf" onclick="createAndSendPDF()"><i class="fas fa-file-pdf"></i> إنشاء PDF</button>
            <button class="btn btn-telegram" onclick="sendPDFToTelegram()"><i class="fab fa-telegram"></i> إرسال للقناة</button>
            <button class="btn btn-info" onclick="fetchFromPinned()"><i class="fas fa-thumbtack"></i> جلب من المثبتة</button>
            <button class="btn btn-success" onclick="showUrlModal()"><i class="fas fa-link"></i> جلب من رابط</button>
        </div>
    </div>

    <div class="stats" id="stats"></div>

    <div class="card">
        <h2 style="color: #ffd700; margin-bottom: 20px;"><i class="fas fa-table"></i> جدول الموزعين</h2>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 بحث باسم الموزع..." onkeyup="filterTable()">
        </div>
        <div class="filter-buttons">
            <button class="filter-btn active" onclick="filterByType('all')">الكل</button>
            <button class="filter-btn" onclick="filterByType('delivery')">🚚 توصيل</button>
            <button class="filter-btn" onclick="filterByType('distributor')">📦 موزع</button>
            <button class="filter-btn" onclick="filterByType('both')">🔄 كليهما</button>
        </div>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>اسم الشركة</th>
                        <th>المسؤول</th>
                        <th>الهاتف</th>
                        <th>النوع</th>
                        <th>الولاية</th>
                        <th>الحالة</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="urlModal" class="modal">
    <div class="modal-content">
        <button class="close-btn" onclick="closeUrlModal()">&times;</button>
        <h2 style="color: #ffd700;">جلب PDF من رابط</h2>
        <input type="text" id="pdfUrl" placeholder="رابط PDF من تليجرام">
        <button class="btn btn-gold" onclick="fetchFromUrl()" style="width: 100%;">جلب وتحليل</button>
    </div>
</div>

<div id="addModal" class="modal">
    <div class="modal-content">
        <button class="close-btn" onclick="closeAddModal()">&times;</button>
        <h2 style="color: #ffd700;">إضافة موزع جديد</h2>
        <input type="text" id="compName" placeholder="اسم الشركة">
        <input type="text" id="mgrName" placeholder="اسم المسؤول">
        <input type="tel" id="phone" placeholder="رقم الهاتف">
        <select id="type" style="width:100%; padding:12px; margin:10px 0; border-radius:10px;">
            <option value="delivery">توصيل</option>
            <option value="distributor">موزع</option>
            <option value="both">كليهما</option>
        </select>
        <input type="text" id="state" placeholder="الولاية">
        <button class="btn btn-gold" onclick="addDistributor()" style="width: 100%;">إضافة</button>
    </div>
</div>

<script>
    // ==================== الإعدادات الأساسية ====================
    const TELEGRAM = {
        botToken: '8576673096:AAGvSMjzwVWj6wJ47JdqiDwcObXjBDcyiLA',
        channelId: '-1003822964890',
        apiUrl: 'https://api.telegram.org/bot'
    };

    // البيانات
    let distributors = [
        { id: 1, company: "شركة البراق", manager: "أحمد محمد", phone: "0555123456", type: "delivery", state: "الجزائر", status: "approved" },
        { id: 2, company: "مؤسسة السريع", manager: "سعيد علي", phone: "0555234567", type: "distributor", state: "وهران", status: "approved" },
        { id: 3, company: "شركة الأمانة", manager: "خالد عمر", phone: "0555345678", type: "both", state: "قسنطينة", status: "approved" }
    ];
    
    let currentFilter = 'all';
    let currentSearch = '';

    // ==================== 1. عرض البيانات في الجدول ====================
    function displayTable() {
        let filtered = distributors.filter(d => d.status === 'approved');
        
        if (currentFilter !== 'all') {
            filtered = filtered.filter(d => d.type === currentFilter);
        }
        if (currentSearch) {
            filtered = filtered.filter(d => d.company.includes(currentSearch));
        }
        
        const tbody = document.getElementById('tableBody');
        if (filtered.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center">لا توجد بيانات</td></tr>';
            return;
        }
        
        tbody.innerHTML = filtered.map((d, i) => `
            <tr>
                <td>${i+1}</td>
                <td>${d.company}</td>
                <td>${d.manager}</td>
                <td>${d.phone}</td>
                <td>${d.type === 'delivery' ? '🚚 توصيل' : d.type === 'distributor' ? '📦 موزع' : '🔄 كليهما'}</td>
                <td>${d.state}</td>
                <td><span style="background:#28a745; padding:5px 10px; border-radius:20px; font-size:12px;">معتمد</span></td>
            </tr>
        `).join('');
        
        updateStats();
    }
    
    function updateStats() {
        const approved = distributors.filter(d => d.status === 'approved');
        const delivery = approved.filter(d => d.type === 'delivery' || d.type === 'both').length;
        const distributor = approved.filter(d => d.type === 'distributor' || d.type === 'both').length;
        
        document.getElementById('stats').innerHTML = `
            <div class="stat-card"><div class="stat-number">${approved.length}</div><div>إجمالي الموزعين</div></div>
            <div class="stat-card"><div class="stat-number">${delivery}</div><div>خدمة توصيل</div></div>
            <div class="stat-card"><div class="stat-number">${distributor}</div><div>موزعون</div></div>
            <div class="stat-card"><div class="stat-number">${new Set(approved.map(d => d.state)).size}</div><div>ولايات</div></div>
        `;
    }
    
    function filterTable() {
        currentSearch = document.getElementById('searchInput').value;
        displayTable();
    }
    
    function filterByType(type) {
        currentFilter = type;
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        displayTable();
    }
    
    function addDistributor() {
        const newDist = {
            id: Date.now(),
            company: document.getElementById('compName').value,
            manager: document.getElementById('mgrName').value,
            phone: document.getElementById('phone').value,
            type: document.getElementById('type').value,
            state: document.getElementById('state').value,
            status: 'approved'
        };
        
        if (newDist.company && newDist.manager && newDist.phone && newDist.state) {
            distributors.push(newDist);
            displayTable();
            closeAddModal();
            showNotification('✅ تم إضافة الموزع بنجاح', 'success');
        } else {
            showNotification('⚠️ الرجاء ملء جميع الحقول', 'error');
        }
    }
    
    // ==================== 2. إنشاء PDF ====================
    async function createAndSendPDF() {
        const approved = distributors.filter(d => d.status === 'approved');
        if (approved.length === 0) {
            showNotification('⚠️ لا يوجد موزعون', 'error');
            return;
        }
        
        showNotification('📄 جاري إنشاء PDF...', 'info');
        
        const container = document.createElement('div');
        container.style.position = 'absolute';
        container.style.left = '-9999px';
        container.style.top = '-9999px';
        container.style.width = '800px';
        container.style.backgroundColor = 'white';
        container.style.padding = '30px';
        container.style.fontFamily = 'Cairo, sans-serif';
        container.style.direction = 'rtl';
        container.style.color = '#000';
        
        let html = `
            <div style="text-align:center; border-bottom:3px solid #ffd700; padding-bottom:20px; margin-bottom:20px;">
                <h1 style="color:#1a1a2e;">ناردو برو</h1>
                <h2 style="color:#2e7d32;">قائمة الموزعين المعتمدين</h2>
                <p>📅 ${new Date().toLocaleString('ar-SA')}</p>
                <p>📊 إجمالي الموزعين: ${approved.length}</p>
            </div>
            <table style="width:100%; border-collapse:collapse; direction:rtl;">
                <thead>
                    <tr style="background:#f2f2f2;">
                        <th style="border:1px solid #ddd; padding:10px;">#</th>
                        <th style="border:1px solid #ddd; padding:10px;">الشركة</th>
                        <th style="border:1px solid #ddd; padding:10px;">المسؤول</th>
                        <th style="border:1px solid #ddd; padding:10px;">الهاتف</th>
                        <th style="border:1px solid #ddd; padding:10px;">النوع</th>
                        <th style="border:1px solid #ddd; padding:10px;">الولاية</th>
                    </tr>
                </thead>
                <tbody>
        `;
        
        approved.forEach((d, i) => {
            const typeText = d.type === 'delivery' ? 'توصيل' : d.type === 'distributor' ? 'موزع' : 'كليهما';
            html += `
                <tr>
                    <td style="border:1px solid #ddd; padding:10px;">${i+1}</td>
                    <td style="border:1px solid #ddd; padding:10px;">${d.company}</td>
                    <td style="border:1px solid #ddd; padding:10px;">${d.manager}</td>
                    <td style="border:1px solid #ddd; padding:10px;">${d.phone}</td>
                    <td style="border:1px solid #ddd; padding:10px;">${typeText}</td>
                    <td style="border:1px solid #ddd; padding:10px;">${d.state}</td>
                </tr>
            `;
        });
        
        html += `</tbody></table>`;
        container.innerHTML = html;
        document.body.appendChild(container);
        
        try {
            const canvas = await html2canvas(container, { scale: 2, backgroundColor: '#ffffff' });
            const imgData = canvas.toDataURL('image/png');
            const { jsPDF } = window.jspdf;
            const imgWidth = 210;
            const imgHeight = (canvas.height * imgWidth) / canvas.width;
            const doc = new jsPDF('p', 'mm', 'a4');
            doc.addImage(imgData, 'PNG', 0, 0, imgWidth, imgHeight);
            
            // حفظ PDF محلياً
            doc.save(`distributors_${Date.now()}.pdf`);
            showNotification('✅ تم إنشاء PDF بنجاح', 'success');
            
            return doc;
        } catch (error) {
            showNotification('❌ فشل: ' + error.message, 'error');
        } finally {
            document.body.removeChild(container);
        }
    }
    
    // ==================== 3. إرسال PDF إلى القناة ====================
    async function sendPDFToTelegram() {
        const approved = distributors.filter(d => d.status === 'approved');
        if (approved.length === 0) {
            showNotification('⚠️ لا يوجد موزعون', 'error');
            return;
        }
        
        showNotification('📤 جاري إنشاء وإرسال PDF...', 'info');
        
        const container = document.createElement('div');
        container.style.position = 'absolute';
        container.style.left = '-9999px';
        container.style.top = '-9999px';
        container.style.width = '800px';
        container.style.backgroundColor = 'white';
        container.style.padding = '30px';
        container.style.fontFamily = 'Cairo, sans-serif';
        container.style.direction = 'rtl';
        container.style.color = '#000';
        
        let html = `
            <div style="text-align:center; border-bottom:3px solid #ffd700; padding-bottom:20px; margin-bottom:20px;">
                <h1 style="color:#1a1a2e;">ناردو برو</h1>
                <h2 style="color:#2e7d32;">قائمة الموزعين المعتمدين</h2>
                <p>📅 ${new Date().toLocaleString('ar-SA')}</p>
                <p>📊 إجمالي الموزعين: ${approved.length}</p>
            </div>
            <table style="width:100%; border-collapse:collapse; direction:rtl;">
                <thead><tr style="background:#f2f2f2;">
                    <th style="border:1px solid #ddd; padding:10px;">#</th>
                    <th style="border:1px solid #ddd; padding:10px;">الشركة</th>
                    <th style="border:1px solid #ddd; padding:10px;">المسؤول</th>
                    <th style="border:1px solid #ddd; padding:10px;">الهاتف</th>
                    <th style="border:1px solid #ddd; padding:10px;">النوع</th>
                    <th style="border:1px solid #ddd; padding:10px;">الولاية</th>
                </tr></thead><tbody>
        `;
        
        approved.forEach((d, i) => {
            const typeText = d.type === 'delivery' ? 'توصيل' : d.type === 'distributor' ? 'موزع' : 'كليهما';
            html += `<tr>
                <td style="border:1px solid #ddd; padding:10px;">${i+1}</td>
                <td style="border:1px solid #ddd; padding:10px;">${d.company}</td>
                <td style="border:1px solid #ddd; padding:10px;">${d.manager}</td>
                <td style="border:1px solid #ddd; padding:10px;">${d.phone}</td>
                <td style="border:1px solid #ddd; padding:10px;">${typeText}</td>
                <td style="border:1px solid #ddd; padding:10px;">${d.state}</td>
            </tr>`;
        });
        
        html += `</tbody></table>`;
        container.innerHTML = html;
        document.body.appendChild(container);
        
        try {
            const canvas = await html2canvas(container, { scale: 2, backgroundColor: '#ffffff' });
            const imgData = canvas.toDataURL('image/png');
            const { jsPDF } = window.jspdf;
            const imgWidth = 210;
            const imgHeight = (canvas.height * imgWidth) / canvas.width;
            const doc = new jsPDF('p', 'mm', 'a4');
            doc.addImage(imgData, 'PNG', 0, 0, imgWidth, imgHeight);
            
            const pdfBlob = doc.output('blob');
            const formData = new FormData();
            formData.append('chat_id', TELEGRAM.channelId);
            formData.append('document', pdfBlob, `distributors_${Date.now()}.pdf`);
            formData.append('caption', `📋 قائمة الموزعين المعتمدين\n📅 ${new Date().toLocaleString('ar-SA')}\n✅ العدد: ${approved.length}`);
            
            const response = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/sendDocument`, { method: 'POST', body: formData });
            const result = await response.json();
            
            if (response.ok && result.ok) {
                showNotification('✅ تم إرسال PDF إلى القناة بنجاح', 'success');
            } else {
                throw new Error(result.description);
            }
        } catch (error) {
            showNotification('❌ فشل الإرسال: ' + error.message, 'error');
        } finally {
            document.body.removeChild(container);
        }
    }
    
    // ==================== 4. جلب من القناة وتحليل النص وملء الجدول ====================
    async function fetchFromPinned() {
        showNotification('📡 جلب PDF من الرسالة المثبتة...', 'info');
        
        try {
            const chatResponse = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getChat?chat_id=${TELEGRAM.channelId}`);
            const chatData = await chatResponse.json();
            
            if (!chatData.ok || !chatData.result.pinned_message) {
                showNotification('⚠️ لا توجد رسالة مثبتة', 'error');
                return;
            }
            
            const pinnedMsg = chatData.result.pinned_message;
            if (!pinnedMsg.document || pinnedMsg.document.mime_type !== 'application/pdf') {
                showNotification('⚠️ الرسالة المثبتة ليست PDF', 'error');
                return;
            }
            
            const fileResponse = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getFile?file_id=${pinnedMsg.document.file_id}`);
            const fileData = await fileResponse.json();
            const pdfUrl = `https://api.telegram.org/file/bot${TELEGRAM.botToken}/${fileData.result.file_path}`;
            
            await extractAndFillTable(pdfUrl);
            
        } catch (error) {
            showNotification('❌ فشل الجلب: ' + error.message, 'error');
        }
    }
    
    async function fetchFromUrl() {
        let url = document.getElementById('pdfUrl').value.trim();
        if (!url) {
            showNotification('⚠️ أدخل الرابط', 'error');
            return;
        }
        
        closeUrlModal();
        showNotification('📡 جاري جلب وتحليل PDF...', 'info');
        
        try {
            let pdfUrl = url;
            const tgMatch = url.match(/t\.me\/c\/(\d+)\/(\d+)/);
            
            if (tgMatch) {
                const chatId = `-100${tgMatch[1]}`;
                const messageId = parseInt(tgMatch[2]);
                const msgResponse = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getMessage?chat_id=${chatId}&message_id=${messageId}`);
                const msgData = await msgResponse.json();
                
                if (msgData.ok && msgData.result.document) {
                    const fileResponse = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getFile?file_id=${msgData.result.document.file_id}`);
                    const fileData = await fileResponse.json();
                    pdfUrl = `https://api.telegram.org/file/bot${TELEGRAM.botToken}/${fileData.result.file_path}`;
                }
            }
            
            await extractAndFillTable(pdfUrl);
            
        } catch (error) {
            showNotification('❌ فشل: ' + error.message, 'error');
        }

async function extractAndFillTable(pdfUrl) {
    showNotification('📄 جاري استخراج البيانات من PDF...', 'info');
    
    try {
        // تحميل PDF
        const loadingTask = pdfjsLib.getDocument(pdfUrl);
        const pdf = await loadingTask.promise;
        let fullText = '';
        
        // استخراج النص من جميع الصفحات
        for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const textContent = await page.getTextContent();
            const pageText = textContent.items.map(item => item.str).join(' ');
            fullText += pageText + '\n';
            
            // عرض تقدم الاستخراج
            showNotification(`📄 جاري قراءة الصفحة ${i} من ${pdf.numPages}...`, 'info');
        }
        
        console.log('النص المستخرج:', fullText); // للتصحيح
        
        // تحليل النص المحسن
        const newDistributors = enhancedParseText(fullText);
        
        if (newDistributors.length === 0) {
            showNotification('⚠️ لم يتم العثور على بيانات، حاول استخدام صيغة مختلفة', 'warning');
            // محاولة تحليل بديل
            const alternativeResults = alternativeParseText(fullText);
            if (alternativeResults.length > 0) {
                addDistributorsToTable(alternativeResults);
                return;
            }
            return;
        }
        
        addDistributorsToTable(newDistributors);
        
    } catch (error) {
        console.error('خطأ:', error);
        showNotification('❌ فشل استخراج البيانات: ' + error.message, 'error');
    }
}

// ==================== تحليل النص المحسن ====================
function enhancedParseText(text) {
    const distributors = [];
    
    // تنظيف النص
    let cleanText = text
        .replace(/[•*_\-+=]/g, ' ')
        .replace(/\s+/g, ' ')
        .replace(/[0-9]+\./g, ' ')
        .trim();
    
    // النمط 1: اسم | مسؤول | هاتف | ولاية
    const pattern1 = /([^\|\n]{2,30}?)\s*\|\s*([^\|\n]{2,30}?)\s*\|\s*([0-9]{9,15})\s*\|\s*([^\|\n]{2,30})/gi;
    let match;
    while ((match = pattern1.exec(cleanText)) !== null) {
        distributors.push({
            company: match[1].trim(),
            manager: match[2].trim(),
            phone: match[3].trim(),
            type: detectType(match[0]),
            state: match[4].trim()
        });
    }
    
    // النمط 2: الاسم: ... المسؤول: ... الهاتف: ... الولاية: ...
    const pattern2 = /الاسم[:\s]+([^\n]+?)(?:المسؤول|مدير)[:\s]+([^\n]+?)(?:هاتف|جوال|رقم)[:\s]+([0-9]{9,15})(?:ولاية|الولاية)[:\s]+([^\n]+)/gi;
    while ((match = pattern2.exec(cleanText)) !== null) {
        distributors.push({
            company: match[1].trim(),
            manager: match[2].trim(),
            phone: match[3].trim(),
            type: detectType(match[0]),
            state: match[4].trim()
        });
    }
    
    // النمط 3: شركة: ... مدير: ... هاتف: ... ولاية: ...
    const pattern3 = /شركة[:\s]+([^\n]+?)(?:مدير|مسؤول)[:\s]+([^\n]+?)(?:هاتف|تلفون)[:\s]+([0-9]{9,15})(?:ولاية)[:\s]+([^\n]+)/gi;
    while ((match = pattern3.exec(cleanText)) !== null) {
        distributors.push({
            company: match[1].trim(),
            manager: match[2].trim(),
            phone: match[3].trim(),
            type: detectType(match[0]),
            state: match[4].trim()
        });
    }
    
    // النمط 4: سطور بسيطة (كل سطر يحتوي على اسم ورقم)
    const lines = cleanText.split(/[.\n،;]/);
    for (const line of lines) {
        const phoneMatch = line.match(/([0-9]{9,15})/);
        if (phoneMatch) {
            const parts = line.split(/\s+/).filter(p => p.length > 0);
            let company = '', manager = '', state = '';
            
            for (let i = 0; i < parts.length; i++) {
                if (parts[i].match(/[0-9]{9,15}/)) {
                    // الرقم موجود
                } else if (parts[i].length > 2 && !company) {
                    company = parts[i];
                } else if (parts[i].length > 2 && !manager) {
                    manager = parts[i];
                } else if (parts[i].length > 1 && !state) {
                    state = parts[i];
                }
            }
            
            if (company && phoneMatch[1]) {
                distributors.push({
                    company: company,
                    manager: manager || 'غير محدد',
                    phone: phoneMatch[1],
                    type: detectType(line),
                    state: state || 'غير محدد'
                });
            }
        }
    }
    
    // إزالة التكرارات
    return removeDuplicates(distributors);
}

// ==================== تحليل بديل (عند فشل التحليل الرئيسي) ====================
function alternativeParseText(text) {
    const distributors = [];
    
    // البحث عن أرقام الهواتف
    const phones = text.match(/(0[0-9]{9})|([0-9]{10,})/g);
    if (!phones) return [];
    
    // تقسيم النص إلى أقسام
    const sections = text.split(/\n{2,}/);
    
    for (const section of sections) {
        const sectionPhones = section.match(/(0[0-9]{9})|([0-9]{10,})/g);
        if (sectionPhones && sectionPhones.length > 0) {
            // استخراج الأسماء
            const words = section.match(/[\u0600-\u06FF]{3,}/g);
            if (words && words.length >= 2) {
                distributors.push({
                    company: words[0] || 'شركة',
                    manager: words[1] || 'مدير',
                    phone: sectionPhones[0],
                    type: section.includes('توصيل') ? 'delivery' : (section.includes('موزع') ? 'distributor' : 'delivery'),
                    state: words[2] || 'الجزائر'
                });
            }
        }
    }
    
    return removeDuplicates(distributors);
}

// ==================== اكتشاف نوع الخدمة ====================
function detectType(text) {
    if (text.includes('كليهما') || text.includes('كلاهما') || (text.includes('توصيل') && text.includes('موزع'))) {
        return 'both';
    } else if (text.includes('موزع') || text.includes('توزيع')) {
        return 'distributor';
    } else {
        return 'delivery';
    }
}

// ==================== إزالة التكرارات ====================
function removeDuplicates(distributors) {
    const unique = [];
    const seen = new Set();
    
    for (const d of distributors) {
        const key = `${d.company}_${d.phone}`;
        if (!seen.has(key) && d.company.length > 2 && d.phone.length >= 9) {
            seen.add(key);
            unique.push(d);
        }
    }
    
    return unique;
}

// ==================== إضافة الموزعين إلى الجدول ====================
function addDistributorsToTable(newDistributors) {
    let addedCount = 0;
    
    for (const newDist of newDistributors) {
        // التحقق من عدم التكرار
        const exists = distributors.some(d => 
            d.company === newDist.company || 
            d.phone === newDist.phone
        );
        
        if (!exists) {
            distributors.push({
                id: Date.now() + Math.random(),
                company: newDist.company,
                manager: newDist.manager,
                phone: newDist.phone,
                type: newDist.type,
                state: newDist.state,
                status: 'approved'
            });
            addedCount++;
        }
    }
    
    // تحديث الجدول
    displayTable();
    
    if (addedCount > 0) {
        showNotification(`✅ تم استخراج وإضافة ${addedCount} موزع جديد`, 'success');
        
        // عرض عينة من البيانات المستخرجة
        console.log('البيانات المستخرجة:', newDistributors.slice(0, 5));
    } else {
        showNotification('⚠️ لا توجد بيانات جديدة للإضافة', 'warning');
    }
}
