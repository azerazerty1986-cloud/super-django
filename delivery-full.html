<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ناردو برو - نظام الفهرس</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --bg: #0f3460; --card-bg: #16213e; --text: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); direction: rtl; min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .card { background: var(--card-bg); border: 1px solid rgba(255, 215, 0, 0.3); border-radius: 15px; padding: 25px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        h1, h2 { color: var(--gold); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .btn { padding: 12px 24px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-family: 'Cairo'; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4); }
        .btn-info { background: #17a2b8; color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-success { background: #28a745; color: white; }
        .input-group { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 20px; }
        input, select { padding: 12px; border-radius: 10px; border: 1px solid rgba(255, 215, 0, 0.3); background: rgba(0,0,0,0.2); color: white; font-family: 'Cairo'; width: 100%; }
        input:focus { border-color: var(--gold); outline: none; }
        .filter-section { display: flex; gap: 15px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; overflow: hidden; border-radius: 10px; }
        th, td { padding: 15px; text-align: center; border-bottom: 1px solid rgba(255, 215, 0, 0.1); }
        th { background: rgba(255, 215, 0, 0.1); color: var(--gold); font-weight: 700; }
        tr:hover { background: rgba(255, 255, 255, 0.03); }
        .status-bar { background: rgba(0,0,0,0.3); padding: 10px 20px; border-radius: 10px; color: var(--gold); font-weight: bold; margin-top: 10px; text-align: center; }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .badge-delivery { background: #28a745; color: white; }
        .badge-distributor { background: #007bff; color: white; }
        .badge-both { background: #6f42c1; color: white; }
        .link-box { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 10px; margin: 10px 0; direction: ltr; text-align: left; font-family: monospace; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1><i class="fas fa-shuttle-van"></i> ناردو برو | نظام الفهرس</h1>
        <div style="display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;">
            <button class="btn btn-gold" onclick="fetchNorth()"><i class="fas fa-arrow-up"></i> جلب الشمال</button>
            <button class="btn btn-info" onclick="testConnection()"><i class="fas fa-vial"></i> اختبار الاتصال</button>
            <button class="btn btn-danger" onclick="clearAll()"><i class="fas fa-trash-alt"></i> مسح الكل</button>
        </div>
        <div id="status" class="status-bar">جاهز للعمل</div>
    </div>

    <div class="card">
        <h2><i class="fas fa-link"></i> رابط الفهرس</h2>
        <div class="link-box">
            🔼 الشمال: https://t.me/c/3822964890/3619
        </div>
        <div style="margin-top: 10px; padding: 10px; background: rgba(255,0,0,0.2); border-radius: 10px;">
            <i class="fas fa-info-circle"></i> تأكد من أن البوت مشرف في القناة مع صلاحية "قراءة الرسائل"
        </div>
    </div>

    <div class="card">
        <h2><i class="fas fa-table"></i> جدول الموزعين</h2>
        <div class="filter-section">
            <span><i class="fas fa-filter"></i> فلترة حسب الولاية:</span>
            <select id="stateFilter" onchange="updateTable()" style="max-width: 250px;">
                <option value="all">كل الولايات</option>
            </select>
            <span id="countDisplay" style="margin-right: auto; color: var(--gold);">العدد: 0</span>
        </div>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>الموزع</th>
                        <th>المسؤول</th>
                        <th>الهاتف</th>
                        <th>النوع</th>
                        <th>الولاية</th>
                        <th>إجراء</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const BOT_TOKEN = '8576673096:AAGvSMjzwVWj6wJ47JdqiDwcObXjBDcyiLA';
    
    // الرابط الجديد للشمال
    const NORTH_LINK = {
        url: 'https://t.me/c/3822964890/3619',
        chatId: '-1003822964890',  // أضفنا -100 قبل المعرف
        messageId: 3619
    };
    
    let distributors = [];
    
    // اختبار الاتصال بالقناة
    async function testConnection() {
        showStatus('⏳ جاري اختبار الاتصال...');
        
        try {
            // اختبار 1: جلب معلومات القناة
            const chatRes = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getChat?chat_id=${NORTH_LINK.chatId}`);
            const chatData = await chatRes.json();
            
            if (chatData.ok) {
                console.log('✅ القناة:', chatData.result.title);
                showStatus(`✅ القناة: ${chatData.result.title}`);
            } else {
                console.log('❌ خطأ في القناة:', chatData.description);
                showStatus(`❌ خطأ في القناة: ${chatData.description}`);
                return;
            }
            
            // اختبار 2: جلب الرسالة
            const msgRes = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getMessage?chat_id=${NORTH_LINK.chatId}&message_id=${NORTH_LINK.messageId}`);
            const msgData = await msgRes.json();
            
            if (msgData.ok) {
                console.log('✅ الرسالة موجودة');
                console.log('المحتوى:', msgData.result.text);
                showStatus(`✅ تم العثور على الرسالة - طول النص: ${msgData.result.text.length} حرف`);
                
                // عرض أول 200 حرف من الرسالة
                const preview = msgData.result.text.substring(0, 200);
                document.getElementById('status').innerHTML += `<br>📄 معاينة: ${preview}...`;
            } else {
                console.log('❌ خطأ في الرسالة:', msgData.description);
                showStatus(`❌ خطأ في الرسالة: ${msgData.description}`);
            }
            
        } catch (e) {
            showStatus(`❌ خطأ: ${e.message}`);
        }
    }
    
    // جلب موزعين الشمال
    async function fetchNorth() {
        showStatus('⏳ جاري جلب موزعين الشمال...');
        
        try {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/getMessage?chat_id=${NORTH_LINK.chatId}&message_id=${NORTH_LINK.messageId}`;
            const res = await fetch(url);
            const data = await res.json();
            
            if (data.ok && data.result.text) {
                const text = data.result.text;
                console.log('نص الرسالة:', text);
                
                const newDistributors = parseDistributorsFromText(text);
                
                if (newDistributors.length > 0) {
                    distributors = newDistributors;
                    updateTable();
                    showStatus(`✅ تم جلب ${newDistributors.length} موزع من الشمال`);
                } else {
                    showStatus(`⚠️ لم يتم العثور على بيانات في الرسالة`);
                    showStatus(`📄 نص الرسالة: ${text.substring(0, 100)}...`);
                }
            } else {
                showStatus(`❌ فشل جلب الرسالة: ${data.description || 'خطأ غير معروف'}`);
            }
        } catch (e) {
            showStatus(`❌ خطأ: ${e.message}`);
        }
    }
    
    // تحويل النص إلى مصفوفة موزعين
    function parseDistributorsFromText(text) {
        const result = [];
        const lines = text.split('\n');
        
        for (let line of lines) {
            // تخطي السطور الفارغة والعناوين
            if (line.startsWith('📋') || line.startsWith('━━') || line.startsWith('📍') || line.startsWith('طلبات') || line.trim() === '') {
                continue;
            }
            
            // التنسيق: اسم|مسؤول|هاتف|نوع|ولاية
            if (line.includes('|')) {
                const parts = line.split('|');
                if (parts.length >= 3) {
                    result.push({
                        company: parts[0]?.trim() || '',
                        manager: parts[1]?.trim() || '',
                        phone: parts[2]?.trim() || '',
                        type: parts[3]?.trim() || 'موزع',
                        state: parts[4]?.trim() || 'الشمال'
                    });
                }
            }
            // التنسيق: اسم - هاتف - ولاية
            else if (line.includes('-')) {
                const parts = line.split('-');
                if (parts.length >= 2) {
                    result.push({
                        company: parts[0]?.trim() || '',
                        manager: '',
                        phone: parts[1]?.trim() || '',
                        type: 'موزع',
                        state: parts[2]?.trim() || 'الشمال'
                    });
                }
            }
            // إذا كان السطر يحتوي على نص فقط
            else if (line.trim().length > 0 && !line.includes('http')) {
                result.push({
                    company: line.trim(),
                    manager: '',
                    phone: '',
                    type: 'موزع',
                    state: 'الشمال'
                });
            }
        }
        
        return result;
    }
    
    // عرض البيانات في الجدول
    function updateTable() {
        const tbody = document.getElementById('tableBody');
        const filter = document.getElementById('stateFilter').value;
        
        const filtered = filter === 'all' ? distributors : distributors.filter(d => d.state === filter);
        
        document.getElementById('countDisplay').innerText = `العدد: ${filtered.length}`;
        
        if (filtered.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7">لا توجد بيانات حالياً</td><tr>';
            return;
        }
        
        tbody.innerHTML = filtered.map((d, i) => `
            <tr>
                <td>${i+1}</td>
                <td>${d.company || '-'}</td>
                <td>${d.manager || '-'}</td>
                <td>${d.phone || '-'}</td>
                <td><span class="badge badge-${d.type === 'موزع' ? 'distributor' : (d.type === 'توصيل' ? 'delivery' : 'both')}">${d.type || 'موزع'}</span></td>
                <td>${d.state || '-'}</td>
                <td><button class="btn btn-danger" style="padding: 5px 10px;" onclick="deleteItem(${i})"><i class="fas fa-trash"></i></button></td>
            </tr>
        `).join('');
        
        updateFilterOptions();
    }
    
    function updateFilterOptions() {
        const filterSelect = document.getElementById('stateFilter');
        const currentVal = filterSelect.value;
        const states = [...new Set(distributors.map(d => d.state))];
        
        filterSelect.innerHTML = '<option value="all">كل الولايات</option>' + 
            states.map(s => `<option value="${s}" ${s === currentVal ? 'selected' : ''}>${s}</option>`).join('');
    }
    
    function deleteItem(index) {
        distributors.splice(index, 1);
        updateTable();
        showStatus('🗑️ تم حذف الموزع');
    }
    
    function clearAll() {
        if (confirm('هل أنت متأكد من مسح جميع البيانات؟')) {
            distributors = [];
            updateTable();
            showStatus('🗑️ تم مسح الكل');
        }
    }
    
    function showStatus(msg) {
        document.getElementById('status').innerHTML = msg;
        console.log(msg);
    }
    
    updateTable();
    showStatus('✅ النظام جاهز - اضغط "اختبار الاتصال" أولاً');
</script>
</body>
</html>
