<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ناردو برو - معلومات تلغرام + نظام التوصيل</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', 'Tahoma', sans-serif;
            background: linear-gradient(135deg, #0f0f1a, #1a1a2e);
            color: #ffffff;
            min-height: 100vh;
            padding: 20px;
        }

        /* الحاوية الرئيسية */
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* ============================================================ */
        /* القسم الأول: جدول معلومات تلغرام */
        /* ============================================================ */
        .telegram-table-section {
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,215,0,0.2);
        }

        .telegram-table-section h2 {
            color: #ffd700;
            text-align: center;
            margin-bottom: 20px;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* الجدول الرئيسي */
        .info-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(0,0,0,0.4);
            border-radius: 15px;
            overflow: hidden;
        }

        .info-table tr {
            border-bottom: 1px solid rgba(255,215,0,0.2);
        }

        .info-table tr:last-child {
            border-bottom: none;
        }

        .info-table td {
            padding: 15px 20px;
            vertical-align: top;
        }

        .info-table td:first-child {
            width: 180px;
            font-weight: bold;
            color: #ffd700;
            background: rgba(255,215,0,0.05);
            border-left: 1px solid rgba(255,215,0,0.2);
        }

        .info-table td:last-child {
            color: #dddddd;
        }

        /* قائمة المنتجات داخل الجدول */
        .products-list {
            max-height: 200px;
            overflow-y: auto;
        }

        .product-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .product-item:last-child {
            border-bottom: none;
        }

        .product-name {
            font-weight: bold;
        }

        .product-merchant {
            color: #ffd700;
            font-size: 12px;
        }

        .product-price {
            color: #4ade80;
            font-size: 13px;
        }

        .merchant-item {
            padding: 5px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .status-online {
            background: #4ade80;
            color: #000;
        }

        .status-offline {
            background: #f87171;
            color: #fff;
        }

        .status-warning {
            background: #fbbf24;
            color: #000;
        }

        /* ============================================================ */
        /* القسم الثاني: نموذج التوصيل والتوثيق */
        /* ============================================================ */
        .delivery-section {
            background: rgba(255,255,255,0.05);
            border-radius: 25px;
            padding: 30px;
            border: 2px solid #ffd700;
        }

        .delivery-section h2 {
            color: #ffd700;
            text-align: center;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #ffd700;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,215,0,0.5);
            outline: none;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: #ffd700;
        }

        .time-options {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .time-options label {
            background: rgba(255,215,0,0.1);
            padding: 8px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: normal;
            color: white;
        }

        .time-options input {
            margin-left: 5px;
        }

        .delivery-summary {
            background: rgba(255,215,0,0.1);
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
        }

        .summary-line {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .summary-total {
            border-top: 2px solid #ffd700;
            padding-top: 10px;
            margin-top: 10px;
            font-size: 18px;
            font-weight: bold;
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .btn-confirm {
            flex: 1;
            padding: 14px;
            background: linear-gradient(135deg, #ffd700, #ccb000);
            color: black;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-confirm:hover {
            transform: scale(1.02);
            opacity: 0.9;
        }

        .btn-cancel {
            flex: 1;
            padding: 14px;
            background: #f87171;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-cancel:hover {
            opacity: 0.9;
        }

        /* الإشعارات */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
        }

        .toast {
            padding: 12px 20px;
            border-radius: 10px;
            margin-bottom: 10px;
            animation: slideIn 0.3s ease;
            font-weight: bold;
        }

        .toast.success {
            background: #4ade80;
            color: black;
        }

        .toast.error {
            background: #f87171;
            color: white;
        }

        .toast.info {
            background: #60a5fa;
            color: white;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* responsive */
        @media (max-width: 768px) {
            .info-table td {
                display: block;
                width: 100%;
            }
            .info-table td:first-child {
                border-left: none;
                border-bottom: 1px solid rgba(255,215,0,0.2);
            }
            .time-options label {
                flex: 1;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ============================================================ -->
        <!-- القسم الأول: جدول معلومات تلغرام (من ملف 04-telegram.js)      -->
        <!-- ============================================================ -->
        <div class="telegram-table-section">
            <h2><i class="fab fa-telegram"></i> معلومات تلغرام - المستخرجة من ملف 04-telegram.js</h2>
            <table class="info-table" id="telegramInfoTable">
                <tr>
                    <td><i class="fas fa-cog"></i> إعدادات تلغرام</td>
                    <td id="telegramSettings">جاري التحميل...</td>
                </tr>
                <tr>
                    <td><i class="fas fa-boxes"></i> المنتجات</td>
                    <td id="productsInfo">جاري التحميل...</td>
                </tr>
                <tr>
                    <td><i class="fas fa-users"></i> المستخدمين والتجار</td>
                    <td id="usersInfo">جاري التحميل...</td>
                </tr>
                <tr>
                    <td><i class="fas fa-chart-line"></i> حالة النظام</td>
                    <td id="systemStatus">جاري التحميل...</td>
                </tr>
            </table>
        </div>

        <!-- ============================================================ -->
        <!-- القسم الثاني: نموذج التوصيل والتوثيق                         -->
        <!-- ============================================================ -->
        <div class="delivery-section">
            <h2><i class="fas fa-truck"></i> توثيق الطلب مع التوصيل</h2>

            <div class="form-group">
                <label><i class="fas fa-user"></i> الاسم الكامل *</label>
                <input type="text" id="deliveryName" placeholder="أدخل اسمك الكامل">
            </div>

            <div class="form-group">
                <label><i class="fas fa-phone"></i> رقم الهاتف *</label>
                <input type="tel" id="deliveryPhone" placeholder="05xxxxxxxx">
            </div>

            <div class="form-group">
                <label><i class="fas fa-truck"></i> شركة التوصيل *</label>
                <select id="deliveryCompany">
                    <option value="0|ناردو إكسبرس|🚀|سريع (1-2 يوم)">🚀 ناردو إكسبرس - 0 دج</option>
                    <option value="-100|براقي برو|📮|عادي (2-4 يوم)">📮 براقي برو - خصم 100 دج</option>
                    <option value="300|دليفري سريع|⚡|فائق السرعة (24 ساعة)">⚡ دليفري سريع +300 دج</option>
                    <option value="-200|الجزائر بوست|📬|اقتصادي (3-5 يوم)">📬 الجزائر بوست -200 دج</option>
                </select>
            </div>

            <div class="form-group">
                <label><i class="fas fa-location-dot"></i> العنوان الكامل *</label>
                <textarea id="deliveryAddress" rows="2" placeholder="الشارع، رقم البناء، المدينة، معلم قريب"></textarea>
            </div>

            <div class="form-group">
                <label><i class="fas fa-clock"></i> وقت التوصيل المفضل</label>
                <div class="time-options">
                    <label><input type="radio" name="deliveryTime" value="أقرب وقت" checked> أقرب وقت</label>
                    <label><input type="radio" name="deliveryTime" value="الصباح (8ص-12م)"> الصباح</label>
                    <label><input type="radio" name="deliveryTime" value="بعد الظهر (12م-4م)"> بعد الظهر</label>
                    <label><input type="radio" name="deliveryTime" value="المساء (4م-8م)"> المساء</label>
                </div>
            </div>

            <div class="form-group">
                <label><i class="fas fa-sticky-note"></i> ملاحظات إضافية</label>
                <textarea id="deliveryNotes" rows="2" placeholder="تعليمات التوصيل..."></textarea>
            </div>

            <div id="deliverySummary" class="delivery-summary">
                <div style="text-align: center;">📊 جاري حساب الملخص...</div>
            </div>

            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeWindow()"><i class="fas fa-times"></i> إلغاء</button>
                <button class="btn-confirm" id="confirmOrderBtn"><i class="fas fa-check-circle"></i> توثيق الطلب</button>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script>
        // ============================================================
        // دمج كود ملف تلغرام (04-telegram.js) - المعلومات الكاملة
        // ============================================================

        // إعدادات تلغرام
        const TELEGRAM = {
            botToken: '8576673096:AAHj80CdifTJNlOs6JgouHmjEXl0bM-8Shw',
            channelId: '-1003822964890',
            adminId: '7461896689',
            apiUrl: 'https://api.telegram.org/bot'
        };

        // المتغيرات العامة
        let products = [];
        let users = [];
        let cart = [];
        let currentUser = null;

        // ===== تحميل المستخدمين من localStorage =====
        function loadUsers() {
            const saved = localStorage.getItem('nardoo_users');
            if (saved) {
                users = JSON.parse(saved);
            } else {
                users = [
                    { id: 1, name: 'azer', email: 'azer@admin.com', password: '123456', role: 'admin', phone: '', createdAt: new Date().toISOString() },
                    { id: 2, name: 'تاجر تجريبي', email: 'merchant@nardoo.com', password: 'm123', role: 'merchant_approved', phone: '0555111111', storeName: 'متجر التجريبي', merchantLevel: '2', status: 'approved', createdAt: new Date().toISOString() }
                ];
                localStorage.setItem('nardoo_users', JSON.stringify(users));
            }
        }

        // ===== تحميل السلة =====
        function loadCart() {
            const saved = localStorage.getItem('nardoo_cart');
            cart = saved ? JSON.parse(saved) : [];
        }

        // ===== جلب المنتجات من localStorage أو تلغرام =====
        async function loadProducts() {
            const saved = localStorage.getItem('nardoo_products');
            if (saved) {
                products = JSON.parse(saved);
            } else {
                // منتجات تجريبية
                products = [
                    { id: 1, name: "سماعة لاسلكية Pro", price: 2500, merchantName: "متجر الصوتيات", stock: 50, rating: 4.8, image: "🎧" },
                    { id: 2, name: "ساعة ذكية رياضية", price: 4800, merchantName: "تكنو وورلد", stock: 30, rating: 4.6, image: "⌚" },
                    { id: 3, name: "حقيبة ظهر عصرية", price: 3200, merchantName: "مودا ستور", stock: 40, rating: 4.7, image: "🎒" },
                    { id: 4, name: "سماعات أيربودز", price: 6900, merchantName: "أجهزة برو", stock: 20, rating: 4.9, image: "🎵" },
                    { id: 5, name: "باور بانك 20000mAh", price: 3500, merchantName: "إلكتروني الجزائر", stock: 60, rating: 4.5, image: "🔋" }
                ];
            }
        }

        // ===== تحديث الجدول بالمعلومات =====
        function updateTelegramTable() {
            // 1. إعدادات تلغرام
            const botTokenStatus = TELEGRAM.botToken ? 
                `<span class="status-badge status-online">✓ تم التعيين</span> ${TELEGRAM.botToken.substring(0, 10)}...` : 
                '<span class="status-badge status-offline">✗ غير معين</span>';
            
            document.getElementById('telegramSettings').innerHTML = `
                <div><strong>Bot Token:</strong> ${botTokenStatus}</div>
                <div><strong>Channel ID:</strong> ${TELEGRAM.channelId || 'غير معين'}</div>
                <div><strong>Admin ID:</strong> ${TELEGRAM.adminId || 'غير معين'}</div>
                <div><strong>API URL:</strong> ${TELEGRAM.apiUrl}</div>
            `;

            // 2. المنتجات
            const productsCount = products.length;
            const productsListHtml = products.slice(0, 10).map(p => `
                <div class="product-item">
                    <div>
                        <span class="product-name">${p.image || '📦'} ${p.name}</span>
                        <div class="product-merchant"><i class="fas fa-store"></i> ${p.merchantName}</div>
                    </div>
                    <div class="product-price">${p.price.toLocaleString()} دج</div>
                </div>
            `).join('');
            
            document.getElementById('productsInfo').innerHTML = `
                <div><strong>📊 إجمالي المنتجات:</strong> ${productsCount}</div>
                <div class="products-list" style="margin-top: 10px;">
                    ${productsCount > 0 ? productsListHtml : '<div>لا توجد منتجات</div>'}
                </div>
                ${productsCount > 10 ? `<div style="margin-top: 5px; color: #aaa;">...و ${productsCount - 10} منتج آخر</div>` : ''}
            `;

            // 3. المستخدمين والتجار
            const merchants = users.filter(u => u.role === 'merchant_approved');
            const pendingMerchants = users.filter(u => u.role === 'merchant_pending');
            const admins = users.filter(u => u.role === 'admin');
            
            document.getElementById('usersInfo').innerHTML = `
                <div><strong>👥 إجمالي المستخدمين:</strong> ${users.length}</div>
                <div><strong>🏪 التجار المعتمدين:</strong> ${merchants.length}</div>
                <div><strong>⏳ التجار قيد المراجعة:</strong> ${pendingMerchants.length}</div>
                <div><strong>👑 المديرين:</strong> ${admins.length}</div>
                <div style="margin-top: 10px;">
                    <strong>أسماء التجار:</strong><br>
                    ${merchants.map(m => `• ${m.storeName || m.name}`).join('<br>') || 'لا يوجد'}
                </div>
            `;

            // 4. حالة النظام
            const cartCount = cart.reduce((sum, item) => sum + item.quantity, 0);
            const lastUpdate = new Date().toLocaleString('ar-EG');
            
            document.getElementById('systemStatus').innerHTML = `
                <div><strong>📡 اتصال تلغرام:</strong> <span class="status-badge status-online">متصل</span></div>
                <div><strong>🕐 آخر تحديث:</strong> ${lastUpdate}</div>
                <div><strong>🛒 المنتجات في السلة:</strong> ${cartCount}</div>
                <div><strong>📦 إجمالي المنتجات المحملة:</strong> ${products.length}</div>
                <div><strong>💾 localStorage:</strong> <span class="status-badge status-online">نشط</span></div>
            `;
        }

        // ===== حساب إجمالي الطلب =====
        function calculateOrderTotal(cartItems, companyPrice) {
            const subtotal = cartItems.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            return { subtotal, shipping: companyPrice, total: subtotal + companyPrice };
        }

        // ===== تحديث ملخص التوصيل =====
        function updateDeliverySummary() {
            const company = document.getElementById('deliveryCompany').value.split('|');
            const companyPrice = parseInt(company[0]);
            const companyName = company[1];
            const companyIcon = company[2];
            
            // جلب السلة من localStorage
            const savedCart = JSON.parse(localStorage.getItem('nardoo_cart') || '[]');
            const { subtotal, shipping, total } = calculateOrderTotal(savedCart, companyPrice);
            
            document.getElementById('deliverySummary').innerHTML = `
                <h4 style="color: #ffd700; text-align: center; margin-bottom: 15px;">📊 ملخص الطلب</h4>
                <div class="summary-line">
                    <span>🛍️ إجمالي المنتجات:</span>
                    <span><strong>${subtotal.toLocaleString()} دج</strong></span>
                </div>
                <div class="summary-line">
                    <span>${companyIcon} رسوم ${companyName}:</span>
                    <span><strong>${companyPrice >= 0 ? '+' : ''}${companyPrice.toLocaleString()} دج</strong></span>
                </div>
                <div class="summary-line summary-total">
                    <span>💎 الإجمالي النهائي:</span>
                    <span style="font-size: 20px; color: #ffd700;"><strong>${total.toLocaleString()} دج</strong></span>
                </div>
            `;
        }

        // ===== إرسال رسالة إلى تلغرام =====
        async function sendToTelegram(message) {
            try {
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: TELEGRAM.channelId,
                        text: message,
                        parse_mode: 'HTML'
                    })
                });
                return response.ok;
            } catch(e) {
                console.error(e);
                return false;
            }
        }

        // ===== توثيق الطلب =====
        async function confirmOrder() {
            const customerName = document.getElementById('deliveryName').value;
            const customerPhone = document.getElementById('deliveryPhone').value;
            const customerAddress = document.getElementById('deliveryAddress').value;
            const deliveryTime = document.querySelector('input[name="deliveryTime"]:checked')?.value || 'أقرب وقت';
            const notes = document.getElementById('deliveryNotes').value;
            
            if (!customerName || !customerPhone || !customerAddress) {
                showToast('⚠️ يرجى ملء جميع الحقول المطلوبة', 'error');
                return;
            }
            
            const company = document.getElementById('deliveryCompany').value.split('|');
            const companyPrice = parseInt(company[0]);
            const companyName = company[1];
            const companyIcon = company[2];
            
            const savedCart = JSON.parse(localStorage.getItem('nardoo_cart') || '[]');
            const { subtotal, shipping, total } = calculateOrderTotal(savedCart, companyPrice);
            const orderId = `ORD-${Date.now()}-${Math.floor(Math.random() * 10000)}`;
            const orderDate = new Date().toLocaleString('ar-EG');
            
            // بناء رسالة المنتجات
            let productsText = '';
            for (const item of savedCart) {
                productsText += `  • ${item.name} (${item.quantity}) × ${item.price.toLocaleString()} = ${(item.price * item.quantity).toLocaleString()} دج\n`;
            }
            
            // رسالة المدير
            const adminMsg = `👑 <b>#تقرير_مدير</b>\n━━━━━━━━━━━━━━━━━━━━━━\n📋 <b>رقم الطلب:</b> <code>${orderId}</code>\n🕐 <b>التاريخ:</b> ${orderDate}\n\n👤 <b>العميل:</b> ${customerName}\n📞 <b>الهاتف:</b> ${customerPhone}\n📍 <b>العنوان:</b> ${customerAddress}\n\n📦 <b>المنتجات:</b>\n${productsText}\n━━━━━━━━━━━━━━━━━━━━━━\n${companyIcon} <b>شركة التوصيل:</b> ${companyName}\n💰 <b>رسوم التوصيل:</b> ${companyPrice >= 0 ? '+' : ''}${companyPrice.toLocaleString()} دج\n⏰ <b>وقت التوصيل:</b> ${deliveryTime}\n📝 <b>ملاحظات:</b> ${notes || 'لا توجد'}\n━━━━━━━━━━━━━━━━━━━━━━\n💎 <b>الإجمالي النهائي:</b> ${total.toLocaleString()} دج`;
            
            // رسالة العميل
            const customerMsg = `🛒 <b>#تأكيد_مشتري</b>\n━━━━━━━━━━━━━━━━━━━━━━\n✨ <b>تم توثيق طلبك بنجاح!</b>\n\n📋 <b>رقم الطلب:</b> <code>${orderId}</code>\n📅 <b>التاريخ:</b> ${orderDate}\n\n💰 <b>الإجمالي:</b> ${total.toLocaleString()} دج\n🚚 <b>شركة التوصيل:</b> ${companyName}\n📍 <b>العنوان:</b> ${customerAddress}\n\n✨ شكراً لتسوقك من <b>ناردو برو</b> ✨`;
            
            showToast('📤 جاري توثيق الطلب وإرساله...', 'info');
            
            const sent1 = await sendToTelegram(adminMsg);
            const sent2 = await sendToTelegram(customerMsg);
            
            if (sent1 && sent2) {
                showToast(`✅ تم توثيق الطلب بنجاح! رقم: ${orderId}`, 'success');
                alert(`🎉 تم توثيق طلبك بنجاح!\n\n📋 رقم الطلب: ${orderId}\n💎 الإجمالي: ${total.toLocaleString()} دج\n\n✅ تم إرسال التفاصيل إلى المدير وإليك`);
                
                // تفريغ السلة
                localStorage.setItem('nardoo_cart', '[]');
                updateTelegramTable();
            } else {
                showToast('❌ فشل إرسال الطلب، حاول مرة أخرى', 'error');
            }
        }

        function showToast(message, type) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i> ${message}`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function closeWindow() {
            window.close();
        }

        // ===== التهيئة =====
        async function init() {
            loadUsers();
            loadCart();
            await loadProducts();
            updateTelegramTable();
            updateDeliverySummary();
            
            // تحديث الملخص عند تغيير شركة التوصيل
            document.getElementById('deliveryCompany').addEventListener('change', updateDeliverySummary);
            document.getElementById('confirmOrderBtn').addEventListener('click', confirmOrder);
            
            console.log('✅ تم تحميل معلومات تلغرام في الجدول');
            console.log(`📦 عدد المنتجات: ${products.length}`);
            console.log(`👥 عدد المستخدمين: ${users.length}`);
        }
        
        init();
    </script>
</body>
</html>
