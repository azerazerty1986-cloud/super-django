
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ناردو برو - لوحة التحكم المتكاملة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        /* ===== الثيمات ===== */
        body.dark {
            --bg-primary: #0a0a0a;
            --bg-secondary: #1a1a1a;
            --bg-card: #222;
            --text-primary: #ffffff;
            --text-secondary: #aaaaaa;
            --gold: #ffd700;
            --gold-dark: #cca000;
            --glass: rgba(255, 255, 255, 0.05);
            --success: #4ade80;
            --danger: #f87171;
            --warning: #fbbf24;
            --info: #60a5fa;
        }

        body.light {
            --bg-primary: #f5f5f5;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --gold: #d4af37;
            --gold-dark: #b8941e;
            --glass: rgba(0, 0, 0, 0.03);
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
        }

        /* ===== الحاوية الرئيسية ===== */
        .unified-dashboard {
            display: flex;
            min-height: 100vh;
        }

        /* ===== الشريط الجانبي ===== */
        .sidebar {
            width: 280px;
            background: var(--bg-secondary);
            border-left: 1px solid var(--glass);
            position: fixed;
            right: 0;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .sidebar-header {
            padding: 25px;
            text-align: center;
            border-bottom: 2px solid var(--gold);
        }

        .sidebar-header h2 {
            color: var(--gold);
            font-size: 24px;
        }

        .sidebar-header p {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 5px;
        }

        .sidebar-menu {
            padding: 20px 0;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 25px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s;
            border-right: 3px solid transparent;
        }

        .menu-item:hover {
            background: var(--glass);
            color: var(--gold);
        }

        .menu-item.active {
            background: var(--glass);
            color: var(--gold);
            border-right-color: var(--gold);
        }

        .menu-item i {
            width: 24px;
            font-size: 18px;
        }

        .menu-item span {
            font-size: 14px;
            font-weight: 500;
        }

        /* ===== المحتوى الرئيسي ===== */
        .main-content {
            flex: 1;
            margin-right: 280px;
            padding: 20px;
        }

        /* ===== شريط العلوي ===== */
        .top-bar {
            background: var(--bg-secondary);
            border-radius: 15px;
            padding: 15px 25px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-avatar {
            width: 45px;
            height: 45px;
            background: var(--gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: black;
        }

        .user-details h4 {
            font-size: 16px;
        }

        .user-details p {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .role-badge {
            background: var(--gold);
            color: black;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .theme-toggle {
            background: var(--glass);
            border: none;
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
            color: var(--gold);
        }

        /* ===== بطاقات الإحصائيات ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid var(--glass);
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-icon {
            width: 55px;
            height: 55px;
            background: var(--glass);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: var(--gold);
        }

        .stat-info h3 {
            font-size: 24px;
            font-weight: bold;
        }

        .stat-info p {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* ===== الأقسام ===== */
        .dashboard-section {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .dashboard-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section-title {
            font-size: 22px;
            margin-bottom: 20px;
            color: var(--gold);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* ===== الجداول ===== */
        .data-table {
            width: 100%;
            background: var(--bg-card);
            border-radius: 15px;
            overflow: hidden;
            border-collapse: collapse;
        }

        .data-table th,
        .data-table td {
            padding: 15px;
            text-align: right;
            border-bottom: 1px solid var(--glass);
        }

        .data-table th {
            background: var(--glass);
            color: var(--gold);
            font-weight: bold;
        }

        .data-table tr:hover {
            background: var(--glass);
        }

        /* ===== الأزرار ===== */
        .btn-gold {
            background: var(--gold);
            color: black;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn-gold:hover {
            background: var(--gold-dark);
            transform: scale(1.02);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
        }

        .status-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .status-pending { background: var(--warning); color: black; }
        .status-processing { background: var(--info); color: white; }
        .status-delivered { background: var(--success); color: black; }
        .status-cancelled { background: var(--danger); color: white; }

        /* ===== نافذة منبثقة ===== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: var(--bg-secondary);
            border-radius: 25px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            border: 2px solid var(--gold);
        }

        /* ===== ريسپونسيف ===== */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(100%);
                width: 260px;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .main-content {
                margin-right: 0;
            }
            .menu-toggle {
                display: block;
            }
        }

        .menu-toggle {
            display: none;
            background: var(--glass);
            border: none;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            color: var(--gold);
        }
    </style>
</head>
<body>
<div class="unified-dashboard">
    <!-- الشريط الجانبي -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2><i class="fas fa-crown"></i> ناردو برو</h2>
            <p>اللوحة المتكاملة</p>
        </div>
        <div class="sidebar-menu" id="sidebarMenu">
            <!-- سيتم تعبئة القائمة عبر JS -->
        </div>
    </div>

    <!-- المحتوى الرئيسي -->
    <div class="main-content">
        <div class="top-bar">
            <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
            <div class="user-info" id="userInfo">
                <!-- سيتم تعبئة معلومات المستخدم -->
            </div>
            <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
        </div>

        <div id="sectionsContainer">
            <!-- سيتم تعبئة الأقسام ديناميكياً -->
        </div>
    </div>
</div>

<!-- نافذة منبثقة عامة -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal-content" id="modalContent"></div>
</div>

<script>
    // ============================================================
    // ===== [1] البيانات والتهيئة =====
    // ============================================================
    
    let currentUser = null;
    let isDarkMode = true;
    let currentSection = 'admin_overview';
    
    // بيانات تجريبية (سيتم ربطها مع localStorage لاحقاً)
    let dashboardData = {
        stats: {
            totalOrders: 156,
            totalRevenue: 2845000,
            totalProducts: 42,
            totalUsers: 128,
            pendingOrders: 12,
            lowStock: 5
        },
        merchants: [
            { id: 1, name: 'أحمد محمد', store: 'متجر العطور', email: 'ahmed@example.com', status: 'approved', products: 8, revenue: 450000 },
            { id: 2, name: 'سارة علي', store: 'متجر التوابل', email: 'sara@example.com', status: 'pending', products: 0, revenue: 0 },
            { id: 3, name: 'محمد خالد', store: 'متجر التجميل', email: 'mohamed@example.com', status: 'approved', products: 15, revenue: 890000 }
        ],
        orders: [
            { id: 'ORD-001', customer: 'علي حسن', total: 3500, status: 'pending', date: '2026-04-01', merchant: 'متجر العطور' },
            { id: 'ORD-002', customer: 'نورا سعيد', total: 7800, status: 'delivered', date: '2026-03-30', merchant: 'متجر التوابل' },
            { id: 'ORD-003', customer: 'ياسر محمود', total: 2300, status: 'processing', date: '2026-04-02', merchant: 'متجر التجميل' },
            { id: 'ORD-004', customer: 'فاطمة أحمد', total: 12000, status: 'pending', date: '2026-04-02', merchant: 'متجر العطور' }
        ],
        products: [
            { id: 1, name: 'عطر ورد', price: 2500, stock: 12, merchant: 'متجر العطور', sales: 45 },
            { id: 2, name: 'زعفران', price: 800, stock: 3, merchant: 'متجر التوابل', sales: 120 },
            { id: 3, name: 'كريم ترطيب', price: 1500, stock: 8, merchant: 'متجر التجميل', sales: 67 }
        ],
        reviews: [
            { id: 1, product: 'عطر ورد', user: 'علي', rating: 5, comment: 'رائع جداً', date: '2026-03-28' },
            { id: 2, product: 'زعفران', user: 'نورا', rating: 4, comment: 'جودة ممتازة', date: '2026-03-25' }
        ]
    };
    
    // ============================================================
    // ===== [2] تحميل المستخدم من localStorage =====
    // ============================================================
    
    function loadCurrentUser() {
        const saved = localStorage.getItem('current_user');
        if (saved) {
            currentUser = JSON.parse(saved);
        } else {
            // مستخدم تجريبي للعرض
            currentUser = { id: 1, name: 'مدير النظام', email: 'admin@nardoo.com', role: 'admin' };
        }
        updateUserInterface();
    }
    
    function updateUserInterface() {
        const userInfo = document.getElementById('userInfo');
        if (userInfo && currentUser) {
            let roleIcon = '👑';
            let roleText = 'مدير';
            if (currentUser.role === 'merchant_approved') { roleIcon = '🏪'; roleText = 'تاجر معتمد'; }
            else if (currentUser.role === 'customer') { roleIcon = '👤'; roleText = 'عميل'; }
            
            userInfo.innerHTML = `
                <div class="user-avatar">${roleIcon}</div>
                <div class="user-details">
                    <h4>${currentUser.name}</h4>
                    <p>${currentUser.email}</p>
                </div>
                <div class="role-badge">${roleText}</div>
            `;
        }
    }
    
    // ============================================================
    // ===== [3] بناء القائمة حسب صلاحية المستخدم =====
    // ============================================================
    
    function getMenuItems() {
        const role = currentUser?.role || 'customer';
        const menus = {
            admin: [
                { id: 'admin_overview', icon: 'fas fa-chart-line', name: 'نظرة عامة', section: 'admin_overview' },
                { id: 'admin_merchants', icon: 'fas fa-store', name: 'إدارة التجار', section: 'admin_merchants' },
                { id: 'admin_orders', icon: 'fas fa-truck', name: 'جميع الطلبات', section: 'admin_orders' },
                { id: 'admin_products', icon: 'fas fa-box', name: 'المنتجات', section: 'admin_products' },
                { id: 'admin_inventory', icon: 'fas fa-warehouse', name: 'المخزون', section: 'admin_inventory' },
                { id: 'admin_reviews', icon: 'fas fa-star', name: 'التقييمات', section: 'admin_reviews' },
                { id: 'admin_analytics', icon: 'fas fa-chart-pie', name: 'التحليلات', section: 'admin_analytics' },
                { id: 'admin_shipping', icon: 'fas fa-shipping-fast', name: 'تتبع الشحنات', section: 'admin_shipping' }
            ],
            merchant: [
                { id: 'merchant_overview', icon: 'fas fa-chart-simple', name: 'نظرة عامة', section: 'merchant_overview' },
                { id: 'merchant_products', icon: 'fas fa-box', name: 'منتجاتي', section: 'merchant_products' },
                { id: 'merchant_inventory', icon: 'fas fa-warehouse', name: 'المخزون', section: 'merchant_inventory' },
                { id: 'merchant_orders', icon: 'fas fa-shopping-cart', name: 'طلباتي', section: 'merchant_orders' },
                { id: 'merchant_earnings', icon: 'fas fa-chart-line', name: 'الأرباح', section: 'merchant_earnings' },
                { id: 'merchant_promotions', icon: 'fas fa-tags', name: 'العروض', section: 'merchant_promotions' }
            ],
            customer: [
                { id: 'customer_orders', icon: 'fas fa-history', name: 'طلباتي', section: 'customer_orders' },
                { id: 'customer_favorites', icon: 'fas fa-heart', name: 'المفضلة', section: 'customer_favorites' },
                { id: 'customer_tracking', icon: 'fas fa-map-marker-alt', name: 'تتبع الطلبات', section: 'customer_tracking' },
                { id: 'customer_reviews', icon: 'fas fa-star', name: 'تقييماتي', section: 'customer_reviews' },
                { id: 'customer_wallet', icon: 'fas fa-wallet', name: 'محفظتي', section: 'customer_wallet' }
            ]
        };
        return menus[role] || menus.customer;
    }
    
    function buildSidebar() {
        const menuItems = getMenuItems();
        const sidebarMenu = document.getElementById('sidebarMenu');
        if (!sidebarMenu) return;
        
        sidebarMenu.innerHTML = menuItems.map(item => `
            <div class="menu-item ${currentSection === item.section ? 'active' : ''}" data-section="${item.section}">
                <i class="${item.icon}"></i>
                <span>${item.name}</span>
            </div>
        `).join('');
        
        // إضافة حدث النقر
        document.querySelectorAll('.menu-item').forEach(item => {
            item.addEventListener('click', () => {
                const section = item.dataset.section;
                if (section) {
                    currentSection = section;
                    buildSidebar();
                    renderSection(section);
                }
            });
        });
    }
    
    // ============================================================
    // ===== [4] بناء الأقسام =====
    // ============================================================
    
    function renderSection(sectionId) {
        const container = document.getElementById('sectionsContainer');
        if (!container) return;
        
        let html = '';
        
        // قسم نظرة عامة للمدير
        if (sectionId === 'admin_overview') {
            html = `
                <div class="dashboard-section active">
                    <h2 class="section-title"><i class="fas fa-chart-line"></i> نظرة عامة</h2>
                    <div class="stats-grid">
                        <div class="stat-card"><div class="stat-icon"><i class="fas fa-shopping-cart"></i></div><div class="stat-info"><h3>${dashboardData.stats.totalOrders}</h3><p>إجمالي الطلبات</p></div></div>
                        <div class="stat-card"><div class="stat-icon"><i class="fas fa-coins"></i></div><div class="stat-info"><h3>${(dashboardData.stats.totalRevenue / 1000).toFixed(0)}k دج</h3><p>إجمالي الإيرادات</p></div></div>
                        <div class="stat-card"><div class="stat-icon"><i class="fas fa-box"></i></div><div class="stat-info"><h3>${dashboardData.stats.totalProducts}</h3><p>المنتجات</p></div></div>
                        <div class="stat-card"><div class="stat-icon"><i class="fas fa-users"></i></div><div class="stat-info"><h3>${dashboardData.stats.totalUsers}</h3><p>المستخدمين</p></div></div>
                    </div>
                    
                    <h3 style="margin: 25px 0 15px;">أحدث الطلبات</h3>
                    <table class="data-table">
                        <thead><tr><th>رقم الطلب</th><th>العميل</th><th>التاجر</th><th>المبلغ</th><th>الحالة</th><th>التاريخ</th></tr></thead>
                        <tbody>
                            ${dashboardData.orders.slice(0,5).map(order => `
                                <tr><td>${order.id}</td><td>${order.customer}</td><td>${order.merchant}</td><td>${order.total.toLocaleString()} دج</td><td><span class="status-badge status-${order.status}">${order.status === 'pending' ? 'قيد الانتظار' : order.status === 'processing' ? 'قيد التجهيز' : 'تم التوصيل'}</span></td><td>${order.date}</td></tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }
        // قسم إدارة التجار
        else if (sectionId === 'admin_merchants') {
            html = `
                <div class="dashboard-section active">
                    <h2 class="section-title"><i class="fas fa-store"></i> إدارة التجار</h2>
                    <table class="data-table">
                        <thead><tr><th>التاجر</th><th>اسم المتجر</th><th>البريد</th><th>المنتجات</th><th>الإيرادات</th><th>الحالة</th><th>إجراء</th></tr></thead>
                        <tbody>
                            ${dashboardData.merchants.map(m => `
                                <tr>
                                    <td>${m.name}</td>
                                    <td>${m.store}</td>
                                    <td>${m.email}</td>
                                    <td>${m.products}</td>
                                    <td>${(m.revenue / 1000).toFixed(0)}k دج</td>
                                    <td><span class="status-badge ${m.status === 'approved' ? 'status-delivered' : 'status-pending'}">${m.status === 'approved' ? 'معتمد' : 'قيد المراجعة'}</span></td>
                                    <td><button class="btn-outline" onclick="showMerchantDetails(${m.id})">تفاصيل</button></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }
        // قسم إدارة المنتجات
        else if (sectionId === 'admin_products') {
            html = `
                <div class="dashboard-section active">
                    <h2 class="section-title"><i class="fas fa-box"></i> المنتجات</h2>
                    <table class="data-table">
                        <thead><tr><th>المنتج</th><th>السعر</th><th>المخزون</th><th>التاجر</th><th>المبيعات</th></tr></thead>
                        <tbody>
                            ${dashboardData.products.map(p => `
                                <tr><td>${p.name}</td><td>${p.price.toLocaleString()} دج</td><td style="color: ${p.stock < 5 ? 'var(--danger)' : 'var(--success)'}">${p.stock}</td><td>${p.merchant}</td><td>${p.sales}</td></tr>
                            `).join('')}
                        </tbody>
                    </table>
                    <div style="margin-top: 20px;"><button class="btn-gold" onclick="showAddProductModal()"><i class="fas fa-plus"></i> إضافة منتج</button></div>
                </div>
            `;
        }
        // قسم التقييمات
        else if (sectionId === 'admin_reviews') {
            html = `
                <div class="dashboard-section active">
                    <h2 class="section-title"><i class="fas fa-star"></i> التقييمات والمراجعات</h2>
                    ${dashboardData.reviews.map(r => `
                        <div style="background: var(--bg-card); border-radius: 15px; padding: 15px; margin-bottom: 15px;">
                            <div style="display: flex; justify-content: space-between;">
                                <div><strong>${r.product}</strong> - <span style="color: var(--gold);">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</span></div>
                                <small>${r.user} | ${r.date}</small>
                            </div>
                            <p style="margin-top: 10px;">${r.comment}</p>
                        </div>
                    `).join('')}
                </div>
            `;
        }
        // قسم المخزون
        else if (sectionId === 'admin_inventory' || sectionId === 'merchant_inventory') {
            const lowStockProducts = dashboardData.products.filter(p => p.stock < 5);
            html = `
                <div class="dashboard-section active">
                    <h2 class="section-title"><i class="fas fa-warehouse"></i> إدارة المخزون</h2>
                    <div class="stats-grid">
                        <div class="stat-card"><div class="stat-icon"><i class="fas fa-box"></i></div><div class="stat-info"><h3>${dashboardData.products.length}</h3><p>إجمالي المنتجات</p></div></div>
                        <div class="stat-card"><div class="stat-icon"><i class="fas fa-exclamation-triangle"></i></div><div class="stat-info"><h3>${lowStockProducts.length}</h3><p>مخزون منخفض</p></div></div>
                    </div>
                    ${lowStockProducts.length > 0 ? `
                        <div style="background: rgba(251,191,36,0.1); border: 1px solid var(--warning); border-radius: 15px; padding: 15px; margin-bottom: 20px;">
                            <h4 style="color: var(--warning);">⚠️ منتجات منخفضة المخزون</h4>
                            ${lowStockProducts.map(p => `
                                <div style="display: flex; justify-content: space-between; align-items: center; margin: 10px 0;">
                                    <span>${p.name}</span>
                                    <span style="color: var(--warning);">${p.stock} قطعة</span>
                                    <button class="btn-outline" onclick="showRestockModal(${p.id})">إعادة طلب</button>
                                </div>
                            `).join('')}
                        </div>
                    ` : ''}
                    <table class="data-table">
                        <thead><tr><th>المنتج</th><th>السعر</th><th>المخزون</th><th>التاجر</th><th>إجراء</th></tr></thead>
                        <tbody>
                            ${dashboardData.products.map(p => `
                                <tr><td>${p.name}</td><td>${p.price.toLocaleString()} دج</td><td style="color: ${p.stock < 5 ? 'var(--warning)' : 'var(--success)'}">${p.stock}</td><td>${p.merchant}</td><td><button class="btn-outline" onclick="showUpdateStockModal(${p.id})">تحديث</button></td></tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }
        // قسم التحليلات
        else if (sectionId === 'admin_analytics') {
            html = `
                <div class="dashboard-section active">
                    <h2 class="section-title"><i class="fas fa-chart-pie"></i> التحليلات والتقارير</h2>
                    <div class="stats-grid">
                        <div class="stat-card"><div class="stat-icon"><i class="fas fa-chart-line"></i></div><div class="stat-info"><h3>${dashboardData.stats.totalOrders}</h3><p>إجمالي الطلبات</p></div></div>
                        <div class="stat-card"><div class="stat-icon"><i class="fas fa-chart-bar"></i></div><div class="stat-info"><h3>${dashboardData.merchants.filter(m => m.status === 'approved').length}</h3><p>التجار النشطون</p></div></div>
                    </div>
                    <div style="background: var(--bg-card); border-radius: 15px; padding: 20px; margin-top: 20px;">
                        <h3>أفضل المنتجات مبيعاً</h3>
                        ${dashboardData.products.sort((a,b) => b.sales - a.sales).slice(0,5).map((p, idx) => `
                            <div style="margin: 10px 0; display: flex; justify-content: space-between;">
                                <span>${idx+1}. ${p.name}</span>
                                <span style="color: var(--gold);">${p.sales} مبيعات</span>
                            </div>
                        `).join('')}
                    </div>
                    <div style="margin-top: 20px;">
                        <button class="btn-gold" onclick="exportReport()"><i class="fas fa-download"></i> تصدير التقرير</button>
                    </div>
                </div>
            `;
        }
        // قسم تتبع الشحنات
        else if (sectionId === 'admin_shipping' || sectionId === 'customer_tracking') {
            html = `
                <div class="dashboard-section active">
                    <h2 class="section-title"><i class="fas fa-shipping-fast"></i> تتبع الشحنات</h2>
                    <div style="background: var(--bg-card); border-radius: 15px; padding: 25px; text-align: center;">
                        <i class="fas fa-truck" style="font-size: 60px; color: var(--gold); margin-bottom: 20px;"></i>
                        <h3>أدخل رقم التتبع</h3>
                        <div style="display: flex; gap: 10px; margin-top: 15px; max-width: 400px; margin: 15px auto;">
                            <input type="text" id="trackingNumber" placeholder="رقم التتبع" style="flex:1; padding: 12px; border-radius: 10px; border: 1px solid var(--gold); background: var(--bg-primary); color: var(--text);">
                            <button class="btn-gold" onclick="trackShipment()">تتبع</button>
                        </div>
                        <div id="trackingResult" style="margin-top: 20px;"></div>
                    </div>
                </div>
            `;
        }
        // قسم نظرة عامة للتاجر
        else if (sectionId === 'merchant_overview') {
            const myProducts = dashboardData.products.filter(p => p.merchant === 'متجر العطور');
            const myOrders = dashboardData.orders.filter(o => o.merchant === 'متجر العطور');
            html = `
                <div class="dashboard-section active">
                    <h2 class="section-title"><i class="fas fa-chart-simple"></i> لوحة التاجر</h2>
                    <div class="stats-grid">
                        <div class="stat-card"><div class="stat-icon"><i class="fas fa-box"></i></div><div class="stat-info"><h3>${myProducts.length}</h3><p>منتجاتي</p></div></div>
                        <div class="stat-card"><div class="stat-icon"><i class="fas fa-shopping-cart"></i></div><div class="stat-info"><h3>${myOrders.length}</h3><p>الطلبات</p></div></div>
                        <div class="stat-card"><div class="stat-icon"><i class="fas fa-coins"></i></div><div class="stat-info"><h3>${myOrders.reduce((sum,o) => sum + o.total, 0).toLocaleString()} دج</h3><p>إجمالي المبيعات</p></div></div>
                    </div>
                    <button class="btn-gold" onclick="showAddProductModal()"><i class="fas fa-plus"></i> إضافة منتج جديد</button>
                </div>
            `;
        }
        // قسم الأرباح للتاجر
        else if (sectionId === 'merchant_earnings') {
            html = `
                <div class="dashboard-section active">
                    <h2 class="section-title"><i class="fas fa-chart-line"></i> الأرباح والإحصائيات</h2>
                    <div class="stats-grid">
                        <div class="stat-card"><div class="stat-icon"><i class="fas fa-chart-line"></i></div><div class="stat-info"><h3>890,000 دج</h3><p>إجمالي الأرباح</p></div></div>
                        <div class="stat-card"><div class="stat-icon"><i class="fas fa-chart-line"></i></div><div class="stat-info"><h3>45,000 دج</h3><p>أرباح هذا الشهر</p></div></div>
                    </div>
                    <button class="btn-gold" onclick="exportEarningsReport()"><i class="fas fa-download"></i> تصدير تقرير الأرباح</button>
                </div>
            `;
        }
        // قسم طلبات العميل
        else if (sectionId === 'customer_orders') {
            html = `
                <div class="dashboard-section active">
                    <h2 class="section-title"><i class="fas fa-history"></i> طلباتي السابقة</h2>
                    <table class="data-table">
                        <thead><tr><th>رقم الطلب</th><th>التاجر</th><th>المبلغ</th><th>الحالة</th><th>التاريخ</th></tr></thead>
                        <tbody>
                            ${dashboardData.orders.slice(0,3).map(order => `
                                <tr><td>${order.id}</td><td>${order.merchant}</td><td>${order.total.toLocaleString()} دج</td><td><span class="status-badge status-${order.status}">${order.status === 'pending' ? 'قيد الانتظار' : 'تم التوصيل'}</span></td><td>${order.date}</td></tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }
        // قسم العروض للتاجر
        else if (sectionId === 'merchant_promotions') {
            html = `
                <div class="dashboard-section active">
                    <h2 class="section-title"><i class="fas fa-tags"></i> العروض والخصومات</h2>
                    <div style="background: var(--bg-card); border-radius: 15px; padding: 20px; margin-bottom: 20px;">
                        <h3>إنشاء عرض جديد</h3>
                        <div style="display: grid; gap: 15px; margin-top: 15px;">
                            <input type="text" id="promoCode" placeholder="كود الخصم" style="padding: 12px; border-radius: 10px; border: 1px solid var(--gold); background: var(--bg-primary);">
                            <input type="number" id="promoDiscount" placeholder="نسبة الخصم" style="padding: 12px; border-radius: 10px; border: 1px solid var(--gold); background: var(--bg-primary);">
                            <button class="btn-gold" onclick="createPromoCode()">إنشاء العرض</button>
                        </div>
                    </div>
                    <h3>العروض الحالية</h3>
                    <div style="background: rgba(255,215,0,0.1); border-radius: 15px; padding: 15px;">
                        <p>📢 خصم 20% على العطور - كود: <strong>AROMA20</strong></p>
                        <p>📢 توصيل مجاني للطلبات فوق 15000 دج</p>
                    </div>
                </div>
            `;
        }
        // قسم افتراضي
        else {
            html = `<div class="dashboard-section active"><h2 class="section-title"><i class="fas fa-info-circle"></i> جاري التحميل...</h2></div>`;
        }
        
        container.innerHTML = html;
    }
    
    // ============================================================
    // ===== [5] دوال مساعدة =====
    // ============================================================
    
    function showModal(title, content) {
        const modal = document.getElementById('modalOverlay');
        const modalContent = document.getElementById('modalContent');
        modalContent.innerHTML = `<h3 style="color: var(--gold); margin-bottom: 20px;">${title}</h3>${content}<div style="margin-top: 20px;"><button class="btn-gold" onclick="closeModal()">إغلاق</button></div>`;
        modal.style.display = 'flex';
    }
    
    function closeModal() {
        document.getElementById('modalOverlay').style.display = 'none';
    }
    
    function showMerchantDetails(id) {
        const merchant = dashboardData.merchants.find(m => m.id === id);
        if (merchant) {
            showModal('تفاصيل التاجر', `
                <p><strong>الاسم:</strong> ${merchant.name}</p>
                <p><strong>المتجر:</strong> ${merchant.store}</p>
                <p><strong>البريد:</strong> ${merchant.email}</p>
                <p><strong>المنتجات:</strong> ${merchant.products}</p>
                <p><strong>الإيرادات:</strong> ${merchant.revenue.toLocaleString()} دج</p>
                <button class="btn-gold" onclick="approveMerchant(${id})">اعتماد التاجر</button>
            `);
        }
    }
    
    function approveMerchant(id) {
        const merchant = dashboardData.merchants.find(m => m.id === id);
        if (merchant) {
            merchant.status = 'approved';
            closeModal();
            renderSection('admin_merchants');
            showNotification('تم اعتماد التاجر بنجاح', 'success');
        }
    }
    
    function showAddProductModal() {
        showModal('إضافة منتج جديد', `
            <input type="text" id="newProductName" placeholder="اسم المنتج" style="width:100%; padding:10px; margin:10px 0; border-radius:8px; border:1px solid var(--gold); background:var(--bg-primary);">
            <input type="number" id="newProductPrice" placeholder="السعر" style="width:100%; padding:10px; margin:10px 0; border-radius:8px; border:1px solid var(--gold); background:var(--bg-primary);">
            <input type="number" id="newProductStock" placeholder="الكمية" style="width:100%; padding:10px; margin:10px 0; border-radius:8px; border:1px solid var(--gold); background:var(--bg-primary);">
            <button class="btn-gold" onclick="addProduct()">إضافة</button>
        `);
    }
    
    function addProduct() {
        const name = document.getElementById('newProductName')?.value;
        const price = parseInt(document.getElementById('newProductPrice')?.value);
        const stock = parseInt(document.getElementById('newProductStock')?.value);
        if (name && price) {
            dashboardData.products.push({
                id: dashboardData.products.length + 1,
                name, price, stock,
                merchant: currentUser?.storeName || 'متجري',
                sales: 0
            });
            closeModal();
            renderSection(currentSection);
            showNotification('تم إضافة المنتج بنجاح', 'success');
        }
    }
    
    function showUpdateStockModal(productId) {
        const product = dashboardData.products.find(p => p.id === productId);
        if (product) {
            showModal('تحديث المخزون', `
                <p><strong>المنتج:</strong> ${product.name}</p>
                <p><strong>المخزون الحالي:</strong> ${product.stock}</p>
                <input type="number" id="newStockValue" placeholder="المخزون الجديد" style="width:100%; padding:10px; margin:10px 0; border-radius:8px;">
                <button class="btn-gold" onclick="updateStock(${productId})">تحديث</button>
            `);
        }
    }
    
    function updateStock(productId) {
        const newStock = parseInt(document.getElementById('newStockValue')?.value);
        const product = dashboardData.products.find(p => p.id === productId);
        if (product && !isNaN(newStock)) {
            product.stock = newStock;
            closeModal();
            renderSection(currentSection);
            showNotification('تم تحديث المخزون', 'success');
        }
    }
    
    function showRestockModal(productId) {
        const product = dashboardData.products.find(p => p.id === productId);
        if (product) {
            showModal('إعادة طلب منتج', `
                <p><strong>${product.name}</strong></p>
                <p>المخزون الحالي: ${product.stock}</p>
                <input type="number" id="restockQuantity" placeholder="الكمية المطلوبة" style="width:100%; padding:10px; margin:10px 0; border-radius:8px;">
                <button class="btn-gold" onclick="restockProduct(${productId})">إرسال الطلب</button>
            `);
        }
    }
    
    function restockProduct(productId) {
        const quantity = parseInt(document.getElementById('restockQuantity')?.value);
        if (quantity > 0) {
            closeModal();
            showNotification('تم إرسال طلب إعادة التموين', 'success');
        }
    }
    
    function trackShipment() {
        const trackingNumber = document.getElementById('trackingNumber')?.value;
        const resultDiv = document.getElementById('trackingResult');
        if (trackingNumber) {
            resultDiv.innerHTML = `
                <div style="background: var(--bg-card); border-radius: 15px; padding: 20px;">
                    <p><i class="fas fa-check-circle" style="color: var(--success);"></i> <strong>رقم التتبع:</strong> ${trackingNumber}</p>
                    <div style="margin: 15px 0;">
                        <div style="display: flex; justify-content: space-between; margin: 10px 0;">
                            <span>✅ تم استلام الطلب</span>
                            <span>🕐 جاري التجهيز</span>
                            <span>🚚 تم الشحن</span>
                            <span>🏠 قيد التوصيل</span>
                        </div>
                        <div style="height: 4px; background: var(--glass); border-radius: 2px;">
                            <div style="width: 60%; height: 100%; background: var(--gold); border-radius: 2px;"></div>
                        </div>
                    </div>
                    <p>الموقع الحالي: مركز الفرز - الجزائر العاصمة</p>
                    <p>الوقت المتوقع: خلال 2-3 أيام</p>
                </div>
            `;
        } else {
            resultDiv.innerHTML = '<p style="color: var(--danger);">الرجاء إدخال رقم التتبع</p>';
        }
    }
    
    function createPromoCode() {
        const code = document.getElementById('promoCode')?.value;
        const discount = document.getElementById('promoDiscount')?.value;
        if (code && discount) {
            showNotification(`تم إنشاء كود خصم ${code} بنسبة ${discount}%`, 'success');
            closeModal();
        }
    }
    
    function exportReport() {
        showNotification('جاري تصدير التقرير...', 'info');
        setTimeout(() => showNotification('تم تصدير التقرير بنجاح', 'success'), 1000);
    }
    
    function exportEarningsReport() {
        exportReport();
    }
    
    function showNotification(message, type = 'info') {
        const notification = document.createElement('div');
        notification.style.cssText = `
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: ${type === 'success' ? '#4ade80' : type === 'error' ? '#f87171' : '#60a5fa'};
            color: black;
            padding: 12px 20px;
            border-radius: 10px;
            z-index: 2000;
            animation: fadeIn 0.3s ease;
            font-weight: bold;
        `;
        notification.innerHTML = message;
        document.body.appendChild(notification);
        setTimeout(() => notification.remove(), 3000);
    }
    
    // ============================================================
    // ===== [6] الثيم والتهيئة =====
    // ============================================================
    
    function toggleTheme() {
        isDarkMode = !isDarkMode;
        document.body.classList.toggle('light', !isDarkMode);
        document.body.classList.toggle('dark', isDarkMode);
        localStorage.setItem('theme', isDarkMode ? 'dark' : 'light');
        const toggleBtn = document.getElementById('themeToggle');
        if (toggleBtn) toggleBtn.innerHTML = isDarkMode ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';
    }
    
    function loadTheme() {
        const saved = localStorage.getItem('theme');
        if (saved === 'light') {
            isDarkMode = false;
            document.body.classList.add('light');
            document.body.classList.remove('dark');
        } else {
            isDarkMode = true;
            document.body.classList.add('dark');
            document.body.classList.remove('light');
        }
        const toggleBtn = document.getElementById('themeToggle');
        if (toggleBtn) toggleBtn.innerHTML = isDarkMode ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';
    }
    
    // ============================================================
    // ===== [7] التشغيل =====
    // ============================================================
    
    function init() {
        loadTheme();
        loadCurrentUser();
        buildSidebar();
        renderSection(currentSection);
        
        document.getElementById('themeToggle')?.addEventListener('click', toggleTheme);
        document.getElementById('menuToggle')?.addEventListener('click', () => {
            document.getElementById('sidebar')?.classList.toggle('open');
        });
        
        window.showMerchantDetails = showMerchantDetails;
        window.approveMerchant = approveMerchant;
        window.showAddProductModal = showAddProductModal;
        window.addProduct = addProduct;
        window.showUpdateStockModal = showUpdateStockModal;
        window.updateStock = updateStock;
        window.showRestockModal = showRestockModal;
        window.restockProduct = restockProduct;
        window.trackShipment = trackShipment;
        window.createPromoCode = createPromoCode;
        window.exportReport = exportReport;
        window.exportEarningsReport = exportEarningsReport;
        window.closeModal = closeModal;
        window.showNotification = showNotification;
    }
    
    init();
</script>
</body>
</html>
