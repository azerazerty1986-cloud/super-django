<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ناردو برو - نظام الفهرس الاحترافي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --bg: #0f3460; --card-bg: #16213e; --text: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); direction: rtl; min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .card { background: var(--card-bg); border: 1px solid rgba(255, 215, 0, 0.3); border-radius: 15px; padding: 25px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        h1, h2 { color: var(--gold); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .btn { padding: 12px 24px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-family: 'Cairo'; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4); }
        .btn-info { background: #17a2b8; color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-success { background: #28a745; color: white; }
        .input-group { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 20px; }
        input, select { padding: 12px; border-radius: 10px; border: 1px solid rgba(255, 215, 0, 0.3); background: rgba(0,0,0,0.2); color: white; font-family: 'Cairo'; width: 100%; }
        input:focus { border-color: var(--gold); outline: none; }
        .filter-section { display: flex; gap: 15px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; overflow: hidden; border-radius: 10px; }
        th, td { padding: 15px; text-align: center; border-bottom: 1px solid rgba(255, 215, 0, 0.1); }
        th { background: rgba(255, 215, 0, 0.1); color: var(--gold); font-weight: 700; }
        tr:hover { background: rgba(255, 255, 255, 0.03); }
        .status-bar { background: rgba(0,0,0,0.3); padding: 10px 20px; border-radius: 10px; color: var(--gold); font-weight: bold; margin-top: 10px; text-align: center; }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .badge-delivery { background: #28a745; color: white; }
        .badge-distributor { background: #007bff; color: white; }
        .badge-both { background: #6f42c1; color: white; }
        .id-badge { background: rgba(255,215,0,0.2); padding: 5px 10px; border-radius: 20px; font-size: 12px; display: inline-flex; align-items: center; gap: 5px; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1><i class="fas fa-shuttle-van"></i> ناردو برو | نظام الفهرس الاحترافي</h1>
        <div style="display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;">
            <button class="btn btn-gold" onclick="exportToTelegram()"><i class="fab fa-telegram-plane"></i> تصدير للقناة</button>
            <button class="btn btn-info" onclick="fetchAllFromIndex()"><i class="fas fa-thumbtack"></i> جلب الكل عبر الفهرس</button>
            <button class="btn btn-success" onclick="createIndexMessage()"><i class="fas fa-plus"></i> إنشاء فهرس جديد</button>
            <button class="btn btn-danger" onclick="clearAll()"><i class="fas fa-trash-alt"></i> مسح الكل</button>
        </div>
        <div id="status" class="status-bar">جاهز للعمل</div>
    </div>

    <div class="card">
        <h2><i class="fas fa-plus-circle"></i> إضافة موزع جديد</h2>
        <div class="input-group">
            <input type="text" id="compName" placeholder="اسم الموزع">
            <input type="text" id="mgrName" placeholder="اسم المسؤول">
            <input type="text" id="phone" placeholder="رقم الهاتف">
            <select id="type">
                <option value="delivery">توصيل</option>
                <option value="distributor">موزع</option>
                <option value="both">كليهما</option>
            </select>
            <input type="text" id="state" placeholder="الولاية (3 حروف: Alg, Oran...)">
            <button class="btn btn-gold" onclick="addDistributor()" style="grid-column: span 1;">إضافة للجدول</button>
        </div>
    </div>

    <div class="card">
        <h2><i class="fas fa-table"></i> جدول الموزعين</h2>
        <div class="filter-section">
            <span><i class="fas fa-filter"></i> فلترة حسب الولاية:</span>
            <select id="stateFilter" onchange="updateTable()" style="max-width: 250px;">
                <option value="all">كل الولايات</option>
            </select>
            <span id="countDisplay" style="margin-right: auto; color: var(--gold);">العدد: 0</span>
        </div>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>الموزع</th>
                        <th>المسؤول</th>
                        <th>الهاتف</th>
                        <th>النوع</th>
                        <th>الولاية</th>
                        <th>إجراء</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const BOT_TOKEN = '8576673096:AAGvSMjzwVWj6wJ47JdqiDwcObXjBDcyiLA';
    const CHANNEL_ID = '-1003822964890';
    const KEYWORD = '📋 فهرس الموزعين';
    
    let distributors = [];
    let indexMessageId = null;

    // تحديث الجدول
    function updateTable() {
        const tbody = document.getElementById('tableBody');
        const filter = document.getElementById('stateFilter').value;
        
        const filtered = filter === 'all' ? distributors : distributors.filter(d => d.state === filter);
        
        document.getElementById('countDisplay').innerText = `العدد: ${filtered.length}`;

        if (filtered.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7">لا توجد بيانات حالياً</td></tr>';
            return;
        }

        tbody.innerHTML = filtered.map((d, i) => `
            <tr>
                <td>${i+1}</td>
                <td>${d.company}</td>
                <td>${d.manager}</td>
                <td>${d.phone}</td>
                <td><span class="badge badge-${d.type}">${d.type}</span></td>
                <td>${d.state}</td>
                <td><button class="btn btn-danger" style="padding: 5px 10px;" onclick="deleteItem(${getOriginalIndex(d, filter)})"><i class="fas fa-trash"></i></button></td>
            </tr>
        `).join('');
        
        updateFilterOptions();
    }

    function getOriginalIndex(item, filter) {
        if (filter === 'all') {
            return distributors.indexOf(item);
        } else {
            return distributors.findIndex(d => d.company === item.company && d.phone === item.phone);
        }
    }

    function updateFilterOptions() {
        const filterSelect = document.getElementById('stateFilter');
        const currentVal = filterSelect.value;
        const states = [...new Set(distributors.map(d => d.state))];
        
        filterSelect.innerHTML = '<option value="all">كل الولايات</option>' + 
            states.map(s => `<option value="${s}" ${s === currentVal ? 'selected' : ''}>${s}</option>`).join('');
    }

    function addDistributor() {
        const company = document.getElementById('compName').value;
        const manager = document.getElementById('mgrName').value;
        const phone = document.getElementById('phone').value;
        const type = document.getElementById('type').value;
        const state = document.getElementById('state').value;

        if (company && state) {
            distributors.push({ company, manager, phone, type, state });
            updateTable();
            document.getElementById('compName').value = '';
            document.getElementById('mgrName').value = '';
            document.getElementById('phone').value = '';
            document.getElementById('state').value = '';
            showStatus('✅ تم إضافة الموزع بنجاح');
        } else {
            alert('يرجى إدخال اسم الموزع والولاية');
        }
    }

    function deleteItem(index) {
        distributors.splice(index, 1);
        updateTable();
        showStatus('🗑️ تم حذف الموزع');
    }

    function clearAll() {
        if (confirm('هل أنت متأكد من مسح جميع البيانات؟')) {
            distributors = [];
            updateTable();
            showStatus('🗑️ تم مسح الكل');
        }
    }

    // إنشاء رسالة الفهرس
    async function createIndexMessage() {
        if (distributors.length === 0) {
            alert('لا توجد بيانات لإنشاء الفهرس');
            return;
        }
        
        showStatus('⏳ جاري إنشاء رسالة الفهرس...');
        
        // تجميع الموزعين حسب الولايات (كل 200 موزع في رسالة)
        const batches = [];
        let currentBatch = [];
        
        for (let d of distributors) {
            currentBatch.push(d);
            if (currentBatch.length >= 200) {
                batches.push([...currentBatch]);
                currentBatch = [];
            }
        }
        if (currentBatch.length > 0) batches.push(currentBatch);
        
        // إنشاء رسائل الموزعين
        const messageIds = [];
        for (let i = 0; i < batches.length; i++) {
            const batch = batches[i];
            let content = `📋 قائمة الموزعين - الجزء ${i+1}\n━━━━━━━━━━━━━━━━━━\n`;
            
            batch.forEach(d => {
                content += `${d.state}|${d.company}|${d.manager}|${d.phone}|${d.type}\n`;
            });
            
            const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHANNEL_ID, text: content })
            });
            
            const data = await response.json();
            if (data.ok) {
                messageIds.push(data.result.message_id);
                showStatus(`✅ تم إنشاء الجزء ${i+1} (${batch.length} موزع)`);
            }
        }
        
        // إنشاء رسالة الفهرس
        let indexContent = `${KEYWORD}\n━━━━━━━━━━━━━━━━━━\n\n`;
        indexContent += `📌 آخر تحديث: ${new Date().toLocaleString()}\n`;
        indexContent += `📊 إجمالي الموزعين: ${distributors.length}\n\n`;
        indexContent += `📍 أجزاء البيانات:\n`;
        
        messageIds.forEach((id, i) => {
            indexContent += `الجزء ${i+1} → رسالة رقم: ${id}\n`;
        });
        
        const indexResponse = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: CHANNEL_ID, text: indexContent })
        });
        
        const indexData = await indexResponse.json();
        
        if (indexData.ok) {
            // تثبيت رسالة الفهرس
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/pinChatMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHANNEL_ID, message_id: indexData.result.message_id })
            });
            
            indexMessageId = indexData.result.message_id;
            localStorage.setItem('indexMessageId', indexMessageId);
            showStatus(`✅ تم إنشاء وتثبيت رسالة الفهرس (${messageIds.length} أجزاء)`);
        }
    }

    // جلب كل البيانات من الفهرس
    async function fetchAllFromIndex() {
        showStatus('⏳ جاري جلب البيانات من الفهرس...');
        
        try {
            // جلب رسالة الفهرس المثبتة
            const chatRes = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getChat?chat_id=${CHANNEL_ID}`);
            const chatData = await chatRes.json();
            
            if (!chatData.ok || !chatData.result.pinned_message) {
                showStatus('❌ لا توجد رسالة فهرس مثبتة');
                return;
            }
            
            const pinnedMsgId = chatData.result.pinned_message.message_id;
            
            // جلب محتوى رسالة الفهرس
            const msgRes = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getMessage?chat_id=${CHANNEL_ID}&message_id=${pinnedMsgId}`);
            const msgData = await msgRes.json();
            
            if (!msgData.ok) {
                showStatus('❌ فشل جلب رسالة الفهرس');
                return;
            }
            
            // استخراج المعرفات من النص
            const text = msgData.result.text;
            const messageIds = [];
            const lines = text.split('\n');
            
            for (let line of lines) {
                const match = line.match(/→ رسالة رقم:\s*(\d+)/);
                if (match) {
                    messageIds.push(parseInt(match[1]));
                }
            }
            
            // جلب كل رسائل الموزعين
            let allDistributors = [];
            
            for (let id of messageIds) {
                const distRes = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getMessage?chat_id=${CHANNEL_ID}&message_id=${id}`);
                const distData = await distRes.json();
                
                if (distData.ok && distData.result.text) {
                    const content = distData.result.text;
                    const lines2 = content.split('\n');
                    
                    for (let line of lines2) {
                        if (line.includes('|') && !line.startsWith('📋') && !line.startsWith('━━')) {
                            const parts = line.split('|');
                            if (parts.length >= 5) {
                                allDistributors.push({
                                    state: parts[0],
                                    company: parts[1],
                                    manager: parts[2],
                                    phone: parts[3],
                                    type: parts[4]
                                });
                            }
                        }
                    }
                    showStatus(`✅ جلب ${allDistributors.length} موزع حتى الآن`);
                }
            }
            
            if (allDistributors.length > 0) {
                distributors = allDistributors;
                updateTable();
                showStatus(`✅ تم جلب ${allDistributors.length} موزع من ${messageIds.length} رسالة`);
            } else {
                showStatus('⚠️ لم يتم العثور على بيانات');
            }
            
        } catch (e) {
            showStatus('❌ خطأ في الاتصال: ' + e.message);
        }
    }

    // تصدير البيانات للقناة
    async function exportToTelegram() {
        if (distributors.length === 0) {
            alert('لا توجد بيانات للتصدير');
            return;
        }
        
        showStatus('⏳ جاري التصدير...');
        await createIndexMessage();
    }

    function showStatus(msg) { 
        document.getElementById('status').innerText = msg; 
        setTimeout(() => {
            if (document.getElementById('status').innerText === msg) {
                document.getElementById('status').innerText = 'جاهز للعمل';
            }
        }, 3000);
    }

    // تحميل البيانات المحفوظة
    const savedIndexId = localStorage.getItem('indexMessageId');
    if (savedIndexId) {
        indexMessageId = parseInt(savedIndexId);
    }
    
    updateTable();
    showStatus('✅ النظام جاهز - استخدم "جلب الكل عبر الفهرس" لعرض البيانات');
</script>
</body>
</html>
