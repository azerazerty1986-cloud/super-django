<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ناردو برو - النظام المتكامل (17 نقطة)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        body.dark {
            --bg-primary: #0a0a0a;
            --bg-secondary: #1a1a1a;
            --bg-card: #222;
            --text-primary: #ffffff;
            --text-secondary: #aaaaaa;
            --gold: #ffd700;
            --gold-dark: #cca000;
            --glass: rgba(255, 255, 255, 0.05);
            --success: #4ade80;
            --danger: #f87171;
            --warning: #fbbf24;
            --info: #60a5fa;
        }

        body.light {
            --bg-primary: #f5f5f5;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --gold: #d4af37;
            --gold-dark: #b8941e;
            --glass: rgba(0, 0, 0, 0.05);
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
        }

        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }

        /* الهيدر */
        .header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, var(--gold)15, transparent);
            border-radius: 30px;
            margin-bottom: 30px;
        }
        .header h1 { font-size: 32px; color: var(--gold); margin-bottom: 10px; }
        .header p { color: var(--text-secondary); }

        /* شريط المستخدم */
        .user-bar {
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 15px 25px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .user-avatar {
            width: 50px; height: 50px;
            background: var(--gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: black;
        }
        .user-details h4 { font-size: 16px; margin-bottom: 5px; }
        .user-details p { font-size: 12px; color: var(--text-secondary); }
        .role-badge {
            background: var(--gold);
            color: black;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        .logout-btn {
            background: var(--danger);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
        }
        .theme-toggle {
            background: var(--glass);
            border: none;
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
            color: var(--gold);
        }

        /* التبويبات */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: var(--bg-secondary);
            padding: 10px;
            border-radius: 60px;
        }
        .tab-btn {
            flex: 1;
            padding: 15px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 16px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .tab-btn.active {
            background: var(--gold);
            color: black;
        }
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* السلة */
        .cart-container, .merchants-container {
            background: var(--bg-secondary);
            border-radius: 25px;
            padding: 25px;
        }
        .cart-items, .merchant-products {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-height: 500px;
            overflow-y: auto;
        }
        .cart-item, .product-card {
            display: flex;
            gap: 15px;
            background: var(--bg-card);
            border-radius: 15px;
            padding: 15px;
            border: 1px solid var(--glass);
        }
        .cart-item-image, .product-image {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            object-fit: cover;
        }
        .cart-item-details, .product-details { flex: 1; }
        .cart-item-name, .product-name { font-size: 16px; font-weight: bold; margin-bottom: 5px; }
        .cart-item-merchant, .product-merchant { font-size: 12px; color: var(--gold); margin-bottom: 5px; }
        .cart-item-price, .product-price { font-size: 16px; color: var(--gold); font-weight: bold; }
        .cart-item-quantity { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
        .quantity-btn {
            width: 30px; height: 30px;
            background: var(--glass);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .delete-btn {
            background: var(--danger);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
        }
        .add-to-cart-btn {
            padding: 8px 15px;
            background: var(--gold);
            color: black;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .cart-total {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid var(--gold);
            text-align: left;
            font-size: 20px;
            font-weight: bold;
        }
        .checkout-btn {
            width: 100%;
            padding: 15px;
            background: var(--gold);
            color: black;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        /* أقسام التجار */
        .merchant-section {
            margin-bottom: 30px;
            background: var(--bg-card);
            border-radius: 20px;
            overflow: hidden;
        }
        .merchant-header {
            background: var(--gold)15;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-right: 4px solid var(--gold);
        }
        .merchant-icon {
            width: 45px; height: 45px;
            background: var(--gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: black;
        }
        .merchant-name { font-size: 18px; font-weight: bold; }
        .merchant-stats { font-size: 12px; color: var(--text-secondary); }
        .merchant-products-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
            padding: 20px;
        }

        /* نافذة منبثقة */
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: var(--bg-secondary);
            border-radius: 30px;
            max-width: 500px;
            width: 90%;
            padding: 25px;
            border: 2px solid var(--gold);
        }
        .modal-content input, .modal-content select, .modal-content textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid var(--gold);
            background: var(--bg-primary);
            color: var(--text-primary);
        }
        .form-row { display: flex; gap: 10px; margin: 10px 0; }
        .form-row input { flex: 1; }

        /* إشعار */
        .notification {
            position: fixed;
            bottom: 20px;
            left: 20px;
            padding: 12px 20px;
            border-radius: 10px;
            z-index: 1100;
            animation: slideIn 0.3s ease;
            font-weight: bold;
        }
        @keyframes slideIn { from { transform: translateX(-100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        @media (max-width: 768px) {
            .container { padding: 15px; }
            .merchant-products-list { grid-template-columns: 1fr; }
            .user-bar { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body class="dark">
    <div class="container">
        <!-- ============================================================ -->
        <!-- الهيدر -->
        <!-- ============================================================ -->
        <div class="header">
            <h1><i class="fas fa-crown"></i> ناردو برو</h1>
            <p>النظام المتكامل لإدارة السلة والمنتجات والتواصل مع تلغرام</p>
        </div>

        <!-- ============================================================ -->
        <!-- النقطة (1): جلب المستخدم الحالي -->
        <!-- ============================================================ -->
        <div class="user-bar">
            <div class="user-info" id="userInfo">
                <div class="user-avatar"><i class="fas fa-user"></i></div>
                <div class="user-details">
                    <h4 id="userName">جاري التحميل...</h4>
                    <p id="userEmail"></p>
                </div>
                <div class="role-badge" id="userRole"></div>
            </div>
            <div>
                <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
                <button class="logout-btn" id="logoutBtn" style="margin-right: 10px;"><i class="fas fa-sign-out-alt"></i> خروج</button>
            </div>
        </div>

        <!-- التبويبات -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="cart">🛒 سلة المشتريات</button>
            <button class="tab-btn" data-tab="merchants">🏪 منتجات التجار</button>
        </div>

        <!-- ============================================================ -->
        <!-- تبويب السلة (النقاط 2-6) -->
        <!-- ============================================================ -->
        <div class="tab-content active" id="cartTab">
            <div class="cart-container">
                <h3 style="margin-bottom: 20px;"><i class="fas fa-shopping-cart"></i> منتجاتك</h3>
                <!-- النقطة (2): جلب منتوجات السلة -->
                <div class="cart-items" id="cartItems">
                    <div style="text-align: center; padding: 40px;">جاري تحميل السلة...</div>
                </div>
                <!-- النقطة (6): إجمالي السلة -->
                <div class="cart-total" id="cartTotal">الإجمالي: 0 دج</div>
                <!-- زر إتمام الشراء (يظهر بعد تعبئة المعلومات) -->
                <button class="checkout-btn" id="checkoutBtn" style="display: none;"><i class="fas fa-check-circle"></i> إتمام الشراء</button>
            </div>
        </div>

        <!-- ============================================================ -->
        <!-- تبويب منتجات التجار (النقاط 7-10) -->
        <!-- ============================================================ -->
        <div class="tab-content" id="merchantsTab">
            <div class="merchants-container">
                <h3 style="margin-bottom: 20px;"><i class="fas fa-store"></i> منتجات التجار</h3>
                <!-- النقطة (7): جلب جميع المنتجات -->
                <!-- النقطة (8): منتوجات كل تاجر على حدة -->
                <div id="merchantsList">
                    <div style="text-align: center; padding: 40px;">جاري تحميل المنتجات...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- نافذة معلومات العميل (النقاط 11-13) -->
    <!-- ============================================================ -->
    <div class="modal" id="customerModal">
        <div class="modal-content">
            <h3 style="color: var(--gold); margin-bottom: 20px; text-align: center;">📋 معلومات الطلب</h3>
            <!-- النقطة (11): جمع معلومات العميل -->
            <input type="text" id="customerName" placeholder="الاسم الكامل">
            <input type="tel" id="customerPhone" placeholder="رقم الهاتف">
            <textarea id="customerAddress" rows="2" placeholder="العنوان الكامل"></textarea>
            
            <!-- النقطة (12): مناطق التوصيل (8 مناطق) -->
            <select id="deliveryRegion">
                <option value="">-- اختر المنطقة --</option>
                <option value="الجزائر العاصمة">الجزائر العاصمة (500 دج)</option>
                <option value="وهران">وهران (600 دج)</option>
                <option value="قسنطينة">قسنطينة (600 دج)</option>
                <option value="عنابة">عنابة (700 دج)</option>
                <option value="سطيف">سطيف (700 دج)</option>
                <option value="تيزي وزو">تيزي وزو (700 دج)</option>
                <option value="بجاية">بجاية (750 دج)</option>
                <option value="ولايات أخرى">ولايات أخرى (1000 دج)</option>
            </select>
            
            <!-- النقطة (13): شركات التوصيل (4 شركات) -->
            <select id="deliveryCompany">
                <option value="">-- اختر شركة التوصيل --</option>
                <option value="برق الجزائر">برق الجزائر (سريع)</option>
                <option value="يمين إكسبريس">يمين إكسبريس (عادي)</option>
                <option value="فاست شيب">فاست شيب (سريع جداً)</option>
                <option value="دليفري بلس">دليفري بلس (اقتصادي)</option>
            </select>
            
            <textarea id="orderNotes" rows="2" placeholder="ملاحظات إضافية (اختياري)"></textarea>
            
            <div class="form-row">
                <button onclick="closeCustomerModal()" style="flex:1; padding:12px; background:var(--danger); border:none; border-radius:10px; color:white; cursor:pointer;">إلغاء</button>
                <button id="confirmOrderBtn" style="flex:1; padding:12px; background:var(--gold); border:none; border-radius:10px; color:black; font-weight:bold; cursor:pointer;">تأكيد الطلب</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // إعدادات تلغرام
        // ============================================================
        const TELEGRAM = {
            botToken: '8576673096:AAHj80CdifTJNlOs6JgouHmjEXl0bM-8Shw',
            channelId: '-1003822964890',
            apiUrl: 'https://api.telegram.org/bot'
        };

        // ============================================================
        // المتغيرات العامة
        // ============================================================
        let currentUser = null;
        let cart = [];
        let allProducts = [];
        let merchantsList = [];
        let selectedRegion = null;
        let selectedCompany = null;
        let shippingFees = {
            'الجزائر العاصمة': 500,
            'وهران': 600,
            'قسنطينة': 600,
            'عنابة': 700,
            'سطيف': 700,
            'تيزي وزو': 700,
            'بجاية': 750,
            'ولايات أخرى': 1000
        };

        // ============================================================
        // النقطة (1): جلب المستخدم الحالي
        // ============================================================
        function loadCurrentUser() {
            const saved = localStorage.getItem('current_user');
            if (saved) {
                currentUser = JSON.parse(saved);
            } else {
                // مستخدم تجريبي
                currentUser = {
                    id: 1,
                    name: 'أحمد محمد',
                    email: 'ahmed@example.com',
                    phone: '05551234567',
                    role: 'customer'
                };
                localStorage.setItem('current_user', JSON.stringify(currentUser));
            }
            
            document.getElementById('userName').innerHTML = currentUser.name;
            document.getElementById('userEmail').innerHTML = currentUser.email;
            
            let roleText = 'عميل';
            let roleIcon = '👤';
            if (currentUser.role === 'admin') { roleText = 'مدير'; roleIcon = '👑'; }
            else if (currentUser.role === 'merchant_approved') { roleText = 'تاجر معتمد'; roleIcon = '🏪'; }
            
            document.getElementById('userRole').innerHTML = `${roleIcon} ${roleText}`;
            document.querySelector('.user-avatar').innerHTML = roleIcon;
        }

        // ============================================================
        // النقطة (2): جلب منتوجات السلة
        // ============================================================
        function loadCart() {
            const saved = localStorage.getItem('nardoo_cart');
            if (saved) {
                cart = JSON.parse(saved);
            } else {
                cart = [];
            }
            displayCart();
        }

        // ============================================================
        // النقطة (3): صور المنتجات في السلة
        // النقطة (4): تحديث كمية المنتج
        // النقطة (5): حذف منتج من السلة
        // النقطة (6): إجمالي السلة
        // ============================================================
        function displayCart() {
            const cartItemsDiv = document.getElementById('cartItems');
            const cartTotalDiv = document.getElementById('cartTotal');
            const checkoutBtn = document.getElementById('checkoutBtn');
            
            if (cart.length === 0) {
                cartItemsDiv.innerHTML = `<div style="text-align: center; padding: 40px;"><i class="fas fa-shopping-cart" style="font-size: 50px; opacity: 0.5;"></i><p style="margin-top: 15px;">سلة المشتريات فارغة</p></div>`;
                cartTotalDiv.innerHTML = 'الإجمالي: 0 دج';
                checkoutBtn.style.display = 'none';
                return;
            }
            
            let total = 0;
            cartItemsDiv.innerHTML = cart.map(item => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                // النقطة (3): عرض الصورة
                const productImage = item.image || 'https://via.placeholder.com/80/2c5e4f/ffffff?text=ناردو';
                return `
                    <div class="cart-item">
                        <img class="cart-item-image" src="${productImage}" onerror="this.src='https://via.placeholder.com/80/2c5e4f/ffffff?text=ناردو'">
                        <div class="cart-item-details">
                            <div class="cart-item-name">${item.name}</div>
                            <div class="cart-item-merchant"><i class="fas fa-store"></i> ${item.merchantName}</div>
                            <div class="cart-item-price">${item.price.toLocaleString()} دج</div>
                            <div class="cart-item-quantity">
                                <button class="quantity-btn" onclick="updateQuantity(${item.productId}, ${item.quantity - 1})">-</button>
                                <span style="min-width: 40px; text-align: center;">${item.quantity}</span>
                                <button class="quantity-btn" onclick="updateQuantity(${item.productId}, ${item.quantity + 1})">+</button>
                                <button class="delete-btn" onclick="removeFromCart(${item.productId})"><i class="fas fa-trash"></i> حذف</button>
                            </div>
                        </div>
                        <div style="font-weight: bold; min-width: 80px; text-align: left;">${itemTotal.toLocaleString()} دج</div>
                    </div>
                `;
            }).join('');
            
            cartTotalDiv.innerHTML = `الإجمالي: ${total.toLocaleString()} دج`;
            checkoutBtn.style.display = cart.length > 0 ? 'block' : 'none';
        }

        // النقطة (4): تحديث كمية المنتج
        function updateQuantity(productId, newQuantity) {
            const item = cart.find(i => i.productId == productId);
            if (!item) return;
            
            if (newQuantity <= 0) {
                removeFromCart(productId);
                return;
            }
            
            // التحقق من المخزون (إذا كان متاح)
            const product = allProducts.find(p => p.id == productId);
            if (product && newQuantity > product.stock) {
                showNotification('الكمية المطلوبة غير متوفرة', 'error');
                return;
            }
            
            item.quantity = newQuantity;
            localStorage.setItem('nardoo_cart', JSON.stringify(cart));
            displayCart();
            showNotification('تم تحديث الكمية', 'success');
        }

        // النقطة (5): حذف منتج من السلة
        function removeFromCart(productId) {
            cart = cart.filter(i => i.productId != productId);
            localStorage.setItem('nardoo_cart', JSON.stringify(cart));
            displayCart();
            showNotification('تم حذف المنتج من السلة', 'success');
        }

        // ============================================================
        // النقطة (7): جلب جميع المنتجات
        // النقطة (8): منتوجات كل تاجر على حدة
        // النقطة (9): صورة المنتج مع التاجر
        // النقطة (10): إضافة منتج للسلة
        // ============================================================
        function loadProducts() {
            const saved = localStorage.getItem('nardoo_products');
            if (saved) {
                allProducts = JSON.parse(saved);
            } else {
                // بيانات تجريبية
                allProducts = [
                    { id: 1, name: 'عطر ورد فرنسي', price: 3500, stock: 15, merchantName: 'عطور الفاخرة', image: 'https://picsum.photos/id/263/200/200', description: 'عطر فرنسي أصلي' },
                    { id: 2, name: 'زعفران حر', price: 1200, stock: 8, merchantName: 'توابل المذاق', image: 'https://picsum.photos/id/292/200/200', description: 'زعفران إيراني' },
                    { id: 3, name: 'كريم ترطيب', price: 1800, stock: 22, merchantName: 'كريستال للتجميل', image: 'https://picsum.photos/id/176/200/200', description: 'كريم مرطب' },
                    { id: 4, name: 'عود كمبودي', price: 4500, stock: 5, merchantName: 'عطور الفاخرة', image: 'https://picsum.photos/id/257/200/200', description: 'عود فاخر' },
                    { id: 5, name: 'بهارات مشكل', price: 800, stock: 30, merchantName: 'توابل المذاق', image: 'https://picsum.photos/id/277/200/200', description: 'خليط بهارات' }
                ];
                localStorage.setItem('nardoo_products', JSON.stringify(allProducts));
            }
            
            // النقطة (8): تجميع المنتجات حسب التاجر
            const merchantsMap = new Map();
            allProducts.forEach(product => {
                if (!merchantsMap.has(product.merchantName)) {
                    merchantsMap.set(product.merchantName, []);
                }
                merchantsMap.get(product.merchantName).push(product);
            });
            
            merchantsList = Array.from(merchantsMap.entries()).map(([name, products]) => ({
                name: name,
                products: products,
                totalProducts: products.length,
                totalStock: products.reduce((sum, p) => sum + p.stock, 0)
            }));
            
            displayMerchants();
        }

        function displayMerchants() {
            const merchantsDiv = document.getElementById('merchantsList');
            
            if (merchantsList.length === 0) {
                merchantsDiv.innerHTML = `<div style="text-align: center; padding: 40px;">لا توجد منتجات</div>`;
                return;
            }
            
            merchantsDiv.innerHTML = merchantsList.map(merchant => `
                <div class="merchant-section">
                    <div class="merchant-header">
                        <div class="merchant-icon"><i class="fas fa-store"></i></div>
                        <div>
                            <div class="merchant-name">${merchant.name}</div>
                            <div class="merchant-stats">${merchant.totalProducts} منتج | ${merchant.totalStock} قطعة</div>
                        </div>
                    </div>
                    <div class="merchant-products-list">
                        ${merchant.products.map(product => `
                            <div class="product-card">
                                <!-- النقطة (9): صورة المنتج -->
                                <img class="product-image" src="${product.image}" onerror="this.src='https://via.placeholder.com/80/2c5e4f/ffffff?text=ناردو'">
                                <div class="product-details">
                                    <div class="product-name">${product.name}</div>
                                    <div class="product-price">${product.price.toLocaleString()} دج</div>
                                    <div style="font-size: 12px; color: var(--text-secondary);">📦 متوفر: ${product.stock}</div>
                                    <!-- النقطة (10): إضافة منتج للسلة -->
                                    <button class="add-to-cart-btn" onclick="addToCart(${product.id})" ${product.stock <= 0 ? 'disabled' : ''}>
                                        <i class="fas fa-shopping-cart"></i> أضف للسلة
                                    </button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        // النقطة (10): إضافة منتج للسلة
        function addToCart(productId) {
            const product = allProducts.find(p => p.id == productId);
            if (!product || product.stock <= 0) {
                showNotification('المنتج غير متوفر', 'error');
                return;
            }
            
            const existing = cart.find(item => item.productId == productId);
            if (existing) {
                if (existing.quantity < product.stock) {
                    existing.quantity++;
                } else {
                    showNotification('الكمية غير متوفرة', 'warning');
                    return;
                }
            } else {
                cart.push({
                    productId: product.id,
                    name: product.name,
                    price: product.price,
                    quantity: 1,
                    merchantName: product.merchantName,
                    image: product.image
                });
            }
            
            localStorage.setItem('nardoo_cart', JSON.stringify(cart));
            displayCart();
            showNotification(`✅ تم إضافة ${product.name} إلى السلة`, 'success');
        }

        // ============================================================
        // النقطة (11): جمع معلومات العميل (نافذة منبثقة)
        // النقطة (12): مناطق التوصيل (8 مناطق)
        // النقطة (13): شركات التوصيل (4 شركات)
        // ============================================================
        function showCustomerModal() {
            if (cart.length === 0) {
                showNotification('السلة فارغة', 'error');
                return;
            }
            document.getElementById('customerModal').style.display = 'flex';
        }

        function closeCustomerModal() {
            document.getElementById('customerModal').style.display = 'none';
        }

        // ============================================================
        // النقطة (14): رسالة للمدير
        // النقطة (15): رسالة لكل تاجر على حدة
        // النقطة (16): رسالة تأكيد للمشتري
        // ============================================================
        async function sendTelegramMessage(chatId, message, parseMode = 'HTML') {
            try {
                const response = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: chatId,
                        text: message,
                        parse_mode: parseMode
                    })
                });
                return await response.json();
            } catch (error) {
                console.error('❌ خطأ:', error);
            }
        }

        async function confirmOrder() {
            const customerName = document.getElementById('customerName').value;
            const customerPhone = document.getElementById('customerPhone').value;
            const customerAddress = document.getElementById('customerAddress').value;
            const region = document.getElementById('deliveryRegion').value;
            const company = document.getElementById('deliveryCompany').value;
            const notes = document.getElementById('orderNotes').value;
            
            if (!customerName || !customerPhone || !customerAddress || !region || !company) {
                showNotification('يرجى ملء جميع الحقول', 'error');
                return;
            }
            
            selectedRegion = region;
            selectedCompany = company;
            
            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const shippingFee = shippingFees[region] || 1000;
            const total = subtotal + shippingFee;

            const orderDate = new Date().toLocaleString('ar-EG');
            
            // تجميع المنتجات حسب التاجر
            const merchantOrders = {};
            for (const item of cart) {
                if (!merchantOrders[item.merchantName]) {

                merchantOrders[item.merchantName].push(item);
            }
            
            // ============================================================
            // النقطة (14): رسالة للمدير

            let adminMessage = `╔══════════════════════════════════════════════════════╗\n`;

            adminMessage += `║ 📋 <b>رقم الطلب:</b> <code>${orderId}</code>\n`;
            adminMessage += `║ 🕐 <b>التاريخ:</b> ${orderDate}\n`;
            adminMessage += `╠══════════════════════════════════════════════════════╣\n`;
            adminMessage += `║                      👤 <b>معلومات العميل</b>                       ║\n`;
            adminMessage += `╠══════════════════════════════════════════════════════╣\n`;
            adminMessage += `║ 👨 <b>الاسم:</b> ${customerName}\n`;
            adminMessage += `║ 📞 <b>الهاتف:</b> ${customerPhone}\n`;
            adminMessage += `║ 📍 <b>العنوان:</b> ${customerAddress}\n`;
            adminMessage += `║ 📝 <b>ملاحظات:</b> ${notes || 'لا توجد'}\n`;
            adminMessage += `╠══════════════════════════════════════════════════════╣\n`;
            adminMessage += `║                      📦 <b>المنتجات</b>                         ║\n`;
            adminMessage += `╠══════════════════════════════════════════════════════╣\n`;
            
            for (const [merchant, items] of Object.entries(merchantOrders)) {
                adminMessage += `║ 🏪 <b>${merchant}</b>\n`;
                for (const item of items) {
                    adminMessage += `║    📦 ${item.name} × ${item.quantity} = ${(item.price * item.quantity).toLocaleString()} دج\n`;
                }
            }
            
            adminMessage += `╠══════════════════════════════════════════════════════╣\n`;
            adminMessage += `║                      🚚 <b>معلومات التوصيل</b>                     ║\n`;
            adminMessage += `╠══════════════════════════════════════════════════════╣\n`;
            adminMessage += `║ 📍 <b>المنطقة:</b> ${region}\n`;
            adminMessage += `║ 🏢 <b>شركة التوصيل:</b> ${company}\n`;
            adminMessage += `╠══════════════════════════════════════════════════════╣\n`;
            adminMessage += `║                      💰 <b>الإجماليات</b>                         ║\n`;
            adminMessage += `╠══════════════════════════════════════════════════════╣\n`;
            adminMessage += `║ 💵 <b>مجموع المنتجات:</b> ${subtotal.toLocaleString()} دج\n`;
            adminMessage += `║ 🚚 <b>رسوم التوصيل:</b> ${shippingFee.toLocaleString()} دج\n`;
            adminMessage += `║ 💎 <b>الإجمالي النهائي:</b> ${total.toLocaleString()} دج\n`;
            adminMessage += `╚══════════════════════════════════════════════════════╝`;
            
            await sendTelegramMessage(TELEGRAM.channelId, adminMessage, 'HTML');
            showNotification('📨 تم إرسال إشعار للمدير', 'success');
            
            // ============================================================
            // النقطة (15): رسالة لكل تاجر على حدة
            // ============================================================
            for (const [merchant, items] of Object.entries(merchantOrders)) {
                const merchantTotal = items.reduce((sum, item) => sum + (item.price * item.quantity), 0);
                let merchantMessage = `🟢 <b>طلب جديد - للتاجر ${merchant}</b>\n`;
                merchantMessage += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
                merchantMessage += `📋 <b>رقم الطلب:</b> <code>${orderId}</code>\n`;
                merchantMessage += `👤 <b>العميل:</b> ${customerName}\n`;

                merchantMessage += `┃ 💰 <b>الإجمالي:</b> ${merchantTotal.toLocaleString()} دج\n`;
                merchantMessage += `┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
                merchantMessage += `\n🚚 <b>معلومات التوصيل:</b>\n`;
                merchantMessage += `📍 المنطقة: ${region}\n`;
                merchantMessage += `🏢 شركة التوصيل: ${company}\n`;
                merchantMessage += `\n✅ يرجى تجهيز الطلب في أقرب وقت`;
                
                await sendTelegramMessage(TELEGRAM.channelId, merchantMessage, 'HTML');
                await new Promise(resolve => setTimeout(resolve, 500));
            }
            showNotification(`📨 تم إرسال إشعار لـ ${Object.keys(merchantOrders).length} تاجر`, 'success');
            
            // ============================================================
            // النقطة (16): رسالة تأكيد للمشتري
            // ============================================================
            const customerMessage = `🟢 <b>✅ تم استلام طلبك بنجاح!</b>\n`;
            customerMessage += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
            customerMessage += `📋 <b>رقم الطلب:</b> <code>${orderId}</code>\n`;
            customerMessage += `📅 <b>تاريخ الطلب:</b> ${orderDate}\n`;
            customerMessage += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
            customerMessage += `📦 <b>المنتجات المطلوبة:</b>\n`;

            customerMessage += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;

            customerMessage += `🚚 <b>عنوان التوصيل:</b> ${customerAddress}\n`;
            customerMessage += `⏰ <b>الوقت المتوقع:</b> ${region === 'الجزائر العاصمة' ? '1-2 أيام' : '2-5 أيام'}\n`;
            customerMessage += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;

            await sendTelegramMessage(TELEGRAM.channelId, customerMessage, 'HTML');
            showNotification('📨 تم إرسال تأكيد الطلب لك', 'success');
            
            // ============================================================
            // النقطة (17): حفظ الطلب وتفريغ السلة
            // ============================================================
            const order = {
                orderId, orderDate,
                customer: { name: customerName, phone: customerPhone, address: customerAddress, notes },
                items: [...cart],
                subtotal, shippingFee, total,
                region, company,
                status: 'pending'
            };
            
            const ordersHistory = JSON.parse(localStorage.getItem('nardoo_orders_history') || '[]');
            ordersHistory.unshift(order);

            // تفريغ السلة

            displayCart();
            
            closeCustomerModal();
            
            // تنظيف الحقول

        // ============================================================
        // دوال مساعدة
        // ============================================================
        function showNotification(message, type = 'success') {
            const notif = document.createElement('div');
            notif.className = 'notification';
            notif.style.background = type === 'success' ? 'var(--success)' : type === 'error' ? 'var(--danger)' : 'var(--warning)';
            notif.style.color = 'black';
            notif.innerHTML = message;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 4000);
        }

        function logout() {
            localStorage.removeItem('current_user');
            showNotification('تم تسجيل الخروج', 'success');
            setTimeout(() => location.reload(), 1000);
        }

        function toggleTheme() {
            const body = document.body;
            const isDark = body.classList.contains('dark');
            if (isDark) {
                body.classList.remove('dark');
                body.classList.add('light');
                localStorage.setItem('theme', 'light');
            } else {
                body.classList.remove('light');
                body.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
        }

        function loadTheme() {
            const saved = localStorage.getItem('theme');
            if (saved === 'light') {
                document.body.classList.remove('dark');
                document.body.classList.add('light');
            } else {
                document.body.classList.add('dark');
                document.body.classList.remove('light');
            }
        }

        // ============================================================
        // التهيئة
        // ============================================================
        function init() {
            loadTheme();
            loadCurrentUser();
            loadCart();
            loadProducts();
            
            // التبويبات
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    const tab = btn.dataset.tab;
                    document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
                    document.getElementById(tab === 'cart' ? 'cartTab' : 'merchantsTab').classList.add('active');
                });
            });
            
            document.getElementById('themeToggle').addEventListener('click', toggleTheme);
            document.getElementById('logoutBtn').addEventListener('click', logout);
            document.getElementById('checkoutBtn').addEventListener('click', showCustomerModal);
            document.getElementById('confirmOrderBtn').addEventListener('click', confirmOrder);
        }
        
        // ربط الدوال
        window.updateQuantity = updateQuantity;
        window.removeFromCart = removeFromCart;
        window.addToCart = addToCart;
        window.showCustomerModal = showCustomerModal;
        window.closeCustomerModal = closeCustomerModal;
        window.confirmOrder = confirmOrder;
        window.showNotification = showNotification;
        
        init();
    </script>
</body>
</html>
