<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ناردو برو - النظام النهائي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #1a1a2e; color: white; direction: rtl; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .card { background: #16213e; border: 1px solid #ffd700; border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        h1, h2 { color: #ffd700; text-align: center; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-family: 'Cairo'; margin: 5px; }
        .btn-gold { background: #ffd700; color: #000; }
        .btn-info { background: #17a2b8; color: white; }
        .btn-danger { background: #dc3545; color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: rgba(255,255,255,0.05); }
        th, td { padding: 12px; border: 1px solid rgba(255,215,0,0.3); text-align: center; }
        th { background: rgba(255,215,0,0.2); color: #ffd700; }
        .status { color: #ffd700; margin-top: 10px; text-align: center; font-weight: bold; }
        .input-group { margin-bottom: 15px; display: flex; gap: 10px; flex-wrap: wrap; }
        input, select { padding: 10px; border-radius: 8px; border: 1px solid #ffd700; background: #1a1a2e; color: white; flex: 1; min-width: 150px; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>ناردو برو | النظام النهائي</h1>
        <div style="text-align: center;">
            <button class="btn btn-gold" onclick="exportAndSendToTelegram()">تصدير وإرسال للقناة</button>
            <button class="btn btn-info" onclick="fetchFromChannel()">جلب البيانات من القناة</button>
            <button class="btn btn-danger" onclick="clearAll()">مسح الكل</button>
        </div>
        <div id="status" class="status">جاهز للعمل</div>
    </div>

    <div class="card">
        <h2>إضافة موزع جديد</h2>
        <div class="input-group">
            <input type="text" id="compName" placeholder="اسم الشركة">
            <input type="text" id="mgrName" placeholder="اسم المسؤول">
            <input type="text" id="phone" placeholder="رقم الهاتف">
            <select id="type">
                <option value="موزع">موزع</option>
                <option value="توصيل">توصيل</option>
                <option value="كليهما">كليهما</option>
            </select>
            <input type="text" id="state" placeholder="الولاية">
            <button class="btn btn-gold" onclick="addDistributor()">إضافة</button>
        </div>
    </div>

    <div class="card">
        <h2>جدول الموزعين</h2>
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>الشركة</th>
                    <th>المسؤول</th>
                    <th>الهاتف</th>
                    <th>النوع</th>
                    <th>الولاية</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="6">لا توجد بيانات حالياً</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const BOT_TOKEN = '8576673096:AAGvSMjzwVWj6wJ47JdqiDwcObXjBDcyiLA';
    const CHANNEL_ID = '-1003822964890';
    const KEYWORD = 'الموزعين';

    let distributors = [
        { company: "شركة النور", manager: "أحمد", phone: "0555112233", type: "موزع", state: "الجزائر" },
        { company: "مؤسسة السريع", manager: "سعيد", phone: "0555223344", type: "توصيل", state: "وهران" }
    ];

    function updateTable() {
        const tbody = document.getElementById('tableBody');
        if (distributors.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6">لا توجد بيانات</td></tr>';
            return;
        }
        tbody.innerHTML = distributors.map((d, i) => `
            <tr>
                <td>${i+1}</td>
                <td>${d.company}</td>
                <td>${d.manager}</td>
                <td>${d.phone}</td>
                <td>${d.type}</td>
                <td>${d.state}</td>
            </tr>
        `).join('');
    }

    function addDistributor() {
        const company = document.getElementById('compName').value;
        const manager = document.getElementById('mgrName').value;
        const phone = document.getElementById('phone').value;
        const type = document.getElementById('type').value;
        const state = document.getElementById('state').value;

        if (company && phone) {
            distributors.push({ company, manager, phone, type, state });
            updateTable();
            document.getElementById('compName').value = '';
            document.getElementById('mgrName').value = '';
            document.getElementById('phone').value = '';
            document.getElementById('state').value = '';
            document.getElementById('status').innerText = '✅ تم إضافة الموزع بنجاح';
        } else {
            alert('يرجى ملء اسم الشركة ورقم الهاتف على الأقل');
        }
    }

    function clearAll() {
        if (confirm('هل أنت متأكد من حذف جميع البيانات؟')) {
            distributors = [];
            updateTable();
            document.getElementById('status').innerText = '🗑️ تم مسح الكل';
        }
    }

    async function exportAndSendToTelegram() {
        if (distributors.length === 0) {
            alert('لا توجد بيانات لتصديرها');
            return;
        }
        document.getElementById('status').innerText = '⏳ جاري التصدير والإرسال...';
        let text = `${KEYWORD}\n`;
        distributors.forEach(d => {
            text += `${d.company}|${d.manager}|${d.phone}|${d.type}|${d.state}\n`;
        });

        try {
            const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHANNEL_ID, text: text })
            });
            const data = await res.json();
            if (data.ok) document.getElementById('status').innerText = '✅ تم التصدير والإرسال بنجاح';
            else document.getElementById('status').innerText = '❌ فشل الإرسال';
        } catch (e) {
            document.getElementById('status').innerText = '❌ خطأ في الاتصال';
        }
    }

    async function fetchFromChannel() {
        document.getElementById('status').innerText = '⏳ جاري جلب البيانات...';
        try {
            const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=-1`);
            const data = await res.json();
            
            if (data.ok && data.result.length > 0) {
                let lastMsg = null;
                for (let i = data.result.length - 1; i >= 0; i--) {
                    const m = data.result[i].channel_post || data.result[i].message;
                    if (m && m.text && m.text.includes(KEYWORD)) {
                        lastMsg = m.text;
                        break;
                    }
                }

                if (lastMsg) {
                    const lines = lastMsg.split('\n').filter(l => l.trim() !== '' && !l.includes(KEYWORD));
                    const newItems = lines.map(line => {
                        const p = line.split('|');
                        if (p.length >= 5) {
                            return { company: p[0], manager: p[1], phone: p[2], type: p[3], state: p[4] };
                        }
                        return null;
                    }).filter(item => item !== null);
                    
                    if (newItems.length > 0) {
                        distributors = newItems;
                        updateTable();
                        document.getElementById('status').innerText = `✅ تم جلب ${newItems.length} موزع بنجاح`;
                    } else {
                        document.getElementById('status').innerText = '⚠️ الرسالة موجودة ولكن التنسيق غير صحيح';
                    }
                } else {
                    document.getElementById('status').innerText = `⚠️ لم يتم العثور على رسالة بكلمة "${KEYWORD}"`;
                }
            } else {
                document.getElementById('status').innerText = '❌ لا توجد تحديثات جديدة';
            }
        } catch (e) {
            document.getElementById('status').innerText = '❌ خطأ في الجلب';
        }
    }

    updateTable();
</script>
</body>
</html>
