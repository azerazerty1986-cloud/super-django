<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ناردو برو - نظام التوصيل المتكامل</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Tajawal', sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            line-height: 1.6;
        }

        body.dark {
            --bg-primary: #0a0a0a;
            --bg-secondary: #1a1a1a;
            --bg-card: #222;
            --text-primary: #ffffff;
            --text-secondary: #aaaaaa;
            --gold: #ffd700;
            --gold-dark: #cca000;
            --glass: rgba(255, 255, 255, 0.05);
            --success: #4ade80;
            --danger: #f87171;
            --warning: #fbbf24;
            --info: #60a5fa;
        }

        body.light {
            --bg-primary: #f5f5f5;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --gold: #d4af37;
            --gold-dark: #b8941e;
            --glass: rgba(0, 0, 0, 0.05);
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
        }

        body { background: var(--bg-primary); color: var(--text-primary); }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        /* الهيدر */
        .delivery-header {
            text-align: center;
            padding: 50px 20px;
            background: linear-gradient(135deg, var(--gold)15, transparent);
            border-radius: 40px;
            margin-bottom: 40px;
        }
        
        .header-icon { font-size: 60px; color: var(--gold); margin-bottom: 15px; }
        .delivery-header h1 { font-size: 32px; color: var(--gold); }
        
        /* الأقسام */
        .section {
            background: var(--bg-secondary);
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid var(--glass);
        }
        
        .section-title {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--gold);
        }
        
        .section-title i { font-size: 24px; color: var(--gold); }
        .section-title h2 { font-size: 22px; color: var(--gold); }
        
        /* ملخص السلة */
        .cart-summary {
            background: var(--bg-card);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--gold);
        }
        
        .cart-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--glass);
        }
        
        /* المناطق */
        .regions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        
        .region-card {
            background: var(--bg-card);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        
        .region-card.selected {
            border-color: var(--gold);
            background: var(--gold)10;
        }
        
        .region-card:hover { transform: translateY(-3px); background: var(--glass); }
        .region-card h4 { color: var(--gold); margin-bottom: 8px; }
        
        /* شركات التوصيل */
        .companies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
        }
        
        .company-card {
            background: var(--bg-card);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        
        .company-card.selected {
            border-color: var(--gold);
            background: var(--gold)10;
        }
        
        .company-logo {
            font-size: 40px;
            margin-bottom: 10px;
        }
        
        /* النتيجة */
        .result-box {
            background: var(--glass);
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            text-align: center;
        }
        
        .result-amount { font-size: 32px; font-weight: bold; color: var(--gold); }
        
        /* أزرار */
        .btn-gold {
            background: var(--gold);
            color: black;
            border: none;
            padding: 14px 25px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
        }
        
        .btn-gold:hover { background: var(--gold-dark); transform: scale(1.02); }
        
        /* الثيم */
        .theme-toggle {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 50px;
            height: 50px;
            background: var(--gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            border: none;
            font-size: 22px;
            color: black;
        }
        
        @media (max-width: 768px) {
            .container { padding: 15px; }
            .regions-grid, .companies-grid { grid-template-columns: repeat(2, 1fr); }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .fade-in { animation: fadeIn 0.3s ease; }
    </style>
</head>
<body class="dark">

    <div class="container">

    <script>
        // ============================================================
        // ===== [1] إعدادات تلغرام =====
        // ============================================================
        const TELEGRAM = {
            botToken: '8576673096:AAHj80CdifTJNlOs6JgouHmjEXl0bM-8Shw',
            channelId: '-1003822964890',
            adminId: '7461896689',
            apiUrl: 'https://api.telegram.org/bot'
        };

        // ============================================================
        // ===== [2] 8 مناطق التوصيل =====
        // ============================================================
        const DELIVERY_REGIONS = [
            { id: 1, name: 'الجزائر العاصمة', cities: ['الجزائر الوسطى', 'باب الوادي', 'حسين داي', 'القبة', 'براقي'], standardFee: 500, expressFee: 1000, days: '1-2 أيام' },
            { id: 2, name: 'وهران', cities: ['وهران الوسطى', 'بئر الجير', 'السانية', 'عين الترك'], standardFee: 600, expressFee: 1200, days: '1-2 أيام' },
            { id: 3, name: 'قسنطينة', cities: ['قسنطينة الوسطى', 'علي منجلي', 'الخروب', 'عين سمارة'], standardFee: 600, expressFee: 1200, days: '1-2 أيام' },
            { id: 4, name: 'عنابة', cities: ['عنابة الوسطى', 'سيدي عمار', 'الحجار', 'برحال'], standardFee: 700, expressFee: 1400, days: '2-3 أيام' },
            { id: 5, name: 'سطيف', cities: ['سطيف الوسطى', 'العلمة', 'بابور', 'قجال'], standardFee: 700, expressFee: 1400, days: '2-3 أيام' },
            { id: 6, name: 'تيزي وزو', cities: ['تيزي وزو الوسطى', 'ذراع بن خدة', 'واسيف', 'الأربعاء'], standardFee: 700, expressFee: 1400, days: '2-3 أيام' },
            { id: 7, name: 'بجاية', cities: ['بجاية الوسطى', 'القصر', 'أميزور', 'القلعة'], standardFee: 750, expressFee: 1500, days: '2-3 أيام' },
            { id: 8, name: 'ولايات أخرى', cities: ['باتنة', 'تبسة', 'بسكرة', 'ورقلة', 'تندوف'], standardFee: 1000, expressFee: 1800, days: '3-5 أيام' }
        ];

        // ============================================================
        // ===== [3] 4 شركات توصيل =====
        // ============================================================
        const DELIVERY_COMPANIES = [
            { id: 1, name: 'برق الجزائر', logo: '⚡', rating: 4.8, priceMultiplier: 1.0, deliveryTime: 'سريع', phone: '0555 11 22 33' },
            { id: 2, name: 'يمين إكسبريس', logo: '🚚', rating: 4.6, priceMultiplier: 0.9, deliveryTime: 'عادي', phone: '0555 44 55 66' },
            { id: 3, name: 'فاست شيب', logo: '📦', rating: 4.7, priceMultiplier: 1.1, deliveryTime: 'سريع جداً', phone: '0555 77 88 99' },
            { id: 4, name: 'دليفري بلس', logo: '🏍️', rating: 4.5, priceMultiplier: 0.95, deliveryTime: 'اقتصادي', phone: '0555 00 11 22' }
        ];

        // ============================================================
        // ===== [4] المتغيرات العامة =====
        // ============================================================
        let currentUser = null;
        let cart = [];
        let selectedRegion = null;
        let selectedCompany = null;
        let subtotal = 0;

        // ============================================================
        // ===== [5] تحميل البيانات من localStorage =====
        // ============================================================
        function loadData() {
            // تحميل المستخدم الحالي
            const savedUser = localStorage.getItem('current_user');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
            } else {
                currentUser = { id: 1, name: 'زائر', email: 'guest@nardoo.com', role: 'customer' };
            }
            
            // تحميل سلة المشتريات
            const savedCart = localStorage.getItem('nardoo_cart');
            if (savedCart) {
                cart = JSON.parse(savedCart);
            } else {
                cart = [];
            }
            
            // حساب المجموع
            subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            
            updateCartDisplay();
        }

        // ============================================================
        // ===== [6] عرض السلة =====
        // ============================================================
        function updateCartDisplay() {
            const cartSummary = document.getElementById('cartSummary');
            
            if (!cartSummary) return;
            
            if (cart.length === 0) {
                cartSummary.innerHTML = `
                    <div style="text-align: center; padding: 30px;">
                        <i class="fas fa-shopping-cart" style="font-size: 50px; opacity: 0.5;"></i>
                        <p style="margin-top: 15px;">سلة المشتريات فارغة</p>
                        <p style="font-size: 14px; color: var(--text-secondary);">أضف منتجات أولاً ثم عد إلى صفحة التوصيل</p>
                    </div>
                `;
                document.getElementById('resultSection').style.display = 'none';
                return;
            }
            
            cartSummary.innerHTML = `
                <div style="margin-bottom: 15px;">
                    <strong>عدد المنتجات:</strong> ${cart.reduce((sum, i) => sum + i.quantity, 0)} قطعة
                </div>
                ${cart.map(item => `
                    <div class="cart-item">
                        <span>${item.name} × ${item.quantity}</span>
                        <span>${(item.price * item.quantity).toLocaleString()} دج</span>
                    </div>
                `).join('')}
                <div class="cart-item" style="border-bottom: none; margin-top: 10px; font-size: 18px; font-weight: bold;">
                    <span>المجموع</span>
                    <span style="color: var(--gold);">${subtotal.toLocaleString()} دج</span>
                </div>
            `;
        }

        // ============================================================
        // ===== [7] عرض مناطق التوصيل =====
        // ============================================================
        function displayRegions() {
            const regionsGrid = document.getElementById('regionsGrid');
            regionsGrid.innerHTML = DELIVERY_REGIONS.map(region => `
                <div class="region-card" onclick="selectRegion(${region.id})" data-region-id="${region.id}">
                    <h4><i class="fas fa-city"></i> ${region.name}</h4>
                    <small style="color: var(--text-secondary);">${region.standardFee} - ${region.expressFee} دج</small>
                    <small style="display: block;">⏱️ ${region.days}</small>
                </div>
            `).join('');
        }

        // ============================================================
        // ===== [8] عرض شركات التوصيل =====
        // ============================================================
        function displayCompanies() {
            const companiesGrid = document.getElementById('companiesGrid');
            companiesGrid.innerHTML = DELIVERY_COMPANIES.map(company => `
                <div class="company-card" onclick="selectCompany(${company.id})" data-company-id="${company.id}">
                    <div class="company-logo">${company.logo}</div>
                    <h4>${company.name}</h4>
                    <div style="color: var(--gold);">${'★'.repeat(Math.floor(company.rating))}${company.rating}</div>
                    <small>${company.deliveryTime}</small>
                </div>
            `).join('');
        }

        // ============================================================
        // ===== [9] اختيار المنطقة =====
        // ============================================================
        function selectRegion(regionId) {
            selectedRegion = DELIVERY_REGIONS.find(r => r.id === regionId);
            
            // تحديث الواجهة
            document.querySelectorAll('.region-card').forEach(card => {
                card.classList.remove('selected');
                if (card.dataset.regionId == regionId) {
                    card.classList.add('selected');
                }
            });
            
            updateDeliveryDetails();
        }

        // ============================================================
        // ===== [10] اختيار شركة التوصيل =====
        // ============================================================
        function selectCompany(companyId) {
            selectedCompany = DELIVERY_COMPANIES.find(c => c.id === companyId);
            
            // تحديث الواجهة
            document.querySelectorAll('.company-card').forEach(card => {
                card.classList.remove('selected');
                if (card.dataset.companyId == companyId) {
                    card.classList.add('selected');
                }
            });
            
            updateDeliveryDetails();
        }

        // ============================================================
        // ===== [11] تحديث تفاصيل التوصيل =====
        // ============================================================
        function updateDeliveryDetails() {
            const detailsDiv = document.getElementById('deliveryDetails');
            const resultSection = document.getElementById('resultSection');
            
            if (!selectedRegion || !selectedCompany) {
                detailsDiv.innerHTML = `
                    <div style="text-align: center; padding: 20px; background: var(--glass); border-radius: 15px;">
                        <i class="fas fa-hand-pointer"></i> اختر المنطقة وشركة التوصيل أولاً
                    </div>
                `;
                resultSection.style.display = 'none';
                return;
            }
            
            // حساب رسوم التوصيل
            const baseFee = selectedRegion.standardFee;
            const finalFee = Math.round(baseFee * selectedCompany.priceMultiplier);
            
            // تطبيق التوصيل المجاني للطلبات فوق 15000 دج
            const isFreeShipping = subtotal >= 15000;
            const shippingFee = isFreeShipping ? 0 : finalFee;
            const total = subtotal + shippingFee;
            
            detailsDiv.innerHTML = `
                <div style="background: var(--glass); border-radius: 15px; padding: 20px;">
                    <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px;">
                        <div>
                            <p><i class="fas fa-map-marker-alt"></i> <strong>المنطقة:</strong> ${selectedRegion.name}</p>
                            <p><i class="fas fa-clock"></i> <strong>المدة:</strong> ${selectedRegion.days}</p>
                        </div>
                        <div>
                            <p><i class="fas fa-building"></i> <strong>شركة التوصيل:</strong> ${selectedCompany.name}</p>
                            <p><i class="fas fa-phone"></i> <strong>رقم الشركة:</strong> ${selectedCompany.phone}</p>
                        </div>
                    </div>
                    <div style="margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--glass);">
                        <div style="display: flex; justify-content: space-between;">
                            <span>رسوم التوصيل الأساسية:</span>
                            <span>${baseFee.toLocaleString()} دج</span>
                        </div>
                        <div style="display: flex; justify-content: space-between;">
                            <span>سعر شركة ${selectedCompany.name}:</span>
                            <span>${selectedCompany.priceMultiplier > 1 ? '+' : ''}${((selectedCompany.priceMultiplier - 1) * 100).toFixed(0)}%</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; font-weight: bold;">
                            <span>رسوم التوصيل النهائية:</span>
                            <span style="color: ${isFreeShipping ? 'var(--success)' : 'var(--gold)'}">
                                ${isFreeShipping ? '0 دج (مجاني)' : finalFee.toLocaleString() + ' دج'}
                            </span>
                        </div>
                        ${isFreeShipping ? '<div style="color: var(--success); margin-top: 10px;">🎉 طلبك مؤهل للتوصيل المجاني!</div>' : ''}

                </div>
            `;
            
            // عرض النتيجة النهائية
            resultSection.style.display = 'block';
            document.getElementById('resultBox').innerHTML = `
                <div style="margin-bottom: 20px;">
                    <h3 style="color: var(--gold);">📋 ملخص الطلب</h3>
                </div>
                <div style="display: flex; justify-content: space-between; margin: 10px 0;">
                    <span>مجموع المنتجات:</span>
                    <span>${subtotal.toLocaleString()} دج</span>
                </div>
                <div style="display: flex; justify-content: space-between; margin: 10px 0;">
                    <span>رسوم التوصيل:</span>
                    <span style="color: ${isFreeShipping ? 'var(--success)' : 'var(--gold)'}">
                        ${isFreeShipping ? '0 دج' : finalFee.toLocaleString() + ' دج'}
                    </span>
                </div>
                <div style="display: flex; justify-content: space-between; margin: 15px 0; padding-top: 15px; border-top: 2px solid var(--gold); font-size: 24px; font-weight: bold;">
                    <span>الإجمالي النهائي:</span>
                    <span style="color: var(--gold);">${total.toLocaleString()} دج</span>
                </div>
                <div style="background: var(--bg-primary); border-radius: 10px; padding: 12px; margin-top: 15px;">
                    <p><i class="fas fa-user"></i> <strong>العميل:</strong> ${currentUser?.name || 'زائر'}</p>
                    <p><i class="fas fa-envelope"></i> <strong>البريد:</strong> ${currentUser?.email || 'غير مسجل'}</p>
                    <p><i class="fas fa-truck"></i> <strong>شركة التوصيل:</strong> ${selectedCompany.name} ${selectedCompany.logo}</p>

        }

        // ============================================================
        // ===== [12] إرسال رسائل تلغرام (3 رسائل) =====
        // ============================================================
        async function sendTelegramMessage(chatId, message, parseMode = 'HTML') {
            try {
                const response = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: chatId,
                        text: message,
                        parse_mode: parseMode
                    })
                });
                return await response.json();
            } catch (error) {
                console.error('❌ خطأ في إرسال الرسالة:', error);
            }
        }

            ).join('\n');
            
            // ===== الرسالة 1: للمدير =====
            const adminMessage = `

        // ============================================================
        // ===== [13] الثيم =====

        function toggleTheme() {
            const body = document.body;
            const isDark = body.classList.contains('dark');
            if (isDark) {
                body.classList.remove('dark');
                body.classList.add('light');
                localStorage.setItem('theme', 'light');
            } else {
                body.classList.remove('light');
                body.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
        }
        
        function loadTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                document.body.classList.remove('dark');
                document.body.classList.add('light');
            } else {
                document.body.classList.add('dark');
                document.body.classList.remove('light');
            }
        }

        // ============================================================
        // ===== [14] التشغيل =====
        // ============================================================
        function init() {
            loadTheme();
            loadData();
            displayRegions();
            displayCompanies();
            
            document.getElementById('themeToggle').addEventListener('click', toggleTheme);
            document.getElementById('confirmOrderBtn').addEventListener('click', sendAllNotifications);
        }
        
        // ربط الدوال للاستخدام العام
        window.selectRegion = selectRegion;
        window.selectCompany = selectCompany;
        window.sendAllNotifications = sendAllNotifications;
        
        init();
    </script>
