head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ناردو برو | حل مشكلة التحميل (v6.5)</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --bg: #0f3460; --card-bg: #16213e; --text: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); direction: rtl; min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .card { background: var(--card-bg); border: 1px solid rgba(255, 215, 0, 0.3); border-radius: 15px; padding: 25px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        h1, h2 { color: var(--gold); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .btn { padding: 12px 24px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-family: 'Cairo'; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4); }
        .btn-danger { background: #dc3545; color: white; }
        .btn-purple { background: #6f42c1; color: white; }
        .status-bar { background: rgba(0,0,0,0.3); padding: 10px 20px; border-radius: 10px; color: var(--gold); font-weight: bold; margin-top: 10px; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; border-radius: 10px; overflow: hidden; }
        th, td { padding: 15px; text-align: center; border-bottom: 1px solid rgba(255, 215, 0, 0.1); }
        th { background: rgba(255, 215, 0, 0.1); color: var(--gold); }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; }
        .badge-delivery { background: #28a745; color: white; }
        .badge-distributor { background: #007bff; color: white; }
        .badge-both { background: #6f42c1; color: white; }
        .debug-panel { background: #000; color: #0f0; padding: 15px; border-radius: 10px; font-family: monospace; font-size: 12px; margin-top: 20px; max-height: 300px; overflow-y: auto; display: none; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1><i class="fas fa-shuttle-van"></i> ناردو برو | جلب وقراءة وحذف (v6.5)</h1>
        <div style="display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;">
            <button class="btn btn-gold" onclick="exportToTelegram()"><i class="fab fa-telegram-plane"></i> تصدير للقناة</button>
            <button class="btn btn-purple" onclick="processPinnedFile()"><i class="fas fa-sync-alt"></i> جلب الملف المثبت (حل مشكلة CORS)</button>
            <button class="btn btn-danger" onclick="clearAll()"><i class="fas fa-trash-alt"></i> مسح الكل</button>
            <button class="btn btn-info" style="background: #444; color: white; padding: 12px 24px; border-radius: 10px; cursor: pointer;" onclick="toggleDebug()"><i class="fas fa-bug"></i> سجل العمليات</button>
        </div>
        <div id="status" class="status-bar">✓ جاهز | تم إضافة وكيل لتجاوز خطأ Failed to fetch</div>
        <div id="debugPanel" class="debug-panel"></div>
    </div>

    <div class="card">
        <h2><i class="fas fa-table"></i> جدول الموزعين</h2>
        <div style="overflow-x: auto;">
            <table>
                <thead><tr><th>#</th><th>الشركة</th><th>المسؤول</th><th>الهاتف</th><th>النوع</th><th>الولاية</th><th>حذف</th></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const BOT_TOKEN = '8576673096:AAGvSMjzwVWj6wJ47JdqiDwcObXjBDcyiLA';
    const CHANNEL_ID = '-1003822964890';
    // استخدام وكيل CORS لتجاوز حظر المتصفح
    const CORS_PROXY = "https://api.allorigins.win/get?url=";
    
    let distributors = [];

    function logDebug(msg) {
        const panel = document.getElementById('debugPanel');
        panel.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`;
        panel.scrollTop = panel.scrollHeight;
    }

    function showStatus(msg) {
        document.getElementById('status').innerHTML = msg;
        logDebug(`[STATUS] ${msg}`);
    }

    function toggleDebug() {
        const panel = document.getElementById('debugPanel');
        panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
    }

    async function processPinnedFile() {
        showStatus('⏳ جاري جلب الرسالة المثبتة...');
        try {
            const chatRes = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getChat?chat_id=${CHANNEL_ID}`);
            const chatData = await chatRes.json();

            if (!chatData.ok || !chatData.result.pinned_message) {
                showStatus('❌ لا توجد رسالة مثبتة');
                return;
            }

            const pinned = chatData.result.pinned_message;
            let fileContent = "";

            if (pinned.document && pinned.document.file_name.toLowerCase().endsWith('.txt')) {
                showStatus('⏳ جاري تحميل الملف المثبت عبر الوكيل...');
                fileContent = await downloadFileContent(pinned.document.file_id);
            } else {
                fileContent = pinned.text || pinned.caption || "";
            }

            if (fileContent) {
                // البحث عن روابط داخل المحتوى
                const links = extractLinks(fileContent);
                if (links.length > 0) {
                    showStatus(`⏳ جاري معالجة ${links.length} رابط بنظام (توجيه -> قراءة -> حذف)...`);
                    for (const link of links) {
                        const content = await fetchFileViaForward(link.chatId, link.messageId);
                        if (content) parseData(content);
                    }
                } else {
                    parseData(fileContent);
                }
                showStatus('✅ اكتملت العملية بنجاح');
                updateTable();
            } else {
                showStatus('⚠️ فشل الحصول على محتوى الملف');
            }

        } catch (e) {
            showStatus(`❌ خطأ: ${e.message}`);
        }
    }

    async function downloadFileContent(fileId) {
        try {
            const fileRes = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getFile?file_id=${fileId}`);
            const fileData = await fileRes.json();
            if (fileData.ok) {
                const path = fileData.result.file_path;
                const downloadUrl = `https://api.telegram.org/file/bot${BOT_TOKEN}/${path}`;
                logDebug(`جاري الجلب عبر الوكيل: ${downloadUrl}`);
                
                // استخدام AllOrigins لتجاوز CORS
                const res = await fetch(CORS_PROXY + encodeURIComponent(downloadUrl));
                const data = await res.json();
                return data.contents;
            }
        } catch (e) { logDebug(`خطأ وكيل CORS: ${e.message}`); }
        return "";
    }

    async function fetchFileViaForward(chatId, messageId) {
        try {
            const fRes = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/forwardMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHANNEL_ID, from_chat_id: chatId, message_id: messageId })
            });
            const fData = await fRes.json();
            if (fData.ok) {
                let content = "";
                if (fData.result.document) content = await downloadFileContent(fData.result.document.file_id);
                else content = fData.result.text || fData.result.caption || "";
                
                // حذف الرسالة الموجهة فوراً
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/deleteMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: CHANNEL_ID, message_id: fData.result.message_id })
                });
                return content;
            }
        } catch (e) { logDebug(`خطأ في التوجيه: ${e.message}`); }
        return null;
    }

    function extractLinks(text) {
        const links = [];
        const regex = /https?:\/\/t\.me\/(?:c\/(\d+)|([a-zA-Z0-9_]+))\/(\d+)/g;
        let match;
        while ((match = regex.exec(text)) !== null) {
            const chatId = match[1] ? '-100' + match[1] : '@' + match[2];
            links.push({ chatId, messageId: match[3], url: match[0] });
        }
        return links;
    }

    function parseData(text) {
        const lines = text.split(/\r?\n/);
        let currentState = "";
        lines.forEach((line, i) => {
            line = line.trim();
            if (line.includes('📍')) {
                const m = line.match(/📍\s*(?:ولاية\s+)?(.+?)(?:\s+-|$)/);
                if (m) currentState = m[1].trim();
            } else if (line.startsWith('•')) {
                const compM = line.match(/•\s+(.+?)(?:\s*\((.+?)\))?$/);
                if (compM && currentState) {
                    let manager = "غير محدد", phone = "غير محدد";
                    for (let j = 1; j <= 3; j++) {
                        if (lines[i+j]) {
                            const next = lines[i+j].trim();
                            if (next.startsWith('•') || next.includes('📍')) break;
                            if (next.includes('👤')) manager = next.replace('👤', '').trim();
                            if (next.includes('📞')) phone = next.replace('📞', '').trim();
                        }
                    }
                    distributors.push({ company: compM[1].trim(), manager, phone, type: compM[2] || 'delivery', state: currentState });
                }
            }
        });
    }

    function updateTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = distributors.map((d, i) => `
            <tr>
                <td>${i+1}</td>
                <td>${d.company}</td>
                <td>${d.manager}</td>
                <td>${d.phone}</td>
                <td><span class="badge badge-${d.type}">${d.type}</span></td>
                <td>${d.state}</td>
                <td><button onclick="distributors.splice(${i},1);updateTable();" style="background:red;color:white;border:none;padding:5px;border-radius:5px;cursor:pointer;">حذف</button></td>
            </tr>
        `).join('') || '<tr><td colspan="7">لا توجد بيانات</td></tr>';
    }

    function clearAll() { distributors = []; updateTable(); showStatus('✓ تم مسح الكل'); }

    async function exportToTelegram() {
        if (distributors.length === 0) return alert('لا توجد بيانات');
        let text = "📋 قائمة الموزعين\n\n";
        distributors.forEach(d => {
            text += `📍 ولاية ${d.state}\n• ${d.company} (${d.type})\n👤 ${d.manager} | 📞 ${d.phone}\n\n`;
        });
        const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: CHANNEL_ID, text })
        });
        const data = await res.json();
        showStatus(data.ok ? '✅ تم التصدير' : '❌ فشل التصدير');
    }
</script>
</body>
</html>
