head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ناردو برو - النظام النهائي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0f3460, #16213e);
            color: white;
            direction: rtl;
            min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .header {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Cairo', sans-serif;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-gold { background: #ffd700; color: #000; }
        .btn-telegram { background: #0088cc; color: white; }
        .btn-txt { background: #6c757d; color: white; }
        .btn-info { background: #17a2b8; color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            overflow: hidden;
        }
        th {
            background: rgba(255,215,0,0.1);
            color: #ffd700;
            padding: 15px;
            text-align: right;
            border-bottom: 2px solid #ffd700;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid rgba(255,215,0,0.1);
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .search-box input {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,215,0,0.3);
            background: rgba(0,0,0,0.3);
            color: white;
            font-family: 'Cairo', sans-serif;
        }
        .notification {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .notification.success { background: #28a745; color: white; }
        .notification.error { background: #dc3545; color: white; }
        .notification.info { background: #17a2b8; color: white; }
        @keyframes slideIn {
            from { transform: translateX(-400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255,215,0,0.2);
        }
        .stat-number {
            font-size: 32px;
            font-weight: bold;
            color: #ffd700;
        }
        .url-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .url-input-group input {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,215,0,0.3);
            background: rgba(0,0,0,0.3);
            color: white;
            font-family: 'Cairo', sans-serif;
            direction: ltr;
        }
        .status-text {
            font-size: 14px;
            color: #ffd700;
            margin-top: 10px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-truck"></i> ناردو برو | النظام النهائي</h1>
        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
            <button class="btn btn-gold" onclick="showNotification('ميزة الإضافة قيد التطوير', 'info')"><i class="fas fa-plus"></i> إضافة موزع</button>
            <button class="btn btn-telegram" onclick="sendToTelegram()"><i class="fab fa-telegram"></i> إرسال للقناة</button>
            <button class="btn btn-danger" onclick="clearAll()"><i class="fas fa-trash"></i> مسح الكل</button>
        </div>
    </div>

    <div class="stats" id="stats"></div>

    <div class="card">
        <h2 style="color: #ffd700; margin-bottom: 20px;"><i class="fas fa-telegram"></i> التحكم في البيانات</h2>
        <div class="url-input-group">
            <button class="btn btn-info" onclick="fetchDistributorsFromChannel()" style="width: 100%; justify-content: center;">
                <i class="fas fa-sync-alt"></i> جلب البيانات من القناة (بالمعرف: الموزعين)
            </button>
        </div>
        <div id="fetchStatus" class="status-text"></div>
    </div>

    <div class="card">
        <h2 style="color: #ffd700; margin-bottom: 20px;"><i class="fas fa-table"></i> جدول الموزعين</h2>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 بحث باسم الموزع أو الولاية..." onkeyup="filterTable()">
        </div>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>الشركة</th>
                        <th>المسؤول</th>
                        <th>الهاتف</th>
                        <th>النوع</th>
                        <th>الولاية</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const BOT_TOKEN = '8576673096:AAGvSMjzwVWj6wJ47JdqiDwcObXjBDcyiLA';
    const CHANNEL_ID = '-1003822964890';
    const KEYWORD = 'الموزعين';

    let distributors = [
        { id: 1, company: "شركة النور للتوزيع", manager: "أحمد محمد", phone: "0555112233", type: "distributor", state: "الجزائر" },
        { id: 2, company: "مؤسسة السريع للتوصيل", manager: "سعيد علي", phone: "0555223344", type: "delivery", state: "وهران" },
        { id: 3, company: "الوفاء لخدمات الشحن", manager: "فاطمة الزهراء", phone: "0555334455", type: "both", state: "قسنطينة" },
        { id: 4, company: "المجد للتجارة", manager: "يوسف إبراهيم", phone: "0555445566", type: "distributor", state: "عنابة" },
        { id: 5, company: "النجمة الذهبية", manager: "ليلى بن علي", phone: "0555556677", type: "delivery", state: "سطيف" }
    ];

    function displayTable() {
        const tbody = document.getElementById('tableBody');
        const search = document.getElementById('searchInput').value.toLowerCase();
        
        const filtered = distributors.filter(d => 
            d.company.toLowerCase().includes(search) || 
            d.state.toLowerCase().includes(search)
        );

        if (filtered.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center">لا توجد بيانات</td></tr>';
        } else {
            tbody.innerHTML = filtered.map((d, i) => `
                <tr>
                    <td>${i+1}</td>
                    <td>${d.company}</td>
                    <td>${d.manager}</td>
                    <td>${d.phone}</td>
                    <td>${d.type === 'delivery' ? '🚚 توصيل' : d.type === 'distributor' ? '📦 موزع' : '🔄 كليهما'}</td>
                    <td>${d.state}</td>
                </tr>
            `).join('');
        }

        document.getElementById('stats').innerHTML = `
            <div class="stat-card"><div class="stat-number">${distributors.length}</div><div>إجمالي الموزعين</div></div>
            <div class="stat-card"><div class="stat-number">${distributors.filter(d => d.type === 'delivery' || d.type === 'both').length}</div><div>خدمة توصيل</div></div>
            <div class="stat-card"><div class="stat-number">${distributors.filter(d => d.type === 'distributor' || d.type === 'both').length}</div><div>موزعون</div></div>
        `;
    }

    function filterTable() { displayTable(); }

    function clearAll() {
        if (confirm('هل أنت متأكد من حذف جميع البيانات؟')) {
            distributors = [];
            displayTable();
            showNotification('تم مسح الكل', 'info');
        }
    }

    async function sendToTelegram() {
        showNotification('📤 جاري الإرسال...', 'info');
        let content = `${KEYWORD}\n`;
        distributors.forEach((d, i) => {
            content += `${i+1}|${d.company}|${d.manager}|${d.phone}|${d.type}|${d.state}\n`;
        });

        try {
            const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHANNEL_ID, text: content })
            });
            const result = await res.json();
            if (result.ok) showNotification('✅ تم الإرسال بنجاح', 'success');
            else showNotification('❌ فشل الإرسال', 'error');
        } catch(err) {
            showNotification('❌ خطأ في الاتصال', 'error');
        }
    }

    async function fetchDistributorsFromChannel() {
        const statusDiv = document.getElementById('fetchStatus');
        statusDiv.innerHTML = '⏳ جاري جلب البيانات...';
        showNotification('📥 جاري التحديث...', 'info');

        try {
            const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates`);
            const data = await response.json();

            if (data.ok && data.result.length > 0) {
                let foundMessage = null;
                for (let i = data.result.length - 1; i >= 0; i--) {
                    const msg = data.result[i].channel_post || data.result[i].message;
                    if (msg && msg.text && msg.text.startsWith(KEYWORD)) {
                        foundMessage = msg.text;
                        break;
                    }
                }

                if (foundMessage) {
                    const lines = foundMessage.split('\n').slice(1);
                    const newDistributors = [];
                    lines.forEach(line => {
                        const parts = line.split('|');
                        if (parts.length >= 6) {
                            newDistributors.push({
                                id: Date.now() + Math.random(),
                                company: parts[1],
                                manager: parts[2],
                                phone: parts[3],
                                type: parts[4],
                                state: parts[5]
                            });
                        }
                    });

                    if (newDistributors.length > 0) {
                        distributors = newDistributors;
                        displayTable();
                        statusDiv.innerHTML = `✅ تم جلب ${newDistributors.length} موزع بنجاح`;
                        showNotification('✅ تم التحديث بنجاح', 'success');
                    } else {
                        statusDiv.innerHTML = '⚠️ الرسالة موجودة ولكن التنسيق غير صحيح';
                    }
                } else {
                    statusDiv.innerHTML = `⚠️ لم يتم العثور على رسالة تبدأ بـ "${KEYWORD}"`;
                }
            } else {
                statusDiv.innerHTML = '❌ لا توجد تحديثات جديدة في القناة';
            }
        } catch (err) {
            statusDiv.innerHTML = '❌ خطأ في الاتصال بالتليجرام';
        }
    }

    function showNotification(msg, type) {
        const n = document.createElement('div');
        n.className = `notification ${type}`;
        n.innerText = msg;
        document.body.appendChild(n);
        setTimeout(() => n.remove(), 3000);
    }

    displayTable();
</script>
</body>
</html>
