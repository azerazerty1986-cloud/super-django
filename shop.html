<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ناردو برو | سلة المشتريات</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* === الأنماط الأساسية === */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #0a0a1a;
            --secondary: #1a1a2e;
            --gold: #ffd700;
            --gold-dark: #daa520;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --success: #4ade80;
            --error: #f87171;
            --warning: #fbbf24;
            --info: #60a5fa;
            --border-glass: rgba(255, 215, 0, 0.2);
            --glass: rgba(255, 255, 255, 0.05);
        }
        
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0b0b14 0%, #15152a 100%);
            color: var(--text-primary);
            min-height: 100vh;
        }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        .top-navbar {
            background: linear-gradient(135deg, rgba(10,10,26,0.95), rgba(26,26,46,0.95));
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,215,0,0.25);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-logo { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .nav-logo i { font-size: 24px; color: var(--gold); }
        .nav-logo .logo-text { font-size: 16px; font-weight: 800; color: var(--gold); }

        .btn-back { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 8px 16px; border-radius: 40px; font-family: 'Cairo'; cursor: pointer; display: flex; align-items: center; gap: 8px; }

        .cart-header { text-align: center; margin: 40px 0; }
        .cart-header h1 { font-size: 32px; font-weight: 900; background: linear-gradient(135deg, #ffd700, #ffb347); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .cart-header p { color: var(--text-secondary); margin-top: 10px; }

        .cart-container { display: grid; grid-template-columns: 1.5fr 1fr; gap: 30px; }

        .cart-items-section { display: flex; flex-direction: column; gap: 20px; }
        .cart-item { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 215, 0, 0.15); border-radius: 20px; padding: 20px; display: flex; align-items: center; gap: 20px; transition: all 0.3s ease; }
        .cart-item:hover { border-color: rgba(255, 215, 0, 0.3); background: rgba(255, 255, 255, 0.05); }
        
        .product-thumbnail { width: 90px; height: 90px; border-radius: 15px; overflow: hidden; background: rgba(0,0,0,0.2); flex-shrink: 0; }
        .product-thumbnail img { width: 100%; height: 100%; object-fit: cover; }
        .product-thumbnail i { font-size: 40px; color: var(--gold); padding: 25px; }

        .product-info { flex: 1; }
        .product-name { font-size: 18px; font-weight: 700; color: var(--gold); margin-bottom: 5px; }
        .product-store { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; }
        .product-price { font-size: 16px; font-weight: 800; color: var(--success); }

        .quantity-control { display: flex; align-items: center; gap: 15px; background: rgba(255,215,0,0.1); padding: 8px 15px; border-radius: 12px; }
        .quantity-control button { background: none; border: none; color: var(--gold); cursor: pointer; font-size: 20px; width: 30px; height: 30px; border-radius: 8px; }
        .quantity-control button:hover { background: rgba(255,215,0,0.2); }
        .quantity-control span { font-size: 18px; font-weight: 800; min-width: 30px; text-align: center; }

        .item-remove { background: rgba(248, 113, 113, 0.15); color: var(--error); border: 1px solid var(--error); padding: 10px; border-radius: 12px; cursor: pointer; transition: all 0.2s; }
        .item-remove:hover { background: var(--error); color: white; }

        .summary-section { background: linear-gradient(145deg, #1a1a2e, #0a0a1a); border: 1px solid var(--border-glass); border-radius: 28px; padding: 30px; position: sticky; top: 100px; height: fit-content; }
        .summary-title { font-size: 22px; font-weight: 800; color: var(--gold); margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid rgba(255,215,0,0.1); }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 15px; }
        .summary-total { margin-top: 20px; padding-top: 20px; border-top: 2px dashed rgba(255,215,0,0.2); font-size: 24px; font-weight: 900; color: var(--success); }

        .checkout-form { margin-top: 30px; display: flex; flex-direction: column; gap: 15px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .input-group label { font-size: 13px; font-weight: 700; color: var(--gold); }
        .input-group input, .input-group textarea { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border-glass); border-radius: 14px; padding: 12px 15px; color: white; font-family: 'Cairo'; font-size: 14px; }
        .input-group input:focus { outline: none; border-color: var(--gold); }

        .btn-submit { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: #111; border: none; padding: 16px; border-radius: 16px; font-size: 18px; font-weight: 800; font-family: 'Cairo'; cursor: pointer; margin-top: 20px; transition: all 0.3s; }
        .btn-submit:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(255,215,0,0.3); }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .empty-cart { text-align: center; padding: 100px 20px; grid-column: 1/-1; }
        .empty-cart i { font-size: 80px; color: var(--gold); opacity: 0.2; margin-bottom: 20px; }
        .empty-cart h2 { color: var(--text-secondary); margin-bottom: 20px; }

        .toast { position: fixed; bottom: 20px; right: 20px; padding: 12px 24px; border-radius: 24px; font-weight: 600; z-index: 3000; background: rgba(0,0,0,0.9); border: 1px solid; animation: slideIn 0.3s ease; }
        .toast.success { border-color: var(--success); color: var(--success); }
        .toast.error { border-color: var(--error); color: var(--error); }
        @keyframes slideIn { from { transform: translateX(400px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        @media (max-width: 992px) {
            .cart-container { grid-template-columns: 1fr; }
            .summary-section { position: static; }
        }
    </style>
</head>
<body>

<div class="top-navbar">
    <div class="nav-logo" onclick="window.location.href='index.html'">
        <i class="fas fa-crown"></i>
        <span class="logo-text">ناردو برو</span>
    </div>
    <button class="btn-back" onclick="window.location.href='index.html'">
        <i class="fas fa-arrow-right"></i> العودة للمتجر
    </button>
</div>

<div class="container">
    <div class="cart-header">
        <h1>سلة المشتريات</h1>
        <p>قم بمراجعة طلباتك وإتمام عملية الشراء</p>
    </div>

    <div id="cartContent" class="cart-container">
        <!-- محتوى السلة سيظهر هنا -->
    </div>
</div>

<script>
    const TELEGRAM = { 
        botToken: '8576673096:AAGvSMjzwVWj6wJ47JdqiDwcObXjBDcyiLA', 
        channelId: '-1003822964890', 
        apiUrl: 'https://api.telegram.org/bot' 
    };

    let cart = JSON.parse(localStorage.getItem('nardoo_cart') || '[]');

    function renderCart() {
        const container = document.getElementById('cartContent');
        if (cart.length === 0) {
            container.innerHTML = `
                <div class="empty-cart">
                    <i class="fas fa-shopping-basket"></i>
                    <h2>السلة فارغة حالياً</h2>
                    <button class="btn-submit" style="width:auto; padding:12px 40px;" onclick="window.location.href='index.html'">ابدأ التسوق</button>
                </div>
            `;
            return;
        }

        let itemsHtml = '';
        let total = 0;
        let count = 0;

        cart.forEach(item => {
            total += item.price * item.quantity;
            count += item.quantity;
            itemsHtml += `
                <div class="cart-item">
                    <div class="product-thumbnail">
                        ${item.image ? `<img src="${item.image}" onerror="this.src='https://via.placeholder.com/90?text=📦'">` : '<i class="fas fa-box"></i>'}
                    </div>
                    <div class="product-info">
                        <div class="product-name">${item.name}</div>
                        <div class="product-store"><i class="fas fa-store"></i> ${item.storeName || 'متجر غير معروف'}</div>
                        <div class="product-price">${item.price.toLocaleString()} دج</div>
                    </div>
                    <div class="quantity-control">
                        <button onclick="updateQty('${item.id}', -1)">−</button>
                        <span>${item.quantity}</span>
                        <button onclick="updateQty('${item.id}', 1)">+</button>
                    </div>
                    <button class="item-remove" onclick="removeItem('${item.id}')"><i class="fas fa-trash"></i></button>
                </div>
            `;
        });

        container.innerHTML = `
            <div class="cart-items-section">${itemsHtml}</div>
            <div class="summary-section">
                <div class="summary-title">ملخص الطلب</div>
                <div class="summary-row"><span>عدد العناصر:</span><span>${count} عناصر</span></div>
                <div class="summary-row"><span>رسوم التوصيل:</span><span>حسب المنطقة</span></div>
                <div class="summary-row summary-total"><span>الإجمالي الكلي:</span><span>${total.toLocaleString()} دج</span></div>
                
                <div class="checkout-form">
                    <div class="input-group">
                        <label>الاسم الكامل</label>
                        <input type="text" id="custName" placeholder="أدخل اسمك">
                    </div>
                    <div class="input-group">
                        <label>رقم الهاتف</label>
                        <input type="tel" id="custPhone" placeholder="05 / 06 / 07 ...">
                    </div>
                    <div class="input-group">
                        <label>عنوان التوصيل</label>
                        <textarea id="custAddress" rows="2" placeholder="الولاية، البلدية، الحي..."></textarea>
                    </div>
                    <button class="btn-submit" id="submitBtn" onclick="submitOrder()">تأكيد وإتمام الطلب</button>
                </div>
            </div>
        `;
    }

    function updateQty(id, change) {
        const item = cart.find(i => i.id == id);
        if (item) {
            item.quantity = Math.max(1, item.quantity + change);
            saveCart();
            renderCart();
        }
    }

    function removeItem(id) {
        if (confirm('هل تريد حذف المنتج من السلة؟')) {
            cart = cart.filter(i => i.id != id);
            saveCart();
            renderCart();
        }
    }

    function saveCart() {
        localStorage.setItem('nardoo_cart', JSON.stringify(cart));
    }

    function showToast(msg, type = 'success') {
        const t = document.createElement('div'); 
        t.className = `toast ${type}`; 
        t.innerHTML = msg;
        document.body.appendChild(t); 
        setTimeout(() => t.remove(), 3000);
    }

    async function submitOrder() {
        const name = document.getElementById('custName').value.trim();
        const phone = document.getElementById('custPhone').value.trim();
        const address = document.getElementById('custAddress').value.trim();

        if (!name || !phone || !address) {
            showToast('❌ يرجى ملء جميع البيانات', 'error');
            return;
        }

        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الإرسال...';

        const orderId = Math.floor(Math.random() * 1000000);
        const timestamp = new Date().toLocaleString('ar-EG');
        const total = cart.reduce((sum, i) => sum + (i.price * i.quantity), 0);

        try {
            // إرسال للتليجرام
            let msg = `🟢 *طلب جديد #${orderId}* 🟢\n━━━━━━━━━━━━━━━━━━━━━━\n`;
            msg += `👤 *العميل:* ${name}\n📞 *الهاتف:* ${phone}\n📍 *العنوان:* ${address}\n`;
            msg += `━━━━━━━━━━━━━━━━━━━━━━\n\n`;
            
            // تجميع حسب المتجر
            const grouped = {};
            cart.forEach(item => {
                const sid = item.storeID || 'unknown';
                if(!grouped[sid]) grouped[sid] = { name: item.storeName, items: [], total: 0 };
                grouped[sid].items.push(item);
                grouped[sid].total += item.price * item.quantity;
            });

            for (const [sid, data] of Object.entries(grouped)) {
                msg += `🏪 *${data.name}* (\`${sid}\`)\n`;
                data.items.forEach(it => msg += `🔸 ${it.name} (${it.quantity}) - ${it.price} دج\n`);
                msg += `💰 إجمالي المتجر: ${data.total} دج\n────────────────\n`;
            }
            msg += `💎 *الإجمالي الكلي: ${total} دج*\n📅 ${timestamp}`;

            const res = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: TELEGRAM.channelId, text: msg, parse_mode: 'Markdown' })
            });

            if (res.ok) {
                // حفظ الطلب محلياً ليظهر في صفحة التاجر (index.html)
                let orders = JSON.parse(localStorage.getItem('nardo_orders') || '[]');
                for (const [sid, data] of Object.entries(grouped)) {
                    orders.unshift({
                        id: Date.now() + Math.random(),
                        telegramOrderId: orderId.toString(),
                        date: timestamp,
                        customerName: name,
                        customerPhone: phone,
                        customerAddress: address,
                        storeID: sid,
                        storeName: data.name,
                        items: data.items,
                        total: data.total,
                        status: 'pending'
                    });
                }
                localStorage.setItem('nardo_orders', JSON.stringify(orders));
                
                cart = [];
                saveCart();
                showToast('✅ تم إرسال طلبك بنجاح!');
                setTimeout(() => window.location.href = 'index.html', 2000);
            } else {
                throw new Error();
            }
        } catch (e) {
            showToast('❌ فشل إرسال الطلب، حاول مرة أخرى', 'error');
            btn.disabled = false;
            btn.innerHTML = 'تأكيد وإتمام الطلب';
        }
    }

    window.onload = renderCart;
</script>

</body>
</html>
