<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ناردو برو - سلتي | نظام طلبات متكامل</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --gold: #ffd700;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --glass: rgba(255, 255, 255, 0.05);
            --success: #4ade80;
            --error: #f87171;
            --warning: #fbbf24;
            --info: #60a5fa;
        }
        
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0f3460, #16213e);
            color: var(--text-primary);
            direction: rtl;
        }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        
        .header {
            background: var(--glass);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }
        .header-title { display: flex; align-items: center; gap: 15px; }
        .header-title i { font-size: 40px; color: var(--gold); }
        .header-title h1 { font-size: 32px; color: var(--gold); margin: 0; }
        .header-info { display: flex; gap: 20px; flex-wrap: wrap; }
        .info-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 215, 0, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .info-item:hover { background: rgba(255, 215, 0, 0.2); }
        
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s;
        }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-gold:hover { background: #ffed4e; transform: translateY(-2px); }
        .btn-outline { background: transparent; border: 2px solid var(--gold); color: var(--gold); }
        .btn-outline:hover { background: rgba(255, 215, 0, 0.1); }
        .btn-danger { background: rgba(248, 113, 113, 0.2); border: 1px solid var(--error); color: var(--error); }
        .btn-danger:hover { background: var(--error); color: white; }
        .btn-refresh { background: rgba(96, 165, 250, 0.2); border: 1px solid var(--info); color: var(--info); }
        .btn-refresh:hover { background: var(--info); color: white; }
        
        .merchant-section {
            background: var(--glass);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 20px;
            margin-bottom: 25px;
            overflow: hidden;
        }
        .merchant-header {
            background: rgba(255, 215, 0, 0.1);
            padding: 20px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            cursor: pointer;
        }
        .merchant-header:hover { background: rgba(255, 215, 0, 0.15); }
        .merchant-info { display: flex; align-items: center; gap: 15px; }
        .merchant-avatar {
            width: 50px;
            height: 50px;
            background: rgba(255, 215, 0, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .merchant-name { font-size: 20px; font-weight: bold; color: var(--gold); }
        .merchant-stats { display: flex; gap: 20px; font-size: 14px; color: var(--text-secondary); }
        .merchant-stats span { color: var(--gold); font-weight: bold; }
        .merchant-toggle { font-size: 20px; transition: transform 0.3s; }
        .merchant-toggle.collapsed { transform: rotate(-90deg); }
        .merchant-products { padding: 20px; }
        .merchant-products.collapsed { display: none; }
        
        .cart-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 215, 0, 0.15);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .product-thumbnail {
            width: 70px;
            height: 70px;
            border-radius: 12px;
            background: rgba(255, 215, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .product-thumbnail i { font-size: 30px; color: var(--gold); }
        .product-thumbnail img { width: 100%; height: 100%; object-fit: cover; }
        .product-details { flex: 2; min-width: 150px; }
        .product-name { font-size: 16px; font-weight: bold; color: var(--gold); }
        .product-price { font-size: 13px; color: var(--success); }
        .product-id { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }
        .cart-item-quantity {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 215, 0, 0.1);
            padding: 8px 15px;
            border-radius: 10px;
        }
        .cart-item-quantity button {
            background: none;
            border: none;
            color: var(--gold);
            cursor: pointer;
            font-size: 18px;
            width: 30px;
            height: 30px;
            border-radius: 8px;
        }
        .cart-item-quantity button:hover { background: rgba(255, 215, 0, 0.2); }
        .cart-item-quantity span { font-size: 16px; font-weight: bold; min-width: 30px; text-align: center; }
        .cart-item-total { font-size: 16px; font-weight: bold; color: var(--gold); min-width: 100px; text-align: center; }
        .cart-item-remove { background: rgba(248, 113, 113, 0.2); color: var(--error); border: 1px solid var(--error); padding: 8px 15px; border-radius: 10px; cursor: pointer; }
        
        .cart-summary {
            background: rgba(255, 215, 0, 0.05);
            border-radius: 15px;
            padding: 25px;
            margin-top: 20px;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.1);
        }
        .summary-label { color: var(--text-secondary); }
        .summary-value { color: var(--gold); font-weight: bold; font-size: 18px; }
        .summary-total { font-size: 24px; color: var(--success); }
        .cart-actions { display: flex; gap: 15px; margin-top: 25px; flex-wrap: wrap; }
        .cart-actions .btn { flex: 1; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 3000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: var(--secondary);
            border-radius: 20px;
            padding: 30px;
            max-width: 550px;
            width: 90%;
            border: 2px solid var(--gold);
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-content h2 { color: var(--gold); margin-bottom: 20px; text-align: center; }
        .modal-content input, .modal-content select, .modal-content textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: 1px solid rgba(255,215,0,0.3);
            background: rgba(255,255,255,0.1);
            color: white;
            font-family: 'Cairo', sans-serif;
        }
        .modal-content input:focus, .modal-content select:focus {
            outline: none;
            border-color: var(--gold);
        }
        .modal-buttons { display: flex; gap: 15px; margin-top: 20px; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--gold);
            font-size: 13px;
        }
        
        .distributors-section {
            background: rgba(255, 215, 0, 0.05);
            border: 2px solid rgba(255, 215, 0, 0.2);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .distributors-section h3 {
            color: var(--gold);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .distributor-item {
            background: rgba(0, 0, 0, 0.3);
            border-right: 4px solid var(--gold);
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 10px;
            transition: all 0.3s;
            cursor: pointer;
        }
        .distributor-item:hover {
            background: rgba(255, 215, 0, 0.15);
            transform: translateX(-5px);
        }
        .distributor-item.selected {
            background: rgba(255, 215, 0, 0.25);
            border-right: 4px solid var(--success);
        }
        .distributor-name {
            font-weight: bold;
            color: var(--gold);
            font-size: 16px;
            margin-bottom: 5px;
        }
        .distributor-type {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 12px;
            margin-bottom: 8px;
            font-weight: bold;
        }
        .type-delivery { background: rgba(96, 165, 250, 0.2); color: var(--info); }
        .type-distributor { background: rgba(74, 222, 128, 0.2); color: var(--success); }
        
        .distributor-info {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 5px;
        }
        .distributor-id {
            font-family: monospace;
            background: rgba(255, 215, 0, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
            color: var(--gold);
        }
        
        .no-distributors {
            text-align: center;
            padding: 30px;
            color: var(--text-secondary);
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
        }
        
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            z-index: 5000;
            font-weight: bold;
            animation: slideIn 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        .notification.success { background: var(--success); color: #000; }
        .notification.error { background: var(--error); color: #fff; }
        .notification.info { background: var(--info); color: #fff; }
        .notification.warning { background: var(--warning); color: #000; }
        
        #distributorsLoading {
            text-align: center;
            padding: 20px;
            display: none;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 215, 0, 0.1);
            border-top: 4px solid var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .order-card {
            background: var(--glass);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .order-card-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.1);
            padding-bottom: 8px;
        }
        .order-id { color: var(--gold); font-weight: bold; }
        .order-status { font-size: 12px; padding: 4px 8px; border-radius: 10px; }
        .status-pending { background: rgba(251, 191, 36, 0.2); color: var(--warning); }
        .status-received { background: rgba(96, 165, 250, 0.2); color: var(--info); }
        .status-approved { background: rgba(74, 222, 128, 0.2); color: var(--success); }
        .order-details { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }

        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
        .empty-state i { font-size: 60px; color: var(--gold); margin-bottom: 20px; opacity: 0.5; }
    </style>
</head>
<body>

    <!-- نافذة إتمام الطلب -->

            <div class="form-group">
                <label>الولاية:</label>

                    <option value="تبسة">12 - تبسة</option>

    <script>
        // الإعدادات
        const TELEGRAM = {
            botToken: '7542153545:AAH-u_p0-v_uW_6-v_uW_6-v_uW_6',
            channelId: '-1002435532556',
            apiUrl: 'https://api.telegram.org/bot'
        };
        const CART_STORAGE_KEY = 'nardo_cart';
        const ORDERS_STORAGE_KEY = 'nardo_orders_archive';

        // الحالة العامة
        let cart = [];
        let storesState = JSON.parse(localStorage.getItem('stores_state') || '{}');
        let storeColors = {};
        let distributorsData = {}; 
        let selectedDistributor = null;

        // ============================================
        // وظائف السلة الأساسية
        // ============================================
        function getStoreColor(storeID) {
            if (!storeColors[storeID]) {
                const colors = ['color-1', 'color-2', 'color-3', 'color-4', 'color-5'];
                storeColors[storeID] = colors[Math.floor(Math.random() * colors.length)];
            }
            return storeColors[storeID];
        }
        
        function saveStoresState() { localStorage.setItem('stores_state', JSON.stringify(storesState)); }
        function toggleStore(storeID) { storesState[storeID] = !storesState[storeID]; saveStoresState(); updateCartDisplay(); }
        function saveCart() { localStorage.setItem(CART_STORAGE_KEY, JSON.stringify(cart)); updateCartCounters(); }
        
        function loadCart() { 
            const saved = localStorage.getItem(CART_STORAGE_KEY); 
            cart = saved ? JSON.parse(saved) : []; 
            updateCartDisplay(); 
            updateCartCounters(); 
        }
        
        function updateCartCounters() { 
            const count = cart.reduce((s, i) => s + i.quantity, 0); 
            const total = cart.reduce((s, i) => s + (i.price * i.quantity), 0); 
            document.getElementById('cartCount').textContent = count; 
            document.getElementById('cartTotal').textContent = total.toLocaleString('ar-EG'); 
        }
        
        function showNotification(m, type='success') { 
            const n = document.createElement('div'); 
            n.className = `notification ${type}`; 
            n.innerHTML = `<i class="fas ${type==='success'?'fa-check-circle':type==='error'?'fa-exclamation-circle':'fa-info-circle'}"></i> ${m}`; 
            document.body.appendChild(n); 
            setTimeout(()=>n.remove(),3000); 
        }
        
        function updateCartDisplay() { 
            const container = document.getElementById('cartContainer'); 
            if(cart.length===0){ 
                container.innerHTML = `<div class="empty-state"><i class="fas fa-shopping-cart"></i><h3>السلة فارغة</h3><p>لم تقم بإضافة أي منتجات بعد</p></div>`; 
                return; 
            } 
            const grouped = groupByStore(cart); 
            let html = ''; 
            for(const [storeID, storeData] of Object.entries(grouped)){ 
                const isCollapsed = storesState[storeID]; 
                html += `<div class="merchant-section"><div class="merchant-header" onclick="toggleStore('${storeID}')"><div class="merchant-info"><div class="merchant-avatar"><i class="fas fa-store"></i></div><div><div class="merchant-name">${storeData.storeName}</div><div class="merchant-id">${storeID}</div></div></div><div class="merchant-stats"><span>${storeData.count}</span> منتج<span>${storeData.total.toLocaleString('ar-EG')}</span> دج</div><div class="merchant-toggle ${isCollapsed?'collapsed':''}"><i class="fas fa-chevron-down"></i></div></div><div class="merchant-products ${isCollapsed?'collapsed':''}">`; 
                storeData.items.forEach(item=>{ 
                    html += `<div class="cart-item"><div class="product-thumbnail">${item.imageData?`<img src="${item.imageData}">`:' <i class="fas fa-image"></i>'}</div><div class="product-details"><div class="product-name">${item.name}</div><div class="product-price">${item.price.toLocaleString('ar-EG')} دج</div><div class="product-id">معرف: ${item.productCompositeID||item.id||'---'}</div></div><div class="cart-item-quantity"><button onclick="updateCartQuantity('${item.id}',-1)">−</button><span>${item.quantity}</span><button onclick="updateCartQuantity('${item.id}',1)">+</button></div><div class="cart-item-total">${(item.price*item.quantity).toLocaleString('ar-EG')} دج</div><button class="cart-item-remove" onclick="removeFromCart('${item.id}')"><i class="fas fa-trash"></i></button></div>`; 
                }); 
                html += `</div></div>`; 
            } 
            html += `<div class="cart-summary"><div class="summary-row"><span class="summary-label">الإجمالي الفرعي:</span><span class="summary-value">${cart.reduce((s,i)=>s+(i.price*i.quantity),0).toLocaleString('ar-EG')} دج</span></div><div class="summary-row"><span class="summary-label">الرسوم:</span><span class="summary-value">مجاني</span></div><div class="summary-row" style="border: none;"><span class="summary-label" style="font-size: 18px;">المجموع:</span><span class="summary-total">${cart.reduce((s,i)=>s+(i.price*i.quantity),0).toLocaleString('ar-EG')} دج</span></div><div class="cart-actions"><button class="btn btn-gold" onclick="openCustomerModal()"><i class="fas fa-credit-card"></i> الدفع والتوصيل</button><button class="btn btn-outline" onclick="clearCart()"><i class="fas fa-trash-alt"></i> مسح السلة</button></div></div>`; 
            container.innerHTML = html; 
        }
        
        function updateCartQuantity(productId, change) { 
            const idx = cart.findIndex(i=>i.id===productId); 
            if(idx===-1) return; 
            const newQ = cart[idx].quantity+change; 
            if(newQ<=0) removeFromCart(productId); 
            else { 
                cart[idx].quantity=newQ; 
                saveCart(); 
                updateCartDisplay(); 
                showNotification(`✓ تم تحديث كمية ${cart[idx].name}`); 
            } 
        }
        
        function removeFromCart(productId) { 
            const item = cart.find(i=>i.id===productId); 
            if(item){ 
                cart = cart.filter(i=>i.id!==productId); 
                saveCart(); 
                updateCartDisplay(); 
                showNotification(`✓ تم إزالة ${item.name}`); 
            } 
        }
        
        function clearCart() { 
            if(cart.length===0) showNotification('السلة فارغة','warning'); 
            else if(confirm('مسح السلة؟')){ 
                cart=[]; 
                saveCart(); 
                updateCartDisplay(); 
                showNotification('✓ تم مسح السلة'); 
            } 
        }
        
        function groupByStore(items) { 
            const g={}; 
            items.forEach(item=>{ 
                const sid = item.storeID || 'unknown-store'; 
                const sname = item.storeName || 'ناردو برو'; 
                if(!g[sid]) g[sid]={storeID:sid, storeName:sname, items:[], total:0, count:0}; 
                g[sid].items.push(item); 
                g[sid].total += item.price * item.quantity; 
                g[sid].count += item.quantity; 
            }); 
            return g; 
        }

        // ============================================
        // نظام الموزعين (النسخة المصححة والكاملة)
        // ============================================
        function getStateCode(stateName) {
            const stateCodes = {
                'الجزائر': 'ALG', 'أدرار': 'ADE', 'الشلف': 'ASH', 'الأغواط': 'LGH',
                'أم البواقي': 'OEB', 'باتنة': 'BAT', 'بجاية': 'BJA', 'بسكرة': 'BSK',
                'بشار': 'BSH', 'البليدة': 'BLA', 'البويرة': 'BUI', 'تمنراست': 'TAM',
                'تبسة': 'TEB', 'تلمسان': 'TLE', 'تيارت': 'TIA', 'تيزي وزو': 'TIZ',
                'الجلفة': 'DJF', 'جيجل': 'JIJ', 'سطيف': 'SET', 'سعيدة': 'SAI',
                'سكيكدة': 'SKI', 'سيدي بلعباس': 'SBI', 'عنابة': 'ANA', 'قالمة': 'GUE',
                'قسنطينة': 'CON', 'المدية': 'MED', 'ميلة': 'MIL', 'معسكر': 'MOS',
                'المسيلة': 'MSC', 'مستغانم': 'MGH', 'النعامة': 'NAA', 'وهران': 'ORA',
                'الوادي': 'OUA', 'برج بوعريريج': 'BBA', 'بومرداس': 'BMD', 'الطارف': 'TAR',
                'تندوف': 'TIN', 'تيسمسيلت': 'TSS', 'خنشلة': 'KHE', 'سوق أهراس': 'SOU',
                'تيبازة': 'TIP', 'عين الدفلى': 'AYD', 'عين تموشنت': 'AIN', 'غرداية': 'GHA', 'غليزان': 'REL'
            };
            return stateCodes[stateName] || stateName.substring(0, 3).toUpperCase();
        }

        async function fetchDistributorsFromTelegram() {
            try {
                const response = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getUpdates?offset=-100`);
                const data = await response.json();
                if (!data.ok || !data.result) return false;
                
                let distributorsMessage = null;
                const reversedUpdates = [...data.result].reverse();
                for (const update of reversedUpdates) {
                    const message = update.channel_post || update.message;
                    if (message && message.text && message.text.includes('قائمة الموزعين وشركات التوصيل حسب كل ولاية')) {
                        distributorsMessage = message.text;
                        break;
                    }
                }
                
                if (distributorsMessage) {
                    parseDistributorsMessage(distributorsMessage);
                    localStorage.setItem('nardo_distributors_data', JSON.stringify(distributorsData));
                    return true;
                }
                return false;
            } catch (e) { return false; }
        }

        function parseDistributorsMessage(text) {
            distributorsData = {};
            const sections = text.split('📍 ولاية ');
            sections.forEach((section, index) => {
                if (index === 0) return;
                const lines = section.split('\n');
                const stateMatch = lines[0].match(/(.+?)\s*\(([A-Z]{3})\)/);
                if (stateMatch) {
                    const stateCode = stateMatch[2];
                    distributorsData[stateCode] = [];
                    const distributorBlocks = section.split('\n• ');
                    distributorBlocks.forEach((block, bIndex) => {
                        if (bIndex === 0) return;
                        const blockLines = block.split('\n');
                        const nameMatch = blockLines[0].match(/\*\*(.+?)\*\*\s*\((.+?)\)/);
                        if (nameMatch) {
                            const d = {
                                name: nameMatch[1],
                                typeText: nameMatch[2],
                                type: nameMatch[2].includes('🚚') ? 'delivery' : 'distributor',
                                customId: null, manager: null, phone: null
                            };
                            blockLines.forEach(l => {
                                if (l.includes('🆔 المعرف:')) {
                                    const idMatch = l.match(/🆔 المعرف:\s*`(.+?)`/);
                                    if (idMatch) d.customId = idMatch[1];
                                }
                                if (l.includes('👤')) {
                                    const contactMatch = l.match(/👤\s*(.+?)\s*\|\s*📞\s*(.+)$/);
                                    if (contactMatch) {
                                        d.manager = contactMatch[1].trim();
                                        d.phone = contactMatch[2].trim();
                                    }
                                }
                            });
                            distributorsData[stateCode].push(d);
                        }
                    });
                }
            });
        }

        async function loadDistributorsFromTelegram() {
            const stateName = document.getElementById('customerState').value;
            const container = document.getElementById('distributorsList');
            const loading = document.getElementById('distributorsLoading');
            if (!stateName) { container.innerHTML = ''; return; }
            
            loading.style.display = 'block';
            container.innerHTML = '';
            
            if (Object.keys(distributorsData).length === 0) await fetchDistributorsFromTelegram();
            
            loading.style.display = 'none';
            const stateCode = getStateCode(stateName);
            const list = distributorsData[stateCode] || [];
            
            if (list.length === 0) {
                container.innerHTML = `
                    <div class="no-distributors">
                        لا توجد شركات توصيل أو موزعون معتمدون في ولاية <strong>${stateName}</strong> حالياً
                        <button class="btn btn-refresh" style="margin-top: 15px;" onclick="fetchDistributorsFromTelegram(); loadDistributorsFromTelegram();">
                            <i class="fas fa-sync-alt"></i> تحديث البيانات من التلغرام
                        </button>
                    </div>`;
                return;
            }
            
            let html = `<h3><i class="fas fa-warehouse"></i> اختر شركة التوصيل أو الموزع في ${stateName}</h3>`;
            list.forEach((d, index) => {
                const serviceIcon = d.type === 'delivery' ? '🚚' : '📦';
                const typeClass = d.type === 'delivery' ? 'type-delivery' : 'type-distributor';
                html += `
                    <div class="distributor-item ${selectedDistributor?.customId === d.customId ? 'selected' : ''}" onclick="selectDistributor('${stateCode}', ${index})">
                        <div class="distributor-name">${serviceIcon} ${d.name}</div>
                        <div class="distributor-type ${typeClass}">${d.typeText}</div>
                        <div class="distributor-info">
                            👤 <strong>${d.manager || 'غير محدد'}</strong> | 📞 ${d.phone || 'غير محدد'}
                        </div>
                        <div class="distributor-info">
                            🆔 المعرف: <span class="distributor-id">${d.customId || '---'}</span>
                        </div>
                    </div>`;
            });
            container.innerHTML = html;
        }

        function selectDistributor(stateCode, index) {
            selectedDistributor = distributorsData[stateCode][index];
            loadDistributorsFromTelegram();
            showNotification(`تم اختيار: ${selectedDistributor.name}`);
        }

        // ============================================
        // دوال إرسال الطلب
        // ============================================
        function formatProductVertical(item) {
            let productMsg = "";
            productMsg += `🛒 ${item.name}\n`;
            productMsg += `   🆔 معرف المنتج: \`${item.productCompositeID || item.id || 'غير محدد'}\`\n`;
            productMsg += `   📦 الكمية: ${item.quantity}\n`;
            productMsg += `   💰 السعر: ${item.price.toLocaleString()} دج\n`;
            productMsg += `   💵 المجموع: ${(item.price * item.quantity).toLocaleString()} دج\n`;
            return productMsg;
        }
        
        function cleanCustomerName(name) {
            let clean = name.replace(/[^\u0600-\u06FFa-zA-Z]/g, '');
            return clean.substring(0, 15) || 'CUST';
        }
        
        function generateRandomNumbers() {
            return Math.floor(Math.random() * 900000 + 100000).toString();
        }
        
        function generateOrderId(customerName, stateName) {
            const stateCode = getStateCode(stateName || 'الجزائر');
            const cleanName = cleanCustomerName(customerName);
            const randomNumbers = generateRandomNumbers();
            return `${stateCode}-${cleanName}-${randomNumbers}`;
        }
        
        async function sendOrderToTelegram(customerData, groupedStores, grandTotal, distributor) {
            const timestamp = new Date().toLocaleString('ar-EG');
            const mainOrderId = generateOrderId(customerData.name, customerData.state);
            
            try {
                let channelMsg = `🟢 *طلب جديد #${mainOrderId}* 🟢\n`;
                channelMsg += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
                channelMsg += `👤 *المشتري:* ${customerData.name}\n`;
                channelMsg += `📞 *الهاتف:* ${customerData.phone}\n`;
                if(customerData.state) channelMsg += `📍 *الولاية:* ${customerData.state}\n`;
                if(customerData.addressDetail) channelMsg += `🏠 *العنوان:* ${customerData.addressDetail}\n`;
                if(customerData.address) channelMsg += `📍 *العنوان الكامل:* ${customerData.address}\n`;
                if(customerData.notes) channelMsg += `📝 *ملاحظات:* ${customerData.notes}\n`;
                if(distributor) {
                    const serviceIcon = distributor.type === 'delivery' ? '🚚' : '📦';
                    channelMsg += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
                    channelMsg += `${serviceIcon} *جهة التوصيل:* ${distributor.name}\n`;
                    channelMsg += `🆔 *معرف الموزع:* \`${distributor.customId || '---'}\`\n`;
                    channelMsg += `📞 *هاتف الموزع:* ${distributor.phone || 'غير محدد'}\n`;
                }
                channelMsg += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n`;
                
                for (const [storeID, storeData] of Object.entries(groupedStores)) {
                    channelMsg += `🏪 *${storeData.storeName}*\n`;
                    channelMsg += `🆔 *معرف المتجر:* \`${storeID}\`\n`;
                    channelMsg += `───────────────────────────────\n`;
                    
                    storeData.items.forEach(item => {
                        channelMsg += formatProductVertical(item);
                        channelMsg += `───────────────────────────────\n`;
                    });
                    
                    channelMsg += `💰 *إجمالي المتجر:* ${storeData.total.toLocaleString()} دج\n`;
                    channelMsg += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
                }
                
                channelMsg += `💎 *الإجمالي الكلي:* ${grandTotal.toLocaleString()} دج\n`;
                channelMsg += `📅 *التاريخ:* ${timestamp}\n`;
                channelMsg += `✅ تم استلام الطلب بنجاح، سيتم التواصل معك قريباً`;
                
                const res = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/sendMessage`, {
                    method:'POST', 
                    headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({
                        chat_id: TELEGRAM.channelId, 
                        text: channelMsg, 
                        parse_mode: 'Markdown'
                    })
                });
                
                // إرسال رسالة لكل متجر
                for (const [storeID, storeData] of Object.entries(groupedStores)) {
                    let merchantMsg = `🛍️ *فاتورة طلب جديد - ${storeData.storeName}* 🛍️\n`;
                    merchantMsg += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
                    merchantMsg += `🆔 *رقم الطلب الموحد:* \`${mainOrderId}\`\n`;
                    merchantMsg += `👤 *الزبون:* ${customerData.name}\n`;
                    merchantMsg += `📞 *رقم الجوال:* ${customerData.phone}\n`;
                    if(customerData.state) merchantMsg += `📍 *الولاية:* ${customerData.state}\n`;
                    if(customerData.addressDetail) merchantMsg += `🏠 *العنوان:* ${customerData.addressDetail}\n`;
                    if(customerData.address) merchantMsg += `📍 *العنوان الكامل:* ${customerData.address}\n`;
                    if(distributor) {
                        const serviceIcon = distributor.type === 'delivery' ? '🚚' : '📦';
                        merchantMsg += `${serviceIcon} *جهة التوصيل:* ${distributor.name}\n`;
                    }
                    merchantMsg += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
                    merchantMsg += `📦 *المنتجات المطلوبة:*\n`;
                    merchantMsg += `───────────────────────────────\n`;
                    
                    storeData.items.forEach((item, idx) => {
                        merchantMsg += `\n${idx+1}️⃣ ${item.name}\n`;
                        merchantMsg += `   🆔 معرف المنتج: \`${item.productCompositeID || item.id || 'غير محدد'}\`\n`;
                        merchantMsg += `   📦 الكمية: ${item.quantity}\n`;
                        merchantMsg += `   💰 السعر: ${item.price.toLocaleString()} دج\n`;
                        merchantMsg += `   💵 المجموع: ${(item.price * item.quantity).toLocaleString()} دج\n`;
                        merchantMsg += `───────────────────────────────\n`;
                    });
                    
                    merchantMsg += `💰 *إجمالي الطلب:* ${storeData.total.toLocaleString()} دج\n`;
                    merchantMsg += `📅 *التاريخ:* ${timestamp}\n`;
                    merchantMsg += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
                    
                    await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/sendMessage`, {
                        method:'POST', 
                        headers:{'Content-Type':'application/json'},
                        body:JSON.stringify({
                            chat_id: TELEGRAM.channelId, 
                            text: merchantMsg, 
                            parse_mode: 'Markdown'
                        })
                    });
                }

                // حفظ في الأرشيف
                saveOrderToArchive({
                    id: mainOrderId,
                    storeName: 'طلب مجمع',
                    date: timestamp,
                    customerState: customerData.state,
                    customerAddressDetail: customerData.addressDetail,
                    items: cart,
                    total: grandTotal,
                    distributor: distributor ? distributor.name : null,
                    status: 'pending'
                });

                return res.ok;
            } catch (e) { return false; }
        }

        function saveOrderToArchive(order) {
            const allOrders = JSON.parse(localStorage.getItem(ORDERS_STORAGE_KEY) || '[]');
            allOrders.unshift(order);
            localStorage.setItem(ORDERS_STORAGE_KEY, JSON.stringify(allOrders.slice(0, 50)));
            renderOrdersArchive();
        }
        
        function renderOrdersArchive() {
            const container = document.getElementById('ordersArchiveContainer');
            if(!container) return;
            const orders = JSON.parse(localStorage.getItem(ORDERS_STORAGE_KEY) || '[]');
            if(orders.length === 0){ 
                container.innerHTML = '<p style="text-align:center; color: var(--text-secondary);">لا توجد طلبات سابقة</p>'; 
                return; 
            }
            container.innerHTML = orders.map(o => `
                <div class="order-card">
                    <div class="order-card-header">
                        <span class="order-id">#${o.id}</span>
                        <span class="order-status status-pending">⏳ قيد المعالجة</span>
                    </div>
                    <div class="order-details">
                        <div>📅 ${o.date}</div>
                        <div>📍 ${o.customerState ? `${o.customerState} - ` : ''}${o.customerAddressDetail || ''}</div>
                        <div>💰 ${o.total.toLocaleString()} دج</div>
                        ${o.distributor ? `<div>🚚 ${o.distributor}</div>` : ''}
                    </div>
                </div>
            `).join('');
        }

        // ============================================
        // دوال النافذة المنبثقة
        // ============================================
        let pendingGroupedStores = null, pendingGrandTotal = null;
        
        function loadUserProfile() {
            let userName = '';
            const currentStore = localStorage.getItem('nardo_current_store');
            if (currentStore) {
                try {
                    const store = JSON.parse(currentStore);
                    if (store.storeName) userName = store.storeName;
                } catch(e) {}
            }
            const savedUser = localStorage.getItem('nardo_customer_name');
            if (savedUser && !userName) userName = savedUser;
            if (!userName) userName = 'زائر ناردو برو';
            document.getElementById('customerName').value = userName;
        }
        
        function updateFullAddress() {
            const state = document.getElementById('customerState').value;
            const detail = document.getElementById('customerAddress').value;
            const fullAddress = state && detail ? `${state} - ${detail}` : (state || detail || '');
            document.getElementById('fullAddress').value = fullAddress;
        }
        
        function openMapLocation() {
            const state = document.getElementById('customerState').value;
            const address = document.getElementById('customerAddress').value;
            const query = encodeURIComponent(`${state} ${address}`);
            window.open(`https://www.google.com/maps/search/?api=1&query=${query}`, '_blank');
            showNotification('🗺️ تم فتح الخريطة، يمكنك نسخ العنوان التفصيلي', 'info');
        }
        
        function openCustomerModal() { 
            if(cart.length === 0){ 
                showNotification('السلة فارغة','warning'); 
                return; 
            } 
            pendingGroupedStores = groupByStore(cart); 
            pendingGrandTotal = cart.reduce((s,i) => s + (i.price * i.quantity), 0); 
            
            loadUserProfile();
            document.getElementById('customerPhone').value = '';
            document.getElementById('customerState').value = '';
            document.getElementById('customerAddress').value = '';
            document.getElementById('fullAddress').value = '';
            document.getElementById('customerNotes').value = '';
            document.getElementById('distributorsList').innerHTML = '';
            selectedDistributor = null;
            
            document.getElementById('customerModal').style.display = 'flex'; 
        }
        
        function closeModal() { 
            document.getElementById('customerModal').style.display = 'none'; 
        }
        
        async function submitOrder() {
            const name = document.getElementById('customerName').value.trim(); 
            const phone = document.getElementById('customerPhone').value.trim(); 
            const state = document.getElementById('customerState').value;
            const addressDetail = document.getElementById('customerAddress').value.trim();
            const fullAddress = document.getElementById('fullAddress').value.trim();
            const notes = document.getElementById('customerNotes').value.trim();
            
            if(!name){ showNotification('الرجاء إدخال الاسم','error'); return; }
            if(!phone){ showNotification('الرجاء إدخال رقم الهاتف','error'); return; }
            if(!state && !addressDetail){ showNotification('الرجاء إدخال العنوان','error'); return; }
            if(!selectedDistributor) { showNotification('الرجاء اختيار شركة التوصيل أو الموزع','error'); return; }
            
            const finalAddress = fullAddress || (state && addressDetail ? `${state} - ${addressDetail}` : (state || addressDetail));
            const customerData = { name, phone, address: finalAddress, state: state, addressDetail: addressDetail, notes };
            
            showNotification('جاري إرسال الطلب...','info');
            const success = await sendOrderToTelegram(customerData, pendingGroupedStores, pendingGrandTotal, selectedDistributor);
            
            if(success){
                cart = [];
                saveCart();
                updateCartDisplay();
                closeModal();
                showNotification('✓ تم إرسال الطلب بنجاح!', 'success');
                renderOrdersArchive();
            } else {
                showNotification('❌ فشل إرسال الطلب', 'error');
            }
        }

        // ============================================
        // التهيئة
        // ============================================
        window.addEventListener('load', function() {
            loadCart();
            renderOrdersArchive();
            const cached = localStorage.getItem('nardo_distributors_data');
            if (cached) {
                try { distributorsData = JSON.parse(cached); } catch(e) {}
            }
        });
    </script>
