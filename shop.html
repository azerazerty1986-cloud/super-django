head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ناردو برو - سلتي</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --gold: #ffd700;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --glass: rgba(255, 255, 255, 0.05);
            --success: #4ade80;
            --error: #f87171;
            --warning: #fbbf24;
            --info: #60a5fa;
        }
        
        /* ألوان التجار - كل تاجر له لون مختلف */
        .merchant-color-0 { border-right: 5px solid #ff6b6b; }
        .merchant-color-1 { border-right: 5px solid #4ecdc4; }
        .merchant-color-2 { border-right: 5px solid #45b7d1; }
        .merchant-color-3 { border-right: 5px solid #96ceb4; }
        .merchant-color-4 { border-right: 5px solid #ffeaa7; }
        .merchant-color-5 { border-right: 5px solid #dfe6e9; }
        .merchant-color-6 { border-right: 5px solid #fd79a8; }
        .merchant-color-7 { border-right: 5px solid #e84393; }
        .merchant-color-8 { border-right: 5px solid #6c5ce7; }
        .merchant-color-9 { border-right: 5px solid #a29bfe; }
        
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0f3460, #16213e);
            color: var(--text-primary);
            direction: rtl;
        }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        
        /* الهيدر */
        .header {
            background: var(--glass);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }
        .header-title { display: flex; align-items: center; gap: 15px; }
        .header-title i { font-size: 40px; color: var(--gold); }
        .header-title h1 { font-size: 32px; color: var(--gold); margin: 0; }
        .header-info { display: flex; gap: 20px; flex-wrap: wrap; }
        .info-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 215, 0, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .info-item:hover { background: rgba(255, 215, 0, 0.2); }
        
        /* أزرار */
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s;
        }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-gold:hover { background: #ffed4e; transform: translateY(-2px); }
        .btn-outline { background: transparent; border: 2px solid var(--gold); color: var(--gold); }
        .btn-outline:hover { background: rgba(255, 215, 0, 0.1); }
        .btn-success { background: var(--success); color: #000; }
        .btn-success:hover { background: #5ee890; transform: translateY(-2px); }
        .btn-danger { background: rgba(248, 113, 113, 0.2); border: 1px solid var(--error); color: var(--error); }
        .btn-danger:hover { background: var(--error); color: white; }
        
        /* أقسام التجار */
        .merchant-section {
            background: var(--glass);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 20px;
            margin-bottom: 25px;
            overflow: hidden;
            transition: all 0.3s;
        }
        .merchant-header {
            background: rgba(255, 215, 0, 0.1);
            padding: 20px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.2);
            cursor: pointer;
            transition: all 0.3s;
        }
        .merchant-header:hover { background: rgba(255, 215, 0, 0.15); }
        .merchant-info { display: flex; align-items: center; gap: 15px; }
        .merchant-avatar {
            width: 50px;
            height: 50px;
            background: rgba(255, 215, 0, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .merchant-name { font-size: 20px; font-weight: bold; color: var(--gold); }
        .merchant-id { font-size: 12px; color: var(--text-secondary); font-family: monospace; margin-top: 5px; }
        .merchant-stats { display: flex; gap: 20px; font-size: 14px; color: var(--text-secondary); }
        .merchant-stats span { color: var(--gold); font-weight: bold; }
        .merchant-toggle { font-size: 20px; transition: transform 0.3s; }
        .merchant-toggle.collapsed { transform: rotate(-90deg); }
        
        /* المنتجات داخل التاجر */
        .merchant-products {
            padding: 20px;
            transition: all 0.3s;
        }
        .merchant-products.collapsed { display: none; }
        
        .cart-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 215, 0, 0.15);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s;
        }
        .cart-item:hover {
            border-color: var(--gold);
            background: rgba(255, 215, 0, 0.05);
        }
        
        /* صورة المنتج المصغرة */
        .product-thumbnail {
            width: 70px;
            height: 70px;
            border-radius: 12px;
            overflow: hidden;
            background: rgba(255, 215, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .product-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .product-thumbnail i { font-size: 30px; color: var(--gold); }
        
        /* معلومات المنتج */
        .product-details {
            flex: 2;
            min-width: 150px;
        }
        .product-name {
            font-size: 16px;
            font-weight: bold;
            color: var(--gold);
            margin-bottom: 5px;
        }
        .product-price {
            font-size: 13px;
            color: var(--success);
        }
        
        /* التحكم في الكمية */
        .cart-item-quantity {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 215, 0, 0.1);
            padding: 8px 15px;
            border-radius: 10px;
            flex-shrink: 0;
        }
        .cart-item-quantity button {
            background: none;
            border: none;
            color: var(--gold);
            cursor: pointer;
            font-size: 18px;
            width: 30px;
            height: 30px;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .cart-item-quantity button:hover { background: rgba(255, 215, 0, 0.2); }
        .cart-item-quantity span { font-size: 16px; font-weight: bold; min-width: 30px; text-align: center; }
        
        .cart-item-total {
            font-size: 16px;
            font-weight: bold;
            color: var(--gold);
            min-width: 100px;
            text-align: center;
            flex-shrink: 0;
        }
        
        .cart-item-remove {
            background: rgba(248, 113, 113, 0.2);
            color: var(--error);
            border: 1px solid var(--error);
            padding: 8px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .cart-item-remove:hover { background: var(--error); color: white; }
        
        /* الملخص */
        .cart-summary {
            background: rgba(255, 215, 0, 0.05);
            border-radius: 15px;
            padding: 25px;
            margin-top: 20px;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.1);
        }
        .summary-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .summary-label { color: var(--text-secondary); font-size: 16px; }
        .summary-value { color: var(--gold); font-weight: bold; font-size: 18px; }
        .summary-total { font-size: 24px; color: var(--success); }
        
        .cart-actions {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }
        .cart-actions .btn { flex: 1; }
        
        /* نافذة معلومات المشتري */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 3000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: var(--secondary);
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            border: 2px solid var(--gold);
        }
        .modal-content h2 {
            color: var(--gold);
            margin-bottom: 20px;
            text-align: center;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--text-secondary); }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 10px;
            color: white;
            font-family: 'Cairo', sans-serif;
        }
        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--gold);
            background: rgba(255,215,0,0.05);
        }
        
        /* أرشيف الطلبات */
        .orders-archive { margin-top: 50px; }
        .archive-title {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            color: var(--gold);
        }
        .order-card {
            background: var(--glass);
            border: 1px solid rgba(255, 215, 0, 0.1);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
        }
        .order-card-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.1);
        }
        .order-id { font-weight: bold; color: var(--gold); }
        .order-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        .status-pending { background: rgba(251, 191, 36, 0.2); color: var(--warning); }
        .status-received { background: rgba(96, 165, 250, 0.2); color: var(--info); }
        .status-approved { background: rgba(74, 222, 128, 0.2); color: var(--success); }
        
        .order-details { font-size: 14px; line-height: 1.6; }
        .order-merchant { color: var(--gold); margin-bottom: 5px; }
        .order-items-list { margin: 10px 0; color: var(--text-secondary); }
        .order-actions { display: flex; gap: 10px; margin-top: 15px; }
        
        /* إشعارات */
        .notification {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 30px;
            border-radius: 12px;
            color: white;
            z-index: 4000;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            animation: slideUp 0.3s ease-out;
        }
        .notification.success { background: var(--success); }
        .notification.error { background: var(--error); }
        .notification.warning { background: var(--warning); }
        .notification.info { background: var(--info); }
        
        @keyframes slideUp {
            from { bottom: -50px; opacity: 0; }
            to { bottom: 20px; opacity: 1; }
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: var(--glass);
            border-radius: 20px;
            border: 1px dashed rgba(255, 215, 0, 0.3);
        }
        .empty-state i { font-size: 60px; color: rgba(255, 215, 0, 0.2); margin-bottom: 20px; }
        .empty-state h3 { color: var(--gold); margin-bottom: 10px; }
        .empty-state p { color: var(--text-secondary); }
        
        @media (max-width: 768px) {
            .cart-item { flex-direction: column; align-items: flex-start; }
            .cart-item-quantity { width: 100%; justify-content: center; }
            .cart-item-total { width: 100%; text-align: center; margin: 10px 0; }
            .cart-item-remove { width: 100%; }
            .header { flex-direction: column; text-align: center; }
            .header-info { justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- الهيدر -->
        <header class="header">
            <div class="header-title">
                <i class="fas fa-shopping-cart"></i>
                <div>
                    <h1>سلتي</h1>
                    <p style="color: var(--text-secondary); font-size: 14px;">إدارة مشترياتك من مختلف المتاجر</p>
                </div>
            </div>
            <div class="header-info">
                <div class="info-item" onclick="window.location.href='index.html'">
                    <i class="fas fa-store"></i>
                    <span>المتجر</span>
                </div>
                <div class="info-item">
                    <i class="fas fa-box"></i>
                    <span id="headerCartCount">0 منتج</span>
                </div>
            </div>
        </header>

        <!-- محتوى السلة -->
        <div id="cartContainer">
            <!-- سيتم ملؤه بواسطة JavaScript -->
            <div style="text-align: center; padding: 50px;">
                <i class="fas fa-spinner fa-spin" style="font-size: 40px; color: var(--gold);"></i>
                <p style="margin-top: 15px;">جاري تحميل السلة...</p>
            </div>
        </div>

        <!-- أرشيف الطلبات -->
        <div class="orders-archive">
            <div class="archive-title">
                <i class="fas fa-history"></i>
                <h2>أرشيف الطلبات السابقة</h2>
            </div>
            <div id="ordersArchiveContainer">
                <!-- سيتم ملؤه بواسطة JavaScript -->
            </div>
        </div>
    </div>

    <!-- نافذة معلومات المشتري -->
    <div id="customerModal" class="modal">
        <div class="modal-content">
            <h2><i class="fas fa-user-edit"></i> معلومات التوصيل</h2>
            <div class="form-group">
                <label>الاسم الكامل</label>
                <input type="text" id="customerName" placeholder="أدخل اسمك الكامل">
            </div>
            <div class="form-group">
                <label>رقم الهاتف</label>
                <input type="tel" id="customerPhone" placeholder="05xx xxx xxx">
            </div>
            <div class="form-group">
                <label>عنوان التوصيل</label>
                <input type="text" id="customerAddress" placeholder="الولاية، البلدية، الحي...">
            </div>
            <div class="form-group">
                <label>ملاحظات إضافية (اختياري)</label>
                <textarea id="customerNotes" rows="3" placeholder="أي تعليمات خاصة للتوصيل..."></textarea>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn btn-gold" style="flex: 2;" onclick="submitOrder()">تأكيد وإرسال الطلب</button>
                <button class="btn btn-danger" style="flex: 1;" onclick="closeModal()">إلغاء</button>
            </div>
        </div>
    </div>

    <script>
        // الإعدادات
        const CART_STORAGE_KEY = 'nardo_cart';
        const ORDERS_STORAGE_KEY = 'nardo_orders';
        const TELEGRAM = {
            botToken: '7651614131:AAH8m676v7696m_p_v-v_v_v_v_v_v_v_v_v', // سيتم استبداله
            channelId: '-1002435345534', // سيتم استبداله
            apiUrl: 'https://api.telegram.org/bot'
        };

        let cart = [];
        let storesState = {}; // لحفظ حالة القوائم المنسدلة (مفتوحة/مغلقة)

        // تحميل السلة عند البدء
        function loadCart() {
            const savedCart = localStorage.getItem(CART_STORAGE_KEY);
            if (savedCart) {
                try {
                    cart = JSON.parse(savedCart);
                } catch (e) {
                    cart = [];
                }
            }
            updateCartDisplay();
            updateCartCounters();
        }

        function saveCart() {
            localStorage.setItem(CART_STORAGE_KEY, JSON.stringify(cart));
            updateCartCounters();
        }

        function updateCartCounters() {
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            const headerCount = document.getElementById('headerCartCount');
            if (headerCount) headerCount.textContent = `${count} منتج`;
        }

        function toggleStore(storeID) {
            storesState[storeID] = !storesState[storeID];
            updateCartDisplay();
        }

        function getStoreColor(storeID) {
            // توليد لون ثابت بناءً على معرف المتجر
            let hash = 0;
            for (let i = 0; i < storeID.length; i++) {
                hash = storeID.charCodeAt(i) + ((hash << 5) - hash);
            }
            const index = Math.abs(hash) % 10;
            return `merchant-color-${index}`;
        }

        function formatCurrency(amount) {
            return amount.toLocaleString('ar-EG') + ' دج';
        }

        function updateCartDisplay() {
            const container = document.getElementById('cartContainer');
            if (!container) return;
            
            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-shopping-basket"></i>
                        <h3>السلة فارغة</h3>
                        <p>لم تقم بإضافة أي منتجات بعد</p>
                        <button class="btn btn-gold" onclick="window.location.href='index.html'" style="margin-top: 20px;">
                            <i class="fas fa-store"></i> تصفح المنتجات
                        </button>
                    </div>
                `;
                return;
            }

            const groupedStores = groupByStore(cart);
            let grandTotal = 0;
            let grandCount = 0;
            let storesHtml = '';

            let storeIndex = 0;
            for (const [storeID, storeData] of Object.entries(groupedStores)) {
                grandTotal += storeData.total;
                grandCount += storeData.count;
                
                const isCollapsed = storesState[storeID] === true;
                const colorClass = getStoreColor(storeID);
                
                let itemsHtml = '';
                for (const item of storeData.items) {
                    const itemTotal = item.price * item.quantity;
                    
                    const thumbnailHtml = item.image ? 
                        `<img src="${item.image}" alt="${item.name}" onerror="this.parentElement.innerHTML='<i class=\\'fas fa-box\\'></i>'">` :
                        '<i class="fas fa-box"></i>';
                    
                    itemsHtml += `
                        <div class="cart-item">
                            <div class="product-thumbnail">
                                ${thumbnailHtml}
                            </div>
                            <div class="product-details">
                                <div class="product-name">${item.name}</div>
                                <div class="product-price">${item.price.toLocaleString()} دج / قطعة</div>
                            </div>
                            <div class="cart-item-quantity">
                                <button onclick="updateCartQuantity(${item.id}, -1)">−</button>
                                <span>${item.quantity}</span>
                                <button onclick="updateCartQuantity(${item.id}, 1)">+</button>
                            </div>
                            <div class="cart-item-total">
                                ${itemTotal.toLocaleString()} دج
                            </div>
                            <button class="cart-item-remove" onclick="removeFromCart(${item.id})">
                                <i class="fas fa-trash-alt"></i> حذف
                            </button>
                        </div>
                    `;
                }
                
                storesHtml += `
                    <div class="merchant-section ${colorClass}" style="border-right-width: 5px; border-right-style: solid;">
                        <div class="merchant-header" onclick="toggleStore('${storeID.replace(/'/g, "\\'")}')">
                            <div class="merchant-info">
                                <div class="merchant-avatar">
                                    <i class="fas fa-store"></i>
                                </div>
                                <div>
                                    <div class="merchant-name">${storeData.storeName}</div>
                                    <div class="merchant-id">معرف المتجر: ${storeID}</div>
                                    <div class="merchant-stats">
                                        <span>📦 ${storeData.count} منتج</span>
                                        <span>💰 ${storeData.total.toLocaleString()} دج</span>
                                    </div>
                                </div>
                            </div>
                            <div class="merchant-toggle ${isCollapsed ? 'collapsed' : ''}">
                                <i class="fas fa-chevron-down"></i>
                            </div>
                        </div>
                        <div class="merchant-products ${isCollapsed ? 'collapsed' : ''}">
                            ${itemsHtml}
                        </div>
                    </div>
                `;
                storeIndex++;
            }

            const summaryHtml = `
                <div class="cart-summary">
                    <div class="summary-row">
                        <span class="summary-label">عدد العناصر:</span>
                        <span class="summary-value">${grandCount} قطعة</span>
                    </div>
                    <div class="summary-row">
                        <span class="summary-label">عدد المتاجر:</span>
                        <span class="summary-value">${Object.keys(groupedStores).length} متجر</span>
                    </div>
                    <div class="summary-row">
                        <span class="summary-label">الإجمالي النهائي:</span>
                        <span class="summary-value summary-total">${grandTotal.toLocaleString()} دج</span>
                    </div>
                    <div class="cart-actions">
                        <button class="btn btn-success" onclick="openCustomerModal()">
                            <i class="fas fa-check-circle"></i> إتمام الطلب
                        </button>
                        <button class="btn btn-outline" onclick="clearCart()">
                            <i class="fas fa-trash-alt"></i> إفراغ السلة
                        </button>
                    </div>
                </div>
            `;

            container.innerHTML = storesHtml + summaryHtml;
        }

        function showNotification(message, type = 'success') {
            const existing = document.querySelector('.notification');
            if (existing) existing.remove();
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i> ${message}`;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 3000);
        }

        function updateCartQuantity(productId, change) {
            const itemIndex = cart.findIndex(item => item.id === productId);
            if (itemIndex === -1) return;
            
            const item = cart[itemIndex];
            const newQuantity = item.quantity + change;
            
            if (newQuantity <= 0) {
                removeFromCart(productId);
            } else {
                item.quantity = newQuantity;
                saveCart();
                updateCartDisplay();
                showNotification(`✓ تم تحديث كمية ${item.name}`, 'success');
            }
        }

        function removeFromCart(productId) {
            const item = cart.find(i => i.id === productId);
            if (item) {
                cart = cart.filter(item => item.id !== productId);
                saveCart();
                updateCartDisplay();
                showNotification(`✓ تم إزالة ${item.name}`, 'success');
            }
        }

        function clearCart() {
            if (cart.length === 0) {
                showNotification('السلة فارغة', 'warning');
                return;
            }
            if (confirm('هل تريد مسح السلة؟')) {
                cart = [];
                saveCart();
                updateCartDisplay();
                showNotification('✓ تم مسح السلة', 'success');
            }
        }

        // ========== تجميع المنتجات حسب معرف المتجر (storeID) ==========
        function groupByStore(items) {
            const grouped = {};
            items.forEach(item => {
                const storeID = item.storeID || 'unknown-store';
                const storeName = item.storeName || 'ناردو برو';
                
                if (!grouped[storeID]) {
                    grouped[storeID] = {
                        storeID: storeID,
                        storeName: storeName,
                        items: [],
                        total: 0,
                        count: 0
                    };
                }
                grouped[storeID].items.push(item);
                grouped[storeID].total += item.price * item.quantity;
                grouped[storeID].count += item.quantity;
            });
            return grouped;
        }

        // ================================================================
        // إرسال الطلب إلى تلغرام مع معرف المتجر واسم المشتري
        // ================================================================
        async function sendOrderToTelegram(customerData, groupedStores, grandTotal) {
            const timestamp = new Date().toLocaleString('ar-EG');
            const orderId = Math.floor(Math.random() * 1000000);
            
            try {
                // رسالة إجمالية للقناة تتضمن معرفات المتاجر واسم المشتري
                let channelMessage = `🟢 *طلب جديد في النظام* 🟢\n`;
                channelMessage += `━━━━━━━━━━━━━━━━━━━━━━\n`;
                channelMessage += `👤 *المشتري:* ${customerData.name}\n`;
                channelMessage += `📞 *الهاتف:* ${customerData.phone}\n`;
                channelMessage += `📍 *العنوان:* ${customerData.address}\n`;
                channelMessage += `━━━━━━━━━━━━━━━━━━━━━━\n`;
                channelMessage += `📊 *تفاصيل الطلب:*\n`;
                
                for (const [storeID, storeData] of Object.entries(groupedStores)) {
                    channelMessage += `\n🏪 ${storeData.storeName}\n`;
                    channelMessage += `🆔 معرف المتجر: \`${storeID}\`\n`;
                    storeData.items.forEach(item => {
                        channelMessage += `   • ${item.name} × ${item.quantity} = ${(item.price * item.quantity).toLocaleString()} دج\n`;
                    });
                    channelMessage += `   💰 إجمالي: ${storeData.total.toLocaleString()} دج\n`;
                }
                
                channelMessage += `━━━━━━━━━━━━━━━━━━━━━━\n`;
                channelMessage += `💰 *الإجمالي الكلي:* ${grandTotal.toLocaleString()} دج\n`;
                channelMessage += `🆔 *رقم الطلب:* ${orderId}\n`;
                channelMessage += `📅 *التاريخ:* ${timestamp}\n`;
                channelMessage += `━━━━━━━━━━━━━━━━━━━━━━\n`;
                channelMessage += `✅ تم استلام الطلب بنجاح، سيتم التواصل معك قريباً`;

                // إرسال رسالة إجمالية للقناة
                await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: TELEGRAM.channelId,
                        text: channelMessage,
                        parse_mode: 'Markdown'
                    })
                });

                // إرسال رسالة لكل متجر على حدة وحفظ الطلب
                for (const [storeID, storeData] of Object.entries(groupedStores)) {
                    let message = `🛍️ *فاتورة طلب جديد* 🛍️\n`;
                    message += `━━━━━━━━━━━━━━━━━━━━━━\n`;
                    message += `🏪 *المتجر:* ${storeData.storeName}\n`;
                    message += `🆔 *معرف المتجر:* \`${storeID}\`\n`;
                    message += `👤 *المشتري:* ${customerData.name}\n`;
                    message += `📞 *الهاتف:* ${customerData.phone}\n`;
                    message += `📍 *العنوان:* ${customerData.address}\n`;
                    message += `━━━━━━━━━━━━━━━━━━━━━━\n`;
                    message += `📦 *المنتجات المشتراة:*\n`;
                    
                    storeData.items.forEach((item, idx) => {
                        const itemTotal = item.price * item.quantity;
                        message += `${idx + 1} • ${item.name}\n`;
                        message += `   الكمية: ${item.quantity} × ${item.price.toLocaleString()} دج = ${itemTotal.toLocaleString()} دج\n`;
                    });
                    
                    message += `━━━━━━━━━━━━━━━━━━━━━━\n`;
                    message += `💰 *إجمالي المتجر:* ${storeData.total.toLocaleString()} دج\n`;
                    message += `━━━━━━━━━━━━━━━━━━━━━━\n`;
                    
                    if (customerData.notes) {
                        message += `📝 *ملاحظات:* ${customerData.notes}\n`;
                        message += `━━━━━━━━━━━━━━━━━━━━━━\n`;
                    }
                    
                    message += `🆔 *رقم الطلب:* ${orderId}\n`;
                    message += `📅 *التاريخ:* ${timestamp}\n`;
                    message += `━━━━━━━━━━━━━━━━━━━━━━\n`;
                    message += `✅ *حالة الطلب:* قيد المعالجة\n`;
                    message += `🔗 *ناردو برو - نظام التسوق الذكي*`;

                    await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: TELEGRAM.channelId,
                            text: message,
                            parse_mode: 'Markdown'
                        })
                    });
                }
                
                // حفظ الطلب محلياً ليتمكن نظام إدارة المخزون من قراءته
                saveOrderLocally(customerData, groupedStores, orderId, timestamp);
                
                return true;
            } catch (error) {
                console.error('❌ خطأ في الإرسال:', error);
                return false;
            }
        }

        // ========== حفظ الطلب محلياً وتحديث الأرشيف ==========
        function saveOrderLocally(customerData, groupedStores, orderId, timestamp) {
            let allOrders = JSON.parse(localStorage.getItem(ORDERS_STORAGE_KEY) || '[]');
            
            // تحويل الطلب المجمع إلى طلبات فردية لكل متجر لسهولة الفلترة في نظام المخزون
            for (const [storeID, storeData] of Object.entries(groupedStores)) {
                const newOrder = {
                    id: orderId + '-' + storeID, // معرف فريد لكل بطاقة تاجر
                    originalOrderId: orderId,
                    date: timestamp,
                    customerName: customerData.name,
                    customerPhone: customerData.phone,
                    customerAddress: customerData.address,
                    customerNotes: customerData.notes,
                    storeID: storeID,
                    storeName: storeData.storeName,
                    items: storeData.items,
                    total: storeData.total,
                    status: 'pending' // pending, received, approved
                };
                allOrders.unshift(newOrder);
            }
            
            localStorage.setItem(ORDERS_STORAGE_KEY, JSON.stringify(allOrders));
            renderOrdersArchive();
        }

        // ================================================================
        // دالة تتبع الطلب - تنقل الزبون إلى صفحة التوصيل مع بيانات الطلب
        // ================================================================
        function trackMyOrder(orderId) {
            // البحث عن الطلب في الأرشيف
            const allOrders = JSON.parse(localStorage.getItem(ORDERS_STORAGE_KEY) || '[]');
            const order = allOrders.find(o => o.originalOrderId == orderId || o.id === orderId);
            
            if (!order) {
                showNotification('❌ الطلب غير موجود', 'error');
                return;
            }
            
            // تجهيز بيانات الطلب للتتبع
            const trackingData = {
                orderId: order.originalOrderId || order.id,
                customer: order.customerName,
                phone: order.customerPhone,
                address: order.customerAddress,
                amount: order.total,
                items: order.items.map(it => `${it.name} (${it.quantity})`).join('، '),
                storeID: order.storeID,
                storeName: order.storeName,
                status: order.status,
                date: order.date,
                source: 'cart_tracking' // لتمييز مصدر التتبع
            };
            
            // تخزين بيانات التتبع مؤقتاً
            localStorage.setItem('nardo_tracking_order', JSON.stringify(trackingData));
            
            // فتح صفحة التوصيل في نافذة جديدة
            window.open('delivery-full.html?source=tracking', '_blank');
            
            showNotification('🔍 جاري فتح صفحة تتبع الطلب...', 'info');
        }

        // ================================================================
        // دالة تحديث أرشيف الطلبات - إضافة زر "تتبع طلبي"
        // ================================================================
        function renderOrdersArchive() {
            const container = document.getElementById('ordersArchiveContainer');
            if (!container) return;
            
            const allOrders = JSON.parse(localStorage.getItem(ORDERS_STORAGE_KEY) || '[]');
            
            if (allOrders.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:var(--text-secondary);">لا توجد طلبات سابقة</p>';
                return;
            }
            
            container.innerHTML = allOrders.map(order => {
                let statusClass = 'status-pending';
                let statusText = '⏳ قيد المعالجة';
                
                if (order.status === 'received') {
                    statusClass = 'status-received';
                    statusText = '📦 وصل للتاجر';
                } else if (order.status === 'approved') {
                    statusClass = 'status-approved';
                    statusText = '✅ تم تعيين الموزع';
                } else if (order.status === 'in_transit') {
                    statusClass = 'status-received';
                    statusText = '🚚 قيد التوصيل';
                } else if (order.status === 'delivered') {
                    statusClass = 'status-approved';
                    statusText = '✅ تم التسليم';
                }
                
                return `
                    <div class="order-card">
                        <div class="order-card-header">
                            <span class="order-id">#${order.originalOrderId || order.id}</span>
                            <span class="order-status ${statusClass}">${statusText}</span>
                        </div>
                        <div class="order-details">
                            <div class="order-merchant"><i class="fas fa-store"></i> المتجر: ${order.storeName}</div>
                            <div style="font-size:12px; color:var(--text-secondary);">${order.date}</div>
                            <div class="order-items-list">
                                ${order.items.map(it => `• ${it.name} (${it.quantity})`).join('<br>')}
                            </div>
                            <div style="font-weight:bold; color:var(--success);">الإجمالي: ${order.total.toLocaleString()} دج</div>
                        </div>
                        <div class="order-actions">
                            ${order.status === 'pending' ? `<button class="btn btn-info" onclick="updateOrderStatus('${order.id}', 'received')">تأكيد الوصول للتاجر</button>` : ''}
                            ${order.status === 'received' ? `<button class="btn btn-success" onclick="updateOrderStatus('${order.id}', 'approved')">الموافقة على الموزع</button>` : ''}
                            
                            <!-- 🆕 زر تتبع الطلب -->
                            <button class="btn btn-gold" onclick="trackMyOrder('${order.originalOrderId || order.id}')" style="background: var(--gold); color: #000;">
                                <i class="fas fa-map-location-dot"></i> تتبع طلبي
                            </button>
                            
                            <button class="btn btn-danger" onclick="deleteOrderArchive('${order.id}')"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function updateOrderStatus(orderId, newStatus) {
            let allOrders = JSON.parse(localStorage.getItem(ORDERS_STORAGE_KEY) || '[]');
            const orderIndex = allOrders.findIndex(o => o.id === orderId);
            
            if (orderIndex !== -1) {
                allOrders[orderIndex].status = newStatus;
                localStorage.setItem(ORDERS_STORAGE_KEY, JSON.stringify(allOrders));
                
                // إرسال إشعار للتلغرام عن تحديث الحالة
                const order = allOrders[orderIndex];
                let statusMsg = newStatus === 'received' ? '📦 وصل للتاجر' : '✅ تم تعيين الموزع';
                
                let message = `🔄 *تحديث حالة الطلب* 🔄\n`;
                message += `━━━━━━━━━━━━━━━━━━━━━━\n`;
                message += `🆔 *رقم الطلب:* #${order.originalOrderId || order.id}\n`;
                message += `🏪 *المتجر:* ${order.storeName}\n`;
                message += `👤 *المشتري:* ${order.customerName}\n`;
                message += `📍 *الحالة الجديدة:* ${statusMsg}\n`;
                message += `📅 *التاريخ:* ${new Date().toLocaleString('ar-EG')}\n`;
                message += `━━━━━━━━━━━━━━━━━━━━━━\n`;
                
                await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: TELEGRAM.channelId,
                        text: message,
                        parse_mode: 'Markdown'
                    })
                });
                
                renderOrdersArchive();
                showNotification('✓ تم تحديث حالة الطلب وإرسال إشعار', 'success');
            }
        }

        function deleteOrderArchive(orderId) {
            if (confirm('هل تريد حذف هذا الطلب من الأرشيف؟')) {
                let allOrders = JSON.parse(localStorage.getItem(ORDERS_STORAGE_KEY) || '[]');
                allOrders = allOrders.filter(o => o.id !== orderId);
                localStorage.setItem(ORDERS_STORAGE_KEY, JSON.stringify(allOrders));
                renderOrdersArchive();
                showNotification('✓ تم حذف الطلب من الأرشيف', 'success');
            }
        }

        // فتح نافذة معلومات المشتري
        let pendingGroupedStores = null;
        let pendingGrandTotal = null;
        
        function openCustomerModal() {
            if (cart.length === 0) {
                showNotification('السلة فارغة، أضف منتجات أولاً', 'warning');
                return;
            }
            
            const grouped = groupByStore(cart);
            const grandTotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            
            pendingGroupedStores = grouped;
            pendingGrandTotal = grandTotal;
            
            const modal = document.getElementById('customerModal');
            if (modal) {
                // تنظيف الحقول
                document.getElementById('customerName').value = '';
                document.getElementById('customerPhone').value = '';
                document.getElementById('customerAddress').value = '';
                document.getElementById('customerNotes').value = '';
                modal.style.display = 'flex';
            }
        }
        
        function closeModal() {
            const modal = document.getElementById('customerModal');
            if (modal) modal.style.display = 'none';
            pendingGroupedStores = null;
            pendingGrandTotal = null;
        }
        
        async function submitOrder() {
            const name = document.getElementById('customerName').value.trim();
            const phone = document.getElementById('customerPhone').value.trim();
            const address = document.getElementById('customerAddress').value.trim();
            const notes = document.getElementById('customerNotes').value.trim();
            
            if (!name) {
                showNotification('الرجاء إدخال الاسم', 'error');
                return;
            }
            if (!phone) {
                showNotification('الرجاء إدخال رقم الهاتف', 'error');
                return;
            }
            if (!address) {
                showNotification('الرجاء إدخال عنوان التوصيل', 'error');
                return;
            }
            
            showNotification('جاري إرسال الطلب...', 'info');
            
            const customerData = {
                name: name,
                phone: phone,
                address: address,
                notes: notes
            };
            
            const success = await sendOrderToTelegram(customerData, pendingGroupedStores, pendingGrandTotal);
            
            if (success) {
                // تفريغ السلة بعد إرسال الطلب بنجاح
                cart = [];
                saveCart();
                updateCartDisplay();
                closeModal();
                showNotification('✓ تم إرسال الطلب بنجاح! سيتم التواصل معك قريباً', 'success');
            } else {
                showNotification('❌ فشل إرسال الطلب، حاول مرة أخرى', 'error');
            }
        }

        // الاستماع للتغييرات من الصفحات الأخرى
        window.addEventListener('storage', function(e) {
            if (e.key === CART_STORAGE_KEY) {
                console.log('🔄 تحديث السلة من صفحة أخرى');
                cart = e.newValue ? JSON.parse(e.newValue) : [];
                updateCartDisplay();
                updateCartCounters();
            }
        });

        // تحميل البيانات
        loadCart();
        renderOrdersArchive();
        
        // تصدير الدوال
        window.updateCartQuantity = updateCartQuantity;
        window.removeFromCart = removeFromCart;
        window.clearCart = clearCart;
        window.toggleStore = toggleStore;
        window.openCustomerModal = openCustomerModal;
        window.closeModal = closeModal;
        window.submitOrder = submitOrder;
        window.trackMyOrder = trackMyOrder;
    </script>
</body>
</html>
