head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ناردو برو - سلتي | نظام طلبات متكامل</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --gold: #ffd700;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --glass: rgba(255, 255, 255, 0.05);
            --success: #4ade80;
            --error: #f87171;
            --warning: #fbbf24;
            --info: #60a5fa;
        }
        
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0f3460, #16213e);
            color: var(--text-primary);
            direction: rtl;
        }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        
        .header {
            background: var(--glass);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }
        .header-title { display: flex; align-items: center; gap: 15px; }
        .header-title i { font-size: 40px; color: var(--gold); }
        .header-title h1 { font-size: 32px; color: var(--gold); margin: 0; }
        .header-info { display: flex; gap: 20px; flex-wrap: wrap; }
        .info-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 215, 0, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .info-item:hover { background: rgba(255, 215, 0, 0.2); }
        
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s;
        }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-gold:hover { background: #ffed4e; transform: translateY(-2px); }
        .btn-outline { background: transparent; border: 2px solid var(--gold); color: var(--gold); }
        .btn-outline:hover { background: rgba(255, 215, 0, 0.1); }
        .btn-danger { background: rgba(248, 113, 113, 0.2); border: 1px solid var(--error); color: var(--error); }
        .btn-danger:hover { background: var(--error); color: white; }
        .btn-refresh { background: rgba(96, 165, 250, 0.2); border: 1px solid var(--info); color: var(--info); }
        .btn-refresh:hover { background: var(--info); color: white; }
        
        .merchant-section {
            background: var(--glass);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 20px;
            margin-bottom: 25px;
            overflow: hidden;
        }
        .merchant-header {
            background: rgba(255, 215, 0, 0.1);
            padding: 20px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            cursor: pointer;
        }
        .merchant-header:hover { background: rgba(255, 215, 0, 0.15); }
        .merchant-info { display: flex; align-items: center; gap: 15px; }
        .merchant-avatar {
            width: 50px;
            height: 50px;
            background: rgba(255, 215, 0, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .merchant-name { font-size: 20px; font-weight: bold; color: var(--gold); }
        .merchant-stats { display: flex; gap: 20px; font-size: 14px; color: var(--text-secondary); }
        .merchant-stats span { color: var(--gold); font-weight: bold; }
        .merchant-toggle { font-size: 20px; transition: transform 0.3s; }
        .merchant-toggle.collapsed { transform: rotate(-90deg); }
        .merchant-products { padding: 20px; }
        .merchant-products.collapsed { display: none; }
        
        .cart-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 215, 0, 0.15);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .product-thumbnail {
            width: 70px;
            height: 70px;
            border-radius: 12px;
            background: rgba(255, 215, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .product-thumbnail i { font-size: 30px; color: var(--gold); }
        .product-details { flex: 2; min-width: 150px; }
        .product-name { font-size: 16px; font-weight: bold; color: var(--gold); }
        .product-price { font-size: 13px; color: var(--success); }
        .cart-item-quantity {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 215, 0, 0.1);
            padding: 8px 15px;
            border-radius: 10px;
        }
        .cart-item-quantity button {
            background: none;
            border: none;
            color: var(--gold);
            cursor: pointer;
            font-size: 18px;
            width: 30px;
            height: 30px;
            border-radius: 8px;
        }
        .cart-item-quantity button:hover { background: rgba(255, 215, 0, 0.2); }
        .cart-item-quantity span { font-size: 16px; font-weight: bold; min-width: 30px; text-align: center; }
        .cart-item-total { font-size: 16px; font-weight: bold; color: var(--gold); min-width: 100px; text-align: center; }
        .cart-item-remove { background: rgba(248, 113, 113, 0.2); color: var(--error); border: 1px solid var(--error); padding: 8px 15px; border-radius: 10px; cursor: pointer; }
        
        .cart-summary {
            background: rgba(255, 215, 0, 0.05);
            border-radius: 15px;
            padding: 25px;
            margin-top: 20px;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.1);
        }
        .summary-label { color: var(--text-secondary); }
        .summary-value { color: var(--gold); font-weight: bold; font-size: 18px; }
        .summary-total { font-size: 24px; color: var(--success); }
        .cart-actions { display: flex; gap: 15px; margin-top: 25px; flex-wrap: wrap; }
        .cart-actions .btn { flex: 1; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 3000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: var(--secondary);
            border-radius: 20px;
            padding: 30px;
            max-width: 550px;
            width: 90%;
            border: 2px solid var(--gold);
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-content h2 { color: var(--gold); margin-bottom: 20px; text-align: center; }
        .modal-content input, .modal-content select, .modal-content textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: 1px solid rgba(255,215,0,0.3);
            background: rgba(255,255,255,0.1);
            color: white;
            font-family: 'Cairo', sans-serif;
        }
        .modal-content input:focus, .modal-content select:focus {
            outline: none;
            border-color: var(--gold);
        }
        .modal-buttons { display: flex; gap: 15px; margin-top: 20px; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--gold);
            font-size: 13px;
        }
        
        .distributors-section {
            background: rgba(255, 215, 0, 0.05);
            border: 2px solid rgba(255, 215, 0, 0.2);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .distributors-section h3 {
            color: var(--gold);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .distributor-item {
            background: rgba(0, 0, 0, 0.3);
            border-right: 4px solid var(--gold);
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 10px;
            transition: all 0.3s;
            cursor: pointer;
        }
        .distributor-item:hover {
            background: rgba(255, 215, 0, 0.15);
            transform: translateX(-5px);
        }
        .distributor-item.selected {
            background: rgba(255, 215, 0, 0.25);
            border-right: 4px solid var(--success);
        }
        .distributor-name {
            font-weight: bold;
            color: var(--gold);
            font-size: 16px;
            margin-bottom: 5px;
        }
        .distributor-type {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 12px;
            margin-bottom: 8px;
            font-weight: bold;
        }
        .type-delivery { background: rgba(96, 165, 250, 0.2); color: var(--info); }
        .type-distributor { background: rgba(74, 222, 128, 0.2); color: var(--success); }
        
        .distributor-details {
            display: flex;
            gap: 15px;
            font-size: 13px;
            color: var(--text-secondary);
        }
        .distributor-details span { display: flex; align-items: center; gap: 5px; }
        .distributor-details i { color: var(--gold); }
        
        .no-distributors {
            text-align: center;
            padding: 30px;
            color: var(--text-secondary);
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
        }
        
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            z-index: 5000;
            font-weight: bold;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        .notification.success { background: var(--success); color: #000; }
        .notification.error { background: var(--error); color: #fff; }
        .notification.info { background: var(--info); color: #fff; }
        
        #distributorsLoading {
            text-align: center;
            padding: 20px;
            display: none;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 215, 0, 0.1);
            border-top: 4px solid var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .order-card {
            background: var(--glass);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .order-card-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.1);
            padding-bottom: 8px;
        }
        .order-id { color: var(--gold); font-weight: bold; }
        .order-status { font-size: 12px; padding: 4px 8px; border-radius: 10px; }
        .status-pending { background: rgba(251, 191, 36, 0.2); color: var(--warning); }
        .status-received { background: rgba(96, 165, 250, 0.2); color: var(--info); }
        .status-approved { background: rgba(74, 222, 128, 0.2); color: var(--success); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-title">
                <i class="fas fa-shopping-basket"></i>
                <h1>سلتي</h1>
            </div>
            <div class="header-info">
                <div class="info-item" onclick="location.reload()">
                    <i class="fas fa-sync-alt"></i>
                    <span>تحديث</span>
                </div>
            </div>
        </div>

        <div id="cartContainer">
            <!-- سيتم ملؤه بواسطة JavaScript -->
        </div>

        <div class="cart-summary">
            <div class="summary-row">
                <span class="summary-label">عدد المنتجات:</span>
                <span class="summary-value" id="totalItems">0</span>
            </div>
            <div class="summary-row">
                <span class="summary-label">المجموع الكلي:</span>
                <span class="summary-value summary-total" id="totalPrice">0.00 دج</span>
            </div>
            
            <div class="cart-actions">
                <button class="btn btn-danger" onclick="clearCart()">
                    <i class="fas fa-trash"></i> مسح السلة
                </button>
                <button class="btn btn-gold" onclick="openCustomerModal()">
                    <i class="fas fa-check-circle"></i> إتمام الطلب
                </button>
            </div>
        </div>

        <div style="margin-top: 40px;">
            <h2 style="color: var(--gold); margin-bottom: 20px;"><i class="fas fa-history"></i> أرشيف الطلبات</h2>
            <div id="ordersArchiveContainer"></div>
        </div>
    </div>

    <!-- نافذة إتمام الطلب -->
    <div id="customerModal" class="modal">
        <div class="modal-content">
            <h2><i class="fas fa-truck-loading"></i> تفاصيل التوصيل</h2>
            
            <div class="form-group">
                <label>الاسم الكامل:</label>
                <input type="text" id="customerName" placeholder="أدخل اسمك الكامل">
            </div>
            
            <div class="form-group">
                <label>رقم الهاتف:</label>
                <input type="tel" id="customerPhone" placeholder="05 / 06 / 07 ...">
            </div>
            
            <div class="form-group">
                <label>الولاية:</label>
                <select id="customerState" onchange="updateFullAddress(); loadDistributorsFromTelegram();">
                    <option value="">-- اختر الولاية --</option>
                    <option value="أدرار">01 - أدرار</option>
                    <option value="الشلف">02 - الشلف</option>
                    <option value="الأغواط">03 - الأغواط</option>
                    <option value="أم البواقي">04 - أم البواقي</option>
                    <option value="باتنة">05 - باتنة</option>
                    <option value="بجاية">06 - بجاية</option>
                    <option value="بسكرة">07 - بسكرة</option>
                    <option value="بشار">08 - بشار</option>
                    <option value="البليدة">09 - البليدة</option>
                    <option value="البويرة">10 - البويرة</option>
                    <option value="تمنراست">11 - تمنراست</option>
                    <option value="تبسة">12 - تبسة</option>
                    <option value="تلمسان">13 - تلمسان</option>
                    <option value="تيارت">14 - تيارت</option>
                    <option value="تيزي وزو">15 - تيزي وزو</option>
                    <option value="الجزائر">16 - الجزائر</option>
                    <option value="الجلفة">17 - الجلفة</option>
                    <option value="جيجل">18 - جيجل</option>
                    <option value="سطيف">19 - سطيف</option>
                    <option value="سعيدة">20 - سعيدة</option>
                    <option value="سكيكدة">21 - سكيكدة</option>
                    <option value="سيدي بلعباس">22 - سيدي بلعباس</option>
                    <option value="عنابة">23 - عنابة</option>
                    <option value="قالمة">24 - قالمة</option>
                    <option value="قسنطينة">25 - قسنطينة</option>
                    <option value="المدية">26 - المدية</option>
                    <option value="مستغانم">27 - مستغانم</option>
                    <option value="المسيلة">28 - المسيلة</option>
                    <option value="معسكر">29 - معسكر</option>
                    <option value="ورقلة">30 - ورقلة</option>
                    <option value="وهران">31 - وهران</option>
                    <option value="البيض">32 - البيض</option>
                    <option value="إليزي">33 - إليزي</option>
                    <option value="برج بوعريريج">34 - برج بوعريريج</option>
                    <option value="بومرداس">35 - بومرداس</option>
                    <option value="الطارف">36 - الطارف</option>
                    <option value="تندوف">37 - تندوف</option>
                    <option value="تيسمسيلت">38 - تيسمسيلت</option>
                    <option value="الوادي">39 - الوادي</option>
                    <option value="خنشلة">40 - خنشلة</option>
                    <option value="سوق أهراس">41 - سوق أهراس</option>
                    <option value="تيبازة">42 - تيبازة</option>
                    <option value="ميلة">43 - ميلة</option>
                    <option value="عين الدفلى">44 - عين الدفلى</option>
                    <option value="النعامة">45 - النعامة</option>
                    <option value="عين تموشنت">46 - عين تموشنت</option>
                    <option value="غرداية">47 - غرداية</option>
                    <option value="غليزان">48 - غليزان</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>العنوان التفصيلي:</label>
                <textarea id="customerAddress" rows="2" placeholder="البلدية، الحي، رقم الباب..." oninput="updateFullAddress()"></textarea>
                <input type="hidden" id="fullAddress">
                <button class="btn btn-refresh" style="width: 100%; margin-top: 5px; font-size: 12px;" onclick="openMapLocation()">

            <div id="distributorsLoading">
                <div class="spinner"></div>
                <p>جاري جلب الموزعين من التلغرام...</p>

            <div id="distributorsList">
                <!-- سيتم ملؤه عند اختيار ولاية -->
            </div>
            
            <div class="form-group">
                <label>ملاحظات إضافية:</label>
                <textarea id="customerNotes" rows="2" placeholder="أي تعليمات خاصة بالتوصيل..."></textarea>
            </div>
            
            <div class="modal-buttons">
                <button class="btn btn-outline" onclick="closeModal()">إلغاء</button>
                <button class="btn btn-gold" onclick="submitOrder()">تأكيد وإرسال الطلب</button>
            </div>
        </div>
    </div>

    <script>
        // الإعدادات
        const TELEGRAM = {
            botToken: '7542153545:AAH-u_p0-v_uW_6-v_uW_6-v_uW_6',
            channelId: '-1002435532556',
            apiUrl: 'https://api.telegram.org/bot'
        };
        const ORDERS_STORAGE_KEY = 'nardo_orders_archive';

        // الحالة العامة
        let cart = JSON.parse(localStorage.getItem('nardo_cart') || '[]');
        let distributorsData = {}; 
        let selectedDistributor = null;

        // ============================================
        // وظائف السلة
        // ============================================
        function saveCart() { localStorage.setItem('nardo_cart', JSON.stringify(cart)); }
        function loadCart() { cart = JSON.parse(localStorage.getItem('nardo_cart') || '[]'); updateCartDisplay(); }

        function updateCartDisplay() {
            const container = document.getElementById('cartContainer');
            const totalItemsEl = document.getElementById('totalItems');
            const totalPriceEl = document.getElementById('totalPrice');
            
            if (cart.length === 0) {
                container.innerHTML = '<div class="no-distributors"><i class="fas fa-shopping-cart" style="font-size: 40px; display: block; margin-bottom: 10px;"></i>السلة فارغة حالياً</div>';
                totalItemsEl.textContent = '0';
                totalPriceEl.textContent = '0.00 دج';
                return;
            }

            const grouped = groupByStore(cart);
            let html = '';
            let grandTotal = 0;
            let totalItems = 0;

            for (const storeName in grouped) {
                const items = grouped[storeName];
                const storeTotal = items.reduce((s, i) => s + (i.price * i.quantity), 0);
                grandTotal += storeTotal;
                totalItems += items.reduce((s, i) => s + i.quantity, 0);

                html += `
                    <div class="merchant-section">
                        <div class="merchant-header">
                            <div class="merchant-info">
                                <div class="merchant-avatar"><i class="fas fa-store"></i></div>
                                <div class="merchant-name">${storeName}</div>
                            </div>
                            <div class="merchant-stats">
                                <span>${items.length} منتجات</span> | <span>${storeTotal.toLocaleString()} دج</span>
                            </div>
                        </div>
                        <div class="merchant-products">
                            ${items.map(item => `
                                <div class="cart-item">
                                    <div class="product-thumbnail"><i class="fas fa-box"></i></div>
                                    <div class="product-details">
                                        <div class="product-name">${item.name}</div>
                                        <div class="product-price">${item.price.toLocaleString()} دج</div>
                                    </div>
                                    <div class="cart-item-quantity">
                                        <button onclick="updateQuantity('${item.id}', -1)">-</button>
                                        <span>${item.quantity}</span>
                                        <button onclick="updateQuantity('${item.id}', 1)">+</button>
                                    </div>
                                    <div class="cart-item-total">${(item.price * item.quantity).toLocaleString()} دج</div>
                                    <button class="cart-item-remove" onclick="removeFromCart('${item.id}')"><i class="fas fa-trash"></i></button>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }

            container.innerHTML = html;
            totalItemsEl.textContent = totalItems;
            totalPriceEl.textContent = grandTotal.toLocaleString() + ' دج';
        }

        function groupByStore(items) {
            return items.reduce((groups, item) => {
                const store = item.storeName || 'متجر عام';
                if (!groups[store]) groups[store] = [];
                groups[store].push(item);
                return groups;
            }, {});
        }

        function updateQuantity(id, delta) {
            const item = cart.find(i => i.id === id);
            if (item) {
                item.quantity += delta;
                if (item.quantity <= 0) removeFromCart(id);
                else { saveCart(); updateCartDisplay(); }
            }
        }

        function removeFromCart(id) {
            cart = cart.filter(i => i.id !== id);
            saveCart();
            updateCartDisplay();
            showNotification('تم حذف المنتج', 'info');
        }

        function clearCart() {
            if (confirm('هل أنت متأكد من مسح السلة؟')) {
                cart = [];
                saveCart();
                updateCartDisplay();
                showNotification('تم مسح السلة', 'info');
            }
        }

        // ============================================
        // نظام الموزعين (النسخة المصححة)
        // ============================================
        function getStateCode(stateName) {
            const stateCodes = {
                'أدرار': 'ADE', 'الشلف': 'ASH', 'الأغواط': 'LGH', 'أم البواقي': 'OEB',
                'باتنة': 'BAT', 'بجاية': 'BJA', 'بسكرة': 'BSK', 'بشار': 'BSH',
                'البليدة': 'BLA', 'البويرة': 'BUI', 'تمنراست': 'TAM', 'تبسة': 'TEB',
                'تلمسان': 'TLE', 'تيارت': 'TIA', 'تيزي وزو': 'TIZ', 'الجزائر': 'ALG',
                'الجلفة': 'DJF', 'جيجل': 'JIJ', 'سطيف': 'SET', 'سعيدة': 'SAI',
                'سكيكدة': 'SKI', 'سيدي بلعباس': 'SBI', 'عنابة': 'ANA', 'قالمة': 'GUE',
                'قسنطينة': 'CON', 'المدية': 'MED', 'مستغانم': 'MGH', 'المسيلة': 'MSC',
                'معسكر': 'MOS', 'ورقلة': 'WAR', 'وهران': 'ORA', 'البيض': 'BAY',
                'إليزي': 'ILL', 'برج بوعريريج': 'BBA', 'بومرداس': 'BMD', 'الطارف': 'TAR',
                'تندوف': 'TIN', 'تيسمسيلت': 'TSS', 'الوادي': 'OUA', 'خنشلة': 'KHE',
                'سوق أهراس': 'SOU', 'تيبازة': 'TIP', 'ميلة': 'MIL', 'عين الدفلى': 'AYD',
                'النعامة': 'NAA', 'عين تموشنت': 'AIN', 'غرداية': 'GHA', 'غليزان': 'REL'
            };
            return stateCodes[stateName] || stateName.substring(0, 3).toUpperCase();
        }

        async function fetchDistributorsFromTelegram() {
            try {
                const response = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getUpdates?offset=-100`);
                const data = await response.json();
                if (!data.ok || !data.result) return false;
                
                let distributorsMessage = null;
                const reversedUpdates = [...data.result].reverse();
                for (const update of reversedUpdates) {
                    const message = update.channel_post || update.message;
                    if (message && message.text && message.text.includes('قائمة الموزعين وشركات التوصيل حسب كل ولاية')) {
                        distributorsMessage = message.text;
                        break;
                    }
                }
                
                if (distributorsMessage) {
                    parseDistributorsMessage(distributorsMessage);
                    localStorage.setItem('nardo_distributors_data', JSON.stringify(distributorsData));
                    return true;
                }
                return false;
            } catch (e) { return false; }
        }

        function parseDistributorsMessage(text) {
            distributorsData = {};
            const sections = text.split('📍 ولاية ');
            sections.forEach((section, index) => {
                if (index === 0) return;
                const lines = section.split('\n');
                const stateMatch = lines[0].match(/(.+?)\s*\(([A-Z]{3})\)/);
                if (stateMatch) {
                    const stateCode = stateMatch[2];
                    distributorsData[stateCode] = [];
                    const distributorBlocks = section.split('\n• ');
                    distributorBlocks.forEach((block, bIndex) => {
                        if (bIndex === 0) return;
                        const blockLines = block.split('\n');
                        const nameMatch = blockLines[0].match(/\*\*(.+?)\*\*\s*\((.+?)\)/);
                        if (nameMatch) {
                            const d = {
                                name: nameMatch[1],
                                typeText: nameMatch[2],
                                type: nameMatch[2].includes('🚚') ? 'delivery' : 'distributor',
                                customId: null, manager: null, phone: null
                            };
                            blockLines.forEach(l => {
                                if (l.includes('🆔 المعرف:')) {
                                    const idMatch = l.match(/🆔 المعرف:\s*`(.+?)`/);
                                    if (idMatch) d.customId = idMatch[1];
                                }
                                if (l.includes('👤')) {
                                    const contactMatch = l.match(/👤\s*(.+?)\s*\|\s*📞\s*(.+)$/);
                                    if (contactMatch) {
                                        d.manager = contactMatch[1].trim();
                                        d.phone = contactMatch[2].trim();
                                    }
                                }
                            });
                            distributorsData[stateCode].push(d);
                        }
                    });
                }
            });
        }

        async function loadDistributorsFromTelegram() {
            const stateName = document.getElementById('customerState').value;
            const container = document.getElementById('distributorsList');
            const loading = document.getElementById('distributorsLoading');
            if (!stateName) { container.innerHTML = ''; return; }
            
            loading.style.display = 'block';
            container.innerHTML = '';
            
            if (Object.keys(distributorsData).length === 0) await fetchDistributorsFromTelegram();
            
            loading.style.display = 'none';
            const stateCode = getStateCode(stateName);
            const list = distributorsData[stateCode] || [];
            
            if (list.length === 0) {
                container.innerHTML = '<div class="no-distributors">لا يوجد موزعين متاحين حالياً في هذه الولاية</div>';
                return;
            }
            
            let html = `<h3><i class="fas fa-truck"></i> اختر الموزع في ${stateName}:</h3>`;
            list.forEach((d, index) => {
                html += `
                    <div class="distributor-item ${selectedDistributor?.customId === d.customId ? 'selected' : ''}" onclick="selectDistributor(${JSON.stringify(d).replace(/"/g, '&quot;')})">
                        <div class="distributor-name">${d.name}</div>
                        <div class="distributor-type ${d.type === 'delivery' ? 'type-delivery' : 'type-distributor'}">${d.typeText}</div>
                        <div class="distributor-details">
                            <span><i class="fas fa-user"></i> ${d.manager || '---'}</span>
                            <span><i class="fas fa-phone"></i> ${d.phone || '---'}</span>
                            <span><i class="fas fa-id-badge"></i> ${d.customId || '---'}</span>
                        </div>
                    </div>`;
            });
            container.innerHTML = html;
        }

        function selectDistributor(d) {
            selectedDistributor = d;
            loadDistributorsFromTelegram();
            showNotification(`تم اختيار: ${d.name}`, 'success');
        }

        // ============================================
        // إتمام الطلب
        // ============================================
        function openCustomerModal() {
            if (cart.length === 0) { showNotification('السلة فارغة', 'warning'); return; }
            document.getElementById('customerModal').style.display = 'flex';
            loadUserProfile();
        }

        function closeModal() { document.getElementById('customerModal').style.display = 'none'; }

        function loadUserProfile() {
            const savedName = localStorage.getItem('nardo_customer_name') || '';
            document.getElementById('customerName').value = savedName;
        }

        function updateFullAddress() {
            const state = document.getElementById('customerState').value;
            const detail = document.getElementById('customerAddress').value;
            document.getElementById('fullAddress').value = `${state} - ${detail}`;
        }

        function openMapLocation() {
            const state = document.getElementById('customerState').value;
            const detail = document.getElementById('customerAddress').value;
            window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(state + ' ' + detail)}`, '_blank');
        }

        async function submitOrder() {
            const name = document.getElementById('customerName').value.trim();
            const phone = document.getElementById('customerPhone').value.trim();
            const state = document.getElementById('customerState').value;
            const address = document.getElementById('customerAddress').value.trim();
            
            if (!name || !phone || !state || !address) { showNotification('يرجى ملء جميع الحقول', 'error'); return; }
            if (!selectedDistributor) { showNotification('يرجى اختيار موزع', 'error'); return; }

            showNotification('جاري إرسال الطلب...', 'info');
            
            const orderData = {
                id: Date.now(),
                customer: { name, phone, state, address },
                distributor: selectedDistributor,
                items: cart,
                total: cart.reduce((s, i) => s + (i.price * i.quantity), 0),
                date: new Date().toLocaleString('ar-EG')
            };

            const success = await sendToTelegram(orderData);
            if (success) {
                saveToArchive(orderData);
                cart = [];
                saveCart();
                updateCartDisplay();
                closeModal();
                showNotification('تم إرسال الطلب بنجاح!', 'success');
                renderOrdersArchive();
            } else {
                showNotification('فشل إرسال الطلب للتلغرام', 'error');
            }
        }

        async function sendToTelegram(order) {
            const itemsText = order.items.map(i => `• ${i.name} (${i.quantity} × ${i.price} دج)`).join('\n');
            const message = `
🆕 **طلب جديد من سلتي**
━━━━━━━━━━━━━━━━━━━━━━
👤 **الزبون:** ${order.customer.name}
📞 **الهاتف:** ${order.customer.phone}
📍 **العنوان:** ${order.customer.state} - ${order.customer.address}
━━━━━━━━━━━━━━━━━━━━━━
📦 **المنتجات:**
${itemsText}
━━━━━━━━━━━━━━━━━━━━━━
🚚 **الموزع المختار:** ${order.distributor.name}
🆔 **معرف الموزع:** \`${order.distributor.customId}\`
━━━━━━━━━━━━━━━━━━━━━━
💰 **المجموع الكلي:** ${order.total.toLocaleString()} دج
📅 **التاريخ:** ${order.date}
            `;

            try {
                const res = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: TELEGRAM.channelId, text: message, parse_mode: 'Markdown' })
                });
                return res.ok;
            } catch (e) { return false; }
        }

        function saveToArchive(order) {
            const archive = JSON.parse(localStorage.getItem(ORDERS_STORAGE_KEY) || '[]');
            archive.unshift(order);
            localStorage.setItem(ORDERS_STORAGE_KEY, JSON.stringify(archive.slice(0, 20)));
        }

        function renderOrdersArchive() {
            const container = document.getElementById('ordersArchiveContainer');
            const archive = JSON.parse(localStorage.getItem(ORDERS_STORAGE_KEY) || '[]');
            if (archive.length === 0) {
                container.innerHTML = '<p style="text-align:center; color: var(--text-secondary);">لا توجد طلبات سابقة</p>';
                return;
            }
            container.innerHTML = archive.map(o => `
                <div class="order-card">
                    <div class="order-card-header">
                        <span class="order-id">#${o.id}</span>
                        <span class="order-status status-approved">✅ تم الإرسال</span>
                    </div>
                    <div style="font-size: 13px; color: var(--text-secondary);">
                        <div>📅 ${o.date}</div>
                        <div>💰 المجموع: ${o.total.toLocaleString()} دج</div>
                        <div>🚚 الموزع: ${o.distributor.name}</div>
                    </div>
                </div>
            `).join('');
        }

        function showNotification(msg, type) {
            const div = document.createElement('div');
            div.className = `notification ${type}`;
            div.textContent = msg;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }

        window.onload = () => {
            loadCart();
            renderOrdersArchive();
            fetchDistributorsFromTelegram();
        };
    </script>
</body>
</html>
