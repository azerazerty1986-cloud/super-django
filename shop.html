head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ناردو برو - سلتي | نظام طلبات متكامل</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --gold: #ffd700;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --glass: rgba(255, 255, 255, 0.05);
            --success: #4ade80;
            --error: #f87171;
            --warning: #fbbf24;
            --info: #60a5fa;
        }
        
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0f3460, #16213e);
            color: var(--text-primary);
            direction: rtl;
        }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        
        .header {
            background: var(--glass);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }
        .header-title { display: flex; align-items: center; gap: 15px; }
        .header-title i { font-size: 40px; color: var(--gold); }
        .header-title h1 { font-size: 32px; color: var(--gold); margin: 0; }
        .header-info { display: flex; gap: 20px; flex-wrap: wrap; }
        .info-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 215, 0, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .info-item:hover { background: rgba(255, 215, 0, 0.2); }
        
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s;
        }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-gold:hover { background: #ffed4e; transform: translateY(-2px); }
        .btn-outline { background: transparent; border: 2px solid var(--gold); color: var(--gold); }
        .btn-outline:hover { background: rgba(255, 215, 0, 0.1); }
        
        .merchant-section {
            background: var(--glass);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 20px;
            margin-bottom: 25px;
            overflow: hidden;
        }
        .merchant-header {
            background: rgba(255, 215, 0, 0.1);
            padding: 20px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            cursor: pointer;
        }
        .merchant-header:hover { background: rgba(255, 215, 0, 0.15); }
        .merchant-info { display: flex; align-items: center; gap: 15px; }
        .merchant-avatar {
            width: 50px;
            height: 50px;
            background: rgba(255, 215, 0, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .merchant-name { font-size: 20px; font-weight: bold; color: var(--gold); }
        .merchant-stats { display: flex; gap: 20px; font-size: 14px; color: var(--text-secondary); }
        .merchant-stats span { color: var(--gold); font-weight: bold; }
        .merchant-products { padding: 20px; }
        .merchant-products.collapsed { display: none; }
        
        .cart-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 215, 0, 0.15);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .product-thumbnail {
            width: 70px;
            height: 70px;
            border-radius: 12px;
            background: rgba(255, 215, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .product-thumbnail i { font-size: 30px; color: var(--gold); }
        .product-details { flex: 2; min-width: 150px; }
        .product-name { font-size: 16px; font-weight: bold; color: var(--gold); }
        .product-price { font-size: 13px; color: var(--success); }
        .cart-item-quantity {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 215, 0, 0.1);
            padding: 8px 15px;
            border-radius: 10px;
        }
        .cart-item-quantity button {
            background: none;
            border: none;
            color: var(--gold);
            cursor: pointer;
            font-size: 18px;
            width: 30px;
            height: 30px;
            border-radius: 8px;
        }
        .cart-item-quantity button:hover { background: rgba(255, 215, 0, 0.2); }
        .cart-item-quantity span { font-size: 16px; font-weight: bold; min-width: 30px; text-align: center; }
        .cart-item-total { font-size: 16px; font-weight: bold; color: var(--gold); min-width: 100px; text-align: center; }
        .cart-item-remove { background: rgba(248, 113, 113, 0.2); color: var(--error); border: 1px solid var(--error); padding: 8px 15px; border-radius: 10px; cursor: pointer; }
        
        .cart-summary {
            background: rgba(255, 215, 0, 0.05);
            border-radius: 15px;
            padding: 25px;
            margin-top: 20px;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.1);
        }
        .summary-label { color: var(--text-secondary); }
        .summary-total { font-size: 24px; color: var(--success); font-weight: bold; }
        .cart-actions { display: flex; gap: 15px; margin-top: 25px; flex-wrap: wrap; }
        .cart-actions .btn { flex: 1; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 3000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: var(--secondary);
            border-radius: 20px;
            padding: 30px;
            max-width: 550px;
            width: 90%;
            border: 2px solid var(--gold);
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-content h2 { color: var(--gold); margin-bottom: 20px; text-align: center; }
        .modal-content input, .modal-content select, .modal-content textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: 1px solid rgba(255,215,0,0.3);
            background: rgba(255,255,255,0.1);
            color: white;
            font-family: 'Cairo', sans-serif;
        }
        .modal-content input:focus, .modal-content select:focus {
            outline: none;
            border-color: var(--gold);
        }
        .modal-buttons { display: flex; gap: 15px; margin-top: 20px; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--gold);
            font-size: 13px;
        }
        
        .distributors-section {
            background: rgba(255, 215, 0, 0.05);
            border: 2px solid rgba(255, 215, 0, 0.2);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .distributors-section h3 {
            color: var(--gold);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .distributor-item {
            background: rgba(0, 0, 0, 0.3);
            border-right: 4px solid var(--gold);
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 10px;
            transition: all 0.3s;
            cursor: pointer;
        }
        .distributor-item:hover {
            background: rgba(255, 215, 0, 0.15);
            transform: translateX(-5px);
        }
        .distributor-item.selected {
            background: rgba(255, 215, 0, 0.25);
            border-right: 4px solid var(--success);
        }
        .distributor-name {
            font-weight: bold;
            color: var(--gold);
            font-size: 16px;
            margin-bottom: 5px;
        }
        .distributor-type {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 12px;
            margin-bottom: 8px;
            font-weight: bold;
        }
        .type-delivery { background: rgba(96, 165, 250, 0.2); color: var(--info); }
        .type-distributor { background: rgba(74, 222, 128, 0.2); color: var(--success); }
        .distributor-info { font-size: 13px; color: var(--text-secondary); margin-top: 5px; }
        .distributor-id { font-family: monospace; color: var(--gold); }
        
        .notification {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            max-width: 400px;
            margin: 0 auto;
            padding: 15px 20px;
            border-radius: 10px;
            background: rgba(0,0,0,0.9);
            border: 2px solid var(--gold);
            color: white;
            z-index: 4000;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { transform: translateY(-100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .notification.success { border-color: var(--success); }
        .notification.error { border-color: var(--error); }
        .notification.warning { border-color: var(--warning); }
        .notification.info { border-color: var(--info); }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }
        .empty-state i { font-size: 60px; margin-bottom: 20px; color: var(--gold); }
        
        .order-card {
            background: var(--glass);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
        }
        .order-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.1);
        }
        .order-id { color: var(--gold); font-weight: bold; font-size: 16px; }
        .order-status { padding: 5px 12px; border-radius: 8px; font-size: 12px; font-weight: bold; }
        .status-pending { background: rgba(251, 191, 36, 0.2); color: var(--warning); }
        .order-details { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 15px; font-size: 14px; }
        .order-details div { color: var(--text-secondary); }
        .order-items-list { margin-bottom: 15px; }
        .order-item-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 215, 0, 0.05);
            font-size: 13px;
        }
        .order-card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 215, 0, 0.1);
        }
        .btn-delete-order {
            background: rgba(248, 113, 113, 0.2);
            color: var(--error);
            border: 1px solid var(--error);
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid rgba(255, 215, 0, 0.1);
        }
        .tab-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            padding: 12px 20px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-size: 16px;
            font-weight: 600;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }
        .tab-btn:hover { color: var(--gold); }
        .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-title">
                <i class="fas fa-store"></i>
                <h1>ناردو برو</h1>
            </div>
            <div class="header-info">
                <div class="info-item">
                    <i class="fas fa-shopping-cart"></i>
                    <span>سلتي: <strong id="cartCount">0</strong></span>
                </div>
                <div class="info-item">
                    <i class="fas fa-money-bill"></i>
                    <span>الإجمالي: <strong id="cartTotal">0</strong> دج</span>
                </div>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('cart')">🛒 السلة</button>
            <button class="tab-btn" onclick="switchTab('archive')">📋 الطلبات السابقة</button>
        </div>

        <div id="cartTab" class="tab-content active">
            <div id="cartContainer"></div>
        </div>

        <div id="archiveTab" class="tab-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="color: var(--gold);">📋 الطلبات السابقة</h2>
                <button class="btn btn-outline" onclick="clearOrdersArchive()"><i class="fas fa-trash"></i> مسح الأرشيف</button>
            </div>
            <div id="ordersArchiveContainer"></div>
        </div>
    </div>

    <!-- Customer Modal -->
    <div id="customerModal" class="modal">
        <div class="modal-content">
            <h2>📝 بيانات الطلب</h2>
            
            <div class="form-group">
                <label>👤 اسم المشتري</label>
                <input type="text" id="customerName" placeholder="أدخل اسمك">
            </div>
            
            <div class="form-group">
                <label>📞 رقم الهاتف</label>
                <input type="tel" id="customerPhone" placeholder="0555123456">
            </div>
            
            <div class="form-group">
                <label>📍 الولاية</label>
                <select id="customerState" onchange="loadDistributorsFromTelegram(); updateFullAddress();">
                    <option value="">اختر الولاية</option>
                    <option value="الجزائر">الجزائر</option>
                    <option value="وهران">وهران</option>
                    <option value="قسنطينة">قسنطينة</option>
                    <option value="الجزائر الوسطى">الجزائر الوسطى</option>
                    <option value="الجزائر الشرقية">الجزائر الشرقية</option>
                    <option value="الجزائر الغربية">الجزائر الغربية</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>🏠 العنوان التفصيلي</label>
                <input type="text" id="customerAddress" placeholder="شارع، حي، رقم المنزل..." onchange="updateFullAddress()">
            </div>
            
            <div class="form-group">
                <label>📍 العنوان الكامل</label>
                <input type="text" id="fullAddress" readonly>
            </div>

            <div id="distributorsLoading" style="display: none; text-align: center; padding: 20px;">
                <i class="fas fa-spinner fa-spin"></i> جاري التحميل...
            </div>
            
            <div id="distributorsList"></div>
            
            <div class="form-group">
                <label>📝 ملاحظات إضافية (اختياري)</label>
                <textarea id="customerNotes" placeholder="أي ملاحظات خاصة بطلبك..." style="min-height: 80px;"></textarea>
            </div>
            
            <div class="modal-buttons">
                <button class="btn btn-gold" onclick="submitOrder()"><i class="fas fa-check"></i> إتمام الطلب</button>
                <button class="btn btn-outline" onclick="closeModal()"><i class="fas fa-times"></i> إلغاء</button>
            </div>
        </div>
    </div>

    <div id="notification" class="notification" style="display: none;"></div>

    <script>
        const CART_STORAGE_KEY = 'nardo_cart';
        const ORDERS_STORAGE_KEY = 'nardo_orders';
        const SEARCH_TITLE = 'قائمة الموزعين والشركات';
        
        const TELEGRAM = {
            botToken: 'YOUR_BOT_TOKEN',
            channelId: 'YOUR_CHANNEL_ID',
            apiUrl: 'https://api.telegram.org/bot'
        };

        let cart = [];
        let storesState = JSON.parse(localStorage.getItem('stores_state') || '{}');
        let distributorsData = JSON.parse(localStorage.getItem('nardo_distributors_data') || '{}');
        let selectedDistributor = null;

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabName + 'Tab').classList.add('active');
            document.querySelector(`[onclick="switchTab('${tabName}')"]`).classList.add('active');
        }

        function showNotification(msg, type = 'info') {
            const notif = document.getElementById('notification');
            notif.textContent = msg;
            notif.className = `notification ${type}`;
            notif.style.display = 'block';
            setTimeout(() => notif.style.display = 'none', 4000);
        }

        function getStateCode(stateName) {
            const codes = {
                'الجزائر': 'ALG',
                'وهران': 'ORA',
                'قسنطينة': 'CST',
                'الجزائر الوسطى': 'ACT',
                'الجزائر الشرقية': 'AES',
                'الجزائر الغربية': 'AGW'
            };
            return codes[stateName] || 'ALG';
        }

        async function findDistributorsMessage() {
            try {
                let offset = 0, hasMore = true, foundMessage = null;
                while (hasMore) {
                    const data = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getUpdates?offset=${offset}&limit=100`).then(r => r.json());
                    if (!data.ok) break;
                    for (const update of data.result) {
                        const message = update.channel_post || update.message;
                        if (message && message.chat.id.toString() === TELEGRAM.channelId) {
                            if (message.text && (message.text.includes(SEARCH_TITLE) || message.text.includes('قائمة الموزعين'))) {
                                foundMessage = { message_id: message.message_id, text: message.text };
                                hasMore = false; break;
                            }
                        }
                        offset = update.update_id + 1;
                    }
                    if (foundMessage || data.result.length < 100) break;
                    await new Promise(r => setTimeout(r, 300));
                }
                return foundMessage;
            } catch (e) { return null; }
        }
        
        function parseDistributorsMessage(messageText) {
            distributorsData = {};
            const lines = messageText.split('\n');
            let currentStateCode = null;
            for (let i = 0; i < lines.length; i++) {
                let line = lines[i].trim();
                let stateMatch = line.match(/📍\s*ولاية\s*(.+?)\s*\(([A-Z]{3})\)/);
                if (stateMatch) { currentStateCode = stateMatch[2]; if (!distributorsData[currentStateCode]) distributorsData[currentStateCode] = []; continue; }
                let distributorMatch = line.match(/•\s*(.+?)\s*\(([📦🚚].+?)\)/);
                if (distributorMatch && currentStateCode) {
                    let distributorName = distributorMatch[1].trim();
                    let typeIcon = distributorMatch[2];
                    let typeText = typeIcon.includes('📦') ? '📦 موزع معتمد' : '🚚 شركة توصيل';
                    let fullId = null, phone = null;
                    for (let j = i+1; j < Math.min(i+5, lines.length); j++) {
                        let nextLine = lines[j].trim();
                        let idMatch = nextLine.match(/🆔\s*المعرف:\s*(.+)$/);
                        if (idMatch && idMatch[1].trim() !== '---') fullId = idMatch[1].trim();
                        let contactMatch = nextLine.match(/👤\s*(.+?)\s*[|📍]\s*📞\s*(.+)$/);
                        if (contactMatch) phone = contactMatch[2].trim();
                        if (nextLine.includes('📍 ولاية') || nextLine.startsWith('•')) break;
                    }
                    distributorsData[currentStateCode].push({ name: distributorName, fullId: fullId || `${currentStateCode}-${distributorName}`, typeText: typeText, phone: phone || 'رقم غير متوفر' });
                }
            }
            if (Object.keys(distributorsData).length > 0) {
                localStorage.setItem('nardo_distributors_data', JSON.stringify(distributorsData));
                localStorage.setItem('nardo_distributors_cache_time', Date.now().toString());
                return true;
            }
            return false;
        }
        
        async function fetchDistributorsFromChannel() {
            const loading = document.getElementById('distributorsLoading');
            if (loading) loading.style.display = 'block';
            try {
                const cached = localStorage.getItem('nardo_distributors_data');
                const cacheTime = localStorage.getItem('nardo_distributors_cache_time');
                if (cached && cacheTime && (Date.now() - parseInt(cacheTime)) < 3600000) {
                    distributorsData = JSON.parse(cached);
                    if (loading) loading.style.display = 'none';
                    return true;
                }
                const message = await findDistributorsMessage();
                if (message) parseDistributorsMessage(message.text);
                if (loading) loading.style.display = 'none';
                return true;
            } catch (e) { if (loading) loading.style.display = 'none'; return false; }
        }
        
        async function loadDistributorsFromTelegram() {
            const selectedStateName = document.getElementById('customerState').value;
            const container = document.getElementById('distributorsList');
            const loading = document.getElementById('distributorsLoading');
            if (!selectedStateName) { if (container) container.innerHTML = ''; return; }
            const stateCode = getStateCode(selectedStateName);
            if (loading) loading.style.display = 'block';
            if (container) container.innerHTML = '';
            if (Object.keys(distributorsData).length === 0) await fetchDistributorsFromChannel();
            if (loading) loading.style.display = 'none';
            const distributors = distributorsData[stateCode] || [];
            if (distributors.length === 0) {
                if (container) container.innerHTML = `<div class="distributors-section"><h3><i class="fas fa-warehouse"></i> الموزعون والشركات المتاحة</h3><div class="no-distributors">لا توجد شركات توصيل في ولاية <strong>${selectedStateName}</strong> حالياً</div></div>`;
                return;
            }
            let html = `<div class="distributors-section"><h3><i class="fas fa-warehouse"></i> اختر شركة التوصيل أو الموزع في ${selectedStateName}</h3>`;
            distributors.forEach((dist, idx) => {
                html += `<div class="distributor-item" onclick='selectDistributor("${stateCode}", ${idx})'><div class="distributor-name">${dist.name}</div><div class="distributor-type">${dist.typeText}</div><div class="distributor-info">🆔 المعرف: <span class="distributor-id">${dist.fullId}</span></div><div class="distributor-info">📞 ${dist.phone}</div></div>`;
            });
            html += `</div>`;
            if (container) container.innerHTML = html;
        }
        
        function selectDistributor(stateCode, index) {
            document.querySelectorAll('.distributor-item').forEach(item => item.classList.remove('selected'));
            const items = document.querySelectorAll('.distributor-item');
            if (items[index]) {
                items[index].classList.add('selected');
                selectedDistributor = distributorsData[stateCode][index];
                showNotification(`✅ تم اختيار ${selectedDistributor.name}`, 'success');
            }
        }

        function saveCart() { localStorage.setItem(CART_STORAGE_KEY, JSON.stringify(cart)); updateCartCounters(); }
        function loadCart() { const saved = localStorage.getItem(CART_STORAGE_KEY); cart = saved ? JSON.parse(saved) : []; updateCartDisplay(); updateCartCounters(); }
        function updateCartCounters() { 
            const count = cart.reduce((s, i) => s + i.quantity, 0); 
            const total = cart.reduce((s, i) => s + (i.price * i.quantity), 0); 
            document.getElementById('cartCount').textContent = count; 
            document.getElementById('cartTotal').textContent = total.toLocaleString('ar-EG'); 
        }
        function updateCartDisplay() { 
            const container = document.getElementById('cartContainer'); 
            if(cart.length===0){ container.innerHTML = `<div class="empty-state"><i class="fas fa-shopping-cart"></i><h3>السلة فارغة</h3></div>`; return; } 
            const grouped = groupByStore(cart); 
            let html = ''; 
            for(const [sid, sdata] of Object.entries(grouped)){ 
                const isCollapsed = storesState[sid]; 
                html += `<div class="merchant-section"><div class="merchant-header" onclick="toggleStore('${sid}')"><div class="merchant-info"><div class="merchant-avatar"><i class="fas fa-store"></i></div><div><div class="merchant-name">${sdata.storeName}</div></div></div><div class="merchant-stats"><span>${sdata.count}</span> منتج | <span>${sdata.total.toLocaleString('ar-EG')}</span> دج</div></div><div class="merchant-products ${isCollapsed?'collapsed':''}">`; 
                sdata.items.forEach(item=>{ 
                    html += `<div class="cart-item"><div class="product-thumbnail"><i class="fas fa-image"></i></div><div class="product-details"><div class="product-name">${item.name}</div><div class="product-price">${item.price.toLocaleString('ar-EG')} دج</div></div><div class="cart-item-quantity"><button onclick="updateCartQuantity('${item.id}',-1)">−</button><span>${item.quantity}</span><button onclick="updateCartQuantity('${item.id}',1)">+</button></div><div class="cart-item-total">${(item.price*item.quantity).toLocaleString('ar-EG')} دج</div><button class="cart-item-remove" onclick="removeFromCart('${item.id}')"><i class="fas fa-trash"></i></button></div>`; 
                }); 
                html += `</div></div>`; 
            } 
            html += `<div class="cart-summary"><div class="summary-row"><span class="summary-label">المجموع:</span><span class="summary-total">${cart.reduce((s,i)=>s+(i.price*i.quantity),0).toLocaleString('ar-EG')} دج</span></div><div class="cart-actions"><button class="btn btn-gold" onclick="openCustomerModal()"><i class="fas fa-credit-card"></i> إتمام الطلب</button><button class="btn btn-outline" onclick="clearCart()">مسح السلة</button></div></div>`; 
            container.innerHTML = html; 
        }
        function toggleStore(sid) { storesState[sid] = !storesState[sid]; localStorage.setItem('stores_state', JSON.stringify(storesState)); updateCartDisplay(); }
        function updateCartQuantity(pid, chg) { const idx = cart.findIndex(i=>i.id===pid); if(idx===-1) return; const nq = cart[idx].quantity+chg; if(nq<=0) removeFromCart(pid); else { cart[idx].quantity=nq; saveCart(); updateCartDisplay(); } }
        function removeFromCart(pid) { cart = cart.filter(i=>i.id!==pid); saveCart(); updateCartDisplay(); }
        function clearCart() { if(confirm('مسح السلة؟')){ cart=[]; saveCart(); updateCartDisplay(); } }
        function groupByStore(items) { const g={}; items.forEach(i=>{ const sid = i.storeID || 'unknown'; if(!g[sid]) g[sid]={storeName:i.storeName||'متجر', items:[], total:0, count:0}; g[sid].items.push(i); g[sid].total += i.price*i.quantity; g[sid].count += i.quantity; }); return g; }

        let pendingGroupedStores = null, pendingGrandTotal = null;
        function openCustomerModal() { 
            if(cart.length === 0){ showNotification('السلة فارغة','warning'); return; } 
            pendingGroupedStores = groupByStore(cart); 
            pendingGrandTotal = cart.reduce((s,i) => s + (i.price * i.quantity), 0); 
            document.getElementById('customerName').value = localStorage.getItem('nardo_customer_name') || 'زائر ناردو برو';
            document.getElementById('customerModal').style.display = 'flex'; 
        }
        function closeModal() { document.getElementById('customerModal').style.display = 'none'; }
        function updateFullAddress() {
            const state = document.getElementById('customerState').value;
            const detail = document.getElementById('customerAddress').value;
            document.getElementById('fullAddress').value = state && detail ? `${state} - ${detail}` : (state || detail || '');
        }
        function openMapLocation() {
            const state = document.getElementById('customerState').value;
            const address = document.getElementById('customerAddress').value;
            window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(state + ' ' + address)}`, '_blank');
        }

        /**
         * ==================== دالة إرسال رسائل التلغرام المحدثة ====================
         * تقوم بإرسال رسالة رئيسية تجمع كل المتاجر + رسالة منفصلة لكل تاجر
         * بالتنسيق المطلوب مع جميع البيانات المطلوبة
         */
        async function sendOrderToTelegram(customerData, groupedStores, grandTotal, distributor) {
            const timestamp = new Date().toLocaleString('ar-EG');
            
            // إنشاء رقم الطلب الموحد بالصيغة: {رمز الولاية}-{اسم العميل مختصراً}-{رقم عشوائي}
            const stateCode = getStateCode(customerData.state);
            const customerNameShort = customerData.name.split(' ')[0].substring(0, 3);
            const randomNum = Math.floor(Math.random() * 900000 + 100000);
            const mainOrderId = `${stateCode}-${customerNameShort}-${randomNum}`;
            
            // جمع معرفات المتاجر
            const storeIds = Object.keys(groupedStores).join('، ');
            
            try {
                // ==================== الرسالة الرئيسية (تجمع كل المتاجر) ====================
                let mainMessage = `🟢 *طلب جديد #${mainOrderId}* 🟢\n`;
                mainMessage += `🏷️ *معرفات المتاجر:* \`${storeIds}\`\n`;
                mainMessage += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
                mainMessage += `👤 *المشتري:* ${customerData.name}\n`;
                mainMessage += `📞 *الهاتف:* ${customerData.phone}\n`;
                mainMessage += `📍 *الولاية:* ${customerData.state}\n`;
                mainMessage += `🏠 *العنوان:* ${customerData.addressDetail}\n`;
                mainMessage += `📍 *العنوان الكامل:* ${customerData.address}\n`;
                mainMessage += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
                mainMessage += `🚚 *جهة التوصيل:* ${distributor.name}\n`;
                mainMessage += `🆔 *معرف الموزع:* \`${distributor.fullId}\`\n`;
                mainMessage += `📞 *هاتف الموزع:* ${distributor.phone}\n`;
                mainMessage += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n`;
                
                // إضافة تفاصيل كل متجر في الرسالة الرئيسية
                for (const [sid, sdata] of Object.entries(groupedStores)) {
                    mainMessage += `🏪 *${sdata.storeName}*\n`;
                    mainMessage += `🆔 *معرف المتجر:* \`${sid}\`\n`;
                    mainMessage += `───────────────────────────────\n`;
                    
                    sdata.items.forEach((item, idx) => {
                        mainMessage += `🛒 منتج ${idx + 1}\n`;
                        mainMessage += `   🆔 معرف المنتج: \`${item.id}\`\n`;
                        mainMessage += `   📦 الكمية: ${item.quantity}\n`;
                        mainMessage += `   💰 السعر: ${item.price.toLocaleString('ar-EG')} دج\n`;
                        mainMessage += `   💵 المجموع: ${(item.price * item.quantity).toLocaleString('ar-EG')} دج\n`;
                        mainMessage += `───────────────────────────────\n`;
                    });
                    
                    mainMessage += `💰 *إجمالي المتجر:* ${sdata.total.toLocaleString('ar-EG')} دج\n`;
                    mainMessage += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
                }
                
                mainMessage += `💎 *الإجمالي الكلي:* ${grandTotal.toLocaleString('ar-EG')} دج\n`;
                mainMessage += `📅 *التاريخ:* ${timestamp}\n`;
                mainMessage += `✅ تم استلام الطلب بنجاح، سيتم التواصل معك قريباً`;
                
                // إرسال الرسالة الرئيسية
                const mainRes = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: TELEGRAM.channelId,
                        text: mainMessage,
                        parse_mode: 'Markdown'
                    })
                });
                
                if (!mainRes.ok) return false;
                
                // ==================== إرسال رسالة منفصلة لكل تاجر ====================
                for (const [sid, sdata] of Object.entries(groupedStores)) {
                    let merchantMessage = `🛍️ *فاتورة طلب جديد - ${sdata.storeName}* 🛍️\n`;
                    merchantMessage += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
                    merchantMessage += `🆔 *رقم الطلب الموحد:* \`${mainOrderId}\`\n`;
                    merchantMessage += `🏷️ *معرف التاجر (Store ID):* \`${sid}\`\n`;
                    merchantMessage += `🔗 *ربط الطلب:* \`${mainOrderId} | ${sid}\`\n`;
                    merchantMessage += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
                    merchantMessage += `👤 *الزبون:* ${customerData.name}\n`;
                    merchantMessage += `📞 *رقم الجوال:* ${customerData.phone}\n`;
                    merchantMessage += `📍 *الولاية:* ${customerData.state}\n`;
                    merchantMessage += `🏠 *العنوان:* ${customerData.addressDetail}\n`;
                    merchantMessage += `📍 *العنوان الكامل:* ${customerData.address}\n`;
                    merchantMessage += `🚚 *جهة التوصيل:* ${distributor.name}\n`;
                    merchantMessage += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
                    merchantMessage += `📦 *المنتجات المطلوبة:*\n`;
                    merchantMessage += `───────────────────────────────\n\n`;
                    
                    sdata.items.forEach((item, idx) => {
                        merchantMessage += `${idx + 1}️⃣ ${item.name}\n`;
                        merchantMessage += `   🆔 معرف المنتج: \`${item.id}\`\n`;
                        merchantMessage += `   📦 الكمية: ${item.quantity}\n`;
                        merchantMessage += `   💰 السعر: ${item.price.toLocaleString('ar-EG')} دج\n`;
                        merchantMessage += `   💵 المجموع: ${(item.price * item.quantity).toLocaleString('ar-EG')} دج\n`;
                        merchantMessage += `───────────────────────────────\n\n`;
                    });
                    
                    merchantMessage += `💰 *إجمالي الطلب:* ${sdata.total.toLocaleString('ar-EG')} دج\n`;
                    merchantMessage += `📅 *التاريخ:* ${timestamp}`;
                    
                    // إرسال رسالة التاجر
                    await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: TELEGRAM.channelId,
                            text: merchantMessage,
                            parse_mode: 'Markdown'
                        })
                    });
                }
                
                // حفظ الطلب محلياً
                saveOrderLocally(customerData, groupedStores, mainOrderId, timestamp, distributor);
                return true;
                
            } catch(e) {
                console.error('خطأ في إرسال الطلب:', e);
                return false;
            }
        }

        function saveOrderLocally(customerData, groupedStores, mainOrderId, timestamp, distributor) {
            let orders = JSON.parse(localStorage.getItem(ORDERS_STORAGE_KEY) || '[]');
            for (const [sid, sdata] of Object.entries(groupedStores)) {
                orders.unshift({ 
                    id: mainOrderId, 
                    storeId: sid,
                    storeName: sdata.storeName, 
                    date: timestamp, 
                    total: sdata.total, 
                    status: 'pending', 
                    items: sdata.items, 
                    customer: customerData, 
                    distributor: distributor.name 
                });
            }
            localStorage.setItem(ORDERS_STORAGE_KEY, JSON.stringify(orders));
        }

        async function submitOrder() {
            const name = document.getElementById('customerName').value.trim(); 
            const phone = document.getElementById('customerPhone').value.trim(); 
            const state = document.getElementById('customerState').value;
            const addressDetail = document.getElementById('customerAddress').value.trim();
            if(!phone){ showNotification('⚠️ يرجى إدخال رقم الهاتف','error'); return; }
            if(!state){ showNotification('⚠️ يرجى اختيار الولاية','error'); return; }
            if(!addressDetail){ showNotification('⚠️ يرجى إدخال العنوان التفصيلي','error'); return; }
            if(!selectedDistributor) { showNotification('⚠️ يرجى اختيار شركة التوصيل أو الموزع','error'); return; }
            const customerData = { name, phone, state, addressDetail, address: `${state} - ${addressDetail}`, notes: document.getElementById('customerNotes').value.trim() };
            showNotification('⏳ جاري إرسال طلبك...','info');
            const success = await sendOrderToTelegram(customerData, pendingGroupedStores, pendingGrandTotal, selectedDistributor);
            if(success){
                closeModal(); cart = []; saveCart(); updateCartDisplay();
                showNotification('✅ تم إرسال الطلب بنجاح! سيتم التواصل معك قريباً', 'success');
                renderOrdersArchive();
            } else { showNotification('❌ فشل الإرسال، يرجى المحاولة لاحقاً', 'error'); }
        }

        function renderOrdersArchive() {
            const container = document.getElementById('ordersArchiveContainer');
            if(!container) return;
            const orders = JSON.parse(localStorage.getItem(ORDERS_STORAGE_KEY) || '[]');
            if(orders.length === 0){ container.innerHTML = '<p style="text-align:center; padding: 20px; color: var(--text-secondary);">لا توجد طلبات سابقة</p>'; return; }
            container.innerHTML = orders.map((o, idx) => `
                <div class="order-card">
                    <div class="order-card-header"><span class="order-id">#${o.id}</span><span class="order-status status-pending">⏳ قيد المعالجة</span></div>
                    <div class="order-details">
                        <div><i class="fas fa-store"></i> ${o.storeName}</div>
                        <div><i class="fas fa-calendar-alt"></i> ${o.date}</div>
                        <div><i class="fas fa-map-marker-alt"></i> ${o.customer ? o.customer.state : '---'}</div>
                        <div><i class="fas fa-truck"></i> ${o.distributor || '---'}</div>
                    </div>
                    <div class="order-items-list">
                        ${(o.items || []).map(i => `<div class="order-item-row"><span>${i.name} (x${i.quantity})</span><span>${(i.price*i.quantity).toLocaleString('ar-EG')} دج</span></div>`).join('')}
                    </div>
                    <div class="order-card-footer">
                        <div><strong>الإجمالي: </strong><span style="color: var(--success); font-weight: bold;">${o.total.toLocaleString('ar-EG')} دج</span></div>
                        <button class="btn-delete-order" onclick="deleteOrderFromArchive(${idx})"><i class="fas fa-trash"></i> حذف</button>
                    </div>
                </div>
            `).join('');
        }

        function deleteOrderFromArchive(index) {
            if(confirm('حذف هذا الطلب؟')) {
                let orders = JSON.parse(localStorage.getItem(ORDERS_STORAGE_KEY) || '[]');
                orders.splice(index, 1);
                localStorage.setItem(ORDERS_STORAGE_KEY, JSON.stringify(orders));
                renderOrdersArchive();
            }
        }

        function clearOrdersArchive() {
            if(confirm('مسح كامل الأرشيف؟')) {
                localStorage.removeItem(ORDERS_STORAGE_KEY);
                renderOrdersArchive();
            }
        }

        window.addEventListener('load', () => { loadCart(); renderOrdersArchive(); fetchDistributorsFromChannel(); });
    </script>
</body>
</html>
