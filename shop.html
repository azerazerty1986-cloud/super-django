head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ناردو برو - سلتي | نظام طلبات متكامل</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --gold: #ffd700;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --glass: rgba(255, 255, 255, 0.05);
            --success: #4ade80;
            --error: #f87171;
            --warning: #fbbf24;
            --info: #60a5fa;
        }
        
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0f3460, #16213e);
            color: var(--text-primary);
            direction: rtl;
        }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        
        .header {
            background: var(--glass);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }
        .header-title { display: flex; align-items: center; gap: 15px; }
        .header-title i { font-size: 40px; color: var(--gold); }
        .header-title h1 { font-size: 32px; color: var(--gold); margin: 0; }
        .header-info { display: flex; gap: 20px; flex-wrap: wrap; }
        .info-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 215, 0, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .info-item:hover { background: rgba(255, 215, 0, 0.2); }
        
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s;
        }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-gold:hover { background: #ffed4e; transform: translateY(-2px); }
        .btn-outline { background: transparent; border: 2px solid var(--gold); color: var(--gold); }
        .btn-outline:hover { background: rgba(255, 215, 0, 0.1); }
        .btn-danger { background: rgba(248, 113, 113, 0.2); border: 1px solid var(--error); color: var(--error); }
        .btn-danger:hover { background: var(--error); color: white; }
        .btn-refresh { background: rgba(96, 165, 250, 0.2); border: 1px solid var(--info); color: var(--info); }
        .btn-refresh:hover { background: var(--info); color: white; }
        
        .merchant-section {
            background: var(--glass);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 20px;
            margin-bottom: 25px;
            overflow: hidden;
        }
        .merchant-header {
            background: rgba(255, 215, 0, 0.1);
            padding: 20px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            cursor: pointer;
        }
        .merchant-header:hover { background: rgba(255, 215, 0, 0.15); }
        .merchant-info { display: flex; align-items: center; gap: 15px; }
        .merchant-avatar {
            width: 50px;
            height: 50px;
            background: rgba(255, 215, 0, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .merchant-name { font-size: 20px; font-weight: bold; color: var(--gold); }
        .merchant-stats { display: flex; gap: 20px; font-size: 14px; color: var(--text-secondary); }
        .merchant-stats span { color: var(--gold); font-weight: bold; }
        .merchant-toggle { font-size: 20px; transition: transform 0.3s; }
        .merchant-toggle.collapsed { transform: rotate(-90deg); }
        .merchant-products { padding: 20px; }
        .merchant-products.collapsed { display: none; }
        
        .cart-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 215, 0, 0.15);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .product-thumbnail {
            width: 70px;
            height: 70px;
            border-radius: 12px;
            background: rgba(255, 215, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .product-thumbnail i { font-size: 30px; color: var(--gold); }
        .product-details { flex: 2; min-width: 150px; }
        .product-name { font-size: 16px; font-weight: bold; color: var(--gold); }
        .product-price { font-size: 13px; color: var(--success); }
        .cart-item-quantity {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 215, 0, 0.1);
            padding: 8px 15px;
            border-radius: 10px;
        }
        .cart-item-quantity button {
            background: none;
            border: none;
            color: var(--gold);
            cursor: pointer;
            font-size: 18px;
            width: 30px;
            height: 30px;
            border-radius: 8px;
        }
        .cart-item-quantity button:hover { background: rgba(255, 215, 0, 0.2); }
        .cart-item-quantity span { font-size: 16px; font-weight: bold; min-width: 30px; text-align: center; }
        .cart-item-total { font-size: 16px; font-weight: bold; color: var(--gold); min-width: 100px; text-align: center; }
        .cart-item-remove { background: rgba(248, 113, 113, 0.2); color: var(--error); border: 1px solid var(--error); padding: 8px 15px; border-radius: 10px; cursor: pointer; }
        
        .cart-summary {
            background: rgba(255, 215, 0, 0.05);
            border-radius: 15px;
            padding: 25px;
            margin-top: 20px;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.1);
        }
        .summary-label { color: var(--text-secondary); }
        .summary-value { color: var(--gold); font-weight: bold; font-size: 18px; }
        .summary-total { font-size: 24px; color: var(--success); }
        .cart-actions { display: flex; gap: 15px; margin-top: 25px; flex-wrap: wrap; }
        .cart-actions .btn { flex: 1; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 3000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: var(--secondary);
            border-radius: 20px;
            padding: 30px;
            max-width: 550px;
            width: 90%;
            border: 2px solid var(--gold);
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-content h2 { color: var(--gold); margin-bottom: 20px; text-align: center; }
        .modal-content input, .modal-content select, .modal-content textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: 1px solid rgba(255,215,0,0.3);
            background: rgba(255,255,255,0.1);
            color: white;
            font-family: 'Cairo', sans-serif;
        }
        .modal-content input:focus, .modal-content select:focus {
            outline: none;
            border-color: var(--gold);
        }
        .modal-buttons { display: flex; gap: 15px; margin-top: 20px; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--gold);
            font-size: 13px;
        }
        
        .distributors-section {
            background: rgba(255, 215, 0, 0.05);
            border: 2px solid rgba(255, 215, 0, 0.2);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .distributors-section h3 {
            color: var(--gold);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .distributor-item {
            background: rgba(0, 0, 0, 0.3);
            border-right: 4px solid var(--gold);
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 10px;
            transition: all 0.3s;
            cursor: pointer;
        }
        .distributor-item:hover {
            background: rgba(255, 215, 0, 0.15);
            transform: translateX(-5px);
        }
        .distributor-item.selected {
            background: rgba(255, 215, 0, 0.25);
            border-right: 4px solid var(--success);
        }
        .distributor-name {
            font-weight: bold;
            color: var(--gold);
            font-size: 16px;
            margin-bottom: 5px;
        }
        .distributor-type {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 12px;
            margin-bottom: 8px;
            font-weight: bold;
        }
        .type-delivery { background: rgba(96, 165, 250, 0.2); color: var(--info); }
        .type-distributor { background: rgba(74, 222, 128, 0.2); color: var(--success); }
        
        .distributor-details {
            display: flex;
            gap: 15px;
            font-size: 13px;
            color: var(--text-secondary);
        }
        .distributor-details span { display: flex; align-items: center; gap: 5px; }
        .distributor-details i { color: var(--gold); }
        
        .no-distributors {
            text-align: center;
            padding: 30px;
            color: var(--text-secondary);
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
        }
        
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            z-index: 5000;
            font-weight: bold;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        .notification.success { background: var(--success); color: #000; }
        .notification.error { background: var(--error); color: #fff; }
        .notification.info { background: var(--info); color: #fff; }
        
        #distributorsLoading {
            text-align: center;
            padding: 20px;
            display: none;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 215, 0, 0.1);
            border-top: 4px solid var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

            <div id="distributorsLoading">

    <script>
        // الإعدادات
        const TELEGRAM = {
            botToken: '7542153545:AAH-u_p0-v_uW_6-v_uW_6-v_uW_6', // سيتم استبداله
            channelId: '-1002435532556',
            apiUrl: 'https://api.telegram.org/bot'
        };

        // الحالة العامة
        let cart = JSON.parse(localStorage.getItem('nardo_cart') || '[]');
        let distributorsData = {}; // { stateCode: [distributors] }
        let selectedDistributor = null;

        // تحويل اسم الولاية إلى الرمز (مطابق لملف التوصيل)
        function getStateCode(stateName) {
            const stateCodes = {
                'أدرار': 'ADE', 'الشلف': 'ASH', 'الأغواط': 'LGH', 'أم البواقي': 'OEB',
                'باتنة': 'BAT', 'بجاية': 'BJA', 'بسكرة': 'BSK', 'بشار': 'BSH',
                'البليدة': 'BLA', 'البويرة': 'BUI', 'تمنراست': 'TAM', 'تبسة': 'TEB',
                'تلمسان': 'TLE', 'تيارت': 'TIA', 'تيزي وزو': 'TIZ', 'الجزائر': 'ALG',
                'الجلفة': 'DJF', 'جيجل': 'JIJ', 'سطيف': 'SET', 'سعيدة': 'SAI',
                'سكيكدة': 'SKI', 'سيدي بلعباس': 'SBI', 'عنابة': 'ANA', 'قالمة': 'GUE',
                'قسنطينة': 'CON', 'المدية': 'MED', 'مستغانم': 'MGH', 'المسيلة': 'MSC',
                'معسكر': 'MOS', 'ورقلة': 'WAR', 'وهران': 'ORA', 'البيض': 'BAY',
                'إليزي': 'ILL', 'برج بوعريريج': 'BBA', 'بومرداس': 'BMD', 'الطارف': 'TAR',
                'تندوف': 'TIN', 'تيسمسيلت': 'TSS', 'الوادي': 'OUA', 'خنشلة': 'KHE',
                'سوق أهراس': 'SOU', 'تيبازة': 'TIP', 'ميلة': 'MIL', 'عين الدفلى': 'AYD',
                'النعامة': 'NAA', 'عين تموشنت': 'AIN', 'غرداية': 'GHA', 'غليزان': 'REL'
            };
            return stateCodes[stateName] || stateName.substring(0, 3).toUpperCase();
        }

        // جلب البيانات من التلغرام
        async function fetchDistributorsFromTelegram() {
            try {
                showNotification('📡 جاري جلب بيانات الموزعين من التلغرام...', 'info');
                
                // جلب آخر 100 رسالة من القناة
                const response = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getUpdates?offset=-100`);
                const data = await response.json();
                
                if (!data.ok || !data.result) throw new Error('فشل في جلب البيانات');
                
                let distributorsMessage = null;
                // البحث عن آخر رسالة تحتوي على العنوان المطلوب (من الأحدث للأقدم)
                const reversedUpdates = [...data.result].reverse();
                for (const update of reversedUpdates) {
                    const message = update.channel_post || update.message;
                    if (message && message.text && message.text.includes('قائمة الموزعين وشركات التوصيل حسب كل ولاية')) {
                        distributorsMessage = message.text;
                        break;
                    }
                }
                
                if (!distributorsMessage) {
                    const cached = localStorage.getItem('nardo_distributors_data');
                    if (cached) {
                        distributorsData = JSON.parse(cached);
                        return true;
                    }
                    throw new Error('لم يتم العثور على رسالة قائمة الموزعين');
                }
                
                parseDistributorsMessage(distributorsMessage);
                localStorage.setItem('nardo_distributors_data', JSON.stringify(distributorsData));
                return true;
            } catch (error) {
                console.error(error);
                showNotification('❌ فشل في جلب البيانات من التلغرام', 'error');
                return false;
            }
        }

        // تحليل الرسالة (النسخة المصححة)
        function parseDistributorsMessage(text) {
            distributorsData = {};
            const sections = text.split('📍 ولاية ');
            
            sections.forEach((section, index) => {
                if (index === 0) return; // تخطي المقدمة
                
                const lines = section.split('\n');
                const headerLine = lines[0]; // "الجزائر (ALG) - عدد الموزعين: 5"
                const stateMatch = headerLine.match(/(.+?)\s*\(([A-Z]{3})\)/);
                
                if (stateMatch) {
                    const stateCode = stateMatch[2];
                    distributorsData[stateCode] = [];
                    
                    // تقسيم القسم إلى موزعين بناءً على النقطة •
                    const distributorBlocks = section.split('\n• ');
                    distributorBlocks.forEach((block, bIndex) => {
                        if (bIndex === 0) return; // تخطي الهيدر
                        
                        const blockLines = block.split('\n');
                        const firstLine = blockLines[0]; // "**اسم الشركة** (🚚 شركة توصيل)"
                        const nameMatch = firstLine.match(/\*\*(.+?)\*\*\s*\((.+?)\)/);
                        
                        if (nameMatch) {
                            const distributor = {
                                name: nameMatch[1],
                                typeText: nameMatch[2],
                                type: nameMatch[2].includes('🚚') ? 'delivery' : 'distributor',
                                customId: null,
                                manager: null,
                                phone: null
                            };
                            
                            blockLines.forEach(l => {
                                if (l.includes('🆔 المعرف:')) {
                                    const idMatch = l.match(/🆔 المعرف:\s*`(.+?)`/);
                                    if (idMatch) distributor.customId = idMatch[1];
                                }
                                if (l.includes('👤')) {
                                    const contactMatch = l.match(/👤\s*(.+?)\s*\|\s*📞\s*(.+)$/);
                                    if (contactMatch) {
                                        distributor.manager = contactMatch[1].trim();
                                        distributor.phone = contactMatch[2].trim();
                                    }
                                }
                            });
                            
                            distributorsData[stateCode].push(distributor);
                        }
                    });
                }
            });
        }

        // تحميل الموزعين في الواجهة
        async function loadDistributorsFromTelegram() {
            const stateName = document.getElementById('customerState').value;
            const container = document.getElementById('distributorsList');
            const loading = document.getElementById('distributorsLoading');
            
            if (!stateName) { container.innerHTML = ''; return; }
            
            loading.style.display = 'block';
            container.innerHTML = '';
            
            if (Object.keys(distributorsData).length === 0) {
                await fetchDistributorsFromTelegram();
            }
            
            loading.style.display = 'none';
            const stateCode = getStateCode(stateName);
            const list = distributorsData[stateCode] || [];
            
            if (list.length === 0) {
                container.innerHTML = `
                    <div class="no-distributors">
                        <i class="fas fa-exclamation-circle"></i> لا يوجد موزعين في ${stateName}
                        <br><button class="btn btn-refresh" style="margin-top:10px" onclick="fetchDistributorsFromTelegram();loadDistributorsFromTelegram()">تحديث</button>
                    </div>`;
                return;
            }
            
            let html = `<h3><i class="fas fa-truck"></i> الموزعون المتاحون في ${stateName}:</h3>`;
            list.forEach((d, index) => {
                html += `
                    <div class="distributor-item ${selectedDistributor?.customId === d.customId ? 'selected' : ''}" onclick="selectDistributor(${JSON.stringify(d).replace(/"/g, '&quot;')})">
                        <div class="distributor-name">${d.name}</div>
                        <div class="distributor-type ${d.type === 'delivery' ? 'type-delivery' : 'type-distributor'}">${d.typeText}</div>
                        <div class="distributor-details">
                            <span><i class="fas fa-user"></i> ${d.manager || '---'}</span>
                            <span><i class="fas fa-phone"></i> ${d.phone || '---'}</span>
                            <span><i class="fas fa-id-badge"></i> ${d.customId || '---'}</span>
                        </div>
                    </div>`;
            });
            container.innerHTML = html;
        }

        function selectDistributor(distributor) {
            selectedDistributor = distributor;
            loadDistributorsFromTelegram();
            showNotification(`تم اختيار: ${distributor.name}`, 'success');
        }

        function showNotification(msg, type) {
            const div = document.createElement('div');
            div.className = `notification ${type}`;
            div.textContent = msg;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }

        // وظائف السلة الأساسية (مبسطة للعرض)
        function updateCartUI() {
            const container = document.getElementById('cartContainer');
            if (cart.length === 0) {
                container.innerHTML = '<div class="no-distributors">السلة فارغة</div>';
                return;
            }
            // ... كود عرض المنتجات ...
        }

        function clearCart() {
            cart = [];
            localStorage.setItem('nardo_cart', '[]');
            updateCartUI();
            showNotification('تم مسح السلة', 'info');
        }

        function checkout() {
            if (cart.length === 0) { showNotification('السلة فارغة!', 'error'); return; }
            if (!document.getElementById('customerState').value) { showNotification('يرجى اختيار الولاية', 'error'); return; }
            if (!selectedDistributor) { showNotification('يرجى اختيار موزع', 'error'); return; }
            showNotification('جاري إرسال الطلب...', 'success');
            // ... كود إرسال الطلب للتلغرام ...
        }

        // التشغيل الأولي
        window.onload = () => {
            updateCartUI();
            fetchDistributorsFromTelegram();
        };
    </script>
</body>
</html>
