<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ناردو برو - سلتي | نظام طلبات مع موزعين حسب الولاية</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --gold: #ffd700;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --glass: rgba(255, 255, 255, 0.05);
            --success: #4ade80;
            --error: #f87171;
            --warning: #fbbf24;
            --info: #60a5fa;
        }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0f3460, #16213e);
            color: var(--text-primary);
            direction: rtl;
        }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        
        .header {
            background: var(--glass);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }
        .header-title { display: flex; align-items: center; gap: 15px; }
        .header-title i { font-size: 40px; color: var(--gold); }
        .header-title h1 { font-size: 28px; color: var(--gold); margin: 0; }
        .header-info { display: flex; gap: 20px; flex-wrap: wrap; }
        .info-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 215, 0, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .info-item:hover { background: rgba(255, 215, 0, 0.2); }
        
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s;
        }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-gold:hover { background: #ffed4e; transform: translateY(-2px); }
        .btn-outline { background: transparent; border: 2px solid var(--gold); color: var(--gold); }
        .btn-outline:hover { background: rgba(255, 215, 0, 0.1); }
        .btn-success { background: var(--success); color: #000; }
        .btn-success:hover { background: #5ee890; transform: translateY(-2px); }
        .btn-danger { background: rgba(248, 113, 113, 0.2); border: 1px solid var(--error); color: var(--error); }
        .btn-danger:hover { background: var(--error); color: white; }
        .btn-telegram { background: #0088cc; color: white; }
        .btn-telegram:hover { background: #006699; transform: translateY(-2px); }
        
        .merchant-section {
            background: var(--glass);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 20px;
            margin-bottom: 25px;
            overflow: hidden;
        }
        .merchant-header {
            background: rgba(255, 215, 0, 0.1);
            padding: 20px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            cursor: pointer;
        }
        .merchant-header:hover { background: rgba(255, 215, 0, 0.15); }
        .merchant-info { display: flex; align-items: center; gap: 15px; }
        .merchant-avatar {
            width: 50px;
            height: 50px;
            background: rgba(255, 215, 0, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .merchant-name { font-size: 20px; font-weight: bold; color: var(--gold); }
        .merchant-stats { display: flex; gap: 20px; font-size: 14px; color: var(--text-secondary); }
        .merchant-stats span { color: var(--gold); font-weight: bold; }
        .merchant-toggle { font-size: 20px; transition: transform 0.3s; }
        .merchant-toggle.collapsed { transform: rotate(-90deg); }
        .merchant-products { padding: 20px; }
        .merchant-products.collapsed { display: none; }
        
        .cart-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 215, 0, 0.15);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .product-thumbnail {
            width: 70px;
            height: 70px;
            border-radius: 12px;
            overflow: hidden;
            background: rgba(255, 215, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .product-thumbnail i { font-size: 30px; color: var(--gold); }
        .product-details { flex: 2; min-width: 150px; }
        .product-name { font-size: 16px; font-weight: bold; color: var(--gold); }
        .product-price { font-size: 13px; color: var(--success); }
        .cart-item-quantity {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 215, 0, 0.1);
            padding: 8px 15px;
            border-radius: 10px;
        }
        .cart-item-quantity button {
            background: none;
            border: none;
            color: var(--gold);
            cursor: pointer;
            font-size: 18px;
            width: 30px;
            height: 30px;
            border-radius: 8px;
        }
        .cart-item-quantity button:hover { background: rgba(255, 215, 0, 0.2); }
        .cart-item-quantity span { font-size: 16px; font-weight: bold; min-width: 30px; text-align: center; }
        .cart-item-total { font-size: 16px; font-weight: bold; color: var(--gold); min-width: 100px; text-align: center; }
        .cart-item-remove { background: rgba(248, 113, 113, 0.2); color: var(--error); border: 1px solid var(--error); padding: 8px 15px; border-radius: 10px; cursor: pointer; }
        
        .cart-summary {
            background: rgba(255, 215, 0, 0.05);
            border-radius: 15px;
            padding: 25px;
            margin-top: 20px;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.1);
        }
        .summary-label { color: var(--text-secondary); }
        .summary-value { color: var(--gold); font-weight: bold; font-size: 18px; }
        .summary-total { font-size: 24px; color: var(--success); }
        .cart-actions { display: flex; gap: 15px; margin-top: 25px; flex-wrap: wrap; }
        .cart-actions .btn { flex: 1; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 3000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: var(--secondary);
            border-radius: 20px;
            padding: 30px;
            max-width: 550px;
            width: 90%;
            border: 2px solid var(--gold);
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-content h2 { color: var(--gold); margin-bottom: 20px; text-align: center; }
        .modal-content input, .modal-content select, .modal-content textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: 1px solid rgba(255,215,0,0.3);
            background: rgba(255,255,255,0.1);
            color: white;
            font-family: 'Cairo', sans-serif;
        }
        .modal-content input:focus, .modal-content select:focus {
            outline: none;
            border-color: var(--gold);
        }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--gold);
            font-size: 13px;
        }
        .modal-buttons { display: flex; gap: 15px; margin-top: 20px; }
        
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
        .empty-state i { font-size: 70px; color: var(--gold); }
        
        .notification {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            max-width: 400px;
            margin: 0 auto;
            padding: 15px 25px;
            border-radius: 12px;
            font-weight: bold;
            z-index: 2000;
            animation: slideIn 0.3s ease;
            text-align: center;
        }
        .notification.success { background: var(--success); color: #000; }
        .notification.error { background: var(--error); color: #fff; }
        .notification.warning { background: var(--warning); color: #000; }
        .notification.info { background: var(--info); color: #fff; }
        @keyframes slideIn {
            from { transform: translateY(-100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .order-archive { margin-top: 40px; border-top: 2px dashed rgba(255, 215, 0, 0.2); padding-top: 30px; }
        .order-archive h2 { margin-bottom: 20px; font-size: 24px; color: var(--gold); }
        .order-card {
            background: var(--glass);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .order-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid rgba(255, 215, 0, 0.1); padding-bottom: 10px; }
        .order-id { font-weight: bold; color: var(--gold); font-family: monospace; font-size: 14px; }
        .order-status { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .status-pending { background: rgba(251, 191, 36, 0.2); color: var(--warning); }
        .status-received { background: rgba(96, 165, 250, 0.2); color: var(--info); }
        .status-approved { background: rgba(74, 222, 128, 0.2); color: var(--success); }
        
        .distributor-list {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            margin-top: 5px;
        }
        .distributor-option {
            padding: 12px;
            margin: 5px 0;
            border-radius: 10px;
            background: rgba(255,215,0,0.1);
            cursor: pointer;
            transition: all 0.3s;
            border-right: 3px solid transparent;
        }
        .distributor-option:hover {
            background: rgba(255,215,0,0.2);
            border-right-color: var(--gold);
        }
        .distributor-option.selected {
            background: rgba(255,215,0,0.3);
            border-right-color: var(--gold);
        }
        .distributor-name { font-weight: bold; color: var(--gold); }
        .distributor-type { font-size: 11px; color: var(--text-secondary); }
        .distributor-phone { font-size: 11px; color: var(--success); }
        
        @media (max-width: 768px) {
            .cart-item { flex-direction: column; align-items: stretch; }
            .cart-actions { flex-direction: column; }
        }
        
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,215,0,0.3);
            border-radius: 50%;
            border-top-color: var(--gold);
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-title"><i class="fas fa-shopping-cart"></i><h1>سلة المشتريات</h1></div>
            <div class="header-info">
                <div class="info-item" onclick="fetchDistributorsFromChannel()"><i class="fab fa-telegram"></i><span>جلب الموزعين</span></div>
                <div class="info-item"><i class="fas fa-shopping-bag"></i><span>العدد: <strong id="cartCount">0</strong></span></div>
                <div class="info-item"><i class="fas fa-dollar-sign"></i><span>الإجمالي: <strong id="cartTotal">0</strong> دج</span></div>
                <div class="info-item" onclick="clearCart()"><i class="fas fa-trash-alt"></i><span>مسح الكل</span></div>
            </div>
        </div>
        
        <div class="cart-section"><div id="cartContainer"></div></div>
        
        <div class="order-archive"><h2><i class="fas fa-history"></i> أرشيف طلباتي</h2><div id="ordersArchiveContainer"></div></div>
    </div>

    <!-- نافذة معلومات المشتري مع قائمة الموزعين -->
    <div id="customerModal" class="modal">
        <div class="modal-content">
            <h2><i class="fas fa-user-circle"></i> معلومات المشتري</h2>
            
            <div class="form-group">
                <label><i class="fas fa-user"></i> الاسم الكامل</label>
                <input type="text" id="customerName" placeholder="الاسم الكامل">
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-phone"></i> رقم الهاتف</label>
                <input type="tel" id="customerPhone" placeholder="05XXXXXXXX">
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-map-marker-alt"></i> الولاية</label>
                <select id="customerState" onchange="updateDistributorsList()">
                    <option value="">اختر الولاية</option>
                </select>
            </div>
            
            <!-- قائمة الموزعين حسب الولاية -->
            <div class="form-group" id="distributorGroup" style="display: none;">
                <label><i class="fas fa-truck"></i> اختر الموزع</label>
                <div id="distributorsList" class="distributor-list"></div>
                <input type="hidden" id="selectedDistributor">
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-location-dot"></i> العنوان التفصيلي</label>
                <input type="text" id="customerAddress" placeholder="الشارع، رقم البيت، الحي...">
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-pen"></i> ملاحظات إضافية</label>
                <textarea id="customerNotes" placeholder="ملاحظات إضافية (اختياري)" rows="2"></textarea>
            </div>
            
            <div class="modal-buttons">
                <button class="btn btn-gold" onclick="submitOrder()">تأكيد الطلب</button>
                <button class="btn btn-outline" onclick="closeModal()">إلغاء</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // الإعدادات الأساسية
        // ============================================
        const TELEGRAM = { 
            botToken: '8576673096:AAGvSMjzwVWj6wJ47JdqiDwcObXjBDcyiLA', 
            channelId: '-1003822964890', 
            apiUrl: 'https://api.telegram.org/bot' 
        };
        
        const CART_STORAGE_KEY = 'nardoo_cart';
        const ORDERS_STORAGE_KEY = 'nardo_orders';
        const DISTRIBUTORS_STORAGE_KEY = 'nardoo_distributors_data';
        
        let cart = [];
        let distributorsData = []; // تخزين بيانات الموزعين من PDF
        let storesState = JSON.parse(localStorage.getItem('stores_state') || '{}');
        
        // ============================================
        // دوال الإشعارات
        // ============================================
        function showNotification(msg, type = 'success') {
            const n = document.createElement('div');
            n.className = `notification ${type}`;
            n.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i> ${msg}`;
            document.body.appendChild(n);
            setTimeout(() => n.remove(), 3000);
        }
        
        // ============================================
        // جلب PDF من القناة (الرسالة المثبتة)
        // ============================================
        async function fetchDistributorsFromChannel() {
            showNotification('📡 جلب بيانات الموزعين من القناة...', 'info');
            
            try {
                // 1. جلب معلومات القناة (بما فيها الرسالة المثبتة)
                const chatResponse = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getChat?chat_id=${TELEGRAM.channelId}`);
                const chatData = await chatResponse.json();
                
                if (!chatData.ok || !chatData.result.pinned_message) {
                    showNotification('⚠️ لا توجد رسالة مثبتة في القناة', 'warning');
                    return;
                }
                
                const pinnedMsg = chatData.result.pinned_message;
                
                if (!pinnedMsg.document || pinnedMsg.document.mime_type !== 'application/pdf') {
                    showNotification('⚠️ الرسالة المثبتة لا تحتوي على ملف PDF', 'warning');
                    return;
                }
                
                // 2. الحصول على رابط PDF
                const fileResponse = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getFile?file_id=${pinnedMsg.document.file_id}`);
                const fileData = await fileResponse.json();
                const pdfUrl = `https://api.telegram.org/file/bot${TELEGRAM.botToken}/${fileData.result.file_path}`;
                
                // 3. استخراج النص من PDF
                await extractDistributorsFromPDF(pdfUrl);
                
            } catch (error) {
                console.error('Error:', error);
                showNotification('❌ فشل جلب الملف: ' + error.message, 'error');
            }
        }
        
        // استخراج بيانات الموزعين من PDF
        async function extractDistributorsFromPDF(pdfUrl) {
            try {
                const loadingTask = pdfjsLib.getDocument(pdfUrl);
                const pdf = await loadingTask.promise;
                let fullText = '';
                
                showNotification(`📄 جاري استخراج البيانات من ${pdf.numPages} صفحة...`, 'info');
                
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    const pageText = textContent.items.map(item => item.str).join(' ');
                    fullText += pageText + '\n';
                }
                
                // تحليل النص واستخراج الموزعين
                const extractedData = parseDistributorsFromText(fullText);
                
                if (extractedData.length > 0) {
                    distributorsData = extractedData;
                    localStorage.setItem(DISTRIBUTORS_STORAGE_KEY, JSON.stringify(distributorsData));
                    showNotification(`✅ تم استيراد ${extractedData.length} موزع بنجاح`, 'success');
                    
                    // تحديث قائمة الولايات في النموذج
                    updateStatesList();
                } else {
                    // بيانات تجريبية للاختبار
                    distributorsData = getDemoDistributors();
                    localStorage.setItem(DISTRIBUTORS_STORAGE_KEY, JSON.stringify(distributorsData));
                    showNotification(`📦 تم تحميل ${distributorsData.length} موزع تجريبي`, 'info');
                    updateStatesList();
                }
                
            } catch (error) {
                console.error('PDF extraction error:', error);
                // بيانات تجريبية للاختبار
                distributorsData = getDemoDistributors();
                localStorage.setItem(DISTRIBUTORS_STORAGE_KEY, JSON.stringify(distributorsData));
                showNotification(`📦 تم تحميل ${distributorsData.length} موزع تجريبي`, 'info');
                updateStatesList();
            }
        }
        
        // بيانات تجريبية للموزعين
        function getDemoDistributors() {
            return [
                { name: "شركة البراق للتوصيل", manager: "أحمد", phone: "0555123456", type: "delivery", stateCode: "ALG", stateName: "الجزائر" },
                { name: "شركة السريع", manager: "محمد", phone: "0555234567", type: "delivery", stateCode: "ALG", stateName: "الجزائر" },
                { name: "موزع الجزائر", manager: "علي", phone: "0555345678", type: "distributor", stateCode: "ALG", stateName: "الجزائر" },
                { name: "شركة الأمان", manager: "سعيد", phone: "0555456789", type: "both", stateCode: "ORA", stateName: "وهران" },
                { name: "موزع وهران", manager: "خالد", phone: "0555567890", type: "distributor", stateCode: "ORA", stateName: "وهران" },
                { name: "شركة الصحراء", manager: "يوسف", phone: "0555678901", type: "delivery", stateCode: "CON", stateName: "قسنطينة" },
                { name: "موزع قسنطينة", manager: "سمير", phone: "0555789012", type: "distributor", stateCode: "CON", stateName: "قسنطينة" },
                { name: "شركة البريد", manager: "نادر", phone: "0555890123", type: "delivery", stateCode: "SET", stateName: "سطيف" },
                { name: "موزع سطيف", manager: "فؤاد", phone: "0555901234", type: "distributor", stateCode: "SET", stateName: "سطيف" },
                { name: "شركة عنابة", manager: "رياض", phone: "0556012345", type: "delivery", stateCode: "ANA", stateName: "عنابة" }
            ];
        }
        
        // تحليل النص واستخراج الموزعين
        function parseDistributorsFromText(text) {
            const extractedData = [];
            const lines = text.split('\n');
            let currentState = null;
            
            const statePattern = /(?:ولاية|📍)\s*([^\d\(\)]+?)\s*\(([A-Z]{3})\)/i;
            
            // قائمة الولايات للمطابقة
            const stateNames = {
                'الجزائر': 'ALG', 'وهران': 'ORA', 'قسنطينة': 'CON', 'عنابة': 'ANA',
                'سطيف': 'SET', 'تيزي وزو': 'TIZ', 'بجاية': 'BJA', 'باتنة': 'BAT',
                'البليدة': 'BLD', 'تلمسان': 'TLM', 'بسكرة': 'BSK', 'الشلف': 'CHL'
            };
            
            for (const line of lines) {
                const trimmedLine = line.trim();
                if (!trimmedLine) continue;
                
                // البحث عن اسم الولاية
                const stateMatch = trimmedLine.match(statePattern);
                if (stateMatch) {
                    currentState = {
                        name: stateMatch[1].trim(),
                        code: stateMatch[2].trim()
                    };
                    continue;
                }
                
                // البحث عن الموزعين
                if (currentState && (trimmedLine.includes('🚚') || trimmedLine.includes('📦') || trimmedLine.includes('🔄'))) {
                    let companyName = '';
                    let serviceType = 'distributor';
                    
                    if (trimmedLine.includes('🚚')) {
                        serviceType = 'delivery';
                        companyName = trimmedLine.replace(/[🚚\s]+/, '').trim();
                    } else if (trimmedLine.includes('📦')) {
                        serviceType = 'distributor';
                        companyName = trimmedLine.replace(/[📦\s]+/, '').trim();
                    } else if (trimmedLine.includes('🔄')) {
                        serviceType = 'both';
                        companyName = trimmedLine.replace(/[🔄\s]+/, '').trim();
                    }
                    
                    // استخراج اسم المسؤول والهاتف من السطور التالية
                    let managerName = 'غير محدد';
                    let phone = 'غير متوفر';
                    
                    if (companyName && companyName.length > 2 && companyName.length < 100) {
                        extractedData.push({
                            id: Date.now() + Math.random(),
                            name: companyName.substring(0, 100),
                            manager: managerName,
                            phone: phone,
                            type: serviceType,
                            stateCode: currentState.code,
                            stateName: currentState.name
                        });
                    }
                }
            }
            
            // إزالة التكرارات
            const uniqueData = [];
            const keys = new Set();
            for (const item of extractedData) {
                const key = `${item.name}_${item.stateCode}`;
                if (!keys.has(key)) {
                    keys.add(key);
                    uniqueData.push(item);
                }
            }
            
            return uniqueData;
        }
        
        // تحديث قائمة الولايات في النموذج
        function updateStatesList() {
            const stateSelect = document.getElementById('customerState');
            if (!stateSelect) return;
            
            const uniqueStates = [...new Map(distributorsData.map(d => [d.stateCode, { code: d.stateCode, name: d.stateName }])).values()];
            uniqueStates.sort((a, b) => a.name.localeCompare(b.name));
            
            stateSelect.innerHTML = '<option value="">اختر الولاية</option>';
            uniqueStates.forEach(state => {
                const count = distributorsData.filter(d => d.stateCode === state.code).length;
                const option = document.createElement('option');
                option.value = state.code;
                option.textContent = `${state.name} (${state.code}) - ${count} موزع`;
                stateSelect.appendChild(option);
            });
        }
        
        // عرض قائمة الموزعين حسب الولاية المختارة
        function updateDistributorsList() {
            const selectedState = document.getElementById('customerState').value;
            const distributorGroup = document.getElementById('distributorGroup');
            const distributorsList = document.getElementById('distributorsList');
            
            if (!selectedState) {
                distributorGroup.style.display = 'none';
                return;
            }
            
            const stateDistributors = distributorsData.filter(d => d.stateCode === selectedState);
            
            if (stateDistributors.length === 0) {
                distributorGroup.style.display = 'none';
                showNotification('⚠️ لا يوجد موزعون متاحون في هذه الولاية', 'warning');
                return;
            }
            
            distributorGroup.style.display = 'block';
            
            let html = '';
            stateDistributors.forEach((dist, index) => {
                const typeIcon = dist.type === 'delivery' ? '🚚' : (dist.type === 'distributor' ? '📦' : '🔄');
                const typeText = dist.type === 'delivery' ? 'شركة توصيل' : (dist.type === 'distributor' ? 'موزع معتمد' : 'كليهما');
                
                html += `
                    <div class="distributor-option" onclick="selectDistributor('${dist.name.replace(/'/g, "\\'")}', '${dist.phone}', '${dist.type}')">
                        <div class="distributor-name">${typeIcon} ${dist.name}</div>
                        <div class="distributor-type">${typeText}</div>
                        <div class="distributor-phone"><i class="fas fa-phone"></i> ${dist.phone}</div>
                    </div>
                `;
            });
            
            distributorsList.innerHTML = html;
        }
        
        // اختيار موزع
        let selectedDistributorData = null;
        
        function selectDistributor(name, phone, type) {
            selectedDistributorData = { name, phone, type };
            
            // تحديث واجهة الاختيار
            document.querySelectorAll('.distributor-option').forEach(opt => {
                opt.classList.remove('selected');
                if (opt.querySelector('.distributor-name')?.innerText.includes(name)) {
                    opt.classList.add('selected');
                }
            });
            
            showNotification(`✅ تم اختيار ${name} كموزع للطلب`, 'success');
        }
        
        // ============================================
        // دوال إدارة السلة
        // ============================================
        function saveCart() { localStorage.setItem(CART_STORAGE_KEY, JSON.stringify(cart)); updateCartCounters(); }
        
        function loadCart() { 
            const saved = localStorage.getItem(CART_STORAGE_KEY); 
            cart = saved ? JSON.parse(saved) : []; 
            updateCartDisplay(); 
            updateCartCounters(); 
        }
        
        function updateCartCounters() { 
            const count = cart.reduce((s, i) => s + i.quantity, 0); 
            const total = cart.reduce((s, i) => s + (i.price * i.quantity), 0); 
            document.getElementById('cartCount').textContent = count; 
            document.getElementById('cartTotal').textContent = total.toLocaleString('ar-EG'); 
        }
        
        function updateCartQuantity(productId, change) { 
            const idx = cart.findIndex(i => i.id === productId); 
            if (idx === -1) return; 
            const newQ = cart[idx].quantity + change; 
            if (newQ <= 0) removeFromCart(productId); 
            else { 
                cart[idx].quantity = newQ; 
                saveCart(); 
                updateCartDisplay(); 
            } 
        }
        
        function removeFromCart(productId) { 
            cart = cart.filter(i => i.id !== productId); 
            saveCart(); 
            updateCartDisplay(); 
        }
        
        function clearCart() { 
            if (cart.length === 0) showNotification('السلة فارغة', 'warning'); 
            else if (confirm('مسح السلة؟')) { 
                cart = []; 
                saveCart(); 
                updateCartDisplay(); 
                showNotification('✓ تم مسح السلة'); 
            } 
        }
        
        // ============================================
        // دوال التجميع والعرض
        // ============================================
        function groupByStore(items) { 
            const g = {}; 
            items.forEach(item => { 
                const sid = item.storeID || 'unknown-store'; 
                const sname = item.storeName || 'ناردو برو'; 
                if (!g[sid]) g[sid] = { storeID: sid, storeName: sname, items: [], total: 0, count: 0 }; 
                g[sid].items.push(item); 
                g[sid].total += item.price * item.quantity; 
                g[sid].count += item.quantity; 
            }); 
            return g; 
        }
        
        function updateCartDisplay() {
            const container = document.getElementById('cartContainer');
            if (!container) return;
            
            if (cart.length === 0) { 
                container.innerHTML = `<div class="empty-state"><i class="fas fa-shopping-basket"></i><h3>السلة فارغة</h3><button class="btn btn-gold" onclick="window.location.href='index.html'">تصفح المنتجات</button></div>`; 
                return; 
            }
            
            const grouped = groupByStore(cart);
            let grandTotal = 0, grandCount = 0, storesHtml = '';
            
            for (const [sid, sd] of Object.entries(grouped)) { 
                grandTotal += sd.total; 
                grandCount += sd.count; 
                const isCollapsed = storesState[sid] === true; 
                let itemsHtml = '';
                
                sd.items.forEach(it => { 
                    itemsHtml += `
                        <div class="cart-item">
                            <div class="product-thumbnail"><i class="fas fa-box"></i></div>
                            <div class="product-details">
                                <div class="product-name">${it.name}</div>
                                <div class="product-price">${it.price.toLocaleString()} دج</div>
                            </div>
                            <div class="cart-item-quantity">
                                <button onclick="updateCartQuantity(${it.id},-1)">−</button>
                                <span>${it.quantity}</span>
                                <button onclick="updateCartQuantity(${it.id},1)">+</button>
                            </div>
                            <div class="cart-item-total">${(it.price * it.quantity).toLocaleString()} دج</div>
                            <button class="cart-item-remove" onclick="removeFromCart(${it.id})"><i class="fas fa-trash-alt"></i> حذف</button>
                        </div>
                    `;
                });
                
                storesHtml += `
                    <div class="merchant-section">
                        <div class="merchant-header" onclick="toggleStore('${sid.replace(/'/g, "\\'")}')">
                            <div class="merchant-info">
                                <div class="merchant-avatar"><i class="fas fa-store"></i></div>
                                <div>
                                    <div class="merchant-name">${sd.storeName}</div>
                                    <div class="merchant-stats"><span>📦 ${sd.count}</span><span>💰 ${sd.total.toLocaleString()} دج</span></div>
                                </div>
                            </div>
                            <div class="merchant-toggle ${isCollapsed ? 'collapsed' : ''}"><i class="fas fa-chevron-down"></i></div>
                        </div>
                        <div class="merchant-products ${isCollapsed ? 'collapsed' : ''}">${itemsHtml}</div>
                    </div>
                `;
            }
            
            container.innerHTML = storesHtml + `
                <div class="cart-summary">
                    <div class="summary-row"><span class="summary-label">عدد العناصر:</span><span class="summary-value">${grandCount}</span></div>
                    <div class="summary-row"><span class="summary-label">عدد المتاجر:</span><span class="summary-value">${Object.keys(grouped).length}</span></div>
                    <div class="summary-row"><span class="summary-label">الإجمالي النهائي:</span><span class="summary-value summary-total">${grandTotal.toLocaleString()} دج</span></div>
                    <div class="cart-actions">
                        <button class="btn btn-success" onclick="openCustomerModal()">إتمام الطلب</button>
                        <button class="btn btn-outline" onclick="clearCart()">إفراغ السلة</button>
                    </div>
                </div>
            `;
        }
        
        function toggleStore(storeID) { 
            storesState[storeID] = !storesState[storeID]; 
            localStorage.setItem('stores_state', JSON.stringify(storesState)); 
            updateCartDisplay(); 
        }
        
        // ============================================
        // دوال الطلب والإرسال
        // ============================================
        function openCustomerModal() { 
            if (cart.length === 0) { 
                showNotification('السلة فارغة', 'warning'); 
                return; 
            }
            
            // تحميل بيانات الموزعين من localStorage إذا وجدت
            const saved = localStorage.getItem(DISTRIBUTORS_STORAGE_KEY);
            if (saved) {
                distributorsData = JSON.parse(saved);
                updateStatesList();
            } else {
                // محاولة جلب البيانات من القناة
                fetchDistributorsFromChannel();
            }
            
            document.getElementById('customerName').value = localStorage.getItem('nardo_customer_name') || '';
            document.getElementById('customerPhone').value = '';
            document.getElementById('customerState').value = '';
            document.getElementById('customerAddress').value = '';
            document.getElementById('customerNotes').value = '';
            document.getElementById('distributorGroup').style.display = 'none';
            selectedDistributorData = null;
            
            document.getElementById('customerModal').style.display = 'flex'; 
        }
        
        function closeModal() { 
            document.getElementById('customerModal').style.display = 'none'; 
        }
        
        // توليد معرف الطلب
        function generateOrderId(customerName, stateName) {
            const stateCode = (stateName || 'GEN').substring(0, 3).toUpperCase();
            const cleanName = (customerName || 'CUST').replace(/[^\u0600-\u06FFa-zA-Z]/g, '').substring(0, 10);
            const randomNum = Math.floor(Math.random() * 90000 + 10000);
            return `${stateCode}-${cleanName}-${randomNum}`;
        }
        
        // إرسال الطلب إلى تليجرام
        async function sendOrderToTelegram(customerData, groupedStores, grandTotal, distributor) {
            const timestamp = new Date().toLocaleString('ar-EG');
            const mainOrderId = generateOrderId(customerData.name, customerData.state);
            
            let channelMsg = `🟢 *طلب جديد #${mainOrderId}* 🟢\n`;
            channelMsg += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
            channelMsg += `👤 *المشتري:* ${customerData.name}\n`;
            channelMsg += `📞 *الهاتف:* ${customerData.phone}\n`;
            if (customerData.state) channelMsg += `📍 *الولاية:* ${customerData.state}\n`;
            if (customerData.address) channelMsg += `🏠 *العنوان:* ${customerData.address}\n`;
            if (customerData.notes) channelMsg += `📝 *ملاحظات:* ${customerData.notes}\n`;
            if (distributor) {
                channelMsg += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
                channelMsg += `🚚 *الموزع المعين:*\n`;
                channelMsg += `   📛 الاسم: ${distributor.name}\n`;
                channelMsg += `   📞 الهاتف: ${distributor.phone}\n`;
                channelMsg += `   🏷️ النوع: ${distributor.type === 'delivery' ? 'شركة توصيل' : (distributor.type === 'distributor' ? 'موزع معتمد' : 'كليهما')}\n`;
            }
            channelMsg += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n`;
            
            for (const [storeID, storeData] of Object.entries(groupedStores)) {
                channelMsg += `🏪 *${storeData.storeName}*\n`;
                channelMsg += `───────────────────────────────\n`;
                storeData.items.forEach(item => {
                    channelMsg += `🛒 ${item.name}\n`;
                    channelMsg += `   📦 الكمية: ${item.quantity}\n`;
                    channelMsg += `   💰 السعر: ${item.price.toLocaleString()} دج\n`;
                    channelMsg += `   💵 المجموع: ${(item.price * item.quantity).toLocaleString()} دج\n`;
                    channelMsg += `───────────────────────────────\n`;
                });
                channelMsg += `💰 *إجمالي المتجر:* ${storeData.total.toLocaleString()} دج\n`;
                channelMsg += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
            }
            
            channelMsg += `💎 *الإجمالي الكلي:* ${grandTotal.toLocaleString()} دج\n`;
            channelMsg += `📅 *التاريخ:* ${timestamp}\n`;
            channelMsg += `✅ تم استلام الطلب بنجاح، سيتم التواصل معك قريباً`;
            
            try {
                await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/sendMessage`, {
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: TELEGRAM.channelId, text: channelMsg, parse_mode: 'Markdown' })
                });
                
                // حفظ الطلب محلياً
                saveOrderLocally(customerData, groupedStores, mainOrderId, timestamp, distributor);
                return true;
            } catch (e) {
                console.error(e);
                return false;
            }
        }
        
        function saveOrderLocally(customerData, groupedStores, mainOrderId, timestamp, distributor) {
            let allOrders = JSON.parse(localStorage.getItem(ORDERS_STORAGE_KEY) || '[]');
            
            for (const [storeID, storeData] of Object.entries(groupedStores)) {
                allOrders.unshift({ 
                    id: `${mainOrderId}-${storeID.substring(0, 5)}`, 
                    originalOrderId: mainOrderId,
                    date: timestamp, 
                    customerName: customerData.name, 
                    customerPhone: customerData.phone, 
                    customerAddress: customerData.address,
                    customerState: customerData.state,
                    customerNotes: customerData.notes, 
                    storeID: storeID, 
                    storeName: storeData.storeName, 
                    items: storeData.items, 
                    total: storeData.total, 
                    distributor: distributor,
                    status: 'pending'
                });
            }
            
            localStorage.setItem(ORDERS_STORAGE_KEY, JSON.stringify(allOrders));
            renderOrdersArchive();
        }
        
        async function submitOrder() {
            const name = document.getElementById('customerName').value.trim();
            const phone = document.getElementById('customerPhone').value.trim();
            const stateCode = document.getElementById('customerState').value;
            const address = document.getElementById('customerAddress').value.trim();
            const notes = document.getElementById('customerNotes').value.trim();
            
            // الحصول على اسم الولاية من الكود
            const stateObj = distributorsData.find(d => d.stateCode === stateCode);
            const stateName = stateObj ? stateObj.stateName : stateCode;
            
            if (!name) { showNotification('الرجاء إدخال الاسم', 'error'); return; }
            if (!phone) { showNotification('الرجاء إدخال رقم الهاتف', 'error'); return; }
            if (!selectedDistributorData) { showNotification('الرجاء اختيار موزع', 'error'); return; }
            
            localStorage.setItem('nardo_customer_name', name);
            
            const grouped = groupByStore(cart);
            const grandTotal = cart.reduce((s, i) => s + (i.price * i.quantity), 0);
            
            const customerData = { name, phone, address, state: stateName, notes };
            
            showNotification('جاري إرسال الطلب...', 'info');
            
            const success = await sendOrderToTelegram(customerData, grouped, grandTotal, selectedDistributorData);
            
            closeModal();
            
            if (success) {
                cart = [];
                saveCart();
                updateCartDisplay();
                showNotification('✓ تم إرسال الطلب بنجاح!', 'success');
                renderOrdersArchive();
            } else {
                showNotification('❌ فشل إرسال الطلب', 'error');
            }
        }
        
        function renderOrdersArchive() {
            const container = document.getElementById('ordersArchiveContainer');
            if (!container) return;
            const orders = JSON.parse(localStorage.getItem(ORDERS_STORAGE_KEY) || '[]');
            if (orders.length === 0) { 
                container.innerHTML = '<p style="text-align:center; color: var(--text-secondary);">لا توجد طلبات سابقة</p>'; 
                return; 
            }
            container.innerHTML = orders.map(o => `
                <div class="order-card">
                    <div class="order-card-header">
                        <span class="order-id">#${o.originalOrderId || o.id}</span>
                        <span class="order-status ${o.status === 'pending' ? 'status-pending' : (o.status === 'received' ? 'status-received' : 'status-approved')}">
                            ${o.status === 'pending' ? '⏳ قيد المعالجة' : (o.status === 'received' ? '📦 وصل للتاجر' : '✅ تم التوصيل')}
                        </span>
                    </div>
                    <div class="order-details">
                        <div>🏪 ${o.storeName}</div>
                        <div>📅 ${o.date}</div>
                        <div>📍 ${o.customerState || ''} - ${o.customerAddress || ''}</div>
                        ${o.distributor ? `<div>🚚 الموزع: ${o.distributor.name}</div>` : ''}
                        <div>💰 ${o.total.toLocaleString()} دج</div>
                    </div>
                </div>
            `).join('');
        }
        
        // ============================================
        // التهيئة الأولية
        // ============================================
        window.onload = function() {
            loadCart();
            renderOrdersArchive();
            
            // تحميل بيانات الموزعين المخزنة
            const savedDistributors = localStorage.getItem(DISTRIBUTORS_STORAGE_KEY);
            if (savedDistributors) {
                distributorsData = JSON.parse(savedDistributors);
                updateStatesList();
            } else {
                // محاولة جلب البيانات من القناة
                setTimeout(() => {
                    fetchDistributorsFromChannel();
                }, 1000);
            }
        };
        
        // ربط الدوال بالكائن العمومي
        window.updateCartQuantity = updateCartQuantity;
        window.removeFromCart = removeFromCart;
        window.clearCart = clearCart;
        window.toggleStore = toggleStore;
        window.openCustomerModal = openCustomerModal;
        window.closeModal = closeModal;
        window.submitOrder = submitOrder;
        window.updateDistributorsList = updateDistributorsList;
        window.selectDistributor = selectDistributor;
        window.fetchDistributorsFromChannel = fetchDistributorsFromChannel;
    </script>
</body>
</html>
