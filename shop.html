<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ناردو برو - سلتي | نظام طلبات متكامل</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* ============================================ */
        /* 1.0 - المتغيرات العامة وإعدادات CSS الأساسية    */
        /* ============================================ */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --gold: #ffd700;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --glass: rgba(255, 255, 255, 0.05);
            --success: #4ade80;
            --error: #f87171;
            --warning: #fbbf24;
            --info: #60a5fa;
        }
        
        /* 1.1 - ألوان المتاجر المخصصة */
        .merchant-color-0 { border-right: 5px solid #ff6b6b; }
        .merchant-color-1 { border-right: 5px solid #4ecdc4; }
        .merchant-color-2 { border-right: 5px solid #45b7d1; }
        .merchant-color-3 { border-right: 5px solid #96ceb4; }
        .merchant-color-4 { border-right: 5px solid #ffeaa7; }
        .merchant-color-5 { border-right: 5px solid #dfe6e9; }
        .merchant-color-6 { border-right: 5px solid #fd79a8; }
        .merchant-color-7 { border-right: 5px solid #e84393; }
        .merchant-color-8 { border-right: 5px solid #6c5ce7; }
        .merchant-color-9 { border-right: 5px solid #a29bfe; }
        
        /* 1.2 - أنماط الجسم الرئيسي والعناصر العامة */
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0f3460, #16213e);
            color: var(--text-primary);
            direction: rtl;
        }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        
        /* 1.3 - أنماط رأس الصفحة */
        .header {
            background: var(--glass);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }
        .header-title { display: flex; align-items: center; gap: 15px; }
        .header-title i { font-size: 40px; color: var(--gold); }
        .header-title h1 { font-size: 32px; color: var(--gold); margin: 0; }
        .header-info { display: flex; gap: 20px; flex-wrap: wrap; }
        .info-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 215, 0, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .info-item:hover { background: rgba(255, 215, 0, 0.2); }
        
        /* 1.4 - أنماط الأزرار */
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s;
        }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-gold:hover { background: #ffed4e; transform: translateY(-2px); }
        .btn-outline { background: transparent; border: 2px solid var(--gold); color: var(--gold); }
        .btn-outline:hover { background: rgba(255, 215, 0, 0.1); }
        .btn-success { background: var(--success); color: #000; }
        .btn-success:hover { background: #5ee890; transform: translateY(-2px); }
        .btn-danger { background: rgba(248, 113, 113, 0.2); border: 1px solid var(--error); color: var(--error); }
        .btn-danger:hover { background: var(--error); color: white; }
        .btn-info { background: linear-gradient(135deg, #60a5fa, #3b82f6); color: white; }
        .btn-info:hover { transform: translateY(-2px); }
        
        /* 1.5 - أنماط أقسام المتاجر */
        .merchant-section {
            background: var(--glass);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 20px;
            margin-bottom: 25px;
            overflow: hidden;
        }
        .merchant-header {
            background: rgba(255, 215, 0, 0.1);
            padding: 20px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            cursor: pointer;
        }
        .merchant-header:hover { background: rgba(255, 215, 0, 0.15); }
        .merchant-info { display: flex; align-items: center; gap: 15px; }
        .merchant-avatar {
            width: 50px;
            height: 50px;
            background: rgba(255, 215, 0, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .merchant-name { font-size: 20px; font-weight: bold; color: var(--gold); }
        .merchant-id { font-size: 12px; color: var(--text-secondary); font-family: monospace; }
        .merchant-stats { display: flex; gap: 20px; font-size: 14px; color: var(--text-secondary); }
        .merchant-stats span { color: var(--gold); font-weight: bold; }
        .merchant-toggle { font-size: 20px; transition: transform 0.3s; }
        .merchant-toggle.collapsed { transform: rotate(-90deg); }
        
        /* 1.6 - أنماط محتوى المتاجر والمنتجات */
        .merchant-products { padding: 20px; }
        .merchant-products.collapsed { display: none; }
        
        /* 1.7 - أنماط عناصر عربة التسوق */
        .cart-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 215, 0, 0.15);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .product-thumbnail {
            width: 70px;
            height: 70px;
            border-radius: 12px;
            overflow: hidden;
            background: rgba(255, 215, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .product-thumbnail img { width: 100%; height: 100%; object-fit: cover; }
        .product-thumbnail i { font-size: 30px; color: var(--gold); }
        .product-details { flex: 2; min-width: 150px; }
        .product-name { font-size: 16px; font-weight: bold; color: var(--gold); }
        .product-price { font-size: 13px; color: var(--success); }
        .product-id { font-size: 11px; color: var(--text-secondary); margin-top: 5px; }
        .cart-item-quantity {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 215, 0, 0.1);
            padding: 8px 15px;
            border-radius: 10px;
        }
        .cart-item-quantity button {
            background: none;
            border: none;
            color: var(--gold);
            cursor: pointer;
            font-size: 18px;
            width: 30px;
            height: 30px;
            border-radius: 8px;
        }
        .cart-item-quantity button:hover { background: rgba(255, 215, 0, 0.2); }
        .cart-item-quantity span { font-size: 16px; font-weight: bold; min-width: 30px; text-align: center; }
        .cart-item-total { font-size: 16px; font-weight: bold; color: var(--gold); min-width: 100px; text-align: center; }
        .cart-item-remove { background: rgba(248, 113, 113, 0.2); color: var(--error); border: 1px solid var(--error); padding: 8px 15px; border-radius: 10px; cursor: pointer; }
        
        /* 1.8 - أنماط ملخص السلة */
        .cart-summary {
            background: rgba(255, 215, 0, 0.05);
            border-radius: 15px;
            padding: 25px;
            margin-top: 20px;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.1);
        }
        .summary-label { color: var(--text-secondary); }
        .summary-value { color: var(--gold); font-weight: bold; font-size: 18px; }
        .summary-total { font-size: 24px; color: var(--success); }
        .cart-actions { display: flex; gap: 15px; margin-top: 25px; flex-wrap: wrap; }
        .cart-actions .btn { flex: 1; }
        
        /* 1.9 - أنماط النوافذ المنبثقة */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 3000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: var(--secondary);
            border-radius: 20px;
            padding: 30px;
            max-width: 550px;
            width: 90%;
            border: 2px solid var(--gold);
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-content h2 { color: var(--gold); margin-bottom: 20px; text-align: center; }
        .modal-content input, .modal-content select, .modal-content textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: 1px solid rgba(255,215,0,0.3);
            background: rgba(255,255,255,0.1);
            color: white;
            font-family: 'Cairo', sans-serif;
        }
        .modal-content input:focus, .modal-content select:focus {
            outline: none;
            border-color: var(--gold);
        }
        .modal-buttons { display: flex; gap: 15px; margin-top: 20px; }
        
        /* 1.10 - أنماط الحقول الإضافية */
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--gold);
            font-size: 13px;
        }
        
        /* 1.11 - أنماط الحالات الفارغة والإشعارات */
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
        .empty-state i { font-size: 70px; color: var(--gold); }
        .notification {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            max-width: 400px;
            margin: 0 auto;
            padding: 15px 25px;
            border-radius: 12px;
            font-weight: bold;
            z-index: 2000;
            animation: slideIn 0.3s ease;
            text-align: center;
        }
        .notification.success { background: var(--success); color: #000; }
        .notification.error { background: var(--error); color: #fff; }
        .notification.warning { background: var(--warning); color: #000; }
        .notification.info { background: var(--info); color: #fff; }
        @keyframes slideIn {
            from { transform: translateY(-100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        /* 1.12 - أنماط أرشيف الطلبات */
        .order-archive { margin-top: 40px; border-top: 2px dashed rgba(255, 215, 0, 0.2); padding-top: 30px; }
        .order-archive h2 { margin-bottom: 20px; font-size: 24px; color: var(--gold); }
        .order-card {
            background: var(--glass);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .order-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid rgba(255, 215, 0, 0.1); padding-bottom: 10px; }
        .order-id { font-weight: bold; color: var(--gold); font-family: monospace; font-size: 14px; }
        .order-status { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .status-pending { background: rgba(251, 191, 36, 0.2); color: var(--warning); }
        .status-received { background: rgba(96, 165, 250, 0.2); color: var(--info); }
        .status-approved { background: rgba(74, 222, 128, 0.2); color: var(--success); }
        .order-details div { margin-bottom: 8px; font-size: 14px; }
        
        /* 1.13 - استعلامات الوسائط للاستجابة */
        @media (max-width: 768px) {
            .cart-item { flex-direction: column; align-items: stretch; }
            .cart-actions { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div class="container">

    <!-- 3.0 - كود JavaScript (الدوال والمنطق)          -->
    <!-- ============================================ -->
    <script>
        // ============================================
        // 3.1 - الثوابت العامة والإعدادات
        // ============================================
        const TELEGRAM = { botToken: '8576673096:AAGvSMjzwVWj6wJ47JdqiDwcObXjBDcyiLA', channelId: '-1003822964890', apiUrl: 'https://api.telegram.org/bot' };
        const CART_STORAGE_KEY = 'nardoo_cart';
        const ORDERS_STORAGE_KEY = 'nardo_orders';
        let cart = [];
        let storesState = JSON.parse(localStorage.getItem('stores_state') || '{}');
        let storeColors = {};

        // ============================================
        // 3.2 - دوال الألوان وحالة المتاجر
        // ============================================
        function getStoreColor(storeID) { 
            if (!storeColors[storeID]) { 
                const colors = ['merchant-color-0','merchant-color-1','merchant-color-2','merchant-color-3','merchant-color-4','merchant-color-5','merchant-color-6','merchant-color-7','merchant-color-8','merchant-color-9']; 
                const index = Object.keys(storeColors).length % colors.length; 
                storeColors[storeID] = colors[index]; 
            } 
            return storeColors[storeID]; 
        }
        
        function saveStoresState() { localStorage.setItem('stores_state', JSON.stringify(storesState)); }
        function toggleStore(storeID) { storesState[storeID] = !storesState[storeID]; saveStoresState(); updateCartDisplay(); }
        
        // ============================================
        // 3.3 - دوال إدارة السلة (حفظ، تحميل، عدادات)
        // ============================================
        function saveCart() { localStorage.setItem(CART_STORAGE_KEY, JSON.stringify(cart)); updateCartCounters(); }
        
        function loadCart() { 
            const saved = localStorage.getItem(CART_STORAGE_KEY); 
            cart = saved ? JSON.parse(saved) : []; 
            updateCartDisplay(); 
            updateCartCounters(); 
        }
        
        function updateCartCounters() { 
            const count = cart.reduce((s, i) => s + i.quantity, 0); 
            const total = cart.reduce((s, i) => s + (i.price * i.quantity), 0); 
            document.getElementById('cartCount').textContent = count; 
            document.getElementById('cartTotal').textContent = total.toLocaleString('ar-EG'); 
        }
        
        // ============================================
        // 3.4 - دوال الإشعارات
        // ============================================
        function showNotification(m, type='success') { 
            const n = document.createElement('div'); 
            n.className = `notification ${type}`; 
            n.innerHTML = `<i class="fas ${type==='success'?'fa-check-circle':type==='error'?'fa-exclamation-circle':'fa-info-circle'}"></i> ${m}`; 
            document.body.appendChild(n); 
            setTimeout(()=>n.remove(),3000); 
        }
        
        // ============================================
        // 3.5 - دوال تحديث الكمية والحذف من السلة
        // ============================================
        function updateCartQuantity(productId, change) { 
            const idx = cart.findIndex(i=>i.id===productId); 
            if(idx===-1) return; 
            const newQ = cart[idx].quantity+change; 
            if(newQ<=0) removeFromCart(productId); 
            else { 
                cart[idx].quantity=newQ; 
                saveCart(); 
                updateCartDisplay(); 
                showNotification(`✓ تم تحديث كمية ${cart[idx].name}`); 
            } 
        }
        
        function removeFromCart(productId) { 
            const item = cart.find(i=>i.id===productId); 
            if(item){ 
                cart = cart.filter(i=>i.id!==productId); 
                saveCart(); 
                updateCartDisplay(); 
                showNotification(`✓ تم إزالة ${item.name}`); 
            } 
        }
        
        function clearCart() { 
            if(cart.length===0) showNotification('السلة فارغة','warning'); 
            else if(confirm('مسح السلة؟')){ 
                cart=[]; 
                saveCart(); 
                updateCartDisplay(); 
                showNotification('✓ تم مسح السلة'); 
            } 
        }
        
        // ============================================
        // 3.6 - دوال التجميع حسب المتجر
        // ============================================
        function groupByStore(items) { 
            const g={}; 
            items.forEach(item=>{ 
                const sid = item.storeID || 'unknown-store'; 
                const sname = item.storeName || 'ناردو برو'; 
                if(!g[sid]) g[sid]={storeID:sid, storeName:sname, items:[], total:0, count:0}; 
                g[sid].items.push(item); 
                g[sid].total += item.price * item.quantity; 
                g[sid].count += item.quantity; 
            }); 
            return g; 
        }

        // ============================================
        // 3.7 - دوال تنسيق المنتجات للرسائل
        // ============================================
        function formatProductVertical(item) {
            let productMsg = "";
            productMsg += `🛒 ${item.name}\n`;
            productMsg += `   🆔 معرف المنتج: \`${item.productCompositeID || item.id || 'غير محدد'}\`\n`;
            productMsg += `   📦 الكمية: ${item.quantity}\n`;
            productMsg += `   💰 السعر: ${item.price.toLocaleString()} دج\n`;
            productMsg += `   💵 المجموع: ${(item.price * item.quantity).toLocaleString()} دج\n`;
            if(item.imageData) {
                productMsg += `   🖼️ [صورة المنتج](${item.imageData})\n`;
            }
            return productMsg;
        }

        // ============================================
        // 3.8 - دوال توليد معرف الطلب الجديد
        // ============================================
        
        // تحويل اسم الولاية إلى رمز مختصر
        function getStateCode(stateName) {
            const stateCodes = {
                'أدرار': 'ADR', 'الشلف': 'CHL', 'الأغواط': 'LGH', 'أم البواقي': 'UMB',
                'باتنة': 'BAT', 'بجاية': 'BJA', 'بسكرة': 'BSK', 'بشار': 'BSH',
                'البليدة': 'BLD', 'البويرة': 'BOU', 'تمنراست': 'TAM', 'تبسة': 'TEB',
                'تلمسان': 'TLM', 'تيارت': 'TIA', 'تيزي وزو': 'TIZ', 'الجزائر': 'ALG',
                'الجزائر العاصمة': 'ALG', 'الجلفة': 'DJF', 'جيجل': 'JIJ', 'سطيف': 'SET',
                'سعيدة': 'SAI', 'سكيكدة': 'SKI', 'سيدي بلعباس': 'SBA', 'عنابة': 'ANA',
                'قالمة': 'GUE', 'قسنطينة': 'CON', 'المدية': 'MED', 'مستغانم': 'MGT',
                'المسيلة': 'MSL', 'معسكر': 'MSC', 'ورقلة': 'OUA', 'وهران': 'WAH',
                'برج بوعريريج': 'BBA', 'بومرداس': 'BMD', 'الطارف': 'ELF', 'تندوف': 'TIN',
                'تيسمسيلت': 'TIS', 'الوادي': 'ELO', 'خنشلة': 'KHE', 'سوق أهراس': 'SUK',
                'تيبازة': 'TIP', 'ميلة': 'MIL', 'عين الدفلى': 'AIND', 'النعامة': 'NAA',
                'عين تموشنت': 'AINT', 'غرداية': 'GHA', 'غليزان': 'REL'
            };
            
            for (const [key, code] of Object.entries(stateCodes)) {
                if (stateName.includes(key) || key.includes(stateName)) return code;
            }
            
            const cleanName = stateName.replace(/[^\u0600-\u06FFa-zA-Z]/g, '');
            return cleanName.substring(0, 3).toUpperCase() || 'GEN';
        }
        
        // تنظيف اسم المشتري
        function cleanCustomerName(name) {
            let clean = name.replace(/[^\u0600-\u06FFa-zA-Z]/g, '');
            return clean.substring(0, 15) || 'CUST';
        }
        
        // توليد 6 أرقام عشوائية
        function generateRandomNumbers() {
            return Math.floor(Math.random() * 900000 + 100000).toString();
        }
        
        // توليد معرف الطلب الجديد
        function generateOrderId(customerName, stateName) {
            const stateCode = getStateCode(stateName || 'الجزائر');
            const cleanName = cleanCustomerName(customerName);
            const randomNumbers = generateRandomNumbers();
            return `${stateCode}-${cleanName}-${randomNumbers}`;
        }

                        merchantMsg += `📞 *رقم الجوال:* ${customerData.phone}\n`;

                        merchantMsg += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;

        // ============================================
        // 3.10 - دوال حفظ الطلب محلياً
        // ============================================
        function saveOrderLocally(customerData, groupedStores, mainOrderId, timestamp) {
            let allOrders = JSON.parse(localStorage.getItem(ORDERS_STORAGE_KEY) || '[]');
            
            for (const [storeID, storeData] of Object.entries(groupedStores)) {
                allOrders.unshift({ 
                    id: `${mainOrderId}-${storeID.substring(0,5)}`, 
                    originalOrderId: mainOrderId,
                    date: timestamp, 
                    customerName: customerData.name, 
                    customerPhone: customerData.phone, 
                    customerAddress: customerData.address,
                    customerState: customerData.state,
                    customerAddressDetail: customerData.addressDetail,
                    customerNotes: customerData.notes, 
                    storeID: storeID, 
                    storeName: storeData.storeName, 
                    items: storeData.items, 
                    total: storeData.total, 
                    status: 'pending'
                });
            }
            
            localStorage.setItem(ORDERS_STORAGE_KEY, JSON.stringify(allOrders));
            renderOrdersArchive();
        }
        
        // ============================================
        // 3.11 - دوال عرض وإدارة أرشيف الطلبات
        // ============================================
        function renderOrdersArchive() {
            const container = document.getElementById('ordersArchiveContainer');
            if(!container) return;
            const orders = JSON.parse(localStorage.getItem(ORDERS_STORAGE_KEY) || '[]');
            if(orders.length === 0){ 
                container.innerHTML = '<p style="text-align:center; color: var(--text-secondary);">لا توجد طلبات سابقة</p>'; 
                return; 
            }
            container.innerHTML = orders.map(o => `
                <div class="order-card">
                    <div class="order-card-header">
                        <span class="order-id">#${o.originalOrderId || o.id}</span>
                        <span class="order-status ${o.status === 'pending' ? 'status-pending' : (o.status === 'received' ? 'status-received' : 'status-approved')}">
                            ${o.status === 'pending' ? '⏳ قيد المعالجة' : (o.status === 'received' ? '📦 وصل للتاجر' : '✅ تم تعيين الموزع')}
                        </span>
                    </div>
                    <div class="order-details">
                        <div>🏪 ${o.storeName}</div>
                        <div>📅 ${o.date}</div>
                        <div>📍 ${o.customerState ? `${o.customerState} - ` : ''}${o.customerAddressDetail || ''}</div>
                        <div>📦 ${o.items.map(i => `${i.name} (${i.quantity})`).join(', ')}</div>
                        <div>💰 ${o.total.toLocaleString()} دج</div>
                    </div>
                    <div class="cart-actions" style="margin-top:10px;">
                        ${o.status === 'pending' ? `<button class="btn btn-outline" onclick="updateOrderStatus('${o.id}','received')">تأكيد الوصول</button>` : ''}
                        ${o.status === 'received' ? `<button class="btn btn-success" onclick="updateOrderStatus('${o.id}','approved')">الموافقة</button>` : ''}
                        <button class="btn btn-danger" onclick="deleteOrderArchive('${o.id}')">حذف</button>
                    </div>
                </div>
            `).join('');
        }
        
        async function updateOrderStatus(orderId, newStatus) {
            let orders = JSON.parse(localStorage.getItem(ORDERS_STORAGE_KEY) || '[]');
            const idx = orders.findIndex(o => o.id === orderId);
            if(idx !== -1){ 
                orders[idx].status = newStatus; 
                localStorage.setItem(ORDERS_STORAGE_KEY, JSON.stringify(orders)); 
                let statusText = newStatus === 'received' ? '📦 وصل المنتج إلى التاجر' : '✅ تم تعيين الموزع لتوصيل الطلب';
                const msg = `🔄 *تحديث حالة الطلب*\n━━━━━━━━━━━━━━━━━━━━━━\n🆔 رقم الطلب: #${orders[idx].originalOrderId}\n🏪 المتجر: ${orders[idx].storeName}\n👤 المشتري: ${orders[idx].customerName}\n📌 الحالة الجديدة: ${statusText}\n📅 التاريخ: ${new Date().toLocaleString('ar-EG')}\n━━━━━━━━━━━━━━━━━━━━━━`;
                await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/sendMessage`, { 
                    method:'POST', 
                    headers:{'Content-Type':'application/json'}, 
                    body:JSON.stringify({chat_id: TELEGRAM.channelId, text: msg, parse_mode: 'Markdown'}) 
                });
                renderOrdersArchive(); 
                showNotification('تم تحديث حالة الطلب'); 
            }
        }
        
        function deleteOrderArchive(orderId) { 
            let orders = JSON.parse(localStorage.getItem(ORDERS_STORAGE_KEY) || '[]'); 
            orders = orders.filter(o => o.id !== orderId); 
            localStorage.setItem(ORDERS_STORAGE_KEY, JSON.stringify(orders)); 
            renderOrdersArchive(); 
            showNotification('تم حذف الطلب'); 
        }
        
        // ============================================
        // 3.12 - دوال النافذة المنبثقة والطلب
        // ============================================
        let pendingGroupedStores = null, pendingGrandTotal = null;
        
        function loadUserProfile() {
            let userName = '';
            const currentStore = localStorage.getItem('nardo_current_store');
            if (currentStore) {
                try {
                    const store = JSON.parse(currentStore);
                    if (store.storeName) userName = store.storeName;
                } catch(e) {}
            }
            const savedUser = localStorage.getItem('nardo_customer_name');
            if (savedUser && !userName) userName = savedUser;
            if (!userName) userName = 'زائر ناردو برو';
            document.getElementById('customerName').value = userName;
        }
        
        function updateFullAddress() {
            const state = document.getElementById('customerState').value;
            const detail = document.getElementById('customerAddress').value;
            const fullAddress = state && detail ? `${state} - ${detail}` : (state || detail || '');
            document.getElementById('fullAddress').value = fullAddress;
        }
        
        function openMapLocation() {
            const state = document.getElementById('customerState').value;
            const address = document.getElementById('customerAddress').value;
            const query = encodeURIComponent(`${state} ${address}`);
            window.open(`https://www.google.com/maps/search/?api=1&query=${query}`, '_blank');
            showNotification('🗺️ تم فتح الخريطة، يمكنك نسخ العنوان التفصيلي', 'info');
        }
        
        function openCustomerModal() { 
            if(cart.length === 0){ 
                showNotification('السلة فارغة','warning'); 
                return; 
            } 
            pendingGroupedStores = groupByStore(cart); 
            pendingGrandTotal = cart.reduce((s,i) => s + (i.price * i.quantity), 0); 
            
            loadUserProfile();
            document.getElementById('customerPhone').value = '';
            document.getElementById('customerState').value = '';
            document.getElementById('customerAddress').value = '';
            document.getElementById('fullAddress').value = '';
            document.getElementById('customerNotes').value = '';
            
            document.getElementById('customerModal').style.display = 'flex'; 
        }
        
        function closeModal() { 
            document.getElementById('customerModal').style.display = 'none'; 
        }
        
        function saveCustomerName(name) {
            if (name && name !== 'زائر ناردو برو') {
                localStorage.setItem('nardo_customer_name', name);
            }
        }
        
        async function submitOrder() {
            const name = document.getElementById('customerName').value.trim(); 
            const phone = document.getElementById('customerPhone').value.trim(); 
            const state = document.getElementById('customerState').value;
            const addressDetail = document.getElementById('customerAddress').value.trim();
            const fullAddress = document.getElementById('fullAddress').value.trim();
            const notes = document.getElementById('customerNotes').value.trim();
            
            if(!name){ 
                showNotification('الرجاء إدخال الاسم','error'); 
                return; 
            }
            if(!phone){ 
                showNotification('الرجاء إدخال رقم الهاتف','error'); 
                return; 
            }
            if(!state && !addressDetail){ 
                showNotification('الرجاء إدخال العنوان (الولاية أو العنوان التفصيلي)','error'); 
                return; 
            }
            
            saveCustomerName(name);
            
            const finalAddress = fullAddress || (state && addressDetail ? `${state} - ${addressDetail}` : (state || addressDetail));
            
            const customerData = {
                name, phone, address: finalAddress,
                state: state, addressDetail: addressDetail, notes
            };
            
            const currentGrouped = pendingGroupedStores;
            const currentTotal = pendingGrandTotal;
            
            if(!currentGrouped || Object.keys(currentGrouped).length === 0) {
                showNotification('لا توجد منتجات في السلة','error');
                closeModal();
                return;
            }
            
            showNotification('جاري إرسال الطلب...','info');
            
            const success = await sendOrderToTelegram(customerData, currentGrouped, currentTotal);
            
            closeModal();
            
            if(success){
                cart = [];
                saveCart();
                updateCartDisplay();
                showNotification('✓ تم إرسال الطلب بنجاح! سيتم التواصل معك قريباً', 'success');
                renderOrdersArchive();
            } else {
                showNotification('❌ فشل إرسال الطلب. يرجى التحقق من الاتصال والمحاولة مرة أخرى', 'error');
            }
            
            pendingGroupedStores = null;
            pendingGrandTotal = null;
        }

        // 3.13 - دوال عرض السلة الأساسية

                        </div>

                });
                
                storesHtml += `
                    <div class="merchant-section ${colorClass}">

                            <div class="merchant-info">
                                <div class="merchant-avatar"><i class="fas fa-store"></i></div>
                                <div>
                                    <div class="merchant-name">${sd.storeName}</div>
                                    <div class="merchant-id">🆔 ${sid}</div>

                <div class="cart-summary">
                    <div class="summary-row"><span class="summary-label">عدد العناصر:</span><span class="summary-value">${grandCount}</span></div>
                    <div class="summary-row"><span class="summary-label">عدد المتاجر:</span><span class="summary-value">${Object.keys(grouped).length}</span></div>
                    <div class="summary-row"><span class="summary-label">الإجمالي النهائي:</span><span class="summary-value summary-total">${grandTotal.toLocaleString()} دج</span></div>
                    <div class="cart-actions">
                        <button class="btn btn-success" onclick="openCustomerModal()">إتمام الطلب</button>
                        <button class="btn btn-outline" onclick="clearCart()">إفراغ السلة</button>
                    </div>
                </div>
            `;
        }
        
        // ============================================
        // 3.14 - مستمعات الأحداث والتهيئة الأولية
        // ============================================
        window.addEventListener('storage', e => { 
            if(e.key === CART_STORAGE_KEY){ 
                cart = e.newValue ? JSON.parse(e.newValue) : []; 
                updateCartDisplay(); 
                updateCartCounters(); 
            } 
        });
        
        loadCart(); 
        renderOrdersArchive();
        
        // ربط الدوال بالكائن العمومي window
        window.updateCartQuantity = updateCartQuantity; 
        window.removeFromCart = removeFromCart; 
        window.clearCart = clearCart; 
        window.toggleStore = toggleStore; 
        window.openCustomerModal = openCustomerModal; 
        window.closeModal = closeModal; 
        window.submitOrder = submitOrder; 
        window.updateOrderStatus = updateOrderStatus; 
        window.deleteOrderArchive = deleteOrderArchive;
        window.updateFullAddress = updateFullAddress;
        window.openMapLocation = openMapLocation;
    </script>
</body>
</html>
