<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ناردو برو - سلتي | نظام طلبات متكامل</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --gold: #ffd700;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --glass: rgba(255, 255, 255, 0.05);
            --success: #4ade80;
            --error: #f87171;
            --warning: #fbbf24;
            --info: #60a5fa;
        }
        
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0f3460, #16213e);
            color: var(--text-primary);
            direction: rtl;
        }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        
        .header {
            background: var(--glass);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }
        .header-title { display: flex; align-items: center; gap: 15px; }
        .header-title i { font-size: 40px; color: var(--gold); }
        .header-title h1 { font-size: 32px; color: var(--gold); margin: 0; }
        .header-info { display: flex; gap: 20px; flex-wrap: wrap; }
        .info-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 215, 0, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .info-item:hover { background: rgba(255, 215, 0, 0.2); }
        
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s;
        }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-gold:hover { background: #ffed4e; transform: translateY(-2px); }
        .btn-outline { background: transparent; border: 2px solid var(--gold); color: var(--gold); }
        .btn-outline:hover { background: rgba(255, 215, 0, 0.1); }
        .btn-danger { background: rgba(248, 113, 113, 0.2); border: 1px solid var(--error); color: var(--error); }
        .btn-danger:hover { background: var(--error); color: white; }
        
        .merchant-section {
            background: var(--glass);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 20px;
            margin-bottom: 25px;
            overflow: hidden;
        }
        .merchant-header {
            background: rgba(255, 215, 0, 0.1);
            padding: 20px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            cursor: pointer;
        }
        .merchant-header:hover { background: rgba(255, 215, 0, 0.15); }
        .merchant-info { display: flex; align-items: center; gap: 15px; }
        .merchant-avatar {
            width: 50px;
            height: 50px;
            background: rgba(255, 215, 0, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .merchant-name { font-size: 20px; font-weight: bold; color: var(--gold); }
        .merchant-id { font-size: 11px; color: var(--text-secondary); font-family: monospace; }
        .merchant-stats { display: flex; gap: 20px; font-size: 14px; color: var(--text-secondary); }
        .merchant-stats span { color: var(--gold); font-weight: bold; }
        .merchant-toggle { font-size: 20px; transition: transform 0.3s; }
        .merchant-toggle.collapsed { transform: rotate(-90deg); }
        .merchant-products { padding: 20px; }
        .merchant-products.collapsed { display: none; }
        
        .cart-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 215, 0, 0.15);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .product-thumbnail {
            width: 70px;
            height: 70px;
            border-radius: 12px;
            background: rgba(255, 215, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .product-thumbnail i { font-size: 30px; color: var(--gold); }
        .product-thumbnail img { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; }
        .product-details { flex: 2; min-width: 150px; }
        .product-name { font-size: 16px; font-weight: bold; color: var(--gold); }
        .product-price { font-size: 13px; color: var(--success); }
        .product-store { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }
        .cart-item-quantity {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 215, 0, 0.1);
            padding: 8px 15px;
            border-radius: 10px;
        }
        .cart-item-quantity button {
            background: none;
            border: none;
            color: var(--gold);
            cursor: pointer;
            font-size: 18px;
            width: 30px;
            height: 30px;
            border-radius: 8px;
        }
        .cart-item-quantity button:hover { background: rgba(255, 215, 0, 0.2); }
        .cart-item-quantity span { font-size: 16px; font-weight: bold; min-width: 30px; text-align: center; }
        .cart-item-total { font-size: 16px; font-weight: bold; color: var(--gold); min-width: 100px; text-align: center; }
        .cart-item-remove { background: rgba(248, 113, 113, 0.2); color: var(--error); border: 1px solid var(--error); padding: 8px 15px; border-radius: 10px; cursor: pointer; }
        .cart-item-remove:hover { background: var(--error); color: white; }
        
        .cart-summary {
            background: rgba(255, 215, 0, 0.05);
            border-radius: 15px;
            padding: 25px;
            margin-top: 20px;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.1);
        }
        .summary-label { color: var(--text-secondary); }
        .summary-value { color: var(--gold); font-weight: bold; font-size: 18px; }
        .summary-total { font-size: 24px; color: var(--success); }
        .cart-actions { display: flex; gap: 15px; margin-top: 25px; flex-wrap: wrap; }
        .cart-actions .btn { flex: 1; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 3000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: var(--secondary);
            border-radius: 20px;
            padding: 30px;
            max-width: 550px;
            width: 90%;
            border: 2px solid var(--gold);
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-content h2 { color: var(--gold); margin-bottom: 20px; text-align: center; }
        .modal-content input, .modal-content select, .modal-content textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: 1px solid rgba(255,215,0,0.3);
            background: rgba(255,255,255,0.1);
            color: white;
            font-family: 'Cairo', sans-serif;
        }
        .modal-content input:focus, .modal-content select:focus {
            outline: none;
            border-color: var(--gold);
        }
        .modal-buttons { display: flex; gap: 15px; margin-top: 20px; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--gold);
            font-size: 13px;
        }
        
        .distributors-section {
            background: rgba(255, 215, 0, 0.05);
            border: 2px solid rgba(255, 215, 0, 0.2);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .distributors-section h3 {
            color: var(--gold);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .distributor-item {
            background: rgba(0, 0, 0, 0.3);
            border-right: 4px solid var(--gold);
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 10px;
            transition: all 0.3s;
            cursor: pointer;
        }
        .distributor-item:hover {
            background: rgba(255, 215, 0, 0.15);
            transform: translateX(-5px);
        }
        .distributor-item.selected {
            background: rgba(255, 215, 0, 0.25);
            border-right: 4px solid var(--success);
        }
        .distributor-name {
            font-weight: bold;
            color: var(--gold);
            font-size: 16px;
            margin-bottom: 5px;
        }
        .distributor-type {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 12px;
            margin-bottom: 8px;
            font-weight: bold;
        }
        .type-delivery { background: rgba(96, 165, 250, 0.2); color: var(--info); }
        .type-distributor { background: rgba(74, 222, 128, 0.2); color: var(--success); }
        .distributor-info { font-size: 13px; color: var(--text-secondary); margin-top: 5px; }
        .distributor-id { font-family: monospace; color: var(--gold); }
        
        .notification {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            max-width: 400px;
            margin: 0 auto;
            padding: 15px 20px;
            border-radius: 10px;
            background: rgba(0,0,0,0.9);
            border: 2px solid var(--gold);
            color: white;
            z-index: 4000;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { transform: translateY(-100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .notification.success { border-color: var(--success); }
        .notification.error { border-color: var(--error); }
        .notification.warning { border-color: var(--warning); }
        .notification.info { border-color: var(--info); }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
        .empty-state i { font-size: 70px; margin-bottom: 20px; color: var(--gold); }
        
        .order-card {
            background: var(--glass);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
        }
        .order-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.1);
        }
        .order-id { color: var(--gold); font-weight: bold; font-size: 16px; font-family: monospace; }
        .order-status { padding: 5px 12px; border-radius: 8px; font-size: 12px; font-weight: bold; }
        .status-pending { background: rgba(251, 191, 36, 0.2); color: var(--warning); }
        .status-received { background: rgba(96, 165, 250, 0.2); color: var(--info); }
        .status-approved { background: rgba(74, 222, 128, 0.2); color: var(--success); }
        .order-details {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 15px;
            font-size: 14px;
        }
        .order-details div { color: var(--text-secondary); }
        .order-items-list { margin-bottom: 15px; }
        .order-item-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 215, 0, 0.05);
            font-size: 13px;
        }
        .order-card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 215, 0, 0.1);
        }
        .btn-delete-order {
            background: rgba(248, 113, 113, 0.2);
            color: var(--error);
            border: 1px solid var(--error);
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
        }
        .btn-delete-order:hover { background: var(--error); color: white; }
        
        @media (max-width: 768px) {
            .cart-item { flex-direction: column; align-items: stretch; }
            .cart-actions { flex-direction: column; }
            .merchant-header { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-title">
                <i class="fas fa-store"></i>
                <h1>ناردو برو - سلتي</h1>
            </div>
            <div class="header-info">
                <div class="info-item" onclick="window.location.href='index.html'">
                    <i class="fas fa-arrow-right"></i>

        <div id="cartContainer"></div>

        <div style="margin-top: 50px; border-top: 2px solid rgba(255, 215, 0, 0.1); padding-top: 30px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px;">
                <h2 style="color: var(--gold);"><i class="fas fa-history"></i> أرشيف الطلبات</h2>

            <div id="ordersArchiveContainer"></div>

    </div>

    <div id="notification" class="notification" style="display: none;"></div>

    <script>
        // ============================================
        // الثوابت والإعدادات
        // ============================================
        const CART_STORAGE_KEY = 'nardo_cart';
        const ORDERS_STORAGE_KEY = 'nardo_orders';
        const SEARCH_TITLE = 'قائمة الموزعين والشركات';
        
        const TELEGRAM = {
            botToken: '8576673096:AAFwOd-Ut1tCyKTHwkgj_r6OFi9UZbb4pTM',
            channelId: '-1003822964890',
            apiUrl: 'https://api.telegram.org/bot'
        };

        let cart = [];
        let storesState = JSON.parse(localStorage.getItem('stores_state') || '{}');
        let distributorsData = JSON.parse(localStorage.getItem('nardo_distributors_data') || '{}');
        let selectedDistributor = null;
        let pendingGroupedStores = null;
        let pendingGrandTotal = null;

        // ============================================
        // دوال مساعدة عامة
        // ============================================
        function showNotification(msg, type = 'info') {
            const notif = document.getElementById('notification');
            notif.textContent = msg;
            notif.className = `notification ${type}`;
            notif.style.display = 'block';
            setTimeout(() => notif.style.display = 'none', 4000);
        }

        function getStateCode(stateName) {
            const codes = {
                'أدرار': 'ADR', 'الشلف': 'CHL', 'الأغواط': 'LAG', 'أم البواقي': 'OEB', 'باتنة': 'BAT',
                'بجاية': 'BEJ', 'بسكرة': 'BIS', 'بشار': 'BEC', 'البليدة': 'BLI', 'البويرة': 'BOU',
                'تمنراست': 'TAM', 'تبسة': 'TEB', 'تلمسان': 'TLE', 'تيارت': 'TIA', 'تيزي وزو': 'TIZ',
                'الجزائر': 'ALG', 'الجلفة': 'DJI', 'جيجل': 'JIJ', 'سطيف': 'SET', 'سعيدة': 'SAI',
                'سكيكدة': 'SKI', 'سيدي بلعباس': 'SBA', 'عنابة': 'ANN', 'قالمة': 'GUE', 'قسنطينة': 'CON',

                'وهران': 'ORA', 'البيض': 'ELB', 'إليزي': 'ILL', 'برج بوعريريج': 'BBA', 'بومرداس': 'BOM',

        // ============================================
        // دوال جلب الموزعين من التلغرام
        // ============================================
        async function findDistributorsMessage() {
            try {
                let offset = 0, hasMore = true, foundMessage = null;
                while (hasMore) {
                    const data = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getUpdates?offset=${offset}&limit=100`).then(r => r.json());
                    if (!data.ok) break;
                    for (const update of data.result) {
                        const message = update.channel_post || update.message;
                        if (message && message.chat.id.toString() === TELEGRAM.channelId) {
                            if (message.text && (message.text.includes(SEARCH_TITLE) || message.text.includes('قائمة الموزعين'))) {
                                foundMessage = { message_id: message.message_id, text: message.text };
                                hasMore = false; break;
                            }
                        }
                        offset = update.update_id + 1;
                    }
                    if (foundMessage || data.result.length < 100) break;
                    await new Promise(r => setTimeout(r, 300));
                }
                return foundMessage;
            } catch (e) { return null; }
        }
        
        function parseDistributorsMessage(messageText) {
            distributorsData = {};
            const lines = messageText.split('\n');
            let currentStateCode = null;
            for (let i = 0; i < lines.length; i++) {
                let line = lines[i].trim();
                let stateMatch = line.match(/📍\s*ولاية\s*(.+?)\s*\(([A-Z]{3})\)/);
                if (stateMatch) { currentStateCode = stateMatch[2]; if (!distributorsData[currentStateCode]) distributorsData[currentStateCode] = []; continue; }
                let distributorMatch = line.match(/•\s*(.+?)\s*\(([📦🚚].+?)\)/);
                if (distributorMatch && currentStateCode) {
                    let distributorName = distributorMatch[1].trim();
                    let typeIcon = distributorMatch[2];
                    let typeText = typeIcon.includes('📦') ? '📦 موزع معتمد' : '🚚 شركة توصيل';
                    let fullId = null, phone = null;
                    for (let j = i+1; j < Math.min(i+5, lines.length); j++) {
                        let nextLine = lines[j].trim();
                        let idMatch = nextLine.match(/🆔\s*المعرف:\s*(.+)$/);
                        if (idMatch && idMatch[1].trim() !== '---') fullId = idMatch[1].trim();
                        let contactMatch = nextLine.match(/👤\s*(.+?)\s*[|📍]\s*📞\s*(.+)$/);
                        if (contactMatch) phone = contactMatch[2].trim();
                        if (nextLine.includes('📍 ولاية') || nextLine.startsWith('•')) break;
                    }
                    distributorsData[currentStateCode].push({ name: distributorName, fullId: fullId || `${currentStateCode}-${distributorName}`, typeText: typeText, phone: phone || 'رقم غير متوفر' });
                }
            }
            if (Object.keys(distributorsData).length > 0) {
                localStorage.setItem('nardo_distributors_data', JSON.stringify(distributorsData));
                localStorage.setItem('nardo_distributors_cache_time', Date.now().toString());
                return true;
            }
            return false;
        }
        
        async function fetchDistributorsFromChannel() {
            const loading = document.getElementById('distributorsLoading');
            if (loading) loading.style.display = 'block';
            try {
                const cached = localStorage.getItem('nardo_distributors_data');
                const cacheTime = localStorage.getItem('nardo_distributors_cache_time');
                if (cached && cacheTime && (Date.now() - parseInt(cacheTime)) < 3600000) {
                    distributorsData = JSON.parse(cached);
                    if (loading) loading.style.display = 'none';
                    return true;
                }
                const message = await findDistributorsMessage();
                if (message) parseDistributorsMessage(message.text);
                if (loading) loading.style.display = 'none';
                return true;
            } catch (e) { if (loading) loading.style.display = 'none'; return false; }
        }

        }
        
        function loadCart() { 
            const saved = localStorage.getItem(CART_STORAGE_KEY); 
            cart = saved ? JSON.parse(saved) : []; 
            updateCartDisplay(); 
            updateCartCounters(); 
        }
        
        function updateCartCounters() { 
            const count = cart.reduce((s, i) => s + i.quantity, 0); 
            const total = cart.reduce((s, i) => s + (i.price * i.quantity), 0); 
            document.getElementById('cartCount').textContent = count; 
            document.getElementById('cartTotal').textContent = total.toLocaleString('ar-EG');

                sdata.items.forEach(item => { 
                    html += `<div class="cart-item"><div class="product-thumbnail">${item.imageData ? `<img src="${item.imageData}">` : '<i class="fas fa-image"></i>'}</div><div class="product-details"><div class="product-name">${escapeHtml(item.name)}</div><div class="product-price">${item.price.toLocaleString('ar-EG')} دج</div><div class="product-store"><i class="fas fa-store"></i> ${escapeHtml(item.storeName || 'ناردو برو')}</div></div><div class="cart-item-quantity"><button onclick="updateCartQuantity('${item.id}',-1)">−</button><span>${item.quantity}</span><button onclick="updateCartQuantity('${item.id}',1)">+</button></div><div class="cart-item-total">${(item.price * item.quantity).toLocaleString('ar-EG')} دج</div><button class="cart-item-remove" onclick="removeFromCart('${item.id}')"><i class="fas fa-trash"></i> حذف</button></div>`; 
                });

            } 
            const grandTotal = cart.reduce((s, i) => s + (i.price * i.quantity), 0);
            html += `<div class="cart-summary"><div class="summary-row"><span class="summary-label">المجموع الفرعي:</span><span class="summary-value">${grandTotal.toLocaleString('ar-EG')} دج</span></div><div class="summary-row"><span class="summary-label">رسوم التوصيل:</span><span class="summary-value">حسب الموزع</span></div><div class="summary-row" style="border: none;"><span class="summary-label" style="font-size: 18px;">الإجمالي الكلي:</span><span class="summary-total">${grandTotal.toLocaleString('ar-EG')} دج</span></div><div class="cart-actions"><button class="btn btn-gold" onclick="openCustomerModal()"><i class="fas fa-credit-card"></i> إتمام الطلب</button><button class="btn btn-outline" onclick="clearCart()"><i class="fas fa-trash-alt"></i> مسح السلة</button></div></div>`; 
            container.innerHTML = html; 
        }
        
        function toggleStore(sid) { 
            storesState[sid] = !storesState[sid]; 
            localStorage.setItem('stores_state', JSON.stringify(storesState)); 
            updateCartDisplay(); 
        }
        
        function updateCartQuantity(pid, chg) { 
            const idx = cart.findIndex(i => i.id === pid); 
            if(idx === -1) return; 
            const nq = cart[idx].quantity + chg; 
            if(nq <= 0) removeFromCart(pid); 
            else { 
                cart[idx].quantity = nq; 
                saveCart(); 
                updateCartDisplay(); 
                showNotification(`✓ تم تحديث كمية ${cart[idx].name}`, 'success'); 
            } 
        }
        
        function removeFromCart(pid) { 
            const item = cart.find(i => i.id === pid); 
            if(item){
                cart = cart.filter(i => i.id !== pid); 
                saveCart(); 
                updateCartDisplay(); 
                showNotification(`✓ تم إزالة ${item.name} من السلة`, 'success');
            }
        }
        
        function clearCart() { 
            if(cart.length === 0){ 
                showNotification('السلة فارغة', 'warning'); 
                return; 
            }
            if(confirm('⚠️ هل أنت متأكد من مسح السلة بالكامل؟')){ 
                cart = []; 
                saveCart(); 
                updateCartDisplay(); 
                showNotification('✓ تم مسح السلة', 'success'); 
            } 
        }
        
        function groupByStore(items) { 
            const g = {}; 
            items.forEach(i => { 
                const sid = i.storeID || 'unknown'; 
                if(!g[sid]) g[sid] = { storeName: i.storeName || 'متجر', items: [], total: 0, count: 0 }; 
                g[sid].items.push(i); 
                g[sid].total += i.price * i.quantity; 
                g[sid].count += i.quantity; 
            }); 
            return g; 
        }
        
        function escapeHtml(str) {
            if(!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if(m === '&') return '&amp;';
                if(m === '<') return '&lt;';
                if(m === '>') return '&gt;';
                return m;
            });
        }

        function saveOrderLocally(customerData, groupedStores, mainOrderId, timestamp, distributor) {
            let orders = JSON.parse(localStorage.getItem(ORDERS_STORAGE_KEY) || '[]');
            for (const [sid, sdata] of Object.entries(groupedStores)) {
                orders.unshift({ 
                    id: mainOrderId, 
                    storeName: sdata.storeName, 
                    storeId: sid,
                    date: timestamp, 
                    total: sdata.total, 
                    status: 'pending', 
                    items: sdata.items, 
                    customer: customerData, 
                    distributor: distributor.name 
                });
            }
            localStorage.setItem(ORDERS_STORAGE_KEY, JSON.stringify(orders));
            renderOrdersArchive();
        }

        async function submitOrder() {
            const name = document.getElementById('customerName').value.trim(); 
            const phone = document.getElementById('customerPhone').value.trim(); 
            const state = document.getElementById('customerState').value;
            const addressDetail = document.getElementById('customerAddress').value.trim();
            
            if(!name){ showNotification('⚠️ يرجى إدخال الاسم', 'error'); return; }
            if(!phone){ showNotification('⚠️ يرجى إدخال رقم الهاتف', 'error'); return; }
            if(!state){ showNotification('⚠️ يرجى اختيار الولاية', 'error'); return; }
            if(!addressDetail){ showNotification('⚠️ يرجى إدخال العنوان التفصيلي', 'error'); return; }
            if(!selectedDistributor) { showNotification('⚠️ يرجى اختيار شركة التوصيل أو الموزع', 'error'); return; }
            
            // حفظ اسم العميل
            localStorage.setItem('nardo_customer_name', name);
            
            const customerData = { 
                name, phone, state, addressDetail, 
                address: `${state} - ${addressDetail}`, 
                notes: document.getElementById('customerNotes').value.trim() 
            };
            
            showNotification('⏳ جاري إرسال طلبك...', 'info');
            const success = await sendOrderToTelegram(customerData, pendingGroupedStores, pendingGrandTotal, selectedDistributor);
            
            if(success){
                closeModal(); 
                cart = []; 
                saveCart(); 
                updateCartDisplay(); 
                showNotification('✅ تم إرسال الطلب بنجاح! سيتم التواصل معك قريباً', 'success');
                renderOrdersArchive();
            } else { 
                showNotification('❌ فشل الإرسال، يرجى المحاولة لاحقاً', 'error'); 
            }
        }

            const container = document.getElementById('ordersArchiveContainer');
            if(!container) return;
            const orders = JSON.parse(localStorage.getItem(ORDERS_STORAGE_KEY) || '[]');
            if(orders.length === 0){ 
                container.innerHTML = '<div class="empty-state" style="padding: 40px;"><i class="fas fa-archive"></i><p>لا توجد طلبات سابقة</p></div>'; 
                return; 
            }
            container.innerHTML = orders.map((o, idx) => `
                <div class="order-card">
                    <div class="order-card-header">
                        <span class="order-id">#${o.id}</span>
                        <span class="order-status status-pending">⏳ قيد المعالجة</span>
                    </div>
                    <div class="order-details">
                        <div><i class="fas fa-store"></i> ${escapeHtml(o.storeName)}</div>
                        <div><i class="fas fa-calendar-alt"></i> ${o.date}</div>
                        <div><i class="fas fa-map-marker-alt"></i> ${o.customer ? o.customer.state : '---'}</div>
                        <div><i class="fas fa-truck"></i> ${o.distributor || '---'}</div>
                    </div>
                    <div class="order-items-list">
                        ${(o.items || []).map(i => `<div class="order-item-row"><span>${escapeHtml(i.name)} (x${i.quantity})</span><span>${(i.price * i.quantity).toLocaleString('ar-EG')} دج</span></div>`).join('')}
                    </div>
                    <div class="order-card-footer">
                        <div><strong>الإجمالي: </strong><span style="color: var(--success); font-weight: bold;">${o.total.toLocaleString('ar-EG')} دج</span></div>
                        <button class="btn-delete-order" onclick="deleteOrderFromArchive(${idx})"><i class="fas fa-trash"></i> حذف</button>
                    </div>
                </div>
            `).join('');
        }

        function deleteOrderFromArchive(index) {
            if(confirm('🗑️ هل تريد حذف هذا الطلب من الأرشيف؟')) {
                let orders = JSON.parse(localStorage.getItem(ORDERS_STORAGE_KEY) || '[]');
                orders.splice(index, 1);
                localStorage.setItem(ORDERS_STORAGE_KEY, JSON.stringify(orders));
                renderOrdersArchive();
                showNotification('✓ تم حذف الطلب', 'success');
            }
        }

        function clearOrdersArchive() {
            const orders = JSON.parse(localStorage.getItem(ORDERS_STORAGE_KEY) || '[]');
            if(orders.length === 0){
                showNotification('لا توجد طلبات في الأرشيف', 'warning');
                return;
            }
            if(confirm('⚠️ هل أنت متأكد من مسح كامل أرشيف الطلبات؟')) {
                localStorage.removeItem(ORDERS_STORAGE_KEY);
                renderOrdersArchive();
                showNotification('✓ تم مسح الأرشيف', 'success');
            }
        }

        // ============================================
        // تهيئة الصفحة
        // ============================================
        window.addEventListener('load', () => { 
            loadCart(); 
            renderOrdersArchive(); 
            fetchDistributorsFromChannel(); 
            
            // حفظ اسم العميل إذا كان موجوداً من قبل
            const savedName = localStorage.getItem('nardo_customer_name');
            if(savedName) document.getElementById('customerName').value = savedName;
            
            console.log('✅ نظام السلة جاهز - نسخة محسنة مع دعم كامل لجميع الوظائف');
        });
    </script>
</body>
</html>
