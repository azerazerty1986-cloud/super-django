<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ناردو برو - سلتي | نظام طلبات متكامل</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --gold: #ffd700;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --glass: rgba(255, 255, 255, 0.05);
            --success: #4ade80;
            --error: #f87171;
            --warning: #fbbf24;
            --info: #60a5fa;
        }
        
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0f3460, #16213e);
            color: var(--text-primary);
            direction: rtl;
        }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        
        .header {
            background: var(--glass);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }
        .header-title { display: flex; align-items: center; gap: 15px; }
        .header-title i { font-size: 40px; color: var(--gold); }
        .header-title h1 { font-size: 32px; color: var(--gold); margin: 0; }
        .header-info { display: flex; gap: 20px; flex-wrap: wrap; }
        .info-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 215, 0, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .info-item:hover { background: rgba(255, 215, 0, 0.2); }
        
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s;
        }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-gold:hover { background: #ffed4e; transform: translateY(-2px); }
        .btn-outline { background: transparent; border: 2px solid var(--gold); color: var(--gold); }
        .btn-outline:hover { background: rgba(255, 215, 0, 0.1); }
        .btn-danger { background: rgba(248, 113, 113, 0.2); border: 1px solid var(--error); color: var(--error); }
        .btn-danger:hover { background: var(--error); color: white; }
        .btn-refresh { background: rgba(96, 165, 250, 0.2); border: 1px solid var(--info); color: var(--info); }
        .btn-refresh:hover { background: var(--info); color: white; }
        
        .merchant-section {
            background: var(--glass);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 20px;
            margin-bottom: 25px;
            overflow: hidden;
        }
        .merchant-header {
            background: rgba(255, 215, 0, 0.1);
            padding: 20px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            cursor: pointer;
        }
        .merchant-header:hover { background: rgba(255, 215, 0, 0.15); }
        .merchant-info { display: flex; align-items: center; gap: 15px; }
        .merchant-avatar {
            width: 50px;
            height: 50px;
            background: rgba(255, 215, 0, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .merchant-name { font-size: 20px; font-weight: bold; color: var(--gold); }
        .merchant-stats { display: flex; gap: 20px; font-size: 14px; color: var(--text-secondary); }
        .merchant-stats span { color: var(--gold); font-weight: bold; }
        .merchant-toggle { font-size: 20px; transition: transform 0.3s; }
        .merchant-toggle.collapsed { transform: rotate(-90deg); }
        .merchant-products { padding: 20px; }
        .merchant-products.collapsed { display: none; }
        
        .cart-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 215, 0, 0.15);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .product-thumbnail {
            width: 70px;
            height: 70px;
            border-radius: 12px;
            background: rgba(255, 215, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .product-thumbnail i { font-size: 30px; color: var(--gold); }
        .product-details { flex: 2; min-width: 150px; }
        .product-name { font-size: 16px; font-weight: bold; color: var(--gold); }
        .product-price { font-size: 13px; color: var(--success); }
        .cart-item-quantity {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 215, 0, 0.1);
            padding: 8px 15px;
            border-radius: 10px;
        }
        .cart-item-quantity button {
            background: none;
            border: none;
            color: var(--gold);
            cursor: pointer;
            font-size: 18px;
            width: 30px;
            height: 30px;
            border-radius: 8px;
        }
        .cart-item-quantity button:hover { background: rgba(255, 215, 0, 0.2); }
        .cart-item-quantity span { font-size: 16px; font-weight: bold; min-width: 30px; text-align: center; }
        .cart-item-total { font-size: 16px; font-weight: bold; color: var(--gold); min-width: 100px; text-align: center; }
        .cart-item-remove { background: rgba(248, 113, 113, 0.2); color: var(--error); border: 1px solid var(--error); padding: 8px 15px; border-radius: 10px; cursor: pointer; }
        
        .cart-summary {
            background: rgba(255, 215, 0, 0.05);
            border-radius: 15px;
            padding: 25px;
            margin-top: 20px;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.1);
        }
        .summary-label { color: var(--text-secondary); }
        .summary-value { color: var(--gold); font-weight: bold; font-size: 18px; }
        .summary-total { font-size: 24px; color: var(--success); }
        .cart-actions { display: flex; gap: 15px; margin-top: 25px; flex-wrap: wrap; }
        .cart-actions .btn { flex: 1; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 3000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: var(--secondary);
            border-radius: 20px;
            padding: 30px;
            max-width: 550px;
            width: 90%;
            border: 2px solid var(--gold);
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-content h2 { color: var(--gold); margin-bottom: 20px; text-align: center; }
        .modal-content input, .modal-content select, .modal-content textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: 1px solid rgba(255,215,0,0.3);
            background: rgba(255,255,255,0.1);
            color: white;
            font-family: 'Cairo', sans-serif;
        }
        .modal-content input:focus, .modal-content select:focus {
            outline: none;
            border-color: var(--gold);
        }
        .modal-buttons { display: flex; gap: 15px; margin-top: 20px; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--gold);
            font-size: 13px;
        }
        
        .distributors-section {
            background: rgba(255, 215, 0, 0.05);
            border: 2px solid rgba(255, 215, 0, 0.2);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .distributors-section h3 {
            color: var(--gold);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .distributor-item {
            background: rgba(0, 0, 0, 0.3);
            border-right: 4px solid var(--gold);
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 10px;
            transition: all 0.3s;
            cursor: pointer;
        }
        .distributor-item:hover {
            background: rgba(255, 215, 0, 0.15);
            transform: translateX(-5px);
        }
        .distributor-item.selected {
            background: rgba(255, 215, 0, 0.25);
            border-right: 4px solid var(--success);
        }
        .distributor-name {
            font-weight: bold;
            color: var(--gold);
            font-size: 16px;
            margin-bottom: 5px;
        }
        .distributor-type {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 12px;
            margin-bottom: 8px;
            font-weight: bold;
        }
        .type-delivery {
            background: rgba(74, 222, 128, 0.2);
            color: var(--success);
        }
        .type-distributor {
            background: rgba(96, 165, 250, 0.2);
            color: var(--info);
        }
        .distributor-info {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 5px;
        }
        .distributor-id {
            font-family: monospace;
            background: rgba(255, 215, 0, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            color: var(--gold);
        }
        .no-distributors {
            text-align: center;
            color: var(--text-secondary);
            padding: 20px;
            font-style: italic;
        }
        .loading-spinner {
            text-align: center;
            padding: 20px;
        }
        .loading-spinner i {
            font-size: 40px;
            color: var(--gold);
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
        .empty-state i { font-size: 70px; color: var(--gold); }
        
        .notification {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            max-width: 400px;
            margin: 0 auto;
            padding: 15px 25px;
            border-radius: 12px;
            font-weight: bold;
            z-index: 2000;
            animation: slideIn 0.3s ease;
            text-align: center;
        }
        .notification.success { background: var(--success); color: #000; }
        .notification.error { background: var(--error); color: #fff; }
        .notification.warning { background: var(--warning); color: #000; }
        .notification.info { background: var(--info); color: #fff; }
        @keyframes slideIn {
            from { transform: translateY(-100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .order-archive { margin-top: 40px; border-top: 2px dashed rgba(255, 215, 0, 0.2); padding-top: 30px; }
        .order-archive h2 { margin-bottom: 20px; font-size: 24px; color: var(--gold); }
        .order-card {
            background: var(--glass);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .order-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid rgba(255, 215, 0, 0.1); padding-bottom: 10px; }
        .order-id { font-weight: bold; color: var(--gold); font-family: monospace; font-size: 14px; }
        .order-status { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .status-pending { background: rgba(251, 191, 36, 0.2); color: var(--warning); }
        .status-received { background: rgba(96, 165, 250, 0.2); color: var(--info); }
        .status-approved { background: rgba(74, 222, 128, 0.2); color: var(--success); }
        .order-details div { margin-bottom: 8px; font-size: 14px; }
        
        @media (max-width: 768px) {
            .cart-item { flex-direction: column; align-items: stretch; }
            .cart-actions { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-title"><i class="fas fa-shopping-cart"></i><h1>سلة المشتريات</h1></div>

    <script>
        // ============================================
        // الثوابت والإعدادات
        // ============================================
        const TELEGRAM = { 
            botToken: '8576673096:AAGvSMjzwVWj6wJ47JdqiDwcObXjBDcyiLA', 
            channelId: '-1003822964890', 
            apiUrl: 'https://api.telegram.org/bot' 
        };
        
        const SEARCH_TITLE = "📋 قائمة الموزعين وشركات التوصيل حسب كل ولاية";
        const CART_STORAGE_KEY = 'nardoo_cart';
        const ORDERS_STORAGE_KEY = 'nardo_orders';
        
        let cart = [];
        let storesState = JSON.parse(localStorage.getItem('stores_state') || '{}');
        let storeColors = {};
        let distributorsData = {};
        let selectedDistributor = null;
        
        // ============================================
        // دوال مساعدة
        // ============================================
        
        function showNotification(m, type='success') { 
            const n = document.createElement('div'); 
            n.className = `notification ${type}`; 
            n.innerHTML = `<i class="fas ${type==='success'?'fa-check-circle':type==='error'?'fa-exclamation-circle':'fa-info-circle'}"></i> ${m}`; 
            document.body.appendChild(n); 
            setTimeout(()=>n.remove(),3000); 
        }
        
        function getStateCode(stateName) {
            const stateCodes = {
                'الجزائر': 'ALG', 'أدرار': 'ADR', 'الشلف': 'CHL', 'الأغواط': 'LGH',
                'أم البواقي': 'OEB', 'باتنة': 'BAT', 'بجاية': 'BJA', 'بسكرة': 'BSK',
                'بشار': 'BSH', 'البليدة': 'BLI', 'البويرة': 'BUI', 'تمنراست': 'TMR',
                'تبسة': 'TEB', 'تلمسان': 'TLE', 'تيارت': 'TIA', 'تيزي وزو': 'TIZ',
                'الجلفة': 'DJF', 'جيجل': 'JIJ', 'سطيف': 'SET', 'سعيدة': 'SAI',
                'سكيكدة': 'SKI', 'سيدي بلعباس': 'SBA', 'عنابة': 'ANA', 'قالمة': 'GUE',
                'قسنطينة': 'CON', 'المدية': 'MED', 'مستغانم': 'MGH', 'المسيلة': 'MSL',
                'معسكر': 'MSC', 'ورقلة': 'OUA', 'وهران': 'ORA', 'برج بوعريريج': 'BBA',
                'بومرداس': 'BMD', 'الطارف': 'TAR', 'تندوف': 'TIN', 'تيسمسيلت': 'TSS',
                'الوادي': 'ELO', 'خنشلة': 'KHE', 'سوق أهراس': 'SAH', 'تيبازة': 'TIP',
                'ميلة': 'MIL', 'عين الدفلى': 'AIND', 'النعامة': 'NAA', 'عين تموشنت': 'AINT',
                'غرداية': 'GHA', 'غليزان': 'REL'
            };
            return stateCodes[stateName] || stateName.substring(0, 3).toUpperCase();
        }
        
        // ============================================
        // البحث في القناة عن قائمة الموزعين
        // ============================================
        
        async function findDistributorsMessage() {
            try {
                showNotification('🔍 جاري البحث في القناة عن قائمة الموزعين...', 'info');
                
                let offset = 0;
                let hasMore = true;
                let foundMessage = null;
                let messagesChecked = 0;
                
                while (hasMore) {
                    const response = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getUpdates?offset=${offset}&limit=100`);
                    const data = await response.json();
                    
                    if (!data.ok) {
                        console.error('خطأ في API:', data);
                        break;
                    }
                    
                    if (!data.result || data.result.length === 0) {
                        hasMore = false;
                        break;
                    }
                    
                    for (const update of data.result) {
                        const message = update.channel_post || update.message;
                        
                        if (message && message.chat.id.toString() === TELEGRAM.channelId) {
                            messagesChecked++;
                            
                            if (message.text && message.text.includes(SEARCH_TITLE)) {
                                foundMessage = {
                                    message_id: message.message_id,

                                    date: new Date(message.date * 1000).toLocaleString('ar-EG'),

                                localStorage.setItem('nardo_distributors_message_id', message.message_id);
                                localStorage.setItem('nardo_distributors_date', message.date);
                                
                                hasMore = false;
                                break;
                            }
                        }
                        
                        offset = update.update_id + 1;
                    }
                    
                    if (foundMessage) break;
                    if (data.result.length < 100) hasMore = false;
                    
                    await new Promise(resolve => setTimeout(resolve, 300));
                }
                
                console.log(`📊 تم فحص ${messagesChecked} رسالة في القناة`);
                
                if (!foundMessage) {
                    showNotification('⚠️ لم يتم العثور على رسالة تحتوي على قائمة الموزعين', 'warning');
                    return null;
                }
                
                return foundMessage;
                
            } catch (error) {
                console.error('خطأ في البحث:', error);
                showNotification('❌ فشل البحث في القناة', 'error');
                return null;

        function parseDistributorsMessage(messageText) {
            distributorsData = {};
            const lines = messageText.split('\n');
            let currentState = null;
            let currentStateCode = null;
            let currentDistributor = null;
            
            for (let i = 0; i < lines.length; i++) {
                let line = lines[i].trim();
                
                if (line.includes(SEARCH_TITLE)) continue;
                if (line.includes('════════════════════════════════════════')) continue;
                if (line.includes('──────────────────────────────')) continue;
                
                const stateMatch = line.match(/📍\s*ولاية\s*(.+?)\s*\(([A-Z]{3})\)/);
                if (stateMatch) {
                    if (currentDistributor && currentDistributor.name && currentStateCode) {
                        distributorsData[currentStateCode].push({ ...currentDistributor });
                    }
                    currentState = stateMatch[1];
                    currentStateCode = stateMatch[2];
                    if (!distributorsData[currentStateCode]) {
                        distributorsData[currentStateCode] = [];
                    }
                    currentDistributor = null;
                    continue;
                }
                
                const distributorMatch = line.match(/[•\-]\s*(.+?)\s*\((.+?)\)/);
                if (distributorMatch && currentStateCode) {
                    if (currentDistributor && currentDistributor.name && currentStateCode) {
                        distributorsData[currentStateCode].push({ ...currentDistributor });
                    }
                    currentDistributor = {
                        name: distributorMatch[1].trim(),
                        typeText: distributorMatch[2].trim(),
                        type: distributorMatch[2].includes('🚚') ? 'delivery' : 
                               distributorMatch[2].includes('📦') ? 'distributor' : 'other',
                        customId: null,
                        manager: null,
                        phone: null
                    };
                    continue;
                }
                
                if (currentDistributor && line.includes('🆔')) {
                    const idMatch = line.match(/🆔\s*المعرف:\s*(.+)$/);
                    if (idMatch) {
                        let id = idMatch[1].trim();
                        if (id !== '---') currentDistributor.customId = id;
                    }
                    continue;
                }
                
                if (currentDistributor && line.includes('👤')) {
                    const contactMatch = line.match(/👤\s*(.+?)\s*[|│]\s*📞\s*(.+)$/);
                    if (contactMatch) {
                        currentDistributor.manager = contactMatch[1].trim();
                        currentDistributor.phone = contactMatch[2].trim();
                        distributorsData[currentStateCode].push({ ...currentDistributor });
                        currentDistributor = null;
                    }
                    continue;
                }
            }
            
            if (currentDistributor && currentDistributor.name && currentStateCode) {
                distributorsData[currentStateCode].push({ ...currentDistributor });
            }
            
            console.log('✅ تم تحليل البيانات بنجاح');
        }

        async function fetchDistributorsFromChannel() {
            const loading = document.getElementById('distributorsLoading');
            if (loading) loading.style.display = 'block';
            
            try {
                const cached = localStorage.getItem('nardo_distributors_data');
                const cacheTime = localStorage.getItem('nardo_distributors_cache_time');
                const now = Date.now();
                
                if (cached && cacheTime && (now - parseInt(cacheTime)) < 3600000) {
                    distributorsData = JSON.parse(cached);
                    const total = Object.values(distributorsData).reduce((sum, arr) => sum + arr.length, 0);
                    showNotification(`✅ تم تحميل ${total} موزع/شركة`, 'success');
                    if (loading) loading.style.display = 'none';
                    return true;
                }
                
                const message = await findDistributorsMessage();
                
                if (!message) {
                    useDefaultDistributors();
                    if (loading) loading.style.display = 'none';
                    return false;
                }
                
                parseDistributorsMessage(message.text);
                
                if (Object.keys(distributorsData).length > 0) {
                    localStorage.setItem('nardo_distributors_data', JSON.stringify(distributorsData));
                    localStorage.setItem('nardo_distributors_cache_time', Date.now().toString());
                    const total = Object.values(distributorsData).reduce((sum, arr) => sum + arr.length, 0);
                    showNotification(`✅ تم تحميل ${total} موزع/شركة من القناة`, 'success');
                    if (loading) loading.style.display = 'none';
                    return true;
                } else {
                    useDefaultDistributors();
                    if (loading) loading.style.display = 'none';
                    return false;
                }
                
            } catch (error) {
                console.error('خطأ:', error);
                useDefaultDistributors();
                if (loading) loading.style.display = 'none';
                showNotification('❌ فشل جلب البيانات، تم استخدام البيانات المحلية', 'error');
                return false;
            }
        }

        function updateCartQuantity(productId, change) { 
            const idx = cart.findIndex(i=>i.id===productId); 
            if(idx===-1) return; 
            const newQ = cart[idx].quantity+change; 
            if(newQ<=0) removeFromCart(productId); 
            else { 
                cart[idx].quantity=newQ; 
                saveCart(); 
                updateCartDisplay(); 
                showNotification(`✓ تم تحديث كمية ${cart[idx].name}`); 
            } 
        }
        
        function removeFromCart(productId) { 
            const item = cart.find(i=>i.id===productId); 
            if(item){ 
                cart = cart.filter(i=>i.id!==productId); 
                saveCart(); 
                updateCartDisplay(); 
                showNotification(`✓ تم إزالة ${item.name}`); 
            } 
        }
        
        function clearCart() { 
            if(cart.length===0) showNotification('السلة فارغة','warning'); 
            else if(confirm('مسح السلة؟')){ 
                cart=[]; 
                saveCart(); 
                updateCartDisplay(); 
                showNotification('✓ تم مسح السلة'); 
            } 
        }
        
        function groupByStore(items) { 
            const g={}; 
            items.forEach(item=>{ 
                const sid = item.storeID || 'unknown-store'; 
                const sname = item.storeName || 'ناردو برو'; 
                if(!g[sid]) g[sid]={storeID:sid, storeName:sname, items:[], total:0, count:0}; 
                g[sid].items.push(item); 
                g[sid].total += item.price * item.quantity; 
                g[sid].count += item.quantity; 
            }); 
            return g; 
        }

                    merchantMsg += `💰 *إجمالي الطلب:* ${storeData.total.toLocaleString()} دج\n`;
                    merchantMsg += `📅 *التاريخ:* ${timestamp}\n`;
                    merchantMsg += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
                    
                    await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/sendMessage`, {
                        method:'POST', 
                        headers:{'Content-Type':'application/json'},
                        body:JSON.stringify({
                            chat_id: TELEGRAM.channelId, 
                            text: merchantMsg, 
                            parse_mode: 'Markdown'
                        })
                    });
                }
                
                saveOrderLocally(customerData, groupedStores, mainOrderId, timestamp, distributor);
                return true;
                
            } catch(e) { 
                console.error('خطأ في إرسال الطلب:', e); 
                return false; 
            }
        }
        
        function saveOrderLocally(customerData, groupedStores, mainOrderId, timestamp, distributor) {
            let allOrders = JSON.parse(localStorage.getItem(ORDERS_STORAGE_KEY) || '[]');
            
            for (const [storeID, storeData] of Object.entries(groupedStores)) {
                allOrders.unshift({ 
                    id: `${mainOrderId}-${storeID.substring(0,5)}`, 
                    originalOrderId: mainOrderId,
                    date: timestamp, 
                    customerName: customerData.name, 
                    customerPhone: customerData.phone, 
                    customerAddress: customerData.address,
                    customerState: customerData.state,
                    customerAddressDetail: customerData.addressDetail,
                    customerNotes: customerData.notes, 
                    storeID: storeID, 
                    storeName: storeData.storeName, 
                    items: storeData.items, 
                    total: storeData.total, 
                    distributor: distributor ? distributor.name : null,
                    distributorId: distributor ? distributor.customId : null,
                    status: 'pending'
                });
            }
            
            localStorage.setItem(ORDERS_STORAGE_KEY, JSON.stringify(allOrders));
            renderOrdersArchive();
        }
        
        function renderOrdersArchive() {
            const container = document.getElementById('ordersArchiveContainer');
            if(!container) return;
            const orders = JSON.parse(localStorage.getItem(ORDERS_STORAGE_KEY) || '[]');
            if(orders.length === 0){ 
                container.innerHTML = '<p style="text-align:center; color: var(--text-secondary);">لا توجد طلبات سابقة</p>'; 
                return; 
            }
            container.innerHTML = orders.map(o => `
                <div class="order-card">
                    <div class="order-card-header">
                        <span class="order-id">#${o.originalOrderId || o.id}</span>
                        <span class="order-status ${o.status === 'pending' ? 'status-pending' : (o.status === 'received' ? 'status-received' : 'status-approved')}">
                            ${o.status === 'pending' ? '⏳ قيد المعالجة' : (o.status === 'received' ? '📦 وصل للتاجر' : '✅ تم تعيين الموزع')}
                        </span>
                    </div>
                    <div class="order-details">
                        <div>🏪 ${o.storeName}</div>
                        <div>📅 ${o.date}</div>
                        <div>📍 ${o.customerState ? `${o.customerState} - ` : ''}${o.customerAddressDetail || ''}</div>
                        <div>📦 ${o.items.map(i => `${i.name} (${i.quantity})`).join(', ')}</div>
                        <div>💰 ${o.total.toLocaleString()} دج</div>
                        ${o.distributor ? `<div>🚚 ${o.distributor}</div>` : ''}
                    </div>
                </div>
            `).join('');
        }
        
        // ============================================
        // دوال النافذة المنبثقة
        // ============================================
        
        let pendingGroupedStores = null, pendingGrandTotal = null;
        
        function loadUserProfile() {
            let userName = '';
            const currentStore = localStorage.getItem('nardo_current_store');
            if (currentStore) {
                try {
                    const store = JSON.parse(currentStore);
                    if (store.storeName) userName = store.storeName;
                } catch(e) {}
            }
            const savedUser = localStorage.getItem('nardo_customer_name');
            if (savedUser && !userName) userName = savedUser;
            if (!userName) userName = 'زائر ناردو برو';
            document.getElementById('customerName').value = userName;
        }
        
        function updateFullAddress() {
            const state = document.getElementById('customerState').value;
            const detail = document.getElementById('customerAddress').value;
            const fullAddress = state && detail ? `${state} - ${detail}` : (state || detail || '');
            document.getElementById('fullAddress').value = fullAddress;
        }
        
        function openMapLocation() {
            const state = document.getElementById('customerState').value;
            const address = document.getElementById('customerAddress').value;
            const query = encodeURIComponent(`${state} ${address}`);
            window.open(`https://www.google.com/maps/search/?api=1&query=${query}`, '_blank');
            showNotification('🗺️ تم فتح الخريطة، يمكنك نسخ العنوان التفصيلي', 'info');
        }
        
        function openCustomerModal() { 
            if(cart.length === 0){ 
                showNotification('السلة فارغة','warning'); 
                return; 
            } 
            pendingGroupedStores = groupByStore(cart); 
            pendingGrandTotal = cart.reduce((s,i) => s + (i.price * i.quantity), 0); 
            
            loadUserProfile();
            document.getElementById('customerPhone').value = '';
            document.getElementById('customerState').value = '';
            document.getElementById('customerAddress').value = '';
            document.getElementById('fullAddress').value = '';
            document.getElementById('customerNotes').value = '';
            document.getElementById('distributorsList').innerHTML = '';
            selectedDistributor = null;
            
            document.getElementById('customerModal').style.display = 'flex'; 
        }
        
        function closeModal() { 
            document.getElementById('customerModal').style.display = 'none'; 
        }
        
        async function submitOrder() {
            const name = document.getElementById('customerName').value.trim(); 
            const phone = document.getElementById('customerPhone').value.trim(); 
            const state = document.getElementById('customerState').value;
            const addressDetail = document.getElementById('customerAddress').value.trim();
            const fullAddress = document.getElementById('fullAddress').value.trim();
            const notes = document.getElementById('customerNotes').value.trim();
            
            if(!name){ 
                showNotification('الرجاء إدخال الاسم','error'); 
                return; 
            }
            if(!phone){ 
                showNotification('الرجاء إدخال رقم الهاتف','error'); 
                return; 
            }
            if(!state && !addressDetail){ 
                showNotification('الرجاء إدخال العنوان (الولاية أو العنوان التفصيلي)','error'); 
                return; 
            }
            if(!selectedDistributor) {
                showNotification('الرجاء اختيار شركة التوصيل أو الموزع','error');
                return;
            }
            
            const finalAddress = fullAddress || (state && addressDetail ? `${state} - ${addressDetail}` : (state || addressDetail));
            
            const customerData = {
                name, phone, address: finalAddress,
                state: state, addressDetail: addressDetail, notes
            };
            
            const currentGrouped = pendingGroupedStores;
            const currentTotal = pendingGrandTotal;
            
            if(!currentGrouped || Object.keys(currentGrouped).length === 0) {
                showNotification('لا توجد منتجات في السلة','error');
                closeModal();
                return;
            }
            
            showNotification('جاري إرسال الطلب...','info');
            
            const success = await sendOrderToTelegram(customerData, currentGrouped, currentTotal, selectedDistributor);
            
            closeModal();
            
            if(success){
                cart = [];
                saveCart();
                updateCartDisplay();
                showNotification('✓ تم إرسال الطلب بنجاح! سيتم التواصل معك قريباً', 'success');
                renderOrdersArchive();
            } else {
                showNotification('❌ فشل إرسال الطلب. يرجى التحقق من الاتصال والمحاولة مرة أخرى', 'error');
            }
            
            pendingGroupedStores = null;
            pendingGrandTotal = null;
        }
        
        // ============================================
        // التهيئة
        // ============================================
        window.addEventListener('load', function() {
            loadCart();
            renderOrdersArchive();
            
            const cached = localStorage.getItem('nardo_distributors_data');
            if (cached) {
                try {
                    distributorsData = JSON.parse(cached);
                    console.log('✅ تم تحميل البيانات من cache');
                } catch(e) {}
            }
            
            setTimeout(() => {
                fetchDistributorsFromChannel();
            }, 2000);
            
            console.log('✅ نظام السلة جاهز - يبحث عن: "📋 قائمة الموزعين وشركات التوصيل حسب كل ولاية"');
        });
    </script>
</body>
</html>
