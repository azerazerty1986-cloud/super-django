<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ناردو برو | نظام المتجر الذكي - جلب من تلغرام</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #0a0a1a;
            --secondary: #1a1a2e;
            --gold: #ffd700;
            --gold-dark: #daa520;
            --gold-light: #ffed4e;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --success: #4ade80;
            --error: #f87171;
            --warning: #fbbf24;
            --info: #60a5fa;
            --telegram: #0088cc;
        }
        
        html { scroll-behavior: smooth; }
        
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0b0b14 0%, #15152a 50%, #0f1628 100%);
            color: var(--text-primary);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(255, 215, 0, 0.03) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(167, 139, 250, 0.02) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        
        .container { 
            max-width: 1400px; 
            margin: 0 auto; 
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* ========== شريط المهام العلوي (Modern Top Bar) ========== */
        .top-navbar {
            background: linear-gradient(135deg, rgba(10,10,26,0.95), rgba(26,26,46,0.98));
            backdrop-filter: blur(20px);
            border-radius: 60px;
            border: 1px solid rgba(255,215,0,0.2);
            padding: 8px 28px;
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-logo i {
            font-size: 34px;
            color: var(--gold);
            filter: drop-shadow(0 0 8px rgba(255,215,0,0.4));
        }

        .nav-logo .logo-text {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-logo small {
            font-size: 10px;
            color: #888;
            display: block;
            line-height: 1.2;
        }

        .nav-links {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .nav-link {
            padding: 10px 24px;
            border-radius: 40px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,215,0,0.1);
            color: #ccc;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-link i {
            font-size: 16px;
        }

        .nav-link:hover {
            background: rgba(255,215,0,0.12);
            color: var(--gold);
            border-color: rgba(255,215,0,0.4);
            transform: translateY(-2px);
        }

        .nav-link.active {
            background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,215,0,0.08));
            color: var(--gold);
            border-color: var(--gold);
            box-shadow: 0 4px 12px rgba(255,215,0,0.2);
        }

        .nav-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .nav-btn {
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            font-family: 'Cairo', sans-serif;
        }

        .nav-btn-telegram {
            background: linear-gradient(135deg, #0088cc, #006699);
            color: white;
        }

        .nav-btn-gold {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: #111;
        }

        .nav-btn-outline {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
        }

        /* ========== باقي التصميمات المحسنة ========== */
        .header {
            background: linear-gradient(135deg, rgba(255,215,0,0.08), rgba(0,0,0,0.3));
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 32px;
            padding: 20px 28px;
            margin-bottom: 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            backdrop-filter: blur(12px);
        }
        
        .stats { display: flex; gap: 15px; flex-wrap: wrap; }
        .stat-card {
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(12px);
            padding: 12px 22px;
            border-radius: 24px;
            text-align: center;
            border: 1px solid rgba(255,215,0,0.15);
            transition: all 0.3s ease;
        }
        .stat-card:hover { transform: translateY(-3px); border-color: var(--gold); background: rgba(255,215,0,0.08); }
        .stat-card i { font-size: 24px; color: var(--gold); margin-bottom: 4px; display: block; }
        .stat-card .number { font-size: 24px; font-weight: 900; background: linear-gradient(135deg, #ffd700, #ffb347); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .stat-card .label { font-size: 11px; color: #999; }
        
        .merchant-id-box {
            font-family: monospace;
            font-size: 11px;
            background: rgba(255,215,0,0.15);
            padding: 6px 14px;
            border-radius: 24px;
            margin-top: 6px;
            border: 1px solid rgba(255,215,0,0.2);
        }
        
        .store-info-banner {
            background: linear-gradient(135deg, rgba(255,215,0,0.08), rgba(0,0,0,0.3));
            border: 1px solid rgba(255,215,0,0.15);
            border-radius: 28px;
            padding: 16px 24px;
            margin-bottom: 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .store-info-text { display: flex; gap: 20px; flex-wrap: wrap; }
        .store-info-item { display: flex; align-items: center; gap: 8px; font-size: 13px; }
        .store-info-item i { color: var(--gold); }
        .store-info-item strong { color: var(--gold); }
        
        .sync-status {
            background: rgba(74,222,128,0.15);
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 13px;
            border: 1px solid rgba(74,222,128,0.3);
            color: #86efac;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 48px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
        }
        .btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: #111; }
        .btn-telegram { background: linear-gradient(135deg, #0088cc, #006699); color: white; }
        .btn-success { background: linear-gradient(135deg, #22c55e, #16a34a); color: white; }
        .btn-outline { background: transparent; border: 2px solid var(--gold); color: var(--gold); }
        .btn-info { background: linear-gradient(135deg, #60a5fa, #3b82f6); color: white; }
        
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 28px;
            margin-bottom: 40px;
        }
        
        .product-card {
            background: linear-gradient(145deg, rgba(25,25,45,0.8), rgba(15,15,30,0.95));
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,215,0,0.15);
            border-radius: 32px;
            padding: 24px;
            transition: all 0.4s ease;
            position: relative;
        }
        .product-card:hover { transform: translateY(-8px); border-color: rgba(255,215,0,0.4); box-shadow: 0 16px 48px rgba(255,215,0,0.12); }
        
        .product-id-badge {
            position: absolute;
            top: 16px;
            left: 16px;
            background: linear-gradient(135deg, var(--gold), #ffb347);
            color: #111;
            padding: 5px 12px;
            border-radius: 24px;
            font-size: 10px;
            font-weight: 800;
            font-family: monospace;
        }
        
        .merchant-id-badge {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(0,0,0,0.6);
            padding: 5px 12px;
            border-radius: 24px;
            font-size: 10px;
            font-weight: 700;
            font-family: monospace;
            border: 1px solid rgba(255,215,0,0.25);
        }
        
        .product-images { display: flex; gap: 10px; overflow-x: auto; margin-bottom: 18px; padding-bottom: 8px; }
        .product-images img { width: 80px; height: 80px; object-fit: cover; border-radius: 18px; border: 2px solid rgba(255,215,0,0.3); cursor: pointer; transition: all 0.3s ease; flex-shrink: 0; }
        .product-images img:hover { border-color: var(--gold); transform: scale(1.05); }
        
        .product-name { font-size: 22px; font-weight: 900; background: linear-gradient(135deg, #ffd700, #ffb347); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 8px; }
        .product-price { font-size: 26px; font-weight: 900; color: var(--success); margin: 10px 0; }
        
        .stock-badge { display: inline-block; padding: 6px 16px; border-radius: 50px; font-size: 12px; font-weight: 700; }
        .stock-high { background: rgba(74,222,128,0.15); color: #86efac; border: 1px solid rgba(74,222,128,0.4); }
        .stock-low { background: rgba(251,191,36,0.15); color: #fde047; border: 1px solid rgba(251,191,36,0.4); }
        .stock-out { background: rgba(248,113,113,0.15); color: #fca5a5; border: 1px solid rgba(248,113,113,0.4); }
        
        .table-wrapper { overflow-x: auto; border-radius: 28px; background: rgba(0,0,0,0.25); padding: 8px; backdrop-filter: blur(12px); border: 1px solid rgba(255,215,0,0.12); margin-bottom: 30px; }
        table { width: 100%; border-collapse: separate; border-spacing: 0; }
        th { background: linear-gradient(135deg, rgba(255,215,0,0.12), rgba(255,215,0,0.06)); padding: 16px 14px; text-align: right; color: var(--gold); font-weight: 800; font-size: 13px; }
        td { padding: 14px; border-bottom: 1px solid rgba(255,215,0,0.06); }
        tr:hover td { background: rgba(255,215,0,0.06); }
        
        .inventory-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 25px; }
        .inv-stat-card { background: linear-gradient(135deg, rgba(255,215,0,0.08), rgba(0,0,0,0.3)); border: 1px solid rgba(255,215,0,0.15); border-radius: 24px; padding: 16px; display: flex; align-items: center; gap: 14px; }
        .inv-stat-icon { width: 45px; height: 45px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 22px; background: rgba(255,215,0,0.1); color: var(--gold); }
        .inv-stat-info h4 { font-size: 12px; color: #aaa; margin-bottom: 4px; }
        .inv-stat-info .value { font-size: 20px; font-weight: 800; color: var(--gold); }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal.active { display: flex; }
        .modal-content { background: linear-gradient(135deg, rgba(26,26,46,0.98), rgba(10,10,25,0.98)); border: 1px solid rgba(255,215,0,0.2); border-radius: 32px; padding: 28px; max-width: 500px; width: 90%; max-height: 90vh; overflow-y: auto; }
        .modal-header { font-size: 22px; font-weight: 900; color: var(--gold); margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .modal-close { background: none; border: none; color: var(--gold); font-size: 28px; cursor: pointer; }
        
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 6px; color: var(--gold); font-weight: 700; font-size: 13px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px 16px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,215,0,0.15); border-radius: 24px; color: white; font-family: 'Cairo', sans-serif; }
        .form-group input:focus { outline: none; border-color: rgba(255,215,0,0.4); }
        
        .stock-log-item { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,215,0,0.1); border-radius: 20px; padding: 14px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        
        .toast { position: fixed; bottom: 20px; right: 20px; padding: 14px 24px; border-radius: 24px; font-weight: 600; z-index: 9999; animation: slideIn 0.3s ease; backdrop-filter: blur(8px); }
        .toast.success { background: rgba(74,222,128,0.2); color: #86efac; border: 1px solid rgba(74,222,128,0.4); }
        .toast.error { background: rgba(248,113,113,0.2); color: #fca5a5; border: 1px solid rgba(248,113,113,0.4); }
        @keyframes slideIn { from { transform: translateX(400px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        @media (max-width: 768px) {
            .container { padding: 12px; }
            .top-navbar { padding: 12px 20px; flex-direction: column; }
            .nav-links { justify-content: center; width: 100%; }
            .nav-actions { width: 100%; justify-content: center; }
            .products-grid { grid-template-columns: 1fr; }
            .header { flex-direction: column; text-align: center; }
            .stats { justify-content: center; }
        }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: rgba(255,215,0,0.05); }
        ::-webkit-scrollbar-thumb { background: rgba(255,215,0,0.3); border-radius: 4px; }
    </style>
</head>
<body>
<div class="container">
    <!-- ========== شريط المهام العلوي ========== -->
    <div class="top-navbar">
        <div class="nav-logo">
            <i class="fas fa-crown"></i>
            <div>
                <span class="logo-text">ناردو برو</span>
                <small>المتجر الذكي</small>
            </div>
        </div>
        <div class="nav-links">
            <div class="nav-link active" data-tab="products"><i class="fas fa-cube"></i> المنتجات</div>
            <div class="nav-link" data-tab="inventory"><i class="fas fa-warehouse"></i> المخزون</div>
            <div class="nav-link" data-tab="stockLog"><i class="fas fa-history"></i> السجل</div>
            <div class="nav-link" data-tab="orders"><i class="fas fa-truck"></i> الطلبات</div>
        </div>
        <div class="nav-actions">
            <button class="nav-btn nav-btn-telegram" onclick="fetchProductsFromTelegram()"><i class="fab fa-telegram"></i> جلب</button>
            <button class="nav-btn nav-btn-gold" onclick="openAddProductModal()"><i class="fas fa-plus"></i> إضافة</button>
            <button class="nav-btn nav-btn-outline" onclick="toggleAdminMode()"><i class="fas fa-user-shield"></i> مدير</button>
        </div>
    </div>

    <!-- ========== معلومات المتجر والإحصائيات ========== -->
    <div class="header">
        <div class="stats">
            <div class="stat-card"><i class="fas fa-store"></i><div class="number" id="merchantDisplay">---</div><div class="label">المتجر</div></div>
            <div class="stat-card"><i class="fab fa-telegram"></i><div class="number" id="statTelegram">✅</div><div class="label">البوت</div></div>
            <div class="stat-card"><i class="fas fa-store"></i><div class="number" id="statTotal">0</div><div class="label">المنتجات</div></div>
            <div class="stat-card"><i class="fas fa-clipboard-list"></i><div class="number" id="statOrders">0</div><div class="label">الطلبات</div></div>
        </div>
        <div class="merchant-id-box" id="merchantIDBox"></div>
    </div>

    <div class="store-info-banner">
        <div class="store-info-text">
            <div class="store-info-item"><i class="fas fa-store"></i><div><strong>المتجر:</strong> <span id="currentStoreName">---</span></div></div>
            <div class="store-info-item"><i class="fas fa-id-card"></i><div><strong>معرف المتجر:</strong> <span id="currentStoreID" style="font-family: monospace;">---</span></div></div>
            <div class="store-info-item"><i class="fas fa-cube"></i><div><strong>منتجاتي:</strong> <span id="storeProductCount">0</span></div></div>
        </div>
        <div class="sync-status" id="syncStatus"><i class="fas fa-check-circle"></i><span>جاهز</span></div>
    </div>

    <!-- ========== أدوات البحث والتصفية ========== -->
    <div style="display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; justify-content: space-between;">
        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
            <button class="btn btn-success" onclick="fetchMyStoreProductsOnly()"><i class="fas fa-store"></i> منتجات متجري</button>
            <button class="btn btn-outline" onclick="window.location.reload()"><i class="fas fa-sync-alt"></i> تحديث</button>
            <button class="btn btn-info" onclick="findProductById()"><i class="fas fa-search"></i> بحث بالمعرف</button>
        </div>
        <div style="display: flex; gap: 12px;">
            <select id="storeFilterSelect" onchange="filterByStore()" style="background: rgba(0,0,0,0.4); border: 1px solid rgba(255,215,0,0.2); border-radius: 40px; padding: 8px 16px; color: white;">
                <option value="current">📌 متجري فقط</option>
                <option value="all">🌐 جميع المتاجر</option>
            </select>
            <input type="text" id="searchProducts" placeholder="🔍 بحث بالاسم أو المعرف..." style="background: rgba(0,0,0,0.4); border: 1px solid rgba(255,215,0,0.2); border-radius: 40px; padding: 8px 20px; color: white; width: 220px;">
        </div>
    </div>

    <!-- ========== أقسام المحتوى ========== -->
    <div id="productsTab" class="tab-content" style="display: block;"><div id="productsGrid" class="products-grid"></div></div>
    <div id="inventoryTab" class="tab-content" style="display: none;">
        <div class="inventory-stats" id="inventoryStats"></div>
        <div class="table-wrapper"><table><thead><tr><th>المنتج</th><th>المعرف</th><th>المتجر</th><th>السعر</th><th>المخزون</th><th>الحالة</th><th>الإجراءات</th></tr></thead><tbody id="inventoryTable"></tbody></table></div>
    </div>
    <div id="stockLogTab" class="tab-content" style="display: none;">
        <div style="display: flex; justify-content: space-between; margin-bottom: 20px;"><h3><i class="fas fa-scroll"></i> سجل المخزون</h3><button class="btn btn-info" onclick="clearStockLog()"><i class="fas fa-trash"></i> مسح</button></div>
        <div id="stockLogContainer"></div>
    </div>
    <div id="ordersTab" class="tab-content" style="display: none;">
        <div style="display: flex; justify-content: space-between; margin-bottom: 20px;"><h3><i class="fas fa-receipt"></i> الطلبات</h3><button class="btn btn-info" onclick="clearOrders()"><i class="fas fa-trash"></i> مسح الكل</button></div>
        <div id="ordersContainer"></div>
    </div>
</div>

<!-- مودال إضافة منتج -->
<div id="addProductModal" class="modal"><div class="modal-content"><div class="modal-header"><h2><i class="fas fa-gem"></i> منتج جديد</h2><button class="modal-close" onclick="closeAddProductModal()">&times;</button></div>
    <form onsubmit="event.preventDefault();">
        <div class="form-group"><label>اسم المنتج *</label><input type="text" id="productName" required></div>
        <div class="form-group"><label>الوصف</label><textarea id="productDesc" rows="2"></textarea></div>
        <div class="form-group"><label>السعر (دج) *</label><input type="number" id="productPrice" required min="0"></div>
        <div class="form-group"><label>الكمية *</label><input type="number" id="productQty" required min="0"></div>
        <div class="form-group"><label>القسم</label><select id="productCategory"><option>توابل</option><option>عطور</option><option>منتجات طبيعية</option><option>هدايا</option></select></div>
        <div class="form-group"><label>صور</label><input type="file" id="productImages" multiple accept="image/*" onchange="previewImages(this)"><div id="imagePreview" style="display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px;"></div></div>
        <div style="display: flex; gap: 12px;"><button type="button" class="btn btn-outline" onclick="saveProductOnly()" style="flex:1;">حفظ فقط</button><button type="button" class="btn btn-gold" onclick="saveAndPublishProduct()" style="flex:1;">حفظ ونشر</button></div>
    </form>
</div></div>

<!-- مودال تعديل المخزون -->
<div id="editStockModal" class="modal"><div class="modal-content"><div class="modal-header"><h2>تعديل المخزون</h2><button class="modal-close" onclick="closeEditStockModal()">&times;</button></div>
    <form onsubmit="event.preventDefault(); updateStock();">
        <div class="form-group"><label>المنتج</label><input type="text" id="editProductName" disabled></div>
        <div class="form-group"><label>المعرف</label><input type="text" id="editProductID" disabled></div>
        <div class="form-group"><label>الكمية الحالية</label><input type="text" id="editCurrentQty" disabled></div>
        <div class="form-group"><label>نوع العملية</label><select id="stockOperation"><option value="add">➕ إضافة</option><option value="remove">➖ سحب</option><option value="set">📝 تعيين</option></select></div>
        <div class="form-group"><label>الكمية</label><input type="number" id="editNewQty" required min="0"></div>
        <div class="form-group"><label>السبب</label><input type="text" id="stockReason" placeholder="مثال: جرد"></div>
        <button type="submit" class="btn btn-gold" style="width:100%">تحديث</button>
    </form>
</div></div>

<script>
    // ========== إعدادات تلغرام ==========
    const TELEGRAM = { botToken: '8576673096:AAGvSMjzwVWj6wJ47JdqiDwcObXjBDcyiLA', channelId: '-1003822964890', apiUrl: 'https://api.telegram.org/bot' };
    let products = JSON.parse(localStorage.getItem('nardo_products') || '[]');
    let orders = JSON.parse(localStorage.getItem('nardo_orders') || '[]');
    let stockLog = JSON.parse(localStorage.getItem('nardo_stock_log') || '[]');
    let currentStore = null;
    let editProductId = null;
    let isAdminMode = false;
    let filterMode = 'current';
    let currentImages = [];

    // ========== إدارة المتجر ==========
    function generateStoreID(storeName) { let clean = storeName.replace(/[^a-zA-Z0-9\u0600-\u06FF]/g, '').substring(0, 8).toUpperCase(); if(!clean) clean='متجري'; return `${clean}-${Math.floor(Math.random()*900000+100000)}`; }
    function getOrCreateStoreID(store) { if(store.storeFixedID) return store.storeFixedID; store.storeFixedID = generateStoreID(store.storeName || store.name || 'ناردو ماركت'); return store.storeFixedID; }
    function getNextProductSerial(storeID) { return (products.filter(p => p.storeID === storeID).length + 1).toString().padStart(3, '0'); }
    function generateProductCompositeID(storeID, serial) { return `${storeID}-${serial}`; }

    function loadCurrentStore() {
        let stored = localStorage.getItem('current_store');
        if(stored) currentStore = JSON.parse(stored);
        else currentStore = { id: Date.now(), name: 'ناردو ماركت', storeName: 'ناردو ماركت', phone: '0555123456', address: 'الجزائر' };
        getOrCreateStoreID(currentStore);
        localStorage.setItem('current_store', JSON.stringify(currentStore));
        document.getElementById('merchantDisplay').innerHTML = currentStore.storeName;
        document.getElementById('merchantIDBox').innerHTML = currentStore.storeFixedID;
        document.getElementById('currentStoreName').innerHTML = currentStore.storeName;
        document.getElementById('currentStoreID').innerHTML = currentStore.storeFixedID;
        updateStoreProductCount();
    }
    function updateStoreProductCount() { document.getElementById('storeProductCount').innerHTML = products.filter(p => p.storeID === currentStore.storeFixedID).length; }

    // ========== جلب المنتجات من تلغرام ==========
    async function fetchProductsFromTelegram() {
        try {
            updateSyncStatus('جاري الجلب...', 'fa-spin fa-sync-alt');
            const res = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getUpdates?limit=100`);
            const data = await res.json();
            if(!data.ok) throw new Error('فشل الاتصال');
            let newCount = 0;
            for(const update of data.result || []) {
                const post = update.channel_post || update.message;
                if(!post || !post.photo) continue;
                const caption = post.caption || '';
                let name='منتج', price=1000, category='أخرى', stock=10, storeID='', storeName='', productCompositeID='', description='';
                caption.split('\n').forEach(line => {
                    if(line.includes('المنتج:')) name = line.split(':')[1]?.trim() || name;
                    if(line.includes('السعر:')) price = parseInt(line.split(':')[1]) || price;
                    if(line.includes('القسم:')) category = line.split(':')[1]?.trim() || category;
                    if(line.includes('الكمية:')) stock = parseInt(line.split(':')[1]) || stock;
                    if(line.includes('معرف المتجر:')) storeID = line.split(':')[1]?.trim() || storeID;
                    if(line.includes('المتجر:')) storeName = line.split(':')[1]?.trim() || storeName;
                    if(line.includes('معرف المنتج:')) productCompositeID = line.split(':')[1]?.trim() || productCompositeID;
                    if(line.includes('الوصف:')) description = line.split(':')[1]?.trim() || description;
                });
                if(!storeID && productCompositeID) storeID = productCompositeID.split('-').slice(0,2).join('-');
                let imgUrl = "https://via.placeholder.com/300/ffd700/000000?text=منتج";
                if(post.photo) {
                    const fileId = post.photo[post.photo.length-1].file_id;
                    const fileRes = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getFile?file_id=${fileId}`);
                    const fileData = await fileRes.json();
                    if(fileData.ok) imgUrl = `https://api.telegram.org/file/bot${TELEGRAM.botToken}/${fileData.result.file_path}`;
                }
                const exists = products.some(p => p.telegramId === post.message_id);
                if(!exists) {
                    products.push({ id: Date.now()+Math.random(), telegramId: post.message_id, name, price, category, quantity: stock, storeID, storeName, productCompositeID, description, images: [imgUrl], source: 'telegram', published: true, createdAt: new Date().toISOString() });
                    newCount++;
                }
            }
            localStorage.setItem('nardo_products', JSON.stringify(products));
            renderAll();
            updateSyncStatus(`تم جلب ${newCount} منتج`, 'fa-check-circle');
            showToast(`✅ تم جلب ${newCount} منتج جديد`, 'success');
        } catch(e) { updateSyncStatus('فشل', 'fa-exclamation-circle'); showToast('❌ فشل الجلب', 'error'); }
    }

    async function fetchMyStoreProductsOnly() {
        if(!currentStore?.storeFixedID) { showToast('لا يوجد متجر محدد', 'error'); return; }
        await fetchProductsFromTelegram();
        showToast(`✅ تم تحديث منتجات متجر ${currentStore.storeName}`, 'success');
    }

    function updateSyncStatus(msg, icon) { let el = document.getElementById('syncStatus'); if(el) el.innerHTML = `<i class="fas ${icon}"></i><span>${msg}</span>`; }
    function findProductById() { let id = prompt('🔍 أدخل معرف المنتج المركب:'); if(id) { let p = products.find(p => p.productCompositeID === id); alert(p ? `✅ ${p.name}\n💰 ${p.price} دج\n📦 المخزون: ${p.quantity}` : '❌ غير موجود'); } }

    // ========== إدارة المنتجات ==========
    function saveProductOnly() {
        let name = document.getElementById('productName').value.trim();
        let price = parseInt(document.getElementById('productPrice').value);
        let quantity = parseInt(document.getElementById('productQty').value);
        if(!name || isNaN(price) || isNaN(quantity)) { showToast('املأ الحقول المطلوبة', 'error'); return; }
        let storeID = getOrCreateStoreID(currentStore);
        let serial = getNextProductSerial(storeID);
        let compositeID = generateProductCompositeID(storeID, serial);
        let newProduct = { id: Date.now(), storeID, storeName: currentStore.storeName, productCompositeID: compositeID, serialNumber: serial, name, price, quantity, description: document.getElementById('productDesc').value, category: document.getElementById('productCategory').value, images: [...currentImages], createdAt: new Date().toISOString(), published: false, source: 'local' };
        products.push(newProduct);
        localStorage.setItem('nardo_products', JSON.stringify(products));
        addStockLog(newProduct.id, newProduct.name, 'add', quantity, 0, quantity, 'إنشاء منتج', newProduct.storeID);
        renderAll();
        closeAddProductModal();
        showToast(`✅ تم حفظ ${name} - المعرف: ${compositeID}`, 'success');
    }

    async function saveAndPublishProduct() {
        let name = document.getElementById('productName').value.trim();
        let price = parseInt(document.getElementById('productPrice').value);
        let quantity = parseInt(document.getElementById('productQty').value);
        if(!name || isNaN(price) || isNaN(quantity)) { showToast('املأ الحقول', 'error'); return; }
        let imgInput = document.getElementById('productImages');
        if(!imgInput.files.length) { showToast('⚠️ النشر يتطلب صورة', 'warning'); return; }
        let storeID = getOrCreateStoreID(currentStore);
        let serial = getNextProductSerial(storeID);
        let compositeID = generateProductCompositeID(storeID, serial);
        let newProduct = { id: Date.now(), storeID, storeName: currentStore.storeName, productCompositeID: compositeID, serialNumber: serial, name, price, quantity, description: document.getElementById('productDesc').value, category: document.getElementById('productCategory').value, images: [...currentImages], createdAt: new Date().toISOString(), published: false, source: 'local' };
        try {
            let file = imgInput.files[0];
            let caption = `🟣 منتج جديد في ناردو برو\n━━━━━━━━━━━━━━━━━━\n📦 المنتج: ${name}\n💰 السعر: ${price.toLocaleString()} دج\n🏷️ القسم: ${newProduct.category}\n📊 الكمية: ${quantity}\n🆔 معرف المنتج: \`${compositeID}\`\n🏪 المتجر: ${currentStore.storeName}\n🆔 معرف المتجر: \`${storeID}\``;
            let formData = new FormData();
            formData.append('chat_id', TELEGRAM.channelId);
            formData.append('photo', file);
            formData.append('caption', caption);
            formData.append('parse_mode', 'Markdown');
            let res = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/sendPhoto`, { method: 'POST', body: formData });
            let data = await res.json();
            if(data.ok) { newProduct.published = true; newProduct.telegramId = data.result.message_id; showToast('✅ تم النشر بنجاح', 'success'); }
            else throw new Error('فشل النشر');
        } catch(e) { showToast('⚠️ فشل النشر، تم الحفظ محلياً', 'warning'); }
        products.push(newProduct);
        localStorage.setItem('nardo_products', JSON.stringify(products));
        addStockLog(newProduct.id, newProduct.name, 'add', quantity, 0, quantity, 'نشر فوري', newProduct.storeID);
        renderAll();
        closeAddProductModal();
    }

    function deleteProduct(id) { if(confirm('حذف المنتج نهائياً؟')) { products = products.filter(p => p.id !== id); localStorage.setItem('nardo_products', JSON.stringify(products)); renderAll(); showToast('تم الحذف', 'success'); } }

    // ========== المخزون والسجل ==========
    function addStockLog(pid, pname, op, qty, oldQ, newQ, reason='', storeID='') { stockLog.unshift({ id: Date.now(), productId: pid, productName: pname, operation: op, quantity: qty, oldQty: oldQ, newQty: newQ, reason, storeID: storeID || currentStore.storeFixedID, date: new Date().toLocaleString('ar-EG') }); if(stockLog.length>500) stockLog.pop(); localStorage.setItem('nardo_stock_log', JSON.stringify(stockLog)); }
    function updateStock() { let p = products.find(p => p.id === editProductId); if(!p) return; let op = document.getElementById('stockOperation').value; let qtyVal = parseInt(document.getElementById('editNewQty').value); let reason = document.getElementById('stockReason').value; if(isNaN(qtyVal)) return; let oldQ = p.quantity, newQ = oldQ; if(op === 'add') { newQ = oldQ + qtyVal; addStockLog(p.id, p.name, 'add', qtyVal, oldQ, newQ, reason, p.storeID); } else if(op === 'remove') { if(qtyVal > oldQ) { showToast('الكمية أكبر من المخزون', 'error'); return; } newQ = oldQ - qtyVal; addStockLog(p.id, p.name, 'remove', qtyVal, oldQ, newQ, reason, p.storeID); } else if(op === 'set') { newQ = qtyVal; addStockLog(p.id, p.name, 'set', Math.abs(newQ-oldQ), oldQ, newQ, reason, p.storeID); } p.quantity = newQ; localStorage.setItem('nardo_products', JSON.stringify(products)); renderAll(); closeEditStockModal(); showToast('تم تحديث المخزون', 'success'); }
    function clearStockLog() { if(confirm('مسح سجل المخزون؟')) { stockLog = []; localStorage.setItem('nardo_stock_log', '[]'); renderStockLog(); showToast('تم المسح', 'success'); } }
    function openEditStockModal(id) { editProductId = id; let p = products.find(p => p.id === id); if(p) { document.getElementById('editProductName').value = p.name; document.getElementById('editProductID').value = p.productCompositeID; document.getElementById('editCurrentQty').value = p.quantity; document.getElementById('editNewQty').value = 0; document.getElementById('editStockModal').classList.add('active'); } }
    function closeEditStockModal() { document.getElementById('editStockModal').classList.remove('active'); editProductId = null; }

    // ========== الطلبات ==========
    function quickOrder(productId) { let p = products.find(p => p.id === productId); if(!p || p.quantity <= 0) { showToast('المنتج غير متوفر', 'error'); return; } let qty = parseInt(prompt(`الكمية المطلوبة من "${p.name}" (المتاح: ${p.quantity})`, "1")); if(isNaN(qty) || qty <= 0 || qty > p.quantity) { showToast('كمية غير صالحة', 'error'); return; } let newOrder = { id: Date.now(), date: new Date().toLocaleString('ar-EG'), customerName: 'طلب مباشر', storeID: p.storeID, storeName: p.storeName, items: [{ id: p.id, name: p.name, price: p.price, quantity: qty }], total: p.price * qty }; orders.unshift(newOrder); p.quantity -= qty; localStorage.setItem('nardo_orders', JSON.stringify(orders)); localStorage.setItem('nardo_products', JSON.stringify(products)); addStockLog(p.id, p.name, 'remove', qty, p.quantity + qty, p.quantity, 'طلب شراء', p.storeID); renderAll(); showToast(`✅ تم إنشاء الطلب #${newOrder.id}`, 'success'); }
    function clearOrders() { if(confirm('مسح جميع الطلبات؟')) { localStorage.setItem('nardo_orders', '[]'); orders = []; renderOrders(); showToast('تم المسح', 'success'); } }
    function exportOrderToPDF(orderId) { let order = orders.find(o => o.id === orderId); if(!order) return; showToast('جاري تجهيز PDF...', 'info'); let { jsPDF } = window.jspdf; let doc = new jsPDF(); doc.text(`فاتورة طلب #${order.id}`, 10, 10); doc.text(`التاريخ: ${order.date}`, 10, 20); doc.text(`العميل: ${order.customerName}`, 10, 30); let y = 50; order.items.forEach(item => { doc.text(`${item.name} x${item.quantity} = ${(item.price*item.quantity).toLocaleString()} دج`, 10, y); y += 10; }); doc.text(`الإجمالي: ${order.total.toLocaleString()} دج`, 10, y+10); doc.save(`order_${order.id}.pdf`); showToast('✅ تم تصدير PDF', 'success'); }

    // ========== العرض ==========
    function renderProducts() {
        let search = document.getElementById('searchProducts')?.value.toLowerCase() || '';
        let filtered = products.filter(p => (isAdminMode || p.published) && (filterMode !== 'current' || p.storeID === currentStore.storeFixedID) && (p.name.toLowerCase().includes(search) || (p.productCompositeID && p.productCompositeID.includes(search))));
        let container = document.getElementById('productsGrid');
        if(!filtered.length) { container.innerHTML = '<div style="text-align:center; padding:40px;">لا توجد منتجات</div>'; return; }
        container.innerHTML = filtered.map(p => `<div class="product-card"><div class="product-id-badge">📦 ${p.productCompositeID}</div><div class="merchant-id-badge">${p.storeID?.split('-')[0]}</div><div class="product-images">${(p.images||[]).slice(0,2).map(img => `<img src="${img}" onclick="viewProductImages(${p.id})">`).join('')}</div><div class="product-name">${p.name}</div><div class="product-price">${p.price.toLocaleString()} دج</div><div><span class="stock-badge ${p.quantity>10?'stock-high':(p.quantity>0?'stock-low':'stock-out')}">${p.quantity>0?`متوفر (${p.quantity})`:'نفد'}</span></div><div class="product-actions"><button class="btn btn-gold" onclick="quickOrder(${p.id})"><i class="fas fa-shopping-bag"></i> طلب</button>${isAdminMode?`<button class="btn btn-info" onclick="openEditStockModal(${p.id})"><i class="fas fa-edit"></i></button><button class="btn btn-outline" onclick="deleteProduct(${p.id})"><i class="fas fa-trash"></i></button>`:''}</div></div>`).join('');
    }
    function viewProductImages(id) { let p = products.find(x=>x.id===id); if(p?.images) alert(p.images.join('\n')); }
    function renderInventory() { let tbody = document.getElementById('inventoryTable'); let filtered = (isAdminMode ? products : products.filter(p => p.storeID === currentStore.storeFixedID)); let stats = { total: filtered.length, available: filtered.filter(p=>p.quantity>0).length, out: filtered.filter(p=>p.quantity<=0).length, value: filtered.reduce((s,p)=>s+(p.price*p.quantity),0) }; document.getElementById('inventoryStats').innerHTML = `<div class="inv-stat-card"><div class="inv-stat-icon"><i class="fas fa-boxes"></i></div><div class="inv-stat-info"><h4>الإجمالي</h4><div class="value">${stats.total}</div></div></div><div class="inv-stat-card"><div class="inv-stat-icon"><i class="fas fa-check-circle"></i></div><div class="inv-stat-info"><h4>متوفر</h4><div class="value">${stats.available}</div></div></div><div class="inv-stat-card"><div class="inv-stat-icon"><i class="fas fa-exclamation"></i></div><div class="inv-stat-info"><h4>نفد</h4><div class="value">${stats.out}</div></div></div><div class="inv-stat-card"><div class="inv-stat-icon"><i class="fas fa-coins"></i></div><div class="inv-stat-info"><h4>القيمة</h4><div class="value">${stats.value.toLocaleString()} دج</div></div></div>`; tbody.innerHTML = filtered.map(p => `<tr><td><strong>${p.name}</strong></td><td style="font-family:monospace; font-size:12px;">${p.productCompositeID}</td><td>${p.storeID?.split('-')[0]}</td><td style="color:var(--success);">${p.price.toLocaleString()} دج</td><td style="font-weight:800;">${p.quantity}</td><td><span class="stock-badge ${p.quantity>0?'stock-high':'stock-out'}">${p.quantity>0?'متاح':'نفد'}</span></td><td><button class="btn btn-gold" style="padding:5px 12px;" onclick="openEditStockModal(${p.id})"><i class="fas fa-edit"></i> تعديل</button></td></tr>`).join(''); }
    function renderStockLog() { let c = document.getElementById('stockLogContainer'); let filtered = isAdminMode ? stockLog : stockLog.filter(l => l.storeID === currentStore.storeFixedID); if(!filtered.length) { c.innerHTML = '<div style="text-align:center; padding:40px;">لا توجد حركات</div>'; return; } c.innerHTML = filtered.map(l => `<div class="stock-log-item"><div><strong style="color:gold;">${l.productName}</strong><br>${l.operation==='add'?'➕ إضافة':(l.operation==='remove'?'➖ سحب':'📝 تعيين')} ${l.quantity} | ${l.oldQty} → ${l.newQty}<br><span style="font-size:11px;">${l.reason||''}</span></div><div style="font-size:12px;">${l.date}</div></div>`).join(''); }
    function renderOrders() { let c = document.getElementById('ordersContainer'); let filtered = isAdminMode ? orders : orders.filter(o => o.storeID === currentStore.storeFixedID); if(!filtered.length) { c.innerHTML = '<div style="text-align:center; padding:40px;">لا توجد طلبات</div>'; return; } c.innerHTML = filtered.map(o => `<div class="order-card" style="background:rgba(0,0,0,0.3); border-radius:20px; padding:16px; margin-bottom:12px;"><div style="display:flex; justify-content:space-between;"><div><strong>#${o.id}</strong> | ${o.date}</div><div><strong>${o.customerName}</strong></div></div><div>${o.items.map(i=>`${i.name} x${i.quantity}`).join(' - ')}</div><div style="color:var(--gold); font-weight:800;">الإجمالي: ${o.total.toLocaleString()} دج</div><div style="margin-top:10px;"><button class="btn btn-success" style="padding:5px 12px;" onclick="exportOrderToPDF(${o.id})"><i class="fas fa-file-pdf"></i> PDF</button></div></div>`).join(''); }
    function updateStats() { let tp = isAdminMode ? products.length : products.filter(p=>p.storeID===currentStore.storeFixedID).length; let to = isAdminMode ? orders.length : orders.filter(o=>o.storeID===currentStore.storeFixedID).length; document.getElementById('statTotal').innerText = tp; document.getElementById('statOrders').innerText = to; updateStoreProductCount(); }
    function showToast(msg, type) { let t = document.createElement('div'); t.className = `toast ${type}`; t.innerText = msg; document.body.appendChild(t); setTimeout(()=>t.remove(), 3000); }
    function toggleAdminMode() { isAdminMode = !isAdminMode; renderAll(); showToast(isAdminMode ? '🔐 وضع المدير: جميع البيانات' : '👤 وضع الزبون: متجرك فقط', 'info'); }
    function filterByStore() { filterMode = document.getElementById('storeFilterSelect').value; renderProducts(); renderInventory(); renderStockLog(); renderOrders(); }
    function openAddProductModal() { document.getElementById('addProductModal').classList.add('active'); currentImages = []; document.getElementById('imagePreview').innerHTML = ''; document.getElementById('productImages').value = ''; document.getElementById('productName').value = ''; document.getElementById('productDesc').value = ''; document.getElementById('productPrice').value = ''; document.getElementById('productQty').value = ''; }
    function closeAddProductModal() { document.getElementById('addProductModal').classList.remove('active'); }
    function previewImages(input) { let preview = document.getElementById('imagePreview'); preview.innerHTML = ''; currentImages = []; for(let i=0; i<input.files.length; i++) { let reader = new FileReader(); reader.onload = e => { currentImages.push(e.target.result); let div = document.createElement('div'); div.innerHTML = `<img src="${e.target.result}" style="width:70px; height:70px; border-radius:12px; border:1px solid gold;">`; preview.appendChild(div); }; reader.readAsDataURL(input.files[i]); } }
    function renderAll() { renderProducts(); renderInventory(); renderStockLog(); renderOrders(); updateStats(); }

    // ========== التبويب ==========
    document.querySelectorAll('.nav-link').forEach(btn => { btn.addEventListener('click', () => { document.querySelectorAll('.nav-link').forEach(b => b.classList.remove('active')); btn.classList.add('active'); let tab = btn.dataset.tab; document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none'); document.getElementById(`${tab}Tab`).style.display = 'block'; if(tab === 'products') renderProducts(); if(tab === 'inventory') renderInventory(); if(tab === 'stockLog') renderStockLog(); if(tab === 'orders') renderOrders(); }); });
    document.getElementById('searchProducts')?.addEventListener('input', renderProducts);
    loadCurrentStore(); renderAll();
</script>
</body>
</html>
