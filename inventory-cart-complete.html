<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ناردو برو | إدارة المخزون</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #0a0a1a;
            --secondary: #1a1a2e;
            --gold: #ffd700;
            --gold-dark: #daa520;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --success: #4ade80;
            --error: #f87171;
            --warning: #fbbf24;
            --info: #60a5fa;
            --telegram: #0088cc;
        }
        
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0b0b14 0%, #15152a 100%);
            color: var(--text-primary);
            min-height: 100vh;
        }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        .top-navbar {
            background: linear-gradient(135deg, rgba(10,10,26,0.95), rgba(26,26,46,0.95));
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,215,0,0.25);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-left { flex: 1; display: flex; justify-content: flex-start; }
        .nav-logo { display: flex; align-items: center; gap: 10px; }
        .nav-logo i { font-size: 28px; color: var(--gold); }
        .nav-logo .logo-text { font-size: 18px; font-weight: 800; background: linear-gradient(135deg, #ffd700, #ffed4e); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .nav-logo small { font-size: 9px; color: #888; display: block; }

        .nav-center { flex: 1; display: flex; justify-content: center; }
        .store-circle { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: all 0.3s ease; }
        .circle-icon { width: 55px; height: 55px; background: linear-gradient(135deg, var(--gold), var(--gold-dark)); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(255,215,0,0.4); }
        .circle-icon i { font-size: 28px; color: #111; }
        .store-circle:hover .circle-icon { transform: scale(1.1); }
        .store-name-circle { font-size: 11px; font-weight: 700; margin-top: 6px; color: var(--gold); background: rgba(255,215,0,0.15); padding: 3px 10px; border-radius: 20px; }

        .nav-right { flex: 1; display: flex; justify-content: flex-end; gap: 10px; }
        .nav-btn { padding: 8px 18px; border-radius: 40px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; font-family: 'Cairo', sans-serif; display: flex; align-items: center; gap: 6px; transition: all 0.2s ease; }
        .nav-btn-telegram { background: linear-gradient(135deg, #0088cc, #006699); color: white; }
        .nav-btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: #111; }
        .nav-btn-delivery { background: linear-gradient(135deg, #22c55e, #16a34a); color: white; }
        .nav-btn-outline { background: transparent; border: 1px solid rgba(255,215,0,0.4); color: var(--gold); }

        .tabs-bar {
            background: linear-gradient(135deg, rgba(10,10,26,0.9), rgba(26,26,46,0.9));
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,215,0,0.15);
            padding: 10px 20px;
            display: flex;
            justify-content: center;
            gap: 12px;
            position: sticky;
            top: 70px;
            z-index: 999;
            flex-wrap: wrap;
        }
        .tab-btn { padding: 10px 28px; border-radius: 40px; background: transparent; color: var(--text-secondary); font-weight: 700; font-size: 15px; cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; gap: 8px; border: none; font-family: 'Cairo', sans-serif; }
        .tab-btn.active { background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,215,0,0.08)); color: var(--gold); border: 1px solid rgba(255,215,0,0.25); }

        .store-card { background: linear-gradient(135deg, rgba(255,215,0,0.08), rgba(0,0,0,0.3)); border: 1px solid rgba(255,215,0,0.15); border-radius: 28px; padding: 16px 24px; margin: 20px 0; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
        .store-info { display: flex; gap: 24px; flex-wrap: wrap; }
        .store-item { display: flex; align-items: center; gap: 8px; font-size: 13px; }
        .store-item i { color: var(--gold); }
        .stats-badges { display: flex; gap: 12px; }
        .stat-badge { background: rgba(0,0,0,0.4); padding: 6px 14px; border-radius: 24px; text-align: center; border: 1px solid rgba(255,215,0,0.15); }
        .stat-badge .number { font-size: 18px; font-weight: 800; background: linear-gradient(135deg, #ffd700, #ffb347); -webkit-background-clip: text; background-clip: text; color: transparent; }

        .toolbar { background: linear-gradient(135deg, rgba(255,215,0,0.05), rgba(0,0,0,0.2)); border-radius: 28px; padding: 12px 20px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        .search-box { display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,215,0,0.15); border-radius: 40px; padding: 8px 18px; flex: 1; max-width: 300px; }
        .search-box input { background: transparent; border: none; color: white; font-family: 'Cairo', sans-serif; font-size: 13px; width: 100%; }
        .btn { padding: 10px 24px; border: none; border-radius: 40px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'Cairo', sans-serif; display: inline-flex; align-items: center; gap: 8px; transition: all 0.2s ease; }
        .btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: #111; }
        .btn-telegram { background: linear-gradient(135deg, #0088cc, #006699); color: white; }
        .btn-outline { background: transparent; border: 2px solid var(--gold); color: var(--gold); }
        .btn-info { background: linear-gradient(135deg, #60a5fa, #3b82f6); color: white; }
        .btn-danger { background: linear-gradient(135deg, #f87171, #ef4444); color: white; }
        .btn-sm { padding: 5px 12px; font-size: 12px; }

        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 24px; margin-bottom: 20px; }
        .product-card { background: linear-gradient(145deg, rgba(25,25,45,0.9), rgba(15,15,30,0.95)); backdrop-filter: blur(8px); border: 1px solid rgba(255,215,0,0.15); border-radius: 28px; padding: 20px; transition: all 0.3s ease; position: relative; }
        .product-card:hover { transform: translateY(-5px); border-color: rgba(255,215,0,0.4); }
        .product-id-badge { position: absolute; top: 15px; left: 15px; background: linear-gradient(135deg, var(--gold), #ffb347); color: #111; padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 800; }
        .product-published-badge { position: absolute; top: 15px; right: 15px; background: rgba(0,136,204,0.8); color: white; padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 800; display: flex; align-items: center; gap: 4px; }
        .product-name { font-size: 20px; font-weight: 900; background: linear-gradient(135deg, #ffd700, #ffb347); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 10px; }
        .product-price { font-size: 24px; font-weight: 900; color: var(--success); margin: 8px 0; }
        .stock-status { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .stock-status.high { background: rgba(74,222,128,0.15); color: var(--success); }
        .stock-status.low { background: rgba(251,191,36,0.15); color: var(--warning); }
        .stock-status.out { background: rgba(248,113,113,0.15); color: var(--error); }

        .table-container { background: rgba(0,0,0,0.25); border-radius: 24px; border: 1px solid rgba(255,215,0,0.12); overflow-x: auto; margin-bottom: 20px; }
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th { text-align: right; padding: 14px 16px; background: linear-gradient(135deg, rgba(255,215,0,0.12), rgba(255,215,0,0.06)); color: var(--gold); font-weight: 800; font-size: 13px; }
        .data-table td { padding: 12px 16px; border-bottom: 1px solid rgba(255,215,0,0.06); font-size: 13px; }

        .stock-log-item { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,215,0,0.1); border-radius: 16px; padding: 12px 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: linear-gradient(135deg, rgba(26,26,46,0.98), rgba(10,10,25,0.98)); border: 1px solid rgba(255,215,0,0.2); border-radius: 28px; padding: 28px; max-width: 650px; width: 90%; max-height: 90vh; overflow-y: auto; }
        .modal-header { font-size: 22px; font-weight: 900; color: var(--gold); margin-bottom: 20px; display: flex; justify-content: space-between; }
        .modal-close { background: none; border: none; color: var(--gold); font-size: 28px; cursor: pointer; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 6px; color: var(--gold); font-weight: 700; font-size: 12px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px 16px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,215,0,0.15); border-radius: 14px; color: white; font-family: 'Cairo', sans-serif; font-size: 14px; }

        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); padding: 12px 24px; border-radius: 40px; color: white; font-weight: 700; z-index: 3000; display: flex; align-items: center; gap: 10px; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { bottom: -50px; opacity: 0; } to { bottom: 30px; opacity: 1; } }
        .toast.success { background: linear-gradient(135deg, #22c55e, #16a34a); }
        .toast.error { background: linear-gradient(135deg, #ef4444, #dc2626); }

        @media (max-width: 768px) {
            .top-navbar { padding: 10px; }
            .products-grid { grid-template-columns: 1fr; }
            .tabs-bar { top: 60px; }
        }
    </style>
</head>
<body>

<nav class="top-navbar">
    <div class="nav-left">
        <div class="nav-logo">
            <i class="fas fa-bolt"></i>
            <div>
                <span class="logo-text">ناردو برو</span>
                <small>إدارة المخزون</small>
            </div>
        </div>
    </div>
    <div class="nav-center">
        <div class="store-circle" onclick="location.reload()">
            <div class="circle-icon"><i class="fas fa-store"></i></div>
            <div class="store-name-circle" id="currentStoreNameDisplay">جاري التحميل...</div>
        </div>
    </div>
    <div class="nav-right">
        <button class="nav-btn nav-btn-telegram" onclick="window.open('https://t.me/NardoProBot', '_blank')">
            <i class="fab fa-telegram"></i> بوت ناردو
        </button>
        <button class="nav-btn nav-btn-delivery" onclick="window.open('delivery.html', '_blank')">
            <i class="fas fa-truck"></i> التوصيل
        </button>
        <button class="nav-btn nav-btn-gold" onclick="openAddProductModal()">
            <i class="fas fa-plus"></i> منتج جديد
        </button>
    </div>
</nav>

<div class="tabs-bar">
    <button class="tab-btn active" onclick="showTab('products', this)"><i class="fas fa-th-large"></i> المنتجات</button>
    <button class="tab-btn" onclick="showTab('inventory', this)"><i class="fas fa-boxes"></i> المخزون</button>
    <button class="tab-btn" onclick="showTab('stockLog', this)"><i class="fas fa-history"></i> السجل</button>
</div>

<div class="container">
    <div class="store-card">
        <div class="store-info">
            <div class="store-item"><i class="fas fa-id-badge"></i> <span>معرف المتجر: <strong id="storeIDDisplay">---</strong></span></div>
            <div class="store-item"><i class="fas fa-link"></i> <span>القناة: <strong id="storeChannelDisplay">---</strong></span></div>
        </div>
        <div class="stats-badges">
            <div class="stat-badge"><div class="number" id="statTotal">0</div><div class="label">منتج</div></div>
        </div>
    </div>

    <div id="productsTab" class="tab-content">
        <div class="toolbar">
            <div class="search-box"><i class="fas fa-search"></i><input type="text" id="searchProducts" placeholder="ابحث عن منتج..."></div>
            <button class="btn btn-telegram" id="fetchProductsBtn" onclick="fetchProductsFromTelegram()"><i class="fas fa-sync"></i> جلب من تلغرام</button>
        </div>
        <div class="products-grid" id="productsGrid"></div>
    </div>

    <div id="inventoryTab" class="tab-content" style="display:none;">
        <div class="toolbar"><h2 style="color:var(--gold); font-size:18px;"><i class="fas fa-boxes"></i> إدارة المخزون</h2></div>
        <div class="table-container">
            <table class="data-table">
                <thead><tr><th>المنتج</th><th>المعرف</th><th>السعر</th><th>الكمية</th><th>الحالة</th><th>المصدر</th><th>إجراء</th></tr></thead>
                <tbody id="inventoryTable"></tbody>
            </table>
        </div>
    </div>

    <div id="stockLogTab" class="tab-content" style="display:none;">
        <div class="toolbar"><h2 style="color:var(--gold); font-size:18px;"><i class="fas fa-history"></i> سجل حركات المخزون</h2></div>
        <div id="stockLogContainer"></div>
    </div>
</div>

<div id="addProductModal" class="modal">
    <div class="modal-content">
        <div class="modal-header"><span><i class="fas fa-cube"></i> إضافة منتج جديد</span><button class="modal-close" onclick="closeAddProductModal()">&times;</button></div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div>
                <div class="form-group"><label>اسم المنتج *</label><input type="text" id="productName" placeholder="اسم المنتج"></div>
                <div class="form-group"><label>الوصف</label><textarea id="productDesc" rows="3" placeholder="وصف المنتج"></textarea></div>
                <div class="form-group"><label>السعر (دج) *</label><input type="number" id="productPrice" placeholder="0"></div>
            </div>
            <div>
                <div class="form-group"><label>الكمية *</label><input type="number" id="productQty" value="1"></div>
                <div class="form-group"><label>القسم</label><select id="productCategory"><option value="عام">عام</option><option value="عطور">عطور</option><option value="منتجات طبيعية">منتجات طبيعية</option></select></div>
                <div class="form-group"><label>صورة المنتج</label><input type="file" id="productImages" accept="image/*"></div>
            </div>
        </div>
        <div style="display: flex; gap: 15px; margin-top: 20px;">
            <button class="btn btn-outline" onclick="saveProductOnly()" style="flex:1;"><i class="fas fa-save"></i> حفظ فقط</button>
            <button class="btn btn-telegram" onclick="saveAndPublishProduct()" style="flex:1;"><i class="fab fa-telegram"></i> حفظ ونشر</button>
        </div>
    </div>
</div>

<div id="editStockModal" class="modal">
    <div class="modal-content">
        <div class="modal-header"><span>تعديل المخزون</span><button class="modal-close" onclick="closeEditStockModal()">&times;</button></div>
        <div class="form-group"><label>المنتج</label><input type="text" id="editProductName" disabled></div>
        <div class="form-group"><label>المخزون الحالي</label><input type="number" id="editCurrentQty" disabled></div>
        <div class="form-group"><label>العملية</label><select id="stockOperation"><option value="add">إضافة (+)</option><option value="remove">سحب (-)</option><option value="set">تعيين (=)</option></select></div>
        <div class="form-group"><label>الكمية</label><input type="number" id="editNewQty" value="0"></div>
        <div class="form-group"><label>السبب</label><input type="text" id="stockReason" placeholder="مثال: توريد جديد"></div>
        <button class="btn btn-gold" onclick="updateStock()" style="width:100%;">تحديث المخزون</button>
    </div>
</div>

<script>
    const TELEGRAM = { botToken: '8576673096:AAFwOd-Ut1tCyKTHwkgj_r6OFi9UZbb4pTM', channelId: '-1003822964890', apiUrl: 'https://api.telegram.org/bot' };
    
    let products = [], stockLog = [];
    let currentStore = { storeName: 'ناردو برو', storeFixedID: '', channelUsername: '@NardoChannel' };
    let editProductId = null;

    function generateStoreID(name) { let clean = name.replace(/[^a-zA-Z0-9\u0600-\u06FF]/g, '').substring(0,10).toUpperCase()||'NARDO'; return `${clean}-${Math.floor(Math.random()*900000+100000)}`; }
    
    function loadCurrentStore() {
        const saved = localStorage.getItem('nardo_current_store');
        if(saved) { currentStore = JSON.parse(saved); if(!currentStore.storeFixedID?.match(/-\d{6}$/)) currentStore.storeFixedID = generateStoreID(currentStore.storeName); }
        else { currentStore.storeFixedID = generateStoreID(currentStore.storeName); localStorage.setItem('nardo_current_store', JSON.stringify(currentStore)); }
        document.getElementById('currentStoreNameDisplay').innerText = currentStore.storeName;
        document.getElementById('storeIDDisplay').innerText = currentStore.storeFixedID;
        document.getElementById('storeChannelDisplay').innerText = currentStore.channelUsername;
        products = JSON.parse(localStorage.getItem('nardo_products')||'[]');
        stockLog = JSON.parse(localStorage.getItem('nardo_stock_log')||'[]');
        updateStats();
    }

    function updateStats() { document.getElementById('statTotal').innerText = products.filter(p=>p.storeID===currentStore.storeFixedID).length; }

    function getNextSerial(storeID) { let arr = products.filter(p=>p.storeID===storeID); return arr.length?Math.max(...arr.map(p=>p.serialNumber||0))+1:1; }
    function generateCompositeID(storeID, serial) { return `${storeID}-${serial.toString().padStart(3,'0')}`; }

    function cleanTelegramText(t) { return t?t.replace(/[_*[\]()~`>#+\-=|{}.!]/g, '\\$&'):''; }

    async function sendToTelegram(product, imageFile) {
        try {
            showToast('📤 جاري النشر...', 'success');
            const cap = `🟣 *منتج جديد*\n━━━━━━━━━━━━━━\n📦 *المنتج:* ${cleanTelegramText(product.name)}\n💰 *السعر:* ${product.price.toLocaleString()} دج\n📊 *الكمية:* ${product.quantity}\n🆔 *معرف المنتج:* \`${product.productCompositeID}\``;
            let fd = new FormData(); fd.append('chat_id', TELEGRAM.channelId); fd.append('photo', imageFile); fd.append('caption', cap); fd.append('parse_mode', 'Markdown');
            let res = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/sendPhoto`, { method: 'POST', body: fd });
            let data = await res.json();
            if(data.ok) { showToast('✅ تم النشر', 'success'); return { success: true, messageId: data.result.message_id }; }
            else throw new Error(data.description);
        } catch(e) { showToast('❌ فشل النشر','error'); return { success: false }; }
    }

    async function fetchProductsFromTelegram() {
        let btn = document.getElementById('fetchProductsBtn');
        if(btn) { btn.innerHTML = '<span class="loading-spinner"></span> جاري...'; btn.disabled = true; }
        try {
            let res = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getUpdates`);
            let data = await res.json();
            let newCount = 0;
            for(let upd of data.result||[]) {
                let post = upd.channel_post; if(!post?.caption) continue;
                let text = post.caption;
                let storeMatch = text.match(/معرف المتجر: `(.*?)`/);
                if(!storeMatch || storeMatch[1] !== currentStore.storeFixedID) continue;
                let nameMatch = text.match(/المنتج: (.*)/);
                let priceMatch = text.match(/السعر: ([\d,]+)/);
                let idMatch = text.match(/معرف المنتج: `(.*?)`/);
                if(nameMatch && priceMatch && !products.some(p=>p.telegramId===post.message_id)) {
                    products.push({ id: Date.now()+Math.random(), telegramId: post.message_id, name: nameMatch[1].trim(), price: parseInt(priceMatch[1].replace(/,/g,'')), quantity: 10, storeID: currentStore.storeFixedID, storeName: currentStore.storeName, productCompositeID: idMatch?.[1]||'', description: '', source: 'telegram', published: true, serialNumber: getNextSerial(currentStore.storeFixedID) });
                    newCount++;
                }
            }
            localStorage.setItem('nardo_products', JSON.stringify(products));
            renderAll();
            showToast(`جلب ${newCount} منتج`, 'success');
        } catch(e) { showToast('فشل الجلب','error'); }
        finally { if(btn) { btn.innerHTML = '<i class="fas fa-sync"></i> جلب من تلغرام'; btn.disabled = false; } }
    }

    function saveProductOnly() {
        let name = document.getElementById('productName').value.trim();
        let price = parseInt(document.getElementById('productPrice').value);
        let qty = parseInt(document.getElementById('productQty').value);
        if(!name || isNaN(price) || price<=0) { showToast('بيانات غير مكتملة','error'); return; }
        let serial = getNextSerial(currentStore.storeFixedID);
        let newProduct = { id: Date.now(), storeID: currentStore.storeFixedID, storeName: currentStore.storeName, productCompositeID: generateCompositeID(currentStore.storeFixedID, serial), serialNumber: serial, name: name, price: price, quantity: qty, description: document.getElementById('productDesc').value, category: document.getElementById('productCategory').value, createdAt: new Date().toISOString(), source: 'local', published: false, telegramId: null };
        products.push(newProduct);
        localStorage.setItem('nardo_products', JSON.stringify(products));
        addStockLog(newProduct.id, newProduct.name, 'add', qty, 0, qty, 'إنشاء منتج');
        renderAll();
        closeAddProductModal();
        showToast(`✅ تم حفظ ${name}`, 'success');
    }

    async function saveAndPublishProduct() {
        let name = document.getElementById('productName').value.trim();
        let price = parseInt(document.getElementById('productPrice').value);
        let qty = parseInt(document.getElementById('productQty').value);
        let img = document.getElementById('productImages').files[0];
        if(!name || isNaN(price) || price<=0) { showToast('بيانات غير مكتملة','error'); return; }
        if(!img) { showToast('⚠️ النشر يتطلب صورة','warning'); return; }
        let serial = getNextSerial(currentStore.storeFixedID);
        let newProduct = { id: Date.now(), storeID: currentStore.storeFixedID, storeName: currentStore.storeName, productCompositeID: generateCompositeID(currentStore.storeFixedID, serial), serialNumber: serial, name: name, price: price, quantity: qty, description: document.getElementById('productDesc').value, category: document.getElementById('productCategory').value, createdAt: new Date().toISOString(), source: 'local', published: false };
        let result = await sendToTelegram(newProduct, img);
        newProduct.published = result.success;
        if(result.success) newProduct.telegramId = result.messageId;
        products.push(newProduct);
        localStorage.setItem('nardo_products', JSON.stringify(products));
        addStockLog(newProduct.id, newProduct.name, 'add', qty, 0, qty, result.success?'إنشاء ونشر':'إنشاء منتج');
        renderAll();
        closeAddProductModal();
        showToast(result.success?`✅ تم نشر ${name}`:`⚠️ تم حفظ ${name} دون نشر`, result.success?'success':'warning');
    }

    function deleteProduct(id) { if(confirm('حذف؟')) { products = products.filter(p=>p.id!==id); localStorage.setItem('nardo_products', JSON.stringify(products)); renderAll(); showToast('تم الحذف','success'); } }

    function addStockLog(pid, pname, op, qty, oldQ, newQ, reason='') { stockLog.unshift({ id: Date.now(), productId: pid, productName: pname, operation: op, quantity: qty, oldQty: oldQ, newQty: newQ, reason: reason, storeID: currentStore.storeFixedID, date: new Date().toLocaleString('ar-EG') }); if(stockLog.length>500) stockLog = stockLog.slice(0,500); localStorage.setItem('nardo_stock_log', JSON.stringify(stockLog)); }

    function openEditStockModal(id) { editProductId=id; let p=products.find(p=>p.id===id); if(p) { document.getElementById('editProductName').value=p.name; document.getElementById('editCurrentQty').value=p.quantity; document.getElementById('editNewQty').value=0; document.getElementById('editStockModal').classList.add('active'); } }
    function closeEditStockModal() { document.getElementById('editStockModal').classList.remove('active'); editProductId=null; }
    function updateStock() { let p=products.find(p=>p.id===editProductId); if(!p) return; let op=document.getElementById('stockOperation').value; let qty=parseInt(document.getElementById('editNewQty').value); let reason=document.getElementById('stockReason').value; let old=p.quantity, neu=old; if(op==='add') neu=old+qty; else if(op==='remove') { if(qty>old){showToast('كمية أكبر من المخزون','error');return;} neu=old-qty; } else neu=qty; addStockLog(p.id,p.name,op,qty,old,neu,reason); p.quantity=neu; localStorage.setItem('nardo_products', JSON.stringify(products)); renderAll(); closeEditStockModal(); showToast('تم التحديث','success'); }

    function renderProducts() {
        let search = document.getElementById('searchProducts')?.value.toLowerCase()||'';
        let filtered = products.filter(p=>p.storeID===currentStore.storeFixedID && (p.name.toLowerCase().includes(search)||(p.productCompositeID||'').toLowerCase().includes(search)));
        document.getElementById('productsGrid').innerHTML = filtered.length?filtered.map(p=>`<div class="product-card"><div class="product-id-badge">${p.productCompositeID||'---'}</div>${p.published?'<div class="product-published-badge"><i class="fab fa-telegram"></i> منشور</div>':''}<div class="product-name">${p.name}</div><div class="product-price">${p.price.toLocaleString()} دج</div><div><span class="stock-status ${p.quantity>10?'high':(p.quantity>0?'low':'out')}">${p.quantity>0?`المتبقي: ${p.quantity}`:'غير متوفر'}</span></div><div class="product-actions"><button class="btn btn-gold btn-sm" onclick="openEditStockModal(${p.id})"><i class="fas fa-boxes"></i> تعديل المخزون</button><button class="btn btn-danger btn-sm" onclick="deleteProduct(${p.id})"><i class="fas fa-trash"></i></button></div></div>`).join(''):'<div style="text-align:center; padding:40px;">لا توجد منتجات</div>';
    }

    function renderInventory() { let filtered=products.filter(p=>p.storeID===currentStore.storeFixedID); document.getElementById('inventoryTable').innerHTML=filtered.length?filtered.map(p=>`<tr><td><strong>${p.name}</strong></td><td><span style="font-family:monospace;">${p.productCompositeID||'---'}</span></td><td>${p.price.toLocaleString()} دج</td><td style="font-weight:800;">${p.quantity}</td><td><span class="stock-status ${p.quantity>0?'high':'out'}">${p.quantity>0?'متاح':'نفد'}</span></td><td>${p.source==='telegram'?'<i class="fab fa-telegram"></i> تلغرام':'محلي'}</td><td><button class="btn btn-gold btn-sm" onclick="openEditStockModal(${p.id})"><i class="fas fa-edit"></i></button></td></tr>`).join(''):'<tr><td colspan="7" style="text-align:center;">لا توجد منتجات</td></tr>'; }

    function renderStockLog() { let filtered=stockLog.filter(l=>l.storeID===currentStore.storeFixedID); document.getElementById('stockLogContainer').innerHTML=filtered.length?filtered.map(l=>`<div class="stock-log-item"><div><strong style="color:var(--gold);">${l.productName}</strong><br><span>${l.operation==='add'?'➕ إضافة':(l.operation==='remove'?'➖ سحب':'📝 تعيين')} ${l.quantity} | من ${l.oldQty} → ${l.newQty}</span>${l.reason?`<br><span style="font-size:11px;">📌 ${l.reason}</span>`:''}</div><div style="font-size:11px;">${l.date}</div></div>`).join(''):'<div style="text-align:center; padding:40px;">لا توجد حركات</div>'; }

    function renderAll() { renderProducts(); renderInventory(); renderStockLog(); updateStats(); }

    function showTab(tabName, btn) { document.querySelectorAll('.tab-content').forEach(el=>el.style.display='none'); document.getElementById(tabName+'Tab').style.display='block'; document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); if(tabName==='products') renderProducts(); if(tabName==='inventory') renderInventory(); if(tabName==='stockLog') renderStockLog(); }

    function openAddProductModal() { document.getElementById('addProductModal').classList.add('active'); document.getElementById('productName').value=''; document.getElementById('productPrice').value=''; document.getElementById('productQty').value='1'; document.getElementById('productImages').value=''; }
    function closeAddProductModal() { document.getElementById('addProductModal').classList.remove('active'); }
    function showToast(msg, type) { let t=document.createElement('div'); t.className=`toast ${type}`; t.innerHTML=`<i class="fas ${type==='success'?'fa-check-circle':'fa-exclamation-circle'}"></i> ${msg}`; document.body.appendChild(t); setTimeout(()=>t.remove(),3000); }

    document.addEventListener('DOMContentLoaded', ()=>{ loadCurrentStore(); renderAll(); document.getElementById('searchProducts')?.addEventListener('input', renderProducts); setTimeout(fetchProductsFromTelegram,2000); });
</script>
</body>
</html>
