head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ناردو برو | المتجر الذكي - متكامل</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #0a0a1a;
            --secondary: #1a1a2e;
            --gold: #ffd700;
            --gold-dark: #daa520;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --success: #4ade80;
            --error: #f87171;
            --warning: #fbbf24;
            --info: #60a5fa;
            --telegram: #0088cc;
        }
        
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0b0b14 0%, #15152a 100%);
            color: var(--text-primary);
            min-height: 100vh;
        }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        .top-navbar {
            background: linear-gradient(135deg, rgba(10,10,26,0.95), rgba(26,26,46,0.95));
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,215,0,0.25);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-left { flex: 1; display: flex; justify-content: flex-start; }
        .nav-logo { display: flex; align-items: center; gap: 10px; }
        .nav-logo i { font-size: 28px; color: var(--gold); }
        .nav-logo .logo-text { font-size: 18px; font-weight: 800; background: linear-gradient(135deg, #ffd700, #ffed4e); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .nav-logo small { font-size: 9px; color: #888; display: block; }

        .nav-center { flex: 1; display: flex; justify-content: center; }
        .store-circle { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: all 0.3s ease; }
        .circle-icon { width: 55px; height: 55px; background: linear-gradient(135deg, var(--gold), var(--gold-dark)); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(255,215,0,0.4); transition: all 0.3s ease; }
        .circle-icon i { font-size: 28px; color: #111; }
        .store-circle:hover .circle-icon { transform: scale(1.1); box-shadow: 0 6px 25px rgba(255,215,0,0.6); }
        .store-name-circle { font-size: 11px; font-weight: 700; margin-top: 6px; color: var(--gold); background: rgba(255,215,0,0.15); padding: 3px 10px; border-radius: 20px; }

        .nav-right { flex: 1; display: flex; justify-content: flex-end; gap: 10px; }
        .nav-btn { padding: 8px 18px; border-radius: 40px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; font-family: 'Cairo', sans-serif; display: flex; align-items: center; gap: 6px; transition: all 0.2s ease; }
        .nav-btn-telegram { background: linear-gradient(135deg, #0088cc, #006699); color: white; }
        .nav-btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: #111; }
        .nav-btn-outline { background: transparent; border: 1px solid rgba(255,215,0,0.4); color: var(--gold); }
        .nav-btn-outline:hover { background: rgba(255,215,0,0.1); }

        .tabs-bar {
            background: linear-gradient(135deg, rgba(10,10,26,0.9), rgba(26,26,46,0.9));
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,215,0,0.15);
            padding: 10px 20px;
            display: flex;
            justify-content: center;
            gap: 12px;
            position: sticky;
            top: 70px;
            z-index: 999;
            flex-wrap: wrap;
        }
        .tab-btn { padding: 10px 28px; border-radius: 40px; background: transparent; color: var(--text-secondary); font-weight: 700; font-size: 15px; cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; gap: 8px; border: none; font-family: 'Cairo', sans-serif; }
        .tab-btn:hover { background: rgba(255,215,0,0.1); color: var(--gold); }
        .tab-btn.active { background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,215,0,0.08)); color: var(--gold); border: 1px solid rgba(255,215,0,0.25); }

        .store-card { background: linear-gradient(135deg, rgba(255,215,0,0.08), rgba(0,0,0,0.3)); border: 1px solid rgba(255,215,0,0.15); border-radius: 28px; padding: 16px 24px; margin: 20px 0; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
        .store-info { display: flex; gap: 24px; flex-wrap: wrap; }
        .store-item { display: flex; align-items: center; gap: 8px; font-size: 13px; }
        .store-item i { color: var(--gold); }
        .store-item strong { color: var(--gold); }
        .stats-badges { display: flex; gap: 12px; }
        .stat-badge { background: rgba(0,0,0,0.4); padding: 6px 14px; border-radius: 24px; text-align: center; border: 1px solid rgba(255,215,0,0.15); }
        .stat-badge .number { font-size: 18px; font-weight: 800; background: linear-gradient(135deg, #ffd700, #ffb347); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .stat-badge .label { font-size: 10px; color: #999; }

        .toolbar { background: linear-gradient(135deg, rgba(255,215,0,0.05), rgba(0,0,0,0.2)); border-radius: 28px; padding: 12px 20px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        .search-box { display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,215,0,0.15); border-radius: 40px; padding: 8px 18px; flex: 1; max-width: 300px; }
        .search-box i { color: var(--gold); }
        .search-box input { background: transparent; border: none; color: white; font-family: 'Cairo', sans-serif; font-size: 13px; width: 100%; }
        .search-box input:focus { outline: none; }
        .btn { padding: 10px 24px; border: none; border-radius: 40px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'Cairo', sans-serif; display: inline-flex; align-items: center; gap: 8px; transition: all 0.2s ease; }
        .btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: #111; }
        .btn-telegram { background: linear-gradient(135deg, #0088cc, #006699); color: white; }
        .btn-outline { background: transparent; border: 2px solid var(--gold); color: var(--gold); }
        .btn-info { background: linear-gradient(135deg, #60a5fa, #3b82f6); color: white; }
        .btn-success { background: linear-gradient(135deg, #4ade80, #22c55e); color: white; }
        .btn-error { background: linear-gradient(135deg, #f87171, #ef4444); color: white; }
        .btn-sm { padding: 5px 12px; font-size: 12px; }

        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 24px; margin-bottom: 20px; }
        .product-card { background: linear-gradient(145deg, rgba(25,25,45,0.9), rgba(15,15,30,0.95)); backdrop-filter: blur(8px); border: 1px solid rgba(255,215,0,0.15); border-radius: 28px; padding: 20px; transition: all 0.3s ease; position: relative; }
        .product-card:hover { transform: translateY(-5px); border-color: rgba(255,215,0,0.4); }
        .product-id-badge { position: absolute; top: 15px; left: 15px; background: linear-gradient(135deg, var(--gold), #ffb347); color: #111; padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 800; }
        .product-published-badge { position: absolute; top: 15px; right: 15px; background: rgba(0,136,204,0.8); color: white; padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 800; display: flex; align-items: center; gap: 4px; }
        .product-price { font-size: 24px; font-weight: 900; color: var(--success); margin: 8px 0; }
        .stock-status { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .stock-status.high { background: rgba(74,222,128,0.15); color: var(--success); }
        .stock-status.low { background: rgba(251,191,36,0.15); color: var(--warning); }
        .stock-status.out { background: rgba(248,113,113,0.15); color: var(--error); }
        .product-actions { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }

        .table-container { background: rgba(0,0,0,0.25); border-radius: 24px; border: 1px solid rgba(255,215,0,0.12); overflow-x: auto; margin-bottom: 20px; }
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th { text-align: right; padding: 14px 16px; background: linear-gradient(135deg, rgba(255,215,0,0.12), rgba(255,215,0,0.06)); color: var(--gold); font-weight: 800; font-size: 13px; }
        .data-table td { padding: 12px 16px; border-bottom: 1px solid rgba(255,215,0,0.06); font-size: 13px; }
        .data-table tr:hover td { background: rgba(255,215,0,0.05); }

        .stock-log-item { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,215,0,0.1); border-radius: 16px; padding: 12px 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: linear-gradient(135deg, rgba(26,26,46,0.98), rgba(10,10,25,0.98)); border: 1px solid rgba(255,215,0,0.2); border-radius: 28px; padding: 28px; max-width: 600px; width: 95%; max-height: 90vh; overflow-y: auto; }
        .modal-header { font-size: 22px; font-weight: 900; color: var(--gold); margin-bottom: 20px; display: flex; justify-content: space-between; }
        .modal-close { background: none; border: none; color: var(--gold); font-size: 28px; cursor: pointer; }
        
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; font-weight: 700; color: var(--gold); margin-bottom: 8px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 14px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,215,0,0.15); border-radius: 12px; color: white; font-family: 'Cairo', sans-serif; font-size: 13px; }
       
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: rgba(255,215,0,0.4); }
        .form-group textarea { resize: vertical; }
        .image-preview { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
        .image-preview div { position: relative; }
        .image-preview img { width: 80px; height: 80px; object-fit: cover; border-radius: 12px; border: 1px solid rgba(255,215,0,0.2); }

        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
        .empty-state i { font-size: 48px; color: var(--gold); margin-bottom: 16px; opacity: 0.5; }

        .toast { position: fixed; bottom: 20px; left: 20px; background: rgba(0,0,0,0.9); border: 1px solid rgba(255,215,0,0.3); border-radius: 12px; padding: 14px 20px; color: white; display: flex; align-items: center; gap: 10px; z-index: 3000; animation: slideIn 0.3s ease; }
        .toast.success { border-color: rgba(74,222,128,0.5); }
        .toast.error { border-color: rgba(248,113,113,0.5); }
        .toast.warning { border-color: rgba(251,191,36,0.5); }
        .toast.info { border-color: rgba(96,165,250,0.5); }
        @keyframes slideIn { from { transform: translateX(400px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        @media (max-width: 768px) {
            .products-grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
            .top-navbar { padding: 10px 16px; }
            .nav-left, .nav-center, .nav-right { flex: 0 1 auto; }
        }
    </style>
</head>
<body>
    <!-- ========== الشريط العلوي ========== -->
    <div class="top-navbar">
        <div class="nav-left">
            <div class="nav-logo">
                <i class="fas fa-store"></i>
                <div>
                    <div class="logo-text">ناردو برو</div>
                    <small>نظام التسوق الذكي</small>
                </div>
            </div>
        </div>
        <div class="nav-center">
            <div class="store-circle" onclick="openStoreModal()">
                <div class="circle-icon"><i class="fas fa-cog"></i></div>
                <div class="store-name-circle" id="circleStoreName">المتجر</div>
            </div>
        </div>
        <div class="nav-right">
            <button class="nav-btn nav-btn-gold" onclick="openAddProductModal()"><i class="fas fa-plus"></i> منتج جديد</button>
        </div>
    </div>

    <!-- ========== شريط التبويبات ========== -->
    <div class="tabs-bar">
        <button class="tab-btn active" onclick="switchTab('products', this)"><i class="fas fa-th-large"></i> المنتجات</button>
        <button class="tab-btn" onclick="switchTab('inventory', this)"><i class="fas fa-list"></i> المخزون</button>
        <button class="tab-btn" onclick="switchTab('stockLog', this)"><i class="fas fa-history"></i> سجل المخزون</button>
        <button class="tab-btn" onclick="switchTab('orders', this)"><i class="fas fa-receipt"></i> الطلبات</button>
        <button class="tab-btn" onclick="openDeliveryPage()"><i class="fas fa-truck"></i> التوصيل</button>
    </div>

    <!-- ========== المحتوى الرئيسي ========== -->
    <div class="container">
        <!-- ========== بطاقة المتجر ========== -->
        <div class="store-card">
            <div class="store-info">
                <div class="store-item"><i class="fas fa-store"></i><div><strong id="currentStoreName">---</strong></div></div>
                <div class="store-item"><i class="fas fa-id-card"></i><div><strong>معرف المتجر:</strong> <span id="currentStoreID">---</span></div></div>
                <div class="store-item"><i class="fas fa-cube"></i><div><strong>منتجاتي:</strong> <span id="storeProductCount">0</span></div></div>
            </div>
            <div class="stats-badges">
                <div class="stat-badge"><div class="number" id="statTotal">0</div><div class="label">المنتجات</div></div>
                <div class="stat-badge"><div class="number" id="statOrders">0</div><div class="label">الطلبات</div></div>
            </div>
        </div>

        <!-- ========== شريط البحث ========== -->
        <div class="toolbar">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="ابحث عن منتج (بالاسم أو المعرف)..." onkeyup="searchProducts()">
            </div>
            <button class="btn btn-info" onclick="findProductById()"><i class="fas fa-search"></i> بحث بالمعرف</button>
        </div>

        <!-- ========== تبويب المنتجات (بطاقات) ========== -->
        <div id="productsTab" class="tab-content active">
            <div id="productsGrid" class="products-grid"></div>
        </div>

        <!-- ========== تبويب المخزون (جدول) ========== -->
        <div id="inventoryTab" class="tab-content">
            <div class="table-container">
                <table class="data-table">
                    <thead><tr><th>المنتج</th><th>المعرف</th><th>السعر</th><th>المخزون</th><th>الحالة</th><th>المصدر</th><th>نشر</th><th>الإجراءات</th></tr></thead>
                    <tbody id="inventoryTable"></tbody>
                </table>
            </div>
        </div>

        <!-- ========== تبويب سجل المخزون ========== -->
        <div id="stockLogTab" class="tab-content">
            <div style="display: flex; justify-content: space-between; margin-bottom: 16px;">
                <h3><i class="fas fa-scroll"></i> حركات المخزون</h3>
                <button class="btn btn-outline" onclick="clearStockLog()"><i class="fas fa-trash"></i> مسح</button>
            </div>
            <div id="stockLogContainer"></div>
        </div>

        <!-- ========== تبويب الطلبات ========== -->
        <div id="ordersTab" class="tab-content">
            <div class="toolbar">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchOrders" placeholder="ابحث عن طلب...">
                </div>
                <div style="display: flex; gap: 10px;">
                    <button class="btn btn-telegram" onclick="fetchOrdersFromTelegram()"><i class="fab fa-telegram"></i> جلب الطلبات</button>
                    <button class="btn btn-error" onclick="clearOrders()"><i class="fas fa-trash"></i> مسح الكل</button>
                </div>
            </div>
            <div class="table-container">
                <table class="data-table">
                    <thead><tr><th>رقم الطلب</th><th>التاريخ</th><th>العميل</th><th>المنتجات</th><th>الإجمالي</th><th>الحالة</th><th>الإجراءات</th></tr></thead>
                    <tbody id="ordersTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- ========== مودال إعدادات المتجر ========== -->
    <div id="storeModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><span>إعدادات المتجر</span><button class="modal-close" onclick="closeStoreModal()">&times;</button></div>
            <div class="form-group"><label>اسم المتجر</label><input type="text" id="storeNameInput" placeholder="اسم متجرك"></div>
            <div class="form-group"><label>معرف المتجر (تلقائي)</label><input type="text" id="storeIDInput" readonly></div>
            <button class="btn btn-gold" style="width:100%" onclick="saveStore()">حفظ</button>
        </div>
    </div>

    <!-- ========== مودال إضافة منتج ========== -->
    <div id="addProductModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h2>منتج جديد</h2><button class="modal-close" onclick="closeAddProductModal()">&times;</button></div>
            <div class="form-group"><label>اسم المنتج *</label><input type="text" id="productName" required></div>
            <div class="form-group"><label>الوصف</label><textarea id="productDesc" rows="2"></textarea></div>
            <div class="form-group"><label>السعر (دج) *</label><input type="number" id="productPrice" required min="0"></div>
            <div class="form-group"><label>الكمية *</label><input type="number" id="productQty" required min="0"></div>
            <div class="form-group"><label>القسم</label><select id="productCategory"><option>توابل</option><option>عطور</option><option>منتجات طبيعية</option></select></div>
            <div class="form-group"><label>الصور</label><input type="file" id="productImages" multiple accept="image/*" onchange="previewImages(this)"><div id="imagePreview" class="image-preview"></div></div>
            <div style="display: flex; gap: 12px;">
                <button type="button" class="btn btn-outline" onclick="saveProductOnly()" style="flex:1"><i class="fas fa-save"></i> حفظ فقط</button>
                <button type="button" class="btn btn-telegram" onclick="saveAndPublishProduct()" style="flex:1"><i class="fab fa-telegram"></i> حفظ ونشر</button>
            </div>
        </div>
    </div>

    <!-- ========== مودال تعديل المخزون ========== -->
    <div id="editStockModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h2>تعديل المخزون</h2><button class="modal-close" onclick="closeEditStockModal()">&times;</button></div>
            <div class="form-group"><label>المنتج</label><input type="text" id="editProductName" disabled></div>
            <div class="form-group"><label>المعرف</label><input type="text" id="editProductID" disabled></div>
            <div class="form-group"><label>الكمية الحالية</label><input type="text" id="editCurrentQty" disabled></div>
            <div class="form-group"><label>نوع العملية</label><select id="stockOperation"><option value="add">➕ إضافة</option><option value="remove">➖ سحب</option><option value="set">📝 تعيين</option></select></div>
            <div class="form-group"><label>الكمية</label><input type="number" id="editNewQty" required min="0"></div>
            <div class="form-group"><label>السبب</label><input type="text" id="stockReason" placeholder="مثال: جرد شهري"></div>
            <button type="submit" class="btn btn-gold" style="width:100%" onclick="updateStock()">تحديث</button>
        </div>
    </div>

    <script>
    // ========== إعدادات تلغرام ==========
    const TELEGRAM = {
        botToken: '8576673096:AAGvSMjzwVWj6wJ47JdqiDwcObXjBDcyiLA',
        channelId: '-1003822964890',
        apiUrl: 'https://api.telegram.org/bot'
    };

    // ========== إدارة التخزين الآمن ==========
    const safeLocalStorage = {
        set: function(key, value) {
            try { localStorage.setItem(key, JSON.stringify(value)); return true; }
            catch (e) { if (e.name === 'QuotaExceededError') this.autoCleanup(); try { localStorage.setItem(key, JSON.stringify(value)); return true; } catch (retryError) { return false; } }
        },
        get: function(key, defaultValue = '[]') {
            try { const item = localStorage.getItem(key); return item ? JSON.parse(item) : JSON.parse(defaultValue); }
            catch (e) { return JSON.parse(defaultValue); }
        },
        autoCleanup: function() {
            let allOrders = this.get('nardo_orders'); if (allOrders.length > 100) { allOrders = allOrders.slice(0, 100); localStorage.setItem('nardo_orders', JSON.stringify(allOrders)); }
            let logs = this.get('nardo_stock_log'); if (logs.length > 500) { logs = logs.slice(0, 500); localStorage.setItem('nardo_stock_log', JSON.stringify(logs)); }
            let processed = this.get('nardo_processed_telegram_ids'); if (processed.length > 300) { processed = processed.slice(-300); localStorage.setItem('nardo_processed_telegram_ids', JSON.stringify(processed)); }
        }
    };

    // ========== المتغيرات العامة ==========
    let products = safeLocalStorage.get('nardo_products');
    let orders = safeLocalStorage.get('nardo_orders');
    let stockLog = safeLocalStorage.get('nardo_stock_log');
    let currentStore = null;
    let editProductId = null;
    let currentImages = [];
    let searchTerm = '';
    let searchOrdersTerm = '';

    // ========== دوال مساعدة ==========
    function cleanTelegramText(text) { return text ? text.replace(/[_*[\]()~`>#+\-=|{}.!]/g, '').trim() : ''; }
    
    function generateStoreID(storeName) {
        let clean = storeName.replace(/[^a-zA-Z0-9\u0600-\u06FF]/g, '').substring(0, 8).toUpperCase();
        if (!clean) clean = 'متجري';
        return `${clean}-${Math.floor(Math.random() * 900000 + 100000)}`;
    }

    function getTimeAgo(dateString) {
        if (!dateString) return 'الآن';
        const now = new Date(), productDate = new Date(dateString);
        const diffInSeconds = Math.floor((now - productDate) / 1000);
        if (diffInSeconds < 60) return 'الآن';
        if (diffInSeconds < 3600) return `منذ ${Math.floor(diffInSeconds / 60)} دقيقة`;
        if (diffInSeconds < 86400) return `منذ ${Math.floor(diffInSeconds / 3600)} ساعة`;
        if (diffInSeconds < 604800) return `منذ ${Math.floor(diffInSeconds / 86400)} يوم`;
        return 'منذ وقت';
    }

    // ========== دوال المنتج الأساسية ==========
    function getNextProductSerial(storeID) {
        const storeProducts = products.filter(p => p.storeID === storeID);
        return (storeProducts.length + 1).toString().padStart(3, '0');
    }

    async function sendToTelegram(product, imageFile) {
        try {
            showToast('📤 جاري النشر إلى قناة التلغرام...', 'info');
            const caption = `🟣 *منتج جديد في ناردو برو*
━━━━━━━━━━━━━━━━━━
📦 *المنتج:* ${cleanTelegramText(product.name)}
💰 *السعر:* ${product.price.toLocaleString()} دج
🏷️ *القسم:* ${product.category || 'عام'}
📊 *الكمية:* ${product.quantity}
🆔 *معرف المنتج:* \`${product.productCompositeID}\`
🏪 *المتجر:* ${product.storeName}
🆔 *معرف المتجر:* \`${product.storeID}\`
📝 *الوصف:* ${cleanTelegramText(product.description || 'لا يوجد وصف')}`;
            
            const formData = new FormData();
            formData.append('chat_id', TELEGRAM.channelId);
            formData.append('photo', imageFile);
            formData.append('caption', caption);
            formData.append('parse_mode', 'Markdown');
            
            const response = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/sendPhoto`, { method: 'POST', body: formData });
            const data = await response.json();
            if (data.ok) { showToast('✅ تم النشر بنجاح!', 'success'); return { success: true, messageId: data.result.message_id }; }
            else throw new Error(data.description);
        } catch (error) { showToast('❌ فشل النشر: ' + error.message, 'error'); return { success: false, error: error.message }; }
    }

    async function publishExistingProduct(productId) {
        const product = products.find(p => p.id === productId);
        if (!product) { showToast('المنتج غير موجود', 'error'); return; }
        if (!product.images || product.images.length === 0) { showToast('لا توجد صور للنشر', 'error'); return; }
        try {
            const response = await fetch(product.images[0]);
            const blob = await response.blob();
            const imageFile = new File([blob], 'product.jpg', { type: blob.type });
            const result = await sendToTelegram(product, imageFile);
            if (result.success) { product.published = true; product.telegramId = result.messageId; product.publishedAt = new Date().toISOString(); safeLocalStorage.set('nardo_products', products); renderAll(); showToast(`✅ تم نشر ${product.name}`, 'success'); }
        } catch (error) { showToast('فشل النشر', 'error'); }
    }

    async function fetchProductsFromTelegram() {
        try {
            showToast('جاري الجلب من القناة...', 'info');
            const response = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getUpdates?limit=100`);
            const data = await response.json();
            if (!data.ok) throw new Error('فشل الاتصال');
            let newCount = 0;
            for (const update of data.result || []) {
                const post = update.channel_post || update.message;
                if (!post || !post.photo) continue;
                const caption = post.caption || '';
                let name = 'منتج', price = 1000, stock = 10, storeID = '', storeName = '', productID = '', desc = '';
                const lines = caption.split('\n');
                for (const line of lines) {
                    const cleanLine = line.replace(/[\*`_~]/g, '').trim();
                    if (cleanLine.includes('المنتج:')) name = cleanLine.split('المنتج:')[1].trim();
                    if (cleanLine.includes('السعر:')) { const priceStr = cleanLine.split('السعر:')[1].replace(/[^\d]/g, ''); if (priceStr) price = parseInt(priceStr); }
                    if (cleanLine.includes('الكمية:')) { const stockStr = cleanLine.split('الكمية:')[1].replace(/[^\d]/g, ''); if (stockStr) stock = parseInt(stockStr); }
                    if (cleanLine.includes('المتجر:') && !cleanLine.includes('معرف')) storeName = cleanLine.split('المتجر:')[1].trim();
                    if (cleanLine.includes('معرف المتجر:')) storeID = cleanLine.split('معرف المتجر:')[1].trim();
                    if (cleanLine.includes('معرف المنتج:')) productID = cleanLine.split('معرف المنتج:')[1].trim();
                    if (cleanLine.includes('الوصف:')) desc = cleanLine.split('الوصف:')[1].trim();
                }
                if (!name || name === 'منتج') name = 'منتج ناردو';
                const fileId = post.photo[post.photo.length - 1].file_id;
                const fileRes = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getFile?file_id=${fileId}`);
                const fileData = await fileRes.json();
                const imageUrl = fileData.ok ? `https://api.telegram.org/file/bot${TELEGRAM.botToken}/${fileData.result.file_path}` : "https://via.placeholder.com/300/ffd700/000000?text=منتج";
                if (storeID === currentStore.storeFixedID && !products.some(p => p.telegramId === post.message_id)) {
                    products.push({ id: Date.now() + Math.random(), telegramId: post.message_id, name: name, price: price, quantity: stock, storeID: storeID, storeName: storeName, productCompositeID: productID, description: desc, images: [imageUrl], source: 'telegram', published: true, publishedAt: new Date().toISOString(), category: 'منتج' });
                    newCount++;
                }
            }
            safeLocalStorage.set('nardo_products', products);
            renderAll();
            showToast(`تم جلب ${newCount} منتج جديد`, 'success');
        } catch(e) { showToast('فشل الاتصال بالقناة', 'error'); }
    }

    // ========== دوال الطلبات ==========
    async function fetchOrdersFromTelegram() {
        try {
            if (!currentStore) { showToast('⚠️ يرجى تحديد المتجر أولاً', 'warning'); return; }
            showToast('📡 جاري جلب الطلبات...', 'info');
            const response = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getUpdates?limit=100&offset=-100`);
            const data = await response.json();
            if (!data.ok) throw new Error('فشل الاتصال');
            let newOrdersCount = 0;
            let processedIds = JSON.parse(localStorage.getItem('nardo_processed_telegram_ids') || '[]');
            for (const update of data.result || []) {
                const post = update.channel_post || update.message || update.edited_channel_post || update.edited_message;
                if (!post || !post.text) continue;
                const uniqueId = post.message_id;
                if (processedIds.includes(uniqueId)) continue;
                const orderData = extractOrderDataFromText(post.text);
                if (!orderData || !orderData.productID) { processedIds.push(uniqueId); continue; }
                const product = products.find(p => p.productCompositeID === orderData.productID);
                if (!product || product.storeID !== currentStore.storeFixedID) { processedIds.push(uniqueId); continue; }
                if (orders.find(o => o.telegramOrderId === orderData.orderNumber)) { processedIds.push(uniqueId); continue; }
                const newOrder = {
                    id: Date.now() + Math.random(), telegramOrderId: orderData.orderNumber, telegramMessageId: uniqueId,
                    date: orderData.date || new Date().toLocaleString('ar-EG'), customerName: orderData.customerName,
                    customerPhone: orderData.customerPhone, customerAddress: orderData.customerAddress, customerNotes: orderData.notes || '',
                    storeID: currentStore.storeFixedID, storeName: currentStore.storeName,
                    items: [{ 
                        id: product.id, 
                        productCompositeID: product.productCompositeID, 
                        name: product.name, 
                        price: product.price, 
                        quantity: orderData.quantity, 
                        image: product.images?.[0] || '' 
                    }],
                    total: orderData.total || (product.price * orderData.quantity), status: 'pending', source: 'telegram'
                };
                orders.unshift(newOrder);
                const oldQty = product.quantity;
                product.quantity = Math.max(0, product.quantity - orderData.quantity);
                addStockLog(product.id, product.name, 'remove', orderData.quantity, oldQty, product.quantity, `طلب تلغرام #${orderData.orderNumber}`, product.storeID);
                processedIds.push(uniqueId);
                newOrdersCount++;
            }
            safeLocalStorage.set('nardo_orders', orders);
            safeLocalStorage.set('nardo_products', products);
            localStorage.setItem('nardo_processed_telegram_ids', JSON.stringify(processedIds));
            renderAll();
            showToast(newOrdersCount > 0 ? `✅ تم جلب ${newOrdersCount} طلب جديد` : '📭 لا توجد طلبات جديدة', newOrdersCount > 0 ? 'success' : 'info');
        } catch (error) { showToast('❌ خطأ: ' + error.message, 'error'); }
    }

    function extractOrderDataFromText(text) {
        try {
            const patterns = { storeID: /معرف المتجر:\s*([^\n]+)/, customerName: /المشتري:\s*([^\n]+)/, customerPhone: /الهاتف:\s*([^\n]+)/, customerAddress: /العنوان:\s*([^\n]+)/, productID: /([A-Z0-9\u0600-\u06FF]+-\d+-\d+)/i, quantity: /الكمية:\s*(\d+)/, total: /إجمالي المتجر:\s*([\d,]+)/, orderNumber: /رقم الطلب:\s*(\d+)/, date: /التاريخ:\s*([^\n]+)/ };
            const storeID = (text.match(patterns.storeID)?.[1] || '').trim();
            if (storeID !== currentStore.storeFixedID) return null;

            const productIDMatch = text.match(patterns.productID);
            const productID = productIDMatch ? productIDMatch[0].trim() : '';
            if (!productID) return null;
            
            const customerName = (text.match(patterns.customerName)?.[1] || 'عميل ناردو').trim();
            const customerPhone = (text.match(patterns.customerPhone)?.[1] || '').trim();
            const customerAddress = (text.match(patterns.customerAddress)?.[1] || '').trim();
            let quantity = parseInt(text.match(patterns.quantity)?.[1] || '1');
            const total = parseInt((text.match(patterns.total)?.[1] || '0').replace(/,/g, ''));
            const orderNumber = (text.match(patterns.orderNumber)?.[1] || Date.now().toString()).trim();
            const date = (text.match(patterns.date)?.[1] || new Date().toLocaleString('ar-EG')).trim();
            return { productID, customerName, customerPhone, customerAddress, quantity, total, orderNumber, date };
        } catch (e) { return null; }
    }

    function quickOrder(productId) {
        const p = products.find(p => p.id === productId);
        if (!p || p.quantity <= 0) { showToast('المنتج غير متوفر', 'error'); return; }
        const qty = prompt(`الكمية (المتاح: ${p.quantity})`, "1");
        if (!qty) return;
        let qtyInt = parseInt(qty);
        if (isNaN(qtyInt) || qtyInt <= 0 || qtyInt > p.quantity) { showToast('كمية غير صالحة', 'error'); return; }
        const total = p.price * qtyInt;
        const newOrder = {
            id: Date.now(), date: new Date().toLocaleString('ar-EG'), customerName: 'طلب مباشر', customerPhone: '', customerAddress: '', customerNotes: '',
            storeID: p.storeID, storeName: p.storeName, items: [{ 
                id: p.id, 
                productCompositeID: p.productCompositeID, 
                name: p.name, 
                price: p.price, 
                quantity: qtyInt, 
                image: p.images?.[0] || '' 
            }],
            total: total, status: 'pending', source: 'manual'
        };
        orders.unshift(newOrder);
        const oldQty = p.quantity;
        p.quantity -= qtyInt;
        safeLocalStorage.set('nardo_orders', orders);
        safeLocalStorage.set('nardo_products', products);
        addStockLog(p.id, p.name, 'remove', qtyInt, oldQty, p.quantity, 'طلب مباشر', p.storeID);
        renderAll();
        showToast(`✅ تم إنشاء الطلب #${newOrder.id}`, 'success');
    }

    // ========== دوال إدارة المخزون ==========
    function addStockLog(pid, pname, op, qty, oldQ, newQ, reason = '', storeID = null) {
        const targetStoreID = storeID || currentStore?.storeFixedID;
        stockLog.unshift({ id: Date.now(), productId: pid, productName: pname, operation: op, quantity: qty, oldQty: oldQ, newQty: newQ, reason: reason, storeID: targetStoreID, date: new Date().toLocaleString('ar-EG') });
        if (stockLog.length > 500) stockLog = stockLog.slice(0, 500);
        safeLocalStorage.set('nardo_stock_log', stockLog);
    }

    function openEditStockModal(id) {
        editProductId = id;
        const p = products.find(p => p.id === id);
        if (p) {
            document.getElementById('editProductName').value = p.name;
            document.getElementById('editProductID').value = p.productCompositeID;
            document.getElementById('editCurrentQty').value = p.quantity;
            document.getElementById('editNewQty').value = '';
            document.getElementById('stockReason').value = '';
            document.getElementById('stockOperation').value = 'add';
            document.getElementById('editStockModal').classList.add('active');
        }
    }

    function closeEditStockModal() { document.getElementById('editStockModal').classList.remove('active'); }

    function updateStock() {
        const operation = document.getElementById('stockOperation').value;
        const newQty = parseInt(document.getElementById('editNewQty').value);
        const reason = document.getElementById('stockReason').value;
        if (isNaN(newQty) || newQty < 0) { showToast('أدخل كمية صحيحة', 'error'); return; }
        const product = products.find(p => p.id === editProductId);
        if (!product) return;
        const oldQty = product.quantity;
        if (operation === 'add') product.quantity += newQty;
        else if (operation === 'remove') product.quantity = Math.max(0, product.quantity - newQty);
        else if (operation === 'set') product.quantity = newQty;
        safeLocalStorage.set('nardo_products', products);
        addStockLog(product.id, product.name, operation, newQty, oldQty, product.quantity, reason, product.storeID);
        renderAll();
        closeEditStockModal();
        showToast('✅ تم تحديث المخزون', 'success');
    }

    // ========== دوال العرض ==========
    function renderProducts() {
        const container = document.getElementById('productsGrid');
        let filtered = products.filter(p => p.storeID === currentStore.storeFixedID);
        filtered = filtered.filter(p => p.name.toLowerCase().includes(searchTerm) || (p.productCompositeID && p.productCompositeID.toLowerCase().includes(searchTerm)));
        if (filtered.length === 0) { container.innerHTML = '<div class="empty-state"><i class="fas fa-box-open"></i><p>لا توجد منتجات</p><button class="btn btn-telegram" onclick="fetchProductsFromTelegram()">جلب من تلغرام</button></div>'; return; }
        container.innerHTML = filtered.map(p => {
            const stockClass = p.quantity > 10 ? 'high' : (p.quantity > 0 ? 'low' : 'out');
            const stockText = p.quantity > 10 ? 'متوفر' : (p.quantity > 0 ? `متبقي ${p.quantity}` : 'غير متوفر');
            const imgHtml = p.images?.length ? `<div style="display:flex; gap:8px; overflow-x:auto; margin-bottom:15px;">${p.images.slice(0,3).map(img => `<img src="${img}" style="width:75px; height:75px; object-fit:cover; border-radius:16px; cursor:pointer;" onclick="window.open('${img}','_blank')">`).join('')}</div>` : '';
            const publishedBadge = p.published ? '<div class="product-published-badge"><i class="fab fa-telegram"></i> منشور</div>' : '';
            const timeAgo = getTimeAgo(p.createdAt);
            return `
                <div class="product-card">
                    <div class="product-id-badge">${p.productCompositeID || '---'}</div>
                    ${publishedBadge}
                    <div style="padding:4px 12px; background:rgba(0,0,0,0.5); border-radius:20px; font-size:11px; margin-bottom:10px;"><i class="far fa-clock"></i> ${timeAgo}</div>
                    ${imgHtml}
                    <div class="product-name">${p.name}</div>
                    <div class="product-price">${p.price.toLocaleString()} دج</div>
                    <div><span class="stock-status ${stockClass}">${stockText}</span></div>
                    <div class="product-actions">
                        <button class="btn btn-gold" onclick="quickOrder(${p.id})"><i class="fas fa-shopping-bag"></i> طلب</button>
                        <button class="btn btn-outline" onclick="openEditStockModal(${p.id})"><i class="fas fa-edit"></i> تعديل</button>
                        ${!p.published ? `<button class="btn btn-telegram" onclick="publishExistingProduct(${p.id})"><i class="fab fa-telegram"></i> نشر</button>` : ''}
                        <button class="btn btn-outline" style="border-color:var(--error);color:var(--error);" onclick="deleteProduct(${p.id})"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `;
        }).join('');
    }

    function renderInventory() {
        const tbody = document.getElementById('inventoryTable');
        let filtered = products.filter(p => p.storeID === currentStore.storeFixedID);
        if (!filtered.length) { tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:40px;">لا توجد منتجات</td></tr>'; return; }
        tbody.innerHTML = filtered.map(p => `
            <tr>
                <td><strong>${p.name}</strong></td>
                <td><span style="font-family:monospace; background:rgba(255,215,0,0.15); padding:4px 8px; border-radius:12px;">${p.productCompositeID || '---'}</span></td>
                <td style="color:var(--success);">${p.price.toLocaleString()} دج</td>
                <td style="font-weight:800;">${p.quantity}</td>
                <td><span class="stock-status ${p.quantity>0?'high':'out'}">${p.quantity>0?'متاح':'نفد'}</span></td>
                <td>${p.source === 'telegram' ? '<i class="fab fa-telegram"></i> تلغرام' : 'محلي'}</td>
                <td>${!p.published ? `<button class="btn btn-telegram btn-sm" onclick="publishExistingProduct(${p.id})"><i class="fab fa-telegram"></i> نشر</button>` : '<span style="color:var(--success);">✅ منشور</span>'}</td>
                <td><button class="btn btn-gold btn-sm" onclick="openEditStockModal(${p.id})"><i class="fas fa-edit"></i></button></td>
            </tr>
        `).join('');
    }

    function renderStockLog() {
        const container = document.getElementById('stockLogContainer');
        let filtered = stockLog.filter(l => l.storeID === currentStore.storeFixedID);
        if (!filtered.length) { container.innerHTML = '<div class="empty-state"><i class="fas fa-history"></i><p>لا توجد حركات</p></div>'; return; }
        container.innerHTML = filtered.map(l => `<div class="stock-log-item"><div><strong style="color:var(--gold);">${l.productName}</strong><br><span>${l.operation === 'add' ? '➕ إضافة' : (l.operation === 'remove' ? '➖ سحب' : '📝 تعيين')} ${l.quantity} | من ${l.oldQty} → ${l.newQty}</span>${l.reason ? `<br><span style="font-size:11px;">📌 ${l.reason}</span>` : ''}</div><div style="font-size:11px;">${l.date}</div></div>`).join('');
    }

    function renderOrders() {
        const tbody = document.getElementById('ordersTableBody');
        if (!tbody) return;
        let filteredOrders = orders.filter(order => order.storeID === currentStore.storeFixedID);
        // تطبيق البحث على الطلبات
        if (searchOrdersTerm) {
            filteredOrders = filteredOrders.filter(order => 
                order.customerName.toLowerCase().includes(searchOrdersTerm) || 
                order.customerPhone.includes(searchOrdersTerm) ||
                order.telegramOrderId.toString().includes(searchOrdersTerm)
            );
        }
        if (filteredOrders.length === 0) { tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; padding:40px;"><i class="fas fa-inbox fa-2x" style="color:var(--gold); margin-bottom:10px; display:block;"></i>لا توجد طلبات</td></tr>`; return; }
        tbody.innerHTML = filteredOrders.map(order => {
            const firstItem = order.items[0];
            // محاولة جلب الصورة من قائمة المنتجات الحالية باستخدام معرف المنتج لضمان التحديث
            const currentProduct = products.find(p => p.productCompositeID === firstItem?.productCompositeID);
            let productImage = currentProduct?.images?.[0] || firstItem?.image || '';
            
            const imageHtml = productImage ? `<img src="${productImage}" style="width:40px; height:40px; object-fit:cover; border-radius:8px;">` : `<i class="fas fa-image" style="font-size:24px; color:#666;"></i>`;
            return `
                <tr style="${order.status === 'delivered' ? 'opacity:0.7; background:rgba(74,222,128,0.05);' : ''}">
                    <td><strong>#${order.telegramOrderId || order.id.toString().substring(0,6)}</strong></td>
                    <td style="font-size:12px;">${order.date || ''}</td>
                    <td><div style="display:flex; align-items:center; gap:8px;">${imageHtml}<div><div><i class="fas fa-user"></i> ${order.customerName || 'غير معروف'}</div><div style="font-size:11px;"><i class="fas fa-phone"></i> ${order.customerPhone || '---'}</div></div></div></td>
                    <td>${order.items.map(it => `<span style="display:inline-block; background:rgba(255,215,0,0.1); padding:2px 8px; margin:2px; border-radius:12px;">${it.name} (${it.quantity})</span>`).join('')}</td>
                    <td style="color:var(--success);">${order.total.toLocaleString()} دج</td>
                    <td><span class="stock-status ${order.status === 'delivered' ? 'high' : 'low'}">${order.status === 'delivered' ? '✅ تم التوصيل' : '🔄 قيد المعالجة'}</span></td>
                    <td><div style="display: flex; gap: 6px;"><button class="btn btn-success btn-sm" onclick="deliverOrder(${order.id})"><i class="fas ${order.status === 'delivered' ? 'fa-undo' : 'fa-check'}"></i></button><button class="btn btn-telegram btn-sm" onclick="sendToDelivery(${order.id})"><i class="fas fa-truck"></i></button><button class="btn btn-gold btn-sm" onclick="callCustomer('${order.customerPhone || ''}')"><i class="fas fa-phone"></i></button><button class="btn btn-error btn-sm" onclick="deleteOrder(${order.id})"><i class="fas fa-trash"></i></button></div></td>
                </tr>
            `;
        }).join('');
        updateStats();
    }

    function updateStats() {
        const myProducts = products.filter(p => p.storeID === currentStore.storeFixedID).length;
        const myOrders = orders.filter(o => o.storeID === currentStore.storeFixedID).length;
        document.getElementById('statTotal').innerText = myProducts;
        document.getElementById('statOrders').innerText = myOrders;
        updateStoreProductCount();
    }

    function renderAll() { renderProducts(); renderInventory(); renderStockLog(); renderOrders(); updateStats(); }

    function searchProducts() { searchTerm = document.getElementById('searchInput').value.toLowerCase(); renderProducts(); }

    // ✅ إصلاح المشكلة الثانية: إضافة دالة searchOrders المفقودة
    function searchOrders() { 
        searchOrdersTerm = document.getElementById('searchOrders').value.toLowerCase(); 
        renderOrders(); 
    }

    function switchTab(tabName, btn) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.getElementById(tabName + 'Tab').classList.add('active');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        // ✅ إصلاح المشكلة الأولى: استدعاء render دائماً عند تبديل التبويب
        if (tabName === 'products') renderProducts();
        if (tabName === 'inventory') renderInventory();
        if (tabName === 'stockLog') renderStockLog();
        if (tabName === 'orders') renderOrders();
    }

    function openAddProductModal() {
        document.getElementById('addProductModal').classList.add('active');
        currentImages = [];
        document.getElementById('imagePreview').innerHTML = '';
        document.getElementById('productImages').value = '';
        document.getElementById('productName').value = '';
        document.getElementById('productDesc').value = '';
        document.getElementById('productPrice').value = '';
        document.getElementById('productQty').value = '';
    }

    function closeAddProductModal() { document.getElementById('addProductModal').classList.remove('active'); }

    function previewImages(input) {
        const preview = document.getElementById('imagePreview');
        preview.innerHTML = '';
        currentImages = [];
        for (let i = 0; i < input.files.length; i++) {
            const file = input.files[i];
            const reader = new FileReader();
            reader.onload = e => {
                currentImages.push(e.target.result);
                const div = document.createElement('div');
                div.innerHTML = `<img src="${e.target.result}">`;
                preview.appendChild(div);
            };
            reader.readAsDataURL(file);
        }
    }

    function showToast(msg, type) {
        const t = document.createElement('div');
        t.className = `toast ${type}`;
        const icon = type==='success' ? 'fa-check-circle' : (type==='error' ? 'fa-exclamation-circle' : (type==='warning' ? 'fa-exclamation-triangle' : 'fa-info-circle'));
        t.innerHTML = `<i class="fas ${icon}"></i> ${msg}`;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }

    // ========== التهيئة ==========
    document.addEventListener('DOMContentLoaded', () => {
        loadCurrentStore();
        renderAll();
        document.getElementById('searchInput').addEventListener('input', searchProducts);
        // ✅ إصلاح المشكلة الثانية: ربط حدث البحث في الطلبات بالدالة الصحيحة
        document.getElementById('searchOrders').addEventListener('input', searchOrders);
        setTimeout(fetchOrdersFromTelegram, 2000);
        setInterval(fetchOrdersFromTelegram, 120000);
    });
    </script>
</body>
</html>
