<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ناردو برو | المتجر الذكي - طلبات تلجرام</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #0a0a1a;
            --secondary: #1a1a2e;
            --gold: #ffd700;
            --gold-dark: #daa520;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --success: #4ade80;
            --error: #f87171;
            --warning: #fbbf24;
            --info: #60a5fa;
            --telegram: #0088cc;
        }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0b0b14 0%, #15152a 100%);
            color: var(--text-primary);
            min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .top-navbar {
            background: linear-gradient(135deg, rgba(10,10,26,0.95), rgba(26,26,46,0.95));
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,215,0,0.25);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .nav-left, .nav-center, .nav-right { flex: 1; display: flex; }
        .nav-left { justify-content: flex-start; }
        .nav-center { justify-content: center; }
        .nav-right { justify-content: flex-end; gap: 10px; }
        .nav-logo { display: flex; align-items: center; gap: 10px; }
        .nav-logo i { font-size: 28px; color: var(--gold); }
        .nav-logo .logo-text { font-size: 18px; font-weight: 800; background: linear-gradient(135deg, #ffd700, #ffed4e); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .store-circle { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: all 0.3s ease; }
        .circle-icon { width: 55px; height: 55px; background: linear-gradient(135deg, var(--gold), var(--gold-dark)); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(255,215,0,0.4); transition: all 0.3s ease; }
        .circle-icon i { font-size: 28px; color: #111; }
        .store-name-circle { font-size: 11px; font-weight: 700; margin-top: 6px; color: var(--gold); background: rgba(255,215,0,0.15); padding: 3px 10px; border-radius: 20px; }
        .nav-btn { padding: 8px 18px; border-radius: 40px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; display: flex; align-items: center; gap: 6px; transition: all 0.2s ease; }
        .nav-btn-telegram { background: linear-gradient(135deg, #0088cc, #006699); color: white; }
        .nav-btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: #111; }
        .nav-btn-outline { background: transparent; border: 1px solid rgba(255,215,0,0.4); color: var(--gold); }
        .tabs-bar {
            background: linear-gradient(135deg, rgba(10,10,26,0.9), rgba(26,26,46,0.9));
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,215,0,0.15);
            padding: 10px 20px;
            display: flex;
            justify-content: center;
            gap: 12px;
            position: sticky;
            top: 70px;
            z-index: 999;
            flex-wrap: wrap;
        }
        .tab-btn { padding: 10px 28px; border-radius: 40px; background: transparent; color: var(--text-secondary); font-weight: 700; font-size: 15px; cursor: pointer; display: flex; align-items: center; gap: 8px; border: none; }
        .tab-btn.active { background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,215,0,0.08)); color: var(--gold); border: 1px solid rgba(255,215,0,0.25); }
        .store-card { background: linear-gradient(135deg, rgba(255,215,0,0.08), rgba(0,0,0,0.3)); border: 1px solid rgba(255,215,0,0.15); border-radius: 28px; padding: 16px 24px; margin: 20px 0; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
        .toolbar { background: linear-gradient(135deg, rgba(255,215,0,0.05), rgba(0,0,0,0.2)); border-radius: 28px; padding: 12px 20px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        .search-box { display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,215,0,0.15); border-radius: 40px; padding: 8px 18px; flex: 1; max-width: 300px; }
        .search-box input { background: transparent; border: none; color: white; font-family: 'Cairo', sans-serif; width: 100%; }
        .btn { padding: 10px 24px; border: none; border-radius: 40px; font-size: 14px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; transition: all 0.2s ease; }
        .btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: #111; }
        .btn-telegram { background: linear-gradient(135deg, #0088cc, #006699); color: white; }
        .btn-outline { background: transparent; border: 2px solid var(--gold); color: var(--gold); }
        .btn-success { background: linear-gradient(135deg, #4ade80, #22c55e); color: white; }
        .btn-error { background: linear-gradient(135deg, #f87171, #ef4444); color: white; }
        .btn-info { background: linear-gradient(135deg, #60a5fa, #3b82f6); color: white; }
        .btn-sm { padding: 5px 12px; font-size: 12px; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 24px; margin-bottom: 20px; }
        .product-card { background: linear-gradient(145deg, rgba(25,25,45,0.9), rgba(15,15,30,0.95)); backdrop-filter: blur(8px); border: 1px solid rgba(255,215,0,0.15); border-radius: 28px; padding: 20px; transition: all 0.3s ease; position: relative; }
        .product-id-badge { position: absolute; top: 15px; left: 15px; background: linear-gradient(135deg, var(--gold), #ffb347); color: #111; padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 800; }
        .product-published-badge { position: absolute; top: 15px; right: 15px; background: rgba(0,136,204,0.8); padding: 4px 10px; border-radius: 20px; font-size: 10px; display: flex; align-items: center; gap: 4px; }
        .product-name { font-size: 20px; font-weight: 900; background: linear-gradient(135deg, #ffd700, #ffb347); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 10px; }
        .product-price { font-size: 24px; font-weight: 900; color: var(--success); margin: 8px 0; }
        .stock-status { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .stock-status.high { background: rgba(74,222,128,0.15); color: var(--success); }
        .stock-status.low { background: rgba(251,191,36,0.15); color: var(--warning); }
        .table-container { background: rgba(0,0,0,0.25); border-radius: 24px; border: 1px solid rgba(255,215,0,0.12); overflow-x: auto; margin-bottom: 20px; }
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th { text-align: right; padding: 14px 16px; background: rgba(255,215,0,0.12); color: var(--gold); font-weight: 800; }
        .data-table td { padding: 12px 16px; border-bottom: 1px solid rgba(255,215,0,0.06); font-size: 13px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: linear-gradient(135deg, rgba(26,26,46,0.98), rgba(10,10,25,0.98)); border: 1px solid rgba(255,215,0,0.2); border-radius: 28px; padding: 28px; max-width: 600px; width: 90%; max-height: 90vh; overflow-y: auto; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 6px; color: var(--gold); font-weight: 700; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px 16px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,215,0,0.15); border-radius: 14px; color: white; font-family: 'Cairo'; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); padding: 12px 24px; border-radius: 40px; color: white; font-weight: 700; z-index: 3000; display: flex; align-items: center; gap: 10px; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { bottom: -50px; opacity: 0; } to { bottom: 30px; opacity: 1; } }
        .toast.success { background: linear-gradient(135deg, #22c55e, #16a34a); }
    </style>
</head>
<body>
    <nav class="top-navbar">
        <div class="nav-left"><div class="nav-logo"><i class="fas fa-bolt"></i><div><span class="logo-text">ناردو برو</span><small>الجيل الثالث</small></div></div></div>
        <div class="nav-center"><div class="store-circle" onclick="location.reload()"><div class="circle-icon"><i class="fas fa-store"></i></div><div class="store-name-circle" id="currentStoreNameDisplay">جاري التحميل...</div></div></div>
        <div class="nav-right"><button class="nav-btn nav-btn-telegram" onclick="window.open('https://t.me/NardoProBot', '_blank')"><i class="fab fa-telegram"></i> بوت ناردو</button><button class="nav-btn nav-btn-gold" onclick="openAddProductModal()"><i class="fas fa-plus"></i> منتج جديد</button></div>
    </nav>
    <div class="tabs-bar">
        <button class="tab-btn active" onclick="showTab('products', this)"><i class="fas fa-th-large"></i> المنتجات</button>
        <button class="tab-btn" onclick="showTab('inventory', this)"><i class="fas fa-boxes"></i> المخزون</button>
        <button class="tab-btn" onclick="showTab('orders', this)"><i class="fas fa-shopping-cart"></i> الطلبات</button>
        <button class="tab-btn" onclick="showTab('stockLog', this)"><i class="fas fa-history"></i> السجل</button>
        <button class="tab-btn" onclick="openOrderFilterPage()"><i class="fas fa-filter"></i> فلترة الطلبات</button>
    </div>
    <div class="container">
        <div class="store-card"><div class="store-info"><div class="store-item"><i class="fas fa-id-badge"></i> <span>معرف المتجر: <strong id="storeIDDisplay">---</strong></span></div><div class="store-item"><i class="fas fa-link"></i> <span>القناة: <strong id="storeChannelDisplay">---</strong></span></div></div><div class="stats-badges"><div class="stat-badge"><div class="number" id="statTotal">0</div><div class="label">منتج</div></div><div class="stat-badge"><div class="number" id="statOrders">0</div><div class="label">طلب</div></div></div></div>
        <div id="productsTab" class="tab-content"><div class="toolbar"><div class="search-box"><i class="fas fa-search"></i><input type="text" id="searchProducts" placeholder="ابحث عن منتج..."></div><button class="btn btn-telegram" id="fetchProductsBtn" onclick="fetchProductsFromTelegram()"><i class="fas fa-sync"></i> جلب من تلغرام</button></div><div class="products-grid" id="productsGrid"></div></div>
        <div id="inventoryTab" class="tab-content" style="display:none;"><div class="toolbar"><h2 style="color:var(--gold);">إدارة المخزون</h2><button class="btn btn-outline" onclick="renderInventory()">تحديث</button></div><div class="table-container"><table class="data-table"><thead><tr><th>المنتج</th><th>المعرف</th><th>السعر</th><th>الكمية</th><th>الحالة</th><th>المصدر</th><th>النشر</th><th>إجراء</th></tr></thead><tbody id="inventoryTable"></tbody></table></div></div>
        <div id="ordersTab" class="tab-content" style="display:none;"><div class="toolbar"><div><h2 style="color:var(--gold);"><i class="fas fa-shopping-cart"></i> الطلبات</h2></div><div><button class="btn btn-telegram btn-sm" onclick="fetchOrdersFromTelegram()"><i class="fas fa-download"></i> جلب الطلبات</button><button class="btn btn-error btn-sm" onclick="clearOrders()"><i class="fas fa-trash"></i> مسح الكل</button></div></div><div class="table-container"><table class="data-table"><thead><tr><th>رقم الطلب</th><th>التاريخ</th><th>العميل</th><th>المنتجات</th><th>الإجمالي</th><th>الحالة</th><th>جهة التوصيل</th><th>معرف الموزع</th><th>إجراءات</th></tr></thead><tbody id="ordersTableBody"></tbody></table></div></div>
        <div id="stockLogTab" class="tab-content" style="display:none;"><div class="toolbar"><h2 style="color:var(--gold);">سجل الحركات</h2><button class="btn btn-error btn-sm" onclick="clearStockLog()">مسح السجل</button></div><div id="stockLogContainer"></div></div>
    </div>
    <div id="addProductModal" class="modal"><div class="modal-content"><div class="modal-header" style="display:flex; justify-content:space-between;"><span style="font-size:22px;">➕ إضافة منتج</span><button class="modal-close" onclick="closeAddProductModal()" style="background:none; border:none; font-size:28px;">&times;</button></div><div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;"><div><div class="form-group"><label>اسم المنتج</label><input type="text" id="productName" placeholder="اسم المنتج"></div><div class="form-group"><label>السعر (دج)</label><input type="number" id="productPrice" placeholder="السعر"></div><div class="form-group"><label>الوصف</label><textarea id="productDesc" rows="2"></textarea></div></div><div><div class="form-group"><label>الكمية</label><input type="number" id="productQty" value="1"></div><div class="form-group"><label>القسم</label><select id="productCategory"><option>توابل</option><option>عطور</option><option>هدايا</option></select></div><div class="form-group"><label>صورة المنتج</label><input type="file" id="productImages" accept="image/*"><div id="imagePreview" style="display:none; margin-top:8px;"><img id="previewImg" style="max-width:100%; max-height:100px;"></div></div></div></div><div style="display:flex; gap:10px; margin-top:20px;"><button class="btn btn-outline" onclick="saveProductOnly()">حفظ فقط</button><button class="btn btn-telegram" onclick="saveAndPublishProduct()">حفظ ونشر</button></div></div></div>
    <div id="editStockModal" class="modal"><div class="modal-content"><div class="modal-header" style="display:flex; justify-content:space-between;"><span>تعديل المخزون</span><button onclick="closeEditStockModal()" style="background:none; border:none;">&times;</button></div><div class="form-group"><label>المنتج</label><input type="text" id="editProductName" disabled></div><div class="form-group"><label>المعرف</label><input type="text" id="editProductID" disabled></div><div class="form-group"><label>المخزون الحالي</label><input type="number" id="editCurrentQty" disabled></div><div class="form-group"><label>العملية</label><select id="stockOperation"><option value="add">إضافة (+)</option><option value="remove">سحب (-)</option><option value="set">تعيين (=)</option></select></div><div class="form-group"><label>الكمية</label><input type="number" id="editNewQty" value="0"></div><div class="form-group"><label>السبب</label><input type="text" id="stockReason" placeholder="سبب التعديل"></div><button class="btn btn-gold" style="width:100%;" onclick="updateStock()">تحديث</button></div></div>
    <script>
        const TELEGRAM = { botToken: '8576673096:AAFwOd-Ut1tCyKTHwkgj_r6OFi9UZbb4pTM', channelId: '-1003822964890', apiUrl: 'https://api.telegram.org/bot' };
        let products = [], orders = [], stockLog = [];
        let currentStore = { storeName: 'ناردو برو', storeFixedID: '', channelUsername: '@NardoChannel' };
        let editProductId = null;
        const safeLocalStorage = { get: (key) => { try { return JSON.parse(localStorage.getItem(key)) || []; } catch(e){ return []; } }, set: (key, val) => { localStorage.setItem(key, JSON.stringify(val)); } };
        function generateStoreID(storeName) { let clean = storeName.replace(/[^a-zA-Z0-9\u0600-\u06FF]/g, '').substring(0,10).toUpperCase() || 'NARDO'; const rand = Math.floor(Math.random()*900000+100000); return `${clean}-${rand}`; }
        function loadCurrentStore() {
            const saved = localStorage.getItem('nardo_current_store');
            if(saved){ currentStore = JSON.parse(saved); if(!currentStore.storeFixedID || !currentStore.storeFixedID.match(/-\d{6}$/)) currentStore.storeFixedID = generateStoreID(currentStore.storeName); }
            else { currentStore.storeFixedID = generateStoreID('ناردو برو'); localStorage.setItem('nardo_current_store', JSON.stringify(currentStore)); }
            document.getElementById('currentStoreNameDisplay').innerText = currentStore.storeName;
            document.getElementById('storeIDDisplay').innerText = currentStore.storeFixedID;
            document.getElementById('storeChannelDisplay').innerText = currentStore.channelUsername;
            products = safeLocalStorage.get('nardo_products'); orders = safeLocalStorage.get('nardo_orders'); stockLog = safeLocalStorage.get('nardo_stock_log');
            updateStats();
        }
        function getNextProductSerial(storeID) { const storeProducts = products.filter(p => p.storeID === storeID); if(!storeProducts.length) return 1; return Math.max(...storeProducts.map(p=>p.serialNumber||0)) + 1; }
        function generateProductCompositeID(storeID, serial) { return `${storeID}-${serial.toString().padStart(3,'0')}`; }
        function addStockLog(pid, pname, op, qty, oldQ, newQ, reason='', storeID=null) { const target = storeID || currentStore.storeFixedID; stockLog.unshift({ id:Date.now(), productId:pid, productName:pname, operation:op, quantity:qty, oldQty:oldQ, newQty:newQ, reason, storeID:target, date:new Date().toLocaleString('ar-EG') }); if(stockLog.length>500) stockLog=stockLog.slice(0,500); safeLocalStorage.set('nardo_stock_log', stockLog); }
        function showToast(msg, type) { const t=document.createElement('div'); t.className=`toast ${type}`; t.innerHTML=`<i class="fas ${type==='success'?'fa-check-circle':'fa-info-circle'}"></i> ${msg}`; document.body.appendChild(t); setTimeout(()=>t.remove(),3000); }
        async function sendToTelegram(product, imageFile) { try { showToast('📤 جاري النشر...','info'); const caption = `🟣 *منتج جديد في ناردو برو*\n━━━━━━━━━━━━━━━━━━\n📦 *المنتج:* ${product.name}\n💰 *السعر:* ${product.price.toLocaleString()} دج\n🏷️ *القسم:* ${product.category||'عام'}\n📊 *الكمية:* ${product.quantity}\n🆔 *معرف المنتج:* \`${product.productCompositeID}\`\n🏪 *المتجر:* ${product.storeName}\n🆔 *معرف المتجر:* \`${product.storeID}\``; const formData=new FormData(); formData.append('chat_id', TELEGRAM.channelId); formData.append('photo', imageFile); formData.append('caption', caption); formData.append('parse_mode','Markdown'); const res=await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/sendPhoto`,{method:'POST',body:formData}); const data=await res.json(); if(data.ok){ showToast('✅ نشر بنجاح','success'); return {success:true, messageId:data.result.message_id}; } else throw new Error(data.description); } catch(e){ showToast('❌ فشل النشر','error'); return {success:false}; } }
        function saveProductOnly() { const name=document.getElementById('productName').value.trim(); const price=parseInt(document.getElementById('productPrice').value); const qty=parseInt(document.getElementById('productQty').value); if(!name || isNaN(price) || price<=0){ showToast('املأ البيانات','error'); return; } const storeID=currentStore.storeFixedID; const serial=getNextProductSerial(storeID); const compositeID=generateProductCompositeID(storeID,serial); const imageInput=document.getElementById('productImages'); const save=(imgData)=>{ const newProduct={ id:Date.now(), storeID, storeName:currentStore.storeName, productCompositeID:compositeID, serialNumber:serial, name, price, quantity:qty, description:document.getElementById('productDesc').value, category:document.getElementById('productCategory').value, createdAt:new Date().toISOString(), source:'local', published:false, imageData:imgData||null }; products.push(newProduct); safeLocalStorage.set('nardo_products',products); addStockLog(newProduct.id,newProduct.name,'add',qty,0,qty,'إنشاء منتج',storeID); renderAll(); closeAddProductModal(); showToast(`✅ حفظ ${name}`,'success'); }; if(imageInput.files && imageInput.files[0]){ const reader=new FileReader(); reader.onload=e=>save(e.target.result); reader.readAsDataURL(imageInput.files[0]); } else save(null); }
        async function saveAndPublishProduct() { const name=document.getElementById('productName').value.trim(); const price=parseInt(document.getElementById('productPrice').value); const qty=parseInt(document.getElementById('productQty').value); if(!name || isNaN(price) || price<=0){ showToast('بيانات غير مكتملة','error'); return; } const imageInput=document.getElementById('productImages'); if(!imageInput.files || !imageInput.files[0]){ showToast('⚠️ النشر يتطلب صورة','warning'); return; } const imageFile=imageInput.files[0]; const storeID=currentStore.storeFixedID; const serial=getNextProductSerial(storeID); const compositeID=generateProductCompositeID(storeID,serial); const reader=new FileReader(); reader.onload=async function(e){ const newProduct={ id:Date.now(), storeID, storeName:currentStore.storeName, productCompositeID:compositeID, serialNumber:serial, name, price, quantity:qty, description:document.getElementById('productDesc').value, category:document.getElementById('productCategory').value, createdAt:new Date().toISOString(), source:'local', published:false, imageData:e.target.result }; const result=await sendToTelegram(newProduct, imageFile); if(result.success){ newProduct.published=true; newProduct.telegramId=result.messageId; } products.push(newProduct); safeLocalStorage.set('nardo_products',products); addStockLog(newProduct.id,newProduct.name,'add',qty,0,qty,result.success?'نشر':'حفظ',storeID); renderAll(); closeAddProductModal(); showToast(result.success?`✅ نشر ${name}`:`⚠️ حفظ بدون نشر`,'success'); }; reader.readAsDataURL(imageFile); }
        async function fetchProductsFromTelegram() { try{ const res=await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getUpdates`); const data=await res.json(); if(!data.ok) throw new Error(); let newCount=0; for(const upd of data.result){ const post=upd.channel_post; if(!post||!post.caption) continue; const matchStore=post.caption.match(/معرف المتجر: `(.*?)`/); if(!matchStore || matchStore[1]!==currentStore.storeFixedID) continue; if(!products.some(p=>p.telegramId===post.message_id)){ const nameMatch=post.caption.match(/المنتج: (.*)/); const priceMatch=post.caption.match(/السعر: ([\d,]+)/); const idMatch=post.caption.match(/معرف المنتج: `(.*?)`/); products.push({ id:Date.now(), telegramId:post.message_id, name:nameMatch?nameMatch[1].trim():'منتج', price:priceMatch?parseInt(priceMatch[1].replace(/,/g,'')):0, quantity:10, storeID:currentStore.storeFixedID, storeName:currentStore.storeName, productCompositeID:idMatch? idMatch[1]:'', source:'telegram', published:true, publishedAt:new Date().toISOString() }); newCount++; } } safeLocalStorage.set('nardo_products',products); renderAll(); showToast(`جلب ${newCount} منتج`,'success'); } catch(e){ showToast('فشل الجلب','error'); } }
        async function fetchOrdersFromTelegram() { showToast('جلب الطلبات...','info'); try{ const res=await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getUpdates?limit=100`); const data=await res.json(); if(!data.ok) throw new Error(); let processed=safeLocalStorage.get('nardo_processed_telegram_ids')||[]; let newOrd=0; for(const upd of data.result||[]){ const post=upd.channel_post||upd.message; if(!post||!post.text) continue; if(processed.includes(post.message_id)) continue; if(!post.text.includes(currentStore.storeFixedID)) continue; const orderData=extractOrderDataFromText(post.text); if(!orderData||!orderData.items.length) continue; const existing=orders.find(o=>o.telegramOrderId===orderData.orderNumber); if(existing){ processed.push(post.message_id); continue; } const orderItems=[]; let total=0; for(const it of orderData.items){ const prod=products.find(p=>p.productCompositeID===it.productID); if(prod && prod.storeID===currentStore.storeFixedID){ orderItems.push({ id:prod.id, productCompositeID:prod.productCompositeID, name:prod.name, price:prod.price, quantity:it.quantity }); total+=prod.price*it.quantity; const old=prod.quantity; prod.quantity=Math.max(0,prod.quantity-it.quantity); addStockLog(prod.id, prod.name, 'remove', it.quantity, old, prod.quantity, `طلب تلغرام #${orderData.orderNumber}`, prod.storeID); } } if(orderItems.length){ orders.unshift({ id:Date.now(), telegramOrderId:orderData.orderNumber, telegramMessageId:post.message_id, date:orderData.date||new Date().toLocaleString('ar-EG'), customerName:orderData.customerName||'عميل', customerPhone:orderData.customerPhone||'', customerAddress:orderData.customerAddress||'', storeID:currentStore.storeFixedID, storeName:currentStore.storeName, items:orderItems, total:orderData.total||total, status:'pending', source:'telegram', deliveryCompany:orderData.deliveryCompany||'', distributorId:orderData.distributorId||'' }); processed.push(post.message_id); newOrd++; } } safeLocalStorage.set('nardo_orders',orders); safeLocalStorage.set('nardo_products',products); safeLocalStorage.set('nardo_processed_telegram_ids',processed); renderAll(); showToast(newOrd?`✅ جلب ${newOrd} طلب`:'📭 لا طلبات جديدة','success'); } catch(e){ showToast('فشل جلب الطلبات','error'); } }
        function extractOrderDataFromText(text){ const patterns={ storeID:/(?:معرف المتجر:|🆔\s*\*معرف المتجر\*:)\s*`?([^\n`]+)/, customerName:/(?:(?:المشتري|الزبون):|👤\s*\*الزبون\*:)\s*([^\n]+)/, customerPhone:/(?:(?:الهاتف|رقم الجوال):|📞\s*\*رقم الجوال\*:)\s*([^\n]+)/, customerAddress:/(?:(?:العنوان):|📍\s*\*العنوان\*:)\s*([^\n]+)/, productID:/🆔\s*معرف المنتج:\s*`?([A-Z0-9\u0600-\u06FF\s-]+-\d+-\d+)/i, quantity:/الكمية:\s*(\d+)/, total:/إجمالي الطلب:\s*([\d,]+)/, orderNumber:/رقم الطلب الموحد:\s*(\d+)/, date:/التاريخ:\s*([^\n]+)/, deliveryCompany:/جهة التوصيل:\s*([^\n]+)/, distributorId:/معرف الموزع:\s*([^\n]+)/ }; const storeID=(text.match(patterns.storeID)?.[1]||'').trim(); const customerName=(text.match(patterns.customerName)?.[1]||'عميل').replace(/[*_]/g,''); const customerPhone=(text.match(patterns.customerPhone)?.[1]||'').trim(); const customerAddress=(text.match(patterns.customerAddress)?.[1]||'').trim(); const orderNumber=(text.match(patterns.orderNumber)?.[1]||Date.now()).trim(); const date=(text.match(patterns.date)?.[1]||new Date().toLocaleString('ar-EG')).trim(); const total=parseInt((text.match(patterns.total)?.[1]||'0').replace(/,/g,'')); const deliveryCompany=(text.match(patterns.deliveryCompany)?.[1]||'').trim(); const distributorId=(text.match(patterns.distributorId)?.[1]||'').trim(); const items=[]; const lines=text.split('\n'); let current=null; for(let line of lines){ line=line.trim(); const start=line.match(/^(\d+)[️⃣\.]\s*(?:المنتج:\s*)?(.*?)$/); if(start){ current={ name:start[2].trim().replace(/[*_]/g,'') }; continue; } if(current){ const idM=line.match(patterns.productID); if(idM) current.productID=idM[1].trim(); const qM=line.match(patterns.quantity); if(qM){ current.quantity=parseInt(qM[1]); items.push({...current}); current=null; } } } if(items.length===0){ const pid=(text.match(patterns.productID)?.[1]||'').trim(); const qty=parseInt(text.match(patterns.quantity)?.[1]||'1'); if(pid) items.push({ productID:pid, quantity:qty }); } return { items, storeID, customerName, customerPhone, customerAddress, total, orderNumber, date, deliveryCompany, distributorId }; }
        function deleteProduct(id) { if(confirm('حذف المنتج؟')){ products=products.filter(p=>p.id!==id); safeLocalStorage.set('nardo_products',products); renderAll(); showToast('تم الحذف','success'); } }
        function openEditStockModal(id) { editProductId=id; const p=products.find(p=>p.id===id); if(p){ document.getElementById('editProductName').value=p.name; document.getElementById('editProductID').value=p.productCompositeID; document.getElementById('editCurrentQty').value=p.quantity; document.getElementById('editNewQty').value=0; document.getElementById('editStockModal').classList.add('active'); } }
        function closeEditStockModal() { document.getElementById('editStockModal').classList.remove('active'); editProductId=null; }
        function updateStock() { const p=products.find(p=>p.id===editProductId); if(!p) return; const op=document.getElementById('stockOperation').value; const qty=parseInt(document.getElementById('editNewQty').value); const reason=document.getElementById('stockReason').value; if(isNaN(qty)||qty<0){ showToast('كمية غير صالحة','error'); return; } let old=p.quantity, newQ=old; if(op==='add') newQ=old+qty; else if(op==='remove'){ if(qty>old){ showToast('كمية أكبر من المخزون','error'); return; } newQ=old-qty; } else newQ=qty; const delta=Math.abs(newQ-old); addStockLog(p.id,p.name,op,delta,old,newQ,reason,p.storeID); p.quantity=newQ; safeLocalStorage.set('nardo_products',products); renderAll(); closeEditStockModal(); showToast('تم التحديث','success'); }
        function clearStockLog(){ if(confirm('مسح السجل؟')){ stockLog=[]; safeLocalStorage.set('nardo_stock_log',[]); renderStockLog(); showToast('تم المسح','success'); } }
        function clearOrders(){ if(confirm('مسح الطلبات؟')){ orders=[]; safeLocalStorage.set('nardo_orders',[]); renderOrders(); updateStats(); showToast('تم مسح الطلبات','success'); } }
        function quickOrder(id){ const p=products.find(p=>p.id===id); if(!p||p.quantity<=0){ showToast('المنتج غير متوفر','error'); return; } const qty=parseInt(prompt(`الكمية (متاح ${p.quantity})`,'1')); if(isNaN(qty)||qty<=0||qty>p.quantity) return; const total=p.price*qty; const newOrder={ id:Date.now(), date:new Date().toLocaleString('ar-EG'), customerName:'طلب مباشر', customerPhone:'', customerAddress:'', storeID:p.storeID, storeName:p.storeName, items:[{id:p.id, name:p.name, price:p.price, quantity:qty, productCompositeID:p.productCompositeID}], total, status:'pending', source:'manual', deliveryCompany:'', distributorId:'' }; orders.unshift(newOrder); p.quantity-=qty; safeLocalStorage.set('nardo_orders',orders); safeLocalStorage.set('nardo_products',products); addStockLog(p.id,p.name,'remove',qty,p.quantity+qty,p.quantity,'طلب مباشر',p.storeID); renderOrders(); showToast('تم إنشاء الطلب','success'); }
        function deliverOrder(orderId){ const order=orders.find(o=>o.id===orderId); if(order){ order.status=order.status==='delivered'?'pending':'delivered'; safeLocalStorage.set('nardo_orders',orders); renderOrders(); showToast(order.status==='delivered'?'✅ تم التوصيل':'🔄 قيد المعالجة','success'); } }
        function deleteOrder(orderId){ if(confirm('حذف الطلب؟')){ orders=orders.filter(o=>o.id!==orderId); safeLocalStorage.set('nardo_orders',orders); renderOrders(); updateStats(); showToast('تم الحذف','success'); } }
        function callCustomer(phone){ if(phone) window.location.href=`tel:${phone}`; else showToast('لا يوجد رقم','warning'); }
        async function exportOrderToPDF(orderId) { const order=orders.find(o=>o.id===orderId); if(!order) return; const {jsPDF}=window.jspdf; const doc=new jsPDF({orientation:'p',unit:'mm',format:'a4'}); const div=document.createElement('div'); div.style.position='absolute'; div.style.left='-9999px'; div.style.width='800px'; div.style.background='white'; div.style.color='black'; div.style.padding='20px'; div.style.fontFamily='Cairo'; div.innerHTML=`<h2 style="color:#daa520;">فاتورة طلب #${order.telegramOrderId||order.id}</h2><p>التاريخ: ${order.date}</p><p>العميل: ${order.customerName}</p><p>الهاتف: ${order.customerPhone}</p><p>العنوان: ${order.customerAddress}</p><table border="1" style="width:100%;"><thead><tr><th>المنتج</th><th>الكمية</th><th>السعر</th><th>الإجمالي</th></tr></thead><tbody>${order.items.map(it=>`<tr><td>${it.name}</td><td>${it.quantity}</td><td>${it.price} دج</td><td>${it.price*it.quantity} دج</td></tr>`).join('')}</tbody><tfoot><tr><td colspan="3"><strong>الإجمالي</strong></td><td>${order.total} دج</td></tr></tfoot></table>`; document.body.appendChild(div); const canvas=await html2canvas(div,{scale:2}); const imgData=canvas.toDataURL('image/png'); const imgProps=doc.getImageProperties(imgData); const pdfWidth=doc.internal.pageSize.getWidth(); const pdfHeight=(imgProps.height*pdfWidth)/imgProps.width; doc.addImage(imgData,'PNG',0,0,pdfWidth,pdfHeight); doc.save(`Order_${order.id}.pdf`); document.body.removeChild(div); showToast('PDF تم التصدير','success'); }
        function sendToDelivery(orderId) {  // ***** الوظيفة التي تم إصلاحها *****
            const order = orders.find(o => o.id === orderId);
            if (!order) { showToast('الطلب غير موجود', 'error'); return; }
            const modalDiv = document.createElement('div');
            modalDiv.className = 'modal active';
            modalDiv.style.cssText = 'position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); display:flex; align-items:center; justify-content:center; z-index:10000;';
            modalDiv.innerHTML = `
                <div style="background:linear-gradient(135deg,#1a1a2e,#0f0f1a); border:1px solid #ffd70033; border-radius:28px; padding:25px; max-width:550px; width:90%; max-height:85vh; overflow-y:auto;">
                    <div style="display:flex; justify-content:space-between; border-bottom:2px solid #ffd700; padding-bottom:10px; margin-bottom:20px;">
                        <h3 style="color:#ffd700;"><i class="fas fa-truck"></i> توصيل الطلب #${order.telegramOrderId || order.id}</h3>
                        <button onclick="this.closest('.modal').remove()" style="background:transparent; border:none; color:#ffd700; font-size:28px;">&times;</button>
                    </div>
                    <div style="background:#ffd70014; border-radius:16px; padding:15px; margin-bottom:20px;">
                        <p><strong>👤 العميل:</strong> ${order.customerName || 'غير معروف'}</p>
                        <p><strong>📞 الهاتف:</strong> ${order.customerPhone || '---'}</p>
                        <p><strong>📍 العنوان:</strong> ${order.customerAddress || '---'}</p>
                        <p><strong>💰 الإجمالي:</strong> ${order.total.toLocaleString()} دج</p>
                    </div>
                    <div style="margin-bottom:20px;">
                        <h4 style="color:#ffd700;">المندوب / الشركة الحالية</h4>
                        <p>🚚 جهة التوصيل: ${order.deliveryCompany || 'غير محدد'}</p>
                        <p>🆔 معرف الموزع: ${order.distributorId || 'غير محدد'}</p>
                        <button class="btn btn-success" style="width:100%; margin-top:10px;" onclick="completeDeliveryWithDistributor(${order.id}); this.closest('.modal').remove();">تأكيد التوصيل بهذه البيانات</button>
                    </div>
                    <hr style="border-color:#ffd70033;">
                    <div style="margin:20px 0;">
                        <h4 style="color:#ffd700;">🏪 توصيل عن طريق المتجر</h4>
                        <select id="newDistributor_${order.id}" style="width:100%; padding:12px; background:#00000066; border:1px solid #ffd700; border-radius:12px; color:white; margin-bottom:12px;">
                            <option value="">-- اختر الموزع --</option>
                            <option value="مندوب المتجر - محمد">مندوب المتجر - محمد</option>
                            <option value="مندوب المتجر - خالد">مندوب المتجر - خالد</option>
                            <option value="شركة أرامكس">شركة أرامكس</option>
                            <option value="شركة زاجل">شركة زاجل</option>
                        </select>
                        <input type="text" id="newTracking_${order.id}" placeholder="رقم التتبع (اختياري)" style="width:100%; padding:12px; background:#00000066; border:1px solid #ffd700; border-radius:12px; color:white; margin-bottom:12px;">
                        <button class="btn btn-info" style="width:100%;" onclick="completeDeliveryWithNewDistributor(${order.id}); this.closest('.modal').remove();">تعيين الموزع وإكمال الطلب</button>
                    </div>
                    <div style="display:flex; gap:10px; margin-top:20px;">
                        <button class="btn btn-gold" style="flex:1;" onclick="callCustomer('${order.customerPhone || ''}');">اتصال</button>
                        <button class="btn btn-outline" style="flex:1;" onclick="this.closest('.modal').remove();">إغلاق</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modalDiv);
            modalDiv.addEventListener('click', (e) => { if(e.target === modalDiv) modalDiv.remove(); });
        }
        function completeDeliveryWithDistributor(orderId) { const order=orders.find(o=>o.id===orderId); if(order){ order.status='delivered'; safeLocalStorage.set('nardo_orders',orders); renderOrders(); updateStats(); showToast(`تم تسليم الطلب`,'success'); } }
        function completeDeliveryWithNewDistributor(orderId) { const order=orders.find(o=>o.id===orderId); if(!order) return; const sel=document.getElementById(`newDistributor_${orderId}`); const track=document.getElementById(`newTracking_${orderId}`); if(!sel || !sel.value){ showToast('اختر الموزع','warning'); return; } order.deliveryCompany=sel.value; order.distributorId=track.value||'بدون تتبع'; order.status='delivered'; safeLocalStorage.set('nardo_orders',orders); renderOrders(); updateStats(); showToast(`تم تعيين الموزع: ${sel.value}`,'success'); }
        function renderProducts() { const search=document.getElementById('searchProducts')?.value.toLowerCase()||''; let filtered=products.filter(p=>p.storeID===currentStore.storeFixedID).filter(p=>p.name.toLowerCase().includes(search)||(p.productCompositeID||'').toLowerCase().includes(search)); const container=document.getElementById('productsGrid'); if(!filtered.length){ container.innerHTML='<div style="text-align:center; padding:60px;">لا توجد منتجات</div>'; return; } container.innerHTML=filtered.map(p=>{ const img=p.imageData?`<img src="${p.imageData}" style="width:100%; height:160px; object-fit:cover; border-radius:20px;">`:'<div style="height:160px; background:#1a1a2e; display:flex; align-items:center; justify-content:center;"><i class="fas fa-image fa-3x" style="color:#ffd700;"></i></div>'; return `<div class="product-card">${img}<div class="product-name">${p.name}</div><div class="product-price">${p.price.toLocaleString()} دج</div><div>المخزون: ${p.quantity}</div><div class="product-actions" style="display:flex; gap:10px; margin-top:10px;"><button class="btn btn-gold" onclick="quickOrder(${p.id})">طلب</button><button class="btn btn-outline" onclick="openEditStockModal(${p.id})">تعديل</button><button class="btn btn-error" onclick="deleteProduct(${p.id})">حذف</button></div></div>`; }).join(''); }
        function renderInventory() { const tbody=document.getElementById('inventoryTable'); let filtered=products.filter(p=>p.storeID===currentStore.storeFixedID); tbody.innerHTML=filtered.map(p=>`<tr><td>${p.name}</td><td>${p.productCompositeID||'---'}</td><td>${p.price} دج</td><td>${p.quantity}</td><td><span class="stock-status ${p.quantity>0?'high':'out'}">${p.quantity>0?'متاح':'نفد'}</span></td><td>${p.source}</td><td>${p.published?'✅ منشور':'📝 محلي'}</td><td><button class="btn btn-gold btn-sm" onclick="openEditStockModal(${p.id})">تعديل</button></td></tr>`).join(''); }
        function renderStockLog() { const container=document.getElementById('stockLogContainer'); let filtered=stockLog.filter(l=>l.storeID===currentStore.storeFixedID); container.innerHTML=filtered.map(l=>`<div class="stock-log-item" style="background:#00000033; padding:12px; margin-bottom:8px; border-radius:16px;"><div><strong>${l.productName}</strong> - ${l.operation==='add'?'➕ إضافة':l.operation==='remove'?'➖ سحب':'📝 تعيين'} ${l.quantity} (${l.oldQty} → ${l.newQty})${l.reason?` - سبب: ${l.reason}`:''}</div><div style="font-size:11px;">${l.date}</div></div>`).join(''); }
        function renderOrders() { const tbody=document.getElementById('ordersTableBody'); let filtered=orders.filter(o=>o.storeID===currentStore.storeFixedID); if(!filtered.length){ tbody.innerHTML='<tr><td colspan="9" style="text-align:center;">لا توجد طلبات</td></tr>'; return; } tbody.innerHTML=filtered.map(o=>`<tr><td>#${o.telegramOrderId||o.id}</td><td>${o.date}</td><td><div>${o.customerName}</div><div style="font-size:11px;">${o.customerPhone}</div></td><td>${o.items.map(i=>i.name).join(', ')}</td><td>${o.total.toLocaleString()} دج</td><td><span class="stock-status ${o.status==='delivered'?'high':'low'}">${o.status==='delivered'?'تم التوصيل':'قيد المعالجة'}</span></td><td>${o.deliveryCompany||'-'}</td><td>${o.distributorId||'-'}</td><td><div style="display:flex; gap:5px;"><button class="btn btn-info btn-sm" onclick="exportOrderToPDF(${o.id})"><i class="fas fa-file-pdf"></i></button><button class="btn btn-success btn-sm" onclick="deliverOrder(${o.id})"><i class="fas ${o.status==='delivered'?'fa-undo':'fa-check'}"></i></button><button class="btn btn-telegram btn-sm" onclick="sendToDelivery(${o.id})"><i class="fas fa-truck"></i></button><button class="btn btn-gold btn-sm" onclick="callCustomer('${o.customerPhone||''}')"><i class="fas fa-phone"></i></button><button class="btn btn-error btn-sm" onclick="deleteOrder(${o.id})"><i class="fas fa-trash"></i></button></div></td></tr>`).join(''); }
        function updateStats() { document.getElementById('statTotal').innerText=products.filter(p=>p.storeID===currentStore.storeFixedID).length; document.getElementById('statOrders').innerText=orders.filter(o=>o.storeID===currentStore.storeFixedID).length; }
        function renderAll() { renderProducts(); renderInventory(); renderStockLog(); renderOrders(); updateStats(); }
        function showTab(tab, btn) { document.querySelectorAll('.tab-content').forEach(el=>el.style.display='none'); document.getElementById(tab+'Tab').style.display='block'; document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); if(tab==='products') renderProducts(); if(tab==='inventory') renderInventory(); if(tab==='stockLog') renderStockLog(); if(tab==='orders') renderOrders(); }
        function openAddProductModal() { document.getElementById('addProductModal').classList.add('active'); document.getElementById('productImages').value=''; document.getElementById('imagePreview').style.display='none'; }
        function closeAddProductModal() { document.getElementById('addProductModal').classList.remove('active'); }
        function openOrderFilterPage() { window.open('orders-filter.html', '_blank'); }
        document.getElementById('productImages')?.addEventListener('change', function(e){ const file=e.target.files[0]; const previewDiv=document.getElementById('imagePreview'); const previewImg=document.getElementById('previewImg'); if(file){ const reader=new FileReader(); reader.onload=function(ev){ previewImg.src=ev.target.result; previewDiv.style.display='block'; }; reader.readAsDataURL(file); } else previewDiv.style.display='none'; });
        document.getElementById('searchProducts')?.addEventListener('input', renderProducts);
        document.addEventListener('DOMContentLoaded', () => { loadCurrentStore(); renderAll(); setTimeout(fetchOrdersFromTelegram,2000); setInterval(fetchOrdersFromTelegram,120000); });
    </script>
