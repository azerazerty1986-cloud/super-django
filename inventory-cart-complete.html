<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ناردو برو | المتجر الذكي - نظام التوصيل المتكامل</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #0a0a1a;
            --secondary: #1a1a2e;
            --gold: #ffd700;
            --gold-dark: #daa520;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --success: #4ade80;
            --error: #f87171;
            --warning: #fbbf24;
            --info: #60a5fa;
            --telegram: #0088cc;
        }
        
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0b0b14 0%, #15152a 100%);
            color: var(--text-primary);
            min-height: 100vh;
        }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        /* تنسيق شريط التنقل */
        .top-navbar {
            background: linear-gradient(135deg, rgba(10,10,26,0.95), rgba(26,26,46,0.95));
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,215,0,0.25);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        
        .nav-logo { display: flex; align-items: center; gap: 10px; }
        .nav-logo i { font-size: 28px; color: var(--gold); }
        .nav-logo .logo-text { font-size: 18px; font-weight: 800; background: linear-gradient(135deg, #ffd700, #ffed4e); -webkit-background-clip: text; background-clip: text; color: transparent; }
        
        .store-circle { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .circle-icon { width: 55px; height: 55px; background: linear-gradient(135deg, var(--gold), var(--gold-dark)); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .circle-icon i { font-size: 28px; color: #111; }
        .store-name-circle { font-size: 11px; font-weight: 700; margin-top: 6px; color: var(--gold); }
        
        .nav-btn { padding: 8px 18px; border-radius: 40px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; display: flex; align-items: center; gap: 6px; }
        .nav-btn-telegram { background: linear-gradient(135deg, #0088cc, #006699); color: white; }
        .nav-btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: #111; }
        
        /* التبويبات */
        .tabs-bar {
            background: linear-gradient(135deg, rgba(10,10,26,0.9), rgba(26,26,46,0.9));
            backdrop-filter: blur(20px);
            padding: 10px 20px;
            display: flex;
            justify-content: center;
            gap: 12px;
            position: sticky;
            top: 70px;
            z-index: 999;
            flex-wrap: wrap;
        }
        .tab-btn { padding: 10px 28px; border-radius: 40px; background: transparent; color: var(--text-secondary); font-weight: 700; cursor: pointer; border: none; display: flex; align-items: center; gap: 8px; }
        .tab-btn.active { background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,215,0,0.08)); color: var(--gold); border: 1px solid rgba(255,215,0,0.25); }
        
        /* المنتجات */
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 24px; }
        .product-card { background: linear-gradient(145deg, rgba(25,25,45,0.9), rgba(15,15,30,0.95)); border: 1px solid rgba(255,215,0,0.15); border-radius: 28px; padding: 20px; position: relative; }
        .product-id-badge { position: absolute; top: 15px; left: 15px; background: linear-gradient(135deg, var(--gold), #ffb347); color: #111; padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 800; }
        .product-price { font-size: 24px; font-weight: 900; color: var(--success); }
        .stock-status { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 20px; font-size: 12px; }
        .stock-status.high { background: rgba(74,222,128,0.15); color: var(--success); }
        
        /* الجداول */
        .table-container { background: rgba(0,0,0,0.25); border-radius: 24px; overflow-x: auto; }
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th { text-align: right; padding: 14px 16px; background: rgba(255,215,0,0.1); color: var(--gold); }
        .data-table td { padding: 12px 16px; border-bottom: 1px solid rgba(255,215,0,0.06); }
        
        /* النوافذ المنبثقة */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: linear-gradient(135deg, rgba(26,26,46,0.98), rgba(10,10,25,0.98)); border: 1px solid rgba(255,215,0,0.2); border-radius: 28px; padding: 28px; max-width: 650px; width: 90%; max-height: 85vh; overflow-y: auto; }
        
        /* أنماط الموزعين */
        .distributor-option {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            margin-bottom: 10px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 215, 0, 0.15);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .distributor-option:hover { background: rgba(255, 215, 0, 0.1); border-color: var(--gold); transform: translateX(-5px); }
        .distributor-option.selected { background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(255, 215, 0, 0.05)); border-color: var(--gold); border-width: 2px; }
        .distributor-option .option-icon { font-size: 32px; width: 50px; text-align: center; }
        .distributor-option .option-content { flex: 1; }
        .distributor-option .option-title { font-weight: bold; font-size: 16px; margin-bottom: 5px; }
        .distributor-option .option-desc { font-size: 12px; margin-bottom: 5px; }
        .type-delivery { background: rgba(96, 165, 250, 0.2); color: #60a5fa; padding: 2px 8px; border-radius: 20px; font-size: 11px; }
        .type-distributor { background: rgba(255, 215, 0, 0.2); color: var(--gold); padding: 2px 8px; border-radius: 20px; font-size: 11px; }
        .store-option { background: linear-gradient(135deg, rgba(74, 222, 128, 0.1), rgba(74, 222, 128, 0.05)); border-color: rgba(74, 222, 128, 0.3); }
        
        .btn { padding: 10px 24px; border: none; border-radius: 40px; font-size: 14px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }
        .btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: #111; }
        .btn-telegram { background: linear-gradient(135deg, #0088cc, #006699); color: white; }
        .btn-outline { background: transparent; border: 2px solid var(--gold); color: var(--gold); }
        .btn-info { background: linear-gradient(135deg, #60a5fa, #3b82f6); color: white; }
        .btn-success { background: linear-gradient(135deg, #4ade80, #22c55e); color: white; }
        .btn-sm { padding: 5px 12px; font-size: 12px; }
        
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); padding: 12px 24px; border-radius: 40px; color: white; font-weight: 700; z-index: 3000; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { bottom: -50px; opacity: 0; } to { bottom: 30px; opacity: 1; } }
        .toast.success { background: linear-gradient(135deg, #22c55e, #16a34a); }
        .toast.error { background: linear-gradient(135deg, #ef4444, #dc2626); }
        
        .loading-spinner { width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        @media (max-width: 768px) {
            .products-grid { grid-template-columns: 1fr; }
            .tabs-bar { top: 60px; }
        }
    </style>
</head>
<body>

    <nav class="top-navbar">
        <div class="nav-logo">
            <i class="fas fa-bolt"></i>
            <span class="logo-text">ناردو برو</span>
        </div>
        <div class="store-circle" onclick="location.reload()">
            <div class="circle-icon"><i class="fas fa-store"></i></div>
            <div class="store-name-circle" id="currentStoreNameDisplay">جاري التحميل...</div>
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="nav-btn nav-btn-telegram" onclick="window.open('https://t.me/NardoProBot', '_blank')">
                <i class="fab fa-telegram"></i> بوت ناردو
            </button>
            <button class="nav-btn nav-btn-gold" onclick="openAddProductModal()">
                <i class="fas fa-plus"></i> منتج جديد
            </button>
        </div>
    </nav>

    <div class="tabs-bar">
        <button class="tab-btn active" onclick="showTab('products', this)"><i class="fas fa-th-large"></i> المنتجات</button>
        <button class="tab-btn" onclick="showTab('inventory', this)"><i class="fas fa-boxes"></i> المخزون</button>
        <button class="tab-btn" onclick="showTab('orders', this)"><i class="fas fa-shopping-cart"></i> الطلبات</button>
        <button class="tab-btn" onclick="showTab('stockLog', this)"><i class="fas fa-history"></i> السجل</button>
    </div>

    <div class="container">
        <div id="productsTab" class="tab-content">
            <div class="products-grid" id="productsGrid"></div>
        </div>
        <div id="inventoryTab" class="tab-content" style="display:none;">
            <div class="table-container">
                <table class="data-table">
                    <thead><tr><th>المنتج</th><th>المعرف</th><th>السعر</th><th>الكمية</th><th>الحالة</th><th>إجراء</th></tr></thead>
                    <tbody id="inventoryTable"></tbody>
                </table>
            </div>
        </div>
        <div id="ordersTab" class="tab-content" style="display:none;">
            <div class="table-container">
                <table class="data-table">
                    <thead><tr><th>رقم الطلب</th><th>التاريخ</th><th>العميل</th><th>المنتجات</th><th>الإجمالي</th><th>الحالة</th><th>جهة التوصيل</th><th>إجراءات</th></tr></thead>
                    <tbody id="ordersTableBody"></tbody>
                </table>
            </div>
        </div>
        <div id="stockLogTab" class="tab-content" style="display:none;">
            <div id="stockLogContainer"></div>
        </div>
    </div>

    <!-- نافذة إضافة منتج -->
    <div id="addProductModal" class="modal">
        <div class="modal-content">
            <h3 style="color:var(--gold); margin-bottom:20px;"><i class="fas fa-cube"></i> إضافة منتج جديد</h3>
            <input type="text" id="productName" placeholder="اسم المنتج" style="width:100%; padding:12px; margin-bottom:15px; background:rgba(0,0,0,0.3); border:1px solid rgba(255,215,0,0.2); border-radius:12px; color:white;">
            <textarea id="productDesc" placeholder="الوصف" rows="3" style="width:100%; padding:12px; margin-bottom:15px; background:rgba(0,0,0,0.3); border:1px solid rgba(255,215,0,0.2); border-radius:12px; color:white;"></textarea>
            <input type="number" id="productPrice" placeholder="السعر" style="width:100%; padding:12px; margin-bottom:15px; background:rgba(0,0,0,0.3); border:1px solid rgba(255,215,0,0.2); border-radius:12px; color:white;">
            <input type="number" id="productQty" placeholder="الكمية" value="1" style="width:100%; padding:12px; margin-bottom:15px; background:rgba(0,0,0,0.3); border:1px solid rgba(255,215,0,0.2); border-radius:12px; color:white;">
            <input type="file" id="productImages" accept="image/*" style="width:100%; padding:10px; margin-bottom:15px; background:rgba(0,0,0,0.3); border-radius:12px; color:white;">
            <div style="display:flex; gap:10px;">
                <button class="btn btn-outline" onclick="saveProductOnly()" style="flex:1;">حفظ فقط</button>
                <button class="btn btn-telegram" onclick="saveAndPublishProduct()" style="flex:1;">حفظ ونشر</button>
                <button class="btn" onclick="closeAddProductModal()" style="flex:0; background:#333;">إلغاء</button>
            </div>
        </div>
    </div>

    <!-- نافذة تعديل المخزون -->
    <div id="editStockModal" class="modal">
        <div class="modal-content">
            <h3 style="color:var(--gold);">تعديل المخزون</h3>
            <input type="text" id="editProductName" disabled style="width:100%; padding:10px; margin:10px 0; background:#333; border-radius:10px;">
            <input type="number" id="editCurrentQty" disabled style="width:100%; padding:10px; margin:10px 0; background:#333; border-radius:10px;">
            <select id="stockOperation" style="width:100%; padding:10px; margin:10px 0; background:#333; border-radius:10px; color:white;">
                <option value="add">إضافة (+)</option><option value="remove">سحب (-)</option><option value="set">تعيين (=)</option>
            </select>
            <input type="number" id="editNewQty" placeholder="الكمية" style="width:100%; padding:10px; margin:10px 0; background:#333; border-radius:10px;">
            <button class="btn btn-gold" onclick="updateStock()" style="width:100%;">تحديث</button>
            <button class="btn" onclick="closeEditStockModal()" style="width:100%; margin-top:10px; background:#333;">إلغاء</button>
        </div>
    </div>

    <script>
        // ============================================================
        // الإعدادات الأساسية
        // ============================================================
        const TELEGRAM = { botToken: '8576673096:AAFwOd-Ut1tCyKTHwkgj_r6OFi9UZbb4pTM', channelId: '-1003822964890', apiUrl: 'https://api.telegram.org/bot' };
        
        let products = [], orders = [], stockLog = [];
        let currentStore = { storeName: 'ناردو برو', storeFixedID: '', channelUsername: '@NardoChannel' };
        let editProductId = null;
        
        // نظام التوصيل - المتغيرات
        let distributorsCache = null;
        let cacheTimestamp = null;
        let selectedDeliveryOption = null;

        // ============================================================
        // دوال التخزين
        // ============================================================
        function saveToLocal(key, data) { localStorage.setItem(key, JSON.stringify(data)); }
        function loadFromLocal(key) { try { return JSON.parse(localStorage.getItem(key) || '[]'); } catch(e) { return []; } }
        
        function generateStoreID(storeName) {
            let clean = storeName.replace(/[^a-zA-Z0-9\u0600-\u06FF]/g, '').substring(0, 10).toUpperCase() || 'NARDO';
            return `${clean}-${Math.floor(Math.random() * 900000 + 100000)}`;
        }

        // ============================================================
        // دوال الحصول على كود الولاية
        // ============================================================
        function getStateCode(stateName) {
            const stateCodes = {
                'الجزائر': 'ALG', 'وهران': 'ORA', 'قسنطينة': 'CON', 'عنابة': 'ANA', 'سطيف': 'SET',
                'باتنة': 'BAT', 'بجاية': 'BJA', 'تلمسان': 'TLE', 'البليدة': 'BLI', 'بومرداس': 'BMD',
                'تيبازة': 'TIP', 'بسكرة': 'BSK', 'الشلف': 'CHL', 'سكيكدة': 'SKI', 'سيدي بلعباس': 'SBA',
                'الجلفة': 'DJF', 'تيارت': 'TIA', 'المدية': 'MED', 'مستغانم': 'MGH', 'غليزان': 'GHL'
            };
            return stateCodes[stateName] || stateName.substring(0, 3).toUpperCase();
        }

        // ============================================================
        // جلب الموزعين من قناة التلغرام
        // ============================================================
        async function fetchDistributorsFromChannel() {
            try {
                if (distributorsCache && cacheTimestamp && (Date.now() - cacheTimestamp) < 3600000) {
                    return distributorsCache;
                }
                
                const cached = localStorage.getItem('nardo_distributors_cache');
                if (cached) {
                    distributorsCache = JSON.parse(cached);
                    cacheTimestamp = parseInt(localStorage.getItem('nardo_distributors_cache_time') || '0');
                    return distributorsCache;
                }
                
                const response = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getUpdates?limit=100`);
                const data = await response.json();
                if (!data.ok) throw new Error();
                
                let foundMessage = null;
                for (const update of data.result || []) {
                    const message = update.channel_post || update.message;
                    if (message && message.chat.id.toString() === TELEGRAM.channelId && message.text) {
                        if (message.text.includes('قائمة الموزعين') || (message.text.includes('ولاية') && message.text.includes('موزع'))) {
                            foundMessage = message;
                            break;
                        }
                    }
                }
                
                if (foundMessage) {
                    const distributors = parseDistributorsMessage(foundMessage.text);
                    if (Object.keys(distributors).length > 0) {
                        distributorsCache = distributors;
                        cacheTimestamp = Date.now();
                        localStorage.setItem('nardo_distributors_cache', JSON.stringify(distributors));
                        localStorage.setItem('nardo_distributors_cache_time', Date.now().toString());
                        return distributors;
                    }
                }
                
                return getDefaultDistributors();
            } catch(e) {
                console.error('خطأ في جلب الموزعين:', e);
                return getDefaultDistributors();
            }
        }
        
        function parseDistributorsMessage(text) {
            const distributors = {};
            const lines = text.split('\n');
            let currentStateCode = null;
            
            for (let line of lines) {
                line = line.trim();
                if (!line) continue;
                
                let stateMatch = line.match(/📍\s*ولاية\s*(.+?)(?:\s*\(([A-Z]{3})\)|$)/);
                if (stateMatch) {
                    currentStateCode = stateMatch[2] || getStateCode(stateMatch[1].trim());
                    if (!distributors[currentStateCode]) distributors[currentStateCode] = { name: stateMatch[1].trim(), code: currentStateCode, distributors: [] };
                    continue;
                }
                
                if (currentStateCode && distributors[currentStateCode]) {
                    let distMatch = line.match(/[•\-*]\s*(.+?)\s*\(([📦🚚].+?)\)/);
                    if (distMatch) {
                        distributors[currentStateCode].distributors.push({
                            name: distMatch[1].trim(),
                            type: distMatch[2].includes('📦') ? 'distributor' : 'delivery',
                            typeText: distMatch[2].includes('📦') ? '📦 موزع معتمد' : '🚚 شركة توصيل',
                            customId: `${currentStateCode}-${distMatch[1].trim().replace(/\s/g, '')}`,
                            phone: null
                        });
                    }
                }
            }
            return distributors;
        }
        
        function getDefaultDistributors() {
            return {
                'ALG': { name: 'الجزائر', code: 'ALG', distributors: [{ name: 'شركة تسليم السريع', type: 'delivery', typeText: '🚚 شركة توصيل', customId: 'ALG-DEL-001', phone: '0555123456' }] },
                'ORA': { name: 'وهران', code: 'ORA', distributors: [{ name: 'شركة ناردو', type: 'delivery', typeText: '🚚 شركة توصيل', customId: 'ORA-DEL-001', phone: '0556456789' }] },
                'CON': { name: 'قسنطينة', code: 'CON', distributors: [{ name: 'قسنطينة إكسبريس', type: 'delivery', typeText: '🚚 شركة توصيل', customId: 'CON-DEL-001', phone: '0557678901' }] }
            };
        }

        // ============================================================
        // نافذة التوصيل المتكاملة (مع اختيار الولاية والموزعين)
        // ============================================================
        function sendToDelivery(orderId) {
            let order = orders.find(o => o.id == orderId) || orders.find(o => o.telegramOrderId == orderId);
            if (!order) { showToast('❌ لم يتم العثور على الطلب', 'error'); return; }
            
            const productsHtml = order.items.map(item => `
                <div style="display:flex; justify-content:space-between; background:rgba(0,0,0,0.3); border-radius:12px; padding:10px; margin-bottom:8px;">
                    <div><strong>${item.name}</strong><br><span style="font-size:12px;">الكمية: ${item.quantity}</span></div>
                    <div style="color:#4ade80;">${(item.price * item.quantity).toLocaleString()} دج</div>
                </div>
            `).join('');
            
            const wilayasList = ['الجزائر', 'وهران', 'قسنطينة', 'عنابة', 'سطيف', 'باتنة', 'بجاية', 'تلمسان', 'البليدة', 'بومرداس', 'تيبازة', 'بسكرة', 'الشلف', 'سكيكدة'];
            
            const modal = document.createElement('div');
            modal.style.cssText = `position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); display:flex; align-items:center; justify-content:center; z-index:10001; overflow-y:auto;`;
            
            modal.innerHTML = `
                <div style="background:linear-gradient(135deg,#1a1a2e,#0f0f1a); border:2px solid #ffd700; border-radius:28px; padding:25px; max-width:600px; width:90%; max-height:90vh; overflow-y:auto;">
                    <div style="display:flex; justify-content:space-between; border-bottom:2px solid #ffd700; padding-bottom:15px; margin-bottom:20px;">
                        <div style="display:flex; align-items:center; gap:10px;">
                            <i class="fas fa-truck" style="color:#ffd700; font-size:28px;"></i>
                            <span style="font-size:20px; font-weight:bold; color:#ffd700;">توصيل الطلب</span>
                        </div>
                        <button onclick="this.closest('div').parentElement.remove()" style="background:rgba(255,255,255,0.2); border:none; color:#ffd700; font-size:24px; cursor:pointer; width:40px; height:40px; border-radius:50%;">&times;</button>
                    </div>
                    
                    <div style="background:rgba(255,215,0,0.1); border-radius:16px; padding:15px; margin-bottom:20px;">
                        <div><i class="fas fa-hashtag"></i> <strong>رقم الطلب:</strong> ${order.telegramOrderId || order.id}</div>
                        <div><i class="fas fa-user"></i> <strong>العميل:</strong> ${order.customerName || 'غير معروف'}</div>
                        <div><i class="fas fa-phone"></i> <strong>الهاتف:</strong> ${order.customerPhone || 'غير متوفر'}</div>
                        <div><i class="fas fa-map-marker-alt"></i> <strong>العنوان:</strong> ${order.customerAddress || 'غير متوفر'}</div>
                    </div>
                    
                    <div style="background:rgba(0,0,0,0.3); border-radius:16px; padding:15px; margin-bottom:20px;">
                        <h3 style="color:#ffd700; margin-bottom:15px;"><i class="fas fa-boxes"></i> المنتجات</h3>
                        ${productsHtml}
                        <div style="background:rgba(74,222,128,0.2); border-radius:12px; padding:12px; margin-top:10px; text-align:center;">
                            <span style="font-size:16px;">💰 الإجمالي: </span>
                            <span style="font-size:22px; font-weight:bold; color:#4ade80;">${order.total.toLocaleString()} دج</span>
                        </div>
                    </div>
                    
                    <div style="background:rgba(0,0,0,0.3); border-radius:16px; padding:15px; margin-bottom:20px;">
                        <h3 style="color:#ffd700; margin-bottom:15px;"><i class="fas fa-map-marker-alt"></i> معلومات التوصيل</h3>
                        <select id="wilayaSelect" style="width:100%; padding:12px; background:rgba(0,0,0,0.5); border:1px solid #ffd700; border-radius:12px; color:white;">
                            <option value="">-- اختر الولاية --</option>
                            ${wilayasList.map(w => `<option value="${w}">📍 ولاية ${w}</option>`).join('')}
                        </select>
                        <div id="distributorsList" style="margin-top:15px;"></div>
                    </div>
                    
                    <div style="display:flex; gap:10px;">
                        <button class="btn btn-gold" onclick="callCustomer('${order.customerPhone || ''}')" style="flex:1; padding:12px;"><i class="fas fa-phone"></i> اتصال</button>
                        <button class="btn btn-outline" onclick="this.closest('div').parentElement.remove()" style="flex:1; padding:12px;"><i class="fas fa-times"></i> إغلاق</button>
                    </div>
                </div>
            `;
            
            document.body.appendChild(modal);
            
            const wilayaSelect = document.getElementById('wilayaSelect');
            if (wilayaSelect) {
                wilayaSelect.addEventListener('change', async (e) => {
                    if (e.target.value) {
                        await loadDistributorsByWilaya(e.target.value, document.getElementById('distributorsList'), order.id);
                    }
                });
            }
        }
        
        async function loadDistributorsByWilaya(wilayaName, container, orderId) {
            if (!container) return;
            const stateCode = getStateCode(wilayaName);
            container.innerHTML = '<div style="text-align:center; padding:20px;"><div class="loading-spinner"></div> جاري التحميل...</div>';
            
            try {
                const distributors = await fetchDistributorsFromChannel();
                const stateDistributors = distributors[stateCode];
                
                if (!stateDistributors || stateDistributors.distributors.length === 0) {
                    container.innerHTML = `
                        <div style="text-align:center; padding:20px; color:#aaa;">
                            <i class="fas fa-truck fa-2x" style="color:var(--gold); margin-bottom:10px; display:block;"></i>
                            لا توجد شركات توصيل في ${wilayaName}<br>
                            <button class="btn btn-outline btn-sm" onclick="refreshDistributorsData()" style="margin-top:10px;">تحديث</button>
                        </div>
                    `;
                    return;
                }
                
                let html = `<div class="distributor-option store-option" onclick="selectStoreDeliveryOption('${orderId}')">
                    <div class="option-icon">🏪</div>
                    <div class="option-content">
                        <div class="option-title">توصيل من طرف المتجر</div>
                        <div class="option-desc">يتولى المتجر مسؤولية التوصيل</div>
                        <div class="option-id">المعرف: STORE-DELIVERY</div>
                    </div>
                </div>`;
                
                stateDistributors.distributors.forEach((dist, idx) => {
                    const icon = dist.type === 'delivery' ? '🚚' : '📦';
                    const typeClass = dist.type === 'delivery' ? 'type-delivery' : 'type-distributor';
                    html += `<div class="distributor-option" onclick="selectDistributor('${stateCode}', ${idx}, '${orderId}')">
                        <div class="option-icon">${icon}</div>
                        <div class="option-content">
                            <div class="option-title">${dist.name}</div>
                            <div class="option-desc"><span class="${typeClass}">${dist.typeText}</span></div>
                            <div class="option-id">🆔 ${dist.customId}</div>
                            ${dist.phone ? `<div class="option-phone">📞 ${dist.phone}</div>` : ''}
                        </div>
                    </div>`;
                });
                
                container.innerHTML = html;
            } catch(e) {
                container.innerHTML = `<div style="text-align:center; padding:20px; color:red;">خطأ في التحميل</div>`;
            }
        }
        
        function selectDistributor(stateCode, index, orderId) {
            document.querySelectorAll('.distributor-option').forEach(opt => opt.classList.remove('selected'));
            const options = document.querySelectorAll('.distributor-option');
            if (options[index + 1]) options[index + 1].classList.add('selected');
            
            fetchDistributorsFromChannel().then(distributors => {
                const state = distributors[stateCode];
                if (state && state.distributors[index]) {
                    selectedDeliveryOption = state.distributors[index];
                    completeDeliveryWithDistributor(orderId, selectedDeliveryOption);
                }
            });
        }
        
        function selectStoreDeliveryOption(orderId) {
            document.querySelectorAll('.distributor-option').forEach(opt => opt.classList.remove('selected'));
            const storeOpt = document.querySelector('.distributor-option.store-option');
            if (storeOpt) storeOpt.classList.add('selected');
            
            selectedDeliveryOption = { name: 'توصيل من طرف المتجر', customId: 'STORE-DELIVERY', isStoreDelivery: true };
            completeDeliveryWithDistributor(orderId, selectedDeliveryOption);
        }
        
        function completeDeliveryWithDistributor(orderId, distributor) {
            const order = orders.find(o => o.id == orderId);
            if (order) {
                order.deliveryCompany = distributor.name;
                order.distributorId = distributor.customId;
                order.status = 'delivered';
                saveToLocal('nardo_orders', orders);
                renderOrders();
                showToast(`✅ تم تسليم الطلب عبر ${distributor.name}`, 'success');
                
                const modal = document.querySelector('[style*="z-index:10001"]');
                if (modal) modal.remove();
            }
        }
        
        async function refreshDistributorsData() {
            showToast('🔄 جاري تحديث بيانات الموزعين...', 'info');
            distributorsCache = null;
            cacheTimestamp = null;
            localStorage.removeItem('nardo_distributors_cache');
            localStorage.removeItem('nardo_distributors_cache_time');
            await fetchDistributorsFromChannel();
            showToast('✅ تم تحديث القائمة', 'success');
        }

        // ============================================================
        // دوال إدارة المنتجات والطلبات الأساسية
        // ============================================================
        function loadCurrentStore() {
            const saved = localStorage.getItem('nardo_current_store');
            if (saved) {
                currentStore = JSON.parse(saved);
                if (!currentStore.storeFixedID) currentStore.storeFixedID = generateStoreID(currentStore.storeName);
            } else {
                currentStore.storeFixedID = generateStoreID(currentStore.storeName);
                localStorage.setItem('nardo_current_store', JSON.stringify(currentStore));
            }
            document.getElementById('currentStoreNameDisplay').innerText = currentStore.storeName;
            products = loadFromLocal('nardo_products');
            orders = loadFromLocal('nardo_orders');
            stockLog = loadFromLocal('nardo_stock_log');
        }
        
        function getNextProductSerial(storeID) {
            const storeProducts = products.filter(p => p.storeID === storeID);
            if (storeProducts.length === 0) return 1;
            return Math.max(...storeProducts.map(p => p.serialNumber || 0)) + 1;
        }
        
        function generateProductCompositeID(storeID, serial) { return `${storeID}-${serial.toString().padStart(3, '0')}`; }
        
        function addStockLog(pid, pname, op, qty, oldQ, newQ, reason = '') {
            stockLog.unshift({ id: Date.now(), productId: pid, productName: pname, operation: op, quantity: qty, oldQty: oldQ, newQty: newQ, reason, date: new Date().toLocaleString('ar-EG') });
            if (stockLog.length > 500) stockLog = stockLog.slice(0, 500);
            saveToLocal('nardo_stock_log', stockLog);
        }
        
        function saveProductOnly() {
            const name = document.getElementById('productName').value.trim();
            const price = parseInt(document.getElementById('productPrice').value);
            const quantity = parseInt(document.getElementById('productQty').value);
            if (!name || isNaN(price) || price <= 0) { showToast('بيانات غير مكتملة', 'error'); return; }
            
            const storeID = currentStore.storeFixedID;
            const serial = getNextProductSerial(storeID);
            const compositeID = generateProductCompositeID(storeID, serial);
            
            const imageInput = document.getElementById('productImages');
            const saveProduct = (imageData) => {
                const newProduct = {
                    id: Date.now(), storeID, storeName: currentStore.storeName, productCompositeID: compositeID,
                    serialNumber: serial, name, price, quantity: quantity || 0,
                    description: document.getElementById('productDesc').value,
                    createdAt: new Date().toISOString(), source: 'local', published: false, imageData
                };
                products.push(newProduct);
                saveToLocal('nardo_products', products);
                addStockLog(newProduct.id, newProduct.name, 'add', quantity, 0, quantity, 'إنشاء منتج');
                renderAll();
                closeAddProductModal();
                showToast(`✅ تم حفظ ${name}`, 'success');
            };
            
            if (imageInput && imageInput.files && imageInput.files[0]) {
                const reader = new FileReader();
                reader.onload = e => saveProduct(e.target.result);
                reader.readAsDataURL(imageInput.files[0]);
            } else { saveProduct(null); }
        }
        
        async function saveAndPublishProduct() {
            const name = document.getElementById('productName').value.trim();
            const price = parseInt(document.getElementById('productPrice').value);
            const quantity = parseInt(document.getElementById('productQty').value);
            if (!name || isNaN(price) || price <= 0) { showToast('بيانات غير مكتملة', 'error'); return; }
            
            const imageInput = document.getElementById('productImages');
            if (!imageInput.files || !imageInput.files[0]) { showToast('⚠️ النشر يتطلب صورة', 'warning'); return; }
            
            const imageFile = imageInput.files[0];
            const storeID = currentStore.storeFixedID;
            const serial = getNextProductSerial(storeID);
            const compositeID = generateProductCompositeID(storeID, serial);
            
            const reader = new FileReader();
            reader.onload = async function(e) {
                const newProduct = {
                    id: Date.now(), storeID, storeName: currentStore.storeName, productCompositeID: compositeID,
                    serialNumber: serial, name, price, quantity, description: document.getElementById('productDesc').value,
                    createdAt: new Date().toISOString(), source: 'local', published: false, imageData: e.target.result
                };
                
                const caption = `🟣 *منتج جديد في ناردو برو*\n📦 *المنتج:* ${name}\n💰 *السعر:* ${price.toLocaleString()} دج\n🆔 *المعرف:* \`${compositeID}\``;
                const formData = new FormData();
                formData.append('chat_id', TELEGRAM.channelId);
                formData.append('photo', imageFile);
                formData.append('caption', caption);
                formData.append('parse_mode', 'Markdown');
                
                try {
                    const response = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/sendPhoto`, { method: 'POST', body: formData });
                    const data = await response.json();
                    if (data.ok) { newProduct.published = true; newProduct.telegramId = data.result.message_id; showToast('✅ تم النشر', 'success'); }
                } catch(e) { showToast('⚠️ فشل النشر', 'warning'); }
                
                products.push(newProduct);
                saveToLocal('nardo_products', products);
                addStockLog(newProduct.id, newProduct.name, 'add', quantity, 0, quantity, 'إنشاء ونشر');
                renderAll();
                closeAddProductModal();
            };
            reader.readAsDataURL(imageFile);
        }
        
        function deleteProduct(id) {
            if (confirm('هل أنت متأكد؟')) {
                products = products.filter(p => p.id !== id);
                saveToLocal('nardo_products', products);
                renderAll();
                showToast('تم الحذف', 'success');
            }
        }
        
        function quickOrder(productId) {
            const p = products.find(p => p.id === productId);
            if (!p || p.quantity <= 0) { showToast('المنتج غير متوفر', 'error'); return; }
            const qty = parseInt(prompt(`الكمية (المتاح: ${p.quantity})`, "1"));
            if (isNaN(qty) || qty <= 0 || qty > p.quantity) { showToast('كمية غير صالحة', 'error'); return; }
            const newOrder = {
                id: Date.now(), date: new Date().toLocaleString('ar-EG'), customerName: 'طلب مباشر',
                storeID: p.storeID, storeName: p.storeName,
                items: [{ id: p.id, name: p.name, price: p.price, quantity: qty, productCompositeID: p.productCompositeID }],
                total: p.price * qty, status: 'pending', source: 'manual'
            };
            orders.unshift(newOrder);
            p.quantity -= qty;
            saveToLocal('nardo_orders', orders);
            saveToLocal('nardo_products', products);
            addStockLog(p.id, p.name, 'remove', qty, p.quantity + qty, p.quantity, 'طلب مباشر');
            renderAll();
            showToast('✅ تم إنشاء الطلب', 'success');
        }
        
        function deleteOrder(orderId) {
            if (confirm('حذف الطلب؟')) {
                orders = orders.filter(o => o.id !== orderId);
                saveToLocal('nardo_orders', orders);
                renderOrders();
                showToast('تم الحذف', 'success');
            }
        }
        
        function deliverOrder(orderId) {
            const order = orders.find(o => o.id === orderId);
            if (order) {
                order.status = order.status === 'delivered' ? 'pending' : 'delivered';
                saveToLocal('nardo_orders', orders);
                renderOrders();
                showToast(order.status === 'delivered' ? '✅ تم التسليم' : '🔄 قيد المعالجة', 'success');
            }
        }
        
        function callCustomer(phone) {
            if (!phone) { showToast('رقم الهاتف غير متوفر', 'warning'); return; }
            window.location.href = `tel:${phone}`;
        }
        
        function openEditStockModal(id) {
            editProductId = id;
            const p = products.find(p => p.id === id);
            if (p) {
                document.getElementById('editProductName').value = p.name;
                document.getElementById('editCurrentQty').value = p.quantity;
                document.getElementById('editNewQty').value = 0;
                document.getElementById('stockOperation').value = 'add';
                document.getElementById('editStockModal').classList.add('active');
            }
        }
        
        function closeEditStockModal() { document.getElementById('editStockModal').classList.remove('active'); editProductId = null; }
        
        function updateStock() {
            const p = products.find(p => p.id === editProductId);
            if (!p) return;
            const op = document.getElementById('stockOperation').value;
            const qtyVal = parseInt(document.getElementById('editNewQty').value);
            if (isNaN(qtyVal) || qtyVal < 0) { showToast('كمية غير صالحة', 'error'); return; }
            let oldQ = p.quantity, newQ = oldQ;
            if (op === 'add') { newQ = oldQ + qtyVal; addStockLog(p.id, p.name, 'add', qtyVal, oldQ, newQ, 'إضافة'); showToast(`➕ أضيف ${qtyVal}`, 'success'); }
            else if (op === 'remove') { if (qtyVal > oldQ) { showToast('الكمية أكبر من المخزون', 'error'); return; } newQ = oldQ - qtyVal; addStockLog(p.id, p.name, 'remove', qtyVal, oldQ, newQ, 'سحب'); showToast(`➖ سحب ${qtyVal}`, 'success'); }
            else if (op === 'set') { newQ = qtyVal; addStockLog(p.id, p.name, 'set', Math.abs(newQ - oldQ), oldQ, newQ, `تعيين إلى ${newQ}`); showToast(`📝 تم التعيين`, 'success'); }
            p.quantity = newQ;
            saveToLocal('nardo_products', products);
            renderAll();
            closeEditStockModal();
        }
        
        function renderProducts() {
            const search = document.getElementById('searchProducts')?.value?.toLowerCase() || '';
            let filtered = products.filter(p => p.storeID === currentStore.storeFixedID);
            if (search) filtered = filtered.filter(p => p.name.toLowerCase().includes(search) || (p.productCompositeID || '').toLowerCase().includes(search));
            
            const container = document.getElementById('productsGrid');
            if (!filtered.length) { container.innerHTML = '<div style="text-align:center; padding:60px;">لا توجد منتجات</div>'; return; }
            
            container.innerHTML = filtered.map(p => `
                <div class="product-card">
                    <div class="product-id-badge">${p.productCompositeID || '---'}</div>
                    <div style="width:100%; height:140px; margin-bottom:15px; border-radius:20px; overflow:hidden; background:#1a1a2e;">
                        <img src="${p.imageData || 'https://placehold.co/400x300/1a1a2e/ffd700?text=📦'}" style="width:100%; height:100%; object-fit:cover;">
                    </div>
                    <h3 style="font-size:18px;">${p.name}</h3>
                    <div class="product-price">${p.price.toLocaleString()} دج</div>
                    <div><span class="stock-status high">المتبقي: ${p.quantity}</span></div>
                    <div style="display:flex; gap:10px; margin-top:15px;">
                        <button class="btn btn-gold" style="flex:1;" onclick="quickOrder(${p.id})"><i class="fas fa-shopping-bag"></i> طلب</button>
                        <button class="btn btn-outline btn-sm" onclick="openEditStockModal(${p.id})"><i class="fas fa-edit"></i></button>
                        <button class="btn btn-error btn-sm" onclick="deleteProduct(${p.id})"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
        }
        
        function renderInventory() {
            const tbody = document.getElementById('inventoryTable');
            let filtered = products.filter(p => p.storeID === currentStore.storeFixedID);
            if (!filtered.length) { tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">لا توجد منتجات</td></tr>'; return; }
            tbody.innerHTML = filtered.map(p => `
                <tr>
                    <td><strong>${p.name}</strong></td>
                    <td><span style="font-family:monospace;">${p.productCompositeID || '---'}</span></td>
                    <td>${p.price.toLocaleString()} دج</td>
                    <td style="font-weight:800;">${p.quantity}</td>
                    <td><span class="stock-status ${p.quantity>0?'high':'out'}">${p.quantity>0?'متاح':'نفد'}</span></td>
                    <td><button class="btn btn-gold btn-sm" onclick="openEditStockModal(${p.id})"><i class="fas fa-edit"></i> تعديل</button></td>
                </tr>
            `).join('');
        }
        
        function renderOrders() {
            const tbody = document.getElementById('ordersTableBody');
            if (!tbody) return;
            const filtered = orders.filter(o => o.storeID === currentStore.storeFixedID);
            if (!filtered.length) { tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;">لا توجد طلبات</td></tr>'; return; }
            tbody.innerHTML = filtered.map(order => `
                <tr>
                    <td><strong>#${order.telegramOrderId || order.id}</strong></td>
                    <td style="font-size:12px;">${order.date || ''}</td>
                    <td>${order.customerName || 'غير معروف'}<br><small>${order.customerPhone || ''}</small></td>
                    <td><small>${order.items.map(i => `${i.name} (${i.quantity})`).join('<br>')}</small></td>
                    <td style="color:var(--success);">${order.total.toLocaleString()} دج</td>
                    <td><span class="stock-status ${order.status === 'delivered' ? 'high' : 'low'}">${order.status === 'delivered' ? '✅ تم التوصيل' : '🔄 قيد المعالجة'}</span></td>
                    <td><small>${order.deliveryCompany || 'غير محدد'}</small></td>
                    <td>
                        <div style="display:flex; gap:5px; flex-wrap:wrap;">
                            <button class="btn btn-info btn-sm" onclick="sendToDelivery(${order.id})" title="توصيل"><i class="fas fa-truck"></i></button>
                            <button class="btn btn-success btn-sm" onclick="deliverOrder(${order.id})" title="تسليم"><i class="fas fa-check"></i></button>
                            <button class="btn btn-gold btn-sm" onclick="callCustomer('${order.customerPhone || ''}')" title="اتصال"><i class="fas fa-phone"></i></button>
                            <button class="btn btn-error btn-sm" onclick="deleteOrder(${order.id})" title="حذف"><i class="fas fa-trash"></i></button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }
        
        function renderStockLog() {
            const container = document.getElementById('stockLogContainer');
            let filtered = stockLog.filter(l => l.storeID === currentStore.storeFixedID || !l.storeID);
            if (!filtered.length) { container.innerHTML = '<div style="text-align:center; padding:40px;">لا توجد حركات</div>'; return; }
            container.innerHTML = filtered.map(l => `
                <div style="background:rgba(0,0,0,0.3); border-radius:16px; padding:12px; margin-bottom:10px; display:flex; justify-content:space-between;">
                    <div><strong style="color:var(--gold);">${l.productName}</strong><br>${l.operation === 'add' ? '➕ إضافة' : (l.operation === 'remove' ? '➖ سحب' : '📝 تعيين')} ${l.quantity} | من ${l.oldQty} → ${l.newQty}${l.reason ? `<br><small>📌 ${l.reason}</small>` : ''}</div>
                    <div style="font-size:11px;">${l.date}</div>
                </div>
            `).join('');
        }
        
        function renderAll() { renderProducts(); renderInventory(); renderOrders(); renderStockLog(); }
        
        function showTab(tabName, btn) {
            document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
            document.getElementById(`${tabName}Tab`).style.display = 'block';
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if (tabName === 'products') renderProducts();
            if (tabName === 'inventory') renderInventory();
            if (tabName === 'orders') renderOrders();
            if (tabName === 'stockLog') renderStockLog();
        }
        
        function openAddProductModal() { document.getElementById('addProductModal').classList.add('active'); }
        function closeAddProductModal() { document.getElementById('addProductModal').classList.remove('active'); }
        
        function showToast(msg, type) {
            const t = document.createElement('div');
            t.className = `toast ${type}`;
            t.innerHTML = `<i class="fas ${type==='success'?'fa-check-circle':'fa-exclamation-circle'}"></i> ${msg}`;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            loadCurrentStore();
            renderAll();
            fetchDistributorsFromChannel(); // تحميل الموزعين مسبقاً
        });
    </script>
</body>
</html>
