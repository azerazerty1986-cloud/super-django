<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ناردو برو | المتجر الذكي - طلبات تلجرام</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #0a0a1a;
            --secondary: #1a1a2e;
            --gold: #ffd700;
            --gold-dark: #daa520;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --success: #4ade80;
            --error: #f87171;
            --warning: #fbbf24;
            --info: #60a5fa;
            --telegram: #0088cc;
        }
        
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0b0b14 0%, #15152a 100%);
            color: var(--text-primary);
            min-height: 100vh;
        }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        .top-navbar {
            background: linear-gradient(135deg, rgba(10,10,26,0.95), rgba(26,26,46,0.95));
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,215,0,0.25);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-left { flex: 1; display: flex; justify-content: flex-start; }
        .nav-logo { display: flex; align-items: center; gap: 10px; }
        .nav-logo i { font-size: 28px; color: var(--gold); }
        .nav-logo .logo-text { font-size: 18px; font-weight: 800; background: linear-gradient(135deg, #ffd700, #ffed4e); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .nav-logo small { font-size: 9px; color: #888; display: block; }

        .nav-center { flex: 1; display: flex; justify-content: center; }
        .store-circle { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: all 0.3s ease; }
        .circle-icon { width: 55px; height: 55px; background: linear-gradient(135deg, var(--gold), var(--gold-dark)); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(255,215,0,0.4); transition: all 0.3s ease; }
        .circle-icon i { font-size: 28px; color: #111; }
        .store-circle:hover .circle-icon { transform: scale(1.1); box-shadow: 0 6px 25px rgba(255,215,0,0.6); }
        .store-name-circle { font-size: 11px; font-weight: 700; margin-top: 6px; color: var(--gold); background: rgba(255,215,0,0.15); padding: 3px 10px; border-radius: 20px; }

        .nav-right { flex: 1; display: flex; justify-content: flex-end; gap: 10px; }
        .nav-btn { padding: 8px 18px; border-radius: 40px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; font-family: 'Cairo', sans-serif; display: flex; align-items: center; gap: 6px; transition: all 0.2s ease; }
        .nav-btn-telegram { background: linear-gradient(135deg, #0088cc, #006699); color: white; }
        .nav-btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: #111; }
        .nav-btn-outline { background: transparent; border: 1px solid rgba(255,215,0,0.4); color: var(--gold); }
        .nav-btn-outline:hover { background: rgba(255,215,0,0.1); }

        .tabs-bar {
            background: linear-gradient(135deg, rgba(10,10,26,0.9), rgba(26,26,46,0.9));
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,215,0,0.15);
            padding: 10px 20px;
            display: flex;
            justify-content: center;
            gap: 12px;
            position: sticky;
            top: 70px;
            z-index: 999;
            flex-wrap: wrap;
        }
        .tab-btn { padding: 10px 28px; border-radius: 40px; background: transparent; color: var(--text-secondary); font-weight: 700; font-size: 15px; cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; gap: 8px; border: none; font-family: 'Cairo', sans-serif; }
        .tab-btn:hover { background: rgba(255,215,0,0.1); color: var(--gold); }
        .tab-btn.active { background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,215,0,0.08)); color: var(--gold); border: 1px solid rgba(255,215,0,0.25); }

        .store-card { background: linear-gradient(135deg, rgba(255,215,0,0.08), rgba(0,0,0,0.3)); border: 1px solid rgba(255,215,0,0.15); border-radius: 28px; padding: 16px 24px; margin: 20px 0; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
        .store-info { display: flex; gap: 24px; flex-wrap: wrap; }
        .store-item { display: flex; align-items: center; gap: 8px; font-size: 13px; }
        .store-item i { color: var(--gold); }
        .store-item strong { color: var(--gold); }
        .stats-badges { display: flex; gap: 12px; }
        .stat-badge { background: rgba(0,0,0,0.4); padding: 6px 14px; border-radius: 24px; text-align: center; border: 1px solid rgba(255,215,0,0.15); }
        .stat-badge .number { font-size: 18px; font-weight: 800; background: linear-gradient(135deg, #ffd700, #ffb347); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .stat-badge .label { font-size: 10px; color: #999; }

        .toolbar { background: linear-gradient(135deg, rgba(255,215,0,0.05), rgba(0,0,0,0.2)); border-radius: 28px; padding: 12px 20px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        .search-box { display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,215,0,0.15); border-radius: 40px; padding: 8px 18px; flex: 1; max-width: 300px; }
        .search-box i { color: var(--gold); }
        .search-box input { background: transparent; border: none; color: white; font-family: 'Cairo', sans-serif; font-size: 13px; width: 100%; }
        .search-box input:focus { outline: none; }
        .btn { padding: 10px 24px; border: none; border-radius: 40px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'Cairo', sans-serif; display: inline-flex; align-items: center; gap: 8px; transition: all 0.2s ease; }
        .btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: #111; }
        .btn-telegram { background: linear-gradient(135deg, #0088cc, #006699); color: white; }
        .btn-outline { background: transparent; border: 2px solid var(--gold); color: var(--gold); }
        .btn-info { background: linear-gradient(135deg, #60a5fa, #3b82f6); color: white; }
        .btn-success { background: linear-gradient(135deg, #4ade80, #22c55e); color: white; }
        .btn-error { background: linear-gradient(135deg, #f87171, #ef4444); color: white; }
        .btn-sm { padding: 5px 12px; font-size: 12px; }

        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 24px; margin-bottom: 20px; }
        .product-card { background: linear-gradient(145deg, rgba(25,25,45,0.9), rgba(15,15,30,0.95)); backdrop-filter: blur(8px); border: 1px solid rgba(255,215,0,0.15); border-radius: 28px; padding: 20px; transition: all 0.3s ease; position: relative; }
        .product-card:hover { transform: translateY(-5px); border-color: rgba(255,215,0,0.4); }
        .product-id-badge { position: absolute; top: 15px; left: 15px; background: linear-gradient(135deg, var(--gold), #ffb347); color: #111; padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 800; }
        .product-published-badge { position: absolute; top: 15px; right: 15px; background: rgba(0,136,204,0.8); color: white; padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 800; display: flex; align-items: center; gap: 4px; }
        .product-name { font-size: 20px; font-weight: 900; background: linear-gradient(135deg, #ffd700, #ffb347); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 10px; }
        .product-price { font-size: 24px; font-weight: 900; color: var(--success); margin: 8px 0; }
        .stock-status { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .stock-status.high { background: rgba(74,222,128,0.15); color: var(--success); }
        .stock-status.low { background: rgba(251,191,36,0.15); color: var(--warning); }
        .stock-status.out { background: rgba(248,113,113,0.15); color: var(--error); }
        .product-actions { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }

        .table-container { background: rgba(0,0,0,0.25); border-radius: 24px; border: 1px solid rgba(255,215,0,0.12); overflow-x: auto; margin-bottom: 20px; }
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th { text-align: right; padding: 14px 16px; background: linear-gradient(135deg, rgba(255,215,0,0.12), rgba(255,215,0,0.06)); color: var(--gold); font-weight: 800; font-size: 13px; }
        .data-table td { padding: 12px 16px; border-bottom: 1px solid rgba(255,215,0,0.06); font-size: 13px; }
        .data-table tr:hover td { background: rgba(255,215,0,0.05); }

        .stock-log-item { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,215,0,0.1); border-radius: 16px; padding: 12px 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }

        /* ========== نوافذ احترافية محسنة مع تأثيرات ========== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .modal.active {
            display: flex;
            opacity: 1;
        }
        .modal-content {
            background: linear-gradient(145deg, rgba(30, 30, 55, 0.98), rgba(15, 15, 35, 0.98));
            border: 1px solid rgba(255, 215, 0, 0.35);
            border-radius: 40px;
            padding: 32px;
            max-width: 550px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 215, 0, 0.1) inset;
            animation: modalFloatIn 0.4s cubic-bezier(0.34, 1.2, 0.64, 1);
            position: relative;
        }
        @keyframes modalFloatIn {
            0% {
                opacity: 0;
                transform: scale(0.92) translateY(-30px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        .modal-header {
            font-size: 26px;
            font-weight: 900;
            margin-bottom: 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid rgba(255, 215, 0, 0.25);
            padding-bottom: 18px;
        }
        .modal-header h2 {
            font-size: 26px;
            background: linear-gradient(135deg, #ffd700, #ffb347, #ff8c00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .modal-header h2 i {
            color: var(--gold);
            font-size: 28px;
        }
        .modal-close {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 215, 0, 0.2);
            color: var(--gold);
            font-size: 22px;
            cursor: pointer;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s ease;
        }
        .modal-close:hover {
            background: rgba(255, 215, 0, 0.2);
            transform: rotate(90deg);
            border-color: var(--gold);
        }
        .form-group {
            margin-bottom: 22px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--gold);
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 0.5px;
        }
        .form-group label i {
            margin-left: 8px;
            font-size: 14px;
        }
        .form-group input, 
        .form-group select, 
        .form-group textarea {
            width: 100%;
            padding: 14px 18px;
            background: rgba(0, 0, 0, 0.4);
            border: 1.5px solid rgba(255, 215, 0, 0.2);
            border-radius: 20px;
            color: white;
            font-family: 'Cairo', sans-serif;
            font-size: 14px;
            transition: all 0.25s ease;
        }
        .form-group input:focus, 
        .form-group select:focus, 
        .form-group textarea:focus {
            outline: none;
            border-color: var(--gold);
            background: rgba(0, 0, 0, 0.6);
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.1);
        }
        .form-group input[disabled] {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .modal-buttons {
            display: flex;
            gap: 15px;
            margin-top: 25px;
            flex-wrap: wrap;
        }
        .modal-buttons .btn {
            flex: 1;
            justify-content: center;
            padding: 14px;
            font-size: 15px;
            border-radius: 40px;
        }
        .file-upload-area {
            border: 2px dashed rgba(255, 215, 0, 0.3);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s ease;
            background: rgba(0, 0, 0, 0.2);
        }
        .file-upload-area:hover {
            border-color: var(--gold);
            background: rgba(255, 215, 0, 0.05);
        }
        .file-upload-area i {
            font-size: 32px;
            color: var(--gold);
            margin-bottom: 10px;
            display: block;
        }
        .file-upload-area p {
            font-size: 12px;
            color: #aaa;
        }

        .fetch-orders-btn {
            background: linear-gradient(135deg, #0088cc, #006699);
            color: white;
            margin-right: auto;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,215,0,0.3);
            border-radius: 50%;
            border-top-color: var(--gold);
            animation: spin 0.8s ease infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 14px 28px;
            border-radius: 60px;
            font-weight: 700;
            z-index: 3000;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            border: 1px solid;
            animation: slideInRight 0.3s ease;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
        }
        .toast.success { border-color: var(--success); color: var(--success); }
        .toast.error { border-color: var(--error); color: var(--error); }
        .toast.info { border-color: var(--info); color: var(--info); }
        .toast.warning { border-color: var(--warning); color: var(--warning); }
        @keyframes slideInRight {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @media (max-width: 768px) {
            .top-navbar { flex-direction: column; }
            .tabs-bar { overflow-x: auto; justify-content: flex-start; flex-wrap: nowrap; }
            .tab-btn { padding: 6px 16px; font-size: 12px; white-space: nowrap; }
            .products-grid { grid-template-columns: 1fr; }
            .toolbar { flex-direction: column; }
            .search-box { max-width: 100%; }
            .table-container { overflow-x: scroll; }
            .data-table { min-width: 800px; }
            .modal-content { padding: 24px; width: 95%; }
            .modal-header h2 { font-size: 20px; }
        }
    </style>
</head>
<body>

<div class="top-navbar">
    <div class="nav-left">
        <div class="nav-logo">
            <i class="fas fa-crown"></i>
            <div>
                <span class="logo-text">ناردو برو</span>
                <small>المتجر الذكي</small>
            </div>
        </div>
    </div>
    
    <div class="nav-center">
        <div class="store-circle" onclick="showStoreInfo()">
            <div class="circle-icon">
                <i class="fas fa-store"></i>
            </div>
            <div class="store-name-circle" id="circleStoreName">المتجر</div>
        </div>
    </div>
    
    <div class="nav-right">
        <button class="nav-btn nav-btn-telegram" onclick="fetchProductsFromTelegram()"><i class="fab fa-telegram"></i> جلب منتجات</button>
        <button class="nav-btn nav-btn-gold" onclick="openAddProductModal()"><i class="fas fa-plus"></i> إضافة</button>
    </div>
</div>

<div class="tabs-bar">
    <button class="tab-btn active" onclick="showTab('products', this)"><i class="fas fa-cube"></i> المنتجات</button>
    <button class="tab-btn" onclick="showTab('inventory', this)"><i class="fas fa-warehouse"></i> المخزون</button>
    <button class="tab-btn" onclick="showTab('stockLog', this)"><i class="fas fa-history"></i> سجل المخزون</button>
    <button class="tab-btn" onclick="showTab('orders', this)"><i class="fas fa-receipt"></i> الطلبات</button>
    <button class="tab-btn" onclick="openDeliveryPage()"><i class="fas fa-truck"></i> التوصيل</button>
    <button id="fetchOrdersBtn" class="nav-btn fetch-orders-btn" onclick="fetchOrdersFromTelegram()"><i class="fab fa-telegram"></i> جلب الطلبات</button>
</div>

<div class="container">
    <div class="store-card">
        <div class="store-info">
            <div class="store-item"><i class="fas fa-store"></i><div><strong id="currentStoreName">---</strong></div></div>
            <div class="store-item"><i class="fas fa-id-card"></i><div><strong>معرف المتجر:</strong> <span id="currentStoreID">---</span></div></div>
            <div class="store-item"><i class="fas fa-cube"></i><div><strong>منتجاتي:</strong> <span id="storeProductCount">0</span></div></div>
        </div>
        <div class="stats-badges">
            <div class="stat-badge"><div class="number" id="statTotal">0</div><div class="label">المنتجات</div></div>
            <div class="stat-badge"><div class="number" id="statOrders">0</div><div class="label">الطلبات</div></div>
        </div>
    </div>

    <div class="toolbar">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchProducts" placeholder="ابحث عن منتج (بالاسم أو المعرف)...">
        </div>
        <button class="btn btn-info" style="padding:8px 18px;" onclick="findProductById()"><i class="fas fa-search"></i> بحث بالمعرف</button>
    </div>

    <div id="productsTab" class="tab-content">
        <div id="productsGrid" class="products-grid"></div>
    </div>

    <div id="inventoryTab" class="tab-content" style="display: none;">
        <div class="table-container">
            <table class="data-table">
                <thead><tr><th>المنتج</th><th>المعرف</th><th>السعر</th><th>المخزون</th><th>الحالة</th><th>المصدر</th><th>نشر</th><th>الإجراءات</th></tr></thead>
                <tbody id="inventoryTable"></tbody>
            </table>
        </div>
    </div>

    <div id="stockLogTab" class="tab-content" style="display: none;">
        <div style="display: flex; justify-content: space-between; margin-bottom: 16px;">
            <h3><i class="fas fa-scroll"></i> حركات المخزون</h3>
            <button class="btn btn-outline" style="padding:6px 16px;" onclick="clearStockLog()"><i class="fas fa-trash"></i> مسح</button>
        </div>
        <div id="stockLogContainer"></div>
    </div>

    <div id="ordersTab" class="tab-content" style="display: none;">
        <div style="display: flex; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px;">
            <h3><i class="fas fa-receipt"></i> سجل الطلبات</h3>
            <button class="btn btn-outline" style="padding:6px 16px;" onclick="clearOrders()"><i class="fas fa-trash"></i> مسح الكل</button>
        </div>
        <div class="table-container">
            <table class="data-table">
                <thead>
                    <tr><th>رقم الطلب</th><th>التاريخ</th><th>العميل</th><th>المنتجات</th><th>الإجمالي</th><th>الحالة</th><th>الإجراءات</th></tr>
                </thead>
                <tbody id="ordersTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- مودال إضافة منتج محسن -->
<div id="addProductModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2><i class="fas fa-plus-circle"></i> منتج جديد</h2>
            <button class="modal-close" onclick="closeAddProductModal()">&times;</button>
        </div>
        <form onsubmit="event.preventDefault();">
            <div class="form-group"><label><i class="fas fa-tag"></i> اسم المنتج *</label><input type="text" id="productName" placeholder="مثال: عطر فرنسي فاخر" required></div>
            <div class="form-group"><label><i class="fas fa-align-right"></i> الوصف</label><textarea id="productDesc" rows="2" placeholder="وصف مختصر للمنتج..."></textarea></div>
            <div class="form-group"><label><i class="fas fa-dollar-sign"></i> السعر (دج) *</label><input type="number" id="productPrice" required min="0" placeholder="0"></div>
            <div class="form-group"><label><i class="fas fa-boxes"></i> الكمية *</label><input type="number" id="productQty" required min="0" placeholder="0"></div>
            <div class="form-group"><label><i class="fas fa-folder"></i> القسم</label><select id="productCategory"><option>توابل</option><option>عطور</option><option>منتجات طبيعية</option></select></div>
            <div class="form-group"><label><i class="fas fa-image"></i> الصورة (للنشر)</label>

<script>
    // ========== إعدادات تلغرام ==========
    const TELEGRAM = {

        channelId: '-1003822964890',
        apiUrl: 'https://api.telegram.org/bot'
    };

    // ========== إدارة التخزين الآمن ==========
    const safeLocalStorage = {
        set: function(key, value) {
            try {
                localStorage.setItem(key, JSON.stringify(value));
                return true;
            } catch (e) {
                if (e.name === 'QuotaExceededError' || e.name === 'NS_ERROR_DOM_QUOTA_REACHED') {
                    console.warn('⚠️ مساحة التخزين ممتلئة، جاري تنظيف البيانات القديمة...');
                    this.autoCleanup();
                    try {
                        localStorage.setItem(key, JSON.stringify(value));
                        return true;
                    } catch (retryError) {
                        showToast('❌ فشل التخزين: المساحة ممتلئة جداً، يرجى مسح السجل يدوياً', 'error');
                        return false;
                    }
                }
                return false;
            }
        },
        get: function(key, defaultValue = '[]') {
            try {
                const item = localStorage.getItem(key);
                return item ? JSON.parse(item) : JSON.parse(defaultValue);
            } catch (e) {
                return JSON.parse(defaultValue);
            }
        },
        autoCleanup: function() {
            let allOrders = this.get('nardo_orders');
            if (allOrders.length > 100) {
                allOrders = allOrders.slice(0, 100);
                localStorage.setItem('nardo_orders', JSON.stringify(allOrders));
            }
            let logs = this.get('nardo_stock_log');
            if (logs.length > 100) {
                logs = logs.slice(-100);
                localStorage.setItem('nardo_stock_log', JSON.stringify(logs));
            }
            let processedIds = this.get('nardo_processed_telegram_ids');
            if (processedIds.length > 300) {
                processedIds = processedIds.slice(-300);
                localStorage.setItem('nardo_processed_telegram_ids', JSON.stringify(processedIds));
            }
        }
    };

    let products = safeLocalStorage.get('nardo_products');
    let orders = safeLocalStorage.get('nardo_orders');
    let stockLog = safeLocalStorage.get('nardo_stock_log');
    let currentStore = null;
    let editProductId = null;

    // ========== تنظيف النص للتيليجرام ==========

    }

        let clean = storeName.replace(/[^a-zA-Z0-9\u0600-\u06FF]/g, '').substring(0, 8).toUpperCase();
        if (!clean) clean = 'متجري';
        return `${clean}-${Math.floor(Math.random() * 900000 + 100000)}`;
    }

        let stored = localStorage.getItem('current_store');
        if(stored) { 
            currentStore = JSON.parse(stored); 
        } else {
            currentStore = {
                id: Date.now(),
                name: 'ناردو ماركت',
                storeName: 'ناردو ماركت',
                phone: '0555123456',
                address: 'الجزائر'
            };
        }
        if (!currentStore.storeFixedID) currentStore.storeFixedID = generateStoreID(currentStore.storeName);
        safeLocalStorage.set('current_store', currentStore);
        
        document.getElementById('currentStoreName').innerHTML = currentStore.storeName;
        document.getElementById('currentStoreID').innerHTML = currentStore.storeFixedID;

    function showStoreInfo() {

    }

    function getNextProductSerial(storeID) {

        return (storeProducts.length + 1).toString().padStart(3, '0');

    // ========== إرسال إلى تيليجرام ==========
    async function sendToTelegram(product, imageFile) {
        try {
            showToast('📤 جاري النشر إلى قناة التلغرام...', 'info');
            const caption = `🟣 *منتج جديد في ناردو برو*
━━━━━━━━━━━━━━━━━━
📦 *المنتج:* ${cleanTelegramText(product.name)}
💰 *السعر:* ${product.price.toLocaleString()} دج
🏷️ *القسم:* ${product.category || 'عام'}
📊 *الكمية:* ${product.quantity}
🆔 *معرف المنتج:* \`${product.productCompositeID}\`
🏪 *المتجر:* ${product.storeName}
🆔 *معرف المتجر:* \`${product.storeID}\`
📝 *الوصف:* ${cleanTelegramText(product.description || 'لا يوجد وصف')}`;
            
            const formData = new FormData();
            formData.append('chat_id', TELEGRAM.channelId);
            formData.append('photo', imageFile);
            formData.append('caption', caption);
            formData.append('parse_mode', 'Markdown');
            
            const response = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/sendPhoto`, {
                method: 'POST',
                body: formData
            });
            const data = await response.json();
            if (data.ok) {
                showToast('✅ تم النشر بنجاح إلى القناة!', 'success');
                return { success: true, messageId: data.result.message_id };

                throw new Error(data.description || 'خطأ غير معروف');
            }
        } catch (error) {
            console.error('خطأ في النشر:', error);

            return { success: false, error: error.message };

    // ========== جلب المنتجات من التلغرام ==========
    async function fetchProductsFromTelegram() {
        const btn = event?.target;
        const originalText = btn?.innerHTML;
        if (btn) {
            btn.innerHTML = '<span class="loading-spinner"></span> جاري الجلب...';
            btn.disabled = true;
        }
        
        try {

            const data = await response.json();
            if (!data.ok) throw new Error('فشل الاتصال');

                if (!post || !post.photo) continue;

                    if (line.includes('السعر:')) price = parseInt(line.split(':')[1]) || price;
                    if (line.includes('الكمية:')) stock = parseInt(line.split(':')[1]) || stock;
                    if (line.includes('معرف المتجر:')) storeID = line.split(':')[1]?.trim() || storeID;
                    if (line.includes('المتجر:')) storeName = line.split(':')[1]?.trim() || storeName;
                    if (line.includes('معرف المنتج:')) productID = line.split(':')[1]?.trim() || productID;
                    if (line.includes('الوصف:')) desc = line.split(':')[1]?.trim() || desc;
                }
                const fileId = post.photo[post.photo.length - 1].file_id;
                const fileRes = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getFile?file_id=${fileId}`);
                const fileData = await fileRes.json();
                const imageUrl = fileData.ok ? `https://api.telegram.org/file/bot${TELEGRAM.botToken}/${fileData.result.file_path}` : "";
                if (!products.some(p => p.telegramId === post.message_id)) {
                    products.push({

            showToast('فشل الاتصال بالقناة', 'error');

    // ========== دوال التلغرام لجلب الطلبات ==========
    async function fetchOrdersFromTelegram() {
        const btn = document.getElementById('fetchOrdersBtn');
        const originalText = btn?.innerHTML;
        if (btn) {
            btn.innerHTML = '<span class="loading-spinner"></span> جاري الجلب...';
            btn.disabled = true;
        }
        
        try {
            showToast('📡 جاري جلب الطلبات من التلغرام...', 'info');
            
            const response = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getUpdates?limit=100`);
            const data = await response.json();
            
            if (!data.ok) throw new Error('فشل الاتصال بـ Telegram API');
            
            let newOrdersCount = 0;
            let processedIds = safeLocalStorage.get('nardo_processed_telegram_ids');
            
            if (!Array.isArray(orders)) orders = [];

            for (const update of data.result || []) {
                const post = update.channel_post || update.message;
                if (!post || !post.text) continue;
                
                const uniqueId = post.message_id;
                if (processedIds.includes(uniqueId)) continue;
                
                const text = post.text;
                if (!text.includes(currentStore.storeFixedID)) continue;
                
                const orderData = extractOrderDataFromText(text);
                if (!orderData || !orderData.items || orderData.items.length === 0) continue;
                
                const existingOrder = orders.find(o => o.telegramOrderId === orderData.orderNumber);
                if (existingOrder) {
                    processedIds.push(uniqueId);
                    continue;
                }

                const orderItems = [];
                let orderTotal = 0;

                for (const item of orderData.items) {
                    const product = products.find(p => p.productCompositeID === item.productID);
                    if (product && product.storeID === currentStore.storeFixedID) {
                        orderItems.push({
                            id: product.id,
                            productCompositeID: product.productCompositeID,
                            name: product.name,
                            price: product.price,
                            quantity: item.quantity
                        });
                        orderTotal += (product.price * item.quantity);
                        
                        const oldQty = product.quantity;
                        product.quantity = Math.max(0, product.quantity - item.quantity);
                        addStockLog(product.id, product.name, 'remove', item.quantity, oldQty, product.quantity, `طلب تلغرام #${orderData.orderNumber}`, product.storeID);
                    }
                }

                if (orderItems.length === 0) {
                    processedIds.push(uniqueId);
                    continue;
                }
                
                const newOrder = {
                    id: Date.now() + Math.random(),
                    telegramOrderId: orderData.orderNumber,
                    telegramMessageId: uniqueId,
                    date: orderData.date || new Date().toLocaleString('ar-EG'),
                    customerName: orderData.customerName,
                    customerPhone: orderData.customerPhone,
                    customerAddress: orderData.customerAddress,
                    customerNotes: orderData.notes || '',
                    storeID: currentStore.storeFixedID,
                    storeName: currentStore.storeName,
                    items: orderItems,
                    total: orderData.total || orderTotal,
                    status: 'pending',
                    source: 'telegram'
                };
                
                orders.unshift(newOrder);
                processedIds.push(uniqueId);
                newOrdersCount++;
            }
            
            safeLocalStorage.set('nardo_orders', orders);
            safeLocalStorage.set('nardo_products', products);
            safeLocalStorage.set('nardo_processed_telegram_ids', processedIds);
            
            renderAll();
            
            if (newOrdersCount > 0) {
                showToast(`✅ تم جلب ${newOrdersCount} طلب جديد`, 'success');
            } else {
                showToast('📭 لا توجد طلبات جديدة حالياً', 'info');
            }
            
        } catch (error) {
            console.error('خطأ في جلب الطلبات:', error);
            showToast('❌ فشل جلب الطلبات: ' + error.message, 'error');
        } finally {
            if (btn) {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }
    }

    // ========== دالة استخراج البيانات من نص الرسالة ==========
    function extractOrderDataFromText(text) {
        try {
            const patterns = {
                storeID: /(?:معرف المتجر:|🆔\s*\*معرف المتجر\*:)\s*`?([^\n`]+)`?/,
                customerName: /(?:(?:المشتري|الزبون):|👤\s*\*الزبون\*:)\s*([^\n]+)/,
                customerPhone: /(?:(?:الهاتف|رقم الجوال):|📞\s*\*رقم الجوال\*:)\s*([^\n]+)/,
                customerAddress: /(?:(?:العنوان):|📍\s*\*العنوان\*:)\s*([^\n]+)/,
                productID: /(?:معرف المنتج:|🆔\s*معرف المنتج:)\s*`?([A-Z0-9\u0600-\u06FF\s-]+-\d+-\d+)`?/i,
                quantity: /(?:الكمية:|📦\s*الكمية:)\s*(\d+)/,
                total: /(?:(?:إجمالي المتجر|إجمالي الطلب):|💰\s*\*إجمالي الطلب\*:)\s*([\d,]+)/,
                notes: /(?:ملاحظات:|📝\s*\*ملاحظات\*:)\s*([^\n]+)/,
                orderNumber: /(?:(?:رقم الطلب|رقم الطلب الموحد):|🆔\s*\*رقم الطلب الموحد\*:)\s*(\d+)/,
                date: /(?:(?:التاريخ):|📅\s*\*التاريخ\*:)\s*([^\n]+)/
            };
            
            const storeID = (text.match(patterns.storeID)?.[1] || '').trim();
            let customerName = (text.match(patterns.customerName)?.[1] || 'عميل ناردو').trim();
            let customerPhone = (text.match(patterns.customerPhone)?.[1] || '').trim();
            let customerAddress = (text.match(patterns.customerAddress)?.[1] || '').trim();
            const orderNumber = (text.match(patterns.orderNumber)?.[1] || Date.now().toString()).trim();
            const date = (text.match(patterns.date)?.[1] || new Date().toLocaleString('ar-EG')).trim();
            const total = parseInt((text.match(patterns.total)?.[1] || '0').replace(/,/g, ''));
            const notes = (text.match(patterns.notes)?.[1] || '').trim();

            customerName = customerName.replace(/[*_]/g, '').trim();
            customerPhone = customerPhone.replace(/[*_]/g, '').trim();
            customerAddress = customerAddress.replace(/[*_]/g, '').trim();

            const items = [];
            const lines = text.split('\n');
            let currentItem = null;

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                
                const productStartMatch = line.match(/^(\d+)[️⃣\.]\s*(?:المنتج:\s*)?(.*?)$/);
                if (productStartMatch) {
                    currentItem = { name: productStartMatch[2].trim() };
                    currentItem.name = currentItem.name.replace(/[*_]/g, '').trim();
                    continue;
                }
                
                if (currentItem) {
                    const idMatch = line.match(patterns.productID);
                    if (idMatch) {
                        currentItem.productID = idMatch[1].trim();
                    }
                    
                    const qtyMatch = line.match(patterns.quantity);
                    if (qtyMatch) {
                        currentItem.quantity = parseInt(qtyMatch[1]);
                        items.push({ ...currentItem });
                        currentItem = null;
                    }
                }
            }

            if (items.length === 0) {
                const productID = (text.match(patterns.productID)?.[1] || '').trim();
                const quantity = parseInt(text.match(patterns.quantity)?.[1] || '1');
                if (productID) items.push({ productID, quantity });
            }

            return { items, storeID, customerName, customerPhone, customerAddress, total, notes, orderNumber, date };
        } catch (e) {
            console.error("خطأ في تحليل نص الرسالة:", e);
            return null;
        }
    }

    async function saveAndPublishProduct() {
        const name = document.getElementById('productName').value.trim();
        const price = parseInt(document.getElementById('productPrice').value);
        const quantity = parseInt(document.getElementById('productQty').value);
        if (!name || isNaN(price) || price <= 0 || isNaN(quantity)) {
            showToast('بيانات غير مكتملة', 'error');
            return;
        }
        const imageInput = document.getElementById('productImages');
        if (!imageInput || !imageInput.files || imageInput.files.length === 0) {
            showToast('⚠️ النشر يتطلب صورة واحدة على الأقل', 'warning');
            return;
        }
        const imageFile = imageInput.files[0];
        const storeID = currentStore.storeFixedID;
        const serial = getNextProductSerial(storeID);
        const compositeID = `${storeID}-${serial}`;
        const newProduct = {
            id: Date.now(),
            storeID: storeID,
            storeName: currentStore.storeName,
            productCompositeID: compositeID,
            serialNumber: serial,
            name: name,
            price: price,
            quantity: quantity,
            description: document.getElementById('productDesc').value,
            category: document.getElementById('productCategory').value,
            createdAt: new Date().toISOString(),
            source: 'local',
            published: false,
            telegramId: null
        };
        const result = await sendToTelegram(newProduct, imageFile);
        if (result.success) {
            newProduct.published = true;
            newProduct.telegramId = result.messageId;
            newProduct.publishedAt = new Date().toISOString();
        }
        products.push(newProduct);
        safeLocalStorage.set('nardo_products', products);
        addStockLog(newProduct.id, newProduct.name, 'add', quantity, 0, quantity, result.success ? 'إنشاء ونشر' : 'إنشاء منتج', newProduct.storeID);
        renderAll();
        closeAddProductModal();
        showToast(result.success ? `✅ تم حفظ ونشر ${name}` : `⚠️ تم حفظ ${name} ولكن فشل النشر`, result.success ? 'success' : 'warning');
    }

    function addStockLog(pid, pname, op, qty, oldQ, newQ, reason = '', storeID = null) {
        const targetStoreID = storeID || currentStore?.storeFixedID;
        stockLog.unshift({
            id: Date.now(),
            productId: pid,
            productName: pname,
            operation: op,
            quantity: qty,
            oldQty: oldQ,
            newQty: newQ,
            reason: reason,
            storeID: targetStoreID,
            date: new Date().toLocaleString('ar-EG')
        });
        if (stockLog.length > 500) stockLog = stockLog.slice(0, 500);
        safeLocalStorage.set('nardo_stock_log', stockLog);
    }

    function openEditStockModal(id) {
        editProductId = id;
        const p = products.find(p => p.id === id);
        if (p) {
            document.getElementById('editProductName').value = p.name;
            document.getElementById('editProductID').value = p.productCompositeID;
            document.getElementById('editCurrentQty').value = p.quantity;
            document.getElementById('editNewQty').value = 0;
            document.getElementById('stockOperation').value = 'add';
            document.getElementById('stockReason').value = '';
            document.getElementById('editStockModal').classList.add('active');
        }
    }

    function closeEditStockModal() {
        document.getElementById('editStockModal').classList.remove('active');
        editProductId = null;
    }

    function updateStock() {
        const p = products.find(p => p.id === editProductId);
        if (!p) return;
        const op = document.getElementById('stockOperation').value;
        const qtyVal = parseInt(document.getElementById('editNewQty').value);
        const reason = document.getElementById('stockReason').value;
        if (isNaN(qtyVal) || qtyVal < 0) { showToast('كمية غير صالحة', 'error'); return; }
        let oldQ = p.quantity;
        let newQ = oldQ;
        if (op === 'add') {
            newQ = oldQ + qtyVal;
            addStockLog(p.id, p.name, 'add', qtyVal, oldQ, newQ, reason || 'إضافة', p.storeID);
            showToast(`➕ تمت إضافة ${qtyVal}`, 'success');
        } else if (op === 'remove') {
            if (qtyVal > oldQ) { showToast('الكمية أكبر من المخزون', 'error'); return; }
            newQ = oldQ - qtyVal;
            addStockLog(p.id, p.name, 'remove', qtyVal, oldQ, newQ, reason || 'سحب', p.storeID);
            showToast(`➖ تم سحب ${qtyVal}`, 'success');
        } else if (op === 'set') {
            newQ = qtyVal;
            addStockLog(p.id, p.name, 'set', Math.abs(newQ - oldQ), oldQ, newQ, reason || `تعيين إلى ${newQ}`, p.storeID);
            showToast(`📝 تم التعيين`, 'success');
        }
        p.quantity = newQ;
        safeLocalStorage.set('nardo_products', products);
        renderAll();
        closeEditStockModal();
    }

    function clearStockLog() {
        if (confirm('مسح سجل المخزون؟')) {
            stockLog = [];
            safeLocalStorage.set('nardo_stock_log', []);
            renderStockLog();
            showToast('تم المسح', 'success');
        }
    }

    function clearOrders() {
        if (confirm('مسح جميع الطلبات؟')) {
            orders = [];
            safeLocalStorage.set('nardo_orders', []);
            renderOrders();
            updateStats();
            showToast('تم مسح الطلبات', 'success');
        }
    }

    function quickOrder(productId) {
        const p = products.find(p => p.id === productId);
        if (!p || p.quantity <= 0) { showToast('المنتج غير متوفر', 'error'); return; }
        const qty = prompt(`الكمية (المتاح: ${p.quantity})`, "1");
        if (!qty) return;
        let qtyInt = parseInt(qty);
        if (isNaN(qtyInt) || qtyInt <= 0 || qtyInt > p.quantity) { showToast('كمية غير صالحة', 'error'); return; }
        const total = p.price * qtyInt;
        const newOrder = {
            id: Date.now(),
            date: new Date().toLocaleString('ar-EG'),
            customerName: 'طلب مباشر',
            customerPhone: '',
            customerAddress: '',
            customerNotes: '',
            storeID: p.storeID,
            storeName: p.storeName,
            items: [{ id: p.id, name: p.name, price: p.price, quantity: qtyInt }],
            total: total,
            status: 'pending',
            source: 'manual'
        };
        orders.unshift(newOrder);
        p.quantity -= qtyInt;
        safeLocalStorage.set('nardo_orders', orders);
        safeLocalStorage.set('nardo_products', products);
        addStockLog(p.id, p.name, 'remove', qtyInt, p.quantity + qtyInt, p.quantity, 'طلب مباشر', p.storeID);
        renderAll();
        showToast(`✅ تم إنشاء الطلب #${newOrder.id}`, 'success');
    }

    function deleteOrder(orderId) {
        if (confirm('هل أنت متأكد من حذف هذا الطلب؟')) {
            orders = orders.filter(o => o.id !== orderId);
            safeLocalStorage.set('nardo_orders', orders);
            renderOrders();
            updateStats();
            showToast('تم حذف الطلب', 'success');
        }
    }

    function deliverOrder(orderId) {
        const order = orders.find(o => o.id === orderId);
        if (order) {
            order.status = order.status === 'delivered' ? 'pending' : 'delivered';
            safeLocalStorage.set('nardo_orders', orders);
            renderOrders();
            showToast(order.status === 'delivered' ? '✅ تم تسليم الطلب' : '🔄 تم إعادة الطلب إلى قيد المعالجة', 'success');
        }
    }

    function callCustomer(phone) {
        if (!phone) {
            showToast('رقم الهاتف غير متوفر', 'warning');
            return;
        }
        window.location.href = `tel:${phone}`;
    }

    // ========== دالة تصدير PDF بدون صور ==========
    async function exportOrderToPDF(orderId) {
        const order = orders.find(o => o.id === orderId);
        if (!order) return;

        showToast('📄 جاري تحضير فاتورة PDF...', 'info');

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({
            orientation: 'p',
            unit: 'mm',
            format: 'a4'
        });

        const tempDiv = document.createElement('div');
        tempDiv.style.position = 'absolute';
        tempDiv.style.left = '-9999px';
        tempDiv.style.width = '800px';
        tempDiv.style.background = '#ffffff';
        tempDiv.style.color = '#000000';
        tempDiv.style.padding = '40px';
        tempDiv.style.fontFamily = 'Cairo, sans-serif';
        tempDiv.style.direction = 'rtl';
        
        tempDiv.innerHTML = `
            <div style="text-align:center; margin-bottom:20px; border-bottom:2px solid #daa520; padding-bottom:10px;">
                <h1 style="margin:0; color:#daa520;">🧾 فاتورة طلب #${order.telegramOrderId || order.id}</h1>
                <p style="margin:5px 0;">🏪 متجر: ${order.storeName}</p>
            </div>
            <div style="margin-bottom:20px;">
                <p><strong>📅 التاريخ:</strong> ${order.date}</p>
                <p><strong>👤 العميل:</strong> ${order.customerName || 'غير معروف'}</p>
                <p><strong>📞 الهاتف:</strong> ${order.customerPhone || '---'}</p>
                <p><strong>📍 العنوان:</strong> ${order.customerAddress || '---'}</p>
                ${order.customerNotes ? `<p><strong>📝 ملاحظات:</strong> ${order.customerNotes}</p>` : ''}
            </div>
            <table style="width:100%; border-collapse:collapse; margin-bottom:20px;">
                <thead>
                    <tr style="background:#f0f0f0;">
                        <th style="border:1px solid #000; padding:10px; text-align:right;">المنتج</th>
                        <th style="border:1px solid #000; padding:10px; text-align:center;">معرف المنتج</th>
                        <th style="border:1px solid #000; padding:10px; text-align:center;">الكمية</th>
                        <th style="border:1px solid #000; padding:10px; text-align:center;">السعر</th>
                        <th style="border:1px solid #000; padding:10px; text-align:center;">الإجمالي</th>
                    </tr>
                </thead>
                <tbody>
                    ${order.items.map(it => `
                        <tr>
                            <td style="border:1px solid #000; padding:10px;">${it.name}</td>
                            <td style="border:1px solid #000; padding:10px; text-align:center;">${it.productCompositeID || '---'}</td>
                            <td style="border:1px solid #000; padding:10px; text-align:center;">${it.quantity}</td>
                            <td style="border:1px solid #000; padding:10px; text-align:center;">${it.price.toLocaleString()} دج</td>
                            <td style="border:1px solid #000; padding:10px; text-align:center;">${(it.price * it.quantity).toLocaleString()} دج</td>
                        </tr>
                    `).join('')}
                </tbody>
                <tfoot>
                    <tr style="font-weight:bold; background:#f0f0f0;">
                        <td colspan="4" style="border:1px solid #000; padding:10px; text-align:left;">الإجمالي الكلي</td>
                        <td style="border:1px solid #000; padding:10px; text-align:center;">${order.total.toLocaleString()} دج</td>
                    </tr>
                </tfoot>
            </table>
            <div style="text-align:center; margin-top:40px; font-size:12px; color:#888;">
                شكرًا لتعاملكم مع ناردو برو 🌟
            </div>
        `;
        
        document.body.appendChild(tempDiv);
        
        try {
            const canvas = await html2canvas(tempDiv, {
                scale: 2,
                backgroundColor: '#ffffff',
                logging: false
            });
            
            const imgData = canvas.toDataURL('image/png');
            const imgProps = doc.getImageProperties(imgData);
            const pdfWidth = doc.internal.pageSize.getWidth();
            const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;
            
            doc.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
            doc.save(`Order_${order.telegramOrderId || order.id}.pdf`);
            showToast('✅ تم تحميل فاتورة PDF بنجاح', 'success');
        } catch (error) {
            console.error('PDF Error:', error);
            showToast('❌ فشل تصدير PDF', 'error');
        } finally {
            document.body.removeChild(tempDiv);
        }
    }

    function renderOrders() {
        const tbody = document.getElementById('ordersTableBody');
        if (!tbody) return;
        
        orders = safeLocalStorage.get('nardo_orders');
        const filteredOrders = orders.filter(order => order.storeID === currentStore.storeFixedID);
        
        if (filteredOrders.length === 0) {
            tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; padding:40px;"><i class="fas fa-inbox fa-2x" style="color:var(--gold); margin-bottom:10px; display:block;"></i>لا توجد طلبات لهذا المتجر</td></tr>`;
        } else {
            tbody.innerHTML = filteredOrders.map(order => {
                return `
                    <tr style="${order.status === 'delivered' ? 'opacity:0.7; background:rgba(74,222,128,0.05);' : ''}">
                        <td><strong>#${order.telegramOrderId || order.id}</strong></td>
                        <td style="font-size:12px;">${order.date || ''}</td>
                        <td>
                            <div>
                                <div><i class="fas fa-user"></i> ${order.customerName || 'غير معروف'}</div>
                                <div style="font-size:11px; color:#aaa;"><i class="fas fa-phone"></i> ${order.customerPhone || '---'}</div>
                                <div style="font-size:10px; color:#888;"><i class="fas fa-map-marker-alt"></i> ${(order.customerAddress || '---').substring(0,30)}</div>
                            </div>
                        </td>
                        <td>
                            <div style="font-size:12px; max-width:200px;">
                                ${order.items.map(it => `<span style="display:inline-block; background:rgba(255,215,0,0.1); padding:2px 8px; margin:2px; border-radius:12px;">${it.name} (${it.quantity})</span>`).join('')}
                            </div>
                        </td>
                        <td style="color:var(--success); font-weight:bold;">${order.total.toLocaleString()} دج</td>
                        <td><span class="stock-status ${order.status === 'delivered' ? 'high' : 'low'}" style="font-size:11px; padding:3px 10px;">${order.status === 'delivered' ? '✅ تم التوصيل' : '🔄 قيد المعالجة'}</span></td>
                        <td>
                            <div style="display: flex; gap: 6px; flex-wrap: wrap;">
                                <button class="btn btn-info btn-sm" onclick="exportOrderToPDF(${order.id})" title="تصدير PDF"><i class="fas fa-file-pdf"></i></button>
                                <button class="btn btn-success btn-sm" onclick="deliverOrder(${order.id})" title="${order.status === 'delivered' ? 'إلغاء التسليم' : 'تسليم'}"><i class="fas ${order.status === 'delivered' ? 'fa-undo' : 'fa-check'}"></i></button>
                                <button class="btn btn-telegram btn-sm" onclick="sendToDelivery(${order.id})" title="إرسال للتوصيل"><i class="fas fa-truck"></i></button>
                                <button class="btn btn-gold btn-sm" onclick="callCustomer('${order.customerPhone || ''}')" title="اتصال"><i class="fas fa-phone"></i></button>
                                <button class="btn btn-error btn-sm" onclick="deleteOrder(${order.id})" title="حذف"><i class="fas fa-trash"></i></button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }
        updateStats();
    }

    function renderInventory() {
        const tbody = document.getElementById('inventoryTable');
        let filtered = products.filter(p => p.storeID === currentStore.storeFixedID);
        if (!filtered.length) {
            tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:40px;">لا توجد منتجات</td></tr>';
            return;
        }
        tbody.innerHTML = filtered.map(p => `
            <tr>
                <td><strong>${p.name}</strong></td>
                <td><span style="font-family:monospace; background:rgba(255,215,0,0.15); padding:4px 8px; border-radius:12px;">${p.productCompositeID || '---'}</span></td>
                <td style="color:var(--success);">${p.price.toLocaleString()} دج</td>
                <td style="font-weight:800;">${p.quantity}</td>
                <td><span class="stock-status ${p.quantity>0?'high':'out'}">${p.quantity>0?'متاح':'نفد'}</span></td>
                <td>${p.source === 'telegram' ? '<i class="fab fa-telegram"></i> تلغرام' : 'محلي'}</td>
                <td>${!p.published ? `<button class="btn btn-telegram btn-sm" onclick="publishExistingProduct(${p.id})"><i class="fab fa-telegram"></i> نشر</button>` : '<span style="color:var(--success);">✅ منشور</span>'}</td>
                <td><button class="btn btn-gold btn-sm" onclick="openEditStockModal(${p.id})"><i class="fas fa-edit"></i></button></td>
            </tr>
        `).join('');
    }

    function renderStockLog() {
        const container = document.getElementById('stockLogContainer');
        let filtered = stockLog.filter(l => l.storeID === currentStore.storeFixedID);
        if (!filtered.length) {
            container.innerHTML = '<div style="text-align:center; padding:40px;">لا توجد حركات</div>';
            return;
        }
        container.innerHTML = filtered.map(l => `
            <div class="stock-log-item">
                <div>
                    <strong style="color:var(--gold);">${l.productName}</strong><br>
                    <span>${l.operation === 'add' ? '➕ إضافة' : (l.operation === 'remove' ? '➖ سحب' : '📝 تعيين')} ${l.quantity} | من ${l.oldQty} → ${l.newQty}</span>
                    ${l.reason ? `<br><span style="font-size:11px;">📌 ${l.reason}</span>` : ''}
                </div>
                <div style="font-size:11px;">${l.date}</div>
            </div>
        `).join('');
    }

    function updateStats() {
        const myProducts = products.filter(p => p.storeID === currentStore.storeFixedID).length;
        const myOrders = orders.filter(o => o.storeID === currentStore.storeFixedID).length;
        document.getElementById('statTotal').innerText = myProducts;
        document.getElementById('statOrders').innerText = myOrders;
        updateStoreProductCount();
    }

    function renderAll() {
        renderProducts();
        renderInventory();
        renderStockLog();
        renderOrders();
        updateStats();
    }

    function renderProducts() {
        const search = document.getElementById('searchProducts')?.value.toLowerCase() || '';
        let filtered = products.filter(p => p.storeID === currentStore.storeFixedID);
        filtered = filtered.filter(p => p.name.toLowerCase().includes(search) || (p.productCompositeID && p.productCompositeID.toLowerCase().includes(search)));
        
        const container = document.getElementById('productsGrid');
        if (!filtered.length) {
            container.innerHTML = '<div style="text-align:center; padding:60px;"><i class="fas fa-box-open fa-3x"></i><p>لا توجد منتجات</p><button class="btn btn-telegram" onclick="fetchProductsFromTelegram()">جلب من تلغرام</button></div>';
            return;
        }
        
        container.innerHTML = filtered.map(p => {
            const stockClass = p.quantity > 10 ? 'high' : (p.quantity > 0 ? 'low' : 'out');
            const stockText = p.quantity > 10 ? 'متوفر' : (p.quantity > 0 ? `متبقي ${p.quantity}` : 'غير متوفر');
            const publishedBadge = p.published ? '<div class="product-published-badge"><i class="fab fa-telegram"></i> منشور</div>' : '';
            
            return `
                <div class="product-card">
                    <div class="product-id-badge">${p.productCompositeID || '---'}</div>
                    ${publishedBadge}
                    <div class="product-name">${p.name}</div>
                    <div class="product-price">${p.price.toLocaleString()} دج</div>
                    <div><span class="stock-status ${stockClass}">${stockText}</span></div>
                    <div class="product-actions">
                        <button class="btn btn-gold" onclick="quickOrder(${p.id})"><i class="fas fa-shopping-bag"></i> طلب</button>
                        <button class="btn btn-outline" onclick="openEditStockModal(${p.id})"><i class="fas fa-edit"></i> تعديل</button>
                        ${!p.published ? `<button class="btn btn-telegram" onclick="publishExistingProduct(${p.id})"><i class="fab fa-telegram"></i> نشر</button>` : ''}
                        <button class="btn btn-outline" style="border-color:var(--error);color:var(--error);" onclick="deleteProduct(${p.id})"><i class="fas fa-trash"></i> حذف</button>
                    </div>
                </div>
            `;
        }).join('');
    }

    function showTab(tabName, btn) {
        document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
        document.getElementById(tabName + 'Tab').style.display = 'block';
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if (tabName === 'products') renderProducts();
        if (tabName === 'inventory') renderInventory();
        if (tabName === 'stockLog') renderStockLog();
        if (tabName === 'orders') renderOrders();
    }

    function openAddProductModal() {
        document.getElementById('addProductModal').classList.add('active');
        document.getElementById('productName').value = '';
        document.getElementById('productDesc').value = '';
        document.getElementById('productPrice').value = '';
        document.getElementById('productQty').value = '';
        const imageInput = document.getElementById('productImages');
        if(imageInput) imageInput.value = '';
    }

    function closeAddProductModal() {
        document.getElementById('addProductModal').classList.remove('active');
    }

    function openDeliveryPage() {
        window.open('delivery-full.html', '_blank');
    }

    function sendToDelivery(orderId) {
        const order = orders.find(o => o.id === orderId);
        if (!order) return;
        
        const deliveryData = {
            orderId: order.id,
            telegramOrderId: order.telegramOrderId,
            customer: order.customerName,
            phone: order.customerPhone,
            address: order.customerAddress || '',
            amount: order.total,
            items: order.items.map(it => `${it.name} (${it.quantity})`).join(', ')
        };
        
        localStorage.setItem('nardo_pending_delivery', JSON.stringify(deliveryData));
        openDeliveryPage();
    }

    function showToast(msg, type) {
        const t = document.createElement('div');
        t.className = `toast ${type}`;
        const icon = type==='success' ? 'fa-check-circle' : (type==='error' ? 'fa-exclamation-circle' : (type==='warning' ? 'fa-exclamation-triangle' : 'fa-info-circle'));
        t.innerHTML = `<i class="fas ${icon}"></i> ${msg}`;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3500);
    }

    // ========== إضافة عنصر input file للصور في النموذج ==========
    function addImageInputToForm() {
        const fileUploadArea = document.querySelector('.file-upload-area');
        if(fileUploadArea) {
            const fileInput = document.getElementById('productImages');
            fileUploadArea.addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', (e) => {
                if(e.target.files.length > 0) {
                    const fileName = e.target.files[0].name;
                    const p = fileUploadArea.querySelector('p');
                    if(p) p.innerHTML = `📷 ${fileName.substring(0, 30)}`;
                }
            });
        }
    }

    // ========== الاستماع للتغييرات في localStorage ==========
    window.addEventListener('storage', (e) => {
        if (e.key === 'nardo_orders') {
            orders = safeLocalStorage.get('nardo_orders');
            renderOrders();
            updateStats();
        }
        if (e.key === 'nardo_products') {
            products = safeLocalStorage.get('nardo_products');
            renderAll();
        }
    });

    // ========== تشغيل التطبيق ==========
    document.addEventListener('DOMContentLoaded', () => {
        addImageInputToForm();
        loadCurrentStore();
        renderAll();
        document.getElementById('searchProducts')?.addEventListener('input', renderProducts);
        
        setTimeout(fetchOrdersFromTelegram, 2000);
        setInterval(fetchOrdersFromTelegram, 120000);
    });
</script>
</body>
</html>
