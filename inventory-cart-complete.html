<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ناردو برو | المتجر الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #0a0a1a;
            --secondary: #1a1a2e;
            --gold: #ffd700;
            --gold-dark: #daa520;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --success: #4ade80;
            --error: #f87171;
            --warning: #fbbf24;
            --info: #60a5fa;
            --telegram: #0088cc;
        }
        body { font-family: 'Cairo', sans-serif; background: linear-gradient(135deg, #0b0b14 0%, #15152a 100%); color: var(--text-primary); min-height: 100vh; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .top-navbar { background: linear-gradient(135deg, rgba(10,10,26,0.95), rgba(26,26,46,0.95)); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,215,0,0.25); padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; position: sticky; top: 0; z-index: 1000; }
        .nav-left { flex: 1; display: flex; justify-content: flex-start; }
        .nav-logo { display: flex; align-items: center; gap: 10px; }
        .nav-logo i { font-size: 28px; color: var(--gold); }
        .nav-logo .logo-text { font-size: 18px; font-weight: 800; background: linear-gradient(135deg, #ffd700, #ffed4e); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .nav-center { flex: 1; display: flex; justify-content: center; }
        .store-circle { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: all 0.3s ease; }
        .circle-icon { width: 55px; height: 55px; background: linear-gradient(135deg, var(--gold), var(--gold-dark)); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(255,215,0,0.4); }
        .circle-icon i { font-size: 28px; color: #111; }
        .store-name-circle { font-size: 11px; font-weight: 700; margin-top: 6px; color: var(--gold); background: rgba(255,215,0,0.15); padding: 3px 10px; border-radius: 20px; }
        .nav-right { flex: 1; display: flex; justify-content: flex-end; gap: 10px; }
        .nav-btn { padding: 8px 18px; border-radius: 40px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; font-family: 'Cairo', sans-serif; display: flex; align-items: center; gap: 6px; }
        .nav-btn-telegram { background: linear-gradient(135deg, #0088cc, #006699); color: white; }
        .nav-btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: #111; }
        .tabs-bar { background: linear-gradient(135deg, rgba(10,10,26,0.9), rgba(26,26,46,0.9)); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,215,0,0.15); padding: 10px 20px; display: flex; justify-content: center; gap: 12px; position: sticky; top: 70px; z-index: 999; flex-wrap: wrap; }
        .tab-btn { padding: 10px 28px; border-radius: 40px; background: transparent; color: var(--text-secondary); font-weight: 700; font-size: 15px; cursor: pointer; display: flex; align-items: center; gap: 8px; border: none; font-family: 'Cairo', sans-serif; }
        .tab-btn.active { background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,215,0,0.08)); color: var(--gold); border: 1px solid rgba(255,215,0,0.25); }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; margin-bottom: 20px; }
        .product-card { background: linear-gradient(145deg, rgba(25,25,45,0.9), rgba(15,15,30,0.95)); border: 1px solid rgba(255,215,0,0.15); border-radius: 28px; padding: 20px; position: relative; }
        .product-id-badge { position: absolute; top: 15px; left: 15px; background: linear-gradient(135deg, var(--gold), #ffb347); color: #111; padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 800; }
        .product-name { font-size: 20px; font-weight: 900; background: linear-gradient(135deg, #ffd700, #ffb347); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .product-price { font-size: 24px; font-weight: 900; color: var(--success); margin: 8px 0; }
        .stock-status { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .stock-status.high { background: rgba(74,222,128,0.15); color: var(--success); }
        .stock-status.low { background: rgba(251,191,36,0.15); color: var(--warning); }
        .stock-status.out { background: rgba(248,113,113,0.15); color: var(--error); }
        .product-actions { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        .btn { padding: 10px 20px; border: none; border-radius: 40px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'Cairo', sans-serif; display: inline-flex; align-items: center; gap: 8px; }
        .btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: #111; }
        .btn-telegram { background: linear-gradient(135deg, #0088cc, #006699); color: white; }
        .btn-outline { background: transparent; border: 2px solid var(--gold); color: var(--gold); }
        .btn-info { background: linear-gradient(135deg, #60a5fa, #3b82f6); color: white; }
        .btn-success { background: linear-gradient(135deg, #4ade80, #22c55e); color: white; }
        .btn-error { background: linear-gradient(135deg, #f87171, #ef4444); color: white; }
        .btn-sm { padding: 5px 12px; font-size: 12px; }
        .table-container { background: rgba(0,0,0,0.25); border-radius: 24px; overflow-x: auto; margin-bottom: 20px; }
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th { text-align: right; padding: 14px 16px; background: rgba(255,215,0,0.1); color: var(--gold); font-weight: 800; }
        .data-table td { padding: 12px 16px; border-bottom: 1px solid rgba(255,215,0,0.06); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: linear-gradient(135deg, rgba(26,26,46,0.98), rgba(10,10,25,0.98)); border: 1px solid rgba(255,215,0,0.2); border-radius: 28px; padding: 28px; max-width: 500px; width: 90%; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 6px; color: var(--gold); font-weight: 700; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px 16px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,215,0,0.15); border-radius: 12px; color: white; font-family: 'Cairo', sans-serif; }
        .toast { position: fixed; bottom: 20px; right: 20px; padding: 12px 24px; border-radius: 24px; font-weight: 600; z-index: 3000; background: rgba(0,0,0,0.9); border: 1px solid; animation: slideIn 0.3s ease; }
        .toast.success { border-color: var(--success); color: var(--success); }
        .toast.error { border-color: var(--error); color: var(--error); }
        @keyframes slideIn { from { transform: translateX(400px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .product-image { width: 100%; height: 160px; background: linear-gradient(135deg, #1a1a2e, #0f0f1a); border-radius: 20px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .product-image img { width: 100%; height: 100%; object-fit: cover; }
        .product-image .no-image { text-align: center; color: var(--text-secondary); }
        .product-image .no-image i { font-size: 48px; color: var(--gold); margin-bottom: 10px; display: block; }
        @media (max-width: 768px) { .products-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="top-navbar">
    <div class="nav-left"><div class="nav-logo"><i class="fas fa-crown"></i><span class="logo-text">ناردو برو</span></div></div>
    <div class="nav-center"><div class="store-circle" onclick="fn_9_7_showStoreInfo()"><div class="circle-icon"><i class="fas fa-store"></i></div><div class="store-name-circle" id="circleStoreName">المتجر</div></div></div>
    <div class="nav-right"><button class="nav-btn nav-btn-telegram" onclick="fn_3_1_fetchProductsFromTelegram()"><i class="fab fa-telegram"></i> جلب منتجات</button><button class="nav-btn nav-btn-gold" onclick="fn_9_5_openAddProductModal()"><i class="fas fa-plus"></i> إضافة</button></div>
</div>

<div class="tabs-bar">
    <button class="tab-btn active" onclick="fn_9_10_showTab('products', this)"><i class="fas fa-cube"></i> المنتجات</button>
    <button class="tab-btn" onclick="fn_9_10_showTab('inventory', this)"><i class="fas fa-warehouse"></i> المخزون</button>
    <button class="tab-btn" onclick="fn_9_10_showTab('stockLog', this)"><i class="fas fa-history"></i> سجل المخزون</button>
    <button class="tab-btn" onclick="fn_9_10_showTab('orders', this)"><i class="fas fa-receipt"></i> الطلبات</button>
    <button class="tab-btn" onclick="fn_7_8_openDeliveryPage()"><i class="fas fa-truck"></i> التوصيل</button>
    <button class="nav-btn nav-btn-telegram" onclick="fn_4_1_fetchOrdersFromTelegram()"><i class="fab fa-telegram"></i> جلب الطلبات</button>
</div>

<div class="container">
    <div id="productsTab" class="tab-content"><div id="productsGrid" class="products-grid"></div></div>
    <div id="inventoryTab" class="tab-content" style="display:none;"><div class="table-container"><table class="data-table"><thead><tr><th>المنتج</th><th>المعرف</th><th>السعر</th><th>المخزون</th><th>الحالة</th><th>الإجراءات</th></tr></thead><tbody id="inventoryTable"></tbody></table></div></div>
    <div id="stockLogTab" class="tab-content" style="display:none;"><div id="stockLogContainer"></div></div>
    <div id="ordersTab" class="tab-content" style="display:none;"><div class="table-container"><table class="data-table"><thead><tr><th>رقم الطلب</th><th>التاريخ</th><th>العميل</th><th>المنتجات</th><th>الإجمالي</th><th>الحالة</th><th>الإجراءات</th></tr></thead><tbody id="ordersTableBody"></tbody></table></div></div>
</div>

<div id="addProductModal" class="modal"><div class="modal-content"><div class="modal-header"><h2>منتج جديد</h2><button class="modal-close" onclick="fn_9_6_closeAddProductModal()">&times;</button></div><form onsubmit="event.preventDefault();"><div class="form-group"><label>اسم المنتج</label><input type="text" id="productName" required></div><div class="form-group"><label>السعر (دج)</label><input type="number" id="productPrice" required></div><div class="form-group"><label>الكمية</label><input type="number" id="productQty" required></div><div class="form-group"><label>الصورة</label><input type="file" id="productImage" accept="image/*"></div><div class="form-group"><label>القسم</label><select id="productCategory"><option>عام</option><option>توابل</option><option>عطور</option></select></div><div style="display:flex;gap:10px"><button type="button" class="btn btn-outline" onclick="fn_6_1_saveProductOnly()">حفظ فقط</button><button type="button" class="btn btn-telegram" onclick="fn_6_2_saveAndPublishProduct()">حفظ ونشر</button></div></form></div></div>

<div id="editStockModal" class="modal"><div class="modal-content"><div class="modal-header"><h2>تعديل المخزون</h2><button class="modal-close" onclick="fn_5_2_closeEditStockModal()">&times;</button></div><form onsubmit="event.preventDefault(); fn_5_3_updateStock();"><div class="form-group"><label>المنتج</label><input type="text" id="editProductName" disabled></div><div class="form-group"><label>الكمية الحالية</label><input type="text" id="editCurrentQty" disabled></div><div class="form-group"><label>نوع العملية</label><select id="stockOperation"><option value="add">➕ إضافة</option><option value="remove">➖ سحب</option><option value="set">📝 تعيين</option></select></div><div class="form-group"><label>الكمية</label><input type="number" id="editNewQty" required></div><button type="submit" class="btn btn-gold">تحديث</button></form></div></div>

<script>
// ==================================================================================
// 📋 قائمة الدوال مع الترقيم والارتباطات
// ==================================================================================
// fn_1_1_getTelegramConfig     - الإعدادات (لا تعتمد على أحد)
// fn_2_1_safeSet               - حفظ في localStorage
// fn_2_2_safeGet               - جلب من localStorage
// fn_3_1_fetchProductsFromTelegram  - جلب منتجات ← تعتمد على fn_1_1, fn_2_2, fn_9_1, fn_9_11
// fn_3_2_extractProductData    - استخراج بيانات منتج ← تعتمد على fn_3_1
// fn_4_1_fetchOrdersFromTelegram   - جلب طلبات ← تعتمد على fn_1_1, fn_2_2, fn_4_2, fn_5_4, fn_9_11
// fn_4_2_extractOrderData      - استخراج بيانات طلب ← تعتمد على fn_4_1
// fn_5_1_openEditStockModal    - فتح تعديل مخزون
// fn_5_2_closeEditStockModal   - إغلاق تعديل مخزون
// fn_5_3_updateStock           - تحديث المخزون ← تعتمد على fn_5_4, fn_2_1, fn_9_11
// fn_5_4_addStockLog           - إضافة سجل مخزون ← تعتمد على fn_2_1
// fn_5_5_clearStockLog         - مسح سجل المخزون ← تعتمد على fn_2_1, fn_9_4
// fn_6_1_saveProductOnly       - حفظ منتج فقط ← تعتمد على fn_2_1, fn_5_4, fn_9_11
// fn_6_2_saveAndPublishProduct - حفظ ونشر منتج ← تعتمد على fn_6_3, fn_5_4, fn_2_1, fn_9_11
// fn_6_3_sendToTelegram        - إرسال للتلغرام ← تعتمد على fn_1_1, fn_9_1
// fn_6_4_deleteProduct         - حذف منتج ← تعتمد على fn_2_1, fn_9_11
// fn_7_1_quickOrder            - طلب سريع ← تعتمد على fn_2_1, fn_5_4, fn_9_11
// fn_7_2_deleteOrder           - حذف طلب ← تعتمد على fn_2_1, fn_7_5
// fn_7_3_deliverOrder          - تسليم طلب ← تعتمد على fn_2_1, fn_7_5
// fn_7_4_clearOrders           - مسح الطلبات ← تعتمد على fn_2_1, fn_7_5
// fn_7_5_renderOrders          - عرض الطلبات ← تعتمد على fn_2_2, fn_7_9
// fn_7_6_callCustomer          - الاتصال بالعميل
// fn_7_7_sendToDelivery        - إرسال للتوصيل ← تعتمد على fn_7_8
// fn_7_8_openDeliveryPage      - فتح صفحة التوصيل
// fn_7_9_updateStats           - تحديث الإحصائيات
// fn_8_1_exportOrderToPDF      - تصدير PDF ← تعتمد على jsPDF, html2canvas, fn_9_1
// fn_9_1_showToast             - عرض إشعار
// fn_9_2_renderProducts        - عرض المنتجات ← تعتمد على fn_2_2
// fn_9_3_renderInventory       - عرض المخزون ← تعتمد على fn_2_2
// fn_9_4_renderStockLog        - عرض سجل المخزون ← تعتمد على fn_2_2
// fn_9_5_openAddProductModal   - فتح نافذة إضافة منتج
// fn_9_6_closeAddProductModal  - إغلاق نافذة إضافة منتج
// fn_9_7_showStoreInfo         - عرض معلومات المتجر
// fn_9_8_loadCurrentStore      - تحميل بيانات المتجر ← تعتمد على fn_2_1, fn_2_2
// fn_9_9_updateStoreProductCount - تحديث عدد المنتجات
// fn_9_10_showTab              - تبديل التبويبات ← تعتمد على fn_9_2, fn_9_3, fn_9_4, fn_7_5
// fn_9_11_renderAll            - تحديث شامل ← تعتمد على fn_9_2, fn_9_3, fn_9_4, fn_7_5, fn_7_9
// ==================================================================================

// ============================================================
// 🟢 القسم رقم 1: الإعدادات (CONFIGURATION)
// ============================================================
const fn_1_1_getTelegramConfig = () => ({
    botToken: '8576673096:AAGvSMjzwVWj6wJ47JdqiDwcObXjBDcyiLA',
    channelId: '-1003822964890',
    apiUrl: 'https://api.telegram.org/bot'
});

// ============================================================
// 🟢 القسم رقم 2: التخزين المحلي (STORAGE)
// ============================================================
const fn_2_1_safeSet = (key, value) => { try { localStorage.setItem(key, JSON.stringify(value)); return true; } catch(e) { return false; } };
const fn_2_2_safeGet = (key, defaultValue = '[]') => { try { const item = localStorage.getItem(key); return item ? JSON.parse(item) : JSON.parse(defaultValue); } catch(e) { return JSON.parse(defaultValue); } };

// ============================================================
// 🟢 القسم رقم 3: جلب المنتجات من تلغرام (FETCH PRODUCTS)
// ============================================================
async function fn_3_1_fetchProductsFromTelegram() {
    const config = fn_1_1_getTelegramConfig();
    fn_9_1_showToast('جاري جلب المنتجات...', 'info');
    try {
        const response = await fetch(`${config.apiUrl}${config.botToken}/getUpdates?limit=100`);
        const data = await response.json();
        if (!data.ok) throw new Error('فشل الاتصال');
        let products = fn_2_2_safeGet('nardo_products');
        let newCount = 0;
        for (const update of data.result || []) {
            const post = update.channel_post || update.message;
            if (!post || !post.photo) continue;
            const productData = fn_3_2_extractProductData(post.caption || '', post.message_id);
            if (productData && !products.some(p => p.telegramId === post.message_id)) {
                products.push({ id: Date.now() + Math.random(), ...productData, telegramId: post.message_id, source: 'telegram', published: true });
                newCount++;
            }
        }
        fn_2_1_safeSet('nardo_products', products);
        fn_9_11_renderAll();
        fn_9_1_showToast(`تم جلب ${newCount} منتج`, 'success');
    } catch(e) { fn_9_1_showToast('فشل الجلب', 'error'); }
}

function fn_3_2_extractProductData(caption, msgId) {
    let name = 'منتج', price = 1000, quantity = 10, storeID = '', storeName = '', productCompositeID = '';
    const lines = caption.split('\n');
    for (const line of lines) {
        if (line.includes('المنتج:')) name = line.split(':')[1]?.trim() || name;
        if (line.includes('السعر:')) price = parseInt(line.split(':')[1]) || price;
        if (line.includes('الكمية:')) quantity = parseInt(line.split(':')[1]) || quantity;
        if (line.includes('معرف المتجر:')) storeID = line.split(':')[1]?.trim() || storeID;
        if (line.includes('المتجر:')) storeName = line.split(':')[1]?.trim() || storeName;
        if (line.includes('معرف المنتج:')) productCompositeID = line.split(':')[1]?.trim() || productCompositeID;
    }
    return { name, price, quantity, storeID, storeName, productCompositeID };
}

// ============================================================
// 🟢 القسم رقم 4: جلب الطلبات من تلغرام (FETCH ORDERS)
// ============================================================
let fn_4_processedIds = [];

async function fn_4_1_fetchOrdersFromTelegram() {
    const config = fn_1_1_getTelegramConfig();
    fn_9_1_showToast('جاري جلب الطلبات...', 'info');
    try {
        const response = await fetch(`${config.apiUrl}${config.botToken}/getUpdates?limit=100`);
        const data = await response.json();
        if (!data.ok) throw new Error('فشل الاتصال');
        let products = fn_2_2_safeGet('nardo_products');
        let orders = fn_2_2_safeGet('nardo_orders');
        fn_4_processedIds = fn_2_2_safeGet('nardo_processed_ids');
        let newCount = 0;
        
        for (const update of data.result || []) {
            const post = update.channel_post || update.message;
            if (!post || !post.text) continue;
            if (fn_4_processedIds.includes(post.message_id)) continue;
            
            const orderData = fn_4_2_extractOrderData(post.text);
            if (!orderData || !orderData.items.length) continue;
            
            let orderTotal = 0;
            const orderItems = [];
            for (const item of orderData.items) {
                const product = products.find(p => p.productCompositeID === item.productID);
                if (product) {
                    orderItems.push({ id: product.id, name: product.name, price: product.price, quantity: item.quantity });
                    orderTotal += product.price * item.quantity;
                    fn_5_4_addStockLog(product.id, product.name, 'remove', item.quantity, product.quantity, Math.max(0, product.quantity - item.quantity), `طلب #${orderData.orderNumber}`, product.storeID);
                    product.quantity = Math.max(0, product.quantity - item.quantity);
                }
            }
            if (orderItems.length) {
                orders.unshift({ id: Date.now(), date: new Date().toLocaleString(), customerName: orderData.customerName, customerPhone: orderData.customerPhone, customerAddress: orderData.customerAddress, items: orderItems, total: orderTotal, status: 'pending', telegramOrderId: orderData.orderNumber });
                newCount++;
            }
            fn_4_processedIds.push(post.message_id);
        }
        fn_2_1_safeSet('nardo_products', products);
        fn_2_1_safeSet('nardo_orders', orders);
        fn_2_1_safeSet('nardo_processed_ids', fn_4_processedIds);
        fn_9_11_renderAll();
        fn_9_1_showToast(`تم جلب ${newCount} طلب`, 'success');
    } catch(e) { fn_9_1_showToast('فشل جلب الطلبات', 'error'); }
}

function fn_4_2_extractOrderData(text) {
    const patterns = { customerName: /الزبون[:\s]*([^\n]+)/, customerPhone: /الهاتف[:\s]*([^\n]+)/, customerAddress: /العنوان[:\s]*([^\n]+)/, productID: /معرف المنتج[:\s]*([A-Z0-9-]+)/i, quantity: /الكمية[:\s]*(\d+)/, orderNumber: /رقم الطلب[:\s]*(\d+)/ };
    const customerName = (text.match(patterns.customerName)?.[1] || 'عميل').trim();
    const customerPhone = (text.match(patterns.customerPhone)?.[1] || '').trim();
    const customerAddress = (text.match(patterns.customerAddress)?.[1] || '').trim();
    const orderNumber = (text.match(patterns.orderNumber)?.[1] || Date.now()).trim();
    const items = [];
    const productMatch = text.match(patterns.productID);
    const qtyMatch = text.match(patterns.quantity);
    if (productMatch) items.push({ productID: productMatch[1], quantity: parseInt(qtyMatch?.[1] || '1') });
    return { items, customerName, customerPhone, customerAddress, orderNumber };
}

// ============================================================
// 🟢 القسم رقم 5: إدارة المخزون (INVENTORY)
// ============================================================
let fn_5_editProductId = null;

function fn_5_1_openEditStockModal(id) { fn_5_editProductId = id; const p = fn_9_2_products?.find(p => p.id === id); if(p) { document.getElementById('editProductName').value = p.name; document.getElementById('editCurrentQty').value = p.quantity; document.getElementById('editNewQty').value = 0; document.getElementById('editStockModal').classList.add('active'); } }
function fn_5_2_closeEditStockModal() { document.getElementById('editStockModal').classList.remove('active'); fn_5_editProductId = null; }
function fn_5_3_updateStock() {
    let products = fn_2_2_safeGet('nardo_products');
    const p = products.find(p => p.id === fn_5_editProductId);
    if (!p) return;
    const op = document.getElementById('stockOperation').value;
    const qty = parseInt(document.getElementById('editNewQty').value);
    const oldQ = p.quantity;
    let newQ = oldQ;
    if (op === 'add') newQ = oldQ + qty;
    else if (op === 'remove') { if (qty > oldQ) { fn_9_1_showToast('الكمية أكبر من المخزون', 'error'); return; } newQ = oldQ - qty; }
    else if (op === 'set') newQ = qty;
    fn_5_4_addStockLog(p.id, p.name, op, qty, oldQ, newQ, 'تعديل يدوي', p.storeID);
    p.quantity = newQ;
    fn_2_1_safeSet('nardo_products', products);
    fn_9_11_renderAll();
    fn_5_2_closeEditStockModal();
}
function fn_5_4_addStockLog(pid, pname, op, qty, oldQ, newQ, reason, storeID) {
    let logs = fn_2_2_safeGet('nardo_stock_log');
    logs.unshift({ id: Date.now(), productId: pid, productName: pname, operation: op, quantity: qty, oldQty: oldQ, newQty: newQ, reason: reason, storeID: storeID, date: new Date().toLocaleString() });
    if (logs.length > 200) logs = logs.slice(0, 200);
    fn_2_1_safeSet('nardo_stock_log', logs);
}
function fn_5_5_clearStockLog() { if(confirm('مسح السجل؟')) { fn_2_1_safeSet('nardo_stock_log', []); fn_9_4_renderStockLog(); fn_9_1_showToast('تم المسح', 'success'); } }

// ============================================================
// 🟢 القسم رقم 6: إدارة المنتجات (PRODUCTS)
// ============================================================
function fn_6_1_saveProductOnly() {
    const name = document.getElementById('productName').value.trim();
    const price = parseInt(document.getElementById('productPrice').value);
    const quantity = parseInt(document.getElementById('productQty').value);
    if (!name || isNaN(price) || isNaN(quantity)) { fn_9_1_showToast('بيانات غير مكتملة', 'error'); return; }
    let products = fn_2_2_safeGet('nardo_products');
    const newProduct = { id: Date.now(), name, price, quantity, storeID: 'STORE-001', storeName: 'ناردو ماركت', productCompositeID: `PRD-${Date.now()}`, createdAt: new Date().toISOString(), source: 'local', published: false };
    products.push(newProduct);
    fn_2_1_safeSet('nardo_products', products);
    fn_5_4_addStockLog(newProduct.id, name, 'add', quantity, 0, quantity, 'إنشاء منتج', 'STORE-001');
    fn_9_11_renderAll();
    fn_9_6_closeAddProductModal();
    fn_9_1_showToast('تم الحفظ', 'success');
}
async function fn_6_2_saveAndPublishProduct() {
    const name = document.getElementById('productName').value.trim();
    const price = parseInt(document.getElementById('productPrice').value);
    const quantity = parseInt(document.getElementById('productQty').value);
    const imageFile = document.getElementById('productImage').files[0];
    if (!imageFile) { fn_9_1_showToast('الرجاء اختيار صورة', 'warning'); return; }
    const newProduct = { id: Date.now(), name, price, quantity, storeID: 'STORE-001', storeName: 'ناردو ماركت', productCompositeID: `PRD-${Date.now()}`, source: 'local', published: false };
    const result = await fn_6_3_sendToTelegram(newProduct, imageFile);
    newProduct.published = result.success;
    if (result.success) newProduct.telegramId = result.messageId;
    let products = fn_2_2_safeGet('nardo_products');
    products.push(newProduct);
    fn_2_1_safeSet('nardo_products', products);
    fn_5_4_addStockLog(newProduct.id, name, 'add', quantity, 0, quantity, result.success ? 'نشر مع إنشاء' : 'إنشاء منتج', 'STORE-001');
    fn_9_11_renderAll();
    fn_9_6_closeAddProductModal();
    fn_9_1_showToast(result.success ? 'تم النشر والحفظ' : 'تم الحفظ ولكن فشل النشر', result.success ? 'success' : 'warning');
}
async function fn_6_3_sendToTelegram(product, imageFile) {
    const config = fn_1_1_getTelegramConfig();
    const caption = `🆕 منتج جديد\n📦 ${product.name}\n💰 ${product.price} دج\n📊 الكمية: ${product.quantity}\n🆔 المعرف: ${product.productCompositeID}`;
    const formData = new FormData();
    formData.append('chat_id', config.channelId);
    formData.append('photo', imageFile);
    formData.append('caption', caption);
    try {
        const response = await fetch(`${config.apiUrl}${config.botToken}/sendPhoto`, { method: 'POST', body: formData });
        const data = await response.json();
        if (data.ok) return { success: true, messageId: data.result.message_id };
        else throw new Error(data.description);
    } catch(e) { return { success: false, error: e.message }; }
}
function fn_6_4_deleteProduct(id) { if(confirm('حذف المنتج؟')) { let products = fn_2_2_safeGet('nardo_products'); products = products.filter(p => p.id !== id); fn_2_1_safeSet('nardo_products', products); fn_9_11_renderAll(); fn_9_1_showToast('تم الحذف', 'success'); } }

// ============================================================
// 🟢 القسم رقم 7: إدارة الطلبات (ORDERS)
// ============================================================
function fn_7_1_quickOrder(productId) {
    let products = fn_2_2_safeGet('nardo_products');
    const p = products.find(p => p.id === productId);
    if (!p || p.quantity <= 0) { fn_9_1_showToast('المنتج غير متوفر', 'error'); return; }
    const qty = parseInt(prompt('الكمية:', '1'));
    if (qty > p.quantity) { fn_9_1_showToast('كمية غير متوفرة', 'error'); return; }
    let orders = fn_2_2_safeGet('nardo_orders');
    const newOrder = { id: Date.now(), date: new Date().toLocaleString(), customerName: 'طلب مباشر', items: [{ id: p.id, name: p.name, price: p.price, quantity: qty }], total: p.price * qty, status: 'pending' };
    orders.unshift(newOrder);
    p.quantity -= qty;
    fn_2_1_safeSet('nardo_products', products);
    fn_2_1_safeSet('nardo_orders', orders);
    fn_5_4_addStockLog(p.id, p.name, 'remove', qty, p.quantity + qty, p.quantity, 'طلب مباشر', p.storeID);
    fn_9_11_renderAll();
    fn_9_1_showToast('تم إنشاء الطلب', 'success');
}
function fn_7_2_deleteOrder(id) { if(confirm('حذف الطلب؟')) { let orders = fn_2_2_safeGet('nardo_orders'); orders = orders.filter(o => o.id !== id); fn_2_1_safeSet('nardo_orders', orders); fn_7_5_renderOrders(); fn_9_1_showToast('تم الحذف', 'success'); } }
function fn_7_3_deliverOrder(id) { let orders = fn_2_2_safeGet('nardo_orders'); const order = orders.find(o => o.id === id); if(order) { order.status = order.status === 'delivered' ? 'pending' : 'delivered'; fn_2_1_safeSet('nardo_orders', orders); fn_7_5_renderOrders(); fn_9_1_showToast(order.status === 'delivered' ? 'تم التسليم' : 'تم الإلغاء', 'success'); } }
function fn_7_4_clearOrders() { if(confirm('مسح كل الطلبات؟')) { fn_2_1_safeSet('nardo_orders', []); fn_7_5_renderOrders(); fn_7_9_updateStats(); fn_9_1_showToast('تم المسح', 'success'); } }
function fn_7_5_renderOrders() {
    const orders = fn_2_2_safeGet('nardo_orders');
    const tbody = document.getElementById('ordersTableBody');
    if (!tbody) return;
    if (!orders.length) { tbody.innerHTML = '<tr><td colspan="7" style="text-align:center">لا توجد طلبات</td></tr>'; return; }
    tbody.innerHTML = orders.map(o => `<tr><td>#${o.id}</td><td>${o.date}</td><td>${o.customerName}</td><td>${o.items.map(i=>`${i.name}(${i.quantity})`).join(', ')}</td><td>${o.total} دج</td><td><span class="stock-status ${o.status==='delivered'?'high':'low'}">${o.status==='delivered'?'تم التوصيل':'قيد المعالجة'}</span></td><td><button class="btn btn-sm btn-success" onclick="fn_7_3_deliverOrder(${o.id})"><i class="fas fa-check"></i></button> <button class="btn btn-sm btn-error" onclick="fn_7_2_deleteOrder(${o.id})"><i class="fas fa-trash"></i></button> <button class="btn btn-sm btn-info" onclick="fn_8_1_exportOrderToPDF(${o.id})"><i class="fas fa-file-pdf"></i></button></td></tr>`).join('');
    fn_7_9_updateStats();
}
function fn_7_6_callCustomer(phone) { if(phone) window.location.href = `tel:${phone}`; else fn_9_1_showToast('رقم غير متوفر', 'warning'); }
function fn_7_7_sendToDelivery(orderId) { const order = fn_2_2_safeGet('nardo_orders').find(o => o.id === orderId); if(order) { localStorage.setItem('delivery_order', JSON.stringify(order)); fn_7_8_openDeliveryPage(); } }
function fn_7_8_openDeliveryPage() { alert('سيتم فتح صفحة التوصيل'); }
function fn_7_9_updateStats() { const products = fn_2_2_safeGet('nardo_products'); const orders = fn_2_2_safeGet('nardo_orders'); document.getElementById('statTotal') && (document.getElementById('statTotal').innerText = products.length); document.getElementById('statOrders') && (document.getElementById('statOrders').innerText = orders.length); }

// ============================================================
// 🟢 القسم رقم 8: تصدير PDF (PDF EXPORT)
// ============================================================
async function fn_8_1_exportOrderToPDF(orderId) {
    const order = fn_2_2_safeGet('nardo_orders').find(o => o.id === orderId);
    if (!order) return;
    fn_9_1_showToast('جاري تحضير PDF...', 'info');
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.setFont('helvetica');
    doc.text(`فاتورة طلب #${order.id}`, 20, 20);
    doc.text(`التاريخ: ${order.date}`, 20, 30);
    doc.text(`العميل: ${order.customerName}`, 20, 40);
    let y = 60;
    order.items.forEach((item, i) => { doc.text(`${i+1}- ${item.name} x${item.quantity} = ${item.price*item.quantity} دج`, 20, y); y += 10; });
    doc.text(`الإجمالي: ${order.total} دج`, 20, y + 10);
    doc.save(`order_${order.id}.pdf`);
    fn_9_1_showToast('تم حفظ PDF', 'success');
}

// ============================================================
// 🟢 القسم رقم 9: واجهة المستخدم (UI)
// ============================================================
fn_9_2_products = [];
function fn_9_1_showToast(msg, type) { const t = document.createElement('div'); t.className = `toast ${type}`; t.innerHTML = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 3000); }
function fn_9_2_renderProducts() {
    let products = fn_2_2_safeGet('nardo_products');
    const container = document.getElementById('productsGrid');
    if (!products.length) { container.innerHTML = '<div style="text-align:center;padding:60px">لا توجد منتجات</div>'; return; }
    container.innerHTML = products.map(p => `<div class="product-card"><div class="product-id-badge">${p.productCompositeID || '---'}</div><div class="product-image"><div class="no-image"><i class="fas fa-image"></i><span>لا توجد صورة</span></div></div><div class="product-name">${p.name}</div><div class="product-price">${p.price} دج</div><div><span class="stock-status ${p.quantity>0?'high':'out'}">${p.quantity>0?`المتبقي: ${p.quantity}`:'نفد'}</span></div><div class="product-actions"><button class="btn btn-gold" onclick="fn_7_1_quickOrder(${p.id})">طلب</button><button class="btn btn-outline" onclick="fn_5_1_openEditStockModal(${p.id})">تعديل</button><button class="btn btn-error" onclick="fn_6_4_deleteProduct(${p.id})">حذف</button></div></div>`).join('');
}
function fn_9_3_renderInventory() {
    let products = fn_2_2_safeGet('nardo_products');
    const tbody = document.getElementById('inventoryTable');
    if (!products.length) { tbody.innerHTML = '<tr><td colspan="6" style="text-align:center">لا توجد منتجات</td></tr>'; return; }
    tbody.innerHTML = products.map(p => `<tr><td>${p.name}</td><td>${p.productCompositeID || '---'}</td><td>${p.price} دج</td><td>${p.quantity}</td><td><span class="stock-status ${p.quantity>0?'high':'out'}">${p.quantity>0?'متاح':'نفد'}</span></td><td><button class="btn btn-sm btn-gold" onclick="fn_5_1_openEditStockModal(${p.id})">تعديل</button></td></tr>`).join('');
}
function fn_9_4_renderStockLog() {
    let logs = fn_2_2_safeGet('nardo_stock_log');
    const container = document.getElementById('stockLogContainer');
    if (!container) return;
    if (!logs.length) { container.innerHTML = '<div style="text-align:center;padding:40px">لا توجد حركات</div>'; return; }
    container.innerHTML = logs.map(l => `<div style="background:rgba(0,0,0,0.3);border-radius:16px;padding:12px;margin-bottom:10px"><strong>${l.productName}</strong> - ${l.operation === 'add' ? '➕ إضافة' : l.operation === 'remove' ? '➖ سحب' : '📝 تعيين'} ${l.quantity} (${l.oldQty} → ${l.newQty})<br><small>${l.date} - ${l.reason || ''}</small></div>`).join('');
}
function fn_9_5_openAddProductModal() { document.getElementById('addProductModal').classList.add('active'); document.getElementById('productName').value = ''; document.getElementById('productPrice').value = ''; document.getElementById('productQty').value = ''; document.getElementById('productImage').value = ''; }
function fn_9_6_closeAddProductModal() { document.getElementById('addProductModal').classList.remove('active'); }
function fn_9_7_showStoreInfo() { alert('🏪 ناردو ماركت\n🆔 المعرف: STORE-001'); }
function fn_9_8_loadCurrentStore() { const store = { storeFixedID: 'STORE-001', storeName: 'ناردو ماركت' }; fn_2_1_safeSet('current_store', store); document.getElementById('circleStoreName').innerHTML = 'ناردو ماركت'; }
function fn_9_9_updateStoreProductCount() { const products = fn_2_2_safeGet('nardo_products'); const count = products.filter(p => p.storeID === 'STORE-001').length; document.getElementById('storeProductCount') && (document.getElementById('storeProductCount').innerHTML = count); }
function fn_9_10_showTab(tabName, btn) { document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none'); document.getElementById(tabName + 'Tab').style.display = 'block'; document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); if(tabName === 'products') fn_9_2_renderProducts(); if(tabName === 'inventory') fn_9_3_renderInventory(); if(tabName === 'stockLog') fn_9_4_renderStockLog(); if(tabName === 'orders') fn_7_5_renderOrders(); }
function fn_9_11_renderAll() { fn_9_2_renderProducts(); fn_9_3_renderInventory(); fn_9_4_renderStockLog(); fn_7_5_renderOrders(); fn_7_9_updateStats(); fn_9_9_updateStoreProductCount(); }

// 🟢 القسم رقم 10: تشغيل التطبيق (INIT)
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
    fn_9_8_loadCurrentStore();
    fn_9_11_renderAll();
    setTimeout(() => fn_4_1_fetchOrdersFromTelegram(), 2000);
    setInterval(() => fn_4_1_fetchOrdersFromTelegram(), 120000);
});
