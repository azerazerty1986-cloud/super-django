<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ناردو برو | المتجر الذكي - النظام المتكامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #0a0a1a;
            --secondary: #1a1a2e;
            --gold: #ffd700;
            --gold-dark: #daa520;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --success: #4ade80;
            --error: #f87171;
            --warning: #fbbf24;
            --info: #60a5fa;
            --telegram: #0088cc;
        }
        body { font-family: 'Cairo', sans-serif; background: linear-gradient(135deg, #0b0b14 0%, #15152a 100%); color: var(--text-primary); min-height: 100vh; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .top-navbar { background: linear-gradient(135deg, rgba(10,10,26,0.95), rgba(26,26,46,0.95)); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,215,0,0.25); padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; position: sticky; top: 0; z-index: 1000; }
        .nav-left { flex: 1; display: flex; justify-content: flex-start; }
        .nav-logo { display: flex; align-items: center; gap: 10px; }
        .nav-logo i { font-size: 28px; color: var(--gold); }
        .nav-logo .logo-text { font-size: 18px; font-weight: 800; background: linear-gradient(135deg, #ffd700, #ffed4e); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .nav-center { flex: 1; display: flex; justify-content: center; }
        .store-circle { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: all 0.3s ease; }
        .circle-icon { width: 55px; height: 55px; background: linear-gradient(135deg, var(--gold), var(--gold-dark)); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(255,215,0,0.4); }
        .circle-icon i { font-size: 28px; color: #111; }
        .store-name-circle { font-size: 11px; font-weight: 700; margin-top: 6px; color: var(--gold); background: rgba(255,215,0,0.15); padding: 3px 10px; border-radius: 20px; }
        .nav-right { flex: 1; display: flex; justify-content: flex-end; gap: 10px; }
        .nav-btn { padding: 8px 18px; border-radius: 40px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; font-family: 'Cairo', sans-serif; display: flex; align-items: center; gap: 6px; }
        .nav-btn-telegram { background: linear-gradient(135deg, #0088cc, #006699); color: white; }
        .nav-btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: #111; }
        .tabs-bar { background: linear-gradient(135deg, rgba(10,10,26,0.9), rgba(26,26,46,0.9)); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,215,0,0.15); padding: 10px 20px; display: flex; justify-content: center; gap: 12px; position: sticky; top: 70px; z-index: 999; flex-wrap: wrap; }
        .tab-btn { padding: 10px 28px; border-radius: 40px; background: transparent; color: var(--text-secondary); font-weight: 700; font-size: 15px; cursor: pointer; display: flex; align-items: center; gap: 8px; border: none; font-family: 'Cairo', sans-serif; }
        .tab-btn.active { background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,215,0,0.08)); color: var(--gold); border: 1px solid rgba(255,215,0,0.25); }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; margin-bottom: 20px; }
        .product-card { background: linear-gradient(145deg, rgba(25,25,45,0.9), rgba(15,15,30,0.95)); border: 1px solid rgba(255,215,0,0.15); border-radius: 28px; padding: 20px; position: relative; }
        .product-id-badge { position: absolute; top: 15px; left: 15px; background: linear-gradient(135deg, var(--gold), #ffb347); color: #111; padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 800; z-index: 1; }
        .product-published-badge { position: absolute; top: 15px; right: 15px; background: rgba(0,136,204,0.8); color: white; padding: 4px 10px; border-radius: 20px; font-size: 10px; display: flex; align-items: center; gap: 4px; z-index: 1; }
        .product-image { width: 100%; height: 160px; background: linear-gradient(135deg, #1a1a2e, #0f0f1a); border-radius: 20px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .product-image img { width: 100%; height: 100%; object-fit: cover; }
        .product-image .no-image { text-align: center; color: var(--text-secondary); }
        .product-image .no-image i { font-size: 48px; color: var(--gold); margin-bottom: 10px; display: block; }
        .product-name { font-size: 20px; font-weight: 900; background: linear-gradient(135deg, #ffd700, #ffb347); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .product-price { font-size: 24px; font-weight: 900; color: var(--success); margin: 8px 0; }
        .stock-status { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .stock-status.high { background: rgba(74,222,128,0.15); color: var(--success); }
        .stock-status.low { background: rgba(251,191,36,0.15); color: var(--warning); }
        .stock-status.out { background: rgba(248,113,113,0.15); color: var(--error); }
        .product-actions { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        .btn { padding: 10px 20px; border: none; border-radius: 40px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'Cairo', sans-serif; display: inline-flex; align-items: center; gap: 8px; }
        .btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: #111; }
        .btn-telegram { background: linear-gradient(135deg, #0088cc, #006699); color: white; }
        .btn-outline { background: transparent; border: 2px solid var(--gold); color: var(--gold); }
        .btn-info { background: linear-gradient(135deg, #60a5fa, #3b82f6); color: white; }
        .btn-success { background: linear-gradient(135deg, #4ade80, #22c55e); color: white; }
        .btn-error { background: linear-gradient(135deg, #f87171, #ef4444); color: white; }
        .btn-sm { padding: 5px 12px; font-size: 12px; }
        .table-container { background: rgba(0,0,0,0.25); border-radius: 24px; overflow-x: auto; margin-bottom: 20px; }
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th { text-align: right; padding: 14px 16px; background: rgba(255,215,0,0.1); color: var(--gold); font-weight: 800; }
        .data-table td { padding: 12px 16px; border-bottom: 1px solid rgba(255,215,0,0.06); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: linear-gradient(135deg, rgba(26,26,46,0.98), rgba(10,10,25,0.98)); border: 1px solid rgba(255,215,0,0.2); border-radius: 28px; padding: 28px; max-width: 500px; width: 90%; max-height: 90vh; overflow-y: auto; }
        .modal-header { font-size: 22px; font-weight: 900; color: var(--gold); margin-bottom: 20px; display: flex; justify-content: space-between; }
        .modal-close { background: none; border: none; color: var(--gold); font-size: 28px; cursor: pointer; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 6px; color: var(--gold); font-weight: 700; font-size: 13px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px 16px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,215,0,0.15); border-radius: 12px; color: white; font-family: 'Cairo', sans-serif; font-size: 14px; }
        .toast { position: fixed; bottom: 20px; right: 20px; padding: 12px 24px; border-radius: 24px; font-weight: 600; z-index: 3000; background: rgba(0,0,0,0.9); border: 1px solid; animation: slideIn 0.3s ease; }
        .toast.success { border-color: var(--success); color: var(--success); }
        .toast.error { border-color: var(--error); color: var(--error); }
        .toast.warning { border-color: var(--warning); color: var(--warning); }
        .toast.info { border-color: var(--info); color: var(--info); }
        @keyframes slideIn { from { transform: translateX(400px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .stock-log-item { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,215,0,0.1); border-radius: 16px; padding: 12px 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .loading-spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255,215,0,0.3); border-radius: 50%; border-top-color: var(--gold); animation: spin 0.8s ease infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 768px) { .products-grid { grid-template-columns: 1fr; } .tabs-bar { overflow-x: auto; flex-wrap: nowrap; } .tab-btn { white-space: nowrap; } }
    </style>
</head>
<body>

<div class="top-navbar">
    <div class="nav-left"><div class="nav-logo"><i class="fas fa-crown"></i><span class="logo-text">ناردو برو</span></div></div>
    <div class="nav-center"><div class="store-circle" onclick="showStoreInfo()"><div class="circle-icon"><i class="fas fa-store"></i></div><div class="store-name-circle" id="circleStoreName">المتجر</div></div></div>
    <div class="nav-right"><button class="nav-btn nav-btn-telegram" onclick="fetchProductsFromTelegram()"><i class="fab fa-telegram"></i> جلب منتجات</button><button class="nav-btn nav-btn-gold" onclick="openAddProductModal()"><i class="fas fa-plus"></i> إضافة</button></div>
</div>

<div class="tabs-bar">
    <button class="tab-btn active" onclick="showTab('products', this)"><i class="fas fa-cube"></i> المنتجات</button>
    <button class="tab-btn" onclick="showTab('inventory', this)"><i class="fas fa-warehouse"></i> المخزون</button>
    <button class="tab-btn" onclick="showTab('stockLog', this)"><i class="fas fa-history"></i> سجل المخزون</button>
    <button class="tab-btn" onclick="showTab('orders', this)"><i class="fas fa-receipt"></i> الطلبات</button>
    <button class="tab-btn" onclick="openDeliveryPage()"><i class="fas fa-truck"></i> التوصيل</button>
    <button class="nav-btn nav-btn-telegram" id="fetchOrdersBtn" onclick="fetchOrdersFromTelegram()"><i class="fab fa-telegram"></i> جلب الطلبات</button>
</div>

<div class="container">
    <div id="productsTab" class="tab-content"><div id="productsGrid" class="products-grid"></div></div>
    <div id="inventoryTab" class="tab-content" style="display:none;"><div class="table-container"><table class="data-table"><thead><tr><th>الصورة</th><th>المنتج</th><th>المعرف</th><th>السعر</th><th>المخزون</th><th>الحالة</th><th>الإجراءات</th></tr></thead><tbody id="inventoryTable"></tbody></table></div></div>
    <div id="stockLogTab" class="tab-content" style="display:none;"><div style="display:flex;justify-content:space-between;margin-bottom:16px;"><h3><i class="fas fa-scroll"></i> حركات المخزون</h3><button class="btn btn-outline" onclick="clearStockLog()">مسح السجل</button></div><div id="stockLogContainer"></div></div>
    <div id="ordersTab" class="tab-content" style="display:none;"><div class="table-container"><table class="data-table"><thead><tr><th>رقم الطلب</th><th>التاريخ</th><th>العميل</th><th>المنتجات</th><th>الإجمالي</th><th>الحالة</th><th>الإجراءات</th></tr></thead><tbody id="ordersTableBody"></tbody></table></div></div>
</div>

<div id="addProductModal" class="modal"><div class="modal-content"><div class="modal-header"><h2>منتج جديد</h2><button class="modal-close" onclick="closeAddProductModal()">&times;</button></div><form onsubmit="event.preventDefault();"><div class="form-group"><label>اسم المنتج *</label><input type="text" id="productName" required></div><div class="form-group"><label>الوصف</label><textarea id="productDesc" rows="2"></textarea></div><div class="form-group"><label>السعر (دج) *</label><input type="number" id="productPrice" required></div><div class="form-group"><label>الكمية *</label><input type="number" id="productQty" required></div><div class="form-group"><label>القسم</label><select id="productCategory"><option>عام</option><option>توابل</option><option>عطور</option></select></div><div class="form-group"><label>صورة المنتج (للنشر)</label><input type="file" id="productImages" accept="image/*"></div><div style="display:flex;gap:10px"><button type="button" class="btn btn-outline" onclick="saveProductOnly()">حفظ فقط</button><button type="button" class="btn btn-telegram" onclick="saveAndPublishProduct()">حفظ ونشر</button></div></form></div></div>

<div id="editStockModal" class="modal"><div class="modal-content"><div class="modal-header"><h2>تعديل المخزون</h2><button class="modal-close" onclick="closeEditStockModal()">&times;</button></div><form onsubmit="event.preventDefault(); updateStock();"><div class="form-group"><label>المنتج</label><input type="text" id="editProductName" disabled></div><div class="form-group"><label>المعرف</label><input type="text" id="editProductID" disabled></div><div class="form-group"><label>الكمية الحالية</label><input type="text" id="editCurrentQty" disabled></div><div class="form-group"><label>نوع العملية</label><select id="stockOperation"><option value="add">➕ إضافة</option><option value="remove">➖ سحب</option><option value="set">📝 تعيين</option></select></div><div class="form-group"><label>الكمية</label><input type="number" id="editNewQty" required></div><div class="form-group"><label>السبب</label><input type="text" id="stockReason" placeholder="مثال: جرد شهري"></div><button type="submit" class="btn btn-gold">تحديث</button></form></div></div>

<script>
// ============================================================
// 🟢 التكوينات والمتغيرات العامة
// ============================================================
const TELEGRAM = {
    botToken: '8576673096:AAGvSMjzwVWj6wJ47JdqiDwcObXjBDcyiLA',
    channelId: '-1003822964890',
    apiUrl: 'https://api.telegram.org/bot'
};

let currentStore = { id: Date.now(), storeName: 'ناردو ماركت', storeFixedID: 'NARDO-001', phone: '0555123456', address: 'الجزائر' };
let products = [];
let orders = [];
let stockLog = [];
let editProductId = null;

// ============================================================
// 🟢 التخزين المحلي
// ============================================================
const safeLocalStorage = {
    set: (key, value) => { try { localStorage.setItem(key, JSON.stringify(value)); return true; } catch(e) { return false; } },
    get: (key, defaultValue = []) => { try { const item = localStorage.getItem(key); return item ? JSON.parse(item) : defaultValue; } catch(e) { return defaultValue; } }
};

function loadData() {
    products = safeLocalStorage.get('nardo_products', []);
    orders = safeLocalStorage.get('nardo_orders', []);
    stockLog = safeLocalStorage.get('nardo_stock_log', []);
    const savedStore = safeLocalStorage.get('current_store', null);
    if (savedStore) currentStore = savedStore;
    document.getElementById('circleStoreName').innerHTML = currentStore.storeName.length > 12 ? currentStore.storeName.substring(0,10)+'..' : currentStore.storeName;
}

// ============================================================
// 🟢 دوال مساعدة عامة
// ============================================================
function showToast(msg, type) {
    let t = document.createElement('div');
    t.className = `toast ${type}`;
    let icon = type==='success' ? 'fa-check-circle' : (type==='error' ? 'fa-exclamation-circle' : (type==='warning' ? 'fa-exclamation-triangle' : 'fa-info-circle'));
    t.innerHTML = `<i class="fas ${icon}"></i> ${msg}`;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
}

function cleanTelegramText(text) { return text ? text.replace(/[_*[\]()~`>#+\-=|{}.!]/g, '').trim() : ''; }
function getNextProductSerial(storeID) { const storeProducts = products.filter(p => p.storeID === storeID); return (storeProducts.length + 1).toString().padStart(3,'0'); }
function formatPrice(price) { return price.toLocaleString() + ' دج'; }
function showStoreInfo() { alert(`🏪 ${currentStore.storeName}\n🆔 المعرف: ${currentStore.storeFixedID}\n📞 ${currentStore.phone}\n📍 ${currentStore.address}`); }
function openDeliveryPage() { window.open('delivery-full.html', '_blank'); }
function updateStats() { document.getElementById('statTotal') && (document.getElementById('statTotal').innerText = products.length); document.getElementById('statOrders') && (document.getElementById('statOrders').innerText = orders.length); }

function addStockLog(pid, pname, op, qty, oldQ, newQ, reason, storeID) {
    stockLog.unshift({ id: Date.now(), productId: pid, productName: pname, operation: op, quantity: qty, oldQty: oldQ, newQty: newQ, reason: reason, storeID: storeID, date: new Date().toLocaleString('ar-EG') });
    if (stockLog.length > 500) stockLog = stockLog.slice(0,500);
    safeLocalStorage.set('nardo_stock_log', stockLog);
}

// ============================================================
// 🟢 دوال التلغرام لجلب المنتجات
// ============================================================
async function fetchProductsFromTelegram() {
    showToast('جاري جلب المنتجات من القناة...', 'info');
    try {
        let response = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getUpdates?limit=100`);
        let data = await response.json();
        if(!data.ok) throw new Error('فشل الاتصال');
        let newCount = 0;
        for(let update of data.result || []) {
            let post = update.channel_post || update.message;
            if(!post || !post.photo) continue;
            let caption = post.caption || '';
            let lines = caption.split('\n');
            let name = 'منتج', price = 1000, quantity = 10;
            for(let line of lines) {
                if(line.includes('المنتج:')) name = line.split(':')[1]?.trim() || name;
                if(line.includes('السعر:')) price = parseInt(line.split(':')[1]) || price;
                if(line.includes('الكمية:')) quantity = parseInt(line.split(':')[1]) || quantity;
            }
            if(!products.some(p => p.telegramId === post.message_id)) {
                products.push({ id: Date.now() + Math.random(), telegramId: post.message_id, storeID: currentStore.storeFixedID, storeName: currentStore.storeName, productCompositeID: `${currentStore.storeFixedID}-${getNextProductSerial(currentStore.storeFixedID)}`, name: name, price: price, quantity: quantity, published: true, source: 'telegram' });
                newCount++;
            }
        }
        safeLocalStorage.set('nardo_products', products);
        renderAll();
        showToast(`✅ تم جلب ${newCount} منتج جديد`, 'success');
    } catch(e) { showToast('❌ فشل جلب المنتجات', 'error'); }
}

// ============================================================
// 🟢 دوال التلغرام لإضافة المنتج (حرفياً كما أرسلتها)
// ============================================================

// إرسال منتج إلى قناة التلغرام
async function sendToTelegram(product, imageFile) {
    try {
        showToast('📤 جاري النشر إلى قناة التلغرام...', 'info');
        const caption = `🟣 *منتج جديد في ناردو برو*
━━━━━━━━━━━━━━━━━━
📦 *المنتج:* ${cleanTelegramText(product.name)}
💰 *السعر:* ${product.price.toLocaleString()} دج
🏷️ *القسم:* ${product.category || 'عام'}
📊 *الكمية:* ${product.quantity}
🆔 *معرف المنتج:* \`${product.productCompositeID}\`
🏪 *المتجر:* ${product.storeName}
🆔 *معرف المتجر:* \`${product.storeID}\`
📝 *الوصف:* ${cleanTelegramText(product.description || 'لا يوجد وصف')}`;
        
        const formData = new FormData();
        formData.append('chat_id', TELEGRAM.channelId);
        formData.append('photo', imageFile);
        formData.append('caption', caption);
        formData.append('parse_mode', 'Markdown');
        
        const response = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/sendPhoto`, {
            method: 'POST',
            body: formData
        });
        const data = await response.json();
        if (data.ok) {
            showToast('✅ تم النشر بنجاح إلى القناة!', 'success');
            return { success: true, messageId: data.result.message_id };
        } else {
            throw new Error(data.description || 'خطأ غير معروف');
        }
    } catch (error) {
        console.error('خطأ في النشر:', error);
        showToast('❌ فشل النشر: ' + error.message, 'error');
        return { success: false, error: error.message };
    }
}

// حفظ منتج فقط (بدون نشر)
function saveProductOnly() {
    const name = document.getElementById('productName').value.trim();
    const price = parseInt(document.getElementById('productPrice').value);
    const quantity = parseInt(document.getElementById('productQty').value);
    if (!name || isNaN(price) || isNaN(quantity) || price <= 0) {
        showToast('املأ الحقول المطلوبة بشكل صحيح', 'error');
        return;
    }
    const storeID = currentStore.storeFixedID;
    const serial = getNextProductSerial(storeID);
    const compositeID = `${storeID}-${serial}`;
    const newProduct = {
        id: Date.now(),
        storeID: storeID,
        storeName: currentStore.storeName,
        productCompositeID: compositeID,
        serialNumber: serial,
        name: name,
        price: price,
        quantity: quantity,
        description: document.getElementById('productDesc').value,
        category: document.getElementById('productCategory').value,
        createdAt: new Date().toISOString(),
        source: 'local',
        published: false,
        telegramId: null
    };
    products.push(newProduct);
    safeLocalStorage.set('nardo_products', products);
    addStockLog(newProduct.id, newProduct.name, 'add', quantity, 0, quantity, 'إنشاء منتج', newProduct.storeID);
    renderAll();
    closeAddProductModal();
    showToast(`✅ تم حفظ ${name}`, 'success');
}

// حفظ ونشر منتج إلى التلغرام
async function saveAndPublishProduct() {
    const name = document.getElementById('productName').value.trim();
    const price = parseInt(document.getElementById('productPrice').value);
    const quantity = parseInt(document.getElementById('productQty').value);
    if (!name || isNaN(price) || price <= 0 || isNaN(quantity)) {
        showToast('بيانات غير مكتملة', 'error');
        return;
    }
    const imageInput = document.getElementById('productImages');
    if (!imageInput || !imageInput.files || imageInput.files.length === 0) {
        showToast('⚠️ النشر يتطلب صورة واحدة على الأقل', 'warning');
        return;
    }
    const imageFile = imageInput.files[0];
    const storeID = currentStore.storeFixedID;
    const serial = getNextProductSerial(storeID);
    const compositeID = `${storeID}-${serial}`;
    const newProduct = {
        id: Date.now(),
        storeID: storeID,
        storeName: currentStore.storeName,
        productCompositeID: compositeID,
        serialNumber: serial,
        name: name,
        price: price,
        quantity: quantity,
        description: document.getElementById('productDesc').value,
        category: document.getElementById('productCategory').value,
        createdAt: new Date().toISOString(),
        source: 'local',
        published: false,
        telegramId: null
    };
    const result = await sendToTelegram(newProduct, imageFile);
    if (result.success) {
        newProduct.published = true;
        newProduct.telegramId = result.messageId;
        newProduct.publishedAt = new Date().toISOString();
    }
    products.push(newProduct);
    safeLocalStorage.set('nardo_products', products);
    addStockLog(newProduct.id, newProduct.name, 'add', quantity, 0, quantity, result.success ? 'إنشاء ونشر' : 'إنشاء منتج', newProduct.storeID);
    renderAll();
    closeAddProductModal();
    showToast(result.success ? `✅ تم حفظ ونشر ${name}` : `⚠️ تم حفظ ${name} ولكن فشل النشر`, result.success ? 'success' : 'warning');
}

// نشر منتج موجود مسبقاً

// جلب الطلبات من التلغرام
async function fetchOrdersFromTelegram() {
    const btn = document.getElementById('fetchOrdersBtn');
    const originalText = btn?.innerHTML;
    if (btn) {
        btn.innerHTML = '<span class="loading-spinner"></span> جاري الجلب...';
        btn.disabled = true;
    }
    
    try {
        showToast('📡 جاري جلب الطلبات من التلغرام...', 'info');
        
        const response = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getUpdates?limit=100`);
        const data = await response.json();
        
        if (!data.ok) throw new Error('فشل الاتصال بـ Telegram API');
        
        let newOrdersCount = 0;
        let processedIds = safeLocalStorage.get('nardo_processed_telegram_ids');
        
        if (!Array.isArray(orders)) orders = [];

        for (const update of data.result || []) {
            const post = update.channel_post || update.message;
            if (!post || !post.text) continue;
            
            const uniqueId = post.message_id;
            if (processedIds.includes(uniqueId)) continue;
            
            const text = post.text;
            if (!text.includes(currentStore.storeFixedID)) continue;
            
            const orderData = extractOrderDataFromText(text);
            if (!orderData || !orderData.items || orderData.items.length === 0) continue;
            
            const existingOrder = orders.find(o => o.telegramOrderId === orderData.orderNumber);
            if (existingOrder) {
                processedIds.push(uniqueId);
                continue;
            }

            const orderItems = [];
            let orderTotal = 0;

            for (const item of orderData.items) {
                const product = products.find(p => p.productCompositeID === item.productID);
                if (product && product.storeID === currentStore.storeFixedID) {
                    orderItems.push({
                        id: product.id,
                        productCompositeID: product.productCompositeID,
                        name: product.name,
                        price: product.price,
                        quantity: item.quantity
                    });
                    orderTotal += (product.price * item.quantity);
                    
                    const oldQty = product.quantity;
                    product.quantity = Math.max(0, product.quantity - item.quantity);
                    addStockLog(product.id, product.name, 'remove', item.quantity, oldQty, product.quantity, `طلب تلغرام #${orderData.orderNumber}`, product.storeID);
                }
            }

            if (orderItems.length === 0) {
                processedIds.push(uniqueId);
                continue;
            }
            
            const newOrder = {
                id: Date.now() + Math.random(),
                telegramOrderId: orderData.orderNumber,
                telegramMessageId: uniqueId,
                date: orderData.date || new Date().toLocaleString('ar-EG'),
                customerName: orderData.customerName,
                customerPhone: orderData.customerPhone,
                customerAddress: orderData.customerAddress,
                customerNotes: orderData.notes || '',
                storeID: currentStore.storeFixedID,
                storeName: currentStore.storeName,
                items: orderItems,
                total: orderData.total || orderTotal,
                status: 'pending',
                source: 'telegram'
            };
            
            orders.unshift(newOrder);
            processedIds.push(uniqueId);
            newOrdersCount++;
        }
        
        safeLocalStorage.set('nardo_orders', orders);
        safeLocalStorage.set('nardo_products', products);
        safeLocalStorage.set('nardo_processed_telegram_ids', processedIds);
        
        renderAll();
        
        if (newOrdersCount > 0) {
            showToast(`✅ تم جلب ${newOrdersCount} طلب جديد`, 'success');
        } else {
            showToast('📭 لا توجد طلبات جديدة حالياً', 'info');
        }
        
    } catch (error) {
        console.error('خطأ في جلب الطلبات:', error);
        showToast('❌ فشل جلب الطلبات: ' + error.message, 'error');
    } finally {
        if (btn) {
            btn.innerHTML = originalText;
            btn.disabled = false;
        }
    }
}

// استخراج بيانات الطلب من نص الرسالة
function extractOrderDataFromText(text) {
    try {
        const patterns = {
            storeID: /(?:معرف المتجر:|🆔\s*\*معرف المتجر\*:)\s*`?([^\n`]+)`?/,
            customerName: /(?:(?:المشتري|الزبون):|👤\s*\*الزبون\*:)\s*([^\n]+)/,
            customerPhone: /(?:(?:الهاتف|رقم الجوال):|📞\s*\*رقم الجوال\*:)\s*([^\n]+)/,
            customerAddress: /(?:(?:العنوان):|📍\s*\*العنوان\*:)\s*([^\n]+)/,
            productID: /(?:معرف المنتج:|🆔\s*معرف المنتج:)\s*`?([A-Z0-9\u0600-\u06FF\s-]+-\d+-\d+)`?/i,
            quantity: /(?:الكمية:|📦\s*الكمية:)\s*(\d+)/,
            total: /(?:(?:إجمالي المتجر|إجمالي الطلب):|💰\s*\*إجمالي الطلب\*:)\s*([\d,]+)/,
            notes: /(?:ملاحظات:|📝\s*\*ملاحظات\*:)\s*([^\n]+)/,
            orderNumber: /(?:(?:رقم الطلب|رقم الطلب الموحد):|🆔\s*\*رقم الطلب الموحد\*:)\s*(\d+)/,
            date: /(?:(?:التاريخ):|📅\s*\*التاريخ\*:)\s*([^\n]+)/
        };
        
        const storeID = (text.match(patterns.storeID)?.[1] || '').trim();
        let customerName = (text.match(patterns.customerName)?.[1] || 'عميل ناردو').trim();
        let customerPhone = (text.match(patterns.customerPhone)?.[1] || '').trim();
        let customerAddress = (text.match(patterns.customerAddress)?.[1] || '').trim();
        const orderNumber = (text.match(patterns.orderNumber)?.[1] || Date.now().toString()).trim();
        const date = (text.match(patterns.date)?.[1] || new Date().toLocaleString('ar-EG')).trim();
        const total = parseInt((text.match(patterns.total)?.[1] || '0').replace(/,/g, ''));
        const notes = (text.match(patterns.notes)?.[1] || '').trim();

        customerName = customerName.replace(/[*_]/g, '').trim();
        customerPhone = customerPhone.replace(/[*_]/g, '').trim();
        customerAddress = customerAddress.replace(/[*_]/g, '').trim();

        const items = [];
        const lines = text.split('\n');
        let currentItem = null;

        for (let i = 0; i < lines.length; i++) {
            const line = lines[i].trim();
            
            const productStartMatch = line.match(/^(\d+)[️⃣\.]\s*(?:المنتج:\s*)?(.*?)$/);
            if (productStartMatch) {
                currentItem = { name: productStartMatch[2].trim() };
                currentItem.name = currentItem.name.replace(/[*_]/g, '').trim();
                continue;
            }
            
            if (currentItem) {
                const idMatch = line.match(patterns.productID);
                if (idMatch) {
                    currentItem.productID = idMatch[1].trim();
                }
                
                const qtyMatch = line.match(patterns.quantity);
                if (qtyMatch) {
                    currentItem.quantity = parseInt(qtyMatch[1]);
                    items.push({ ...currentItem });
                    currentItem = null;
                }
            }
        }

        if (items.length === 0) {
            const productID = (text.match(patterns.productID)?.[1] || '').trim();
            const quantity = parseInt(text.match(patterns.quantity)?.[1] || '1');
            if (productID) items.push({ productID, quantity });
        }

        return { items, storeID, customerName, customerPhone, customerAddress, total, notes, orderNumber, date };
    } catch (e) {
        console.error("خطأ في تحليل نص الرسالة:", e);
        return null;
    }
}

// حذف طلب
function deleteOrder(orderId) {
    if (confirm('هل أنت متأكد من حذف هذا الطلب؟')) {
        orders = orders.filter(o => o.id !== orderId);
        safeLocalStorage.set('nardo_orders', orders);
        renderOrders();
        updateStats();
        showToast('تم حذف الطلب', 'success');
    }
}

// تسليم طلب
function deliverOrder(orderId) {
    const order = orders.find(o => o.id === orderId);
    if (order) {
        order.status = order.status === 'delivered' ? 'pending' : 'delivered';
        safeLocalStorage.set('nardo_orders', orders);
        renderOrders();
        showToast(order.status === 'delivered' ? '✅ تم تسليم الطلب' : '🔄 تم إعادة الطلب إلى قيد المعالجة', 'success');
    }
}

// طلب سريع (يدوي)
function quickOrder(productId) {
    const p = products.find(p => p.id === productId);
    if (!p || p.quantity <= 0) { 
        showToast('المنتج غير متوفر', 'error'); 
        return; 
    }
    const qty = prompt(`الكمية (المتاح: ${p.quantity})`, "1");
    if (!qty) return;
    let qtyInt = parseInt(qty);
    if (isNaN(qtyInt) || qtyInt <= 0 || qtyInt > p.quantity) { 
        showToast('كمية غير صالحة', 'error'); 
        return; 
    }
    const total = p.price * qtyInt;
    const newOrder = {
        id: Date.now(),
        date: new Date().toLocaleString('ar-EG'),
        customerName: 'طلب مباشر',
        customerPhone: '',
        customerAddress: '',
        customerNotes: '',
        storeID: p.storeID,
        storeName: p.storeName,
        items: [{ id: p.id, name: p.name, price: p.price, quantity: qtyInt }],
        total: total,
        status: 'pending',
        source: 'manual'
    };
    orders.unshift(newOrder);
    p.quantity -= qtyInt;
    safeLocalStorage.set('nardo_orders', orders);
    safeLocalStorage.set('nardo_products', products);
    addStockLog(p.id, p.name, 'remove', qtyInt, p.quantity + qtyInt, p.quantity, 'طلب مباشر', p.storeID);
    renderAll();
    showToast(`✅ تم إنشاء الطلب #${newOrder.id}`, 'success');
}

// 🟢 دوال إدارة المخزون والعرض
// ============================================================
function closeAddProductModal() {
    document.getElementById('addProductModal').classList.remove('active');
}

function openAddProductModal() {
    document.getElementById('addProductModal').classList.add('active');
    document.getElementById('productName').value = '';
    document.getElementById('productDesc').value = '';
    document.getElementById('productPrice').value = '';
    document.getElementById('productQty').value = '';
    document.getElementById('productImages').value = '';
}

function closeEditStockModal() {
    document.getElementById('editStockModal').classList.remove('active');
    editProductId = null;
}

function updateStock() {
    let p = products.find(p => p.id === editProductId);
    if(!p) return;
    let op = document.getElementById('stockOperation').value;
    let qty = parseInt(document.getElementById('editNewQty').value);
    let reason = document.getElementById('stockReason').value;
    if(isNaN(qty) || qty < 0) { showToast('كمية غير صالحة', 'error'); return; }
    let oldQ = p.quantity;
    let newQ = oldQ;
    if(op === 'add') newQ = oldQ + qty;
    else if(op === 'remove') { if(qty > oldQ) { showToast('الكمية أكبر من المخزون', 'error'); return; } newQ = oldQ - qty; }
    else if(op === 'set') newQ = qty;
    addStockLog(p.id, p.name, op, qty, oldQ, newQ, reason || (op === 'add' ? 'إضافة' : op === 'remove' ? 'سحب' : 'تعيين'), p.storeID);
    p.quantity = newQ;
    safeLocalStorage.set('nardo_products', products);
    renderAll();
    closeEditStockModal();
    showToast('✅ تم تحديث المخزون', 'success');
}

function openEditStockModal(id) {
    editProductId = id;
    let p = products.find(p => p.id === id);
    if(p) {
        document.getElementById('editProductName').value = p.name;
        document.getElementById('editProductID').value = p.productCompositeID || '---';
        document.getElementById('editCurrentQty').value = p.quantity;
        document.getElementById('editNewQty').value = 0;
        document.getElementById('stockOperation').value = 'add';
        document.getElementById('stockReason').value = '';
        document.getElementById('editStockModal').classList.add('active');
    }
}

function clearStockLog() { if(confirm('مسح سجل المخزون بالكامل؟')) { stockLog = []; safeLocalStorage.set('nardo_stock_log', []); renderStockLog(); showToast('تم مسح السجل', 'success'); } }

function renderStockLog() {
    let container = document.getElementById('stockLogContainer');
    if(!container) return;
    if(!stockLog.length) { container.innerHTML = '<div style="text-align:center;padding:40px;">📭 لا توجد حركات مخزون</div>'; return; }

function renderInventory() {

    if(!tbody) return;
    if(!products.length) { tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;">📦 لا توجد منتجات</td></tr>'; return; }
    tbody.innerHTML = products.map(p => { let imageHtml = p.imageUrl ? `<img src="${p.imageUrl}" style="width:40px;height:40px;object-fit:cover;border-radius:12px;">` : `<i class="fas fa-image" style="font-size:24px;color:var(--gold);"></i>`; return `<tr><td><div style="width:50px;height:50px;background:rgba(255,215,0,0.1);border-radius:12px;display:flex;align-items:center;justify-content:center;">${imageHtml}</div></td><td><strong>${p.name}</strong></td><td><span style="font-family:monospace;background:rgba(255,215,0,0.15);padding:4px 8px;border-radius:12px;">${p.productCompositeID || '---'}</span></td><td style="color:var(--success);">${p.price.toLocaleString()} دج</td><td style="font-weight:800;">${p.quantity}</td><td><span class="stock-status ${p.quantity>0?'high':'out'}">${p.quantity>0?'متاح':'نفد'}</span></td><td><button class="btn btn-gold btn-sm" onclick="openEditStockModal(${p.id})"><i class="fas fa-edit"></i> تعديل</button></td></tr>`; }).join('');
}

function renderProducts() {
    let container = document.getElementById('productsGrid');
    if(!products.length) { container.innerHTML = '<div style="text-align:center;padding:60px;"><i class="fas fa-box-open fa-3x"></i><p>لا توجد منتجات</p><button class="btn btn-telegram" onclick="fetchProductsFromTelegram()">جلب من تلغرام</button></div>'; return; }
    container.innerHTML = products.map(p => { let stockClass = p.quantity > 10 ? 'high' : (p.quantity > 0 ? 'low' : 'out'); let stockText = p.quantity > 10 ? 'متوفر' : (p.quantity > 0 ? `متبقي ${p.quantity}` : 'غير متوفر'); let imageHtml = p.imageUrl ? `<img src="${p.imageUrl}" alt="${p.name}">` : `<div class="no-image"><i class="fas fa-image"></i><span>لا توجد صورة</span></div>`; let publishedBadge = p.published ? '<div class="product-published-badge"><i class="fab fa-telegram"></i> منشور</div>' : ''; return `<div class="product-card"><div class="product-id-badge">${p.productCompositeID || '---'}</div>${publishedBadge}<div class="product-image">${imageHtml}</div><div class="product-name">${p.name}</div><div class="product-price">${p.price.toLocaleString()} دج</div><div><span class="stock-status ${stockClass}">${stockText}</span></div><div class="product-actions"><button class="btn btn-gold" onclick="quickOrder(${p.id})"><i class="fas fa-shopping-bag"></i> طلب</button><button class="btn btn-outline" onclick="openEditStockModal(${p.id})"><i class="fas fa-edit"></i> تعديل</button>${!p.published ? `<button class="btn btn-telegram" onclick="publishExistingProduct(${p.id})"><i class="fab fa-telegram"></i> نشر</button>` : ''}<button class="btn btn-outline" style="border-color:var(--error);color:var(--error);" onclick="deleteProduct(${p.id})"><i class="fas fa-trash"></i> حذف</button></div></div>`; }).join('');
}

function deleteProduct(id) { if(confirm('هل أنت متأكد من حذف هذا المنتج؟')) { products = products.filter(p => p.id !== id); safeLocalStorage.set('nardo_products', products); renderAll(); showToast('✅ تم حذف المنتج', 'success'); } }

function showTab(tabName, btn) {
    document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
    document.getElementById(tabName + 'Tab').style.display = 'block';
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if(tabName === 'products') renderProducts();
    if(tabName === 'inventory') renderInventory();
    if(tabName === 'stockLog') renderStockLog();
    if(tabName === 'orders') renderOrders();
}

function renderAll() { renderProducts(); renderInventory(); renderStockLog(); renderOrders(); updateStats(); }

async function exportOrderToPDF(orderId) {
    let order = orders.find(o => o.id === orderId);
    if(!order) return;
    showToast('📄 جاري تحضير فاتورة PDF...', 'info');
    let { jsPDF } = window.jspdf;
    let doc = new jsPDF({ orientation: 'p', unit: 'mm', format: 'a4' });
    let tempDiv = document.createElement('div');
    tempDiv.style.position = 'absolute'; tempDiv.style.left = '-9999px'; tempDiv.style.width = '800px'; tempDiv.style.background = '#ffffff'; tempDiv.style.color = '#000000'; tempDiv.style.padding = '40px'; tempDiv.style.fontFamily = 'Cairo, sans-serif'; tempDiv.style.direction = 'rtl';
    tempDiv.innerHTML = `<div style="text-align:center;margin-bottom:20px;border-bottom:2px solid #daa520;padding-bottom:10px;"><h1 style="margin:0;color:#daa520;">🧾 فاتورة طلب #${order.telegramOrderId || order.id}</h1><p style="margin:5px 0;">🏪 متجر: ${order.storeName || currentStore.storeName}</p></div><div style="margin-bottom:20px;"><p><strong>📅 التاريخ:</strong> ${order.date}</p><p><strong>👤 العميل:</strong> ${order.customerName || 'غير معروف'}</p><p><strong>📞 الهاتف:</strong> ${order.customerPhone || '---'}</p><p><strong>📍 العنوان:</strong> ${order.customerAddress || '---'}</p></div><table style="width:100%;border-collapse:collapse;margin-bottom:20px;"><thead><tr style="background:#f0f0f0;"><th style="border:1px solid #000;padding:10px;text-align:right;">المنتج</th><th style="border:1px solid #000;padding:10px;text-align:center;">الكمية</th><th style="border:1px solid #000;padding:10px;text-align:center;">السعر</th><th style="border:1px solid #000;padding:10px;text-align:center;">الإجمالي</th></tr></thead><tbody>${order.items.map(it => `<tr><td style="border:1px solid #000;padding:10px;">${it.name}</td><td style="border:1px solid #000;padding:10px;text-align:center;">${it.quantity}</td><td style="border:1px solid #000;padding:10px;text-align:center;">${it.price.toLocaleString()} دج</td><td style="border:1px solid #000;padding:10px;text-align:center;">${(it.price * it.quantity).toLocaleString()} دج</td></tr>`).join('')}</tbody><tfoot><tr style="font-weight:bold;background:#f0f0f0;"><td colspan="3" style="border:1px solid #000;padding:10px;text-align:left;">الإجمالي الكلي</td><td style="border:1px solid #000;padding:10px;text-align:center;">${order.total.toLocaleString()} دج</td></tr></tfoot></table><div style="text-align:center;margin-top:40px;font-size:12px;color:#888;">شكرًا لتعاملكم مع ناردو برو 🌟</div>`;
    document.body.appendChild(tempDiv);
    try {
        let canvas = await html2canvas(tempDiv, { scale: 2, backgroundColor: '#ffffff', logging: false });
        let imgData = canvas.toDataURL('image/png');
        let imgProps = doc.getImageProperties(imgData);
        let pdfWidth = doc.internal.pageSize.getWidth();
        let pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;
        doc.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
        doc.save(`Order_${order.telegramOrderId || order.id}.pdf`);
        showToast('✅ تم تحميل فاتورة PDF', 'success');
    } catch(e) { showToast('❌ فشل تصدير PDF', 'error'); }
    finally { document.body.removeChild(tempDiv); }
}

document.addEventListener('DOMContentLoaded', () => {
    loadData();
    renderAll();
    setInterval(() => fetchOrdersFromTelegram(), 120000);
});
</script>
