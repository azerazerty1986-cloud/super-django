<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ناردو برو | المتجر الذكي - طلبات تلجرام</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #0a0a1a;
            --secondary: #1a1a2e;
            --gold: #ffd700;
            --gold-dark: #daa520;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --success: #4ade80;
            --error: #f87171;
            --warning: #fbbf24;
            --info: #60a5fa;
            --telegram: #0088cc;
        }
        
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0b0b14 0%, #15152a 100%);
            color: var(--text-primary);
            min-height: 100vh;
        }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        .top-navbar {
            background: linear-gradient(135deg, rgba(10,10,26,0.95), rgba(26,26,46,0.95));
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,215,0,0.25);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-left { flex: 1; display: flex; justify-content: flex-start; }
        .nav-logo { display: flex; align-items: center; gap: 10px; }
        .nav-logo i { font-size: 28px; color: var(--gold); }
        .nav-logo .logo-text { font-size: 18px; font-weight: 800; background: linear-gradient(135deg, #ffd700, #ffed4e); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .nav-logo small { font-size: 9px; color: #888; display: block; }

        .nav-center { flex: 1; display: flex; justify-content: center; }
        .store-circle { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: all 0.3s ease; }
        .circle-icon { width: 55px; height: 55px; background: linear-gradient(135deg, var(--gold), var(--gold-dark)); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(255,215,0,0.4); transition: all 0.3s ease; }
        .circle-icon i { font-size: 28px; color: #111; }
        .store-circle:hover .circle-icon { transform: scale(1.1); box-shadow: 0 6px 25px rgba(255,215,0,0.6); }
        .store-name-circle { font-size: 11px; font-weight: 700; margin-top: 6px; color: var(--gold); background: rgba(255,215,0,0.15); padding: 3px 10px; border-radius: 20px; }

        .nav-right { flex: 1; display: flex; justify-content: flex-end; gap: 10px; }
        .nav-btn { padding: 8px 18px; border-radius: 40px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; font-family: 'Cairo', sans-serif; display: flex; align-items: center; gap: 6px; transition: all 0.2s ease; }
        .nav-btn-telegram { background: linear-gradient(135deg, #0088cc, #006699); color: white; }
        .nav-btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: #111; }

        .tabs-bar {
            background: linear-gradient(135deg, rgba(10,10,26,0.9), rgba(26,26,46,0.9));
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,215,0,0.15);
            padding: 10px 20px;
            display: flex;
            justify-content: center;
            gap: 12px;
            position: sticky;
            top: 70px;
            z-index: 999;
            flex-wrap: wrap;
        }
        .tab-btn { padding: 10px 28px; border-radius: 40px; background: transparent; color: var(--text-secondary); font-weight: 700; font-size: 15px; cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; gap: 8px; border: none; font-family: 'Cairo', sans-serif; }
        .tab-btn:hover { background: rgba(255,215,0,0.1); color: var(--gold); }
        .tab-btn.active { background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,215,0,0.08)); color: var(--gold); border: 1px solid rgba(255,215,0,0.25); }

        .store-card { background: linear-gradient(135deg, rgba(255,215,0,0.08), rgba(0,0,0,0.3)); border: 1px solid rgba(255,215,0,0.15); border-radius: 28px; padding: 16px 24px; margin: 20px 0; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
        .store-info { display: flex; gap: 24px; flex-wrap: wrap; }
        .store-item { display: flex; align-items: center; gap: 8px; font-size: 13px; }
        .store-item i { color: var(--gold); }
        .store-item strong { color: var(--gold); }
        .stats-badges { display: flex; gap: 12px; }
        .stat-badge { background: rgba(0,0,0,0.4); padding: 6px 14px; border-radius: 24px; text-align: center; border: 1px solid rgba(255,215,0,0.15); }
        .stat-badge .number { font-size: 18px; font-weight: 800; background: linear-gradient(135deg, #ffd700, #ffb347); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .stat-badge .label { font-size: 10px; color: #999; }

        .toolbar { background: linear-gradient(135deg, rgba(255,215,0,0.05), rgba(0,0,0,0.2)); border-radius: 28px; padding: 12px 20px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        .search-box { display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,215,0,0.15); border-radius: 40px; padding: 8px 18px; flex: 1; max-width: 300px; }
        .search-box i { color: var(--gold); }
        .search-box input { background: transparent; border: none; color: white; font-family: 'Cairo', sans-serif; font-size: 13px; width: 100%; }
        .search-box input:focus { outline: none; }
        .btn { padding: 10px 24px; border: none; border-radius: 40px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'Cairo', sans-serif; display: inline-flex; align-items: center; gap: 8px; transition: all 0.2s ease; }
        .btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: #111; }
        .btn-telegram { background: linear-gradient(135deg, #0088cc, #006699); color: white; }
        .btn-outline { background: transparent; border: 2px solid var(--gold); color: var(--gold); }
        .btn-info { background: linear-gradient(135deg, #60a5fa, #3b82f6); color: white; }
        .btn-success { background: linear-gradient(135deg, #4ade80, #22c55e); color: white; }
        .btn-error { background: linear-gradient(135deg, #f87171, #ef4444); color: white; }
        .btn-sm { padding: 5px 12px; font-size: 12px; }

        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 24px; margin-bottom: 20px; }
        .product-card { background: linear-gradient(145deg, rgba(25,25,45,0.9), rgba(15,15,30,0.95)); backdrop-filter: blur(8px); border: 1px solid rgba(255,215,0,0.15); border-radius: 28px; padding: 20px; transition: all 0.3s ease; position: relative; }
        .product-card:hover { transform: translateY(-5px); border-color: rgba(255,215,0,0.4); }
        .product-id-badge { position: absolute; top: 15px; left: 15px; background: linear-gradient(135deg, var(--gold), #ffb347); color: #111; padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 800; }
        .product-published-badge { position: absolute; top: 15px; right: 15px; background: rgba(0,136,204,0.8); color: white; padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 800; display: flex; align-items: center; gap: 4px; }
        .product-name { font-size: 20px; font-weight: 900; background: linear-gradient(135deg, #ffd700, #ffb347); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 10px; }
        .product-price { font-size: 24px; font-weight: 900; color: var(--success); margin: 8px 0; }
        .stock-status { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .stock-status.high { background: rgba(74,222,128,0.15); color: var(--success); }
        .stock-status.low { background: rgba(251,191,36,0.15); color: var(--warning); }
        .stock-status.out { background: rgba(248,113,113,0.15); color: var(--error); }
        .product-actions { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }

        .table-container { background: rgba(0,0,0,0.25); border-radius: 24px; border: 1px solid rgba(255,215,0,0.12); overflow-x: auto; margin-bottom: 20px; }
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th { text-align: right; padding: 14px 16px; background: linear-gradient(135deg, rgba(255,215,0,0.12), rgba(255,215,0,0.06)); color: var(--gold); font-weight: 800; font-size: 13px; }
        .data-table td { padding: 12px 16px; border-bottom: 1px solid rgba(255,215,0,0.06); font-size: 13px; }
        .data-table tr:hover td { background: rgba(255,215,0,0.05); }

        .stock-log-item { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,215,0,0.1); border-radius: 16px; padding: 12px 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: linear-gradient(135deg, rgba(26,26,46,0.98), rgba(10,10,25,0.98)); border: 1px solid rgba(255,215,0,0.2); border-radius: 28px; padding: 28px; max-width: 700px; width: 90%; max-height: 85vh; overflow-y: auto; }
        .modal-header { font-size: 22px; font-weight: 900; color: var(--gold); margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .modal-close { background: rgba(255,255,255,0.1); border: none; color: var(--gold); font-size: 28px; cursor: pointer; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 6px; color: var(--gold); font-weight: 700; font-size: 13px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px 16px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,215,0,0.15); border-radius: 14px; color: white; font-family: 'Cairo', sans-serif; font-size: 14px; }

        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); padding: 12px 24px; border-radius: 40px; color: white; font-weight: 700; z-index: 3000; display: flex; align-items: center; gap: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { bottom: -50px; opacity: 0; } to { bottom: 30px; opacity: 1; } }
        .toast.success { background: linear-gradient(135deg, #22c55e, #16a34a); }
        .toast.error { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .toast.info { background: linear-gradient(135deg, #3b82f6, #2563eb); }
        .toast.warning { background: linear-gradient(135deg, #f59e0b, #d97706); }

        .loading-spinner { width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .top-navbar { padding: 10px; }
            .nav-logo .logo-text { font-size: 16px; }
            .nav-btn { padding: 6px 12px; font-size: 11px; }
            .tab-btn { padding: 8px 16px; font-size: 13px; }
            .products-grid { grid-template-columns: 1fr; }
            .modal-content { padding: 20px; }
        }
    </style>
</head>
<body>

    <nav class="top-navbar">
        <div class="nav-left">
            <div class="nav-logo">
                <i class="fas fa-bolt"></i>
                <div>
                    <span class="logo-text">ناردو برو</span>
                    <small>الجيل الثالث من الإدارة</small>
                </div>
            </div>
        </div>
        <div class="nav-center">
            <div class="store-circle" onclick="location.reload()">
                <div class="circle-icon"><i class="fas fa-store"></i></div>
                <div class="store-name-circle" id="currentStoreNameDisplay">جاري التحميل...</div>
            </div>
        </div>
        <div class="nav-right">
            <button class="nav-btn nav-btn-telegram" onclick="window.open('https://t.me/NardoProBot', '_blank')">
                <i class="fab fa-telegram"></i> بوت ناردو
            </button>
            <button class="nav-btn nav-btn-gold" onclick="openAddProductModal()">
                <i class="fas fa-plus"></i> منتج جديد
            </button>
        </div>
    </nav>

    <div class="tabs-bar">
        <button class="tab-btn active" onclick="showTab('products', this)"><i class="fas fa-th-large"></i> المنتجات</button>
        <button class="tab-btn" onclick="showTab('inventory', this)"><i class="fas fa-boxes"></i> المخزون</button>
        <button class="tab-btn" onclick="showTab('orders', this)"><i class="fas fa-shopping-cart"></i> الطلبات</button>
        <button class="tab-btn" onclick="showTab('stockLog', this)"><i class="fas fa-history"></i> السجل</button>
    </div>

    <div class="container">
        <div class="store-card">
            <div class="store-info">
                <div class="store-item"><i class="fas fa-id-badge"></i><span>معرف المتجر: <strong id="storeIDDisplay">---</strong></span></div>
                <div class="store-item"><i class="fas fa-link"></i><span>القناة: <strong id="storeChannelDisplay">---</strong></span></div>
            </div>
            <div class="stats-badges">
                <div class="stat-badge"><div class="number" id="statTotal">0</div><div class="label">منتج</div></div>
                <div class="stat-badge"><div class="number" id="statOrders">0</div><div class="label">طلب</div></div>
            </div>
        </div>

        <div id="productsTab" class="tab-content">
            <div class="toolbar">
                <div class="search-box"><i class="fas fa-search"></i><input type="text" id="searchProducts" placeholder="ابحث عن منتج..."></div>
                <div style="display: flex; gap: 10px;">
                    <button class="btn btn-telegram" onclick="fetchProductsFromTelegram()"><i class="fas fa-sync"></i> جلب من تلغرام</button>
                    <button class="btn btn-gold" onclick="findProductById()"><i class="fas fa-search-plus"></i> بحث سريع</button>
                </div>
            </div>
            <div class="products-grid" id="productsGrid"></div>
        </div>

        <div id="inventoryTab" class="tab-content" style="display:none;">
            <div class="toolbar"><h2 style="color:var(--gold);"><i class="fas fa-boxes"></i> إدارة المخزون</h2><button class="btn btn-outline" onclick="renderInventory()"><i class="fas fa-redo"></i> تحديث</button></div>
            <div class="table-container"><table class="data-table"><thead><tr><th>المنتج</th><th>المعرف</th><th>السعر</th><th>الكمية</th><th>الحالة</th><th>المصدر</th><th>النشر</th><th>إجراء</th></tr></thead><tbody id="inventoryTable"></tbody></table></div>
        </div>

        <div id="ordersTab" class="tab-content" style="display:none;">
            <div class="toolbar">
                <div><h2 style="color:var(--gold);"><i class="fas fa-shopping-cart"></i> الطلبات الواردة</h2></div>
                <div><button class="btn btn-telegram btn-sm" onclick="fetchOrdersFromTelegram()"><i class="fas fa-download"></i> جلب الطلبات</button>
                <button class="btn btn-error btn-sm" onclick="clearOrders()"><i class="fas fa-trash-alt"></i> مسح الكل</button></div>
            </div>
            <div class="table-container"><table class="data-table"><thead><tr><th>رقم الطلب</th><th>التاريخ</th><th>العميل</th><th>المنتجات</th><th>الإجمالي</th><th>الحالة</th><th>جهة التوصيل</th><th>إجراءات</th></tr></thead><tbody id="ordersTableBody"></tbody></table></div>
        </div>

        <div id="stockLogTab" class="tab-content" style="display:none;">
            <div class="toolbar"><h2 style="color:var(--gold);"><i class="fas fa-history"></i> سجل حركات المخزون</h2><button class="btn btn-error btn-sm" onclick="clearStockLog()"><i class="fas fa-trash"></i> مسح السجل</button></div>
            <div id="stockLogContainer"></div>
        </div>
    </div>

    <div id="addProductModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><span><i class="fas fa-cube"></i> إضافة منتج جديد</span><button class="modal-close" onclick="closeAddProductModal()">&times;</button></div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div><div class="form-group"><label>اسم المنتج *</label><input type="text" id="productName" placeholder="مثال: عطر فاخر"></div>
                <div class="form-group"><label>الوصف</label><textarea id="productDesc" rows="3" placeholder="وصف المنتج"></textarea></div>
                <div class="form-group"><label>السعر (دج) *</label><input type="number" id="productPrice" placeholder="0"></div></div>
                <div><div class="form-group"><label>الكمية *</label><input type="number" id="productQty" value="1"></div>
                <div class="form-group"><label>القسم</label><select id="productCategory"><option value="توابل">🌿 توابل</option><option value="عطور">🌸 عطور</option><option value="منتجات طبيعية">🍃 منتجات طبيعية</option></select></div>
                <div class="form-group"><label>صورة المنتج</label><input type="file" id="productImages" accept="image/*"><div id="imagePreview" style="display:none; margin-top:10px;"><img id="previewImg" style="max-width:100%; max-height:100px; border-radius:12px;"></div></div></div>
            </div>
            <div style="display: flex; gap: 15px; margin-top: 20px;">
                <button class="btn btn-outline" onclick="saveProductOnly()" style="flex:1;"><i class="fas fa-save"></i> حفظ فقط</button>
                <button class="btn btn-telegram" onclick="saveAndPublishProduct()" style="flex:1;"><i class="fab fa-telegram"></i> حفظ ونشر</button>
            </div>
        </div>
    </div>

    <div id="editStockModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><span>تعديل المخزون</span><button class="modal-close" onclick="closeEditStockModal()">&times;</button></div>
            <div class="form-group"><label>المنتج</label><input type="text" id="editProductName" disabled></div>
            <div class="form-group"><label>المعرف</label><input type="text" id="editProductID" disabled></div>
            <div class="form-group"><label>المخزون الحالي</label><input type="number" id="editCurrentQty" disabled></div>
            <div class="form-group"><label>العملية</label><select id="stockOperation"><option value="add">إضافة (+)</option><option value="remove">سحب (-)</option><option value="set">تعيين مباشر (=)</option></select></div>
            <div class="form-group"><label>الكمية</label><input type="number" id="editNewQty" value="0"></div>
            <div class="form-group"><label>السبب</label><input type="text" id="stockReason" placeholder="مثال: توريد جديد"></div>
            <button class="btn btn-gold" style="width:100%;" onclick="updateStock()">تحديث المخزون</button>
        </div>
    </div>

    <script>
        // ============================================================
        // إعدادات التلغرام والمتغيرات العامة
        // ============================================================
        const TELEGRAM = {
            botToken: '8576673096:AAFwOd-Ut1tCyKTHwkgj_r6OFi9UZbb4pTM',
            channelId: '-1003822964890',
            apiUrl: 'https://api.telegram.org/bot'
        };

        let products = [];
        let orders = [];
        let stockLog = [];
        let currentStore = { storeName: 'ناردو برو', storeFixedID: '', channelUsername: '@NardoChannel' };
        let editProductId = null;

        const safeLocalStorage = {
            get: (key) => { try { const data = localStorage.getItem(key); return data ? JSON.parse(data) : []; } catch(e) { return []; } },
            set: (key, val) => { try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {} }
        };

        function generateStoreID(storeName) {
            let clean = storeName.replace(/[^a-zA-Z0-9\u0600-\u06FF]/g, '').substring(0, 10).toUpperCase();
            if (!clean) clean = 'NARDO';
            return `${clean}-${Math.floor(Math.random() * 900000 + 100000)}`;
        }

        function loadCurrentStore() {
            const savedStore = localStorage.getItem('nardo_current_store');
            if (savedStore) {
                currentStore = JSON.parse(savedStore);
                if (!currentStore.storeFixedID) currentStore.storeFixedID = generateStoreID(currentStore.storeName);
            } else {
                currentStore.storeFixedID = generateStoreID(currentStore.storeName);
                localStorage.setItem('nardo_current_store', JSON.stringify(currentStore));
            }
            document.getElementById('currentStoreNameDisplay').innerText = currentStore.storeName;
            document.getElementById('storeIDDisplay').innerText = currentStore.storeFixedID;
            document.getElementById('storeChannelDisplay').innerText = currentStore.channelUsername;
            products = safeLocalStorage.get('nardo_products');
            orders = safeLocalStorage.get('nardo_orders');
            stockLog = safeLocalStorage.get('nardo_stock_log');
            updateStats();
        }

        function getNextProductSerial(storeID) {
            const storeProducts = products.filter(p => p.storeID === storeID);
            if (storeProducts.length === 0) return 1;
            return Math.max(...storeProducts.map(p => p.serialNumber || 0)) + 1;
        }

        function generateProductCompositeID(storeID, serialNumber) {
            return `${storeID}-${serialNumber.toString().padStart(3, '0')}`;
        }

        function addStockLog(pid, pname, op, qty, oldQ, newQ, reason = '', storeID = null) {
            stockLog.unshift({ id: Date.now(), productId: pid, productName: pname, operation: op, quantity: qty, oldQty: oldQ, newQty: newQ, reason: reason, storeID: storeID || currentStore.storeFixedID, date: new Date().toLocaleString('ar-EG') });
            if (stockLog.length > 500) stockLog = stockLog.slice(0, 500);
            safeLocalStorage.set('nardo_stock_log', stockLog);
        }

        // ============================================================
        // استخراج بيانات الطلب من نص التلغرام (مع دعم جهة التوصيل)
        // ============================================================
        function extractOrderDataFromText(text) {
            try {
                const patterns = {
                    storeID: /(?:معرف المتجر:|🆔\s*\*معرف المتجر\*:)\s*`?([^\n`]+)`?/,
                    customerName: /(?:(?:المشتري|الزبون):|👤\s*\*الزبون\*:)\s*([^\n]+)/,
                    customerPhone: /(?:(?:الهاتف|رقم الجوال):|📞\s*\*رقم الجوال\*:)\s*([^\n]+)/,
                    customerAddress: /(?:(?:العنوان):|📍\s*\*العنوان\*:)\s*([^\n]+)/,
                    productID: /(?:معرف المنتج:|🆔\s*معرف المنتج:)\s*`?([A-Z0-9\u0600-\u06FF\s-]+-\d+-\d+)`?/i,
                    quantity: /(?:الكمية:|📦\s*الكمية:)\s*(\d+)/,
                    total: /(?:(?:إجمالي المتجر|إجمالي الطلب):|💰\s*\*إجمالي الطلب\*:)\s*([\d,]+)/,
                    notes: /(?:ملاحظات:|📝\s*\*ملاحظات\*:)\s*([^\n]+)/,
                    orderNumber: /(?:(?:رقم الطلب|رقم الطلب الموحد):|🆔\s*\*رقم الطلب الموحد\*:)\s*(\d+)/,
                    date: /(?:(?:التاريخ):|📅\s*\*التاريخ\*:)\s*([^\n]+)/,
                    deliveryCompany: /(?:جهة التوصيل:|🏪\s*جهة التوصيل:)\s*([^\n]+)/
                };
                
                const storeID = (text.match(patterns.storeID)?.[1] || '').trim();
                let customerName = (text.match(patterns.customerName)?.[1] || 'عميل ناردو').trim().replace(/[*_]/g, '');
                let customerPhone = (text.match(patterns.customerPhone)?.[1] || '').trim().replace(/[*_]/g, '');
                let customerAddress = (text.match(patterns.customerAddress)?.[1] || '').trim().replace(/[*_]/g, '');
                const orderNumber = (text.match(patterns.orderNumber)?.[1] || Date.now().toString()).trim();
                const date = (text.match(patterns.date)?.[1] || new Date().toLocaleString('ar-EG')).trim();
                const total = parseInt((text.match(patterns.total)?.[1] || '0').replace(/,/g, ''));
                const notes = (text.match(patterns.notes)?.[1] || '').trim();
                const deliveryCompany = (text.match(patterns.deliveryCompany)?.[1] || '').trim();

                const items = [];
                const lines = text.split('\n');
                let currentItem = null;

                for (let i = 0; i < lines.length; i++) {
                    const line = lines[i].trim();
                    const productStartMatch = line.match(/^(\d+)[️⃣\.]\s*(?:المنتج:\s*)?(.*?)$/);
                    if (productStartMatch) {
                        currentItem = { name: productStartMatch[2].trim().replace(/[*_]/g, '') };
                        continue;
                    }
                    if (currentItem) {
                        const idMatch = line.match(patterns.productID);
                        if (idMatch) currentItem.productID = idMatch[1].trim();
                        const qtyMatch = line.match(patterns.quantity);
                        if (qtyMatch) {
                            currentItem.quantity = parseInt(qtyMatch[1]);
                            items.push({ ...currentItem });
                            currentItem = null;
                        }
                    }
                }

                if (items.length === 0) {
                    const productID = (text.match(patterns.productID)?.[1] || '').trim();
                    const quantity = parseInt(text.match(patterns.quantity)?.[1] || '1');
                    if (productID) items.push({ productID, quantity });
                }

                return { items, storeID, customerName, customerPhone, customerAddress, total, notes, orderNumber, date, deliveryCompany };
            } catch (e) {
                console.error("خطأ في تحليل نص الرسالة:", e);
                return null;
            }
        }

        // ============================================================
        // جلب المنتجات والطلبات
        // ============================================================
        async function fetchProductsFromTelegram() {
            const btn = event?.target;
            if (btn) { btn.innerHTML = '<span class="loading-spinner"></span> جاري...'; btn.disabled = true; }
            try {
                const res = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getUpdates`);
                const data = await res.json();
                if (!data.ok) throw new Error();
                let newCount = 0;
                for (const update of data.result) {
                    const post = update.channel_post;
                    if (!post || !post.caption) continue;
                    const text = post.caption;
                    const storeIDMatch = text.match(/معرف المتجر: `(.*?)`/);
                    const storeID = storeIDMatch ? storeIDMatch[1] : '';
                    if (storeID !== currentStore.storeFixedID) continue;
                    const nameMatch = text.match(/المنتج: (.*)/);
                    const priceMatch = text.match(/السعر: ([\d,]+)/);
                    const idMatch = text.match(/معرف المنتج: `(.*?)`/);
                    if (!products.some(p => p.telegramId === post.message_id)) {
                        products.push({ id: Date.now() + Math.random(), telegramId: post.message_id, name: nameMatch ? nameMatch[1].trim() : 'منتج', price: priceMatch ? parseInt(priceMatch[1].replace(/,/g, '')) : 0, quantity: 10, storeID: storeID, storeName: currentStore.storeName, productCompositeID: idMatch ? idMatch[1] : '', source: 'telegram', published: true });
                        newCount++;
                    }
                }
                safeLocalStorage.set('nardo_products', products);
                renderAll();
                showToast(`تم جلب ${newCount} منتج`, 'success');
            } catch(e) { showToast('فشل الجلب', 'error'); } finally { if(btn) { btn.innerHTML = '<i class="fas fa-sync"></i> جلب من تلغرام'; btn.disabled = false; } }
        }

        async function fetchOrdersFromTelegram() {
            const btn = event?.target;
            if (btn) { btn.innerHTML = '<span class="loading-spinner"></span> جاري...'; btn.disabled = true; }
            try {
                const response = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getUpdates?limit=100`);
                const data = await response.json();
                if (!data.ok) throw new Error();
                let newOrdersCount = 0;
                let processedIds = safeLocalStorage.get('nardo_processed_telegram_ids');
                for (const update of data.result || []) {
                    const post = update.channel_post || update.message;
                    if (!post || !post.text) continue;
                    const uniqueId = post.message_id;
                    if (processedIds.includes(uniqueId)) continue;
                    const text = post.text;
                    if (!text.includes(currentStore.storeFixedID)) continue;
                    const orderData = extractOrderDataFromText(text);
                    if (!orderData || !orderData.items || orderData.items.length === 0) continue;
                    if (orders.find(o => o.telegramOrderId === orderData.orderNumber)) { processedIds.push(uniqueId); continue; }
                    const orderItems = [];
                    let orderTotal = 0;
                    for (const item of orderData.items) {
                        const product = products.find(p => p.productCompositeID === item.productID);
                        if (product && product.storeID === currentStore.storeFixedID) {
                            orderItems.push({ id: product.id, productCompositeID: product.productCompositeID, name: product.name, price: product.price, quantity: item.quantity });
                            orderTotal += (product.price * item.quantity);
                            const oldQty = product.quantity;
                            product.quantity = Math.max(0, product.quantity - item.quantity);
                            addStockLog(product.id, product.name, 'remove', item.quantity, oldQty, product.quantity, `طلب تلغرام #${orderData.orderNumber}`, product.storeID);
                        }
                    }
                    if (orderItems.length === 0) { processedIds.push(uniqueId); continue; }
                    const newOrder = { id: Date.now() + Math.random(), telegramOrderId: orderData.orderNumber, telegramMessageId: uniqueId, date: orderData.date, customerName: orderData.customerName, customerPhone: orderData.customerPhone, customerAddress: orderData.customerAddress, customerNotes: orderData.notes || '', storeID: currentStore.storeFixedID, storeName: currentStore.storeName, items: orderItems, total: orderData.total || orderTotal, status: 'pending', source: 'telegram', deliveryCompany: orderData.deliveryCompany || '' };
                    orders.unshift(newOrder);
                    processedIds.push(uniqueId);
                    newOrdersCount++;
                }
                safeLocalStorage.set('nardo_orders', orders);
                safeLocalStorage.set('nardo_products', products);
                safeLocalStorage.set('nardo_processed_telegram_ids', processedIds);
                renderAll();
                showToast(newOrdersCount > 0 ? `✅ تم جلب ${newOrdersCount} طلب جديد` : '📭 لا توجد طلبات جديدة', newOrdersCount > 0 ? 'success' : 'info');
            } catch (error) { showToast('❌ فشل جلب الطلبات', 'error'); } finally { if(btn) { btn.innerHTML = '<i class="fas fa-download"></i> جلب الطلبات'; btn.disabled = false; } }
        }

        function saveProductOnly() {
            const name = document.getElementById('productName').value.trim();
            const price = parseInt(document.getElementById('productPrice').value);
            const quantity = parseInt(document.getElementById('productQty').value);
            if (!name || isNaN(price) || price <= 0) { showToast('املأ الحقول المطلوبة', 'error'); return; }
            const storeID = currentStore.storeFixedID;
            const serial = getNextProductSerial(storeID);
            const compositeID = generateProductCompositeID(storeID, serial);
            const imageInput = document.getElementById('productImages');
            const saveProduct = (imageData) => {
                const newProduct = { id: Date.now(), storeID, storeName: currentStore.storeName, productCompositeID: compositeID, serialNumber: serial, name, price, quantity, description: document.getElementById('productDesc').value, category: document.getElementById('productCategory').value, createdAt: new Date().toISOString(), source: 'local', published: false, imageData: imageData || null };
                products.push(newProduct);
                safeLocalStorage.set('nardo_products', products);
                addStockLog(newProduct.id, newProduct.name, 'add', quantity, 0, quantity, 'إنشاء منتج', newProduct.storeID);
                renderAll();
                closeAddProductModal();
                showToast(`✅ تم حفظ ${name}`, 'success');
            };
            if (imageInput && imageInput.files && imageInput.files.length > 0) {
                const reader = new FileReader();
                reader.onload = function(e) { saveProduct(e.target.result); };
                reader.readAsDataURL(imageInput.files[0]);
            } else { saveProduct(null); }
        }

            const name = document.getElementById('productName').value.trim();
            const price = parseInt(document.getElementById('productPrice').value);
            const quantity = parseInt(document.getElementById('productQty').value);
            if (!name || isNaN(price) || price <= 0) { showToast('بيانات غير مكتملة', 'error'); return; }
            const imageInput = document.getElementById('productImages');
            if (!imageInput || !imageInput.files || imageInput.files.length === 0) { showToast('⚠️ النشر يتطلب صورة', 'warning'); return; }
            const imageFile = imageInput.files[0];
            const storeID = currentStore.storeFixedID;
            const serial = getNextProductSerial(storeID);
            const compositeID = generateProductCompositeID(storeID, serial);
            const reader = new FileReader();
            reader.onload = async function(e) {
                const imageData = e.target.result;
                const newProduct = { id: Date.now(), storeID, storeName: currentStore.storeName, productCompositeID: compositeID, serialNumber: serial, name, price, quantity, description: document.getElementById('productDesc').value, category: document.getElementById('productCategory').value, createdAt: new Date().toISOString(), source: 'local', published: false, imageData };
                try {
                    const formData = new FormData();
                    formData.append('chat_id', TELEGRAM.channelId);
                    formData.append('photo', imageFile);
                    formData.append('caption', `🟣 *منتج جديد*\n📦 *المنتج:* ${name}\n💰 *السعر:* ${price.toLocaleString()} دج\n🆔 *معرف المنتج:* \`${compositeID}\`\n🏪 *المتجر:* ${currentStore.storeName}\n🆔 *معرف المتجر:* \`${storeID}\``);
                    formData.append('parse_mode', 'Markdown');
                    const response = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/sendPhoto`, { method: 'POST', body: formData });
                    const data = await response.json();
                    if (data.ok) { newProduct.published = true; newProduct.telegramId = data.result.message_id; showToast('✅ تم النشر بنجاح', 'success'); }
                    else throw new Error();
                } catch(e) { showToast('⚠️ فشل النشر', 'warning'); }
                products.push(newProduct);
                safeLocalStorage.set('nardo_products', products);
                addStockLog(newProduct.id, newProduct.name, 'add', quantity, 0, quantity, 'إنشاء ونشر', newProduct.storeID);
                renderAll();
                closeAddProductModal();
            };
            reader.readAsDataURL(imageFile);
        }

        function findProductById() { const id = prompt('أدخل معرف المنتج:'); if(id) { const p = products.find(p => p.productCompositeID === id); if(p) alert(`✅ ${p.name}\n💰 ${p.price} دج\n📦 المخزون: ${p.quantity}`); else showToast('غير موجود', 'error'); } }

        // ============================================================
        // دوال المخزون
        // ============================================================
        function openEditStockModal(id) { editProductId = id; const p = products.find(p => p.id === id); if(p) { document.getElementById('editProductName').value = p.name; document.getElementById('editProductID').value = p.productCompositeID; document.getElementById('editCurrentQty').value = p.quantity; document.getElementById('editStockModal').classList.add('active'); } }
        function closeEditStockModal() { document.getElementById('editStockModal').classList.remove('active'); editProductId = null; }
        function updateStock() {
            const p = products.find(p => p.id === editProductId);
            if(!p) return;
            const op = document.getElementById('stockOperation').value;
            const qtyVal = parseInt(document.getElementById('editNewQty').value);
            const reason = document.getElementById('stockReason').value;
            if(isNaN(qtyVal) || qtyVal < 0) { showToast('كمية غير صالحة', 'error'); return; }
            let oldQ = p.quantity, newQ = oldQ;
            if(op === 'add') { newQ = oldQ + qtyVal; addStockLog(p.id, p.name, 'add', qtyVal, oldQ, newQ, reason || 'إضافة', p.storeID); showToast(`➕ تمت إضافة ${qtyVal}`, 'success'); }
            else if(op === 'remove') { if(qtyVal > oldQ) { showToast('الكمية أكبر من المخزون', 'error'); return; } newQ = oldQ - qtyVal; addStockLog(p.id, p.name, 'remove', qtyVal, oldQ, newQ, reason || 'سحب', p.storeID); showToast(`➖ تم سحب ${qtyVal}`, 'success'); }
            else if(op === 'set') { newQ = qtyVal; addStockLog(p.id, p.name, 'set', Math.abs(newQ - oldQ), oldQ, newQ, reason || `تعيين إلى ${newQ}`, p.storeID); showToast(`📝 تم التعيين`, 'success'); }
            p.quantity = newQ;
            safeLocalStorage.set('nardo_products', products);
            renderAll();
            closeEditStockModal();
        }
        function clearStockLog() { if(confirm('مسح السجل؟')) { stockLog = []; safeLocalStorage.set('nardo_stock_log', []); renderStockLog(); showToast('تم المسح', 'success'); } }

        function deleteOrder(orderId) { if(confirm('حذف الطلب؟')) { orders = orders.filter(o => o.id !== orderId); safeLocalStorage.set('nardo_orders', orders); renderOrders(); updateStats(); showToast('تم الحذف', 'success'); } }
        function deliverOrder(orderId) { const order = orders.find(o => o.id === orderId); if(order) { order.status = order.status === 'delivered' ? 'pending' : 'delivered'; safeLocalStorage.set('nardo_orders', orders); renderOrders(); showToast(order.status === 'delivered' ? '✅ تم التسليم' : '🔄 قيد المعالجة', 'success'); } }
        function callCustomer(phone) { if(!phone) { showToast('رقم الهاتف غير متوفر', 'warning'); return; } window.location.href = `tel:${phone}`; }
        function quickOrder(productId) {
            const p = products.find(p => p.id === productId);
            if(!p || p.quantity <= 0) { showToast('المنتج غير متوفر', 'error'); return; }
            const qty = prompt(`الكمية (المتاح: ${p.quantity})`, "1");
            if(!qty) return;
            let qtyInt = parseInt(qty);
            if(isNaN(qtyInt) || qtyInt <= 0 || qtyInt > p.quantity) { showToast('كمية غير صالحة', 'error'); return; }
            const total = p.price * qtyInt;
            const newOrder = { id: Date.now(), date: new Date().toLocaleString('ar-EG'), customerName: 'طلب مباشر', customerPhone: '', customerAddress: '', customerNotes: '', storeID: p.storeID, storeName: p.storeName, items: [{ id: p.id, name: p.name, price: p.price, quantity: qtyInt }], total: total, status: 'pending', source: 'manual', deliveryCompany: '' };
            orders.unshift(newOrder);
            p.quantity -= qtyInt;
            safeLocalStorage.set('nardo_orders', orders);
            safeLocalStorage.set('nardo_products', products);
            addStockLog(p.id, p.name, 'remove', qtyInt, p.quantity + qtyInt, p.quantity, 'طلب مباشر', p.storeID);
            renderAll();
            showToast(`✅ تم إنشاء الطلب`, 'success');
        }

            const order = orders.find(o => o.id === orderId);
            if (!order) return;
            showToast('📄 جاري تحضير PDF...', 'info');
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation: 'p', unit: 'mm', format: 'a4' });
            const tempDiv = document.createElement('div');
            tempDiv.style.position = 'absolute'; tempDiv.style.left = '-9999px'; tempDiv.style.width = '800px'; tempDiv.style.background = '#ffffff'; tempDiv.style.color = '#000000'; tempDiv.style.padding = '40px'; tempDiv.style.fontFamily = 'Cairo, sans-serif'; tempDiv.style.direction = 'rtl';
            tempDiv.innerHTML = `<div style="text-align:center;"><h1 style="color:#daa520;">🧾 فاتورة طلب #${order.telegramOrderId || order.id}</h1><p>🏪 متجر: ${order.storeName}</p></div><div><p><strong>📅 التاريخ:</strong> ${order.date}</p><p><strong>👤 العميل:</strong> ${order.customerName}</p><p><strong>📞 الهاتف:</strong> ${order.customerPhone}</p><p><strong>📍 العنوان:</strong> ${order.customerAddress}</p><p><strong>🚚 جهة التوصيل:</strong> ${order.deliveryCompany}</p></div><table style="width:100%; border-collapse:collapse;"><thead><tr><th style="border:1px solid #000; padding:10px;">المنتج</th><th style="border:1px solid #000; padding:10px;">الكمية</th><th style="border:1px solid #000; padding:10px;">السعر</th><th style="border:1px solid #000; padding:10px;">الإجمالي</th></tr></thead><tbody>${order.items.map(it => `<tr><td style="border:1px solid #000; padding:10px;">${it.name}</td><td style="border:1px solid #000; padding:10px; text-align:center;">${it.quantity}</td><td style="border:1px solid #000; padding:10px; text-align:center;">${it.price.toLocaleString()} دج</td><td style="border:1px solid #000; padding:10px; text-align:center;">${(it.price * it.quantity).toLocaleString()} دج</td></tr>`).join('')}</tbody><tfoot><tr><td colspan="3" style="border:1px solid #000; padding:10px;">الإجمالي</td><td style="border:1px solid #000; padding:10px; text-align:center;">${order.total.toLocaleString()} دج</td></tr></tfoot>}</div>`;
            document.body.appendChild(tempDiv);
            try {
                const canvas = await html2canvas(tempDiv, { scale: 2, backgroundColor: '#ffffff' });
                const imgData = canvas.toDataURL('image/png');
                const pdfWidth = doc.internal.pageSize.getWidth();
                const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
                doc.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
                doc.save(`Order_${order.telegramOrderId || order.id}.pdf`);
                showToast('✅ تم تحميل PDF', 'success');
            } catch(error) { showToast('❌ فشل تصدير PDF', 'error'); } finally { document.body.removeChild(tempDiv); }
        }

        // ============================================================
        // دوال العرض (Render)
        // ============================================================
        function renderProducts() {
            const search = document.getElementById('searchProducts')?.value.toLowerCase() || '';
            let filtered = products.filter(p => p.storeID === currentStore.storeFixedID && (p.name.toLowerCase().includes(search) || (p.productCompositeID || '').toLowerCase().includes(search)));
            const container = document.getElementById('productsGrid');
            if (!filtered.length) { container.innerHTML = '<div style="text-align:center; padding:60px;"><i class="fas fa-box-open fa-3x"></i><p>لا توجد منتجات</p></div>'; return; }
            container.innerHTML = filtered.map(p => {
                const stockClass = p.quantity > 10 ? 'high' : (p.quantity > 0 ? 'low' : 'out');
                const stockText = p.quantity > 10 ? 'متوفر' : (p.quantity > 0 ? `متبقي ${p.quantity}` : 'غير متوفر');
                return `<div class="product-card"><div class="product-id-badge">${p.productCompositeID || '---'}</div>${p.published ? '<div class="product-published-badge"><i class="fab fa-telegram"></i> منشور</div>' : ''}<div style="width:100%; height:160px; border-radius:20px; overflow:hidden; background:#1a1a2e;"><img src="${p.imageData || 'https://placehold.co/400x300/1a1a2e/ffd700?text=📦'}" style="width:100%; height:100%; object-fit:cover;"></div><div class="product-name">${p.name}</div><div class="product-price">${p.price.toLocaleString()} دج</div><div><span class="stock-status ${stockClass}">${stockText}</span></div><div class="product-actions"><button class="btn btn-gold" style="flex:1;" onclick="quickOrder(${p.id})"><i class="fas fa-shopping-bag"></i> طلب</button><button class="btn btn-outline btn-sm" onclick="deleteProduct(${p.id})"><i class="fas fa-trash"></i></button></div></div>`;
            }).join('');
        }

        function renderInventory() {
            const tbody = document.getElementById('inventoryTable');
            let filtered = products.filter(p => p.storeID === currentStore.storeFixedID);
            if (!filtered.length) { tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;">لا توجد منتجات</td></tr>'; return; }
            tbody.innerHTML = filtered.map(p => `<tr><td><strong>${p.name}</strong></td><td>${p.productCompositeID || '---'}</td><td>${p.price.toLocaleString()} دج</td><td>${p.quantity}</td><td><span class="stock-status ${p.quantity>0?'high':'out'}">${p.quantity>0?'متاح':'نفد'}</span></td><td>${p.source === 'telegram' ? '<i class="fab fa-telegram"></i> تلغرام' : 'محلي'}</td><td>${!p.published ? `<button class="btn btn-telegram btn-sm" onclick="publishExistingProduct(${p.id})"><i class="fab fa-telegram"></i> نشر</button>` : '✅ منشور'}</td><td><button class="btn btn-gold btn-sm" onclick="openEditStockModal(${p.id})"><i class="fas fa-edit"></i></button></td></tr>`).join('');
        }

        function renderStockLog() {
            const container = document.getElementById('stockLogContainer');
            let filtered = stockLog.filter(l => l.storeID === currentStore.storeFixedID);
            if (!filtered.length) { container.innerHTML = '<div style="text-align:center; padding:40px;">لا توجد حركات</div>'; return; }
            container.innerHTML = filtered.map(l => `<div class="stock-log-item"><div><strong style="color:var(--gold);">${l.productName}</strong><br><span>${l.operation === 'add' ? '➕ إضافة' : (l.operation === 'remove' ? '➖ سحب' : '📝 تعيين')} ${l.quantity} | من ${l.oldQty} → ${l.newQty}</span>${l.reason ? `<br><span>📌 ${l.reason}</span>` : ''}</div><div>${l.date}</div></div>`).join('');
        }

        function renderOrders() {
            const tbody = document.getElementById('ordersTableBody');
            if (!tbody) return;
            const filteredOrders = orders.filter(order => order.storeID === currentStore.storeFixedID);
            if (filteredOrders.length === 0) { tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:40px;">لا توجد طلبات</td></tr>'; return; }
            tbody.innerHTML = filteredOrders.map(order => {
                const productsHtml = order.items.map(it => `<div style="display:flex; align-items:center; gap:8px; margin-bottom:8px; background:rgba(255,215,0,0.05); padding:5px 10px; border-radius:12px;"><div style="width:35px; height:35px; border-radius:8px; overflow:hidden; background:#1a1a2e;"><img src="${(products.find(p => p.id === it.id)?.imageData) || 'https://placehold.co/35x35/1a1a2e/ffd700?text=📦'}" style="width:100%; height:100%; object-fit:cover;"></div><div><div style="font-weight:bold;">${it.name}</div><div style="font-size:10px;">${it.productCompositeID} | ${it.quantity}</div></div><div>${(it.price * it.quantity).toLocaleString()} دج</div></div>`).join('');
                return `<tr><td><strong>#${order.telegramOrderId || order.id}</strong></td><td>${order.date || ''}</td><td><div><i class="fas fa-user"></i> ${order.customerName}<br><i class="fas fa-phone"></i> ${order.customerPhone}<br><i class="fas fa-map-marker-alt"></i> ${(order.customerAddress || '').substring(0,30)}</div></td><td>${productsHtml}</td><td>${order.total.toLocaleString()} دج</td><td><span class="stock-status ${order.status === 'delivered' ? 'high' : 'low'}">${order.status === 'delivered' ? '✅ تم التوصيل' : '🔄 قيد المعالجة'}</span></td><td><span class="stock-status high"><i class="fas fa-truck"></i> ${order.deliveryCompany || 'غير محدد'}</span></td><td><div style="display:flex; gap:5px;"><button class="btn btn-info btn-sm" onclick="exportOrderToPDF(${order.id})"><i class="fas fa-file-pdf"></i></button><button class="btn btn-success btn-sm" onclick="deliverOrder(${order.id})"><i class="fas ${order.status === 'delivered' ? 'fa-undo' : 'fa-check'}"></i></button><button class="btn btn-telegram btn-sm" onclick="sendToDelivery(${order.id})"><i class="fas fa-truck"></i></button><button class="btn btn-gold btn-sm" onclick="callCustomer('${order.customerPhone || ''}')"><i class="fas fa-phone"></i></button><button class="btn btn-error btn-sm" onclick="deleteOrder(${order.id})"><i class="fas fa-trash"></i></button></div></td></tr>`;
            }).join('');
            updateStats();
        }

        function updateStats() {
            document.getElementById('statTotal').innerText = products.filter(p => p.storeID === currentStore.storeFixedID).length;
            document.getElementById('statOrders').innerText = orders.filter(o => o.storeID === currentStore.storeFixedID).length;
        }

        function renderAll() { renderProducts(); renderInventory(); renderStockLog(); renderOrders(); updateStats(); }

        // ============================================================
        // دوال الواجهة
        // ============================================================
        function showTab(tabName, btn) {
            document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
            document.getElementById(tabName + 'Tab').style.display = 'block';
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if (tabName === 'products') renderProducts();
            if (tabName === 'inventory') renderInventory();
            if (tabName === 'stockLog') renderStockLog();
            if (tabName === 'orders') renderOrders();
        }
        function openAddProductModal() { document.getElementById('addProductModal').classList.add('active'); document.getElementById('productImages').value = ''; document.getElementById('imagePreview').style.display = 'none'; }
        function closeAddProductModal() { document.getElementById('addProductModal').classList.remove('active'); }
        function showToast(msg, type) { const t = document.createElement('div'); t.className = `toast ${type}`; t.innerHTML = `<i class="fas ${type==='success'?'fa-check-circle':type==='error'?'fa-exclamation-circle':'fa-info-circle'}"></i> ${msg}`; document.body.appendChild(t); setTimeout(() => t.remove(), 3000); }

        // التشغيل
        document.addEventListener('DOMContentLoaded', () => {
            loadCurrentStore();
            renderAll();
            document.getElementById('searchProducts')?.addEventListener('input', renderProducts);
            document.getElementById('productImages')?.addEventListener('change', function(e) {
                const file = e.target.files[0];
                const previewDiv = document.getElementById('imagePreview');
                const previewImg = document.getElementById('previewImg');
                if (file) { const reader = new FileReader(); reader.onload = (event) => { previewImg.src = event.target.result; previewDiv.style.display = 'block'; }; reader.readAsDataURL(file); } 
                else { previewDiv.style.display = 'none'; }
            });
            setTimeout(fetchOrdersFromTelegram, 2000);
            setInterval(fetchOrdersFromTelegram, 120000);
        });
    </script>
</body>
</html>
