<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ناردو برو | المتجر الذكي - طلبات تلجرام</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #0a0a1a;
            --secondary: #1a1a2e;
            --gold: #ffd700;
            --gold-dark: #daa520;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --success: #4ade80;
            --error: #f87171;
            --warning: #fbbf24;
            --info: #60a5fa;
            --telegram: #0088cc;
        }
        
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0b0b14 0%, #15152a 100%);
            color: var(--text-primary);
            min-height: 100vh;
        }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        .top-navbar {
            background: linear-gradient(135deg, rgba(10,10,26,0.95), rgba(26,26,46,0.95));
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,215,0,0.25);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-left { flex: 1; display: flex; justify-content: flex-start; }
        .nav-logo { display: flex; align-items: center; gap: 10px; }
        .nav-logo i { font-size: 28px; color: var(--gold); }
        .nav-logo .logo-text { font-size: 18px; font-weight: 800; background: linear-gradient(135deg, #ffd700, #ffed4e); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .nav-logo small { font-size: 9px; color: #888; display: block; }

        .nav-center { flex: 1; display: flex; justify-content: center; }
        .store-circle { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: all 0.3s ease; }
        .circle-icon { width: 55px; height: 55px; background: linear-gradient(135deg, var(--gold), var(--gold-dark)); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(255,215,0,0.4); transition: all 0.3s ease; }
        .circle-icon i { font-size: 28px; color: #111; }
        .store-circle:hover .circle-icon { transform: scale(1.1); box-shadow: 0 6px 25px rgba(255,215,0,0.6); }
        .store-name-circle { font-size: 11px; font-weight: 700; margin-top: 6px; color: var(--gold); background: rgba(255,215,0,0.15); padding: 3px 10px; border-radius: 20px; }

        .nav-right { flex: 1; display: flex; justify-content: flex-end; gap: 10px; }
        .nav-btn { padding: 8px 18px; border-radius: 40px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; font-family: 'Cairo', sans-serif; display: flex; align-items: center; gap: 6px; transition: all 0.2s ease; }
        .nav-btn-telegram { background: linear-gradient(135deg, #0088cc, #006699); color: white; }
        .nav-btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: #111; }
        .nav-btn-outline { background: transparent; border: 1px solid rgba(255,215,0,0.4); color: var(--gold); }
        .nav-btn-outline:hover { background: rgba(255,215,0,0.1); }

        .tabs-bar {
            background: linear-gradient(135deg, rgba(10,10,26,0.9), rgba(26,26,46,0.9));
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,215,0,0.15);
            padding: 10px 20px;
            display: flex;
            justify-content: center;
            gap: 12px;
            position: sticky;
            top: 70px;
            z-index: 999;
            flex-wrap: wrap;
        }
        .tab-btn { padding: 10px 28px; border-radius: 40px; background: transparent; color: var(--text-secondary); font-weight: 700; font-size: 15px; cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; gap: 8px; border: none; font-family: 'Cairo', sans-serif; }
        .tab-btn:hover { background: rgba(255,215,0,0.1); color: var(--gold); }
        .tab-btn.active { background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,215,0,0.08)); color: var(--gold); border: 1px solid rgba(255,215,0,0.25); }

        .store-card { background: linear-gradient(135deg, rgba(255,215,0,0.08), rgba(0,0,0,0.3)); border: 1px solid rgba(255,215,0,0.15); border-radius: 28px; padding: 16px 24px; margin: 20px 0; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
        .store-info { display: flex; gap: 24px; flex-wrap: wrap; }
        .store-item { display: flex; align-items: center; gap: 8px; font-size: 13px; }
        .store-item i { color: var(--gold); }
        .store-item strong { color: var(--gold); }
        .stats-badges { display: flex; gap: 12px; }
        .stat-badge { background: rgba(0,0,0,0.4); padding: 6px 14px; border-radius: 24px; text-align: center; border: 1px solid rgba(255,215,0,0.15); }
        .stat-badge .number { font-size: 18px; font-weight: 800; background: linear-gradient(135deg, #ffd700, #ffb347); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .stat-badge .label { font-size: 10px; color: #999; }

        .toolbar { background: linear-gradient(135deg, rgba(255,215,0,0.05), rgba(0,0,0,0.2)); border-radius: 28px; padding: 12px 20px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        .search-box { display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,215,0,0.15); border-radius: 40px; padding: 8px 18px; flex: 1; max-width: 300px; }
        .search-box i { color: var(--gold); }
        .search-box input { background: transparent; border: none; color: white; font-family: 'Cairo', sans-serif; font-size: 13px; width: 100%; }
        .search-box input:focus { outline: none; }
        .btn { padding: 10px 24px; border: none; border-radius: 40px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'Cairo', sans-serif; display: inline-flex; align-items: center; gap: 8px; transition: all 0.2s ease; }
        .btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: #111; }
        .btn-telegram { background: linear-gradient(135deg, #0088cc, #006699); color: white; }
        .btn-outline { background: transparent; border: 2px solid var(--gold); color: var(--gold); }
        .btn-info { background: linear-gradient(135deg, #60a5fa, #3b82f6); color: white; }
        .btn-success { background: linear-gradient(135deg, #4ade80, #22c55e); color: white; }
        .btn-error { background: linear-gradient(135deg, #f87171, #ef4444); color: white; }
        .btn-sm { padding: 5px 12px; font-size: 12px; }

        .table-container { background: rgba(0,0,0,0.25); border-radius: 24px; border: 1px solid rgba(255,215,0,0.12); overflow-x: auto; margin-bottom: 20px; }
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th { text-align: right; padding: 14px 16px; background: linear-gradient(135deg, rgba(255,215,0,0.12), rgba(255,215,0,0.06)); color: var(--gold); font-weight: 800; font-size: 13px; }
        .data-table td { padding: 12px 16px; border-bottom: 1px solid rgba(255,215,0,0.06); font-size: 13px; }
        .data-table tr:hover td { background: rgba(255,215,0,0.05); }

        .stock-log-item { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,215,0,0.1); border-radius: 16px; padding: 12px 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: linear-gradient(135deg, rgba(26,26,46,0.98), rgba(10,10,25,0.98)); border: 1px solid rgba(255,215,0,0.2); border-radius: 28px; padding: 28px; max-width: 600px; width: 95%; max-height: 90vh; overflow-y: auto; }
        .modal-header { font-size: 22px; font-weight: 900; color: var(--gold); margin-bottom: 20px; display: flex; justify-content: space-between; }
        .modal-close { background: none; border: none; color: var(--gold); font-size: 28px; cursor: pointer; }
        
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; font-weight: 700; color: var(--gold); margin-bottom: 8px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 14px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,215,0,0.15); border-radius: 12px; color: white; font-family: 'Cairo', sans-serif; font-size: 13px; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--gold); }

        .stock-status { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; }
        .stock-status.high { background: rgba(74,222,128,0.15); color: var(--success); }
        .stock-status.low { background: rgba(251,191,36,0.15); color: var(--warning); }
        .stock-status.out { background: rgba(248,113,113,0.15); color: var(--error); }

        .toast { position: fixed; bottom: 20px; right: 20px; padding: 14px 20px; border-radius: 12px; font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 10px; z-index: 3000; animation: slideIn 0.3s ease; }
        .toast.success { background: rgba(74,222,128,0.2); color: var(--success); border: 1px solid var(--success); }
        .toast.error { background: rgba(248,113,113,0.2); color: var(--error); border: 1px solid var(--error); }
        .toast.warning { background: rgba(251,191,36,0.2); color: var(--warning); border: 1px solid var(--warning); }
        .toast.info { background: rgba(96,165,250,0.2); color: var(--info); border: 1px solid var(--info); }
        @keyframes slideIn { from { transform: translateX(400px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-secondary); }
        .empty-state i { font-size: 48px; margin-bottom: 16px; color: var(--gold); opacity: 0.5; }
        .empty-state p { margin-bottom: 20px; }
    </style>
</head>
<body>
    <!-- ========== شريط التنقل العلوي ========== -->
    <div class="top-navbar">
        <div class="nav-left">
            <div class="nav-logo">
                <i class="fas fa-store"></i>
                <div>
                    <div class="logo-text">ناردو برو</div>
                    <small>إدارة المتجر الذكية</small>
                </div>
            </div>
        </div>
        <div class="nav-center">
            <div class="store-circle" onclick="openStoreModal()">
                <div class="circle-icon"><i class="fas fa-cog"></i></div>
                <div class="store-name-circle" id="storeNameDisplay">متجري</div>
            </div>
        </div>
        <div class="nav-right">
            <button class="nav-btn nav-btn-telegram" onclick="fetchOrdersFromTelegram()"><i class="fas fa-download"></i> جلب الطلبات</button>
            <button class="nav-btn nav-btn-gold" onclick="openStoreModal()"><i class="fas fa-sliders-h"></i> الإعدادات</button>
        </div>
    </div>

    <!-- ========== شريط التبويبات ========== -->
    <div class="tabs-bar">
        <button class="tab-btn active" onclick="switchTab('orders')"><i class="fas fa-receipt"></i> الطلبات</button>
        <button class="tab-btn" onclick="switchTab('products')"><i class="fas fa-box"></i> المنتجات</button>
        <button class="tab-btn" onclick="switchTab('stockLog')"><i class="fas fa-history"></i> سجل المخزون</button>
    </div>

    <!-- ========== المحتوى الرئيسي ========== -->
    <div class="container">
        <!-- ========== بطاقة المتجر ========== -->
        <div class="store-card">
            <div class="store-info">
                <div class="store-item"><i class="fas fa-store"></i> <strong>المتجر:</strong> <span id="infoStoreName">---</span></div>
                <div class="store-item"><i class="fas fa-id-badge"></i> <strong>المعرف:</strong> <span id="infoStoreID">---</span></div>
            </div>
            <div class="stats-badges">
                <div class="stat-badge"><div class="number" id="statOrders">0</div><div class="label">الطلبات</div></div>
                <div class="stat-badge"><div class="number" id="statProducts">0</div><div class="label">المنتجات</div></div>
            </div>
        </div>

        <!-- ========== تبويب الطلبات ========== -->
        <div id="ordersTab" class="tab-content active">
            <div class="toolbar">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchOrders" placeholder="ابحث عن طلب...">
                </div>
                <div style="display: flex; gap: 10px;">
                    <button class="btn btn-error" onclick="clearOrders()"><i class="fas fa-trash"></i> مسح الكل</button>
                    <button class="btn btn-gold" onclick="exportAllOrders()"><i class="fas fa-download"></i> تصدير</button>
                </div>
            </div>
            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>رقم الطلب</th>
                            <th>التاريخ</th>
                            <th>العميل</th>
                            <th>المنتجات</th>
                            <th>الإجمالي</th>
                            <th>الحالة</th>
                            <th>الإجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="ordersTableBody"></tbody>
                </table>
            </div>
        </div>

        <!-- ========== تبويب المنتجات ========== -->
        <div id="productsTab" class="tab-content" style="display: none;">
            <div class="toolbar">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchProducts" placeholder="ابحث عن منتج...">
                </div>
                <div style="display: flex; gap: 10px;">
                    <button class="btn btn-telegram" onclick="fetchProductsFromTelegram()"><i class="fas fa-download"></i> جلب من تلغرام</button>
                    <button class="btn btn-gold" onclick="openAddProductModal()"><i class="fas fa-plus"></i> منتج جديد</button>
                </div>
            </div>
            <div id="productsContainer"></div>
        </div>

        <!-- ========== تبويب سجل المخزون ========== -->
        <div id="stockLogTab" class="tab-content" style="display: none;">
            <div class="toolbar">
                <button class="btn btn-error" onclick="clearStockLog()"><i class="fas fa-trash"></i> مسح السجل</button>
            </div>
            <div id="stockLogContainer"></div>
        </div>
    </div>

    <!-- ========== مودال إعدادات المتجر ========== -->
    <div id="storeModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span>إعدادات المتجر</span>
                <button class="modal-close" onclick="closeStoreModal()">&times;</button>
            </div>
            <div class="form-group">
                <label>اسم المتجر</label>
                <input type="text" id="storeName" placeholder="اسم متجرك">
            </div>
            <div class="form-group">
                <label>معرف المتجر (سيتم إنشاؤه تلقائياً)</label>
                <input type="text" id="storeID" readonly>
            </div>
            <button class="btn btn-gold" style="width: 100%; margin-top: 20px;" onclick="saveStore()">حفظ</button>
        </div>
    </div>

    <!-- ========== مودال إضافة منتج ========== -->
    <div id="addProductModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span>منتج جديد</span>
                <button class="modal-close" onclick="closeAddProductModal()">&times;</button>
            </div>
            <div class="form-group">
                <label>اسم المنتج</label>
                <input type="text" id="productName" placeholder="اسم المنتج">
            </div>
            <div class="form-group">
                <label>السعر (دج)</label>
                <input type="number" id="productPrice" placeholder="السعر">
            </div>
            <div class="form-group">
                <label>الكمية</label>
                <input type="number" id="productQty" placeholder="الكمية">
            </div>
            <div class="form-group">
                <label>الوصف</label>
                <textarea id="productDescription" placeholder="وصف المنتج"></textarea>
            </div>
            <div class="form-group">
                <label>الصور</label>
                <input type="file" id="productImages" multiple accept="image/*" onchange="previewImages(this)">
                <div id="imagePreview" style="display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap;"></div>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button type="button" class="btn btn-outline" onclick="closeAddProductModal()" style="flex:1">إلغاء</button>
                <button type="button" class="btn btn-gold" onclick="saveProduct()" style="flex:1"><i class="fas fa-save"></i> حفظ</button>
                <button type="button" class="btn btn-telegram" onclick="saveAndPublishProduct()" style="flex:1"><i class="fab fa-telegram"></i> حفظ ونشر</button>
            </div>
        </div>
    </div>

    <!-- ========== مودال تعديل المخزون ========== -->
    <div id="editStockModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span>تعديل المخزون</span>
                <button class="modal-close" onclick="closeEditStockModal()">&times;</button>
            </div>
            <div class="form-group">
                <label>اسم المنتج</label>
                <input type="text" id="editProductName" readonly>
            </div>
            <div class="form-group">
                <label>معرف المنتج</label>
                <input type="text" id="editProductID" readonly>
            </div>
            <div class="form-group">
                <label>الكمية الحالية</label>
                <input type="number" id="editCurrentQty" readonly>
            </div>
            <div class="form-group">
                <label>العملية</label>
                <select id="stockOperation">
                    <option value="add">إضافة</option>
                    <option value="remove">سحب</option>
                    <option value="set">تعيين</option>
                </select>
            </div>
            <div class="form-group">
                <label>الكمية</label>
                <input type="number" id="editNewQty" placeholder="0">
            </div>
            <div class="form-group">
                <label>السبب (اختياري)</label>
                <input type="text" id="stockReason" placeholder="سبب التعديل">
            </div>
            <button class="btn btn-gold" style="width: 100%; margin-top: 20px;" onclick="updateStock()">تحديث</button>
        </div>
    </div>

    <script>
    // ========== إعدادات تلغرام ==========
    const TELEGRAM = {
        botToken: '8576673096:AAGvSMjzwVWj6wJ47JdqiDwcObXjBDcyiLA',
        channelId: '-1003822964890',
        apiUrl: 'https://api.telegram.org/bot'
    };

    // ========== إدارة التخزين الآمن ==========
    const safeLocalStorage = {
        set: function(key, value) {
            try {
                localStorage.setItem(key, JSON.stringify(value));
                return true;
            } catch (e) {
                if (e.name === 'QuotaExceededError' || e.name === 'NS_ERROR_DOM_QUOTA_REACHED') {
                    this.autoCleanup();
                    try { localStorage.setItem(key, JSON.stringify(value)); return true; } catch (retryError) { return false; }
                }
                return false;
            }
        },
        get: function(key, defaultValue = '[]') {
            try { const item = localStorage.getItem(key); return item ? JSON.parse(item) : JSON.parse(defaultValue); } catch (e) { return JSON.parse(defaultValue); }
        },
        autoCleanup: function() {
            let allOrders = this.get('nardo_orders');
            if (allOrders.length > 100) { allOrders = allOrders.slice(0, 100); localStorage.setItem('nardo_orders', JSON.stringify(allOrders)); }
            let logs = this.get('nardo_stock_log');
            if (logs.length > 100) { logs = logs.slice(-100); localStorage.setItem('nardo_stock_log', JSON.stringify(logs)); }
        }
    };

    let products = safeLocalStorage.get('nardo_products');
    let orders = safeLocalStorage.get('nardo_orders');
    let stockLog = safeLocalStorage.get('nardo_stock_log');
    let currentStore = null;
    let editProductId = null;
    let currentImages = [];
    let currentImageFiles = [];

    // ========== دالة تنظيف النص للتلجرام ==========
    function cleanTelegramText(text) { if (!text) return ''; return text.replace(/[_*\[\]()~`>#+\-=|{}.!]/g, '\\$&'); }

    // ========== إرسال إلى تيليجرام (بالصور والنص المنسق) ==========
    async function sendToTelegram(product, imageFile) {
        try {
            showToast('📤 جاري النشر إلى قناة التلغرام...', 'info');
            const caption = `🟣 *منتج جديد في ناردو برو*
━━━━━━━━━━━━━━━━━━
📦 *المنتج:* ${product.name}
💰 *السعر:* ${product.price.toLocaleString()} دج
📊 *الكمية:* ${product.quantity}
🆔 *معرف المنتج:* \`${product.productCompositeID}\`
🏪 *المتجر:* ${product.storeName}
🆔 *معرف المتجر:* \`${product.storeID}\`
📝 *الوصف:* ${product.description || 'لا يوجد وصف'}`;
            
            const formData = new FormData();
            formData.append('chat_id', TELEGRAM.channelId);
            if (imageFile) {
                formData.append('photo', imageFile);
                formData.append('caption', caption);
                formData.append('parse_mode', 'Markdown');
                const response = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/sendPhoto`, { method: 'POST', body: formData });
                const data = await response.json();
                if (data.ok) { showToast('✅ تم النشر بنجاح!', 'success'); return { success: true, messageId: data.result.message_id }; }
                else throw new Error(data.description);
            } else {
                const response = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/sendMessage`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ chat_id: TELEGRAM.channelId, text: caption, parse_mode: 'Markdown' }) });
                const data = await response.json();
                if (data.ok) { showToast('✅ تم النشر بنجاح!', 'success'); return { success: true, messageId: data.result.message_id }; }
                else throw new Error(data.description);
            }
        } catch (error) { showToast('❌ فشل النشر: ' + error.message, 'error'); return { success: false, error: error.message }; }
    }

    // ========== جلب الطلبات من تلغرام (بشرط معرف المتجر) ==========
    async function fetchOrdersFromTelegram() {
        try {
            if (!currentStore) { showToast('⚠️ يرجى تحديد المتجر أولاً', 'warning'); return; }
            showToast('📡 جاري جلب الطلبات...', 'info');
            const response = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getUpdates?limit=100&offset=-100`);
            const data = await response.json();
            if (!data.ok) throw new Error('فشل الاتصال');
            let newOrdersCount = 0;
            let processedIds = JSON.parse(localStorage.getItem('nardo_processed_telegram_ids') || '[]');
            orders = safeLocalStorage.get('nardo_orders');
            for (const update of data.result || []) {
                const post = update.channel_post || update.message || update.edited_channel_post || update.edited_message;
                if (!post || !post.text) continue;
                const uniqueId = post.message_id;
                if (processedIds.includes(uniqueId)) continue;
                const orderData = extractOrderDataFromText(post.text);
                if (!orderData || !orderData.productID) { processedIds.push(uniqueId); continue; }
                const product = products.find(p => p.productCompositeID === orderData.productID || p.name === orderData.productID || p.name.includes(orderData.productID));
                if (!product || (product.storeID && product.storeID !== currentStore.storeFixedID)) { processedIds.push(uniqueId); continue; }
                if (orders.find(o => o.telegramOrderId === orderData.orderNumber)) { processedIds.push(uniqueId); continue; }
                const newOrder = {
                    id: Date.now() + Math.random(),
                    telegramOrderId: orderData.orderNumber,
                    telegramMessageId: uniqueId,
                    date: orderData.date || new Date().toLocaleString('ar-EG'),
                    customerName: orderData.customerName,
                    customerPhone: orderData.customerPhone,
                    customerAddress: orderData.customerAddress,
                    customerNotes: orderData.notes || '',
                    storeID: currentStore.storeFixedID,
                    storeName: currentStore.storeName,
                    items: [{ id: product.id, productCompositeID: product.productCompositeID, name: product.name, price: product.price, quantity: orderData.quantity, image: product.images?.[0] || '' }],
                    total: orderData.total || (product.price * orderData.quantity),
                    status: 'pending'
                };
                orders.unshift(newOrder);
                const oldQty = product.quantity;
                product.quantity = Math.max(0, product.quantity - orderData.quantity);
                addStockLog(product.id, product.name, 'remove', orderData.quantity, oldQty, product.quantity, `طلب تلغرام #${orderData.orderNumber}`, product.storeID);
                processedIds.push(uniqueId);
                newOrdersCount++;
            }
            safeLocalStorage.set('nardo_orders', orders);
            safeLocalStorage.set('nardo_products', products);
            localStorage.setItem('nardo_processed_telegram_ids', JSON.stringify(processedIds));
            renderAll();
            if (newOrdersCount > 0) showToast(`✅ تم جلب ${newOrdersCount} طلب جديد`, 'success');
            else showToast('📭 لا توجد طلبات جديدة', 'info');
        } catch (error) { showToast('❌ خطأ: ' + error.message, 'error'); }
    }

    function extractOrderDataFromText(text) {
        try {
            const patterns = { storeID: /معرف المتجر:\s*([^\n]+)/, customerName: /المشتري:\s*([^\n]+)/, customerPhone: /الهاتف:\s*([^\n]+)/, customerAddress: /العنوان:\s*([^\n]+)/, productID: /([A-Z0-9\u0600-\u06FF]+-\d+-\d+)|([A-Z0-9\u0600-\u06FF]+\d+)/i, quantity: /الكمية:\s*(\d+)/, total: /إجمالي المتجر:\s*([\d,]+)/, orderNumber: /رقم الطلب:\s*(\d+)/, date: /التاريخ:\s*([^\n]+)/ };
            const storeID = (text.match(patterns.storeID)?.[1] || '').trim();
            const customerName = (text.match(patterns.customerName)?.[1] || '').trim();
            const customerPhone = (text.match(patterns.customerPhone)?.[1] || '').trim();
            const customerAddress = (text.match(patterns.customerAddress)?.[1] || '').trim();
            let productID = ''; const productMatch = text.match(patterns.productID); if (productMatch) productID = (productMatch[1] || productMatch[2] || '').trim();
            let quantity = parseInt(text.match(patterns.quantity)?.[1] || '1');
            const total = parseInt((text.match(patterns.total)?.[1] || '0').replace(/,/g, ''));
            const orderNumber = (text.match(patterns.orderNumber)?.[1] || Date.now().toString()).trim();
            const date = (text.match(patterns.date)?.[1] || new Date().toLocaleString('ar-EG')).trim();
            if (!productID) return null;
            return { storeID, customerName, customerPhone, customerAddress, productID, quantity, total, orderNumber, date };
        } catch (e) { return null; }
    }

    // ========== جلب المنتجات من تلغرام (بشرط معرف المتجر) ==========
    async function fetchProductsFromTelegram() {
        try {
            if (!currentStore) { showToast('⚠️ يرجى تحديد المتجر أولاً', 'warning'); return; }
            showToast('📡 جاري جلب المنتجات...', 'info');
            const response = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getUpdates?limit=100&offset=-100`);
            const data = await response.json();
            if (!data.ok) throw new Error('فشل الاتصال');
            let newProductsCount = 0;
            let processedIds = JSON.parse(localStorage.getItem('nardo_processed_product_ids') || '[]');
            products = safeLocalStorage.get('nardo_products');
            for (const update of data.result || []) {
                const post = update.channel_post || update.message || update.edited_channel_post || update.edited_message;
                if (!post || !post.text) continue;
                const uniqueId = post.message_id;
                if (processedIds.includes(uniqueId)) continue;
                const productData = extractProductDataFromTextForFetch(post.text);
                if (!productData || productData.storeID !== currentStore.storeFixedID) { processedIds.push(uniqueId); continue; }
                if (products.find(p => p.productCompositeID === productData.productCompositeID)) { processedIds.push(uniqueId); continue; }
                const newProduct = { id: Date.now() + Math.random(), productCompositeID: productData.productCompositeID, name: productData.name, price: productData.price, quantity: productData.quantity, images: [], storeID: currentStore.storeFixedID, storeName: currentStore.storeName, description: productData.description || '', publishedToTelegram: true, publishedDate: new Date().toLocaleString('ar-EG'), telegramMessageId: uniqueId };
                products.unshift(newProduct);
                addStockLog(newProduct.id, newProduct.name, 'add', newProduct.quantity, 0, newProduct.quantity, `منتج من تلغرام`, currentStore.storeFixedID);
                processedIds.push(uniqueId);
                newProductsCount++;
            }
            safeLocalStorage.set('nardo_products', products);
            localStorage.setItem('nardo_processed_product_ids', JSON.stringify(processedIds));
            renderAll();
            if (newProductsCount > 0) showToast(`✅ تم جلب ${newProductsCount} منتج جديد`, 'success');
            else showToast('📭 لا توجد منتجات جديدة', 'info');
        } catch (error) { showToast('❌ خطأ: ' + error.message, 'error'); }
    }

    function extractProductDataFromTextForFetch(text) {
        try {
            const patterns = { storeID: /معرف المتجر:\s*([^\n]+)/, productCompositeID: /معرف المنتج:\s*([^\n]+)/, name: /اسم المنتج:\s*([^\n]+)/, price: /السعر:\s*([\d,]+)/, quantity: /الكمية:\s*(\d+)/, description: /الوصف:\s*([^\n]+)/ };
            const storeID = (text.match(patterns.storeID)?.[1] || '').trim();
            const productCompositeID = (text.match(patterns.productCompositeID)?.[1] || '').trim();
            const name = (text.match(patterns.name)?.[1] || '').trim();
            const price = parseInt((text.match(patterns.price)?.[1] || '0').replace(/,/g, ''));
            const quantity = parseInt(text.match(patterns.quantity)?.[1] || '0');
            const description = (text.match(patterns.description)?.[1] || '').trim();
            if (!storeID || !productCompositeID || !name || price <= 0) return null;
            return { storeID, productCompositeID, name, price, quantity, description };
        } catch (e) { return null; }
    }

    // ========== وظائف العرض والتحكم ==========
    function renderOrders() {
        const tbody = document.getElementById('ordersTableBody');
        if (!tbody) return;
        orders = safeLocalStorage.get('nardo_orders');
        const filteredOrders = orders.filter(order => order.storeID === currentStore.storeFixedID);
        if (filteredOrders.length === 0) {
            tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; padding:40px;"><i class="fas fa-inbox fa-2x" style="color:var(--gold); margin-bottom:10px; display:block;"></i>لا توجد طلبات لهذا المتجر</td></tr>`;
        } else {
            tbody.innerHTML = filteredOrders.map(order => {
                const firstItem = order.items[0];
                let productImage = firstItem?.image || '';
                const imageHtml = productImage ? `<img src="${productImage}" style="width:40px; height:40px; object-fit:cover; border-radius:8px; border:1px solid var(--gold);">` : `<i class="fas fa-image" style="font-size:24px; color:#666;"></i>`;
                return `
                    <tr style="${order.status === 'delivered' ? 'opacity:0.7; background:rgba(74,222,128,0.05);' : ''}">
                        <td><strong>#${order.telegramOrderId || order.id.toString().substring(0,6)}</strong></td>
                        <td style="font-size:12px;">${order.date || ''}</td>
                        <td><div style="display:flex; align-items:center; gap:8px;">${imageHtml}<div><div><i class="fas fa-user"></i> ${order.customerName || 'غير معروف'}</div><div style="font-size:11px; color:#aaa;"><i class="fas fa-phone"></i> ${order.customerPhone || '---'}</div></div></div></td>
                        <td><div style="font-size:12px;">${order.items.map(it => `<span style="display:inline-block; background:rgba(255,215,0,0.1); padding:2px 8px; margin:2px; border-radius:12px;">${it.name} (${it.quantity})</span>`).join('')}</div></td>
                        <td style="color:var(--success); font-weight:bold;">${order.total.toLocaleString()} دج</td>
                        <td><span class="stock-status ${order.status === 'delivered' ? 'high' : 'low'}">${order.status === 'delivered' ? '✅ تم التوصيل' : '🔄 قيد المعالجة'}</span></td>
                        <td>
                            <div style="display: flex; gap: 6px;">
                                <button class="btn btn-success btn-sm" onclick="deliverOrder(${order.id})"><i class="fas ${order.status === 'delivered' ? 'fa-undo' : 'fa-check'}"></i></button>
                                <button class="btn btn-gold btn-sm" onclick="callCustomer('${order.customerPhone}')"><i class="fas fa-phone"></i></button>
                                <button class="btn btn-error btn-sm" onclick="deleteOrder(${order.id})"><i class="fas fa-trash"></i></button>
                            </div>
                        </td>
                    </tr>`;
            }).join('');
        }
        updateStats();
    }

    function renderProducts() {
        const container = document.getElementById('productsContainer');
        const searchTerm = document.getElementById('searchProducts')?.value.toLowerCase() || '';
        products = safeLocalStorage.get('nardo_products');
        let filtered = products.filter(p => p.name.toLowerCase().includes(searchTerm));
        if (filtered.length === 0) { container.innerHTML = '<div class="empty-state"><i class="fas fa-box-open"></i><p>لا توجد منتجات</p></div>'; return; }
        container.innerHTML = `<div class="table-container"><table class="data-table"><thead><tr><th>اسم المنتج</th><th>معرف المنتج</th><th>السعر</th><th>المخزون</th><th>الحالة</th><th>الإجراءات</th></tr></thead><tbody>${filtered.map(p => `<tr><td>${p.name}</td><td><small>${p.productCompositeID || 'N/A'}</small></td><td>${p.price} دج</td><td>${p.quantity}</td><td><span class="stock-status ${p.quantity > 10 ? 'high' : (p.quantity > 0 ? 'low' : 'out')}">${p.quantity > 0 ? '✅ متوفر' : '❌ غير متوفر'}</span></td><td><button class="btn btn-info btn-sm" onclick="openEditStockModal(${p.id})"><i class="fas fa-edit"></i></button><button class="btn btn-error btn-sm" onclick="deleteProduct(${p.id})"><i class="fas fa-trash"></i></button></td></tr>`).join('')}</tbody></table></div>`;
    }

    function renderStockLog() {
        const container = document.getElementById('stockLogContainer');
        stockLog = safeLocalStorage.get('nardo_stock_log');
        if (stockLog.length === 0) { container.innerHTML = '<div class="empty-state"><i class="fas fa-history"></i><p>لا يوجد سجل</p></div>'; return; }
        container.innerHTML = stockLog.map(log => `<div class="stock-log-item"><div><strong>${log.productName}</strong><span style="margin-right: 10px; color: var(--text-secondary);">${log.date}</span></div><div style="text-align: left;"><span>${log.oldQty} → ${log.newQty}</span><span style="margin-right: 10px; color: var(--gold);">${log.reason}</span></div></div>`).join('');
    }

    function updateStats() {
        document.getElementById('statOrders').textContent = orders.filter(o => o.storeID === currentStore.storeFixedID).length;
        document.getElementById('statProducts').textContent = products.length;
        document.getElementById('infoStoreName').textContent = currentStore.storeName;
        document.getElementById('infoStoreID').textContent = currentStore.storeFixedID;
    }

    function addStockLog(pid, pname, op, qty, oldQ, newQ, reason = '', storeID = null) {
        stockLog = safeLocalStorage.get('nardo_stock_log');
        stockLog.unshift({ id: Date.now(), productId: pid, productName: pname, operation: op, quantity: qty, oldQty: oldQ, newQty: newQ, reason: reason, storeID: storeID || currentStore?.storeFixedID, date: new Date().toLocaleString('ar-EG') });
        if (stockLog.length > 500) stockLog = stockLog.slice(0, 500);
        safeLocalStorage.set('nardo_stock_log', stockLog);
    }

    function openEditStockModal(id) {
        editProductId = id; const p = products.find(p => p.id === id);
        if (p) { document.getElementById('editProductName').value = p.name; document.getElementById('editProductID').value = p.productCompositeID; document.getElementById('editCurrentQty').value = p.quantity; document.getElementById('editNewQty').value = 0; document.getElementById('stockOperation').value = 'add'; document.getElementById('stockReason').value = ''; document.getElementById('editStockModal').classList.add('active'); }
    }

    function closeEditStockModal() { document.getElementById('editStockModal').classList.remove('active'); editProductId = null; }

    function updateStock() {
        const p = products.find(p => p.id === editProductId); if (!p) return;
        const op = document.getElementById('stockOperation').value; const qtyVal = parseInt(document.getElementById('editNewQty').value); const reason = document.getElementById('stockReason').value;
        if (isNaN(qtyVal) || qtyVal < 0) { showToast('كمية غير صالحة', 'error'); return; }
        let oldQ = p.quantity; let newQ = oldQ;
        if (op === 'add') newQ = oldQ + qtyVal; else if (op === 'remove') { if (qtyVal > oldQ) { showToast('الكمية أكبر من المخزون', 'error'); return; } newQ = oldQ - qtyVal; } else if (op === 'set') newQ = qtyVal;
        p.quantity = newQ; addStockLog(p.id, p.name, op, qtyVal, oldQ, newQ, reason || 'تعديل يدوي', p.storeID);
        safeLocalStorage.set('nardo_products', products); renderAll(); closeEditStockModal(); showToast('✅ تم التحديث', 'success');
    }

    function clearStockLog() { if (confirm('مسح سجل المخزون؟')) { safeLocalStorage.set('nardo_stock_log', []); renderStockLog(); showToast('تم المسح', 'success'); } }

    function deleteOrder(orderId) { if (confirm('هل أنت متأكد من حذف هذا الطلب؟')) { orders = orders.filter(o => o.id !== orderId); safeLocalStorage.set('nardo_orders', orders); renderOrders(); showToast('🗑️ تم حذف الطلب', 'success'); } }

    function clearOrders() { if(confirm('⚠️ هل أنت متأكد من مسح جميع الطلبات؟')) { safeLocalStorage.set('nardo_orders', []); renderOrders(); showToast('🗑️ تم مسح جميع الطلبات', 'success'); } }

    function deliverOrder(orderId) {
        orders = safeLocalStorage.get('nardo_orders'); const order = orders.find(o => o.id === orderId);
        if (order) { order.status = order.status === 'delivered' ? 'pending' : 'delivered'; safeLocalStorage.set('nardo_orders', orders); renderOrders(); showToast(order.status === 'delivered' ? '✅ تم التسليم' : '🔄 قيد المعالجة', 'success'); }
    }

    function callCustomer(phone) { if (!phone || phone === '---') { showToast('رقم الهاتف غير متوفر', 'warning'); return; } window.location.href = `tel:${phone}`; }

    function deleteProduct(id) { if (confirm('هل أنت متأكد من الحذف؟')) { products = products.filter(p => p.id !== id); safeLocalStorage.set('nardo_products', products); renderAll(); showToast('تم الحذف', 'success'); } }

    function openAddProductModal() { document.getElementById('productName').value = ''; document.getElementById('productPrice').value = ''; document.getElementById('productQty').value = ''; document.getElementById('productDescription').value = ''; document.getElementById('productImages').value = ''; document.getElementById('imagePreview').innerHTML = ''; currentImages = []; currentImageFiles = []; document.getElementById('addProductModal').classList.add('active'); }

    function closeAddProductModal() { document.getElementById('addProductModal').classList.remove('active'); }

    function saveProduct() {
        const name = document.getElementById('productName').value.trim(); const price = parseInt(document.getElementById('productPrice').value); const qty = parseInt(document.getElementById('productQty').value); const desc = document.getElementById('productDescription').value.trim();
        if (!name || isNaN(price) || price <= 0) { showToast('⚠️ أدخل بيانات صحيحة', 'error'); return; }
        const newProduct = { id: Date.now() + Math.random(), productCompositeID: `${currentStore.storeFixedID}-${Date.now()}`, name: name, price: price, quantity: qty || 0, images: currentImages, storeID: currentStore.storeFixedID, storeName: currentStore.storeName, description: desc, publishedToTelegram: false, publishedDate: new Date().toLocaleString('ar-EG') };
        products.unshift(newProduct); safeLocalStorage.set('nardo_products', products); addStockLog(newProduct.id, newProduct.name, 'add', qty || 0, 0, qty || 0, 'منتج جديد', currentStore.storeFixedID);
        renderAll(); closeAddProductModal(); showToast('✅ تم الحفظ', 'success');
    }

    async function saveAndPublishProduct() {
        const name = document.getElementById('productName').value.trim(); const price = parseInt(document.getElementById('productPrice').value); const qty = parseInt(document.getElementById('productQty').value); const desc = document.getElementById('productDescription').value.trim();
        if (!name || isNaN(price) || price <= 0) { showToast('⚠️ أدخل بيانات صحيحة', 'error'); return; }
        const productCompositeID = `${currentStore.storeFixedID}-${Date.now()}`;
        const newProduct = { id: Date.now() + Math.random(), productCompositeID: productCompositeID, name: name, price: price, quantity: qty || 0, images: currentImages, storeID: currentStore.storeFixedID, storeName: currentStore.storeName, description: desc, publishedToTelegram: true, publishedDate: new Date().toLocaleString('ar-EG') };
        const imageFile = currentImageFiles.length > 0 ? currentImageFiles[0] : null;
        const publishResult = await sendToTelegram(newProduct, imageFile);
        if (publishResult.success) { newProduct.telegramMessageId = publishResult.messageId; products.unshift(newProduct); safeLocalStorage.set('nardo_products', products); addStockLog(newProduct.id, newProduct.name, 'add', qty || 0, 0, qty || 0, 'منتج جديد - نشر', currentStore.storeFixedID); renderAll(); closeAddProductModal(); }
    }

    function previewImages(input) {
        const preview = document.getElementById('imagePreview'); preview.innerHTML = ''; currentImages = []; currentImageFiles = Array.from(input.files);
        for (let i = 0; i < input.files.length; i++) {
            const reader = new FileReader(); reader.onload = e => { currentImages.push(e.target.result); const div = document.createElement('div'); div.innerHTML = `<img src="${e.target.result}" style="width: 75px; height: 75px; border-radius: 8px; border: 2px solid var(--gold);">`; preview.appendChild(div); }; reader.readAsDataURL(input.files[i]);
        }
    }

    function showToast(msg, type) {
        const t = document.createElement('div'); t.className = `toast ${type}`; const icon = type==='success' ? 'fa-check-circle' : (type==='error' ? 'fa-exclamation-circle' : (type==='warning' ? 'fa-exclamation-triangle' : 'fa-info-circle'));
        t.innerHTML = `<i class="fas ${icon}"></i> ${msg}`; document.body.appendChild(t); setTimeout(() => t.remove(), 3000);
    }

    function loadCurrentStore() {
        let stored = localStorage.getItem('current_store');
        if(stored) currentStore = JSON.parse(stored);
        else { currentStore = { storeName: 'متجري', storeFixedID: generateStoreID('متجري') }; localStorage.setItem('current_store', JSON.stringify(currentStore)); }
        document.getElementById('storeNameDisplay').textContent = currentStore.storeName;
    }

    function generateStoreID(storeName) { let clean = storeName.replace(/[^a-zA-Z0-9\u0600-\u06FF]/g, '').substring(0, 8).toUpperCase(); if (!clean) clean = 'متجري'; return `${clean}-${Math.floor(Math.random() * 900000 + 100000)}`; }

    function openStoreModal() { document.getElementById('storeName').value = currentStore?.storeName || ''; document.getElementById('storeID').value = currentStore?.storeFixedID || ''; document.getElementById('storeModal').classList.add('active'); }

    function closeStoreModal() { document.getElementById('storeModal').classList.remove('active'); }

    function saveStore() {
        const name = document.getElementById('storeName').value.trim(); if (!name) { showToast('أدخل اسم المتجر', 'error'); return; }
        currentStore = { storeName: name, storeFixedID: currentStore?.storeFixedID || generateStoreID(name) };
        localStorage.setItem('current_store', JSON.stringify(currentStore)); document.getElementById('storeNameDisplay').textContent = name; closeStoreModal(); renderAll(); showToast('✅ تم حفظ المتجر', 'success');
    }

    function switchTab(tab) { document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none'); document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active')); document.getElementById(tab + 'Tab').style.display = 'block'; event.target.classList.add('active'); }

    function renderAll() { renderOrders(); renderProducts(); renderStockLog(); updateStats(); }

    async function exportOrderToPDF(orderId) { showToast('📄 جاري تحضير PDF...', 'info'); }
    function exportAllOrders() { showToast('📊 جاري تصدير البيانات...', 'info'); }

    document.addEventListener('DOMContentLoaded', () => {
        loadCurrentStore(); renderAll();
        document.getElementById('searchProducts')?.addEventListener('input', renderProducts);
        document.getElementById('searchOrders')?.addEventListener('input', renderOrders);
        setTimeout(fetchOrdersFromTelegram, 2000);
        setInterval(fetchOrdersFromTelegram, 120000);
    });
    </script>
