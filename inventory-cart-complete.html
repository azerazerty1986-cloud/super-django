<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ناردو برو | نظام المتجر الذكي - جلب من تلغرام</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #0a0a1a;
            --secondary: #1a1a2e;
            --gold: #ffd700;
            --gold-dark: #daa520;
            --gold-light: #ffed4e;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --success: #4ade80;
            --error: #f87171;
            --warning: #fbbf24;
            --info: #60a5fa;
            --telegram: #0088cc;
            --bg-card: rgba(25,25,45,0.8);
            --bg-surface: #0f0f1a;
            --border-color: rgba(255,215,0,0.15);
        }
        
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0b0b14 0%, #15152a 50%, #0f1628 100%);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            padding-top: 85px;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(255, 215, 0, 0.03) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(255, 215, 0, 0.02) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        
        .container { 
            max-width: 1400px; 
            margin: 0 auto; 
            padding: 0 20px 20px;
            position: relative;
            z-index: 1;
        }

        /* ========================================
           شريط المهام العلوي - ثابت (Fixed)
        ======================================== */
        .top-navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, rgba(10,10,26,0.98), rgba(26,26,46,0.98));
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,215,0,0.25);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            z-index: 1000;
        }

        /* القسم الأيسر */
        .nav-left {
            flex: 1;
            display: flex;
            justify-content: flex-start;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-logo i {
            font-size: 32px;
            color: var(--gold);
            filter: drop-shadow(0 0 8px rgba(255,215,0,0.4));
        }

        .nav-logo .logo-text {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-logo small {
            font-size: 9px;
            color: #888;
            display: block;
            line-height: 1.2;
        }

        /* القسم الأوسط - الدائرة مع المتجر */
        .nav-center {
            flex: 1;
            display: flex;
            justify-content: center;
        }

        .store-circle {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .circle-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(255,215,0,0.3);
            transition: all 0.3s ease;
        }

        .circle-icon i {
            font-size: 26px;
            color: #111;
        }

        .store-circle:hover .circle-icon {
            transform: scale(1.08);
            box-shadow: 0 6px 20px rgba(255,215,0,0.5);
        }

        .store-name-circle {
            font-size: 12px;
            font-weight: 700;
            margin-top: 5px;
            color: var(--gold);
            background: rgba(255,215,0,0.1);
            padding: 2px 10px;
            border-radius: 20px;
        }

        /* القسم الأيمن */
        .nav-right {
            flex: 1;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-btn {
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-family: 'Cairo', sans-serif;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .nav-btn-telegram {
            background: linear-gradient(135deg, #0088cc, #006699);
            color: white;
        }

        .nav-btn-gold {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: #111;
        }

        .nav-btn-outline {
            background: transparent;
            border: 1px solid rgba(255,215,0,0.3);
            color: var(--gold);
        }

        .nav-btn-outline:hover {
            background: rgba(255,215,0,0.1);
        }

        /* ========================================
           شريط التبويبات
        ======================================== */
        .tabs-bar {
            background: linear-gradient(135deg, rgba(255,215,0,0.08), rgba(0,0,0,0.3));
            border-radius: 60px;
            padding: 8px 16px;
            margin: 20px 0 20px;
            display: flex;
            gap: 8px;
            border: 1px solid rgba(255,215,0,0.15);
            backdrop-filter: blur(12px);
        }

        .tab-btn {
            padding: 10px 28px;
            border-radius: 40px;
            background: transparent;
            color: var(--text-secondary);
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            border: none;
            font-family: 'Cairo', sans-serif;
        }

        .tab-btn i {
            font-size: 16px;
        }

        .tab-btn:hover {
            background: rgba(255,215,0,0.1);
            color: var(--gold);
        }

        .tab-btn.active {
            background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,215,0,0.08));
            color: var(--gold);
            border: 1px solid rgba(255,215,0,0.2);
        }

        /* ========================================
           بطاقة معلومات المتجر
        ======================================== */
        .store-card {
            background: linear-gradient(135deg, rgba(255,215,0,0.08), rgba(0,0,0,0.3));
            border: 1px solid rgba(255,215,0,0.15);
            border-radius: 28px;
            padding: 16px 24px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            backdrop-filter: blur(12px);
        }

        .store-info {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }

        .store-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }

        .store-item i {
            font-size: 16px;
            color: var(--gold);
        }

        .store-item strong {
            color: var(--gold);
        }

        .stats-badges {
            display: flex;
            gap: 12px;
        }

        .stat-badge {
            background: rgba(0,0,0,0.4);
            padding: 6px 14px;
            border-radius: 24px;
            text-align: center;
            border: 1px solid rgba(255,215,0,0.15);
        }

        .stat-badge .number {
            font-size: 18px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffd700, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .stat-badge .label {
            font-size: 10px;
            color: #999;
        }

        .sync-status {
            background: rgba(74,222,128,0.15);
            padding: 6px 16px;
            border-radius: 24px;
            font-size: 12px;
            border: 1px solid rgba(74,222,128,0.3);
            color: #86efac;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* ========================================
           شريط الأدوات
        ======================================== */
        .toolbar {
            background: linear-gradient(135deg, rgba(255,215,0,0.05), rgba(0,0,0,0.2));
            border-radius: 28px;
            padding: 12px 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            border: 1px solid rgba(255,215,0,0.1);
        }

        .search-box {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,215,0,0.15);
            border-radius: 40px;
            padding: 8px 18px;
            flex: 1;
            max-width: 300px;
        }

        .search-box i {
            color: var(--gold);
        }

        .search-box input {
            background: transparent;
            border: none;
            color: white;
            font-family: 'Cairo', sans-serif;
            font-size: 13px;
            width: 100%;
        }

        .search-box input:focus {
            outline: none;
        }

        .filter-select {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,215,0,0.15);
            border-radius: 40px;
            padding: 8px 18px;
            color: white;
            font-family: 'Cairo', sans-serif;
            font-size: 13px;
            cursor: pointer;
        }

        /* ========================================
           الأزرار العامة
        ======================================== */
        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }
        .btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: #111; }
        .btn-telegram { background: linear-gradient(135deg, #0088cc, #006699); color: white; }
        .btn-success { background: linear-gradient(135deg, #22c55e, #16a34a); color: white; }
        .btn-outline { background: transparent; border: 2px solid var(--gold); color: var(--gold); }
        .btn-info { background: linear-gradient(135deg, #60a5fa, #3b82f6); color: white; }
        .btn-sm { padding: 5px 12px; font-size: 12px; }

        /* ========================================
           بطاقات المنتجات
        ======================================== */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
            margin-bottom: 20px;
        }

        .product-card {
            background: linear-gradient(145deg, rgba(25,25,45,0.8), rgba(15,15,30,0.95));
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,215,0,0.15);
            border-radius: 28px;
            padding: 20px;
            transition: all 0.3s ease;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255,215,0,0.4);
            box-shadow: 0 16px 40px rgba(255,215,0,0.1);
        }

        .product-id-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: linear-gradient(135deg, var(--gold), #ffb347);
            color: #111;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 800;
            font-family: monospace;
        }

        .product-images {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            margin-bottom: 15px;
            padding-bottom: 5px;
        }

        .product-images img {
            width: 75px;
            height: 75px;
            object-fit: cover;
            border-radius: 16px;
            border: 2px solid rgba(255,215,0,0.2);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .product-images img:hover {
            border-color: var(--gold);
            transform: scale(1.03);
        }

        .product-name {
            font-size: 20px;
            font-weight: 900;
            background: linear-gradient(135deg, #ffd700, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 5px;
        }

        .product-price {
            font-size: 24px;
            font-weight: 900;
            color: var(--success);
            margin: 8px 0;
        }

        .stock-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .stock-status.high {
            background: rgba(74,222,128,0.15);
            color: var(--success);
            border: 1px solid rgba(74,222,128,0.3);
        }

        .stock-status.low {
            background: rgba(251,191,36,0.15);
            color: var(--warning);
            border: 1px solid rgba(251,191,36,0.3);
        }

        .stock-status.out {
            background: rgba(248,113,113,0.15);
            color: var(--error);
            border: 1px solid rgba(248,113,113,0.3);
        }

        .product-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        /* ========================================
           الجداول - تصميم احترافي
        ======================================== */
        .table-container {
            background: rgba(0,0,0,0.25);
            border-radius: 24px;
            border: 1px solid rgba(255,215,0,0.12);
            overflow-x: auto;
            backdrop-filter: blur(8px);
            margin-bottom: 20px;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th {
            text-align: right;
            padding: 14px 16px;
            background: linear-gradient(135deg, rgba(255,215,0,0.12), rgba(255,215,0,0.06));
            color: var(--gold);
            font-weight: 800;
            font-size: 13px;
            border-bottom: 2px solid rgba(255,215,0,0.15);
        }

        .data-table td {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255,215,0,0.06);
            font-size: 13px;
            vertical-align: middle;
        }

        .data-table tr:last-child td {
            border-bottom: none;
        }

        .data-table tr:hover td {
            background: rgba(255,215,0,0.05);
        }

        /* شارات المصدر */
        .badge-telegram {
            background: rgba(0,136,204,0.15);
            color: #60a5fa;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            border: 1px solid rgba(0,136,204,0.3);
        }

        .badge-local {
            background: rgba(74,222,128,0.15);
            color: var(--success);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            border: 1px solid rgba(74,222,128,0.3);
        }

        /* ========================================
           سجل المخزون
        ======================================== */
        .stock-log-item {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,215,0,0.1);
            border-radius: 16px;
            padding: 12px 16px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
        }

        .stock-log-item:hover {
            background: rgba(255,215,0,0.05);
            border-color: rgba(255,215,0,0.2);
        }

        /* ========================================
           المودالات
        ======================================== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, rgba(26,26,46,0.98), rgba(10,10,25,0.98));
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 28px;
            padding: 28px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .modal-header {
            font-size: 22px;
            font-weight: 900;
            color: var(--gold);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--gold);
            font-size: 28px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .modal-close:hover {
            transform: rotate(90deg);
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: var(--gold);
            font-weight: 700;
            font-size: 13px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,215,0,0.15);
            border-radius: 24px;
            color: white;
            font-family: 'Cairo', sans-serif;
            font-size: 13px;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: rgba(255,215,0,0.4);
        }

        /* ========================================
           إشعارات توست
        ======================================== */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 24px;
            border-radius: 24px;
            font-weight: 600;
            z-index: 3000;
            animation: slideIn 0.3s ease;
            backdrop-filter: blur(8px);
            background: rgba(0,0,0,0.8);
            border: 1px solid;
        }

        .toast.success {
            border-color: var(--success);
            color: var(--success);
        }

        .toast.error {
            border-color: var(--error);
            color: var(--error);
        }

        .toast.info {
            border-color: var(--info);
            color: var(--info);
        }

        @keyframes slideIn {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* ========================================
           استجابة للشاشات
        ======================================== */
        @media (max-width: 768px) {
            body { padding-top: 120px; }
            .top-navbar { flex-direction: column; padding: 12px 16px; }
            .nav-left, .nav-center, .nav-right { width: 100%; justify-content: center; }
            .tabs-bar { overflow-x: auto; flex-wrap: nowrap; }
            .tab-btn { padding: 8px 16px; font-size: 12px; white-space: nowrap; }
            .products-grid { grid-template-columns: 1fr; }
            .toolbar { flex-direction: column; }
            .search-box { max-width: 100%; }
        }

        @media (max-width: 480px) {
            .container { padding: 0 12px 12px; }
            .store-card { flex-direction: column; text-align: center; }
            .store-info { justify-content: center; }
        }

        .mt-2 { margin-top: 8px; }
        .mt-3 { margin-top: 16px; }
    </style>
</head>
<body>

<!-- ========== شريط المهام العلوي - ثابت (Fixed) ========== -->
<div class="top-navbar">
    <div class="nav-left">
        <div class="nav-logo">
            <i class="fas fa-crown"></i>
            <div>
                <span class="logo-text">ناردو برو</span>
                <small>المتجر الذكي</small>
            </div>
        </div>
    </div>
    
    <div class="nav-center">
        <div class="store-circle" onclick="showStoreInfo()">
            <div class="circle-icon">
                <i class="fas fa-store"></i>
            </div>
            <div class="store-name-circle" id="circleStoreName">المتجر</div>
        </div>
    </div>
    
    <div class="nav-right">
        <button class="nav-btn nav-btn-telegram" onclick="fetchProductsFromTelegram()"><i class="fab fa-telegram"></i> جلب</button>
        <button class="nav-btn nav-btn-gold" onclick="openAddProductModal()"><i class="fas fa-plus"></i> إضافة</button>
        <button class="nav-btn nav-btn-outline" id="adminToggleBtn" onclick="toggleAdminMode()"><i class="fas fa-user-shield"></i> مدير</button>
    </div>
</div>

<div class="container">
    <!-- ========== شريط التبويبات ========== -->
    <div class="tabs-bar">
        <button class="tab-btn active" onclick="showTab('products')"><i class="fas fa-cube"></i> المنتجات</button>
        <button class="tab-btn" onclick="showTab('inventory')"><i class="fas fa-warehouse"></i> المخزون</button>
        <button class="tab-btn" onclick="showTab('stockLog')"><i class="fas fa-history"></i> السجل</button>
        <button class="tab-btn" onclick="showTab('orders')"><i class="fas fa-truck"></i> الطلبات</button>
    </div>

    <!-- ========== بطاقة معلومات المتجر ========== -->
    <div class="store-card">
        <div class="store-info">
            <div class="store-item"><i class="fas fa-store"></i><div><strong id="currentStoreName">---</strong></div></div>
            <div class="store-item"><i class="fas fa-id-card"></i><div><strong>معرف المتجر:</strong> <span id="currentStoreID" style="font-family: monospace;">---</span></div></div>
            <div class="store-item"><i class="fas fa-cube"></i><div><strong>منتجاتي:</strong> <span id="storeProductCount">0</span></div></div>
        </div>
        <div class="stats-badges">
            <div class="stat-badge"><div class="number" id="statTotal">0</div><div class="label">المنتجات</div></div>

    <!-- ========== شريط الأدوات ========== -->
    <div class="toolbar">

    <div id="productsTab" class="tab-content">

    <div id="inventoryTab" class="tab-content" style="display: none;">

                        <th>المنتج</th><th>المعرف المركب</th><th>معرف المتجر</th><th>السعر</th><th>المخزون</th><th>الحالة</th><th>المصدر</th><th>الإجراءات</th>

        <div class="table-container">

                    <tr>
                        <th>رقم الطلب</th><th>التاريخ</th><th>العميل</th><th>المنتج</th><th>الكمية</th><th>السعر</th><th>الإجمالي</th><th>الإجراءات</th>

</div>

<!-- ========== مودال إضافة منتج ========== -->
<div id="addProductModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2><i class="fas fa-gem"></i> منتج جديد</h2>
            <button class="modal-close" onclick="closeAddProductModal()">&times;</button>
        </div>
        <form onsubmit="event.preventDefault();">
            <div class="form-group"><label>اسم المنتج *</label><input type="text" id="productName" required placeholder="مثال: زعفران فاخر"></div>
            <div class="form-group"><label>الوصف</label><textarea id="productDesc" rows="2" placeholder="وصف المنتج..."></textarea></div>
            <div class="form-group"><label>السعر (دج) *</label><input type="number" id="productPrice" required min="0"></div>
            <div class="form-group"><label>الكمية الأولية *</label><input type="number" id="productQty" required min="0"></div>
            <div class="form-group"><label>القسم</label><select id="productCategory"><option>توابل</option><option>عطور</option><option>منتجات طبيعية</option><option>هدايا</option><option>أخرى</option></select></div>
            <div class="form-group"><label>صور المنتج</label><input type="file" id="productImages" multiple accept="image/*" onchange="previewImages(this)"><div id="imagePreview" style="display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px;"></div></div>
            <div style="display: flex; gap: 12px; margin-top: 20px;">
                <button type="button" class="btn btn-outline" onclick="saveProductOnly()" style="flex:1;">حفظ فقط</button>
                <button type="button" class="btn btn-gold" onclick="saveAndPublishProduct()" style="flex:1;"><i class="fab fa-telegram"></i> حفظ ونشر</button>
            </div>

    </div>
</div>

<!-- ========== مودال تعديل المخزون ========== -->
<div id="editStockModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>تعديل المخزون</h2>
            <button class="modal-close" onclick="closeEditStockModal()">&times;</button>
        </div>
        <form onsubmit="event.preventDefault(); updateStock();">
            <div class="form-group"><label>المنتج</label><input type="text" id="editProductName" disabled></div>
            <div class="form-group"><label>معرف المنتج</label><input type="text" id="editProductID" disabled></div>
            <div class="form-group"><label>الكمية الحالية</label><input type="text" id="editCurrentQty" disabled></div>
            <div class="form-group"><label>نوع العملية</label><select id="stockOperation"><option value="add">➕ إضافة</option><option value="remove">➖ سحب</option><option value="set">📝 تعيين</option></select></div>
            <div class="form-group"><label>الكمية</label><input type="number" id="editNewQty" required min="0"></div>
            <div class="form-group"><label>السبب</label><input type="text" id="stockReason" placeholder="مثال: جرد شهري"></div>
            <button type="submit" class="btn btn-gold" style="width:100%">تحديث المخزون</button>
        </form>
    </div>
</div>

<script>
    // ===================== إعدادات تلغرام =====================
    const TELEGRAM = {
        botToken: '8576673096:AAGvSMjzwVWj6wJ47JdqiDwcObXjBDcyiLA',
        channelId: '-1003822964890',
        apiUrl: 'https://api.telegram.org/bot'
    };

    let products = JSON.parse(localStorage.getItem('nardo_products') || '[]');
    let orders = JSON.parse(localStorage.getItem('nardo_orders') || '[]');
    let stockLog = JSON.parse(localStorage.getItem('nardo_stock_log') || '[]');
    let currentStore = null;
    let editProductId = null;
    let isAdminMode = false;
    let filterMode = 'current';
    let currentImages = [];

    // ========== إنشاء معرف المتجر ==========
    function generateStoreID(storeName) {
        let cleanName = storeName.replace(/[^a-zA-Z0-9\u0600-\u06FF]/g, '').substring(0, 8).toUpperCase();
        if (cleanName.length === 0) cleanName = 'متجري';
        return `${cleanName}-${Math.floor(Math.random() * 900000 + 100000)}`;
    }

    function getOrCreateStoreID(store) {
        if (store.storeFixedID) return store.storeFixedID;
        store.storeFixedID = generateStoreID(store.storeName || store.name || 'ناردو ماركت');
        return store.storeFixedID;
    }

    function getNextProductSerial(storeID) {
        const storeProducts = products.filter(p => p.storeID === storeID);
        return (storeProducts.length + 1).toString().padStart(3, '0');
    }

    function generateProductCompositeID(storeID, serial) {
        return `${storeID}-${serial}`;
    }

    // ========== تحميل بيانات المتجر الحالي ==========
    function loadCurrentStore() {
        let stored = localStorage.getItem('current_store');
        if(stored) { 
            currentStore = JSON.parse(stored); 
        } else {
            currentStore = {
                id: Date.now(),
                name: 'ناردو ماركت',
                storeName: 'ناردو ماركت',
                phone: '0555123456',
                address: 'الجزائر'
            };
        }
        getOrCreateStoreID(currentStore);
        localStorage.setItem('current_store', JSON.stringify(currentStore));
        
        document.getElementById('currentStoreName').innerHTML = currentStore.storeName;
        document.getElementById('currentStoreID').innerHTML = currentStore.storeFixedID;
        document.getElementById('circleStoreName').innerHTML = currentStore.storeName.length > 12 ? currentStore.storeName.substring(0,10)+'..' : currentStore.storeName;
        
        updateStoreProductCount();
    }

    function updateStoreProductCount() {
        const storeProducts = products.filter(p => p.storeID === currentStore.storeFixedID);
        document.getElementById('storeProductCount').innerHTML = storeProducts.length;
    }

    function showStoreInfo() {
        alert(`🏪 ${currentStore.storeName}\n🆔 معرف المتجر: ${currentStore.storeFixedID}\n📞 هاتف: ${currentStore.phone || 'غير مسجل'}\n📍 العنوان: ${currentStore.address || 'غير مسجل'}`);
    }

    // ========== جلب المنتجات من تلغرام ==========
    async function fetchProductsFromTelegram() {
        try {
            updateSyncStatus('جاري الجلب...', 'fa-spin fa-sync-alt');
            
            const response = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getUpdates?limit=100`);
            const data = await response.json();
            
            if (!data.ok) throw new Error('فشل الاتصال');
            
            let newProductsCount = 0;
            
            for (const update of data.result || []) {
                const post = update.channel_post || update.message;
                if (!post || !post.photo) continue;
                
                const caption = post.caption || '';
                let name = 'منتج', price = 1000, category = 'أخرى', stock = 10, storeID = '', storeName = '', productCompositeID = '', description = '';
                
                caption.split('\n').forEach(line => {
                    if (line.includes('المنتج:')) name = line.split(':')[1]?.trim() || name;
                    if (line.includes('السعر:')) price = parseInt(line.split(':')[1]) || price;
                    if (line.includes('القسم:')) category = line.split(':')[1]?.trim() || category;
                    if (line.includes('الكمية:')) stock = parseInt(line.split(':')[1]) || stock;
                    if (line.includes('معرف المتجر:')) storeID = line.split(':')[1]?.trim() || storeID;
                    if (line.includes('المتجر:')) storeName = line.split(':')[1]?.trim() || storeName;
                    if (line.includes('معرف المنتج:')) productCompositeID = line.split(':')[1]?.trim() || productCompositeID;
                    if (line.includes('الوصف:')) description = line.split(':')[1]?.trim() || description;
                });
                
                if (!storeID && productCompositeID) {
                    const parts = productCompositeID.split('-');
                    storeID = parts.slice(0, 2).join('-');
                }
                
                let images = ["https://via.placeholder.com/300/ffd700/000000?text=منتج"];
                if (post.photo) {
                    const fileId = post.photo[post.photo.length - 1].file_id;
                    const fileRes = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getFile?file_id=${fileId}`);
                    const fileData = await fileRes.json();
                    if (fileData.ok) {
                        images = [`https://api.telegram.org/file/bot${TELEGRAM.botToken}/${fileData.result.file_path}`];
                    }
                }
                
                const exists = products.some(p => p.telegramId === post.message_id);
                if (!exists) {
                    products.push({
                        id: Date.now() + Math.random(),
                        telegramId: post.message_id,
                        name: name,
                        price: price,
                        category: category,
                        quantity: stock,
                        storeID: storeID,
                        storeName: storeName,
                        productCompositeID: productCompositeID,
                        description: description,
                        images: images,
                        source: 'telegram',
                        published: true,
                        createdAt: new Date().toISOString()
                    });
                    newProductsCount++;
                }
            }
            
            localStorage.setItem('nardo_products', JSON.stringify(products));
            renderAll();
            updateSyncStatus(`تم جلب ${newProductsCount} منتج`, 'fa-check-circle');
            showToast(`✅ تم جلب ${newProductsCount} منتج جديد`, 'success');
            
        } catch (error) {
            console.error(error);
            updateSyncStatus('فشل الاتصال', 'fa-exclamation-circle');
            showToast('❌ فشل الاتصال بتلغرام', 'error');
        }
    }

    async function fetchMyStoreProductsOnly() {
        if (!currentStore?.storeFixedID) {
            showToast('❌ لا يوجد متجر محدد', 'error');
            return;
        }
        await fetchProductsFromTelegram();
        showToast(`✅ تم تحديث منتجات متجر ${currentStore.storeName}`, 'success');
    }

    function updateSyncStatus(message, iconClass) {
        const el = document.getElementById('syncStatus');
        if (el) el.innerHTML = `<i class="fas ${iconClass}"></i><span>${message}</span>`;
    }

    function findProductById() {
        const id = prompt('🔍 أدخل معرف المنتج المركب (مثال: متجري-582394-001):');
        if (!id) return;
        const product = products.find(p => p.productCompositeID === id);
        if (product) {
            alert(`✅ المنتج موجود:\n📦 ${product.name}\n💰 ${product.price} دج\n🏪 ${product.storeName}\n📦 المخزون: ${product.quantity}`);
        } else {
            showToast('❌ لا يوجد منتج بهذا المعرف', 'error');
        }
    }

    // ========== إدارة المنتجات ==========
    function saveProductOnly() {
        const name = document.getElementById('productName').value.trim();
        const price = parseInt(document.getElementById('productPrice').value);
        const quantity = parseInt(document.getElementById('productQty').value);
        
        if (!name || isNaN(price) || isNaN(quantity)) {
            showToast('يرجى ملء الحقول الأساسية', 'error');
            return;
        }
        
        const storeID = getOrCreateStoreID(currentStore);
        const serial = getNextProductSerial(storeID);
        const compositeID = generateProductCompositeID(storeID, serial);
        
        const newProduct = {
            id: Date.now(),
            storeID: storeID,
            storeName: currentStore.storeName,
            productCompositeID: compositeID,
            serialNumber: serial,
            name: name,
            price: price,
            quantity: quantity,
            description: document.getElementById('productDesc').value,
            category: document.getElementById('productCategory').value,
            images: [...currentImages],
            createdAt: new Date().toISOString(),
            published: false,
            source: 'local'
        };
        
        products.push(newProduct);
        localStorage.setItem('nardo_products', JSON.stringify(products));
        addStockLog(newProduct.id, newProduct.name, 'add', quantity, 0, quantity, 'إنشاء منتج جديد', newProduct.storeID);
        renderAll();
        closeAddProductModal();
        showToast(`✅ تم حفظ المنتج "${name}" - المعرف: ${compositeID}`, 'success');
    }

    async function saveAndPublishProduct() {
        const name = document.getElementById('productName').value.trim();
        const price = parseInt(document.getElementById('productPrice').value);
        const quantity = parseInt(document.getElementById('productQty').value);
        
        if (!name || isNaN(price) || isNaN(quantity)) {
            showToast('بيانات غير مكتملة', 'error');
            return;
        }
        
        const imageInput = document.getElementById('productImages');
        if (!imageInput.files || imageInput.files.length === 0) {
            showToast('⚠️ النشر يتطلب صورة واحدة على الأقل', 'warning');
            return;
        }
        
        const storeID = getOrCreateStoreID(currentStore);
        const serial = getNextProductSerial(storeID);
        const compositeID = generateProductCompositeID(storeID, serial);
        
        const newProduct = {
            id: Date.now(),
            storeID: storeID,
            storeName: currentStore.storeName,
            productCompositeID: compositeID,
            serialNumber: serial,
            name: name,
            price: price,
            quantity: quantity,
            description: document.getElementById('productDesc').value,
            category: document.getElementById('productCategory').value,
            images: [...currentImages],
            createdAt: new Date().toISOString(),
            published: false,
            source: 'local'
        };
        
        try {
            const imageFile = imageInput.files[0];
            const caption = `🟣 *منتج جديد في ناردو برو*\n━━━━━━━━━━━━━━━━━━\n📦 *المنتج:* ${name}\n💰 *السعر:* ${price.toLocaleString()} دج\n🏷️ *القسم:* ${newProduct.category}\n📊 *الكمية:* ${quantity}\n🆔 *معرف المنتج:* \`${compositeID}\`\n🏪 *المتجر:* ${currentStore.storeName}\n🆔 *معرف المتجر:* \`${storeID}\``;
            
            const formData = new FormData();
            formData.append('chat_id', TELEGRAM.channelId);
            formData.append('photo', imageFile);
            formData.append('caption', caption);
            formData.append('parse_mode', 'Markdown');
            
            const response = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/sendPhoto`, { method: 'POST', body: formData });
            const data = await response.json();
            
            if (data.ok) {
                newProduct.published = true;
                newProduct.telegramId = data.result.message_id;
                showToast('✅ تم النشر بنجاح', 'success');
            } else {
                throw new Error('فشل النشر');
            }
        } catch (e) {
            showToast('⚠️ فشل النشر، تم الحفظ محلياً', 'warning');
        }
        
        products.push(newProduct);
        localStorage.setItem('nardo_products', JSON.stringify(products));
        addStockLog(newProduct.id, newProduct.name, 'add', quantity, 0, quantity, 'نشر فوري', newProduct.storeID);
        renderAll();
        closeAddProductModal();
    }

    function deleteProduct(id) {
        if (confirm('هل أنت متأكد من حذف هذا المنتج نهائياً؟')) {
            products = products.filter(p => p.id !== id);
            localStorage.setItem('nardo_products', JSON.stringify(products));
            renderAll();
            showToast('تم حذف المنتج بنجاح', 'success');
        }
    }

    function viewProductImages(id) {
        const p = products.find(x => x.id === id);
        if (p?.images?.length) {
            let msg = "📸 صور المنتج: " + p.name + "\n\n";
            p.images.forEach((img, idx) => { msg += `${idx+1}. ${img}\n`; });
            alert(msg);
        }
    }

    // ========== المخزون والسجل ==========
    function addStockLog(pid, pname, op, qty, oldQ, newQ, reason = '', storeID = '') {
        stockLog.unshift({
            id: Date.now(),
            productId: pid,
            productName: pname,
            operation: op,
            quantity: qty,
            oldQty: oldQ,
            newQty: newQ,
            reason: reason,
            storeID: storeID || currentStore.storeFixedID,
            date: new Date().toLocaleString('ar-EG')
        });
        if (stockLog.length > 500) stockLog = stockLog.slice(0, 500);
        localStorage.setItem('nardo_stock_log', JSON.stringify(stockLog));
    }

    function updateStock() {
        const p = products.find(p => p.id === editProductId);
        if (!p) return;
        
        const op = document.getElementById('stockOperation').value;
        const qtyVal = parseInt(document.getElementById('editNewQty').value);
        const reason = document.getElementById('stockReason').value;
        
        if (isNaN(qtyVal) || qtyVal < 0) {
            showToast('كمية غير صالحة', 'error');
            return;
        }
        
        let oldQ = p.quantity;
        let newQ = oldQ;
        
        if (op === 'add') {
            newQ = oldQ + qtyVal;
            addStockLog(p.id, p.name, 'add', qtyVal, oldQ, newQ, reason || 'إضافة', p.storeID);
            showToast(`➕ تمت إضافة ${qtyVal}`, 'success');
        } else if (op === 'remove') {
            if (qtyVal > oldQ) {
                showToast('الكمية أكبر من المخزون', 'error');
                return;
            }
            newQ = oldQ - qtyVal;
            addStockLog(p.id, p.name, 'remove', qtyVal, oldQ, newQ, reason || 'سحب', p.storeID);
            showToast(`➖ تم سحب ${qtyVal}`, 'success');
        } else if (op === 'set') {
            newQ = qtyVal;
            addStockLog(p.id, p.name, 'set', Math.abs(newQ - oldQ), oldQ, newQ, reason || `تعيين إلى ${newQ}`, p.storeID);
            showToast(`📝 تم التعيين`, 'success');
        }
        
        p.quantity = newQ;
        localStorage.setItem('nardo_products', JSON.stringify(products));
        renderAll();
        closeEditStockModal();
    }

    function openEditStockModal(id) {
        editProductId = id;
        const p = products.find(p => p.id === id);
        if (p) {
            document.getElementById('editProductName').value = p.name;
            document.getElementById('editProductID').value = p.productCompositeID;
            document.getElementById('editCurrentQty').value = p.quantity;
            document.getElementById('editNewQty').value = 0;
            document.getElementById('stockOperation').value = 'add';
            document.getElementById('stockReason').value = '';
            document.getElementById('editStockModal').classList.add('active');
        }
    }

    function closeEditStockModal() {
        document.getElementById('editStockModal').classList.remove('active');
        editProductId = null;
    }

    function clearStockLog() {
        if (confirm('هل أنت متأكد من مسح سجل المخزون؟')) {
            stockLog = [];
            localStorage.setItem('nardo_stock_log', '[]');
            renderStockLog();
            showToast('تم مسح السجل', 'success');
        }
    }

    // ========== الطلبات ==========
    function quickOrder(productId) {
        const p = products.find(p => p.id === productId);
        if (!p || p.quantity <= 0) {
            showToast('المنتج غير متوفر', 'error');
            return;
        }
        
        const qty = prompt(`الكمية المطلوبة من "${p.name}" (المتاح: ${p.quantity})`, "1");
        if (!qty) return;
        
        let qtyInt = parseInt(qty);
        if (isNaN(qtyInt) || qtyInt <= 0 || qtyInt > p.quantity) {
            showToast('كمية غير صالحة', 'error');
            return;
        }
        
        const total = p.price * qtyInt;
        const newOrder = {
            id: Date.now(),
            date: new Date().toLocaleString('ar-EG'),
            customerName: 'طلب مباشر (من المتجر)',
            customerPhone: '',
            storeID: p.storeID,
            storeName: p.storeName,
            items: [{ id: p.id, name: p.name, price: p.price, quantity: qtyInt }],
            total: total
        };
        
        orders.unshift(newOrder);
        p.quantity -= qtyInt;
        
        localStorage.setItem('nardo_orders', JSON.stringify(orders));
        localStorage.setItem('nardo_products', JSON.stringify(products));
        addStockLog(p.id, p.name, 'remove', qtyInt, p.quantity + qtyInt, p.quantity, 'طلب مباشر', p.storeID);
        
        renderAll();
        showToast(`✅ تم إنشاء الطلب #${newOrder.id}`, 'success');
    }

    function clearOrders() {
        if (confirm('هل أنت متأكد من مسح جميع الطلبات؟')) {
            localStorage.setItem('nardo_orders', '[]');
            orders = [];
            renderOrders();
            updateStats();
            showToast('تم مسح جميع الطلبات', 'success');
        }
    }

    function exportOrderToPDF(orderId) {
        const order = orders.find(o => o.id === orderId);
        if (!order) return;
        
        showToast('جاري تحضير ملف PDF...', 'info');
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ orientation: 'p', unit: 'mm', format: 'a4' });
        
        doc.setFont("helvetica");
        doc.setFontSize(18);
        doc.text(`فاتورة طلب #${order.id}`, 105, 20, { align: "center" });
        doc.setFontSize(12);
        doc.text(`التاريخ: ${order.date}`, 20, 40);
        doc.text(`العميل: ${order.customerName}`, 20, 50);
        
        let y = 70;
        order.items.forEach((item, idx) => {
            doc.text(`${idx+1}. ${item.name}`, 20, y);
            doc.text(`الكمية: ${item.quantity}`, 140, y);
            doc.text(`السعر: ${(item.price * item.quantity).toLocaleString()} دج`, 180, y, { align: "right" });
            y += 10;
        });
        
        doc.setFontSize(14);
        doc.text(`الإجمالي الكلي: ${order.total.toLocaleString()} دج`, 180, y + 10, { align: "right" });
        doc.save(`Order_${order.id}.pdf`);
        showToast('✅ تم تحميل PDF', 'success');
    }

    // ========== عرض البيانات ==========
    function renderProducts() {
        const search = document.getElementById('searchProducts')?.value.toLowerCase() || '';
        let filtered = products;
        
        if (!isAdminMode) {
            filtered = filtered.filter(p => p.published === true);
        }
        if (filterMode === 'current') {
            filtered = filtered.filter(p => p.storeID === currentStore.storeFixedID);
        }
        filtered = filtered.filter(p => 
            p.name.toLowerCase().includes(search) || 
            (p.productCompositeID && p.productCompositeID.toLowerCase().includes(search))
        );
        
        const container = document.getElementById('productsGrid');
        if (!filtered.length) {
            container.innerHTML = '<div style="text-align:center; padding:60px; background:rgba(0,0,0,0.2); border-radius:28px;"><i class="fas fa-box-open fa-3x" style="margin-bottom:15px; color:var(--text-secondary);"></i><p>لا توجد منتجات</p><button class="btn btn-telegram mt-3" onclick="fetchProductsFromTelegram()" style="margin-top:15px;"><i class="fab fa-telegram"></i> جلب من تلغرام</button></div>';
            return;
        }
        
        container.innerHTML = filtered.map(p => {
            const stockClass = p.quantity > 10 ? 'high' : (p.quantity > 0 ? 'low' : 'out');
            const stockText = p.quantity > 10 ? 'متوفر بكثرة' : (p.quantity > 0 ? `مخزون محدود (${p.quantity})` : 'غير متوفر');
            const imagesHtml = p.images?.length ? 
                `<div class="product-images">${p.images.slice(0, 3).map(img => `<img src="${img}" onclick="viewProductImages(${p.id})">`).join('')}${p.images.length > 3 ? `<div style="width:75px;height:75px;background:rgba(0,0,0,0.5);border-radius:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid rgba(255,215,0,0.3);" onclick="viewProductImages(${p.id})"><i class="fas fa-ellipsis-h"></i> +${p.images.length-3}</div>` : ''}</div>` : 
                `<div style="padding:15px;text-align:center;"><i class="fas fa-image fa-2x" style="color:var(--text-secondary);"></i></div>`;
            
            return `
                <div class="product-card">
                    <div class="product-id-badge">📦 ${p.productCompositeID || '---'}</div>
                    ${imagesHtml}
                    <div class="product-name">${p.name}</div>
                    <div class="product-price">${p.price.toLocaleString()} دج</div>
                    <div><span class="stock-status ${stockClass}"><i class="fas ${p.quantity>0?'fa-check-circle':'fa-times-circle'}"></i> ${stockText}</span></div>
                    <div class="product-actions">
                        <button class="btn btn-gold btn-sm" onclick="quickOrder(${p.id})"><i class="fas fa-shopping-bag"></i> طلب</button>
                        ${isAdminMode ? `
                            <button class="btn btn-info btn-sm" onclick="openEditStockModal(${p.id})"><i class="fas fa-edit"></i> تعديل</button>
                            <button class="btn btn-outline btn-sm" onclick="deleteProduct(${p.id})"><i class="fas fa-trash-alt"></i> حذف</button>
                        ` : ''}
                    </div>
                </div>
            `;
        }).join('');
    }

    function renderInventory() {
        const tbody = document.getElementById('inventoryTable');
        let filtered = isAdminMode ? products : products.filter(p => p.storeID === currentStore.storeFixedID);
        
        if (!filtered.length) {
            tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:40px;"><i class="fas fa-box-open fa-2x"></i><p>لا توجد منتجات</p></td></tr>';
            return;
        }
        
        tbody.innerHTML = filtered.map(p => {
            const stockStatus = p.quantity > 0 ? 'high' : 'out';
            const sourceBadge = p.source === 'telegram' ? 
                `<span class="badge-telegram"><i class="fab fa-telegram"></i> تلغرام</span>` : 
                `<span class="badge-local"><i class="fas fa-database"></i> محلي</span>`;
            
            return `
                <tr>
                    <td><strong>${p.name}</strong></td>
                    <td><span style="font-family:monospace; font-size:12px; background:rgba(255,215,0,0.1); padding:4px 8px; border-radius:12px;">${p.productCompositeID || '---'}</span></td>
                    <td><span style="font-family:monospace; font-size:11px;">${p.storeID || '---'}</span></td>
                    <td style="color:var(--success); font-weight:bold;">${p.price.toLocaleString()} دج</td>
                    <td style="font-weight:800;">${p.quantity}</td>
                    <td><span class="stock-status ${stockStatus}">${p.quantity > 0 ? 'متاح' : 'نفد'}</span></td>
                    <td>${sourceBadge}</td>
                    <td>
                        <button class="btn btn-info btn-sm" onclick="openEditStockModal(${p.id})"><i class="fas fa-edit"></i></button>
                        <button class="btn btn-outline btn-sm" onclick="deleteProduct(${p.id})"><i class="fas fa-trash-alt"></i></button>
                    </td>
                </tr>
            `;
        }).join('');
    }

    function renderStockLog() {
        const container = document.getElementById('stockLogContainer');
        let filtered = isAdminMode ? stockLog : stockLog.filter(l => l.storeID === currentStore.storeFixedID);
        
        if (!filtered.length) {
            container.innerHTML = '<div style="text-align:center; padding:40px;"><i class="fas fa-history fa-2x"></i><p>لا توجد حركات مخزون</p></div>';
            return;
        }
        
        container.innerHTML = filtered.map(l => `
            <div class="stock-log-item">
                <div>
                    <strong style="color:var(--gold);">${l.productName}</strong><br>
                    <span style="font-size:12px;">${l.operation === 'add' ? '➕ إضافة' : (l.operation === 'remove' ? '➖ سحب' : '📝 تعيين')} ${l.quantity} | من ${l.oldQty} → ${l.newQty}</span>
                    ${l.reason ? `<br><span style="font-size:11px; color:var(--text-secondary);">📌 ${l.reason}</span>` : ''}
                </div>
                <div style="font-size:11px; color:var(--text-secondary);">${l.date}</div>
            </div>
        `).join('');
    }

    function renderOrders() {
        const tbody = document.getElementById('ordersTable');
        let filtered = isAdminMode ? orders : orders.filter(o => o.storeID === currentStore.storeFixedID);
        
        if (!filtered.length) {
            tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:40px;"><i class="fas fa-shopping-cart fa-2x"></i><p>لا توجد طلبات</p></td></tr>';
            return;
        }
        
        let rows = '';
        filtered.forEach(order => {
            order.items.forEach((item, idx) => {
                rows += `
                    <tr>
                        ${idx === 0 ? `<td rowspan="${order.items.length}" style="vertical-align:middle;"><strong>#${order.id}</strong></td>
                        <td rowspan="${order.items.length}" style="vertical-align:middle;">${order.date}</td>
                        <td rowspan="${order.items.length}" style="vertical-align:middle;">${order.customerName}</td>` : ''}
                        <td>${item.name}</td>
                        <td>${item.quantity}</td>
                        <td>${item.price.toLocaleString()} دج</td>
                        <td>${(item.price * item.quantity).toLocaleString()} دج</td>
                        ${idx === 0 ? `<td rowspan="${order.items.length}" style="vertical-align:middle;">
                            <button class="btn btn-info btn-sm" onclick="exportOrderToPDF(${order.id})"><i class="fas fa-file-pdf"></i> PDF</button>
                        </td>` : ''}
                    </tr>
                `;
            });
        });
        
        tbody.innerHTML = rows;
    }

    function updateStats() {
        const totalProducts = isAdminMode ? products.length : products.filter(p => p.storeID === currentStore.storeFixedID).length;
        const totalOrders = isAdminMode ? orders.length : orders.filter(o => o.storeID === currentStore.storeFixedID).length;
        document.getElementById('statTotal').innerText = totalProducts;
        document.getElementById('statOrders').innerText = totalOrders;
        updateStoreProductCount();
    }

    function showToast(msg, type) {
        const t = document.createElement('div');
        t.className = `toast ${type}`;
        t.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : (type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle')}"></i> ${msg}`;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }

    function showTab(tabName) {
        document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
        document.getElementById(tabName + 'Tab').style.display = 'block';
        
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        
        if (tabName === 'products') renderProducts();
        if (tabName === 'inventory') renderInventory();
        if (tabName === 'stockLog') renderStockLog();
        if (tabName === 'orders') renderOrders();
    }

    function toggleAdminMode() {
        isAdminMode = !isAdminMode;
        const btn = document.getElementById('adminToggleBtn');
        if (isAdminMode) {
            btn.innerHTML = '<i class="fas fa-user"></i> زبون';
            btn.style.background = 'rgba(74,222,128,0.15)';
            btn.style.borderColor = 'var(--success)';
            btn.style.color = 'var(--success)';
            showToast('🔐 وضع المدير: تظهر جميع البيانات من جميع المتاجر', 'info');
        } else {
            btn.innerHTML = '<i class="fas fa-user-shield"></i> مدير';
            btn.style.background = 'transparent';
            btn.style.borderColor = 'rgba(255,215,0,0.3)';
            btn.style.color = 'var(--gold)';
            showToast('👤 وضع الزبون: تظهر بيانات متجرك فقط', 'info');
        }
        renderAll();
    }

    function filterByStore() {
        filterMode = document.getElementById('storeFilterSelect').value;
        renderProducts();
        renderInventory();
        renderStockLog();
        renderOrders();
        const filterText = filterMode === 'current' ? 'المتجر الحالي فقط' : 'جميع المتاجر';
        showToast(`تم التصفية: ${filterText}`, 'info');
    }

    function openAddProductModal() {
        document.getElementById('addProductModal').classList.add('active');
        currentImages = [];
        document.getElementById('imagePreview').innerHTML = '';
        document.getElementById('productImages').value = '';
        document.getElementById('productName').value = '';
        document.getElementById('productDesc').value = '';
        document.getElementById('productPrice').value = '';
        document.getElementById('productQty').value = '';
    }

    function closeAddProductModal() {
        document.getElementById('addProductModal').classList.remove('active');
    }

    function previewImages(input) {
        const preview = document.getElementById('imagePreview');
        preview.innerHTML = '';
        currentImages = [];
        
        for (let i = 0; i < input.files.length; i++) {
            const file = input.files[i];
            const reader = new FileReader();
            reader.onload = e => {
                currentImages.push(e.target.result);
                const div = document.createElement('div');
                div.style.position = 'relative';
                div.style.display = 'inline-block';
                div.innerHTML = `<img src="${e.target.result}" style="width:70px; height:70px; border-radius:12px; border:1px solid var(--gold);"><span onclick="removeImage(${currentImages.length-1})" style="position:absolute; top:-5px; right:-5px; background:var(--error); border-radius:50%; width:20px; height:20px; display:flex; align-items:center; justify-content:center; font-size:12px; cursor:pointer;">×</span>`;
                preview.appendChild(div);
            };
            reader.readAsDataURL(file);
        }
    }

    function removeImage(idx) {
        currentImages.splice(idx, 1);
        const preview = document.getElementById('imagePreview');
        if (preview) preview.innerHTML = '';
        currentImages.forEach((img, i) => {
            const div = document.createElement('div');
            div.style.position = 'relative';
            div.style.display = 'inline-block';
            div.innerHTML = `<img src="${img}" style="width:70px; height:70px; border-radius:12px; border:1px solid var(--gold);"><span onclick="removeImage(${i})" style="position:absolute; top:-5px; right:-5px; background:var(--error); border-radius:50%; width:20px; height:20px; display:flex; align-items:center; justify-content:center; font-size:12px; cursor:pointer;">×</span>`;
            preview.appendChild(div);
        });
    }

    function renderAll() {
        renderProducts();
        renderInventory();
        renderStockLog();
        renderOrders();
        updateStats();
    }

    // ========== الأحداث ==========
    document.addEventListener('DOMContentLoaded', () => {
        loadCurrentStore();
        renderAll();
        document.getElementById('searchProducts')?.addEventListener('input', renderProducts);
        
        window.addEventListener('storage', (e) => {
            if (e.key === 'nardo_orders') {
                orders = JSON.parse(e.newValue || '[]');
                renderOrders();
                updateStats();
            } else if (e.key === 'nardo_products') {
                products = JSON.parse(e.newValue || '[]');
                renderAll();
            }
        });
        
        console.log('✅ النظام جاهز - معرف المتجر:', currentStore?.storeFixedID);
    });
</script>
</body>
</html>
