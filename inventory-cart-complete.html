<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ناردو برو | متجر احترافي متكامل</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0a0a1a;
            --secondary: #1a1a2e;
            --gold: #ffd700;
            --gold-dark: #daa520;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --glass: rgba(255, 255, 255, 0.06);
            --success: #4ade80;
            --error: #f87171;
            --warning: #fbbf24;
            --info: #60a5fa;
            --purple: #a855f7;
            --dark-card: #0f0f1a;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0b0b14, #15152a);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* هيدر احترافي */
        .header {
            background: linear-gradient(135deg, rgba(255,215,0,0.12), rgba(0,0,0,0.4));
            border: 1px solid rgba(255,215,0,0.25);
            border-radius: 28px;
            padding: 20px 30px;
            margin-bottom: 35px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo i {
            font-size: 48px;
            color: var(--gold);
            filter: drop-shadow(0 0 6px rgba(255,215,0,0.4));
            animation: softPulse 3s infinite;
        }

        @keyframes softPulse {
            0%, 100% { transform: scale(1); text-shadow: 0 0 0px gold; }
            50% { transform: scale(1.02); text-shadow: 0 0 8px rgba(255,215,0,0.6); }
        }

        .logo h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffd700, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo p {
            font-size: 12px;
            color: #ccc;
        }

        .stats {
            display: flex;
            gap: 18px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(8px);
            padding: 12px 22px;
            border-radius: 20px;
            text-align: center;
            transition: all 0.25s;
            border: 1px solid rgba(255,215,0,0.2);
        }

        .stat-card:hover {
            transform: translateY(-3px);
            border-color: var(--gold);
            background: rgba(255,215,0,0.1);
        }

        .stat-card i {
            font-size: 26px;
            color: var(--gold);
            margin-bottom: 6px;
        }

        .stat-card .number {
            font-size: 24px;
            font-weight: 800;
        }

        .stat-card .label {
            font-size: 12px;
            color: #aaa;
        }

        /* أزرار أنيقة */
        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s ease;
            font-family: 'Cairo', sans-serif;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-gold {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: #111;
            box-shadow: 0 4px 12px rgba(255,215,0,0.2);
        }

        .btn-gold:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 22px rgba(255,215,0,0.35);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--gold);
        }

        .btn-outline:hover {
            background: rgba(255,215,0,0.12);
            transform: translateY(-2px);
        }

        .btn-danger {
            background: rgba(248,113,113,0.2);
            border: 1px solid var(--error);
            color: var(--error);
        }

        .btn-danger:hover {
            background: var(--error);
            color: white;
        }

        .btn-info {
            background: rgba(96,165,250,0.2);
            border: 1px solid var(--info);
            color: var(--info);
        }

        .btn-info:hover {
            background: var(--info);
            color: white;
        }

        .btn-purple {
            background: linear-gradient(135deg, var(--purple), #7e22ce);
            color: white;
        }

        /* تبويبات رئيسية */
        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            border-bottom: 1px solid rgba(255,215,0,0.25);
            padding-bottom: 8px;
        }

        .tab {
            padding: 12px 28px;
            background: transparent;
            border: none;
            color: #ccc;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            border-radius: 40px;
            transition: 0.2s;
        }

        .tab.active {
            background: linear-gradient(135deg, var(--gold), #e6b800);
            color: #0a0a1a;
            box-shadow: 0 4px 12px rgba(255,215,0,0.3);
        }

        .tab:hover:not(.active) {
            color: var(--gold);
            background: rgba(255,215,0,0.08);
        }

        /* بطاقات المنتجات - احترافية */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
            gap: 28px;
        }

        .product-card {
            background: linear-gradient(145deg, rgba(25,25,45,0.9), rgba(15,15,30,0.95));
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 28px;
            padding: 22px;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            position: relative;
            overflow: hidden;
        }

        .product-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--gold), #ffb347);
            transform: scaleX(0);
            transition: transform 0.4s;
        }

        .product-card:hover::after {
            transform: scaleX(1);
        }

        .product-card:hover {
            transform: translateY(-8px);
            border-color: rgba(255,215,0,0.6);
            box-shadow: 0 25px 35px -12px rgba(0,0,0,0.5);
        }

        .product-images {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            margin-bottom: 18px;
            padding-bottom: 8px;
        }

        .product-images img {
            width: 85px;
            height: 85px;
            object-fit: cover;
            border-radius: 18px;
            border: 2px solid var(--gold);
            cursor: pointer;
            transition: 0.2s;
        }

        .product-images img:hover {
            transform: scale(1.05);
            border-color: #fff0a3;
        }

        .product-icon {
            width: 85px;
            height: 85px;
            background: rgba(255,215,0,0.12);
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }

        .product-icon i {
            font-size: 45px;
            color: var(--gold);
        }

        .product-name {
            font-size: 22px;
            font-weight: 800;
            color: var(--gold);
            margin-bottom: 8px;
        }

        .product-price {
            font-size: 26px;
            font-weight: 800;
            color: var(--success);
            margin: 10px 0;
        }

        .stock-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
            margin: 10px 0;
        }

        .stock-high { background: rgba(74,222,128,0.2); color: #86efac; border:1px solid #4ade8033; }
        .stock-low { background: rgba(251,191,36,0.2); color: #fde047; border:1px solid #fbbf2433; }
        .stock-out { background: rgba(248,113,113,0.2); color: #fca5a5; border:1px solid #f8717133; }

        .product-actions {
            display: flex;
            gap: 12px;
            margin-top: 18px;
            flex-wrap: wrap;
        }

        /* جدول المخزون */
        .table-wrapper {
            overflow-x: auto;
            border-radius: 24px;
            background: rgba(0,0,0,0.3);
            padding: 5px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: rgba(255,215,0,0.12);
            padding: 16px;
            text-align: right;
            color: var(--gold);
            font-weight: 700;
        }

        td {
            padding: 14px 16px;
            border-bottom: 1px solid rgba(255,215,0,0.1);
        }

        tr:hover {
            background: rgba(255,215,0,0.05);
        }

        /* المودالات */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #12121f;
            border: 2px solid var(--gold);
            border-radius: 32px;
            padding: 32px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(255,215,0,0.3);
            padding-bottom: 15px;
        }

        .close-modal {
            background: none;
            border: none;
            color: var(--gold);
            font-size: 32px;
            cursor: pointer;
            transition: 0.2s;
        }

        .close-modal:hover {
            transform: rotate(90deg);
        }

        /* النماذج */
        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 20px;
            background: rgba(0,0,0,0.5);
            color: white;
            font-family: 'Cairo', sans-serif;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 8px rgba(255,215,0,0.4);
        }

        /* رفع الصور */
        .image-upload {
            border: 2px dashed var(--gold);
            border-radius: 24px;
            padding: 25px;
            text-align: center;
            cursor: pointer;
        }

        .image-preview {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 16px;
        }

        .image-preview-item {
            position: relative;
        }

        .image-preview-item img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 16px;
            border: 2px solid var(--gold);
        }

        .remove-image {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--error);
            border-radius: 50%;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 12px;
        }

        /* سجل المخزون */
        .stock-log {
            max-height: 550px;
            overflow-y: auto;
        }

        .stock-log-item {
            background: rgba(0,0,0,0.3);
            padding: 16px;
            border-radius: 18px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            border-right: 3px solid var(--gold);
        }

        /* الطلبات */
        .order-card {
            background: rgba(0,0,0,0.35);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 22px;
            border: 1px solid rgba(255,215,0,0.2);
            transition: 0.2s;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 14px 28px;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            z-index: 2000;
            animation: slideIn 0.3s;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
        .toast.success { background: #22c55e; color: #000; }
        .toast.error { background: #ef4444; }
        .toast.warning { background: #f59e0b; color:#000; }
        .toast.info { background: #3b82f6; }

        @keyframes slideIn {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .footer {
            text-align: center;
            padding: 35px;
            margin-top: 50px;
            border-top: 1px solid rgba(255,215,0,0.2);
            color: #aaa;
        }

        @media (max-width: 680px) {
            .products-grid { grid-template-columns: 1fr; }
            .header { flex-direction: column; text-align: center; }
            .stat-card { width: 100%; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">
            <i class="fas fa-crown"></i>
            <div>
                <h1>ناردو برو | المتجر الذهبي</h1>
                <p>إدارة متقدمة - مخزون - منتجات - طلبات فورية</p>
            </div>
        </div>
        <div class="stats">
            <div class="stat-card"><i class="fas fa-store"></i><div class="number" id="statTotal">0</div><div class="label">المنتجات</div></div>
            <div class="stat-card"><i class="fas fa-clipboard-list"></i><div class="number" id="statOrders">0</div><div class="label">الطلبات</div></div>
        </div>
    </div>

    <div style="display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap;">
        <button class="btn btn-gold" onclick="openAddProductModal()"><i class="fas fa-plus-circle"></i> إضافة منتج</button>
        <button class="btn btn-outline" onclick="window.location.reload()"><i class="fas fa-sync-alt"></i> تحديث</button>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="showTab('products')"><i class="fas fa-cube"></i> المنتجات</button>
        <button class="tab" onclick="showTab('inventory')"><i class="fas fa-warehouse"></i> إدارة المخزون</button>
        <button class="tab" onclick="showTab('stockLog')"><i class="fas fa-history"></i> سجل المخزون</button>
        <button class="tab" onclick="showTab('orders')"><i class="fas fa-truck"></i> الطلبات</button>
    </div>

    <!-- تبويب المنتجات -->
    <div id="productsTab" class="tab-content" style="display: block;">
        <div style="margin-bottom: 25px;"><input type="text" id="searchProducts" placeholder="🔍 ابحث عن منتج ..." style="width:100%; padding:14px 20px; border-radius:60px; background:#0f0f1a; border:1px solid #ffd70040; color:white;"></div>
        <div id="productsGrid" class="products-grid"></div>
    </div>

    <!-- المخزون -->
    <div id="inventoryTab" class="tab-content" style="display: none;">
        <div class="table-wrapper">
            <table>
                <thead><tr><th>المنتج</th><th>السعر</th><th>المخزون</th><th>الحالة</th><th>الإجراءات</th></tr></thead>
                <tbody id="inventoryTable"></tbody>
            </table>
        </div>
    </div>

    <!-- سجل المخزون -->
    <div id="stockLogTab" class="tab-content" style="display: none;">
        <div class="stock-log-header" style="display:flex; justify-content:space-between; margin-bottom:20px;">
            <h3><i class="fas fa-scroll"></i> حركات المخزون</h3>
            <button class="btn btn-info" onclick="clearStockLog()"><i class="fas fa-trash-alt"></i> مسح السجل</button>
        </div>
        <div id="stockLogContainer" class="stock-log"></div>
    </div>

    <!-- الطلبات -->
    <div id="ordersTab" class="tab-content" style="display: none;">
        <div id="ordersContainer"></div>
    </div>
</div>

<div class="footer"><p>© 2026 ناردو برو - نظام متجر احترافي | إدارة متكاملة بدون سلة</p></div>

<!-- مودال إضافة منتج -->
<div id="addProductModal" class="modal">
    <div class="modal-content">
        <div class="modal-header"><h2><i class="fas fa-gem"></i> منتج جديد</h2><button class="close-modal" onclick="closeAddProductModal()">&times;</button></div>
        <form onsubmit="event.preventDefault(); addProduct();">
            <div class="form-group"><label>اسم المنتج *</label><input type="text" id="productName" required></div>
            <div class="form-group"><label>الوصف</label><textarea id="productDesc" rows="2"></textarea></div>
            <div class="form-group"><label>السعر (دج) *</label><input type="number" id="productPrice" required min="0"></div>
            <div class="form-group"><label>الكمية الأولية *</label><input type="number" id="productQty" required min="0"></div>
            <div class="form-group"><label>القسم</label><select id="productCategory"><option>توابل</option><option>كوسمتيك</option><option>بروموسيو</option><option>أخرى</option></select></div>
            <div class="form-group"><label>صور المنتج</label><div class="image-upload" onclick="document.getElementById('productImages').click()"><i class="fas fa-cloud-upload-alt fa-2x"></i><p>اضغط لرفع الصور</p><input type="file" id="productImages" multiple accept="image/*" style="display:none" onchange="previewImages(this)"></div><div id="imagePreview" class="image-preview"></div></div>
            <button type="submit" class="btn btn-gold" style="width:100%">حفظ المنتج</button>
        </form>
    </div>
</div>

<!-- مودال تعديل المخزون -->
<div id="editStockModal" class="modal">
    <div class="modal-content">
        <div class="modal-header"><h2><i class="fas fa-chart-line"></i> تعديل المخزون</h2><button class="close-modal" onclick="closeEditStockModal()">&times;</button></div>
        <form onsubmit="event.preventDefault(); updateStock();">
            <div class="form-group"><label>المنتج</label><input type="text" id="editProductName" disabled></div>
            <div class="form-group"><label>الكمية الحالية</label><input type="text" id="editCurrentQty" disabled></div>
            <div class="form-group"><label>نوع العملية</label><select id="stockOperation"><option value="add">➕ إضافة إلى المخزون</option><option value="remove">➖ سحب من المخزون</option><option value="set">📝 تعيين كمية جديدة</option></select></div>
            <div class="form-group"><label>الكمية</label><input type="number" id="editNewQty" required min="0"></div>
            <div class="form-group"><label>سبب التعديل</label><input type="text" id="stockReason" placeholder="مثال: وردت شحنة"></div>
            <button type="submit" class="btn btn-gold" style="width:100%">تحديث المخزون</button>
        </form>
    </div>
</div>

<!-- مودال عرض الصور -->
<div id="imageViewerModal" class="modal"><div class="modal-content" style="max-width:700px"><div class="modal-header"><h2>معرض الصور</h2><button class="close-modal" onclick="closeImageViewer()">&times;</button></div><div style="text-align:center"><img id="currentImage" style="max-width:100%; max-height:350px; border-radius:20px; margin-bottom:15px;"><div id="imageThumbnails" style="display:flex; gap:10px; flex-wrap:wrap; justify-content:center;"></div></div></div></div>

<script>
    // ---------- البيانات الأساسية (تم حذف السلة نهائياً) ----------
    let products = JSON.parse(localStorage.getItem('nardo_products') || '[]');
    let orders = JSON.parse(localStorage.getItem('nardo_orders') || '[]');
    let stockLog = JSON.parse(localStorage.getItem('nardo_stock_log') || '[]');
    let editProductId = null;
    let currentImages = [];

    // تبويبات
    function showTab(tab) {
        document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
        document.getElementById(tab + 'Tab').style.display = 'block';
        document.querySelectorAll('.tab').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        if (tab === 'products') renderProducts();
        if (tab === 'inventory') renderInventory();
        if (tab === 'stockLog') renderStockLog();
        if (tab === 'orders') renderOrders();
    }

    // معاينة الصور
    function previewImages(input) {
        const preview = document.getElementById('imagePreview');
        preview.innerHTML = '';
        currentImages = [];
        for(let i=0; i<input.files.length; i++) {
            const file = input.files[i];
            const reader = new FileReader();
            reader.onload = function(e) {
                currentImages.push(e.target.result);
                const div = document.createElement('div');
                div.className = 'image-preview-item';
                div.innerHTML = `<img src="${e.target.result}"><div class="remove-image" onclick="removeImage(${currentImages.length-1})">×</div>`;
                preview.appendChild(div);
            };
            reader.readAsDataURL(file);
        }
    }
    function removeImage(idx) { currentImages.splice(idx,1); renderImagePreview(); }
    function renderImagePreview() {
        const preview = document.getElementById('imagePreview');
        preview.innerHTML = '';
        currentImages.forEach((img,i) => {
            const div = document.createElement('div');
            div.className = 'image-preview-item';
            div.innerHTML = `<img src="${img}"><div class="remove-image" onclick="removeImage(${i})">×</div>`;
            preview.appendChild(div);
        });
    }

    // عرض المنتجات
    function renderProducts() {
        const search = document.getElementById('searchProducts')?.value.toLowerCase() || '';
        const filtered = products.filter(p => p.name.toLowerCase().includes(search));
        const container = document.getElementById('productsGrid');
        if(filtered.length === 0) { container.innerHTML = '<div class="product-card" style="text-align:center"><i class="fas fa-box-open fa-3x"></i><p>لا توجد منتجات</p></div>'; return; }
        container.innerHTML = filtered.map(p => {
            let stockClass = p.quantity > 10 ? 'stock-high' : (p.quantity > 0 ? 'stock-low' : 'stock-out');
            let stockText = p.quantity > 10 ? 'متوفر بكثرة' : (p.quantity > 0 ? 'مخزون محدود' : 'غير متوفر');
            let imagesHtml = p.images && p.images.length ? `<div class="product-images">${p.images.slice(0,3).map(img => `<img src="${img}" onclick="viewImages(${p.id})">`).join('')}${p.images.length>3?`<div class="product-icon" style="width:70px;height:70px;cursor:pointer" onclick="viewImages(${p.id})"><i class="fas fa-ellipsis-h"></i> +${p.images.length-3}</div>`:''}</div>` : `<div class="product-icon"><i class="fas fa-tag"></i></div>`;
            return `<div class="product-card">${imagesHtml}<div class="product-name">${p.name}</div><div class="product-price">${p.price.toLocaleString()} دج</div><div><span class="stock-badge ${stockClass}">${stockText} (${p.quantity})</span></div><div class="product-actions"><button class="btn btn-gold" onclick="quickOrder(${p.id})"><i class="fas fa-shopping-bag"></i> طلب مباشر</button><button class="btn btn-purple" onclick="publishProduct(${p.id})"><i class="fas fa-share-alt"></i> نشر</button></div></div>`;
        }).join('');
    }

    // الطلب المباشر بدون سلة
    function quickOrder(productId) {
        const product = products.find(p => p.id === productId);
        if(!product || product.quantity <= 0) { showToast('المنتج غير متوفر حالياً', 'error'); return; }
        const qty = prompt(`أدخل الكمية المطلوبة من "${product.name}" (المتاح: ${product.quantity})`, "1");
        if(!qty) return;
        let quantityInt = parseInt(qty);
        if(isNaN(quantityInt) || quantityInt <=0) { showToast('كمية غير صالحة', 'error'); return; }
        if(quantityInt > product.quantity) { showToast(`الكمية المتاحة فقط ${product.quantity}`, 'warning'); return; }
        // إنشاء الطلب
        const total = product.price * quantityInt;
        const newOrder = {
            id: Date.now(),
            date: new Date().toLocaleString('ar-EG'),
            items: [{ id: product.id, name: product.name, price: product.price, quantity: quantityInt }],
            total: total,
            status: 'مكتمل'
        };
        orders.unshift(newOrder);
        localStorage.setItem('nardo_orders', JSON.stringify(orders));
        // تحديث المخزون
        const oldQty = product.quantity;
        product.quantity -= quantityInt;
        addStockLog(product.id, product.name, 'remove', quantityInt, oldQty, product.quantity, `طلب مباشر #${newOrder.id}`);
        localStorage.setItem('nardo_products', JSON.stringify(products));
        updateStats();
        renderProducts();
        renderInventory();
        renderStockLog();
        renderOrders();
        showToast(`✅ تم إنشاء الطلب بنجاح! المبلغ: ${total.toLocaleString()} دج`, 'success');
    }

    // نشر تجريبي
    function publishProduct(id) { showToast('📢 ميزة النشر على المنصات قريباً', 'info'); }

    function viewImages(productId) {
        const p = products.find(pr => pr.id === productId);
        if(p && p.images?.length) {
            document.getElementById('currentImage').src = p.images[0];
            document.getElementById('imageThumbnails').innerHTML = p.images.map(img => `<img src="${img}" style="width:70px;height:70px;border-radius:12px;cursor:pointer;border:2px solid gold" onclick="document.getElementById('currentImage').src='${img}'">`).join('');
            document.getElementById('imageViewerModal').classList.add('active');
        } else showToast('لا توجد صور لهذا المنتج', 'warning');
    }
    function closeImageViewer() { document.getElementById('imageViewerModal').classList.remove('active'); }

    // المخزون
    function renderInventory() {
        const tbody = document.getElementById('inventoryTable');
        if(!products.length) { tbody.innerHTML = '<tr><td colspan="5" style="text-align:center">لا توجد منتجات</td></tr>'; return; }
        tbody.innerHTML = products.map(p => `<tr><td>${p.name}</td><td>${p.price.toLocaleString()} دج</td><td>${p.quantity}</td><td><span class="stock-badge ${p.quantity>10?'stock-high':(p.quantity>0?'stock-low':'stock-out')}">${p.quantity>0?'متاح':'نفد'}</span></td><td><button class="btn btn-gold" style="padding:6px 16px" onclick="openEditStockModal(${p.id})"><i class="fas fa-edit"></i> تعديل</button></td></tr>`).join('');
    }

    function addStockLog(pid, pname, op, qty, oldQ, newQ, reason='') {
        stockLog.unshift({ id:Date.now(), productId:pid, productName:pname, operation:op, quantity:qty, oldQty:oldQ, newQty:newQ, reason, date:new Date().toLocaleString('ar-EG') });
        if(stockLog.length > 800) stockLog = stockLog.slice(0,800);
        localStorage.setItem('nardo_stock_log', JSON.stringify(stockLog));
    }

    function renderStockLog() {
        const container = document.getElementById('stockLogContainer');
        if(!stockLog.length) { container.innerHTML = '<div class="card" style="text-align:center">لا توجد حركات مخزون</div>'; return; }
        container.innerHTML = stockLog.map(log => `<div class="stock-log-item"><div><strong style="color:var(--gold)">${log.productName}</strong><br><span>${log.operation==='add'?'➕ إضافة':(log.operation==='remove'?'➖ سحب':'📝 تعيين')} | الكمية: ${log.quantity}</span><br><span style="font-size:12px">من ${log.oldQty} → إلى ${log.newQty}</span>${log.reason?`<br><span>📌 ${log.reason}</span>`:''}</div><div class="date">${log.date}</div></div>`).join('');
    }

    function clearStockLog() { if(confirm('مسح السجل بالكامل؟')){ stockLog=[]; localStorage.setItem('nardo_stock_log','[]'); renderStockLog(); showToast('تم مسح السجل','success'); } }

    function openEditStockModal(id) { editProductId=id; const p=products.find(p=>p.id===id); if(p){ document.getElementById('editProductName').value=p.name; document.getElementById('editCurrentQty').value=p.quantity; document.getElementById('editNewQty').value=0; document.getElementById('stockOperation').value='add'; document.getElementById('stockReason').value=''; document.getElementById('editStockModal').classList.add('active'); } }
    function closeEditStockModal() { document.getElementById('editStockModal').classList.remove('active'); editProductId=null; }
    function updateStock() {
        const p=products.find(p=>p.id===editProductId); if(!p) return;
        const op=document.getElementById('stockOperation').value; const qtyVal=parseInt(document.getElementById('editNewQty').value); const reason=document.getElementById('stockReason').value;
        if(isNaN(qtyVal) || qtyVal<0){ showToast('كمية غير صحيحة','error'); return; }
        let oldQ=p.quantity, newQ=oldQ;
        if(op==='add'){ newQ=oldQ+qtyVal; addStockLog(p.id,p.name,'add',qtyVal,oldQ,newQ,reason||'إضافة'); showToast(`➕ تمت إضافة ${qtyVal} قطعة`,'success');}
        else if(op==='remove'){ if(qtyVal>oldQ){ showToast('لا يمكن سحب أكثر من المتوفر','error'); return;} newQ=oldQ-qtyVal; addStockLog(p.id,p.name,'remove',qtyVal,oldQ,newQ,reason||'سحب'); showToast(`➖ تم سحب ${qtyVal} قطعة`,'success');}
        else if(op==='set'){ newQ=qtyVal; let diff=Math.abs(newQ-oldQ); addStockLog(p.id,p.name,'set',diff,oldQ,newQ,reason||`تعيين إلى ${newQ}`); showToast(`📝 تم تعيين الكمية إلى ${newQ}`,'success');}
        p.quantity=newQ;
        localStorage.setItem('nardo_products',JSON.stringify(products));
        renderProducts(); renderInventory(); renderStockLog(); updateStats();
        closeEditStockModal();
    }

    // الطلبات
    function renderOrders() {
        const container = document.getElementById('ordersContainer');
        if(!orders.length){ container.innerHTML='<div class="order-card" style="text-align:center"><i class="fas fa-inbox fa-3x"></i><p>لا توجد طلبات بعد</p></div>'; return; }
        container.innerHTML = orders.map(order => `<div class="order-card"><div style="display:flex; justify-content:space-between;"><div><i class="fas fa-receipt"></i> <strong>طلب #${order.id}</strong></div><span style="color:var(--gold)">${order.date}</span></div>${order.items.map(it=>`<div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #ffd70020"><span>${it.name} × ${it.quantity}</span><span>${(it.price*it.quantity).toLocaleString()} دج</span></div>`).join('')}<div style="margin-top:15px; border-top:2px solid gold; padding-top:12px; display:flex; justify-content:space-between"><strong>الإجمالي</strong><strong style="color:var(--success)">${order.total.toLocaleString()} دج</strong></div></div>`).join('');
    }

    // إضافة منتج
    function openAddProductModal() { document.getElementById('addProductModal').classList.add('active'); }
    function closeAddProductModal() { document.getElementById('addProductModal').classList.remove('active'); document.getElementById('imagePreview').innerHTML=''; currentImages=[]; document.getElementById('addProductModal').querySelector('form').reset(); }
    function addProduct() {
        const name = document.getElementById('productName').value.trim();
        const price = parseInt(document.getElementById('productPrice').value);
        const quantity = parseInt(document.getElementById('productQty').value);
        if(!name || isNaN(price) || price<=0) { showToast('اسم المنتج وسعر صالح مطلوب','error'); return; }
        const newProd = { id: Date.now(), name, description: document.getElementById('productDesc').value, price, quantity: quantity||0, category: document.getElementById('productCategory').value, images: [...currentImages] };
        products.push(newProd);
        localStorage.setItem('nardo_products', JSON.stringify(products));
        addStockLog(newProd.id, newProd.name, 'add', newProd.quantity, 0, newProd.quantity, 'إضافة منتج جديد');
        renderProducts(); renderInventory(); renderStockLog(); updateStats();
        showToast(`✅ تم إضافة ${name}`, 'success');
        closeAddProductModal();
    }

    function updateStats() {
        document.getElementById('statTotal').innerText = products.length;
        document.getElementById('statOrders').innerText = orders.length;
    }

    function showToast(msg, type) { const t=document.createElement('div'); t.className=`toast ${type}`; t.innerText=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),3000); }

    // البحث
    document.addEventListener('DOMContentLoaded',()=>{ updateStats(); renderProducts(); if(document.getElementById('searchProducts')) document.getElementById('searchProducts').addEventListener('input',renderProducts); });
</script>
</body>
</html>
