<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ناردو برو | المتجر الذكي - النظام المتكامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #0a0a1a;
            --secondary: #1a1a2e;
            --gold: #ffd700;
            --gold-dark: #daa520;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --success: #4ade80;
            --error: #f87171;
            --warning: #fbbf24;
            --info: #60a5fa;
            --telegram: #0088cc;
        }
        body { font-family: 'Cairo', sans-serif; background: linear-gradient(135deg, #0b0b14 0%, #15152a 100%); color: var(--text-primary); min-height: 100vh; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .top-navbar { background: linear-gradient(135deg, rgba(10,10,26,0.95), rgba(26,26,46,0.95)); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,215,0,0.25); padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; position: sticky; top: 0; z-index: 1000; }
        .nav-left { flex: 1; display: flex; justify-content: flex-start; }
        .nav-logo { display: flex; align-items: center; gap: 10px; }
        .nav-logo i { font-size: 28px; color: var(--gold); }
        .nav-logo .logo-text { font-size: 18px; font-weight: 800; background: linear-gradient(135deg, #ffd700, #ffed4e); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .nav-center { flex: 1; display: flex; justify-content: center; }
        .store-circle { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: all 0.3s ease; }
        .circle-icon { width: 55px; height: 55px; background: linear-gradient(135deg, var(--gold), var(--gold-dark)); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(255,215,0,0.4); }
        .circle-icon i { font-size: 28px; color: #111; }
        .store-name-circle { font-size: 11px; font-weight: 700; margin-top: 6px; color: var(--gold); background: rgba(255,215,0,0.15); padding: 3px 10px; border-radius: 20px; }
        .nav-right { flex: 1; display: flex; justify-content: flex-end; gap: 10px; }
        .nav-btn { padding: 8px 18px; border-radius: 40px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; font-family: 'Cairo', sans-serif; display: flex; align-items: center; gap: 6px; }
        .nav-btn-telegram { background: linear-gradient(135deg, #0088cc, #006699); color: white; }
        .nav-btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: #111; }
        .tabs-bar { background: linear-gradient(135deg, rgba(10,10,26,0.9), rgba(26,26,46,0.9)); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,215,0,0.15); padding: 10px 20px; display: flex; justify-content: center; gap: 12px; position: sticky; top: 70px; z-index: 999; flex-wrap: wrap; }
        .tab-btn { padding: 10px 28px; border-radius: 40px; background: transparent; color: var(--text-secondary); font-weight: 700; font-size: 15px; cursor: pointer; display: flex; align-items: center; gap: 8px; border: none; font-family: 'Cairo', sans-serif; }
        .tab-btn.active { background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,215,0,0.08)); color: var(--gold); border: 1px solid rgba(255,215,0,0.25); }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; margin-bottom: 20px; }
        .product-card { background: linear-gradient(145deg, rgba(25,25,45,0.9), rgba(15,15,30,0.95)); border: 1px solid rgba(255,215,0,0.15); border-radius: 28px; padding: 20px; position: relative; }
        .product-id-badge { position: absolute; top: 15px; left: 15px; background: linear-gradient(135deg, var(--gold), #ffb347); color: #111; padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 800; z-index: 1; }
        .product-published-badge { position: absolute; top: 15px; right: 15px; background: rgba(0,136,204,0.8); color: white; padding: 4px 10px; border-radius: 20px; font-size: 10px; display: flex; align-items: center; gap: 4px; z-index: 1; }
        .product-image { width: 100%; height: 160px; background: linear-gradient(135deg, #1a1a2e, #0f0f1a); border-radius: 20px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .product-image img { width: 100%; height: 100%; object-fit: cover; }
        .product-image .no-image { text-align: center; color: var(--text-secondary); }
        .product-image .no-image i { font-size: 48px; color: var(--gold); margin-bottom: 10px; display: block; }
        .product-name { font-size: 20px; font-weight: 900; background: linear-gradient(135deg, #ffd700, #ffb347); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .product-price { font-size: 24px; font-weight: 900; color: var(--success); margin: 8px 0; }
        .stock-status { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .stock-status.high { background: rgba(74,222,128,0.15); color: var(--success); }
        .stock-status.low { background: rgba(251,191,36,0.15); color: var(--warning); }
        .stock-status.out { background: rgba(248,113,113,0.15); color: var(--error); }
        .product-actions { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        .btn { padding: 10px 20px; border: none; border-radius: 40px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'Cairo', sans-serif; display: inline-flex; align-items: center; gap: 8px; }
        .btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: #111; }
        .btn-telegram { background: linear-gradient(135deg, #0088cc, #006699); color: white; }
        .btn-outline { background: transparent; border: 2px solid var(--gold); color: var(--gold); }
        .btn-info { background: linear-gradient(135deg, #60a5fa, #3b82f6); color: white; }
        .btn-success { background: linear-gradient(135deg, #4ade80, #22c55e); color: white; }
        .btn-error { background: linear-gradient(135deg, #f87171, #ef4444); color: white; }
        .btn-sm { padding: 5px 12px; font-size: 12px; }
        .table-container { background: rgba(0,0,0,0.25); border-radius: 24px; overflow-x: auto; margin-bottom: 20px; }
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th { text-align: right; padding: 14px 16px; background: rgba(255,215,0,0.1); color: var(--gold); font-weight: 800; }
        .data-table td { padding: 12px 16px; border-bottom: 1px solid rgba(255,215,0,0.06); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: linear-gradient(135deg, rgba(26,26,46,0.98), rgba(10,10,25,0.98)); border: 1px solid rgba(255,215,0,0.2); border-radius: 28px; padding: 28px; max-width: 500px; width: 90%; max-height: 90vh; overflow-y: auto; }
        .modal-header { font-size: 22px; font-weight: 900; color: var(--gold); margin-bottom: 20px; display: flex; justify-content: space-between; }
        .modal-close { background: none; border: none; color: var(--gold); font-size: 28px; cursor: pointer; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 6px; color: var(--gold); font-weight: 700; font-size: 13px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px 16px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,215,0,0.15); border-radius: 12px; color: white; font-family: 'Cairo', sans-serif; font-size: 14px; }
        .toast { position: fixed; bottom: 20px; right: 20px; padding: 12px 24px; border-radius: 24px; font-weight: 600; z-index: 3000; background: rgba(0,0,0,0.9); border: 1px solid; animation: slideIn 0.3s ease; }
        .toast.success { border-color: var(--success); color: var(--success); }
        .toast.error { border-color: var(--error); color: var(--error); }
        .toast.warning { border-color: var(--warning); color: var(--warning); }
        .toast.info { border-color: var(--info); color: var(--info); }
        @keyframes slideIn { from { transform: translateX(400px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .stock-log-item { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,215,0,0.1); border-radius: 16px; padding: 12px 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .loading-spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255,215,0,0.3); border-radius: 50%; border-top-color: var(--gold); animation: spin 0.8s ease infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 768px) { .products-grid { grid-template-columns: 1fr; } .tabs-bar { overflow-x: auto; flex-wrap: nowrap; } .tab-btn { white-space: nowrap; } }
    </style>
</head>
<body>

<div class="top-navbar">
    <div class="nav-left"><div class="nav-logo"><i class="fas fa-crown"></i><span class="logo-text">ناردو برو</span></div></div>
    <div class="nav-center"><div class="store-circle" onclick="fn_09_showStoreInfo()"><div class="circle-icon"><i class="fas fa-store"></i></div><div class="store-name-circle" id="circleStoreName">المتجر</div></div></div>
    <div class="nav-right"><button class="nav-btn nav-btn-telegram" onclick="fn_04_fetchProductsFromTelegram()"><i class="fab fa-telegram"></i> جلب منتجات</button><button class="nav-btn nav-btn-gold" onclick="fn_10_openAddProductModal()"><i class="fas fa-plus"></i> إضافة</button></div>
</div>

<div class="tabs-bar">
    <button class="tab-btn active" onclick="fn_11_showTab('products', this)"><i class="fas fa-cube"></i> المنتجات</button>
    <button class="tab-btn" onclick="fn_11_showTab('inventory', this)"><i class="fas fa-warehouse"></i> المخزون</button>
    <button class="tab-btn" onclick="fn_11_showTab('stockLog', this)"><i class="fas fa-history"></i> سجل المخزون</button>
    <button class="tab-btn" onclick="fn_11_showTab('orders', this)"><i class="fas fa-receipt"></i> الطلبات</button>
    <button class="tab-btn" onclick="fn_08_openDeliveryPage()"><i class="fas fa-truck"></i> التوصيل</button>
    <button class="nav-btn nav-btn-telegram" onclick="fn_05_fetchOrdersFromTelegram()"><i class="fab fa-telegram"></i> جلب الطلبات</button>
</div>

<div class="container">
    <div id="productsTab" class="tab-content"><div id="productsGrid" class="products-grid"></div></div>
    <div id="inventoryTab" class="tab-content" style="display:none;"><div class="table-container"><table class="data-table"><thead><tr><th>الصورة</th><th>المنتج</th><th>المعرف</th><th>السعر</th><th>المخزون</th><th>الحالة</th><th>الإجراءات</th></tr></thead><tbody id="inventoryTable"></tbody></table></div></div>
    <div id="stockLogTab" class="tab-content" style="display:none;"><div style="display:flex;justify-content:space-between;margin-bottom:16px;"><h3><i class="fas fa-scroll"></i> حركات المخزون</h3><button class="btn btn-outline" onclick="fn_06_clearStockLog()">مسح السجل</button></div><div id="stockLogContainer"></div></div>
    <div id="ordersTab" class="tab-content" style="display:none;"><div class="table-container"><table class="data-table"><thead><tr><th>رقم الطلب</th><th>التاريخ</th><th>العميل</th><th>المنتجات</th><th>الإجمالي</th><th>الحالة</th><th>الإجراءات</th></tr></thead><tbody id="ordersTableBody"></tbody></table></div></div>
</div>

<div id="addProductModal" class="modal"><div class="modal-content"><div class="modal-header"><h2>منتج جديد</h2><button class="modal-close" onclick="fn_10_closeAddProductModal()">&times;</button></div><form onsubmit="event.preventDefault();"><div class="form-group"><label>اسم المنتج *</label><input type="text" id="productName" required></div><div class="form-group"><label>الوصف</label><textarea id="productDesc" rows="2"></textarea></div><div class="form-group"><label>السعر (دج) *</label><input type="number" id="productPrice" required></div><div class="form-group"><label>الكمية *</label><input type="number" id="productQty" required></div><div class="form-group"><label>القسم</label><select id="productCategory"><option>عام</option><option>توابل</option><option>عطور</option></select></div><div class="form-group"><label>صورة المنتج (للنشر)</label><input type="file" id="productImage" accept="image/*"></div><div style="display:flex;gap:10px"><button type="button" class="btn btn-outline" onclick="fn_07_saveProductOnly()">حفظ فقط</button><button type="button" class="btn btn-telegram" onclick="fn_07_saveAndPublishProduct()">حفظ ونشر</button></div></form></div></div>

<div id="editStockModal" class="modal"><div class="modal-content"><div class="modal-header"><h2>تعديل المخزون</h2><button class="modal-close" onclick="fn_06_closeEditStockModal()">&times;</button></div><form onsubmit="event.preventDefault(); fn_06_updateStock();"><div class="form-group"><label>المنتج</label><input type="text" id="editProductName" disabled></div><div class="form-group"><label>المعرف</label><input type="text" id="editProductID" disabled></div><div class="form-group"><label>الكمية الحالية</label><input type="text" id="editCurrentQty" disabled></div><div class="form-group"><label>نوع العملية</label><select id="stockOperation"><option value="add">➕ إضافة</option><option value="remove">➖ سحب</option><option value="set">📝 تعيين</option></select></div><div class="form-group"><label>الكمية</label><input type="number" id="editNewQty" required></div><div class="form-group"><label>السبب</label><input type="text" id="stockReason" placeholder="مثال: جرد شهري"></div><button type="submit" class="btn btn-gold">تحديث</button></form></div></div>

<script>
// ====================================================================================================
// 📋 ناردو برو - النظام المتكامل لإدارة المتجر عبر التلغرام
// ====================================================================================================
// قائمة الدوال الكاملة (59 دالة) مقسمة إلى 12 قسماً رئيسياً
// ====================================================================================================

// ============================================================
// 🟢 القسم 01: الإعدادات والتكوين (CONFIGURATION) - 3 دوال
// ============================================================

const fn_01_telegramConfig = {
    botToken: '8576673096:AAGvSMjzwVWj6wJ47JdqiDwcObXjBDcyiLA',
    channelId: '-1003822964890',
    apiUrl: 'https://api.telegram.org/bot'
};

function fn_01_getTelegramConfig() { return fn_01_telegramConfig; }
function fn_01_getStoreConfig() { return { storeId: 'NARDO-001', storeName: 'ناردو ماركت', phone: '0555123456', address: 'الجزائر' }; }

// ============================================================
// 🟢 القسم 02: التخزين المحلي (STORAGE) - 4 دوال
// ============================================================

function fn_02_safeSet(key, value) {
    try { localStorage.setItem(key, JSON.stringify(value)); return true; }
    catch(e) { if(e.name === 'QuotaExceededError') { fn_02_autoCleanup(); try { localStorage.setItem(key, JSON.stringify(value)); return true; } catch(e2) { return false; } } return false; }
}
function fn_02_safeGet(key, defaultValue = '[]') {
    try { const item = localStorage.getItem(key); return item ? JSON.parse(item) : JSON.parse(defaultValue); }
    catch(e) { return JSON.parse(defaultValue); }
}
function fn_02_autoCleanup() {
    let orders = fn_02_safeGet('nardo_orders'); if(orders.length > 100) { orders = orders.slice(0,100); fn_02_safeSet('nardo_orders', orders); }
    let logs = fn_02_safeGet('nardo_stock_log'); if(logs.length > 100) { logs = logs.slice(-100); fn_02_safeSet('nardo_stock_log', logs); }
    let processed = fn_02_safeGet('nardo_processed_ids'); if(processed.length > 300) { processed = processed.slice(-300); fn_02_safeSet('nardo_processed_ids', processed); }
}
function fn_02_clearAllData() { if(confirm('مسح جميع البيانات؟')) { localStorage.clear(); fn_11_renderAll(); fn_12_showToast('تم مسح جميع البيانات', 'success'); } }

// ============================================================
// 🟢 القسم 03: دوال مساعدة عامة (HELPERS) - 6 دوال
// ============================================================

function fn_03_cleanTelegramText(text) { return text ? text.replace(/[_*[\]()~`>#+\-=|{}.!]/g, '').trim() : ''; }
function fn_03_generateStoreID(storeName) { let clean = storeName.replace(/[^a-zA-Z0-9\u0600-\u06FF]/g, '').substring(0,8).toUpperCase(); if(!clean) clean = 'متجري'; return `${clean}-${Math.floor(Math.random()*900000+100000)}`; }
function fn_03_getNextProductSerial(storeID) { let products = fn_02_safeGet('nardo_products'); let storeProducts = products.filter(p => p.storeID === storeID); return (storeProducts.length + 1).toString().padStart(3,'0'); }
function fn_03_formatPrice(price) { return price.toLocaleString() + ' دج'; }
function fn_03_formatDate(date) { return new Date(date).toLocaleString('ar-EG'); }
function fn_03_truncateText(text, maxLen=30) { return text.length > maxLen ? text.substring(0,maxLen)+'...' : text; }

// ============================================================
// 🟢 القسم 04: دوال التلغرام لجلب المنتجات (TELEGRAM FETCH PRODUCTS) - 5 دوال
// ============================================================

async function fn_04_fetchProductsFromTelegram() {
    let btn = event?.target; let originalText = btn?.innerHTML;
    if(btn) { btn.innerHTML = '<span class="loading-spinner"></span> جاري الجلب...'; btn.disabled = true; }
    try {
        fn_12_showToast('جاري جلب المنتجات من القناة...', 'info');
        let response = await fetch(`${fn_01_telegramConfig.apiUrl}${fn_01_telegramConfig.botToken}/getUpdates?limit=100`);
        let data = await response.json();
        if(!data.ok) throw new Error('فشل الاتصال');
        let products = fn_02_safeGet('nardo_products');
        let newCount = 0;
        for(let update of data.result || []) {
            let post = update.channel_post || update.message;
            if(!post || !post.photo) continue;
            let productData = await fn_04_extractProductFromPost(post);
            if(productData && !products.some(p => p.telegramId === post.message_id)) {
                products.push({ id: Date.now() + Math.random(), telegramId: post.message_id, source: 'telegram', published: true, ...productData });
                newCount++;
            }
        }
        fn_02_safeSet('nardo_products', products);
        fn_11_renderAll();
        fn_12_showToast(`✅ تم جلب ${newCount} منتج جديد`, 'success');
    } catch(e) { fn_12_showToast('❌ فشل جلب المنتجات', 'error'); }
    finally { if(btn) { btn.innerHTML = originalText; btn.disabled = false; } }
}

async function fn_04_extractProductFromPost(post) {
    let caption = post.caption || '';
    let lines = caption.split('\n');
    let name = 'منتج', price = 1000, quantity = 10, storeID = '', storeName = '', productCompositeID = '', description = '';
    for(let line of lines) {
        if(line.includes('المنتج:')) name = line.split(':')[1]?.trim() || name;
        if(line.includes('السعر:')) price = parseInt(line.split(':')[1]) || price;
        if(line.includes('الكمية:')) quantity = parseInt(line.split(':')[1]) || quantity;
        if(line.includes('معرف المتجر:')) storeID = line.split(':')[1]?.trim() || storeID;
        if(line.includes('المتجر:')) storeName = line.split(':')[1]?.trim() || storeName;
        if(line.includes('معرف المنتج:')) productCompositeID = line.split(':')[1]?.trim() || productCompositeID;
        if(line.includes('الوصف:')) description = line.split(':')[1]?.trim() || description;
    }
    let imageUrl = await fn_04_getTelegramImageUrl(post.photo[post.photo.length-1].file_id);
    return { name, price, quantity, storeID, storeName, productCompositeID, description, imageUrl };
}

async function fn_04_getTelegramImageUrl(fileId) {
    try {
        let response = await fetch(`${fn_01_telegramConfig.apiUrl}${fn_01_telegramConfig.botToken}/getFile?file_id=${fileId}`);
        let data = await response.json();
        if(data.ok) return `https://api.telegram.org/file/bot${fn_01_telegramConfig.botToken}/${data.result.file_path}`;
        return null;
    } catch(e) { return null; }
}

async function fn_04_checkBotStatus() {
    try {
        let response = await fetch(`${fn_01_telegramConfig.apiUrl}${fn_01_telegramConfig.botToken}/getMe`);
        let data = await response.json();
        return data.ok ? data.result : null;
    } catch(e) { return null; }
}

async function fn_04_getBotInfo() {
    let bot = await fn_04_checkBotStatus();
    if(bot) fn_12_showToast(`✅ البوت يعمل: @${bot.username}`, 'success');
    else fn_12_showToast('❌ البوت لا يعمل', 'error');
    return bot;
}

// ============================================================
// 🟢 القسم 05: دوال التلغرام لجلب الطلبات (TELEGRAM FETCH ORDERS) - 5 دوال
// ============================================================

let fn_05_processedIds = [];

async function fn_05_fetchOrdersFromTelegram() {
    let btn = document.getElementById('fetchOrdersBtn');
    let originalText = btn?.innerHTML;
    if(btn) { btn.innerHTML = '<span class="loading-spinner"></span> جاري الجلب...'; btn.disabled = true; }
    try {
        fn_12_showToast('📡 جاري جلب الطلبات من التلغرام...', 'info');
        let response = await fetch(`${fn_01_telegramConfig.apiUrl}${fn_01_telegramConfig.botToken}/getUpdates?limit=100`);
        let data = await response.json();
        if(!data.ok) throw new Error('فشل الاتصال');
        let products = fn_02_safeGet('nardo_products');
        let orders = fn_02_safeGet('nardo_orders');
        fn_05_processedIds = fn_02_safeGet('nardo_processed_ids');
        let newCount = 0;
        for(let update of data.result || []) {
            let post = update.channel_post || update.message;
            if(!post || !post.text) continue;
            if(fn_05_processedIds.includes(post.message_id)) continue;
            let orderData = fn_05_extractOrderFromText(post.text);
            if(!orderData || !orderData.items.length) continue;
            let orderItems = []; let orderTotal = 0;
            for(let item of orderData.items) {
                let product = products.find(p => p.productCompositeID === item.productID);
                if(product) {
                    orderItems.push({ id: product.id, name: product.name, price: product.price, quantity: item.quantity, productCompositeID: product.productCompositeID });
                    orderTotal += product.price * item.quantity;
                    let oldQ = product.quantity;
                    product.quantity = Math.max(0, product.quantity - item.quantity);
                    fn_06_addStockLog(product.id, product.name, 'remove', item.quantity, oldQ, product.quantity, `طلب تلغرام #${orderData.orderNumber}`, product.storeID);
                }
            }
            if(orderItems.length) {
                let newOrder = { id: Date.now(), telegramOrderId: orderData.orderNumber, telegramMessageId: post.message_id, date: orderData.date || new Date().toLocaleString('ar-EG'), customerName: orderData.customerName, customerPhone: orderData.customerPhone, customerAddress: orderData.customerAddress, customerNotes: orderData.notes || '', items: orderItems, total: orderData.total || orderTotal, status: 'pending', source: 'telegram' };
                orders.unshift(newOrder);
                newCount++;
            }
            fn_05_processedIds.push(post.message_id);
        }
        fn_02_safeSet('nardo_products', products);
        fn_02_safeSet('nardo_orders', orders);
        fn_02_safeSet('nardo_processed_ids', fn_05_processedIds);
        fn_11_renderAll();
        fn_12_showToast(newCount > 0 ? `✅ تم جلب ${newCount} طلب جديد` : '📭 لا توجد طلبات جديدة', newCount > 0 ? 'success' : 'info');
    } catch(e) { fn_12_showToast('❌ فشل جلب الطلبات', 'error'); }
    finally { if(btn) { btn.innerHTML = originalText; btn.disabled = false; } }
}

function fn_05_extractOrderFromText(text) {
    let patterns = { storeID: /معرف المتجر[:\s]*`?([^\n`]+)`?/, customerName: /(?:الزبون|المشتري)[:\s]*([^\n]+)/, customerPhone: /(?:الهاتف|رقم الجوال)[:\s]*([^\n]+)/, customerAddress: /(?:العنوان)[:\s]*([^\n]+)/, productID: /معرف المنتج[:\s]*`?([A-Z0-9\u0600-\u06FF\s-]+-\d+-\d+)`?/i, quantity: /الكمية[:\s]*(\d+)/, total: /(?:إجمالي|المجموع)[:\s]*([\d,]+)/, notes: /ملاحظات[:\s]*([^\n]+)/, orderNumber: /رقم الطلب[:\s]*(\d+)/, date: /التاريخ[:\s]*([^\n]+)/ };
    let customerName = (text.match(patterns.customerName)?.[1] || 'عميل ناردو').replace(/[*_]/g,'').trim();
    let customerPhone = (text.match(patterns.customerPhone)?.[1] || '').replace(/[*_]/g,'').trim();
    let customerAddress = (text.match(patterns.customerAddress)?.[1] || '').replace(/[*_]/g,'').trim();
    let orderNumber = (text.match(patterns.orderNumber)?.[1] || Date.now()).trim();
    let date = (text.match(patterns.date)?.[1] || new Date().toLocaleString('ar-EG')).trim();
    let total = parseInt((text.match(patterns.total)?.[1] || '0').replace(/,/g,''));
    let notes = (text.match(patterns.notes)?.[1] || '').trim();
    let items = [];
    let productMatch = text.match(patterns.productID);
    let qtyMatch = text.match(patterns.quantity);
    if(productMatch) items.push({ productID: productMatch[1], quantity: parseInt(qtyMatch?.[1] || '1') });
    return { items, customerName, customerPhone, customerAddress, total, notes, orderNumber, date };
}

async function fn_05_sendOrderToTelegram(order) {
    let message = `🛍️ طلب جديد #${order.telegramOrderId || order.id}\n━━━━━━━━━━━━━━━━━━\n👤 العميل: ${order.customerName}\n📞 الهاتف: ${order.customerPhone}\n📍 العنوان: ${order.customerAddress}\n📦 المنتجات:\n`;
    for(let item of order.items) message += `• ${item.name} x${item.quantity} = ${(item.price*item.quantity).toLocaleString()} دج\n`;
    message += `━━━━━━━━━━━━━━━━━━\n💰 الإجمالي: ${order.total.toLocaleString()} دج\n📅 التاريخ: ${order.date}`;
    try {
        let response = await fetch(`${fn_01_telegramConfig.apiUrl}${fn_01_telegramConfig.botToken}/sendMessage`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: fn_01_telegramConfig.channelId, text: message, parse_mode: 'HTML' })
        });
        let data = await response.json();
        return data.ok;
    } catch(e) { return false; }
}

async function fn_05_sendStockAlertToTelegram(product) {
    if(product.quantity > 5) return;
    let alertText = product.quantity === 0 ? `⚠️ تنبيه: نفد المنتج ${product.name} من المخزون!` : `⚠️ تنبيه: المنتج ${product.name} أصبح متبقياً ${product.quantity} قطعة فقط!`;
    try {
        let response = await fetch(`${fn_01_telegramConfig.apiUrl}${fn_01_telegramConfig.botToken}/sendMessage`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: fn_01_telegramConfig.channelId, text: alertText })
        });
        return (await response.json()).ok;
    } catch(e) { return false; }
}

function fn_06_openEditStockModal(id) {

        document.getElementById('editCurrentQty').value = p.quantity;
        document.getElementById('editNewQty').value = 0;

        document.getElementById('editStockModal').classList.add('active');
    }
}
function fn_06_closeEditStockModal() { document.getElementById('editStockModal').classList.remove('active'); fn_06_editProductId = null; }
function fn_06_updateStock() {
    let products = fn_02_safeGet('nardo_products');
    let p = products.find(p => p.id === fn_06_editProductId);
    if(!p) return;
    let op = document.getElementById('stockOperation').value;
    let qty = parseInt(document.getElementById('editNewQty').value);
    let reason = document.getElementById('stockReason').value;
    if(isNaN(qty) || qty < 0) { fn_12_showToast('كمية غير صالحة', 'error'); return; }
    let oldQ = p.quantity;
    let newQ = oldQ;
    if(op === 'add') newQ = oldQ + qty;
    else if(op === 'remove') { if(qty > oldQ) { fn_12_showToast('الكمية أكبر من المخزون', 'error'); return; } newQ = oldQ - qty; }
    else if(op === 'set') newQ = qty;
    fn_06_addStockLog(p.id, p.name, op, qty, oldQ, newQ, reason || (op === 'add' ? 'إضافة' : op === 'remove' ? 'سحب' : 'تعيين'), p.storeID);
    p.quantity = newQ;
    fn_02_safeSet('nardo_products', products);
    fn_11_renderAll();
    fn_06_closeEditStockModal();
    fn_12_showToast('✅ تم تحديث المخزون', 'success');
    if(newQ <= 5) fn_05_sendStockAlertToTelegram(p);
}
function fn_06_addStockLog(pid, pname, op, qty, oldQ, newQ, reason, storeID) {
    let logs = fn_02_safeGet('nardo_stock_log');
    logs.unshift({ id: Date.now(), productId: pid, productName: pname, operation: op, quantity: qty, oldQty: oldQ, newQty: newQ, reason: reason, storeID: storeID, date: new Date().toLocaleString('ar-EG') });
    if(logs.length > 500) logs = logs.slice(0,500);
    fn_02_safeSet('nardo_stock_log', logs);
}

    if(!logs.length) { container.innerHTML = '<div style="text-align:center;padding:40px;">📭 لا توجد حركات مخزون</div>'; return; }

function fn_08_quickOrder(productId) {
    let products = fn_02_safeGet('nardo_products');
    let p = products.find(p => p.id === productId);
    if(!p || p.quantity <= 0) { fn_12_showToast('المنتج غير متوفر', 'error'); return; }
    let qty = parseInt(prompt(`الكمية (المتاح: ${p.quantity})`, "1"));
    if(isNaN(qty) || qty <= 0 || qty > p.quantity) { fn_12_showToast('كمية غير صالحة', 'error'); return; }
    let orders = fn_02_safeGet('nardo_orders');
    let newOrder = { id: Date.now(), date: new Date().toLocaleString('ar-EG'), customerName: 'طلب مباشر', customerPhone: '', customerAddress: '', items: [{ id: p.id, name: p.name, price: p.price, quantity: qty, productCompositeID: p.productCompositeID }], total: p.price * qty, status: 'pending', source: 'manual' };
    orders.unshift(newOrder);
    let oldQ = p.quantity;
    p.quantity -= qty;
    fn_02_safeSet('nardo_orders', orders);
    fn_02_safeSet('nardo_products', products);
    fn_06_addStockLog(p.id, p.name, 'remove', qty, oldQ, p.quantity, 'طلب مباشر', p.storeID);
    fn_11_renderAll();
    fn_12_showToast(`✅ تم إنشاء الطلب`, 'success');

    let tbody = document.getElementById('inventoryTable');
    if(!tbody) return;
    if(!products.length) { tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;">📦 لا توجد منتجات</td></tr>'; return; }
    tbody.innerHTML = products.map(p => { let imageHtml = p.imageUrl ? `<img src="${p.imageUrl}" style="width:40px;height:40px;object-fit:cover;border-radius:12px;">` : `<i class="fas fa-image" style="font-size:24px;color:var(--gold);"></i>`; return `<tr><td><div class="inventory-image" style="width:50px;height:50px;background:rgba(255,215,0,0.1);border-radius:12px;display:flex;align-items:center;justify-content:center;">${imageHtml}</div></td><td><strong>${p.name}</strong></td><td><span style="font-family:monospace;background:rgba(255,215,0,0.15);padding:4px 8px;border-radius:12px;">${p.productCompositeID || '---'}</span></td><td style="color:var(--success);">${p.price.toLocaleString()} دج</td><td style="font-weight:800;">${p.quantity}</td><td><span class="stock-status ${p.quantity>0?'high':'out'}">${p.quantity>0?'متاح':'نفد'}</span></td><td><button class="btn btn-gold btn-sm" onclick="fn_06_openEditStockModal(${p.id})"><i class="fas fa-edit"></i> تعديل</button></td></tr>`; }).join('');
}
function fn_09_updateStats() { let products = fn_02_safeGet('nardo_products'); let orders = fn_02_safeGet('nardo_orders'); document.getElementById('statTotal') && (document.getElementById('statTotal').innerText = products.length); document.getElementById('statOrders') && (document.getElementById('statOrders').innerText = orders.length); fn_09_updateStoreProductCount(); }

// 🟢 القسم 10: نوافذ المودال (MODALS) - 4 دوال
// ============================================================

function fn_10_openAddProductModal() { document.getElementById('addProductModal').classList.add('active'); document.getElementById('productName').value = ''; document.getElementById('productDesc').value = ''; document.getElementById('productPrice').value = ''; document.getElementById('productQty').value = ''; document.getElementById('productImage').value = ''; }
function fn_10_closeAddProductModal() { document.getElementById('addProductModal').classList.remove('active'); }
function fn_10_openEditStockModal(id) { fn_06_openEditStockModal(id); }
function fn_10_closeEditStockModal() { fn_06_closeEditStockModal(); }

// ============================================================
// 🟢 القسم 11: التنقل والتبويبات (NAVIGATION) - 3 دوال
// ============================================================

function fn_11_showTab(tabName, btn) {
    document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
    document.getElementById(tabName + 'Tab').style.display = 'block';
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if(tabName === 'products') fn_07_renderProducts();
    if(tabName === 'inventory') fn_09_renderInventory();
    if(tabName === 'stockLog') fn_06_renderStockLog();
    if(tabName === 'orders') fn_08_renderOrders();
}
function fn_11_renderAll() { fn_07_renderProducts(); fn_09_renderInventory(); fn_06_renderStockLog(); fn_08_renderOrders(); fn_09_updateStats(); }
function fn_11_updateStats() { fn_09_updateStats(); }

// ============================================================
// 🟢 القسم 12: الإشعارات والتصدير (TOAST & EXPORT) - 3 دوال
// ============================================================

function fn_12_showToast(msg, type) {
    let t = document.createElement('div');
    t.className = `toast ${type}`;
    let icon = type==='success' ? 'fa-check-circle' : (type==='error' ? 'fa-exclamation-circle' : (type==='warning' ? 'fa-exclamation-triangle' : 'fa-info-circle'));
    t.innerHTML = `<i class="fas ${icon}"></i> ${msg}`;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
}
async function fn_12_exportOrderToPDF(orderId) {
    let orders = fn_02_safeGet('nardo_orders');
    let order = orders.find(o => o.id === orderId);
    if(!order) return;
    fn_12_showToast('📄 جاري تحضير فاتورة PDF...', 'info');
    let { jsPDF } = window.jspdf;
    let doc = new jsPDF({ orientation: 'p', unit: 'mm', format: 'a4' });
    let tempDiv = document.createElement('div');
    tempDiv.style.position = 'absolute'; tempDiv.style.left = '-9999px'; tempDiv.style.width = '800px'; tempDiv.style.background = '#ffffff'; tempDiv.style.color = '#000000'; tempDiv.style.padding = '40px'; tempDiv.style.fontFamily = 'Cairo, sans-serif'; tempDiv.style.direction = 'rtl';
    tempDiv.innerHTML = `<div style="text-align:center;margin-bottom:20px;border-bottom:2px solid #daa520;padding-bottom:10px;"><h1 style="margin:0;color:#daa520;">🧾 فاتورة طلب #${order.telegramOrderId || order.id}</h1><p style="margin:5px 0;">🏪 متجر: ناردو ماركت</p></div><div style="margin-bottom:20px;"><p><strong>📅 التاريخ:</strong> ${order.date}</p><p><strong>👤 العميل:</strong> ${order.customerName || 'غير معروف'}</p><p><strong>📞 الهاتف:</strong> ${order.customerPhone || '---'}</p><p><strong>📍 العنوان:</strong> ${order.customerAddress || '---'}</p>${order.customerNotes ? `<p><strong>📝 ملاحظات:</strong> ${order.customerNotes}</p>` : ''}</div><table style="width:100%;border-collapse:collapse;margin-bottom:20px;"><thead><tr style="background:#f0f0f0;"><th style="border:1px solid #000;padding:10px;text-align:right;">المنتج</th><th style="border:1px solid #000;padding:10px;text-align:center;">الكمية</th><th style="border:1px solid #000;padding:10px;text-align:center;">السعر</th><th style="border:1px solid #000;padding:10px;text-align:center;">الإجمالي</th></tr></thead><tbody>${order.items.map(it => `<tr><td style="border:1px solid #000;padding:10px;">${it.name}</td><td style="border:1px solid #000;padding:10px;text-align:center;">${it.quantity}</td><td style="border:1px solid #000;padding:10px;text-align:center;">${it.price.toLocaleString()} دج</td><td style="border:1px solid #000;padding:10px;text-align:center;">${(it.price * it.quantity).toLocaleString()} دج</td></tr>`).join('')}</tbody><tfoot><tr style="font-weight:bold;background:#f0f0f0;"><td colspan="3" style="border:1px solid #000;padding:10px;text-align:left;">الإجمالي الكلي</td><td style="border:1px solid #000;padding:10px;text-align:center;">${order.total.toLocaleString()} دج</td></tr></tfoot></table><div style="text-align:center;margin-top:40px;font-size:12px;color:#888;">شكرًا لتعاملكم مع ناردو برو 🌟</div>`;
    document.body.appendChild(tempDiv);
    try {
        let canvas = await html2canvas(tempDiv, { scale: 2, backgroundColor: '#ffffff', logging: false });
        let imgData = canvas.toDataURL('image/png');
        let imgProps = doc.getImageProperties(imgData);
        let pdfWidth = doc.internal.pageSize.getWidth();
        let pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;
        doc.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
        doc.save(`Order_${order.telegramOrderId || order.id}.pdf`);
        fn_12_showToast('✅ تم تحميل فاتورة PDF', 'success');
    } catch(e) { fn_12_showToast('❌ فشل تصدير PDF', 'error'); }
    finally { document.body.removeChild(tempDiv); }
}
function fn_12_addImageInputToForm() {
    let formGroups = document.querySelector('#addProductModal .modal-content form');
    if(formGroups && !document.getElementById('productImage')) {
        let imageGroup = document.createElement('div');
        imageGroup.className = 'form-group';
        imageGroup.innerHTML = '<label>صورة المنتج (للنشر)</label><input type="file" id="productImage" accept="image/*">';
        let categoryGroup = document.querySelector('#productCategory')?.closest('.form-group');
        if(categoryGroup) categoryGroup.insertAdjacentElement('afterend', imageGroup);
    }
}

});
