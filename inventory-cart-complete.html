<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>نظام المخزون المتكامل | ناردو برو</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0a0a1a;
            --secondary: #1a1a2e;
            --gold: #ffd700;
            --gold-dark: #daa520;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --glass: rgba(255, 255, 255, 0.08);
            --success: #4ade80;
            --error: #f87171;
            --warning: #fbbf24;
            --info: #60a5fa;
            --purple: #a855f7;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0f0f1a, #1a1a2e);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* الهيدر */
        .header {
            background: linear-gradient(135deg, rgba(255,215,0,0.1), rgba(255,215,0,0.05));
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            backdrop-filter: blur(10px);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo i {
            font-size: 45px;
            color: var(--gold);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .logo h1 {
            font-size: 28px;
            color: var(--gold);
        }

        .logo p {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .stats {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: rgba(0,0,0,0.5);
            padding: 12px 20px;
            border-radius: 12px;
            text-align: center;
            min-width: 100px;
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            background: rgba(255,215,0,0.1);
        }

        .stat-card i {
            font-size: 24px;
            color: var(--gold);
            margin-bottom: 5px;
        }

        .stat-card .number {
            font-size: 20px;
            font-weight: bold;
        }

        .stat-card .label {
            font-size: 11px;
            color: var(--text-secondary);
        }

        /* أزرار */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Cairo', sans-serif;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:active::before {
            width: 300px;
            height: 300px;
        }

        .btn-gold {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: #1a1a2e;
        }

        .btn-gold:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255,215,0,0.3);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--gold);
        }

        .btn-outline:hover {
            background: rgba(255,215,0,0.1);
            transform: translateY(-2px);
        }

        .btn-danger {
            background: var(--error);
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
            transform: translateY(-2px);
        }

        .btn-info {
            background: var(--info);
            color: white;
        }

        .btn-purple {
            background: linear-gradient(135deg, var(--purple), #7e22ce);
            color: white;
        }

        .btn-purple:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(168,85,247,0.3);
        }

        /* التبويبات */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            border-bottom: 1px solid rgba(255,215,0,0.2);
            padding-bottom: 10px;
        }

        .tab {
            padding: 12px 25px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s;
        }

        .tab.active {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: #1a1a2e;
        }

        .tab:hover:not(.active) {
            color: var(--gold);
            transform: translateY(-2px);
        }

        /* البطاقات */
        .card {
            background: var(--glass);
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .card:hover {
            border-color: var(--gold);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        /* شبكة المنتجات */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: var(--glass);
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 15px;
            padding: 20px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .product-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--gold), var(--gold-dark));
            transform: translateX(-100%);
            transition: transform 0.5s;
        }

        .product-card:hover::before {
            transform: translateX(0);
        }

        .product-card:hover {
            border-color: var(--gold);
            transform: translateY(-5px);
        }

        .product-images {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            margin-bottom: 15px;
            padding-bottom: 10px;
        }

        .product-images img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 10px;
            border: 2px solid var(--gold);
            cursor: pointer;
            transition: all 0.3s;
        }

        .product-images img:hover {
            transform: scale(1.05);
        }

        .product-icon {
            width: 80px;
            height: 80px;
            background: rgba(255,215,0,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
        }

        .product-icon i {
            font-size: 40px;
            color: var(--gold);
        }

        .product-name {
            font-size: 18px;
            font-weight: bold;
            color: var(--gold);
            margin-bottom: 8px;
        }

        .product-price {
            font-size: 22px;
            font-weight: bold;
            color: var(--success);
            margin: 10px 0;
        }

        .stock-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin: 10px 0;
        }

        .stock-high {
            background: rgba(74,222,128,0.2);
            color: var(--success);
        }

        .stock-low {
            background: rgba(251,191,36,0.2);
            color: var(--warning);
        }

        .stock-out {
            background: rgba(248,113,113,0.2);
            color: var(--error);
        }

        /* الجدول */
        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: rgba(255,215,0,0.1);
            padding: 15px;
            text-align: right;
            color: var(--gold);
            font-weight: bold;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid rgba(255,215,0,0.1);
        }

        tr:hover {
            background: rgba(255,215,0,0.05);
        }

        /* المودال */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--secondary);
            border: 2px solid var(--gold);
            border-radius: 20px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp 0.3s;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,215,0,0.2);
        }

        .modal-header h2 {
            color: var(--gold);
        }

        .close-modal {
            background: none;
            border: none;
            color: var(--gold);
            font-size: 28px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .close-modal:hover {
            transform: rotate(90deg);
        }

        /* النماذج */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 10px;
            background: rgba(0,0,0,0.3);
            color: white;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 10px rgba(255,215,0,0.3);
        }

        /* رفع الصور */
        .image-upload {
            border: 2px dashed var(--gold);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .image-upload:hover {
            background: rgba(255,215,0,0.1);
        }

        .image-preview {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .image-preview-item {
            position: relative;
            display: inline-block;
        }

        .image-preview-item img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 10px;
            border: 2px solid var(--gold);
        }

        .remove-image {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--error);
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 12px;
        }

        /* سلة التسوق */
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid rgba(255,215,0,0.1);
            flex-wrap: wrap;
            gap: 10px;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-title {
            font-weight: bold;
            color: var(--gold);
        }

        .quantity-control {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,215,0,0.1);
            padding: 5px 12px;
            border-radius: 8px;
        }

        .quantity-control button {
            background: none;
            border: none;
            color: var(--gold);
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .quantity-control button:hover {
            transform: scale(1.2);
        }

        /* سجل المخزون */
        .stock-log {
            max-height: 500px;
            overflow-y: auto;
        }

        .stock-log-item {
            padding: 10px;
            border-bottom: 1px solid rgba(255,215,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .stock-log-item .date {
            font-size: 11px;
            color: var(--text-secondary);
        }

        /* الإشعارات */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 12px 24px;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            z-index: 2000;
            animation: slideIn 0.3s ease;
        }

        .toast.success { background: var(--success); color: #000; }
        .toast.error { background: var(--error); }
        .toast.warning { background: var(--warning); color: #000; }
        .toast.info { background: var(--info); }

        @keyframes slideIn {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* خلاصة السلة */
        .cart-summary {
            background: linear-gradient(135deg, rgba(255,215,0,0.1), rgba(255,215,0,0.05));
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
        }

        /* الفوتر */
        .footer {
            text-align: center;
            padding: 30px;
            margin-top: 50px;
            border-top: 1px solid rgba(255,215,0,0.2);
            color: var(--text-secondary);
        }

        @media (max-width: 768px) {
            .products-grid {
                grid-template-columns: 1fr;
            }
            .header {
                flex-direction: column;
                text-align: center;
            }
            .modal-content {
                padding: 20px;
                width: 95%;
            }
        }

        .stock-log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .product-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .btn-publish {
            background: linear-gradient(135deg, var(--purple), #7e22ce);
            color: white;
        }

        .btn-publish:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(168,85,247,0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- الهيدر -->
        <div class="header">
            <div class="logo">
                <i class="fas fa-boxes"></i>
                <div>
                    <h1>نظام المخزون المتكامل</h1>
                    <p>إدارة المنتجات - المخزون - السلة - الطلبات</p>
                </div>
            </div>
            <div class="stats">
                <div class="stat-card">
                    <i class="fas fa-cube"></i>
                    <div class="number" id="statTotal">0</div>
                    <div class="label">إجمالي المنتجات</div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-shopping-cart"></i>
                    <div class="number" id="statCart">0</div>
                    <div class="label">في السلة</div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-check-circle"></i>
                    <div class="number" id="statOrders">0</div>
                    <div class="label">الطلبات</div>
                </div>
            </div>
        </div>

        <!-- أزرار التنقل السريع -->
        <div style="display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;">
            <button class="btn btn-outline" onclick="window.location.href='index.html'">
                <i class="fas fa-home"></i> العودة للرئيسية
            </button>
            <button class="btn btn-gold" onclick="openAddProductModal()">
                <i class="fas fa-plus"></i> إضافة منتج
            </button>
        </div>

        <!-- التبويبات -->
        <div class="tabs">
            <button class="tab active" onclick="showTab('products')">
                <i class="fas fa-cube"></i> المنتجات
            </button>
            <button class="tab" onclick="showTab('cart')">
                <i class="fas fa-shopping-cart"></i> السلة
            </button>
            <button class="tab" onclick="showTab('inventory')">
                <i class="fas fa-warehouse"></i> المخزون
            </button>
            <button class="tab" onclick="showTab('stockLog')">
                <i class="fas fa-history"></i> سجل المخزون
            </button>
            <button class="tab" onclick="showTab('orders')">
                <i class="fas fa-list"></i> الطلبات
            </button>
        </div>

        <!-- المنتجات -->
        <div id="productsTab" class="tab-content" style="display: block;">
            <div style="margin-bottom: 20px;">
                <input type="text" id="searchProducts" placeholder="🔍 بحث عن منتج..." 
                       style="width:100%; padding:12px; border-radius:10px; background:rgba(0,0,0,0.3); border:1px solid rgba(255,215,0,0.2); color:white;">
            </div>
            <div id="productsGrid" class="products-grid"></div>
        </div>

        <!-- السلة -->
        <div id="cartTab" class="tab-content" style="display: none;">
            <div id="cartContainer"></div>
        </div>

        <!-- المخزون -->
        <div id="inventoryTab" class="tab-content" style="display: none;">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>المنتج</th>
                            <th>السعر</th>
                            <th>المخزون</th>
                            <th>الحالة</th>
                            <th>الإجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryTable"></tbody>
                </table>
            </div>
        </div>

        <!-- سجل المخزون -->
        <div id="stockLogTab" class="tab-content" style="display: none;">
            <div class="stock-log-header">
                <h3><i class="fas fa-history"></i> سجل حركات المخزون</h3>
                <button class="btn btn-info" onclick="clearStockLog()">
                    <i class="fas fa-trash"></i> مسح السجل
                </button>
            </div>
            <div id="stockLogContainer" class="stock-log"></div>
        </div>

        <!-- الطلبات -->
        <div id="ordersTab" class="tab-content" style="display: none;">
            <div id="ordersContainer"></div>
        </div>
    </div>

    <div class="footer">
        <p>© 2026 ناردو برو - نظام إدارة المخزون المتكامل</p>
    </div>

    <!-- مودال إضافة منتج -->
    <div id="addProductModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-plus-circle"></i> إضافة منتج جديد</h2>
                <button class="close-modal" onclick="closeAddProductModal()">&times;</button>
            </div>
            <form onsubmit="event.preventDefault(); addProduct();">
                <div class="form-group">
                    <label>اسم المنتج *</label>
                    <input type="text" id="productName" required>
                </div>
                <div class="form-group">
                    <label>الوصف</label>
                    <textarea id="productDesc" rows="2"></textarea>
                </div>
                <div class="form-group">
                    <label>السعر (دج) *</label>
                    <input type="number" id="productPrice" required min="0">
                </div>
                <div class="form-group">
                    <label>الكمية الأولية *</label>
                    <input type="number" id="productQty" required min="0">
                </div>
                <div class="form-group">
                    <label>القسم</label>
                    <select id="productCategory">
                        <option value="توابل">توابل</option>
                        <option value="كوسمتيك">كوسمتيك</option>
                        <option value="برموسيو">برموسيو</option>
                        <option value="أخرى">أخرى</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>صور المنتج</label>
                    <div class="image-upload" onclick="document.getElementById('productImages').click()">
                        <i class="fas fa-cloud-upload-alt" style="font-size: 40px;"></i>
                        <p>اضغط لرفع الصور</p>
                        <input type="file" id="productImages" multiple accept="image/*" style="display: none;" onchange="previewImages(this)">
                    </div>
                    <div id="imagePreview" class="image-preview"></div>
                </div>
                <button type="submit" class="btn btn-gold" style="width:100%">حفظ المنتج</button>
            </form>
        </div>
    </div>

    <!-- مودال تعديل المخزون -->
    <div id="editStockModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-edit"></i> تعديل المخزون</h2>
                <button class="close-modal" onclick="closeEditStockModal()">&times;</button>
            </div>
            <form onsubmit="event.preventDefault(); updateStock();">
                <div class="form-group">
                    <label>المنتج</label>
                    <input type="text" id="editProductName" disabled>
                </div>
                <div class="form-group">
                    <label>الكمية الحالية</label>
                    <input type="text" id="editCurrentQty" disabled>
                </div>
                <div class="form-group">
                    <label>نوع العملية</label>
                    <select id="stockOperation">
                        <option value="add">➕ إضافة إلى المخزون</option>
                        <option value="remove">➖ سحب من المخزون</option>
                        <option value="set">📝 تعيين كمية جديدة</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>الكمية</label>
                    <input type="number" id="editNewQty" required min="0">
                </div>
                <div class="form-group">
                    <label>سبب التعديل (اختياري)</label>
                    <input type="text" id="stockReason" placeholder="مثال: وردت شحنة جديدة">
                </div>
                <button type="submit" class="btn btn-gold" style="width:100%">تحديث المخزون</button>
            </form>
        </div>
    </div>

    <!-- مودال عرض الصور -->
    <div id="imageViewerModal" class="modal">
        <div class="modal-content" style="max-width: 800px; text-align: center;">
            <div class="modal-header">
                <h2><i class="fas fa-images"></i> معرض الصور</h2>
                <button class="close-modal" onclick="closeImageViewer()">&times;</button>
            </div>
            <div id="imageViewerContent" style="display: flex; flex-direction: column; gap: 20px; align-items: center;">
                <img id="currentImage" src="" alt="صورة المنتج" style="max-width: 100%; max-height: 400px; border-radius: 10px;">
                <div id="imageThumbnails" style="display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;"></div>
            </div>
        </div>
    </div>

    <script>
        // ==================== البيانات الأساسية ====================
        let products = JSON.parse(localStorage.getItem('inventory_products') || '[]');
        let cart = JSON.parse(localStorage.getItem('inventory_cart') || '[]');
        let orders = JSON.parse(localStorage.getItem('inventory_orders') || '[]');
        let stockLog = JSON.parse(localStorage.getItem('inventory_stock_log') || '[]');
        let editProductId = null;
        let currentImages = [];

        // ==================== دوال التبويبات ====================
        function showTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
            document.getElementById(tab + 'Tab').style.display = 'block';
            document.querySelectorAll('.tab').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            if (tab === 'products') renderProducts();
            if (tab === 'cart') renderCart();
            if (tab === 'inventory') renderInventory();
            if (tab === 'stockLog') renderStockLog();
            if (tab === 'orders') renderOrders();
        }

        // ==================== معاينة الصور ====================
        function previewImages(input) {
            const preview = document.getElementById('imagePreview');
            preview.innerHTML = '';
            currentImages = [];
            
            for (let i = 0; i < input.files.length; i++) {
                const file = input.files[i];
                const reader = new FileReader();
                
                reader.onload = function(e) {
                    currentImages.push(e.target.result);
                    const div = document.createElement('div');
                    div.className = 'image-preview-item';
                    div.innerHTML = `
                        <img src="${e.target.result}" alt="معاينة">
                        <div class="remove-image" onclick="removeImage(${currentImages.length - 1})">×</div>
                    `;
                    preview.appendChild(div);
                };
                
                reader.readAsDataURL(file);
            }
        }

        function removeImage(index) {
            currentImages.splice(index, 1);
            const preview = document.getElementById('imagePreview');
            preview.innerHTML = '';
            currentImages.forEach((img, i) => {
                const div = document.createElement('div');
                div.className = 'image-preview-item';
                div.innerHTML = `
                    <img src="${img}" alt="معاينة">
                    <div class="remove-image" onclick="removeImage(${i})">×</div>
                `;
                preview.appendChild(div);
            });
        }

        // ==================== عرض المنتجات ====================
        function renderProducts() {
            const search = document.getElementById('searchProducts')?.value.toLowerCase() || '';
            const filtered = products.filter(p => p.name.toLowerCase().includes(search));
            const container = document.getElementById('productsGrid');
            
            if (filtered.length === 0) {
                container.innerHTML = '<div class="card" style="text-align:center"><i class="fas fa-box-open" style="font-size:50px"></i><p>لا توجد منتجات</p></div>';
                return;
            }
            
            container.innerHTML = filtered.map(p => {
                let stockClass = p.quantity > 10 ? 'stock-high' : (p.quantity > 0 ? 'stock-low' : 'stock-out');
                let stockText = p.quantity > 10 ? 'متوفر' : (p.quantity > 0 ? 'مخزون منخفض' : 'نفد');
                let imagesHtml = '';
                if (p.images && p.images.length > 0) {
                    imagesHtml = `
                        <div class="product-images">
                            ${p.images.slice(0, 3).map(img => `<img src="${img}" onclick="viewImages(${p.id})" alt="صورة">`).join('')}
                            ${p.images.length > 3 ? `<div class="product-icon" style="width:80px;height:80px;cursor:pointer" onclick="viewImages(${p.id})"><i class="fas fa-plus"></i> ${p.images.length-3}</div>` : ''}
                        </div>
                    `;
                } else {
                    imagesHtml = `<div class="product-icon"><i class="fas fa-cube"></i></div>`;
                }
                
                return `
                    <div class="product-card">
                        ${imagesHtml}
                        <div class="product-name">${p.name}</div>
                        <div class="product-price">${p.price.toLocaleString()} دج</div>
                        <div><span class="stock-badge ${stockClass}">${stockText} (${p.quantity})</span></div>
                        <div class="product-actions">
                            ${p.quantity > 0 ? `<button class="btn btn-gold" onclick="addToCart(${p.id})"><i class="fas fa-cart-plus"></i> أضف للسلة</button>` : 
                                              `<button class="btn btn-outline" disabled>غير متوفر</button>`}
                            <button class="btn btn-publish" onclick="publishProduct(${p.id})" title="نشر المنتج (قريباً)">
                                <i class="fas fa-share-alt"></i> نشر
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ==================== دالة نشر المنتج (في انتظار البرمجة) ====================
        function publishProduct(productId) {
            const product = products.find(p => p.id === productId);
            if (product) {
                showToast(`📢 سيتم إضافة خاصية نشر المنتج "${product.name}" قريباً...`, 'info');
                console.log('سيتم برمجة هذه الميزة لاحقاً - المنتج:', product);
            } else {
                showToast('حدث خطأ، المنتج غير موجود', 'error');
            }
        }

        // ==================== عرض الصور ====================
        function viewImages(productId) {
            const product = products.find(p => p.id === productId);
            if (product && product.images && product.images.length > 0) {
                document.getElementById('currentImage').src = product.images[0];
                const thumbnails = document.getElementById('imageThumbnails');
                thumbnails.innerHTML = product.images.map((img, idx) => `
                    <img src="${img}" style="width: 80px; height: 80px; object-fit: cover; border-radius: 10px; cursor: pointer; border: 2px solid var(--gold)" 
                         onclick="document.getElementById('currentImage').src='${img}'">
                `).join('');
                document.getElementById('imageViewerModal').classList.add('active');
            }
        }

        function closeImageViewer() {
            document.getElementById('imageViewerModal').classList.remove('active');
        }

        // ==================== إضافة للسلة ====================
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            if (!product || product.quantity <= 0) {
                showToast('المنتج غير متوفر', 'error');
                return;
            }
            
            const existing = cart.find(i => i.id === productId);
            if (existing) {
                if (existing.quantity < product.quantity) {
                    existing.quantity++;
                } else {
                    showToast('لا يمكن إضافة أكثر من المتوفر', 'warning');
                    return;
                }
            } else {
                cart.push({ 
                    id: product.id,
                    name: product.name,
                    price: product.price,
                    quantity: 1,
                    images: product.images || []
                });
            }
            
            localStorage.setItem('inventory_cart', JSON.stringify(cart));
            updateStats();
            showToast('✅ تم إضافة المنتج للسلة', 'success');
            renderCart();
        }

        // ==================== عرض السلة ====================
        function renderCart() {
            const container = document.getElementById('cartContainer');
            if (cart.length === 0) {
                container.innerHTML = '<div class="card" style="text-align:center"><i class="fas fa-shopping-cart" style="font-size:50px"></i><p>السلة فارغة</p></div>';
                return;
            }
            
            let total = 0;
            let html = '';
            cart.forEach((item, idx) => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                html += `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <div class="cart-item-title">${item.name}</div>
                            <div style="font-size:12px; color:#aaa">${item.price.toLocaleString()} دج</div>
                        </div>
                        <div class="quantity-control">
                            <button onclick="updateQty(${item.id}, -1)">-</button>
                            <span>${item.quantity}</span>
                            <button onclick="updateQty(${item.id}, 1)">+</button>
                        </div>
                        <div style="min-width:80px; text-align:center">${itemTotal.toLocaleString()} دج</div>
                        <button class="btn btn-danger" style="padding:5px 12px" onclick="removeFromCart(${item.id})"><i class="fas fa-trash"></i></button>
                    </div>
                `;
            });
            
            html += `
                <div class="cart-summary">
                    <div style="display:flex; justify-content:space-between; margin-bottom:15px">
                        <span>المجموع:</span>
                        <span style="font-size:24px; color:var(--success)">${total.toLocaleString()} دج</span>
                    </div>
                    <div style="display:flex; gap:10px">
                        <button class="btn btn-gold" onclick="checkout()" style="flex:1"><i class="fas fa-check"></i> إتمام الطلب</button>
                        <button class="btn btn-outline" onclick="clearCart()" style="flex:1"><i class="fas fa-trash"></i> مسح الكل</button>
                    </div>
                </div>
            `;
            container.innerHTML = html;
            updateStats();
        }

        function updateQty(id, change) {
            const itemIndex = cart.findIndex(i => i.id === id);
            if (itemIndex === -1) return;
            
            const item = cart[itemIndex];
            const product = products.find(p => p.id === id);
            
            if (item && product) {
                const newQty = item.quantity + change;
                if (newQty <= 0) {
                    removeFromCart(id);
                } else if (newQty <= product.quantity) {
                    item.quantity = newQty;
                    localStorage.setItem('inventory_cart', JSON.stringify(cart));
                    renderCart();
                } else {
                    showToast('لا يمكن إضافة أكثر من المتوفر', 'warning');
                }
            }
        }

        function removeFromCart(id) {
            cart = cart.filter(i => i.id !== id);
            localStorage.setItem('inventory_cart', JSON.stringify(cart));
            renderCart();
            renderProducts();
            updateStats();
        }

        function clearCart() {
            if (confirm('هل تريد مسح السلة بالكامل؟')) {
                cart = [];
                localStorage.setItem('inventory_cart', JSON.stringify(cart));
                renderCart();
                updateStats();
                showToast('تم مسح السلة', 'success');
            }
        }

        // ==================== إتمام الطلب ====================
        function checkout() {
            if (cart.length === 0) {
                showToast('السلة فارغة', 'error');
                return;
            }
            
            const order = {
                id: Date.now(),
                date: new Date().toLocaleString('ar-EG'),
                items: [...cart],
                total: cart.reduce((sum, i) => sum + (i.price * i.quantity), 0),
                status: 'pending'
            };
            
            orders.unshift(order);
            localStorage.setItem('inventory_orders', JSON.stringify(orders));
            
            // تحديث المخزون وتسجيل الحركة
            cart.forEach(item => {
                const product = products.find(p => p.id === item.id);
                if (product) {
                    const oldQty = product.quantity;
                    product.quantity -= item.quantity;
                    addStockLog(product.id, product.name, 'remove', item.quantity, oldQty, product.quantity, `شراء منتج (طلب #${order.id})`);
                }
            });
            localStorage.setItem('inventory_products', JSON.stringify(products));
            
            cart = [];
            localStorage.setItem('inventory_cart', JSON.stringify(cart));
            
            updateStats();
            renderProducts();
            renderCart();
            renderOrders();
            renderInventory();
            renderStockLog();
            showToast('✅ تم إتمام الطلب بنجاح', 'success');
        }

        // ==================== عرض المخزون ====================
        function renderInventory() {
            const tbody = document.getElementById('inventoryTable');
            if (products.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center">لا توجد منتجات</td></tr>';
                return;
            }
            
            tbody.innerHTML = products.map(p => {
                let stockClass = p.quantity > 10 ? 'stock-high' : (p.quantity > 0 ? 'stock-low' : 'stock-out');
                let stockText = p.quantity > 10 ? 'متوفر' : (p.quantity > 0 ? 'منخفض' : 'نفد');
                return `
                    <tr>
                        <td>${p.name}</td>
                        <td>${p.price.toLocaleString()} دج</td>
                        <td>${p.quantity}</td>
                        <td><span class="stock-badge ${stockClass}">${stockText}</span></td>
                        <td>
                            <button class="btn btn-gold" style="padding:5px 12px" onclick="openEditStockModal(${p.id})">
                                <i class="fas fa-edit"></i> تعديل
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // ==================== سجل المخزون ====================
        function addStockLog(productId, productName, operation, quantity, oldQty, newQty, reason = '') {
            const log = {
                id: Date.now(),
                productId,
                productName,
                operation, // add, remove, set
                quantity: quantity,
                oldQty: oldQty,
                newQty: newQty,
                reason: reason,
                date: new Date().toLocaleString('ar-EG'),
                timestamp: Date.now()
            };
            stockLog.unshift(log);
            // الاحتفاظ بآخر 1000 سجل فقط
            if (stockLog.length > 1000) stockLog = stockLog.slice(0, 1000);
            localStorage.setItem('inventory_stock_log', JSON.stringify(stockLog));
        }

        function renderStockLog() {
            const container = document.getElementById('stockLogContainer');
            if (stockLog.length === 0) {
                container.innerHTML = '<div class="card" style="text-align:center"><i class="fas fa-history" style="font-size:50px"></i><p>لا توجد حركات مخزون مسجلة</p></div>';
                return;
            }
            
            container.innerHTML = stockLog.map(log => {
                let operationIcon = '';
                let operationText = '';
                switch(log.operation) {
                    case 'add':
                        operationIcon = '➕';
                        operationText = 'إضافة';
                        break;
                    case 'remove':
                        operationIcon = '➖';
                        operationText = 'سحب';
                        break;
                    case 'set':
                        operationIcon = '📝';
                        operationText = 'تعيين';
                        break;
                }
                return `
                    <div class="stock-log-item">
                        <div>
                            <strong style="color: var(--gold)">${log.productName}</strong><br>
                            <span style="font-size: 12px;">${operationIcon} ${operationText}</span>
                            <span style="font-size: 12px;"> | الكمية: ${log.quantity}</span><br>
                            <span style="font-size: 11px; color: var(--text-secondary)">من ${log.oldQty} → إلى ${log.newQty}</span>
                            ${log.reason ? `<br><span style="font-size: 11px;">📝 ${log.reason}</span>` : ''}
                        </div>
                        <div class="date">
                            ${log.date}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function clearStockLog() {
            if (confirm('هل أنت متأكد من مسح سجل المخزون بالكامل؟')) {
                stockLog = [];
                localStorage.setItem('inventory_stock_log', JSON.stringify(stockLog));
                renderStockLog();
                showToast('تم مسح سجل المخزون', 'success');
            }
        }

        // ==================== تعديل المخزون ====================
        function openEditStockModal(id) {
            editProductId = id;
            const p = products.find(p => p.id === id);
            if (p) {
                document.getElementById('editProductName').value = p.name;
                document.getElementById('editCurrentQty').value = p.quantity;
                document.getElementById('editNewQty').value = 0;
                document.getElementById('stockOperation').value = 'add';
                document.getElementById('stockReason').value = '';
                document.getElementById('editStockModal').classList.add('active');
            }
        }

        function closeEditStockModal() {
            document.getElementById('editStockModal').classList.remove('active');
            editProductId = null;
        }

        function updateStock() {
            const p = products.find(p => p.id === editProductId);
            if (!p) {
                showToast('المنتج غير موجود', 'error');
                return;
            }
            
            const operation = document.getElementById('stockOperation').value;
            const qtyChange = parseInt(document.getElementById('editNewQty').value);
            const reason = document.getElementById('stockReason').value;
            const oldQty = p.quantity;
            let newQty = oldQty;
            
            if (isNaN(qtyChange) || qtyChange < 0) {
                showToast('الرجاء إدخال كمية صحيحة', 'error');
                return;
            }
            
            if (operation === 'add') {
                newQty = oldQty + qtyChange;
                addStockLog(p.id, p.name, 'add', qtyChange, oldQty, newQty, reason || 'إضافة إلى المخزون');
                showToast(`✅ تمت إضافة ${qtyChange} قطعة إلى المخزون`, 'success');
            } else if (operation === 'remove') {
                if (qtyChange > oldQty) {
                    showToast('لا يمكن سحب كمية أكبر من المتوفرة', 'error');
                    return;
                }
                newQty = oldQty - qtyChange;
                addStockLog(p.id, p.name, 'remove', qtyChange, oldQty, newQty, reason || 'سحب من المخزون');
                showToast(`✅ تم سحب ${qtyChange} قطعة من المخزون`, 'success');
            } else if (operation === 'set') {
                const difference = Math.abs(qtyChange - oldQty);
                addStockLog(p.id, p.name, 'set', difference, oldQty, qtyChange, reason || `تعديل الكمية من ${oldQty} إلى ${qtyChange}`);
                newQty = qtyChange;
                showToast(`✅ تم تعيين الكمية إلى ${qtyChange} قطعة`, 'success');
            }
            
            p.quantity = newQty;
            localStorage.setItem('inventory_products', JSON.stringify(products));
            
            // تحديث السلة إذا كان المنتج موجود فيها
            const cartItem = cart.find(i => i.id === editProductId);
            if (cartItem && cartItem.quantity > newQty) {
                cartItem.quantity = newQty;
                localStorage.setItem('inventory_cart', JSON.stringify(cart));
                renderCart();
            }
            
            renderProducts();
            renderInventory();
            renderStockLog();
            updateStats();
            closeEditStockModal();
        }

        // ==================== عرض الطلبات ====================
        function renderOrders() {
            const container = document.getElementById('ordersContainer');
            if (orders.length === 0) {
                container.innerHTML = '<div class="card" style="text-align:center"><i class="fas fa-inbox" style="font-size:50px"></i><p>لا توجد طلبات</p></div>';
                return;
            }
            
            container.innerHTML = orders.map(order => `
                <div class="card">
                    <div style="display:flex; justify-content:space-between; margin-bottom:15px">
                        <div>
                            <i class="fas fa-receipt"></i> <strong>طلب #${order.id}</strong>
                        </div>
                        <span style="color:var(--gold)">${order.date}</span>
                    </div>
                    ${order.items.map(item => `
                        <div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid rgba(255,215,0,0.1)">
                            <span>${item.name} × ${item.quantity}</span>
                            <span>${(item.price * item.quantity).toLocaleString()} دج</span>
                        </div>
                    `).join('')}
                    <div style="margin-top:15px; padding-top:10px; border-top:2px solid var(--gold); display:flex; justify-content:space-between">
                        <strong>الإجمالي</strong>
                        <strong style="color:var(--success)">${order.total.toLocaleString()} دج</strong>
                    </div>
                </div>
            `).join('');
        }

        // ==================== إضافة منتج ====================
        function openAddProductModal() {
            document.getElementById('addProductModal').classList.add('active');
        }

        function closeAddProductModal() {
            document.getElementById('addProductModal').classList.remove('active');
            document.getElementById('imagePreview').innerHTML = '';
            currentImages = [];
            document.getElementById('addProductModal').querySelector('form').reset();
        }

        function addProduct() {
            const name = document.getElementById('productName').value;
            const price = parseInt(document.getElementById('productPrice').value);
            const quantity = parseInt(document.getElementById('productQty').value);
            
            if (!name || !price) {
                showToast('يرجى ملء البيانات المطلوبة', 'error');
                return;
            }
            
            const product = {
                id: Date.now(),
                name: name,
                description: document.getElementById('productDesc').value,
                price: price,
                quantity: quantity,
                category: document.getElementById('productCategory').value,
                images: [...currentImages]
            };
            
            products.push(product);
            localStorage.setItem('inventory_products', JSON.stringify(products));
            
            // تسجيل حركة إضافة المنتج للمخزون
            addStockLog(product.id, product.name, 'add', product.quantity, 0, product.quantity, 'إضافة منتج جديد');
            
            renderProducts();
            renderInventory();
            renderStockLog();
            updateStats();
            showToast('✅ تم إضافة المنتج', 'success');
            closeAddProductModal();
        }

        // ==================== الإحصائيات ====================
        function updateStats() {
            document.getElementById('statTotal').innerText = products.length;
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('statCart').innerText = totalItems;
            document.getElementById('statOrders').innerText = orders.length;
        }

        // ==================== الإشعارات ====================
        function showToast(msg, type) {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // ==================== البحث ====================
        document.addEventListener('DOMContentLoaded', () => {
            updateStats();
            renderProducts();
            if (document.getElementById('searchProducts')) {
                document.getElementById('searchProducts').addEventListener('input', renderProducts);
            }
        });
    </script>
</body>
</html>
