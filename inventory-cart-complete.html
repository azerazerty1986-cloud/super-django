<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ناردو برو | المتجر الذكي - طلبات تلجرام</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #0a0a1a;
            --secondary: #1a1a2e;
            --gold: #ffd700;
            --gold-dark: #daa520;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --success: #4ade80;
            --error: #f87171;
            --warning: #fbbf24;
            --info: #60a5fa;
            --telegram: #0088cc;
        }
        
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0b0b14 0%, #15152a 100%);
            color: var(--text-primary);
            min-height: 100vh;
        }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        .top-navbar {
            background: linear-gradient(135deg, rgba(10,10,26,0.95), rgba(26,26,46,0.95));
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,215,0,0.25);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-left { flex: 1; display: flex; justify-content: flex-start; }
        .nav-logo { display: flex; align-items: center; gap: 10px; }
        .nav-logo i { font-size: 28px; color: var(--gold); }
        .nav-logo .logo-text { font-size: 18px; font-weight: 800; background: linear-gradient(135deg, #ffd700, #ffed4e); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .nav-logo small { font-size: 9px; color: #888; display: block; }

        .nav-center { flex: 1; display: flex; justify-content: center; }
        .store-circle { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: all 0.3s ease; }
        .circle-icon { width: 55px; height: 55px; background: linear-gradient(135deg, var(--gold), var(--gold-dark)); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(255,215,0,0.4); transition: all 0.3s ease; }
        .circle-icon i { font-size: 28px; color: #111; }
        .store-circle:hover .circle-icon { transform: scale(1.1); box-shadow: 0 6px 25px rgba(255,215,0,0.6); }
        .store-name-circle { font-size: 11px; font-weight: 700; margin-top: 6px; color: var(--gold); background: rgba(255,215,0,0.15); padding: 3px 10px; border-radius: 20px; }

        .nav-right { flex: 1; display: flex; justify-content: flex-end; gap: 10px; }
        .nav-btn { padding: 8px 18px; border-radius: 40px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; font-family: 'Cairo', sans-serif; display: flex; align-items: center; gap: 6px; transition: all 0.2s ease; }
        .nav-btn-telegram { background: linear-gradient(135deg, #0088cc, #006699); color: white; }
        .nav-btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: #111; }
        .nav-btn-outline { background: transparent; border: 1px solid rgba(255,215,0,0.4); color: var(--gold); }
        .nav-btn-outline:hover { background: rgba(255,215,0,0.1); }

        .tabs-bar {
            background: linear-gradient(135deg, rgba(10,10,26,0.9), rgba(26,26,46,0.9));
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,215,0,0.15);
            padding: 10px 20px;
            display: flex;
            justify-content: center;
            gap: 12px;
            position: sticky;
            top: 70px;
            z-index: 999;
            flex-wrap: wrap;
        }
        .tab-btn { padding: 10px 28px; border-radius: 40px; background: transparent; color: var(--text-secondary); font-weight: 700; font-size: 15px; cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; gap: 8px; border: none; font-family: 'Cairo', sans-serif; }
        .tab-btn:hover { background: rgba(255,215,0,0.1); color: var(--gold); }
        .tab-btn.active { background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,215,0,0.08)); color: var(--gold); border: 1px solid rgba(255,215,0,0.25); }

        .toolbar { background: linear-gradient(135deg, rgba(255,215,0,0.05), rgba(0,0,0,0.2)); border-radius: 28px; padding: 12px 20px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        .search-box { display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,215,0,0.15); border-radius: 40px; padding: 8px 18px; flex: 1; max-width: 300px; }
        .search-box i { color: var(--gold); }
        .search-box input { background: transparent; border: none; color: white; font-family: 'Cairo', sans-serif; font-size: 13px; width: 100%; }
        .search-box input:focus { outline: none; }
        .btn { padding: 10px 24px; border: none; border-radius: 40px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'Cairo', sans-serif; display: inline-flex; align-items: center; gap: 8px; transition: all 0.2s ease; }
        .btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: #111; }
        .btn-telegram { background: linear-gradient(135deg, #0088cc, #006699); color: white; }
        .btn-outline { background: transparent; border: 2px solid var(--gold); color: var(--gold); }
        .btn-info { background: linear-gradient(135deg, #60a5fa, #3b82f6); color: white; }
        .btn-success { background: linear-gradient(135deg, #4ade80, #22c55e); color: white; }
        .btn-error { background: linear-gradient(135deg, #f87171, #ef4444); color: white; }
        .btn-sm { padding: 5px 12px; font-size: 12px; }

        .table-container { background: rgba(0,0,0,0.25); border-radius: 24px; border: 1px solid rgba(255,215,0,0.12); overflow-x: auto; margin-bottom: 20px; }
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th { text-align: right; padding: 14px 16px; background: linear-gradient(135deg, rgba(255,215,0,0.12), rgba(255,215,0,0.06)); color: var(--gold); font-weight: 800; font-size: 13px; }
        .data-table td { padding: 12px 16px; border-bottom: 1px solid rgba(255,215,0,0.06); font-size: 13px; }
        .data-table tr:hover td { background: rgba(255,215,0,0.05); }

        .stock-log-item { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,215,0,0.1); border-radius: 16px; padding: 12px 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: linear-gradient(135deg, rgba(26,26,46,0.98), rgba(10,10,25,0.98)); border: 1px solid rgba(255,215,0,0.2); border-radius: 28px; padding: 28px; max-width: 500px; width: 90%; max-height: 90vh; overflow-y: auto; }
        .modal-header { font-size: 22px; font-weight: 900; color: var(--gold); margin-bottom: 20px; display: flex; justify-content: space-between; }
        .modal-close { background: none; border: none; color: var(--gold); font-size: 28px; cursor: pointer; }
        
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; font-weight: 700; color: var(--gold); margin-bottom: 8px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 14px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,215,0,0.15); border-radius: 12px; color: white; font-family: 'Cairo', sans-serif; font-size: 13px; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--gold); }

        .order-card { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,215,0,0.1); border-radius: 16px; padding: 16px; margin-bottom: 16px; }
        .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .status-badge.pending { background: rgba(251,191,36,0.15); color: var(--warning); }
        .status-badge.delivered { background: rgba(74,222,128,0.15); color: var(--success); }
        .order-customer-info { background: rgba(0,0,0,0.2); padding: 12px; border-radius: 12px; margin-bottom: 12px; font-size: 13px; }
        .order-customer-info div { margin-bottom: 6px; }
        .order-items { background: rgba(0,0,0,0.2); padding: 12px; border-radius: 12px; margin-bottom: 12px; font-size: 13px; }

        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-secondary); }
        .empty-state i { font-size: 48px; margin-bottom: 16px; color: var(--gold); opacity: 0.5; }
        .empty-state p { margin-bottom: 20px; }

        .toast { position: fixed; bottom: 20px; right: 20px; padding: 14px 20px; border-radius: 12px; font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 10px; z-index: 3000; animation: slideIn 0.3s ease; }
        .toast.success { background: rgba(74,222,128,0.2); color: var(--success); border: 1px solid var(--success); }
        .toast.error { background: rgba(248,113,113,0.2); color: var(--error); border: 1px solid var(--error); }
        .toast.warning { background: rgba(251,191,36,0.2); color: var(--warning); border: 1px solid var(--warning); }
        .toast.info { background: rgba(96,165,250,0.2); color: var(--info); border: 1px solid var(--info); }
        @keyframes slideIn { from { transform: translateX(400px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>
    <!-- ========== شريط التنقل العلوي ========== -->
    <div class="top-navbar">
        <div class="nav-left">
            <div class="nav-logo">
                <i class="fas fa-store"></i>
                <div>
                    <div class="logo-text">ناردو برو</div>
                    <small>إدارة المتجر الذكية</small>
                </div>
            </div>
        </div>
        <div class="nav-center">
            <div class="store-circle" onclick="openStoreModal()">
                <div class="circle-icon"><i class="fas fa-cog"></i></div>
                <div class="store-name-circle" id="storeNameDisplay">متجري</div>
            </div>
        </div>
        <div class="nav-right">
            <button class="nav-btn nav-btn-telegram" onclick="fetchOrdersFromTelegram()"><i class="fas fa-download"></i> جلب الطلبات</button>
            <button class="nav-btn nav-btn-gold" onclick="openStoreModal()"><i class="fas fa-sliders-h"></i> الإعدادات</button>
        </div>
    </div>

    <!-- ========== شريط التبويبات ========== -->
    <div class="tabs-bar">
        <button class="tab-btn active" onclick="switchTab('orders')"><i class="fas fa-receipt"></i> الطلبات</button>
        <button class="tab-btn" onclick="switchTab('products')"><i class="fas fa-box"></i> المنتجات</button>
        <button class="tab-btn" onclick="switchTab('stockLog')"><i class="fas fa-history"></i> سجل المخزون</button>
    </div>

    <!-- ========== المحتوى الرئيسي ========== -->
    <div class="container">
        <!-- ========== تبويب الطلبات ========== -->
        <div id="ordersTab" class="tab-content active">
            <div class="toolbar">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchOrders" placeholder="ابحث عن طلب...">
                </div>
                <div style="display: flex; gap: 10px;">
                    <button class="btn btn-gold" onclick="exportAllOrders()"><i class="fas fa-download"></i> تصدير</button>
                </div>
            </div>
            <div id="ordersContainer"></div>
        </div>

        <!-- ========== تبويب المنتجات ========== -->
        <div id="productsTab" class="tab-content" style="display: none;">
            <div class="toolbar">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchProducts" placeholder="ابحث عن منتج...">
                </div>
                <div style="display: flex; gap: 10px;">
                    <button class="btn btn-telegram" onclick="fetchProductsFromTelegram()"><i class="fas fa-download"></i> جلب من تلغرام</button>
                    <button class="btn btn-gold" onclick="openAddProductModal()"><i class="fas fa-plus"></i> منتج جديد</button>
                </div>
            </div>
            <div id="productsContainer"></div>
        </div>

        <!-- ========== تبويب سجل المخزون ========== -->
        <div id="stockLogTab" class="tab-content" style="display: none;">
            <div class="toolbar">
                <button class="btn btn-error" onclick="clearStockLog()"><i class="fas fa-trash"></i> مسح السجل</button>
            </div>
            <div id="stockLogContainer"></div>
        </div>
    </div>

    <!-- ========== مودال إعدادات المتجر ========== -->
    <div id="storeModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span>إعدادات المتجر</span>
                <button class="modal-close" onclick="closeStoreModal()">&times;</button>
            </div>
            <div class="form-group">
                <label>اسم المتجر</label>
                <input type="text" id="storeName" placeholder="اسم متجرك">
            </div>
            <div class="form-group">
                <label>معرف المتجر (سيتم إنشاؤه تلقائياً)</label>
                <input type="text" id="storeID" readonly>
            </div>
            <button class="btn btn-gold" style="width: 100%; margin-top: 20px;" onclick="saveStore()">حفظ</button>
        </div>
    </div>

    <!-- ========== مودال إضافة منتج ========== -->
    <div id="addProductModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span>منتج جديد</span>
                <button class="modal-close" onclick="closeAddProductModal()">&times;</button>
            </div>
            <div class="form-group">
                <label>اسم المنتج</label>
                <input type="text" id="productName" placeholder="اسم المنتج">
            </div>
            <div class="form-group">
                <label>السعر (دج)</label>
                <input type="number" id="productPrice" placeholder="السعر">
            </div>
            <div class="form-group">
                <label>الكمية</label>
                <input type="number" id="productQty" placeholder="الكمية">
            </div>
            <div class="form-group">
                <label>الصور</label>
                <input type="file" id="productImages" multiple accept="image/*" onchange="previewImages(this)">
                <div id="imagePreview" style="display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap;"></div>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button type="button" class="btn btn-outline" onclick="closeAddProductModal()" style="flex:1">إلغاء</button>
                <button type="button" class="btn btn-gold" onclick="saveProduct()" style="flex:1"><i class="fas fa-save"></i> حفظ</button>
                <button type="button" class="btn btn-telegram" onclick="saveAndPublishProduct()" style="flex:1"><i class="fab fa-telegram"></i> حفظ ونشر</button>
            </div>
        </div>
    </div>

    <!-- ========== مودال تعديل المخزون ========== -->
    <div id="editStockModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span>تعديل المخزون</span>
                <button class="modal-close" onclick="closeEditStockModal()">&times;</button>
            </div>
            <div class="form-group">
                <label>اسم المنتج</label>
                <input type="text" id="editProductName" readonly>
            </div>
            <div class="form-group">
                <label>معرف المنتج</label>
                <input type="text" id="editProductID" readonly>
            </div>
            <div class="form-group">
                <label>الكمية الحالية</label>
                <input type="number" id="editCurrentQty" readonly>
            </div>
            <div class="form-group">
                <label>العملية</label>
                <select id="stockOperation">
                    <option value="add">إضافة</option>
                    <option value="remove">سحب</option>
                    <option value="set">تعيين</option>
                </select>
            </div>
            <div class="form-group">
                <label>الكمية</label>
                <input type="number" id="editNewQty" placeholder="0">
            </div>
            <div class="form-group">
                <label>السبب (اختياري)</label>
                <input type="text" id="stockReason" placeholder="سبب التعديل">
            </div>
            <button class="btn btn-gold" style="width: 100%; margin-top: 20px;" onclick="updateStock()">تحديث</button>
        </div>
    </div>

    <script>
    // ========== إعدادات تلغرام ==========
    const TELEGRAM = {
        botToken: '8576673096:AAGvSMjzwVWj6wJ47JdqiDwcObXjBDcyiLA',
        channelId: '-1003822964890',
        apiUrl: 'https://api.telegram.org/bot'
    };

    // ========== إدارة التخزين الآمن ==========
    const safeLocalStorage = {
        set: function(key, value) {
            try {
                localStorage.setItem(key, JSON.stringify(value));
                return true;
            } catch (e) {
                if (e.name === 'QuotaExceededError' || e.name === 'NS_ERROR_DOM_QUOTA_REACHED') {
                    console.warn('⚠️ مساحة التخزين ممتلئة، جاري تنظيف البيانات القديمة...');
                    this.autoCleanup();
                    try {
                        localStorage.setItem(key, JSON.stringify(value));
                        return true;
                    } catch (retryError) {
                        showToast('❌ فشل التخزين: المساحة ممتلئة جداً', 'error');
                        return false;
                    }
                }
                return false;
            }
        },
        get: function(key, defaultValue = '[]') {
            try {
                const item = localStorage.getItem(key);
                return item ? JSON.parse(item) : JSON.parse(defaultValue);
            } catch (e) {
                return JSON.parse(defaultValue);
            }
        },
        autoCleanup: function() {
            let allOrders = this.get('nardo_orders');
            if (allOrders.length > 100) {
                allOrders = allOrders.slice(0, 100);
                localStorage.setItem('nardo_orders', JSON.stringify(allOrders));
            }
            let logs = this.get('nardo_stock_log');
            if (logs.length > 100) {
                logs = logs.slice(-100);
                localStorage.setItem('nardo_stock_log', JSON.stringify(logs));
            }
        }
    };

    let products = safeLocalStorage.get('nardo_products');
    let orders = safeLocalStorage.get('nardo_orders');
    let stockLog = safeLocalStorage.get('nardo_stock_log');
    let currentStore = null;
    let editProductId = null;
    let currentImages = [];

    // ========== دالة استخراج البيانات من نص الرسالة ==========
    function extractOrderDataFromText(text) {
        try {
            const patterns = {
                storeID: /معرف المتجر:\s*([^\n]+)/,
                customerName: /المشتري:\s*([^\n]+)/,
                customerPhone: /الهاتف:\s*([^\n]+)/,
                customerAddress: /العنوان:\s*([^\n]+)/,
                productID: /([A-Z0-9\u0600-\u06FF]+-\d+-\d+)|([A-Z0-9\u0600-\u06FF]+\d+)/i,
                quantity: /الكمية:\s*(\d+)/,
                total: /إجمالي المتجر:\s*([\d,]+)/,
                notes: /ملاحظات:\s*([^\n]+)/,
                orderNumber: /رقم الطلب:\s*(\d+)/,
                date: /التاريخ:\s*([^\n]+)/
            };
            
            const storeID = (text.match(patterns.storeID)?.[1] || '').trim();
            const customerName = (text.match(patterns.customerName)?.[1] || '').trim();
            const customerPhone = (text.match(patterns.customerPhone)?.[1] || '').trim();
            const customerAddress = (text.match(patterns.customerAddress)?.[1] || '').trim();
            
            let productID = '';
            const productMatch = text.match(patterns.productID);
            if (productMatch) {
                productID = (productMatch[1] || productMatch[2] || '').trim();
            }
            
            let quantity = 1;
            const qtyMatch = text.match(patterns.quantity);
            if (qtyMatch) {
                quantity = parseInt(qtyMatch[1]);
            }
            
            const totalStr = (text.match(patterns.total)?.[1] || '0').replace(/,/g, '');
            const total = parseInt(totalStr);
            const notes = (text.match(patterns.notes)?.[1] || '').trim();
            const orderNumber = (text.match(patterns.orderNumber)?.[1] || Date.now().toString()).trim();
            const date = (text.match(patterns.date)?.[1] || new Date().toLocaleString('ar-EG')).trim();
            
            if (!productID) {
                console.warn("⚠️ فشل استخراج معرف المنتج من النص");
                return null;
            }
            
            return {
                storeID,
                customerName: customerName || 'عميل ناردو',
                customerPhone,
                customerAddress,
                productID,
                quantity,
                total,
                notes,
                orderNumber,
                date
            };
        } catch (error) {
            console.error('❌ خطأ في استخراج البيانات:', error);
            return null;
        }
    }

    // ========== دالة جلب الطلبات من تلغرام ==========
    async function fetchOrdersFromTelegram() {
        try {
            if (!currentStore) {
                showToast('⚠️ يرجى تحديد المتجر أولاً', 'warning');
                return;
            }

            showToast('📡 جاري جلب الطلبات من التلغرام...', 'info');
            
            const response = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getUpdates?limit=100&offset=-100`);
            const data = await response.json();
            
            if (!data.ok) throw new Error('فشل الاتصال بـ Telegram API');
            
            let newOrdersCount = 0;
            let processedIds = JSON.parse(localStorage.getItem('nardo_processed_telegram_ids') || '[]');
            
            if (!Array.isArray(orders)) orders = [];

            for (const update of data.result || []) {
                const post = update.channel_post || update.message || update.edited_channel_post || update.edited_message;
                if (!post || !post.text) continue;
                
                const uniqueId = post.message_id;
                if (processedIds.includes(uniqueId)) {
                    console.log(`⏭️ الرسالة ${uniqueId} تمت معالجتها مسبقاً`);
                    continue;
                }
                
                const text = post.text;
                const orderData = extractOrderDataFromText(text);
                
                if (!orderData || !orderData.productID) {
                    console.warn('⚠️ لم يتمكن من استخراج بيانات الطلب من الرسالة');
                    processedIds.push(uniqueId);
                    continue;
                }

                const product = products.find(p => 
                    p.productCompositeID === orderData.productID || 
                    p.name === orderData.productID ||
                    p.name.includes(orderData.productID)
                );
                
                if (!product) {
                    console.warn(`⚠️ المنتج '${orderData.productID}' غير موجود في المخزون`);
                    processedIds.push(uniqueId);
                    continue;
                }

                // التحقق من أن الطلب يخص هذا المتجر
                if (product.storeID && product.storeID !== currentStore.storeFixedID) {
                    console.log(`⏭️ الطلب يخص متجر آخر: ${product.storeID}`);
                    processedIds.push(uniqueId);
                    continue;
                }
                
                // التحقق من عدم تكرار الطلب
                const existingOrder = orders.find(o => o.telegramOrderId === orderData.orderNumber);
                if (existingOrder) {
                    console.log(`⏭️ الطلب #${orderData.orderNumber} موجود مسبقاً`);
                    processedIds.push(uniqueId);
                    continue;
                }
                
                const quantity = orderData.quantity;
                
                // إنشاء الطلب الجديد
                const newOrder = {
                    id: Date.now() + Math.random(),
                    telegramOrderId: orderData.orderNumber,
                    telegramMessageId: uniqueId,
                    date: orderData.date || new Date().toLocaleString('ar-EG'),
                    customerName: orderData.customerName,
                    customerPhone: orderData.customerPhone,
                    customerAddress: orderData.customerAddress,
                    customerNotes: orderData.notes || '',
                    storeID: currentStore.storeFixedID,
                    storeName: currentStore.storeName,
                    items: [{
                        id: product.id,
                        productCompositeID: product.productCompositeID,
                        name: product.name,
                        price: product.price,
                        quantity: quantity,
                        image: (product.images?.[0] || '').startsWith('data:') ? '' : (product.images?.[0] || '')
                    }],
                    total: orderData.total || (product.price * quantity),
                    status: 'pending',
                    source: 'telegram'
                };
                
                console.log('✅ تم إنشاء طلب جديد:', newOrder);
                orders.unshift(newOrder);
                
                // تحديث الكمية في المخزون
                const oldQty = product.quantity;
                product.quantity = Math.max(0, product.quantity - quantity);
                
                if (typeof addStockLog === 'function') {
                    addStockLog(product.id, product.name, 'remove', quantity, oldQty, product.quantity, `طلب تلغرام #${orderData.orderNumber}`, product.storeID);
                }
                
                processedIds.push(uniqueId);
                newOrdersCount++;
            }
            
            // حفظ البيانات
            safeLocalStorage.set('nardo_orders', orders);
            safeLocalStorage.set('nardo_products', products);
            safeLocalStorage.set('nardo_processed_telegram_ids', processedIds);
            
            // تحديث الواجهة
            renderAll();
            
            if (newOrdersCount > 0) {
                showToast(`✅ تم جلب ${newOrdersCount} طلب جديد`, 'success');
            } else {
                showToast('📭 لا توجد طلبات جديدة حالياً', 'info');
            }
            
        } catch (error) {
            console.error('❌ خطأ في جلب الطلبات:', error);
            showToast('❌ فشل جلب الطلبات: ' + error.message, 'error');
        }
    }

    // ========== دالة جلب المنتجات من تلغرام بناءً على معرف المتجر ==========
    async function fetchProductsFromTelegram() {
        try {
            if (!currentStore) {
                showToast('⚠️ يرجى تحديد المتجر أولاً', 'warning');
                return;
            }

            showToast('📡 جاري جلب المنتجات من التلغرام...', 'info');
            
            const response = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/getUpdates?limit=100&offset=-100`);
            const data = await response.json();
            
            if (!data.ok) throw new Error('فشل الاتصال بـ Telegram API');
            
            let newProductsCount = 0;
            let processedIds = JSON.parse(localStorage.getItem('nardo_processed_product_ids') || '[]');
            
            if (!Array.isArray(products)) products = [];

            for (const update of data.result || []) {
                const post = update.channel_post || update.message || update.edited_channel_post || update.edited_message;
                if (!post || !post.text) continue;
                
                const uniqueId = post.message_id;
                if (processedIds.includes(uniqueId)) {
                    console.log(`⏭️ الرسالة ${uniqueId} تمت معالجتها مسبقاً`);
                    continue;
                }
                
                const text = post.text;
                console.log('📨 معالجة الرسالة المنتج:', text.substring(0, 100) + '...');
                
                // استخراج بيانات المنتج من الرسالة
                const productData = extractProductDataFromText(text);
                
                if (!productData) {
                    console.warn('⚠️ لم يتمكن من استخراج بيانات المنتج من الرسالة');
                    processedIds.push(uniqueId);
                    continue;
                }

                // التحقق من أن المنتج يخص هذا المتجر
                if (productData.storeID !== currentStore.storeFixedID) {
                    console.log(`⏭️ المنتج يخص متجر آخر: ${productData.storeID}`);
                    processedIds.push(uniqueId);
                    continue;
                }
                
                // التحقق من عدم تكرار المنتج
                const existingProduct = products.find(p => p.productCompositeID === productData.productCompositeID);
                if (existingProduct) {
                    console.log(`⏭️ المنتج ${productData.productCompositeID} موجود مسبقاً`);
                    processedIds.push(uniqueId);
                    continue;
                }
                
                // إنشاء المنتج الجديد
                const newProduct = {
                    id: Date.now() + Math.random(),
                    productCompositeID: productData.productCompositeID,
                    name: productData.name,
                    price: productData.price,
                    quantity: productData.quantity,
                    images: productData.images || [],
                    storeID: currentStore.storeFixedID,

                    description: productData.description || '',

                    publishedDate: new Date().toLocaleString('ar-EG'),

            }
            
            // حفظ البيانات
            safeLocalStorage.set('nardo_products', products);

    // ========== دالة استخراج بيانات المنتج من نص الرسالة ==========
    function extractProductDataFromText(text) {
        try {
            const patterns = {
                storeID: /معرف المتجر:\s*([^\n]+)/,
                productCompositeID: /معرف المنتج:\s*([^\n]+)/,
                name: /اسم المنتج:\s*([^\n]+)/,
                price: /السعر:\s*([\d,]+)/,
                quantity: /الكمية:\s*(\d+)/,
                description: /الوصف:\s*([^\n]+)/
            };
            
            const storeID = (text.match(patterns.storeID)?.[1] || '').trim();
            const productCompositeID = (text.match(patterns.productCompositeID)?.[1] || '').trim();
            const name = (text.match(patterns.name)?.[1] || '').trim();
            const priceStr = (text.match(patterns.price)?.[1] || '0').replace(/,/g, '');
            const price = parseInt(priceStr);
            const quantity = parseInt(text.match(patterns.quantity)?.[1] || '0');
            const description = (text.match(patterns.description)?.[1] || '').trim();
            
            if (!storeID || !productCompositeID || !name || price <= 0) {
                console.warn("⚠️ بيانات المنتج غير كاملة");
                return null;
            }
            
            return {
                storeID,
                productCompositeID,
                name,
                price,
                quantity,
                description,
                images: []
            };
        } catch (error) {
            console.error('❌ خطأ في استخراج بيانات المنتج:', error);
            return null;
        }
    }

    function generateStoreID(storeName) {
        let clean = storeName.replace(/[^a-zA-Z0-9\u0600-\u06FF]/g, '').substring(0, 8).toUpperCase();
        if (!clean) clean = 'متجري';
        return `${clean}-${Math.floor(Math.random() * 900000 + 100000)}`;
    }

    function addStockLog(pid, pname, op, qty, oldQ, newQ, reason = '', storeID = null) {
        const targetStoreID = storeID || currentStore?.storeFixedID;
        stockLog.unshift({
            id: Date.now(),
            productId: pid,
            productName: pname,
            operation: op,
            quantity: qty,
            oldQty: oldQ,
            newQty: newQ,
            reason: reason,
            storeID: targetStoreID,
            date: new Date().toLocaleString('ar-EG')
        });
        if (stockLog.length > 500) stockLog = stockLog.slice(0, 500);
        localStorage.setItem('nardo_stock_log', JSON.stringify(stockLog));
    }

        editProductId = id;
        const p = products.find(p => p.id === id);
        if (p) {
            document.getElementById('editProductName').value = p.name;
            document.getElementById('editProductID').value = p.productCompositeID;
            document.getElementById('editCurrentQty').value = p.quantity;
            document.getElementById('editNewQty').value = 0;

    function closeEditStockModal() {

    function updateStock() {
        const p = products.find(p => p.id === editProductId);
        if (!p) return;
        const op = document.getElementById('stockOperation').value;
        const qtyVal = parseInt(document.getElementById('editNewQty').value);
        const reason = document.getElementById('stockReason').value;
        if (isNaN(qtyVal) || qtyVal < 0) { showToast('كمية غير صالحة', 'error'); return; }
        let oldQ = p.quantity;
        let newQ = oldQ;
        if (op === 'add') {
            newQ = oldQ + qtyVal;
            addStockLog(p.id, p.name, 'add', qtyVal, oldQ, newQ, reason || 'إضافة', p.storeID);
            showToast(`➕ تمت إضافة ${qtyVal}`, 'success');
        } else if (op === 'remove') {
            if (qtyVal > oldQ) { showToast('الكمية أكبر من المخزون', 'error'); return; }
            newQ = oldQ - qtyVal;
            addStockLog(p.id, p.name, 'remove', qtyVal, oldQ, newQ, reason || 'سحب', p.storeID);
            showToast(`➖ تم سحب ${qtyVal}`, 'success');
        } else if (op === 'set') {
            newQ = qtyVal;
            addStockLog(p.id, p.name, 'set', Math.abs(newQ - oldQ), oldQ, newQ, reason || `تعيين إلى ${newQ}`, p.storeID);
            showToast(`📝 تم التعيين`, 'success');
        }
        p.quantity = newQ;
        localStorage.setItem('nardo_products', JSON.stringify(products));
        renderAll();
        closeEditStockModal();
    }

            description: '',
            publishedToTelegram: true,
            publishedDate: new Date().toLocaleString('ar-EG')
        };

        // حفظ المنتج محلياً أولاً
        products.unshift(newProduct);
        localStorage.setItem('nardo_products', JSON.stringify(products));
        addStockLog(newProduct.id, newProduct.name, 'add', qty || 0, 0, qty || 0, 'منتج جديد - نشر على تلغرام', currentStore.storeFixedID);

        // إعداد رسالة تلغرام
        const telegramMessage = `
📦 منتج جديد
━━━━━━━━━━━━━━━━━━━━━━
معرف المتجر: ${currentStore.storeFixedID}
معرف المنتج: ${productCompositeID}
اسم المنتج: ${name}
السعر: ${price} دج
الكمية: ${qty || 0}
━━━━━━━━━━━━━━━━━━━━━━
`;

        try {
            showToast('📤 جاري نشر المنتج على تلغرام...', 'info');
            
            const response = await fetch(`${TELEGRAM.apiUrl}${TELEGRAM.botToken}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: TELEGRAM.channelId,
                    text: telegramMessage,
                    parse_mode: 'HTML'
                })
            });

            const result = await response.json();
            
            if (result.ok) {
                showToast('✅ تم نشر المنتج على تلغرام بنجاح', 'success');
                renderAll();
                closeAddProductModal();
            } else {
                throw new Error(result.description || 'فشل النشر');
            }
        } catch (error) {
            console.error('❌ خطأ في نشر المنتج:', error);
            showToast('⚠️ تم حفظ المنتج محلياً لكن فشل النشر على تلغرام: ' + error.message, 'warning');
            renderAll();
            closeAddProductModal();
        }
    }

    function previewImages(input) {
        const preview = document.getElementById('imagePreview');
        preview.innerHTML = '';
        currentImages = [];
        for (let i = 0; i < input.files.length; i++) {
            const file = input.files[i];
            const reader = new FileReader();
            reader.onload = e => {
                currentImages.push(e.target.result);
                const div = document.createElement('div');
                div.innerHTML = `<img src="${e.target.result}" style="width: 75px; height: 75px; border-radius: 8px; border: 2px solid var(--gold);">`;
                preview.appendChild(div);
            };
            reader.readAsDataURL(file);
        }
    }

    function showToast(msg, type) {
        const t = document.createElement('div');
        t.className = `toast ${type}`;
        const icon = type==='success' ? 'fa-check-circle' : (type==='error' ? 'fa-exclamation-circle' : (type==='warning' ? 'fa-exclamation-triangle' : 'fa-info-circle'));
        t.innerHTML = `<i class="fas ${icon}"></i> ${msg}`;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }

    // ========== الاستماع للتغييرات في localStorage ==========
    window.addEventListener('storage', (e) => {
        if (e.key === 'nardo_orders') {
            orders = safeLocalStorage.get('nardo_orders');
            renderOrders();
            updateStats();
        }
        if (e.key === 'nardo_products') {
            products = safeLocalStorage.get('nardo_products');
            renderAll();
        }
    });

    // ========== تشغيل التطبيق ==========
    document.addEventListener('DOMContentLoaded', () => {
        loadCurrentStore();
        renderAll();
        document.getElementById('searchProducts')?.addEventListener('input', renderProducts);
        document.getElementById('searchOrders')?.addEventListener('input', renderOrders);
        
        // جلب الطلبات تلقائياً عند فتح الصفحة
        setTimeout(fetchOrdersFromTelegram, 2000);
        
        // جلب الطلبات دورياً كل 2 دقيقة
        setInterval(fetchOrdersFromTelegram, 120000);
    });
    </script>
</body>
</html>
