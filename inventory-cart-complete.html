<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ناردو برو | إدارة المخزون</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* القسم 1-15: التنسيقات الكاملة */
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--gold:#ffd700;--gold-dark:#daa520;--success:#4ade80;--error:#f87171}
        body{font-family:'Cairo',sans-serif;background:linear-gradient(135deg,#0a0a1a,#15152a);color:#fff}
        .container{max-width:1400px;margin:0 auto;padding:20px}
        .navbar{background:rgba(10,10,26,.95);backdrop-filter:blur(20px);padding:15px 25px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:15px;border-bottom:1px solid rgba(255,215,0,.2);position:sticky;top:0;z-index:1000}
        .logo{display:flex;align-items:center;gap:10px}
        .logo i{font-size:28px;color:#ffd700}
        .logo span{font-size:20px;font-weight:800;background:linear-gradient(135deg,#ffd700,#ffed4e);-webkit-background-clip:text;background-clip:text;color:transparent}
        .store-info{background:rgba(0,0,0,.3);padding:8px 20px;border-radius:50px;border:1px solid rgba(255,215,0,.2)}
        .btn{padding:10px 22px;border:none;border-radius:40px;font-weight:600;cursor:pointer;font-family:'Cairo';display:inline-flex;align-items:center;gap:8px;transition:.2s}
        .btn-gold{background:linear-gradient(135deg,#ffd700,#daa520);color:#111}
        .btn-telegram{background:linear-gradient(135deg,#0088cc,#006699);color:#fff}
        .btn-outline{background:0 0;border:2px solid #ffd700;color:#ffd700}
        .tabs{display:flex;gap:10px;background:rgba(10,10,26,.9);padding:12px 20px;position:sticky;top:70px;z-index:999;flex-wrap:wrap}
        .tab{background:0 0;border:none;color:#b0b0b0;padding:10px 25px;border-radius:40px;cursor:pointer;font-weight:700;display:flex;align-items:center;gap:8px}
        .tab.active{background:rgba(255,215,0,.15);color:#ffd700}
        .stats-card{background:linear-gradient(135deg,rgba(255,215,0,.08),rgba(0,0,0,.3));border-radius:28px;padding:20px;margin:20px 0;display:flex;justify-content:space-between;flex-wrap:wrap;gap:15px}
        .stat{background:rgba(0,0,0,.4);padding:10px 25px;border-radius:30px;text-align:center}
        .stat .num{font-size:28px;font-weight:800;color:#ffd700}
        .products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:25px}
        .product-card{background:rgba(25,25,45,.9);border-radius:25px;padding:20px;border:1px solid rgba(255,215,0,.15)}
        .product-card:hover{transform:translateY(-5px);border-color:rgba(255,215,0,.4)}
        .product-name{font-size:20px;font-weight:800;color:#ffd700}
        .product-price{font-size:24px;font-weight:800;color:#4ade80;margin:10px 0}
        .stock-badge{display:inline-block;padding:5px 12px;border-radius:20px;font-size:12px}
        .stock-high{background:rgba(74,222,128,.15);color:#4ade80}
        .stock-low{background:rgba(251,191,36,.15);color:#fbbf24}
        .table-container{background:rgba(0,0,0,.25);border-radius:20px;overflow-x:auto}
        table{width:100%;border-collapse:collapse}
        th,td{padding:14px;text-align:right;border-bottom:1px solid rgba(255,215,0,.1)}
        th{color:#ffd700}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.9);z-index:2000;align-items:center;justify-content:center}
        .modal.active{display:flex}
        .modal-content{background:linear-gradient(145deg,#1a1a2e,#0f0f1a);border-radius:30px;padding:30px;max-width:600px;width:90%}
        .form-group{margin-bottom:20px}
        .form-group label{display:block;margin-bottom:8px;color:#ffd700;font-weight:600}
        .form-group input,.form-group select,.form-group textarea{width:100%;padding:12px;background:rgba(0,0,0,.4);border:1px solid rgba(255,215,0,.2);border-radius:15px;color:#fff;font-family:'Cairo'}
        .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);padding:12px 25px;border-radius:50px;z-index:3000;animation:slideUp .3s}
        @keyframes slideUp{from{bottom:-50px}to{bottom:30px}}
        .toast.success{background:#22c55e}
        .toast.error{background:#ef4444}
        @media(max-width:768px){.navbar{padding:10px}.tabs{top:60px}.products-grid{grid-template-columns:1fr}}
    </style>
</head>
<body>

<nav class="navbar">
    <div class="logo"><i class="fas fa-boxes"></i><span>ناردو برو - المخزون</span></div>
    <div class="store-info"><i class="fas fa-store"></i> <span id="storeName">جاري التحميل...</span> | <i class="fas fa-id-card"></i> <span id="storeID">---</span></div>
    <div style="display:flex;gap:10px">
        <button class="btn btn-telegram" onclick="window.open('https://t.me/NardoProBot','_blank')"><i class="fab fa-telegram"></i> البوت</button>
        <button class="btn btn-gold" onclick="openProductModal()"><i class="fas fa-plus"></i> منتج جديد</button>
    </div>
</nav>

<div class="tabs">
    <button class="tab active" onclick="showTab('products',this)"><i class="fas fa-box"></i> المنتجات</button>
    <button class="tab" onclick="showTab('inventory',this)"><i class="fas fa-warehouse"></i> المخزون</button>
    <button class="tab" onclick="showTab('stockLog',this)"><i class="fas fa-history"></i> سجل الحركات</button>
</div>

<div class="container">
    <div class="stats-card">
        <div class="stat"><div class="num" id="totalProducts">0</div><div>منتج</div></div>
        <div class="stat"><div class="num" id="lowStock">0</div><div>مخزون منخفض</div></div>
    </div>

    <div id="productsTab">
        <div style="display:flex;gap:15px;margin-bottom:20px;flex-wrap:wrap">
            <div style="flex:1;display:flex;background:rgba(0,0,0,.3);border-radius:50px;padding:8px 20px"><i class="fas fa-search" style="margin-left:10px"></i><input type="text" id="searchInput" placeholder="بحث..." style="background:0;border:none;color:#fff;width:100%"></div>
            <button class="btn btn-telegram" onclick="fetchProducts()"><i class="fas fa-download"></i> جلب من تلغرام</button>
        </div>
        <div class="products-grid" id="productsGrid"></div>
    </div>

    <div id="inventoryTab" style="display:none">
        <div class="table-container"><table><thead><tr><th>المنتج</th><th>المعرف</th><th>السعر</th><th>الكمية</th><th>الحالة</th><th>إجراء</th></tr></thead><tbody id="inventoryTable"></tbody></table></div>
    </div>

    <div id="stockLogTab" style="display:none">
        <div id="stockLogContainer"></div>
    </div>
</div>

<div id="productModal" class="modal">
    <div class="modal-content">
        <h2 style="color:#ffd700;margin-bottom:20px"><i class="fas fa-cube"></i> إضافة منتج</h2>
        <div class="form-group"><label>الاسم</label><input type="text" id="prodName" placeholder="اسم المنتج"></div>
        <div class="form-group"><label>السعر (دج)</label><input type="number" id="prodPrice" placeholder="السعر"></div>
        <div class="form-group"><label>الكمية</label><input type="number" id="prodQty" value="1"></div>
        <div class="form-group"><label>القسم</label><select id="prodCat"><option>عام</option><option>عطور</option><option>ملابس</option></select></div>
        <div class="form-group"><label>الوصف</label><textarea id="prodDesc" rows="3" placeholder="وصف المنتج"></textarea></div>
        <div class="form-group"><label>الصورة</label><input type="file" id="prodImage" accept="image/*"></div>
        <div style="display:flex;gap:15px;margin-top:25px">
            <button class="btn btn-outline" style="flex:1" onclick="saveProduct()"><i class="fas fa-save"></i> حفظ فقط</button>
            <button class="btn btn-telegram" style="flex:1" onclick="saveAndPublish()"><i class="fab fa-telegram"></i> حفظ ونشر</button>
        </div>
        <button style="margin-top:15px;width:100%" class="btn btn-outline" onclick="closeModal('productModal')">إلغاء</button>
    </div>
</div>

<div id="stockModal" class="modal">
    <div class="modal-content">
        <h2 style="color:#ffd700">تعديل المخزون</h2>
        <div class="form-group"><label>المنتج</label><input type="text" id="stockProdName" disabled></div>
        <div class="form-group"><label>الكمية الحالية</label><input type="number" id="stockCurrent" disabled></div>
        <div class="form-group"><label>العملية</label><select id="stockOp"><option value="add">➕ إضافة</option><option value="remove">➖ سحب</option><option value="set">📝 تعيين</option></select></div>
        <div class="form-group"><label>الكمية</label><input type="number" id="stockQty" value="0"></div>
        <div class="form-group"><label>السبب</label><input type="text" id="stockReason" placeholder="اختياري"></div>
        <button class="btn btn-gold" style="width:100%" onclick="updateStock()">تحديث</button>
        <button class="btn btn-outline" style="width:100%;margin-top:10px" onclick="closeModal('stockModal')">إلغاء</button>
    </div>
</div>

<script>
    // دوال التخزين
    function saveData(){localStorage.setItem('nardo_products',JSON.stringify(products));localStorage.setItem('nardo_stock_log',JSON.stringify(stockLog));localStorage.setItem('nardo_store',JSON.stringify(currentStore));}
    function loadData(){products=JSON.parse(localStorage.getItem('nardo_products')||'[]');stockLog=JSON.parse(localStorage.getItem('nardo_stock_log')||'[]');let s=localStorage.getItem('nardo_store');if(s){currentStore=JSON.parse(s);}else{currentStore.storeFixedID='NARDO-'+Math.floor(Math.random()*900000+100000);currentStore.storeName='ناردو برو';saveData();}
    document.getElementById('storeName').innerText=currentStore.storeName;document.getElementById('storeID').innerText=currentStore.storeFixedID;renderAll();}
    
    // دوال المتجر
    function getSerial(){let arr=products.filter(p=>p.storeID===currentStore.storeFixedID);return arr.length?Math.max(...arr.map(p=>p.serial||0))+1:1;}
    function genID(serial){return currentStore.storeFixedID+'-'+String(serial).padStart(3,'0');}
    function cleanTelegramText(t){return t?t.replace(/[_*[\]()~`>#+\-=|{}.!]/g,'\\$&'):'';}
    
    // دالة إرسال منتج إلى التليجرام (خاصة بالمخزون)
    async function sendToTelegram(product,file){
        try{
            let cap=`🟣 *منتج جديد في ناردو برو*\n━━━━━━━━━━━━━━━━━━\n📦 *المنتج:* ${cleanTelegramText(product.name)}\n💰 *السعر:* ${product.price.toLocaleString()} دج\n🏷️ *القسم:* ${product.cat||'عام'}\n📊 *الكمية:* ${product.qty}\n🆔 *معرف المنتج:* \`${product.id}\`\n🏪 *المتجر:* ${currentStore.storeName}\n🆔 *معرف المتجر:* \`${currentStore.storeFixedID}\`\n📝 *الوصف:* ${cleanTelegramText(product.desc||'لا يوجد وصف')}`;
            let fd=new FormData();fd.append('chat_id','-1003822964890');fd.append('photo',file);fd.append('caption',cap);fd.append('parse_mode','Markdown');
            let res=await fetch(`https://api.telegram.org/bot8576673096:AAFwOd-Ut1tCyKTHwkgj_r6OFi9UZbb4pTM/sendPhoto`,{method:'POST',body:fd});
            let d=await res.json();if(d.ok){showToast('✅ تم النشر','success');return true;}
            throw new Error();
        }catch(e){showToast('❌ فشل النشر','error');return false;}
    }
    
    // دالة جلب المنتجات من التليجرام (خاصة بالمخزون)
    async function fetchProducts(){
        showToast('جاري الجلب...','success');
        try{
            let res=await fetch(`https://api.telegram.org/bot8576673096:AAFwOd-Ut1tCyKTHwkgj_r6OFi9UZbb4pTM/getUpdates`);
            let data=await res.json();let c=0;
            for(let u of data.result||[]){
                let p=u.channel_post;if(!p||!p.caption)continue;
                let txt=p.caption,storeMatch=txt.match(/معرف المتجر: `(.*?)`/);
                if(!storeMatch||storeMatch[1]!==currentStore.storeFixedID)continue;
                let nameMatch=txt.match(/المنتج: (.*)/),priceMatch=txt.match(/السعر: ([\d,]+)/),idMatch=txt.match(/معرف المنتج: `(.*?)`/);
                if(nameMatch&&priceMatch&&!products.some(x=>x.telegramId===p.message_id)){
                    products.push({id:Date.now(),telegramId:p.message_id,name:nameMatch[1].trim(),price:parseInt(priceMatch[1].replace(/,/g,'')),quantity:10,storeID:currentStore.storeFixedID,productID:idMatch?idMatch[1]:'',source:'telegram',published:true,serial:getSerial()});
                    c++;
                }
            }
            saveData();renderAll();showToast(`جلب ${c} منتج`,'success');
        }catch(e){showToast('فشل الجلب','error');}
    }
    
    // دوال المنتجات
    function saveProduct(){
        let n=document.getElementById('prodName').value.trim(),p=parseInt(document.getElementById('prodPrice').value),q=parseInt(document.getElementById('prodQty').value);
        if(!n||isNaN(p)||p<=0){showToast('بيانات غير مكتملة','error');return;}
        let s=getSerial(),cid=genID(s);
        let np={id:Date.now(),storeID:currentStore.storeFixedID,productCompositeID:cid,serial:s,name:n,price:p,quantity:q,cat:document.getElementById('prodCat').value,desc:document.getElementById('prodDesc').value,source:'local',published:false};
        products.push(np);
        stockLog.unshift({id:Date.now(),product:n,op:'إضافة',qty:q,old:0,new:q,reason:'منتج جديد'});
        saveData();renderAll();closeModal('productModal');
        showToast(`✅ تم حفظ ${n}`,'success');
    }
    
    async function saveAndPublish(){
        let n=document.getElementById('prodName').value.trim(),p=parseInt(document.getElementById('prodPrice').value),q=parseInt(document.getElementById('prodQty').value);
        if(!n||isNaN(p)||p<=0){showToast('بيانات غير مكتملة','error');return;}
        let img=document.getElementById('prodImage').files[0];
        if(!img){showToast('⚠️ النشر يحتاج صورة','warning');return;}
        let s=getSerial(),cid=genID(s);
        let np={name:n,price:p,qty:q,cat:document.getElementById('prodCat').value,desc:document.getElementById('prodDesc').value,id:cid};
        let ok=await sendToTelegram(np,img);
        let newProd={id:Date.now(),storeID:currentStore.storeFixedID,productCompositeID:cid,serial:s,name:n,price:p,quantity:q,cat:np.cat,desc:np.desc,source:'local',published:ok,telegramId:ok?Date.now():null};
        products.push(newProd);
        stockLog.unshift({id:Date.now(),product:n,op:'إضافة',qty:q,old:0,new:q,reason:ok?'منتج منشور':'منتج محلي'});
        saveData();renderAll();closeModal('productModal');
        showToast(ok?`✅ نشر ${n}`:`⚠️ حفظ ${n} بدون نشر`,ok?'success':'warning');
    }
    
    function deleteProduct(id){if(confirm('حذف؟')){products=products.filter(p=>p.id!==id);saveData();renderAll();showToast('تم الحذف','success');}}
    
    // دوال المخزون والسجل
    function openStockModal(id){let p=products.find(p=>p.id===id);if(p){editId=id;document.getElementById('stockProdName').value=p.name;document.getElementById('stockCurrent').value=p.quantity;document.getElementById('stockQty').value=0;document.getElementById('stockModal').classList.add('active');}}
    function closeModal(id){document.getElementById(id).classList.remove('active');}
    function updateStock(){
        let p=products.find(p=>p.id===editId);if(!p)return;
        let op=document.getElementById('stockOp').value,q=parseInt(document.getElementById('stockQty').value),r=document.getElementById('stockReason').value,old=p.quantity,neu=old;
        if(op==='add')neu=old+q;else if(op==='remove'){if(q>old){showToast('كمية غير متوفرة','error');return;}neu=old-q;}else neu=q;
        p.quantity=neu;
        stockLog.unshift({id:Date.now(),product:p.name,op:op==='add'?'إضافة':(op==='remove'?'سحب':'تعيين'),qty:Math.abs(neu-old),old,new:neu,reason:r||'-'});
        saveData();renderAll();closeModal('stockModal');showToast('تم التحديث','success');
    }
    
    // دوال العرض (Render functions)
    function renderProducts(){
        let s=document.getElementById('searchInput')?.value.toLowerCase()||'',f=products.filter(p=>p.storeID===currentStore.storeFixedID&&(p.name.toLowerCase().includes(s)||(p.productCompositeID||'').toLowerCase().includes(s)));
        let g=document.getElementById('productsGrid');
        if(!f.length){g.innerHTML='<div style="text-align:center;padding:50px">لا توجد منتجات</div>';return;}
        g.innerHTML=f.map(p=>`
            <div class="product-card">
                <div class="product-name">${p.name}</div>
                <div class="product-price">${p.price.toLocaleString()} دج</div>
                <div><span class="stock-badge ${p.quantity>10?'stock-high':'stock-low'}">${p.quantity>0?`المتبقي: ${p.quantity}`:'غير متوفر'}</span></div>
                <div style="margin-top:15px;display:flex;gap:10px">
                    <button class="btn btn-outline" onclick="openStockModal(${p.id})"><i class="fas fa-edit"></i> تعديل</button>
                    <button class="btn btn-outline" onclick="deleteProduct(${p.id})"><i class="fas fa-trash"></i></button>
                </div>
            </div>
        `).join('');
    }
    
    function renderInventory(){
        let f=products.filter(p=>p.storeID===currentStore.storeFixedID),t=document.getElementById('inventoryTable');
        if(!f.length){t.innerHTML='<tr><td colspan="6" style="text-align:center">لا توجد منتجات</td></tr>';return;}
        t.innerHTML=f.map(p=>`<tr><td><strong>${p.name}</strong></td><td>${p.productCompositeID||'-'}</td><td>${p.price.toLocaleString()} دج</td><td style="font-weight:800">${p.quantity}</td><td><span class="stock-badge ${p.quantity>0?'stock-high':'stock-low'}">${p.quantity>0?'متاح':'نفد'}</span></td><td><button class="btn btn-outline" onclick="openStockModal(${p.id})"><i class="fas fa-edit"></i></button></td></tr>`).join('');
    }
    
    function renderStockLog(){
        let f=stockLog.filter(l=>l.product),c=document.getElementById('stockLogContainer');
        if(!f.length){c.innerHTML='<div style="text-align:center;padding:40px">لا توجد حركات</div>';return;}
        c.innerHTML=f.slice(0,100).map(l=>`<div style="background:rgba(0,0,0,.3);border-radius:15px;padding:12px;margin-bottom:10px;display:flex;justify-content:space-between"><div><strong style="color:#ffd700">${l.product}</strong><br><span>${l.op} ${l.qty} | من ${l.old} → ${l.new}</span>${l.reason?`<br><small>📌 ${l.reason}</small>`:''}</div><div style="font-size:11px">${new Date().toLocaleString()}</div></div>`).join('');
    }
    
    function updateStats(){
        let my=products.filter(p=>p.storeID===currentStore.storeFixedID).length;
        let low=products.filter(p=>p.storeID===currentStore.storeFixedID&&p.quantity>0&&p.quantity<=5).length;
        document.getElementById('totalProducts').innerText=my;
        document.getElementById('lowStock').innerText=low;
    }
    
    function renderAll(){renderProducts();renderInventory();renderStockLog();updateStats();}
    function showTab(t,b){document.querySelectorAll('#productsTab,#inventoryTab,#stockLogTab').forEach(el=>el.style.display='none');document.getElementById(t+'Tab').style.display='block';document.querySelectorAll('.tab').forEach(btn=>btn.classList.remove('active'));b.classList.add('active');}
    function openProductModal(){document.getElementById('productModal').classList.add('active');document.getElementById('prodName').value='';document.getElementById('prodPrice').value='';document.getElementById('prodQty').value='1';document.getElementById('prodImage').value='';document.getElementById('prodDesc').value='';}
    function showToast(m,t){let d=document.createElement('div');d.className=`toast ${t}`;d.innerHTML=`<i class="fas ${t==='success'?'fa-check-circle':'fa-exclamation-circle'}"></i> ${m}`;document.body.appendChild(d);setTimeout(()=>d.remove(),3000);}
    
    let products=[],stockLog=[],currentStore={storeFixedID:'',storeName:'ناردو برو'},editId=null;
    document.getElementById('searchInput')?.addEventListener('input',renderProducts);
    document.addEventListener('DOMContentLoaded',()=>{loadData();});
</script>
</body>
</html>
